 (3 개)", "images": [], "text_box": "35세 남자가 2주 전부터 가슴이 아파 병원에 왔다. 통증은 왼쪽 가슴과 어깨 쪽으로 퍼졌고, 눕거나 기침을 하면 심해졌다. 왼쪽 앞가슴에 마찰음이 들렸다.", "options": ["관상동맥조영술", "식도위내시경", "심초음파", "흉부 X선 사진", "심전도", "운동부하검사", "폐기능검사", "24시간생활심전도"], "answer": [2, 3, 4], "explanation": "환자의 흉통은 왼쪽 가슴과 어깨로 퍼지며, 눕거나 기침 시 악화되는 흉막성 통증 양상을 보입니다. 또한, 심낭 마찰음(friction rub)이 청진되는 것은 심낭염의 강력한 증거입니다. 심낭염이 의심될 때 진단을 위해 심장막의 염증 및 삼출액 여부를 확인하는 심초음파가 필수적입니다. 더불어 흉부 X선 사진으로 심비대나 폐울혈 등의 소견을 확인하고, 심전도를 통해 ST분절 상승 등 심낭염의 특징적인 전기 생리학적 변화를 파악해야 합니다. 이러한 검사들은 심낭염의 진단 및 중증도 평가에 매우 중요합니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["20학번"], "professor": "최익준", "question": "다음은 질환에 따른 동맥압 파형을 짝지은 것이다. 옳은 것은?", "images": [], "text_box": null, "options": ["Bisteriens pulse - Aortic valve stenosis", "Dicrotic pulse - Hypertrophic cardiomyopathy", "Parvus et tardus pulse - Aortic valve regurgitation", "Pulsus alternans - Cardiac tamponade", "Pulsus paradoxus - Constrictive pericarditis"], "answer": [4], "explanation": "pulsus paradoxus는 흡기 시 수축기 혈압이 10 mmHg 이상 감소하는 현상으로, 심장 눌림증(cardiac tamponade), 심한 폐색전증, 출혈성 쇼크, 폐쇄성 폐질환 등에서 관찰될 수 있습니다. 협착성 심막염(constrictive pericarditis)에서도 나타날 수 있으므로 5번 보기는 옳은 조합입니다. Parvus et tardus pulse는 대동맥판 협착증에서 나타나며, Bifid(bisferiens) pulse는 대동맥판 역류에서 보입니다. Pulsus alternans는 심한 좌심실 수축기 부전에서 관찰됩니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["20학번"], "professor": "최익준", "question": "3년 전부터 운동 중에 호흡곤란 증상이 있었던 55세 여자가 자다가 왼쪽 팔과 다리에 마비 증상을 보여 내원하였다. 내원당시 혈압 114/70, 맥박 95회/분, 호흡수 23회/분으로 측정되었으나 심장박동은 불규칙했고 심음 청진 시 제1심음이 증가되어 있었으며, 심장 끝에서 diastolic rumbling murmur가 들렸다. 다음 중 이 환자의 증상과 관련된 내용으로 적합한 것은? (3 가지)", "images": [], "text_box": "3년 전부터 운동 중에 호흡곤란 증상이 있었던 55세 여자가 자다가 왼쪽 팔과 다리에 마비 증상을 보여 내원하였다. 내원당시 혈압 114/70, 맥박 95회/분, 호흡수 23회/분으로 측정되었으나 심장박동은 불규칙했고 심음 청진 시 제1심음이 증가되어 있었으며, 심장 끝에서 diastolic rumbling murmur가 들렸다.", "options": ["승모판 협착증", "심실조기박동", "대동맥판폐쇄부전증", "심방세동", "심실사이결손", "동맥관개존증", "동기능 부전", "혈전증"], "answer": [0, 3, 7], "explanation": "환자는 운동 시 호흡곤란, 불규칙한 심장박동, 제1심음 증가, 그리고 심첨부에서 이완기 굴림 심잡음(diastolic rumbling murmur)을 보입니다. 이러한 증상들은 승모판 협착증(MS)의 전형적인 소견입니다. 승모판 협착증은 좌심방에 압력 부하를 일으켜 심방세동을 유발할 수 있습니다. 심방세동은 혈류 정체를 초래하여 좌심방 내 혈전 형성을 증가시키고, 이 혈전이 떨어져 나와 뇌졸중과 같은 색전성 합병증을 유발할 수 있습니다. 따라서 환자의 마비 증상은 혈전증에 의한 것으로 추정됩니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["20학번"], "professor": "최익준", "question": "70세 남자환자의 혈압을 측정시에 흡기시에 수축기 혈압이 20 mmHg 감소하였다. 이러한 소견을 보이지 않는 질환은?", "images": [], "text_box": "70세 남자환자의 혈압을 측정시에 흡기시에 수축기 혈압이 20 mmHg 감소하였다.", "options": ["폐색전증", "급성심근경색", "심한 폐쇄성 폐질환", "심장눌림증(pericardial tamponade)", "긴장성 기흉(tension pneumothorax)"], "answer": [1], "explanation": "흡기 시 수축기 혈압이 10mmHg 이상 감소하는 현상을 기이맥(pulsus paradoxus)이라고 합니다. 이는 심장 눌림증, 심한 폐색전증, 심한 폐쇄성 폐질환, 긴장성 기흉, 심한 출혈성 쇼크 등에서 관찰될 수 있습니다. 이러한 질환들은 심장으로의 혈액 유입을 방해하거나 우심실 확장으로 좌심실 충만을 제한하여 기이맥을 유발합니다. 급성 심근경색은 기이맥을 유발하는 주요 원인이 아니며, 심근경색 자체로 인해 기이맥이 나타나는 경우는 드뭅니다. 따라서 제시된 질환 중 급성 심근경색에서는 기이맥 소견이 보이지 않을 가능성이 높습니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["19학번"], "professor": "최익준", "question": "승모판역류증의 심잡음이 청취되는 시기는?", "images": [], "text_box": null, "options": ["수축기 초기", "수축기 말기", "수축기 전체", "이완기 초기", "이완기 말기"], "answer": [2], "explanation": "승모판 역류증은 좌심실 수축기 동안 승모판이 제대로 닫히지 않아 좌심실 혈액이 좌심방으로 역류하는 상태입니다. 이 역류는 심실 수축기 내내 지속되기 때문에, 심잡음은 수축기 전체에 걸쳐 청취되는 전수축기(holosystolic) 심잡음으로 나타납니다. 급성 승모판 역류의 경우 초기 수축기에만 들릴 수 있으나, 일반적으로 만성 승모판 역류를 지칭할 때는 수축기 전체에 걸쳐 들리는 것이 특징입니다. 따라서 수축기 전체 동안 잡음이 들립니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["18학번"], "professor": "최익준", "question": "대동맥판 협착증의 심잡음이 청취되는 시기는?", "images": [], "text_box": null, "options": ["수축기 초기", "수축기 말기", "수축기 전체", "수축기 중기", "이완기 초기"], "answer": [3], "explanation": "대동맥판 협착증은 좌심실 수축 시 대동맥판이 좁아져 혈액 유출이 방해될 때 발생합니다. 이로 인해 심실 수축 초기에는 압력이 천천히 올라가고, 중기에 가장 심한 압력차가 발생하며, 후기에는 압력이 감소합니다. 이러한 특징적인 혈류 역학 때문에 심잡음은 수축기 중기에 시작하여 점차 커졌다가 다시 작아지는 crescendo-decrescendo 양상을 보입니다. 따라서 대동맥판 협착증의 심잡음은 수축기 중기에 가장 뚜렷하게 들립니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["16학번"], "professor": "최익준", "question": "대동맥판 역류증의 심잡음이 청취되는 시기는?", "images": [], "text_box": null, "options": ["수축기 초기", "수축기 말기", "수축기 전체", "이완기 초기", "이완기 말기"], "answer": [3], "explanation": "대동맥판 역류증은 대동맥판이 이완기 동안 제대로 닫히지 않아 대동맥의 혈액이 좌심실로 역류하는 상태입니다. 이 역류는 심실 이완 초기 대동맥 압력이 높을 때 가장 심하며, 이완기 후반으로 갈수록 압력차가 줄어들면서 역류도 감소합니다. 따라서 심잡음은 이완기 초기에 가장 크고 점차 작아지는 decrescendo 양상의 심잡음으로 청취됩니다. 이는 이완기 초기 잡음의 전형적인 특징입니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["16학번", "15학번"], "professor": "최익준", "question": "청진법 혈압 측정에 대한 다음 설명 중 옳지 않은 것은?", "images": [], "text_box": null, "options": ["혈압 측정 전 최소 5분 동안 안정하며, 조용한 환경에서 측정한다.", "혈압 측정 30분 이내에는 흡연, 알코올, 카페인을 섭취하지 않는다.", "처음에는 양팔 혈압을 측정한 뒤, 다음부터는 혈압 수치가 낮은 팔에서 측정한다.", "위팔을 심장 높이로 위치시키고 커프 아래에 3cm 의 공간을 확보하여 커프를 감는다.", "빠른 속도로 커프 압력을 올리고, 박동 당 2mmHg 의 속도로 천천히 감압한다."], "answer": [2], "explanation": "혈압 측정 시에는 최소 5분 이상 안정된 상태에서 조용한 환경에서 측정해야 합니다. 측정 전 30분 이내 흡연, 알코올, 카페인 섭취는 혈압에 영향을 미치므로 피해야 합니다. 처음 측정 시에는 양쪽 팔 모두 측정하여 혈압이 높은 팔을 기준으로 삼아야 하며, 팔은 심장 높이에 위치시켜야 합니다. 커프는 위팔에 적절히 감고, 빠르게 압력을 올린 뒤 분당 2-3mmHg의 속도로 천천히 감압하여 수축기 및 이완기 혈압을 확인해야 합니다. 혈압 수치가 낮은 팔에서 측정하는 것은 옳지 않습니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["14학번"], "professor": "최익준", "question": "23세 남자가 우연히 발견된 심잡음을 주소로 내원하였다. 제2심음이 호흡주기와 무관하게 일정하게 분열되었고 흉골 왼쪽 위에서 수축기 잡음이 들렸다. 심전도에서 우각차단이 관찰될 때 진단은?", "images": [], "text_box": "23세 남자가 우연히 발견된 심잡음을 주소로 내원하였다. 제2심음이 호흡주기와 무관하게 일정하게 분열되었고 흉골 왼쪽 위에서 수축기 잡음이 들렸다. 심전도에서 우각차단이 관찰될 때 진단은?", "options": ["심방중격결손", "삼첨판 협착", "동맥관개존", "승모판폐쇄부전", "대동맥판막협착"], "answer": [0], "explanation": "환자의 경우, 호흡 주기에 따라 변하지 않는 제2심음의 고정 분리 소견은 심방중격결손(ASD)의 특징적인 소견입니다. 또한, 흉골 왼쪽 위에서 들리는 수축기 잡음과 심전도상 우각차단은 ASD의 흔한 동반 소견입니다. 심방중격결손은 좌심방에서 우심방으로의 혈액 단락으로 인해 우심실 과부하가 발생하며, 이는 이러한 청진 및 심전도 소견으로 이어집니다. 따라서 제시된 모든 소견을 종합할 때 심방중격결손이 가장 합당한 진단입니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["13학번"], "professor": "최익준", "question": "다음은 질환에 따른 특징적인 Jugular venous pressure 파형이다. 옳은 조합은?", "images": [], "text_box": null, "options": ["Tricuspid stenosis - ①", "Tricuspid regurgitation - ②", "Constrictive pericarditis - ③", "Atrial fibrillation - ④", "Atrial septal defect - ⑤"], "answer": [2], "explanation": "경정맥압(JVP) 파형 분석은 다양한 심장 질환 진단에 유용합니다. 삼첨판 협착(Tricuspid stenosis)은 y 하강이 늦고 a파가 커지는 양상을 보입니다. 삼첨판 역류(Tricuspid regurgitation)는 큰 V파와 사라진 X파를 특징으로 합니다. 협착성 심막염(Constrictive pericarditis)은 급격하고 뚜렷한 y 하강이 나타나는 것이 특징입니다. 심방세동(Atrial fibrillation)에서는 a파가 사라집니다. 주어진 그림에서는 ③번 파형이 협착성 심막염의 전형적인 소견과 일치합니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["09학번"], "professor": "최익준", "question": "다음 증상들과 대표적인 질환의 연결이 바르지 않은 것은?", "images": [], "text_box": null, "options": ["Orthopnea- 심부전", "두근거림- 심방 조기박동", "청색증- 폐부종", "흉통- 폐색전증", "노작성 호흡곤란- 대동맥 박리"], "answer": [4], "explanation": "노작성 호흡곤란은 평상시에는 숨이 차지 않다가 운동 등 신체 활동 시에만 호흡곤란이 발생하는 상태입니다. 이는 심부전이나 만성 폐질환에서 흔히 나타나는 증상입니다. 그러나 대동맥 박리는 주로 급성, 극심한 찢어지는 듯한 흉통을 유발하며, 호흡곤란이 동반될 수 있지만 '노작성' 호흡곤란이라는 표현과는 거리가 있습니다. 나머지 보기는 모두 증상과 질환의 올바른 연결입니다."}, {"subject": "심장질환의 진찰(증상과 신체검진)", "year": ["09학번"], "professor": "최익준", "question": "다음 증상들 중에서 전형적인 심근 허혈에 동반된 증상의 기술이 아닌 것은?", "images": [], "text_box": null, "options": ["운동시 악화되는 흉통", "흉골 후방에서 시작하여 목 앞쪽으로 방사되는 통증", "5-10분 정도 지속되며 흉통과 동반된 발한", "30분 이상 지속되는 극심한 멍치끝 통증과 이에 동반된 오심, 구토", "체위에 따라 변화나는 수초 간 반복되는 통증"], "answer": [4], "explanation": "심근 허혈에 의한 흉통은 운동 시 악화되고 휴식 시 호전되는 것이 특징입니다. 흉골 후방에서 시작하여 목, 턱, 팔 등으로 방사되는 통증 양상도 전형적입니다. 통증은 보통 수분에서 10여 분 정도 지속되며, 발한, 오심, 구토 등이 동반될 수 있습니다. 30분 이상 지속되는 극심한 흉통은 불안정형 협심증이나 심근경색의 가능성을 시사합니다. 반면, 체위에 따라 변화하거나 수초 간 반복되는 통증은 근골격계 또는 흉막성 통증을 시사하며 심근 허혈과는 관련성이 낮습니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["19학번"], "professor": "정정임", "question": "열이 동반된 흉통을 주소로 응급실에 내원한 30세 남자환자이다. 환자의 심전도에서는 T-wave inversion 이 있었으며 검사실 소견에서 Troponin 과 CK-MB 가 증가되었다. 심초음파 검사에서 심박출률이 40%로 감소되어 있었고, 관동맥혈관 조영술은 정상이었다. 일상적으로 의심되는 질환과 진단을 위한 영상 검사로 가장 옳은 것은?", "images": [], "text_box": null, "options": ["심근경색 -심장MRI", "심근병증 - 심장 CT", "심근병증-심장 SPECT", "심근염-심장 SPECT", "심근염-심장 MRI"], "answer": [4], "explanation": "환자는 열이 동반된 흉통, 심근 효소 증가, T-wave inversion, 심박출률 감소를 보이며, 관동맥 혈관 조영술이 정상으로 심근 허혈이 배제됩니다. 이러한 소견은 심근염을 시사합니다. 심근염의 진단을 위해 심장 MRI는 심근의 염증 및 부종, 섬유화 패턴을 확인하는 데 가장 유용한 영상 검사입니다. 특히 지연 조영 증강 영상에서 심외막하벽에 우세한 조영 증강 소견은 심근염의 특징적인 소견입니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["18학번"], "professor": "정정임", "question": "심장초음파에서 종괴가 진단되어 심장 CT 를 찍은 소견이다. Interatrial septum 에서 불규칙한 종괴가 발견되었다. (30-50 HU). 진단은?", "images": [], "text_box": null, "options": ["Myxoma", "lipoma", "Angiosarcoma", "rhabdomyosarcoma", "Lymphoma"], "answer": [0], "explanation": "좌심방의 심방 중격에 발생하는 종양은 점액종일 가능성이 매우 높습니다. 점액종은 심장 내 원발성 종양 중 가장 흔하며, 좌심방에 주로 발생합니다. CT 영상에서 보이는 불규칙한 종괴의 특징과 발생 위치가 점액종의 진단에 부합합니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["18학번"], "professor": "정정임", "question": "55세 여자가 일주일전 호흡곤란이 발생하고 2시간전 어지럼증이 발생하여 응급실로 내원. 혈압 60/30 심박수 126 호흡수 22 체온 36.4 목정맥이 부풀어 있었다. 시행해야하는 검사는?", "images": [], "text_box": null, "options": ["심초음파", "심혈관조영술", "목정맥 도플러", "운동부하검사", "전기생리학 검사"], "answer": [0], "explanation": "환자는 호흡곤란, 저혈압, 빈맥, 경정맥 팽창 등의 증상을 보이며, 흉부 X-ray에서 물주머니처럼 확장된 심장 음영이 관찰됩니다. 이는 심낭삼출 및 심장 눌림증을 강력히 시사하는 소견입니다. 심낭삼출이 의심될 경우 심초음파는 가장 빠르고 정확하게 진단할 수 있는 검사입니다. 심초음파는 심낭 내 액체 저류의 양과 심장 기능에 미치는 영향을 평가하는 데 필수적입니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["17학번"], "professor": "정정임", "question": "55세 여자가 일주일 전부터 숨이 차다가 22 시간 전부터 어지러워 응급실에 왔다. 혈압은 60/30mmHg, 맥박 126 회/분, 호흡 22 회/분, 체온 26.4 도였다. 목정맥이 커져 있었고 다음은 환자의 흉부 X선 사진이다. 다음의 조치로 가장 옳은 것은?", "images": [], "text_box": null, "options": ["추적관찰", "심혈관조영술", "심낭삼출배액", "응급방사선 치료", "혈전용해제 투여"], "answer": [2], "explanation": "환자는 저혈압, 빈맥, 경정맥 팽창과 함께 흉부 X-ray에서 물주머니 모양의 심장 음영을 보입니다. 이는 심낭삼출로 인한 심장 눌림증의 전형적인 증상 및 영상 소견입니다. 심장 눌림증은 응급 상황으로, 심낭 내 압력을 줄여 심장의 기능을 회복시키기 위해 심낭삼출 배액이 가장 적절하고 시급한 치료 조치입니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["17학번"], "professor": "정정임", "question": "내원 하루전부터 흉통을 주소로 응급실에 내원한 80세 남자환자이다. 환자의 심전도에서는 T-wave inversion 이 있었으며 검사실 소견에서 troponin 과 CK-MB 가 증가되었다. 심초음파 검사에서 심박출율이 40%로 감소되어 있었고, 관동맥혈관 조영술은 정상이었다. 심장 MRI를 촬영하였고, 지연조영증강영상에서 다음과 같이 심외막하벽에 우세한 조영증강을 보였다. 가장 가능한 진단명은?", "images": [], "text_box": null, "options": ["심근염", "급성심근경색", "심장아밀로이드증", "확장성 심근병증", "비대성 심근병증"], "answer": [0], "explanation": "환자는 흉통, 심근 효소 증가, T-wave inversion, 심박출률 감소를 보이지만 관동맥 조영술이 정상으로 허혈성 심질환은 배제됩니다. 심장 MRI의 지연 조영 증강 영상에서 관상동맥 영역과 상관없이 다발성으로 심외막하벽에 우세한 조영 증강을 보이는 소견은 심근염의 특징적인 진단 소견입니다. 이는 심근의 염증과 괴사를 반영합니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["15학번"], "professor": "정정임", "question": "55세 남자가 갑자기 가슴이 아파서 병원에 왔다. 통증은 2시간 전부터 시작되었다고 한다. 통증은 가슴이 찢어지는 듯하고 지속적이며 등쪽으로 뻗치는 양상이다. 1년 전 고혈압 진단을 받았으나 혈압강하제는 복용하지 않았다고 한다. 혈압 100/80mmHg 호흡 25 회/분 체온 36.8 도이다. 가슴 청진에서 심음과 호흡음은 정상이다. 가슴컴퓨터단층촬영사진이다. 혈액검사결과는 다음과 같다. 진단은?", "images": [], "text_box": null, "options": ["폐색전증", "가슴막삼출", "심장눌림증", "대동맥박리", "말로리 바이스 증후군"], "answer": [3], "explanation": "환자는 갑작스러운 찢어지는 듯한 흉통이 등 쪽으로 방사되는 증상을 호소하며, 과거 고혈압 병력이 있습니다. 이는 대동맥 박리의 전형적인 임상 양상입니다. 제시된 흉부 CT 영상에서 하행 대동맥 내에 내막 판(flap)이 관찰되며, 이는 대동맥 박리의 진단을 확정하는 소견입니다. True lumen과 false lumen이 조영 증강된 상태로 보이는 것도 특징입니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["14학번", "13학번"], "professor": "정정임", "question": "내원 하루전부터 흉통을 주소로 응급실에 내원한 30세 남자환자이다. 환자의 심전도에서는 T-wave inversion 이 있었으며 검사실 소견에서 Troponin 과 CK-MB 가 증가되었다. 심초음파 검사에서 심박출률이 40%로 감소되어 있었고, 관동맥혈관 조영술은 정상이었다. 진단을 위해 MRI를 촬영하였고, 다음과 같이 지연조영증강 사진에서 심외막하벽에 우세한 조영증강이 보였다. 진단명은?", "images": [], "text_box": null, "options": ["심근염", "심근경색", "아밀로이드증", "비후성 심근병증", "제한성 심근병증"], "answer": [0], "explanation": "흉통, 심근 효소 상승, T-wave inversion, 심박출률 감소에도 불구하고 관동맥 혈관 조영술이 정상인 환자에서 심장 MRI 지연 조영 증강 영상에서 심외막하벽에 우세한 조영 증강이 관찰되는 것은 심근염의 특징적인 소견입니다. 이는 허혈성 심질환이 배제된 상태에서 심근의 염증성 손상을 시사합니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["14학번"], "professor": "정정임", "question": "판막질환을 앓고 있는 환자의 가슴 x-ray 사진이다. 화살표가 가리키는 곳은 무엇이 커진 것이며 진단명은?", "images": [], "text_box": null, "options": ["우심방-삼첨판 협착", "우심실-폐동맥 협착", "좌심방-승모판 협착", "좌심실-승모판 협착", "좌심실-대동맥 협착"], "answer": [2], "explanation": "흉부 X-ray 영상에서 우심장연이 이중음영을 보이고 좌심장연에서 좌심방 귀가 커진 소견은 좌심방 확장을 시사합니다. 이러한 좌심방 확장은 승모판 협착의 전형적인 소견입니다. 승모판 협착으로 인해 좌심방으로의 혈액 흐름이 방해받아 좌심방이 확장됩니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["13학번"], "professor": "정정임", "question": "40세 여자환자로 심장초음파에서 종괴가 발견되어 심장 CT 를 시행하였다. 좌심방의 격막(interatrial septum)에 종괴로 비균일한 조영증강을 보인다. (30-50HU). 환자는 이전에 특별한 과거력이 없었다. 치료로 적절한 것은?", "images": [], "text_box": null, "options": ["추적관찰", "항생제 투여", "방사선 치료", "혈전용해제 투여", "수술로 제거"], "answer": [4], "explanation": "좌심방 심방 중격에 위치한 비균일하게 조영 증강되는 종괴는 심장 점액종의 특징적인 소견입니다. 점액종은 양성 종양이지만, 혈전 발생, 색전증, 판막 기능 장애 등 심각한 합병증을 유발할 수 있습니다. 따라서 이러한 합병증을 예방하고 진단을 확정하기 위해 수술적 제거가 가장 적절한 치료 방법입니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["12학번"], "professor": "정정임", "question": "판막질환을 앓고 있는 흉부 x 선 후전 사진이다. 의심되는 판막 질환은?", "images": [], "text_box": null, "options": ["삼첨판 협착", "승모판 협착", "대동맥판 협착", "폐동맥판 협착"], "answer": [1], "explanation": "흉부 X-ray 사진에서 좌심방이 확장된 소견(double contour sign, LA appendage bulging)이 관찰됩니다. 이는 승모판 협착으로 인해 좌심방으로의 혈액 흐름이 방해받아 좌심방 압력이 증가하고 확장된 결과입니다. 따라서 의심되는 판막 질환은 승모판 협착입니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["11학번"], "professor": "정정임", "question": "심근병증이 의심되어 심장 MRI를 시행하였고 다음과 같은 영상을 얻었다. 심장의 수축기 (A)와 확장기(B) 영상에서 좌심실의 이완이 매우 저하 되어있고, 지연조영증강에서 심근의 불규칙한 조영증강 (C)이 보인다. 가장 가능성이 있는 진단은?", "images": [], "text_box": null, "options": ["심근염", "아밀로이드증", "확장성 심근병증", "비후성 심근병증"], "answer": [1], "explanation": "심장 MRI A, B 영상에서 좌심실 이완 기능이 저하되어 RV에 비해 LV의 확장 정도가 미미하며, C 영상의 지연 조영 증강에서 심근 전체에 걸쳐 얼룩덜룩하고 불규칙한 양상의 조영 증강이 관찰됩니다. 이러한 이완 기능 장애와 미만성, 불규칙한 조영 증강 패턴은 제한성 심근병증의 특징이며, 특히 아밀로이드증에서 흔히 볼 수 있는 소견입니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["11학번"], "professor": "정정임", "question": "판막질환을 앓고 있는 흉부 X선 후전 사진이다. 옳은 것은?", "images": [], "text_box": null, "options": ["우심방이 커져 있다.", "좌심방이 커져 있다.", "좌심실이 커져 있다.", "우심실이 커져 있다."], "answer": [1], "explanation": "흉부 X-ray 전후방 사진에서 우심장연에 이중음영(double contour sign)이 보이고 좌측 주기관지가 밀려 올라간 소견이 관찰됩니다. 이는 좌심방이 확장되었을 때 나타나는 전형적인 소견입니다. 특히 판막질환과 관련하여 좌심방 확장은 승모판 질환에서 흔히 관찰됩니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["10학번"], "professor": "정정임", "question": "심근병증이 의심되어 심장 MRI 를 시행하여 다음과 같은 영상을 얻었다. 심장의 수축기 (A)와 확장기 (B)영상에서 좌심실의 이완이 매우 저하되어있고, 지연조연증강에서 심근의 불규칙한 조영증강 (C)가 보인다. 가장 가능성이 있는 진단은?", "images": [], "text_box": null, "options": ["심근염", "아밀로이드증", "확장성 심근병증", "비후성 심근병증"], "answer": [1], "explanation": "심장 MRI A, B 영상에서 좌심실 이완이 매우 저하되어 심실벽 두께의 변화가 적은 제한성 심근병증 소견을 보입니다. 또한 C 영상의 지연 조영 증강에서 심실벽이 얼룩덜룩하게 미만성으로 조영 증강되는 양상은 아밀로이드증에 합당한 소견입니다. 아밀로이드증은 제한성 심근병증의 주요 원인 중 하나입니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["10학번"], "professor": "정정임", "question": "판막질환을 앓고 있는 흉부 X선 후전사진이다. 진단으로 옳은 것은?", "images": [], "text_box": null, "options": ["승모판 협착", "대동맥판 협착", "승모판 폐쇄부전", "대동맥판 폐쇄부전"], "answer": [0], "explanation": "흉부 X-ray 사진에서 좌심방 확장을 나타내는 이중음영(double contour)과 좌심방 귀의 돌출(appendage bulging) 소견이 관찰됩니다. 이는 승모판 협착으로 인해 좌심방이 지속적으로 압력을 받아 확장된 결과입니다. 승모판 협착은 좌심방 부하를 증가시켜 특징적인 심장 형태 변화를 유발합니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["09학번"], "professor": "정정임", "question": "75세 남자가 갑자기 복통이 발생하여 응급실에 왔다. 고혈압 약물 복용 중이고, 혈압 80/60 mmHg, 맥박 120 회/분이고, CT 소견은 다음과 같다. 진단은? (20 학번만 배운 내용)", "images": [], "text_box": null, "options": ["대동맥류 파열", "대동맥 박리", "대동맥 폐쇄", "대동맥염", "대동맥벽내혈종"], "answer": [0], "explanation": "환자는 갑작스러운 복통과 저혈압, 빈맥을 보이며, 이는 응급 상황을 시사합니다. CT 영상에서 복부 대동맥이 확장되어 있으며 주변 조직으로 조영제가 유출된 소견이 관찰됩니다. 이러한 임상 및 영상 소견은 복부 대동맥류 파열에 합당합니다. 대동맥 박리는 내막 판(intimal flap)이 관찰되어야 하며, 벽내혈종은 대동맥류 주변에 저음영 병변이 보여야 합니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["08학번"], "professor": "정정임", "question": "심근염(Myocarditis)에 대한 설명으로 가장 옳은 것은?", "images": [], "text_box": null, "options": ["원인으로 아밀로이드 증이 가장 흔하다.", "심실벽이 굳어 심실확장기 이상을 보인다.", "MRI 로 확장기말 심근두께를 측정하여 진단한다.", "MRI 의 조영증강은 일시적이며 추적검사에서 사라진다.", "심실, 특히 좌심실의 확장과 심실벽 수축 장애를 보인다."], "answer": [4], "explanation": "심근염은 심근의 염증으로 인해 심근 기능이 저하되는 질환입니다. 심실의 염증으로 인해 좌심실을 포함한 심실의 확장과 수축 기능 장애가 발생할 수 있습니다. 특히 바이러스성 심근염의 경우 이러한 심근 기능 저하가 흔하게 관찰됩니다. 아밀로이드증은 제한성 심근병증의 원인이며, MRI 조영 증강은 일시적이지 않고 지속될 수 있습니다."}, {"subject": "후천성 심질환의 영상 진단", "year": ["08학번"], "professor": "정정임", "question": "다음 중 대동맥판 협착의 설명으로 가장 옳은 것은?", "images": [], "text_box": null, "options": ["상행대동맥이 확장된다.", "폐부종이 흔하고 폐야에 커리(Kerley) B 선이 보인다.", "좌심방 좌심실이 모두 확장된 \"big heart\" 소견을 보인다.", "흉부 X선 후전사진에서 이중음영 (double contour)이 보인다.", "심근경색(Myocardial infarction)이나 심내막염(endocarditis)과 흔히 동반한다."], "answer": [0], "explanation": "대동맥판 협착이 발생하면 좁아진 판막을 통해 혈액이 강하게 분출되면서 상행 대동맥 벽에 높은 전단 응력을 가하게 됩니다. 이로 인해 상행 대동맥의 후확장성 확장이 발생할 수 있습니다. 폐부종과 Kerley B 선은 승모판 협착 또는 좌심실 기능 부전에서 흔하며, big heart 소견은 확장성 심근병증에서 더 흔합니다. 이중음영은 좌심방 확장 소견입니다."}, {"subject": "허혈성 심질환 침습적 검사", "year": ["21학번"], "professor": "김찬준", "question": "심혈관 조영술 중 해당 병변이 심근허혈을 유발하는지 감별하기 위하여 시행할 수 있는 침습적 검사는?", "images": [], "text_box": "60세 남자 환자가 3개월간의 누르는 양상의 흉통을 주소로 내원하였다. 통증은 무거운 것을 들 때와 계단 올라갈 때 발생하였으며 휴식 후 호전되어 아래턱 치아로 방사되는 양상을 보였다. 허혈성 심질환을 감별하기 위하여 심혈관 조영술을 시행하였으며 좌전하행동맥에서 60%의 협착 소견을 보였다.", "options": ["운동부하검사", "coronary CT angiography", "혈류분획예비력 검사", "intravascular ultrasound", "optical coherence tomography"], "answer": [2], "explanation": "협착 소견이 60%이면, 50-70% 사이의 중등도 협착 소견에 해당합니다. 수치가 애매하여 실제 시술의 적응증인지 확인이 필요할 때 혈류분획예비력(FFR) 검사를 시행하여 심근허혈 유발 여부를 판단합니다. FFR은 혈류 역학적 중요성을 평가하는 침습적 검사로, 중등도 협착 병변의 기능적 평가에 유용합니다."}, {"subject": "허혈성 심질환 침습적 검사", "year": ["19학번"], "professor": "이배영", "question": "다음은 MI 로 내원한 환자의 coronary angiography 사진이다. 좁아진 혈관은?", "images": [], "text_box": null, "options": ["Right Coronary Artery", "Left Anterior Descending Artery", "Diagonal Artery", "Posterior Descending Artery", "Left Circumflex Artery"], "answer": [0], "explanation": "제공된 관상동맥 조영술 사진에서 오른쪽 사진(img2.png)은 Right Coronary Artery(RCA)를 보여주며, 심한 협착 또는 폐색 소견이 명확하게 관찰됩니다. 좌측 사진(img1.png)은 Left Coronary Artery(LCA) 시스템을 나타내며, 상대적으로 좁아진 부분이 덜 명확합니다. 수업시간 설명에 따르면 오른쪽 사진에서 혈류가 끊긴 모습이 보인다고 언급되었습니다. 따라서 심근경색을 유발한 좁아진 혈관은 Right Coronary Artery입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["20학번"], "professor": "임상현", "question": "가벼운 신체 활동 시에도 숨이 차는 증상으로 병원에 왔다. 심장기능상실증 진단 후 처방받은 약물을 수일간 복용하자 마른 기침이 시작되었다. 이러한 증상을 유발 한 원인으로 가장 가능성이 높은 약물은?", "images": [], "text_box": "65세 남자가 가벼운 신체 활동 시에도 숨이 차는 증상으로 병원에 왔다. 심장기능상실증 진단 후 처방받은 약물을 수일간 복용하자 마른 기침이 시작되었다.", "options": ["심장수축촉진제", "고리작용이뇨제", "안지오텐신2수용체 길항제", "안지오텐신전환효소 억제제", "Beta 아드레날린 수용체 길항제"], "answer": [3], "explanation": "환자가 심장기능상실증 약물 복용 후 마른 기침을 호소하는 경우, 안지오텐신 전환효소 억제제(ACE 억제제)의 흔한 부작용으로 마른 기침이 발생할 수 있습니다. 이는 약물 사용 중단을 고려하거나 다른 계열의 약물로 변경해야 할 중요한 단서입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["20학번"], "professor": "임상현", "question": "52세 여자가 고혈압과 당뇨병으로 치료 중이다. 현재 당뇨병은 식이요법과 경구용 메트 포르민 복용중이고, 항고혈압제로 안지오텐신 전환효소억제제와 칼슘통로차단제를 사용 중이다. 진료실 혈압은 145/91mmHg, 맥박은 분당 65회였고, 가정 혈압은 5일 평균 130/78mmHg였다. 환자는 마른 기침을 호소하였다. 혈체 검사 결과는 다음과 같았다. 다음으로 취해야 할 가장 적절한 조치는?", "images": [], "text_box": "52세 여자가 고혈압과 당뇨병으로 치료 중이다. 현재 당뇨병은 식이요법과 경구용 메트 포르민 복용중이고, 항고혈압제로 안지오텐신 전환효소억제제와 칼슘통로차단제를 사용 중이다. 진료실 혈압은 145/91mmHg, 맥박은 분당 65회였고, 가정 혈압은 5일 평균 130/78mmHg였다. 환자는 마른 기침을 호소하였다. 혈액: 혈색소 14.8g/dl 혈액요소질소/크레아티닌 18/1.1mg/dl, Na+/K+ 135/4.7meq/L 총단백질알부민 7.2/4.1g/dl 포도당 110mg/dl 당화혈색소 6.6% 소변: 비중 1.011, 단백질 (+), 적혈구 0-2/고배율시야 백혈구 0~2/고배율시야 단회뇨 단백질/크레아티닌 300mg/g", "options": ["앤지오텐신수용체차단제를 추가한다.", "베타차단제를 추가한다.", "앤지오텐신 수용체차단제로 바꾼다.", "알도스테론길항제를 추가한다.", "현재 약제를 그대로 유지한다."], "answer": [2], "explanation": "환자가 안지오텐신 전환효소 억제제 복용 후 마른 기침을 호소하므로, 이는 약물의 부작용일 가능성이 높습니다. 따라서 안지오텐신 수용체 차단제(ARB)로 약물을 변경하는 것이 가장 적절한 조치입니다. ARB는 ACE 억제제와 유사한 효과를 가지면서 기침 부작용이 적습니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["19학번"], "professor": "임상현", "question": "고혈압의 병태생리 및 자연경과에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["나이가 들면 염분 민감성이 떨어진다.", "나이가 들면 맥압이 감소한다.", "음식 중 칼슘과 칼륨 섭취가 많으면 고혈압 발생이 증가한다.", "이완기 혈압의 감소는 관동맥 혈류 감소를 초래한다.", "혈압은 30세 이후 서서히 증가한다."], "answer": [3], "explanation": "나이가 들면 염분 민감성이 증가하여 고혈압에 취약해집니다. 나이가 들면서 수축기 혈압은 증가하고 이완기 혈압은 감소하여 맥압이 증가합니다. 칼륨 섭취는 나트륨 배출을 돕고 고혈압 예방에 기여합니다. 이완기 혈압 감소는 관동맥 혈류 감소를 초래하여 허혈성 심질환의 위험을 높일 수 있습니다. 혈압 상승은 10대부터 시작되어 20대에도 유병률이 높게 나타납니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["19학번"], "professor": "임상현", "question": "34세 여자가 6개월 전부터 혈압이 높아 병원에 왔다. 간혹 누웠다가 일어날 때 어지러웠고, 어지러울 때 땀이 많이 났으며 두통이 가끔 있었으며 그 순간 가슴이 두근거리며 얼굴이 화끈거렸다. 오른팔 혈압 170/106mmHg, 왼팔 혈압 168/102mmHg, 맥박수 84, 호흡수 18, 체온 36.2, BMI 23 이었다. 아래 사진은 24 시간 활동혈압 그림이다. 이 환자의 초기 검사로 적절한 것은? 평균혈압: 138/90", "images": [], "text_box": "34세 여자가 6개월 전부터 혈압이 높아 병원에 왔다. 간혹 누웠다가 일어날 때 어지러웠고, 어지러울 때 땀이 많이 났으며 두통이 가끔 있었으며 그 순간 가슴이 두근거리며 얼굴이 화끈거렸다. 오른팔 혈압 170/106mmHg, 왼팔 혈압 168/102mmHg, 맥박수 84, 호흡수 18, 체온 36.2, BMI 23 이었다. 평균혈압: 138/90", "options": ["???", "신장 핵의학검사", "24시간 소변 메타네프린", "24시간 코티졸", "혈중 알도스테론/레닌"], "answer": [2], "explanation": "34세 여자 환자의 어지러움, 땀, 두통, 가슴 두근거림, 얼굴 화끈거림 등의 증상은 교감신경 항진으로 인한 크롬친화세포종(Pheochromocytoma)을 시사합니다. 이 질환은 카테콜아민 과분비로 발생하며, 진단을 위해 24시간 소변 메타네프린 또는 VMA 검사를 시행합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["18학번"], "professor": "임상현", "question": "48세 여자가 건강검진에서 혈압이 높게 나왔다며 병원에 왔다. 간헐적으로 두통이 심하여 약국에서 진통제를 사서 먹었으나 호전되지 않았다. 혈압 165/100mmHg, 맥박 72회/분, 호흡 16회/분이다. 검사 결과는 다음과 같았다. 진단은?", "images": [], "text_box": "48세 여자가 건강검진에서 혈압이 높게 나왔다며 병원에 왔다. 간헐적으로 두통이 심하여 약국에서 진통제를 사서 먹었으나 호전되지 않았다. 혈압 165/100mmHg, 맥박 72회/분, 호흡 16회/분이다. 혈액: 혈액요소질소 18mg/DI, 크레아티닌 0.9mg/DI Na+ K+ Cl- 139/4.2/104 meq/L 갑상샘자극호르몬 1.9Miu/L (참고치, 0.34-4.25) 유리 T4 1.45ng/DI (참고치, 0.8-1.7) 알도스테론 26.3ng/DI (참고치, 4-31) 혈장레닌활성 2.5ng/ml/hr (참고치, 0.3-3.0) 1mg 야간 덱사메타손  가져온 가정혈압 결과 아침 151/91 120/89 저녁 144/94 141/89 Hb 13.0g/Dl BUN/Cr 14/0.7 Na+ K+ Ca2+ 141/4.0/101", "options": ["심초음파", "운동부하심전도", "24시간 활동혈압", "복부단층촬영", "혈중활성레닌, 알도스테론"], "answer": [2], "explanation": "환자의 진료실 혈압은 정상 범위이지만 가정 혈압은 고혈압으로 측정되어 '가면 고혈압(masked hypertension)'이 의심됩니다. 가면 고혈압은 진료실 밖에서 혈압이 높은 상태로, 확진을 위해서는 24시간 활동 혈압 측정 또는 반복적인 가정 혈압 측정이 필요합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["18학번", "14학번"], "professor": "임상현", "question": "다음은 40 세와 70세 고혈압 환자의 대동맥 압력을 측정한 그래프이다. 이와 관련된 노인성고혈압의 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["혈관의 경직도가 증가하여 이러한 변화가 초래된다.", "좌심실 비대로 인해서 위와 같은 변화가 생기게 된다.", "이완기 고혈압이 많다.", "중심동맥압이 낮은 것이 특징이다.", "수면 중 혈압이 많이 하강하는 경우가 흔하다."], "answer": [0], "explanation": "그래프는 40세에서 70세로 가면서 수축기 혈압 파형이 더 높아지고 좁아지며, 이완기 혈압은 낮아지는 경향을 보여줍니다. 이는 노화로 인해 혈관의 동맥 경직도가 증가하면서 발생하는 전형적인 변화입니다. 동맥 경직도 증가는 맥압 증가와 심혈관 합병증 위험 증가로 이어집니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["17학번"], "professor": "임상현", "question": "54세 여자가 100년전 고혈압 진단 후 치료 중 최근 혈압 조절이 잘 안되어 왔다. 최근 사지 무력감과 손발저림의 증상이 심해 160/110 mmHg 맥박은 분당 70 회, 시행한 혈액검사 결과는 아래와 같았다. 가장 먼저 시행해야 할 검사는?", "images": [], "text_box": "54세 여자가 100년전 고혈압 진단 후 치료 중 최근 혈압 조절이 잘 안되어 왔다. 최근 사지 무력감과 손발저림의 증상이 심해 160/110 mmHg 맥박은 분당 70 회, 혈액: 혈액요소질소 18 mg/dL, 크레아티닌 0.8 mg/dL, Na+/K+ 136/2.3 meq/L", "options": ["24시간 소변 메타네프린 측정", "부신겉질자극호르몬자극 검사", "저용량 덱사메타손억제 검사", "혈장 알도스테론/레닌 활성도비 검사", "24시간 단백뇨 측정"], "answer": [3], "explanation": "환자는 고혈압 치료 중 혈압 조절이 잘 안되고 사지 무력감, 손발 저림 등의 증상을 호소하며, 혈액 검사에서 Na+/K+ 비율이 136/2.3 mEq/L로 저칼륨혈증이 의심됩니다. 이는 원발성 알도스테론증(Primary aldosteronism)의 전형적인 증상 및 소견입니다. 따라서 스크리닝 검사로 혈장 알도스테론/레닌 활성도비 검사를 가장 먼저 시행해야 합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["17학번"], "professor": "임상현", "question": "48세 여자 환자가 고혈압으로 왔다. 혈압은 162/92mmHg, 맥박은 분당 80 회이었고, 신체검사에서 복부 잡음이 들려 시행한 복부 컴퓨터 촬영 소견은 아래와 같았다. 환자에게 투여하면 안 되는 약제는?", "images": [], "text_box": "48세 여자 환자가 고혈압으로 왔다. 혈압은 162/92 , "images": [], "text_box": "71세 남자가 항고혈압 치료 중 최근 혈압조절이 잘 되지 않았다. 160/95mmHg, 맥박 75회/분, 호흡 24회/분, 체온 36.6도였으며 양층 복부 청진에서 잡음이 들렸다. 혈액요소질소/크레아티닌 17/1.3 mg/dL Na/K/CI 136/4.3/105 meq/L", "options": ["앤지오텐신 수용제 차단제", "베타차단제", "티아지드계 이뇨제", "칼슘통로 차단제", "알파차단제"], "answer": [0], "explanation": "환자는 고혈압 조절이 안 되며 양측 복부에서 잡음이 들리고, ACE 억제제 또는 ARB 투여 후 혈액 크레아티닌이 1.3mg/dL에서 4.2mg/dL로 급격히 상승했습니다. 이는 양측성 신동맥 협착(bilateral renal artery stenosis)을 강력히 시사하며, 이러한 경우 레닌-안지오텐신-알도스테론 시스템(RAAS) 차단제는 신기능을 악화시키므로 금기 약제입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["14학번"], "professor": "임상현", "question": "다음 중 앉은 자세로 진료실에서 수은 혈압계로 측정한 혈압보다 높게 측정되는 경우는?", "images": [], "text_box": null, "options": ["팔을 큰 커프로 사용한 경우", "24 시간 활동 혈압 평균", "서서 혈압을 측정하는 경우", "집에서 자동 혈압계로 측정한 경우", "누워서 혈압을 측정한 경우"], "answer": [4], "explanation": "혈압 측정 시 올바른 자세는 앉아서 팔을 심장 높이에 두고 측정하는 것입니다. 누워서 측정할 경우 혈액이 중력의 영향을 덜 받아 심장으로 돌아오는 양이 많아져 혈압이 더 높게 측정될 수 있습니다. 커프 사이즈가 작으면 혈압이 과대평가될 수 있고, 가정 혈압이나 24시간 활동 혈압은 진료실 혈압보다 낮게 측정되는 경향이 있습니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["14학번"], "professor": "임상현", "question": "48세 남자환자가 2년전 고혈압 진단을 받았으나 약물치료는 안하고 지냈다. 아버지는 56세 때 뇌출혈로 사망하였다. 키 172cm, 몸무게 88kg, 혈압은 168/98 mmHg이었다. 신체진찰에는 이상소견은 없었다. 검사 결과는 다음과 같다. 진단은?", "images": [], "text_box": "48세 남자환자가 2년전 고혈압 진단을 받았으나 약물치료는 안하고 지냈다. 아버지는 56세 때 뇌출혈로 사망하였다. 키 172cm, 몸무게 88kg, 혈압은 168/98 mmHg이었다. 신체진찰에는 이상소견은 없었다. 혈액: 혈액요소질소/크레아티닌 18/0.9 mg/dL, Na/K/Cl 138/4.7/103 meg/L 소변: 단백뇨 (+-)", "options": ["본태성 고혈압 (primary hypertension)", "신혈관성 고혈압 (renovascular hypertension)", "크롬친화세포종 (pheochromocytoma)", "일차성 알도스테론증 (primary aldosteronism)", "쿠싱증후군 (cushing syndrome)"], "answer": [0], "explanation": "환자는 48세로 고혈압 유병 기간이 있으며, 과체중이고 가족력이 있습니다. 특이적인 이차성 고혈압을 시사하는 증상(예: 두통, 저칼륨혈증, 복부 잡음)이나 뚜렷한 검사 이상 소견이 없어 가장 흔한 유형인 본태성 고혈압으로 판단됩니다. 소변 단백뇨(+-)는 약양성으로 이차성 고혈압을 강하게 시사하기 어렵습니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["14학번"], "professor": "임상현", "question": "25세 여자가 내원하여 시행한 혈압은 156/98mmHg, 맥박은 분당 86 회였다. 고혈압 및 심혈관계 과거력이나 가족력은 없었다. 아래 그림은 우측 신혈관 조영술 소견이다 (좌측 신혈관은 정상 소견임). 적절한 조치는?", "images": [], "text_box": "25세 여자가 내원하여 시행한 혈압은 156/98mmHg, 맥박은 분당 86 회였다. 고혈압 및 심혈관계 과거력이나 가족력은 없었다. (좌측 신혈관은 정상 소견임).", "options": ["증상이 없으므로 약물치료 없이 경과 관찰한다.", "스텐트 시술을 시행한다.", "스피로놀락톤 (spironolactone)을 투약한다.", "경피적 풍선성형술을 시행한다.", "우측 신장절제술을 시행한다."], "answer": [3], "explanation": "환자는 젊은 나이에 고혈압과 신혈관 조영술에서 우측 신동맥 협착을 보이며, 이는 섬유근 이형성증(fibromuscular dysplasia)에 의한 신혈관성 고혈압일 가능성이 높습니다. 섬유근 이형성증에 의한 단측성 신동맥 협착의 일차 치료는 경피적 풍선 성형술(balloon angioplasty)입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["14학번"], "professor": "임상현", "question": "다음은 고혈압의 발생기전에 관한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["고혈압 환자의 대부분은 혈압을 올리는 특정한 기저질환이 있다.", "염분섭취가 증가하면 초기에는 말초저항이 증가하고 이후 심박출량이 증가한다.", "아드레날린성 반사작용은 장기간의 혈압조절에 주로 작용한다.", "동맥경직도가 증가하면 그로인해 맥압이 증가한다.", "알도스테론은 혈관을 직접 수축시켜 혈압을 상승시킨다."], "answer": [3], "explanation": "고혈압 환자의 대부분은 특정한 기저질환이 없는 본태성 고혈압이며, 이차성 고혈압은 소수입니다. 염분 과다 섭취는 초기 심박출량 증가 후 말초저항 증가로 이어집니다. 아드레날린성 반사작용은 단기간 혈압 조절에 주로 관여합니다. 나이가 들면 동맥 경직도가 증가하여 맥압이 증가합니다. 알도스테론은 주로 나트륨 재흡수를 촉진하여 혈압을 상승시킵니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["14학번"], "professor": "임상현", "question": "29 세 여자가 내원하여 시행한 혈압은 160/100mmHg, 맥박은 분당 78 회였다. 고혈압 및 심혈관계 과거력이나 가족력은 없었다. 아래 그림은 우측 신혈관 조영술 소견이고 좌측 신혈관 조영술은 정상이다. 다음 설명으로 옳은 것은?", "images": [], "text_box": "29 세 여자가 내원하여 시행한 혈압은 160/100mmHg, 맥박은 분당 78 회였다. 고혈압 및 심혈관계 과거력이나 가족력은 없었다. (좌측 신혈관 조영술은 정상이다).", "options": ["가장 흔한 신혈관성 고혈압의 형태이다.", "가장 효과적인 치료 방법은 경피적 풍선성형술이다.", "레닌, 알도스테론이 감소하여 고혈압을 유발한다.", "안지오텐신 전환효소 억제제는 금기 약제이다.", "증상이 없으므로 약물치료 없이 경과 관찰한다."], "answer": [1], "explanation": "제시된 영상은 젊은 여성에서 고혈압의 원인인 섬유근 이형성증에 의한 신동맥 협착을 보여줍니다. 이러한 경우 가장 효과적인 치료 방법은 경피적 풍선 성형술입니다. 신동맥 협착으로 레닌-안지오텐신-알도스테론 시스템이 활성화되어 레닌과 알도스테론이 증가하며, 단측성 신동맥 협착 시 안지오텐신 전환효소 억제제는 금기 약제가 아닙니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["14학번"], "professor": "임상현", "question": "다음 고혈압의 병태생리 기전과 관련된 설명 중 가장 적절한 것은?", "images": [], "text_box": null, "options": ["고박출(high-output) 고혈압은 교감신경 활성의 증가에 의하여 발생할 수 있다.", "노인에서 발생하는 고혈압의 가장 흔한 기전은 혈관저항의 증가이다.", "신장동맥 협착증에 의한 고혈압의 기전은 혈중 angiotensin II 농도의 증가와 관련된다.", "신경내분비계의 기능이상에 의한 고혈압의 원인에는 갈색세포종(pheochromocytoma), primary aldosteronism, hyperthyroidism 등이 포함된다.", "모두 해당"], "answer": [4], "explanation": "고박출 고혈압은 교감신경 활성 증가와 관련될 수 있습니다. 노인 고혈압에서는 혈관 저항 증가와 동맥 경직도 증가가 주요 기전입니다. 신장동맥 협착증은 레닌-안지오텐신-알도스테론 시스템을 활성화하여 안지오텐신 II 농도를 증가시킵니다. 갈색세포종, 원발성 알도스테론증, 갑상선기능항진증 등은 신경내분비계 이상에 의한 이차성 고혈압의 원인에 해당합니다. 따라서 제시된 모든 설명이 고혈압의 병태생리 기전과 관련하여 적절합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["14학번", "13학번"], "professor": "임상현", "question": "62세 남자가 항고혈압제로 안지오텐신 전황효소 억제제를 처방 받은 후 전신쇄약으로 내원하여 측정한 혈청 크레아티닌이 1.1mg/dL에서 3.5mg/dL로 상승하였다. 이 환자에서 동반된 질환으로 가장 가능성이 높은 질환은?", "images": [], "text_box": "62세 남자가 항고혈압제로 안지오텐신 전황효소 억제제를 처방 받은 후 전신쇄약으로 내원하여 측정한 혈청 크레아티닌이 1.1mg/dL에서 3.5mg/dL로 상승하였다.", "options": ["막성사구체 신염", "양측성 신동맥 협착", "당뇨병성 산증", "갑상선 기능저하증", "쿠싱증후군"], "answer": [1], "explanation": "안지오텐신 전환효소 억제제(ACE 억제제) 복용 후 혈청 크레아티닌 수치가 30% 이상 급격히 상승하는 경우, 양측성 신동맥 협착(bilateral renal artery stenosis)을 강력히 의심해야 합니다. ACE 억제제는 양측성 신동맥 협착 환자에서 사구체 여과율을 크게 저하시켜 급성 신부전을 유발할 수 있으므로 금기입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["13학번"], "professor": "임상현", "question": "57세 여자가 10년 전 고혈압 진단 후 치료 중 혈압 조절 되지 않았으며, 사지무력감, 손발 저림을 호소하였다. 혈압은 160/110mmHg, 맥박수 65회/분, 호흡수 26회/분, 체온은 36.5 였다. BUN/Cr 13/1.0mg/dL, Na/K 143/2.3 mEq/L 환자 고혈압의 원인을 진단하기 위해 가장 먼저 시행해야 할 검사는?", "images": [], "text_box": "57세 여자가 10년 전 고혈압 진단 후 치료 중 혈압 조절 되지 않았으며, 사지무력감, 손발 저림을 호소하였다. 혈압은 160/110mmHg, 맥박수 65회/분, 호흡수 26회/분, 체온은 36.5 였다. BUN/Cr 13/1.0mg/dL, Na/K 143/2.3 mEq/L", "options": ["혈중 알도스테론/레닌 할성도비", "24시간 소변 메타네프린", "24시간 소변 코티졸 측정", "신동맥 조영술", "복부 초음파"], "answer": [0], "explanation": "환자는 고혈압 조절이 안 되며 사지 무력감, 손발 저림 증상을 보이고, Na+/K+ 비율이 143/2.3 mEq/L로 저칼륨혈증이 시사됩니다. 이는 원발성 알도스테론증(Primary aldosteronism)의 전형적인 임상 양상입니다. 이 질환을 진단하기 위한 가장 적절한 스크리닝 검사는 혈장 알도스테론/레닌 활성도비 측정입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["13학번"], "professor": "임상현", "question": "다음 중 앉은 자세로 수은혈압계로 측정한 혈압보다 높게 측정되는 경우는?", "images": [], "text_box": null, "options": ["빠르게 감압하는 경우", "누워서 측정하는 경우", "큰 커프를 사용한 경우", "집에서 자동혈압계로 측정한 경우", "서서 측정하는 경우"], "answer": [1], "explanation": "혈압은 자세에 따라 다르게 측정될 수 있습니다. 누워서 혈압을 측정하면 서거나 앉아서 측정할 때보다 혈액이 심장으로 돌아오는 양이 많아져 혈압이 더 높게 측정되는 경향이 있습니다. 커프 사이즈가 너무 크면 혈압이 낮게 측정될 수 있으며, 가정 혈압은 진료실 혈압보다 낮은 경향을 보입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["13학번"], "professor": "임상현", "question": "68세 여자가 정형외과에서 측정한 혈압이 높아서 왔다. 퇴행성 관절염으로 간혈적 정형외과 치료를 받는 것 외에 비교적 건강하게 지냈으며, 외래에서 측정한 혈압은 165/95 mmHg, 맥박은 75 회였다. 다음은 24 시간 활동혈압검사 소견이다. 가장 의심되는 진단은?", "images": [], "text_box": "68세 여자가 정형외과에서 측정한 혈압이 높아서 왔다. 퇴행성 관절염으로 간혈적 정형외과 치료를 받는 것 외에 비교적 건강하게 지냈으며, 외래에서 측정한 혈압은 165/95 mmHg, 맥박은 75 회였다. 24시간 평균혈압: 128/75mmHg 낮 평균혈압: 133/83mmHg 밤 평균혈압: 123/70mmHg", "options": ["수축기 고혈압", "가면고혈압", "백의 고혈압", "Dipper", "이완기 고혈압"], "answer": [2], "explanation": "환자의 진료실 혈압은 고혈압이지만, 24시간 활동 혈압 평균은 128/75mmHg로 정상 범위에 속합니다. 이처럼 진료실 환경에서만 혈압이 높게 측정되고 일상생활 혈압은 정상인 경우를 '백의 고혈압(white coat hypertension)'이라고 합니다. 백의 고혈압은 약물 치료가 필요하지 않은 경우가 많으며, 지속적인 관찰이 중요합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["13학번"], "professor": "임상현", "question": "Angiotensin II 는 혈압을 상승시키는데 핵심적인 역할을 하는 호르몬이다. Angiotensin II 의 작용에 대한 설명으로 옳은것은?", "images": [], "text_box": null, "options": ["혈관의 Angiotensin II receptor 1 에 결합하여 혈관 이완 유발", "신장의 Angiotensin II receptor 1 에 결합하여 나트륨 재흡수 촉진", "심장의 Angiotensin II receptor 2 에 결합하여 심박출량 감소", "부신의 Angiotensin II receptor2 에 결합하여 알도스테론의 분비 촉진", "Angiotensin II 가 혈압을 올리는 일련의 과정은 대부분 Angiotensin II receptor 2 와의 결합을 통해 일어난다."], "answer": [1], "explanation": "안지오텐신 II는 주로 안지오텐신 II 수용체 1(AT1 수용체)에 결합하여 다양한 혈압 상승 작용을 일으킵니다. AT1 수용체에 결합 시 혈관 수축, 신장에서 나트륨 재흡수 촉진, 알도스테론 분비 촉진, 심비대 유발 등을 통해 혈압을 상승시킵니다. AT2 수용체는 혈관 이완 및 세포 성장 억제 등 상반된 역할을 하는 것으로 알려져 있습니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["12학번"], "professor": "임상현", "question": "45세 여자가 간헐적인 두통을 동반한 안면홍조로 내원하였다. 내원 당시 혈압은 122/78 mmHg, 맥박은 분당 80회였다. 아래 그림은 24시간 활동혈압 결과다. 이 환자에게 다음으로 시행해야할 검사는?", "images": [], "text_box": "45세 여자가 간헐적인 두통을 동반한 안면홍조로 내원하였다. 내원 당시 혈압은 122/78 mmHg, 맥박은 분당 80회였다. 주간평균혈압 138/92mmHg (화살표: 두통 호소시점)", "options": ["혈중 알도스테론/레닌 활성도 비", "24시간 소변 메타네프린", "24시간 소변 코티졸 측정", "복부초음파", "심장초음파"], "answer": [1], "explanation": "환자의 간헐적인 두통, 안면홍조(flushing) 및 혈압 변동성은 카테콜아민 과분비를 특징으로 하는 크롬친화세포종(Pheochromocytoma)을 시사합니다. 이 질환을 진단하기 위한 가장 적절한 검사는 24시간 소변 메타네프린 및 노르메타네프린 측정입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["12학번"], "professor": "임상현", "question": "고혈압 환자에서 renin-angiotensin-aldosterone 계가 활성화되어 있음을 시사하는 혈액 검사실 소견은?", "images": [], "text_box": null, "options": ["BUN 상승", "칼륨 감소", "크레아타닌 상승", "칼슘 감소", "나트륨 상승"], "answer": [1], "explanation": "레닌-안지오텐신-알도스테론(RAAS) 계가 활성화되면 알도스테론 분비가 증가합니다. 알도스테론은 신장에서 나트륨 재흡수를 촉진하고 칼륨 배설을 증가시키므로, 혈중 칼륨 감소(저칼륨혈증)가 나타날 수 있습니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["12학번"], "professor": "임상현", "question": "23세 여자가 베타차단제, 칼슘차단제, 이뇨제 병용투여에도 혈압이 160/100mmHg이하로 조절되지 않아 전원되었다. 복부에서 복부혈관음이 청진되었고, 24시간 생활혈압 측정 결과 밤낮의 혈압 차이가 심하였다. 내원시 혈액검사에서 Creatinine 0.9mg/dl, 단백뇨(-), Na 138/2.6mEq/L이고 혈압 조절을 위해서 안지오텐신 전환효소 억제제 추가 후 Creatinine은 2.1mg/dl로 상승을 하였다. 다음 중 이차성 고혈압을 시사하는 소견이 아닌 것은?", "images": [], "text_box": "23세 여자가 베타차단제, 칼슘차단제, 이뇨제 병용투여에도 혈압이 160/100mmHg이하로 조절되지 않아 전원되었다. 복부에서 복부혈관음이 청진되었고, 24시간 생활혈압 측정 결과 밤낮의 혈압 차이가 심하였다. 내원시 혈액검사에서 Creatinine 0.9mg/dl, 단백뇨(-), Na 138/2.6mEq/L이고 혈압 조절을 위해서 안지오텐신 전환효소 억제제 추가 후 Creatinine은 2.1mg/dl로 상승을 하였다.", "options": ["23세 고혈압", "베타차단제, 칼슘차단제, 이뇨제 병용투여에도 혈압이 160/100mmHg이하로 조절되지 않음", "내원시 Creatinine 0.9mg/dl, 단백뇨(-)", "내원시 전해질 검사 Na 138/2.6mEq/L", "안지오텐신 전환효소억제제 추가 후 Creatinine 상승"], "answer": [2], "explanation": "이차성 고혈압을 의심하는 소견으로는 젊은 나이에 발생한 고혈압, 저항성 고혈압, 혈중 칼륨 감소, 복부 잡음, ACE 억제제 투여 후 크레아티닌 상승 등이 있습니다. 내원 시 크레아티닌 0.9mg/dL 및 단백뇨(-)는 신장 기능이 정상 범위임을 나타내므로 표적 장기 손상이 없음을 시사하며, 이는 이차성 고혈압을 직접적으로 시사하는 소견은 아닙니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["12학번"], "professor": "임상현", "question": "56세 고혈압 가족력이 없는 여자가 고혈압 평가 위해 내원하였다. 혈압은 162/108mmHg, 맥박은 72회였다. 아래는 혈액검사와 복부 CT검사결과이다. 적절한 치료는?", "images": [], "text_box": "56세 고혈압 가족력이 없는 여자가 고혈압 평가 위해 내원하였다. 혈압은 162/108mmHg, 맥박은 72회였다. 혈액(오전 8시): Na+ 137meq/L, K+ 4.2 meq/L 부신겉질자극호르몬 13pg/ml(참고치, 6-76) 코티솔 17ug/dl (참고치, 5-25) 알도스테론 40ng/dL (참고치, 4-31) 레닌활성 0.6 ng/ml/ 시간 (참고치, 0.3~3.0) 24시간 소변: 메타네프린 75 ug(참고치, 30~350)", "options": ["부신절제술", "페녹시벤자민", "앤지오텐신수용체 차단제", "스텐트시술", "알도스테론 길항제"], "answer": [4], "explanation": "혈액 검사에서 알도스테론 수치(40ng/dL)는 높고 레닌 활성(0.6ng/ml/시간)은 낮아 알도스테론-레닌 비율(ARR)이 증가되어 있습니다. 이는 원발성 알도스테론증을 시사합니다. 복부 CT에서 양측성 부신 과형성(bilateral adrenal hyperplasia)이 의심되는 소견이 관찰되므로, 이 경우 수술적 치료보다는 알도스테론 길항제(예: 스피로놀락톤)를 투여하는 것이 적절한 치료입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["12학번"], "professor": "임상현", "question": "72세 여자 환자가 정형외과에서 측정한 혈압이 높아 내원하였다. 퇴행성 관절염으로 간헐적 정형외과 치료를 받는 것 외에 비교적 건강하게 지내며, 단지 골다공증약만 복용 중이다. 외래 내원하여 측정한 혈압은 200/90mmHg, 맥박은 75회였다. 정형외과에서 시행한 기본적인 혈액 검사와 흉부 사진 및 심전도는 정상이 었다. 이 환자에 대한 가장 적절한 조치는?", "images": [], "text_box": "72세 여자 환자가 정형외과에서 측정한 혈압이 높아 내원하였다. 퇴행성 관절염으로 간헐적 정형외과 치료를 받는 것 외에 비교적 건강하게 지내며, 단지 골다공증약만 복용 중이다. 외래 내원하여 측정한 혈압은 200/90mmHg, 맥박은 75회였다. 정형외과에서 시행한 기본적인 혈액 검사와 흉부 사진 및 심전도는 정상이 었다.", "options": ["바로 응급실로 보내 정주형 항고혈압제를 투약하게 한다.", "골다공증을 고려해 티아지드 이뇨제를 먼저 처방한다.", "고혈압 확진을 위해 2주 후 진료실 혈압을 다시 측정한다.", "활동혈압을 측정하게 한다.", "2 기 이상의 고혈압으로 앤지오텐신수용체 차단제와 칼슘통로 차단제 병용요법을 시행한다."], "answer": [3], "explanation": "환자의 진료실 혈압은 매우 높지만, 다른 검사 소견은 정상이며, 정형외과에서 측정한 혈압이 높아 내원한 점은 '백의 고혈압' 또는 '가면 고혈압'의 가능성을 시사합니다. 혈압은 진료실 상황에 따라 변동성이 크므로, 고혈압을 정확히 진단하고 평가하기 위해 24시간 활동 혈압 측정이나 가정 혈압 측정을 통해 반복적으로 확인해야 합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["12학번"], "professor": "임상현", "question": "연령에 따른 혈압상승의 기전에 대하여 옳은 것은?", "images": [], "text_box": null, "options": ["노인의 혈압상승은 심박출량의 증가가 원인인 경우가 많다.", "중년의 혈압상승은 심박출량의 증가가 원인인 경우가 많다.", "젊은이 혈압상승은 심박출량의 증가가 원인인 경우가 많다.", "노인의 수축기 혈압 상승이 두드러지는 이유는 심박출량의 증가가 원인인 경우가 많다.", "중년의 이완기 혈압 상승이 두드러지는 이유는 심박출량의 증가가 원인이 경우가 많다."], "answer": [2], "explanation": "젊은 연령에서는 심박출량 증가가 혈압 상승의 주요 기전인 경우가 많습니다. 반면 나이가 들수록 동맥 경직도가 증가하고 말초 혈관 저항이 높아져 혈압이 상승하며, 특히 노인에서는 수축기 혈압 상승과 맥압 증가가 두드러지게 나타납니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["12학번"], "professor": "임상현", "question": "다음은 혈관의 미세 구조이다. 기능 이상이 발생할 경우, 고혈압을 유발하는데 중요한 역할을 하는 것으로 알려진 것은?", "images": [], "text_box": null, "options": ["endothelium", "lamina propria", "tunica media", "tunica adventitia", "internal elastic lamina"], "answer": [0], "explanation": "혈관 내피세포(endothelium)는 혈관 이완 물질(예: 산화질소, NO)과 수축 물질을 분비하여 혈관 긴장도를 조절하는 중요한 기능을 합니다. 내피세포 기능 이상은 혈관 수축 물질 분비 증가 및 혈관 이완 물질 분비 감소로 이어져 혈관 저항을 높이고 고혈압을 유발할 수 있습니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["12학번"], "professor": "임상현", "question": "57세 남자가 최근 사지무력감, 손발 저림으로 왔다. 고혈압의 가족력이나 기왕력은 없다. 혈압은 160/110 mmHg, 맥박수 65회/분, 호흡수는 26 회/분 체온은 36.5°c 였다. 가장 가능성 높은 진단은? 혈액검사: BUN/Cr 13/1.0 mg/dL, Na/K 143/2.3 mEq/L", "images": [], "text_box": "57세 남자가 최근 사지무력감, 손발 저림으로 왔다. 고혈압의 가족력이나 기왕력은 없다. 혈압은 160/110 mmHg, 맥박수 65회/분, 호흡수는 26 회/분 체온은 36.5°c 였다. 혈액검사: BUN/Cr 13/1.0 mg/dL, Na/K 143/2.3 mEq/L", "options": ["본태성 고혈압", "크롬친화세포종", "쿠싱증후군", "신혈관성 고혈압", "일차성 알도스테론 혈증"], "answer": [4], "explanation": "환자는 고혈압과 함께 사지 무력감, 손발 저림을 호소하며, 혈액 검사에서 Na+/K+ 비율이 143/2.3 mEq/L로 저칼륨혈증이 시사됩니다. 이러한 증상과 저칼륨혈증을 동반한 고혈압은 원발성 알도스테론증(Primary aldosteronism)의 전형적인 임상 양상입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["11학번"], "professor": "임상현", "question": "64세 남자가 갑작스런 혈압 상승으로 왔다. BP 160/95, PR55, RR24, Temp. 36.6℃였으며, 복부 청진에서 잡음이 들렸다. 혈액 검사, 신동맥 조영술이다. 항고혈압제 투약 후 시행한 혈액 크레아티닌이 4.2mg/dL로 상승하였다. 다음 중 투약한 항고혈압제 중 가장 가능성이 높은 약제는?", "images": [], "text_box": "64세 남자가 갑작스런 혈압 상승으로 왔다. BP 160/95, PR55, RR24, Temp. 36.6℃였으며, 복부 청진에서 잡음이 들렸다. 혈액 검사, 신동맥 조영술이다. 항고혈압제 투약 후 시행한 혈액 크레아티닌이 4.2mg/dL로 상승하였다.", "options": ["베타차단제", "알파차단제", "칼슘차단제", "직접혈관 확장제", "안지오텐신 전환효소 억제제"], "answer": [4], "explanation": "제시된 신동맥 조영술은 양측성 신동맥 협착(bilateral renal artery stenosis)을 보여줍니다. 이러한 환자에게 안지오텐신 전환효소 억제제(ACE 억제제)를 투여하면 신장 사구체 여과율이 급격히 감소하여 혈청 크레아티닌이 상승하고 급성 신부전이 발생할 수 있으므로, ACE 억제제가 가장 가능성이 높은 약제입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["11학번"], "professor": "임상현", "question": "75세 남자가 혈압조절이 되지 않아 내원하였다. 진료실 혈압은 162/94 mmHg이었고, 현재 로자탄 50 mg, 암로디핀 5 mg, 그리고 티아자이드 이뇨제 25mg을 복용 중이었다. 외래에서 시행한 24시간 활동혈압이 평균은 128/78 mmHg, 주간 평균 혈압 134/83 mmHg, 저녁 평균 혈압 120/70 mmHg이었다. 향후 처치는?", "images": [], "text_box": "75세 남자가 혈압조절이 되지 않아 내원하였다. 진료실 혈압은 162/94 mmHg이었고, 현재 로자탄 50 mg, 암로디핀 5 mg, 그리고 티아자이드 이뇨제 25mg을 복용 중이었다. 외래에서 시행한 24시간 활동혈압이 평균은 128/78 mmHg, 주간 평균 혈압 134/83 mmHg, 저녁 평균 혈압 120/70 mmHg이었다.", "options": ["로자탄 증량", "암로디핀 증량", "현재 용량 유지", "베타차단제 추가", "로자탄을 다른 안지오텐신 수용체 차단제로 대체"], "answer": [2], "explanation": "환자의 진료실 혈압은 높지만, 24시간 활동 혈압 평균은 128/78 mmHg로 정상 범위에 해당합니다. 이는 진료실 환경에서만 혈압이 높게 측정되는 '백의 효과'로 판단할 수 있습니다. 따라서 현재 복용 중인 항고혈압제 용량을 그대로 유지하고 혈압을 지속적으로 모니터링하는 것이 적절합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["11학번"], "professor": "임상현", "question": "50세 여자가 1개월 전 병원에서 측정한 혈압이 160/110 mmHg이었고 맥박은 88회/분. 이번 내원 시 측정한 혈압은 150/100 mmHg, 맥박은90회/분 이었다. 24시간 활동 혈압을 측정하였다. (그림). 그 외 검사실 소견은 정상이었다. 이 환자에 대한 적절한 조치는?", "images": [], "text_box": "50세 여자가 1개월 전 병원에서 측정한 혈압이 160/110 mmHg이었고 맥박은 88회/분. 이번 내원 시 측정한 혈압은 150/100 mmHg, 맥박은90회/분 이었다. 24시간 평균혈압: 127/78mmHg 그 외 검사실 소견은 정상이었다.", "options": ["맥박이 빨라 베타차단제를 처방한다.", "매년 정기적으로 혈압검사를 할 것을 권고한다", "이뇨제가 도움이 된다.", "안지오텐신전환효소 억제제가 도움이 된다", "혈관 확장제가 도움이 된다."], "answer": [1], "explanation": "환자의 진료실 혈압은 높지만, 24시간 활동 혈압 평균은 127/78mmHg로 정상 범위에 속합니다. 이는 '백의 고혈압'으로 판단될 수 있으며, 약물 치료가 필요하지 않을 수 있습니다. 따라서 매년 정기적으로 혈압을 확인하며 경과를 관찰하는 것이 적절합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["11학번"], "professor": "임상현", "question": "70세 할머니가 우연히 발견된 높은 혈압으로 내원하였다. 1달 전 동네 약국에서 잰 혈압이 높아 개인의원 찾았더니 당시 잰 혈압이 160/100mmHg 나왔고 보다 확실한 진단 위해 내 원하였다. 가까운 가족 중에 고혈압으로 치료나 진단 받은 분은 없었고 내원하여 2분 간격으로 측정한 평균혈압이 158/98 mmHg 이었다. 이 환자에 대한 적절한 조치는?", "images": [], "text_box": "70세 할머니가 우연히 발견된 높은 혈압으로 내원하였다. 1달 전 동네 약국에서 잰 혈압이 높아 개인의원 찾았더니 당시 잰 혈압이 160/100mmHg 나왔고 보다 확실한 진단 위해 내 원하였다. 가까운 가족 중에 고혈압으로 치료나 진단 받은 분은 없었고 내원하여 2분 간격으로 측정한 평균혈압이 158/98 mmHg 이었다.", "options": ["비약물요법 실시", "1년 후 추적관찰", "즉시 2가지 항고혈압제 투약", "이차성 고혈압 원인 조사", "노인임으로 치료대상이 아님"], "answer": [3], "explanation": "70세 고령 환자에서 최근에 발견된 고혈압이고 가족력이 없다는 점은 이차성 고혈압의 가능성을 시사합니다. 특히 높은 혈압 수치를 보이고 있으므로, 이차성 고혈압의 원인을 확인하기 위한 정밀 검사가 필요합니다. 이를 통해 원인을 제거하거나 특수 치료를 고려할 수 있습니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["11학번"], "professor": "임상현", "question": "54세 당뇨병을 가진 남성이 150/95mmHg로 높은 혈압 이 유지되어 안지오텐신 전환효소 억제제를 처방받은 후 4주 후 측정한 혈청 Cr 수치가 1.9에서 4.2mg/dL로 높아졌다. 이 환자에서 동반된 질환으로 가장 가능성 있는 것은?", "images": [], "text_box": "54세 당뇨병을 가진 남성이 150/95mmHg로 높은 혈압 이 유지되어 안지오텐신 전환효소 억제제를 처방받은 후 4주 후 측정한 혈청 Cr 수치가 1.9에서 4.2mg/dL로 높아졌다.", "options": ["막성 사구체 신염", "저레닌성 저알도스테론혈증", "양측성 신동맥 협착", "갑상선 저하증", "쿠싱 증후군"], "answer": [2], "explanation": "안지오텐신 전환효소 억제제(ACE 억제제) 복용 후 혈청 크레아티닌 수치가 1.9mg/dL에서 4.2mg/dL로 급격히 상승한 것은 양측성 신동맥 협착(bilateral renal artery stenosis)을 강력히 시사합니다. ACE 억제제는 양측성 신동맥 협착 환자에서 신기능을 악화시키므로 금기 약제입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["11학번"], "professor": "임상현", "question": "다음 중 올바른 진료실 혈압 측정 방법은?", "images": [], "text_box": null, "options": ["수축기압은 처음 Korotkoff sound 가 2 회 이상 연속으로 들릴 때 혈압이다.", "위, 아래 팔을 자연스럽게 떨어뜨린 후 혈압을 측정한다.", "빠른 속도로 커프 압력을 올리고, 박동당 5mmHg의 속도로 빨리 감압한다.", "처음에는 양팔에서 혈압을 측정한 뒤, 혈압 수치가 더 낮은 팔을 추후 측정한다.", "커프가 작은 경우 실제 혈압보다 낮게 측정된다."], "answer": [0], "explanation": "수축기 혈압은 코로트코프음이 2회 이상 연속으로 들리기 시작하는 시점입니다. 혈압 측정 시 팔은 심장 높이에 위치해야 하며, 커프 감압 속도는 박동당 2mmHg 이내로 천천히 하는 것이 좋습니다. 처음 측정 시 양팔 모두 측정하고 높은 쪽 팔을 기준으로 추후 측정합니다. 커프가 작은 경우 혈압이 실제보다 높게 측정됩니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["10학번"], "professor": "임상현", "question": "43세 남자가 건강 검진 상 혈압이 높다 하여 병원에 내원 하였다. 병원에 내원하여 측정한 혈압이 165/100 이었고 24 시간 전 혈압 측정을 한 결과, 평균 혈압이 133/84이고 야간 평균 혈압이 119/74였다. 현재 환자의 상태는 어떠한 것인가?", "images": [], "text_box": "43세 남자가 건강 검진 상 혈압이 높다 하여 병원에 내원 하였다. 병원에 내원하여 측정한 혈압이 165/100 이었고 24 시간 전 혈압 측정을 한 결과, 평균 혈압이 133/84이고 야간 평균 혈압이 119/74였다.", "options": ["기립성 저혈압", "백의 고혈압", "가면 고혈압", "수축기 고혈압", "Non-dipper"], "answer": [1], "explanation": "환자의 진료실 혈압은 165/100 mmHg로 고혈압이지만, 24시간 활동 혈압 평균은 133/84 mmHg로 정상 범위에 해당합니다. 이는 진료실 환경에서만 혈압이 높게 측정되는 '백의 고혈압(white coat hypertension)'의 전형적인 양상입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["10학번"], "professor": "임상현", "question": "다음 고혈압에 관한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["혈압은 30세가 지나고 나서야 서서히 증가한다.", "수축기 혈압은 55세까지 증가하는 추세를 보이다 이후 감소한다.", "맥압이 넓어지는 양상을 보인다.", "음식 중 칼슘과 칼륨의 섭취가 많을수록 고혈압 발생이 증가한다.", "수축기 혈압이 관동맥 혈류와 밀접한 관련이 있다."], "answer": [2], "explanation": "혈압은 10세 때부터 서서히 증가하며, 55세 이후에는 확장기 혈압이 감소하고 수축기 혈압은 증가하여 맥압이 넓어지는 양상을 보입니다. 음식 중 염분 섭취가 많을수록, 칼슘이나 칼륨 섭취가 적을수록 고혈압 발생이 증가합니다. 관동맥 혈류는 주로 이완기 혈압과 밀접한 관련이 있습니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["10학번"], "professor": "임상현", "question": "28세 여자가 갑작스런 혈압 상승으로 내원하였다. 평소 간헐적 마비 증상이 있었던 환자로, 검사를 위해 시행한 복부 전산화 단층촬영 상 아래와 같은 소견을 보였다. 이 환자에서 이차성 고혈압 진단을 위한 가장 좋은 선별 검사는?", "images": [], "text_box": "28세 여자가 갑작스런 혈압 상승으로 내원하였다. 평소 간헐적 마비 증상이 있었던 환자로, 검사를 위해 시행한 복부 전산화 단층촬영 상 아래와 같은 소견을 보였다.", "options": ["혈중 나트륨", "혈중 칼륨", "공복혈당", "혈색소", "총 콜레스테롤"], "answer": [1], "explanation": "복부 CT 영상에서 부신에 덩이가 관찰되며, 환자는 갑작스런 혈압 상승과 간헐적 마비 증상을 보였습니다. 이는 원발성 알도스테론증(Primary aldosteronism)을 의심하게 하는 소견입니다. 원발성 알도스테론증 환자에서는 알도스테론의 과분비로 인해 나트륨 재흡수가 증가하고 칼륨 배설이 증가하여 저칼륨혈증이 흔히 동반됩니다. 따라서 혈중 칼륨 수치 측정이 가장 좋은 선별 검사입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["09학번"], "professor": "임상현", "question": "고혈압의 병태생리 기전이 아닌 것은?", "images": [], "text_box": null, "options": ["심박출량 증가", "저항혈관 내경 증가", "교감신경계 활성화", "레닌-안지오텐신계 활성화", "혈관 내 용적 증가"], "answer": [1], "explanation": "심박출량 증가, 교감신경계 활성화, 레닌-안지오텐신계 활성화, 혈관 내 용적 증가(과혈량증)는 모두 혈압을 상승시키는 기전입니다. 반면 저항혈관의 내경이 증가하면 혈관 저항이 감소하여 혈압이 낮아지므로, 이는 혈압 상승의 병태생리 기전이 아닙니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["09학번"], "professor": "임상현", "question": "2차성 고혈압을 의심해야 하는 경우는?", "images": [], "text_box": null, "options": ["고혈압 가족력", "콩팥 기능 정상", "70세에 처음 진단된 고혈압", "이뇨제 단독 요법으로 혈압 조절이 잘 됨", "수축기 심잡음"], "answer": [2], "explanation": "2차성 고혈압은 특정 원인 질환에 의해 발생하는 고혈압으로, 일반적인 본태성 고혈압과 다른 특징을 보입니다. 25세 미만 또는 50세 이후에 새로 발생한 고혈압, 갑작스러운 혈압 상승, 기존 고혈압의 악화, 저항성 고혈압, 특정 증상(예: 저칼륨혈증, 복부 잡음) 등이 이차성 고혈압을 의심하는 주요 상황입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["09학번"], "professor": "임상현", "question": "45세 여자가 건강검진에서 혈압이 높다고 들고 왔다. 진료실에서 측정한 혈압은 160/98 mmHg였으나 집에서 자동혈압계로 측정한 혈압은 126/76 mmHg였다. 다음에 시행하여야 할 조치는?", "images": [], "text_box": "45세 여자가 건강검진에서 혈압이 높다고 들고 왔다. 진료실에서 측정한 혈압은 160/98 mmHg였으나 집에서 자동혈압계로 측정한 혈압은 126/76 mmHg였다.", "options": ["24시간 심전도", "운동부하 검사", "24시간 활동혈압 측정", "심초음파", "혈압약 처방"], "answer": [2], "explanation": "진료실 혈압은 높지만 가정 혈압은 정상인 경우, '백의 고혈압(white coat hypertension)'을 의심할 수 있습니다. 백의 고혈압은 약물 치료 없이 경과 관찰하는 경우가 많으므로, 정확한 진단을 위해 24시간 활동 혈압 측정을 통해 혈압 패턴을 다시 한번 확인하는 것이 필요합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["09학번"], "professor": "임상현", "question": "다음 병태생리 기전에 의학 고혈압과 해당 치료제의 연결이 적절하지 않은 것은?", "images": [], "text_box": null, "options": ["심박출량의 일차적인 증가: ẞ-아드레날린성 수용체 길항제", "전신혈관저항의 증가: a1-아드레날린성 수요에 길항제", "신장 실질 질환(renal parenchymal disease) -angiotensin 전환효소 억제제", "양측성 신장 동맥 협착증 - angiotensin 수용체 차단제", "해당 없음"], "answer": [3], "explanation": "양측성 신동맥 협착증 환자에게 안지오텐신 수용체 차단제(ARB)나 안지오텐신 전환효소 억제제(ACE 억제제)를 투여하면 신장 혈류 감소로 인해 사구체 여과율이 급격히 저하되어 급성 신부전이 발생할 수 있습니다. 따라서 양측성 신동맥 협착증에서 RAAS 차단제는 절대적 금기입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["09학번"], "professor": "임상현", "question": "20세 남자 환자가 병무청 신체검사에서 고혈압으로 판정 받고 내원하였다. 가족 중 고혈압이 있는 사람은 없었다. BMI 22 kg/m2, 혈압은 160/100 mmHg, 맥박수 78회/분, 복부잡음은 없었고 기타 이학적 검사에서 특이소견은 없었다. 혈액 검사에서 BUN/Cr = 20/1.0 mg/dL, Na/K =142/2.5 mEq/L 이었다. 이 환자에서 가장 가능성 높은 진단은?", "images": [], "text_box": "20세 남자 환자가 병무청 신체검사에서 고혈압으로 판정 받고 내원하였다. 가족 중 고혈압이 있는 사람은 없었다. BMI 22 kg/m2, 혈압은 160/100 mmHg, 맥박수 78회/분, 복부잡음은 없었고 기타 이학적 검사에서 특이소견은 없었다. 혈액 검사에서 BUN/Cr = 20/1.0 mg/dL, Na/K =142/2.5 mEq/L 이었다.", "options": ["본태성 고혈압", "만성신부전", "원발성 알도스테론혈증", "쿠싱증후군", "갈색세포종"], "answer": [2], "explanation": "20세 젊은 나이에 고혈압이 진단되었고, 혈액 검사에서 Na+/K+ 비율이 142/2.5 mEq/L로 저칼륨혈증이 시사됩니다. 젊은 연령의 고혈압과 저칼륨혈증의 조합은 원발성 알도스테론증(Primary aldosteronism)을 강력히 의심하게 하는 소견입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["08학번"], "professor": "임상현", "question": "55세 여자 환자에게 1개월전 항고혈압제를 추가하였더니 마른기침이 심하여 잠을 잘 수가 없어 서 내원하였다. 환자 혈압은 135/85 mmHg, 맥박은 60회였다. 이 환자에서 추가로 처방한 고혈압 제와 새롭게 처방할 약제로 적 합한 조합은?", "images": [], "text_box": "55세 여자 환자에게 1개월전 항고혈압제를 추가하였더니 마른기침이 심하여 잠을 잘 수가 없어 서 내원하였다. 환자 혈압은 135/85 mmHg, 맥박은 60회였다.", "options": ["안지오텐신 전환효소 억제제 / 안지오텐신 수용체 차단제", "이뇨제 / 혈관확장제", "베타차단제 / 알파차단제", "안지오텐신 전환효소 억제제 / 칼슘채널 차단제", "칼슘채널 차단제 / 이뇨제"], "answer": [0], "explanation": "환자가 항고혈압제 추가 후 마른 기침이 심해졌다는 것은 추가된 약물이 안지오텐신 전환효소 억제제(ACE 억제제)일 가능성이 높습니다. ACE 억제제로 인한 기침 부작용이 심한 경우, 동일한 레닌-안지오텐신-알도스테론 시스템(RAAS)을 억제하지만 기침 부작용이 적은 안지오텐신 수용체 차단제(ARB)로 변경하는 것이 적절합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["08학번"], "professor": "임상현", "question": "55세 남자 환자가 고혈압의 진단 및 치료를 위해 내원하였다. 1개월 전 감기로 동네병원 방문하 여 측정한 혈압 은 170/110 mmHg이었고, 금번 내원 시 측정한 혈압은 145/100 mmHg이었다. 그 러나 최근 몇 차례 근처 약국에서 측정한 혈압은 정상이라고 하였다. 이 환자에서 취해야 할 적 절한 다음 조치는?", "images": [], "text_box": "55세 남자 환자가 고혈압의 진단 및 치료를 위해 내원하였다. 1개월 전 감기로 동네병원 방문하 여 측정한 혈압 은 170/110 mmHg이었고, 금번 내원 시 측정한 혈압은 145/100 mmHg이었다. 그 러나 최근 몇 차례 근처 약국에서 측정한 혈압은 정상이라고 하였다.", "options": ["혈중 레닌/알도스테론 비를 측정 후 계산한다.", "복부 초음파를 시행한다.", "24시간 소변 코티졸을 측정한다.", "24시간 활동혈압을 측정한다.", "즉각적인 항고혈압제를 투여한다."], "answer": [3], "explanation": "환자의 진료실 혈압은 높지만, 약국에서 측정한 혈압은 정상이었다는 점은 '백의 고혈압'을 시사합니다. 백의 고혈압을 확진하고 환자의 실제 혈압 패턴을 파악하기 위해서는 24시간 활동 혈압 측정이나 가정 혈압 측정을 통해 진료실 밖에서의 혈압을 확인하는 것이 필요합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["08학번"], "professor": "임상현", "question": "내원해서 혈압은 170/110 mmHg이었고 청진상 수포음이 들렸으며 심잡음은 없었다. 하지만 복부 청진상 잡음이 들렸다. 다음은 콩팥혈관 조영술 사진이다. 이 환자의 치료로 먼저 고려할 수 있는 것은?", "images": [], "text_box": "내원해서 혈압은 170/110 mmHg이었고 청진상 수포음이 들렸으며 심잡음은 없었다. 하지만 복부 청진상 잡음이 들렸다.", "options": ["콩팥절제술", "부신절제술", "콩팥이식", "경피적 혈관성형술 및 스텐트 삽입술", "관찰"], "answer": [3], "explanation": "환자는 고혈압과 복부 잡음을 보였으며, 신혈관 조영술에서 신동맥 협착이 관찰됩니다. 이는 신혈관성 고혈압을 시사하며, 특히 젊은 연령의 섬유근 이형성증에 의한 협착인 경우 경피적 풍선 성형술 및 스텐트 삽입술이 효과적인 치료법입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["08학번"], "professor": "임상현", "question": "50세 여자 환자가 혈압이 이상하다고 내원하였다. 1개월 전 병원에서 측정한 혈압은 160/110mmHg이었고, 이번 내원 시 측정한 혈압은 150/100 mmHg이었다. 그러나 집이나 근처 약국에서 측정한 혈압은 정상이라고 하였다. 이 환자에서 취해야 할 적절한 다음 조치는?", "images": [], "text_box": "50세 여자 환자가 혈압이 이상하다고 내원하였다. 1개월 전 병원에서 측정한 혈압은 160/110mmHg이었고, 이번 내원 시 측정한 혈압은 150/100 mmHg이었다. 그러나 집이나 근처 약국에서 측정한 혈압은 정상이라고 하였다.", "options": ["즉각적인 항고혈압제 처방을 한다.", "복부 CT를 시행한다.", "혈중 알도스테론을 측정한다.", "24시간 소변 코티졸을 측정한다.", "24시간 활동혈압을 측정한다."], "answer": [4], "explanation": "환자의 진료실 혈압은 높지만 가정이나 약국에서 측정한 혈압은 정상이었다는 점은 '백의 고혈압'을 강력히 시사합니다. 백의 고혈압을 정확히 진단하고 실제 혈압 변동성을 평가하기 위해 24시간 활동 혈압 측정을 시행하는 것이 가장 적절한 조치입니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["07학번"], "professor": "임상현", "question": "기관지 천식을 앓고 있는 65세 남자 환자에서 1개월 전 항고혈압제를 추가하였더니 마른 기침이 심하여 잠을 잘 수가 없어서 내원하였다. 이 환자에서 처방한 고혈압제와 새롭게 처방할 약제로 적합한 조합은?", "images": [], "text_box": "기관지 천식을 앓고 있는 65세 남자 환자에서 1개월 전 항고혈압제를 추가하였더니 마른 기침이 심하여 잠을 잘 수가 없어서 내원하였다.", "options": ["안지오텐신 전환 효소 억제제 / 베타차단제", "이뇨제 / 혈관확장제", "베타차단제 / 칼슘채널 차단제", "안지오텐신 전환 효소 억제제 / 칼슘채널 차단제", "칼슘채널 차단제 / 이뇨제"], "answer": [3], "explanation": "환자가 항고혈압제 추가 후 마른 기침이 심해졌으므로 추가된 약물은 안지오텐신 전환효소 억제제(ACE 억제제)일 가능성이 높습니다. ACE 억제제로 인한 기침이 심할 경우 안지오텐신 수용체 차단제(ARB)로 변경하는 것이 일반적입니다. 또한, 환자가 기관지 천식을 앓고 있으므로 베타차단제는 금기 약물입니다. 따라서 ACE 억제제를 중단하고 칼슘채널 차단제와 같은 다른 계열의 약물로 변경하는 것이 적절합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["07학번"], "professor": "임상현", "question": "이차성 고혈압의 가장 흔한 원인은?", "images": [], "text_box": null, "options": ["Primary aldosteronism", "pheochromocytoma", "renal parenchymal disease", "hyperthyroidism", "cushing syndrome"], "answer": [2], "explanation": "이차성 고혈압의 가장 흔한 원인은 신장 실질 질환(renal parenchymal disease)입니다. 만성 신장 질환 환자의 약 80~85%에서 고혈압이 발생하며, 이는 신장 기능 이상으로 인한 레닌-안지오텐신-알도스테론 시스템의 활성화 및 체액량 증가와 관련됩니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["07학번"], "professor": "임상현", "question": "고혈압의 병태생리기전에 관한 다음 설명 중 가장 적절한 것은?", "images": [], "text_box": null, "options": ["전신혈관저항의 증가가 없는 심박출량의 일차적인 증가에 의한 고혈압은 주로 노인에서 나타난다.", "전신혈관저항의 증가에 의한 고혈압의 병인은 주로 내피세포의 손상이나 기능이상과 관련이 크다.", "신장동맥협착증에 의한 고혈압환자에서는 혈중 angiotensin2 가 증가되어있다.", "신경내분비계의 이상에 의한 고혈압의 원인에는 pheochromocytoma , primary aldosteronism , hypothyroidism 등이 포함된다", "해당없음"], "answer": [3], "explanation": "젊은이에서는 심박출량 증가가, 노인에서는 전신 혈관 저항 증가가 고혈압의 주요 기전입니다. 전신 혈관 저항 증가의 병인은 내피세포 기능 이상과 관련이 깊습니다. 신장동맥 협착증은 레닌-안지오텐신-알도스테론 시스템 활성화로 혈중 안지오텐신 II를 증가시킵니다. 갈색세포종, 원발성 알도스테론증, 갑상선기능항진증 등은 신경내분비계 이상에 의한 이차성 고혈압의 원인에 해당합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["06학번"], "professor": "임상현", "question": "혈압측정 할 때의 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["압력을 20-30mmHg 높은 곳에서부터 측정 시작한다.", "누워서 측정한다", "담배 커피는 영향이 없다", "복구안됨", "진료실에서 측정하는 것이 24 시간 측정보다 정확하다"], "answer": [0], "explanation": "혈압 측정 시 예상되는 수축기 혈압보다 20~30mmHg 높게 커프를 가압한 후, 박동당 2mmHg 속도로 천천히 감압하면서 코로트코프음을 청진해야 합니다. 누워서 측정하면 혈압이 더 높게 측정될 수 있고, 흡연이나 커피 섭취는 혈압에 영향을 미칩니다. 24시간 활동 혈압 측정은 진료실 혈압 측정보다 실제 생활에서의 혈압을 더 정확하게 반영합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["06학번"], "professor": "임상현", "question": "이차성 고혈압 중 가장 흔한 원인은?", "images": [], "text_box": null, "options": ["primary aldosteronism", "pheochromocytoma", "renal hypertension", "renin producing tumor", "Cushing's syndrome"], "answer": [2], "explanation": "이차성 고혈압의 가장 흔한 원인은 신장 관련 질환입니다. 특히 신장 실질 질환(renal parenchymal disease)에 의한 신성 고혈압이 전체 이차성 고혈압의 대부분을 차지합니다."}, {"subject": "고혈압 병태생리, 임상증상, 진단, 치료(1)", "year": ["06학번"], "professor": "임상현", "question": "혈압의 측정 중 올바른 사항은?", "images": [], "text_box": null, "options": ["예상되는 수축기 혈압보다 20~30mmHg 높은 압력에서 혈압측정을 시작한다", "청진기의 bell을 cuff 안에 넣어서 혈압 측정한다", "혈압 측정 중 섭취한 담배와 커피는 검사 결과에 영향을 미치지 않는다", "가정혈압 측정을 통해 밤의 고혈압을 확인할 수 있다", "24시간 혈압측정기계를 이용한 혈압보다 진료실에서 측정한 혈압이 예후 예측에 더 좋다"], "answer": [0], "explanation": "혈압 측정 시 예상되는 수축기 혈압보다 20~30mmHg 높게 커프 압력을 올린 후 측정하는 것이 정확합니다. 청진기의 다이어프램을 사용하고, 측정 전 담배나 커피 섭취는 혈압을 상승시킬 수 있습니다. 가정혈압 측정은 밤의 혈압을 확인하는 데 도움이 되며, 24시간 활동 혈압 측정이 진료실 혈압보다 예후 예측에 더 유용합니다."}, {"subject": "심전도의 이해", "year": ["21학번", "20학번"], "professor": "오용석", "question": "다음 심전도의 진단과 그와 같은 상태가 올 수 있는 경우는?", "images": [], "text_box": null, "options": ["Right axis deviation, 우심실 비대, left ant. Fascicular block", "Right axis deviation, 좌심실 비대, left ant. Fascicular block", "Left axis deviation, 좌심실 비대, left ant. Fascicular block", "Left axis deviation, 좌심실 비대, left post. Fascicular block", "Left axis deviation, 우심실 비대, left post. Fascicular block"], "answer": [2], "explanation": "심전도에서 Lead I은 positive이고 aVF는 negative이므로 Left Axis Deviation(LAD)입니다. 이는 좌심실 비대와 관련이 있습니다. aVF가 negative로 나타나는 경우, 전기신호가 왼쪽 위를 향하는 left anterior fascicular block을 시사합니다. 따라서 좌심실 비대와 left anterior fascicular block이 동반된 진단이 가장 적합합니다."}, {"subject": "심전도의 이해", "year": ["20학번", "18학번", "17학번"], "professor": "오용석", "question": "심방과 심실 사이의 연결부(AV Junction)의 흥분 전도가 차단된 환자에서 동맥 맥박이 분당 40회로 박동하고 있다. 그 이유로 생각되는 가장 적당한 점은?", "images": [], "text_box": null, "options": ["심방의 흥분이 bypass tract을 통해 심실을 흥분시켰다.", "심실 내 Purkinje fiber가 박동 조율기로 작동했다.", "심실근의 이소성 세포가 동방결절처럼 흥분했다.", "심실근 세포가 자동능이 있는 세포로 전환되었다.", "심장을 지배하는 자율신경의 규칙적인 활성에 의해 심실근세포가 흥분했다."], "answer": [1], "explanation": "AV junction의 전도 차단으로 맥박이 40회로 느리다면, 심실에서 전기 신호를 만들고 있다는 의미입니다. 이는 ventricle에서 escape rhythm이 나타나는 경우입니다. 특히, AV 차단 시 심실의 escape rhythm은 심실 내 Purkinje fiber가 박동 조율기로 작동하여 발생합니다. 이소성 초점은 병적이고 불규칙한 조기흥분을 의미하며, 자율신경은 심박수를 조절하지만 직접 박동을 생성하지 않습니다."}, {"subject": "심전도의 이해", "year": ["20학번"], "professor": "오용석", "question": "대략적 분당 맥박수는?", "images": [], "text_box": "어지러움과 간헐적 실신을 보이는 72세 남자의 심전도이다.", "options": ["60-70회/분", "50-60회/분", "40-50회/분", "30-40회/분", "20-30회/분"], "answer": [2], "explanation": "제공된 심전도에서 10초 구간 안에 R파가 대략 7번 나타납니다. 1분은 10초의 6배이므로, 분당 맥박수는 7회/10초 * 6 = 42회/분입니다. 따라서 40-50회/분에 해당합니다."}, {"subject": "심전도의 이해", "year": ["20학번"], "professor": "오용석", "question": "다음 ECG의 V1 ~V4 lead에서 보이는 T wave inversion의 기전은?", "images": [], "text_box": null, "options": ["재분극시 K+ 유출이 내막에서 외막으로 이루어진다.", "재분극시 K+ 유출이 외막에서 내막으로 이루어진다.", "재분극시 Na+ 유입이 내막에서 외막으로 이루어진다.", "재분극시 Na+ 유입이 외막에서 내막으로 이루어진다.", "재분극시 Ca2+ 유입이 외막에서 내막으로 이루어진다."], "answer": [0], "explanation": "심실 재분극의 방향은 T파의 형태에 영향을 미칩니다. 정상적으로는 재분극이 심외막에서 심내막으로 진행되어 T파가 양성 편향을 보입니다. 그러나 T파 역전은 재분극이 심내막에서 심외막 방향으로 진행될 때 발생합니다. 재분극은 주로 포타슘(K+) 이온의 세포 외 유출에 의해 일어나므로, K+ 유출이 심내막에서 심외막으로 진행될 때 T파 역전이 관찰됩니다."}, {"subject": "심전도의 이해", "year": ["20학번"], "professor": "오용석", "question": "다음 ECG의 심박수를 계산하시오.", "images": [], "text_box": null, "options": ["20-25", "25-30", "30-35", "35-40", "40-45"], "answer": [2], "explanation": "제공된 심전도 이미지에서 10초 구간 안에 대략 5개의 QRS 복합체가 관찰됩니다. 1분은 60초이므로, 분당 심박수는 10초 동안의 QRS 수를 6배하여 계산할 수 있습니다. 따라서 5회/10초 * 6 = 30회/분으로, 이는 30-35회/분 범위에 해당합니다."}, {"subject": "심전도의 이해", "year": ["19학번"], "professor": "오용석", "question": "다음 심전도에서 보이는 V2~V6까지 보이는 T파의 모양의 원리는?", "images": [], "text_box": null, "options": ["재분극 때 소디움(Na+) 이온의 심근에서 방출이 심근 내막에서 외막 쪽으로 진행한다.", "재분극 때 칼슘 이온의 심근에서 방출이 심근 내막에서 외막 쪽으로 진행한다.", "재분극 때 포타슘(K+) 이온의 심근에서 방출이 심근 내막에서 외막 쪽으로 진행한다.", "재분극 때 포타슘(K+) 이온의 심근에서 방출이 심근 외막에서 내막 쪽으로 진행한다.", "재분극 때 소디움(Na+) 이온의 심근에서 방출이 심근 외막에서 내막 쪽으로 진행한다."], "answer": [2], "explanation": "심전도에서 T파는 심실의 재분극을 나타냅니다. 정상 T파는 업라이트(upright)이며, 이는 재분극이 심장 바깥쪽(심외막)에서 안쪽(심내막)으로 진행하기 때문입니다. 제시된 심전도에서 T파가 역전(inverted)되어 있는 것은 재분극 방향이 반대로, 즉 심장 안쪽(심내막)에서 바깥쪽(심외막)으로 진행됨을 의미합니다. 재분극은 주로 포타슘(K+) 이온의 유출에 의해 발생하므로, T파 역전은 K+ 이온의 유출이 심근 내막에서 외막 쪽으로 진행될 때 나타날 수 있습니다."}, {"subject": "심전도의 이해", "year": ["19학번"], "professor": "오용석", "question": "심전도에서 P파와 QRS파를 만드는 전기의 원리는?", "images": [], "text_box": null, "options": ["심근 탈분극시 세포 안으로 소디움(Na+)이 들어간 심근과 아직 들어가지 않은 심근 사이에서 발생하는 전위차이다.", "심근의 재분극에서 중요한 역할을 하는 포타슘(K+)이온이 심근세포에서 나온 심근과 아직 나오지 않은 심근 사이에서 발생하는 전위차이다.", "탈분극 때 세포안으로 들어간 소디움(Na+) 이온과 심근세포 밖에 있던 포타슘 (K+) 이온을 교환하는 Na+-k+ pump가 활성화되면서 이온의 이동으로 발생하는 전위차이다.", "심근 수축시 심근으로 들어간 칼슘이온을 소디움(Na+)이온과 교환하며 밖으로 배출시 이미 배출된 심근과 아직 안된 심근 사이의 전위차이다.", "심장근육이 수축할 때 필요한 칼슘이온이 심근세포로 들어간 심근과 아직 들어가지 않은 심근 사이에서 발생하는 전위차이다."], "answer": [0], "explanation": "P파는 심방의 탈분극을, QRS파는 심실의 탈분극을 나타냅니다. 탈분극은 활동 전위의 상승기(phase 0) 동안 Na+ 이온이 세포 내로 유입되면서 시작됩니다. 이 Na+ 유입으로 인해 세포 내부가 양전하를 띠게 되고, 인접한 아직 탈분극되지 않은 세포와의 전위차가 발생하여 전기 신호가 전파됩니다. 따라서 P파와 QRS파는 심근 세포 내로 소디움 이온이 유입될 때 발생하는 전위차에 의해 생성됩니다."}, {"subject": "심전도의 이해", "year": ["19학번"], "professor": "오용석", "question": "다음 심전도에서 P-QRS 파를 만드는 기전에 대해 올바른 것은?", "images": [], "text_box": null, "options": ["근수축에 필요한 Ca2+이온이 안으로 들어온 세포와 아닌 세포간의 전위차", "재분극 시 심근세포 밖으로 K+가 나간 세포와 아닌 세포간의 전위차", "Na+/K+ 펌프의 작동으로 인한 이온의 이동", "Na+/Ca2+ 펌프의 작동으로 인해 Ca2+이온이 들어온 세포와 아닌 세포간의 전위차", "탈분극 시 심근세포 안으로 Na+가 들어온 세포와 아닌 세포간의 전위차"], "answer": [4], "explanation": "P파와 QRS파는 심방과 심실의 탈분극 과정에서 생성되는 전기적 파형입니다. 탈분극은 Na+ 이온이 심근세포 안으로 빠르게 유입되면서 시작됩니다. 이 과정에서 먼저 Na+가 유입되어 양전하를 띠는 세포와 아직 Na+가 유입되지 않아 음전하를 띠는 인접 세포 사이에 전위차가 발생합니다. 이 전위차에 의해 전류가 흐르게 되며, 이것이 심전도에 P파와 QRS파로 기록됩니다."}, {"subject": "심전도의 이해", "year": ["18학번"], "professor": "오용석", "question": "다음 심전도에서 나타나는 심박수는?", "images": [], "text_box": null, "options": ["분당 75회", "분당 70회", "분당 65회", "분당 60회", "분당 55회"], "answer": [3], "explanation": "제공된 심전도에서 QRS 복합체 간의 간격(R-R interval)이 큰 눈금 5칸으로 일정하게 반복됩니다. 표준 심전도 기록 속도(25mm/s)에서 큰 눈금 한 칸은 0.2초입니다. 따라서 R-R 간격은 5칸 * 0.2초/칸 = 1초입니다. 분당 심박수는 60초 / 1초 = 60회/분입니다. 또는 300 / R-R 간격 큰 칸 수 (300/5 = 60회)로 계산할 수 있습니다."}, {"subject": "심전도의 이해", "year": ["17학번"], "professor": "노태호", "question": "LVH에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["V1 유도에서 tall R을 보인다.", "V2 유도에서 rSr' 모양을 보인다.", "V6 유도에서 tall R을 보인다.", "Electrical axis는 -30도를 나타낸다.", "심내막 → 심외막 전도에 시간이 더 걸려 QRS는 120msec 이상이다."], "answer": [2], "explanation": "좌심실 비대(LVH) 시에는 좌심실의 전기적 활동이 증가하여, 좌측 유도(V5, V6, I, aVL)에서 R파가 커지고, 우측 유도(V1, V2)에서 S파가 깊어집니다. 특히 V6 유도에서 tall R파가 나타나는 것은 LVH의 특징적인 소견 중 하나입니다. LVH는 또한 좌축 편향(Left Axis Deviation, -30도보다 작은 각도)을 유발할 수 있지만, 옵션 4의 -30도 자체는 정상 범위에 포함될 수 있습니다."}, {"subject": "심전도의 이해", "year": ["17학번"], "professor": "노태호", "question": "이 심전도에서 electrical Axis는?", "images": [], "text_box": null, "options": ["+0도", "+60도", "+90도", "-30도", "이 심전도 유도만으로 측정이 불가능하다."], "answer": [1], "explanation": "사지유도 심전도에서 QRS 전기축을 결정하기 위해서는 Lead I, II, III의 QRS 복합체를 분석합니다. Lead I이 양성이고 Lead aVF도 양성이면 정상 축입니다. 이 심전도에서 Lead II의 QRS 복합체가 가장 높은 양성 편향을 보이므로, 전기축은 Lead II 방향인 +60도에 가장 가깝습니다. 이는 정상 심장 전기축 범위에 해당합니다."}, {"subject": "심전도의 이해", "year": ["16학번", "13학번", "12학번"], "professor": "노태호", "question": "심전도 사지유도 기록 도중 왼발의 전극이 떨어졌다. 6개의 사지유도 중 어느 유도가 나타날까?", "images": [], "text_box": null, "options": ["1", "aVF", "aVR, AVL", "II, III", "II"], "answer": [0], "explanation": "심전도 사지유도는 팔다리에 부착된 전극 간의 전위차를 측정합니다. 왼쪽 발(LF) 전극이 떨어질 경우, Lead II (RA-LF), Lead III (LA-LF), 그리고 aVF (LF를 포함한 단극 유도)가 직접적으로 영향을 받아 정확한 신호를 얻기 어렵습니다. Lead I (RA-LA)은 왼쪽 발 전극과 직접적인 연결이 없으므로, 영향을 덜 받거나 정상적으로 나타날 수 있습니다."}, {"subject": "심전도의 이해", "year": ["14학번"], "professor": "노태호", "question": "표준 사지유도(limb lead) 중 정상인에서 P 및 QRS 파가 모두 negative deflection을 보이는 lead는?", "images": [], "text_box": null, "options": ["lead I", "lead II", "lead III", "lead aVR", "lead aVL"], "answer": [3], "explanation": "정상 심장에서 심방과 심실의 탈분극은 일반적으로 왼쪽 아래 방향으로 진행됩니다. Lead aVR은 이 평균 전기축의 반대 방향인 오른쪽 위(약 -150도)를 향하고 있습니다. 따라서 정상 심전도에서 Lead aVR은 P파, QRS 복합체(주로 깊은 S파), 그리고 T파가 모두 음성 편향(negative deflection)을 보이는 것이 특징입니다."}, {"subject": "심전도의 이해", "year": ["14학번", "09학번", "08학번", "06학번"], "professor": "노태호", "question": "Einthoven 삼각형에서 lead2 는(A)와 (B) 사이의 bipolar lead 이며(A)가 positive, (B)가 negative 이다. (A)와 (B)에 해당하는 것은?", "images": [], "text_box": null, "options": ["RA(right arm)\nLA (left arm)", "LA\nRA", "RA\nLF", "LF\nRA", "LF\nLA"], "answer": [3], "explanation": "아인토벤 삼각형에서 양극성 사지유도(bipolar limb leads)는 특정 전극 간의 전위차를 측정합니다. Lead II는 오른팔(RA)을 음극(-)으로, 왼발(LF)을 양극(+)으로 연결하여 측정됩니다. 따라서 Lead II가 (A)와 (B) 사이의 양극성 유도이고 (A)가 양극, (B)가 음극이라면, (A)는 왼발(LF), (B)는 오른팔(RA)에 해당합니다."}, {"subject": "심전도의 이해", "year": ["14학번"], "professor": "노태호", "question": "60세 남자로 혈압 180/110mmHg를 보이는 환자의 심전도이다. 아래의 심전도에서 합당한 기술은?", "images": [], "text_box": "60세 남자로 혈압 180/110mmHg를 보이는 환자의 심전도이다.", "options": ["I유도와 aVF 유도에서 판단할 때 RAD의 소견을 보인다.", "V5에서 QRS voltage가 정상보다 크니 LVH를 의심한다.", "V1에서 토끼귀 모양을 보이는데 토끼의 왼쪽 귀가 더 크니 RBBB의 소견이다.", "QT가 400ms이상으로 길어져 있다.", "V4,5,6에서 ST-T의 하강이 보이니 심근허혈 소견이다"], "answer": [1], "explanation": "제시된 심전도에서 Lead I은 양성, aVF는 음성이므로 좌축 편향(Left Axis Deviation, LAD)을 보입니다. LAD와 함께 V5에서 QRS 전압이 증가하는 것은 좌심실 비대(LVH)의 소견을 시사합니다. 높은 혈압 또한 LVH의 위험 요인입니다. V1의 토끼귀 모양은 RBBB에서 나타날 수 있지만, V1의 R파가 V2보다 작으므로 RBBB는 아닙니다. QT 간격이나 ST-T 하강 여부는 추가적인 분석이 필요합니다."}, {"subject": "심전도의 이해", "year": ["14학번"], "professor": "노태호", "question": "다음의 사지 유도 심전도에서 합당한 기술은?", "images": [], "text_box": null, "options": ["심실박동수는 분 당 50회이다.", "P파의 폭이 150ms로 좌심방 확장의 소견을 보인다.", "P파의 키가 II유도에서 2mm로 우심방 확장의 소식을 보인다.", "QRS axis는 60도로 정상 소견을 보인다.", "QT간격은 400 ms로 심실 재분극기가 길어져 있다"], "answer": [3], "explanation": "심전도 이미지에서 QRS 복합체 간의 간격을 측정하면 약 5칸마다 반복됩니다. 이는 분당 심박수가 60회임을 의미하며, 이는 정상 범위입니다. Lead I과 aVF에서 QRS 복합체가 모두 양성이며, Lead II에서 가장 높은 R파를 보이므로 QRS 전기축은 약 +60도로 정상 범위에 속합니다. P파의 폭이나 키에 대한 정확한 측정 없이는 심방 확장을 단정하기 어렵습니다. QT 간격 역시 400ms는 정상 범위에 속합니다."}, {"subject": "심전도의 이해", "year": ["14학번"], "professor": "노태호", "question": "50세의 old MI 환자가 가슴이 두근거리며 어지러워 ER을 찾았다. 환자의 사지 유도 심전도이다. 합당한 소견은?", "images": [], "text_box": "50세의 old MI 환자가 가슴이 두근거리며 어지러워 ER을 찾았다.", "options": ["심박수는 분당 100회 정도로 빈맥이다.", "QRS 폭은 100ms 로 정상보다 넓다.", "LeadI 에서 QRS는 upright 이다.", "QRS axis 는 no man's land 를 향해 심실이 전도방향이 좌하에서 우상방향이다.", "전형적인 PSVT 소견이다."], "answer": [3], "explanation": "제시된 심전도에서 Lead I은 음성, aVF도 음성 QRS를 보이므로 QRS 전기축은 extreme axis deviation(northwest axis)에 해당합니다. 이는 심실의 전기적 전도 방향이 좌하에서 우상으로 향함을 의미합니다. 또한, 넓은 QRS 복합체와 빠른 심박수는 심실성 빈맥을 시사합니다. QRS 폭이 100ms 이상으로 넓고 심박수가 빠르며, 극심한 축 편향이 있으므로 PSVT(상심실성 빈맥) 소견과는 다릅니다."}, {"subject": "심전도의 이해", "year": ["14학번"], "professor": "노태호", "question": "정상 sinus rhythm인 경우 electrical activity가 sinus node 주변 atrium에 가장 먼저 도달한 시점은 다음 중 어디에 해당할 가능성이 가장 큰가?", "images": [], "text_box": null, "options": ["P wave 시작 이전", "P wave 시작 시점", "P wave peak 시점", "P wave 종료 시점", "QRS시작 시점"], "answer": [1], "explanation": "심장의 전기적 활동은 동방결절(sinus node)에서 시작됩니다. 이 활동은 심방을 통해 전파되며, 심전도 상에서 P파는 심방의 탈분극을 나타냅니다. 따라서 동방결절 주변 심방 세포에 전기적 활동이 가장 먼저 도달하는 시점은 심방 탈분극이 시작되는 시점, 즉 P파 시작 시점에 해당합니다. P파는 심방 전체의 탈분극 과정을 반영합니다."}, {"subject": "심전도의 이해", "year": ["14학번"], "professor": "오용석", "question": "환자의 심전도는 분당 130 회의 wide QRS 빈맥을 보였고 심전도의 축은 I 과 aVF 모두 deep S wave를 보였다. 심전도를 분석하면?", "images": [], "text_box": "34 세 남자가 6 시간 전부터 가슴 두근거림을 호소하며 응급실에 들어왔다.", "options": ["심실 중격 결손의 상심실성 빈맥", "심방세동", "심실세동", "정상 심장에서 나타난 발작성 심실 빈맥.", "심근 경색"], "answer": [3], "explanation": "제시된 심전도 소견은 wide QRS 빈맥, Lead I과 aVF에서 모두 deep S wave를 보이는 extreme axis deviation(northwest axis)을 나타냅니다. 이는 심실성 빈맥(ventricular tachycardia)의 전형적인 특징입니다. 심실성 빈맥은 심실 내에서 기원하는 빠르고 넓은 QRS 복합체를 특징으로 하며, 증상성 빈맥 환자에서 중요한 진단입니다. 따라서 '발작성 심실 빈맥'이 가장 적절한 분석입니다."}, {"subject": "심전도의 이해", "year": ["13학번", "12학번", "10학번"], "professor": "노태호", "question": "이 심전도에서 electrical axis는?", "images": [], "text_box": null, "options": ["+30도", "+60도", "+90도", "-30도", "-60도"], "answer": [3], "explanation": "심전도에서 QRS 전기축을 결정하기 위해 Lead I과 aVF를 분석합니다. Lead I이 양성이고 aVF가 음성이면 전기축은 좌상분면에 위치하며, 이는 좌축 편향(Left Axis Deviation, LAD)을 나타냅니다. Lead II가 등전위선(isoelectric)에 가까우면, 전기축은 Lead II(평균 +60도)에 수직인 -30도 또는 +150도일 가능성이 높습니다. Lead I이 양성이므로 -30도가 적절한 축으로 판단됩니다."}, {"subject": "심전도의 이해", "year": ["13학번", "12학번", "11학번"], "professor": "노태호", "question": "심전도의 사지유도이다. 옳은 것은? (RA오른팔, LA왼팔, RF오른발, LF왼발)", "images": [], "text_box": null, "options": ["1유도: RA(+) LA(-)", "2유도: RA(-) RF(+)", "2유도: RA(+) LF(-)", "3유도: LA(-) RF(+)", "3유도: LA(-) LF(+)"], "answer": [4], "explanation": "아인토벤 삼각형의 양극성 유도(bipolar limb leads)는 다음과 같이 구성됩니다: Lead I은 LA(+) - RA(-), Lead II는 LF(+) - RA(-), Lead III는 LF(+) - LA(-)입니다. 따라서 옵션 5번의 '3유도: LA(-) LF(+)'가 올바른 설명입니다."}, {"subject": "심전도의 이해", "year": ["13학번"], "professor": "노태호", "question": "12유도 심전도에서 옳은 기술은?", "images": [], "text_box": null, "options": ["사지유도는 frontal plane 즉좌 측면에서 볼 때 심장 전기흐름의 방향과 힘을 관찰한다.", "II, aVF유도는 특히 좌심실의 하측면(inferior wall)을 반영한다.", "흉부유도는 saggittal plane 즉 정면에서 볼 때 심장 전기흐름의 방향과 힘을 관찰한다.", "12유도 중 가장 심장 전기흐름의 방향을 잘 대변하는 유도는 lead III이다.", "I, aVR 유도는 특히 좌심실 좌측 상부(upper left wall)의 전기활동을 반영한다."], "answer": [1], "explanation": "심전도 유도는 심장의 전기적 활동을 다양한 각도에서 관찰합니다. II, III, aVF 유도는 심장의 하측면, 주로 좌심실의 하벽을 반영하는 '하벽 유도(inferior leads)'입니다. 사지유도는 심장의 전면(frontal plane)에서의 전기적 활동을 관찰하며, 흉부유도는 수평면(horizontal plane)에서의 전기적 활동을 보여줍니다."}, {"subject": "심전도의 이해", "year": ["09학번", "08학번"], "professor": "노태호", "question": "다음 중 심실의 전도에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["심실 전기 전도는 우상에서 좌하로 흘러 II유도에서 P파는 하향이다", "심실의 탈분극은 심실 중격이 가장 먼저이며, 이 중 우측이 먼저이다", "QRS파의 시작은 푸르키녜섬유의 탈분극 개시에 해당한다.", "심실벽의 전도는, 탈분극은 심내막에서 심외막, 재분극은 심외막에서 심내막 순으로 이루어져 T파와 QRS파는 동일 vector를 가지게 된다.", "심실 전기전도는 총 120ms 걸린다."], "answer": [3], "explanation": "심실의 탈분극은 심내막에서 심외막 방향으로 진행되며, QRS파를 생성합니다. 반대로 재분극은 심외막에서 심내막 방향으로 진행되어 T파를 생성합니다. 탈분극과 재분극의 방향이 대체로 반대임에도 불구하고, T파와 QRS파의 주된 벡터 방향이 유사한 것은 재분극 시 발생하는 전위차의 방향이 탈분극과 같은 방향으로 기록되기 때문입니다. 심실의 탈분극은 심실 중격의 좌측에서 먼저 시작되며, QRS파는 푸르키녜섬유 시스템을 통해 빠르게 전파된 후 나타납니다."}, {"subject": "심전도의 이해", "year": ["09학번", "08학번"], "professor": "노태호", "question": "다음은 심장의 전기 형성 및 전도에 관한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["심장의 전도는 우상에서 좌하방향을 향하고 따라서 aVR 유도에서 P파는 하향(inverted)이다.", "동결절의 전기형성은 phase 3의 slow spontaneous depolarization으로 인한다.", "동결절의 자동능으로 인한 전기형성은 심전도상의 P파에 해당한다.", "심실벽의 전도는 탈분극은 심내막-심외막의 순서로, 재분극은 심내막-심외막의 순서로 진행되며, 따라서 P와 QRS는 동일 vector를 갖게 된다.", "심실의 전도는, 심실중격의 우측에서 시작하며 다음에 좌우심실로 고르게 퍼져 나간다."], "answer": [0], "explanation": "정상 심장의 전기 전도 방향은 우상(right superior)에서 좌하(left inferior)를 향합니다. 이 방향과 반대되는 aVR 유도는 P파를 포함한 대부분의 파형에서 음성 편향(inverted)을 보입니다. 동방결절의 전기형성은 phase 4의 느린 자발적 탈분극(slow spontaneous depolarization)에 의해 발생하며, 심전도상의 P파는 심방의 탈분극을 나타냅니다. 심실의 탈분극은 심내막에서 심외막으로, 재분극은 심외막에서 심내막 순으로 진행됩니다."}, {"subject": "심전도의 이해", "year": ["09학번", "08학번"], "professor": "노태호", "question": "Sinus node(SN)의 세포와 수축에 참여하는 심근세포와 활동전위의 차이점을 기술하였다. 다음 중 맞는 내용은?", "images": [], "text_box": null, "options": ["SN 세포의 활동전위는 탈분극의 속도가 상대적으로 빠르다.", "심근세포는 탈분극 시 세포 내 전위가 양극으로 변환하는 정도, 즉 overshoot이 상대적으로 더 작다.", "심근세포는 외부의 자극이 없이도 스스로 탈분극하는 능력을 갖고 있다.", "SN 세포는 phase 4에 스스로 탈분극하는 능력을 가지고 있다.", "심근세포가 스스로 탈분극하는 능력에 따라 심박 수가 결정된다."], "answer": [3], "explanation": "동방결절(Sinus Node, SN) 세포는 자율성을 가지고 있으며, 외부 자극 없이도 스스로 활동 전위를 생성할 수 있습니다. 이는 활동 전위의 phase 4에서 발생하는 느린 자발적 탈분극(slow spontaneous depolarization) 때문입니다. 반면, 심근세포는 스스로 탈분극하는 능력이 없으며 외부 전기 자극이 있어야 활동 전위가 발생합니다. SN 세포의 탈분극 속도는 심근세포보다 느립니다."}, {"subject": "심전도의 이해", "year": ["08학번"], "professor": "노태호", "question": "정상 sinus rhythm에서 sinus node가 전기를 발생하는 시점은 다음 중 어디에 해당할 가능성 이 가장 큰가?", "images": [], "text_box": null, "options": ["QRS 시작시점 전 55msec부터 QRS 시작시점까지의 사이", "P wave 종료 시점부터 QRS 시작시점까지의 사이", "P wave 중간으로부터 Pwave 종료시점까지의 사이", "P wave 시작 직전의 시점", "P wave 시작 직후의 시점"], "answer": [3], "explanation": "동방결절은 심장의 주된 박동 조율기로, 심방의 전기적 활동을 시작합니다. 심전도에서 P파는 심방의 탈분극을 나타내며, 동방결절의 활동이 심방 세포에 도달하면서 P파가 시작됩니다. 따라서 동방결절이 전기를 발생시키는 시점은 심방 탈분극이 시작되기 직전, 즉 P파 시작 직전의 시점에 해당합니다. 심전도에서는 동방결절 자체의 활동은 기록되지 않습니다."}, {"subject": "심전도의 이해", "year": ["08학번"], "professor": "노태호", "question": "동결절이 생성된 전기가 심방의 첫 세포에 도달하는 시점과(A) 전기적 활성이 방실결절 상부에 도달하는 시점을(B) 옳게 나타낸 것은?", "images": [], "text_box": null, "options": ["(A) P파의 정점 (B) QRS의 시작점", "(A) P파의 시작점 (B) QRS의 시작점", "(A) P파의 시작직전 (B) P파의 정점 근처", "(A) P파의 시작직후 (B) P파의 정점 근처", "(A) P파의 시작직전 (B) P파 종료와 QRS파 시작의 중간점"], "answer": [3], "explanation": "동방결절에서 생성된 전기가 심방의 첫 번째 세포에 도달하는 시점은 P파가 시작되기 직전입니다. P파는 심방 탈분극을 나타내며, 이 탈분극이 진행되면서 전기적 활성은 심방을 거쳐 방실결절로 전달됩니다. 방실결절 상부에 전기적 활성이 도달하는 시점은 P파의 정점에 가까운 시점입니다. QRS파는 심실의 탈분극을 나타내므로, 이는 방실결절에서의 지연 이후에 발생합니다."}, {"subject": "심전도의 이해", "year": ["07학번", "06학번"], "professor": "노태호", "question": "심전도를 검사하는 도중 왼 팔의 유도선이 떨어졌다. 몇 개 (A)의 어떤 유도가(B)가 나오지 않을까?", "images": [], "text_box": null, "options": ["(A) 1개 (B) lead I", "(A) 2개 (B) lead I, aVL", "(A) 2개 (B) lead I, aVR", "(A) 3개 (B) lead I, III, aVL", "(A) 3개 (B) lead I, III, aVF"], "answer": [3], "explanation": "왼쪽 팔(LA)의 유도선이 떨어지면 LA를 전극으로 사용하는 유도들이 영향을 받습니다. Lead I (RA-LA), Lead III (LF-LA), aVL (LA를 양성 전극으로 하는 단극 유도)가 제대로 기록되지 않거나 심하게 왜곡된 파형을 보일 것입니다. 따라서 Lead I, III, aVL 세 가지 유도가 나오지 않게 됩니다."}, {"subject": "심전도의 이해", "year": ["06학번"], "professor": "노태호", "question": "아래 표준심전도 (2.5cm/sec)에서 다음의 심전도를 보이는 사람의 분당 심박수는?", "images": [], "text_box": null, "options": ["50 정도", "40 정도", "30 정도", "20 정도", "알 수 없다."], "answer": [2], "explanation": "제공된 심전도 이미지에서 R-R 간격은 큰 눈금 10칸에 해당합니다. 표준 심전도 기록 속도(25mm/s)에서 큰 눈금 1칸은 0.2초이므로, R-R 간격은 10칸 * 0.2초/칸 = 2초입니다. 분당 심박수는 60초 / 2초 = 30회/분입니다. 또는 '300 법칙'을 사용하여 300 / 10칸 = 30회/분으로 계산할 수 있습니다."}, {"subject": "심전도의 이해", "year": ["06학번"], "professor": "노태호", "question": "다음 심장근육 재분극에 관한 심전도 파형에 관한 기술 중 옳은 것?", "images": [], "text_box": null, "options": ["심장 내막의 세포는 외막세포에 비해 먼저 탈분극되며 먼저 재분극된다.", "심실의 재분극은 P 파의 시초부터 T 파의 종료시점까지를 포함한다.", "심방의 재분극은 P 파의 Polarity 와 동일하나 QRS 파와 시점이 일치해 심전도상에 관찰되지 않는다.", "심실의 재분극파인 T 파는 QRS 파와 방향이 동일하다."], "answer": [3], "explanation": "심실의 재분극파인 T파는 심실의 탈분극파인 QRS파와 방향이 동일합니다. 이는 심실 탈분극이 심내막에서 심외막으로, 재분극은 심외막에서 심내막으로 진행되지만, 재분극의 최종 벡터가 탈분극 벡터와 유사하게 기록되기 때문입니다. 심장 내막 세포는 외막 세포보다 먼저 탈분극되지만, 재분극은 외막에서 먼저 시작됩니다. P파는 심방 탈분극을 나타내고, 심실 재분극은 T파로 나타납니다."}, {"subject": "심전도의 이해", "year": ["06학번"], "professor": "노태호", "question": "COPD 가 오래되어 pulmonary hypertension 이 의심되는 환자의 사지유도 심전도이다. 이 환자의 흉부유도 심전도에서 가장 기대되는 소견은?", "images": [], "text_box": "COPD 가 오래되어 pulmonary hypertension 이 의심되는 환자의 사지유도 심전도이다.", "options": ["V6 에서 R은 상향파로서 키가 25mm 이다.", "V5 에서 R은 상향파로서 폭이 110msec 이다.", "V2 에서 rS 모양을 보인다.", "V1 에서 R은 상향으로 키가 13mm 이다."], "answer": [3], "explanation": "만성 폐쇄성 폐질환(COPD)과 폐동맥 고혈압(pulmonary hypertension)이 동반된 환자에서는 우심실 비대(RVH)가 발생할 가능성이 높습니다. RVH는 심전도상에서 특징적인 소견을 보이는데, 특히 V1 유도에서 R파가 크고 S파가 작은 형태(R > S) 또는 tall R wave가 나타나는 것이 일반적입니다. 이는 우심실 비대로 인한 전기적 활동의 증가를 반영합니다. 다른 유도 소견은 RVH에 비정형적입니다."}, {"subject": "심전도의 이해", "year": ["20학번", "19학번", "18학번"], "professor": "", "question": "다음중 환자의 진단은?", "images": [], "text_box": "82세 여자가 샤워중 갑자기 쓰러져서 119에 신고되었으며, 119 도착 당시 맥박이 촉지 되지 않아 심폐소생술 후 다행히 혈압과 맥박이 올라왔다. 4년전부터 당뇨와 고혈압 약물을 복용하고 있었다. 응급실 내원 당시 혈압 80/60 mmHg, 맥박 74 회/분, 호흡 22 회/분, 체온 37.1℃이다. 가슴 청진에서 심잡음은 없고 양쪽 등쪽 아랫부분에서 거품소리가 들린다. 심전도 소견은 다음과 같다.", "options": ["심장눌림증", "비ST분절 상승 심근경색증", "전벽 ST분절 상승 심근경색증", "측벽 ST분절 상승 심근경색증", "하벽 ST분절 상승 심근경색증"], "answer": [2], "explanation": "환자는 심근경색으로 인한 심인성 쇼크 상태로 보입니다. 심전도에서 V2, V3, V4, V5 유도에서 ST분절 상승이 명확히 관찰됩니다. 이는 심근경색 중에서도 전벽 부위에 발생한 ST분절 상승 심근경색(STEMI)을 시사합니다. 따라서 환자의 진단은 전벽 ST분절 상승 심근경색입니다."}, {"subject": "심전도의 이해", "year": ["19학번", "17학번"], "professor": "오용석", "question": "심전도를 분석하면?", "images": [], "text_box": "34세 남자가 6시간 전부터 가슴 두근거림을 호소하며 응급실에 들어왔다. 환자의 심전도는 분당 130회의 wide QRS 빈맥을 보였고 심전도의 축은 I과 aVF 모두 deep S wave를 보였다.", "options": ["심실 중격 결손의 상심실성 빈맥", "심방세동", "심실세동", "정상 심장에서 나타난 발작성 심실 빈맥.", "심근 경색"], "answer": [3], "explanation": "해당 심전도는 분당 130회의 규칙적인 wide QRS 빈맥을 보여 심실빈맥을 의심하게 합니다. Lead I에서 QRS가 음성이고, aVF에서도 QRS가 음성인 '노맨스 랜드(no man's land)' 또는 극심한 좌축 편향(northwest axis)을 나타냅니다. 이러한 극심한 축 편향은 일반적으로 심실빈맥의 강력한 소견 중 하나입니다. 따라서 이는 심실빈맥으로 진단할 수 있습니다."}, {"subject": "심전도의 이해", "year": ["10학번", "07학번", "06학번"], "professor": "노태호", "question": "RBBB에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["V1 유도에서 토끼의 오른쪽 귀가 더 크다.", "토끼의 오른쪽 귀(R)는 심실 activation 초기 septal activation이 V6을 향하기 때문이다.", "V1에서 볼 때 토끼의 양쪽 귀 사이의 S파는 RBBB로 먼저 우심실이 activation 됨으로 인한다.", "토끼의 왼쪽 귀는 먼저 좌심실로 가는 전기활동으로 인해 생긴다.", "QRS duration은 항상 120msec 이상이다.", "V6에서는 Deep Q wave가 나타난다."], "answer": [4], "explanation": "RBBB(Right Bundle Branch Block)는 우각차단으로, 심실의 탈분극 과정에 이상이 생겨 발생합니다. RBBB의 주요 진단 기준 중 하나는 QRS 간격이 120ms 이상으로 연장되는 것입니다. V1 유도에서 rSR' 패턴이 나타나며, 여기서 왼쪽 귀(R')가 더 커집니다. 우심실의 Purkinje 섬유를 통한 전도 지연으로 인해 발생합니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["21학번", "20학번"], "professor": "정정임", "question": "관상동맥 CT에서 화살표로 표시된 혈관에 이상이 생기면 심근 손상이 생기는 좌심실벽의 위치는?", "images": [], "text_box": null, "options": ["1,2", "3,4", "4,5", "5,6", "6,1"], "answer": [3], "explanation": "관상동맥 CT에서 화살표로 표시된 혈관은 좌회선동맥(LCX)입니다. 좌회선동맥은 좌심실의 외측벽과 후벽 일부를 지배합니다. 그림의 심근 분할도에서 5번과 6번 구역은 좌심실의 외측벽에 해당합니다. 따라서 좌회선동맥의 이상은 이 구역에 심근 손상을 유발합니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["21학번"], "professor": "정정임", "question": "흉부 x사진은 다음과 같다. 시행해야 하는 검사는?", "images": [], "text_box": "55세 여자가 일주일전 호흡곤란이 발생하고 2시간전 어지럼증이 발생하여 응급실로 내원. 혈압 60/30 심박수 126 호흡수 22 체온 36.4. 목정맥이 부풀어 있었다.", "options": ["심초음파", "심혈관조영술", "목정맥 도플러", "운동부하검사", "전기생리학 검사"], "answer": [0], "explanation": "55세 여자 환자는 급성 호흡곤란, 어지럼증, 저혈압, 빈맥, 경정맥 팽창 및 흉부 X선 상 심비대 소견을 보여 심장 기능 부전, 즉 심부전을 시사합니다. 특히 우심방(RA)이 확장되어 있고 전반적인 심장 비대 소견은 심부전의 말기 단계를 나타낼 수 있습니다. 이러한 상황에서 심장의 구조와 기능을 가장 빠르고 정확하게 평가하고 원인을 파악하기 위해 심초음파 검사가 필수적입니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["21학번"], "professor": "정정임", "question": "관상동맥 혈관이 우측 우세(right dominant)일 때, 그림의 1,2 구역의 좌심실을 지배하는 혈관은?", "images": [], "text_box": null, "options": ["right coronary artery", "anterior marginal artery", "left circumflex artery", "posterior descending artery", "left anterior descending artery"], "answer": [4], "explanation": "좌심실의 1번과 2번 구역은 심장의 전벽과 전중격에 해당합니다. 이 영역은 주로 좌전하행동맥(Left Anterior Descending artery, LAD)에 의해 혈액 공급을 받습니다. 관상동맥 우세 여부와 관계없이 좌전하행동맥은 좌심실의 가장 큰 부분인 전벽과 중격에 중요한 혈류를 공급합니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["21학번"], "professor": "정정임", "question": "흉부 X-선 후전 사진에서 확인해야 할 심장의 정상소견의 조합으로 옳은 것은?", "images": [], "text_box": null, "options": ["심장의 위치 - 심첨이 우측 전방", "심장의 크기 - 심/흉 비가 0.5 이상", "심장의 모양 - 노년기에 장화 모양", "혈관의 음영 - 두경화(cephalization) (← 문맥상 혈관상부 음영이 진하다는 의미같습니다.)", "폐동맥과 대동맥의 모양 - 우측 대동맥궁"], "answer": [], "explanation": "해당 문제의 보기는 심장의 정상 소견에 대한 설명으로, 보기 1번은 심첨이 좌측 전방에 위치해야 정상입니다. 보기 2번은 심/흉비(CTR)가 0.5 이하여야 정상입니다. 보기 3번은 신생아기에는 구형 또는 삼각형, 장년기와 노년기에는 장화 모양이 나타날 수 있어 틀린 설명은 아닙니다. 보기 4번은 폐정맥 고혈압 시 나타나는 두경화(상부 음영 증가)가 정상 소견이므로, 정상 소견은 상부 음영이 적은 것입니다. 보기 5번은 좌측 대동맥궁이 정상입니다. 따라서 가장 적절한 정상 소견의 조합은 보기 3입니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["20학번", "19학번", "15학번", "13학번", "11학번"], "professor": "정정임", "question": "관상동맥혈관이 우측우세일 때, 화살표로 표시한 혈관이 지배하는 좌심실 영역의 번호로 옳은 것은?", "images": [], "text_box": null, "options": ["1,2", "3,4", "4,5", "5,6", "6,1"], "answer": [3], "explanation": "제시된 영상에서 화살표로 표시된 혈관은 좌회선동맥(LCX)입니다. 관상동맥이 우측우세형일 때도 좌회선동맥은 좌심실의 후외측 및 외측벽을 주로 지배합니다. 심근 분할도에서 5번과 6번 구역은 좌심실의 후외측 및 외측벽에 해당하므로, 좌회선동맥에 문제가 생길 경우 이 영역에 손상이 발생합니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["19학번"], "professor": "정정임", "question": "호흡 곤란이 있는 환자의 흉부 X선 사진이다. 가장 이상이 있는 부위는?", "images": [], "text_box": "호흡 곤란이 있는 환자의 흉부 X선 사진이다.", "options": ["대동맥", "폐동맥", "상대정맥", "우심실", "좌심실"], "answer": [1], "explanation": "호흡 곤란 환자의 흉부 X선 사진에서 종격동의 변연을 관찰할 때, 폐동맥의 확장이 두드러집니다. 이는 폐동맥 고혈압의 초기 소견일 수 있으며, 아직 심실이 크게 확장되지 않은 상태에서 나타날 수 있습니다. Aortopulmonary window 주변에서 폐동맥의 튀어나온 윤곽을 확인하는 것이 중요합니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["18학번"], "professor": "정정임", "question": "흉부 X-선 후전사진이다. 종격동 변연을 살펴보았을 때 가능한 질환은?", "images": [], "text_box": null, "options": ["대동맥 박리", "삼첨판 부전", "폐동맥 고혈압", "승모판막 협착", "대동맥판막 협착"], "answer": [2], "explanation": "제시된 흉부 X-선 후전 사진에서 종격동의 변연을 살펴보면 폐동맥이 튀어나와 확장된 소견을 보입니다. 이는 폐동맥 고혈압의 특징적인 영상 소견으로, 폐동맥 압력이 증가하면서 폐동맥이 확장된 것을 시사합니다. 폐동맥 고혈압은 여러 원인으로 발생할 수 있으며, 진단을 위해 추가적인 검사가 필요합니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["18학번"], "professor": "정정임", "question": "다음 중격동의 변연을 이루는 번호와 구조물의 명칭이 맞지 않는 것은?", "images": [], "text_box": null, "options": ["A - 상대정맥", "B - 하대정맥", "C - 대동맥", "D - 폐동맥", "F - 좌심실"], "answer": [1], "explanation": "흉부 X선 사진에서 종격동의 변연을 이루는 구조물을 살펴보면, A는 상대정맥(SVC), C는 대동맥궁(Aortic arch), D는 폐동맥(Pulmonary artery), F는 좌심실(Left ventricle)입니다. 그러나 B는 하대정맥이 아니라 우심방(Right atrium)의 우측 변연을 이룹니다. 따라서 B를 하대정맥으로 지칭한 보기가 틀렸습니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["18학번"], "professor": "정정임", "question": "흉부 X-선 후전 사진에서 종격동의 변연을 이루는 1~4번 구조물을 순서대로 배열하시오.", "images": [], "text_box": null, "options": ["상대정맥-대동맥궁-우심방-좌심실"], "answer": [0], "explanation": "흉부 X-선 후전 사진에서 종격동의 변연을 따라 번호가 매겨진 구조물은 다음과 같습니다. 1번은 상대정맥(SVC), 2번은 대동맥궁(Aortic arch)의 일부, 3번은 우심방(Right atrium), 4번은 좌심실(Left ventricle)의 좌측 변연입니다. 따라서 올바른 순서는 상대정맥, 대동맥궁, 우심방, 좌심실입니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["17학번"], "professor": "정정임", "question": "환자가 시행한 흉부 X선 사진이다. 다음 보기 중에 가장 커진 것은?", "images": [], "text_box": null, "options": ["우심방", "우심실", "좌심방", "좌심실", "대동맥"], "answer": [0], "explanation": "제시된 흉부 X선 사진에서 심장이 전반적으로 비대해져 있으며, 특히 우측 심연을 형성하는 우심방(RA)의 확장이 두드러집니다. 이는 심부전의 말기 단계에서 흔히 관찰되는 'big heart' 소견이며, 우심방 확장 및 다른 심실의 비대와 함께 나타날 수 있습니다. 따라서 가장 커진 것은 우심방입니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["17학번", "16학번", "15학번", "14학번", "13학번", "12학번", "11학번", "10학번"], "professor": "정정임", "question": "심장 자기 공명 영상의 4 chamber view 이다. 화살표가 가리키는 판막이 흉부사진에서 보이는 위치의 번호로 답하시오.", "images": [], "text_box": null, "options": ["1, 2", "2, 3", "3, 4", "1, 3", "2, 4"], "answer": [2], "explanation": "심장 자기 공명 영상(MRI) 4 chamber view에서 화살표는 좌심방(LA)과 좌심실(LV) 사이에 위치한 승모판막을 가리킵니다. 흉부 X선 사진에 표시된 번호는 주요 심장 판막의 위치를 나타내며, 4번은 승모판막, 3번은 삼첨판막의 일반적인 해부학적 위치에 해당합니다. X선 투영상에서 판막의 위치는 겹쳐 보일 수 있어 '3, 4'로 표현될 수 있습니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["16학번", "14학번", "12학번"], "professor": "정정임", "question": "관상동맥 혈관이 우측 우세(Right Dominant)일 시 화살표로 표시된 혈관이 지배하는 좌심의 영역의 번호로 가장 옳은 것은?", "images": [], "text_box": null, "options": ["1,2", "3,4", "4,5", "5,6", "6,1"], "answer": [3], "explanation": "제시된 영상에서 화살표로 표시된 혈관은 좌회선동맥(LCX)입니다. 관상동맥이 우측우세형일 때도 좌회선동맥은 좌심실의 후외측 및 외측벽을 주로 지배합니다. 심근 분할도에서 5번과 6번 구역은 좌심실의 후외측 및 외측벽에 해당하므로, 좌회선동맥에 문제가 생길 경우 이 영역에 손상이 발생합니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["10학번"], "professor": "정정임", "question": "다음 중 우심실이 확장되면 변하게 되는 구조물은?", "images": [], "text_box": null, "options": ["1번 구조물", "2번 구조물", "3번 구조물", "4번 구조물", "5번 구조물"], "answer": [4], "explanation": "흉부 X선 사진에서 우심실이 확장되면 심장의 심첨(apex)이 둥글게 변하면서 위쪽으로 들리게 됩니다. 이는 심장의 전체적인 형태 변화를 유발하며, 좌측 심하방에 위치한 5번 구조물의 변연이 위로 올라가는 소견으로 나타날 수 있습니다. 이는 우심실의 비대로 인해 심장 형태가 재구성되었음을 의미합니다."}, {"subject": "심장과 주요 혈관의 영상의학", "year": ["9학번"], "professor": "정정임", "question": "다음의 조영제를 이용한 영상에서 가리키는 혈관의 이름은?", "images

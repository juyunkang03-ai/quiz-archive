 coronary artery", "Diagonal artery", "AV nodal artery"], "answer": [0], "explanation": "제시된 심전도에서는 V2-V6 유도에서 광범위한 ST분절 상승이 명확하게 관찰됩니다. 이러한 소견은 광범위한 전벽 심근경색(extensive anterior wall STEMI)을 시사하는 전형적인 지표입니다. 심장의 전벽 부위에 혈액을 공급하는 주된 관상동맥은 좌전하행동맥(Left Anterior Descending artery, LAD)입니다. 따라서 이 심전도 소견은 좌전하행동맥의 폐쇄를 강력히 예측할 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["17학번"], "professor": "전두수", "question": "증상발생의 병태생리에 대한 적절한 설명은?", "images": [], "text_box": "최근 발생한 안정시 가슴통증 및 호흡곤란이 있는 73세 남자의 심전도이다.", "options": ["폐색전증", "심낭삼출", "심근허혈", "좌심실 비대", "심장막 염증"], "answer": [2], "explanation": "제시된 심전도에서는 V3-V6 유도를 포함한 전흉부 유도에서 ST분절 하강과 T파 역위가 관찰됩니다. 이러한 소견은 비ST분절 상승 심근경색(NSTEMI) 또는 불안정형 협심증과 같은 급성 관상동맥 증후군에서 나타나는 심근 허혈의 전형적인 지표입니다. 심내막하 허혈은 심근 허혈의 초기 단계에서 ST분절 하강을 유발하는 주요 병태생리입니다. 따라서 환자의 안정시 흉통 및 호흡곤란은 심근 허혈로 인한 것입니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["16학번"], "professor": "전두수", "question": "유도 aVL의 심전도 변화를 가장 적절히 설명하는 것은?", "images": [], "text_box": "1시간 전부터 발생한 흉통으로 내원한 53세 남자의 심전도이다.", "options": ["조기 재분극 소견이다.", "좌심실 비대에 의한 이차 변화이다.", "측벽 전층허혈 소견이다.", "하벽 심내막하허혈 소견이다.", "전벽 심장막염 소견이다."], "answer": [2], "explanation": "제시된 심전도에서 aVL 유도에서 미미한 ST분절 상승이 관찰됩니다. 또한, aVL의 반대편 유도인 III에서 ST분절 하강(역변화)이 동시에 관찰됩니다. 이러한 소견은 급성 측벽 심근경색, 특히 고측벽(High lateral wall)의 전층허혈을 시사하는 특징적인 변화입니다. 따라서 aVL 유도의 변화는 측벽 전층허혈 소견으로 가장 적절하게 설명될 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["15학번"], "professor": "전두수", "question": "어느 관상동맥의 폐쇄로 인한 심전도인가?", "images": [], "text_box": null, "options": ["AV nodal artery", "Right coronary artery", "Left anterior descending artery", "Left circumflex artery", "Diagonal artery"], "answer": [1], "explanation": "제시된 심전도에서 II, III, aVF 유도에서 ST분절 상승이 관찰됩니다. 이는 하벽 심근경색(Inferior wall MI)의 전형적인 소견입니다. 동시에 V2, V3 유도에서 ST분절 하강(역변화)이 나타나는데, 이는 후벽 심근경색(Posterior wall MI)이 동반되었음을 시사합니다. 하벽 및 후벽 심근경색은 주로 우관상동맥(Right Coronary Artery, RCA)의 폐쇄로 인해 발생합니다. 따라서 이 심전도 소견은 우관상동맥의 폐쇄로 인한 것입니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["14학번"], "professor": "", "question": "안정 시 심한 흉통과 쇼크를 주소로 내원한 환자의 우측 흉부 심전도이다. 진단은?", "images": [], "text_box": null, "options": ["Acute right ventricular infarction", "Acute anterior wall MI", "Acute lateral wall MI", "Acute posterior wall MI", "Acute ventricular septal rupture"], "answer": [0], "explanation": "제시된 심전도에서 II, III, aVF 유도에서 ST분절 상승이 관찰되어 급성 하벽 심근경색(Inferior wall MI)이 의심됩니다. 특히, 우측 흉부 심전도에서 V1 유도와 V4R 유도(우심실 특수 유도)에서 ST분절 상승이 동반된다면 우심실 경색을 강력히 시사합니다. 하벽 심근경색과 동반된 우심실 경색은 RCA 근위부 폐색과 관련이 깊습니다. 환자가 쇼크 상태인 점은 우심실 기능 부전으로 인한 심한 혈역학적 불안정을 반영합니다. 따라서 급성 우심실 경색으로 진단할 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["14학번"], "professor": "전두수", "question": "역변화를 관찰하는 유도는?", "images": [], "text_box": null, "options": ["I", "III", "aVR", "aVL", "V6"], "answer": [3], "explanation": "제시된 심전도에서 II, III, aVF 유도에서 ST분절 상승이 관찰되어 급성 하벽 심근경색(Inferior STEMI)임을 알 수 있습니다. 역변화는 허혈 부위의 ST분절 상승에 대칭적으로 반대편 유도에서 ST분절 하강으로 나타나는 현상입니다. 하벽 유도(II, III, aVF)에 가장 직접적으로 대칭되는 유도는 aVL입니다. 따라서 하벽 STEMI의 경우 역변화로 인한 ST분절 하강은 aVL에서 가장 뚜렷하게 관찰됩니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["13학번", "11학번"], "professor": "", "question": "성공적인 재관류 치료를 시사하는 심전도 소견은?", "images": [], "text_box": null, "options": ["ST depression과 T파 역위가 보이는 파형", "깊은 Q파와 지속적인 ST 상승이 보이는 파형", "T파 역위만 보이는 파형", "ST 분절 회복과 T파 역위가 보이는 파형", "Hyperacute T파와 ST 상승이 보이는 파형"], "answer": [3], "explanation": "성공적인 재관류 치료 후 심전도에서는 ST분절 상승이 완화되거나 해소되는 소견이 나타납니다. 특히, T파 역위(T wave inversion)는 심근 허혈의 회복 단계에서 흔히 관찰되는 특징적인 변화입니다. 이는 손상된 심근이 회복되면서 재분극 이상이 나타나는 것을 반영합니다. 제시된 파형 중 ST분절의 회복과 함께 T파 역위가 나타나는 파형이 성공적인 재관류를 시사하는 소견입니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["12학번"], "professor": "", "question": "이차성 ST 분절 변화를 일으키는 질환은?", "images": [], "text_box": null, "options": ["전층허혈", "심내막하 허혈", "심장막염", "디기탈리스 복용", "좌심실비대"], "answer": [4], "explanation": "이차성 ST분절 변화(Secondary ST-T changes)는 심근 허혈과 같은 원발성 심근 이상이 아닌 다른 심장 질환에 의해 발생하는 ST-T분절의 변화를 의미합니다. 대표적으로 좌심실 비대(Left Ventricular Hypertrophy, LVH), 각차단(Bundle Branch Block), WPW 증후군(Wolff-Parkinson-White syndrome) 등이 이차성 ST분절 변화를 유발합니다. 이들은 심실 재분극 과정에 영향을 미쳐 ST-T분절의 비정상적인 형태를 나타냅니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["12학번"], "professor": "전두수", "question": "심근 허혈에 의한 손상전류에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["심내막하 허혈에서 손상전류는 심외막 방향이다.", "전층허혈에서 손상전류는 심내막 방향이다.", "전층허혈이 중격, 전벽, 측-후벽에 동시에 발생할 경우 전흉부 유도에서 뚜렷한 손상전류를 관찰할 수 있다.", "심내막하허혈에서 역변화에 의한 심전도 변화를 관찰할 수 있다.", "허혈 발생시 T파 변화가 가장 먼저 일어난다."], "answer": [4], "explanation": "급성 심근 허혈 발생 시 심전도에서 가장 먼저 나타나는 변화 중 하나는 T파의 변화입니다. 초기에는 T파가 높아지고 뾰족해지는 hyperacute T wave가 관찰될 수 있습니다. 심내막하 허혈 시 손상 전류의 방향은 심내막에서 심외막을 향하지만, 전층허혈 시에는 허혈 부위에서 심실 외막을 향합니다. 또한, 심내막하 허혈에서는 손상 전류의 방향이 분산되어 역변화가 잘 관찰되지 않습니다. 여러 부위에 동시에 전층허혈이 발생하면 벡터 합으로 인해 뚜렷한 손상전류 방향이 없을 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["11학번"], "professor": "전두수", "question": "흉통으로 내원한 환자의 심전도에서 ST분절 역변화가 관찰이 되었다. 가장 가능성이 높은 질환은?", "images": [], "text_box": null, "options": ["심장막염", "WPW 증후군", "불안전형 협심증", "ST분절 상승 심근경색증", "비 ST분절 상승 심근경색증"], "answer": [3], "explanation": "ST분절 역변화(Reciprocal ST-T changes)는 급성 ST분절 상승 심근경색증(STEMI)의 중요한 특징 중 하나입니다. 이는 허혈 부위에서 ST분절 상승이 나타날 때, 대칭되는 반대편 유도에서 ST분절 하강이 동반되는 현상입니다. 심장막염은 전반적인 ST분절 상승을 보일 수 있지만 역변화는 흔하지 않습니다. WPW 증후군이나 불안정형 협심증, 비ST분절 상승 심근경색증에서는 전형적인 역변화가 관찰되지 않습니다. 따라서 역변화가 뚜렷하게 관찰되는 경우 가장 가능성이 높은 질환은 ST분절 상승 심근경색증입니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["10학번"], "professor": "전두수", "question": "ST 분절 상승 심근경색증에 대해 재관류 치료 24시간 후에 찍은 심전도이다. 성공적인 재관류 치료를 의미하는 심전도는?", "images": [], "text_box": null, "options": ["지속적인 ST분절 상승을 보이는 파형", "ST분절 상승이 해소되고 T파 역위가 나타나는 파형", "새로운 병적 Q파와 ST분절 상승이 지속되는 파형", "ST분절 하강과 T파 역위가 보이는 파형", "정상화된 ST-T분절을 보이는 파형"], "answer": [1], "explanation": "성공적인 재관류 치료 후 심전도에서는 ST분절 상승이 완화되거나 완전히 해소되는 소견이 나타나야 합니다. 또한, 재관류 후에는 T파가 역위되는(T wave inversion) 변화가 흔히 관찰됩니다. 이는 재분극 과정의 이상을 반영하며, 심근 손상 부위의 회복을 시사하는 긍정적인 지표입니다. 따라서 ST분절 상승이 해소되고 T파 역위가 나타나는 파형이 성공적인 재관류 치료를 의미하는 심전도 소견입니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["09학번"], "professor": "전두수", "question": "심전도 소견으로 보았을 때 예상되는 관상동맥 질환의 경과 시간은?", "images": [], "text_box": null, "options": ["1시간 이내", "6시간 이내", "12시간 이내", "24시간 이내", "알 수 없다"], "answer": [0], "explanation": "제시된 심전도에서 V2-V4 유도를 포함한 광범위한 전벽 유도에서 뚜렷한 ST분절 상승과 함께 크고 뾰족한 hyperacute T파가 관찰됩니다. Hyperacute T파는 급성 심근경색 발생 초기, 즉 보통 1시간 이내에 나타나는 특징적인 심전도 소견입니다. 이 시기에는 심근 허혈이 빠르게 진행되며, ST분절 상승이 점차 뚜렷해집니다. 따라서 이러한 심전도 소견으로 미루어 볼 때 관상동맥 질환의 경과 시간은 1시간 이내로 예상할 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "역변화의 특징으로 옳은 것은?", "images": [], "text_box": null, "options": ["심장막염의 특징적인 소견이다", "전층허혈의 급성기에 잘 보인다", "2차적 변화에서 나타나는 특징적 소견이다.", "손상전류의 방향이 다양할 때 뚜렷하게 나타난다", "심내막하 허혈이 넓은 범위에 나타날 때 보인다."], "answer": [1], "explanation": "역변화(Reciprocal change)는 심근경색 시 허혈 부위의 ST분절 상승과 대칭되는 유도에서 ST분절 하강이 나타나는 현상입니다. 이는 전층허혈(transmural ischemia)의 급성기에 흔히 관찰되는 중요한 진단적 소견입니다. 손상 전류의 방향이 특정 유도를 향할 때 반대편에서 역방향의 변화가 나타나는 원리입니다. 따라서 역변화는 급성 전층허혈 시 잘 나타나는 특징입니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "유도 V2에서 ST분절 변화에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["심내막하 허혈 소견이다.", "이차성 ST분절 변화 소견이다.", "허혈이 일어난 위치는 전벽이다.", "전층 허혈 회복기 심전도 소견이다.", "등쪽으로 향하는 손상전류에 의해서 발생하였다."], "answer": [4], "explanation": "제시된 심전도에서 V2, V3 유도에서 뚜렷한 ST분절 하강이 관찰됩니다. 이러한 변화는 후벽 심근경색(Posterior MI)의 역변화(reciprocal change) 소견으로 해석됩니다. 후벽 심근경색 시 손상 전류는 후벽에서 등쪽 방향으로 흐르게 되며, 이 때문에 전벽 유도인 V2, V3에서 역방향인 ST분절 하강이 나타납니다. 따라서 등쪽으로 향하는 손상 전류에 의해 발생한 소견이라고 설명할 수 있습니다. 이 심전도는 급성 하벽 및 후벽 심근경색을 시사하며, 주로 우관상동맥 폐색과 관련됩니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "우심실 심근경색증에 의한 변화가 발생한 유도는?", "images": [], "text_box": null, "options": ["유도 1", "유도 3", "유도 aVR", "유도 V1", "유도 V3"], "answer": [3], "explanation": "우심실 심근경색증은 주로 우관상동맥(RCA) 폐색으로 발생하며, 우심실은 심장의 전흉부 유도 중 V1에 가장 가깝게 위치합니다. 따라서 우심실 심근경색이 발생할 경우 V1 유도에서 ST분절 상승이 특징적으로 나타날 수 있습니다. 이는 우심실의 허혈성 손상으로 인한 전기적 변화를 반영하는 중요한 소견입니다. 일반적으로 V1 유도의 ST 상승은 우심실 병변을 시사하는 핵심적인 단서입니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "유도 V2-3 심전도 변화의 병태생리는?", "images": [], "text_box": null, "options": ["전벽 전층허혈", "후벽 전층허혈", "전층 심내막하 허혈", "후벽 심내막하 허혈", "전-후벽 전층허혈"], "answer": [1], "explanation": "제시된 심전도에서 V2-V3 유도에서 뚜렷한 ST분절 하강이 관찰됩니다. 이러한 ST분절 하강은 하벽 유도(II, III, aVF)에서 ST분절 상승이 동반될 때, 후벽 심근경색증의 역변화 소견으로 해석될 수 있습니다. 후벽 심근경색은 등쪽으로 향하는 손상 전류를 유발하며, 이는 전벽 유도에서 역방향인 ST분절 하강으로 나타납니다. 따라서 V2-V3의 변화는 후벽 전층허혈의 병태생리를 반영하는 것입니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "흉통으로 내원한 65세 남자 심전도이다. 적절한 심전도 해석은?", "images": [], "text_box": null, "options": ["ST분절 상승보다 ST분절 하강이 뚜렷하므로 비 ST분절 상승 심근경색이다.", "유도 3, avF에서 ST분절 하강은 하벽에 심내막하 허혈이 발생한 소견이다.", "유도 1, aVL, V5-6에서 ST 분절 상승은 전벽에 전층허혈이 발생에 따른 변화이다.", "재관류가 성공한 소견이다.", "손상전류의 방향은 측벽으로 향하고 있다."], "answer": [4], "explanation": "제시된 심전도에서 I, aVL, V6 유도에서 뚜렷한 ST분절 상승이 관찰되며, 이는 측벽 심근에 광범위한 전층허혈이 발생했음을 시사합니다. 손상 전류는 허혈이 발생한 심근 부위를 향하게 되므로, 측벽 심근 손상 시 손상 전류는 측벽 방향으로 흐르게 됩니다. 이와 함께 III 유도에서 ST분절 하강이 관찰되는 것은 역변화 소견으로 측벽 심근경색을 더욱 강력히 지지합니다. 따라서 손상 전류의 방향이 측벽으로 향하고 있다고 해석하는 것이 가장 적절합니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "59세 남자가 5시간 전부터 발생한 심한 흉통이 있었다. 심전도 진단은?", "images": [], "text_box": null, "options": ["급성 전측벽 ST분절 상승 심근경색증", "급성 하벽 ST분절 상승 심근경색증", "급성 후벽 ST분절 상승 심근경색증", "급성 측벽 ST분절 상승 심근경색증", "급성 심장막염"], "answer": [0], "explanation": "제시된 심전도에서는 V1부터 V6 유도까지 광범위하게 ST분절 상승이 관찰됩니다. 이러한 소견은 심장의 전벽과 중격, 그리고 측벽 일부까지 광범위하게 허혈성 손상이 발생했음을 의미합니다. 이는 전형적인 급성 전측벽 ST분절 상승 심근경색증(Acute anterolateral STEMI)의 소견입니다. 심한 흉통과 심전도 변화를 종합할 때, 급성 전측벽 심근경색증으로 진단할 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "운동시 호흡곤란이 있는 73세 남자의 심전도이다. 심전도 변화의 병태생리에 대한 적절한 설명은?", "images": [], "text_box": null, "options": ["전벽 심내막하 허혈", "전벽 전층허혈", "좌각전도 장애에 따른 이차성 변화", "좌심실 비대에 따른 이차성 변화", "심장막 염증"], "answer": [3], "explanation": "제시된 심전도에서는 V3-V6 유도에서 T파 역위와 ST분절 하강이 관찰되지만, QRS파의 모양이 비정상적입니다. 이는 이차성 ST-T분절 변화의 특징적인 소견으로, 원발성 심근 허혈보다는 심실 비대나 각차단 등의 기저 질환에 의해 유발됩니다. 환자의 임상 정보와 심전도 소견을 종합할 때, 좌심실 비대에 따른 이차적인 ST-T분절 변화로 해석하는 것이 가장 적절합니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "다음과 같은 심전도 소견을 보일 때 허혈의 병태생리를 적절히 설명하는 것은?", "images": [], "text_box": null, "options": ["하벽에서 심내막하 허혈이 발생하였다.", "측부혈류가 발달해 있다.", "혈전의 주요 성분은 섬유소이다.", "손상전류가 후벽으로 향하고 있다.", "심근 산소 요구량 증가에 따른 변화이다."], "answer": [2], "explanation": "제시된 심전도에서 V2-V4 유도에서 ST분절 상승이 관찰되므로 급성 전벽 ST분절 상승 심근경색(STEMI)이 발생했음을 추측할 수 있습니다. 급성 ST분절 상승 심근경색은 혈전으로 인한 관상동맥의 완전 폐쇄로 인해 발생하며, 이 혈전의 주요 성분은 섬유소입니다. 심내막하 허혈 시에는 혈소판이 주 성분인 혈전이 형성되지만, 전층 허혈 시에는 섬유소 중심의 혈전이 더 중요합니다. 따라서 혈전의 주요 성분이 섬유소라고 설명하는 것이 적절합니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "심근허혈이 발생시 심전도에서 관찰할 수 있는 역변화에 대한 설명이다. 맞는 것은?", "images": [], "text_box": null, "options": ["심내막하 허혈에서 흔히 관찰된다.", "심외막염에서 관찰된다", "심내막하 허혈에서 전층허혈로 이행단계에 관찰되는 소견이다.", "전층 측벽허혈진단에 중요하다", "T wave가 뒤집어져서 나타난다"], "answer": [3], "explanation": "역변화(Reciprocal change)는 허혈 부위의 ST분절 상승과 대칭되는 유도에서 ST분절 하강이 나타나는 현상입니다. 이는 급성 전층 허혈, 특히 ST분절 상승 심근경색(STEMI)의 중요한 진단적 소견으로, 손상 전류가 특정 방향으로 흐를 때 반대편에서 나타나는 전기적 변화입니다. 특히 전층 측벽 허혈과 같이 광범위한 허혈의 진단에 중요한 단서가 됩니다. 심내막하 허혈에서는 손상 전류의 방향이 분산되어 역변화가 잘 관찰되지 않습니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "흉통으로 내원한 67세 여환. 심전도에서 RCA 근위부 폐색 시사하는 소견은?", "images": [], "text_box": null, "options": ["유도 IST분절 하강", "유도 III ST분절 상승", "유도 V1 ST분절 상승", "유도 V4 ST분절 변화 없음", "유도 aVR ST분절 변화 없음"], "answer": [2], "explanation": "제시된 심전도에서 II, III, aVF 유도에서 ST분절 상승이 관찰되어 하벽 심근경색(Inferior MI)을 시사합니다. 하벽 심근경색은 주로 우관상동맥(RCA)의 폐색으로 인해 발생합니다. 특히 RCA 근위부 폐색 시에는 우심실 경색이 동반되는 경우가 많으며, 우심실 경색은 V1 유도에서 ST분절 상승으로 나타나는 특징이 있습니다. 따라서 V1 유도의 ST분절 상승은 RCA 근위부 폐색을 시사하는 중요한 소견입니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "심전도 진단은?", "images": [], "text_box": null, "options": ["안정형 협심증", "불안정형 협심증", "측벽 비ST분절 상승 심근경색증", "전벽 ST분절 상승 심근경색증", "하벽 ST분절 상승 심근경색증"], "answer": [4], "explanation": "제시된 심전도에서 II, III, aVF 유도에서 뚜렷한 ST분절 상승이 관찰됩니다. 이러한 소견은 심장의 하벽 부위에 급성 허혈성 손상이 발생했음을 의미하는 급성 하벽 ST분절 상승 심근경색증(Acute inferior wall STEMI)의 전형적인 지표입니다. 임상적으로 환자의 흉통과 함께 이러한 심전도 변화는 즉각적인 재관류 치료가 필요한 응급 상황임을 나타냅니다. 따라서 하벽 ST분절 상승 심근경색증으로 진단할 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "비 ST분절 상승 심근경색증에 비교하여 ST분절 상승 심근경색증의 특징을 설명하는 것은?", "images": [], "text_box": null, "options": ["측부혈류가 발달한 경우가 많다.", "부분 폐색인 경우가 많다.", "다 혈관질환인 경우가 많다.", "전층 허혈인 경우가 더 많다.", "좌주간주 병변인 경우가 많다."], "answer": [3], "explanation": "ST분절 상승 심근경색증(STEMI)은 관상동맥의 완전 폐색으로 인해 심근 전체 두께에 걸쳐 발생하는 전층 허혈(transmural ischemia)이 주된 특징입니다. 반면 비ST분절 상승 심근경색증(NSTEMI)은 부분적인 혈류 차단이나 측부 순환 발달 등으로 인해 심내막하 허혈에 국한되는 경우가 많습니다. 따라서 STEMI는 NSTEMI에 비해 전층 허혈이 발생하는 경우가 더 많습니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "하기저벽(후벽) or 전벽 심근경색증을 시사하는 심전도 변화를 관찰할 수 있는 유도는?", "images": [], "text_box": null, "options": ["1", "III", "aVR", "V3", "V6"], "answer": [3], "explanation": "전벽 심근경색은 V2, V3, V4 유도에서 ST분절 상승으로 나타나며, 후벽 심근경색은 V2, V3 유도에서 ST분절 하강(역변화)으로 나타나는 경우가 많습니다. 특히 V3 유도는 전벽과 중격의 변화를 모두 반영할 수 있으며, 후벽 경색의 역변화도 관찰될 수 있는 중요한 유도입니다. 따라서 V3 유도는 전벽 또는 후벽 심근경색증을 시사하는 심전도 변화를 관찰하는 데 중요한 역할을 합니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "허혈에 의한 ST 분절 변화가 일어난 곳은?", "images": [], "text_box": null, "options": ["1", "aVR", "aVL", "V2", "V5"], "answer": [3], "explanation": "허혈에 의한 ST분절 변화는 일차성 ST분절 변화와 이차성 ST분절 변화로 나눌 수 있습니다. 일차성 ST분절 변화는 QRS파의 모양이 정상인 상태에서 허혈로 인해 직접적으로 ST분절에 변화가 나타나는 것을 의미합니다. 제시된 심전도에서 V2 유도에서 ST분절 상승이 관찰되며, QRS파가 비교적 정상적인 모양을 유지하고 있어 일차성 변화로 판단됩니다. 다른 유도들에서는 QRS파의 폭이 넓거나 비정상적인 형태를 보여 이차성 변화일 가능성이 높습니다."}, {"subject": "허혈성 심질환의 심전도", "year": [], "professor": "", "question": "심한 흉통으로 내원한 52세 남자의 심전도이다. 유도 aVL 심전도 변화에 대한 설명 중 맞는 것은?", "images": [], "text_box": null, "options": ["측벽 전층허혈에 의한 손상 전류.", "측벽 심내막하허혈에 의한 손상 전류.", "하벽 전층허혈에 의한 손상 전류.", "하벽 심내막하 허혈에 의한 손상 전류", "비허혈성 이차성 ST 분절 변화"], "answer": [2], "explanation": "제시된 심전도에서 II, III, aVF 유도에서 ST분절 상승이 명확하게 관찰됩니다. 이는 급성 하벽 심근경색(Inferior wall STEMI)을 시사하는 전형적인 소견입니다. 하벽 심근경색이 발생하면, 하벽에 혈액을 공급하는 관상동맥의 폐색으로 인해 해당 부위의 심근이 전층 허혈 상태에 빠집니다. aVL 유도에서 관찰되는 ST분절 하강은 하벽 유도의 ST분절 상승에 대한 역변화(reciprocal change) 소견입니다. 이는 하벽 전층허혈에 의한 손상 전류의 결과로 나타납니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["21학번", "20학번", "18학번"], "professor": "", "question": "진단명은?", "images": [], "text_box": "72세 남자 환자로 1시간 이상 지속되는 흉부 통증을 주소로 응급실로 내원하였다. 아침부터 간헐적으로 불편함 이 느껴졌었고 내원 전부터 점차 심해짐을 느꼈고 통증은 쓰리고 타는 듯한 양상으로 가슴 가운데서 발생하였다. 현재도 흉통 정도가 10에서 7 정도 남아있다. 당시 혈압은 120/75 mmHg이며 동맥혈 산소포화도는 91%이다. 약간의 호흡곤란을 호소한다. 심전도는 아래와 같다. 응급으로 Troponin T, CK-MB는 정상수치였다. 기저질환으로는 당뇨 및 고혈압이 있어서 약 물 복용 중이다.", "options": ["안전형 협심증", "불안정형 협심증", "비ST분절 상승 심근경색증", "ST분절 상승 심근경색증", "이형 협심증"], "answer": [1], "explanation": "점차 심해지는 양상의 흉통으로, cardiac enzyme이 정상수치이기에 unstable angina같습니다. 심전도에서 ST elevation 소견이 없음을 볼 수 있습니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["21학번", "10학번"], "professor": "정욱성", "question": "치료로 적당하지 않은 것은?", "images": [], "text_box": "4시간 전부터 지속적인 흉통을 호소하는 환자의 심전 도 및 혈액검사 소견이다. CPK/LDH: 560/720IU/L, CK-MB: 16 ng/mL (NL: 0-5) AST/ALT: 56/24 IU/L, Troponin T: positive", "options": ["아스피린", "헤파린", "혈전용해제", "Abciximab", "관동맥 확장술"], "answer": [2], "explanation": "NSTEMI에서 혈전용해제 투여는 금기이다"}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["21학번", "20학번"], "professor": "허성호", "question": "심전도 변화를 설명하는 관상동맥 병변의 특징은?", "images": [], "text_box": "66세 여자가 7일 전부터 흉통이 있었다. 병원 방문 당일에는 안정시에도 증상이 있었다.", "options": ["좌전하행동맥 95% 만성 협착", "좌전하행동맥 만성 폐색", "좌전하행동맥 95% 급성 협착", "좌전하행동맥 급성 폐색", "좌주간동맥 만성 폐색"], "answer": [2], "explanation": "안정시에도 증상이 있는 것을 보아하니 unstable angina 같습니다. 심전도 상에서 ST depression이 생김을 배웠습니다만 특징은 배운 적이 없습니다. 다음 교시 문제일 수도??"}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["21학번"], "professor": "허성호", "question": "아래 문항 중 제일 먼저 해야 하는 약제 및 처치는?", "images": [], "text_box": "상기 81세 남환, 내원 4시간 전 발생한 가슴 중앙의 쥐어짜는 느낌의 가슴 통증을 주소로 119신고 후 응급실에 내원함. 한번 아프면 통증 정도가 10점 만점에 5점 이상으로 약 10분가량 아픈 것이 반복된다고 함. 혀밑에 nitroglycerin 설하 투여하였으나 흉통이 좋아지지 않음. 혈압은 149/84mmHg, 맥박수 101 bpm, 호흡수 20회/min, 심근효소수치 Troponin T 0.035 (참고치 0.01-0.1), CK-MB 11.37(참고치 0.1-6.7) 이다. 기저 질환으로는 고혈압, 당뇨가 있는 환자이다.", "options": ["베타차단제를 즉시 복용하게 한다.", "칼슘차단제를 즉시 복용하게 한다.", "안지오텐신 전환 효소 억제제를 빨리 복용하게 한다.", "빨리 아스피린 및 클로피도그렐을 부하용량에 맞게 복용시킨다.", "소염진통제를 빨리 복용하게 한다."], "answer": [3], "explanation": "수업 때 antiplatelet agent로 aspirin과 clopidogrel을 배웠었죠, MI 상황에서 사용 가능하다고 배웠습니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["20학번", "19학번", "16학번", "15학번", "13학번", "12학번"], "professor": "정욱성", "question": "ST 분절 비상승 급성심근경색증 환자에서 예후가 양호한 경우는?", "images": [], "text_box": null, "options": ["심방조기수축 (APC) 부정맥의 빈발", "심근효소의 상승", "지속되는 흉통", "Aspirin을 이미 복용하고 있는 환자", "65세 이상"], "answer": [0], "explanation": "Aspirin을 이미 복용하고 있는 환자는 예후가 불량하다. 부정맥 중에서는 VT, VF이 빈발하는 경우가 예후가 불량하다. 그러나 APC 빈발은 예후에 영향을 미치지 않는다"}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["19학번"], "professor": "허성호", "question": "심전도 소견.(V2~V5? ST depression) 적절한 치료 및 처치는?", "images": [], "text_box": "43세 남자가 2시간전 발생한 지속적인 심한 가슴 통증으로 응급실에 왔다. 원래 1달에 1번 헬스장에서 운동시 5분정도 답답했다. 심근효소 이상 없었고 담배 50갑년 v/s(90/60 ...) 심음 호흡음 정상.", "options": ["베타블로커 + 심초음파", "니트로글리세린 + 운동부하", "아스피린 + 24h 홀터", "관상동맥조영술", "CCB 경과관찰"], "answer": [3], "explanation": "이번 시간 내용으로는 심근효소이상이 없고, ST depression 이기에 unstable angina라는 것만 알 수 있습니다!"}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["19학번"], "professor": "허성호", "question": "심전도는 다음과 같다. 다음으로 해야 할 조치는?", "images": [], "text_box": "81세 남환이 4시간 전 발생한 흉통을 주소로 응급실에 방문하였다. 흡연력은 50갑년이고, 고혈압/당뇨/고지혈증(중 2갠데 뭔지 기억 안남)이 있다. 10중에 5정도의 통증이 10분정도 지속되었다. 현재 혈압 150/93mmHg, 맥박 101 호흡수 24이다. 청진시 가슴에서 수포음이 들렸고, 심근효소 검사 결과 CK-MB 양성, Troponin-T 양성이었다.", "options": ["베타차단제를 즉시 복용하게 한다", "칼슘차단제를 즉시 복용하게 한다", "안지오텐신 전환효소 억제제를 빨리 복용하게 한다", "아스피린 및 클로피도그렐을 부하용량에 맞게 복용시킨다", "소염진통제를 빨리 복용하게 한다"], "answer": [3], "explanation": "흉통이 있으며, 심근효소 양성이기에 NSTEMI 혹은 STEMI 일 것입니다. 심전도 소견이 ST elevation인지 아닌지 잘 모르겠지만 아마 depression으로 NSTEMI 같습니다. 이번시간에 배운 것은 Acute coronary syndrome에서 aspirin, clopidogrel을 사용한다는 것입니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["18학번", "17학번", "16학번", "15학번", "14학번", "13학번", "12학번"], "professor": "", "question": "Unstable angina 나 NSTEMI 에서 약물치료 중 임상적 이익이 가장 적은 것은?", "images": [], "text_box": null, "options": ["Aspirin", "Ticagrelor", "Statin", "Urokinase", "ACE inhibitor"], "answer": [3], "explanation": "티카그레럴, 스타틴, ACEI는 장기 심장사건을 의미있게 감소시킨다. Unstable angina/NSTEMI에서 혈전용해제(urokinase, t-Pa)는 금기이다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["17학번"], "professor": "", "question": "우선적으로 사용하여야 할 약물은?", "images": [], "text_box": "평소 고혈압이 있는 65세 남자가 안정 시 심한 흉통으로 병원에 왔다. 혈압 160/95mmHg, 맥박 90회/분, 호흡 20회/분, 체온 36.5도, 심전도와 검사결과는 다음과 같다. 트로포닌-T 23ng/L (참고치 0-14)", "options": ["Warfarin", "Ticagrelor", "Urokinase", "Statin", "ACE inhibitor"], "answer": [1], "explanation": "진단은 NSTEMI로 우선적으로 투여하여야 할 약물은 항혈소판제인 ticagrelor 이다. 심근효소인 troponin 수치가 증가하였고, ST elevation 소견이 보이지 않고 depression 소견이 보이므로 NSTEMI입니다. 우선적으로 투여하는 것이 ticagrelor인가보네요..!"}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["17학번"], "professor": "", "question": "약물 치료 중 임상적 이익이 적은 것은?", "images": [], "text_box": "평소 고혈압이 있는 65세 남자가 안정 시 심한 흉통으로 병원에 왔다. 혈압 160/95mmHg, 맥박 90회/분, 호흡 20회/분, 체온 36.5C 이다. 심전도와 검사결과는 다음과 같다. 트로포닌-T 23ng/L (참고치 0-14)", "options": ["Aspirin", "Ticagrelor", "Urokinase", "Statin", "ACE inhibitor"], "answer": [2], "explanation": "공식해설: 아스피린, 티카그렐럴, 스타틴 ACEI는 장기 심장사건을 의미있게 감소시킨다. 안정시 심한 흉통, troponin 수치 증가, 심전도의 ST elevation 으로보아 STEMI입니다. 이번시간에 aspirin과 ticagrelor가 효과있다는 것을 배웠습니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["15학번"], "professor": "정욱성", "question": "다음 중 ST 상승 심근경색의 합병증이 아닌 것은?", "images": [], "text_box": null, "options": ["심실 빈맥", "심부전", "심막염", "대동맥판 폐쇄부전", "심실 중격 결손"], "answer": [3], "explanation": "유두근 파열이나 기능장애로 인한 승모판 폐쇄부전은 가능하나 대동맥판 폐쇄부전은 아니다. STEMI의 합병증은 다음 9가지입니다. Pump failure, cardiogenic shock → Congestive heart failure로 이어짐. Free wall rupture. Ventricular septum defect. Mitral regurgitation. RV infarction. Arrhythmia. Pericarditis (Dressler's syndrome). Thromboembolism. LV aneurysm."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["12학번"], "professor": "", "question": "Unstable angina와 NSTEMI의 약물치료 중 임상적인 이익이 가장 적은 것은?", "images": [], "text_box": null, "options": ["아스피린", "클로피도그렐", "스타틴", "나이트레이트", "베타차단제"], "answer": [3], "explanation": "아스피린, 클로피도그렐, 스타틴, 베타차단제는 Unstable angina 및 NSTEMI 환자에서 장기적인 심혈관 사건 발생률을 감소시켜 임상적 이익이 큰 약제들입니다. 나이트레이트는 흉통 완화에 효과적이지만, 사망률 감소와 같은 장기적인 임상적 이익은 제한적입니다. 따라서 임상적 이익이 가장 적은 것은 나이트레이트입니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["11학번"], "professor": "정욱성", "question": "ST 분절 비상승 급성심근경색증 환자에서 나쁜 예후를 시사하는 소견이 아닌 것은?", "images": [], "text_box": null, "options": ["60세 이상", "심근 효소의 상승", "지속되는 통증", "Aspirin을 이미 복용하고 있는 환자", "심실조기수축(VPC) 부정맥의 빈발"], "answer": [4], "explanation": "VT, Vfib이 빈발하는 경우 예후가 불량합니다. 그러나 VPC 빈발은 예후와 무관합니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": ["09학번"], "professor": "정욱성", "question": "시행해야 할 검사는?", "images": [], "text_box": "53세 남자가 30분동안 지속되는 흉통으로 내원하였다.", "options": ["심전도, 심근효소검사, 심초음파", "심전도, 운동부하심전도검사, 심초음파", "심초음파 부하심근관류스캔, 심근효소검사", "심전도, 도부타민 심초음파, 심근효소검사", "흉부 X선 촬영, 심전도, 운동부하심전도검사"], "answer": [0], "explanation": "아파죽겠다는데 부하검사하면 고소당합니다. 부하만 빼도 남는건 1번."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "필요한 항혈전제는?", "images": [], "text_box": "3년 동안 생활습관개선과 처방받은 약물치료 중 7일전 2시간 지속하는 심한 흉통이 있어 외래를 방문하였다. 현재 가슴통증은 없다고 하였고 아래는 심전도이다. Troponin은 정상 상한치의 5배 이상 상승하였다.", "options": ["아스피린", "와파린", "비-비타민-K 길항 항응고제", "헤파린", "혈전용해제"], "answer": [0], "explanation": "급성기 이후 내원한 경우에 해당이 되어 재발 예방 목적으로 아스피린을 사용한다"}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "다음과 같은 심전도 변화가 있을 때 심근허혈 발생의 병태생리는?", "images": [], "text_box": null, "options": ["불안정 죽상반 혈전에 의한 완전 폐색이다.", "불안전 죽상반 혈전에 의한 부분 폐색이다.", "관상동맥 연축에 의한 완전 폐색이다.", "안정된 죽상반 협착이다.", "심한 좌심실 비대이다."], "answer": [1], "explanation": "급성 비 ST분절 상승 전벽 심근경색증이다. 이 질환의 병태생리는 불안정 죽상반의 erosion 혹은 rupture에 따른 혈전이 발생하여 갑작스런 관상동맥의 부분 폐색에 의한 심내막하 허혈이다"}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "급성심근경색증의 혈전용해요법 후 성공적인 재관류의 증거는?", "images": [], "text_box": null, "options": ["accelerated idioventricular rhythm의 빈발", "Q 파의 소실", "VPC의 빈발", "AV block의 빈발", "심근표식자의 후기상승"], "answer": [0], "explanation": "가속성 심실고유율동(accelerated idioventricular rhythm)은 성공적인 재관류의 대표적인 증거 중 하나입니다. 재관류 후 허혈 상태가 호전되면서 심실 자율 신경계의 활성도가 변화하여 발생합니다. 다른 보기들은 재관류 성공과 직접적인 관련이 적거나 오히려 좋지 않은 예후를 시사할 수 있습니다. 예를 들어, Q파 소실은 재관류 여부와 무관하게 나타날 수 있습니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "Unstable angina 나 NSTEM1 에서 약물치료 중 임상적 이익이 가장 적은 것은?", "images": [], "text_box": null, "options": ["Aspirin", "Ticagrelor", "Statin", "Urokinase", "ACE Inhibitor"], "answer": [3], "explanation": "아스피린, 티카그레럴, 스타틴, ACEI는 장기 심장사건을 의미있게 감소시킨다. Unstable agina/NSTEMI에서 혈전용해제(urokinase, t-Pa)는 금기이다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "이 환자의 생존율을 증가시킬 수 있는 약제가 아닌 것은?", "images": [], "text_box": "66세 여자가 1시간 전부터의 갑작스런 흉통을 호소하며 응급실에 왔다. 심전도이다.", "options": ["스타틴", "클로피도그렐", "여성호르몬", "안지오텐신 전환효소 차단제", "베타차단제"], "answer": [2], "explanation": "여성호르몬 치료는 사망률을 증가시킬 수 있다"}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "다음 중 취약 죽상반의 병리소견에서 안정형 죽상반에 비해 증가 되어있지 않는 것은?", "images": [], "text_box": null, "options": ["거품세포의 자멸에 의한 세포 부스러기 (cell debris)", "대식세포", "T 림프구", "평활근 세포 5", "지질 핵(lipid core)"], "answer": [3], "explanation": "다른 세포들과 달리 취약 죽상반에서 평활근 세포의 기능은 떨어져서 extracellular matrix의 형성이 적고 proteolytic enzyme의 활성화로 thin fibrous cap이 형성된다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "가장 우선적으로 고려해야할 다음 치료는?", "images": [], "text_box": "60세 남자 환자가 내원 2시간 전부터 갑자기 시작되어 점차 악화되는 흉통을 주소로 내원하였다. 아스피린, 클로피도그렐, 저분자량 헤파린을 투여 후 중환자실에 안정 치료 중 다음 날 다시 악화되었다. Troponin이 상승하였다. 이 환자의 심전도 소견이다.", "options": ["칼슘길항제 경구 투여", "나이트레이트 정주", "혈전 용해제 정주", "당단백 Ⅱb/Ⅲa 정주", "관상동맥중재술"], "answer": [4], "explanation": "충분한 기간 동안 항혈전제 투여하면서 경과 관찰에도 흉통이 지속되는 증례로 관상동맥중재술을 시행한다"}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "NSTEMI 환자에서 예후가 양호한 경우는?", "images": [], "text_box": null, "options": ["65세 이상", "심근 효소의 상승", "지속되는 흉통", "심방조기수축(APC) 부정맥의 빈발", "Aspirin을 이미 복용하고 있는 환자"], "answer": [3], "explanation": "Aspirin을 이미 복용하고 있는 환자는 예후가 불량 하다. 부정맥 중에서는 VT, VF가 빈발하는 경우 예후가 불량하다. TIMI score 해당 항목은 나이(age > 65), angina 24시간 내 2회 이상, 이미 aspirin 복용, known CAD, CAD risk factor 3개 이상, cardiac enzymes, ST deviation(0.5mm)이다. APC나 VPC는 있어도 의학적으로 크게 의미 있는 condition이 아님."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "급성관상동맥증후군을 발생시키는 Vulnerable plaque 의 조직학적 특징이 아닌 것은?", "images": [], "text_box": null, "options": ["Cytokine의 증가", "Lipid core가 상대적으로 큼", "Matrix metalloproteinase의 증가", "Collagen의 증가", "Vulnerable plaque의 얇은 어깨부분이 파열"], "answer": [3], "explanation": "ACS를 야기하는 Vulnerable plaque에는 collagen이 감소되어 있는 것이 특징이다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "가장 적절하지 않은 치료는?", "images": [], "text_box": "85세 남자가 1시간 이상 지속되는 심한 안정 시 흉통 이 있어 응급실에 왔다. 심전도는 다음과 같았으며 troponin과 CK-MB의 상승을 보였다.", "options": ["아스피린", "베타차단제", "혈전용해제", "GP Ⅱb-Ⅲa 억제제", "헤파린"], "answer": [2], "explanation": "1시간 이상 지속되는 심한 안정 시 흉통과 cardiac marker (+)이므로 우선 ACS를 의심할 수 있습니다. EKG 상에서는 ST 분절의 변화가 크지 않고 V2-V6에 걸쳐서 inverted T wave가 나타나므로 ACS 중에서도 NSTEMI로 보입니다. 이 때 aspirin, clopidogrel, GP Ⅱ b-Ⅲa inhibitor 등 항혈소판제, 그리고 heparin, LMWH, fondaparinux 등의 항응고제 등을 사용할 수 있습니다. 증상의 완화를 위해서는 nitrates(ex. NIG), β-blockers, morphine 등을 투여할 수 있습니다. 단, NSTEMI에서 나 타나는 혈전은 혈소판이 응집된 white thrombus이므로 fibrin을 용해시키는 혈전용해제는 효과가 없습니다. 오히 려 혈전용해제는 정상 지혈작용을 막아 뇌출혈 등의 부작 용을 일으킬 수 있으므로 투여해서는 안 됩니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "적절한 초기 치료가 아닌 것은?", "images": [], "text_box": "62세 남자가 30분 이상 지속되는 심한 안정 시 심한 흉통을 주소로 내원하여 찍은 심전도이다.", "options": ["아스피린 투여", "크로피도그렐 투여", "Glycoprotein IIb/IIIa 억제제 투여", "Urokinase 투여", "베타차단제 투여"], "answer": [3], "explanation": "30분 이상 지속되는 심한 흉통과 심전도 소견(ST elevation 추정)을 고려할 때 급성 심근경색증, 특히 STEMI로 의심됩니다. STEMI의 초기 치료에는 항혈소판제(아스피린, 클로피도그렐, Glycoprotein IIb/IIIa 억제제), 항응고제(헤파린), 베타차단제 등이 포함됩니다. Urokinase와 같은 혈전용해제는 특정 조건하에 사용되지만, NSTEMI에서는 금기이며, STEMI에서도 PCI(경피적 관상동맥 중재술)가 우선적으로 고려됩니다. 초기 치료 선택지 중 Urokinase는 가장 적절하지 않거나 금기일 수 있습니다."}, {"subject": "비ST분절 상승 급성관동맥증후군,이형성 협심증", "year": [], "professor": "", "question": "NSTEMI 환자에서 예후가 가장 양호한 경우는?", "images": [], "text_box": null, "options": ["65세 이상", "심근효소의 상승", "VPC 부정맥의 빈발", "지속되는 흉통", "Aspirin을 이미 복용하고 있는 환자"], "answer": [2], "explanation": "NSTEMI 환자의 예후를 예측하는 TIMI 점수 등에서 고령(65세 이상), 심근 효소 상승, 지속되는 흉통, 아스피린 복용 중 발생 등은 모두 예후 불량을 시사하는 인자입니다. 심실조기수축(VPC)은 흔하게 나타날 수 있는 부정맥으로, 심실세동(VF)이나 심실빈맥(VT)과 같은 치명적인 부정맥에 비해 예후에 미치는 영향이 적습니다. 따라서 VPC 부정맥의 빈발은 다른 보기들에 비해 예후가 양호한 경우에 해당합니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["21학번"], "professor": "정욱성", "question": "다음 중 비 ST 분절 상승 급성 관동맥 증후군의 조기 침습적 치료 방침의 결정에 고려하는 요소가 아닌 것은?", "images": [], "text_box": null, "options": ["6개월 이내의 관상동맥 중재술 및 우회수술 기왕력", "급사의 가족력", "지속성 심실 빈맥", "당뇨", "심부전"], "answer": [1], "explanation": "비ST분절 상승 급성 관상동맥 증후군(NSTE-ACS) 환자에서 조기 침습적 치료(예: 관상동맥조영술 및 재관류술) 방침을 결정할 때는 환자의 고위험 인자들을 고려합니다. 주요 고위험 요소로는 6개월 이내의 관상동맥 중재술 또는 우회수술 기왕력, 지속성 심실 빈맥, 당뇨병, 심부전 등이 포함됩니다. 이러한 인자들은 환자의 예후를 악화시키고 조기 침습적 치료의 필요성을 높입니다. '급사의 가족력'은 일반적인 심혈관 질환 위험 인자일 수 있으나, NSTE-ACS 환자의 조기 침습적 치료를 결정하는 직접적인 고위험 기준에는 포함되지 않습니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["21학번"], "professor": "정욱성", "question": "응급실에서 관상동맥조영술 전에 우선적으로 투여해야 하는 약물은? (3가지)", "images": [], "text_box": "70세 남자가 심한 안정 시 흉통이 있어 응급실에 왔다. 130/70 mmHg, 맥박98회/분, 체온37.0도였다. Troponin과 CK-MB 음성이며 심전도는 다음과 같다.", "options": ["아스피린", "와파린", "t-PA", "클로피도그렐", "Glycoprotein IIb/IIIa 억제제", "Low molecular weight heparin", "티카그렐러", "니페디핀", "엔지오텐신전환효소길항제", "스타틴", "나이트레이트", "베타차단제"], "answer": [0, 3, 5], "explanation": "환자는 심한 안정 시 흉통과 심근 효소 음성, ST분절 상승 없음으로 불안정형 협심증(UA)으로 진단됩니다. 관상동맥조영술 전에 우선적으로 투여해야 하는 약물은 이중 항혈소판 요법(DAPT)과 항응고 요법입니다. 이중 항혈소판 요법으로는 아스피린과 P2Y12 억제제(클로피도그렐 또는 티카그렐러)를 함께 투여합니다. 항응고제로는 헤파린(비분획 헤파린 또는 저분자량 헤파린)이 사용됩니다. 따라서 아스피린, 클로피도그렐, 저분자량 헤파린이 가장 적절한 약물 조합입니다. 티카그렐러는 클로피도그렐과 같은 P2Y12 억제제이므로 동시에 투여하지 않습니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["21학번"], "professor": "정욱성", "question": "칼슘 차단제를 일차 치료 약제로 선택할 수 있는 질환은?", "images": [], "text_box": null, "options": ["안정형 협심증", "불안정형 협심증", "비 ST분절 상승 심근경색증", "ST분절 상승 심근경색증", "이형성 협심증"], "answer": [4], "explanation": "이형성(변이형) 협심증은 관상동맥의 경련이 주된 병태생리이므로, 혈관 경련을 효과적으로 예방하는 칼슘 채널 차단제(CCB)가 일차 치료 약제로 선택됩니다. 안정형 협심증이나 불안정형 협심증, 심근경색증과 같은 다른 허혈성 심장 질환에서는 주로 베타차단제, 항혈소판제 등이 일차 치료로 사용되며, 칼슘 차단제는 이차 약제 또는 베타차단제 금기 시 고려됩니다. 따라서 칼슘 차단제가 일차 치료 약제로 가장 적합한 질환은 이형성 협심증입니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["21학번"], "professor": "정욱성", "question": "환자의 임상경과 개선에 도움이 되는 비경구 항혈전제는?", "images": [], "text_box": "흉통으로 내원한 환자의 심전도이다.", "options": ["아스피린", "클로피도그렐", "와파린", "저분자량헤파린", "유로키나제"], "answer": [3], "explanation": "심전도 소견과 임상 증상으로 보아 NSTEMI 환자입니다. NSTEMI 환자의 임상 경과 개선에 도움이 되는 약제로는 항혈소판제(아스피린, 클로피도그렐 등)와 항응고제가 있습니다. 아스피린과 클로피도그렐은 경구 약제입니다. 와파린은 경구 항응고제이지만, 급성 NSTEMI에서는 일반적으로 사용되지 않습니다. 유로키나제는 혈전용해제로, NSTEMI에서는 금기입니다. 저분자량 헤파린(LMWH)은 침습적 시술 준비를 포함하여 NSTEMI 환자에게 표준적으로 사용되는 비경구 항응고제(항혈전제)입니다. 따라서 저분자량 헤파린이 가장 적절한 비경구 항혈전제입니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["21학번"], "professor": "허성호", "question": "아래 내용 중 제일 먼저 해야 하는 약제 및 처치는?", "images": [], "text_box": "81세 남환, 내원 4시간 전 발생한 가슴 중앙의 쥐어짜는 느낌의 가슴 통증을 주소로 119 신고 후 응급실에 내원함. 한번 아프면 통증 정도가 10점 만점에 5점 이상으로 약 10분가량 아픈 것이 반복된다고 함. 혀밑에 nitroglycerin 설하 투여하였으나 흉통이 좋아지지 않음. 혈압은 149/84mmHg, 맥박수 101 bpm, 호흡수 20회/min, 심근효소수치 Troponin T 0.035 (참고치 0.01-0.1), CK-MB 11.37(참고치 0.1-6.7) 이다. 기저질환으로는 고혈압, 당뇨가 있는 환자이다.", "options": ["베타차단제를 즉시 복용하게 한다.", "칼슘차단제를 즉시 복용하게 한다.", "안지오텐신 전환 효소 억제제를 빨리 복용하게 한다.", "빨리 아스피린 및 클로피도그렐을 부하용량에 맞게 복용시킨다.", "소염진통제를 빨리 복용하게 한다."], "answer": [3], "explanation": "환자는 안정 시 심한 흉통과 심근 효소(CK-MB) 상승이 있지만 ST분절 상승이 없으므로 NSTEMI로 진단됩니다. 급성 관상동맥 증후군이 의심되는 모든 환자에게는 아스피린을 즉시 투여하는 것이 강력히 권고됩니다. 추가적으로 클로피도그렐과 같은 P2Y12 억제제를 부하 용량으로 투여하여 혈소판 활성을 억제해야 합니다. 이 환자는 재발성 흉통, 심근 표지자 상승 등 여러 위험 요소를 가지고 있어 조기 침습적 치료가 필요하며, 이중 항혈소판 요법이 필수적입니다. 베타차단제, 칼슘차단제, ACE 억제제 등은 상황에 따라 사용되지만, 항혈소판제가 최우선 약물입니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["21학번"], "professor": "허성호", "question": "심근효소 수치는 정상. 진단은?", "images": [], "text_box": "42세 여자가 2개월 전부터 가슴이 아파서 병원에 왔다. 가슴통증은 10분 이내였고, 등산 도중에 발생하였으며, 1주 전부터는 평지를 조금만 걸어도 발생하였다. 고혈압과 이상지질혈증을 앓고 있었다. 가슴통증을 호소하였을 당시 심전도(위)와 니트로글리세린을 혀 밑에 넣은 후의 심전도(아래)이다.", "options": ["변이형 협심증", "급성 심장막염", "불안정 협심증", "비 ST분절 상승 심근 경색", "후벽부 심근 경색"], "answer": [2], "explanation": "환자는 2개월 전부터 등산 시 발생하던 흉통이 1주 전부터는 가벼운 활동 시에도 발생하는 Crescendo pattern angina 양상을 보입니다. 심근 효소 수치가 정상이므로 심근경색증(MI)은 배제됩니다. 흉통 발생 시 심전도에서 ST분절 상승은 없었지만 ST분절 하강이 관찰되었습니다. 니트로글리세린 투여 후 심전도가 정상화된 것은 혈관 확장으로 허혈이 해소되었음을 시사합니다. 따라서 심근 손상 없이 흉통이 악화되는 양상을 보이는 불안정형 협심증(Unstable angina)이 진단됩니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["21학번"], "professor": "허성호", "question": "사용할 수 있는 약제 및 처치가 잘 연결되어 있는 것은?", "images": [], "text_box": "79세 여자환자가 흉통 및 호흡곤란, 기면상태로 내원하였고 혈압은 60/30, 호흡수 95, troponin T와 CK-MB 상승이다.", "options": ["베타차단제를 즉시 복용하게 한다", "칼슘차단제를 즉시 복용하게 한다", "안지오텐신 전환효소 억제제를 빨리 복용하게 한다", "levin tube를 삽입한 후 빨리 아스피린 및 클로피도그렐을 부하용량에 맞게 복용시킨다.", "소염진통제를 빨리 복용하게 한다"], "answer": [3], "explanation": "환자는 심근 효소 상승과 ST분절 상승이 없는 비ST분절 상승 심근경색증(NSTEMI)이지만, 혈압 60/30mmHg로 심인성 쇼크 상태에 해당합니다. 심인성 쇼크 환자에게는 혈압을 낮추는 베타차단제, 칼슘차단제, ACE 억제제 등은 금기입니다. 급성 심근경색증의 초기 치료로 항혈소판제인 아스피린과 클로피도그렐 투여가 필수적이나, 기면 상태이므로 경구 투여가 어려워 Levin tube를 통해 부하 용량으로 투여해야 합니다. 일반 소염진통제(NSAIDs)는 급성 심근경색증에서 사용하지 않으며, 통증 조절이 필요한 경우 모르핀을 사용합니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["19학번"], "professor": "허성호", "question": "적절한 치료 및 처치는?", "images": [], "text_box": "43세 남자가 2시간 전 발생한 지속적인 심한 가슴 통증으로 응급실에 왔다. 원래 1달에 1번 헬스장에서 운동시 5분 정도 답답했다. 심근효소 이상 없었고, 담배 50갑년, v/s(90/60 …), 심음 호흡음 정상. 심전도 소견(V2~V5? ST depression).", "options": ["베타블로커 + 심초음파", "니트로글리세린 + 운동부하", "아스피린 + 24h 홀터", "관상동맥조영술", "CCB 경과관찰"], "answer": [3], "explanation": "환자는 기존 운동 시 흉통이 악화되어 안정 시에도 지속되는 심한 흉통을 겪고 있으며, 심근효소 수치는 정상이므로 불안정형 협심증으로 진단됩니다. 심전도 상 ST분절 하강과 혈압이 낮은 혈역학적 불안정 소견이 동반되어 고위험군에 해당합니다. 이러한 고위험 불안정형 협심증 환자에게는 보존적 치료보다는 관상동맥조영술을 통한 스텐트 삽입술 등 조기 침습적 치료가 강력히 권고됩니다. 혈압이 낮으므로 베타차단제는 피해야 하며, 불안정한 상태에서 운동부하검사나 홀터 검사는 적절하지 않습니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["18학번", "17학번", "16학번", "15학번", "14학번", "13학번", "12학번"], "professor": "정욱성", "question": "가장 적절한 약물 치료는?", "images": [], "text_box": "55세 흡연을 하는 남자가 새벽에 발생하는 심한 안정 시 흉통으로 병원에 왔다. 관상동맥조영술 검사에서는 의미 있는 결과가 없었고 아르고노빈 연축유발검사에서는 양성을 보였다.", "options": ["유로카이네즈", "아스피린", "클로피드그릴", "니페디핀", "아데놀롤"], "answer": [3], "explanation": "환자는 새벽에 발생하는 안정 시 흉통과 에르고노빈 유발검사 양성 소견을 보여 이형성 협심증(variant angina)으로 진단됩니다. 이형성 협심증은 관상동맥의 경련으로 발생하는 질환이므로, 혈관 경련을 억제하는 약물이 주된 치료입니다. 칼슘 채널 차단제(CCB)인 니페디핀(Nifedipine)이 일차 치료 약제로 가장 적절합니다. 아스피린, 클로피도그렐은 항혈소판제이고, 유로카이네제는 혈전용해제이며, 아데놀롤은 베타차단제로 이형성 협심증에는 적절하지 않습니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["18학번"], "professor": "허성호", "question": "이형성 협심증의 진단에 가장 도움이 되는 검사는?", "images": [], "text_box": null, "options": ["심전도", "심초음파", "운동부하검사", "관상동맥 CT", "관상동맥조영술상 에르고노빈(ergonovine) 연축 유발검사"], "answer": [4], "explanation": "이형성 협심증(Variant angina)의 확진을 위해서는 관상동맥의 경련을 유발하는 검사가 필요합니다. 가장 도움이 되는 검사는 관상동맥조영술을 시행하면서 에르고노빈(ergonovine) 또는 아세틸콜린(acetylcholine)을 혈관 내로 투여하여 관상동맥의 연축을 유도하는 유발 검사(provocation test)입니다. 이 검사를 통해 관상동맥의 일시적인 협착 및 흉통 재현을 확인하여 이형성 협심증을 진단할 수 있습니다."}, {"subject": "비ST분절 상승 급성관동맥 증후군, 이형성 협심증", "year": ["15학번", "14학번"], "professor": "정욱성", "question": "가장 적절하지 않은 치료약물은? (3가지)", "images": [], "text_box": "58세 남자가 심한 안정시 흉통이 있어 응급실에 왔다. 심전도는 다음과 같았으며, troponin과 CK-MB의 상승을 보였다.", "options": ["아스피린", "와파린", "티카그렐로", "클로피도그렐", "Glycoprotein IIb/IIIa 억제제", "Low molecular weight heparin", "Urokinase", "니페디핀", "엔지오텐신전환효소길항제", "스타틴", "나이트레이트", "베타차단제"], "answer": [1, 6, 7], "explanation": "환자는 심한 안정 시 흉통과 트로포닌, CK-MB 상승, ST분절 상승 없음으로 NSTEMI로 진단됩니다. NSTEMI 치료에 적절하지 않은 약물을 선택해야 합니다. 와파린은 급성기 NSTEMI 치료에 일차적으로 사용되지 않는 항응고제입니다. 유로키나제는 혈전용해제로, NSTEMI에서는 임상적 이익이 없고 출혈 위험만 증가시켜 금기입니다. 니페디핀과 같은 칼슘 차단제는 주로 이형성 협심증의 일차 치료제로 사용되며, NSTEMI 급성기에는 혈역학적 상태를 악화시킬 수 있어 일차 치료 약물은 아닙니다. 따라서 와파린, 유로키나제, 니페디핀이 가장 적절하지 않은 치료 약물입니다."}, {"subject": "심방세동", "year": ["18학번"], "professor": "오용석", "question": "이 질환에서 가역적인 원인 발견과 치료방침 결정을 위해 병력 청취 및 검사에서 확인해야 할 사항 중 가장 중요한 3가지는?", "images": [], "text_box": "33세 남자가 2주 전부터 시작된 두근거림을 주소로 외래로 내원하였다. 평소 특이 병력이나 복용하던 약물이 없던 환자로 두근거림은 안정 시에도 미세하게 느껴졌으며 운동 시에 다소 심해지는 양상이었다. 혈압은 120/80mmHg였다. 내원하여 시행한 심전도는 다음과 같았다. (25mm/s, 1mV/10mm)", "options": ["흡연력", "음주력", "방사통 여부", "간기능 섬사", "심장 초음파", "혈중 크레아티닌", "갑상선 기능 검사", "aspirin", "Warfarin", "관상동맥 조영술", "운동부하검사", "NOAC", "amiodarone", "propafenone"], "answer": [1, 4, 6], "explanation": "제시된 심전도는 심방세동을 나타내며, 젊은 환자에게 새로 발생한 심방세동의 원인을 규명하는 것이 중요합니다. 음주력 확인은 심방세동 유발 요인인 'Holiday Heart Syndrome'과 관련이 깊어 필수적입니다. 심장 초음파는 심방 및 심실 구조 평가, 판막 질환 유무 확인 등 구조적 심질환 여부를 파악하는 데 중요합니다. 갑상선 기능 검사는 갑상선 항진증이 심방세동의 중요한 가역적 원인이므로 반드시 확인해야 합니다."}, {"subject": "심방세동", "year": ["18학번"], "professor": "오용석", "question": "심초음파에서 좌심실의 크기는 정상이었고 중등도의 승모판막 협착증 (moderate mitral stenosis)이 발견되었다. 좌심실 수축기능 및 크기는 정상이었고, 국소벽 운동 장애는 관찰되지 않았다. 처음 발견된 심방세동에 대해 rhythm control을 하기로 결정하였다. 이 환자의 항응고 요법 (1가지), 항부정맥제 (1가지)로 적절한 것을 고르시오", "images": [], "text_box": "33세 남자가 2주 전부터 시작된 두근거림을 주소로 외래로 내원하였다. 평소 특이 병력이나 복용하던 약물이 없던 환자로 두근거림은 안정 시에도 미세하게 느껴졌으며 운동 시에 다소 심해지는 양상이었다. 혈압은 120/80mmHg였다. 내원하여 시행한 심전도는 다음과 같았다. (25mm/s, 1mV/10mm)", "options": ["흡연력", "음주력", "방사통 여부", "간기능 섬사", "심장 초음파", "혈중 크레아티닌", "갑상선 기능 검사", "aspirin", "Warfarin", "관상동맥 조영술", "운동부하검사", "NOAC", "amiodarone", "propafenone"], "answer": [8, 13], "explanation": "환자는 심방세동과 중등도의 승모판막 협착증을 진단받았습니다. 판막성 심방세동 환자에서는 CHA2DS2-VASc 점수와 무관하게 뇌졸중 예방을 위해 와파린(Warfarin)이 반드시 사용되어야 합니다. 리듬 조절을 위한 항부정맥제로는 심장 구조에 이상이 없는 경우 프로파페논(Propafenone)이나 플레카이니드(Flecainide)를 고려할 수 있습니다. 환자는 좌심실 크기 및 기능이 정상이고 국소벽 운동 장애가 없어, 프로파페논이 적절한 선택입니다."}, {"subject": "심방세동", "year": ["17학번"], "professor": "오용석", "question": "심전도 사진이다. 치료는?", "images": [], "text_box": "75세 남자가 건강검진에서 발견된 심전도 이상소견으로 병원에 왔다. 10년 전부터 혈압강하제와 혈당강하제를 복용하고 있다. 혈압 180/75, 맥박 80회, 호흡 18회, 체온 36.6도이다. 가슴청진에서 심음은 불규칙한데, 심잡음은 들리지 않고 호흡음은 정상이다.", "options": ["aspirin", "clopidogrel", "cilostazol", "apixaban", "enoxaparin"], "answer": [3], "explanation": "심전도는 심방세동 소견을 보이며, 환자는 75세 남성으로 고혈압과 당뇨를 동반하고 있습니다. 이 환자의 CHA2DS2-VASc 점수는 4점(75세 이상 2점, 고혈압 1점, 당뇨 1점)으로 뇌졸중 발생 위험이 높습니다. 따라서 뇌졸중 예방을 위해 경구 항응고제(NOAC) 치료가 필요합니다. 아픽사반은 NOAC 중 하나이며, 비판막성 심방세동 환자에게 적절한 항응고제입니다."}, {"subject": "심방세동", "year": ["16학번"], "professor": "오용석", "question": "최근 심방세동의 조기 발생 및 유지의 동력원이 되는 부위로 전극도자절제술에 의한 심방세동 치료의 주요 목표가 되는 부위는?", "images": [], "text_box": null, "options": ["동결절", "방실결절", "관상경맥동 입구", "상대정맥", "폐정맥 입구"], "answer": [4], "explanation": "심방세동은 대부분 폐정맥(pulmonary veins)에서 기원하는 비정상적인 전기 신호에 의해 유발됩니다. 따라서 전극도자절제술(catheter ablation)의 주요 목표는 폐정맥과 좌심방 사이의 전기적 연결을 차단하여 부정맥 유발 인자를 제거하는 것입니다. 이를 폐정맥 격리술(pulmonary vein isolation)이라고 하며, 심방세동 치료의 핵심적인 시술입니다."}, {"subject": "심방세동", "year": ["15학번"], "professor": "오용석", "question": "다음 심전도의 진단은?", "images": [], "text_box": "평소 건강하게 지내던 67세 남자가 검진에서 시행한 심전도 소견이다.", "options": ["빈발성 심방 조기 수축", "심방조동", "심방성 빈맥", "Mobitz 1형 2도 방실차단", "심방세동"], "answer": [4], "explanation": "제시된 심전도는 P파가 관찰되지 않으면서 RR 간격이 불규칙하고 QRS 복합체가 좁은 전형적인 심방세동 소견을 보입니다. 심방세동은 심방의 전기적 활동이 매우 빠르고 불규칙하게 발생하여 심실로 전달되는 자극도 무질서해지는 부정맥입니다. 이는 노화, 고혈압, 심부전 등 다양한 원인에 의해 발생할 수 있습니다."}, {"subject": "심방세동", "year": ["15학번"], "professor": "오용석", "question": "이 환자에서 나타날 수 있는 합병증을 모두 고르시오. (2가지)", "images": [], "text_box": "65세 여자가 갑자기 호흡곤란과 심계항진이 있어 응급실로 방문하였다. 당시 심전도는 위와 같았고 혈압은 80/40mmHg 였다. 응급실 당직을 보던 인턴 선생님이 응급상황이라고 보고 바로 DC paddle을 흉부에 부착하고 즉시 150J DC cardioversion을 시행하였다.", "options": ["myocardial infarction", "cerebral infarction", "ventricular fibrillation", "ventricular tachycardia", "PSVT", "atrial flutter", "pneumothorax"], "answer": [1, 2], "explanation": "제시된 심전도는 WPW 증후군을 동반한 심방세동(AF with WPW) 소견으로, 불규칙한 RR 간격과 넓은 QRS파가 특징입니다. WPW 증후군에서 심방세동이 발생하면 부전도로를 통해 심실로 매우 빠른 전도가 일어날 수 있어 심실세동(ventricular fibrillation)으로 진행될 위험이 높습니다. 또한, 심방세동 자체는 좌심방 내 혈전 형성으로 인해 뇌경색(cerebral infarction) 발생 위험이 매우 높으므로, 항응고 요법이 중요합니다."}, {"subject": "심방세동", "year": ["13학번"], "professor": "오용석", "question": "환자의 치료방침 결정 및 근거로 가장 적절한 것은?", "images": [], "text_box": "당뇨와 고혈압으로 치료받던 67세 남자가 3일 전부터 시작된 두근거림으로 내원하였다. 내원하여 시행한 12 유도 심전도에서 lead 2는 다음과 같았다. (25mm/s, 1mV/10mm) 심장 초음파 결과 좌심방비대 이외에 특이 소견이 없었다.", "options": ["조기심방수축이며, 맥박수를 낮춰야 한다.", "좌심방비대가 있으므로 항응고법은 필요하다.", "승모판막 협착증이 없으므로 항응고법은 필요하지 않다.", "뇌졸중 및 색전의 위험인자가 있으므로 항응고법이 필요하다.", "좌심방비대가 있으므로, amiodarone의 투여가 필요하다."], "answer": [3], "explanation": "심전도에서 불규칙한 RR 간격, P파 소실이 확인되어 심방세동으로 진단됩니다. 환자는 67세 남성으로 당뇨와 고혈압 병력이 있습니다. CHA2DS2-VASc 점수는 고혈압 1점, 당뇨 1점, 65-74세 1점으로 총 3점입니다. 2점 이상의 고위험군에 해당하므로 뇌졸중 및 색전증 예방을 위한 항응고 치료가 반드시 필요합니다. 이 경우 NOAC (Non-vitamin K antagonist Oral Anticoagulant)이 권장됩니다."}, {"subject": "심방세동", "year": ["13학번"], "professor": "오용석", "question": "아래 심전도를 보이는 환자에게 향후 합병증 예방을 위한 약물 선택에 고려할 사항이 아닌 것은?", "images": [], "text_box": null, "options": ["나이", "성별", "당뇨", "고혈압", "이상지질혈증"], "answer": [4], "explanation": "심전도는 심방세동을 나타냅니다. 심방세동 환자의 뇌졸중 예방을 위한 항응고제 선택 시 CHA2DS2-VASc 점수를 주로 활용합니다. 이 점수는 심부전, 고혈압, 나이(65-74세, 75세 이상), 당뇨, 뇌졸중/TIA 과거력, 혈관질환, 성별(여성) 등의 항목을 포함합니다. 이상지질혈증은 CHA2DS2-VASc 점수 항목에 포함되지 않으므로 항응고제 선택에 직접적으로 고려되는 사항은 아닙니다."}, {"subject": "심방세동", "year": ["12학번"], "professor": "오용석", "question": "다음 심방세동 환자 중 반드시 와파린 등으로 항응고치료를 해야 되는 환자가 아닌 것은?", "images": [], "text_box": null, "options": ["12년 전부터 고혈압 치료를 받고 있는 62세 남자", "7년 전부터 고혈압 진단받고 치료 중인 67세 여자", "좌심실 구혈율 23% 심부전으로 치료받고 있는 67세 남자", "1년 전 일과성 허혈로 신경과 치료를 받고 있는 59세 남자", "7년 전부터 당뇨로 치료받다가 2년 전 심근경색 후 울혈성 심부전으로 치료받고 있는 67세 여자"], "answer": [0], "explanation": "CHA2DS2-VASc 점수는 비판막성 심방세동 환자의 뇌졸중 위험도를 평가하여 항응고 치료 여부를 결정하는 데 사용됩니다. 62세 남성은 고혈압 병력만 있어 CHA2DS2-VASc 점수가 1점(고혈압 1점)으로, 남성의 경우 1점은 항응고 치료를 '반드시' 해야 하는 고위험군에 해당하지 않습니다. 반면 나머지 보기들은 모두 CHA2DS2-VASc 점수가 2점 이상이거나 판막성 심방세동에 해당하는 경우로 항응고 치료가 필수적입니다."}, {"subject": "심방세동", "year": ["12학번"], "professor": "오용석", "question": "다음 심방세동 환자 중 심방세동으로 인한 뇌졸중/색전의 위험성이 가장 낮은 경우를 고르시오", "images": [], "text_box": null, "options": ["76세 여자", "인공판막 치환술 후 성심근증", "승모판막 협착증", "당뇨, 고혈압, 심부전", "60세 남자 관상동맥질환"], "answer": [4], "explanation": "심방세동 환자의 뇌졸중 위험도는 CHA2DS2-VASc 점수 또는 판막성 심방세동 여부로 평가됩니다. 60세 남자 관상동맥질환 환자는 CHA2DS2-VASc 점수가 1점(혈관질환 1점)으로 가장 낮아 뇌졸중 위험도도 가장 낮습니다. 76세 여자는 3점, 당뇨/고혈압/심부전 환자는 최소 3점입니다. 인공판막 치환술 후나 승모판막 협착증 환자는 판막성 심방세동으로 분류되어 CHA2DS2-VASc 점수와 무관하게 매우 높은 뇌졸중 위험을 가집니다."}, {"subject": "빈맥", "year": ["21학번", "20학번"], "professor": "김지훈", "question": "이전 심장 병력이 없는 85세 여성이 2시간 동안 심계항진을 주소로 응급실에 내원하였다. 혈압, 산소포화도, 심박수는 정상이나 진찰상 불규칙한 리듬을 보인다. ECG 는 다음과 같다. 심장초음파 검사에서 구조적 심장질환은 확인되지 않는다. 정상적인 심박수에도 불구하고 환자는 증상이 상당히 심한 상태이다. 다음 중 가장 적절하지 않은 치료는?", "images": [], "text_box": "이전 심장 병력이 없는 85세 여성이 2시간 동안 심계항진을 주소로 응급실에 내원하였다. 혈압, 산소포화도, 심박수는 정상이나 진찰상 불규칙한 리듬을 보인다. ECG 는 다음과 같다. 심장초음파 검사에서 구조적 심장질환은 확인되지 않는다. 정상적인 심박수에도 불구하고 환자는 증상이 상당히 심한 상태이다.", "options": ["아데노신 정맥주사", "아미오다론 정맥주사", "직류 심장율동전환", "항응고제 치료"], "answer": [0], "explanation": "아데노신은 강력한 \"AV node 차단제\"로, 방실 결절을 통한 전기신호의 전파를 차단합니다. 아데노신은 반감기가 매우 짧습니다. 심방세동 환자에게 아데노신을 투여하면 일시적인 완전 방실 차단이 유발되지만 심방세동을 멈출 수는 없습니다. 이미 심방세동이 심전도상 진단된 환자로, 진단적인 목적으로도 부적절한 투약이며, 아데노신은 심방세동에 대한 치료적인 효과도 없습니다. 아데노신 효과가 몇 초 안에 사라지고 방실 전도가 재개되면 심실 박동이 다시 불규칙하고 원래의 맥박 수로 회복하게 됩니다. 심방 세동 문제일 수도 있을 것 같습니다. 심방세동 수업에서 치료로 2, 4를 배웠습니다. 솔직히 공식 해설은 매번 배운 내용이 아닙니다. 제가 시험장에서 이 문제를 마주친다면, adenosine 으로 중단할 수 있는 것은 AV node reentry 기전이 있는 PSVT 인데, 그 EKG 가 아닌 심방세동이기 때문에 1번을 고를 것 같습니다."}, {"subject": "빈맥", "year": ["20학번"], "professor": "김지훈", "question": "1 시간의 심계항진, 숨가쁨 및 현기증이 있는 23세 남자환자. 지난 몇 년 동안 비슷한 에피소드가 여러 번 있었다. 응급실에서 시행한 심전도는 다음과 같다. 이 환자에서 가장 가능성이 높은 진단은?", "images": [], "text_box": "1 시간의 심계항진, 숨가쁨 및 현기증이 있는 23세 남자환자. 지난 몇 년 동안 비슷한 에피소드가 여러 번 있었다. 응급실에서 시행한 심전도는 다음과 같다.", "options": ["발작성 상실심성 빈맥 (PSVT)", "심방 조동 (Atrial flutter)", "심방세동 (Atrial fibrillation)", "정상 빈맥 (Sinus tachycardia)"], "answer": [0], "explanation": "수많은 기출들을 풀면서 익히는 것이 가장 좋겠네요. P와 Q 파가 1:1 로 존재하고 QRS 뒤에 P가 나오는 모양입니다. 이를 통해 PSVT 임을 알 수 있습니다."}, {"subject": "빈맥", "year": ["20학번"], "professor": "김지훈", "question": "다음 심전도 중 DC cardioversion 에 의해 sinus rhythm 으로 돌아올 확률이 가장 높은 부정맥은?", "images": [], "text_box": null, "options": [], "answer": [0], "explanation": "제시된 ECG 스트립 중 첫 번째 스트립은 규칙적인 좁은 QRS 빈맥을 보여 PSVT(AVNRT/AVRT)에 해당합니다. PSVT는 재진입성 빈맥으로, DC cardioversion에 매우 효과적으로 반응하여 정상 동률동으로 전환될 가능성이 높습니다."}, {"subject": "빈맥", "year": ["20학번"], "professor": "황유미", "question": "빈맥을 찍은 심전도이다. 정맥으로 아데노신을 투여하면 효과있는 심전도 소견은? (짤, 부정맥 TBL - 황유미 교수님)", "images": [], "text_box": null, "options": ["sinus tachycardia", "PSVT", "atrial flutter", "atrial fibrillation", "atrial tachycardia"], "answer": [1], "explanation": "Adenosine 은 AV node 를 block 시키므로 AV node 를 포함하는 재진입회로를 형성하는 부정맥인 PSVT 에 효과가 있다."}, {"subject": "빈맥", "year": ["19학번"], "professor": "김지훈", "question": "회귀성 빈맥(AVNRT, AVRT)의 발생에 대해서 틀린 것은?", "images": [], "text_box": null, "options": ["주로 고혈압과 동반되어 잘 발생한다.", "방실 결절의 slow pathway 나, 방실사이의 accessory pathway 가 관여한다.", "APC, VPC 등의 유발 부정맥이 있어야 한다.", "방실 결절과 slow pathway, 또는 방실결절과 accessory pathway 의 불응기의 차이가 중요하다.", "발생과 소멸을 예측할 수 없이 갑자기 발생했다가, 어느 순간에 없어진다."], "answer": [0], "explanation": "주로 선천적으로 없어야 하는 비정상적인 전도로에 의해서 발생합니다. 고혈압과 동반되는지는 배우지 않았습니다. 회귀성 빈맥은 주로 선천적으로 존재하는 비정상 전도로에 의해 발생하며, 고혈압과의 직접적인 연관성은 주요 발병 기전이 아닙니다. 이 부정맥은 방실 결절의 slow pathway나 방실 사이의 accessory pathway가 관여하며, APC, VPC 등과 같은 조기 박동이 유발 인자가 될 수 있습니다."}, {"subject": "빈맥", "year": ["19학번"], "professor": "김지훈", "question": "53 세 여자. 발작성 심방세동으로 아미오다론 투약중인 환자로 내원 시 심전도는 (그림 1)과 같다. 혈액 검사상 Na 143mEq/L, K 2,9 mEq/L 보였다. 치료 중 (그림 2) 심전도 소견을 보였다. 진단은?", "images": [], "text_box": "53 세 여자. 발작성 심방세동으로 아미오다론 투약중인 환자로 내원 시 심전도는 (그림 1)과 같다. 혈액 검사상 Na 143mEq/L, K 2,9 mEq/L 보였다.", "options": ["심실 세동", "다형성 심실빈맥 (Torsades de pointes)", "심방 조동", "심실 조기 수축", "심방 세동을 동반한 조기 흥분 증후군"], "answer": [1], "explanation": "hypokalemia 가 있고, 아래 심전도에서 꼬인 리본 모양의 wave 가 나타납니다. 그림 1 심전도에서 QT 간격이 길어지고 다형성 심실빈맥(Torsades de pointes) 양상을 보입니다. 이는 아미오다론 투여와 저칼륨혈증이 복합적으로 작용하여 QT 간격을 연장시키고 발생한 것으로 추정됩니다."}, {"subject": "빈맥", "year": ["19학번"], "professor": "김지훈", "question": "회귀성 빈맥(AVNRT, AVRT)의 발생에 대해서 틀린 것은? 짤", "images": [], "text_box": null, "options": ["주로 선천적으로 존재하는 비정상 구조물에 의해서 발생된다.", "방실 결절의 slow pathway 나 방실 사이의 accessory pathway 가 관여한다.", "방실결절과 slow pathway, 또는 방실결절과 accessory pathway 의 불응기의 차이가 중요하다.", "APC, PVC 등의 유발 부정맥이 있어야 한다.", "서서히 발생했다 소멸한다."], "answer": [4], "explanation": "우린 이렇게는 안 배웠지만 이전 년도 문제를 보면 급작스럽게 발생하고 갑자기 없어짐을 알 수 있습니다. 회귀성 빈맥은 갑작스럽게 발생하고 갑자기 소멸하는 특징을 가집니다. 일반적으로 서서히 발생하는 것이 아닙니다."}, {"subject": "빈맥", "year": ["19학번"], "professor": "김지훈", "question": "평소 건강하게 지내던 67세 남자가 건진에서 시행한 심전도소견이다. 다음 심전도의 진단은?", "images": [], "text_box": null, "options": ["빈발성 심방 조기 수축", "심방조동", "심방성 빈맥", "Mobitz 1형 2도 방실차단", "심방세동"], "answer": [4], "explanation": "RR interval 이 irregularly irregular 한 심전도를 보입니다. 이는 심방세동입니다."}, {"subject": "빈맥", "year": ["19학번"], "professor": "김지훈", "question": "35 세 남자가 자던 중 숨을 쉬지 못하고 꺽꺽 거리는 모습으로 발견되어 병원에 왔다. 흡연자이고 당뇨병과 고혈압 병력은 없다. 그의 아버지가 40대에 갑자기 사망하였다. 119 에서의 응급처치 전시행한 심전도(그림 1)와 병원에 도착한 후 시행한 심전도(그림 2)이다. 내원 후 혈압 110/80, 맥박 55 회, 호흡 15 회, 체온 36.4 도이고, 가슴 청진에서 심음과 호흡음은 정상이다. 환자의 진단으로 가장 적절한 것은? (황유미 교수님, 18 동일)", "images": [], "text_box": "35 세 남자가 자던 중 숨을 쉬지 못하고 꺽꺽 거리는 모습으로 발견되어 병원에 왔다. 흡연자이고 당뇨병과 고혈압 병력은 없다. 그의 아버지가 40대에 갑자기 사망하였다. 119 에서의 응급처치 전시행한 심전도(그림 1)와 병원에 도착한 후 시행한 심전도(그림 2)이다. 내원 후 혈압 110/80, 맥박 55 회, 호흡 15 회, 체온 36.4 도이고, 가슴 청진에서 심음과 호흡음은 정상이다.", "options": ["idiopathic ventricular fibrillation", "brugada syndrome", "variant angina", "long QT syndrome", "RBBB"], "answer": [1], "explanation": "젊은 사람이 수면중 급사하는 질환이었습니다. V1, V2, V3 의 특징적인 모양으로 감별합니다. 그림 2 심전도에서 V1-V3 유도에서 특징적인 cove-type ST 상승이 관찰되며, 이는 Brugada 증후군의 진단 기준에 부합합니다. Brugada 증후군은 수면 중 급사 위험이 있는 유전성 질환입니다."}, {"subject": "빈맥", "year": ["18학번", "17학번"], "professor": "김지훈", "question": "다음 심전도의 진단은? (짤)", "images": [], "text_box": null, "options": ["Torsades de pointes", "ventricular fibrillation", "atrial fibrillation with preexcitation", "cathecholaminergic polymorphic ventricular tachycardia", "antidromic atrioventricular reciprocating tachycardia"], "answer": [0], "explanation": "long QT 를 동반한 polymorphic VT 입니다. Short-long-short sequence 가 보입니다. (위 사진은 18 사진이고 19 사진은 다른 것이 나왔다고 합니다.)"}, {"subject": "빈맥", "year": ["18학번"], "professor": "김지훈", "question": "reentry 로 인해 발생한 부정맥은?", "images": [], "text_box": null, "options": [], "answer": [4], "explanation": "Reentry는 대부분의 빈맥성 부정맥의 가장 흔한 기전이며, 심실 빈맥(VT), PSVT, 심방조동 등 다양한 부정맥이 reentry 기전으로 발생할 수 있습니다. 제시된 ECG 중 5번은 심실빈맥 소견으로, 이는 reentry 기전으로 발생합니다."}, {"subject": "빈맥", "year": ["18학번", "17학번"], "professor": "김지훈", "question": "다음 중 adenosine 으로 중단시킬 수 있는 것은?", "images": [], "text_box": null, "options": ["sinus tachycardia", "atrial tachycardia", "atrial flutter", "PSVT", "atrial fibrillation"], "answer": [3], "explanation": "Adenosine은 AV node를 차단하여 AV node를 포함하는 재진입성 회로를 종결시키는 데 효과적입니다. PSVT는 AV node를 포함하는 재진입성 부정맥이므로 adenosine으로 중단시킬 수 있습니다."}, {"subject": "빈맥", "year": ["18학번", "17학번"], "professor": "김지훈", "question": "다음 중 시술 (catheter ablation, surgery)로서 치료 불가능한 부정맥은?", "images": [], "text_box": null, "options": ["atrial fibrillation", "atrioventricular reciprocating tachycardia", "atrial flutter", "Torsades de pointes", "ventricular tachycardia"], "answer": [3], "explanation": "Torsades de pointes는 주로 전해질 이상(특히 저칼륨혈증, 저마그네슘혈증)이나 QT 간격을 연장시키는 약물에 의해 유발되는 다형성 심실빈맥입니다. 시술적 치료보다는 원인 제거 및 약물 치료(예: 마그네슘 황산염 정주)가 주된 치료법입니다. Atrial fibrillation, AVRT, atrial flutter, ventricular tachycardia는 도자절제술(catheter ablation)을 통해 완치 또는 조절이 가능합니다."}, {"subject": "빈맥", "year": ["18학번"], "professor": "김지훈", "question": "다음은 빈맥이 시작되는 과정을 기록한 심전도이다. 이 소견을 근거로 이 빈맥의 기전으로서 가장 의심되는 진단은?", "images": [], "text_box": null, "options": ["방실회귀빈맥", "방실결절 회귀빈맥", "조기흥분 증후군", "심방성 빈맥", "심방조동"], "answer": [1], "explanation": "3 번째 QRS 와 앞에 선행하는 atrial premature contraction 에 이어서 심한 PR 간격의 연장을 보이면서 빈맥이 시작되는 소견으로 미루어 slow/fast form 의 AVNRT 가 의심됩니다."}, {"subject": "빈맥", "year": ["18학번"], "professor": "김지훈", "question": "심방세동으로 인해서 발생할 수 있는 병태생리 중 가장 관계가 적은 것은?", "images": [], "text_box": null, "options": ["심방수축기능의 소실로 인한 심박출량의 감소", "심박출량 감소로 인한 심근 허혈", "WPW 증후군과 동반 시 돌연사의 증가", "좌심방 부속지에서 저류되는 혈액에 의한 혈전형성 및 뇌졸중의 증가", "빠른 심실반응에 의한 심한 빈맥증"], "answer": [1], "explanation": "우리는 심박출량이 감소함을 배웠습니다. 나머지는 배우지 않았습니다. 해설에 따르면 심박출량이 감소하는 것은 맞지만 심근 허혈은 일어나지 않습니다."}, {"subject": "빈맥", "year": ["18학번"], "professor": "김지훈", "question": "평소 건강하게 지내던 67세 남자가 건진에서 시행한 심전도소견이다. 다음 심전도의 진단은? 짤", "images": [], "text_box": null, "options": ["빈발성심방조기수축", "심방조동", "심방성 빈맥", "Mobitz1 형 2도방실차단", "심방세동"], "answer": [4], "explanation": "R-R interval 이 irregularly irregular 한 심전도를 보이는 경우는 MAT 와 심방세동"}, {"subject": "빈맥", "year": ["18학번"], "professor": "김지훈", "question": "35 세 여자가 흉부불편감을 주소로 내원하였다. 환자는 1주일에 1-2 차례, 가슴이 덜컹 내려앉는다. 맥박이 건너 뛰는 것 같다는 증상을 호소하였다. 이외 특이 증상은 없었으며, 다른 과거력이나 투약력은 없었다. 가장 가능성이 높은 진단은?", "images": [], "text_box": "35 세 여자가 흉부불편감을 주소로 내원하였다. 환자는 1주일에 1-2 차례, 가슴이 덜컹 내려앉는다. 맥박이 건너 뛰는 것 같다는 증상을 호소하였다. 이외 특이 증상은 없었으며, 다른 과거력이나 투약력은 없었다.", "options": ["심방세동", "심실빈맥", "심실조기수축", "발작성 심실상성 빈맥", "동기능 부전증후군"], "answer": [2], "explanation": "환자의 증상은 '가슴이 덜컹 내려앉는 느낌', '맥박이 건너뛰는 것 같다'는 것으로, 이는 심실조기수축(PVC)의 전형적인 증상입니다. 심실조기수축은 대부분 양성이며, 특별한 기저 질환이 없는 젊은 여성에게서 흔히 나타날 수 있습니다."}, {"subject": "빈맥", "year": ["17학번"], "professor": "김지훈", "question": "adenosin 5mg IV 후 다음과 같은 심전도를 보였다. 다음 심전도 중 위 심전도와 같은 기전으로 발생된 부정맥은?", "images": [], "text_box": null, "options": [], "answer": [2], "explanation": "제시된 \"위 심전도\"는 아데노신 투여 후 종결되는 PSVT이며, 이는 Re-entry 기전에 의해 발생합니다. Re-entry 기전으로 발생하는 부정맥은 PSVT 뿐만 아니라 Atrial flutter도 포함됩니다. Adenosine은 Atrial flutter 자체를 종결시키지는 못하지만, AV node를 차단하여 심실 반응을 늦춥니다. 3번째 심전도는 Atrial flutter 소견으로, PSVT와 마찬가지로 Re-entry 기전으로 발생합니다."}, {"subject": "빈맥", "year": ["17학번"], "professor": "김지훈", "question": "26 세 여자가 가슴두근거림으로 왔다. 치료 전후로 기록한 심전도이다. 진단명으로 가장 가능성이 높은 것은? +17 (2016짤)", "images": [], "text_box": null, "options": ["방실결절회귀빈맥", "심방세동", "발작성 심방빈맥", "심방조동", "심실빈맥"], "answer": [0], "explanation": "RR 간격이 규칙적이고, V1 유도에서 retrograde p wave 가 있어 AVNRT 입니다. (15 해설: Retrograde P wave 는 AVNRT 에서 보일 수는 있지만, 그렇게 흔히 보이는 소견은 아닙니다. V1 lead 에서 QRS 다음에 역방향의 'notch' 모양으로 나타납니다.)"}, {"subject": "빈맥", "year": ["17학번", "15학번"], "professor": "김지훈", "question": "다음과 같은 심전도 소견을 보이는 빈맥의 기전 중 가장 가능성이 높은 것은?", "images": [], "text_box": null, "options": ["방실회귀빈맥", "방실결절회귀빈맥", "발작성 심방빈맥", "심방조동", "심방세동"], "answer": [0], "explanation": "QRS 파와 QRS 파 사이에 분명하게 구분되는 P 파가 존재하며, 또한 QRS 와 1:1 의 관계가 확인되며 선행하는 QRS 에 근접하여 존재하는 P 파를 근거로 AVRT 방실회귀빈맥을 진단할 수 있습니다."}, {"subject": "빈맥", "year": ["17학번"], "professor": "김지훈", "question": "다음 부정맥 중에 일정한 간격의 빈맥(regular tachycardia)을 보이지 않는 부정맥은? (2016, 2015 짤)", "images": [], "text_box": null, "options": ["방실 결절 회귀성 빈맥", "방실 회귀성 빈맥", "심방조동(2:1 conduction)", "심실 빈맥", "심방세동을 동반한 WPW 증후군"], "answer": [4], "explanation": "WPW 증후군에 심방세동이 동반 시 wide QRS 의 irregularly irregular 한 소견을 보임"}, {"subject": "빈맥", "year": ["17학번"], "professor": "김지훈", "question": "심한 심계항진을 주소로 내원한 24세 여자환자에게 경정맥동 맛사지 (carotid sinus massage)를 시행 했을 때의 심전도이다. 가장 가능성이 높은 진단은? 짤, +2016, 2015년", "images": [], "text_box": null, "options": ["심방성 빈맥", "심방 조동", "심방세동", "방실결절 회귀성 빈맥", "WPW 증후군 환자에서 심방세동을 보이는 경우"], "answer": [3], "explanation": "경정맥동 맛사지 (carotid sinus massage)로 일시 치료 가능한 질환은 회귀성빈맥(방실결절 회귀성 빈맥 또는 방실회기성빈맥)의 경우임. 경동맥동 마사지는 미주신경을 자극하여 AV node의 전도를 늦추고, AVNRT나 AVRT와 같은 AV node와 관련된 재진입성 빈맥을 종결시키는 데 효과적입니다."}, {"subject": "빈맥", "year": ["17학번"], "professor": "오용석", "question": "RBBB 에 대한 설명이다. 옳은 것은?(노태호, 13 유사)", "images": [], "text_box": null, "options": ["V2 유도에서 토끼의 오른쪽 귀가 더 크다(RSr')", "토끼의 오른쪽 귀(R)는 심실 activation 초기 septal activation 이 V6 을 향하기 때문이다.", "V1 에서 볼 때 토끼의 양쪽 귀 사이의 S 는 RVVV 로 먼저 우심실이 activation 됨으로 인한다.", "토끼의 왼쪽 귀는 먼저 좌심실로 가는 전기활동으로 인해 생긴다.", "QRS duration 은 항상 120msec 이상이다."], "answer": [4], "explanation": "1) V1 유도에서 토끼의 왼쪽 위가 작은귀입니다. RBBB에서 QRS duration은 120ms 이상으로 연장되는 것이 진단 기준입니다. 이는 우각 차단으로 인해 우심실의 탈분극이 지연되기 때문입니다."}, {"subject": "빈맥", "year": ["16학번"], "professor": "김지훈", "question": "다음 중 adenosine 정맥 투여로 가장 확실하게 종결시킬 수 있는 빈맥은?", "images": [], "text_box": null, "options": [], "answer": [3], "explanation": "adenosine IV 로 확실이 끝나는 것은 PSVT 입니다. 제시된 5개의 심전도 중 4번째 심전도가 PSVT의 특징을 보이며, 이는 AV node를 포함하는 재진입성 빈맥으로 adenosine에 의해 가장 확실하게 종결될 수 있습니다."}, {"subject": "빈맥", "year": ["16학번"], "professor": "김지훈", "question": "8년 전 급성 심근경색으로 관상동맥 성형 및 스텐트 삽입을 받았던 72세 남자가 금일 아침부터 시작한 호흡곤란, 심계항진을 주소로 내원하였다. 이 환자의 부정맥 진단과 그 이유가 바르게 짝지어진 것은?", "images": [], "text_box": "8년 전 급성 심근경색으로 관상동맥 성형 및 스텐트 삽입을 받았던 72세 남자가 금일 아침부터 시작한 호흡곤란, 심계항진을 주소로 내원하였다. 이 환자의 부정맥 진단과 그 이유가 바르게 짝지어진 것은?", "options": ["방실 결절 회귀성 빈맥, 원래 갖고 있던 complete LBBB", "WPW 증후군에 의한 AVRT, antidromic tachycardia", "방실 회귀성 빈맥, aberrant conduction", "심실 빈맥, negative concordance", "심실 빈맥, capture 또는 fusion beat"], "answer": [3], "explanation": "wide QRS 가 보이고 V1-V6 가 모두 negative 로 보입니다. QRS 가 혼자 narrow 하거나 낮은 capture, fusion beat 는 안 보이는 것 같습니다. 심전도상 V1-V6 모든 유도에서 QRS가 주로 음성으로 나타나는 negative concordance를 보이므로 심실 빈맥으로 진단합니다."}, {"subject": "빈맥", "year": ["16학번"], "professor": "김지훈", "question": "다음은 빈맥이 시작되는 과정을 기록한 심전도이다. 이 소견을 소견을 근거로 이 빈맥의 기전으로서 가장 의심되는 의심되는 진단은? (2016, 2015 짤)", "images": [], "text_box": null, "options": ["방실회귀빈맥", "방실결절 회귀빈맥", "조기흥분 증후군", "심방성 빈맥", "심방조동"], "answer": [1], "explanation": "3 번째 QRS 파 앞에 선행하는 APC 에 이어서 심한 PR 간격의 연장을 보이면서 빈맥이 시작되는 소견으로 미루어 slow/fast form 의 AVNRT 가 의심된다."}, {"subject": "빈맥", "year": ["16학번"], "professor": "오용석", "question": "다음 심전도에서 관찰되는 wide QRS tachycardia 의 설명으로 틀린 것은?", "images": [], "text_box": null, "options": ["No man's area 를 보이는 axis 로 VT 이다.", "aVR 에서 extreme R wave 를 보여서 VT 이다.", "negative concordance 를 보이는 VT 이다.", "preexcited (antidromic) tachycardia 를 보이는 조기흥분 증후군", "AV dissociation 을 보이는 VT 이다."], "answer": [3], "explanation": "1)2) no man's area: V1(-), aVF(-) 또는 aVR(+) → VT. 3) V1~V6 가 전부 negative concordant 를 보입니다. 5) VT 면 AV dissociation 을 보이긴 하는데 마음의 눈으로 봐야합니다. 조기흥분 증후군(preexcitation)은 WPW 증후군과 같은 전도로 이상으로 인한 것이지만, 심전도만으로는 조기흥분 빈맥임을 단정하기 어렵습니다. 특히 wide QRS 빈맥에서 VT의 다른 특징들(예: no man's land axis, AV dissociation, concordance 등)이 더 명확하게 관찰되므로, 조기흥분 증후군으로 진단하는 것은 틀린 설명일 가능성이 높습니다."}, {"subject": "빈맥", "year": ["16학번"], "professor": "장성원", "question": "35 세 여자 환자가 두근거림으로 내원하였다. 혈압은 100/70 이며 의식은 명료하였다. 심전도 소견은 다음과 같다. 적절한 조치는?", "images": [], "text_box": "35 세 여자 환자가 두근거림으로 내원하였다. 혈압은 100/70 이며 의식은 명료하였다.", "options": ["세동제거", "심폐 소생술", "아데노신 정맥주사", "리도카인 정맥주사", "관동맥 성형술"], "answer": [2], "explanation": "심전도는 심실상성빈맥(PSVT)임. 보기 중 심실상성빈맥을 종료시키기 위해 우선적으로 시도할 방법은 아데노신. 세동제거도 PSVT 를 종료할 수 있으나 의식이 명료한 환자에게 적절한 방법은 아님. 아데노신은 AV node를 차단하여 PSVT를 종결시키는 데 가장 효과적이고 빠른 약제입니다."}, {"subject": "빈맥", "year": ["16학번"], "professor": "장성원", "question": "다음과 같은 심전도 소견을 보이는 빈맥의 기전 중 가장 가능성이 높은 것은? (짤)", "images": [], "text_box": null, "options": ["방실회귀빈맥", "방실결절회귀빈맥", "발작성 심방빈맥", "심방조동", "심방세동"], "answer": [0], "explanation": "QRS 파와 QRS 파사이에분명하게육안적으로구분되는 P 파가 존재하며, 또한 QRS 와 1:1 의 관계가 확인되며 선행하는 QRS 에 근접하여 존재하는 P 파를 근거로 AVRT: 방실회귀빈맥을 진단할 수 있다."}, {"subject": "빈맥", "year": ["15학번", "13학번"], "professor": "김지훈", "question": "심장부정맥의 기전에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["가장 흔한 기전은 reentry 이다.", "reentry 기전의 부정맥은 digitoxicity 에 발생하는 심실조기수축.", "reentry 인 경우 점차 rate 이 증가하는 warm up 현상과 갑자기 종료하는 특징이 있다.", "triggered activity 는 세포 내 주로 Na⁺의 증가로 인한다.", "비정상 자동능은 sudden onset 으로 시작한다."], "answer": [0], "explanation": "2 digitoxicity 는 triggered activity (afterdepolarization)로 발생. 3 abnormal automaticity 이 warm up 현상과 갑자기 종료되는 특징. 4 triggered activity 는 세포 내 주로 Ca2+의 증가로 인한다. 5 reentry 는 sudden onset 으로 시작한다."}, {"subject": "빈맥", "year": ["15학번"], "professor": "김지훈", "question": "다음은 reentry 에 대한 설명이다. 해당하는 것은?", "images": [], "text_box": null, "options": ["세포 내 Ca 이온의 증가로 인함", "두 개 이상의 전도성과 불응기가 다른 전도로가 있어야 함", "태어날 때부터 존재하는 전도로로는 WPW 증후군의 부전 도로가 꼭 필요함.", "aconitine 독성으로 발생하는 빈맥성 부정맥발생의 주요 기전임.", "심근경색증 후에 발생하는 accelerated idioventricular rhythm 도 여기에 속한다."], "answer": [1], "explanation": "1&4: Triggered activity. 5 abnormal automaticity 에 관한 설명. 3 심근경색 후 전도로가 비정상적인 전도로가 생길 수 있습니다. Reentry 기전은 두 개 이상의 전도로와 각 전도로의 전도성 및 불응기 차이를 필요로 합니다."}, {"subject": "빈맥", "year": ["15학번", "14학번", "13학번"], "professor": "김지훈", "question": "다음 심전도 소견에서 보이는 빈맥의 진단명으로 옳은 것은?", "images": [], "text_box": null, "options": ["방실회귀빈맥", "심방세동", "발작성 심방빈맥", "심방조동", "심실빈맥"], "answer": [1], "explanation": "Irregularly irregular narrow QRS tachycardia"}, {"subject": "빈맥", "year": ["15학번", "14학번"], "professor": "김지훈", "question": "65세 여자가 갑자기 호흡곤란과 심계항진이 있어 응급실로 방문하였다. 당시 심전도는(1)이였고 혈압은 90/60mmHg 였다. 응급실 당직을 보던 인턴선생님이 adenosine 12mg을 정맥주사 하였는데 잠시 QRS 가 보이지 않다가 곧바로 심전도는 (2) 다음과 같이 변하면서 혈압이 70/30mmHg 심한 호흡곤란을 호소하였다. (1),(2)심전도의 각각의 진단과 후속치료가 잘 연결된 것은?", "images": [], "text_box": "65세 여자가 갑자기 호흡곤란과 심계항진이 있어 응급실로 방문하였다. 당시 심전도는(1)이였고 혈압은 90/60mmHg 였다. 응급실 당직을 보던 인턴선생님이 adenosine 12mg을 정맥주사 하였는데 잠시 QRS 가 보이지 않다가 곧바로 심전도는 (2) 다음과 같이 변하면서 혈압이 70/30mmHg 심한 호흡곤란을 호소하였다.", "options": ["Paroxysmal supraventricular tachycardia-Atrial fibrillation-amiodarone", "paroxysmal Atrial Fibrillation-ventricular tachycardia-DC cardioversion", "Paroxysmal supraventricular tachycardia-Ventricular Fibrilation-cardiac massage", "Sinus tachycardia -Torsades de pointes -magessium IV", "Paroxysmal suparventricular tachycardia-Atrial fibrilation wit pre excitation- DC Cardioversion"], "answer": [4], "explanation": "선행되는 p 파가 보이지 않는 Regular narrow QRS tachycardia 로 PSVT 의 가능성이 가장 높다 adenosine 을 준 이후 wide QRS irregular tachycardia 가 발생하였고 이는 과량으로 투여된 adenosine 에 의해 AV Block 이 와서 PSVT 는 종결되었으나 심방에서 심방세동이 발생하였고 이것이 Accessory pathway 로 심실로 전파되면서 wide QRS 를 보인 것이다 혈압이 떨어지고 호흡곤란이 심해지는 등 급격히 나빠졌으므로 합병증을 각오하고 즉시 DC cardioversion 을 시행하여야 한다 (임상치료파트)"}, {"subject": "빈맥", "year": ["15학번"], "professor": "노태호", "question": "50 세의 old MI 환자가 가슴이 두근거리며 어지러워 ER 을 찾았다. 환자의 사지 유도 심전도이다. 합당한 소견은?(노태호 교수님, 15 동일)", "images": [], "text_box": "50 세의 old MI 환자가 가슴이 두근거리며 어지러워 ER 을 찾았다. 환자의 사지 유도 심전도이다.", "options": ["심박수는 분당 100 회 정도로 빈맥이다.", "QRS 폭은 100ms 로 정상보다 넓다.", "Lead I에서 QRS 는 upright 이다.", "QRS axis 는 no man's land 를 향해 심실이 전도방향이 좌하에서 우상방향이다,", "전형적인 PSVT 소견이다."], "answer": [3], "explanation": "1, aVF(-) 또는 aVR(+) : no man's land, VT. 제시된 심전도는 wide QRS tachycardia를 보이며, 사지 유도에서 QRS axis가 좌하에서 우상방향을 향하는 'no man's land'를 보여 심실빈맥(VT)에 합당한 소견입니다."}, {"subject": "빈맥", "year": ["15학번", "14학번"], "professor": "오용석", "question": "다음 심전도에서 관찰되는 wide QRS tachycardia 의 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["LBBB aberrant conduction(좌각편위전도)을 보이는 방실결절회귀빈맥", "RBBB aberrant conduction(우각편위전도)을 보이는 방실회귀빈맥", "RBBB aberrant conduction(우각편위전도)을 보이는 심방성빈맥", "preexcited (antidromic) tachycardia 를 보이는 조기흥분 증후군", "융합 박동을 보이는 심실빈맥"], "answer": [4], "explanation": "그림에서 보이는 세 번째 QRS 파는 심실빈맥에서 관찰되는 융합박동(fusion beat)이며, 비전형적인 RBBB 형태를 보이는 wide QRS tachycardia 의 경우를 의심할 수 있는지를 평가하는 문제. fusion beat 는 주위 wide QRS 보다 작거나 얇은 애매한 모양입니다. RBBB like 모양에 완벽히 부합하진 않지만(V1 은 RBBB 랑 동일한 보양, V6 가 VT 모양), 원래 VT 진단 기준에서 AV relationship 에 해당하는 증명법만 100% 특이도를 가집니다."}, {"subject": "빈맥", "year": ["15학번"], "professor": "이만영", "question": "표준 사지유도(limb lead) 중 정상인에서 P 및 QRS 파가 모두 negative deflection 을 보이는 lead 는?(노태호)", "images": [], "text_box": null, "options": ["lead I", "lead II", "lead III", "lead aVR", "lead aVL"], "answer": [3], "explanation": "심방 심실의 탈분극 방향이 aVR 에서 멀어져 가는 방향이다. (심전도의 이해 파트에서 더 자세히 배웁니다.) 정상 심전도에서 aVR 유도에서는 P파, QRS파, T파가 모두 음성으로 나타나는 것이 특징입니다."}, {"subject": "빈맥", "year": ["14학번"], "professor": "김지훈", "question": "다음은 빈맥이 시작되는 과정을 기록한 심전도이다. 이 소견을 근거로 가장 가능성이 높을 것으로 의심되는 빈맥의 기전은?", "images": [], "text_box": null, "options": ["방실회귀빈맥", "방실결절 회귀빈맥", "조기흥분 증후군", "심방성 빈맥", "심방조동"], "answer": [1], "explanation": "제시된 심전도에서는 QRS 파 앞에 선행하는 APC에 이어서 PR 간격의 연장을 보이며 빈맥이 시작되는 소견이 관찰됩니다. 이는 slow/fast form의 AVNRT(방실결절 회귀성 빈맥)의 전형적인 시작 양상으로, AV node 내의 두 경로를 이용한 재진입 기전에 해당합니다."}, {"subject": "빈맥", "year": ["14학번"], "professor": "김지훈", "question": "다음은 reentry 에 대한 설명이다. 해당하지 않는 것은?", "images": [], "text_box": null, "options": ["두 개 이상의 pathway 가 있어야 한다", "각 전도로에 전도성의 차이가 있어야 한다", "태어날 때부터 존재하는 전도로로는 WPW 증후군의 부전 도로가 해당한다", "aconitine 독성으로 발생하는 빈맥성 부정맥발생의 주요기전이다", "심근경색증 후에 발생하는 심실빈맥은 reentry 로 인한다."], "answer": [3], "explanation": "aconitine 독성으로 발생하는 것은 triggered activity 의 주요 기전이다. 올해는 배우지 않았으나, MI 후에 발생한 scar 때문에 오기 쉽다는 것, 전도성의 차이 (slow vs fast)가 있다는 것, 두 개 이상의 pathway 를 필요로 한다는 점을 배웠습니다."}, {"subject": "빈맥", "year": ["14학번", "13학번"], "professor": "김지훈", "question": "37 세 남자가 TV 보는 중에 갑자기 의식을 잃고, 맥박이 소실되어 부인과 가족들이 심폐소생술을 시행하고 119 가 도착해서 심실세동을 보여 자동 제세동기로 제세동 후 응급실에 도착했을 때의 심전도이다. 이 환자에서 심장 마비의 원인이 되는 질환은?", "images": [], "text_box": "37 세 남자가 TV 보는 중에 갑자기 의식을 잃고, 맥박이 소실되어 부인과 가족들이 심폐소생술을 시행하고 119 가 도착해서 심실세동을 보여 자동 제세동기로 제세동 후 응급실에 도착했을 때의 심전도이다.", "options": ["브루가다 (Brugada) 증후군", "우심실 이형성 증후군", "선천성 QT 연장 증후군", "WPW 증후군", "급성 심근경색"], "answer": [0], "explanation": "브루가다 증후군의 심전도는 특징적으로 V1-V3 까지 cove 형의 ST elevation 을 보인다. 제시된 심전도(V1-V3)에서 cove-type의 ST elevation이 관찰되므로 Brugada 증후군이 심장 마비의 원인으로 가장 가능성이 높습니다. Brugada 증후군은 유전적 질환으로, 특히 젊은 남성에서 야간에 심실세동을 유발하여 급사를 초래할 수 있습니다."}, {"subject": "빈맥", "year": ["14학번"], "professor": "이만영", "question": "33세 남자가 갑자기 의식을 잃고, 맥박이 소실되어 부인과 가족들이 심폐소생술을 시행하고 119가 도착해서 자동 제세동기로 제세동 후 응급실에 도착한 환자의 제세동 당시의 심전도이다. 이 환자심전도 소견으로 치료를 위하여 삽입형 제세동기(implantable cardioverter-defibrilator, ICD)를 꼭 삽입해야 하는 경우가 아닌 질환은?(13 동일)", "images": [], "text_box": "33세 남자가 갑자기 의식을 잃고, 맥박이 소실되어 부인과 가족들이 심폐소생술을 시행하고 119가 도착해서 자동 제세동기로 제세동 후 응급실에 도착한 환자의 제세동 당시의 심전도이다. 이 환자심전도 소견으로 치료를 위하여 삽입형 제세동기(implantable cardioverter-defibrilator, ICD)를 꼭 삽입해야 하는 경우가 아닌 질환은?", "options": ["브루가다 증후군", "선천성 QT 연장 증후군", "우심실 이형성 증후군(Arrythmogenus RV dysplasia/cardiomyopathy)", "WPW 증후군", "조기 재분극 증후군(Early repolarization)"], "answer": [3], "explanation": "WPW 증후군의 경우는 심방세동과 동반시 심실세동을 유발할 수 있으며 주로 전기도자 절제술이 주 치료방법임. 다른 보기들은 심실세동이나 급사를 유발할 수 있어 ICD 삽입이 필요한 질환들입니다."}, {"subject": "빈맥", "year": ["13학번", "12학번"], "professor": "김지훈", "question": "이 환자에서 다음 중 가장 먼저 시도해볼 수 있는 '응급' 치료는? (EKG 가 해설과 다르게 들어가 있어서 작성자가 실제와는 다르지만 문제에 적합한 EKG 사진을 넣어두었습니다.)", "images": [], "text_box": null, "options": ["amiodarone 150mg IV (정맥주사)", "DC cardioversion", "adenosine 6mg IV bolus", "procainamide IV", "verapamil 240mg 서방형 경구투여"], "answer": [2], "explanation": "파드 변형. 심전도는 PSVT 이다. 깊은 호흡 혹은 Valsalva maneuver 등 vagal maneuver 들은 집에서도 혼자 시도해볼 수 있는 상당히 효과적인 치료법이다. 이것이 여의 치 않을 경우 응급실에서는 약이 준비될 때까지 우선 경동맥 마사지를 시도해볼 수 있으며, 이것도 되지 않는다면 바로 adenosine IV 를 우선 시도하고, 효과가 없거나 바로 재발한다 면 다음으로 verapamil IV 를 시도하며, 이 또한 듣지 않는다 면 최후의 수단으로 DC cardioversion 을 시행할 수 있다."}, {"subject": "빈맥", "year": ["13학번"], "professor": "김지훈", "question": "다음과 같은 심전도 소견을 보이는 빈맥의 기전 중 가장 가능성이 높은 것은? + 2013년", "images": [], "text_box": null, "options": ["방실회귀빈맥", "방실결절회귀빈맥", "발작성 심방빈맥", "심방조동", "심방세동"], "answer": [0], "explanation": "짤. QRS 파와 QRS 파 사이에 분명히 육안적으로 구분되는 P 파가 존재하며, 또한 QRS 와 1:1 의 관계가 확인되며 선 행하는 QRS 에 시간적으로 근접하여 존재하는 P 파를 근거로 AVRT 를 진단할 수 있다."}, {"subject": "빈맥", "year": ["13학번"], "professor": "김지훈", "question": "다음은 reentry 에 대한 설명이다. 해당하는 것은? (짤변)", "images": [], "text_box": null, "options": ["세포 내 Ca2+이온의 증가로 인한다.", "각 전도로에 전도성의 차이가 있으면 성립되기 어렵다.", "태어날때부터 존재하는 전도로로는 WPW 증후군의 부전도로가 해당된다.", "aconitine 독성으로 발생하는 빈맥성 부정맥 발생의 주요 기전이다.", "심근경색증 후에 발생하는 accerelated idioventricular rhythm 도 여기에 속한다."], "answer": [2], "explanation": "1, 4 은 triggered activity 에 대한 설명, 2 는 차이가 필요, 5는 심근경색증 후에 발생하는 것은 다른 기전입니다. WPW 증후군의 부전도로는 reentry 기전의 하나로, 태어날 때부터 존재하는 비정상 전도로에 해당합니다."}, {"subject": "빈맥", "year": ["13학번"], "professor": "김지훈", "question": "빈맥이 시작되는 과정을 기록한 심전도이다. 이 부정맥을 종료시키는 데 가장 효과적인 약제는? (짤)", "images": [], "text_box": null, "options": ["아데노신", "베타차단제", "아미오다론", "디곡신", "칼슘차단제"], "answer": [0], "explanation": "2번째 T파 이후부터 빈맥성 부정맥이 있습니다. 간격이 비교적 일정하고, narrow QRS 이며, P 파가 소실되었으므로 PSVT(중에서도 AVRT)의 가능성이 큽니다.이 경우 우선 vagal maneuver(Valsalva maneuver, 경동 맥 마사지)를 시도해 본 후 부정맥이 지속되면 AV node blocker 인 아데노신을 IV 로 투여합니다."}, {"subject": "빈맥", "year": ["13학번"], "professor": "김지훈", "question": "심장부정맥의 기전에 대한 설명이다. 맞는 것은?", "images": [], "text_box": null, "options": ["가장 흔한 기전은 비정상 자동능이다.", "Reentry 기전에서는 지속적으로 심박 수가 증가하는 warm-up 현상이 특징이다.", "비정상 자동능에 의한 부정맥은 sudden onset 이 특징이다.", "Triggered activity 는 세포내 Na+ 이온의 증가로 나타난다.", "AVRT 와 AVNRT 는 reentry 기전으로 발생한다."], "answer": [4], "explanation": "PAD. 가장 흔한 것은 reentry 이며 warm-up 현상은 abnormal automaticity 에서 나타난다(sudden onset 이 아닌 서서히 빨라졌다 서서히 종료). Triggered activity 는 세포 내 Ca2+ 이온의 증가로 나타난다."}, {"subject": "빈맥", "year": ["13학번"], "professor": "이만영", "question": "다음 심전도에서 관찰되는 소견으로 옳은 것은?(12 동일)", "images": [], "text_box": null, "options": ["pre-excited tachycardia", "atrial fibrillation", "VT showing capture beat(포획 박동)", "WPW with atrial fibrillation", "sinus tachycardia with underlying left bundle branch block."], "answer": [2], "explanation": "4번째 narrow QRS = capture beat. 제시된 심전도는 wide QRS 빈맥 중 4번째 박동이 좁은 QRS 형태로 나타나는 capture beat 소견을 보여 심실빈맥(VT)에 합당합니다. VT에서 capture beat는 AV dissociation의 증거로 VT 진단에 유용합니다."}, {"subject": "빈맥", "year": ["12학번"], "professor": "김성환", "question": "33 세 남자가 1시간 전부터 가슴이 두근거려서 왔다. 심전도는 다음과 같다. (그림 1) 혈압은 110/80mmHg 이었다. 이 환자에게 우선적으로 시도할 수 있는 치료 중 맞는 것은?", "images": [], "text_box": "33 세 남자가 1시간 전부터 가슴이 두근거려서 왔다. 심전도는 다음과 같다. (그림 1) 혈압은 110/80mmHg 이었다.", "options": ["경동맥마사지", "아데노신 정주", "베라파밀 정주", "디곡신 정주", "베타차단제 정주"], "answer": [2], "explanation": "심전도는 fusion beat 를 보이는 idiopathic VT, LV post origin 하는 VT 로 fascicular VT 를 의심할 수 있다. 혈액학적으로 안정된 fascicular VT 에서 verapamil 정주를 우선적으로 시도해 볼 수 있다. (클레임에 대한 답 공지) Fascicular VT는 verapamil- sensitive VT로 불릴 정도로 verapamil이 치료에 중요합니다. 만에 하나 verapamil이 듣지 않는다면, beta blocker 도 써볼 수는 있겠지만 1차 선택은 verapamil입니다. Verapamii을 고르지 않았다는 것은 fascicular VT의 특징을 모른다는 것이므로, 그 외의 답은 인정할 수 없습니다."}, {"subject": "빈맥", "year": ["12학번"], "professor": "김지훈", "question": "다음 중 reentry 기전의 부정맥은?", "images": [], "text_box": null, "options": ["sinus tachycardia", "AVNRT", "ectopic atrial tachycardia", "digitoxicity 로 인한 ventricular ectopy", "accelerated junctional rhythm"], "answer": [1], "explanation": "AVNRT & AVRT 가 있었죠! Reentry 기전은 AVNRT(방실결절 회귀성 빈맥)의 주요 발생 기전입니다."}, {"subject": "빈맥", "year": ["12학번"], "professor": "김지훈", "question": "32 세 여자 환자가 지속되는 심계항진과 호흡곤란을 호소하며 내원하였다. 응급실에서 시행한 심전도 소견이다. 진단은?", "images": [], "text_box": "32 세 여자 환자가 지속되는 심계항진과 호흡곤란을 호소하며 내원하였다. 응급실에서 시행한 심전도 소견이다.", "options": ["ventricular tachycardia", "preexcited tachycardia", "PSVT with LBBB aberrancy", "PSVT", "WPW with atrial fibrillation"], "answer": [0], "explanation": "wide QRS! 제시된 심전도는 넓은 QRS 복합체를 보이며 규칙적인 빈맥입니다. 이는 심실 빈맥(VT)을 시사하며, 특히 젊은 환자에서 지속적인 심계항진과 호흡곤란은 심실 빈맥의 가능성을 높입니다."}, {"subject": "빈맥", "year": ["12학번"], "professor": "김지훈", "question": "심장부정맥의 기전에 대한 설명이다. 옳지 않은 것은? (짤)", "images": [], "text_box": null, "options": ["가장 흔한 기전은 reentry 이다.", "비정상 자동능 기전의 대표적 부정맥은 심근경색증후 발생하는 심실빈맥이다.", "비정상 자동능인 경우 지속되며 rate 이 증가하는 이른바 warm up 현상이 특징적이다.", "triggered activity 는 세포 내 주로 Ca 이온의 증가로 인한다.", "reentry 기전의 대표적 부정맥은 AVRT, AVNRT 등이다."], "answer": [1], "explanation": "가장 흔한 기전은 Reentry이며, 비정상 자동능인 경우 warm-up 현상이 특징입니다. Triggered activity는 Ca2+ 이온 증가와 관련이 있습니다. 심근경색증 후 발생하는 심실빈맥은 주로 Reentry 기전으로 발생하며, 비정상 자동능의 대표적 부정맥으로 보기는 어렵습니다."}, {"subject": "빈맥", "year": ["12학번"], "professor": "김지훈", "question": "다음 빈맥의 종류 중 QRS-QRS 사이의 간격이 불규칙한 특성을 보이는 빈맥은?", "images": [], "text_box": null, "options": ["방실회귀빈맥", "심방세동", "발작성심방빈맥", "심실빈맥", "심방조동"], "answer": [1], "explanation": "RR interval 이 불규칙한 것은 심방세동! Irregularly irregular 라는 표현을 쓰기도 함."}, {"subject": "빈맥", "year": ["12학번"], "professor": "김지훈", "question": "다음의 경우 중 adenosine 을 투여하여 빈맥의 종료가 예상되는 경우로 옳은 것은?", "images": [], "text_box": null, "options": ["방실결절빈맥", "심방세동", "발작성 신방빈맥", "심방조동", "심실빈맥"], "answer": [0], "explanation": "adenosine 은 AV block 으로 방실전도장애를 빨리 안정시킬 때 유용하게 쓰이는 약제입니다. 보기에서 AV block 으로 치료할 수 있는 보기는 1번 뿐입니다."}, {"subject": "빈맥", "year": ["12학번"], "professor": "김지훈", "question": "아래 그림의 빈맥의 기전으로서 가장 가능성이 높다고 판단되는 경우를 고르시오.", "images": [], "text_box": null, "options": ["방실회귀빈맥", "방실결절회귀빈맥", "발작성 심방빈맥", "심방조동", "심방세동"], "answer": [0], "explanation": "narrow QRS 가 regular 하게 나오는 tachycardia 입니다. PSVT 겠네요. 게다가 retrograde p가 잘 보이므로 AVRT 입니다."}, {"subject": "빈맥", "year": ["12학번"], "professor": "이만영", "question": "RBBB에 대한 설명이다. 옳은 것은?(노태호, 11동일)", "images": [], "text_box": null, "options": ["V1유도에서 토끼의 오른쪽 귀가 더 크다(RSr')", "토끼의 오른쪽 귀(R)는 심실 activation 초기 septal activation이 V6을 향하기 때문이다.", "토끼의 양쪽 귀 사이의 S는 RBBB로 먼저 우심실이 activation됨으로 인한다.", "토끼의 왼쪽 귀는 먼저 좌심실로 간 전기가 우심실을 향해 돌아옴으로 인해 생긴다.", "V6에서는 deep Q가 나타난다."], "answer": [3], "explanation": "1) V1유도에서 토끼의 왼쪽귀가 더 큽니다(rSR'). 2) 토끼의 오른쪽 귀(R)는 심실 activation 초기 septal activation이 V1을 향하기 때문입니다. 3) 토끼의 양쪽 귀 사이의 S는 RBBB로 먼저 좌심실이 activation됨으로 인합니다. 5) V6에서는 septal Q가 나타납니다. RBBB에서 V1 유도에서는 M자 형태(rSR' 또는 RSR'), V6에서는 깊은 S파가 나타나며, V1의 R'파는 우심실 활성화 지연으로 인해 발생합니다."}, {"subject": "빈맥", "year": ["12학번"], "professor": "이만영", "question": "regular wide QRS tachycardia 로 심실율이 분당 160 회이고, QRS 모양이 lead I, aVF 두 유도 모두에서 invert 되어있다면 가장 가능성이 큰 진단은?", "images": [], "text_box": null, "options": ["방실결절회귀빈맥", "방실회귀빈맥", "심실빈맥", "심방빈맥", "WPW syndrome with atrial fibrillation"], "answer": [2], "explanation": "no man's land = VT. Wide QRS tachycardia와 lead I, aVF에서 모두 QRS가 역전되어 나타나는 것은 'no man's land' axis를 의미하며, 이는 심실빈맥(VT)의 강력한 시사 소견입니다."}, {"subject": "빈맥", "year": ["10학번", "고대"], "professor": "이만영", "question": "다음 심전도에서 관찰되지 않는 소견을 고르시오.", "images": [], "text_box": null, "options": ["Ventricular tachycardia", "AV dissociation(방실해리)", "Capture beat(포획박동)", "Fusion beat(유합박동)", "Pre-excitation(delta wave)"], "answer": [4], "explanation": "빨간 화살표가 QRS 와 상관없이 중간에 나오는 P wave 로 AV dissociation=VT 입니다. 4 번째 narrow QRS=capture beat, 7 번째(작성자 피셜) 애매한 QRS = fusion beat. Pre-excitation(delta wave)는 WPW 증후군 소견입니다. 제시된 심전도에서는 심실빈맥의 특징인 AV dissociation, capture beat, fusion beat가 관찰되지만, WPW 증후군의 특징인 delta wave는 보이지 않습니다."}, {"subject": "빈맥", "year": ["10학번"], "professor": "이만영", "question": "다음은 심전도에서 wide QRS tachycardia 의 형태를 보일 수 있는 경우들이다. 원인으로서 옳지 않은 것은?", "images": [], "text_box": null, "options": ["심실성 빈맥", "방실결절회귀빈맥의 편위전도", "좌각차단이 동반된 방실회귀빈맥", "WPW 증후군 환자에서 심방세동이 발생된 경우", "2:1 방실전도를 보이는 심장조동"], "answer": [4], "explanation": "저희는 wide QRS 에 대해 VT(75%)와 그 외에 다른 경우(25%)는 다음과 같았습니다. - SVT with bundle branch block(EX. SVT+RBBB 인 경우) - SVT with aberration - SVT with pre-excitation - antidromic AVRT. 2:1 방실전도를 보이는 심방조동은 일반적으로 narrow QRS tachycardia로 나타납니다. wide QRS를 보이는 경우는 QRS aberration이나 preexisting bundle branch block이 동반된 경우이지만, 심방조동 자체가 wide QRS의 직접적인 원인이 되는 것은 아닙니다. 따라서, 2:1 방실전도를 보이는 심장조동은 wide QRS tachycardia의 주요 원인으로 보기는 어렵습니다."}, {"subject": "빈맥", "year": ["김성환"], "professor": "김성환", "question": "3 개월 전 전벽부의 급성심근경색으로 관상동맥중재술을 받고 퇴원하였던 45 세 남자가 실신으로 응급실로왔다. 심초음파상 좌심실 구혈율 26%였으며 관상동맥조영술에서 새로운 병변은 관찰되지 않았다. 시행한 홀터 모니터링에서 다음과 같은 소견을 보였을 때 다음으로 고려하여야할 치료는?", "images": [], "text_box": "3 개월 전 전벽부의 급성심근경색으로 관상동맥중재술을 받고 퇴원하였던 45 세 남자가 실신으로 응급실로왔다. 심초음파상 좌심실 구혈율 26%였으며 관상동맥조영술에서 새로운 병변은 관찰되지 않았다. 시행한 홀터 모니터링에서 다음과 같은 소견을 보였을 때 다음으로 고려하여야할 치료는?", "options": ["calcium channel block", "digoxin", "profapenone", "pacemaker", "ICD"], "answer": [4], "explanation": "ICD 는 recurrent arrhythmia and/of cardiac syncope 을 가진 HF 환자에서 sustained ventricular tachycardia and/or ventricular fibrillation 의 recurrence 를 치료하는데에 매우 effective 하다. Amiodarone and/or beta blocker 와 combination 하여 사용해볼 수 있다."}, {"subject": "빈맥", "year": ["김성환"], "professor": "김성환", "question": "2년 전 심근경색병력이 있는 50세 환자가 갑자기 시작된 심한 호흡곤란을 호소하며 응급실로 이송되어 왔다. 혈압은 70/40 mmHg, 심전도에서 다음과 같은 소견이 있을 때 시도 해 볼 수 있는 치료를 고르시오.", "images": [], "text_box": "2년 전 심근경색병력이 있는 50세 환자가 갑자기 시작된 심한 호흡곤란을 호소하며 응급실로 이송되어 왔다. 혈압은 70/40 mmHg, 심전도에서 다음과 같은 소견이 있을 때 시도 해 볼 수 있는 치료를 고르시오.", "options": ["procainamide IV", "lidocain IV", "amiodarone IV", "DC cardioversion", "carotid massage"], "answer": [3], "explanation": "심전도는 wide QRS tarchycardia. 심근경색 환자에서 나타난 것으로 다른 것으로 확인되기 전에는 ventricular tarchycardia로 간주한다. 현재 활력증후가 쇼크 상태이기 때 문에 감별 진달할 시간이나 약제 투여의 여유가 없으며 즉시 DC cardioversion하는 것만이 선택 가능한 치료이다."}, {"subject": "빈맥", "year": ["김성환"], "professor": "김성환", "question": "63세 여자. 발작성 심방세동으로 아미오다론 투약중인 환자로 내원 시 심전도는 (그림 1)과 같다. 혈액 검사상 Na 148 mg/dL, K 2.9mg/dL 보인다. 치료 중 (그림 2)의 심전도 소견 을 보였다. 진단은?", "images": [], "text_box": "63세 여자. 발작성 심방세동으로 아미오다론 투약중인 환자로 내원 시 심전도는 (그림 1)과 같다. 혈액 검사상 Na 148 mg/dL, K 2.9mg/dL 보인다.", "options": ["심실 세동", "다형성 심실빈맥 (Torsade des pointes)", "심방 조동", "심실 조기수축", "심방 세동을 동반한 조기 흥분 증후군"], "answer": [1], "explanation": "그림 1에서는 긴 QT 간격을 보이고 있다. 이는 아미오다론 치료와 동반한 저칼륨혈증으로 인해 유발되었으며 QT 간격이 늘어나면서 이로 인한 polymorphic VT (Torsade des pointes)를 보이고 있다. 전시간 문제긴한데 복습겸 넣어봤습니다."}, {"subject": "빈맥", "year": ["고대"], "professor": "김지훈", "question": "52 세 남자가 반나절 전부터 가슴이 두근거리고 숨이 찬다고 하여 외래로 내원하였다. 혈압은 130/80mmHg, 심박수는 140~160/min 정도였고 의식은 명료하였다. 특별한 병력은 없었고 흉부 X선 검사상 경한 심비대, pulmonary congestion 이 있었고 심전도에서 다음의 소견을 보였다. 진단은?", "images": [], "text_box": "52 세 남자가 반나절 전부터 가슴이 두근거리고 숨이 찬다고 하여 외래로 내원하였다. 혈압은 130/80mmHg, 심박수는 140~160/min 정도였고 의식은 명료하였다. 특별한 병력은 없었고 흉부 X선 검사상 경한 심비대, pulmonary congestion 이 있었고 심전도에서 다음의 소견을 보였다.", "options": ["MAT", "PSVT", "atrial flutter", "atrial fibrillation", "ventricular tachycardia"], "answer": [2], "explanation": "심전도는 규칙적인 narrow QRS 빈맥을 보입니다. 특히 하벽 유도에서 톱니바퀴 모양의 F파가 명확하게 관찰되므로 심방조동으로 진단할 수 있습니다. 환자의 증상과 혈압, 심박수 등을 고려할 때 심방조동이 가장 적절한 진단입니다."}, {"subject": "빈맥", "year": ["고대"], "professor": "김지훈", "question": "심계항진 시 심전도와 동율동 시의 심전도를 비교한 그림이다. 소견으로 미루어 빈맥의 기전으로 가장 가능성 높은 것은?", "images": [], "text_box": null, "options": ["AVNRT", "AVRT", "Atrial tachycardia", "Atrial flutter", "Atrial fibrillation"], "answer": [0], "explanation": "심계항진시 심전도를 보면 HR=150 정도로 tachycardia 이고 narrow QRS, RR interval 이 일정 하므로 PSVT 를 의심할 수 있습니다. 따라서 우선 4번과 5 번은 기각되고요, 심계항진시 심전도를 보면 inverted T파만보이고 P 파는보이지않습니다.정상시 보이는 P 파랑비교해보면 P 파가보이지 않는다는 사실이 더 명백해집니다. 따라서 1번이 정답에 가장 가깝습니다."}, {"subject": "빈맥", "year": ["고대"], "professor": "김지훈", "question": "Adenosine 투여 시 빈맥이 종료될 것으로 예상되는 것은?", "images": [], "text_box": null, "options": ["AVRT", "AF", "AVNRT", "AT"], "answer": [0, 2], "explanation": "PSVT! Adenosine은 AV node를 차단하여 AV node를 포함하는 재진입성 빈맥(AVRT, AVNRT)을 종결시키는 데 효과적입니다."}, {"subject": "빈맥", "year": ["김지훈"], "professor": "김지훈", "question": "신후신염으로 입원하고 있던 62 세 여자 환자가 갑자기 정신을 잃고 쓰러졌다.", "images": [], "text_box": "신후신염으로 입원하고 있던 62 세 여자 환자가 갑자기 정신을 잃고 쓰러졌다.", "options": ["coronary angiography", "electrocyte 확인", "amiodarone 150mg IV", "DC cardioversion energy 출력을 더 올린다", "ECMO", "Magnesium sulfate IV", "cardiac massage 지속", "epinephrine 1mg IV"], "answer": [1, 5], "explanation": "2번 심전도는 long QT 를 보이고 있고 반복되는 실신과 심실세동이 torsades de pointes 를 통해서 발생하고 있는 것으로 추정된다. 이것을 manage 하기 위한 추가 조치로는 QT 를 길게 하는 전해질 이상, 약제, 서맥등을 확인하고 교정해주고 magnesium 이나 lidocain IV, overdrive pacing 등이 가능하다."}, {"subject": "빈맥", "year": ["노태호"], "professor": "노태호", "question": "다음은 no man's land를 설명한 것이다. 옳은 것은?", "images": [], "text_box": null, "options": ["심전도에서 심실전기 흐름의 방향을 의미하는 것으로 northeast axis이다", "심실전기 흐름의 정상방향인 우상에서 좌하로 향함을 의미한다", "비정상적인 심방의 전기흐름의 방향으로 방실결절에서 좌우 심방을 향하는 concentric retrograde atrial activation이 다", "비정상적인 심방의 전기흐름의 방향으로 좌심방의 심방이 (atrial appendage)에서 우심방을 향하는 방향을 의미한다", "심실에서 심방을 향하는 (-90도에서 -180도 사이) 전기흐름의 방향으로 주로 심실빈맥에서 나타나는 electric axis이다."], "answer": [4], "explanation": "1) northwest axis입니다. 5)-90~-180 사이(\\는 no man's land로 심실빈맥 소견입니다. No man's land는 심실빈맥(VT)에서 흔히 관찰되는 극심한 축 편향을 의미하며, 이는 심실 탈분극의 비정상적인 경로를 반영합니다."}, {"subject": "빈맥", "year": ["장성원"], "professor": "장성원", "question": "허혈성 심부전으로 10년째 투약중인 72 세 여자 환자가 실신으로 내 였다. 환자는 집안일을 하던 중 가슴이 답답한 증상이 있었으며 정신을 잃고 쓰러졌다가 102 분 후에 깨어났으며 신체에 다른 이상소견은 없었다. 심초음파 검사상 좌심실 구혈율은 27%였고, 좌심실 확장 소견이 관찰되 었다. 24 시간 Holter 검사상 non-sustained ventricular tachycardia 가 두 번 기록되었다. 이 환자에서 적절한 다음 단계의 치료는?", "images": [], "text_box": "허혈성 심부전으로 10년째 투약중인 72 세 여자 환자가 실신으로 내 였다. 환자는 집안일을 하던 중 가슴이 답답한 증상이 있었으며 정신을 잃고 쓰러졌다가 102 분 후에 깨어났으며 신체에 다른 이상소견은 없었다. 심초음파 검사상 좌심실 구혈율은 27%였고, 좌심실 확장 소견이 관찰되 었다. 24 시간 Holter 검사상 non-sustained ventricular tachycardia 가 두 번 기록되었다.", "options": ["digoxin", "amiodarone", "영구형 심장박동기 (permanent pacemaker)", "삽입형 제세동기 (implantable cardioverter defibrillator)", "도자절제술(catheter ablation)"], "answer": [3], "explanation": "sudden cardiac arrest 의 예방을 위해 ICD 삽입합니다. 낮은 좌심실 구혈율과 실신 병력, 비지속성 심실빈맥이 관찰되는 환자의 경우, 급사 예방을 위해 삽입형 제세동기(ICD)를 삽입하는 것이 가장 적절한 치료입니다."}, {"subject": "빈맥", "year": ["장성원"], "professor": "장성원", "question": "다음 중 도자절제술(catheter ablation)로 완치 가능성이 가장 낮은 질환은?", "images": [], "text_box": null, "options": ["Brugada 증후군", "방실회귀빈맥 (atrioventricular reentrant tachycardia)", "방실결절회귀빈맥 (atrioventricular nodal reentrant tachycardia)", "심방빈맥 (atrial tachycardia)", "심방조동 (atrial flutter)"], "answer": [0], "explanation": "Brugada 증후군은 주로 유전적 요인에 의해 심장 이온 채널 기능에 이상이 생겨 발생하는 질환으로, 부정맥 발생 부위를 특정하기 어렵습니다. 따라서 도자절제술보다는 ICD 삽입이 주된 치료법입니다. 다른 보기들은 도자절제술로 완치 또는 효과적인 조절이 가능한 재진입성 빈맥이나 국소 자동능 증가 빈맥들입니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["21학번"], "professor": "김동빈", "question": "내원 30분전 발생한 심한 가슴통증으로 내원 환자의 심전도이다. 적절한 다음 검사는?", "images": [], "text_box": null, "options": ["관상동맥촬영", "혈액 칼륨 측정", "혈액 심근표지자 측정", "30분후 심전도 재측정", "흉부 전산화 단층촬영"], "answer": [0], "explanation": "심전도에서 V1~V4 유도에 걸쳐 ST분절 상승이 명확하게 관찰됩니다. 이는 급성 전벽 ST분절 상승 심근경색(STEMI)을 시사하는 소견입니다. STEMI의 경우 신속한 혈관 재개통이 중요하므로, 진단을 확정하고 치료 계획을 세우기 위해 가장 적절한 다음 검사는 관상동맥촬영(coronary angiography)입니다. 이는 Primary PCI로 이어질 수 있는 필수적인 단계입니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["20학번", "18학번"], "professor": "김동빈", "question": "다음 중 이 환자에 대한 설명으로 가장 맞는 것을 고르시오.", "images": [], "t

ext_box": "48세 남자환자가 새벽에 갑자기 발생한 심한 가슴흉통이 30분이상 지속되어 내원하였다. 내원 당시 시행한 심전도이다. 응급으로 시행한 혈액 검사에서 glucose 163mg/dL, creatinine 1.23mg/dL, AST 45 IU/L, 그리고 troponin 740.050 ug/mL(참고치 0.014ng/mL 미만)을 보였다. 응급으로 시행한 관상동맥 조영술에서 좌전하행지의 중간부위에 혈전을 동반한 심한 협착이 관찰되어 관상동맥 성형술 및 스텐트 삽입술을 시행하였다.", "options": ["상기 환자에서 dual antiplatelet therapy는 한달간만 유지하고 이후에는 아스피린 단독요법으로 복용하게 한다.", "상기 환자의 심초음파를 보면 좌심실의 하벽과 측벽의 맥운동 장애가 관찰될 것이다.", "상기 환자의 심전도에서 맥운동 장애부위를 판단하기 어렵다.", "Clopidogrel은 COX1 저해제로 thromboxane A2합성을 감소시켜 항혈소판 효과를 가진다.", "상기 환자의 병태생리 중 가장 흔한 것은 관상동맥 내 죽상경화반의 미란과 이에 따른 혈전합성에 의한 것이다."], "answer": [2], "explanation": "환자는 심한 가슴흉통, 트로포닌 상승, 그리고 관상동맥 조영술에서 좌전하행동맥(LAD)의 심한 협착 및 혈전이 확인되어 전벽 ST분절 상승 심근경색(STEMI)으로 진단됩니다. 심전도에서 V1, V2에 ST분절 상승 소견이 보이지만, 명확한 국소 벽운동 장애 부위를 특정하기는 어려울 수 있습니다. DAPT는 혈관재개통술 후 최소 1년 이상 유지하는 것이 권고됩니다. Clopidogrel은 P2Y12 억제제이며, COX1 저해제는 아스피린입니다. STEMI의 가장 흔한 병태생리는 죽상경화반의 파열과 이로 인한 혈전 형성입니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["20학번"], "professor": "김동빈", "question": "취해야 할 조치 중 가장 맞는 문항을 고르시오.", "images": [], "text_box": "63세 남자가 2시간 전부터 발생한 흉통을 주소로 응급실로 내원하였다. 고혈압이 있었고 30년전부터 흡연하고 있는 애연가였다. 내원 당시 혈압은 93/57이었고 심전도 소견은 다음과 같다.", "options": ["NSTEMI가 의심되고, 흉통이 지속되어 긴급히 관상동맥 조영술을 시행해 보아야 한다.", "Pericarditis 가능성이 높아서 심초음파를 진행하면서 경과관찰한다.", "심전도 소견이 이상이 없어 dissection을 배제하기 위해 대동맥 CT를 촬영한다.", "STEMI 가능성이 높아서 긴급히 관상동맥 조영술 시행을 준비해야 한다.", "GERD 가능성이 높아 proton pump inhibitor를 투여하면서 심전도를 추적검사한다."], "answer": [3], "explanation": "심전도상 ST분절 상승이 명확하고, 심한 흉통 및 저혈압은 ST분절 상승 심근경색(STEMI)과 심인성 쇼크를 시사합니다. STEMI의 경우, 가능한 한 빨리 일차적 경피적 관상동맥 중재술(Primary PCI)을 시행하는 것이 표준 치료이며, 이는 사망률을 낮추는 데 가장 효과적입니다. 따라서 긴급히 관상동맥 조영술 시행을 준비하는 것이 가장 적절한 조치입니다. NSTEMI나 다른 질환 가능성보다는 STEMI에 준하여 신속하게 대응해야 합니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["20학번"], "professor": "김동빈", "question": "다음 중 환자의 치료 중에서 가장 맞는 것은?", "images": [], "text_box": "63세 남자가 2시간전에 발생한 심한 흉통으로 내원하였다. 4년 전부터 당뇨와 고혈압 약물을 복용하고 있었다. 응급실 내원 당시 혈압 30/60 mmHg, 맥박 74회/분, 호흡 22회/분, 체온 37.1도이다. 가슴 청진에서 심잡음은 없고 양쪽 등쪽 아랫부분에서 거품소리가 들린다. 심전도 소견은 다음과 같다.", "options": ["Acute NSTEMI이지만 환자의 혈압이 낮으므로 일차적 관상동맥 중재술을 서둘러서 시행해야 한다.", "혈압이 떨어진 cardiac tamponade이므로 서둘러서 pericardiocentesis를 해야 한다.", "Acute STEMI 환자이지만 혈압이 낮으므로 일차적 관상동맥 중재술을 하기 전에 빨리 투여할 수 있는 혈전 용해제를 정맥 주사하여야 한다.", "Acute STEMI 환자이므로 일차적 관상동맥 중재술을 시행하여야 한다.", "제일 먼저 삽입형제세동기 시술을 해야 한다."], "answer": [3], "explanation": "심전도상 V2~V5에서 ST분절 상승이 관찰되어 Acute STEMI로 진단됩니다. 환자는 저혈압과 폐수포음(거품소리)을 보여 심인성 쇼크가 동반된 상태입니다. STEMI로 인한 심인성 쇼크에서는 가능한 한 빨리 관상동맥의 재관류를 시도해야 하며, Primary PCI가 가장 효과적인 치료입니다. PCI가 가능한 상황에서 혈전용해제는 PCI를 대체할 수 없으며, 삽입형 제세동기는 심실세동 치료에 사용됩니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["20학번"], "professor": "김동빈", "question": "심근 경색 환자에서 항혈소판 약제 사용 때 맞는 말은?", "images": [], "text_box": null, "options": ["약제는 1년 이상 사용을 금해야 한다.", "부작용은 저혈압이다.", "1년 이내에는 두 가지 약제를 복합적으로 사용하는 것을 추천한다.", "Clopidogrel과 prasugrel은 같이 사용해도 효과가 좋다.", "Wafarin 단독 사용이 아스피린과 clopidogrel 사용보다 효과가 좋다."], "answer": [2], "explanation": "심근경색 환자에서는 혈관 재개통술 후 재협착 및 혈전증을 예방하기 위해 이중 항혈소판 요법(DAPT)이 중요합니다. 일반적으로 아스피린과 P2Y12 억제제(Clopidogrel, Prasugrel, Ticagrelor 중 하나)를 1년 이내 복합적으로 사용하는 것을 권장합니다. Prasugrel은 Clopidogrel과 동일 계열의 약물로, 같이 사용하는 것이 아니라 P2Y12 억제제 중 하나를 선택하여 사용합니다. 와파린은 항응고제이며, 항혈소판제와 병용할 수는 있으나 단독 사용이 아스피린+클로피도그렐보다 효과적이지는 않습니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["20학번"], "professor": "장기육", "question": "이 덩어리의 가장 초기 발생 기전은?", "images": [], "text_box": "65세 남자가 흉통으로 응급실을 내원하였다. 3주일 전부터는 운동시 흉통이 있다가 1분내로 호전되었으나. 전일 새벽에 수면 중에 심한 흉통이 30분 이상 지속되어 내원했다. 관상동맥조영검사 후 아래 그림과 같은 덩어리를 흡입 도관을 이용하여 관상동맥내에서 제거하였다.", "options": ["혈소판의 응집", "트롬빈의 활성화", "파열 죽상반 부위에 섬유소를 형성", "혈류 속도의 감소", "플라스미노겐의 활성화"], "answer": [0], "explanation": "관상동맥조영검사에서 제거된 덩어리는 혈전이며, 죽상반 파열에 이은 혈소판의 응집이 혈전 형성의 가장 초기 기전입니다. 혈소판 응집 이후 트롬빈 활성화 및 섬유소 형성이 순차적으로 발생하며, 이는 혈류 속도 감소로 이어집니다. 따라서 혈소판의 응집이 가장 초기 발생 기전입니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["19학번", "18학번"], "professor": "김동빈", "question": "학생이 현재 응급실 당직이라면 취해야 할 가장 맞는 조치를 선택하시오.", "images": [], "text_box": "59세 남자 환자가 새벽 2시에 2시간 전부터 발생한 흉통을 주소로 응급실로 내원하였다. 고혈압이 있었고 30년 전부터 흡연했다. 응급실로 내원했을 때 흉통은 어느정도 가라앉아서 경도의 흉통을 호소했다. 내원당시 혈압은 98/57 이었고 심전도 소견은 다음과 같다.", "options": ["NSTEMI 가능성이 높아서 serial ECG 촬영하면서 흉통 악화되는지 지켜본다", "Pericarditis 가능성이 높아서 심초음파를 진행하면서 경과 관찰한다", "심전도 소견이 이상이 없어서 aortic dissection을 배제하기 위해 대동맥 CT를 진행한다", "troponin 수치를 측정한 후, 새벽 2 시지만 내과 당직에게 연락한다", "GERD 가능성이 높아 PPI를 투여하면서 심전도를 추적 검사한다"], "answer": [3], "explanation": "심전도에서 V1~V5 리드에서 ST분절 상승이 보이며 이는 전벽 ST분절 상승 심근경색(STEMI)을 시사합니다. STEMI는 응급 상황으로 즉각적인 재관류 치료가 필요합니다. 트로포닌 수치 확인은 진단에 도움이 되나, ST분절 상승이 명확하므로 지체 없이 내과 당직에게 연락하여 관상동맥 중재술(PCI)을 준비해야 합니다. 새벽 시간이라 할지라도 STEMI는 신속한 대처가 중요합니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["19학번", "18학번"], "professor": "장기육", "question": "이 덩어리는 어떤 특성을 가진 조직인가?", "images": [], "text_box": "76세 남자가 흉통으로 응급실을 방문했다. 5년 전부터 고지혈증 및 고혈압 약물 치료를 받았으나, 최근 검사상 고지혈증 호전 되어 약물 치료 중단하였다. 1주일 전부터는 등산을 시작할 때만 흉통이 있다가 1분내로 호전되었으나, 당일 새벽에 수면 중에 심한 흉통이 30분 이상 지속되어 내원하여, 관상 동맥 조영 검사 후 아래 그림과 같은 덩어리를 흡입 도관을 이용하여 관상동맥 내에서 제거하였다.", "options": ["혈관 내막하 동맥경화반의 일부분으로 구성된 조직", "백혈구가 풍부한 백색 혈전과 적혈구가 혼재된 조직", "혈소판이 풍부한 혈전 조직", "섬유소와 적혈구가 혼합되어 있는 적색 혈전 조직", "대식세포가 세포자멸현상으로 인해 발생한 세포부스러기가 적혈구와 혼재된 혈전 조직"], "answer": [2], "explanation": "환자의 증상 발현 양상(일주일 전부터 운동시 흉통, 당일 새벽 수면 중 심한 흉통 30분 이상 지속)은 불안정 협심증(UA) 또는 비ST분절 상승 심근경색(NSTEMI)의 가능성이 높습니다. 이러한 경우 혈전은 주로 혈소판이 풍부한 '백색 혈전'의 특성을 가집니다. 따라서 혈소판이 풍부한 혈전 조직이라는 설명이 가장 적합합니다. ST분절 상승 심근경색(STEMI)의 경우 섬유소와 적혈구가 풍부한 '적색 혈전'이 흔하게 관찰됩니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["18학번"], "professor": "김동빈", "question": "환자의 치료로 알맞은 것을 고르시오.", "images": [], "text_box": "68세 여성이 샤워 중 쓰러져 119에 신고가 들어왔습니다. 119 방문 당시 맥박이 없었으며 심폐소생술을 시행하여 맥박과 혈압이 돌아왔습니다. 4년 전부터 당뇨와 고혈압으로 약을 복용하고 있었으며 응급실에서 측정한 결과 혈압 80/60, 맥박 74회/분, 호흡수 22회/분, 체온 37.1도로 나타났습니다. 가슴 청진에서 심잡음은 들리지 않았고 양쪽 등의 아래쪽에서 거품소리가 들렸습니다. 심전도: 복구되지 않음", "options": ["Acute NSTEMI 환자로 혈압이 낮으므로 일차적 관상동맥 중재술을 시행해야 한다.", "혈압이 낮으며 cardiac tamponade를 보이고 있으므로 서둘러 pericardiocentesis를 시행해야 한다.", "Acute STEMI 환자로 혈압이 낮으므로 일차적 관상동맥 중재술 시행 전에 빠르게 투여 가능한 혈전용해제(tPA)를 정맥 주사한다.", "Acute STEMI 환자로 혈압이 낮으므로 일차적 관상동맥 중재술을 시행하여야 한다."], "answer": [3], "explanation": "환자는 심폐소생술 후 저혈압, 폐수포음 등 심인성 쇼크 소견을 보이며, 심전도상 ST분절 상승 심근경색(STEMI)이 의심됩니다. STEMI와 심인성 쇼크가 동반된 경우, 가장 시급하고 효과적인 치료는 일차적 경피적 관상동맥 중재술(Primary PCI)입니다. PCI가 가능할 경우, 혈전용해제 투여보다 PCI를 우선적으로 시행해야 합니다. Cardiac tamponade를 시사하는 심잡음이나 심장음 감소 소견은 없습니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["학번 불명"], "professor": "", "question": "STEMI 환자에서 t-PA를 사용하여 혈전용해요법을 한 후 다음과 같은 심전도를 보였다. 적절한 치료는?", "images": [], "text_box": null, "options": ["Rescue PCI", "Amiodarone 정주", "DC cardioversion", "Temporal pacemaker", "Clinical observation"], "answer": [4], "explanation": "제시된 심전도에서는 Accelerated Idioventricular Rhythm (AIVR)의 소견이 보입니다. AIVR은 혈전용해제 치료 후 재관류의 지표로 나타날 수 있는 양성 부정맥입니다. 이는 일반적으로 혈역학적으로 안정하며 자발적으로 소실되는 경우가 많으므로, 특별한 치료 없이 임상적 경과 관찰(Clinical observation)이 적절합니다. 혈역학적으로 불안정하거나 증상이 나타날 경우에만 추가적인 처치를 고려합니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["학번 불명"], "professor": "", "question": "어느 관상동맥 폐쇄로 인한 심전도인가?", "images": [], "text_box": null, "options": ["AV nodal a.", "Rt coronary a.", "LAD", "LCX", "Diagonal a."], "answer": [1], "explanation": "심전도에서 II, III, aVF 유도에서 ST분절 상승이 명확하게 관찰됩니다. 이 유도들은 심장의 하벽(inferior wall)을 나타내며, 하벽 경색은 주로 우관상동맥(Right Coronary Artery, RCA)의 폐쇄로 인해 발생합니다. 따라서 Rt coronary a. 폐쇄가 가장 적절한 원인입니다. LAD 폐쇄는 전벽 경색을, LCX 폐쇄는 측벽 경색을 유발합니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["학번 불명"], "professor": "", "question": "적절한 다음 치료약물은?", "images": [], "text_box": "52세 남자가 30분 전부터 갑자기 시작된 흉통과 호흡곤란으로 응급실을 방문하였다. 내원시 혈압은 160/100mmHg 검사실 소견상 CK MB 및 troponin은 정상 범위 이였다. 환자의 심전도다. 통증은 나이트로글리세린 설하정 투여 후에도 지속되었다.", "options": ["모르핀 정맥주사", "니트로푸루시드 정맥주사", "베타차단제 정맥주사", "헤파린 정맥주사", "혈전용해제 정맥주사"], "answer": [4], "explanation": "심전도에서 V1~V6 및 I 유도 등 광범위한 전벽 ST분절 상승이 관찰되어 급성 ST분절 상승 심근경색(STEMI) 소견입니다. 통증이 30분 전 시작되었고 CK MB 및 트로포닌이 아직 정상 범위인 것은 심근 손상이 이제 막 시작되었음을 의미합니다. 나이트로글리세린에도 반응하지 않는 심한 흉통이 지속되므로 혈전으로 인한 관상동맥 폐쇄가 강력히 의심됩니다. Primary PCI가 최우선이지만, 선지에 없으므로 신속한 재관류를 위한 혈전용해제 정맥주사를 고려할 수 있습니다."}, {"subject": "ST분절 상승 심근경색증", "year": ["학번 불명"], "professor": "", "question": "응급실 심전도이다. 가장 적절한 치료는?", "images": [], "text_box": "57세 남자가 갑자기 의식을 잃어 심폐소생술 후 응급실에 이송되었다.", "options": ["리도케인 정주", "심장막 천자", "인공 심박동기 삽입", "삽입형 제세동기 삽입", "일차적 관상동맥 중재술"], "answer": [4], "explanation": "심전도에서 II, III, aVF 유도에 ST분절 상승이 관찰되며, 이는 하벽 심근경색(inferior wall STEMI)을 시사합니다. ST분절 상승 심근경색은 응급 상황이며, 심근 손상을 최소화하고 예후를 개선하기 위해 가능한 한 빨리 혈관 재개통 치료를 해야 합니다. 일차적 경피적 관상동맥 중재술(Primary PCI)은 STEMI의 표준 치료이며, 심폐소생술 후에도 심근경색이 의심되는 경우 가장 적절한 치료입니다. 다른 선택지들은 부정맥 관리나 심낭염 등 다른 상황에 적용됩니다."}, {"subject": "부정맥 증상 및 진단", "year": ["21학번"], "professor": "오용석", "question": "해당된 환자에서 진단을 위해 가장 적합한 진단 방법은?", "images": [], "text_box": "고혈압이 있던 69세 남자가 2년전 실신을 한 번 했었고 금년 들어 3~4개월에 한 번씩 실신과 동반된 안면부 외상을 동반했다. 관동맥 CT, 초음파등에서는 정상소견을 보였다.", "options": ["단순 심전도", "24 시간 Holter Monitor", "휴대용 Event recorder 심전도기", "Treadmill exercise test", "Implantable loop recorder", "관상동맥 조영술"], "answer": [4], "explanation": "환자는 3~4개월에 한 번씩 실신이 동반된 증상을 겪고 있으며, 이는 증상 발생 빈도가 매우 낮은 경우에 해당합니다. 실신과 같은 심각한 증상이 동반되므로, 장기간 기록이 가능한 체내삽입사건기록기(Implantable loop recorder)가 가장 적합한 진단 방법입니다."}, {"subject": "부정맥 증상 및 진단", "year": ["21학번"], "professor": "장성원", "question": "추가로 필요한 검사는?", "images": [], "text_box": "52세 남자가 2개월전부터 가슴이 두근거려 내원하였다. 이래는 환자의 심전도이다.", "options": ["심장 초음파", "흉부 CT", "24시간 홀터검사", "운동부하심전도 검사", "전기생리검사(electrophysiologic test)"], "answer": [2], "explanation": "환자가 2개월 전부터 가슴 두근거림을 호소하며, 심전도에서 부정맥 소견이 관찰됩니다. 하루에 2~3회, 10분 정도의 증상 지속이 있다면 24시간 홀터검사가 부정맥의 양상을 파악하는 데 가장 적절합니다. 운동부하검사는 허혈성 심질환에 주로 사용되며, 전기생리검사는 침습적인 정밀 검사로 초기 진단 단계에서는 우선순위가 낮습니다."}, {"subject": "부정맥 증상 및 진단", "year": ["18학번", "17학번", "15학번", "14학번", "08학번"], "professor": "장성원", "question": "다음은 부정맥과 관련이 있는 전신질환에 대한 설명이다. 옳지 않은 것은?", "images": [], "text_box": null, "options": ["심근경색 외 과거력이 있고 왼심심박출율이 낮을 경우 심실빈맥의 가능성이 높다.", "승모판 협착증은 심방세동과 관련이 있다.", "만성폐색성폐질환이 있는 경우 심방빈맥이 잘 동반된다.", "갑상선중독증이 있는 경우 심방세동이 잘 동반된다.", "Brugada증후군은 심방세동과 관련이 있다."], "answer": [4], "explanation": "Brugada 증후군은 심실빈맥과 관련이 있으며, 심방세동과 관련이 있다는 설명은 옳지 않습니다. 심근경색 과거력과 낮은 좌심실 박출률은 심실빈맥 가능성을 높입니다. 승모판 협착증과 갑상선중독증은 심방세동과 관련이 있습니다. 만성폐색성폐질환(COPD)은 심방빈맥이 잘 동반됩니다."}, {"subject": "부정맥 증상 및 진단", "year": ["18학번"], "professor": "장성원", "question": "검사는?", "images": [], "text_box": "45세 남자가 1개월 전부터 가슴이 두근거린다며 병원에 왔다. 두근거림은 하루에 2~3회 10분 정도 지속되었다. 혈압은 110/70, 맥박 74회/분, 호흡 20회, 체온 36.7도 이다. 가슴 청진에서 심음과 호흡음은 정상이다.", "options": ["24시간 홀터검사", "기립경사도 검사", "운동부하검사", "체내삽입사건기록기", "전기생리검사"], "answer": [0], "explanation": "환자의 두근거림 증상이 하루에 2~3회, 10분 정도 지속되는 경우, 24시간 홀터검사(Holter monitoring)가 부정맥 진단을 위해 가장 적절합니다. 기립경사도 검사는 혈관미주신경성 실신 진단에, 운동부하검사는 허혈성 심질환 진단에 주로 사용됩니다. 체내삽입사건기록기는 증상 발생 빈도가 매우 낮을 때 (1년에 몇 번) 심각한 증상과 동반될 때 사용하며, 전기생리검사는 부정맥의 원인을 찾아 치료하는 침습적인 방법입니다."}, {"subject": "부정맥 증상 및 진단", "year": ["17학번", "08학번"], "professor": "장성원", "question": "다음 중 서맥을 일으키는 약제가 아닌 것은?", "images": [], "text_box": null, "options": ["bisoprolol", "diltiazem", "verapamil", "epinephrine", "digoxin"], "answer": [3], "explanation": "에피네프린은 교감신경성 약물로, 심박수를 증가시켜 빈맥을 일으킵니다. 따라서 서맥을 일으키는 약제가 아닙니다. 비소프롤롤, 딜티아젬, 베라파밀, 디곡신은 서맥을 유발할 수 있는 약제입니다."}, {"subject": "부정맥 증상 및 진단", "year": ["16학번", "15학번", "14학번"], "professor": "장성원", "question": "이 환자에서 다음 단계로 시행할 검사로 적절하지 않은 것은?", "images": [], "text_box": "42세 남자 환자가 두근거림으로 내원하였다. 두근거림은 갑자기 시작되고 1-2시간 정도 지속되다가 저절로 소실되었다. 두근거림이 있을 때는 경미한 호흡곤란과 가슴이 답답한 증상이 동반되나 실신은 없었다고 한다.", "options": ["ECG", "갑상선 기능검사", "심초음파", "Ambulatory Holter monitoring", "Implantable loop recorder"], "answer": [4], "explanation": "환자의 증상은 1-2시간 지속되지만 실신과 같은 심각한 증상은 없습니다. 체내삽입사건기록기(Implantable loop recorder)는 증상 발생 빈도가 1년에 몇 번 정도로 매우 낮고, 실신 등 심각한 증상이 동반될 때 주로 사용됩니다. 따라서 이 환자에게는 적절하지 않은 검사입니다. ECG, 갑상선 기능검사, 심초음파, 홀터 모니터링은 두근거림의 원인을 찾기 위한 일반적인 검사들입니다."}, {"subject": "부정맥 증상 및 진단", "year": ["15학번", "14학번"], "professor": "장성원", "question": "다음 중 서맥을 일으킬 수 있는 약제가 아닌 것은?", "images": [], "text_box": null, "options": ["bisoprolol", "diltiazem", "verapamil", "ephedrine", "digoxin"], "answer": [3], "explanation": "서맥을 일으킬 수 있는 약제로는 베타 차단제(bisoprolol), 칼슘 채널 차단제(verapamil, diltiazem), 디곡신이 있습니다. 하지만 에페드린은 교감신경성 약물로, 심박수를 증가시켜 빈맥을 유발하므로 서맥을 일으키는 약제가 아닙니다."}, {"subject": "부정맥 증상 및 진단", "year": ["13학번"], "professor": "오용석", "question": "다음은 부정맥의 진단을 위한 검사 방법들이다. 해당된 환자에서 진단을 위해 가장 적합한 진단 방법은?", "images": [], "text_box": "1달에 2~3회 30~40분 정도 갑작스럽게 발생하고 갑작스럽게 소실되는 전신쇄약감과 어지러움을 동반한 심계항진을 호소하는 26세 여자. 심초음파 등 검사에서는 이상소견이 없었다.", "options": ["단순 심전도", "24 시간 Holter Monitor", "휴대용 Event recorder 심전도기", "Treadmill exercise test", "Implantable loop recorder", "관상동맥 조영술"], "answer": [2], "explanation": "환자의 증상은 한 달에 2~3회 발생하며, 30~40분간 지속되다가 소실됩니다. 이처럼 증상 발생 빈도가 잦지 않고 일정 시간 지속되는 경우, 휴대용 Event recorder가 진단에 유용합니다. 홀터 모니터는 증상이 거의 매일 나타나거나 더 자주 발생할 때 적합하며, 이식형 루프 기록기는 증상 빈도가 매우 낮을 때 사용합니다."}, {"subject": "부정맥 증상 및 진단", "year": ["13학번", "12학번"], "professor": "오용석", "question": "이 환자에서 심장 마비의 원인이 되는 질환은?", "images": [], "text_box": "37세 남자가 TV 보는 중에 갑자기 의식을 잃고, 맥박이 소실되어 부인과 가족들이 심폐소생술을 시행하고 119가 도착해서 심실세동을 보여 자동 제세동기로 제세동 후 응급실에 도착했을 때의 심전도이다.", "options": ["브루가다 (Brugada) 증후군", "우심실 이형성 증후군", "선천성 QT 연장 증후군", "WPW 증후군", "급성 심근경색"], "answer": [0], "explanation": "제시된 심전도 사진에서 V1-V3 유도에서 특징적인 coved ST elevation이 관찰됩니다. 이는 브루가다 증후군의 전형적인 심전도 소견으로, 이 질환은 치명적인 심실성 부정맥을 유발하여 심장 마비로 이어질 수 있습니다."}, {"subject": "부정맥 증상 및 진단", "year": ["13학번"], "professor": "이만영", "question": "경정맥동 맛사지 (carotid sinus massage)를 시행 했을 때의 심전도이다. 가장 가능성이 높은 진단은?", "images": [], "text_box": "심한 심계항진을 주소로 내원한 24세 여자환자에게 경정맥동 맛사지 (carotid sinus massage)를 시행 했을 때의 심전도이다.", "options": ["심방성 빈맥", "심방조동", "심방세동", "방실결절 회귀성 빈맥", "WPW 증후군 환자에서 심방세동을 보이는 경우"], "answer": [3], "explanation": "경정맥동 마사지는 미주신경을 자극하여 방실결절의 전도를 일시적으로 억제하는 효과가 있습니다. 이로 인해 빈맥이 종료되거나 심박수가 감소하는 경우, 방실결절 회귀성 빈맥(AVNRT)과 같은 상심실성 빈맥(PSVT)을 강하게 시사합니다. 이미지에서 경정맥동 마사지 후 빈맥이 종료되는 양상을 보여 방실결절 회귀성 빈맥이 가장 가능성이 높습니다."}, {"subject": "부정맥 증상 및 진단", "year": ["12학번", "11학번"], "professor": "오용석", "question": "다음은 부정맥의 진단을 위한 검사 방법들이다. 해당된 환자에서 집단을 위해 적합한 진단 방법은?", "images": [], "text_box": "하루에도 3-4 차례의 실신과 어지러움, 전신쇄약감과 호흡곤란을 호소하는 76 세 남자", "options": ["단순 심전도", "24 시간 Holter Monitor", "휴대용 Event recorder 심전도기", "Treadmill exercise teset", "Implantable loop recorder", "관상동맥 조영술", "심장 전기 생리 검사"], "answer": [0, 1], "explanation": "환자는 하루에도 수차례 실신, 어지러움, 전신쇄약감과 같은 심각한 증상을 호소하고 있습니다. 이러한 증상은 단순 심전도로도 진단 가능성이 높으며, 증상이 빈번하게 나타나므로 24시간 홀터 모니터(Holter Monitor)를 통해 부정맥을 파악하는 것이 적합합니다."}, {"subject": "부정맥 증상 및 진단", "year": ["12학번", "11학번"], "professor": "오용석", "question": "이 환자심전도 소견으로 치료를 위하여 삽입형 제세동기 (implantable cardiovascular debrillator-ICD)를 꼭 삽입해야 하는 경우가 아닌 질환은?", "images": [], "text_box": "33세 남자가 갑자기 의식을 잃고 맥박이 소실되어 부인과 가족들이 심폐소생술을 시행하고 119가 도착해서 자동 제세동기로 제세동 후 응급실에 도착한 환자의 제세동당시의 심전도이다.", "options": ["브루가다 증후군", "선천성 QT 연장 증후군", "우심실 이형성 증후군", "WPW 증후군", "조기 재분극 (early repolarization) 증후군"], "answer": [3], "explanation": "브루가다 증후군, 선천성 QT 연장 증후군, 우심실 이형성 증후군은 치명적인 심실성 부정맥과 돌연사를 유발할 수 있어 ICD 삽입이 필요한 경우가 많습니다. WPW 증후군 자체는 모든 환자에게 ICD 삽입을 필수로 하지는 않으며, 심방세동과 동반될 때 심실세동을 유발할 수 있으나 주된 치료는 전극도자절제술입니다."}, {"subject": "부정맥 증상 및 진단", "year": ["10학번", "09학번"], "professor": "신우승", "question": "위 환자의 두근거림의 원인을 알아내기 위해 가장 유용한 검사는?", "images": [], "text_box": "20세 여자 환자가 1년에 3-4회 발생하는 두근거림을 주소로 내원하였다. 두근거림 증상은 발생시 30분에서 2시간 정도 지속되다가 저절로 종료되는 양상이었고 실신 등의 병력은 없었다.", "options": ["생활심전도 (Holter monitor)", "운동부하검사 (Treadmill exercise test)", "전기 생리학 검사 (Electrophysiologic test)", "증상 발생 시 12유도 심전도 (Electrocardiography)", "이식형 루프 기록기 (Implantable loop recorder)"], "answer": [3], "explanation": "환자는 1년에 3~4회 발생하는 두근거림이 30분에서 2시간 동안 지속되다 종료됩니다. 이처럼 증상이 비교적 길게 지속되는 경우, 증상 발생 시 12유도 심전도를 기록하는 것이 부정맥 진단에 가장 간편하고 유용합니다. 홀터 모니터는 증상이 더 자주 발생할 때, 이식형 루프 기록기는 증상 빈도가 매우 낮을 때 고려됩니다."}, {"subject": "부정맥 증상 및 진단", "year": ["10학번"], "professor": "신우승", "question": "경동맥 마사지를 시행하는 도중 빈맥이 느려지다가 다시 맥박수가 빨라지면서 빈맥이 발생하였다. 가능성 높은 질환은?", "images": [], "text_box": "30세 남자가 1시간 전부터 안정 시 갑자기 시작된 두근거림 환자는 같은 증상을 1년 전부터 간헐적으로 5회 정도 경험하였고 체중감소, 약물 복용, 음주, 흡연, 만성질환 등의 과거력은 없었다. 내원시 혈압은 120/80mmHg, 맥박수는 분당 150회로 규칙적이며 폭이 좁은 QRS파형의 박동을 보였다. 신체검사상 빈맥 이외 특이소견은 관찰되지 않았다. 환자에게 경동맥 마사지를 시행하는 도중 빈맥이 느려지다가 다시 맥박수가 빨라지면서 빈맥이 발생하였다.", "options": ["심실빈맥", "심실상성 빈맥", "WPW 증후군", "심방세동", "심방조동"], "answer": [4], "explanation": "경동맥 마사지는 미주신경을 자극하여 방실결절의 전도를 일시적으로 차단합니다. 이로 인해 심실상성 빈맥(PSVT)은 종료되지만, 심방빈맥이나 심방조동은 맥박수만 일시적으로 감소하며 종료되지 않습니다. 심실빈맥은 맥박수에 변화가 없습니다. 따라서 경동맥 마사지로 맥박수가 느려지다가 다시 빨라지는 양상은 심방조동에서 흔히 관찰될 수 있습니다."}, {"subject": "부정맥 증상 및 진단", "year": ["09학번"], "professor": "신우승", "question": "경동맥 마사지를 시행하는 도중 빈맥이 갑자기 종료되면서 회복되었다. 가장 가능성이 높은 원인질환은?", "images": [], "text_box": "30세 남자가 1시간 전부터 안정 시 갑자기 시작된 두근거림을 주소로 내원하였다. 환자는 같은 증상을 1년 전부터 간헐적으로 5회 정도 경험하였고 체중감소, 약물복용, 음주, 흡연, 만성질환 등의 과거력은 없었다. 내원 시 혈압은 120/80mmHg, 맥박 수는 분당 170회로 규칙적인 박동을 보였다. 신체검사 상 빈맥 이외 특이소견은 관찰되지 않았다. 환자에게 경동맥 마사지를 시행하는 도중 빈맥이 갑자기 종료되면서 회복되었다.", "options": ["심실빈맥", "심실상성 빈맥", "공황장애", "동성빈맥", "심방세동"], "answer": [1], "explanation": "경동맥 마사지에 의해 빈맥이 갑자기 종료되는 경우, 이는 방실결절과 관련된 빈맥임을 시사합니다. 상심실성 빈맥(Supraventricular tachycardia, SVT)은 방실결절을 경유하는 재진입성 빈맥이 많아, 경동맥 마사지 시 미주신경 활성 증가로 방실결절 전도가 차단되면서 빈맥이 종료될 수 있습니다. 심실빈맥, 동성빈맥, 심방세동 등은 경동맥 마사지로 인해 종료되지 않는 경우가 많습니다."}, {"subject": "서맥성 부정맥", "year": ["21학번", "19학번", "18학번"], "professor": "김성환", "question": "다음으로 취할 가장 적절한 조치는?", "images": [], "text_box": "78세 남자가 3주 전부터 지속된 어지러움으로 내원하였다. 고혈압으로 약물 치료를 받고 있는 것 이외에 특이 병력은 없었으며, 외래에서 측정한 심전도는 다음과 같다.", "options": ["경과 관찰", "폐기능검사 시행", "영구형 심박동기 시술", "심초음파 시행", "복용중인 항고혈압제 확인"], "answer": [4], "explanation": "심전도에서 10초 동안 QRS파가 4번 나타나 맥박이 1분에 24회로 서맥임을 알 수 있습니다. P파가 관찰되지 않고 QRS파와 T파만 있어 동결절에서 전기신호가 발생하지 않는 동정지(sinus arrest)로 판단됩니다. 동정지의 치료는 우선 서맥을 유도하는 약제 복용 여부를 확인하고, 약제를 중단 후에도 증상이 지속되면 심박동기 시술을 고려합니다. 따라서, 복용 중인 항고혈압제 중 서맥을 유발할 수 있는 약물이 있는지 확인하는 것이 가장 적절한 초기 조치입니다."}, {"subject": "서맥성 부정맥", "year": ["21학번"], "professor": "김성환", "question": "이 환자에게 있어서 가장 효과적인 치료는 무엇인가?", "images": [], "text_box": "40세 남자가 버스정류장에서 갑작스러운 실신을 하여 응급실로 내원하였다. 119에서 제세동기를 이용하여 정상동율동이 되었다. 환자의 작은 아버지가 45세에 급사한 가족력이 있다고 하였다. 검사실 소견에서 전해질 이상은 없었다. 응급으로 시행한 관상동맥 조영술도 정상이었다.", "options": ["아미오다론 경구 투여", "Class 1c 항부정맥제 투여", "이식형 사건 기록기 (Implantable Loop Recorder, ILR)의 삽입", "이식형 심율동 전환 제세동기 (Implantable Cardioverter Defibrillator, ICD)의 삽입", "영구형 심박동기 (Permanent pacemaker)의 삽입"], "answer": [3], "explanation": "젊은 40세 남자가 갑작스러운 실신 후 제세동으로 정상 동율동이 회복되었고, 45세에 급사한 가족력이 있으며, 구조적 심질환이나 관상동맥 질환이 배제된 상황입니다. 이는 급성 심장사 위험이 높은 상황으로, 부정맥성 급성 심장사의 2차 예방을 위한 가장 효과적인 치료는 이식형 심율동 전환 제세동기(ICD)의 삽입입니다. ICD는 생명을 위협하는 치명적인 부정맥으로부터 환자를 보호하는 데 필수적입니다."}, {"subject": "서맥성 부정맥", "year": ["21학번"], "professor": "김성환", "question": "다음 환자에서 사용할 수 있는 치료방법?", "images": [], "text_box": "환자가 실신으로 응급실에 실려왔다. 그림은 환자의 심전도와 홀터 모니터이다.", "options": ["VVI", "ICD", "CRT", "AAI", "DDD"], "answer": [0], "explanation": "홀터 모니터링 소견에서 심방세동(Atrial Fibrillation)이 동반된 느린 심실 반응과 중간중간 QRS파가 나오지 않는 서맥 또는 심실 무수축(asystole)이 관찰됩니다. 이는 빈맥-서맥 증후군(Tachycardia-Bradycardia Syndrome)의 한 형태로 볼 수 있으며, 영구형 심박동기 삽입이 필요합니다. 환자가 영구적 심방세동이 있는 경우, 심실만 페이싱하는 VVI 모드가 가장 적절한 심박동기 모드입니다."}, {"subject": "서맥성 부정맥", "year": ["19학번"], "professor": "", "question": "심전도이다. 검사는?", "images": [], "text_box": "45세 남자가 1개월 전부터 가슴이 두근거린다며 병원에 왔다. 두근거림은 하루에 2~3회 10분 정도 지속되었다. 혈압은 110/70, 맥박 74회/분, 호흡 20회, 체온 36.7도이다. 가슴 청진에서 심음과 호흡음은 정상이다.", "options": ["24시간 홀터검사(24 hour holter monitoring)", "기립경사도검사(tilt table test)", "운동부하심전도검사(exercise stress electrocardiograhpy", "체내삽입사건기록기(implantable loop recorder)", "전기생리검사 (electrophysiologic test)"], "answer": [0], "explanation": "환자는 1개월 전부터 하루에 2~3회 10분 정도 지속되는 두근거림을 호소하며, 내원 시 혈압, 맥박, 신체 검진 및 ECG는 정상입니다. 증상이 간헐적으로 나타나므로 일상생활 중 발생하는 부정맥을 포착하기 위해서는 장시간 심전도를 기록하는 것이 필요합니다. 24시간 홀터 검사는 이러한 간헐적 증상과 부정맥의 연관성을 파악하는 데 가장 적절한 진단 방법입니다."}, {"subject": "서맥성 부정맥", "year": ["19학번"], "professor": "김성환", "question": "다음으로 시행할 조치는?", "images": [], "text_box": "25세 여자가 어지러움으로 내원하였다. 2년 전부터 일어설 때, 간헐적으로 어지러움을 느꼈다. 평소에 운동 시에도 호흡곤란은 없다고 하였다. 인근 의원에서 시행한 홀터 검사에서 취침시 분당 40회의 서맥이 확인되었다.", "options": ["항부정맥제", "스테로이드", "인공심박동기", "안심시키고, 생활요법 교육", "신경과 의뢰"], "answer": [3], "explanation": "환자는 25세 여자로, 기립성 어지러움을 호소하며 수면 중 홀터 검사에서 분당 40회의 서맥이 확인되었습니다. 인공심박동기의 적응증이 되는 서맥은 주로 활동 중에 동반되는 증상이 있는 서맥입니다. 수면 중에 나타나는 서맥은 일반적으로 의미 없는 생리적 현상일 수 있으며, 환자의 증상은 기립성 저혈압과 관련될 가능성도 있습니다. 따라서, 환자를 안심시키고 자세 변화 시 주의 등 생활요법 교육을 시행하는 것이 가장 적절한 초기 조치입니다."}, {"subject": "서맥성 부정맥", "year": ["18학번", "19학번"], "professor": "김성환", "question": "다음 중 심전도 진단은?", "images": [], "text_box": "75세 여자가 어지럼증을 주소로 내원하였다. 환자는 영구형 심방세동, 당뇨로 관리받는 중이었으며, 2주 전부터 어지럼증이 발생하였고, 기운없음이 동반되었다.", "options": ["심방조동", "심실세동", "좌각차단", "완전 방실차단", "심근경색증"], "answer": [3], "explanation": "환자는 영구형 심방세동이 있는 상태에서 어지럼증으로 내원하였습니다. 심전도에서는 심방세동으로 보이는 P파가 불규칙하게 나타나지만, QRS 간격은 매우 규칙적이고 느리게 나타납니다. 이는 심방에서 발생하는 심방세동의 전기 신호가 방실결절을 통과하지 못하고, 심실은 그 자체의 이소성 리듬(escape rhythm)으로 박동하고 있음을 의미합니다. 따라서 심방세동에 완전 방실차단이 합병된 경우로 진단할 수 있습니다."}, {"subject": "서맥성 부정맥", "year": ["18학번", "19학번"], "professor": "김성환", "question": "환자에게 시행할 검사로 가장 적절한 것은?", "images": [], "text_box": "68세 여자가 3개월 전부터 간헐적인 두근거림 후 어지러움증과 실신이 반복적으로 있어 병원에 왔다. 두근거림은 20~30분 정도 된다고 한다. 고혈압 약으로 ARB를 복용 중이다. 진료실 혈압 124/80mmHg, 맥박 55회/분, 호흡 15회/분, 체온 36.4C이다. 가슴 청진에서 심음과 호흡음은 정상이다.", "options": ["24시간 Holter monitoring", "경흉부 심장 초음파", "관상동맥 조영술", "뇌파검사", "brain MRA"], "answer": [0], "explanation": "환자는 간헐적인 두근거림, 어지러움, 실신을 반복적으로 경험하고 있습니다. 이는 빈맥-서맥 증후군과 같은 간헐적인 부정맥에 의한 증상일 가능성이 높습니다. 발작적인 증상은 병원 내원 시 ECG에서 확인되지 않을 수 있으므로, 24시간 동안 심장 리듬을 기록하여 증상과 부정맥의 연관성을 확인하는 홀터 모니터링이 진단을 위해 가장 적절한 검사입니다. 증상이 드물게 발생하는 경우, 체내삽입형 사건 기록기(Implantable Loop Recorder)도 고려할 수 있습니다."}, {"subject": "서맥성 부정맥", "year": ["15학번"], "professor": "", "question": "아래 심전도 진단은?", "images": [], "text_box": null, "options": ["정상동율동 (normal sinus rhythm)", "1도 방실차단 (1st degree AV block)", "2도 방실차단 (Mobitz type1)", "2도 방실차단 (Mobitz type2)", "완전 방실차단(complete AV block)"], "answer": [4], "explanation": "심전도에서 P파는 규칙적으로 나타나지만, QRS파와의 연관성이 전혀 없이 느리고 불규칙하게 나타납니다. 이는 심방과 심실의 박동이 완전히 분리되어 각기 다른 리듬으로 활동하는 완전 방실차단(complete AV block)의 전형적인 소견입니다. P파는 일정하게 발생하나 심실로의 전도가 이루어지지 않고 심실은 자체 박동을 유지합니다."}, {"subject": "서맥성 부정맥", "year": ["13학번"], "professor": "김성환", "question": "다음으로 고려하여야 할 치료는?", "images": [], "text_box": "3개월 전 전벽부의 급성심근경색으로 관상동맥중재술을 받고 퇴원하였던 45세 남자가 실신으로 응급실로왔다. 심초음파상 좌심실 구혈율 26%였으며 관상동맥조영술에서 새로운 병변은 관찰되지 않았다. 시행한 홀터 모니터링에서 다음과 같은 소견을 보였을 때", "options": ["calcium channel block", "digoxin", "profapenone", "pacemaker", "ICD"], "answer": [4], "explanation": "45세 남자가 심근경색 과거력과 함께 실신으로 내원했으며, 심초음파상 좌심실 구혈율이 26%로 저하되어 있습니다. 홀터 모니터링 소견은 생명을 위협하는 심실 부정맥을 시사합니다. 이러한 상황에서 환자는 치명적인 부정맥의 재발 위험이 매우 높으므로, 급성 심장사를 예방하기 위한 가장 효과적인 치료는 이식형 심율동 전환 제세동기(ICD) 삽입입니다."}, {"subject": "심박동기 및 제세동기", "year": ["20학번"], "professor": "", "question": "추가적으로 시행할 조치는?", "images": [], "text_box": "22세 남성이 군대훈련중 실신하였다. 당시 심전도 (사진1)를 확인 후 심폐소생술 및 제세동을 시행하였고 이후 의식을 회복하였고 응급실로 이송되었다. 혈압 110/70, 심박 86회/분, 청음 시 수축기 심잡음이 들렸다. 내원 후 심전도(사진2)와 심초음파 소견(사진 3, 동영상)은 다음과 같다. (사진1) : Vfib처럼 무질서하고 진폭 큰 빈맥 심전도사진 (사진2, 응급실 이송 후) : 심전도 lead1-3은 정상처럼 보였는데 v1-3의 s가 위쪽으로 높았던 것 같습니다 (사진3, 동영상, 심초음파 m-mode) : 2군데 좁아짐, (심초음파 동영상) : 승모판 팔락거린 것밖에 기억이 안 나네요", "options": ["디곡신", "심박동기 시술", "아미오다론", "니트로글리세린", "삽입형제세동기 시술"], "answer": [4], "explanation": "심실세동에서 회복된 환자에게는 재발 가능성을 염두에 두어 삽입형제세동기를 시술해주는 것이 필요할 것 같습니다. 이는 심정지 발생의 고위험군에 해당하므로, 향후 예방적인 치료가 중요합니다."}, {"subject": "심박동기 및 제세동기", "year": ["20학번"], "professor": "장성원", "question": "이 환자에서 적절한 치료는?", "images": [], "text_box": "65세 남자가 운동중 실신으로 내원하였다. 환자는 과거에도 2차례 정도 비슷한 증상이 있었다고 하며 다른 기저 질환은 없는 상태이다. 심장 초음파(그림 1)를 시행하였고 24시간 심전도(그림2) 소견이다.", "options": ["운동 지속", "제세동기 삽입", "엔지오텐신2수용체 차단제", "칼슘 차단제", "디지털리스"], "answer": [1], "explanation": "EKG를 봤을 때 비지속성 심실빈맥이 나타나는 것으로 보이고, 운동 중 실신이 발생했다는 것은 교감신경이 활성되는 스트레스 상황에서 VT(심실빈맥)이나 VF(심실세동)에 의한 삼정지 발생 가능성이 높다고 볼 수 있습니다. 따라서 1차 예방을 위한 삽입형 제세동기가 치료 방법입니다."}, {"subject": "심박동기 및 제세동기", "year": ["20학번"], "professor": "장성원", "question": "다음은 인공심장박동기를 삽입한 환자의 심전도이다. 이환자에게 삽입된 박동기의 타입은?", "images": [], "text_box": null, "options": ["DDD", "VDD", "VVI", "AAI", "이것만으로는 구분할 수 없다."], "answer": [0], "explanation": "심전도 사진에서 막대기(pacemaker의 작동효과)가 p파 전후로 2개가 보이므로 AV sequential 한 상황이다. 이는 dual chamber pacing이 가능한 DDD에서 일어난다."}, {"subject": "심박동기 및 제세동기", "year": ["19학번"], "professor": "", "question": "다음 중 영구형 심박동기의 명명법에 대한 설명으로 옳지 않은 것은?", "images": [], "text_box": null, "options": ["VVI type의 심박동기에서 박동 생성을 위한 lead의 삽입부위는 심실이다.", "VDD type의 심박동기에서 박동 감지를 위한 lead의 개수는 2개이다.", "DDD type의 심박동기에서 박동감지에 따른 반응은 inhibition과 triggered 둘 다 일어난다.", "현재 사용하는 영구형 심박동기는 AAI, VVI, VDD, DDD의 4가지 type이 있다.", "모든 영구형 심박동기에서 inhibition이 일어난다."], "answer": [1], "explanation": "이름에서 첫번째 알파벳은 박동 생성을 위한 lead가 작용하는 위치, 두번째는 박동 감지를 위한 lead가 작용하는 위치, 세번째는 박동감지에 따른 반응을 나타낸다. VVI 첫 알파벳은 ventricle이다. VDD 두번째 알파벳은 dual이지만, 실제 lead는 한 개이다. DDD 세번째 알파벳은 dual로 inhibition + triggered를 말한다. 현재 type은 위의 4가지이다. 모든 영구형 심박동기에서는 inhibition은 기본으로 일어나고, 그 중 dual타입은 triggered까지 일어난다."}, {"subject": "심박동기 및 제세동기", "year": ["19학번"], "professor": "", "question": "영구형 심박동기를 이용한 치료를 진행할 때 적절한 것은?", "images": [], "text_box": "70세 남성이 가슴이 두근거리며 쉽게 숨이 찬다며 내원하였다. 증상은 15개월정도 지속되었으며 평소에 무기력감을 느꼈고, 갑상선항진증과 고혈압으로 치료를 받는 중이라고 한다. 심잡음은 없었으며, 다음은 심전도이다. 심전도를 바탕으로 24시간 홀터 심전도 검사를 진행하였다. 항부정맥제를 투여하면 일시적으로 증상이 호전되었으나, 다시 악화되었다.", "options": ["종류별로 차이가 거의 없으므로 가격이 가장 싼 제품을 선택한다.", "SA node의 기능 부전이 의심되므로 동기능부전에 특화된 AAI를 사용한다.", "발작성 심방세동이 의심되므로 DDD를 사용한다.", "만성심방세동으로 이행될 수 있으므로 VVI를 사용한다.", "단순 부정맥이 의심되므로 영구형 심박동기 사용을 자제하고 항 부정맥 약제만 사용한다."], "answer": [3], "explanat function deduplicateQuestions(items) {
  const seen = new Map();
  const result = [];
  items.forEach(item => {
    const raw = (item.question || '').replace(/\s+/g, '').slice(0, 80);
    if (!raw) { result.push(item); return; }
    if (seen.has(raw)) {
      const existing = result[seen.get(raw)];
      const merged = new Set([...(existing.year || []), ...(item.year || [])]);
      existing.year = [...merged].sort((a, b) => {
        const na = parseInt((a.match(/\d+/) || [0])[0]);
        const nb = parseInt((b.match(/\d+/) || [0])[0]);
        return nb - na;
      });
    } else {
      seen.set(raw, result.length);
      result.push(item);
    }
  });
  return result;
}

function cleanQuestionTextBox(item) {
  if (!item.text_box || !item.question) return item;
  const tbNorm = item.text_box.replace(/\s+/g, '');
  const qNorm  = item.question.replace(/\s+/g, '');
  if (qNorm.startsWith(tbNorm)) {
    return { ...item, text_box: null };
  }
  return item;
}

const RAW = deduplicateQuestions(RAW_SOURCE).map(cleanQuestionTextBox);

let questions      = [...RAW];
let current        = 0;
let answers        = {};
let activeSubject  = 'all';
let activeYear     = 'all';

// ════════ 유틸 ════════
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function scrollTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

// ════════ 필터 모달 ════════
function openFilterModal() {
  buildSubjectOptions();
  buildYearOptions();
  document.getElementById('filter-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFilterModal() {
  document.getElementById('filter-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function onOverlayClick(e) {
  if (e.target.id === 'filter-overlay') closeFilterModal();
}
function resetFilter() {
  activeSubject = 'all';
  activeYear    = 'all';
  buildSubjectOptions();
  buildYearOptions();
  applyFilters();
  updateFab();
}

function allSubjects() {
  return [...new Set(RAW.map(q => q.subject || '기타').filter(Boolean))].sort();
}
function allYears() {
  const yrs = new Set();
  RAW.forEach(q => (q.year || []).forEach(y => yrs.add(y)));
  return [...yrs].sort((a, b) => {
    const na = parseInt((a.match(/\d+/) || [0])[0]);
    const nb = parseInt((b.match(/\d+/) || [0])[0]);
    return nb - na;
  });
}

function buildSubjectOptions() {
  const wrap = document.getElementById('subject-options');
  wrap.innerHTML = '';
  const hint = document.getElementById('subject-hint');
  hint.textContent = allSubjects().length + '개 단원 · 총 ' + RAW.length + '문항';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-option' + (activeSubject === 'all' ? ' active' : '');
  allBtn.innerHTML = `<span class="opt-label">전체</span><span class="opt-cnt">${RAW.length}</span>`;
  allBtn.onclick = () => chooseSubject('all');
  wrap.appendChild(allBtn);

  allSubjects().forEach(s => {
    const count = RAW.filter(q => (q.subject || '기타') === s).length;
    const btn = document.createElement('button');
    btn.className = 'filter-option' + (activeSubject === s ? ' active' : '');
    btn.innerHTML = `<span class="opt-label">${escapeHtml(s)}</span><span class="opt-cnt">${count}</span>`;
    btn.onclick = () => chooseSubject(s);
    wrap.appendChild(btn);
  });
}

function buildYearOptions() {
  const wrap = document.getElementById('year-options');
  wrap.innerHTML = '';
  const hint = document.getElementById('year-hint');

  let pool = [...RAW];
  if (activeSubject !== 'all') pool = pool.filter(q => (q.subject || '기타') === activeSubject);

  const years = new Set();
  pool.forEach(q => (q.year || []).forEach(y => years.add(y)));
  const yearList = [...years].sort((a, b) => {
    const na = parseInt((a.match(/\d+/) || [0])[0]);
    const nb = parseInt((b.match(/\d+/) || [0])[0]);
    return nb - na;
  });
  hint.textContent = yearList.length + '개 학번 · ' + pool.length + '문항';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-option' + (activeYear === 'all' ? ' active' : '');
  allBtn.innerHTML = `<span class="opt-label">전체</span><span class="opt-cnt">${pool.length}</span>`;
  allBtn.onclick = () => chooseYear('all');
  wrap.appendChild(allBtn);

  yearList.forEach(y => {
    const count = pool.filter(q => Array.isArray(q.year) && q.year.includes(y)).length;
    const btn = document.createElement('button');
    btn.className = 'filter-option' + (activeYear === y ? ' active' : '');
    btn.innerHTML = `<span class="opt-label">${escapeHtml(y)}</span><span class="opt-cnt">${count}</span>`;
    btn.onclick = () => chooseYear(y);
    wrap.appendChild(btn);
  });
}

function chooseSubject(s) {
  activeSubject = s;
  activeYear    = 'all';
  buildSubjectOptions();
  buildYearOptions();
  applyFilters();
  updateFab();
  if (s === 'all') closeFilterModal();
}

function chooseYear(y) {
  activeYear = y;
  buildYearOptions();
  applyFilters();
  updateFab();
  closeFilterModal();
}

function applyFilters() {
  let pool = [...RAW];
  if (activeSubject !== 'all') pool = pool.filter(q => (q.subject || '기타') === activeSubject);
  if (activeYear    !== 'all') pool = pool.filter(q => Array.isArray(q.year) && q.year.includes(activeYear));
  questions = pool;
  current   = 0;
  answers   = {};
  updateStats();
  renderDots();
  renderQuestion();
}

function updateFab() {
  const labelEl = document.getElementById('fab-label');
  const countEl = document.getElementById('fab-count');
  let label;
  if (activeSubject === 'all' && activeYear === 'all') label = '단원 · 학번 선택';
  else if (activeSubject !== 'all' && activeYear !== 'all') label = activeSubject + ' · ' + activeYear;
  else if (activeSubject !== 'all') label = activeSubject;
  else label = activeYear;
  labelEl.textContent = label;
  countEl.textContent = questions.length + '문항';
}

// ════════ NAV DOTS ════════
function renderDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot';
    dot.textContent = i + 1;
    if (i === current) dot.classList.add('current');
    else if (answers[i]) dot.classList.add(answers[i].correct ? 'correct' : 'wrong');
    dot.onclick = () => goTo(i);
    wrap.appendChild(dot);
  });
  const active = wrap.children[current];
  if (active) active.scrollIntoView({ inline: 'center', block: 'nearest' });
}

// ════════ STATS ════════
function updateStats() {
  const total    = questions.length;
  const answered = Object.keys(answers).length;
  const correct  = Object.values(answers).filter(a => a.correct).length;
  const wrong    = answered - correct;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent   = wrong;
  document.getElementById('stat-rate').textContent    = answered > 0 ? Math.round(correct / answered * 100) + '%' : '—';
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ════════ RENDER QUESTION ════════
// 순서: 문제(q-text) → 텍스트박스(text-box) → 이미지(q-images) → 선지
function renderQuestion() {
  const container = document.getElementById('quiz-container');
  document.getElementById('score-container').classList.add('hidden');
  container.classList.remove('hidden');

  if (questions.length === 0) {
    container.innerHTML = `
      <div class="q-card empty-card">
        <span class="empty-emoji">🔍</span>
        해당 조건의 문제가 없습니다.<br>
        <span style="font-size:12px;">우측 하단 버튼을 눌러 다른 조건을 시도해보세요.</span>
      </div>`;
    return;
  }

  const q        = questions[current];
  const ans      = answers[current];
  const answered = !!ans;

  const yearStr = Array.isArray(q.year) ? q.year.join(' · ') : (q.year || '?');
  const tbHTML  = q.text_box ? `<div class="text-box">${escapeHtml(q.text_box)}</div>` : '';

  let imgHTML = '';
  if (q.images && q.images.length > 0) {
    imgHTML = '<div class="q-images">' +
      q.images.map((src, idx) =>
        `<img src="${src}" alt="문제 이미지 ${idx+1}" onclick="openLightbox(this.src)" loading="lazy">`
      ).join('') +
      '</div>';
  }

  const correctAnswers = Array.isArray(q.answer) ? q.answer : [q.answer];
  const optsHTML = (q.options || []).map((opt, i) => {
    let cls = 'opt-btn';
    if (answered) {
      if (correctAnswers.includes(i))              cls += ' correct-answer';
      else if (ans.selected === i && !ans.correct) cls += ' wrong-answer';
    }
    return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="choose(${i})">
      <span class="opt-num">${i + 1}</span>
      <span>${escapeHtml(opt)}</span>
    </button>`;
  }).join('');

  let explHTML = '';
  if (answered) {
    const isRight = ans.correct;
    explHTML = `
      <div class="explanation-box ${isRight ? '' : 'wrong'}">
        <div class="expl-label">${isRight ? '✓ 정답 해설' : '✗ 오답 해설'}</div>
        <div class="expl-text">${escapeHtml(q.explanation || '')}</div>
      </div>
      <div class="result-row">
        <span>${isRight ? '🎯' : '❌'}</span>
        <span class="result-msg ${isRight ? '' : 'wrong'}">${isRight ? '정답입니다!' : `오답 — 정답: ${correctAnswers.map(a => a + 1).join(', ')}번`}</span>
      </div>`;
  }

  const isFirst = current === 0;
  const isLast  = current === questions.length - 1;

  container.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-year-badge">${escapeHtml(yearStr)}</span>
        <span class="q-subject-badge">${escapeHtml(q.subject || '기타')}</span>
        ${q.professor ? `<span class="q-prof">${escapeHtml(q.professor)}</span>` : ''}
        <span class="q-num">${current + 1} / ${questions.length}</span>
      </div>
      <div class="q-body">
        <p class="q-text">${escapeHtml(q.question || '')}</p>
        ${tbHTML}
        ${imgHTML}
        <div class="options-list">${optsHTML}</div>
      </div>
      ${explHTML}
      <div class="action-row">
        <button class="btn-nav" onclick="prevQ()" ${isFirst ? 'disabled' : ''}>← 이전</button>
        <span class="kbd-hint"><kbd>1</kbd>–<kbd>5</kbd> 선택 · <kbd>→</kbd> 다음</span>
        <button class="btn-next" onclick="nextQ()">${isLast ? '결과 보기 →' : '다음 →'}</button>
      </div>
    </div>`;
}

// ════════ 상호작용 ════════
function choose(i) {
  if (answers[current]) return;
  const q = questions[current];
  const correctAnswers = Array.isArray(q.answer) ? q.answer : [q.answer];
  answers[current] = { selected: i, correct: correctAnswers.includes(i) };
  updateStats();
  renderDots();
  renderQuestion();
}
function prevQ() { if (current > 0) { current--; renderQuestion(); renderDots(); scrollTop(); } }
function nextQ() {
  if (current < questions.length - 1) { current++; renderQuestion(); renderDots(); scrollTop(); }
  else { showScore(); }
}
function goTo(i) {
  current = i;
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  renderQuestion(); renderDots(); scrollTop();
}

// ════════ 점수 화면 ════════
function showScore() {
  const total   = questions.length;
  const correct = Object.values(answers).filter(a => a.correct).length;
  const wrong   = Object.values(answers).filter(a => !a.correct).length;
  const skip    = total - Object.keys(answers).length;
  const pct     = total > 0 ? Math.round(correct / total * 100) : 0;

  let trophy = '🥇', msg = '완벽합니다!';
  if (pct < 40)       { trophy = '📚'; msg = '더 열심히 공부해봐요!'; }
  else if (pct < 60)  { trophy = '💪'; msg = '조금 더 노력이 필요해요.'; }
  else if (pct < 80)  { trophy = '👍'; msg = '잘 하고 있어요!'; }
  else if (pct < 100) { trophy = '🏆'; msg = '훌륭한 성적입니다!'; }

  document.getElementById('quiz-container').classList.add('hidden');
  const sc = document.getElementById('score-container');
  sc.classList.remove('hidden');
  sc.innerHTML = `
    <div class="score-screen">
      <div class="score-trophy">${trophy}</div>
      <h2 class="score-title">${pct}점 — ${msg}</h2>
      <p class="score-sub">총 ${total}문항 완료</p>
      <div class="score-grid">
        <div class="score-stat"><div class="score-stat-num">${correct}</div><div class="score-stat-label">정답</div></div>
        <div class="score-stat"><div class="score-stat-num wrong">${wrong}</div><div class="score-stat-label">오답</div></div>
        <div class="score-stat"><div class="score-stat-num" style="color:var(--amber)">${skip}</div><div class="score-stat-label">미응답</div></div>
      </div>
      <button class="btn-restart" onclick="restart()">다시 풀기</button>
    </div>`;
}
function restart() {
  current = 0; answers = {};
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  updateStats(); renderDots(); renderQuestion(); scrollTop();
}

// ════════ 라이트박스 ════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ════════ 키보드 ════════
document.addEventListener('keydown', e => {
  if (document.getElementById('pwd-gate').style.display !== 'none') return;
  if (document.getElementById('filter-overlay').classList.contains('open')) {
    if (e.key === 'Escape') closeFilterModal();
    return;
  }
  if (e.key === 'Escape')      closeLightbox();
  if (e.key >= '1' && e.key <= '5') {
    const idx = parseInt(e.key) - 1;
    const q = questions[current];
    if (q && q.options && idx < q.options.length && !answers[current]) choose(idx);
  }
  if (e.key === 'ArrowRight') nextQ();
  if (e.key === 'ArrowLeft')  prevQ();
});

// ════════ 앱 초기화 ════════
function initApp() {
  updateStats();
  renderDots();
  renderQuestion();
  updateFab();
}
</script>
</body>
</html>

": [], "text_box": null, "options": ["Diagonal br.", "LCX", "acute marginal br.", "obtuse marginal br.", "LAD"], "answer": [4], "explanation": "제시된 관상동맥 조영술 영상에서 화살표가 가리키는 혈관은 좌주관상동맥에서 분지하는 좌전하행동맥(Left Anterior Descending artery, LAD)입니다. LAD는 심장의 전벽과 심실중격의 대부분을 지배하는 주요 혈관입니다. 이 혈관은 임상적으로 '생명의 동맥'이라 불리며, 관상동맥질환에서 가장 흔하게 병변이 발생하는 부위 중 하나입니다."}, {"subject": "고혈압TBL", "year": ["21학번", "20학번"], "professor": "조정선", "question": "추가할 약제는?", "images": [], "text_box": "52세 남자가 발살탄 160mg, 알로디핀 10mg, 비소프롤롤 5mg, 히드로클로로티아지드 25mg 복용 중이나 혈압 조절이 안 되어 왔다. 혈압은 162/93mmHg, 맥박은 68회였다. 검사실 소견은 다음과 같다.\n혈액: 혈액요소질소/크레아티닌 18..? Na+/k+/Cl- 189/4.21/104 mmq/L\n갑상샘자극호르몬 1.9m IU/L (참고치, 0.34~4.25)\n유리 T4 1.45 ng/dL(참고치, 0.8~1.7)\n알도스테론 29.3 ng/dL (참고치 4~31)\n혈장레닌활성 2.5ng/dL(참고치 0.3~3.0)\n소변: 메타내프린 0.62mg/day(참고치 0.05~0.34)\n노르메타네프린 3.32mg/day(참고치 0.09~0.44)", "options": ["라미프릴", "스피로놀락톤", "프라조신", "히드랄라진", "카베딜롤"], "answer": [2], "explanation": "치료에 반응이 없는 저항성 고혈압 환자에서 이차성 고혈압을 의심해야 합니다. 소변의 메타내프린과 노르메타네프린 수치가 참고치보다 높은 것을 보아 갈색세포종으로 추측됩니다. 갈색세포종 환자는 카테콜아민 증가로 알파 수용체가 자극되어 혈관 수축이 일어나므로, 알파차단제인 '프라조신'을 사용하여 혈압을 조절해야 합니다."}, {"subject": "고혈압TBL", "year": ["20학번", "18학번", "16학번"], "professor": "조정선", "question": "가정 혈압 측정에 대한 다음 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["가정 혈압은 백의 고혈압 및 가면 고혈압을 진단하는 데는 권고되지 않는다.", "자동 혈압계로 손목, 위팔 자동혈압계 모두 사용할 수 있다.", "저녁 혈압 측정 시에는 잠자리에 들기 전에 앉은 자세에서 5분 안정 후 측정한다.", "가정 혈압에서 혈압 상승되면 24 시간 생활혈압계로 고혈압 확진이 필요하다.", "아침 혈압 측정 시에는 아침식사 후 약을 복용하기 전에 혈압을 측정한다."], "answer": [2], "explanation": "가정 혈압은 백의 고혈압 및 가면 고혈압 진단에 유용하게 권고됩니다. 손목이나 손가락 혈압계는 유효성이 검증되지 않아 위팔 자동혈압계를 주로 사용합니다. 저녁 혈압은 잠들기 전에 5분 안정 후 측정하는 것이 맞습니다. 가정 혈압에서 혈압이 상승하면 2주 이상 아침, 저녁으로 측정하여 고혈압 확진이 가능하며, 24시간 생활 혈압계로의 추가 확진이 필수적이지는 않습니다. 아침 혈압은 아침식사와 약 복용 전에 측정해야 합니다."}, {"subject": "고혈압TBL", "year": ["20학번", "19학번", "18학번", "16학번", "14학번"], "professor": "조정선", "question": "다음 중 고혈압에 해당하는 것으로 맞는 것은?", "images": [], "text_box": null, "options": ["건강 검진에서 측정한 혈압 137/85mmHg", "진료실에서 의사가 직접 잰 혈압 136/86mmHg", "24 시간 활동혈압모티너검사로 측정한 야간 혈압이 129/75mmHg", "진료실 밖, 환자 대기 공간에서 측정한 혈압 136/88mmHg", "가정혈압 모니터로 측정한 평균 혈압이 133/82mmHg"], "answer": [2], "explanation": "고혈압 진단 기준은 병원 내 혈압 140/90mmHg 이상, 24시간 생활 혈압 모니터 평균 혈압 130/80mmHg 이상 (야간 120/70mmHg 이상), 가정 혈압 모니터 135/85mmHg 이상입니다. 1) 137/85mmHg는 병원 내 기준 미만입니다. 2) 136/86mmHg는 병원 내 기준 미만입니다. 3) 24시간 활동 혈압 모니터 야간 혈압 129/75mmHg는 기준 120/70mmHg 이상이므로 고혈압입니다. 4) 진료실 밖 혈압은 병원 내 기준과 동일하게 적용됩니다. 5) 133/82mmHg는 가정혈압 기준 미만입니다."}, {"subject": "고혈압TBL", "year": ["20학번"], "professor": "조정선", "question": "환자가 고혈압 치료를 받지 않는다면 가장 빈도가 높은 심장의 변화는?", "images": [], "text_box": null, "options": ["심근의 산소 소모량 증가", "좌심실 경직으로 인한 이완 기능 장애", "좌심실 구혈율 증가", "좌심실 비대", "좌심방 확장 이완기"], "answer": [1], "explanation": "치료되지 않는 고혈압에서 심장은 높은 혈압에 대항하기 위해 더 많은 일을 해야 합니다. 이로 인해 가장 먼저 발생하는 변화는 좌심실의 경직도가 증가하여 이완 기능 장애가 생기는 것입니다. 이후 좌심실 비대, 좌심방 확장 등의 변화가 나타날 수 있습니다."}, {"subject": "고혈압TBL", "year": ["18학번"], "professor": "조정선", "question": "고혈압 치료의 목표 혈압에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["55 세의 좌심실비대를 동반한 고혈압 환자 – 140/85 미만", "70 세 고혈압 환자 – 140/90 미만", "협심증 당뇨병 환자 – 140/90 미만", "동반 질환 없는 당뇨병 환자 – 140/90 미만", "알부민뇨가 동반된 만성콩팥병 환자 – 140/90 미만"], "answer": [1, 3], "explanation": "2022년 가이드라인 기준, 좌심실비대(심혈관질환 동반) 고혈압 환자의 목표 혈압은 130/80 mmHg 미만입니다. 70세 이상 노인 고혈압 환자의 목표 혈압은 140/90 mmHg 미만입니다. 고위험도 당뇨병 환자의 목표 혈압은 130/80 mmHg 미만입니다. 동반 질환 없는 당뇨병 환자의 목표 혈압은 140/90 mmHg 미만입니다. 알부민뇨가 동반된 만성콩팥병 환자의 목표 혈압은 130/80 mmHg 미만입니다. 따라서 2번과 4번이 옳은 설명입니다."}, {"subject": "고혈압TBL", "year": ["18학번"], "professor": "조정선", "question": "45세의 남성이 건강 검진에서 고혈압이 의심되었고 다른 이상은 발견되지 않았다. 한 달 후에 병원에 내원하여 진찰받은 결과, 환자의 혈압은 160/100 mmHg이었다. 이 환자에서 항고혈압제 약물요법을 시작할 때 일차 치료 목표는 무엇인가?", "images": [], "text_box": "45세의 남성이 건강 검진에서 고혈압이 의심되었고 다른 이상은 발견되지 않았다. 한 달 후에 병원에 내원하여 진찰받은 결과, 환자의 혈압은 160/100 mmHg이었다.", "options": ["수축기 혈압 150mmHg 미만, 이완기 혈압 100mmHg 미만", "수축기 혈압 150mmHg 미만, 이완기 혈압 90mmHg 미만", "수축기 혈압 140mmHg 미만, 이완기 혈압 90mmHg 미만", "수축기 혈압 140mmHg 미만, 이완기 혈압 80mmHg 미만", "수축기 혈압 120mmHg 미만, 이완기 혈압 80mmHg 미만"], "answer": [2], "explanation": "이 환자는 합병증 없는 중저위험도 고혈압 환자이므로, 일차 치료 목표는 수축기 혈압 140mmHg 미만, 이완기 혈압 90mmHg 미만입니다. 이는 일반적인 고혈압 환자에서 권고되는 혈압 목표입니다."}, {"subject": "고혈압TBL", "year": ["17학번"], "professor": "조정선", "question": "환자가 고혈압을 치료받지 않는다면 가장 가능성이 높은 심장의 변화는?", "images": [], "text_box": "50세 여자 환자가 고혈압 진료를 위해 내원하였다. 환자는 과거 총 2번의 진료실 혈압이 145/100 mmHg, 145/95mmHg로 확인 되었다. 당일 내원하여서는 150/95 mmHg로 측정되었다. 신체검사에서는 그 외 이상소견은 없었다.", "options": ["심근의 산소 소모량 증가", "좌심실 경직으로 인한 이완 기능 장애", "좌심실 구혈율 증가", "좌심실 비대", "좌심방 확장"], "answer": [1], "explanation": "고혈압이 장기간 치료되지 않으면 심장은 지속적으로 높은 압력에 저항해야 하므로 심근의 구조적, 기능적 변화를 겪게 됩니다. 가장 먼저 발생하는 심장 변화는 좌심실의 경직도가 증가하여 이완 기능 장애가 나타나는 것입니다. 이는 심장이 충분히 이완되지 못하여 심실 충만에 어려움을 겪는 상태를 의미합니다."}, {"subject": "고혈압TBL", "year": ["16학번"], "professor": "정우백", "question": "고혈압 치료 목표 혈압에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["합병증이 없는 고혈압 환자 – 140/90mmHg", "65 세 이상 노인 고혈압 환자 – 150/90mmHg", "심혈관 질환이 있는 당뇨병 환자 – 140/90mmHg", "심혈관 질환이 없는 당뇨병 환자 – 140/90mmHg", "알부민뇨가 동반된 만성콩팥병 환자 – 140/90mmHg"], "answer": [0, 3], "explanation": "2022년 가이드라인 기준, 합병증이 없는 고혈압 환자의 목표 혈압은 140/90 mmHg 미만입니다. 65세 이상 노인 고혈압 환자의 목표 혈압은 140/90 mmHg 미만입니다. 심혈관 질환이 있는 당뇨병 환자의 목표 혈압은 130/80 mmHg 미만입니다. 알부민뇨가 동반된 만성콩팥병 환자의 목표 혈압은 130/80 mmHg 미만입니다. 따라서 1번과 4번이 옳은 설명입니다."}, {"subject": "고혈압TBL", "year": ["16학번"], "professor": "정우백", "question": "56세 남자 환자가 혈압 상승하여 내원하였다. 환자는 3년째 당뇨병으로 경구혈당강하제를 복용 중이다. 이 환자의 검사결과를 참고하여 가장 적절한 항고혈압제를 선택하시오.", "images": [], "text_box": "HbA1c- 7.3 mg/dL / ECG- LVH / Microalbuminuria- 163 mg/dl\nBrachial-ankle pulsed wave velocity 1560 cm/sec / Carotid intima-media thickness- 0.63 mm", "options": ["이뇨제", "칼슘 차단제", "직접 혈관 확장제", "베타 차단제", "안지오텐신 전환효소 억제제"], "answer": [4], "explanation": "환자는 당뇨병을 앓고 있으며, 검사 결과에서 좌심실비대(LVH)와 미세알부민뇨(Microalbuminuria)가 확인되었습니다. 이러한 경우, RAS(레닌-안지오텐신 시스템) 억제제인 안지오텐신 전환효소 억제제나 안지오텐신 수용체 차단제가 심장 및 신장 보호 효과가 뛰어나 가장 적절한 선택입니다."}, {"subject": "고혈압TBL", "year": ["15학번"], "professor": "정우백", "question": "가정 혈압 측정에 대한 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["24 시간 활동 혈압 모니터 검사 보다 백의 고혈압을 진단하는데 효과적이다.", "자동 혈압계로 측정할 수밖에 없기 때문에 실제 환자의 혈압을 반영하는 데는 제한적이다.", "아침 혈압 측정 시에는 잠에서 깨자마자 5분간 등받이가 있는 의자에 앉아 안정하고 혈압을 측정한다.", "저녁 혈압 측정 시에는 잠자리에 들기 전에 5분간 등받이가 있는 의자에 앉아 안정하고 혈압을 측정한다.", "고혈압의 진단 보다는 치료 효과 판정에 효과적이다."], "answer": [3], "explanation": "24시간 활동 혈압 모니터 검사가 백의 고혈압 진단의 골드 스탠다드입니다. 자동 혈압계는 실제 환자의 혈압을 반영하는 데 제한적이지 않습니다. 아침 혈압 측정 시에는 소변을 본 후 측정하는 것이 맞습니다. 저녁 혈압 측정 시에는 잠자리에 들기 전에 5분간 등받이가 있는 의자에 앉아 안정하고 혈압을 측정하는 것이 맞습니다. 가정 혈압은 고혈압의 진단과 치료 효과 판정 모두에 효과적입니다."}, {"subject": "고혈압TBL", "year": ["14학번"], "professor": "정우백", "question": "다음은 고혈압의 생활요법에 대한 설명이다. 알맞은 것을 고르시오.", "images": [], "text_box": null, "options": ["맥주는 알코올 함량이 낮기 때문에 제한할 필요 없다.", "지중해식 식단, DASH 식단은 서양인에게만 효과가 있다.", "유산소 운동이 혈압강하에 효과적이며, 주 3 회 이상 30-40 분을 권장한다.", "혈압강하 효과를 얻기 위해서 주, 야간 관계없이 7시간 수면을 권장한다.", "한국인의 평균 식염 섭취량이 권장 섭취량의 2배가 넘기 때문에 저염식이는 권장할 필요 없다."], "answer": [2], "explanation": "알코올 섭취는 주종과 관계없이 하루 60g 이하로 제한해야 합니다. 지중해식 식단 및 DASH 식단은 아시아인에게도 혈압 강하 효과가 있습니다. 유산소 운동은 주 3회 이상 30-40분간 하는 것이 혈압 강하에 효과적입니다. 혈압 강하 효과를 위해서는 충분한 야간 수면이 중요합니다. 한국인의 식염 섭취량은 권장량의 2배가 넘으므로, 저염식이는 혈압 강하를 위해 적극적으로 권장됩니다."}, {"subject": "관상동맥질환의 개요", "year": ["21학번", "19학번", "18학번", "17학번", "16학번", "15학번", "14학번", "13학번", "12학번"], "professor": "유기동", "question": "적절한 조치는?", "images": [], "text_box": "62세 남자가 흉통으로 병원에 왔다. 한 달 전부터 등산할 때 흉통이 발생하여 5분 정도 지속되다가 쉬면 호전되었으나, 1주일 전부터는 안정시에도 극심한 흉통이 발생하였다. 혈압 100/60mmHg, 맥박 110회/분, 체온 36.5도이다.", "options": ["베타차단제", "니트로글리세린", "운동부하검사", "관상동맥조영술", "관상동맥 컴퓨터단층촬영"], "answer": [3], "explanation": "환자는 안정형 협심증에서 불안정 협심증으로 이행하는 과정의 증상을 보이며, 안정시 흉통이 발생한 것은 불안정 협심증을 시사합니다. 불안정 협심증은 고위험 급성 관상동맥 증후군으로 간주되므로, 즉각적인 진단 및 치료 계획 수립을 위해 관상동맥조영술이 필요합니다. 이 내용은 협심증 시간에 배우게 될 것입니다."}, {"subject": "관상동맥질환의 개요", "year": ["20학번"], "professor": "유기동", "question": "이 환자에게서 와파린 복용하면서 실시할 수 있는 종합검진 항목은?", "images": [], "text_box": "47세 남자가 종합 검진을 위하여 내원하였다. 이 환자는 5년전 승모판막협착증으로 기계 판막수술을 하였다고 하며 평생 와파린을 먹어야 한다고 이야기를 들었다고 한다.", "options": ["brain MRI", "위내시경 검사와 조직검사", "치과 스케일링", "대장내시경 검사 중 용종제거", "발치"], "answer": [0], "explanation": "올해 해당 강의에서 배운 내용으로는 풀 수 없습니다. 와파린 복용 환자는 뇌동맥류 등에 의한 뇌출혈 위험이 높아질 수 있으므로, brain MRI를 시행하는 것이 조심스러운 추측입니다. 이 문제는 20학번 기준 배우지 않은 내용에 해당합니다."}, {"subject": "관상동맥질환의 개요", "year": ["19학번", "16학번", "15학번", "13학번", "12학번"], "professor": "유기동", "question": "다음 중 급성관동맥증후군의 주요 병태 생리가 되는 것은?", "images": [], "text_box": null, "options": ["심외막 관동맥내 내막층에 거품세포의 축적으로 인한 혈류장애 발생", "심외막 관동맥내 중막의 섬유화를 동반한 경화현상이 진행된 후 파열되면서 혈관내 혈전이 발생하여 혈류장애 발생", "심외막 관동맥내 죽상반의 미란이나 파열에 의한 혈전으로 혈류장애 발생", "심외막 관동맥내 내막의 부분적 NO 결핍으로 갑작스런 혈류장애 발생", "심외막 관동맥내 내막층의 죽상경화가 진행되면서 혈류장애가 발생하여 생긴 미세혈전으로 인해 경벽(transmural) 관동맥에 혈류장애 발생"], "answer": [2], "explanation": "급성관상동맥증후군에서 주로 발견되는 병태생리는 죽상반의 파열로 인한 혈전입니다. 죽상반의 미란이나 파열에 의해 혈전이 형성되어 혈류장애를 초래하는 것이 주요 원인입니다. 21학번 수업 기준으로는 배우지 않은 내용이라고 언급되어 있습니다."}, {"subject": "관상동맥질환의 개요", "year": ["19학번", "16학번"], "professor": "유기동", "question": "죽상동맥경화증의 가장 초기 병변인 지방 줄무늬(fatty streak)의 조직학적 특징은?", "images": [], "text_box": null, "options": ["혈관 내 단핵구가 중막에 침착되어 세포자멸현상으로 거품세포를 형성", "대식세포가 oxidized LDL을 포획하여 거품세포를 형성", "oxidized LDL이 혈관내막하층의 평활근세포를 괴사시켜서 거품세포를 형성", "혈관내막층으로 이주한 중막의 평활근을 세포외기질이 괴사시켜서 거품세포를 형성", "혈관 내 단핵구가 혈관내막으로 이주하면서 세포자멸현상이 발생하여 거품세포를 형성"], "answer": [1], "explanation": "내피세포 기능부전 상태에서는 혈관 내막하에 단핵구 등의 염증세포 침윤이 일어납니다. 침윤된 단핵구는 대식세포로 분화된 후, scavenger receptor A1 (SCRA1)을 통해 주위의 oxidized LDL을 포획하여 거품세포가 됩니다. 혈관 내막하에 거품세포들이 모여 있는 상태가 지방줄무늬이며, 이는 죽상동맥경화증의 초기 병변에 해당합니다. 따라서 대식세포가 oxidized LDL을 포획하여 거품세포를 형성하는 것이 특징입니다."}, {"subject": "관상동맥질환의 개요", "year": ["18학번"], "professor": "유기동", "question": "다음 중 동맥경화증의 발생 및 진행과 관련 없는 물질 혹은 세포는?", "images": [], "text_box": null, "options": ["adhesion molecules", "LDL cholesterol", "fibroblast", "macrophage", "CETP (cholesterol ester transfer protein)"], "answer": [2], "explanation": "동맥경화증의 발생 및 진행에는 adhesion molecules, LDL cholesterol, macrophage, CETP 등 다양한 물질과 세포가 관여합니다. smooth muscle cell은 동맥경화증에 관여하지만, fibroblast는 직접적으로 관여하지 않습니다. 이 내용은 20학번 및 21학번 수업에서 배우지 않은 내용이라고 합니다."}, {"subject": "관상동맥질환의 개요", "year": ["18학번"], "professor": "유기동", "question": "자발적 급성 심근경색증 발생기전 중 제일 빈도가 많은 것은?", "images": [], "text_box": null, "options": ["관상동맥 죽상 경화 궤양화", "관상동맥 불안정형 경화반 파열", "관상동맥 죽상 경화 침식", "관상동맥 죽상 경화 박리", "관상동맥 그물망 혈전"], "answer": [1], "explanation": "자발적 급성심근경색증의 병태생리 중 가장 많은 빈도를 차지하는 것은 관상동맥 불안정 경화반 파열로 약 60% 이상입니다. 다음으로는 침식(erosion)이 약 30% 이상을 차지합니다. 이 내용은 20학번 및 21학번 수업에서 배우지 않은 내용이라고 합니다."}, {"subject": "관상동맥질환의 개요", "year": ["17학번", "16학번"], "professor": "승기배", "question": "가장 적절한 치료는?", "images": [], "text_box": "60세 남자가 2시간 전부터 발생한 앞가슴의 통증을 주소로 내원하였다. 흉통은 왼쪽 팔로 방사되는 양상이었고, nitroglycerine 투여에도 불구하고 호전되지 않았다. 이 환자는 열흘 전 위궤양 출혈이 발견되어 치료 중이었으며, 혈압은 140/110 mmHg, 맥박수는 90회/분 이었다.", "options": ["유로키나아제 투여", "헤파린 정주", "도부타민 정주", "디지털리스 정주", "심장동맥 중재시술"], "answer": [4], "explanation": "심전도상 Lead I, aVL, V1~6에서 ST분절 상승이 관찰되므로 광범위한 전측벽 ST분절 상승 심근경색증(STEMI)입니다. STEMI의 가장 우선적인 치료는 일차적 경피적 관상동맥중재술(PCI)입니다. 위궤양 출혈 병력으로 혈전용해제(유로키나아제)는 출혈 위험 때문에 금기이므로 PCI가 가장 적절한 치료입니다. 헤파린은 항응고제로 PCI 전 보조적으로 사용될 수 있습니다."}, {"subject": "관상동맥질환의 개요", "year": ["16학번"], "professor": "유기동", "question": "급성관상동맥증후군은 관상동맥내 죽상반의 미란이 발생하면 초기에 생기는 혈전의 조직학적 특징은 무엇인가?", "images": [], "text_box": null, "options": ["섬유소가 풍부한 혈전", "백혈구가 풍부한 흰색 혈전", "혈소판이 풍부한 혈전", "섬유소와 적혈구가 혼합되어 있는 적색 혈전", "대식세포가 세포자멸현상으로 인해 발생한 세포부스러기와 섬유소로 인해 형성된 백색혈전"], "answer": [2], "explanation": "동맥혈관에 발생하는 혈전은 죽상반의 미란이 발생하면 노출된 결합조직에 혈소판이 응집하는 현상을 시작으로 혈전이 발생합니다. 죽상반이 erosion되면 혈소판이 모여들어 platelet-rich thrombus가 생기므로 혈소판이 풍부한 혈전이 초기 특징입니다. 이후 rupture가 발생하면 조직인자가 응고 캐스케이드를 촉발하여 섬유소 풍부 혈전이 형성됩니다."}, {"subject": "관상동맥질환의 개요", "year": ["16학번", "15학번"], "professor": "유기동", "question": "동맥경화증(arteriosclerosis)이 주로 발생하는 위치는?", "images": [], "text_box": null, "options": ["혈관의 내막(intima)", "혈관의 중막(media)", "혈관의 외막(adventitia)", "혈관의 평활근층", "혈관의 탄력섬유층"], "answer": [1], "explanation": "죽상경화증과 동맥경화증은 발생하는 혈관층이 다릅니다. 죽상경화증은 주로 혈관의 내막층에서 발생하며, 동맥경화증은 주로 혈관의 중막층에서 발생합니다. 두 용어의 차이를 명확히 구분하는 것이 중요합니다."}, {"subject": "관상동맥질환의 개요", "year": ["15학번", "13학번", "12학번"], "professor": "유기동", "question": "혈전의 가장 초기에 관여하는 것은?", "images": [], "text_box": "급성 관상동맥 증후군은 관상동맥 내 죽상반의 미란이나 파열로 인해 혈전이 형성되어 발생한다.", "options": ["혈소판의 응집", "트롬빈(thrombin)의 활성화", "파열 죽상반 부위에 섬유소를 형성", "혈류속도의 감소", "플라즈미노겐(plasminogen)의 활성화"], "answer": [0], "explanation": "동맥혈관에 발생하는 혈전은 죽상반의 미란이 발생하면 노출된 결합조직에 혈소판이 응집하는 현상을 시작으로 혈전이 발생합니다. 죽상반이 erosion되면 혈소판이 모여들어 platelet-rich thrombus가 생기므로 혈소판 응집이 가장 초기에 관여하는 과정입니다. 이후 rupture가 발생하면 조직인자가 응고 캐스케이드를 촉발하여 섬유소 풍부 혈전이 형성됩니다."}, {"subject": "관상동맥질환의 개요", "year": ["15학번"], "professor": "유기동", "question": "다음 중 취약 죽상반의 병리소견에서 안정형 죽상반에 비해 증가되어 있지 않은 것은?", "images": [], "text_box": null, "options": ["거품세포의 자멸에 의한 세포 부스러기(cell debris)", "대식세포", "T 림프구", "평활근 세포", "지질 핵 (lipid core)"], "answer": [3], "explanation": "취약 죽상반은 안정형 죽상반에 비해 거품세포의 자멸로 인한 세포 부스러기, 대식세포, T 림프구, 큰 지질 핵 등이 증가합니다. 그러나 평활근 세포의 기능은 떨어져 extracellular matrix의 형성이 적고 얇은 섬유성 캡이 형성되는 것이 특징입니다. 따라서 평활근 세포는 취약 죽상반에서 증가되어 있지 않은 항목입니다."}, {"subject": "관상동맥질환의 개요", "year": ["15학번", "12학번"], "professor": "유기동", "question": "진단을 위해 적절한 검사는?", "images": [], "text_box": "72세 남자가 간헐적 흉통으로 왔다. 5년전 당뇨를 진단받고, 경구용 당뇨 약제를 복용하고 있으며, 2년 전부터 운동을 하면 초기에 흉통이 5분 정도 발생하였다가 쉬면 호전되는 현상이 한달에 1-2회 반복되어 발생하였다. 혈압 150/90mmHg, 맥박 70회/분, 호흡 20회/분, 체온 36.5도였고 시행한 심전도상 우각차단이 관찰되었다.", "options": ["심초음파 검사", "운동부하검사", "24시간 홀터검사", "심근 자기공명영상", "관상동맥 컴퓨터단층촬영"], "answer": [4], "explanation": "환자는 운동 시 흉통과 휴식 시 호전되는 안정형 협심증 증상을 보입니다. 하지만 심전도상 우각차단(RBBB)이 있는 경우 운동부하검사 결과 판독이 어려울 수 있습니다. 이럴 때는 영상 검사가 더 적절하며, 혈관 병변을 평가하는 데 유용한 관상동맥 컴퓨터단층촬영이 적절합니다."}, {"subject": "관상동맥질환의 개요", "year": ["14학번"], "professor": "유기동", "question": "12시간 전부터 발생한 흉통으로 내원한 56세 남자의 심전도이다. 혈압 120/80mmHg이고 Troponin-T는 정상 상한값의 10배 상승하였다. 적절한 치료는?", "images": [], "text_box": "12시간 전부터 발생한 흉통으로 내원한 56세 남자의 심전도이다. 혈압 120/80mmHg이고 Troponin-T는 정상 상한값의 10배 상승하였다.", "options": ["헤파린", "디하이드로피딘 칼슘차단제", "비스테로이드성 소염제", "혈전용해제", "일차적 관상동맥중재술"], "answer": [0], "explanation": "심전도상 ST분절 하강 및 T파 역전 소견이 관찰되며, Troponin-T가 정상 상한값의 10배 상승하여 비ST분절 상승 심근경색증(NSTEMI)에 해당합니다. NSTEMI의 치료에는 항혈소판제와 함께 항응고제(헤파린) 투여가 중요합니다. 혈전용해제는 NSTEMI에서는 일반적으로 사용하지 않으며, PCI는 추가적인 평가 후 결정됩니다."}, {"subject": "관상동맥질환의 개요", "year": ["13학번", "12학번"], "professor": "유기동", "question": "죽상경화증(atherosclerosis)이 주로 발생하는 위치는?", "images": [], "text_box": null, "options": ["혈관의 내막(intima)", "혈관의 중막(media)", "혈관의 외막(adventitia)", "혈관의 평활근층", "혈관의 탄력섬유층"], "answer": [0], "explanation": "죽상경화증과 동맥경화증은 발생하는 혈관층이 다릅니다. 죽상경화증은 주로 혈관의 내막층에서 발생하며, 동맥경화증은 혈관의 중막층에서 발생합니다. 두 용어를 혼동하지 않도록 주의해야 합니다."}, {"subject": "관상동맥질환의 개요", "year": ["13학번", "12학번"], "professor": "유기동", "question": "응급으로 관동맥조영검사를 시행하기 전에 적절한 조치는?", "images": [], "text_box": "62세 남자가 심한 흉통 및 실신으로 왔다. 내원 당일 아침에는 20분 정도 통증이 지속하다가 호전되었으나, 30분 전부터 흉통 및 반복적 실신이 발생하였다. 혈압 80/50mmHg, 맥박 40회/분, 호흡 30회/분, 체온 36.5도였다.", "options": ["수액과 베타차단제를 투여한다.", "수액과 니트로글리세린을 투여한다.", "수액과 칼슘차단제를 투여한다.", "수액과 헤파린을 투여한다", "수액과 도파민을 투여한다."], "answer": [3], "explanation": "환자는 심한 흉통과 실신, 저혈압 및 서맥을 보여 심근경색이 강력히 의심되는 상황입니다. 이 경우 응급 관동맥조영술 전 베타차단제, 니트로글리세린, 칼슘차단제 등은 투여 금기입니다. 혈압을 유지하기 위해 수액을 투여하고, 항응고제인 헤파린을 투여하여 혈전 생성을 억제하는 것이 적절한 초기 조치입니다. 도파민은 심근경색을 악화시킬 우려가 있어 신중해야 합니다."}, {"subject": "관상동맥질환의 개요", "year": ["12학번"], "professor": "유기동", "question": "재관류 치료과정에서 가장 중요한 것은?", "images": [], "text_box": "62세 남자가 2시간 전부터 흉통이 발생하여 병원에 왔다. 흉통의 양상이 급성 관상동맥증후군이 의심된다.", "options": ["병원 방문 당시 흉통이 있는지 여부", "심근효소 상승 여부", "ST 분절 상승 여부", "동빈맥 동반 여부", "심실조기 수축 동반 여부"], "answer": [2], "explanation": "급성 관상동맥증후군 환자에서 재관류 치료 결정에 가장 중요한 것은 심전도상 ST분절 상승 여부입니다. 심근효소는 발병 후 시간이 지나야 상승하는 경우가 많으며, 상승하더라도 ST분절 상승 여부에 따라 치료 방침이 달라집니다. 동빈맥이나 심실조기수축 동반 여부는 참조 사항일 뿐 ST분절 상승 여부가 가장 핵심적인 판단 기준이 됩니다."}, {"subject": "관상동맥질환의 개요", "year": ["12학번"], "professor": "유기동", "question": "심근경색증 후 비경색 부위에 위치한 심근에서 비대가 일어나고, 심실 전체 크기가 커지는 현상은?", "images": [], "text_box": null, "options": ["심실 재동기화", "심실 경색확장", "심실 재형성", "심실 심근기절(stunning)", "심실 심근동맥(hibernation)"], "answer": [2], "explanation": "심근경색증 후 경색 부위와 비경색 부위를 포함한 심실 전체의 크기, 모양, 두께가 변화하는 현상을 심실 재형성(ventricular remodeling)이라고 합니다. 심실 재형성이 일어나면 라플라스 법칙에 의해 심실벽에 작용하는 압력이 증가하고, 수축 효율이 나빠져 심부전으로 이어질 수 있습니다. 경색 부위가 얇아지고 팽창하는 것을 경색확장이라고 합니다."}, {"subject": "관상동맥질환의 개요", "year": ["12학번"], "professor": "유기동", "question": "약물치료에도 흉통이 계속 있어 관상동맥 촬영을 시행하였다. 좌전하행동맥 근위부 90% 협착이 관찰되어, 관상동맥중재술과 관동맥우회로이식술 사이에 치료 방법을 선택할 때 고려 대상이 아닌 것은?", "images": [], "text_box": "약물치료에도 흉통이 계속 있어 관상동맥 촬영을 시행하였다. 좌전하행동맥 근위부 90% 협착이 관찰되어, 관상동맥중재술과 관동맥우회로이식술 사이에 치료 방법을 선택할 때 고려 대상이 아닌 것은?", "options": ["좌심실 기능장애 여부", "중증 판막질환 동반 여부", "당뇨병 동반 여부", "다른 관상동맥에 협착 동반 여부", "안정시 흉통 여부"], "answer": [4], "explanation": "관상동맥중재술(PCI)과 관상동맥우회로이식술(CABG) 중 치료 방법을 선택할 때는 좌심실 기능, 다혈관 질환 여부, 당뇨병 동반 여부, 다른 심장 질환 동반 여부 등이 중요한 고려 대상입니다. 하지만 통증의 중증도(안정시 흉통 여부)는 두 시술 모두 성공 시 증상이 호전되므로 치료법 선택의 직접적인 고려 대상은 아닙니다. 이 내용은 아직 배우지 않은 내용입니다."}, {"subject": "관상동맥질환의 개요", "year": ["11학번"], "professor": "장기육", "question": "죽상경화증에 대한 설명 중 틀린 것은?", "images": [], "text_box": null, "options": ["죽상경화증은 분포가 국소적이며, 주로 내막에 죽상반이 발생하여 혈관내경이 좁아져 혈류의 장애가 초래된다.", "죽상반에 의하여 관상동맥에 70% 이상의 협착이 발생하면 운동 시 심근의 산소소모량이 증가하면 심근허혈이 발생한다.", "죽상반이 파열되어 혈전이 생성되는 것이 급성관동맥증후군의 주된 원인이다.", "죽상반은 전신의 여러 동맥 중에서도 특정 부위에 잘 발생하는데 특히 관상동맥에 잘 발생하고 그중에서도 좌전하행지의 근위부에 잘 발생한다.", "죽상경화증에 의한 관상동맥질환의 경과를 보면 협착이 진행되면서 안정형 협심증에서 불안정성 협심증으로 진행되는 경우가 대부분이다."], "answer": [4], "explanation": "불안정성 협심증은 급성관동맥증후군의 한 형태로, 불안정한 죽상경화반의 파열로 갑작스런 혈관내경의 감소로 나타나는 것이 대부분입니다. 안정형 협심증은 비교적 만성적인 형태로 서서히 협착이 진행되어 나타나는 임상증후군이므로 안정형 협심증에서 불안정형 협심증으로 진행하는 경우가 대부분이라고 할 수 없습니다. 즉, 진행성이 항상 불안정형으로 이어지는 것은 아닙니다."}, {"subject": "관상동맥질환의 개요", "year": ["11학번", "10학번", "09학번"], "professor": "장기육", "question": "취약성 동맥경화반의 조직학적 특징이 아닌 것은?", "images": [], "text_box": null, "options": ["thin fibrous cap", "large lipid core", "high content of macrophage", "abundant smooth muscle cells", "relatively few smooth muscle cells가 옳다."], "answer": [3], "explanation": "취약성 동맥경화반(vulnerable plaque)은 파열 위험이 높은 죽상반으로, 얇은 섬유성 캡(thin fibrous cap), 큰 지질 핵(large lipid core), 높은 대식세포 함량(high content of macrophage), 그리고 적은 평활근 세포(relatively few smooth muscle cells)가 특징입니다. abundant smooth muscle cells은 안정형 죽상반의 특징에 가깝습니다. 이 문제는 관상동맥질환 개요 수업 문제로 복구되었습니다."}, {"subject": "관상동맥질환의 개요", "year": ["10학번"], "professor": "장기육", "question": "관상동맥증후군을 야기하는 취약성 동맥경화반의 조직학적 특징이 아닌 것은?", "images": [], "text_box": null, "options": ["large lipid core", "inflammatory cell 증가", "MMP 증가", "smooth muscle cell 증가", "thin fibrous cap"], "answer": [3], "explanation": "취약성 동맥경화반은 파열 위험이 높은 죽상반으로, 큰 지질 핵(large lipid core), 염증 세포(inflammatory cell) 증가, Matrix Metalloproteinase (MMP) 증가, 얇은 섬유성 캡(thin fibrous cap)을 특징으로 합니다. smooth muscle cell은 섬유성 캡의 주요 구성 요소로 안정형 죽상반에서는 풍부하지만, 취약성 죽상반에서는 감소되어 캡이 약해지는 경향이 있습니다. 따라서 smooth muscle cell 증가는 취약성 동맥경화반의 특징이 아닙니다."}, {"subject": "관상동맥질환의 개요", "year": ["10학번"], "professor": "장기육", "question": "다음 중 현재 협심증이 있는 환자와 비교해 볼 때 이후 10년 내 심혈관질환의 발생 위험이 같은 경우가 아닌 것은?", "images": [], "text_box": null, "options": ["복부대동맥류", "당뇨", "경동맥 협착", "고혈압", "하지혈관 협착"], "answer": [3], "explanation": "협심증이 있는 환자는 심혈관질환의 고위험군입니다. 당뇨, 복부대동맥류, 경동맥 협착, 하지혈관 협착 등은 심혈관질환 위험을 증가시키는 주요 인자들로, 협심증 환자와 유사한 고위험군으로 간주될 수 있습니다. 고혈압 자체는 주요 위험인자이지만, 심혈관질환 발생 위험도가 협심증 환자와 '같다'고 단정하기는 어렵습니다. 21학번 기준 고혈압과 당뇨 모두 CAD의 위험인자로 배웠기 때문에 2번과 4번 모두 정답으로 생각될 수도 있습니다."}, {"subject": "관상동맥질환의 개요", "year": ["10학번"], "professor": "장기육", "question": "당뇨병으로 치료받던 48세 남자가 심근경색증으로 병원에 왔다. 이 환자의 LDL-cholesterol 치료 목표는?", "images": [], "text_box": "당뇨병으로 치료받던 48세 남자가 심근경색증으로 병원에 왔다.", "options": ["70mg/dl", "100mg/dl", "130mg/dl", "160mg/dl", "190mg/dl"], "answer": [0], "explanation": "관상동맥질환(CAD)이 있거나 심근경색증 병력이 있는 당뇨 환자는 초고위험군(very high risk group)으로 분류됩니다. 초고위험군 환자의 LDL-콜레스테롤 치료 목표는 70mg/dL 미만이거나, 기존 LDL 수치에서 50% 이상 감소시키는 것입니다. 이 내용은 올해 강의에서도 언급된 바 있습니다."}, {"subject": "관상동맥질환의 개요", "year": ["10학번"], "professor": "장기육", "question": "이 환자에 대한 설명으로 적절한 것은?", "images": [], "text_box": "58세 남자가 흉통을 주소로 내원하였다. 상기 환자는 평상시 혈압이 높아 항고혈압제를 복용하고 있었으며, 담배를 끊지 못하고 지내던 중 5개월 전부터 친구들과 추운 날씨에 등산을 하였는데, 숨이 차고 가슴이 뻐근해져 꼼짝을 못 하다가 2분 정도 안정을 취하면 감쪽같이 흉통이 사라지는 증상이 있다고 한다. 그 후에도 등산을 하거나 계단을 빨리 오르면 간혹 비슷한 증상을 보였다. 과거력으로는 30년 전부터 기관지 천식을 앓아오고 있었으나 당뇨나 다른 만성질환은 없었다. 혈압은 120/80mmHg이었고, 맥박수는 분당 68회였으며, troponin은 음성이었다. 다음은 상기 환자의 심전도이다.", "options": ["심전도가 정상이어서 협심증의 가능성은 떨어진다.", "Lead III에서 T wave inversion이 깊어 우관상동맥의 병변에 의한 협심증일 가능성이 높다.", "증상으로 보아 불안정성 협심증으로 생각된다.", "협심증의 가능성이 높으며 58세, 흡연력, 고혈압, 그리고 기관지천식이 위험인자로 작용하여 협심증이 발생하였을 가능성이 높다.", "운동부하 심전도 검사를 시행하여 위험도와 예후를 평가한다."], "answer": [4], "explanation": "환자는 운동 시 흉통이 발생하고 휴식 시 호전되는 전형적인 안정형 협심증 증상을 보입니다. 58세 남성, 흡연력, 고혈압은 관상동맥질환의 주요 위험인자입니다. 심전도가 정상이라도 협심증을 배제할 수 없으며, 기관지천식은 관상동맥질환 위험인자는 아닙니다. 안정형 협심증 진단 및 위험도 평가를 위해 운동부하 심전도 검사가 필요합니다. 현재 심전도만으로는 병변 위치를 특정하기 어렵습니다."}, {"subject": "관상동맥질환의 개요", "year": ["10학번"], "professor": "장기육", "question": "상기 환자에서 시행한 운동부하검사에서 심전도는 다음과 같다. 다음 설명 중 적절하지 못 한 것은?", "images": [], "text_box": "상기 환자에서 시행한 운동부하검사에서 심전도는 다음과 같다.", "options": ["운동부하 심전도 검사결과 고위험군", "관상동맥 조영술의 적응증", "약물 치료로 베타차단제 투여", "안정시와 비교하여 운동시 2 lead, 3 lead, aVF, V4~6에서 2mm 이상의 ST elevation", "none of above"], "answer": [4], "explanation": "제시된 심전도 이미지 분석은 전문 지식을 요합니다. 일반적으로 운동부하 심전도에서 여러 유도에서 ST절 하강이 관찰되면 허혈성 심질환의 가능성이 높고 고위험군으로 판단될 수 있습니다. 이 경우 관상동맥 조영술이 적응증이 될 수 있으며, 베타차단제는 항협심증 약물로 사용됩니다. 4번 보기는 운동 시 ST Elevation을 언급하는데, 이는 보통 관상동맥 연축에 의한 이형 협심증에서 나타나는 소견이거나 심한 허혈을 의미할 수 있습니다. 이미지를 정확히 판독할 수 없으므로 4번이 적절하지 않다고 판단하기 어렵습니다. 따라서 'none of above'가 답일 수 있습니다."}, {"subject": "관상동맥질환의 개요", "year": ["09학번"], "professor": "장기육", "question": "죽상동맥경화증의 병태생리에 관한 설명 중 옳지 않은 것은?", "images": [], "text_box": null, "options": ["단핵구/대식구는 동맥경화생성의 전 과정에 모두 관여한다.", "죽상동맥경화 발병 초기에는 내막내 LDL cholesterol이 축적되고, 단핵구 등 염증세포가 침윤된다.", "pulsatile laminar shear stress는 내피세포벽에 NO의 발생을 감소시켜 adhesion molecule의 발현이 억제된다.", "죽상동맥경화가 진행되면서 중막의 혈관평활근세포의 이주, 증식이 발생해서 이 세포에서 분비되는 extracellular matrix에 의해 초기 동맥경화반인 지방선조에서 fibrofatty 병변으로 진행한다.", "급성 관동맥증후군을 일으키는 혈전이 생기는 기전은 죽상경화증의 fibrous cap이 파열되면서 혈액내 응고인자와 조직의 tissue factor가 만나면서 혈전이 생기는 것과 내피세포의 superficial erosion에 의해 발생한다."], "answer": [2], "explanation": "pulsatile laminar shear stress는 혈관 내피세포에 유익한 영향을 미쳐 NO 생성을 증가시키고, adhesion molecule의 발현을 억제하는 경향이 있습니다. 이는 동맥경화증 발생을 억제하는 효과가 있습니다. 따라서 NO 발생을 감소시켜 adhesion molecule 발현을 억제한다는 설명은 옳지 않습니다. 다른 보기는 죽상동맥경화증의 병태생리 과정에 대한 적절한 설명입니다."}, {"subject": "관상동맥질환의 개요", "year": ["09학번"], "professor": "장기육", "question": "급성관상동맥증후군을 발생시키는 vulnerable plaque의 조직학적 특징이 아닌 것은?", "images": [], "text_box": null, "options": ["cytokine의 증가", "lipid core가 상대적으로 큼", "matrix metalloproteinase의 증가", "collagen의 증가", "vulnerable plaque의 얇은 어깨부분이 파열"], "answer": [3], "explanation": "급성관상동맥증후군을 유발하는 취약성 죽상반(vulnerable plaque)은 염증성 세포 증가로 인한 cytokine 증가, 큰 지질 핵, matrix metalloproteinase (MMP) 증가, 그리고 얇은 섬유성 캡의 어깨 부분이 파열되기 쉽다는 특징을 가집니다. Collagen은 섬유성 캡의 주요 구성 성분이며, MMP 증가로 인해 collagen 분해가 촉진되어 캡이 약해지므로, collagen의 증가는 취약성 죽상반의 특징이 아닙니다. 오히려 감소 또는 약화가 관련됩니다."}, {"subject": "관상동맥질환의 개요", "year": ["09학번"], "professor": "장기육", "question": "어떤 환자에서는 운동부하 심전도 검사보다는 부하 심초음파나 핵의학 검사가 권장된다. 이에 해당하는 경우를 고르시오.", "images": [], "text_box": null, "options": ["RBBB", "LBBB", "obese patients", "atrial fibrillation", "none of above"], "answer": [4], "explanation": "운동부하 심전도 검사의 결과 판독이 어려운 경우 부하 심초음파나 핵의학 검사가 권장됩니다. 이에 해당하는 경우로는 좌각차단(LBBB)이 있는 경우, 이미 ST절 이상이 있는 경우, 디지털리스 복용 환자, 심방세동(atrial fibrillation) 등 불안정한 심장리듬을 보이는 환자 등이 있습니다. 비만 환자는 운동부하가 어려울 수 있으나, 운동부하 심전도 자체의 판독이 불가능하지는 않습니다. 따라서 제시된 보기 중 atrial fibrillation은 운동부하 심전도보다 다른 영상 검사가 권장되는 경우에 해당합니다."}, {"subject": "관상동맥질환의 개요", "year": ["09학번"], "professor": "장기육", "question": "다음 중 심근의 산소요구량을 결정하는 요구인자가 아닌 것은?", "images": [], "text_box": null, "options": ["심박동수", "심근수축력", "대동맥압", "좌심실의 이완기말 용적", "심박출량"], "answer": [4], "explanation": "심근의 산소요구량(myocardial oxygen demand)을 결정하는 주요 인자로는 심박동수(heart rate), 심근수축력(contractility), 심실벽 장력(wall tension)이 있습니다. 심실벽 장력은 대동맥압(후부하)과 좌심실 이완기말 용적(전부하)에 의해 결정됩니다. 심박출량은 심근의 산소요구량을 직접적으로 결정하는 요구인자가 아니라 심장의 기능적 결과로 나타나는 지표입니다. 이 내용은 아직 배우지 않은 내용입니다."}, {"subject": "관상동맥질환의 개요", "year": ["09학번"], "professor": "장기육", "question": "관상동맥 질환에서 장기적인 예후를 평가하는 가장 중요한 사용하는 것은?", "images": [], "text_box": null, "options": ["협착 혈관의 수", "임상적인 증상 (불안정형 협심증, 안정형 협심증, 심근 경색증 등)", "좌심실 구혈률", "흉통의 강도", "고혈압 여부"], "answer": [2], "explanation": "관상동맥 질환에서 장기적인 예후를 평가하는 데 가장 중요한 지표 중 하나는 좌심실 구혈률(left ventricular ejection fraction)입니다. 좌심실 기능은 심부전 및 사망률과 밀접한 관련이 있습니다. 협착 혈관의 수나 임상 증상도 중요하지만, 전반적인 심장 기능 상태를 반영하는 구혈률이 예후에 미치는 영향이 큽니다. 이 내용은 CAD 발생의 위험인자는 배웠지만, 예후 평가 지표는 배우지 않은 내용입니다."}, {"subject": "관상동맥질환의 개요", "year": [], "professor": "승기배", "question": "다음 중 최초로 인간에게 balloon angioplasty를 시행한 의사는?", "images": [], "text_box": null, "options": ["Hippocrates", "Mason Sones", "Claudios Galenos", "Andrea Gruntzig", "William Harvey"], "answer": [3], "explanation": "최초로 인간에게 풍선혈관성형술(balloon angioplasty)을 성공적으로 시행한 의사는 스위스의 심장 전문의 Andreas Gruentzig입니다. 그는 1977년에 관상동맥 풍선확장술을 최초로 시술했습니다. 이 문제는 일반적인 의학 지식이 아닌 역사적 사실을 묻는 질문으로, 대부분의 학생들에게는 생소할 수 있습니다."}, {"subject": "관상동맥질환의 개요", "year": [], "professor": "승기배", "question": "수술 요법이 내과적 약물요법보다 장기 성적이 좋은 경우가 아닌 것은?", "images": [], "text_box": null, "options": ["좌측 주관상동맥에 심각한 협착 병변이 있는 경우", "삼중혈관질환이 있으면서 심기능이 저하된 경우", "이중혈관질환 중 좌전하행지 근위부(proximal LAD)에 병변이 동반된 경우", "승모판막 폐쇄부전을 동반한 관상동맥질환", "심근경색후 심근의 생존능(Viability)이 없는 경우"], "answer": [4], "explanation": "심근경색 후 심근의 생존능(Viability)이 없는 경우는 해당 부위가 괴사되어 회복 불가능하므로, 관상동맥우회로이식술(CABG)이나 경피적 관상동맥중재술(PCI)을 시행하는 것이 의미가 없습니다. 나머지 보기들은 CABG가 약물 요법보다 장기적으로 우월한 결과를 보이는 대표적인 적응증에 해당합니다. 이 내용은 아직 배우지 않은 내용입니다."}, {"subject": "관상동맥질환의 개요", "year": [], "professor": "승기배", "question": "ST분절 상승 심근경색증에서 성공적인 재관류 후에 가장 초기에 일어나는 심전도 변화는?", "images": [], "text_box": null, "options": ["Q파의 발생", "ST분절 상승", "ST분절 하강", "T파 상승", "T파 하강"], "answer": [4], "explanation": "ST분절 상승 심근경색증(STEMI) 후 성공적인 재관류가 이루어지면 심전도 소견이 회복되는 순서가 있습니다. 초급성기 T파 상승, ST분절 상승이 나타난 후, 재관류가 되면 ST분절이 하강하고, 가장 먼저 T파가 하강하는 변화가 나타납니다. Q파는 괴사로 인해 나중에 발생하고, ST분절 상승은 급성 심근경색의 특징입니다. 이 내용은 심전도 교육 과정에서 다루어집니다."}, {"subject": "관상동맥질환의 개요", "year": [], "professor": "승기배", "question": "급성 심근경색증의 진단에 있어서 심근 특이도가 가장 높은 효소는?", "images": [], "text_box": null, "options": ["LDH", "Troponin", "Myoglobin", "AST", "Amylase"], "answer": [1], "explanation": "급성 심근경색증의 진단에 사용되는 심근 효소 검사 중 심근 특이도가 가장 높은 것은 Troponin (특히 cardiac troponin I, T)입니다. Troponin은 심근 손상 진단에 필수적이며 매우 민감하고 특이적인 지표로 활용됩니다. Myoglobin은 초기에 상승하지만 특이도가 낮고, LDH와 AST는 심근 특이도가 낮아 현재는 주로 Troponin이 사용됩니다."}, {"subject": "관상동맥질환의 개요", "year": [], "professor": "승기배", "question": "급성 ST분절 상승 심근경색증의 위치 및 경과 중에 발생한 부정맥이다. 장기 예후가 가장 불량할 것으로 예상되는 경우는? 단, 모든 환자는 흉통 발생 후 즉시 응급실에 내원하였고, 퇴원 전 모든 환자의 활력징후는 정상이다.", "images": [], "text_box": "급성 ST분절 상승 심근경색증의 위치 및 경과 중에 발생한 부정맥이다. 장기 예후가 가장 불량할 것으로 예상되는 경우는? 단, 모든 환자는 흉통 발생 후 즉시 응급실에 내원하였고, 퇴원 전 모든 환자의 활력징후는 정상이다.", "options": ["측벽, 응급실 내원 전에 발생한 심실 세동", "하벽, 응급실 내원 후에 발생한 완전 방실 차단", "전벽, 관상동맥 중재술 후에 발생한 심방 세동", "측벽, 1병일에 발생한 가속성 심실 고유리듬", "전벽, 퇴원 전에 발생한 심실 빈맥"], "answer": [4], "explanation": "급성 심근경색증 환자의 장기 예후에 가장 영향을 미치는 요인 중 하나는 심실 부정맥, 특히 심실 빈맥(VT)과 심실 세동(VF)의 발생입니다. 전벽 경색은 심근 손상 범위가 크고 심실 기능 장애를 유발할 가능성이 높아 예후가 좋지 않은데, 여기에 심실 빈맥이 동반되면 더욱 치명적입니다. 다른 부정맥들도 중요하지만, 전벽 경색과 관련된 심실 빈맥은 특히 예후 불량과 관련이 큽니다. 이 내용은 아직 배우지 않은 내용입니다."}, {"subject": "관상동맥질환의 개요", "year": [], "professor": "승기배", "question": "급성심근경색증에서 심근효소에 관한 내용 중 옳지 않은 것은?", "images": [], "text_box": null, "options": ["Cardiac-apecific troponin I와 T는 증상발현 후 3시간 뒤부터 증가하며 심근 손상 후 1주일까지도 검출 가능하다.", "Myoglobin은 경색 후 수시간 내에 상승하기 시작해서 24시간 내 정상화되며 cardiac specificity가 있다.", "CK-MB 총량(concentration-time curve의 under the area의 값)은 infarct size와 good correlation을 보이나 peak CK-MB level은 weak correlation을 보인다.", "경색 초기에 재관류 시 심근효소는 early washout (early and higher peaking)을 보인다.", "Cardiac-specific troponin은 C, T, I로 구성되며 정상 사람에서는 발견되지 않는다."], "answer": [1], "explanation": "Myoglobin은 심근 손상 후 수시간 내에 빠르게 상승하지만, 심근 특이도가 낮아 심근경색 진단에 제한적입니다. 뼈대 근육 손상 시에도 상승할 수 있기 때문입니다. Cardiac-specific troponin (cTnI, cTnT)은 심근 특이도가 높아 심근경색 진단의 핵심 지표입니다. 5번 보기에 'C'는 Troponin 구성 요소가 아니며, Troponin은 정상인에게서 검출되지 않는 것이 맞습니다. Cardiac-specific troponin은 T, I 두 가지가 주로 심근 손상 지표로 사용됩니다."}, {"subject": "관상동맥질환의 개요", "year": [], "professor": "승기배", "question": "다음 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["Coronary angiogram은 동맥경화성 질환의 진단에 gold standard이다.", "관상동맥 질환의 1차 약물로 최근에는 beta-blocker가 제한되고 있다.", "약물 방출 그물망 시술 후 1년이 경과하면 안정성이 입증되어 항혈소판은 aspirin 단독으로 유지 가능하다.", "좌주간부 질환(Left main disease)은 관상동맥 중재술(PCI)의 class I 적응이다.", "관상동맥 질환의 가장 흔한 증상은 호흡 곤란이다."], "answer": [0], "explanation": "관상동맥 조영술(coronary angiogram)은 관상동맥 질환, 특히 협착의 유무와 중증도를 확인하는 데 있어 표준(gold standard) 검사입니다. 관상동맥 질환의 1차 약물로 베타차단제는 여전히 중요한 역할을 하며 제한되지 않습니다. 약물 방출 스텐트 시술 후에는 일정 기간 이중 항혈소판 요법이 필요하며, 좌주간부 질환은 일반적으로 관상동맥우회로이식술(CABG)이 우선 고려됩니다. 관상동맥 질환의 가장 흔한 증상은 흉통입니다. 이 내용은 20학번 및 21학번 모두 배우지 않은 내용입니다."}, {"subject": "안정형 협심증", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "이종민", "question": "치료는?", "images": [], "text_box": "52세 남자가 2년전부터 계단을 올라가면 가슴이 답답하여 내원하였다. 청진 상 정상이었다. 운동부하검사를 시행하였다. Resting 심전도는 RBBB 이었다. 검사는 stage 3(2:23)에 target heart rate 에 도달해서 중지하였다. 최대 맥박수는 147min 이었고, 검사 도중 흉통은 없었다.", "options": ["아스피린", "와파린", "스타틴", "칼슘 채널 차단제", "관찰"], "answer": [4], "explanation": "TMT 결과 흉통도 없고 ST depression도 없습니다. 즉 TMT 음성이고, resting 심전도에서 RBBB가 있었으므로 그 결과를 신뢰할 수 있습니다. 따라서 치료할 필요 없습니다."}, {"subject": "안정형 협심증", "year": ["20학번"], "professor": "이종민", "question": "다음으로 시행할 검사는?", "images": [], "text_box": "60세 남자가 가슴이 아파서 병원에 왔다. 1년 전부터 급하게 걸을 때나 등산 시에 가슴이 조이는 듯한 통증이 있다가 쉬면 호전되어서, 별다른 치료 없이 지내다가 주변의 권유로 병원에 내원하였다. 5년 전부터 고혈압, 이상지질혈증으로 약물치료 중이다. 혈압 128/83mmHg, 호흡 17회/분, 체온 36.4도이다. 다음은 환자의 심전도이다.", "options": ["심장초음파", "심장동맥조영술", "운동심전도", "가슴 단층촬영", "99m Tc 심근관류스캔"], "answer": [2], "explanation": "흉통 양상에서 안정형 협심증이 의심되고, 심전도 상 큰 이상 소견은 없어 보입니다. 안정형 협심증에서 심전도가 정상인 환자의 일차적 진단 검사인 운동부하검사(TMT)가 필요합니다."}, {"subject": "안정형 협심증", "year": ["20학번", "19학번", "18학번"], "professor": "이종민", "question": "조치는?", "images": [], "text_box": "64세 남자환자 계단 오르면 숨쉬기 답답해서 내원하였다. Resting 심전도는 RBBB 였다. 운동부하 심전도를 시행했을 때 총 운동부하 검사 시간은 2분 23초였고 운동부하 목표 심박동수에 도달하여 종료하였다. 당시 심박동수는 분당 147회이다. 검사 도중 흉통은 없었다.", "options": ["심장혈관조영술", "심장초음파", "심낭천자", "치료 필요 없음", "심장혈관 CT"], "answer": [3], "explanation": "20학번 문제와 유사합니다. TMT 결과 흉통도 없고 ST depression도 없습니다. 즉 TMT 음성이고, resting 심전도에서 RBBB가 있었으므로 그 결과를 신뢰할 수 있습니다. 따라서 치료할 필요 없습니다."}, {"subject": "안정형 협심증", "year": ["19학번"], "professor": "이종민", "question": "적절한 처치는?", "images": [], "text_box": "65세 남자, 30갑년의 흡연력이 있었고 건강검진 폐암 검사 상 다음과 같은 소견(자료 1)이 보였다. 평소에 헬스장에서 운동을 할 때 흉통이 있어 운동을 중지하였다고 한다. 심전도 소견은 다음과 같다(자료 2). 병원에서 잰 혈압은 고혈압, 집에서 잰 혈압은 정상이었다. 자료 1: CT 소견 – 명확한 관상동맥 석회화. 자료 2: 정상 ECG", "options": ["심장 MRI", "CABG", "심장혈관중재술", "운동심전도", "심장혈관 CT"], "answer": [3], "explanation": "20학번 문제와 유사합니다. 흉통 양상에서 안정형 협심증이 의심됩니다. 안정형 협심증에서 심전도가 정상인 환자의 일차적 진단 검사인 운동부하검사(TMT)가 필요합니다."}, {"subject": "안정형 협심증", "year": ["18학번", "17학번", "13학번"], "professor": "이종민", "question": "가장 적절한 처치는?", "images": [], "text_box": "65세 여자가 3년전부터 발생한 흉통으로 외래를 방문하였다. 5년전 당뇨를 진단받고, 경구용 당뇨약제를 복용하고 있으며, 3년전부터 6개월에 1회 정도로 운동을 하면 흉통이 5분정도 발생하였다. 외래에서 운동부하검사를 시행하였고, 총 운동부하검사 시간은 10분이었다. 결과는 아래와 같다. LDL-CHOLESTEROL 170MG/DL, 혈압 140/90MMHG, 맥박 55회/분, 호흡 20회/분, 체온 36.5℃이었다.", "options": ["입원하여 관상동맥조영검사를 시행한 후 위험인자에 대한 분석을 한 후 치료 방침을 결정한다.", "칼슘차단제 및 스타틴제제를 투여하면서 위험인자에 대한 분석을 한다.", "베타차단제 및 안지오텐신 수용체 차단 약물을 투여하고, 반복하여 운동부하검사를 시행한다.", "응급으로 관상동맥조영검사 및 중재시술을 시행한다.", "관상동맥 컴퓨터단층촬영 및 홀터검사를 시행하여 치료방침을 결정한다."], "answer": [1], "explanation": "TMT 검사 양성으로 안정형 협심증 환자입니다. 또한 CAG의 시행 조건에는 해당하지 않으므로, 우선 약물치료를 시작합니다. 1st line인 베타차단제의 금기증인 심한 서맥에는 해당하지 않지만, 일단 서맥이 있으므로 주의가 필요하다고 합니다. 이럴 때는 베타차단제의 양을 조절하거나, 2nd line인 칼슘차단제를 선택할 수 있습니다. 또한 LDL-C가 높으므로 statin도 도움이 됩니다."}, {"subject": "안정형 협심증", "year": ["17학번"], "professor": "정욱성", "question": "적절한 검사는?", "images": [], "text_box": "50세 여자가 흉통으로 병원에 왔다. 5개월 전부터 층계를 오를 때 흉통이 발생하며 팔로 전이되었고 3분 정도 지속되다가 쉬면 나아졌다. 혈압 120/80mmHg, 맥박 72회/분, 호흡 20회/분, 체온 36.5도이다. 심전도는 다음과 같다.", "options": ["심장초음파검사", "24시간 홀터 생활심전도", "운동부하심전도검사", "쌀리움심근스캔", "관상동맥조영술"], "answer": [3], "explanation": "흉통 양상에서 안정형 협심증이 의심되는데, 심전도에서 LBBB 소견이 보입니다. TMT는 LBBB가 없을 때 시행하는 검사이므로 사용할 수 없습니다. 대신 사용할 수 있는 영상검사로 쌀리움심근스캔이 있습니다."}, {"subject": "안정형 협심증", "year": ["17학번"], "professor": "정욱성", "question": "운동부하심전도검사 후 관상동맥조영술이 필요한 경우는?", "images": [], "text_box": null, "options": ["운동 중 맥막 수 분당 120 이상 증가", "T 파의 0.2mV 이상 상승", "ST 분절의 저하가 5분 이상 지속", "운동중 수축기혈압의 20mmHg 이상 상승", "운동 중 발생한 심방세동"], "answer": [2], "explanation": "TMT에서 낮은 운동이나 휴식 시에도 지속적으로 ST 하강이 있는 경우 관상동맥 질환 고위험군에 해당합니다. CAG 시행 조건에 관상동맥 질환 고위험군이 있었으므로, 3번이 정답입니다."}, {"subject": "안정형 협심증", "year": ["15학번"], "professor": "정욱성", "question": "진단을 위한 적절한 검사는?", "images": [], "text_box": "72세 남자가 간헐적 흉통으로 왔다. 5년전 당뇨를 진단받고, 경구용 당뇨 약제를 복용하고 있으며, 2년전부터 운동을 하면 초기에 흉통이 5분정도 발생하였다가 쉬면 호전되는 현상이 한달에 1~2회 반복되어 발생하였다. 혈압 150/90 mmHg, 맥박 70회/분, 호흡 20회/분, 체온 36.5℃이었고 시행한 심전도상 우각차단이 관찰되었다.", "options": ["심초음파검사", "운동부하검사", "24시간 흉터검사", "심근 자기공명촬영", "관상동맥 컴퓨터단층촬영"], "answer": [1], "explanation": "앞에서 본 문제와 유사합니다. 흉통 양상에서 안정형 협심증이 의심되는데, 심전도에서 우각차단(RBBB)이 있습니다. 이 당시에는 RBBB도 TMT를 사용하지 못하는 조건이어서 답이 5번이었다고 합니다. 하지만 이제는 그 기준이 바뀌어 RBBB에서는 TMT를 사용할 수 있습니다. 올해 강의에서도 LBBB만 TMT를 사용하지 못한다고 하였고 RBBB에서는 딱히 언급이 없었습니다. 따라서 올해 강의 기준으로는 2번이 적절해 보입니다."}, {"subject": "안정형 협심증", "year": ["14학번"], "professor": "정욱성", "question": "안정형 협심증에서 혈관재개통술을 고려해야 하는 상황은?", "images": [], "text_box": null, "options": ["나이가 젊은 경우", "당뇨를 포함한 위험인자가 많은 경우", "흉통이 약물 치료에 반응하지 않는 경우", "가족력이 있는 경우", "직업이 비행기 조종사인 경우"], "answer": [2], "explanation": "올해 강의에서는 '약물 치료에 반응이 없어 관상동맥 재개통이 필요한 경우'에 CAG를 시행한다고 배웠습니다. 조금 다르게 말해보면, '관상동맥 재개통이 필요한 경우' 중 하나로 '약물 치료에 반응이 없을 때'가 있다는 뜻이 됩니다."}, {"subject": "안정형 협심증", "year": ["13학번"], "professor": "정욱성", "question": "운동부하심전도검사에서 고위험군 관상동맥질환을 의미하지 않는 것은?", "images": [], "text_box": null, "options": ["6분 이하의 운동능력", "ST 분절의 0.2mV 이상 저하", "ST 분절의 저하가 5분 이상 지속", "운동 중 수축기혈압의 10mmHg 이상 감소", "운동 중 발생한 심방세동"], "answer": [4], "explanation": "저희가 배운 운동 부하 검사 상에서의 관상동맥 질환 고위험군은 다음과 같습니다. - 낮은 운동이나 휴식 시에도 지속적으로 2mm 이상 ST 하강이 있는 경우 - 운동으로 ST 상승이 보이는 경우 - 운동 시 VT (심실 빈맥) 혹은 VF(심실세동)가 보이는 경우 심실 빈맥과 심실세동은 고위험군이지만, 심방세동은 고위험군이 아니라고 합니다. 나머지 선지는 올해 강의에서 배우지 않은 내용도 섞여 있습니다."}, {"subject": "안정형 협심증", "year": ["12학번"], "professor": "정욱성", "question": "58세 남자가 운동시 흉통이 있어 병원에 왔다. 과거력에 천식이 있었다. 운동부하검사에서 안정형 협심증으로 진단되었다. 흉통소실을 위한 적절한 약물은? (2가지)", "images": [], "text_box": null, "options": ["아스피린", "와파린", "베라파밀", "클로피도그렐", "Glycoprotein IIb/IIIa 억제제", "저분자량 헤파린", "유로카이네제", "오메가 3 지방산", "엔지오텐신전환효소 길항제", "스타틴", "나이트레이트", "베타차단제"], "answer": [2, 10], "explanation": "우선 천식이 있으므로 1st line인 베타차단제는 금기이고, 2nd line인 칼슘길항제(베라파밀)를 쓸 수 있습니다. 또한 아스피린, 스타틴, 나이트레이트도 안정형 협심증 치료제에 포함되는데, 배우지 않았지만 이 중 아스피린과 스타틴은 빠른 치료 효과를 기대할 수 없고 질병의 진행을 늦추거나 장기적인 예후 개선에만 도움이 된다고 합니다. 따라서 즉각적인 흉통 소실에는 베라파밀, 나이트레이트가 효과적입니다."}, {"subject": "안정형 협심증", "year": ["12학번"], "professor": "정욱성", "question": "55세 남자는 1년전부터 축구시합을 하던 중 경미한 전흉부 통증이 있었다. 운동부하 심전도 검사에서 11.2METS, 유도 V5-6 에서 1.5mm의 ST 분절 하강이 관찰되었고, 흉부 불쾌감은 심하지 않았다. 관상동맥 촬영에서 좌전하행동맥 중간부에 80% 협착이 관찰되었다. 치료의 우선 순위대로 나열된 것은?", "images": [], "text_box": null, "options": ["관상동맥중재술-베타차단제-스타틴-금연", "금연-관동맥중재술-베타차단제-스타틴", "금연- 스타틴- 베타차단제- 관동맥중재술", "스타틴-금연-관동맥중재술-베타차단제", "스타틴-관동맥중재술-베타차단제-금연"], "answer": [2], "explanation": "증상이 심하지 않은 안정형 협심증으로, 관동맥중재술은 가장 후순위입니다. 나머지 금연, 스타틴, 베타차단제의 순서는 올해 강의의 <안정형 협심증 치료 알고리즘>의 순서와 동일합니다. <안정형 협심증 치료 알고리즘 정리> (1) 아스피린 같은 항혈소판제를 처방하고 금연하며 High dose statin을 처방합니다. (2) 고혈압이 있으면 적절하게 약물 조절을 시행하고 당뇨가 있으면 조절합니다. (3) Angina 증상에 대해서는 sublingual NTG를 사용하고 (4) Beta-blocker 금기증이 없으면 Beta-blocker를 사용합니다. (5) 이에 효과가 없으면 Calcium channel blocker를 사용하거나 Long acting NTG를 사용하게 됩니다."}, {"subject": "안정형 협심증", "year": ["11학번"], "professor": "김희열", "question": "안정형 협심증과 관련된 내용 중 옳은 것은?", "images": [], "text_box": null, "options": ["흉통을 호소하고 외래를 찾는 환자의 대부분이 안정형 협심증으로 베타 차단제를 복용한다.", "1년 사망률은 10% 정도 된다.", "약물치료보다는 PCI가 장기 사망률을 의미 있게 개선시킨다.", "좌심실 구혈율이 35%이고 좌주관지의 90% 협착이 있는 당뇨병에선 PCI보다는 bypass surgery가 일차적으로 고려된다.", "안정형 협심증의 약물치료에서 필수 약제는 혈전 형성을 억제하는 항응고제이다."], "answer": [3], "explanation": "3) 약물치료에 비해 PCI는 사망률이나 MI 발생률을 낮추지 못합니다. 4) 좌심실 기능이 낮은 경우, 과거에는 bypass surgery(CABG)를 시행했지만 최근에는 PCI와 CABG 중 선택이 가능하다고 했었습니다. 과거 문제이므로 과거 기준 맞는 선지입니다. 5) 안정형 협심증의 약물치료에서 1st line은 Beta-blocker입니다. 항응고제는 안정형 협심증의 약물치료에 포함되지 않았습니다."}, {"subject": "안정형 협심증", "year": ["10학번"], "professor": "김희열", "question": "운동부하 심전도 검사의 금기증이 아닌 것은?", "images": [], "text_box": null, "options": ["48시간 이내의 급성관동맥증후군", "치료되지 않는 고위험 부정맥", "심전도 상 심방세동", "고도 방실차단", "치료되지 않은 고혈압"], "answer": [2], "explanation": "올해 강의에서 배운 TMT의 금기증과는 약간 다른 부분도 있어 보입니다. 올해 강의 기준 TMT의 금기: 48시간 내에 rest angina가 있는 경우, Rhythm이 unstable한 경우, Aortic stenosis가 심한 경우, Acute myocarditis가 동반되는 경우, 심부전이 조절되지 않는 경우, Pulmonary hypertension이 심한 경우, Active infective endocarditis를 동반하는 경우"}, {"subject": "안정형 협심증", "year": ["10학번"], "professor": "김희열", "question": "어떤 환자에서는 운동부하 심전도 검사보다는 부하 심초음파나 핵의학 검사가 권장된다. 이에 해당되는 경우를 고르시오.", "images": [], "text_box": null, "options": ["Right bundle branch block", "Left bundle branch block", "Obese patients", "Atrial fibrillation", "Women"], "answer": [1], "explanation": "LBBB가 있으면 TMT 대신 Thallium 심근 스캔이나 관상동맥 CT를 시행합니다."}, {"subject": "안정형 협심증", "year": ["09학번"], "professor": "김희열", "question": "안정형 협심증 환자에 일반적으로 투여하는 약제가 아닌 것은?", "images": [], "text_box": null, "options": ["베타차단제", "아스피린", "스타틴", "헤파린", "칼슘길항제"], "answer": [3], "explanation": "안정형 협심증의 약물 치료로는 아스피린, 스타틴, 베타차단제, 칼슘길항제 등이 있습니다."}, {"subject": "안정형 협심증", "year": ["09학번"], "professor": "김희열", "question": "관상동맥조영검사를 시행해야 하는 경우는?", "images": [], "text_box": null, "options": ["운동부하검사 4단계에서 ST 절이 2mm 하강", "심초음파상 좌심실 구혈율이 65%이며 국소 운동 장애는 없으나 전형적인 협심증 증상을 호소", "심정지후 심폐소생술로 소생한 환자가 운동시 흉통을 호소", "흉통은 없었으나, CT 관상동맥 혈관 검사상 중등도의 병변이 발견", "승모판 수술을 해야하는 50세 여자"], "answer": [2], "explanation": "CAG 시행 조건 중, 돌연심장사로부터 생존한 환자에서 협심증을 감별해야 하는 경우가 있었습니다."}, {"subject": "고혈압 치료", "year": ["20학번"], "professor": "임상현", "question": "적합한 치료는? (총시)", "images": [], "text_box": "임신 36주인 34세 여자가 두통 및 윗배에 통증이 있다고 왔다. 2주 전 산전 진찰에서 혈압이 약간 높다고 들었다. 혈압은 198/122mmHg, 맥박 115회/분, 호흡 22회/분, 체온 37.0도이다. 양쪽 정강뼈 앞 오목부종이 있다. 청진할 때 심음은 빠르고 호흡음은 정상이었다. 검사 결과는 다음과 같다.\n혈색소 14.4g/dL, 백혈구 6,470/mm3, 혈소판 103,000/mm3\n혈액요소질소/크레아티닌 23.0/1.1mg/dL, Na+/K+/Cl- 135/4.2/105mEq/L 소변: 비중 1.007,\n단백질 (+++), 포도당 (-), 적혈구 0~1/고배율시야", "options": ["Labetalol 정주", "안정제 투여 후 경과관찰", "Furosemide 정주", "Nifedipine 경구 투여", "안지오텐신전환효소억제제 정주"], "answer": [0], "explanation": "임산부에서 혈압이 160/110 mmHg 이상이고 고혈압, 단백뇨, 오목부종이 동반되어 임신중독증을 시사합니다. 임신 중독증은 응급 상황이므로 IV 제제인 Labetalol 정주가 적절한 치료입니다. 경구 투여 약물은 부적절하며, ACEi/ARB는 임산부에게 금기 약물입니다."}, {"subject": "고혈압 치료", "year": ["20학번"], "professor": "임상현", "question": "이러한 증상을 유발한 원인으로 가장 가능성이 높은 약물은?", "images": [], "text_box": "65세 남자가 가벼운 신체 활동 시에도 숨이 차는 증상으로 병원에 왔다. 심장기능상실증 진단 후 처방받은 약물을 수일간 복용하자 마른 기침이 시작되었다.", "options": ["심장수축촉진제", "고리작용이뇨제", "안지오텐신2수용체 길항제", "안지오텐신전환효소 억제제", "Beta 아드레날린 수용체 길항제"], "answer": [3], "explanation": "마른 기침은 안지오텐신 전환효소 억제제(ACEi)의 흔한 부작용 중 하나입니다. 심장기능상실증 환자에서 ACEi는 중요한 치료 약물이지만, 기침 발생 시 ARB 등으로 교체를 고려해야 합니다."}, {"subject": "고혈압 치료", "year": ["20학번"], "professor": "임상현", "question": "다음으로 취해야 할 가장 적절한 조치는?", "images": [], "text_box": "52세 여자가 고혈압과 당뇨병으로 치료 중이다. 현재 당뇨병은 식이요법과 경구용 메트포르민 복용중이고, 항고혈압제로 안지오텐신 전환효소억제제와 칼슘통로차단제를 사용중이다. 진료실 혈압은 145/91mmHg, 맥박은 분당 65회였고, 가정 혈압은 5일 평균 130/78mmHg였다. 환자는 마른 기침을 호소하였다. 항체 검사 결과는 다음과 같았다.\n혈액: 혈색소 14.8g/dl\n혈액요소질소/크레아티닌 18/1.1mg/dl, Na+/K+ 135/4.7meq/L\n총단백질알부민 7.2/4.1g/dl 포도당 110mg/dl 당화혈색소 6.6%\n소변: 비중 1.011, 단백질 (+), 적혈구 0-2/고배율시야\n백혈구 0~2/고배율시야\n단회뇨 단백질/크레아티닌 300mg/g", "options": ["앤지오텐신수용체차단제를 추가한다.", "베타차단제를 추가한다.", "앤지오텐신 수용체차단제로 바꾼다.", "알도스테론길항제를 추가한다.", "현재 약제를 그대로 유지한다."], "answer": [2], "explanation": "환자는 현재 ACE 억제제를 복용 중이며 마른 기침을 호소하고 있습니다. ACE 억제제 유발 기침이 의심될 경우 안지오텐신 수용체 차단제(ARB)로 교체하는 것이 적절합니다. 당뇨병 환자에서 단백뇨가 있을 때 ACEi/ARB가 선호되는 약제입니다."}, {"subject": "고혈압 치료", "year": ["19학번"], "professor": "임상현", "question": "추가할 약제는? (19, 17)", "images": [], "text_box": "56세 여자가 조절되지 않는 혈압으로 왔다. 발살탄 160mg, 암로디핀 10mg을 복용 중이었다. 혈압은 172/100mmHg, 맥박은 분당 60회였으며 하지부종이 동반되었다. <혈액검사> 혈액요소질소/크레아티닌: 25.2/2.5mg/dL Na+/K+: 150/5.1mEq/L", "options": ["안지오텐신수용체 차단제", "non-DHP 칼슘통로차단제", "티아지드 이뇨제", "베타차단제", "고리작용 이뇨제"], "answer": [4], "explanation": "환자는 ARB와 CCB를 복용 중이며 혈압이 조절되지 않고 하지 부종이 있습니다. 혈액검사에서 크레아티닌이 2.5mg/dL로 상승하여 만성 콩팥병을 시사합니다. 크레아티닌이 1.5mg/dL 이상인 만성 콩팥병 환자에서는 티아지드계 이뇨제보다 고리작용 이뇨제가 효과적입니다."}, {"subject": "고혈압 치료", "year": ["19학번"], "professor": "임상현", "question": "적절한 조치는? (19, 15)", "images": [], "text_box": "32세 임신 32주 산모가 두통으로 응급실에 왔다. 혈압은 고혈압(160/110 이상) 이었고 검사실 소견은 다음과 같다.\n혈액요소질소/크레아틴: 20/0.9mg/dL\nNa+/K+: 138/4mEq/L\nHB=12mg/dL, U/A Protein(+++)", "options": ["labetalol 정주", "안정제 투여 후 경과관찰", "enlaorilat 정주", "스테로이드 정주", "Lasix 정주"], "answer": [0], "explanation": "임신 중 고혈압(160/110 mmHg 이상)과 단백뇨(+++)는 임신중독증을 나타내며, 이는 응급 상황입니다. 응급 임신중독증에는 Labetalol 또는 Hydralazine IV를 정주하는 것이 적절한 치료입니다. Lasix(Furosemide)는 주로 부종 조절에 사용되나 혈압을 빠르게 낮추는 데는 일차적으로 선택되지 않습니다."}, {"subject": "고혈압 치료", "year": ["19학번"], "professor": "임상현", "question": "치료는? (19, 18)", "images": [], "text_box": "57세 여자가 2주 전부터 계단을 오르면 숨이 찬다며 병원에 왔다. 혈압 146/92mmHg, 맥박 125회/분, 호흡 20회/분, 체온 36.4도이다. 가슴 청진에서 심음은 빠르고 불규칙하며 거품소리는 들리지 않는다. 정강이뼈 앞 오목부종은 없다. 심전도이다.", "options": ["베타차단제", "알파차단제", "고리이뇨제", "알도스테론 길항제", "디히드로피리딘 칼슘통로 차단제"], "answer": [0], "explanation": "환자는 맥박이 125회/분으로 빠르고 심전도에서 박동 리듬이 불규칙하게 나타나 빈맥성 부정맥을 시사합니다. 이러한 빈맥성 부정맥을 동반한 고혈압 환자에게는 베타차단제가 가장 적절한 치료 약물입니다. 다른 약물들은 빈맥 조절에 직접적인 효과가 없거나 부적절합니다."}, {"subject": "고혈압 치료", "year": ["19학번"], "professor": "임상현", "question": "원인이 되는 약제는?", "images": [], "text_box": "70세 남자가 2달전부터 간헐적으로 어지러워 왔다. 오랫동안 앉았다가 일어선 직후에 어지럽다고 했으며 10년 전부터 혈압강하제를 복용 중이었다. 혈압 184/60mmHg, 맥박 78회/분, 호흡 수 18회/분, 체온 36.4도이다. 가슴청진에서 심음과 호흡음은 정상이었다. 자세 변동에 따른 혈압은 다음과 같았다.\n앉았을 때 140/84\n일어나서 2분 후 110/60\n누웠을 때 150/90", "options": ["doxazosin", "bisoprolol", "nifedipine", "ramipril", "losartan"], "answer": [0], "explanation": "환자는 자세 변화에 따른 혈압 하강(기립성 저혈압) 증상을 보이며, 특히 이완기 혈압이 크게 떨어집니다. 알파차단제(-zosin)는 기립성 저혈압을 유발하는 대표적인 부작용을 가지고 있습니다. Doxazosin은 알파차단제 계열의 약물입니다."}, {"subject": "고혈압 치료", "year": ["19학번", "18학번"], "professor": "임상현", "question": "평소 건강하게 지내던 43세 남자가 약 1년전부터 집에서 측정한 혈압이 140/90mmHg 이상으로 측정이 되어 방문하였다. 흡연(+) 체중 83kg, 170cm 고혈압 가족력 (+) 우선적으로 실시할 수 있는 치료는? (총시)", "images": [], "text_box": null, "options": ["생활습관 개선", "알파차단제", "칼슘차단제", "레닌억제제", "안지오텐신 전환효소 억제제"], "answer": [0], "explanation": "환자는 1기 고혈압 범주에 해당하며, 흡연, 과체중, 고혈압 가족력 등의 위험인자가 있습니다. 초기 고혈압 환자에게는 약물 치료에 앞서 생활습관 개선(금연, 체중 감량, 규칙적인 운동 등)을 우선적으로 시행하는 것이 권장됩니다. 생활습관 개선 후에도 혈압 조절이 안 될 경우 약물 치료를 시작합니다."}, {"subject": "고혈압 치료", "year": ["19학번"], "professor": "임상현", "question": "다음은 처음 시행한 혈액검사소견이다. 항고혈압제를 추가한 후 시행한 혈액 크레아티닌이 4.2mg/dL로 상승하였다. 가장 가능성이 높은 약제는?", "images": [], "text_box": "71세 남자가 항고혈압 치료 중 최근 혈압조절이 잘 되지 않았다. 160/95mmHg, 맥박 75회/분, 호흡 24회/분, 체온 36.6도였으며 양층 복부 청진에서 잡음이 들렸다.\n혈액요소질소/크레아티닌 17/1.3 mg/dL\nNa/K/Cl 136/4.3/105 meq/L", "options": ["앤지오텐신 수용제 차단제", "베타차단제", "티아지드계 이뇨제", "칼슘통로 차단제", "알파차단제"], "answer": [0], "explanation": "환자는 혈압 조절이 어렵고 양측 복부에서 잡음이 들려 이차성 고혈압, 특히 양측성 신동맥 협착이 의심됩니다. 이러한 환자에게 안지오텐신 전환효소 억제제(ACEi)나 안지오텐신 수용체 차단제(ARB)를 투여할 경우 급격한 신기능 악화(크레아티닌 상승)를 유발할 수 있어 금기입니다. 따라서 ARB인 안지오텐신 수용체 차단제가 가장 가능성 높은 약제입니다."}, {"subject": "고혈압 치료", "year": ["18학번"], "professor": "임상현", "question": "복용했을 고혈압제로 적절한 건?", "images": [], "text_box": "54세 여자 환자가 2주전 고혈압을 진단받고 항고혈압제를 복용하였다. 1주 후 하기의 증상으로 방문하였다. 심초음파 특이 소견 없었다.", "options": ["프로파놀롤", "라베탈롤", "니페디핀", "에날라프릴", "로사르탄"], "answer": [2], "explanation": "제시된 그림은 발목부종(ankle edema)을 보여줍니다. 칼슘통로차단제(CCB)는 말초 부종을 유발하는 대표적인 부작용이 있습니다. 니페디핀은 dihydropyridine 계열의 CCB로, 이러한 부작용이 흔히 발생합니다."}, {"subject": "고혈압 치료", "year": ["18학번"], "professor": "임상현", "question": "48세 여자가 혈압이 높다는 얘기를 듣고 내원하였다. 특별한 병력이나 가족력은 없었고 음주나 흡연은 하지 않았다. 키 150cm, 몸무게 70kg, 혈압 136/86 mmHg 맥박 64회/분 호흡 20회/분 체온 36.7도였다. 가슴청진은 정상이었다. 다음 중 가장 적절한 조치를 하나만 고르시오", "images": [], "text_box": null, "options": ["체중 감량", "베타차단제 투여", "칼슘통로 차단제 투여", "티아지드 이뇨제 투여", "앤지오텐신전환효소 억제제 투여"], "answer": [0], "explanation": "환자는 혈압이 136/86 mmHg로 고혈압 전단계에 해당하며, BMI가 70kg / (1.5m)^2 = 31.1로 비만입니다. 비만한 고혈압 전단계 환자에게 가장 우선적으로 권장되는 조치는 체중 감량을 포함한 생활습관 개선입니다. 다른 위험인자가 없으므로 약물 치료보다는 생활습관 교정이 선행되어야 합니다."}, {"subject": "고혈압 치료", "year": ["17학번"], "professor": "임상현", "question": "환자에게 투여하면 안 되는 약제는?", "images": [], "text_box": "48세 여자 환자가 고혈압으로 왔다. 혈압은 162/92mmHg, 맥박은 분당 80회이었고, 신체검사에서 복부 잡음이 들려 시행한 복구 컴퓨터 촬영 소견은 아래와 같았다.", "options": ["티아지드 이뇨제", "칼슘통로 차단제", "앤지오텐신수용체 차단제", "알파 차단제", "베타 차단제"], "answer": [2], "explanation": "복부 잡음과 CT 영상에서 양측성 신동맥 협착(Bilateral renal artery stenosis)이 의심됩니다. 양측성 신동맥 협착 환자에게 ACE 억제제(ACEi)나 안지오텐신 수용체 차단제(ARB)는 급성 신부전을 유발할 수 있으므로 금기 약제입니다."}, {"subject": "고혈압 치료", "year": ["17학번"], "professor": "임상현", "question": "다음 중 현재 이 환자에게 가장 적절한 처치를 하나만 고르시오.", "images": [], "text_box": "정기 건강검진에서 과체중인 43세 남성의 혈압이 138/88mmHg로 측정되었다. 이외 다른 건강상의 문제는 발견되지 않았고 혈액검사 결과도 정상 범위 내였다. 그는 약간의 과체중 상태이며, 심혈관계 질환의 가족력이 있다.", "options": ["비약물적 접근으로 체중 조절, 소금 섭취 감소, 신체 활동 증가 등 권유", "Thiazide 계 이뇨제 투여", "베타-아드레날린성 수용체 차단제 투여", "안지오텐신 전환효소 억제제 투여", "칼슘통로 차단제 투여"], "answer": [0], "explanation": "환자는 고혈압 전단계에 해당하며, 과체중 및 심혈관계 질환의 가족력 외에 다른 위험인자가 없습니다. 이러한 경우 약물 치료보다는 생활습관 개선(체중 조절, 소금 섭취 감소, 신체 활동 증가)을 우선적으로 시행하는 것이 권장됩니다. 생활습관 개선만으로 혈압 조절이 어려운 경우 약물 치료를 고려합니다."}, {"subject": "고혈압 치료", "year": ["16학번"], "professor": "임상현", "question": "이 환자에서의 적절한 조치는?", "images": [], "text_box": "35세 14주 산모가 혈압이 높아서 내원하였다. 2차례 내원하여 시행한 진료실 평균 혈압은 168/110 mmHg이었고, 24시간 활동혈압에서 평균 혈압은 142/92 mmHg이었으며 검사실 소견은 아래와 같았다.\nHb 14.5g/dl (정상 12~17), Fasting sugar 88mg/dl (정상 <100)\nBUN/Cr 13/1.0 mg/dl, Na/K 143/4.3 mEq/L\n소변 미세알부민/크레아티닌 300mg/s (참고치, 0~30)", "options": ["약물 대신 생활습관개선을 실시한다.", "니펜디핀 (Nifedipine)을 처방한다.", "라미프릴 (Ramipril)을 처방한다.", "푸로세미드 (Furosemide)를 처방한다.", "24시간 활동혈압을 다시 측정한다."], "answer": [1], "explanation": "임산부의 혈압이 168/110 mmHg로 고혈압 치료 기준(160/110 mmHg 이상)을 충족하며, 미세알부민뇨도 동반되어 있습니다. 임산부에게 사용할 수 있는 항고혈압제로는 니페디핀(경구)과 히드랄라진이 있습니다. 따라서 니페디핀 처방이 적절한 조치입니다. ACEi/ARB는 임산부에게 금기입니다."}, {"subject": "고혈압 치료", "year": ["16학번"], "professor": "임상현", "question": "가장 적절한 추가할 항고혈압제는?", "images": [], "text_box": "48세 남자가 혈압이 높다며 왔다. 5년 전 심근경색으로 약제를 복용하다가 3년 전 중단하였다. 1년 전부터 고혈압으로 개인 의원에서 베타차단제를 복용중이었다. 혈압은 156/93 mmHg, 맥박 62회/분, 호흡 21회/분, 체온 36.7도이다. 가슴 청진에서 심음과 호흡음은 정상이다. 검사 결과는 다음과 같다.\n혈액: 혈액요소질소/크레아티닌 18/0.9 mg/dL\n소변: 잠혈 (-), 단백질 (+1), 심초음파: 왼심실박출률: 48% (참고치, >= 55)", "options": ["안지오텐신 전환효소 억제제", "알파차단제", "티아지드계 이뇨제", "칼슘통로차단제", "직접혈관확장제"], "answer": [0], "explanation": "환자는 심근경색 과거력이 있고, 좌심실 박출률이 48%로 감소되어 있습니다. Post-MI 환자의 항고혈압제로는 ACE 억제제 또는 ARB, 베타차단제, 알도스테론 길항제가 우선적으로 권장됩니다. 현재 베타차단제를 복용 중이므로 ACE 억제제를 추가하는 것이 가장 적절합니다."}, {"subject": "고혈압 치료", "year": ["16학번"], "professor": "임상현", "question": "가장 관련성이 높은 약제는?", "images": [], "text_box": "5년전 고혈압 진단 후 항고혈압 치료 중인 58세 남자가 7일 전부터 기운이 없어서 병원에 왔다. 맥박은 70회/분였고, 규칙적이었다. 심전도와 혈액검사 결과는 다음과 같았다.\nBUN/Cr 27/1.5mg/dL Na/K 143/2.3 mEq/L", "options": ["안지오텐신 수용체 차단제", "알파차단제", "티아지드이뇨제", "직접혈관 확장제", "레닌 억제제"], "answer": [2], "explanation": "혈액 검사 결과 칼륨 수치가 2.3 mEq/L로 낮아 저칼륨혈증(hypokalemia) 소견을 보입니다. 티아지드계 이뇨제는 고혈압 치료에 흔히 사용되지만, 저칼륨혈증, 고칼슘혈증, 고요산혈증 등의 부작용을 유발할 수 있습니다. 따라서 티아지드 이뇨제가 저칼륨혈증의 가장 가능성 높은 원인 약제입니다."}, {"subject": "고혈압 치료", "year": ["16학번"], "professor": "임상현", "question": "다음으로 추가할 약제는? (총시)", "images": [], "text_box": "72세 남자가 고혈압으로 라미프릴(Ramipril) 5mg, 암로디핀(Amrodipine) 10mg 복용 중이나 혈압이 조절되지 않아 내원하였다. 혈압은 162/102 mmHg 맥박수 58회, 심음과 호흡음은 정상이었으며 혈액검사는 다음과 같았다.\nHb = 14.5 g/dL (정상 12-17), Fasting sugar = 88 mg/dL (정상 < 100)\nBUN/Cr = 28/2.2, Na/K 1.42/5.7 mEq/L\n24시간 소변 검사: 단백뇨 2g", "options": ["안지오텐신 수용체 차단제", "비디하이드로피리딘 칼슘통로 차단제", "알도스테론 길항제", "타아지드계 이뇨제", "루프계 이뇨제"], "answer": [4], "explanation": "환자는 ACE 억제제와 CCB를 복용 중임에도 혈압이 162/102 mmHg로 조절되지 않는 저항성 고혈압입니다. 혈액검사에서 크레아티닌이 2.2mg/dL로 상승하여 만성 콩팥병을 시사하며, 단백뇨도 2g/day로 심합니다. 이러한 경우 크레아티닌이 상승한 상태에서는 티아지드계 이뇨제보다 루프 이뇨제가 더 효과적입니다. 알도스테론 길항제도 고려될 수 있으나, 이미 칼륨이 5.7mEq/L로 높은 상태이므로 신중해야 합니다."}, {"subject": "고혈압 치료", "year": ["16학번", "14학번"], "professor": "임상현", "question": "이 환자의 검사 결과를 참고하여 가장 적절한 항고혈압제를 선택하시오. (16총시, 14총시)", "images": [], "text_box": "56세 남자환자가 혈압이 상승하여 내원하였다. 환자는 5년째 당뇨병으로 경구혈당강하제를 복용 중이었다. 이 환자의 검사 결과는 다음과 같았다.\nHbA1c - 7.3mg/dL\nECG - LVH\nMicroalbuminuria - 168mg/dL\nbrachial-ankle pulsed wave velocity - 1560cm/sec\ncarotid intima-media thickness - 0.63mm", "options": ["이뇨제", "칼슘차단제", "혈관 확장제", "베타 차단제", "안지오텐신 전환효소 억제제"], "answer": [4], "explanation": "환자는 당뇨병을 앓고 있으며, 좌심실 비대(LVH)와 미세알부민뇨(Microalbuminuria)가 동반되어 있습니다. 당뇨병 환자에서 이러한 표적 장기 손상이 있을 경우, RAS(Renin-Angiotensin System) 억제제인 안지오텐신 전환효소 억제제(ACEi)나 안지오텐신 수용체 차단제(ARB)가 가장 효과적이고 신장 보호 효과가 뛰어납니다. 따라서 ACE 억제제 선택이 가장 적절합니다."}, {"subject": "고혈압 치료", "year": ["16학번"], "professor": "임상현", "question": "다음 중 고혈압 위기에 사용할 수 있는 약물로서 적절한 것을 3개만 고르시오. (총시) (16, 고대)", "images": [], "text_box": null, "options": ["amlodipine", "enalapril", "losartan", "hydrochlorothiazide", "labetalol", "furosemide", "nitroprusside", "prazosin", "clonidine", "verapamil"], "answer": [4, 5, 6], "explanation": "고혈압 위기(Hypertensive emergency) 상황에서는 정맥내 주사용 약제를 사용하여 즉각적인 혈압 조절이 필요합니다. 이러한 약물로는 정맥내 혈관확장제(예: Nitroprusside), 고효능 이뇨제(예: Furosemide), 알파-베타 혼합 아드레날린성 수용체 차단제(예: Labetalol) 등이 포함됩니다. Amlodipine, enalapril, losartan, hydrochlorothiazide 등은 급성 고혈압 위기에 적합하지 않습니다."}, {"subject": "고혈압 치료", "year": ["15학번"], "professor": "임상현", "question": "다음 약물 중에서 기관지 천식을 동반한 50세 남성 고혈압 환자에게 처방할 수 있는 일차적으로 선택할 수 있는 항고혈압제로서 가장 적절하지 않은 것은?", "images": [], "text_box": null, "options": ["Propranolol", "hydrochlorothiazide", "losartan", "amlodipine", "해당없음"], "answer": [0], "explanation": "Propranolol은 비선택적 베타-아드레날린성 수용체 길항제(beta-blocker)로서 기관지 확장 효과를 방해하여 천식을 악화시킬 수 있습니다. 따라서 기관지 천식 환자에게는 금기 약물입니다. Hydrochlorothiazide, losartan, amlodipine은 천식 환자에게 비교적 안전하게 사용할 수 있는 약제입니다."}, {"subject": "고혈압 치료", "year": ["15학번"], "professor": "임상현", "question": "가장 원인이 되는 약제는?", "images": [], "text_box": "70세 남자가 2달 전부터 간헐적으로 어지러워 왔다. 오랫동안 앉았다가 일어선 직후에 어지럽다고 했다. 10년 전부터 혈압강하제 복용 중이었다. 혈압 184/60 mmHg, 맥박 78회/분, 호흡 18회/분, 체온 36.4도였다. 가슴청진에서 심음과 호흡음은 정상이었다. 자세 변동에 따른 혈압은 다음과 같았다.\n혈압측정 자세 혈압(mmHg)\n앉았을 때 140/84\n일어나서 2분 후 110/60\n누웠을 때 150/90", "options": ["dihydropyridine CCB", "nondihydropyridine CCB", "b blocker", "a blocker", "ACEI"], "answer": [3], "explanation": "환자는 앉았다가 일어설 때 혈압이 현저히 떨어지는 기립성 저혈압 증상을 보입니다. 전립선 비대증 치료에 사용되는 알파차단제는 기립성 저혈압을 유발하는 흔한 원인 약제입니다. 따라서 알파 차단제가 가장 가능성이 높은 원인 약제입니다."}, {"subject": "고혈압 치료", "year": ["15학번"], "professor": "임상현", "question": "이 환자에게서의 적절한 조치는?", "images": [], "text_box": "45세 여자가 건강 검진상 고혈압이 의심되어 내원하였다. 2차례 내원하여 시행한 진료실 평균 혈압은 162/102mmHg 이었고, 24시간 활동혈압에서 평균 혈압은 142/92mmHg 이었으며 검사실 소견은 아래와 같았다.\nHb = 14.5g/dL (정상 12-17), Fasting sugar = 88g/dL (정상 <100)\nBUN/Cr 13/1.0mg/dL, Na/K 143/4.3 mEg/L\n1일 뇨단백 : 2.5g/day", "options": ["1기 고혈압으로 적극적인 약물치료가 필요하다.", "3개월간 생활습관개선을 먼저 시행한 후 약물치료를 고려한다.", "앤지오텐신 전환효소 억제제를 포함한 2개의 항고혈압제를 처방한다.", "1차 약제로 칼슘통로차단제를 처방한다.", "24시간 활동혈압을 다시 측정한다."], "answer": [2], "explanation": "환자는 24시간 활동혈압 및 진료실 혈압에서 2기 고혈압으로 진단되었으며, 단백뇨(1일 뇨단백 2.5g/day)를 동반하고 있습니다. 이는 표적 장기 손상(신장 손상)이 있음을 의미하므로 적극적인 약물 치료를 시작해야 합니다. 1차 약제로 ACE 억제제 또는 ARB를 먼저 고려하며, 초기부터 2가지 약제를 함께 사용하는 것이 권장됩니다."}, {"subject": "고혈압 치료", "year": ["15학번"], "professor": "임상현", "question": "다음 중 추가할 항고혈압제는?", "images": [], "text_box": "55세 남자가 앤지오텐신전환효소억제제, 디히드로피리딘 칼슘통로차단제 복용으로도 혈압이 조절되지 않아 내원함. 측정된 혈압은 164/96, 맥박 56회/분, 호흡 22회/분, 체온 36.5도였다.", "options": ["안지오텐신수용체 억제제", "베타차단제", "티아지드이뇨제", "비디히드로피리딘 칼슘통로차단제", "알파차단제"], "answer": [2], "explanation": "환자는 ACE 억제제와 dihydropyridine CCB를 복용 중임에도 혈압이 164/96 mmHg로 조절되지 않고 있습니다. 병용 요법에서 ACEi/ARB, CCB, 이뇨제, 베타차단제가 1차 선택 약제이며, 아직 이뇨제를 사용하지 않았습니다. 따라서 티아지드 이뇨제를 추가하는 것이 가장 적절합니다. ACEi와 ARB는 병용 금기입니다. 맥박이 56회로 비교적 느리므로 베타차단제는 적절하지 않습니다."}, {"subject": "고혈압 치료", "year": ["15학번"], "professor": "임상현", "question": "다음 중 고혈압 치료제와 해당 유해작용이 적절하게 연결되지 않은 것을 하나만 고르시오.", "images": [], "text_box": null, "options": ["칼슘통로차단제 - 말초 부종 (edema)", "알파1차단제 - 기립성저혈압", "앤지오텐신수용체 차단제 - 기침 (cough)", "히드랄라진 - 루푸스증후군", "해당 없음"], "answer": [2], "explanation": "기침(cough)은 주로 안지오텐신 전환효소 억제제(ACEi)의 유해작용으로 나타납니다. ACEi는 폐에서 브라디키닌 농도를 증가시켜 기침을 유발합니다. 안지오텐신 수용체 차단제(ARB)는 ACEi와 달리 브라디키닌에 영향을 주지 않아 기침 부작용이 적으므로, ACEi 유발 기침 환자에게 대체 약물로 사용됩니다."}, {"subject": "고혈압 치료", "year": ["14학번"], "professor": "임상현", "question": "다음중 고혈압 치료제의 일차선택약으로 구성된 것을 하나만 고르시오.", "images": [], "text_box": null, "options": ["amlodipine-labetalol", "enalapril-losartan", "atenolol-prazosin", "clonidine-hydrochlorothiazide", "해당없음"], "answer": [4], "explanation": "고혈압 치료제의 일차 선택 약제에는 티아지드계 이뇨제(예: hydrochlorothiazide), 안지오텐신 전환효소 억제제(예: enalapril), 안지오텐신 II 수용체 길항제(예: losartan), 베타-수용체 길항제(예: atenolol), 칼슘통로차단제(예: amlodipine) 등이 있습니다. 제시된 옵션 중 amlodipine-labetalol, enalapril-losartan, atenolol-prazosin, clonidine-hydrochlorothiazide는 일차 선택약으로만 구성되어 있지 않거나 적절한 조합이 아닙니다. 따라서 답은 '해당없음'입니다."}, {"subject": "고혈압 치료", "year": ["13학번"], "professor": "임상현", "question": "다음 중 혈압조절을 위해 추가할 약제로 가장 적절한 것은?", "images": [], "text_box": "52세 남자가 항고혈압제로 앤지오텐신수용체차단제, 칼슘통로차단제, 티아지드계 이뇨제, 베타차단제를 사용해도 혈압이 158/96mmHg, 맥박수 분당 70회였다. 이차성 고혈압 감별을 위한 검사에서는 이상소견이 없었고, 혈액검사 결과는 다음과 같았다.\nBUN/Cr 18/0.9 mg/dL, Na+/K+ 138/4.7 meq/L", "options": ["레닌억제제", "알도스테론 길항제", "고리작용이뇨제", "앤지오텐신전환효소 억제제", "비디히드로피리딘 (non-dihydropyridine) 칼슘통로차단제"], "answer": [1], "explanation": "환자는 ARB, CCB, 티아지드 이뇨제, 베타차단제 등 4가지 계열의 약제를 복용 중임에도 혈압이 158/96 mmHg로 조절되지 않는 저항성 고혈압입니다. 이차성 고혈압의 감별은 어려웠습니다. 저항성 고혈압에서 추가 약제로 저용량 알도스테론 길항제(예: 스피로놀락톤)가 가장 우선적으로 추천됩니다. 이는 4th line 약제로 사용됩니다."}, {"subject": "고혈압 치료", "year": ["13학번", "12학번", "09학번"], "professor": "임상현", "question": "다음 환자의 치료로 옳은 것은? (13, 12, 09, 고대)", "images": [], "text_box": "55세 남자가 의식을 잃고 응급실에 실려왔다. 과거력상 고혈압 진단을 받았으나 별다른 치료를 하지 않았다. 내원 당시 혈압이 220/130 mmHg 였고, 안저 검사상 유두부종, 망막출혈 및 망막 삼출이 있었다. 검사실 소견은 아래와 같다.\nBUN/Cr 34/2.3 mg/dL\nNa+/K+ 138/5.0 mEq/L\nHb 15mg/dL\nU/A Protein (+++)", "options": ["혈액투석을 바로 시행한다.", "혈압을 바로 120/80mmHg 로 낮춘다.", "즉각적으로 steroid 를 정주한다.", "일단 안정제 투여 후 안정한다.", "즉각적으로 Nitroprusside 를 바로 정주한다."], "answer": [4], "explanation": "환자는 220/130 mmHg의 심한 고혈압과 유두부종, 망막출혈, 신부전(BUN/Cr 상승, 단백뇨) 등의 표적 장기 손상을 동반한 고혈압 응급(Hypertensive emergency) 상태입니다. 즉각적인 IV 약물 투여로 혈압을 강하시켜야 하며, 니트로푸루시드(Nitroprusside)는 고혈압 응급 시 빠른 혈압 강하 효과를 보이는 약제입니다. 첫 2시간 이내에 평균 동맥압을 25% 이하로 낮추는 것을 목표로 합니다."}, {"subject": "고혈압 치료", "year": ["11학번"], "professor": "임상현", "question": "임신 후 고혈압에 대한 치료 및 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["혈압은 임신 초기부터 말기까지 지속적으로 상승한다.", "임신 시 항고혈압제로 methyldopa 의 사용은 태아 발육 지연을 초래할 수 있다.", "angiotensin 수용체 차단제는 임신 20주 이후에는 안전하 게 쓸 수 있는 약제이다.", "임신 시 항고혈압제로 nifedipine을 사용할 수 있다", "염분을 제한하고 고혈압약제로 이뇨제가 선호된다."], "answer": [3], "explanation": "임신 시 혈압은 2nd trimester까지 감소하다가 3rd trimester부터 다시 상승하는 경향을 보입니다. 임산부에게 사용 가능한 경구 혈압약으로는 니페디핀이 있으며, 메틸도파 또한 사용 가능하나 우리나라에서는 주로 사용되지 않습니다. ACEi/ARB는 태아 기형 유발 가능성으로 임산부에게 금기입니다. 염분 제한은 태아에게 필수적인데 제한하면 안 됩니다."}, {"subject": "고혈압 치료", "year": ["11학번"], "professor": "임상현", "question": "일년 전부터 당뇨로 경구 혈당강하제를 투여하던 50세 여자가 거품뇨 소견으로 내원하였다. 내원시 측정한 혈압은 160/110mmHg, 일일 요단백이 2.0g 으로 증가되어있었다. 이 환자에서 우선적으로 선택할 수 있는 항고혈압제는?", "images": [], "text_box": null, "options": ["안지오텐신전환효소 억제제", "베타차단제", "알파차단제", "칼슘통로차단제", "이뇨제"], "answer": [0], "explanation": "당뇨병성 신증으로 인한 단백뇨(거품뇨, 일일 요단백 2.0g)를 동반한 고혈압 환자에게는 안지오텐신 전환효소 억제제(ACEi)나 안지오텐신 수용체 차단제(ARB)가 가장 우선적으로 선택됩니다. 이들은 혈압 강하 효과 외에도 신장 보호 효과를 제공하여 당뇨병성 신증의 진행을 늦추는 데 도움이 됩니다. 목표 혈압은 130/80 mmHg 미만으로 적극적인 조절이 권장됩니다."}, {"subject": "고혈압 치료", "year": ["11학번"], "professor": "임상현", "question": "고혈압이 있는 63세 남자 환자가 치료 없이 지내다 의식 저하를 주소로 응급실에 내원하였다. 혈압은 240/140 mmHg 이었고, 흉부 X선에서는 심비대가 나타났지만 뇌 CT 촬영에서는 특이소견이 발견되지 않았다. 치료에 대한 설명으로 옳은 것은? (총시)", "images": [], "text_box": null, "options": ["아스피린 경구 투여한다.", "혈압을 최대한 빨리 정상화 시킨다.", "mannitol 을 정맥 투여한다.", "nitroprusside를 정맥 투여한다.", "안정제를 투여하고 안정시킨다."], "answer": [3], "explanation": "환자는 240/140 mmHg의 심한 고혈압과 의식 저하, 심비대를 동반한 고혈압 응급(Hypertensive emergency) 상태입니다. 뇌 CT상 특이 소견이 없어도 혈압성 뇌병증을 시사합니다. 즉시 IV nitroprusside 등을 정주하여 혈압을 강하시켜야 합니다. 혈압을 너무 급격히 정상화시키는 것은 위험하며, 첫 2시간 이내에 평균 동맥압을 25% 이하로 낮추는 것을 목표로 합니다."}, {"subject": "고혈압 치료", "year": ["11학번"], "professor": "임상현", "question": "70세 남자환자가 흉통을 동반한 실신을 주소로 내원하였 다. 환자의 과거력, 가족력과 함께 내원 시 시행한 안정상태 심전도 및 심초음파 소견에서 입원 후 평가가 필요한 고혈압인 자에 해당하는 소견은? (5가지) (총시)", "images": [], "text_box": null, "options": ["심전도상 델타파 (delta wave)", "흉통", "심실빈맥(ventricular tachycardia)의 과거력", "교정 QT 간격 400msec", "심전도상 흉부유도 V1, V2에서 우각차단 및 ST 분절상승 소견", "심전도상 Wenckebach 방실차단", "심한 음주 및 흡연력", "돌연사의 가족력", "심전도상 완전 우각차단 소견", "경도의 승모판 폐쇄부전증"], "answer": [0, 1, 2, 4, 7], "explanation": "입원 후 평가가 필요한 고혈압 환자의 고위험 인자로는 흉통을 동반한 심근허혈, 심부전 증상, 심실빈맥 과거력, 500msec 이상의 QTc 간격 연장 등이 있습니다. 또한, 브루가다 유형 심전도, 지속적인 동성 서맥, 조기 흥분 증후군(delta wave), 돌연사 가족력도 해당합니다. 제시된 소견 중 델타파, 흉통, 심실빈맥 과거력, 우각차단 및 ST 분절 상승 소견, 돌연사의 가족력이 고위험 인자에 해당합니다."}, {"subject": "고혈압 치료", "year": ["10학번"], "professor": "임상현", "question": "다음의 항고혈압제 병용요법 중 가장 효과적인 예는?", "images": [], "text_box": null, "options": ["이뇨제 + 베타차단제", "칼슘길항제 + 베타차단제", "안지오텐신 전환효소 억제제 + 베타차단제", "안지오텐신 전환효소 억제제 + 안지오텐신 수용체 차단제", "이뇨제 + 안지오텐신 수용체 차단제"], "answer": [4], "explanation": "고혈압 약제의 병용요법은 작용 기전이 다른 약제들을 조합하여 혈압 강하 효과를 높이고 부작용을 줄이는 데 목표를 둡니다. 이뇨제와 안지오텐신 수용체 차단제(ARB)의 병용은 두 약물의 보완적인 작용으로 혈압 강하 효과가 우수합니다. 반면, ACE 억제제와 ARB는 동일한 RAS 계열이므로 병용 시 효과 증가는 미미하고 부작용 위험만 증가합니다."}, {"subject": "고혈압 치료", "year": ["10학번"], "professor": "임상현", "question": "본태성 고혈압 환자에서 안지오텐신 전환효소 억제제 단독 요법으로 혈압 조절이 안 되는 경우에 추가할 약제로 적절한 것은? (두 가지)", "images": [], "text_box": "각 문항에서 고혈압 치료제로 적절한 것을 <보기> (1-9)중에서 지시하는 수만큼 고르시오. (총시)\n<보기>\n1) α1 수용체 차단제 2) α, β 수용체 혼합 차단제\n3) ẞ1 수용체 차단제 4) 안지오텐신 수용체 차단제\n5) 알도스테론 길항제 6) 레닌억제제\n7) 칼슘통로차단제 8) 칼륨통로차단제\n9) thiazide계 이뇨제", "options": ["7", "9"], "answer": [0, 1], "explanation": "본태성 고혈압 환자에서 ACE 억제제 단독 요법으로 혈압 조절이 안 될 경우, 다른 계열의 약제를 추가해야 합니다. 일반적으로 칼슘통로차단제(CCB)나 티아지드계 이뇨제가 다음 단계에서 추가될 수 있는 주요 약제입니다. 따라서 보기 중 7번(칼슘통로차단제)과 9번(thiazide계 이뇨제)이 적절합니다."}, {"subject": "고혈압 치료", "year": ["10학번"], "professor": "임상현", "question": "협심증이 있는 고혈압 환자에서 일차적으로 선택할 약제는? (두 가지)", "images": [], "text_box": "각 문항에서 고혈압 치료제로 적절한 것을 <보기> (1-9)중에서 지시하는 수만큼 고르시오. (총시)\n<보기>\n1) α1 수용체 차단제 2) α, β 수용체 혼합 차단제\n3) ẞ1 수용체 차단제 4) 안지오텐신 수용체 차단제\n5) 알도스테론 길항제 6) 레닌억제제\n7) 칼슘통로차단제 8) 칼륨통로차단제\n9) thiazide계 이뇨제", "options": ["3", "7"], "answer": [0, 1], "explanation": "협심증을 동반한 고혈압 환자에서는 베타차단제(BB)가 일차 선택 약제이며, 이는 심박수와 심근 수축력을 감소시켜 심근 산소 요구량을 줄여 협심증 증상을 완화하는 효과가 있습니다. 칼슘통로차단제(CCB)도 협심증 치료에 효과적이며, BB가 금기이거나 효과가 없을 때 사용 가능합니다. 따라서 보기 중 3번(B1 수용체 차단제)과 7번(칼슘통로차단제)이 적절합니다."}, {"subject": "고혈압 치료", "year": ["09학번"], "professor": "임상현", "question": "이 환자에서 추가로 처방한 고혈압 약제와 새롭게 처방할 약제로 적합한 조합은?", "images": [], "text_box": "55세 여자 환자에게 1개월전 항고혈압제를 추가하였더니 마른기침이 심하여 잠을 잘 수가 없어 서 내원하였다. 환자 혈압은 135/85 mmHg, 맥박은 60회였다.", "options": ["안지오텐신 전환효소 억제제 / 안지오텐신 수용체 차단제", "이뇨제 / 혈관확장제", "베타차단제 / 알파차단제", "안지오텐신 전환효소 억제제 / 베타차단제", "칼슘채널 차단제 / 이뇨제"], "answer": [0], "explanation": "환자는 항고혈압제 복용 후 심한 마른기침을 호소하고 있으며, 이는 안지오텐신 전환효소 억제제(ACEi)의 흔한 부작용입니다. 혈압은 135/85 mmHg로 비교적 잘 조절되고 있습니다. ACEi 유발 기침 시 안지오텐신 수용체 차단제(ARB)로 교체하는 것이 가장 적절합니다. ARB는 ACEi와 유사한 혈압 강하 효과를 가지면서 기침 부작용이 적습니다."}, {"subject": "고혈압 치료", "year": ["고대"], "professor": "임상현", "question": "이 환자의 치료로 가장 적합한 것은?", "images": [], "text_box": "5년 전부터 당뇨병 진단을 받고 치료 중인 58세 남자 환자가 호흡곤란을 주소로 내원하였다. 혈압은 150/90mmHg, 심박수 80회 양측폐하에 수포음이 들렸고 제 4 심음이 청진되었다. 심전도 에서는 좌심실 비대 흉부 X선 검사에서는 심음영의 확장과 폐간질 음영 증가 소견을 보였다.", "options": ["디곡신과 알파차단제", "디곡신과 칼슘채널 차단제", "이뇨제와 알파차단제", "안지오텐신 전환효소 억제제와 이뇨제", "혈관확장제와 알파차단제"], "answer": [3], "explanation": "환자는 고혈압으로 인한 좌심실 비대와 이로 인한 심부전(Heart failure)으로 폐부종(수포음, 폐간질 음영 증가)이 발생한 증례입니다. 심부전의 치료에는 이뇨제, 베타차단제, ACE 억제제가 핵심 약물입니다. 폐부종이 있으므로 이뇨제를 통해 체액 과부하를 조절하는 것이 우선적으로 중요하며, ACE 억제제는 심부전 진행을 늦추는 데 필수적입니다. 따라서 안지오텐신 전환효소 억제제와 이뇨제의 조합이 가장 적절합니다."}, {"subject": "고혈압 치료", "year": ["고대"], "professor": "임상현", "question": "이 환자에서 처방한 고혈압제와 새롭게 처방할 약제로 적합한 조합은?", "images": [], "text_box": "기관지 천식을 앓고 있는 65세 남자 환자에서 1개월 전 항고혈압제를 추가하였더니 마른 기침이 심하여 잠을 잘 수가 없어서 내원하였다.", "options": ["안지오텐신 전환 효소 억제제 → 베타차단제", "이뇨제 → 혈관확장제", "베타차단제 → 칼슘채널 차단제", "안지오텐신 전환 효소 억제제 → 칼슘채널 차단제", "칼슘채널 차단제 → 이뇨제"], "answer": [3], "explanation": "환자는 마른 기침을 호소하며, 이는 안지오텐신 전환효소 억제제(ACEi)의 부작용으로 추정됩니다. 따라서 ACEi를 중단하고 다른 계열의 약제로 교체해야 합니다. 또한, 기관지 천식이 있으므로 비선택적 베타차단제는 금기입니다. ACEi로 인한 기침이 심한 경우 ARB로 전환하는 것이 일반적이나, 선지에 없으므로 ACEi 대신 칼슘채널 차단제를 처방하는 것이 적절합니다."}, {"subject": "고혈압 치료", "year": ["고대"], "professor": "임상현", "question": "이 환자에서 가장 먼저 고려할 수 있는 항고혈압제는?", "images": [], "text_box": "55세 남자환자가 언덕길을 올라갈 때 발생하는 왼쪽 가슴 통증을 주소로 내원하였다. 내원 시 혈압은 155/95 mmHg 였고 흉통을 평가하기 위해 심부하 검사를 시행하여 양성 소견을 보였다.", "options": ["안지오텐신 전환효소 억제제", "알파차단제", "베타차단제", "이뇨제", "Hydralazine"], "answer": [2], "explanation": "환자는 운동 시 발생하는 흉통과 심부하 검사 양성 소견으로 협심증이 동반된 고혈압 증례입니다. 협심증이 동반된 고혈압 환자에게는 심박수를 낮추고 심근 산소 요구량을 감소시키는 베타차단제가 일차적으로 선택되는 항고혈압제입니다. 베타차단제는 협심증 증상 완화와 혈압 강하 효과를 동시에 제공합니다."}, {"subject": "고혈압 치료", "year": ["고대"], "professor": "임상현", "question": "우선적으로 선택할 항고혈압제는?", "images": [], "text_box": "35세 여자가 고혈압 치료를 위하여 내원하였다. 혈압 180/110mmHg, 1일 요단백 2.0g 이었다.", "options": ["안지오텐센 전환효소 억제제", "베타차단제", "알파차단제", "칼슘채널차단제", "이뇨제"], "answer": [0], "explanation": "환자는 180/110 mmHg의 고혈압과 1일 요단백 2.0g을 보여 신기능 장애 또는 단백뇨가 동반된 고혈압입니다. 이러한 경우 신장 보호 효과가 뛰어난 안지오텐신 전환효소 억제제(ACEi)나 안지오텐신 수용체 차단제(ARB)가 가장 우선적으로 선택되는 항고혈압제입니다. 이 약제들은 혈압 강하 외에도 단백뇨를 감소시키고 신장 기능을 보존하는 데 효과적입니다."}, {"subject": "고혈압 치료", "year": ["고대"], "professor": "임상현", "question": "적절한 치료는?", "images": [], "text_box": "임신 8주인 35세 여자가 고혈압으로 내원하였다. 혈압 170/110mmHg, 이외에 신체검사와 검사실 소견은 모두 정상이다.", "options": ["임신 20주 이후 항고혈압제 복용 여부를 결정한다.", "안지오텐신 II 수용체 차단제", "안지오텐신 전환효소 억제제", "Hydralazine", "알도스테론 길항제"], "answer": [3], "explanation": "임신 8주인 환자가 170/110 mmHg의 고혈압을 보이며 치료가 필요합니다. 임산부에게 안전하게 사용할 수 있는 항고혈압제로는 Hydralazine과 methyldopa가 있습니다. ACEi/ARB는 태아 기형 유발 가능성으로 금기입니다. 혈압이 높은 상황이므로 약물 치료를 미루지 않고 시작해야 합니다."}, {"subject": "고혈압 치료", "year": ["고대"], "professor": "임상현", "question": "다음 중 가임여성이나 임신한 고혈압 환자에게 금기인 항고혈압제는?", "images": [], "text_box": null, "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": [1], "explanation": "가임기 여성이나 임신한 고혈압 환자에게는 안지오텐신 전환효소 억제제(ACEi)와 안지오텐신 수용체 차단제(ARB)가 태아에게 심각한 기형을 유발할 수 있으므로 절대 금기입니다. Methyldopa와 Hydralazine은 임산부에게 비교적 안전하게 사용할 수 있는 약물입니다."}, {"subject": "고혈압 치료", "year": ["고대"], "professor": "임상현", "question": "고혈압 치료제인 Thiazide diuretics 에 대해 옳은 설명은?", "images": [], "text_box": null, "options": ["DM 에 사용하면 효과적이다", "통풍에 좋다", "계속 사용하면 Volume 감소효과가 더 커진다.", "유해작용으로 hypokalemia 가 있다", "모두 맞음"], "answer": [3], "explanation": "티아지드 이뇨제는 고혈압 치료에 널리 사용되지만, 몇 가지 부작용이 있습니다. 대표적인 부작용으로는 저칼륨혈증(hypokalemia), 고혈당(당뇨병 환자에게 사용 시 주의), 고요산혈증(통풍 악화), 고칼슘혈증 등이 있습니다. 따라서 유해작용으로 저칼륨혈증이 있다는 설명이 옳습니다. 지속적인 사용 시 볼륨 감소 효과가 더 커지지는 않습니다."}, {"subject": "고혈압 치료", "year": ["고대"], "professor": "임상현", "question": "다음 중 틀린 것은?", "images": [], "text_box": "45세 남자 환자가 3년전 고혈압을 진단 받았으나 특별한 치료를 받지 않고 지내다 심한 두통과 구역 증상을 호소하여 응급실에 내원하였다. 응급실 내원 당시 혈압이 250/140mmHg 이었다.", "options": ["안저 검사를 한다.", "첫날 혈압을 120/80mmHg 까지 낮춘다.", "2차성 고혈압에 대한 검사를 시행한다.", "정맥 주사용 항고혈압제를 투약한다.", "신장 손상 여부가 예후에 중요하다."], "answer": [1], "explanation": "환자는 250/140 mmHg의 심한 고혈압과 두통, 구역 증상을 동반한 고혈압 응급(Hypertensive emergency) 상황입니다. 이 경우 혈압을 너무 급격하게 정상화시키는 것은 뇌혈류 감소 등의 위험이 있어 피해야 합니다. 첫 2시간 이내에 평균 동맥압을 약 25% 이하로 낮추고, 그 후 점진적으로 혈압을 목표치까지 낮추는 것이 권장됩니다. 따라서 첫날 혈압을 120/80mmHg까지 낮추는 것은 잘못된 조치입니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번", "11학번"], "professor": "이배영", "question": "다음 영상에 관한 질문이다. 맞는 것을 고르시오.", "images": [], "text_box": null, "options": ["문제가 되는 혈관은 right coronary artery 이다.", "심초음파에서 전벽에 hypokinesia 소견을 보일 것이다.", "적절한 치료를 하면 예후가 좋을 것이다.", "심장 MR에서 정상 소견을 보일 것이다.", "응급 수술이 필요하다."], "answer": [0], "explanation": "수업시간에 SPECT MI 소견으로 보았던 사진과 동일합니다. Inf. Wall(아래)쪽 혈류가 stress, rest 상태 둘 다 감소되어 있으므로 RCA(right coronary a.) 이상에 의한 myocardial infarction입니다. Infarction이 왔으므로 viable myocardium이 감소한 상태라고 볼 수 있습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "좁아진 혈관은?", "images": [], "text_box": "MI로 내원한 환자의 coronary angiography 사진이다.", "options": ["Right Coronary Artery", "Left Anterior Descending Artery", "Diagonal Artery", "Posterior Descending Artery", "Left Circumflex Artery"], "answer": [0], "explanation": "심장 CT 파트에서 나왔던 사진과 동일합니다. 관상동맥 조영술(coronary angiography) 영상에서 우측 관상동맥(RCA)에 심한 협착이 관찰됩니다. RCA는 심장의 하벽(inferior wall)과 후벽(posterior wall)을 주로 관류하며, 협착은 심근경색의 주요 원인입니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "환자의 수축기(왼쪽)과 이완기(오른쪽) 사진이다. 비정상적인 부위는?", "images": [], "text_box": null, "options": [], "answer": [4], "explanation": "심장이 수축하고 이완함에 따라 심근이 두꺼워졌다가 얇아지는 것이 정상입니다. 그러나, infarction이 오면 심장의 수축/이완에도 해당 부위의 두께가 변하지 않고 얇은 상태로 유지됩니다. 그림에서는 5번 부위가 수축 시에도 두꺼워지지 않고 이완기와 비슷한 것을 볼 수 있습니다. 따라서, 5번 부위에 비정상적이라고 유추할 수 있습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번", "16학번", "14학번", "13학번"], "professor": "이배영", "question": "다음은 비침습적인 심장 기능 검사방법에 관한 기술이다. 이 중 맞는 것은?", "images": [], "text_box": null, "options": ["혈관의 석회화 총량 계산은 보통 MR이 CT보다 유용하다.", "지연 조연증강검사 방법은 MR, CT에서 모두 가능하다.", "심초음파 검사는 심장 주변의 기도 평가에 유용하다.", "핵의학 검사는 CT검사보다 해상도가 더 우수하다.", "운동부하 심전도 검사는 검사가 용이해 청년보다 노인에게 더 유용하다."], "answer": [1], "explanation": "지연 조영증강 검사는 주로 MR에서 활용되지만 CT에서도 가능합니다. CT는 석회화 평가에 더 유용하며, 심초음파는 공기로 인해 기도 평가가 어렵습니다. 핵의학 검사는 해상도가 낮은 것이 단점이며, 운동부하 심전도 검사는 노인이나 운동 능력 저하 환자에게는 어려울 수 있습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "다음 영상에 관한 지문이다. 원인이 되는 혈관은?", "images": [], "text_box": null, "options": ["right coronary artery", "left anterior descending artery", "diagonal branch", "posterior descending artery", "left circumflex artery"], "answer": [0], "explanation": "짤변 문제입니다! 수업시간에 SPECT MI 소견으로 보았던 사진과 동일하며 Inf. Wall(아래)쪽 혈류가 stress, rest 상태 둘 다 감소되어 있으므로 RCA(right coronary a.) 이상에 의한 myocardial infarction입니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "환자가 시행한 영상소견은 다음과 같다. 다음 보기 중 맞는 것은?", "images": [], "text_box": null, "options": ["심근 지연 조영증강 영상이다.", "dark signal 을 보이는 부위가 허혈이 있는 조직이다.", "문제가 되는 혈관은 우 관상동맥 (rigth coronary arter)이다.", "재관류 치료 시 예후가 좋을 것이다.", "우심실을 주로 평가한 영상이다."], "answer": [0], "explanation": "이 영상은 Acute MI의 심장 MR 지연조영증강 사진과 동일합니다. 지연조영증강 영상에서는 허혈이 있는 조직이 하얗게 증강되어 보입니다. 본 사진에서는 전벽(ant. wall) 쪽이 하얗게 증강된 것으로 보아 LAD에 문제가 생긴 것으로 보입니다. Transmural infarction의 경우 예후가 좋지 않을 수 있으며, 이는 좌심실을 주로 평가한 영상입니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "57세 남자환자의 CT사진이다. 가장 옳은 진단명은?", "images": [], "text_box": null, "options": ["폐색전증", "비후성 심근증", "만성심근경색", "확장성 심근증", "제한성 심근증"], "answer": [2], "explanation": "공식 해설에 따르면 좌심실의 심첨부와 전벽에 혈전들이 있고 심근이 얇아진 소견으로 만성 심근경색이다. 제시된 CT 소견은 증례에서 보았던 만성 심근경색과 유사합니다. 만성 심근경색은 심근 손상 후 심실벽의 얇아짐과 혈전 형성을 동반할 수 있습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "다음 영상에 관한 질문이다. 가장 맞는 것을 고르시오.", "images": [], "text_box": null, "options": ["검사 시간이 짧다", "재관류 치료가 도움이 된다", "방사능 피폭이 비교적 적은 검사이다", "우관상동맥이 원인 혈관이다", "해부학적 해상도가 좋은 검사이다"], "answer": [1], "explanation": "짤변 문제입니다! 수업시간에 SPECT Ischemia 소견으로 보았던 사진과 동일하며 lat. Wall(오른)쪽 혈류가 stress 상태에서 rest 상태에 비해 더 많이 감소되어 있으므로 left circumflex artery 이상에 의한 lat. Wall ischemia 입니다. Infarction이 아닌 ischemia이므로 재관류 치료가 도움이 된다고 할 수 있습니다. 그리고, SPECT는 검사 시간이 길며, 방사능 피폭이 상대적으로 많고, 해부학적 해상도가 좋지 않은 검사입니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "호흡곤란으로 응급실에 내원한 70세 남자환자의 CT사진이다. 가장 옳은 것은?", "images": [], "text_box": null, "options": ["폐색전증이 있는 소견이다.", "심첨부에 혈전이 있는 소견이다.", "심막삼출약이 증가한 소견이다.", "심방중격결손이 있는 소견이다.", "심장내로 악성종양이 전이된 소견이다."], "answer": [1], "explanation": "공식 해설에 따르면 좌심실의 심첨부와 전벽에 혈전들이 있고 심근이 얇아진 소견으로 만성 심근경색이다. 이 CT 사진은 심첨부에 혈전이 존재하는 소견을 보여주고 있습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "부하 및 안정시 심장 핵의학 영상이다. 가장 맞는 것을 고르시오.", "images": [], "text_box": null, "options": ["좌전하행지 (left anterior descending artery)가 원인 혈관이다.", "향후 예후가 비교적 안 좋을 것이다.", "방사능 피폭이 비교적 적은 검사이다.", "심근벽이 상당히 얇아진 만성 병변이다.", "운동 부하 검사에서 양성일 가능성이 크다."], "answer": [4], "explanation": "사진은 바뀌었지만, 수업시간에 SPECT Ischemia 소견으로 보았던 사진과 유사합니다. lat. Wall(오른)쪽 혈류가 stress 상태에서 rest 상태에 비해 더 많이 감소되어 있으므로 left circumflex artery 이상에 의한 lat. Wall ischemia 이며, 운동 부하 검사에서 양성일 가능성이 큽니다. 허혈이 심해 예후는 안 좋을 것으로 예상되며, SPECT는 방사능 피폭이 상대적으로 많고 심근 두께는 이 영상으로 평가할 수 없습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번", "9학번"], "professor": "이배영", "question": "다음 기술 중 맞는 것은?", "images": [], "text_box": null, "options": ["MR 검사가 CT 보다 관상동맥을 평가하는데 있어 아직까지는 더 유용하다.", "지연 조영증강의 기전은 만성기에는 반흔조직 사이의 공간이 넓어지고 급성기에는 세포막이 파괴돼 세포 내로 조영제가 많이 들어가는 것이 그 기전이다.", "MR 검사에서 지연 조연 증강 현상은 심근경색을 평가하는데 유용하나 다른 심근질환, 즉 심근염이나 종양 등의 평가에는 유용하지 않다.", "허혈 시 심내막 부위의 심근은 끝까지 정상으로 있다가 맨 나중에 손상된다.", "심내막하 결손을 보이는 심근경색 평가 시 MR 검사보다 핵의학 검사가 더 정확하다."], "answer": [1], "explanation": "지연 조영증강의 기전은 만성기에는 반흔 조직 사이의 공간이 넓어지고 급성기에는 세포막이 파괴돼 세포 내로 조영제가 많이 들어가는 것입니다. CT가 관상동맥 평가나 석회화 총량 평가에 MR보다 유용하며, MR은 심근염 종양 평가에도 유용합니다. 심근 허혈 시 심내막 부위가 먼저 손상되며, 심내막하 결손 평가 시 MR 검사가 핵의학 검사보다 해상도가 더 높습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "어떤 환자에서는 운동부하 심전도 검사보다는 부하 심초음파나 핵의학검사를 시행한다. 어떤 경우인지 고르시오.", "images": [], "text_box": null, "options": ["Right bundle branch block", "Left bundle branch block", "Obese patients", "Atrial fibrillation", "Sinus bradycardia"], "answer": [1], "explanation": "운동부하 심전도 검사는 뛰면서 심전도 검사를 해야 하기 때문에 노인이나 운동 능력이 떨어지는 사람에게는 검사가 힘듭니다. 좌각차단(Left bundle branch block)의 경우 운동부하 심전도 검사 결과 해석이 어려워 부하 심초음파나 핵의학 검사를 시행하는 것이 더 적절합니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "환자에게 시행한 MR 소견이다. 이를 보고 맞는 것을 고르시오.", "images": [], "text_box": null, "options": ["T2 강조 영상이다.", "Bright signal 을 보이는 부위가 정상 부위이고 dark signal 을 보이는 부분이 죽은 조직이다.", "문제가 있는 혈관은 우 관상동맥이다.", "예후가 나쁠 것으로 예상 된다.", "우심실을 주로 침범한 현상이다."], "answer": [3], "explanation": "수업시간에 봤던 Acute MI의 심장 MR 지연조영증강 사진과 동일합니다. 지연조영증강 영상에서는 허혈이 있는 조직이 하얗게 보이며, 본 사진에서는 전벽(ant. Wall) 쪽이 하얗게 증강된 것으로 보아 LAD에 문제가 생긴 것으로 보입니다. Transmural infarction이 왔으므로 예후가 안 좋을 것이라 예상되며, 이는 좌심실을 주로 평가한 영상입니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "다음 중 심혈관질환에 대한 영상의학적 검사방법 중 심근의 생존능(viability)를 가장 잘 알 수 있는 검사방법은?", "images": [], "text_box": null, "options": ["단순흉부 X선 사진", "심장 초음파", "관상동맥 조영술", "심장 CT", "심장 MRI"], "answer": [4], "explanation": "심근의 생존능(viability) 평가는 허혈성 심질환 환자의 치료 방침을 결정하는 데 매우 중요합니다. 심근 관류 평가 및 심근의 생존능 평가에 가장 유용한 검사방법은 심장 MR(자기공명영상)입니다. MR은 심근 경색 범위, 미세혈관 손상, 심근 부종 등을 정확하게 평가할 수 있습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["21학번"], "professor": "이배영", "question": "65세 남자 환자의 영상 소견이다. 맞는 것은?", "images": [], "text_box": null, "options": ["핵의학 검사와 MR 검사 영상이다.", "병변의 위치는 측벽이며 급성으로 병변이 생겼을 가능성이 크다.", "스텐트나 수술 등으로 혈류를 개선해 주면 다시 정상 심근으로 돌아 올 수 있는 소견이다.", "이런 경우 혈전이 생기기 쉬워 혈류를 타고 다른 부위에 경색이 생길 수 있다.", "유두근이 파열된 소견이며 그 영향으로 승모판이 두꺼워진 소견이다."], "answer": [3], "explanation": "왼쪽 사진은 SPECT MI 소견이며 오른쪽 사진은 CT 영상입니다. SPECT에서 Inf. Wall(아래)쪽 혈류 감소는 RCA 이상에 의한 myocardial infarction을 시사합니다. Infarction이 발생하면 해당 부위의 심근이 움직이지 않고 혈류가 정체되어 심장 내 혈전이 생기기 쉬우며, 이 혈전은 다른 부위로 이동하여 색전증을 유발할 수 있습니다. 이미 발생한 경색은 혈류 개선으로도 정상 심근으로 돌아오기 어렵습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["20학번"], "professor": "이배영", "question": "여러 협착 부위중에 가장 협착 정도가 심한 부위는?", "images": [], "text_box": "69세 남자 환자의 심장 CT 영상 소견이다.", "options": ["Proximal RCA", "Proximal LAD", "Proximal LCX", "Distal RCA", "Distal LCX"], "answer": [1], "explanation": "심장 CT 영상에서 여러 관상동맥 협착 부위가 관찰됩니다. 그중 전벽(Ant. wall)을 관류하는 좌전하행동맥(LAD)의 근위부(Proximal LAD)에 가장 심한 협착 소견이 보입니다. LAD의 협착은 심근 허혈의 흔한 원인입니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["19학번"], "professor": "이배영", "question": "2달 전 환자의 영상 소견이다 옳은 것은?", "images": [], "text_box": null, "options": ["원인 혈관이 left anterior descending artery 이다.", "심초음파 시 심실 전벽에 hypokinesia를 관찰할 수 있다.", "viable myocardium은 감소한 상태이다.", "심장 MR 영상은 정상이다.", "응급 stent, CABG 가 필요함"], "answer": [2], "explanation": "수업시간에 SPECT MI 소견으로 보았던 사진과 동일합니다. Inf. Wall(아래)쪽 혈류가 stress, rest 상태 둘 다 감소되어 있으므로 RCA(right coronary a.) 이상에 의한 myocardial infarction입니다. Infarction이 왔으므로 viable myocardium이 감소한 상태라고 볼 수 있습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["18학번"], "professor": "이배영", "question": "다음 영상에 대해 옳은 것은?", "images": [], "text_box": null, "options": ["원인 혈관이 left anterior descending artery이다.", "심초음파 시 심실 전벽에 hypokinesia를 관찰할 수 있다.", "적절한 치료를 해도 좋은 예후를 기대하기 어렵다.", "심장 MR 영상은 정상이다.", "응급 stent, CABG가 필요하다."], "answer": [2], "explanation": "짤변 문제입니다! 수업시간에 SPECT MI 소견으로 보았던 사진과 동일하며 Inf. Wall(아래)쪽 혈류가 stress, rest 상태 둘 다 감소되어 있으므로 RCA(right coronary a.) 이상에 의한 myocardial infarction입니다. Infarction이 왔으므로 이미 viable myocardium이 감소한 상태라고 볼 수 있고, 적절한 치료를 해도 좋은 예후를 기대하기 어렵다고 볼 수 있습니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["17학번"], "professor": "이배영", "question": "MR을 이용한 혈관조영술(MRA)의 장점으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["전신혈관을 한 번에 검사할 수 있다.", "석회화 병변을 잘 관찰할 수 있다.", "검사시간이 CT 혈관조영술(CTA)에 비해 짧다.", "다른 검사에 비해 인공산물(artifact)이 적게 발생한다.", "조영제를 사용하더라도 신독성이 적어 만성신장질환이 있는 환자에서도 안전하게 시행할 수 있다."], "answer": [0], "explanation": "MR 검사는 전신혈관을 한 번에 검사할 수 있는 장점이 있습니다. 그러나 석회화 병변 관찰, 검사 시간, 인공산물 발생, 조영제 안전성 등에서는 다른 검사에 비해 단점이 있을 수 있습니다. 특히 가돌리늄 조영제는 신독성은 적으나 신원성 전신 섬유증(nephrogenic systemic fibrosis) 위험이 있어 만성 신장 질환 환자에게 주의해야 합니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["15학번"], "professor": "이배영", "question": "다음은 어느 혈관의 이상인가?", "images": [], "text_box": null, "options": ["Right Coronary Artery", "Left Anterior Descending Artery", "Diagonal Primary Artery", "Posterior Descending Artery", "Left Circumflex Artery"], "answer": [4], "explanation": "짤변 문제입니다! 수업시간에 SPECT Ischemia 소견으로 보았던 사진과 동일하며 lat. Wall(오른)쪽 혈류가 stress 상태에서 rest 상태에 비해 더 많이 감소되어 있으므로 left circumflex artery 이상에 의한 lat. Wall ischemia 입니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["11학번"], "professor": "이배영", "question": "다음은 심장 MR영상에 관한 기술이다. 이 중 맞는 것은?", "images": [], "text_box": null, "options": ["MR검사가 CT보다 석회화를 평가하는데 있어 더 유용하다.", "급성 심근 경색에서 지연 조영증강은 반흔조직사이의 공간이 넓어져 조영제가 많이 들어가는 것이 원인이다.", "MR 검사에서 지연 조영 증강현상은 심근 경색을 평가하는 데 유용하나 다른 심근 질환 즉 심근염이나 종양등의 평가에는 유용하지 않다.", "심근허혈시 심외막 부위가 심내막 부위보다 나중에 손상된다.", "심근 경색 평가시 핵의학 검사가 MR 검사보다 해상도가 더 우수하다."], "answer": [3], "explanation": "MR 검사는 심근 허혈 시 심내막 부위가 심외막 부위보다 나중에 손상되는 것을 잘 평가합니다. CT는 석회화 평가에 MR보다 유용하며, 지연 조영증강은 심근염이나 종양 평가에도 유용합니다. 핵의학 검사는 해상도가 낮은 것이 단점입니다. 급성 심근 경색에서 지연 조영 증강은 세포막 파괴로 조영제가 세포 내로 유입되는 것이 기전입니다."}, {"subject": "허혈성 심질환 영상진단", "year": ["10학번"], "professor": "이배영", "question": "다음 사진에 관한 질문이다. 가장 맞는 것을 고르시오.", "images": [], "text_box": null, "options": ["우 관상동맥이 원인 혈관이다.", "향후 예후가 비교적 안 좋을 것이다.", "관류기에 얻은 영상이다.", "심근벽이 상당히 얇아져 있어 좀 진행이 된 병변이다.", "석회화가 심하게 있는 소견으로 심근 움직임이 제한될 것이다."], "answer": [0], "explanation": "(애플 pg. 11) 수업시간에 보았던 RCA 이상으로 인한 inferior wall의 subendocardial infarction의 delayed enhancement 사진과 동일합니다. 이는 Right Coronary Artery (RCA) 이상이며, transmural이 아닌 subendocardial infarction이므로 예후가 좋을 것으로 예상됩니다. 심근벽은 아직 정상 두께로 만성이 아닌 급성 병변이며, 석회화는 관찰되지 않습니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["21학번", "20학번"], "professor": "전두수", "question": "다음 중 환자 진단 중에서 가장 맞는 것은?", "images": [], "text_box": "71세 여자가 버스를 기다리다가 갑자기 쓰러졌다. 당시 맥박이 촉지되지 않아 심폐소생술 후 혈압과 맥박이 돌아왔다. 4년전부터 당뇨와 고혈압 약물을 복용하고 있었다. 응급실 내원 당시 혈압 80/60 mmHg, 맥박 74회/분, 호흡 22회/분, 체온 37.1도이다. 가슴 청진에서 심잡음은 없고 심전도 소견은 다음과 같다.", "options": ["Acute inferior wall STEMI이다.", "Acute lateral wall STEMI이다.", "Acute anterior wall STEMI이다.", "Acute NSTEMI이다.", "Cardiac tamponade이다."], "answer": [2], "explanation": "심전도 사진이 흐리지만, V1-4 유도에서 뚜렷한 ST분절 상승이 관찰됩니다. 이는 급성 전벽 심근경색(Acute anterior wall STEMI)의 전형적인 소견입니다. 특히 V1-4는 심장의 전벽 부위를 나타내므로, 해당 부위의 허혈성 손상을 강력히 시사합니다. 따라서 환자의 진단은 급성 전벽 심근경색으로 판단할 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["21학번"], "professor": "전두수", "question": "심전도 변화를 설명하는 병태생리는?", "images": [], "text_box": "55세 남자가 1시간 전부터 발생하는 흉통이 있어 찍은 심전도이다.", "options": ["좌전하행동맥 만성 완전 폐색", "좌회선동맥 만성 완전 폐색", "좌주간동맥 부분 폐색", "우관상동맥 연축", "심장막 염증"], "answer": [0], "explanation": "심전도에서 V2, V3 유도의 ST분절 상승이 관찰되어 급성 전벽 심근경색(anterior wall STEMI)을 의심할 수 있습니다. 전벽 심근경색은 좌전하행동맥(Left Anterior Descending artery, LAD)의 혈류 차단으로 인해 발생합니다. 좌전하행동맥의 만성 완전 폐색은 장기간에 걸쳐 혈관이 완전히 막힌 상태를 의미하며, 급성 증상은 이 만성 병변에 추가적인 급성 혈전이 발생하여 초래될 수 있습니다. 따라서 이 환자의 흉통 및 심전도 변화는 좌전하행동맥의 만성 완전 폐색과 연관된 급성 허혈성 사건으로 설명될 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["19학번"], "professor": "전두수", "question": "위 환자에 대한 치료는?", "images": [], "text_box": "82세 여자가 샤워 도중 쓰러져서 119를 불러서 갔는데 119 안에서 맥박이 안 잡혀서 CPR을 한 다음에 병원에 도착했다. 병원 도착 당시 혈압은 80/60, 심박수 74회/분, 호흡수 22회/분, 체온 37.1도였다. 4년 전부터 당뇨약, 고혈압약을 복용 중이었다. 가슴 청진 시 심잡음은 없었고 양쪽 등 아랫부분에서 거품소리가 들렸다. 심전도는 다음과 같다.", "options": ["NSTEMI이지만 혈압이 낮으므로, 서둘러 Primary PCI한다.", "Cardiac tamponade 의심되므로 pericardiocentesis 한다.", "STEMI이지만 혈압이 낮으므로, Primary PCI 하기 전에 혈전용해제를 준다.", "STEMI이므로 Primary PCI 한다.", "?"], "answer": [3], "explanation": "환자는 급성 전벽 ST분절 상승 심근경색(STEMI)으로 진단되었으며, 이는 심각한 심근 허혈로 인한 응급 상황입니다. STEMI의 가장 중요한 치료는 가능한 한 빨리 혈류를 재개통시키는 재관류 치료입니다. 현재 표준 치료는 경피적 관상동맥 중재술(Primary Percutaneous Coronary Intervention, Primary PCI)로, 이는 혈관을 직접 열어 혈액 공급을 회복시키는 시술입니다. 따라서 STEMI 진단 시 Primary PCI를 시행하는 것이 가장 적절한 치료 방침입니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["18학번"], "professor": "", "question": "적절한 다음 검사는?", "images": [], "text_box": "내원 30분전 발생한 심한 가슴통증으로 내원 환자의 심전도이다.", "options": ["관상동맥촬영", "혈액 칼륨 측정", "혈액 심근표지자 측정", "30분후 심전도 재측정", "흉부 전산화 단층촬영"], "answer": [0], "explanation": "제공된 심전도에서 V1-V4 유도에서 명확한 ST분절 상승이 관찰되어 급성 전벽 ST분절 상승 심근경색(STEMI)이 강력하게 의심됩니다. STEMI는 심근 손상을 최소화하기 위해 즉각적인 재관류 치료가 필수적입니다. 관상동맥촬영(coronary angiography)은 혈관의 폐색 위치와 정도를 확인하고, 동시에 경피적 관상동맥 중재술(Primary PCI)을 시행하여 혈류를 재개통하는 가장 신속하고 효과적인 방법입니다. 따라서 이 환자에게 가장 적절한 다음 검사이자 치료는 관상동맥촬영입니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["18학번"], "professor": "전두수", "question": "다음 심전도의 ST-T 분절의 특징으로 옳은 것은?", "images": [], "text_box": null, "options": ["우심실 전층허혈 T wave", "후벽 심내막하 허혈 T wave", "전벽 심내막하 허혈 T wave", "후벽 전층허혈 급성 T wave", "전벽 전층허혈 T wave"], "answer": [2], "explanation": "제시된 심전도에서는 V2-V4 유도에서 깊고 대칭적인 T파 역위가 뚜렷하게 관찰됩니다. 이러한 소견은 Wellen's 증후군(Wellen's syndrome)의 특징적인 심전도 변화입니다. Wellen's 증후군은 좌전하행동맥(LAD)의 심한 협착으로 인한 전벽 심내막하 허혈을 시사하며, 이는 급성 심근경색으로 진행될 위험이 높습니다. 따라서 전벽 심내막하 허혈로 인한 T파 변화로 해석할 수 있습니다."}, {"subject": "허혈성 심질환의 심전도", "year": ["17학번", "16학번"], "professor": "", "question": "심전도를 보고 무슨 관상동맥의 폐쇄를 예측할 수 있는가?", "images": [], "text_box": null, "options": ["Left anterior descending artery", "Left circumflex artery", "Right

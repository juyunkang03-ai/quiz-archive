 체중을 증가시키는 효과가 있고, 프로작(prozac)은 체중 증가 후에 이 효과를 유지시키는데 효과가 있습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["08학번"], "professor": "한상익", "question": "다음은 현재 치료적으로 많이 적용되고 있는 신경성 대식증의 인지행동치료 모델을 나타낸 것이다. 빈 칸에 들어갈 내용의 A-B 내용으로 가장 적절한 조합은?", "images": ["../IMG/20250425_금4-5_정신_기본욕구관련정신장애2(식이장애)_유재현교수님_PAD/img_flowchart.png"], "text_box": null, "options": ["어려서 신체로 인한 놀림-지나친 식사 제한", "학교 생활에서의 어려움이나 대인관계 갈등-스트레스 해결의 필요성", "주위에서의 절대적 인정의 필요성-스트레스 해결의 필요성", "현대 사회의 날씬함에 대한 지나친 강조-지나친 식사제한", "가족 내의 갈등-내제된 어린 시절 갈등의 촉발"], "answer": [3], "explanation": "신경성 대식증의 인지행동치료 모델은 현대 사회의 날씬함에 대한 지나친 강조가 인지적 왜곡과 신체에 대한 불만을 초래하고, 이는 지나친 식사 제한으로 이어져 폭식-제거 행동을 유발한다는 이론입니다. 따라서 A에는 '현대 사회의 날씬함에 대한 지나친 강조'가, B에는 '지나친 식사 제한'이 들어가는 것이 가장 적절합니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["07학번"], "professor": "", "question": "18세 여자가 하루에 죽 2끼를 나눠 먹고 쉴새 없이 운동하고, 살을 더 빼려고 한다. (163cm 에 36kg) 진단은?", "images": [], "text_box": null, "options": ["폭식장애", "신경성 대식증", "신경성 식욕부진", "간헐성 폭식장애"], "answer": [2], "explanation": "환자는 극심한 식사 제한과 과도한 운동을 통해 체중 감소를 추구하며, 키 163cm에 36kg은 BMI 13.5로 심각한 저체중에 해당합니다. 이는 신경성 식욕부진의 전형적인 증상입니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": [], "professor": "", "question": "약물 치료는?", "images": [], "text_box": "17세 여자가 스트레스를 받으면 폭식을 하고 식욕 조절이 되지 않아 병원에 왔다. 6개월 전부터 회사에서 사소한 일에도 짜증이 나며 퇴근 후 집에서 남은 밥이나 빵 과자 등을 10분 만에 먹어 치우는 일이 1주일에 2번 이상으로 많아지게 되었고, 체중 증가에 대한 걱정 때문에 매일 심하게 운동을 하였다. 키는 160cm 체중은 54kg 이다.", "options": ["리튬(lithium)", "디아제팜(diazepam)", "올란자핌(olanzapine)", "플루옥세틴(fluoxetine)", "메틸페니데이트(methylphenidate)"], "answer": [3], "explanation": "Bulimia nervosa의 약물 치료는 항우울제, 이중 SSRI 계열인 fluoxetine이 가장 효과적입니다. 환자는 폭식과 보상행위(심한 운동)를 보이며 정상 체중을 유지하고 있어 신경성 폭식증에 해당하며, 이에 SSRI가 효과적입니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": [], "professor": "", "question": "이 여성에 대한 진단은?", "images": [], "text_box": "26세 여성이 음식에 대한 충동이 스스로 통제가 되지 않아 방문하였다. 회사에서 스트레스를 받을 때마다 집에 남은 빵, 과자 등을 10분 만에 다 먹어버리는 행동을 했고, 그 행동이 1주일에 2번씩 일어나기 시작했다. 한편 체중 증가가 무서워서 운동을 5시간씩 하는 행동을 보였다. 이 여성은 160cm 에 52kg 이었다.", "options": ["폭식장애", "양극성", "신경성대식증", "주요우울장애", "충동조절장애"], "answer": [2], "explanation": "환자는 폭식과 보상행동을 보이며 정상 체중을 유지하고 있어 신경성 대식증(=신경성 폭식증)으로 진단할 수 있습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": [], "professor": "", "question": "체중 감소와 관련된 식사장애의 신체적 합병증이 아닌 것은?", "images": [], "text_box": null, "options": ["서맥", "골다공증", "이상 미각", "변비와 위 비우기 지연", "치아 범랑질의 부식과 충치"], "answer": [4], "explanation": "치아 범랑질의 부식과 충치는 체중 감소가 아닌, 신경성 폭식증 등에서 구토와 같은 제거 행동과 연관된 신체적 합병증입니다. 서맥, 골다공증, 이상 미각, 변비와 위 비우기 지연 등은 체중 감소와 관련된 식사장애의 합병증으로 알려져 있습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": [], "professor": "", "question": "신경성 식욕부진증이 발생할 가능성이 가장 높은 경우는?", "images": [], "text_box": null, "options": ["상류층인 여배우", "음식 준비를 담당하는 여성 주방장", "상당한 스트레스가 있는 여성 지식 중개인", "우울증의 병력이 있는 남성 광고 회사 중역", "다음 공연의 주인공 역할을 두고 경쟁하는 발레리나"], "answer": [4], "explanation": "신경성 식욕부진증은 마른 몸매를 필요로 하는 직업을 가진 젊은 여성에서 가장 많이 호발합니다. 특히 발레리나와 같이 체중과 외모에 대한 압박이 높은 직업군에서 발생 가능성이 높습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": [], "professor": "", "question": "다음은 상기 환자의 소견이다. 이 중 상기 환자가 입원치료를 해야 할 문제나 상황으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["외래치료 시설이 멀리 있는 경우", "한번에 4~5 알의 튤코락스의 사용", "강박증상이 함께 동반되어 있는 경우", "알코올 중독에 해당한 정도의 술문제를 함께 보이는 경우", "내원시 혈청 검사상 Na: 136mEq/ml, CI:101mEq/ml, K: 3.5mEq/ml 를 보인 경우"], "answer": [3], "explanation": "신경성 대식증 환자의 입원 기준에는 심각한 내과 질환이 동반되어 있는 경우, 식사장애의 진단과는 상관없이 심한 정신과적 문제가 있는 경우, 외래 치료로 조절하기 힘들 정도로 수 회씩 폭식을 하거나 제거 행동이 많은 경우, 그리고 증상이 심한데 적절한 치료 시설이 없는 경우가 포함됩니다. 알코올 중독에 해당하는 정도의 술 문제 동반은 입원 치료가 필요한 심각한 정신과적 문제에 해당합니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": [], "professor": "", "question": "상기 환자에게 가장 적절한 진단명은?", "images": [], "text_box": "수능이 끝나 주위에서 다이어트하라는 이야기를 다시 들으면서 좋은 대학도 들어가지 못했으니 이것이라도 잘하자는 생각에 체중 감량을 시작하여 하루에 운동을 2-3시간씩하고 먹는 것을 줄여서 살을 빼기 시작했다. 대학 입학하기 전까지 3달만에 75kg에서 58kg까지 무리하게 감량하였다. 이 때 주위에서 놀랍다는 반응을 보이며 예뻐졌다는 이야기를 들으면서 너무 좋았고 자신감이 생겼다. 사람들이 자신을 대할 때 날씬해지니 대하는 것이 달라졌다는 생각이 들었고 좋아하는 옷도 입고 밖에 나가면 사람들이 자신을 바라보는 눈이 달라진 것에 자신감이 들었다. 조금씩 체중이 증가해 여름 방학 전까지 62kg로 증가하였다. 여름방학 때 이러면 안 되겠다 싶어 한방 다이어트 클리닉에서 한약을 먹고 운동과 결식을 해서 체중을 한 달 만에 55kg 까지 감량해 다시 학교에 나갔다. 이때부터는 살이 찔 것이 두려워 친구들과 어울리는 것도 어렵고, 체중이 다시 증가할 것이 두려워 하루에도 몇 번씩 체중을 측정해 조금만 증가해도 먹는 것을 제한하기 시작했다. 2학기 중간고사를 보면서 잠도 제대로 못 자고 심한 스트레스를 받은 상태에서 언니 생일이라고 집에 사다 놓은 케익을 한 조각 먹었는데 참을 수가 없어서 거의 다 먹고 너무 두려워 구토를 하게 되었다. 이러면서 속이 후련한 느낌이 들었고 다음날 체중을 제니 오히려 감소된 것을 확인한 후 처음에는 먹으면서 체중조절이 가능하다는 생각이 들어서 큰 문제로 생각하지 않았고 일주일에 2-3 번씩은 폭식 후에는 구토하기 시작했다. 최근 들어서는 제거행동 후에도 체중이 증가하기 시작하면서 많이 먹었을 때는 둘코락신을 먹기 시작했다. 처음에는 한 알 먹었으나 최근 들어서는 한 번에 4-5 알 먹고 설사를 해야 안심이 되는 것을 보고 두렵고 체중도 줄어 부모님께 이야기해 인터넷을 찾아 보고 방문하였다. 상기 환자의 현재 키와 체중은 키가 165cm 에 49kg 이다.", "options": ["폭식장애", "신경성 대식증, 제거형", "신경성 대식증, 비제거형", "신경성 식욕부진증, 제한형", "신경성 식욕부진증, 폭식-제거형"], "answer": [4], "explanation": "환자는 체중 감소를 위해 음식 제한과 과도한 운동을 하고, 폭식 후 구토와 하제 사용 등의 제거 행동을 반복하며, 체중이 165cm에 49kg으로 BMI 18.06으로 저체중에 해당합니다. 이는 신경성 식욕부진증의 진단 기준에 부합하며, 특히 폭식-제거형에 해당합니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": [], "professor": "", "question": "다음은 일상적인 다이어트와 식사장애에서 보이는 다이어트 사이의 차이를 설명한 것이다. 올바른 답을 모두 고르시오.", "images": [], "text_box": null, "options": ["식사장애에서는 음식이나 체중에 대한 태도가 다른 모든 가치보다 우선된다.", "일상적 다이어트는 일, 학업, 대인관계, 일상 활동 및 감정적인 안녕 상태가 저울의 숫자에 의해 전격으로 결정이 되지는 않는다.", "일상적 다이어트는 다이어트의 특성상 음식 섭취가 가지는 기본적인 목적인 신체적이거나 생리적인 목적이 무시되고 심리적인 목적을 위해 반복적으로 체중을 조절하게 된다.", "식사장애에서는 타인에 대한 분노 표현이 자신의 내적인 문제를 표현하거나 해결하는 방식으로 사용된다.", "일상적인 다이어트는 자신에 대한 불만족으로 인해 하는 것이기 때문에 음식이나 체중을 자신의 내적인 문제를 해결하는 방식으로 사용한다."], "answer": [0, 1], "explanation": "식사장애에서는 음식이나 체중에 대한 태도가 다른 모든 가치보다 우선시됩니다. 일상적 다이어트는 체중이 일, 학업, 대인관계 등 다른 중요한 삶의 영역을 전적으로 결정하지 않습니다. 일상적 다이어트가 강박적이거나 신체로 문제를 해결하려 하지 않으며, 식이 장애는 자신의 신체를 통해 내적인 문제를 표현하거나 해결하는 방식입니다."}, {"subject": "기본욕구관련정신장애3(성장애)", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "엄유현", "question": "항우울제 교체를 고려할 때 가장 적절한 약물은?", "images": [], "text_box": "35세 남자가 한달여전부터 시작된 우울감, 불안, 불면, 자살사고로 Fluoxetine 20mg을 처방받고 복약중이다. 환자는 복약 이후 호전을 경험하였으나 아내와의 성관계시 사정이 지연된다는 부작용을 호소하며 성기능 장애를 일으킬 수 있는 항우울제는 피해달라고 하였다.", "options": ["Paroxetine", "Sertraline", "Bupropion", "Amitriptyline", "Selegiline"], "answer": [2], "explanation": "많은 항정신성 약물이 성기능장애를 유발하며, SSRI 간에도 발병률에 차이가 있다. 항우울제 중 Bupropion, Mirtazapine은 성기능장애 발생률이 적은 것으로 알려져 있다. 환자의 증상은 약물 유도성 성기능 장애이므로, 부작용이 적은 약물로 대체하는 것이 가장 적절한 치료법이다. 약물 감량 또한 고려될 수 있다."}, {"subject": "기본욕구관련정신장애3(성장애)", "year": ["22학번", "21학번", "20학번", "19학번", "18학번"], "professor": "엄유현", "question": "적절한 조치는?", "images": [], "text_box": "60세 남자가 하루에 담배를 3갑을 피고, 혈압과 조절되지 않는 당뇨를 가지고 있다. 그는 아내와 성관계를 할 때, 흥분이 되고 발기가 되지만 지속이 안된다고 호소를 한다.", "options": ["골반하부재활을 추천한다.", "에스트로겐 요법으로 치료한다.", "Masters, Johnson의 start-stop 기법으로 치료한다.", "조절되지 않는 당뇨와 흡연을 관리한다.", "선택적 세로토닌 재흡수 억제제 (SSRI)를 처방한다."], "answer": [3], "explanation": "환자는 40세 이상의 나이, 흡연, 조절되지 않는 당뇨병에 의한 이차성 발기장애를 겪고 있다. 이 경우 원인 질환인 당뇨와 흡연을 관리하는 것이 가장 중요하고 적절한 조치이다. 나머지 보기는 각각 성기-골반 통증/삽입 장애, 여성 성적 흥미/흥분 장애, 조루증 치료에 해당한다."}, {"subject": "기본욕구관련정신장애3(성장애)", "year": ["20학번", "19학번"], "professor": "엄유현", "question": "다음 중 가장 적절한 처치는?", "images": [], "text_box": "60세 남자가 하루에 세 갑의 흡연을 하고 있고 혈압과 조절되지 않는 당뇨의 병력을 가지고 있다. 환자는 아내와 성관계를 할 때, 흥분이 되고 발기가 되지만 발기 지속이 안된다고 호소하였다.", "options": ["Masters 와 Johnson 의 start-stop 기법으로 치료한다.", "체계적 탈감작법을 시행한다.", "sildenafil 을 처방한다.", "에스트로겐 요법을 처방한다.", "선택적 세로토닌 재흡수 억제제 (SSRI)를 처방한다."], "answer": [2], "explanation": "환자는 발기부전 증상을 호소하고 있으며, 이는 40세 이상의 나이, 흡연, 당뇨병과 같은 신체 질환에 의한 이차성 발기장애로 볼 수 있다. 발기부전의 약물치료로는 phosphodiesterase type 5 inhibitor인 Sildenafil, tadalafil, vardenafil, udenafil 등이 처방될 수 있다. Masters와 Johnson의 start-stop 기법과 SSRI 처방은 조루증 치료에 주로 사용되며, 에스트로겐 요법은 여성의 성적 흥미/흥분 장애에 적용된다. 체계적 탈감작법은 성기-골반 통증/삽입 장애 치료에 사용된다."}, {"subject": "기본욕구관련정신장애3(성장애)", "year": ["17학번"], "professor": "정종현", "question": "법원의 강제치료 명령을 받은 31세 남자가 병원에 왔다. 면담 결과 아래와 같은 특성이 관찰되었다. 옳은 것은?", "images": [], "text_box": "인간이 아닌 대상 혹은 동의하지 않는 상대를 대상으로 성적인 환상이나 행동을 반복적으로 나타낸다.\n- 성행동의 방법에 문제가 있다.\n- 직접적인 성접촉이 필요 없는 경우도 있다.", "options": ["절반 이상이 18세 이전에 발병한다.", "스스로 불편을 느끼는 경우가 흔하다.", "여러 증상을 한꺼번에 보이는 경우는 드물다.", "남녀 간의 차이는 거의 없는 것으로 보고된다.", "동성애자와 이성애자 사이에 발병비율의 차이는 없다."], "answer": [0], "explanation": "제시된 특성은 성도착증(Paraphilic disorder)에 해당한다. 성도착증은 50% 이상이 18세 이전에 발병하는 경향이 있다. 성도착증 환자가 스스로 불편감을 느끼는 경우는 흔하지 않으며, 여러 증상이 한꺼번에 나타나는 다중 성도착증도 보고된다. 남성의 발병률이 여성보다 훨씬 높으며, 이성애자에게서 더 많이 보고된다."}, {"subject": "기본욕구관련정신장애3(성장애)", "year": ["16학번", "15학번", "13학번", "11학번"], "professor": "정종현", "question": "Masters와 Johnson의 dual sex therapy에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["성기능장애에 주로 사용되는 치료법이다.", "부부나 연인을 개별적으로 치료하는 것이 원칙이다.", "정신사회적 평가나 신체검사는 따로 시행하지 않는다.", "조루증과 불감증을 위해서는 성감집중훈련이 주로 사용된다.", "치료하고자 하는 질병의 원인적 측면에 초점을 맞춘 치료법이다."], "answer": [0], "explanation": "Masters와 Johnson의 dual sex therapy는 성기능장애에 주로 사용되는 행동치료 기반의 성치료법이다. 부부나 연인을 함께 치료하는 것이 원칙이며, 치료 전에 정신사회적 평가와 신체검사를 선행한다. 이 치료법은 원인적 측면보다는 행동적 측면에 초점을 맞추며, 조루증에는 주로 stop-start method나 squeeze method가 사용되고, 성감집중훈련은 발기부전 및 여성 불감증에 사용된다."}, {"subject": "기본욕구관련정신장애3(성장애)", "year": ["13학번", "8학번"], "professor": "정종현", "question": "성주체성(gender identity)애 관한 기술 중 옳은 것은?", "images": [], "text_box": null, "options": ["일반적으로 사춘기 무렵에 확립된다.", "한번 확립된 후에도 변화 가능하다.", "성주체성에 장애가 오면 성전환증이 된다.", "양육 형태보다는 생물학적인 성이 중요한 요인이다.", "발달에 기여하는 생물학적 요인들이 모두 밝혀져 있다."], "answer": [1], "explanation": "성주체성(Gender identity)은 일반적으로 생후 2~3세경에 확신을 갖게 되지만, 한번 확립된 후에도 변화할 가능성이 있다. 양육 형태 등 심리사회적 요인이 중요한 역할을 하며, 모든 생물학적 요인이 밝혀져 있지는 않다. 성주체성 장애가 있다고 해서 모두 성전환증으로 이어지는 것은 아니며, 많은 경우 동성애자로 이행되기도 한다."}, {"subject": "기본욕구관련정신장애3(성장애)", "year": ["12학번", "11학번", "10학번", "8학번"], "professor": "정종현", "question": "성전환증의 치료에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["정신치료를 통하여 병적인 성주체성을 교정하려 하면 안 된다.", "진단이 불분명할 경우에는 지지정신치료를 시도할 수 없다.", "대부분의 환자는 정신치료를 성전환수술을 받지 못하게 하는 장애물로 생각한다.", "지지정신치료는 동성애에 대한 고통을 경감시켜 수술욕구를 증가시킨다.", "호르몬치료는 환자의 외모 변형 및 성전환욕구 상승을 유발하므로 가급적 피해야 한다."], "answer": [2], "explanation": "지지정신치료는 성전환수술 과정을 준비하는 데 중요한 역할을 한다. 많은 환자들이 정신치료를 수술의 장애물로 인식하기도 하지만, 수술이 되돌릴 수 없는 결정이므로 필수적인 치료 과정이다. 정신치료는 병적인 성주체성을 교정하려는 목적보다는, 진단이 불분명할 경우 감별진단을 시도하고 동성애 공포를 경감시켜 수술 욕구를 감소시키는 데 도움을 줄 수 있다. 호르몬 치료는 성전환 과정에서 외모 변화를 유도하며 성전환 욕구 상승을 유발하지만, 이는 필수적인 치료 단계이다."}, {"subject": "기본욕구관련정신장애3(성장애)", "year": ["10학번"], "professor": "정종현", "question": "다음 중 covert sensitization, social and assertive skills training, anti-androgenic electric shock therapy 등이 치료효과를 볼 수 있는 질환은?", "images": [], "text_box": null, "options": ["Gender identity disorder", "Sexual deviation", "Hypoactive sexual desire disorder", "Sexual aversion disorder", "Premature ejaculation"], "answer": [1], "explanation": "제시된 치료법들인 covert sensitization, social and assertive skills training, anti-androgenic electric shock therapy 등은 주로 변태 성욕장애(Paraphilic disorder)의 치료에 사용된다. Sexual deviation은 변태 성욕장애의 과거 명칭으로, 이 질환의 행동치료적 접근에 해당한다."}, {"subject": "기타 생물학적 치료", "year": ["22학번", "21학번", "20학번", "19학번", "18학번"], "professor": "강동우", "question": "위험요인은?", "images": [], "text_box": "28세 남자가 7년 전 우울증 진단을 받고 항우울제 처방과 정신치료를 받았으나 증상이 악화되었고 자살 시도를 했다. 입원과 함께 주 3회, 6주간 ECT를 받자 기분장애가 호전되었으나 기억상실증이 생겼다.", "options": ["28세", "남환", "7년전 우울증 진단", "주 3회 6주간 ECT", "기분장애 호전"], "answer": [3], "explanation": "ECT는 보통 주 2~3회, 총 10~15회(우울증의 경우 6~12회) 시행하는 것이 일반적입니다. 이 환자는 주 3회, 6주간 ECT를 받아 총 18회를 시행했습니다. 이는 통상적인 ECT 빈도와 횟수를 초과하는 것으로, 기억상실증과 같은 인지 부작용의 위험요인으로 작용합니다. 특히 잦은 빈도와 긴 기간의 ECT는 인지 기능 저하 부작용을 유발할 가능성이 높습니다."}, {"subject": "기타 생물학적 치료", "year": ["21학번", "20학번", "18학번"], "professor": "강동우", "question": "전기경련치료를 계획할 때 좋은 효과를 기대할 수 있는 요인은?", "images": [], "text_box": "30세 임신 10주차 여자가 3달 전부터 누군가가 자신을 해칠 것이라며 불안, 초조해 하는 모습을 보이고, 집 밖으로 도망치는 모습을 보여 남편과 함께 정신과 외래를 방문하였다.", "options": ["연령", "성별", "피해 망상", "불안 및 초조", "임신 여부"], "answer": [2], "explanation": "조현병에서 전기경련요법을 시행할 시 좋은 효과를 기대할 수 있는 환자는 양성 증상이 뚜렷한 경우, 긴장증(catatonia)이 동반된 경우, 그리고 기분증상이 동반된 경우입니다. 본 환자는 피해망상을 보이고 있으므로, 전기경련치료에 좋은 반응을 기대할 수 있습니다. 피해망상과 같은 정신병적 증상은 ECT의 강력한 적응증 중 하나입니다."}, {"subject": "기타 생물학적 치료", "year": ["21학번", "20학번"], "professor": "강동우", "question": "가장 적절한 치료 방법은?", "images": [], "text_box": "16세 남자가 일주일 전부터 같은 반 친구들이 자신을 해칠 것이라며 불안, 초조해 하는 모습을 보이던 중, 2일 전부터 침대에 정자세로 누운 상태로 하루 종일 움직이지 않고, 음식과 물을 전혀 섭취하지 않은 채 천장만 하루 종일 응시하는 모습이 지속되어 구급차 이송을 통해 응급실을 방문하였다.", "options": ["항불안제를 근주하고 경과를 관찰한다.", "항정신병약제를 근주하고 경과를 관찰한다.", "전기경련치료를 적용한다.", "입에서 녹는 항정신병약제를 경구 투약시킨다.", "항정신병약제를 정맥주사하고 경과를 관찰한다."], "answer": [2], "explanation": "본 환자는 양성 증상, 즉 피해망상을 보이며 긴장증(catatonia)이 동반되어 있습니다. 특히 긴장증으로 인해 음식과 물 섭취가 전혀 이루어지지 않는 응급 상태가 지속되고 있습니다. 이러한 경우, 전기경련치료는 매우 신속하고 효과적인 치료 방법이므로 우선적으로 적용하는 것이 적합합니다."}, {"subject": "기타 생물학적 치료", "year": ["16학번"], "professor": "강동우", "question": "전기 경련 치료를 했을 때 경과가 좋을 것으로 예상되는 요인은?", "images": [], "text_box": "28세, 임신 6주차인 여성이 사람들이 자신을 해치려 한다고 하며 불안하고 초조해하며 집 밖으로 도망치려고 해 남편이 데리고 병원에 왔다.", "options": ["나이", "성별", "임신 여부", "피해 망상", "불안 및 초조"], "answer": [3], "explanation": "전기경련치료(ECT)의 주요 적응증 중 하나는 심각한 망상 증상입니다. 특히 피해망상은 ECT에 좋은 치료 반응을 보이는 것으로 알려져 있습니다. 또한 임산부의 경우 약물 치료가 제한적일 수 있어, 안전하고 효과적인 ECT가 고려될 수 있습니다. 환자의 불안 및 초조는 간접적인 증상이며, 직접적인 치료 반응 예측 요인은 아닙니다."}, {"subject": "기타 생물학적 치료", "year": ["16학번"], "professor": "강동우", "question": "기억력 저하를 일으킨 예후는?", "images": [], "text_box": "35세 여성이 3년 전부터 우울증을 앓아 항우울제 치료와 정신치료를 받았음에도 상태가 계속 나빠져 자살 시도가 반복되었다. 전기경련치료를 주 3회 7주간 실행했더니 기분 증상은 호전됐지만 기억력 저하를 보였다.", "options": ["35세", "여성", "자살 시도", "기분 증상 호전", "주 3회 7주 전기요법 실행"], "answer": [4], "explanation": "일반적으로 우울증 환자에게는 6~12회의 전기경련치료가 권장됩니다. 이 환자는 주 3회 7주간 총 21회의 ECT를 시행했으므로, 권장 횟수를 상당히 초과하였습니다. ECT의 횟수가 많아질수록 기억력 저하와 같은 인지 부작용의 발생 위험이 높아지므로, 과도한 ECT 횟수가 기억력 저하의 주요 원인으로 작용할 수 있습니다."}, {"subject": "기타 생물학적 치료", "year": ["16학번"], "professor": "강동우", "question": "해당 환자에게 적절한 치료는?", "images": [], "text_box": "여성 환자가 지속된 우울증으로 인해 방문했다. 이 환자는 평소에 피로감, 의욕 저하, 우울한 감정을 느끼고 있었고, 정신치료 및 약물치료를 받고 있었지만 효과가 없이 계속된 우울한 감정 이 지속된다고 했다.", "options": ["Deep Brain Stimulation", "Electroconvulsive Therapy", "Faroxetine", "Valproic acid", "Vagus Nerve Stimulation"], "answer": [1], "explanation": "환자는 정신치료와 약물치료를 받았음에도 불구하고 지속적인 우울 증상을 보이고 있습니다. 이는 치료 저항성 우울증을 시사합니다. 이러한 경우, 전기경련치료(ECT)는 약물 치료에 반응하지 않는 심한 우울증 환자에게 효과적인 치료 방법입니다. Deep Brain Stimulation이나 Vagus Nerve Stimulation은 보통 더 난치성인 경우나 특정 적응증에서 고려됩니다."}, {"subject": "기타 생물학적 치료", "year": ["15학번"], "professor": "강동우", "question": "치료 3개월 뒤에도 후향적 기억력 저하가 지속될 경우 치료는?", "images": [], "text_box": "35세 여자가 3년 전 우울증 진단을 받고 항우울제 복용 및 정신치료를 지속적으로 시행하였으나 우울감이 점차 심화되고 자살 행동이 반복되어 정신건강의학과에 입원하여 전기경련치료를 10회 받았다.", "options": ["인지치료", "경과 관찰", "전기경련치료", "항우울제 증량", "경두개자기자극치료"], "answer": [1], "explanation": "환자는 10회의 전기경련치료를 받았으며, 이는 통상적인 치료 횟수 범위 내에 해당합니다. ECT의 부작용으로 기억력 저하가 발생할 수 있으며, 이는 대개 수개월 내에 회복되지만 일부에서는 지속될 수 있습니다. 현재 상태에서 추가적인 ECT나 약물 증량보다는 인지 기능 회복을 위한 경과 관찰이 적절하며, 필요시 인지 재활 치료를 고려할 수 있습니다."}, {"subject": "기타 생물학적 치료", "year": ["14학번"], "professor": "한창태", "question": "전기자극치료 (electroconvulsive therapy, ECT) 기전은?", "images": [], "text_box": null, "options": ["뇌혈류 감소", "대뇌의 포도당과 산소소모량 감소", "혈액-뇌장벽 투과도 증가", "cAMP 활성화 감소", "BDNF (Brain-derived neurotrophic factor) 활성화 감소"], "answer": [2], "explanation": "전기경련치료(ECT)의 기전은 뇌 활동 전반에 걸쳐 다양한 생물학적 변화를 유도하는 것입니다. 주요 변화로는 뇌혈류량 증가, 대뇌의 포도당 및 산소 소모량 증가가 있습니다. 또한, 혈액-뇌장벽(BBB) 투과도가 증가하며, 세포 내 cAMP 활성화와 뇌유래신경영양인자(BDNF)의 활성 증가도 관찰됩니다. 이러한 변화들이 ECT의 치료 효과에 기여하는 것으로 알려져 있습니다."}, {"subject": "기타 생물학적 치료", "year": ["14학번", "13학번", "09학번"], "professor": "한창태", "question": "우울증에서 ECT 치료에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["긴장증(catatonia)이 있는 조현병 환자에게 금기다.", "임산부는 약물 복용이 어려워 금기다.", "섬망(delirium, 혼미) 증상이 심한 경우 금기다.", "신체화 증상이 동반된 우울증에서 사용할 수 없다.", "자살사고가 심해 생명에 위협이 되는 경우에는 금기다."], "answer": [3], "explanation": "신체화 증상이 동반된 우울증은 ECT에 대한 반응이 다른 유형의 우울증보다 낮은 경향이 있어 효과적이라고 보기 어렵습니다. 긴장증, 임산부의 약물 복용 어려움, 섬망/혼미 증상, 자살사고는 모두 ECT의 주요 적응증이므로, 금기라는 설명은 옳지 않습니다. 즉, 나머지 보기는 실제 사실과 반대로 서술되어 있습니다."}, {"subject": "기타 생물학적 치료", "year": ["13학번", "09학번"], "professor": "서호준", "question": "다음 중 전기자극치료(electroconvulsive therapy; ECT)의 기전으로 옳은 것은?", "images": [], "text_box": null, "options": ["뇌혈류 감소", "대뇌의 포도당과 산소소모량 증가", "혈액-뇌장벽 투과도 감소", "cAMP 활성화 감소", "BDNF(Brain-derived neurotrophic factor) 활성화 감소"], "answer": [1], "explanation": "ECT의 기전은 뇌 활동 전반에 걸쳐 다양한 생물학적 변화를 유도합니다. 이에는 뇌혈류량 증가, 대뇌의 포도당 및 산소 소모량 증가가 포함됩니다. 또한, 혈액-뇌장벽 투과도 증가, cAMP 활성화 증가, 그리고 BDNF 활성화 증가 등이 주요 기전으로 알려져 있습니다. 나머지 보기는 모두 반대로 서술되어 있습니다."}, {"subject": "기타 생물학적 치료", "year": ["12학번"], "professor": "서호준", "question": "다음 중 전기자극치료(electroconvulsive therapy:ECT)의 기전으로 옳지 않은 것은?", "images": [], "text_box": null, "options": ["뇌혈류 증가", "대뇌의 포도당과 산소소모량 증가", "혈액-뇌장벽 투과도 증가", "cAMP 활성화 감소", "BDNF(Brain-derived neurotrophic factor)활성화 증가"], "answer": [3], "explanation": "ECT의 기전은 뇌혈류 증가, 대뇌의 포도당과 산소소모량 증가, 혈액-뇌장벽 투과도 증가, cAMP 활성화 증가, BDNF 활성화 증가 등 대부분의 뇌 기능 관련 지표들이 활성화되는 방향으로 변화하는 것입니다. 따라서 cAMP 활성화 감소는 ECT 기전으로 옳지 않은 설명입니다. 나머지 보기는 모두 ECT 기전으로 옳은 설명입니다."}, {"subject": "기타 생물학적 치료", "year": ["11학번"], "professor": "서호준", "question": "전기자극치료(ECT)의 부작용에 대한 설명으로 옳지 않은 것은?", "images": [], "text_box": null, "options": ["혼돈 증상은 수일 내 회복된다.", "기억력 장애는 대개 6개월 이내 회복된다.", "기억 장애는 전향적, 후향적 기억장애가 모두 올 수 있다.", "골절 예방을 위해 ECT 시행 전에 방사선 검사가 필요하다.", "ECT에 의한 사망률은 환자 당 0.1%로 일반 전신마취보다 높다"], "answer": [4], "explanation": "ECT 시행 전 골절 예방을 위한 방사선 검사는 일반적으로 필요하지 않습니다. 현대의 ECT는 근이완제를 사용하여 골절 위험을 크게 줄입니다. 혼돈 증상은 대개 수일 내 회복되며, 기억력 장애는 전향적 및 후향적 모두 발생할 수 있으나 대개 6개월 이내에 회복됩니다. ECT에 의한 사망률은 환자당 0.01% 정도로 일반 전신마취와 비슷한 수준으로, 0.1%보다 낮습니다."}, {"subject": "기타 생물학적 치료", "year": ["10학번"], "professor": "서호준", "question": "전기자극치료(electroconvulsive therapy; ECT)의 부작용에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["전향적, 후향적 기억장애", "혼동 증상을 수개월 동안 경험", "기억력 장애는 6개월 이상 지속", "일반 전신마취보다 높은 사망률", "전신마취 하에서 시행해야 함"], "answer": [0], "explanation": "ECT의 부작용으로 전향적 및 후향적 기억장애가 모두 발생할 수 있습니다. 혼동 증상은 대개 수일 내에 회복되며, 기억력 장애 또한 대개 6개월 이내에 회복됩니다. ECT의 사망률은 일반 전신마취와 비슷한 수준으로 높지 않으며, ECT는 항상 전신마취 하에서 시행되어야 합니다."}, {"subject": "기타 생물학적 치료", "year": ["08학번"], "professor": "서호준", "question": "우울증 환자에게 전기자극치료(electroconvulsive therapy, ECT)를 하는 상황 중 적절하지 않은 것은?", "images": [], "text_box": null, "options": ["긴장증(catatonia)을 동반한 조현병 환자에게 추천된다.", "약물 복용이 어려운 임산부가 적응증이다.", "섬망 증상이 심한 환자에게 추천된다.", "신체화 증상이 심한 환자에게 효과적이다.", "자살 사고가 심해 생명에 위협이 되는 환자가 적응증이다."], "answer": [3], "explanation": "신체화 증상이 심한 우울증 환자에게는 ECT가 다른 유형의 우울증보다 효과적이지 않다는 것이 일반적인 견해입니다. 긴장증을 동반한 조현병 환자, 약물 복용이 어려운 임산부, 심한 섬망 증상, 그리고 자살 사고가 심해 생명에 위협이 되는 환자는 모두 ECT의 주요 적응증이며 높은 효과를 기대할 수 있습니다. 따라서 신체화 증상이 심한 환자에게 효과적이라는 설명은 적절하지 않습니다."}, {"subject": "기타 생물학적 치료", "year": ["08학번", "07학번"], "professor": "서호준", "question": "생물학적 치료들에 대한 설명이다. 옳지 않은 것은?", "images": [], "text_box": null, "options": ["광선치료는 계절성 우울증에 효과적이다.", "광선치료는 수면주기를 위성전진(phase advance)시킨다.", "수면박탈치료는 조증(mania)에 효과적이다.", "경두개자기자극술은 우울증에 사용된다.", "정신외과수술(psychosurgery)는 난치성 강박증에 사용된다."], "answer": [2], "explanation": "수면박탈치료는 조증(mania)을 악화시킬 수 있으므로 조증 환자에게는 금기입니다. 광선치료는 계절성 우울증에 효과적이며 수면주기를 위상 전진시키는 효과가 있습니다. 경두개자기자극술은 우울증 치료에 사용되며, 정신외과수술은 난치성 강박증 등 특정 난치성 질환에 제한적으로 적용됩니다."}, {"subject": "기타 생물학적 치료", "year": ["06학번"], "professor": "서호준", "question": "우울증 환자에게 ECT를 시행할 경우의 설명으로 옳지 않은 것은?", "images": [], "text_box": null, "options": ["정신병적 증상이 동반된 경우 효과적이다.", "약물 복용이 어려운 임산부나 노인에게 도움이 된다.", "혼미증상이 심한 경우 추천된다.", "신체화 증상이 심한 경우 효과적이다.", "우울증 재발 방지에는 도움이 되지 않는다."], "answer": [3], "explanation": "신체화 증상이 동반된 우울증은 ECT에 대한 반응이 다른 유형의 우울증보다 낮은 경향이 있어 효과적이라고 보기 어렵습니다. 반면, 정신병적 증상, 약물 치료가 어려운 임산부나 노인, 심한 혼미 증상은 ECT의 적응증이며 높은 효과를 보입니다. 또한, ECT는 우울증 재발 방지에 대한 예방 효과는 제한적인 것으로 알려져 있습니다."}, {"subject": "기타 생물학적 치료", "year": ["06학번"], "professor": "서호준", "question": "전기자극치료(electroconvulsive therapy: ECT)의 기전인가?", "images": [], "text_box": null, "options": ["Postsynaptic beta-adrenergic receptor의 up-regulation", "뇌파의 서파화"], "answer": [1], "explanation": "ECT의 기전 중 하나는 뇌파의 서파화(slowing of EEG activity)를 유도하는 것입니다. 이는 치료 반응과 연관될 수 있습니다. 반면, Postsynaptic beta-adrenergic receptor의 up-regulation은 ECT의 기전으로 일반적으로 설명되지 않습니다. ECT는 신경전달물질 시스템에 광범위한 변화를 일으킵니다."}, {"subject": "기타 생물학적 치료", "year": ["05학번"], "professor": "", "question": "우울증에서 ECT 치료에 대한 설명으로 옳지 않은 것은?", "images": [], "text_box": null, "options": ["약물치료를 하기 어려운 임산부와 노인에게 한다", "자살이나 타살의 위험이 있는 경우 사용한다", "혼미한 경우 사용한다", "신체화 장애를 동반한 경우 사용한다", "우울증에 대한 예방효과를 가지지 않는다"], "answer": [3], "explanation": "신체화 증상이 동반된 우울증은 ECT에 대한 반응이 다른 유형의 우울증보다 낮은 경향이 있어 '사용한다'고 단정하기 어렵습니다. ECT는 약물치료가 어려운 임산부와 노인, 자살이나 타살의 위험이 있는 경우, 심한 혼미 증상이 있는 경우에 효과적으로 사용됩니다. 그러나 우울증 재발 방지에는 예방효과를 가지지 않는다는 것이 일반적인 설명입니다."}, {"subject": "기타 생물학적 치료", "year": ["05학번"], "professor": "", "question": "다음 중 생물학적 치료로 알맞지 않은 것은?", "images": [], "text_box": null, "options": ["계절성 정동장애 - 광치료", "주요 우울증 - ECT", "조증 - 수면박탈", "PTSD - TMS"], "answer": [2], "explanation": "수면박탈치료는 조증(mania)을 악화시킬 수 있으므로 조증에 대한 치료로 알맞지 않습니다. 계절성 정동장애에는 광치료가 효과적이며, 주요 우울증에는 ECT가 중요한 치료법 중 하나입니다. 외상 후 스트레스 장애(PTSD)에는 경두개자기자극술(TMS)이 치료 옵션으로 사용될 수 있습니다."}, {"subject": "소아청소년 정신질환1", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "이수정", "question": "이 어린이의 문제로서 가장 가능성이 높은 것은?", "images": [], "text_box": "9세 어린이가 3개월 전부터 수업 시간에 집중하지 못하고 산만하여 한눈을 파는 일이 잦아졌다. 집에서도 멍하게 딴생각을 하는 듯 보이고 숙제할 때 이전보다 시간이 걸리게 되었다. 이 어린이는 집이나 학교에서 한 자리에 가만히 있지 못하고 왔다 갔다 하며 이를 지적하는 부모나 선생님에게 짜증을 내곤 한다. 아침에 머리가 아프다며 학교 가기를 거부한다.", "options": ["조증", "우울증", "학습장애", "적대적 반항장애", "주의력결핍과잉행동장애"], "answer": [1], "explanation": "부모나 선생님에게 짜증을 내거나 학교 가기를 거부하는 증세는 ADHD를 시사할 수 있습니다. 그러나 이 증례에서는 집중력 저하, 산만함, 멍함, 숙제 시간 증가 등 우울증과 ADHD가 복합적으로 나타날 가능성이 있습니다. 주어진 선택지 중 우울증도 가능성이 있는 진단으로 고려될 수 있습니다. (학생들 대다수가 ADHD를 선택하여 틀렸다는 교수님의 해설이 있었음)"}, {"subject": "소아청소년 정신질환1", "year": ["21학번", "18학번"], "professor": "권용신", "question": "Methylphenidate 처방으로 개선을 기대할 수 있는 증상은?", "images": [], "text_box": "11세 남자아이가 코로나 19로 비대면 수업을 하며 집중하지 못하고 등교를 하기 싫어했다. 초등학생 때부터 작은 일에도 쉽게 화내고 친구들과 다투는 일이 많았다. 진료 시에도 가만히 있지 못하고 끊임없이 움직였고, 의사의 질문에 ‘네?'를 반복하는 모습을 보였다. 초등학생 때는 성적이 나쁘지 않았으나 비대면 수업을 시작하며 공부에 집중하지 못하고 본인은 공부스타일이 아니라고 했다. 친구들을 사귀는 것을 좋아하나 막상 다툰 기억이 많아 친구들이 자기를 싫어한다며 학교에 가기 싫어했다. 비대면 수업을 등교를 하지 않아 밤늦게 핸드폰을 하며 늦게 잠드는 일이 많았고, 막상 등교하는 날에는 지각했다.", "options": ["등교를 하기 싫어함", "작은 일에도 쉽게 화냄", "비대면 수업에 집중력", "밤늦게 핸드폰을 함", "친구들이 자기를 싫어한다는 생각"], "answer": [2], "explanation": "문제의 남자아이는 학교와 같은 지속적인 정신력을 요하는 상황을 피하려고 하고(부주의), 진료 시에도 가만히 있지 못하고(과잉행동), 충동성 때문에 대인관계가 원만하지 않은 것으로부터 ADHD를 진단할 수 있습니다. 메틸페니데이트는 중추신경을 자극함으로써 집중력을 강화하여 ADHD에서 부주의 증상을 개선합니다."}, {"subject": "소아청소년 정신질환1", "year": ["19학번"], "professor": "이수정", "question": "8세 어린이가 한 학기가 넘도록, 다음 증례 설명 가운데 주의력결핍장애의 특징 증상이 아닌 것은?", "images": [], "text_box": null, "options": ["선생님의 지시를 따르지 않아서", "수업시간에 교실을 돌아다니거나 친구들에게 장난을 거는 일이 잦아", "지적을 받으면 침을 뱉거나 욕을 하곤 하였다.", "급식 시간에 순서를 기다리지 못하고 새치기를 하는 일이 많았다.", "집에서 좋아하는 휴대폰 게임을 할 때는 2-3시간 이상 오랫동안 집중할 수 있었다."], "answer": [2], "explanation": "1) 부주의, 2) 과잉행동, 4) 충동성 등은 모두 주의력결핍장애의 특징적인 증상입니다. 5)는 진단 기준에 명시하지는 않았으나 주의력결핍이 있는 사람들이 보이는 현상으로, 집단보다는 일대일 학습 환경을 선호합니다. 3)은 ADHD의 전형적인 증상이 아니라 적대적 반항 행동에 해당합니다. 1)과 같이 지시를 따르지 않는 것이 적대적 행동으로 혼동될 수 있으나 부주의의 결과로 생긴 현상인 경우가 대부분입니다."}, {"subject": "소아청소년 정신질환1", "year": ["18학번"], "professor": "권용신", "question": "ADHD 진단을 받은 초등학생이 학교에서 받는 평가 중에 나이가 들면서 가장 우선적으로 증상이 호전될 것이라고 생각되는 증상은?", "images": [], "text_box": null, "options": ["아는 문제를 실수해서 잘 못 맞힌다.", "물건을 제자리에 두지 않고 어디에 두었는지 까먹어서 자주 잃어버린다.", "수업시간에 주의가 산만하게 계속 돌아다닌다.", "친구와 놀다가 기분이 나쁘면 폭발해서 자주 다툰다.", "수업시간에 교사한테 집중하지 못하고 다른 생각에 빠진다."], "answer": [2], "explanation": "과잉행동이 우선적으로 개선됩니다. 주의력 결핍 증상(①②⑤)은 성인이 되어서도 문제가 지속됩니다. 충동성 문제(④)는 나아지기는 하지만 과잉행동만큼 우선적으로 호전되지는 않습니다."}, {"subject": "소아청소년 정신질환1", "year": ["18학번"], "professor": "권용신", "question": "ADHD 치료 약물로 중추신경계 자극제를 사용할 때 가장 흔한 부작용은?", "images": [], "text_box": null, "options": ["환각", "공격성", "졸리움", "기분 항진", "식욕부진"], "answer": [4], "explanation": "중추신경계 자극제인 메틸페니데이트 사용 시 식욕 부진, 불면, 불안 등이 나타날 수 있습니다."}, {"subject": "소아청소년 정신질환1", "year": ["09학번"], "professor": "권용신", "question": "주의력결핍 과잉행동장애(ADHD)의 핵심 증상에 해당되는 조합은?", "images": [], "text_box": null, "options": ["가) 차례를 기다리는 것을 힘들어한다.", "나) 수업시간에 선생님의 지시사항에 경청하지 않고 딴짓을 한다.", "다) 손발을 가만히 두지 못하고 앉은 자리에서 계속 꼼지락거린다.", "라) 선생님의 요구와 규칙에 응하지 않고 자꾸 반항하거나 거절한다."], "answer": [0, 1, 2], "explanation": "가)는 충동성, 나)는 주의력결핍, 다)는 과잉행동의 증상입니다. 라)는 적대적반항장애(ODD)의 증상입니다."}, {"subject": "소아청소년 정신질환1", "year": [], "professor": "", "question": "ADHD 진단 시 틀린 것은?", "images": [], "text_box": null, "options": ["과잉 행동이 집에서 혼자 있거나 면담 시 드러나지 않을 수 있다.", "또래에 비해서 운동, 쓰기, 연성 신경학적 징후가 진단에 도움이 된다.", "학교, 가정 등 여러 곳에서의 행동을 종합해서 진단한다.", "치료 전 키, 체중, 맥박을 측정한다.", "필요 시 뇌파 등 의학적 평가를 할 수 있다."], "answer": [1], "explanation": "연성 신경학적 징후에 대해 특별히 배우지는 않았지만, ADHD의 지표가 되지는 않는 것으로 보입니다. 어느 한 순간에만 나타나는 증상으로 진단하는 것이 아니라 종합적으로 판단해야 합니다."}, {"subject": "소아청소년 정신질환1", "year": [], "professor": "", "question": "ADHD 소견을 진단 내리는 기준에 대한 설명으로 잘못된 것은?", "images": [], "text_box": null, "options": ["게임을 할 때, 상담하러 올 때는 괜찮아 보이기도 한다.", "정교하지 못한 연성 신경학적 징후가 있다.", "학원, 학교, 집에서의 정보를 수집해야 한다.", "키, 신장 몸무게 등의 신체 치수를 치료 전에 측정해야 한다.", "뇌파 검사 소견을 확인한다."], "answer": [1], "explanation": "연성 신경학적 징후에 대해 특별히 배우지는 않았지만, ADHD의 지표가 되지는 않는 것으로 보입니다. 어느 한 순간에만 나타나는 증상으로 진단하는 것이 아니라 종합적으로 판단해야 합니다."}, {"subject": "소아청소년 정신질환1", "year": [], "professor": "", "question": "주의력결핍과잉행동장애에 대한 설명으로 맞는 것을 고르시오.", "images": [], "text_box": null, "options": ["유전이 되는 경우는 드물다.", "7세 이후에 발병하기도 한다.", "가장 많은 아형은 혼합형이다.", "여자 아이가 남자 아이보다 많다.", "4세 이전에 발병하는 경우는 드물다."], "answer": [1, 2], "explanation": "유전적 요인이 있을 것이 분명합니다. 전연령에서 발병할 수 있습니다. (당시에는 DSM 개정 전이라 '② 7세 이후에 발병하기도 한다.'가 틀린 설명이었음) 가장 많은 아형은 혼합형입니다. (이 항목에 대한 추가 설명은 제공되지 않았습니다.) 남자 아이가 여자 아이보다 3배 정도 더 많습니다. 전학령기에 발병이 흔합니다."}, {"subject": "소아청소년 정신질환1", "year": [], "professor": "", "question": "ADHD의 원인이 되는 neurotransmitter는?", "images": [], "text_box": null, "options": ["dopamine", "norepinephrine", "dopamine + serotonin", "dopamine + norepinephrine", "serotonin + epinephrine"], "answer": [3], "explanation": "도파민과 노르에피네프린이 집중력을 담당하는 신경전달물질입니다. 따라서 최근 ADHD 치료제도 해당 부분을 타겟으로 합니다."}, {"subject": "소아청소년 정신질환", "year": ["12학번"], "professor": "000", "question": "틱장애를 진단하기 위한 평가이다. 옳지 않은 것은?", "images": [], "text_box": null, "options": ["가족력을 평가한다.", "공존하는 질환을 평가한다.", "연쇄상구균의 기왕력을 평가한다.", "스트레스 요인이 증상을 악화시키는지 평가한다."], "answer": [2], "explanation": "틱 장애의 진단 평가 시 가족력은 매우 중요하며, ADHD나 강박 장애와 같은 공존 질환의 평가도 필수적입니다. 또한, 스트레스 요인이 틱 증상을 악화시키는지 파악하는 것도 중요합니다. 연쇄상구균(Streptococcus)은 PANDAS(소아 자가면역 신경정신질환)와 관련이 있을 수 있으나, 일반적인 틱 장애 진단 평가 항목에는 해당하지 않습니다. 따라서 연쇄상구균의 기왕력을 평가하는 것은 일반적인 틱 장애 진단 평가와는 거리가 있습니다."}, {"subject": "소아청소년 정신질환", "year": ["12학번"], "professor": "000", "question": "틱 장애에 대한 설명으로 틀린 것은?", "images": [], "text_box": null, "options": ["증상의 정도와 함께 실제 상황에 얼마나 장애를 주어야 하는지 봐야한다.", "약물치료로 리스페리돈, 할로페리돌, 피모자이드를 쓴다.", "습관반전, 이완 훈련을 해야 한다.", "경미한 틱이 있는 경우라도 중추신경자극제의 사용은 금기이다.", "주기적으로 약물을 줄이려는 시도를 해야 한다."], "answer": [3], "explanation": "틱 장애의 치료는 증상의 심각성과 일상생활에 미치는 장애 정도를 고려하여 결정됩니다. 약물치료로는 리스페리돈, 할로페리돌, 피모자이드와 같은 항도파민 억제제를 사용하여 증상을 완화할 수 있으며, 습관 반전 훈련과 이완 훈련 등 행동 치료도 중요합니다. 중추신경자극제는 틱 증상을 악화시킬 수 있으므로 틱 장애 환자에게는 주의 깊게 사용해야 하지만, 무조건적인 금기는 아닙니다. 또한, 장기적인 약물 사용 시에는 주기적으로 약물 감량을 시도하는 것이 권장됩니다."}, {"subject": "소아청소년 정신질환", "year": ["12학번"], "professor": "권용실", "question": "이 질환의 경과에 대해 옳은 설명은?", "images": [], "text_box": "13세 남아가 ‘응’, ‘응’하는 소리를 반복하여 병원을 방문하였다. 아동은 7세 경부터 눈을 깜박거리고, 고개를 앞뒤로 움직이며, 코를 킁킁거리는 ‘응’하는 소리도 나기 시작하였다.", "options": ["평생 크게 변화 없이 지속된다.", "시간이 지날수록 점점 악화된다.", "10세 이전에 발생하는 것은 드물다.", "초기 사춘기가 되면 완전히 관해되는 경우가 많다.", "후기 청소년기와 초기 성인기에 틱 증상이 현저히 감소한다."], "answer": [4], "explanation": "틱 장애는 일반적으로 초등학교 시기에 발생하여 사춘기를 겪으며 증상이 완화되는 경과를 보입니다. 보통 3-8세에 시작하여 10-12세경까지 증상이 악화될 수 있습니다. 그러나 후기 청소년기와 초기 성인기에는 틱 증상이 현저히 감소하는 경향을 보이며, 성인기에 60-80%는 증상이 완화되거나 완치됩니다. 따라서 후기 청소년기 및 초기 성인기에 증상 감소를 기대할 수 있습니다."}, {"subject": "소아청소년 정신질환", "year": ["12학번"], "professor": "권용실", "question": "뚜렛 장애에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["외설증은 모든 환자의 5%에서 발생한다.", "외설증은 보통 초기 청소년기에 시작된다.", "강박증상은 틱이 시작되기 전에 발생한다.", "가장 흔하게 시작되는 증상은 음성 틱이다.", "틱이 시작된 후에 주의집중의 문제가 종종 나타난다."], "answer": [1], "explanation": "뚜렛 장애에서 외설증(coprolalia)은 비교적 드물게 나타나며, 흔히 초기 청소년기에 시작되는 경우가 많습니다. 가장 흔하게 시작되는 증상은 음성 틱이 아니라 눈 깜박임과 같은 얼굴 부위의 운동 틱입니다. 강박 증상은 틱의 발생 전후 또는 동시에 나타날 수 있으며, 주의집중의 문제는 틱 발현 전이나 동시에 흔히 동반되는 공존 질환으로 나타납니다."}, {"subject": "소아청소년정신질환2", "year": ["21학번", "19학번"], "professor": "박민현", "question": "23세 남자가 코로나 19로 인한 비대면 시기에 친구도 사귀지 못하고 우울하다고 병원에 내원하였다. 해당 시기에 대한 설명으로 옳은 것은?", "images": [], "text_box": "23세 남자가 코로나 19로 인한 비대면 시기에 친구도 사귀지 못하고 우울하다고 병원에 내원하였다.", "options": ["발달 과제 실패시 죄책감을 경험한다.", "발달 과제 실패시 열등감을 경험한다.", "발달 과제 실패시 정체감을 경험한다.", "발달 과제는 친밀감이 해당한다.", "발달 과제는 통합감에 해당한다."], "answer": [3], "explanation": "23세라는 나이는 청년기(21~40세)에 해당합니다. 청년기의 발달 과제는 사회적 교류에 필수적인 이성, 동료, 상하 관계, 가족 관계 등에서 원활한 유대 관계를 형성하는 '친밀성'을 획득하는 것입니다. 이 시기에 발달 과제 실패 시에는 사회적 고립 상태가 되어 자기에게만 몰두하는 경향을 보이게 됩니다. 따라서, 청년기의 발달 과제는 친밀감에 해당합니다."}, {"subject": "소아청소년정신질환2", "year": ["21학번", "19학번"], "professor": "박민현", "question": "하복부 수술을 할 때 신체 손상의 공포가 가장 큰 시기는 언제인가?", "images": [], "text_box": null, "options": ["영아기", "걸음마기", "학령전기", "학령기", "청소년기"], "answer": [2], "explanation": "신체 손상의 공포는 걸음마기에서 학령기에 걸쳐 신체 부위에 대한 관심이 늘어나는 시기에 커집니다. 인지발달상 전조작기에 해당하며 아직 가역성을 터득하기 전이라 더욱 그렇습니다. 특히 하복부 수술을 받는 아동의 경우, 생식기에 대한 관심이 많은 학령전기에 신체 손상의 공포가 가장 커지게 됩니다."}, {"subject": "소아청소년정신질환2", "year": ["21학번", "19학번"], "professor": "박민현", "question": "9세 남아가 한글 쓰기가 안되고 학교 생활에 어려움이 있어 교사의 권유로 병원에 내원하였다. 엄마라는 단어를 13개월에 처음으로 말했고 15개월이 되어서야 걷기 시작하였지만 가정에서는 애교가 많고 유순하다고 했다. 지능검사 결과 IQ는 65였다. 해당 질환에 대하여 옳은 것은?", "images": [], "text_box": "9세 남아가 한글 쓰기가 안되고 학교 생활에 어려움이 있어 교사의 권유로 병원에 내원하였다. 엄마라는 단어를 13개월에 처음으로 말했고 15개월이 되어서야 걷기 시작하였지만 가정에서는 애교가 많고 유순하다고 했다. 지능검사 결과 IQ는 65였다.", "options": ["남녀 비율은 1:1 이다.", "표준화된 지능검사 수치대로 진단한다.", "또래 친구들과 친하게 지내는 경향을 보인다.", "정신장애의 공존 유병률이 정상인보다 높지 않다.", "학교에 들어가기 전까지 대인관계 기술과 의사소통 능력이 크게 문제가 없어, 학교에 들어가기 전에 진단되지 않는 경우가 흔하다."], "answer": [4], "explanation": "지능검사 결과 IQ 65는 경도 지적장애에 해당합니다. 지적장애는 남자가 여자보다 많으며, DSM-5에서는 지능 검사 수치보다는 적응 기능의 결함을 더 중요하게 평가합니다. 어린 시절에 또래 친구 관계 유지에 어려움을 겪고, 다른 정신장애의 공존 유병률이 비지적장애인보다 높습니다. 경도 지적장애의 경우, 학교 입학 전까지는 대인관계나 의사소통 문제가 잘 드러나지 않아 진단이 늦어지는 경우가 흔합니다."}, {"subject": "소아청소년정신질환2", "year": ["21학번", "19학번"], "professor": "박민현", "question": "일년 전까지 사이가 좋던 초등학생 1학년생 언니와 두살 아래 유치원생 아우가 놀이를 하다가 올해 들어 유난히 자주 다투게 되었다. 발달심리학을 고려할 때 그 이유로서 가능성이 가장 높은 것은?", "images": [], "text_box": "일년 전까지 사이가 좋던 초등학생 1학년생 언니와 두살 아래 유치원생 아우가 놀이를 하다가 올해 들어 유난히 자주 다투게 되었다.", "options": ["아우의 경쟁심", "놀이 방식의 차이", "부모 태도의 변화", "언니의 스트레스 증가", "의사소통 방식의 변화"], "answer": [1], "explanation": "초등학생 1학년 언니는 구체적 조작기(7~11세)로 논리를 사용한 규칙 기반 놀이를 즐깁니다. 두 살 어린 유치원생 동생은 전조작기(2~7세)로 아직 논리가 형성되기 전이라 직관과 정서에 따르며 자기중심적입니다. 이처럼 인지 발달 단계의 차이로 인해 서로 다른 놀이 방식을 선호하게 되어 갈등이 발생하는 경우가 많습니다."}, {"subject": "소아청소년정신질환2", "year": ["21학번", "19학번"], "professor": "박민현", "question": "??세 남아가 쉽게 짜증을 내고 친구를 자주 때려 병원에 내원했다. 학교에서는 선생님의 지시를 듣지 않았고 팔을 물어뜯는 등의 증세를 보였다. 적절한 약물은?", "images": [], "text_box": "??세 남아가 쉽게 짜증을 내고 친구를 자주 때려 병원에 내원했다. 학교에서는 선생님의 지시를 듣지 않았고 팔을 물어뜯는 등의 증세를 보였다.", "options": ["졸피뎀", "도네페질", "리스페리돈", "?", "알프라졸람"], "answer": [2], "explanation": "제시된 행동들(친구를 때리고, 지시를 듣지 않으며, 자해 행동)은 사회적 상호작용의 어려움과 공격성 및 과민성을 시사하며, 이는 자폐스펙트럼장애에서 흔히 관찰될 수 있습니다. 리스페리돈은 소아 및 청소년 자폐스펙트럼장애와 관련된 과민성 및 공격성 치료에 FDA 승인을 받은 약물입니다. 따라서 해당 증상에 대한 적절한 약물로 리스페리돈을 고려할 수 있습니다."}, {"subject": "소아청소년정신질환2", "year": ["18학번"], "professor": "박민현", "question": "7세 남아가 수업시간에 유난히 산만하여 수업 내용을 이해하기 힘들어 병원에 왔다. 지능검사에서 전체 지능은 101이었으며 특별한 신경학적 이상 소견이 발견되지 않았다. DSM-5에 의해 분류할 때 해당 진단이 포함되는 장애는?", "images": [], "text_box": "7세 남아가 수업시간에 유난히 산만하여 수업 내용을 이해하기 힘들어 병원에 왔다. 지능검사에서 전체 지능은 101이었으며 특별한 신경학적 이상 소견이 발견되지 않았다.", "options": ["신경인지 장애", "신경발달 장애", "조현병 스펙트럼 및 기타 정신병적 장애", "섬망, 치매, 그리고 기억상실 장애 및 기타 인지 장애", "유아기, 소아기, 청소년기에 흔히 처음으로 진단되는 장애"], "answer": [1], "explanation": "환아의 전체 지능은 101로 정상 범위이나, 수업 시간에 집중하지 못하는 산만한 모습을 보입니다. 이는 주의력결핍 과잉행동장애(ADHD)의 전형적인 증상입니다. DSM-5에서는 ADHD를 신경발달장애(Neurodevelopmental Disorders) 범주로 분류하고 있습니다. 신경발달장애는 주로 발달 시기에 시작되어 개인적, 사회적, 학업적 또는 직업적 기능의 손상을 초래하는 장애를 포함합니다."}, {"subject": "[TBL] 심리사회적 치료", "year": ["14학번", "13학번", "12학번"], "professor": "김정진", "question": "이런 현상은?", "images": [], "text_box": "어린 시절부터 엄격하고 무서운 아버지로부터 체벌을 받으면서 자란 32세 여자가 남자의사들을 만나면 압도되는 느낌을 받으면서 자신의 감정을 제대로 표현하지 못하였다.", "options": ["저항", "전이", "합리화", "역전이", "반동형성"], "answer": [1], "explanation": "전이는 과거, 특히 유아기나 아동기에 부모와 같은 중요한 인물과의 관계에서 경험했던 감정, 생각, 행동 패턴을 현재 관계를 맺고 있는 다른 사람에게 무의식적으로 옮겨서 나타내는 현상입니다. 이 사례에서 환자는 과거 두려웠던 아버지에게 느꼈던 감정과 두려움을 현재의 의사에게 그대로 투영하고 있습니다. 이는 환자의 무의식적인 갈등이 현재의 관계에서 재현되는 심리적 과정입니다."}, {"subject": "[TBL] 심리사회적 치료", "year": ["11학번"], "professor": "김정진", "question": "이에 해당하는 방어기제는?", "images": [], "text_box": "25세 여자 환자가 의사와 정신면담 중 다음과 같이 말하였다. \"선생님은 우리 엄마와 닮았네요. 선생님도 제가 귀찮으시죠? 저희 엄마가 그랬거든요.\"", "options": ["분열조장", "억압", "전이", "투사", "지식화"], "answer": [2], "explanation": "환자는 과거 자신을 귀찮아했던 엄마의 이미지를 치료자에게 그대로 투영하고 있습니다. 이는 환자가 과거의 중요한 인물(엄마)에게 느꼈던 감정과 행동 패턴을 현재 치료자에게 무의식적으로 옮겨서 나타내는 전이 현상에 해당합니다. 전이는 정신분석 치료 과정에서 중요한 개념으로, 과거의 미해결된 갈등을 이해하는 데 도움을 줍니다."}, {"subject": "[TBL] 심리사회적 치료", "year": ["10학번"], "professor": "김정진", "question": "이드(id)와 초자아 (superego)의 욕구를 현실과 타협하는 수준에서 충족시키기 위해 자아(ego)에서 무의식적으로 발생시키는 기전은?", "images": [], "text_box": null, "options": ["방어기제", "종합능력", "현실 검증력", "일차적 자아기능", "이차적 자아기능"], "answer": [0], "explanation": "방어기제(Defense Mechanism)는 자아(Ego)의 기능 중 하나이며, 대부분 무의식적으로 선택되고 자동으로 작동하여 내적인 충동들을 타협시키고 긴장감을 완화하는 역할을 합니다. 이는 이드(id)의 원초적 욕구와 초자아(superego)의 도덕적 요구 사이에서 현실적으로 적응하기 위한 심리적 전략입니다. 다양한 방어기제가 존재하며, 개인의 심리적 건강에 중요한 영향을 미칩니다."}, {"subject": "[TBL] 심리사회적 치료", "year": [], "professor": "", "question": "정신분석치료의 역전이에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["치료의 객관성을 유지하는데 도움이 된다.", "정신치료의 지도감독을 받는 이유가 된다.", "정신분석이란 역전이의 해석이라고 할 수 있다.", "환자가 면담시간에 침묵하면 역전이를 의심한다.", "환자가 분석가의 장점을 극찬하는 것도 역전이다."], "answer": [1], "explanation": "역전이는 치료자가 환자에 대해 가지는 무의식적인 감정의 반응으로, 치료의 객관성을 저해할 수 있습니다. 자신의 역전이를 환자의 문제로 혼동할 수도 있어 치료를 위태롭게 하기도 합니다. 따라서 정신분석치료에서는 자기분석, 지도감독, 동료들과의 증례토의 등을 통해 역전이를 인식하고 극복하는 것이 중요하며, 이것이 지도감독을 받는 주된 이유 중 하나입니다."}, {"subject": "[TBL] 심리사회적 치료", "year": ["18학번"], "professor": "박이진", "question": "위 환자에 대한 알맞은 진단을 고르시오.", "images": [], "text_box": "32세 남자가 잦은 근무 실수로 6개월 전 실직한 뒤 우울한 기분이 지속되고 어떠한 일에도 흥미와 재미를 느끼지 못하고 의욕이 없어 누워서 휴대전화만 하며 자살 사고가 있어 병원에 왔다. 2개월 전부터 잠들기 전 소주 반 병을 마셨으며 병원에 방문한 시점에서는 오후부터 불안하고 초조하고 우울한 기분을 잊기 위하여 잠들기 전 소주 3병 이상을 마셨으며 구직활동을 전혀 하지 않았다. 가족들이 만류하면 하루 정도 음주를 하지 않았으나 두근거리고 손이 떨려 불안하다며 다시 음주를 지속하였다. 초등학교때부터 과제나 지시사항을 기억하지 못하여 지적을 받았으며 공부를 하려고 해도 집중하지 못하고 시험에서 실수를 하여 낮은 점수를 받았다. 직장에서도 지시사항을 기억하지 못하고 회의를 할 때도 집중하지 못하며 적절한 대답을 하지 못해 실직하게 되었다.", "options": ["공황장애", "알코올 사용장애", "양극성 장애 2형", "적응장애", "주요우울장애", "ADHD", "지속성 우울장애", "폭식장애"], "answer": [1, 4, 5], "explanation": "환자는 6개월간 지속되는 우울감, 흥미 상실, 의욕 저하, 자살 사고 등으로 주요우울장애 진단 기준을 만족합니다. 또한 술에 대한 내성 증가, 조절 불가, 금단 증상 등으로 알코올 사용장애 진단이 가능합니다. 초등학교 시절부터 지속된 주의력 결핍과 학습 및 직업 기능 저하를 고려할 때 ADHD도 함께 진단할 수 있습니다."}, {"subject": "[TBL] 심리사회적 치료", "year": ["18학번"], "professor": "박이진", "question": "81세 여자가 우울증을 보이던 중 자살 생각이 심해져 입원하였다. 저녁 약물 복용한 이후 ‘여기가 어디냐'고 소리를 지르면서 집에 보내 달라고 소리를 질렀다. 여자는 전업주부이며 치매 진단을 받은 적이 없으나 1년 전에 대퇴부 골절로 수술받고 난 후 비슷한 증상을 보인 적이 있었다. 혈압 110/76 mmHg, 맥박 88 회/분, 호흡 23/분, 체온 37.0 도씨였고 산소포화도는 98%였다. 혈액검사에서 WBC 6,320 g/ul, CRP 0.2mg/dl, Na/K/CI 136/4.9/99 mEq/L 였다. 여자의 상태(섬망)에 대한 위험인자는?(세 가지)", "images": [], "text_box": null, "options": ["공황장애", "알코올 사용장애", "양극성 장애 2형", "적응장애", "주요우울장애", "ADHD", "지속성 우울장애", "폭식장애"], "answer": [1, 3, 5], "explanation": "환자의 급성 착란 상태는 섬망을 시사합니다. 섬망의 위험인자 중 알코올 사용장애는 알코올 금단 또는 기저 뇌 기능 저하로 인해 직접적인 원인이 될 수 있습니다. 적응장애는 급성 스트레스에 대한 취약성을 나타내어 인지적 혼란을 유발할 수 있으며, ADHD와 같은 신경발달장애는 뇌의 기능적 조절 능력에 영향을 미쳐 섬망 발생 위험을 높일 수 있다고 보고되기도 합니다."}, {"subject": "사법정신의학", "year": ["20학번", "19학번"], "professor": "이해국", "question": "보호의무자에 의한 입원이나 행정입원의 적법성 여부를 판단하는 최초입원 단계 권리 구제의 핵심적 역할을 하는 기구는?", "images": [], "text_box": null, "options": ["입퇴원관리위원회", "정신건강심의위원회", "지역정신보건위원회", "입원적합성심사위원회", "행정입원심판위원회"], "answer": [3], "explanation": "보호의무자에 의한 입원과 행정입원의 경우, 국립정신병원 등에 설치된 입원적합성 심사위원회가 최초 입원일부터 1개월 이내에 심사하여 적법성을 판단합니다. 이는 환자의 인권 보호를 위한 중요한 절차입니다. 입원적합성 심사위원회는 국립정신병원 등에 설치되어 운영됩니다."}, {"subject": "사법정신의학", "year": ["20학번", "19학번"], "professor": "이해국", "question": "형법 제 10조의 심신장애를 고려한 처벌경감에 해당되지 않는 것은?", "images": [], "text_box": null, "options": ["조현병환자의 살인", "양극성 환자의 사기", "우울증환자의 성추행", "만취상태에서의 절도", "치매 환자의 폭행"], "answer": [2], "explanation": "형법 제10조는 심신장애로 인한 책임감면을 규정하고 있으나, 성폭력 범죄의 경우 심신장애로 인한 처벌경감 적용의 예외 조항이 있습니다. 특히 성폭력 특례법 등에서 음주나 약물로 인한 심신미약 상태에서의 성폭력 범죄에 대한 감경을 제한합니다. 따라서 우울증 환자의 성추행은 심신장애를 고려한 처벌경감 적용의 예외에 해당될 수 있습니다. 다른 보기의 범죄들은 일반적인 심신장애 감경 대상에 포함될 수 있습니다."}, {"subject": "사법정신의학", "year": ["18학번"], "professor": "이해국", "question": "싸이코패시에 대한 법적 책임경감을 하지 않도록 근거가 된 형법상 판례 또는 기준은?", "images": [], "text_box": null, "options": ["Durham rule", "Decision tree test", "M'Naghten case", "Irresistible impulse test", "Model penal code test"], "answer": [4], "explanation": "Model penal code test는 정신병이나 결함으로 인한 반복적 범죄나 반사회적 행동을 책임감면의 대상에서 제외시키는 검사 기준입니다. 이는 소위 '싸이코패스'로 불리는 사람들이 단순히 정신 질환을 가졌다는 이유만으로 법적 책임에서 자유로워지는 것을 방지하기 위해 사용됩니다. 우리나라에서도 Model penal code test를 근거로 사법적 판단이 이루어집니다. 이는 'Modified M. Naghten Case'라고도 불립니다."}, {"subject": "사법정신의학", "year": ["17학번"], "professor": "이해국", "question": "형법 제 10조 심신장애 상태에서 범죄를 범한 때 형의 경감이 불가능한 경우는?", "images": [], "text_box": null, "options": ["치매 환자의 폭행", "조현병 환자의 살인", "만취 상태의 절도", "우울증 환자의 성추행", "조울증 환자의 사기"], "answer": [3], "explanation": "성폭력 범죄의 경우, 심신장애를 이유로 한 처벌 경감 적용에 예외 조항이 적용됩니다. 이는 음주나 약물로 인한 심신장애 상태에서 성폭력 범죄를 저질렀을 때 형의 감경을 제한하는 규정과도 유사합니다. 따라서 우울증 환자의 성추행은 일반적인 심신미약 감경 대상에서 제외될 가능성이 높습니다. 다른 보기의 범죄들은 심신장애 감경 대상에 포함될 수 있습니다."}, {"subject": "사법정신의학", "year": ["17학번"], "professor": "이해국", "question": "2016년 개정된 정신건강복지법의 입원 형태 중 하나로, 입원치료의 필요성과 자타해 위험이 있는 경우, 누구든 처음 이런 환자를 발견한 사람의 신고에 의하여 시군구청장의 결정에 의하여 집행되는 강제 입원은?", "images": [], "text_box": null, "options": ["응급입원", "자의입원", "행정입원", "보호의무자에 의한 입원", "시군구청장을 보호자로 하는 입원"], "answer": [2], "explanation": "행정입원은 정신질환으로 인해 자해 또는 타해의 위험이 있다고 의심되는 경우, 누구든지 그 사실을 인지한 사람이 시군구청장에게 신고하여 이루어지는 강제 입원입니다. 전문의 또는 전문요원의 신청에 의해 시군구청장이 입원을 결정하며, 초기 입원 기간은 3개월입니다. 이는 환자의 긴급한 보호와 사회 안전을 동시에 고려한 제도입니다. 자의입원은 환자 스스로 결정하는 입원이며, 보호의무자에 의한 입원은 보호의무자의 동의로 이루어집니다."}, {"subject": "사법정신의학", "year": ["16학번"], "professor": "이해국", "question": "소위 싸이코패시에 대한 법적 책임경감을 하지 않도록 근거가 된 형법상 판례 또는 기준은?", "images": [], "text_box": null, "options": ["Durham rule", "M'Naghten case", "Irresistible impuse test", "Model penal code test", "Decision tree test"], "answer": [3], "explanation": "Model penal code test는 정신병이나 결함으로 인한 반복적 범죄나 반사회적 행동을 책임감면의 대상에서 제외시키는 검사 기준입니다. 이는 소위 '싸이코패스'로 불리는 사람들이 단순히 정신 질환을 가졌다는 이유만으로 법적 책임에서 자유로워지는 것을 방지하기 위해 사용됩니다. 우리나라에서도 Model penal code test를 근거로 사법적 판단이 이루어집니다. 이 모델은 'Modified M. Naghten Case'의 개념을 포함합니다."}, {"subject": "사법정신의학", "year": ["16학번"], "professor": "이해국", "question": "법정신의학에서 유무죄와 형량을 결정할 때 정신과의사와 법관의 역할에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["대개 의사의 의견이 결정적 근거로 작용", "의사는 법적 책임에 대한 의견을 제시", "의사는 특정 판단을 권고하지 않음", "책임능력에 대한 판단 여부는 판사가 결정", "판사는 최종 판단 전 의사에게 이 판단을 고지"], "answer": [3], "explanation": "법정신의학자(감정의)는 피감정인에 대한 정신의학적 감정을 실시하고, 그 결과를 토대로 전문적 자료와 의학적 판단을 법관에게 제공합니다. 그러나 책임능력 유무나 유무죄, 형량에 대한 최종적인 법적 판단은 오직 법관의 고유 권한입니다. 의사는 전문가로서의 의견을 제시할 뿐, 직접적인 법적 판단이나 권고를 하는 것은 아닙니다. 법정신의학자는 객관적인 견해를 제시하며 피감정인과 사회를 동시에 보호해야 합니다."}, {"subject": "사법정신의학", "year": ["15학번", "14학번", "13학번", "12학번"], "professor": "이해국", "question": "법정신의학자의 역할에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["증언은 할 수 없고, 감정서만 제출할 수 있다.", "전문가로서의 주관적인 견해를 밝히는 것이 중요하다.", "피감정인보다는 사회를 보호한다는 입장에 서야한다.", "책임능력에 대한 판단 여부는 판사가 결정한다.", "판사는 최종 판단 전 감정의에게 이 사실을 알려야 한다."], "answer": [3], "explanation": "법정신의학자는 피감정인에 대한 정신의학적 감정을 수행하고 전문적 자료를 법관에게 제공하는 역할을 합니다. 하지만, 책임능력 여부, 유무죄, 형량 등에 대한 최종적인 법적 판단은 법관의 고유 권한입니다. 법정신의학자는 객관적이고 윤리적인 견해를 제시해야 하며, 주관적인 견해를 강조하거나 사회 보호만을 우선시해서는 안 됩니다. 증언과 감정서 제출 모두 가능합니다."}, {"subject": "사법정신의학", "year": ["15학번"], "professor": "이해국", "question": "정신질환자의 형량을 감량하거나, 벌 대신 치료를 제공하는 판단의 근거가 되는 범죄 책임구성요건은?", "images": [], "text_box": null, "options": ["충동성", "위법성", "유책성", "목적성", "해당성"], "answer": [2], "explanation": "범죄의 성립 요건은 구성요건해당성, 위법성, 유책성으로 나뉩니다. 유책성은 행위자를 비난할 수 있는 책임 능력을 의미하며, 형벌적응능력과 관련됩니다. 정신이상자, 형사미성년자 등은 유책성이 없다고 판단될 여지가 있어 형량이 감면되거나 치료 처분을 받을 수 있습니다. 즉, 유책성이 없으면 형벌 대신 치료를 통해 사회 복귀를 돕는 것이 고려될 수 있습니다."}, {"subject": "사법정신의학", "year": ["14학번"], "professor": "이해국", "question": "조현병 환자가 망상에 의하여 살인을 한 경우 법적 책임을 묻지 않는 근거가 된 형법 상 판례 또는 기술은?", "images": [], "text_box": null, "options": ["Durham rule", "M'Naghten case", "Irresistible Impulse Test", "Model Penal Code Test", "Decision tree test"], "answer": [1], "explanation": "맥노튼 판례는 범행 당시 피고인이 마음의 병으로 이성의 결함 하에 행동의 특성과 성질을 몰랐거나, 알았어도 나쁜 일을 행함을 몰랐다면, 정신병을 이유로 무죄를 선고해야 한다고 판시했습니다. 이 판례는 범죄 행위 시 피고인의 인지적 측면, 즉 행위의 옳고 그름을 분별할 수 있는 능력에 중점을 두어 심신미약 또는 심신상실을 판단하는 중요한 근거가 되었습니다. 따라서 조현병 환자의 망상으로 인한 살인 사건에서 법적 책임을 묻지 않는 근거가 될 수 있습니다."}, {"subject": "사법정신의학", "year": ["13학번", "12학번"], "professor": "이해국", "question": "형법 상 범죄가 성립되기 위한 조건 중 저질러진 행위가 법률상 행위자를 비난할 수 있는 행동에 해당되어야 하는 것은?", "images": [], "text_box": null, "options": ["고의성", "유책성", "위법성", "특정성", "해당성"], "answer": [1], "explanation": "형법상 범죄 성립의 3단계는 구성요건해당성, 위법성, 유책성입니다. 이 중 유책성은 행위자를 비난할 수 있는 책임 능력을 의미하며, 행위자가 자신의 행위가 위법하다는 것을 인식하고도 이를 감수할 수 있는 능력을 말합니다. 유책성이 없는 경우, 즉 행위자에게 비난 가능성이 없는 경우 형사책임을 지지 않거나 감면될 수 있습니다. 고의성은 유책성 판단의 한 요소입니다."}, {"subject": "사법정신의학", "year": ["11학번"], "professor": "이해국", "question": "2008년 5차로 개정된 정신보건법의 내용으로 맞는 것은?", "images": [], "text_box": null, "options": ["외래치료명령제의 유보", "사회복귀시설의 설치 제한", "보호의무자에 의한 조건 완화", "자의입원환자에 대한 퇴원의사 확인 절차 명시", "기초와 광역단체의 정신보건위원회의 통합적 설치"], "answer": [3], "explanation": "2008년 5차로 개정된 정신보건법(현 정신건강복지법)의 주요 내용은 환자의 인권 보호를 강화하는 방향으로 이루어졌습니다. 특히 자의입원 환자에 대해 연 1회 이상 퇴원의사를 확인하도록 절차를 명시하여, 자의로 입원한 환자가 부당하게 장기간 입원하는 것을 방지하고자 했습니다. 외래치료명령제는 이때 신설되었고, 보호의무자에 의한 입원 조건은 강화되었으며, 정신보건위원회는 광역과 기초로 세분화되었습니다."}, {"subject": "사법정신의학", "year": ["10학번"], "professor": "원왕연", "question": "다음 범죄의 성립요건에 대한 설명 중 틀린 것은?", "images": [], "text_box": null, "options": ["해당성은 범죄가 법률상의 특정행위이어야 한다는 것이다.", "책임성이란 범죄행위자를 비난할 수 있어야 한다는 것이다.", "위법성은 범죄가 되기 위해선 위법한 행위이어야 한다는 것이다.", "유책성이란 행위자가 자신의 범죄를 책임질 수 있는 상태이어야 한다는 것이다."], "answer": [1], "explanation": "범죄의 성립요건은 구성요건해당성, 위법성, 유책성입니다. 해당성은 범죄가 법률에 규정된 특정 행위에 해당해야 함을 의미하고, 위법성은 행위가 법률상 허용되지 않는 것을 말합니다. 유책성은 행위자를 비난할 수 있는 책임능력을 뜻하며, 행위자가 자신의 범죄를 책임질 수 있는 상태를 의미합니다. '책임성'이라는 용어가 법률상 명확히 '비난할 수 있어야 한다'는 개념과 직접적으로 연결되기는 하지만, 엄밀히 말해 '유책성'이 더 정확한 법률 용어입니다. 이 문맥에서는 '책임성'의 설명이 '유책성'과 거의 동일하게 사용되었지만, 법적 용어의 정확성 측면에서 다른 보기가 더 정확한 표현으로 볼 수 있습니다."}, {"subject": "사법정신의학", "year": ["09학번"], "professor": "이해국", "question": "정신 보건법에 의하면 환자에게는 치료를 받을 권리 뿐만 아니라 치료를 거부할 권리도 있다고 할 수 있다. 다음 중 환자의 권리를 지키기 위하여 정신 보건법에 명기된 조치가 아닌 것은?", "images": [], "text_box": null, "options": ["환자의 부당 수용을 금한다.", "특수치료는 협의체에서 협의한 후 치료 여부를 결정한다.", "통신이나 면회 등의 행동 제한을 금한다.", "교육이나 고용에서 불공정한 대우를 해서는 안된다.", "보호병동의 출입구는 이중으로 되어있으면 안된다."], "answer": [4], "explanation": "정신보건법(현 정신건강복지법)은 환자의 인권 보호를 강화하기 위해 다양한 조치를 명시하고 있습니다. 여기에는 무진단 입원 금지, 부당 수용 금지, 격리 금지, 특수 치료 제한, 행동 제한 금지, 교육/고용에서의 불공평한 대우 금지 등이 포함됩니다. 그러나 보호병동의 출입구를 이중으로 만드는 것은 주로 시설의 보안 및 환자 안전 관리를 위한 조치로, 법에 명시된 환자의 직접적인 권리 보호 조항은 아닙니다. 이는 환자의 안전과 탈원 방지를 위한 행정적 조치에 가깝습니다."}, {"subject": "사법정신의학", "year": ["09학번", "08학번", "07학번"], "professor": "이해국", "question": "대한민국 정신보건법의 기본 이념을 기술한 사안들 중 옳지 않은 것은?", "images": [], "text_box": null, "options": ["모든 정신질환자는 인간으로서의 존엄과 가치를 보장받는다.", "정신질환 환자는 최적의 치료를 받을 권리를 갖는다.", "정신질환을 이유로 차별대우를 받지 않는다.", "입원치료가 필요한 경우 환자 자신과 타인을 해칠 위험성 때문에 즉시 강제입원이 추진된다.", "입원치료 중에는 가능하면 자유로운 환경이 보장되어야 한다."], "answer": [3], "explanation": "정신건강복지법의 기본 이념은 모든 정신질환자의 인간 존엄성 보장, 차별 금지, 최적의 치료 권리 및 자유로운 치료 환경 제공에 있습니다. 입원치료의 필요성이나 자타해 위험이 있다고 해서 즉시 강제입원이 추진되는 것은 옳지 않습니다. 강제입원은 엄격한 요건과 절차, 그리고 독립적인 심사 기구를 통해 결정되어야 하며, 환자의 인권 보호를 최우선으로 해야 합니다. 이 법은 강제 입원 제도를 개선하여 환자의 인권 보호 장치를 강화하는 데 중점을 둡니다."}, {"subject": "사법정신의학", "year": ["07학번"], "professor": "", "question": "환자의 비밀유지와 관련해서 옳지 않은 것은?", "images": [], "text_box": null, "options": ["검찰, 경찰 조사 시 말고는 비밀을 유지(절대 공개 안됨)한다", "환자가 자신의 이익을 위해서 원한다면 공개가 가능", "의사, 전문가, 자문의 등과 환자의 치료를 위해 공유할 때 공개한다", "환자 허락 시 가족, 법정 대리인에 공개 가능", "타살 가능성이 있을 시 공개한다"], "answer": [0], "explanation": "환자의 비밀은 원칙적으로 엄격히 유지되어야 하지만, 여러 예외 상황에서는 공개가 가능합니다. 환자 본인이 자신의 이익을 위해 동의하거나, 치료를 위해 의료진 간에 공유하는 경우, 환자의 허락을 받아 가족이나 법정 대리인에게 공개하는 경우 등이 이에 해당합니다. 특히 타살이나 자살의 위험이 있어 공공의 안전이 위협받는 경우 등은 의무를 지키지 않아도 되는 예외 상황으로 분류되어 공개될 수 있습니다. 검찰이나 경찰 조사를 포함한 특정 법적 절차에서도 필요한 경우 비밀이 공개될 수 있습니다."}, {"subject": "사법정신의학", "year": ["07학번"], "professor": "", "question": "법정신의학자, 즉 감정의에 대하여 기술하였다. 옳은 것은?", "images": [], "text_box": null, "options": ["전문가로서 증언을 통해 재판에 도움을 주지만 감정서를 작성할 수는 없다.", "의학적 판단은 감정의의 몫이지만 최종판결은 판사의 몫이다.", "피감정인보다 사회를 보호하다는 입장에 서야 한다.", "정신과의사의 감정은 형사감정에만 국한되고, 민사상의 감정은 해당영역이 아니다.", "객관적인 자료를 제공하는 것보다는 전문가로서의 주관적인 견해를 밝히는 것이 더욱 중요하다."], "answer": [1], "explanation": "법정신의학자(감정의)는 피감정인에 대한 정신의학적 감정을 실시하여 의학적 판단을 내리는 전문가입니다. 그러나 이러한 의학적 판단은 법적 책임을 결정하는 데 중요한 자료로 활용될 뿐이며, 최종적인 유무죄 및 형량 판결은 법관의 고유 권한입니다. 법정신의학자는 형사 감정뿐 아니라 민사 감정 등 다양한 법적 영역에서 전문가적 역할을 수행하며, 객관적인 자료와 견해를 바탕으로 공정하게 업무를 수행해야 합니다."}, {"subject": "사법정신의학", "year": ["고대학번"], "professor": "전양환", "question": "대한보건의료법에 관한 내용 중 맞는 것은?", "images": [], "text_box": null, "options": ["자의입원: 퇴원은 의사에게 허락을 받아야 한다", "보호자 동의 입원: 3개월", "시구청장 입원: 6개월", "응급입원: 7일", "응급입원시 경찰/응급구조원의 동의가 필요하다"], "answer": [4], "explanation": "응급입원은 자해나 타해의 위험이 있는 급박한 상황에서 의사와 경찰관 또는 응급구조원의 동의로 3일간 이루어질 수 있습니다. 자의입원은 환자 스스로 신청하여 언제든지 퇴원 가능하며, 의사의 허락이 필요하지 않습니다. 보호의무자에 의한 입원은 2명의 보호의무자 신청과 2명의 전문의 소견으로 결정되며 2주 이내 심사 후 입원이 결정됩니다. 행정입원의 경우, 전문의나 전문요원의 신청으로 시군구청장이 결정하며 기간은 3개월입니다."}, {"subject": "예방정신의학, 정신건강증진, 정신재활", "year": ["22학번", "21학번", "20학번", "19학번", "18학번", "17학번", "16학번"], "professor": "이해국", "question": "지역사회기반 정신보건정책의 개념이 제시되고 시행이 되게 된 가장 큰 이유는?", "images": [], "text_box": null, "options": ["알코올중독 등 새로운 정신건강문제의 발생", "정신병에 대한 급성기 개입의 필요성 대두", "정신병에 대한 인간적 치료요구와 치료기술의 발달", "정신건강증진에 대한 국민의 요구 증가", "중증 정신질환자의 범죄로 인한 사회적 문제"], "answer": [2], "explanation": "시민의식 신장, 경제적 발달, 치료기술의 발달 등에 의하여 지역사회기반 정신보건정책이 발달하였습니다."}, {"subject": "예방정신의학, 정신건강증진, 정신재활", "year": ["22학번", "21학번", "20학번", "19학번", "18학번"], "professor": "이해국", "question": "정신보건센터 사업들 중 조현병 환자를 둔 가족에게 정신질환에 대하여 교육을 제공하는 것에 해당되는 사업의 영역은?", "images": [], "text_box": null, "options": ["교육홍보사업", "예방홍보사업", "만성 중증질환사업", "정신건강교육사업", "정신건강증진사업"], "answer": [2], "explanation": "중증 정신질환자 분들을 대상으로 하는 보건 사업을 만성 중증질환사업이라고 합니다. 중증 정신질환에는 정신분열증(조현병), 조울증, 반복 재발성 우울증이 있습니다."}, {"subject": "예방정신의학, 정신건강증진, 정신재활", "year": ["22학번", "21학번", "20학번", "19학번", "16학번", "14학번"], "professor": "이해국", "question": "정신보건센터 사업들 중 조현병 환자를 둔 가족에게 정신질환에 대하여 교육을 제공하는 것은 어떤 사업의 영역에 해당되는 것은?", "images": [], "text_box": null, "options": ["예방홍보사업", "교육홍보사업", "정신건강증진사업", "만성중증질환사업", "지역사회자원연계사업"], "answer": [3], "explanation": "중증 정신질환자를 대상으로 하는 보건 사업을 만성 중증질환사업이라고 합니다. 여기에는 정신분열증(조현병), 조울증, 반복 재발성 우울증 등이 포함됩니다. 정신질환자 가족에 대한 교육은 만성중독대상자 영역의 사업 중 중요한 사업의 하나입니다."}, /**
 * question 앞 80자(공백 제거)를 키로 중복 제거.
 * 중복 항목의 year는 합집합 처리.
 */
function deduplicateQuestions(items) {
  const seen = new Map();   // key → index in result
  const result = [];

  items.forEach(item => {
    const raw = (item.question || '').replace(/\s+/g, '').slice(0, 80);
    if (!raw) { result.push(item); return; }

    if (seen.has(raw)) {
      // year 합집합
      const existing = result[seen.get(raw)];
      const merged = new Set([...(existing.year || []), ...(item.year || [])]);
      existing.year = [...merged].sort((a, b) => {
        const na = parseInt((a.match(/\d+/) || [0])[0]);
        const nb = parseInt((b.match(/\d+/) || [0])[0]);
        return nb - na;  // 내림차순
      });
    } else {
      seen.set(raw, result.length);
      result.push(item);
    }
  });

  return result;
}

/**
 * text_box 내용이 question 앞부분에 중복되어 있으면 제거.
 * Gemini가 question에 임상상황 + 질문을 통째로 넣는 경우 대응.
 */
// 수정 후 (text_box를 날림 → ✅)
function cleanQuestionTextBox(item) {
  if (!item.text_box || !item.question) return item;
  const tbNorm = item.text_box.replace(/\s+/g, '');
  const qNorm  = item.question.replace(/\s+/g, '');
  // question이 text_box 내용을 포함하면 → text_box를 숨김
  if (qNorm.startsWith(tbNorm)) {
    return { ...item, text_box: null };
  }
  return item;
}

const RAW = deduplicateQuestions(RAW_SOURCE).map(cleanQuestionTextBox);

let questions  = [...RAW];
let current    = 0;
let answers    = {};
let activeYear = 'all';
let activeSubj = 'all';

// ══════════════════════════════════════════════════════════
// 학번 필터 (클릭 시 랜덤 셔플)
// ══════════════════════════════════════════════════════════
function selectYear(year) {
  activeYear = year;
  activeSubj = 'all';
  document.querySelectorAll('.year-btn').forEach(b => b.classList.toggle('active', b.dataset.year === year));
  document.getElementById('year-hint').classList.toggle('show', year !== 'all');
  applyFilters(true);
}

function selectSubject(subj) {
  activeSubj = subj;
  document.querySelectorAll('.subj-btn').forEach(b => b.classList.toggle('active', b.dataset.subj === subj));
  applyFilters(false);
}

function applyFilters(shuffle) {
  let pool = [...RAW];

  if (activeYear !== 'all') {
    pool = pool.filter(q => Array.isArray(q.year) && q.year.includes(activeYear));
  }
  if (activeSubj !== 'all') {
    pool = pool.filter(q => q.subject === activeSubj);
  }
  if (shuffle) {
    pool = pool.sort(() => Math.random() - 0.5);
  }

  questions = pool;
  current   = 0;
  answers   = {};

  buildSubjectFilter();
  updateStats();
  renderDots();
  renderQuestion();
}

// ══════════════════════════════════════════════════════════
// 단원 필터 빌드
// ══════════════════════════════════════════════════════════
function buildSubjectFilter() {
  const row = document.getElementById('subject-filter-row');
  const label = row.querySelector('.filter-label');
  row.innerHTML = '';
  row.appendChild(label);

  let pool = [...RAW];
  if (activeYear !== 'all') {
    pool = pool.filter(q => Array.isArray(q.year) && q.year.includes(activeYear));
  }
  const subjects = ['all', ...new Set(pool.map(q => q.subject || '기타').filter(Boolean))];

  subjects.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn subj-btn' + (s === activeSubj ? ' active' : '');
    btn.dataset.subj = s;
    const count = s === 'all' ? pool.length : pool.filter(q => q.subject === s).length;
    btn.textContent = (s === 'all' ? '전체' : s) + ` (${count})`;
    btn.onclick = () => selectSubject(s);
    row.appendChild(btn);
  });
}

// ══════════════════════════════════════════════════════════
// NAV DOTS
// ══════════════════════════════════════════════════════════
function renderDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot';
    dot.textContent = i + 1;
    if (i === current)       dot.classList.add('current');
    else if (answers[i])     dot.classList.add(answers[i].correct ? 'correct' : 'wrong');
    dot.onclick = () => goTo(i);
    wrap.appendChild(dot);
  });
  const activeDot = wrap.children[current];
  if (activeDot) activeDot.scrollIntoView({inline:'center', block:'nearest'});
}

// ══════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════
function updateStats() {
  const total    = questions.length;
  const answered = Object.keys(answers).length;
  const correct  = Object.values(answers).filter(a => a.correct).length;
  const wrong    = answered - correct;

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent   = wrong;
  document.getElementById('stat-rate').textContent    = answered > 0 ? Math.round(correct / answered * 100) + '%' : '—';
  document.getElementById('prog-text').textContent    = answered + ' / ' + total;
  document.getElementById('prog-pct').textContent     = Math.round(answered / total * 100) + '%';
  document.getElementById('prog-fill').style.width    = (answered / total * 100) + '%';
}

// ══════════════════════════════════════════════════════════
// RENDER QUESTION
// 렌더 순서: 문제(q-text) → 텍스트박스(text-box) → 이미지(q-images) → 선지
// ══════════════════════════════════════════════════════════
function renderQuestion() {
  const container = document.getElementById('quiz-container');
  document.getElementById('score-container').classList.add('hidden');
  container.classList.remove('hidden');

  if (questions.length === 0) {
    container.innerHTML = '<div class="q-card" style="padding:40px;text-align:center;color:var(--gray-500);">해당 조건의 문제가 없습니다.</div>';
    return;
  }

  const q        = questions[current];
  const ans      = answers[current];
  const answered = !!ans;

  // 연도 배지
  const yearStr = Array.isArray(q.year) ? q.year.join(' · ') : (q.year || '?');

  // 텍스트박스 (문제 아래)
  const tbHTML = q.text_box
    ? `<div class="text-box">${escapeHtml(q.text_box)}</div>`
    : '';

  // 이미지 (텍스트박스 아래)
  let imgHTML = '';
  if (q.images && q.images.length > 0) {
    imgHTML = '<div class="q-images">' +
      q.images.map(src => `<img src="${src}" alt="문제 이미지" onclick="openLightbox('${src}')" loading="lazy">`).join('') +
      '</div>';
  }

  // 선지
  const correctAnswers = Array.isArray(q.answer) ? q.answer : [q.answer];
  const optsHTML = (q.options || []).map((opt, i) => {
    let cls = 'opt-btn';
    if (answered) {
      if (correctAnswers.includes(i))              cls += ' correct-answer';
      else if (ans.selected === i && !ans.correct) cls += ' wrong-answer';
    }
    return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="choose(${i})">
      <span class="opt-num">${i + 1}</span>
      <span>${escapeHtml(opt)}</span>
    </button>`;
  }).join('');

  // 해설
  let explHTML = '';
  if (answered) {
    const isRight = ans.correct;
    explHTML = `
      <div class="explanation-box ${isRight ? '' : 'wrong'}">
        <div class="expl-label">${isRight ? '✓ 정답 해설' : '✗ 오답 해설'}</div>
        <div class="expl-text">${escapeHtml(q.explanation || '')}</div>
      </div>
      <div class="result-row">
        <span>${isRight ? '🎯' : '❌'}</span>
        <span class="result-msg ${isRight ? '' : 'wrong'}">${isRight ? '정답입니다!' : `오답 — 정답: ${correctAnswers.map(a => a + 1).join(', ')}번`}</span>
      </div>`;
  }

  const isFirst = current === 0;
  const isLast  = current === questions.length - 1;

  // ★ 렌더 순서: 문제 → 텍스트박스 → 이미지 → 선지
  container.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-year-badge">${escapeHtml(yearStr)}</span>
        <span class="q-subject-badge">${escapeHtml(q.subject || '기타')}</span>
        <span class="q-prof">${escapeHtml(q.professor || '')}</span>
        <span class="q-num">${current + 1} / ${questions.length}</span>
      </div>
      <div class="q-body">
        <p class="q-text">${escapeHtml(q.question || '')}</p>
        ${tbHTML}
        ${imgHTML}
        <div class="options-list">${optsHTML}</div>
      </div>
      ${explHTML}
      <div class="action-row">
        <button class="btn-nav" onclick="prevQ()" ${isFirst ? 'disabled' : ''}>← 이전</button>
        <span class="kbd-hint"><kbd>1</kbd>–<kbd>5</kbd> 선택 &nbsp;|&nbsp; <kbd>→</kbd> 다음</span>
        <button class="btn-next" onclick="nextQ()">${isLast ? '결과 보기 →' : '다음 →'}</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════
// 선택 / 이동
// ══════════════════════════════════════════════════════════
function choose(i) {
  if (answers[current]) return;
  const q = questions[current];
  const correctAnswers = Array.isArray(q.answer) ? q.answer : [q.answer];
  const correct = correctAnswers.includes(i);
  answers[current] = { selected: i, correct };
  updateStats();
  renderDots();
  renderQuestion();
}

function prevQ() {
  if (current > 0) { current--; renderQuestion(); renderDots(); scrollTop(); }
}

function nextQ() {
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
    renderDots();
    scrollTop();
  } else {
    showScore();
  }
}

function goTo(i) {
  current = i;
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  renderQuestion();
  renderDots();
  scrollTop();
}

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════════
// 키보드 단축키
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '5') {
    const idx = parseInt(e.key) - 1;
    const q = questions[current];
    if (q && q.options && idx < q.options.length && !answers[current]) choose(idx);
  }
  if (e.key === 'ArrowRight') nextQ();
  if (e.key === 'ArrowLeft')  prevQ();
});

// ══════════════════════════════════════════════════════════
// 점수 화면
// ══════════════════════════════════════════════════════════
function showScore() {
  const total   = questions.length;
  const correct = Object.values(answers).filter(a => a.correct).length;
  const wrong   = Object.values(answers).filter(a => !a.correct).length;
  const skip    = total - Object.keys(answers).length;
  const pct     = Math.round(correct / total * 100);

  let trophy = '🥇', msg = '완벽합니다!';
  if (pct < 40)       { trophy = '📚'; msg = '더 열심히 공부해봐요!'; }
  else if (pct < 60)  { trophy = '💪'; msg = '조금 더 노력이 필요해요.'; }
  else if (pct < 80)  { trophy = '👍'; msg = '잘 하고 있어요!'; }
  else if (pct < 100) { trophy = '🏆'; msg = '훌륭한 성적입니다!'; }

  document.getElementById('quiz-container').classList.add('hidden');
  const sc = document.getElementById('score-container');
  sc.classList.remove('hidden');
  sc.innerHTML = `
    <div class="score-screen">
      <div class="score-trophy">${trophy}</div>
      <h2 class="score-title">${pct}점 — ${msg}</h2>
      <p class="score-sub">총 ${total}문항 완료</p>
      <div class="score-grid">
        <div class="score-stat">
          <div class="score-stat-num">${correct}</div>
          <div class="score-stat-label">정답</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-num wrong">${wrong}</div>
          <div class="score-stat-label">오답</div>
        </div>
        <div class="score-stat">
          <div class="score-stat-num" style="color:var(--amber)">${skip}</div>
          <div class="score-stat-label">미응답</div>
        </div>
      </div>
      <button class="btn-restart" onclick="restart()">다시 풀기</button>
    </div>`;
}

function restart() {
  current = 0;
  answers = {};
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  updateStats();
  renderDots();
  renderQuestion();
  scrollTop();
}

// ══════════════════════════════════════════════════════════
// 이미지 라이트박스
// ══════════════════════════════════════════════════════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// ══════════════════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════════════════
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════════════════
buildSubjectFilter();
updateStats();
renderDots();
renderQuestion();
</script>
</body>
</html>

 문화증후군이 아닙니다."}, {"subject": "노인정신질환1", "year": ["16학번"], "professor": "한창태", "question": "노화에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["조직의 손상을 증가시키는 작용이다", "노화는 암을 촉진하는 내부 요인이다", "노화가 진행하면 휴지기에 뇌활성화가 증가한다", "텔로미어의 연장은 노화를 촉진시킨다", "정상 노인의 해마는 에너지대사가 감소해 있다."], "answer": [4], "explanation": "노화는 조직의 손상을 완화시키고 암을 억제하는 내부 안전 장치로 작용합니다. 노화가 진행되면 휴지기에 뇌활성화는 감소합니다. 텔로미어의 단축이 노화를 촉진시키는 요인입니다. 정상 노인의 경우 해마의 에너지대사가 감소해 있는 것이 관찰됩니다."}, {"subject": "노인정신질환1", "year": ["16학번"], "professor": "한창태", "question": "다음 중 노화와 관련된 변화로 옳은 것은?", "images": [], "text_box": null, "options": ["대뇌 피질에서의 수용체의 민감도가 감소한다", "도파민 수용체의 숫자가 증가한다", "아드레날린 수용체 결합이 감소한다", "휴지기의 뇌활성화가 증가한다", "뇌 피질의 두께가 증가한다"], "answer": [1], "explanation": "노화가 진행되면 대뇌 피질에서의 수용체 민감도는 증가합니다. 도파민 수용체의 수는 증가하는 경향을 보입니다. 아드레날린 수용체 결합은 증가합니다. 휴지기의 뇌활성화와 뇌 피질의 두께는 감소합니다. 따라서 도파민 수용체의 숫자가 증가한다는 설명이 가장 옳은 변화입니다."}, {"subject": "노인정신질환1", "year": ["16학번"], "professor": "한창태", "question": "노화시 약력학, 약동학 현상으로 옳은 것은?", "images": [], "text_box": null, "options": ["혈장 알부민 증가", "대사 활성 조직의 증가", "도파민 수용체 수 증가", "아드레날린 수용체 결합도 감소", "대뇌 피질에서 수용체의 민감도가 감소"], "answer": [2], "explanation": "노화가 진행되면 혈장 알부민은 감소합니다. 대사 활성 조직도 감소합니다. 도파민 수용체의 수는 증가합니다. 아드레날린 수용체 결합은 증가합니다. 대뇌 피질에서 수용체의 민감도 또한 증가합니다."}, {"subject": "노인정신질환1", "year": ["16학번"], "professor": "한창태", "question": "진단할 수 있는 병은?", "images": [], "text_box": "73 세 여성이 1년 6개월 전 남편을 잃고 그립다고 병원에 방문했다. 남편이랑 생계를 위해 운영하던 원룸 임대는 문제없이 운영하고 있고 자식들이랑 손자가 오면 힘들지만 밥을 잘 차려준다고 한다. 남편이 그립다며 울고 죄책감을 가지고 남편 물건에 집착하기도 했다. 죽음에 관한 건 티비에서 보지 못했고 간혹 가다가 본인도 남편을 따라가고 싶다고 했다.", "options": ["공황장애", "양극성장애", "기분부전장애", "주요우울장애", "지속성 복합 애도 장애"], "answer": [4], "explanation": "환자는 남편 사별 후 1년 6개월이 지났음에도 남편에 대한 그리움, 죄책감, 물건에 대한 집착, 그리고 '남편을 따라가고 싶다'는 생각 등을 지속적으로 호소하고 있습니다. 이러한 증상들이 일상생활에 영향을 미치고 있다면, 이는 정상적인 애도 반응의 기간을 넘어선 '지속성 복합 애도 장애(Persistent Complex Bereavement Disorder)'를 시사합니다. 주요우울장애도 고려할 수 있지만, 사별과 관련된 특정 증상들의 지속성을 볼 때 더 적절한 진단입니다."}, {"subject": "노인정신질환1", "year": ["16학번"], "professor": "한창태", "question": "어떤 인지기능을 검사하는 것인가?", "images": [], "text_box": "- '100-7'을 해보세요.\n-\"거기서 다시 7을 빼보세요\" (답을 말하지 않기)\n-정답에 구애받지 않고 맞춘 횟수를 따질 것.", "options": ["지남력", "기억등록", "주의집중", "시공간이해", "이해와 판단"], "answer": [2], "explanation": "'100에서 7 빼기' 검사는 지속적으로 정신적 노력을 기울여 계산하는 능력을 평가하는 대표적인 방법입니다. 이 검사는 수리 능력뿐만 아니라 주의력을 유지하고 조작하는 작업기억 기능을 측정합니다. 따라서 이 검사는 주로 주의집중과 관련된 인지 기능을 평가합니다. 산강리천삼(serial 7s) 검사와 같은 맥락입니다."}, {"subject": "노인정신질환1", "year": ["15학번"], "professor": "한창태", "question": "위 노화의 이론은?", "images": [], "text_box": "ㅇㅇㅇ은 염색체 말단부에 위치하는 5'-TTAGGG-3' 염기의 반복으로 이루어진 Single stranded DNA이다. 대부분의 체세포 (somatic cell) 경우에는 DNA polymerase가 염색체 말단의 유전정보를 복제(replication)하지 못하기 때문에 세포분열에 따라 ㅇㅇㅇ 길이가 짧아지게 되며, 일정 길이 이하로 짧아진 경우 더 이상의 세포분열이 일어나지 않는 상태로 유지되거나 세포고사(apoptosis)가 일어나게 한다. ㅇㅇㅇ를 'mitotic clock'이라고 하는데 이는 세포가 분열함에 따라 ㅇㅇㅇ 길이가 짧아지게 되므로 세포의 ㅇㅇㅇ 길이를 측정함으로써 세포의 나이를 추정할 수 있으며 수명을 예측할 수 있기 때문이다. ㅇㅇㅇ의 안정성 유지와 ㅇㅇㅇ의 기능 조절에 관한 분야는 노화에 관하여 많은 연구가 수행되고 있다.", "options": ["종말체의 손실 (telomere loss)", "예정된 노화 (programmed aging)", "체세포 돌연변이 (somatic mutation)", "후성학적 기전 (epigenetic mechanism)", "미토콘드리아의 퇴화 (mitrochondrial decline)"], "answer": [0], "explanation": "제시된 내용은 염색체 말단부의 반복 서열인 텔로미어(telomere)의 개념과 그 길이 단축이 세포 분열 및 노화에 미치는 영향을 설명하고 있습니다. 세포 분열 시 텔로미어 길이가 짧아져 일정 길이 이하가 되면 세포 분열이 멈추거나 세포자멸사(apoptosis)가 유도됩니다. 이처럼 텔로미어의 단축은 노화의 중요한 기전 중 하나인 '종말체의 손실' 이론을 설명하는 내용입니다. 이는 세포 노화의 '미토틱 클락(mitotic clock)'으로 불립니다."}, {"subject": "노인정신질환1", "year": ["15학번"], "professor": "한창태", "question": "정상 노인의 생물학적 변화로 옳은 것은?", "images": [], "text_box": null, "options": ["FSH & LH 감소한다.", "encoding 능력은 증가한다.", "IQ는 45세 이후 서서히 감소한다.", "verbal ability는 55세 이후 서서히 덜어진다.", "뇌 속의 serotonin과 monoamine oxidase 증가한다."], "answer": [4], "explanation": "정상 노화 과정에서 FSH와 LH는 증가하는 경향을 보입니다. 인코딩(encoding) 능력은 감소하며, IQ는 80세까지는 비교적 잘 유지됩니다. Verbal ability는 노화에 크게 영향을 받지 않고 비교적 잘 유지됩니다. 뇌 속의 세로토닌(serotonin)과 모노아민 산화효소(monoamine oxidase)는 노화와 함께 증가하는 경향을 보입니다."}, {"subject": "노인정신질환1", "year": ["15학번"], "professor": "한창태", "question": "노화에 따른 인지의 변화로 옳은 것은?", "images": [], "text_box": null, "options": ["지속주의력은 다른 주의력에 비해 상대적으로 노화에 민감하다.", "감각기억은 상대적으로 노화와 관련이 적다.", "노화가 진행되어도 실행기능은 잘 보존된다.", "작업기억은 30대 이후부터 지속적으로 감퇴한다.", "서술기억은 연령에 관계없이 보존된다."], "answer": [1], "explanation": "지속주의력은 다른 주의력에 비해 연령과 상관이 적습니다. 기억에서는 감각기억만이 노화와 관련이 적은 편입니다. 실행기능은 전두엽 기능으로 노화에 매우 민감하여 잘 보존되지 않습니다. 작업기억은 45세 이후부터 지속적으로 감퇴하며, 서술기억도 노화가 진행될수록 감퇴합니다."}, {"subject": "노인정신질환1", "year": ["15학번"], "professor": "한창태", "question": "사별과 애도반응에 대해 옳은 것은?", "images": [], "text_box": null, "options": ["애도는 수일, 수주 후에 공허감과 상실감, 고인에 대한 생각과 그리움이 나타난다.", "사별로 인한 주요우울장애는 생물학적 변화없이 반응적이다.", "사별로 인한 내과적 질환은 남성보다 여성에서 흔하다.", "여성의 경우 심혈관계 질환, 감염질환에 이환될 가능성이 높다.", "사별로 인한 주요우울장애는 단기적이다."], "answer": [0], "explanation": "애도 반응은 수일, 수주 후에 공허감, 상실감, 고인에 대한 생각과 그리움 등으로 나타납니다. 사별로 인한 주요우울장애는 신경생물학적 변화를 동반합니다. 사별로 인한 내과적 질환은 남성이 여성보다 흔합니다. 남성의 경우 심혈관계 질환, 감염질환 이환 가능성이 높고, 여성의 경우 간경화, 자살 위험도가 증가합니다. 주요우울장애는 치료받지 않으면 증상이 지속될 수 있습니다."}, {"subject": "노인정신질환1", "year": ["15학번"], "professor": "한창태", "question": "뇌노화에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["비치매 정상 노인에서 medial temporal lobe의 용적 감소가 두드러진다.", "심부백색질고음영의 원인은 amyloid plaque의 축적 때문이다.", "노화에 따라 신경섬유의 통합성 및 연결성 확대된다.", "뇌 전체의 부피는 줄고 피질의 두께는 늘어난다.", "휴지기에 뇌활성화가 감소된다."], "answer": [4], "explanation": "비치매 정상 노인에서는 medial temporal lobe 용적 감소가 두드러지지 않습니다. 심부백색질고음영의 원인은 미세혈관 장애 및 혈액 저류입니다. 노화에 따라 신경섬유의 통합성 및 연결성은 감소합니다. 뇌 전체의 부피와 피질의 두께는 모두 줄어듭니다. 휴지기에 뇌활성화는 노화에 따라 감소됩니다."}, {"subject": "노인정신질환1", "year": ["14학번", "12학번", "09학번", "07학번"], "professor": "고효진", "question": "노화에 따른 성격변화 중 나이에 따라 약화되는 것은?", "images": [], "text_box": null, "options": ["경직성(rigidity)", "창조성(Creativity)", "내향성(introversion)", "의존성(dependency)", "조심성(Cautiousness)"], "answer": [1], "explanation": "노화에 따라 욕구 충족 및 창조성 등의 성향은 약화되는 것으로 알려져 있습니다. 반면 경직성, 내향성, 의존성, 조심성 등은 노화와 함께 증가하는 경향을 보입니다. 따라서 창조성은 나이가 들면서 약화되는 성격 변화 중 하나입니다. 이는 노년기 심리적 변화의 특징으로 이해됩니다."}, {"subject": "노인정신질환1", "year": ["14학번"], "professor": "고효진", "question": "정상 노화과정에 따른 신체기능 변화에 대한 옳은 설명은?", "images": [], "text_box": null, "options": ["환경과 생활습관이 성공적 노화를 위한 주 요인이며 유전인자는 약 30%정도 관여한다.", "노화에 따라 심장의 최대산소소비량은 약 40%, 폐의 최대호흡량은 약 10% 감소한다.", "대뇌 norepinephrine, dopamine, serotonin, monoamine oxidase 농도가 증가한다.", "체지방 분포에 변화가 일어나며 남자는 둔부에, 여자는 복부에 지방이 잘 축적된다.", "뇌에서 변화인 노인반, 신경섬유농축체 등이 관찰되며 뇌 신경세포수가 증가한다."], "answer": [0], "explanation": "성공적 노화에는 환경과 생활습관이 주 요인으로 작용하며 유전인자는 약 30% 정도 관여합니다. 노화에 따라 폐의 최대호흡량은 40%, 심장의 최대산소소비량은 10% 감소합니다. 대뇌 norepinephrine, dopamine, serotonin은 감소하고 monoamine oxidase 농도는 증가합니다. 남자는 복부에, 여자는 둔부에 지방이 잘 축적되는 경향이 있습니다. 뇌 신경세포수는 노화에 따라 감소합니다."}, {"subject": "노인정신질환1", "year": ["14학번"], "professor": "고효진", "question": "노화에 따른 약물 약동학의 변화를 기술한 것 중 옳은 것은?", "images": [], "text_box": null, "options": ["노화에 따라 소장의 표면적이 감소하고 위의 pH가 증가하여 약물흡수는 감소한다.", "나이가 들면서 체내의 총수분량과 lean body mass가 감소하고 체지방도 감소한다.", "혈청 알부민 농도가 감소하여 대부분의 정신과 약물의 혈중 농도를 증가시킨다.", "노인은 간실질과 간 혈류량이 감소한다. 이는 약물대사에 영향을 주어 반감기가 짧아지게 하는 효과가 있다.", "신장의 무게와 신장으로 가는 혈류가 감소하면서 청소율을 떨어뜨린다."], "answer": [4], "explanation": "노화에 따라 소장의 표면적은 감소하나 위 pH는 감소하여 약물 흡수는 증가할 수 있습니다. 체내 총 수분량과 lean body mass는 감소하지만 체지방은 증가합니다. 혈청 알부민 농도가 감소하면 약물의 비결합형 농도를 증가시켜 약물 효과를 증대시킬 수 있습니다. 노인의 간실질과 간 혈류량 감소는 약물 대사를 지연시켜 반감기를 길어지게 합니다. 신장의 무게와 혈류량 감소는 약물의 청소율을 떨어뜨립니다."}, {"subject": "노인정신질환1", "year": ["13학번", "11학번", "10학번"], "professor": "임현국", "question": "69세 여자가 외출을 잘 안하자 자녀들이 우울증이 걱정된다며 정신건강의학과 외래에 함께 왔다. 1년 전부터 날짜와 요일이 헷갈려 친구들과의 모임 약속에 참석을 못하거나, 새로운 약속장소를 찾아가는 것이 두렵다고 하였다. 또한 버스를 타고 자주 다니던 딸집에 가다가 길을 헤매고 결국 다시 돌아온 길이 2번 반복되어 외출을 자제했다. 진단은?", "images": [], "text_box": null, "options": ["우울증", "불안증", "조현병", "섬망", "치매"], "answer": [4], "explanation": "환자는 1년 전부터 날짜와 요일 혼동, 약속 장소 기억 어려움, 익숙한 길을 헤매는 등의 증상을 보이고 있습니다. 이는 기억력, 지남력, 시공간 능력 등 여러 인지 영역의 저하를 시사합니다. 또한 이러한 인지기능 저하로 인해 외출을 자제하는 등 일상생활 기능 저하가 동반되고 있습니다. 이러한 양상은 우울증보다는 치매에 더 부합하는 진단입니다."}, {"subject": "노인정신질환1", "year": ["13학번"], "professor": "임현국", "question": "65세 여자가 난소암을 진단받고 완화치료를 받고 있다. 최근 종교활동을 열심히 하고, 자신의 재산을 고아원에 기부하려고 한다. 그렇게 하면 신이 자신을 저버리지 않고 자신의 딸이 결혼할 때까지 죽음을 미뤄줄 것이라고 믿었다. 환자의 심리반응은?", "images": [], "text_box": null, "options": ["부정", "분노", "타협", "우울", "수용"], "answer": [2], "explanation": "환자는 난소암 진단 후 완화 치료 중이며, '신이 딸이 결혼할 때까지 죽음을 미뤄줄 것'이라는 믿음과 함께 재산을 기부하려는 행동을 보이고 있습니다. 이는 죽음을 받아들이는 단계 중 '타협(bargaining)' 단계에 해당합니다. 퀴블러-로스(Kubler-Ross)의 죽음의 5단계(부정, 분노, 타협, 우울, 수용) 이론에서 환자가 죽음을 유예하기 위해 어떤 시도를 하는 단계로 볼 수 있습니다."}, {"subject": "노인정신질환1", "year": ["13학번"], "professor": "임현국", "question": "다음 중 노화에 의해 증가하는 신체 변화는?", "images": [], "text_box": null, "options": ["뇌 무게", "폐활량", "체지방", "성장호르몬", "사구체여과율"], "answer": [2], "explanation": "노화에 따라 뇌 무게, 폐활량, 성장호르몬, 사구체여과율은 감소하는 경향을 보입니다. 반면 체지방은 노화와 함께 증가하는 경향을 나타냅니다. 또한 위장 내 산성도 증가와 같은 변화도 관찰될 수 있습니다. 이러한 신체 변화는 노인 건강 관리에 있어 중요한 지표가 됩니다."}, {"subject": "노인정신질환1", "year": ["12학번", "08학번"], "professor": "이창욱", "question": "아래의 검사가 진단과정에 가장 도움이 될 정신질환은?", "images": [], "text_box": "(검사문항)\n1. 올해는 몇 년도 입니까?\n2. 오늘은 몇월, 며칠, 무슨 요일 입니까?\n3. 지금은 무슨 계절입니까?\n4. 당신의 주소는 _시, _구, _동, _호 입니까?\n5. 여기는 무엇을 하는 곳입니까?\n6. 제가 3가지 물건의 이름을 말해드리겠습니다. ~~\n7. 100에서 7을 빼기를 5회 반복\n8. 아까 당신에게 기억하라고 한 세가지 물건은 무엇입니까?", "options": ["현실감별력의 평가 - 정신분열병", "보기 안보임 - 양극성장에(조울병)", "인지기능의 평가 - 노인성 치매", "정신운동 감퇴의 평가 - 주요우울증"], "answer": [2], "explanation": "제시된 검사 문항들은 지남력, 기억등록, 주의집중 및 계산, 기억회상 등 다양한 인지 기능을 평가하는 문항들입니다. 이러한 문항들은 MMSE-K(Mini-Mental State Examination-Korean) 검사의 일부로, 전반적인 인지 기능을 선별적으로 평가하는 데 사용됩니다. MMSE-K는 특히 노인성 치매를 진단하고 경과를 추적하는 과정에서 중요한 역할을 합니다. 따라서 인지기능을 평가하여 노인성 치매 진단에 가장 도움이 됩니다."}, {"subject": "노인정신질환1", "year": ["11학번"], "professor": "임현국", "question": "정상적인 노화의 과정에서 감소하지 않고 유지되는 것은?", "images": [], "text_box": null, "options": ["어휘력", "성 기능", "신장 기능", "추상적 사고 능력", "감각능력(시각, 청각, 미각, 후각)"], "answer": [0], "explanation": "정상적인 노화 과정에서 어휘력(verbal ability)과 결정성 지능(crystallized intelligence)은 비교적 잘 유지되거나 오히려 향상될 수도 있습니다. 그러나 성 기능, 신장 기능, 추상적 사고 능력, 그리고 시각, 청각, 미각, 후각 등 감각 능력은 일반적으로 감소합니다. IQ 또한 특정 연령 이후에는 감소하는 경향을 보입니다."}, {"subject": "노인정신질환1", "year": ["10학번"], "professor": "고효진", "question": "노화에 따른 다음의 성격변화 중 나이에 따라 약화되는 것은?", "images": [], "text_box": null, "options": ["욕구충족 (need-achievement)", "조심성 (cautiousness)", "의존성 (dependency)", "내향성 (introversion)", "경직성 (rigidity)"], "answer": [0], "explanation": "노화가 진행됨에 따라 욕구 충족은 약화되는 경향이 있습니다. 반면 조심성, 의존성, 내향성, 경직성은 나이가 들수록 증가하는 경향을 보입니다. 이는 노년기 성격 변화의 일반적인 특징으로 알려져 있습니다. 사회적 활동 감소와 신체 능력 저하가 이러한 변화에 영향을 미칠 수 있습니다."}, {"subject": "노인정신질환1", "year": ["07학번"], "professor": "고효진", "question": "노인 환자들의 약물치료의 원칙 중 가장 적절한 것은?", "images": [], "text_box": null, "options": ["약물치료를 시작하기 전에 여러 가지 실험실 검사를 할 필요는 없다.", "노인들은 신체적 조건보다는 연령을 기준으로 용량을 조절하는 것이 좋다.", "다른 약물을 동시에 복용하는 경우가 많으므로 약물 복용 방법은 복잡한 것이 좋다.", "항콜린성 약물은 섬망이나 인지기능 감퇴를 초래할 수 있어 특별히 조심해야한다.", "대부분의 항정신성 약물은 분복보다는 한번에 복용한 것이 부작용이 덜 생긴다."], "answer": [3], "explanation": "노인 환자에게 약물치료를 시작하기 전에는 여러 실험실 검사를 통해 신체 상태를 확인해야 합니다. 약물 용량은 연령보다는 신체적 조건과 약물 반응에 따라 개별적으로 조절해야 합니다. 약물 복용 방법은 복잡하지 않고 간편해야 치료 순응도가 높습니다. 항콜린성 약물은 노인에게 섬망이나 인지기능 감퇴를 유발할 수 있어 매우 주의해야 합니다. 항정신성 약물은 부작용 감소를 위해 한번에 복용하기보다 분복하는 것이 혈중농도를 천천히 증가시켜 도움이 됩니다."}, {"subject": "노인정신질환1", "year": ["07학번"], "professor": "고효진", "question": "나이가 들면서 정상적인 노화에서 관찰되는 인지기능의 변화 중 가장 적절한 것은?", "images": [], "text_box": null, "options": ["주의력 증가", "작업 기억 증가", "언어성 지능 유지", "단기 기억력의 감퇴", "문제해결 능력 저하"], "answer": [2], "explanation": "정상 노화 과정에서 주의 집중과 경각심은 비교적 유지되지만, 주의력 배분 능력은 감퇴합니다. 작업 기억은 노화와 함께 감퇴하는 경향을 보입니다. 단기 기억력은 유지되지만 기억의 저장 능력은 감퇴합니다. 언어성 지능은 평생 동안 비교적 잘 유지됩니다. 문제 해결 능력은 노화와 함께 저하되는 경향이 있습니다."}, {"subject": "노인정신질환1", "year": ["07학번"], "professor": "고효진", "question": "청, 장년의 우울증과 비교하여 노년기 우울증에서 흔히 관찰되는 임상양상 특징으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["수면이 증가함", "체중이 증가함", "인지기능 유지함", "신체적인 호소 적음", "대뇌 백질병면 흔함"], "answer": [4], "explanation": "노년기 우울증은 멜랑콜리아 양상을 띠는 경우가 많아 수면 감소와 체중 감소가 흔합니다. 인지기능 감퇴가 더욱 빈번하게 관찰되며, 신체적 호소가 많습니다. 혈관성 우울증의 경우 대뇌 피질하 부위를 침범하는 대뇌 백질병변이 흔하게 관찰되는 것이 특징입니다. 따라서 대뇌 백질병면이 흔하다는 설명이 가장 적절합니다."}, {"subject": "노인정신질환1", "year": ["07학번"], "professor": "고효진", "question": "다음의 노화에 따른 약물약동학(pharmacokinetic)적 변화 중 가장 적절한 것은?", "images": [], "text_box": null, "options": ["체지방 증가", "내장 혈류의 증가", "체내 수분의 증가", "혈장 알부민 증가", "대사 활성 조직의 증가"], "answer": [0], "explanation": "노화에 따라 체지방은 증가하는 경향을 보입니다. 반면 내장 혈류, 체내 수분, 혈장 알부민, 대사 활성 조직은 모두 감소합니다. 이러한 약물약동학적 변화는 노인에게 약물 용량 조절 시 중요한 고려사항이 됩니다. 특히 체지방 증가는 지용성 약물의 분포 용적을 증가시켜 반감기에 영향을 줄 수 있습니다."}, {"subject": "노인정신질환1", "year": ["05학번"], "professor": "이창욱", "question": "노인 약물치료의 일반적 지침 중 잘못된 것은?", "images": [], "text_box": null, "options": ["치료 전 내과적 진찰을 철저히 해야 한다.", "자세한 병력을 통해 현재 복용하고 있는 약물의 특징과 부작용 등 과거력을 알아야 한다.", "적은 용량으로 시작해서 서서히 증량한다.", "규칙적인 약물농도 검사가 필요하다.", "가능하면 복합적인 약물투여를 하여 증상을 개선시킨다."], "answer": [4], "explanation": "노인 약물치료 시에는 치료 전 철저한 내과적 진찰과 자세한 병력 청취가 필수적입니다. 약물은 저용량으로 시작하여 서서히 증량하고, 필요한 경우 규칙적인 약물 농도 검사를 통해 안전성을 확보해야 합니다. 그러나 복합적인 약물투여(polypharmacy)는 약물 상호작용 및 부작용 위험을 높이므로, 가능하면 단일 약물 요법을 지향하거나 최소한의 약물을 사용하는 것이 원칙입니다. 따라서 복합적인 약물투여를 권장하는 것은 잘못된 지침입니다."}, {"subject": "노인정신의학2", "year": ["21학번"], "professor": "임현국", "question": "64세 남자가 기억력 저하를 주소로 내원하였다. 기억력 저하가 점차 저하되는 양상을 보이고 있으나, 환자는 혼자 지내는데 있어 별다른 어려움은 없다고 한다. 환자 선별을 위하여 시행한 간이 정신상태 검사에서는 24점 정도 체크되었다. 다음 환자에게 시행해야 하는 검사 및 처치는 무엇인가?", "images": [], "text_box": "64세 남자가 기억력 저하를 주소로 내원하였다. 기억력 저하가 점차 저하되는 양상을 보이고 있으나, 환자는 혼자 지내는데 있어 별다른 어려움은 없다고 한다. 환자 선별을 위하여 시행한 간이 정신상태 검사에서는 24점 정도 체크되었다.", "options": ["뇌 자기공명 영상 검사", "뇌파 검사", "신경 심리 검사", "아밀로이드 양전자 방출 단층 촬영", "컴퓨터 단층촬영 검사"], "answer": [2], "explanation": "경도 인지 장애의 경우, 가장 먼저 해야 할 것은 신경 심리검사와 일상생활 수행 능력 검사를 통해 객관적인 인지 장애의 증거를 인지해야 한다. 이는 인지 기능의 다양한 영역을 심층적으로 평가하는 데 필수적이다."}, {"subject": "노인정신의학2", "year": ["21학번", "20학번"], "professor": "임현국", "question": "다음은 알츠하이머병과 연관된 유전자인 APOE (Apolipoprotein E)에 대한 설명이다. 가장 적절한 것을 고르시오.", "images": [], "text_box": null, "options": ["APOE4의 경우, 만발성 알츠하이머병 뿐 아니라 가족성 알츠하이머병의 발병에도 가장 유력한 유전자이다.", "APOE4 heterogenous의 경우 APOE4 유전자가 없는 사람에 비해 약 7배의 위험도가 존재한다.", "APOE4 유전자의 경우, 알츠하이머병의 발병의 위험도는 영향이 있으나, 질병의 진행에는 연관도가 떨어진다.", "APOE2 유전자의 경우, APOE2/3 APOE2/2 이면 알츠하이머 병의 위험도는 낮아진다.", "위 항 모두"], "answer": [3], "explanation": "가족성 알츠하이머병의 발병에는 APP, PSEN 유전자가 관여한다. APOE4 heterozygous는 APOE4가 없는 사람에 비해 약 2배의 위험도가 존재한다. APOE4는 알츠하이머병 발병 및 진행 모두에 연관이 있다. APOE2 유전자의 경우 OR 0.6 가량으로 알츠하이머병의 위험도가 상대적으로 낮아진다."}, {"subject": "노인정신의학2", "year": ["21학번", "20학번"], "professor": "임현국", "question": "다음은 인지 기능 장애의 선별 검사로 많이 알려진 MMSE (Mini Mental Status Examination)에 관한 설명이다. 적절한 것을 고르시오.", "images": [], "text_box": null, "options": ["절단점 점수를 이용하면 치매의 진단이 가능하다.", "비교적 교육정도의 영향을 받지 않으므로 선별검사로 널리 활용되고 있다.", "절단점에서 이상이 없다고 하면 치매가 아닐 확률이 많다.", "검사 항목의 기억력 항목에는 즉각 기억 지연회상이 모두 포함되어 있다.", "위 항 모두"], "answer": [3], "explanation": "MMSE는 치매 진단에 직접 사용되지 않으며, 임상 병력, 종합 신경 심리 검사, 뇌영상 등 다각적인 평가가 필요하다. MMSE 점수는 교육 및 연령 모두의 영향을 받는다. 절단점에서 이상이 없더라도 치매가 발생할 수 있다. MMSE의 기억력 항목에는 즉각 기억과 지연 회상이 모두 포함되어 인지 기능의 중요한 부분을 평가한다."}, {"subject": "노인정신의학2", "year": ["21학번", "20학번"], "professor": "임현국", "question": "위 환자의 소견으로 가장 적절한 것을 고르시오.", "images": [], "text_box": "69세 여자 환자가 외출을 하지 않아 자녀들이 우울증이 걱정된다며 정신건강의학과에 외래에 함께 왔다. 1년 전부터 날짜와 요일이 헷갈려 친구들과의 모임 약속에 참석을 못하거나, 새로운 약속 장소를 찾아가는 것이 두렵다고 하였다. 또한 버스를 타고 자주 다니던 딸 집에 가다가 길을 헤매고 결국 다시 돌아온 일이 2번 반복되어 외출을 자제했다.", "options": ["위 환자의 기억력은 의미기억 장애가 삽화기억 장애보다 두드러진다.", "우울증상을 포함한 정동장애가 동반되는 경우는 드문 편이다.", "위 환자의 임상 치매 척도(Clinical Dementia Rating) 검사 점수는 2점일 가능성이 많다.", "위 환자의 경우 질환의 초기부터 망상과 환시가 동반되는 경우가 많다.", "환자의 뇌 자기공명 영상 촬영상 내측 측두엽의 위축이 있을 가능성이 많다."], "answer": [4], "explanation": "초기 알츠하이머병의 경우 삽화 기억장애가 두드러지며, 우울증상 등 정동장애 동반은 매우 흔하다. 초기 알츠하이머병에서 망상과 환시는 드물며, 임상치매척도(CDR)는 보통 0.5~1점일 가능성이 높다. 이 환자의 증상 진행 양상과 전형적인 알츠하이머병의 특징을 고려할 때, 뇌 자기공명 영상에서 내측 측두엽의 위축이 있을 가능성이 많다."}, {"subject": "노인정신의학2", "year": ["21학번"], "professor": "임현국", "question": "자기공명 영상 소견은 다음과 같다. 환자의 진단은?", "images": ["../IMG/20250424_목3-4_정신_노인정신의학2_임현국 교수님_PAD/img1.jpeg"], "text_box": "72세 여자가 기억력 저하를 주소와 조절되지 않는 배회 증상으로 내원하였다. 약 1년전부터 기억력 저하가 시작되었으며 점차 심해지는 양상을 보였다. 현재 가족들의 도움 없이는 약속 지키기, 대중교통 이용하기 등의 일상생활을 하기 어려운 상태이며 행동 문제도 두드러져 낮에 자고 밤에 일어나 배회하는 등의 증상이 심해지는 양상을 보였다. 아울러 밤에 호랑이가 다니고 있다는 등의 환시를 주로 많이 호소하는 현상이 있으며, 가벼운 손떨림 증상이 있다. 이러한 배회 및 환시 등의 증상을 조절하기 위해 리스페리돈 0.5mg을 취침전에 투약하였으나, 환자는 손떨림 증상이 심해지는 양상을 보이고 있다.", "options": ["경도인지 장애", "루이소체 치매", "알츠하이머병 치매", "피질하 경색 혈관성 치매", "행동변이 전두측두 치매"], "answer": [1], "explanation": "이 환자는 기억력 저하 외에도 조절되지 않는 배회, 환시, 가벼운 손떨림 증상을 호소하며, 리스페리돈 투약 후 손떨림 증상이 심해졌다. 이러한 증상들, 특히 환시와 파킨슨 증후군은 루이소체 치매의 특징적인 소견이다. 항정신병약물에 대한 민감성 증가도 루이소체 치매에서 흔히 관찰되므로, 루이소체 치매로 진단하는 것이 가장 적절하다."}, {"subject": "노인정신의학2", "year": ["20학번", "18학번", "17학번", "14학번"], "professor": "임현국", "question": "이 환자의 진단으로 옳은 것은?", "images": ["../IMG/20250424_목3-4_정신_노인정신의학2_임현국 교수님_PAD/img2.jpeg"], "text_box": "72세 여자가 딸과 함께 내원하였다. 두부 외상 과거력이나 정신건강의학과 내원한 기왕력은 없었다. 3년 전부터 서서히 기억력이 저하되어 자주 가스불을 켜놓고 끄지 않거나 화장실 변기의 물을 내리는 것을 잊어버리기 시작했다. 1년 전부터는 날짜와 요일을 까먹어 친구들과의 모임에 가지 못하였다. 버스를 타고 자주 다니던 딸 집에 가는 도중에 길을 잊고 돌아오는 것이 2번 반복되면서 외출을 하지 않게 되었다. 환자의 검사결과는 다음과 같다.\nBrain MRI: diffuse brain atrophy, hippocampal atrophy\nApolipoprotein E3/E4", "options": ["루이소체 치매", "다발성 경화 치매", "알츠하이머 치매", "전두측두 치매", "알코올성 치매"], "answer": [2], "explanation": "기억력 저하가 주호소 증상이며, 기억력을 담당하는 해마의 위축이 뇌 자기공명 영상에서 나타납니다. 또한 APOE3/E4 유전자형은 알츠하이머병에 대한 취약성을 증가시키는 요인입니다. 이러한 임상적, 영상학적, 유전학적 소견을 종합할 때 알츠하이머성 치매로 진단할 수 있습니다."}, {"subject": "노인정신의학2", "year": ["20학번"], "professor": "임현국", "question": "70세 남자가 기억력이 점점 저하되는 양상을 보였으나 일상생활에는 무리가 없었다. 간이정신상태검사는 24점이었다. 필요한 검사나 조치는?", "images": [], "text_box": "70세 남자가 기억력이 점점 저하되는 양상을 보였으나 일상생활에는 무리가 없었다. 간이정신상태검사는 24점이었다.", "options": ["뇌파검사", "신경정신검사", "MRI", "CT", "베타아밀로이드 양전자방출검사"], "answer": [1], "explanation": "알츠하이머의 진단은 임상진단 후 신경심리검사, 영상 및 바이오마커 검사의 순서로 진행한다. 간이정신상태검사(MMSE)로 임상진단에 해당하는 선별검사를 진행하였으므로, 이후 신경심리검사 총집을 진행하여 인지 기능의 다양한 영역을 심층적으로 평가해야 한다."}, {"subject": "노인정신의학2", "year": ["19학번"], "professor": "임현국", "question": "Apolipoprotein E(APO E)에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["APO E3은 가족성 알츠하이머병의 예후와 연관도가 높다.", "APO E4 heterozygous는 APO E4가 없는 사람에 비해 약 30배의 위험도가 존재한다.", "APO E4는 알츠하이머병 발병 위험도와는 연관이 있으나, 질병의 진행에는 연관도가 떨어진다.", "APO E4는 만발성 알츠하이머병 뿐 아니라 가족성 알츠하이머 발병에도 가장 중요한 유전자이다.", "APO E2는 APO E2/3, APO E2/2이면 알츠하이머병의 위험도가 낮아진다."], "answer": [4], "explanation": "APOE E3은 원발성 알츠하이머병의 예후와 연관도가 높으며, 가족성 알츠하이머병 발병에는 APP, PSEN 유전자가 더 중요하다. APOE E4 heterozygous는 APOE4가 없는 사람에 비해 약 2~3배의 위험도가 존재한다. APOE E4는 알츠하이머병 발병 위험도와 질병의 진행 모두에 연관이 있다. APOE E2는 알츠하이머병에 대한 보호 인자로, APOE2/3이나 APOE2/2 유전자형의 경우 알츠하이머병의 위험도가 낮아진다."}, {"subject": "노인정신의학2", "year": ["19학번", "18학번"], "professor": "임현국", "question": "이 환자의 경과로 옳은 것은?", "images": [], "text_box": "69세 여자 환자가 외출을 하지 않아 자녀들이 우울증이 걱정된다며 정신건강의학과에 함께 방문했다. 1년 전부터 날짜와 요일을 까먹어 친구들과의 모임 약속에 참석을 못하거나, 새로운 약속장소를 찾아가는 것이 두렵다고 하였다. 버스를 타고 자주 다니던 딸 집에 가는 도중에 길을 잃고 다시 돌아오는 것이 2번 반복되면서 외출을 하지 않게 되었다.", "options": ["우울증상을 포함한 정동장애가 동반되는 경우는 드물다.", "질환의 초기부터 망상과 환각이 동반되는 경우가 많다.", "기억력은 의미기억 장애보다 삽화기억 장애가 두드러진다.", "MRI 소견 상 내측 측두엽의 위축이 있을 가능성이 많다.", "임상치매척도 (CDR)는 2점일 가능성이 높다."], "answer": [3], "explanation": "우울증상을 포함한 정동장애는 초기 알츠하이머병 환자에서 흔히 동반된다. 질환 초기부터 망상과 환각이 동반되는 경우는 드물다. 초기 알츠하이머병의 경우 삽화 기억장애가 의미기억 장애보다 두드러진다. 환자의 증상 진행을 고려할 때, MRI 소견상 내측 측두엽의 위축이 있을 가능성이 많다. 임상치매척도(CDR)는 보통 0.5~1점일 가능성이 높다."}, {"subject": "노인정신의학2", "year": ["19학번"], "professor": "임현국", "question": "GABA계에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["대부분의 항불안제와 항경련제가 GABA계를 억제한다.", "GABA A와 GABA C는 G 단백질과 연관되어 있다.", "GABA A 수용체 중간에 Ca2+의 통로가 있다.", "Flumazenil은 benzodiazepine 수용체의 길항제로서 benzodiazepine 과량독성을 치료하기 위해 사용한다.", "GABA는 대부분 꼬리핵(caudate nucleus), 흑질(substantia nigra), 대뇌 피질(cortex)에서 담창구(globus pallidus), 조가비핵(putamen)으로 전사한다."], "answer": [3], "explanation": "대부분의 항불안제와 항경련제는 GABA계를 억제하는 것이 아니라 GABA의 작용을 강화한다. GABA A와 GABA C 수용체는 G 단백질과 직접 연관되어 있지 않으며, GABA A 수용체 중간에는 염소(Cl-) 이온 통로가 있다. Flumazenil은 벤조디아제핀 수용체의 길항제로 벤조디아제핀 과량독성을 치료하는 데 사용된다. GABA는 중추신경계의 주요 억제성 신경전달물질이며, 꼬리핵, 흑질, 대뇌 피질 등 다양한 뇌 영역에 분포한다."}, {"subject": "노인정신의학2", "year": ["19학번"], "professor": "임현국", "question": "기억과 관련된 신경 시스템에 관한 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["아세틸콜린 경로는 전뇌 기저핵에서 기시한다.", "Benztropine의 경우 인지기능 향상에 어느 정도 효과가 있다.", "아세틸콜린 수용체 중 muscarinic receptor가 기억과 연관이 있다.", "치매 치료제인 메만틴(Memantine)은 억제성 신경전달물질인 글루타메이트 길항제이다.", "항정신병약물의 경우 도파민 경로 차단으로 인한 아세틸 콜린 기능이 항진되어 인지 기능에 어느 정도 도움이 된다."], "answer": [0], "explanation": "아세틸콜린 경로는 기억과 학습에 중요한 역할을 하며 전뇌 기저핵에서 기시한다. Benztropine은 항콜린성 약물로 인지기능을 저하시킬 수 있다. 아세틸콜린 수용체 중 니코틴성 및 무스카린성 수용체 모두 기억과 연관이 있다. 치매 치료제인 메만틴은 흥분성 신경전달물질인 글루타메이트의 NMDA 수용체 길항제로 작용한다. 항정신병 약물은 도파민을 차단하여 아세틸콜린 기능을 억제할 수 있어 인지 기능에 부정적인 영향을 줄 수 있다."}, {"subject": "노인정신의학2", "year": ["18학번"], "professor": "임현국", "question": "MMSE (Mini Mental Status Examination)에 관한 설명 중 적절한 것은?", "images": [], "text_box": null, "options": ["절단점 점수를 이용하면 치매의 진단이 가능하다.", "비교적 교육정도의 영향을 받지 않으므로 선별검사로 널리 활용되고 있다.", "절단점에서 이상이 없다고 하면 치매가 아닐 확률이 높다.", "검사 항목의 기억력 항목에는 즉각 기억 자연회상이 모두 포함되어 있다.", "위항 모두"], "answer": [3], "explanation": "MMSE는 치매 진단 도구가 아니라 인지 기능 저하를 선별하는 검사이다. 무학 환자의 경우 점수가 낮게 나올 수 있어 교육 수준의 영향을 받으며, 정상 점수라도 치매 가능성을 배제할 수 없다. MMSE의 기억력 항목에는 즉각 기억과 지연 회상이 모두 포함되어 있어, 인지 기능의 중요한 부분을 평가한다."}, {"subject": "노인정신의학2", "year": ["18학번"], "professor": "임현국", "question": "APOE 유전자에 관한 설명으로 맞는 것은?", "images": [], "text_box": null, "options": ["APOE4는 만발성 분만 아니라 가족성 알츠하이머에도 영향을 준다.", "APOE4 heterogeneity는 APOE4 없을 경우보다 발병이 약 7배 위험하다.", "APOE4는 발병위험에 영향을 주지만 이후 경과에는 영향이 없다.", "APOE2는 보호인자이므로 APOE2/3, APOE2/2는 알츠하이머 발병의 위험이 낮다.", "위 모두 정답이다."], "answer": [3], "explanation": "APOE4는 주로 만발성 알츠하이머병의 유전적 위험인자이며, 가족성 알츠하이머병에는 APP, PSEN 유전자가 더 중요하다. APOE4 heterozygous는 APOE4가 없는 사람에 비해 약 2~3배의 발병 위험도를 갖는다. APOE4는 발병 위험뿐만 아니라 질병의 경과에도 영향을 미치며, 질병 진행 속도를 가속화할 수 있다. APOE2는 알츠하이머병에 대한 보호 인자로 작용하여, APOE2/3이나 APOE2/2 유전자형은 발병 위험을 낮춘다."}, {"subject": "노인정신의학2", "year": ["16학번", "15학번", "14학번"], "professor": "이창욱", "question": "미국 국립노화연구소와 알츠하이머협회(National institute on aging and Alzheimer's Association : NIA-AA) 작업 그룹이 발표한 알츠하이머병 진단 기준에 반영되는 생체표지자(biomarker)는?", "images": [], "text_box": null, "options": ["에스트로겐 감소", "뇌 자기공명영상(MRI)상 내측 측두엽 감소 / 아밀로이드 베타", "타우단백으로 형성된 신경섬유농축체 축적", "피질 하 혈관성 경색", "양전자방출 컴퓨터단층촬영기(PET)로 촬영한 영상에서 기저핵 도파민 활성도 감소"], "answer": [1], "explanation": "2011년에 개정된 NIA-AA 알츠하이머병 진단 기준에는 아밀로이드 베타 축적 바이오마커와 신경세포 손상 바이오마커가 포함된다. 아밀로이드 베타 축적은 PET 상 양성 소견이나 뇌척수액의 Aβ42 농도 감소로 확인된다. 신경세포 손상은 뇌 FDG-PET 상 측두엽 및 두정엽 대사 감소나 MRI 상 내측 측두엽 위축(MTA) 등으로 평가된다. 따라서 내측 측두엽 감소와 아밀로이드 베타는 중요한 생체표지자이다."}, {"subject": "노인정신의학2", "year": ["16학번", "15학번", "13학번", "12학번"], "professor": "임현국", "question": "72세 여자가 딸과 함께 정신건강의학과 외래에 왔다. 두부외상 과거력이나 정신건강의학과에 내원한 기왕력 없었다. 3년 전부터 서서히 기억력이 저하되어 자꾸 가스불을 켜놓고 끄지 않거나 화장실 변기에 물을 내리는 것을 잊어버리기 시작했다. 최근에는 전날 있었던 일들을 잊어버리고 이야기를 해줘도 기억을 못했다. 몇 개월 전부터 며느리가 집을 비우면 들어와서 옷, 화장품, 음식 등을 훔쳐간다며 집 밖에 외출을 나가기를 꺼렸다. 본인은 아무런 증상이 없다고 하였다. 뇌자기공명영상촬영 결과와 유전자 검사 결과는 아래와 같다. 진단은?", "images": ["../IMG/20250424_목3-4_정신_노인정신의학2_임현국 교수님_PAD/img4.png"], "text_box": "72세 여자가 딸과 함께 정신건강의학과 외래에 왔다. 두부외상 과거력이나 정신건강의학과에 내원한 기왕력 없었다. 3년 전부터 서서히 기억력이 저하되어 자꾸 가스불을 켜놓고 끄지 않거나 화장실 변기의 물을 내리는 것을 잊어버리기 시작했다. 최근에는 전날 있었던 일들을 잊어버리고 이야기를 해줘도 기억을 못했다. 몇 개월 전부터 며느리가 집을 비우면 들어와서 옷, 화장품, 음식 등을 훔쳐간다며 집 밖에 외출을 나가기를 꺼렸다. 본인은 아무런 증상이 없다고 하였다. 뇌자기공명영상촬영 결과와 유전자 검사 결과는 아래와 같다.\nbrain MRI: diffuse brain atrophy, hippocampal atrophy\nApolipoprotein E3/E4", "options": ["알츠하이머 치매", "혈관성 치매", "루이체 치매", "전두측두 치매", "알코올성 치매"], "answer": [0], "explanation": "알츠하이머병은 기억력 저하가 서서히 나타나며, 질병 경과 중 망상이나 환각 등의 정신병적 증상이 나타날 수 있다. 뇌 MRI 소견에서 diffuse brain atrophy와 hippocampal atrophy는 알츠하이머병의 전형적인 소견이다. Apolipoprotein E3/E4 유전자형은 알츠하이머병의 위험인자로 알려져 있다. 따라서 이 환자의 진단은 알츠하이머 치매이다."}, {"subject": "노인정신의학2", "year": ["16학번"], "professor": "임현국", "question": "69세 여자 환자가 외출을 하지 않아 자녀들이 우울증이 걱정된다며 정신건강의학과에 함께 방문했다. 1년 전부터 날짜와 요일을 까먹어 친구들과의 모임 약속에 참석을 못하거나, 새로운 약속장소를 찾아가는 것이 두렵다고 하였다. 버스를 타고 자주 다니던 딸 집에 가는 도중에 길을 잊고 다시 돌아오는 것이 2번 반복되면서 외출을 하지 않게 되었다. 이 환자의 경과로 옳은 것은?", "images": [], "text_box": "69세 여자 환자가 외출을 하지 않아 자녀들이 우울증이 걱정된다며 정신건강의학과에 함께 방문했다. 1년 전부터 날짜와 요일을 까먹어 친구들과의 모임 약속에 참석을 못하거나, 새로운 약속장소를 찾아가는 것이 두렵다고 하였다. 버스를 타고 자주 다니던 딸 집에 가는 도중에 길을 잊고 다시 돌아오는 것이 2번 반복되면서 외출을 하지 않게 되었다.", "options": ["우울증상을 포함한 정동장애가 동반되는 경우는 드물다.", "질환의 초기부터 망상과 환각이 동반되는 경우가 많다.", "기억력은 의미기억 장애보다 삽화기억 장애가 두드러진다.", "MRI 소견상 내측 측두엽의 위축이 있을 가능성이 많다.", "임상치매척도(CDR)는 2점일 가능성이 높다."], "answer": [3], "explanation": "우울증상을 포함한 정동장애는 초기 알츠하이머병 환자에서 흔히 동반된다. 질환 초기부터 망상과 환각이 동반되는 경우는 드물다. 초기 알츠하이머병의 경우 삽화 기억장애가 의미기억 장애보다 두드러진다. 환자의 증상 진행을 고려할 때, MRI 소견상 내측 측두엽의 위축이 있을 가능성이 많다. 임상치매척도(CDR)는 보통 0.5~1점일 가능성이 높다."}, {"subject": "노인정신의학2", "year": ["16학번", "15학번"], "professor": "주수현", "question": "67세 고혈압, 당뇨병을 가지고 있는 남자가 1년 전 뇌경색을 겪은 이후 급격하게 인지기능이 저하되었다. 이후에도 흡연을 지속하고 있으며 고혈압, 당뇨약 복용을 소홀히 하고 있었다. 최근에는 기억력, 주위집중력, 일상생활능력에 저하가 심해졌다. 내원하여 시행한 brain MRI 는 아래와 같다. 다음 중 이 환자의 예상되는 병의 경과는?", "images": ["../IMG/20250424_목3-4_정신_노인정신의학2_임현국 교수님_PAD/img5.jpeg"], "text_box": "67세 고혈압, 당뇨병을 가지고 있는 남자가 1년 전 뇌경색을 겪은 이후 급격하게 인지기능이 저하되었다. 이후에도 흡연을 지속하고 있으며 고혈압, 당뇨약 복용을 소홀히 하고 있었다. 최근에는 기억력, 주위집중력, 일상생활능력에 저하가 심해졌다. 내원하여 시행한 brain MRI 는 아래와 같다.", "options": ["①", "②", "③", "④", "⑤"], "answer": [1], "explanation": "이 환자는 고혈압, 당뇨병 및 흡연력과 같은 혈관성 위험인자를 가지고 있으며, 뇌경색 이후 인지기능이 급격히 저하되었다. 제시된 뇌 MRI 영상은 다발성 혈관성 병변을 시사하며, 인지기능 곡선은 계단식 악화를 보인다. 이는 다발성 경색 치매의 전형적인 경과로, 뇌경색 발생 시마다 인지기능이 급격히 저하되고 이후 회복 없이 유지되는 양상을 나타낸다."}, {"subject": "노인정신의학2", "year": ["13학번"], "professor": "주수현", "question": "69세 남자가 갑자기 발생한 혼돈증상을 호소하며 정신건강의학과 외래를 내원했다. 1달 전과 1주일전에 갑자기 낮에 횡설수설하고 낮인지 밤인지 구분을 못하는 일이 발생했으나 다음날 기억을 하지 못하고 다시 원래대로 돌아오는 일이 있었다. 또한 생생한 환시가 낮이나 밤 상관없이 수시로 보였다. 병력 청취 결과 1년전부터 기억력, 집중력이 저하되어 서서히 심해졌으며 밤에 잠을 자다가 소리를 지르거나 허공에 대고 주먹을 휘두르는 일이 있어 개인정신 건강의학과에 내원하여 렘수면장애를 진단받고 약물을 복용중이었다. 신체검사에서 관절 경직, 구부정한 자세가 관찰되었다. 가장 의심이 가는 진단은?", "images": [], "text_box": "69세 남자가 갑자기 발생한 혼돈증상을 호소하며 정신건강의학과 외래를 내원했다. 1달 전과 1주일전에 갑자기 낮에 횡설수설하고 낮인지 밤인지 구분을 못하는 일이 발생했으나 다음날 기억을 하지 못하고 다시 원래대로 돌아오는 일이 있었다. 또한 생생한 환시가 낮이나 밤 상관없이 수시로 보였다. 병력 청취 결과 1년전부터 기억력, 집중력이 저하되어 서서히 심해졌으며 밤에 잠을 자다가 소리를 지르거나 허공에 대고 주먹을 휘두르는 일이 있어 개인정신 건강의학과에 내원하여 렘수면장애를 진단받고 약물을 복용중이었다. 신체검사에서 관절 경직, 구부정한 자세가 관찰되었다.", "options": ["혈관성 치매", "알콜성 치매", "전두측두 치매", "루이소체 치매", "알츠하이머 치매"], "answer": [3], "explanation": "루이소체 치매는 의식 변동, 환시 및 파킨슨 증후군을 특징으로 하는 진행성 신경퇴행 질환이다. 이 환자는 기억력 저하와 함께 혼돈 증상, 생생한 환시, 렘수면 행동장애, 관절 경직, 구부정한 자세를 보이고 있다. 이러한 증상들은 루이소체 치매의 핵심 및 시사 증상에 해당한다. 특히 렘수면 행동장애와 파킨슨 증후군은 루이소체 치매의 중요한 진단적 특징이다."}, {"subject": "물질관련장애", "year": ["21학번", "20학번"], "professor": "이승엽", "question": "환자의 상태로 가장 올바른 해석은?", "images": [], "text_box": "66세 중졸 남성이 기억력 저하로 자녀들의 권유로 내원하였다. 인지선별검사 (K-MMSE)에서는 26점이 나왔으며, 평소 혼자 지내서 정확한 양은 모르나 술을 자주 마시는 것 같다고 자녀가 보고하여 시행한 알코올사용장애 선별검사(AUDIT)에서 10점이 나왔다.", "options": ["정상", "위험음주 시사", "알코올사용장애 시사", "알코올성 경도인지장애 시사", "알코올성치매 시사"], "answer": [2], "explanation": "AUDIT의 해석에서 65세 이상의 노인은 여성의 기준을 따른다."}, {"subject": "물질관련장애", "year": ["20학번"], "professor": "이승엽", "question": "조치는?", "images": [], "text_box": "56세 남자가 의식을 잃은 채로 병원에 왔다. 위생상태가 불량하고 알코올 냄새가 났다.혈압은 150/95 mmHg, 맥박 110회/분,호흡 20회/분,체온 37.8였다.실험실 검사는 다음과 같았다.백혈구 10,000/mm3, 혈소판 160,000/mm3, CRP 1.0mg/dL, glucose 78mg/dL, BUN 21mg/dL, Cr. 1.01 mg/dL, AST 380U/L, ALT 100 U/L, SpO2 98%, pH 7.80", "options": ["glucose 투여", "sodium bicarbonate 투여", "chlordiazepoxide 투여", "ceftriaxone 투여", "Naloxone 투여"], "answer": [2], "explanation": "알코올 금단 섬망이 의심되는 환자로 제독치료가 필요하며, benzodiazepine을 투여한다."}, {"subject": "물질관련장애", "year": ["19학번"], "professor": "이승엽", "question": "음주를 할 때 불쾌감을 느끼게 하는 방식으로 음주에 거부감을 갖게 하는 알코올의존증상 치료제는?", "images": [], "text_box": null, "options": ["Acamprosate", "Disulfiram", "Escitalopram", "Naltrexone", "Varenicline"], "answer": [1], "explanation": "Disulfiram이 acetaldehyde의 가파른 상승을 통해 음주를 할 경우 심한 불쾌감을 느끼게 한다고 했죠?"}, {"subject": "물질관련장애", "year": ["19학번", "18학번", "17학번"], "professor": "이승엽", "question": "우선적인 처치는?", "images": [], "text_box": "68세남자가 잘 걷지 못해 내원하였다. 음주는 소주를 하루 3 병 정도 마신다고 하였고 비틀거리며 1 달 전부터 사실과 다른 아이기를 하며 우기는 모습을 보였다. 혈압은 120/70mmHg, 맥박수는 분당 80bpm, 체온은 37.2 도였고 실험실 검사에서 WBC 7010g/ul, Na/K/CI 136/3.6/99, 혈당은 85mg/dL이다.", "options": ["근전도", "로라제팜(lorazepam)", "칼륨(potassium)", "티아민(thiamine)", "포도당"], "answer": [3], "explanation": "사실과 다른 이야기를 하며 우기는 것은 작화증 같고, Ataxia(실조)가 생겨 잘 걷지 못하는 모습을 보입니다. 이는 베르니케 뇌병증으로 보입니다. 환자의 Thiamine을 비경구로 넣으라고 하였습니다."}, {"subject": "물질관련장애", "year": ["19학번"], "professor": "이승엽", "question": "약물 치료제는?", "images": [], "text_box": "흡연자 41세 여자가 금연을 하고 싶다며 자발적으로 정신건강의학과에 내원하였다.뇌전증 및 위궤양으로 치료받고 있으며 금연 치료를 받은 적은 없었다.", "options": ["니코틴 껌", "니코틴 패치", "부프로피온(bupropion)", "아리피프라졸(aripiprazole)", "복구 X"], "answer": [1], "explanation": "금연 치료제는 니코틴 껌,니코틴 패치,부프로피온이다. 환자가 뇌전증을 앓고 있으므로 경련성 질환,심각한 두부 손상,간질환에 금기인 부프로피온(bupropion)은 사용하면 안되고,위염,소화성 궤양을 악화시킬 수 있는 니코틴 껌도 투약하면 안 된다.따라서,니코틴 패치를 투여해야 한다."}, {"subject": "물질관련장애", "year": ["18학번"], "professor": "이승엽", "question": "우리나라에서 평생 유병률이 가장 높은 질환은?", "images": [], "text_box": null, "options": ["조현병", "공황장애", "알코올 중독", "담배 중독", "주요우울장애"], "answer": [2], "explanation": "우리나라에서 모든 정신질환 중 유병률이 제일 높은 것은 알코올 중독이었습니다."}, {"subject": "물질관련장애", "year": ["18학번"], "professor": "이승엽", "question": "치료는??", "images": [], "text_box": "55세 남자가 조절되지 않는 음주로 내원했다. 술은 5년전부터 매일 2병씩 마셨고, 폐암을 진단받고 1년전부터 금연을 했다. 이후 마약성 진통제를 복용했는데 통증개선이 안되고 불안해서 다시 하루에 한 병씩 음주를 시작했다.", "options": ["acamprosate", "duloxetine", "disulfiram", "venlafaxine", "naltrexone"], "answer": [0], "explanation": "통증개선이 안되고 불안한 것은 negative reinforcement에 해당하고, 음주의 음성강화 차단 anti-craving agent는 acamprosate 입니다."}, {"subject": "물질관련장애", "year": ["18학번"], "professor": "이승엽", "question": "다음 중 CAGE검사에 해당되는 항목으로 올바른 것은?", "images": [], "text_box": "CAGE검사는 알코올문제 선별을 위한 4문항으로 구성된 매우 간단한 평가로, 2개 이상 양성이 나오면 알코올 사용장애에 대하여 추가 조사를 요한다.", "options": ["Craving", "Annoyed", "Abstinence", "Guild", "Excessive use"], "answer": [1], "explanation": "CAGE의 항목은 C(cut: 줄여보려고 노력해봤는지), Annoyed(술로 인해서 주위의 비난을 받은 적 있는지), Guilty(술 때문에 죄책감을 느낀 적이 있었는지), Eye open(눈 뜨자마자 술을 마셨는지) 입니다."}, {"subject": "물질관련장애", "year": ["18학번"], "professor": "이승엽", "question": "연우의 부모가 의도하는 바에 해당하는 이론으로 옳은 것은?", "images": [], "text_box": "연우는 정상적 발달을 하고 있는 6세 남아이다. 연우가 잘 하는 일이 있을 때 마다 연우의 부 모님은 칭찬 스티커를 하나씩 붙여 주고 칭찬 스티커가 5개가 되면 연우가 좋아하는 과자를 사주기로 하였다.", "options": ["부정적 강화에 해당한다.", "고전적 조건화에 해당한다,", "조작적 조건화에 해당한다.", "반두라(Bandura)에 의해 주장된 이론이다.", "11개월 소년에게 쥐와 큰 쇠막대기 소리를 연계시킴으로써 이전에는 무서워하지 않던 쥐에 대해 소년이 공포반응을 보이도록 학습시킨 경우와 같은 조건화 이론에 해당한다."], "answer": [2], "explanation": "행동이 보상에 의해서 강화되는 것은 조작적 조건화입니다."}, {"subject": "물질관련장애", "year": ["17학번"], "professor": "이승엽", "question": "알코올의 양성강화 효과를 차단함으로써 치료하는 약물은?", "images": [], "text_box": null, "options": ["naltrexone", "disulfiram", "acamprosate", "fluoxetine", "ondansetron"], "answer": [0], "explanation": "Acamprosate와 Naltrexone 중 양성강화 효과를 차단하는 것은 naltrexone이었습니다."}, {"subject": "물질관련장애", "year": ["16학번"], "professor": "이해국", "question": "이 환자에게 추가적으로 필요한검사는?", "images": [], "text_box": "전립선 수술로 입원한 환자가 수술 다음날부터 몸이 가렵다고 소리침. 시간과 장소를 구별못하고 몸이 떨리는 모습을 보임. 검사 결과 혈압 152/90mm Hg, 맥박 110 회/분, 체온 38.1°C.WBC 는 9005× 103/uL, CRP 는 0.35mg/dL, YGTP 는 120 IU/L 였다.", "options": ["뇌파", "요도경", "음주력 검사", "암모니아 검사", "복부 CT"], "answer": [2], "explanation": "갑자기 고열이 나고, 혈압이 오르고, 심박수가 증가하고, 환각(환청, 환시, 환촉)을 느끼는 것으로 금단섬망이 있습니다. 장기간 알코올에 의존하던 사람이 갑자기 술을 끊으면, 2~3일 정도 후에 나타나는 질환입니다."}, {"subject": "물질관련장애", "year": ["16학번"], "professor": "이해국", "question": "알코올의 음성강화 효과를 차단함으로써 음주갈망을 줄이는 기전을 통해 알코올사용장애를 치료하는 약물은?", "images": [], "text_box": null, "options": ["Disulfiram", "Naltrexone", "Acamprosate", "Fluoxetine", "Odansetron"], "answer": [2], "explanation": "양성증상은 naltrexone, 음성증상은 acamprosate"}, {"subject": "물질관련장애", "year": ["15학번"], "professor": "김대진", "question": "물질사용장애와 관련된 뇌의 보상회로에서 물질로 인해 발생하는 쾌감 및 동기와 관련된 신경전달물질은?", "images": [], "text_box": null, "options": ["니코틴 (Nicotine)", "도파민 (Dopamine)", "세로토닌 (Serotonin)", "아세틸콜린(Acetylcholine)", "노르에피네프린(Norepinephrine)"], "answer": [1], "explanation": "중뇌피질 변연계 도파민성회로는 쾌감과 관계 된다고 생각하였다."}, {"subject": "물질관련장애", "year": ["15학번"], "professor": "김대진", "question": "알코올 사용장애 선별검사인 CAGE 검사의 항목인 것은?", "images": [], "text_box": null, "options": ["술 때문에 가족과 다툼이 있습니까?", "술을 마시는 날은 몇 잔 정도 마십니까?", "음주에 대한 죄의식을 느낍니까?", "음주 때문에 자신이나 다른 사람이 다친 적이 있습니까?", "음주 한 다음날 기억이 나지 않은 적이 있습니까?"], "answer": [2], "explanation": "CAGE 검사 항목에는 다음 4가지가 있었습니다. Cut: 술을 끊으려고 노력해본 적이 있는지(현 상황이 문제임을 자각), Annoyed: 술로 인해서 사람들의 짜증을 받은 적이 있는지, Guilty: 술 때문에 죄책감을 느낀 적이 있는지, Eyeopener: 눈 뜨자마자 술을 마셨는지 입니다."}, {"subject": "물질관련장애", "year": ["14학번"], "professor": "이해국", "question": "우선 투여해야할 약물은?", "images": [], "text_box": "3일 전 교통사고로 정형외과에 입원한 50세 남자가 수면을 취하지 못하고 진땀을 흘리며, 몸 위로 벌레가 지나간다며 하루종일 온 몸을 긁는 증상으로 정신과에 의뢰되었다. 지난 5년간 매일 소주를 2병씩 마셔온 기왕력이 있었다. 혈압은 130/180mmHg, 맥박수는 분당 130회였으며, 이곳이 어디냐는 질문에 식당이라고 대답하였다.", "options": ["아캄프로세이드(acamprosate)", "바레니클린(varenicline)", "티아민 (thiamine)", "날트렉손(naltrexone)", "로라제팜(lorazempam)"], "answer": [4], "explanation": "전형적인 알코올 금단 증상의 증례입니다. Anti-convulsant 인 lorazepam이나 diazepam을 투여합니다."}, {"subject": "물질관련장애", "year": ["14학번"], "professor": "이해국", "question": "다음 중 이 환자의 동기강화 치료 단계는?", "images": [], "text_box": "중년의 남자가 최근 이렇게 술을 많이 마시면 안되겠다는 생각을 가지고 치료를 받기 위해 보호자와 함께 내원하였다.", "options": ["전숙고 단계", "숙고 단계", "준비 단계", "행동 단계", "유지 단계"], "answer": [2], "explanation": "술을 끊기 위한 도움을 찾아 병원에 나타나면 준비단계입니다. 숙고단계에서 주로 질질 끌려(?) 나타난다면, 준비단계에서는 보호자와 함께 옵니다."}, {"subject": "물질관련장애", "year": ["14학번"], "professor": "이해국", "question": "중독환자의 변화 5 단계중 어느단계인가??", "images": [], "text_box": "가족의 권유로 60 세 남자가 알콜의존 치료를 위해 내원하였다. 최근 간경화를 진단받고 본인의 알콜중독 상태가 심각하다는건 인지하고 있지만, 한편으로는 친구들과 만나 어울리기 위해선 어느정도의음주는 필요하다고 주장한다.", "options": ["숙고전단계", "숙고단계", "준비단계", "행동단계", "유지단계"], "answer": [1], "explanation": "배운 적인 없는 내용이지만 뒤에 계속 짤로 나오니 한번 보시면 좋을 것 같습니다."}, {"subject": "물질관련장애", "year": ["14학번", "12학번", "11학번", "10학번"], "professor": "이해국", "question": "인체의 쾌락 중추를 담당하여 약물 의존의 동기 측면 및 약물 보상에 관계하는 도파민 신경이 기시하는 부위는?", "images": [], "text_box": null, "options": ["Occipital lobe", "Ventral tegmental area", "Locus ceruleus", "Nucleus accumbens", "Medulla oblongata"], "answer": [3], "explanation": "VTA (ventral tegmental area)-> nucleus accumbens"}, {"subject": "물질관련장애", "year": ["13학번"], "professor": "김대진", "question": "다음중 가장 먼저 투여해야할 것으로 생각되는 약은 무엇인가?", "images": [], "text_box": "3일 전 교통사고를 수상하고 남자 환자가 수면을 취하지 못하고 진땀을 흘리며, 몸 위로 벌레가 지나간다며 하루종일 몸을 긁는 것을 주소로 정신과에 의뢰되었다. 환자는 지난 5년간 매일소주를 2병씩 마셔온 기왕력이 있었다. 환자의 혈압을 180/130 mmHg, 맥박수는 분당 130회 였으며, 환자는 이곳이 어디냐는 질문에 식당이라고 대답하는 등 혼란스러워 하는 모습을 보였다.", "options": ["아캄프로세이트(Acamprosate)", "로라제팜(Lorazepam)", "바레니클린(Varenicline)", "디설피람 (Disulfiram)", "날트렉손 (Naltrexone)"], "answer": [1], "explanation": "알코올에 의한 기억상실은 진행될수록 비가역적인 선행기억의 상실을 불러온다. 이 경우 알코올 유발 비가역적 기억장애 증후군인 베르니케증후군으로 판단하여 싸이아민의 투여가 치료적 선택이 된다. 환촉, 섬망증상-> 금단섬망->로라제팜// 비틀거리며 걷기, 작화증->Thiamine"}, {"subject": "물질관련장애", "year": ["13학번"], "professor": "김대진", "question": "현재 환자의 상태는 중독 환자의 변화의 5단계 중 어디에 속하는가?", "images": [], "text_box": "가족들의 권유로 알코올 의존에 대한 치료를 받게 된 60세 남자 환자가 외래에 방문하였다. 환자는 자신의 음주가 심각한 상태라는 것은 알고 있으며 이에 따른 건강 악화 및 가족들과의 불화가 걱정된다고 하면서도, 동시에 퇴직 후 친구들과 어울리며 술을 마시는 것이 자신에게 위안이 된다고 하였다. 환자는 스스로 조절해볼 수 있을 것 같다며 치료에 선뜻 동의하지 않는 모습을 보였다.", "options": ["숙고전단계", "숙고단계", "준비단계", "행동단계", "유지단계"], "answer": [1], "explanation": "이 환자는 자신의 음주 문제가 심각하다는 것을 인지하고 건강 및 가족 불화를 걱정하지만, 동시에 음주를 통해 위안을 얻고 스스로 조절할 수 있다고 생각하며 치료에 동의하지 않고 있습니다. 이는 문제의 심각성은 인식하지만 변화에 대한 의지가 불확실하고 양가감정을 느끼는 '숙고단계'에 해당합니다."}, {"subject": "물질관련장애", "year": ["12학번", "11학번", "10학번"], "professor": "이해국", "question": "어떤 특정한 약물을 장기간 동안 복용하였는데 중단 후 환시와 환청이 보이고 약물에 대한 생각을 끊을 수 없었다. 어떤 전신증상 징후인가?", "images": [], "text_box": null, "options": ["갈망", "보상", "점화효과", "선택적 추상"], "answer": [0], "explanation": "물질의 양성강화로 인하여,연관된 장면,냄새,상황과 같은 단서(cue)에 의해 유발되며 관련 물질을 추구하고자 하는 강한 충동을 느끼는 것은 갈망이었습니다."}, {"subject": "물질관련장애", "year": ["12학번", "11학번", "10학번"], "professor": "이해국", "question": "알코올 소비를 줄이기 위하여 사용되는 약물들의 기전 중 옳은 것은?", "images": [], "text_box": null, "options": ["Disulfiram: acetaldehyde dehydrogenase의 작용을 촉진한다.", "Naltrexone: opiate receptor antagonist로 작용한다.", "Acamprosate: positive reinforcement를 차단한다.", "Fluoxetine: Serotonin을 선택적으로 억제한다.", "Odansetron: 5-HT3 수용체를 활성화한다."], "answer": [1], "explanation": "수업시간에 딱 Naltrexone만 언급하셨다고 하십니다. Fluoxetine: Serotonin reuptake 선택적 차단 Odansetron 5-HT3 수용체 차단. 1) 촉진 ← 억제 / 3) positive → negative / 4) 활성화 → 억제 / 5) serotonin reuptake를 선택적으로 억제."}, {"subject": "물질관련장애", "year": ["12학번", "11학번", "10학번"], "professor": "이해국", "question": "가족의 권유로 60 세 남자가 알콜의존 치료를 위해 내원하였다. 최근 간경화를 진단받고 본인의알콜중독 상태가 심각하다는건 인지하고 있지만, 한편으로는 친구들과 만나 어울리기 위해선 어느정도의음주는 필요하다고 주장한다. 중독환자의 변화 5 단계중어느단계인가??", "images": [], "text_box": null, "options": ["숙고전단계", "숙고단계", "준비단계", "행동단계", "유지단계"], "answer": [1], "explanation": "이 환자는 자신의 음주 문제가 심각하다는 것을 인지하고 건강 및 가족 불화를 걱정하지만, 동시에 음주를 통해 위안을 얻고 스스로 조절할 수 있다고 생각하며 치료에 동의하지 않고 있습니다. 이는 문제의 심각성은 인식하지만 변화에 대한 의지가 불확실하고 양가감정을 느끼는 '숙고단계'에 해당합니다."}, {"subject": "물질관련장애", "year": ["09학번", "11학번", "10학번"], "professor": "김대진", "question": "다음 중 인체의 쾌락 중추를 담당하여 약물 의존의 동기 측면 및 약물 보상에 관계하는 뇌의 부위에 해당되는 것을 고르시오.", "images": [], "text_box": null, "options": ["Ventral tegmental area", "Median forebrain bundle", "Lateral hypothalamus", "Nucleus accumbes", "All of above"], "answer": [4], "explanation": "문제의 부위에 해당하는 것은 ventral tegmental area, median forebrain bundle, nucleus accumbens, medial frontal cortex, amygdala, lateral hypothalamus 가 있습니다."}, {"subject": "물질관련장애", "year": ["09학번", "11학번", "10학번"], "professor": "김대진", "question": "다음에 알코올의 소비를 줄이기 위하여 사용되는 물질과 그 기전들을 기술하였다.가장 옳은 것을 고르시오.", "images": [], "text_box": null, "options": ["Acamprosate : positive reinforcement 를 차단한다", "Disulfiram: alcohol 이 대사되는 과정에서 acetaldehyde dehydrogenase 의 작용을 방해한다", "Naltrexone: opiate receptor agonist 로 작용한다", "Fluoxetine : serotonin reuptake 를 선택적으로 촉진한다", "odansetron : dopamine 수용체를 차단한다"], "answer": [1], "explanation": "Disulfiram은 아세트알데히드 탈수소효소의 작용을 방해하여 음주 시 불쾌한 반응을 유발합니다. Naltrexone은 오피오이드 수용체 길항제로 작용하여 알코올의 쾌감 효과를 줄이고 갈망을 감소시킵니다. Acamprosate는 주로 알코올 금단 증상과 관련된 흥분성 신경전달물질의 균형을 조절합니다."}, {"subject": "물질관련장애", "year": ["09학번", "11학번", "10학번"], "professor": "김대진", "question": "다음은 알코올 중독에 따라 중추신경계에 미치는 영향에 대한 기술이다. 옳은 것을 고르시오.", "images": [], "text_box": null, "options": ["물질의 지속적 투여로 발생한 신경적응의 생리적 상태이다.", "물질 사용으로 특징적인 금단 증상이 나타난다.", "원하는 효과를 얻기 위해서 물질의 사용량이 증가한다.", "거듭되는 물질 사용으로 직장, 학교에서의 주요 역할 업무를 수행할 수 없게 되는 경우.", "물질사용을 중단하거나 조절하기 위해 지속적인 노력을 해도 성공 못하는 경우."], "answer": [3], "explanation": "알코올 중독은 거듭되는 물질 사용으로 인해 직업적, 학업적 또는 주요 역할 업무를 수행하지 못하는 등의 사회적, 직업적 기능 손상이 동반되는 것이 특징적인 진단 기준 중 하나입니다. 이는 물질 관련 장애의 주요 증상 중 하나로, 중독으로 인해 일상생활에 지대한 영향을 미치는 상황을 의미합니다."}, {"subject": "물질관련장애(2)", "year": ["21학번", "20학번", "19학번"], "professor": "이승엽", "question": "다음 중 여성이 유치장에서 호소할 수 있는 증상들 중 약물과 관련된 가능성이 가장 떨어지는 것은?", "images": [], "text_box": "24세 여성이 평소 필로폰(methamphetamine)을 사용하다 붙잡혀서 유치장에 들어왔다. 3일전에 마지막으로 투약을 하였다고 하였다.", "options": ["불면", "과다수면", "불쾌한 꿈", "식욕감소", "피로감"], "answer": [3], "explanation": "자극제 금단 증상을 묻는 문제이다. 자극제 금단 증상으로는 불면, 과다수면, 생생하고 불쾌한 꿈, 식욕 증가, 정신운동지연 또는 초조, 피로감 등이 나타날 수 있다. 따라서 식욕 감소는 자극제 금단 증상과 가장 관련성이 떨어진다. 각성제 과량 사용 시 뇌졸중, 간질, 섬망, 환청, 편집증, 우울, 무욕증 등을 유발할 수 있다. 금단 증상으로는 극심한 피로, 졸음, 집중력 저하, 동기 결핍, 우울감, 식욕증가, 불안이 유발될 수 있다."}, {"subject": "물질관련장애(2)", "year": ["21학번", "20학번", "19학번"], "professor": "이승엽", "question": "치료시 제일 피해야 하는 약제는?", "images": [], "text_box": "34세 남자가 5일전부터 시작된 피해망상과 환청으로 응급실을 통하여 입원하였다. 평소 친구들과 어울려 클럽을 가기 좋아하고 펜시클리딘 자주 남용하였다고 한다. 굳은 표정으로 허공을 보며 혼잣말을 하며 입원치료를 시작하기로 하였다.", "options": ["리스페리돈", "아리피프라졸", "벤조디아제핀", "벤조트로핀", "프로포라놀롤"], "answer": [3], "explanation": "PCP(펜시클리딘)에 의한 급성 정신병적 상태를 의심할 수 있는 증례이다. PCP는 자체로 항콜린성 독성이 강하므로 항콜린성이 강한 약물은 사용해서는 안 된다. 벤조트로핀은 항콜린성 효과가 강하여 PCP 중독 환자에게 금기 약물이다. 리스페리돈과 아리피프라졸은 비정형 항정신병약이며, 벤조디아제핀은 진정제로 사용될 수 있다. 프로포라놀롤은 베타 차단제로, 자율신경계 증상 완화에 사용될 수 있다."}, {"subject": "물질관련장애(2)", "year": ["19학번", "18학번", "15학번"], "professor": "이승엽", "question": "제일 우선적인 처치는?", "images": [], "text_box": "31세 남성이 경련으로 응급실에 왔다. 온몸을 떨면서 식은땀을 흘렸고 혈압은 175/110mmHg, 맥박은 분당 120회, 체온은 38.6℃, 산소 포화도는 98%였다. 평소 친구들과 클럽에서 파티를 즐기는 등 우울증은 없었다고 한다. 음주력은 일주일에 소주 2병, 담배는 하루 한 갑 정도 흡연하였다. 불러도 반응이 떨어졌고 과반사를 보였다.", "options": ["기도 확보", "날록손(Naloxone)", "두부 CT", "위 세척(gastric lavage)", "응급 투석"], "answer": [2], "explanation": "환자는 경련을 주소로 응급실에 왔다. 산소 포화도가 정상 범위이므로 기도 확보나 날록손 투여는 우선적이지 않다. 암페타민 급성 중독이 의심되는 상황으로, 뇌출혈 등의 감별을 위해 두부 CT를 시행하는 것이 가장 우선적인 처치이다. 암페타민과 코카인 같은 각성제 과량 사용 시 뇌졸중, 간질, 섬망, 환청, 망상 등을 유발할 수 있다."}, {"subject": "물질관련장애(2)", "year": ["19학번", "18학번"], "professor": "이승엽", "question": "대마에 대한 설명으로 올바른 것은?", "images": [], "text_box": null, "options": ["대마는 금단 현상이 없다.", "고용량 사용은 정신 운동 활성화 작용을 한다.", "대마의 사용은 뇌의 피질하 연결망을 증가시킨다.", "관물약물로의 역할은 도파민 신경 과활성과 관련된다.", "청소년기 시작 시,성인기보다 의존 확률이 2~4배 높아진다."], "answer": [4], "explanation": "대마는 금단 현상이 있으며, 정기적 사용자의 1/3에서 관찰된다. 고용량 사용 시 정신 운동 지체를 야기한다. 대마의 사용은 뇌의 피질하 연결망을 감소시키며, 도파민 신경 활성 저하와 관련된다. 청소년기에 대마를 시작할 경우 성인기보다 의존 확률이 2~4배 높아진다."}, {"subject": "물질관련장애(2)", "year": ["16학번"], "professor": "이승엽", "question": "가능성이 높은 원인은?", "images": [], "text_box": "27세 남자가 의식을 잃은 채 병원에 왔다. 과거에 앓았던 질환은 없다고 하며, 땀을 많이 흘렸고 양팔에 손톱으로 쥐어 뜯은 듯한 상흔 자국들이 관찰되었다. 혈압은 190/120mmHg, 맥박은 분당 131회, 체온은 39.2℃였다. 통증에 반응이 없었고 동공산대를 보였다.", "options": ["대마", "알코올", "암페타민", "프로포폴", "헤로인"], "answer": [2], "explanation": "환자의 증례는 혈압, 맥박, 체온 상승과 동공산대를 보이는 자극제 급성 중독에 해당한다. 양팔에 나타난 상흔 자국은 과거 자극제 사용 시 피부를 반복적으로 긁거나 뜯은 흔적으로 추정된다. 대마, 알코올, 프로포폴, 헤로인은 이러한 증상 양상과 일치하지 않는다. 특히 대마는 심박수 감소, 알코올은 의식 장애와 발작, 프로포폴은 마취 효과, 헤로인은 호흡 억제와 혈압/맥박 저하를 유발한다. 따라서 맥박 상승, 체온 상승, 동공산대 등의 증상은 암페타민과 같은 자극제 중독에서 주로 나타난다."}, {"subject": "물질관련장애(2)", "year": ["15학번"], "professor": "이승엽", "question": "취해야 할 조치는?", "images": [], "text_box": "64세 여자 환자가 3개월 전에 난소암 4기 판정을 받아 통증을 완화시키는 약물을 투여받는 중이다. 발견된 당시 환자 옆에 보름치의 약 봉지가 뜯어져 있었다. 혈압 100/67mmHg, 맥박은 약했으며 심박수 51회/분, 체온 35.8℃, 산소 포화도 80%였다.", "options": ["기도삽관", "중심정맥 확보", "날록손 투여", "위세척", "플루마제닐(flumazenil) 투여"], "answer": [0], "explanation": "환자는 말기 암 환자로, 통증 완화를 위한 마약성 진통제를 과량 복용하여 급성 아편 중독에 빠진 것으로 보인다. 아편 중독의 특징적인 증상인 저호흡, 저산소증(산소 포화도 80%)을 보이며 의식 저하가 심각하다. 가장 우선적으로 기도 확보를 위한 기도삽관이 필요하다. 이후 아편 수용체 길항제인 날록손을 투여하여 약물 효과를 길항해야 한다. 플루마제닐은 벤조디아제핀 길항제이므로 부적절하다."}, {"subject": "물질관련장애(2)", "year": ["14학번"], "professor": "이해국", "question": "일차 치료로 가장 효과가 좋은 금연 치료제는 무엇인가?", "images": [], "text_box": "하루 담배 한 갑을 10년 가까이 흡연해 오던 35세 남성이 금연을 하고 싶다며 자발적으로 정신과 외래에 방문하였다. 환자는 수 차례 금연을 의지만으로 시도하려 하였으나 빈번이 실패한 기왕력이 있었다. 환자는 정신과적 질환을 앓은 기왕력은 없으며, 금연을 위한 약물치료에 동의하였다.", "options": ["클로니딘(clonidine)", "로라제팜(lorazepam)", "플루옥세틴(fluoxetine)", "올란자핀(olanzapine)", "바레니클린(varenicline)"], "answer": [4], "explanation": "바레니클린은 니코틴 부분 효능제(partial agonist)로, 금연 치료에 가장 효과적인 일차 치료제이다. 니코틴 수용체에 결합하여 니코틴 갈망을 줄이고 금단 증상을 완화한다. 클로니딘은 2차 치료제로, 로라제팜은 항불안제, 플루옥세틴은 SSRI계 항우울제, 올란자핀은 비정형 항정신병약물로 금연 치료의 일차 선택약은 아니다."}, {"subject": "물질관련장애(2)", "year": ["13학번"], "professor": "김대진", "question": "복용했을 가능성이 높은 약은?", "images": [], "text_box": "22세 남자가 감시와 미행을 당하고 있다며 심하게 화를 내고 경찰을 불러 지인에 의해 응급실에 내원하였다. 평소 잠이 없고 활동량이 많으며 남몰래 팔뚝에 자기 주사를 하는 모습이 종종 관찰되었다고 한다. 주변 사람들이 짜고 자신을 괴롭히고 음식에 독을 넣었다며 흥분하는 모습도 자주 보였다고 한다.", "options": ["대마", "헤로인", "프로포폴", "환각제", "메스암페타민"], "answer": [4], "explanation": "환자는 피해망상, 환각(사람들이 자신을 괴롭히고 독을 넣는다는 내용), 불면, 활동량 증가를 보이며, 팔뚝에 주사 흔적이 관찰되는 전형적인 자극제 중독 증례이다. 특히 메스암페타민(필로폰)은 과량 사용 시 정신병적 증상과 활동량 증가를 유발한다. 대마는 나른함, 졸림을, 헤로인은 불안, 초조, 좌불안석증을, 프로포폴은 마취 효과를 나타낸다. 환각제도 망상을 유발할 수 있으나, 전반적인 증상 양상은 메스암페타민 중독과 가장 부합한다."}, {"subject": "물질관련장애(2)", "year": ["13학번"], "professor": "김대진", "question": "다음 중 담배사용장애의 약물 치료에서 옳은 내용은?", "images": [], "text_box": null, "options": ["부프로피온은 경련성 질환이 동반되어도 사용 가능하다.", "바레니클린과 부프로피온은 흡연일(quit date) 당일부터 시작한다.", "니코틴 대체요법과 부프로피온의 병행요법은 단독치료보다 효과적이다.", "바레니클린은 도파민 노르에피네프린 재흡수를 차단하여 금단증상을 줄여준다.", "니코틴 대체요법은 금연 성공률이 매우 낮은 편으로 반드시 비니코틴 약물요법을 병행해야 한다."], "answer": [2], "explanation": "부프로피온은 경련성 질환, 중추신경계 종양, 심각한 두부 손상, 양극성 장애 등에서 금기이다. 바레니클린과 부프로피온은 흡연일 1-2주 전부터 시작하여 약물 농도를 확보한다. 니코틴 대체요법과 부프로피온의 병행요법은 단독치료보다 효과적임이 입증되었다. 바레니클린은 니코틴 수용체(α4β2)의 부분 효능제이며, 도파민, 노르에피네프린 재흡수를 차단하는 것은 부프로피온의 기전이다. 니코틴 대체요법은 금단 증상을 줄여주어 금연 성공률을 높이는 효과적인 치료법이다."}, {"subject": "물질관련장애(2)", "year": ["08학번"], "professor": "이해국", "question": "다음 중 도박장애에 대해 옳은 것은?", "images": [], "text_box": null, "options": ["환자 본인이 도박 문제에 대해 병식이 높은 편이다.", "주로 단독으로 발생하고 동반이환질환은 흔하지 않다.", "유전적, 신경생물학적인 요인은 발병에 영향을 미치지 않는다.", "도박으로 인해 잃은 빚을 만회하기 위해 추격도박을 하는 것은 진단기준에 해당하지 않는다.", "내성, 금단증상,조절 실패 등 물질의존과 개념이 유사하여 DSM-5에서 중독성 장애로 분류되었다."], "answer": [4], "explanation": "도박장애 환자는 본인의 도박 문제에 대한 병식이 부족한 경우가 많다. 도박장애는 우울증, 불안장애, 물질사용장애 등 다른 정신과적 질환과 동반이환이 매우 흔하다. 유전적, 신경생물학적 요인 또한 도박장애의 발병에 영향을 미치는 것으로 알려져 있다. 도박으로 잃은 돈을 만회하기 위한 추격도박(chasing losses)은 도박장애의 중요한 진단 기준 중 하나이다. DSM-5에서는 도박장애를 물질 관련 및 중독성 장애 범주에 포함시켰는데, 이는 내성, 금단 증상, 조절 실패 등 여러 면에서 물질의존과 유사하기 때문이다."}, {"subject": "물질관련장애(2)", "year": ["08학번"], "professor": "이해국", "question": "다음의 설명으로 적절한 답을 고르시오.", "images": [], "text_box": "이 약물은 주요우울장애의 치료 약물로 공인되었고 금연 치료의 보조제로 사용되기도 한다. 다른 항우울제와 달리 성기능 부작용이 거의 없으며, 고용량 투여 시 경련 유발의 위험이 있다.", "options": ["paroxetine", "fluoxetine", "venlafaxine", "bupropion", "mirtazapine"], "answer": [3], "explanation": "주요우울장애 치료제이자 금연 보조제로 사용되며, 성기능 부작용이 적고 고용량에서 경련 위험이 있는 약물은 부프로피온(bupropion)이다. 부프로피온은 도파민과 노르에피네프린 재흡수 억제제로 작용하여 우울 증상과 니코틴 금단 증상 완화에 도움을 준다. 파록세틴, 플루옥세틴, 벤라팍신은 SSRI 또는 SNRI 계열 항우울제로 성기능 부작용이 흔하며 금연 치료에 주로 사용되지 않는다. 미르타자핀은 수면 유발 및 식욕 증진 효과가 있는 항우울제이다."}, {"subject": "물질관련장애(2)", "year": ["06학번"], "professor": "", "question": "니코틴 의존의 치료에 대한 다음 설명 중 맞는 것을 고르시오.", "images": [], "text_box": null, "options": ["혼자서 굳은 결심을 하고 금연을 마음먹었을 때, 1년 후 평균적인 성공률은 약 15% 정도이다.", "약물치료보다는 비약물 치료적 접근이 선행되어야 한다.", "니코틴 대체요법을 사용하는 경우, 4주 이내로 단기간 사용하고 중단해야만 니코틴 대체 제제에 대한 새로운 의존을 예방할 수 있다.", "varenicline은 니코틴 수용체 중 ∝7수용체에 영향을 주어 니코틴 의존 치료에 효과적이다.", "bupropion은 니코틴 의존 환자 중 우울증 동반이 없는 경우에도 니코틴 의존 치료에 효과적이다."], "answer": [4], "explanation": "혼자서 굳은 결심으로 금연에 성공하는 1년 성공률은 약 3%에 불과하다. 약물 치료가 금연 성공률을 크게 높이므로 약물적 치료가 빠르게 이루어져야 한다. 니코틴 대체 요법은 최소 8주 이상 사용을 권고하며, 니코틴 대체 제제에 대한 새로운 의존 발생은 드물다. 바레니클린은 니코틴 수용체 중 α4β2 수용체의 부분 효능제로 작용한다. 부프로피온은 도파민 재흡수를 막아 보상회로에 작용하므로 우울증이 없어도 니코틴 의존 치료에 효과적이다."}, {"subject": "섬망", "year": ["21학번", "20학번", "19학번"], "professor": "이승엽", "question": "다음 중 치매보다 섬망을 시사하는 소견은?", "images": [], "text_box": null, "options": ["서서히 발병", "주의력 변동", "장기기억 손상", "정상 각성수준", "단어 찾기 어려움"], "answer": [1], "explanation": "섬망은 치매와 달리 급격히 발병하며, 주의력이 변동하는 것이 특징입니다. 또한 즉각기억 및 단기기억 손상이 나타나고, 수면-각성 주기가 붕괴되며 각성수준이 다양합니다. 반면 치매는 서서히 발병하고 주의력이 보존되며 장기기억 손상이 두드러집니다. 따라서 주의력 변동은 치매보다 섬망을 시사하는 중요한 소견입니다."}, {"subject": "섬망", "year": ["21학번", "20학번"], "professor": "이승엽", "question": "섬망에 대한 역학이 대한 올바른 설명은?", "images": [], "text_box": null, "options": ["85세 이상 인구에서 7%가 섬망을 보인다.", "알츠하이머 환자의 15%가 섬망을 보인다.", "여성에서 섬망이 더 잘 발생한다.", "섬망환자는 3개월 후 사망률은 15%이다.", "섬망환자의 약 절반이 1년 내에 사망한다."], "answer": [4], "explanation": "섬망의 역학적 특징에 대한 설명입니다. 85세 이상 인구의 약 14%에서 섬망이 발생하며, 알츠하이머 환자의 경우 약 22%에서 섬망을 보입니다. 또한 여성보다는 남성에서 섬망 발생률이 더 높습니다. 섬망 환자의 사망률은 3개월 후 23~30%, 1년 내에는 약 25~75%로 알려져 있어, 약 절반이 1년 내에 사망한다는 설명은 올바릅니다."}, {"subject": "섬망", "year": ["20학번", "19학번"], "professor": "이승엽", "question": "안정을 위한 치료 약물은?", "images": [], "text_box": "83세 남자가 대퇴골절 수술 시행 후 밤에 잠을 못 자고 가만히 누워있지 못하며 횡설수설하며 간병인을 발로 차는 행동을 하였다.", "options": ["미다졸람(midazolam)", "멀타자핀 (mirtazapine)", "알프라졸람 (alprazolam)", "할로페리돌 (haloperidol)", "발프로에이트 (valproate)"], "answer": [3], "explanation": "주어진 임상 양상은 고령 환자에서 수술 후 발생한 섬망을 시사합니다. 섬망 치료의 1차 약물은 할로페리돌(Haloperidol)과 같은 항정신병 약물입니다. 미다졸람이나 알프라졸람 같은 벤조다이아제핀 계열 약물은 섬망 증상을 악화시킬 수 있으므로 주의해야 합니다. 멀타자핀과 발프로에이트는 섬망 치료의 1차 약제가 아닙니다."}, {"subject": "섬망", "year": ["19학번", "18학번", "16학번"], "professor": "이승엽", "question": "치매보다 섬망을 시사하는 소견은?", "images": [], "text_box": null, "options": ["단어 떠오름에 문제", "서서히 발병", "수면주기 붕괴", "장기기억의 손상", "주의력 보존"], "answer": [2], "explanation": "섬망은 급격히 발병하고 주의력이 변동하며 수면주기 붕괴, 즉각기억 및 단기기억 손상 등의 특징을 보입니다. 반면 치매는 서서히 발병하고 주의력이 보존되며 장기기억 손상과 단어 찾기 어려움이 흔합니다. 따라서 수면주기 붕괴는 치매보다 섬망을 시사하는 소견입니다."}, {"subject": "섬망", "year": ["19학번"], "professor": "이승엽", "question": "남자의 현재 상태에 대한 위험인자는?", "images": [], "text_box": "48세 남자가 길에서 쓰러진 채로 응급실로 이송되었다. 남자는 몸을 떨며 왜 자기를 죽이려 하나며 소리를 질렀다. 배우자에 따르면 남자는 20년동안 무직으로, 하루 2병씩 술을 마셨다고 한다. 배우자는 남편이 과거에 이런 적은 없다고 했고 당뇨 외의 다른 기저질환은 없었다. 활력검사결과 혈압 140/80 mmHg, 맥박 90회/분, 체온 38.2도였고 산소포화도는 97%였다. 혈액검사에서 WBC21,020 g/ul, CRP 5.1mg/dl, Na/K/Cl 143/3.9/113 mEq/L였다.", "options": ["나이", "무직", "알코올 사용장애", "산소포화도", "전해질 이상"], "answer": [2], "explanation": "환자는 단기간에 의식 및 인지기능 저하와 함께 이상행동 및 망상을 보여 섬망이 의심됩니다. 배우자의 진술에 따르면 환자는 20년간 하루 2병씩 술을 마셔온 알코올 사용장애가 있으며, 이는 섬망의 중요한 위험인자입니다. 나이와 산소포화도는 정상 범위이며, 전해질 수치도 정상 참고치 내에 있으므로 해당 위험인자에 해당하지 않습니다."}, {"subject": "섬망", "year": ["19학번", "15학번"], "professor": "한창태", "question": "치료 약물은?", "images": [], "text_box": "78세 여자가 위암 수술 후 1병일 밤에 잠을 못 자고 가만히 누워있지 못하며 소리를 지르고 수액 라인을 뽑아버리는 행동을 했다.", "options": ["다이아제팜 (Diazepam)", "리튬 (Lithium)", "미다졸람 (Midazolam)", "쿠에타이핀 (Quetiapine)", "파록세틴 (Paroxetine)"], "answer": [3], "explanation": "위암 수술 후 고령 환자에게서 밤에 잠을 못 자고 난폭한 행동을 보이는 것은 섬망의 전형적인 증상입니다. 섬망의 치료에는 최근 비정형 항정신병 약물이 우선 권장됩니다. 벤조다이아제핀 계열 약물(다이아제팜, 미다졸람)은 섬망 증상을 악화시킬 수 있으므로 주의해야 합니다. 쿠에타이핀은 비정형 항정신병 약물 중 하나로 섬망 치료에 효과적입니다."}, {"subject": "섬망", "year": ["18학번", "17학번"], "professor": "이승엽", "question": "남자의 상태에 대한 위험인자는? (세 가지)", "images": [], "text_box": "결핵으로 일주일 전부터 입원 치료 중이던 40세 남자가 전일부터 고열을 보이며 헛소리를 하였다. 낮 동안에는 조용히 침상에 누워있었으나, 금일 저녁부터 수액줄을 뽑고 간호사를 향해 폴대를 휘두르며 폭언을 하였다. 남자는 회사원으로 이러한 행동문제를 보인 적이 한 번도 없었다. 혈압 140/80 mmHg, 맥박 90회/분, 호흡 30회/분, 체온 38.2도씨였고 산소포화도는 87%였다. 혈액검사에서 WBC 21,020 g/ul, CRP 5.1mg/dl, Na/K/CI 143/3.9/113 mEq/L였다.", "options": ["성별", "나이", "직업", "정신질환", "신체질환", "섬망 과거력", "저산소증", "전해질 이상"], "answer": [0, 4, 6], "explanation": "환자는 결핵으로 입원 중인 40세 남성으로, 섬망 위험인자에 해당하는 신체질환(결핵)과 성별(남성)이 있습니다. 또한 산소포화도가 87%로 정상 범위(95~100%)보다 낮아 저산소증에 해당하며, 이는 섬망의 주요 위험인자 중 하나입니다. 고령, 정신질환, 약물복용, 전해질 이상, 섬망 과거력 등은 해당하지 않습니다."}, {"subject": "섬망", "year": ["18학번"], "professor": "이승엽", "question": "이 환자에게 추가적으로 필요한 검사나 처치는?", "images": [], "text_box": "위암 수술로 입원한 40세 남자 환자가 수술 다음날부터 몸이 가렵다고 소리쳤다. 시간과 장소를 구별 못하고 몸이 떨리는 모습을 보였다. 검사 결과 혈압 152/90mm Hg, 맥박 110회/분, 체온 38.1°C. WBC는 9005× 103/uL, CRP는 0.35mg/dL, YGTP는 420 IU/L였을 때", "options": ["경험적 항생제", "복부 CT", "lorazepam", "위 내시경", "응급개복수술"], "answer": [2], "explanation": "환자는 위암 수술 후 급성 지남력 저하와 몸 떨림, 가려움증을 호소하며 섬망 증상을 보이고 있습니다. 혈액 검사에서 감마GTP 수치가 매우 높아 알코올 관련 장애, 특히 알코올 금단 섬망(Delirium Tremens)을 시사합니다. 알코올 금단 섬망의 치료에는 벤조다이아제핀 계열 약물인 로라제팜이 효과적이며, 다른 약물이나 수술적 처치는 우선적인 치료가 아닙니다."}, {"subject": "섬망", "year": ["18학번"], "professor": "이승엽", "question": "옳은 것을 고르면?", "images": [], "text_box": "82세 남자가 화장실에서 낙상하여 우측 대퇴골 목 골절로 수술을 받은 지 2일차에 잠에 들지 못하며 배추를 뽑으러 가야 한다며 자리를 나가려 하였다. 수면장애를 위해 졸피뎀을 정맥 주사하였는데 이를 뽑아버리며 공격적인 모습을 보여 환자를 강박하였다. 낮에는 지남력이 괜찮아졌다가 밤에 악화되는 양상을 보였다. 이전 정신질환 병력은 없었다고 한다.", "options": ["SSRI가 일차치료제이다.", "항콜린성이 강한 약물은 사용하지 않는다.", "수면장애는 반감기가 긴 약물을 사용한다.", "비가역적인 인지 손상은 초래되지 않는다.", "증상은 수주에서 수개월동안 지속된다."], "answer": [1], "explanation": "고령 환자의 수술 후 발생한 섬망 사례입니다. 섬망 치료에는 할로페리돌과 같은 항정신병 약물이 주로 사용되며, 항콜린성 약물은 섬망 증상을 악화시킬 수 있으므로 사용하지 않는 것이 원칙입니다. 수면장애 시에는 반감기가 짧은 벤조다이아제핀을 고려하며, 섬망은 치료가 지연될 경우 비가역적인 인지 손상을 초래할 수도 있습니다. 증상은 보통 수 시간에서 수 주 동안 지속됩니다."}, {"subject": "섬망", "year": ["17학번"], "professor": "이승엽", "question": "여자의 상태에 대한 위험인자는? (세 가지)", "images": [], "text_box": "81세 여자가 우울증을 보이던 중 자살 생각이 심해져 입원하였다. 저녁 약물 복용한 이후 '여기가 어디냐' 고 소리를 지르면서 집에 보내달라고 소리를 질렀다. 여자는 전업주부이며 치매 진단을 받은 적이 없으나 1년 전에 대퇴부 골절로 수술 받고 난 후 비슷한 증상을 보인 적이 있었다. 혈압 110/76 mmHg, 맥박 88회/분, 호흡 23/분, 체온 37.0도 씨였고 산소포화도는 98%였다. 혈액검사에서 WBC 6,320 g/ul, CRP 0.2mg/dl, Na/K/CI 136/4.9/99 mEq/L였다.", "options": ["성별", "나이", "직업", "정신질환", "신체질환", "섬망 과거력", "저산소증", "전해질 이상"], "answer": [1, 3, 5], "explanation": "환자는 81세 고령 여성으로 우울증 병력이 있으며, 약물 복용 후 지남력 저하와 이상행동을 보여 섬망이 의심됩니다. 고령은 섬망의 주요 위험인자이며, 우울증과 같은 정신질환도 섬망 발생 위험을 높입니다. 또한, 1년 전 대퇴골절 수술 후 비슷한 증상을 경험한 섬망 과거력도 중요한 위험인자입니다."}, {"subject": "섬망", "year": ["16학번"], "professor": "이승엽", "question": "이러한 증상의 위험요인은?(짤)", "images": [], "text_box": "결핵으로 일주일 전부터 입원한 40세 남자가 고열과 함께 헛소리를 하였다. 낮에는 가만히 자고 있다가 밤에는 소리를 지르고 폴대를 휘두르며 과격한 행동을 보였다. 보호자에 의하면 이 환자는 회사원이었고 이런 이상행동을 보인 적이 없었다고 한다. 혈압 140/80 맥박수 90 호흡수 30 체온 38.3 산소포화도 87%였고 백혈구 수치 21,000 Na/K/CI 143/3.9/113", "options": ["나이", "성별", "직업", "신체질환", "정신질환", "전해질 이상", "저산소증", "섬망 과거력"], "answer": [1, 3, 6], "explanation": "환자는 40세 남성으로 결핵을 앓고 있어 성별(남성)과 신체질환(결핵)이 섬망의 위험인자에 해당합니다. 또한 산소포화도가 87%로 정상 범위보다 낮아 저산소증 상태이며, 이는 섬망 발생 위험을 증가시키는 요인입니다. 나이, 직업, 정신질환, 전해질 이상, 섬망 과거력은 해당하지 않습니다."}, {"subject": "섬망", "year": ["15학번"], "professor": "주수현", "question": "우선 투약해야 할 약물은?", "images": [], "text_box": "45세 남자가 이틀 전에 시행한 초음파 검사에서 지방간을 진단받고 금주를 시작하였다. 금주 다음 날 불면증, 진전이 발생하고 온 몸에 땀을 흘리며 안절부절 못하여 응급실에 왔다. 10년 가랑 매일 소주를 2병씩 마셔왔으며, 혈압은 180/130mmHg, 맥박수는 분당 130회였으며, 이곳이 어디냐는 질문에 식당이라고 답하였다.", "options": ["티아민 (thiamine)", "날트렉손 (naltrexine)", "로라제팜 (lorazepam)", "바레니클린 (varenicline)", "아캄프로세이트 (acamprosate)"], "answer": [2], "explanation": "환자는 만성적인 음주력을 가진 남성으로, 금주 후 불면증, 진전, 발한, 안절부절 못함, 혈압 상승, 빈맥, 지남력 상실 등의 증상을 보이며 알코올 금단 섬망(Delirium Tremens)이 의심됩니다. 알코올 금단 섬망의 치료에는 벤조다이아제핀 계열 약물인 로라제팜이 우선적으로 투여됩니다. 티아민은 베르니케-코르사코프 증후군 예방을 위해 투여하지만, 급성 증상 조절에는 로라제팜이 우선입니다."}, {"subject": "섬망", "year": ["14학번"], "professor": "김태석", "question": "최우선으로 중단해야 하는 약물은?", "images": [], "text_box": "73세 여자가 척추 수술 후 잠을 못 자고 횡설수설하며 난폭한 행동을 하였다. 최근까지도 치매와 우울증으로 약을 복용하고 있었다.", "options": ["donepezil", "fluxetine", "quetiapine", "alprazolam", "mirtazapine"], "answer": [3], "explanation": "고령 환자에게 척추 수술 후 섬망 증세가 나타났습니다. 섬망 발생 시 불필요한 약물, 특히 항콜린성 약물과 진정제(벤조다이아제핀)를 중단하는 것이 중요합니다. 알프라졸람은 벤조다이아제핀 계열의 진정제로, 섬망을 악화시킬 수 있으므로 최우선으로 중단해야 합니다. 도네페질, 플루옥세틴, 쿠에타이핀, 미르타자핀은 우선 중단 대상이 아닙니다."}, {"subject": "섬망", "year": ["13학번"], "professor": "김태석", "question": "섬망의 임상적 특징은?", "images": [], "text_box": null, "options": ["급성, 가역적", "급성, 비가역적", "아급성, 가역적", "만성, 가역적", "만성, 비가역적"], "answer": [0], "explanation": "섬망은 치매와 달리 급격하게 발병하는 특징을 가집니다. 또한 섬망은 원인을 파악하고 적절히 치료하면 대개 회복될 수 있는 가역적인 상태입니다. 따라서 '급성, 가역적'이 섬망의 올바른 임상적 특징입니다."}, {"subject": "섬망", "year": ["13학번"], "professor": "김태석", "question": "이때 사용할 수 있는 약물은?", "images": [], "text_box": "72세 남자가 고관절 골절로 수술을 받고난 후 아내를 알아보지 못하고, 밤에는 잠을 자지 않고 수액줄을 뽑는 등의 행동을 보였다.", "options": ["로라제팜(lorazepam)", "미다졸람(midazolam)", "발프로산(valproic acid)", "할로페리돌(haloperidol)", "클로르프로마진(chlorpromazine)"], "answer": [3], "explanation": "고관절 골절 수술 후 고령 환자에게서 지남력 장애와 수면 장애, 이상 행동이 나타나는 것은 섬망을 시사합니다. 섬망 치료의 1차 약제는 할로페리돌과 같은 항정신병 약물입니다. 로라제팜과 같은 벤조다이아제핀은 수면 장애나 알코올 금단 섬망의 경우에 사용될 수 있으나, 일반적으로는 할로페리돌이 우선입니다. 클로르프로마진은 항콜린성 작용이 있어 섬망을 악화시킬 수 있습니다."}, {"subject": "섬망", "year": ["11학번"], "professor": "이철", "question": "관련된 신경전달물질의 변화는?", "images": [], "text_box": "70세 남자가 심장수술 후 심중환자실에 입원 중 2~3일 째부터 밤에는 거의 잠을 자지 못하고 낮에 잠깐씩 수면을 취하였다. 점차 안절부절 못하고 무섭다면서 병실에서 나오려하는 등의 모습을 보였다. 입원 5일째부터 밤에 누가 쫓아온다면서 자꾸 밖으로 나가려하고 수액을 뽑는 등의 행동을 보이고 낮에는 간혹 회복되는 양상을 반복하였다. 면담에서 의식의 혼탁과 시간과 장소에 대한 지남력의 장애를 보였다.", "options": ["도파민 저하,세로토닌 저하", "도파민 저하,세로토닌 상승", "도파민 상승,아세틸콜린 상승", "도파민 상승,아세틸콜린 저하", "세로토닌 저하,아세틸콜린 저하"], "answer": [3], "explanation": "주어진 임상 양상은 심장 수술 후 발생한 섬망을 나타냅니다. 섬망의 신경전달물질 가설에 따르면, 아세틸콜린 활성 저하와 도파민(및 노르에피네프린) 활성 과잉이 섬망 발생과 관련이 깊습니다. 따라서 항콜린성 약물은 섬망을 악화시킬 수 있으며, 항도파민성 약물은 증상 완화에 사용됩니다."}, {"subject": "섬망", "year": ["10학번"], "professor": "이철", "question": "상기 환자에서 치료에 관하여 설명 중 옳은 것은?", "images": [], "text_box": "50세의 여자환자가 심근경색증으로 심장내과 병동에 입원한 후 3일전부터 밤에 잠을 못자고 헛소리를 하고 헛것이 보인다는 주소로 정신과로 자문의뢰 되었다. 내과적 감사상 특별한 이상소견을 발견되지 않았다.", "options": ["벤조다이제핀의 사용은 금기이다.", "수면제의 사용은 환자를 안정시킨다.", "환자의 안전을 고려하여 강박은필수이다.", "원인이 되는 질환이나 의학적 상태 교정이 우선이다.", "항정신병약물 사용시 클로로프로마진이 treatment of choice이다."], "answer": [3], "explanation": "환자는 심근경색증으로 입원 후 밤에 잠을 못 자고 헛소리, 환시를 보여 섬망이 의심됩니다. 섬망 치료의 가장 중요한 원칙은 원인이 되는 질환이나 의학적 상태를 먼저 교정하는 것입니다. 벤조다이아제핀은 섬망 증상을 악화시킬 수 있어 일반적으로 금기이며, 항정신병 약물로는 할로페리돌이나 리스페리돈 등이 우선적으로 사용됩니다. 클로르프로마진은 항콜린성 작용이 강하여 섬망에 사용하지 않습니다. 강박은 환자를 탈진시킬 수 있어 주의해야 합니다."}, {"subject": "섬망", "year": ["10학번"], "professor": "이철", "question": "다음 중 과활동성 섬망에 관한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["각성저하, 혼동, 진정 등이 특징이다.", "환각, 망상, 착각이 상대적으로 많다.", "원인질환이 저활동성섬망에 비해 덜 심각하고 쉽게 치료된다.", "섬망 중 과반수 이상을 차지하는 가장 흔한 섬망의 종류이다.", "비가역적인 경우가 대부분이다."], "answer": [1], "explanation": "과활동성 섬망은 정신운동성 흥분, 과각성, 환각, 망상, 착각 등의 증상이 두드러지는 유형입니다. 각성 저하와 진정은 저활동성 섬망의 특징입니다. 섬망 중 가장 흔한 유형은 혼합형 섬망이며, 과활동성 섬망의 발생 빈도는 가장 낮습니다. 섬망은 대개 원인을 교정하면 가역적이며, 원인 질환의 심각성과 치료의 용이성은 섬망 유형에 따라 달라질 수 있습니다."}, {"subject": "섬망", "year": ["10학번"], "professor": "이철", "question": "섬망 환자의 치료에 대한 다음 설명 중 가장 올바른 것은?", "images": [], "text_box": null, "options": ["가족보다는 간병인이 돌보는 것이 도움이 된다.", "낮에라도 충분히 쉴 수 있도록 자극을 하지 않는다.", "밤에도 약한 실내등을 켜두는 것이 좋다.", "환시 등의 정신증상을 조절하기 위해서는 benzodiazepine이 도움이 된다", "약물치료보다는 강박을 하는 것이 더 안전하다."], "answer": [2], "explanation": "섬망 환자의 치료는 약물치료와 환경적 접근을 병행합니다. 친근한 가족이 환자와 함께하며 낮에는 적절한 자극을 주고 빛을 통해 지남력 유지를 돕는 것이 좋습니다. 밤에는 환자의 안정과 방향감각 유지를 위해 약한 실내등을 켜두는 것이 도움이 됩니다. 환시 등의 정신증상은 항정신병 약물로 조절하며, 벤조다이아제핀은 섬망 증상을 악화시킬 수 있어 주의해야 합니다. 강박은 환자를 탈진시킬 수 있으므로 가급적 피해야 합니다."}, {"subject": "섬망", "year": ["09학번"], "professor": "이철", "question": "본 환자의 치료에 대한 다음 설명 중 가장 올바른 것은?", "images": [], "text_box": "80세 여자환자가 평소 인지장애가 없었으나, 고관절 골절로 수술을 받은 후 2병일부터 의식과 주의력의 장애와 함께 낮에는 알 수 없는 말을 하고 지남력이 감소하고 식사도 잘하지 못 했으며, 밤에는 수면을 취하지 못하고 환시 등의 정신증을 보여 정신과에 협진의뢰되었다.", "options": ["밤에도 약한 실내등을 켜두는 것이 좋다.", "가족보다는 간병인이 돌보는 것이 도움이 된다.", "약물치료보다는 강박을 하는 것이 더 안전하다.", "낮에라도 충분히 잘 수 있도록 자극하지 않는다.", "환시 등의 정신증상을 조절하기 위해서는 benzodiazepine이 도움이 된다."], "answer": [0], "explanation": "고령 환자의 수술 후 발생한 섬망 사례입니다. 섬망 환자의 환경 관리는 중요하며, 밤에는 약한 실내등을 켜두어 지남력 유지와 안정에 도움을 주는 것이 좋습니다. 친근한 가족의 지지가 도움이 되며, 강박은 환자를 탈진시킬 수 있어 피해야 합니다. 낮에는 적절한 자극을 주는 것이 좋고, 정신증상 조절을 위해 벤조다이아제핀을 사용하는 것은 일반적으로 섬망 증상을 악화시킬 수 있으므로 주의해야 합니다."}, {"subject": "섬망", "year": ["09학번"], "professor": "이철", "question": "다음의 임상적 특징 중 환자가 치매 보다는 섬망을 더욱 시사하는 소견은?", "images": [], "text_box": "75세 남자 환자가 심근경색으로 관상동맥 우회술을 받은 뒤 밤에 잠을 자지 않고, 어린 시적 고향 친구들을 부르며 허공에 손짓을 하고 가족들을 알아보지 못하는 등의 증상을 보였다. 가족들은 환자에게 치매가 발생했다며 불안해하였다.", "options": ["급격한 발병", "빈곤한 사고", "기억력의 장애", "주의력의보존", "각성상태의 유지"], "answer": [0], "explanation": "환자는 심근경색 수술 후 급성으로 의식 혼탁, 주의력 장애, 지남력 상실, 환시, 수면-각성 주기 이상 등의 증상을 보입니다. 이는 섬망의 전형적인 특징으로, 섬망은 급격한 발병과 의식의 변동이 두드러집니다. 치매는 서서히 발병하고 주의력이 보존되는 경우가 많습니다. 따라서 급격한 발병은 치매보다 섬망을 더욱 시사하는 소견입니다."}, {"subject": "섬망", "year": ["08학번"], "professor": "이철", "question": "본 환자에서 섬망이 발생할 가능성을 높이는 위험 요인들을 모두 고르시오.", "images": [], "text_box": "58세 남자가 급성 골수성 백혈병으로 골수 이식을 받은 뒤 현재 무균실에서 격리되어 지내고 있다.환자는 그 외 기저질환이 없었으나 평소 흡연을 해왔다.", "options": ["ㄱ. 나이", "ㄴ.남성", "ㄷ.급성 골수성 백혈병", "ㄹ.골수이식", "ㅁ.격리 병실의 사용", "ㅂ.흡연력"], "answer": [1, 2, 3, 4], "explanation": "섬망의 위험인자에는 고령, 남성, 기저 신체질환, 약물 복용, 수술, 중환자실 입원, 격리 병실 환경 등이 있습니다. 환자는 남성이고, 급성 골수성 백혈병이라는 기저 질환이 있으며, 골수 이식을 받았고, 무균실 격리 병실에 있습니다. 이 모든 요인들이 섬망 발생 가능성을 높이는 위험인자에 해당합니다. 흡연력은 섬망의 직접적인 위험인자로 알려져 있지 않습니다."}, {"subject": "섬망", "year": ["07학번"], "professor": "", "question": "다음 중 이 환자의 진단과 치료에 관련하여 옳지 않은 것을 고르시오.", "images": [], "text_box": "50세 여자 환자가 심근 경색으로 심장 내과에 입원한 후 3일 전부터 밤에 잠을 잘 자지 못하고 헛소리를 하고 헛것이 보인다며 정신과에 진료를 의뢰되었다. 내과 검사상 이상소견은 발견되지 않았다.", "options": ["의식의 변동이 심하고 밤에 증상이 악화된다", "원인 질환을 제거하는 것이 치료방법이다", "치매, 정신병, 우을증과 감별해야 한다", "수면장애, 정신증상, 피해망상 등의 정신병적 증상으로 항불안제를 사용하면 소실된다", "경과상 급격히 발병하며 원인 요인을 제거하지 않을 시 존속된다"], "answer": [3], "explanation": "환자의 증상은 심근경색 후 발생한 섬망을 시사합니다. 섬망은 의식 변동이 심하고 밤에 증상이 악화되는 특징이 있으며, 원인 질환 제거가 가장 중요한 치료입니다. 치매, 정신병, 우울증 등과 감별 진단이 필요합니다. 정신병적 증상(환시, 망상 등)은 항정신병 약물(할로페리돌 등)로 조절해야 하며, 항불안제(벤조다이아제핀)는 섬망 증상을 악화시킬 수 있어 주의해서 사용해야 합니다."}, {"subject": "섬망", "year": ["07학번"], "professor": "", "question": "다음 섬망과 치매의 증상 비교 중 섬망에 대한 내용은?", "images": [], "text_box": null, "options": ["점진적으로 발병한다", "의식 수준의 장애는 없다", "경과가 비가역적이다", "지각장애가 흔하다", "일반 병동보다 정신병동에서 흔하다"], "answer": [3], "explanation": "섬망은 치매와 달리 급작스럽게 발병하며 의식 혼탁을 동반하고, 원인을 제거하면 대개 가역적입니다. 환청, 환시, 착각과 같은 지각장애가 흔하게 나타납니다. 섬망은 기저 질환을 가진 환자에게 흔하며, 일반 병동에서 더 자주 발생합니다."}, {"subject": "기질성정신장애", "year": ["22학번", "21학번", "20학번", "19학번", "18학번", "17학번", "16학번", "15학번", "14학번", "13학번"], "professor": "원왕연", "question": "손상을 입은 뇌의 부위는?", "images": [], "text_box": "52세 여자가 3개월 전 교통사고로 머리를 다친 후, “여러 남자와 여자들이 서로 이야기하고 수군거리는 목소리가 들린다.” “나에게는 일본을 굴복시키고 미국과 맞설 수 있으며, 세계평화를 수호할 수 있는 매우 특별한 능력이 있다.”는 등의 이야기를 하여 병원에 왔다. 과거 정신과적 질환의 증거는 없었으며, 현재 의식수준과 지남력에 이상은 없었다.", "options": ["소뇌 (cerebellum)", "전두엽 (frontal lobe)", "두정엽 (parietal lobe)", "후두엽(occipital lobe)", "측두엽(temporal lobe)"], "answer": [4], "explanation": "(공식): 환청, 망상 등은 측두엽 손상에서 흔하다. Occipital/temporal area의 손상에서 hallucination이 발생할 수 있고, Temporal(특히 Rt.), parietal lobe의 손상에서 delusion이 발생할 수 있다고 했죠! 위 환자는 hallucination과 delusion을 모두 보이므로 둘 다 일으킬 수 있는 temporal lobe에 손상을 입었겠네요."}, {"subject": "기질성정신장애", "year": ["21학번", "20학번", "19학번", "13학번"], "professor": "원왕연", "question": "이 환자의 진단은?", "images": [], "text_box": "65 세 남자가 6주 전 뇌졸중 진단을 받은 후 언어장애와 좌측 편마비가 나타났다. 환자는 3주 전부터 이전과는 달리 하루 종일 울적해하고, 사소한 일에도 쉽게 울고, 식욕이 없다며 식사도 잘 하지 않으려 하며 잠도 잘 들지 못하였다. 또한 아무런 의욕이나 흥미가 없다며 하루 종일 누워있으며, 운동 기능 상 할 수 있는 일들도 모두 하지 않으려는 모습을 보였다.", "options": ["적응장애", "뇌졸중에 의한 치매", "외상후 스트레스장애", "뇌졸중에 의한 기분장애", "뇌졸중에 의한 인격변화"], "answer": [3], "explanation": "기질성 기분장애에서 Stroke(뇌졸중) 이후에 거의 50% 이상의 환자에서 depressive symptom을 보인다고 했었죠!"}, {"subject": "자살", "year": ["22학번", "21학번", "20학번", "19학번", "17학번", "16학번", "15학번", "14학번", "13학번", "12학번"], "professor": "우영섭", "question": "자살의 원인으로 추정되는 것은?", "images": [], "text_box": "5년 이상 교제하면서 결혼을 약속했던 여자친구가 교통사고로 사망한지 1년이 된 기일에 35세 남자가 자살하였다. 평소 부부사이 관계가 좋았던 70세 여자가 암으로 사망한 남편의 첫 번째 기일에 자살하였다.", "options": ["죽음의 공포로부터 탈출", "죽은 자와의 재결합", "자기 파괴적 본능", "자기애적 상처", "재출생"], "answer": [1], "explanation": "기일에 자살하였으며 평소 관계가 좋았던 것으로 보아 죽은 자와의 재결합을 위함이라는 의미가 강합니다. 이는 고인과의 깊은 유대감과 상실감을 극복하지 못하고, 죽음을 통해 다시 만나고자 하는 심리를 반영합니다. 현대 자살이론에서는 이를 기념일 자살의 한 형태로 설명하기도 합니다. 따라서 죽은 자와의 재결합이 가장 적절한 원인으로 추정됩니다."}, {"subject": "자살", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "원왕연", "question": "이 환자에서 적절한 처치는?", "images": [], "text_box": "45세 여자가 자해로 인한 손목 열상으로 응급실에 왔다. 그는 과거 3차례 자살시도의 과거력이 있었으며, 만성적인 음주 문제 및 이로 인한 간염으로 치료받은 과거력이 있었다. 보호자인 남편에 의하면 우울증으로 치료를 받은 적이 있으나 비순응으로 인하여 최근에는 치료를 받지 않고 있었으며, 6개월 전 음주 문제와 건강 문제로 인하여 다니던 직장에서 실직한 이후, 1개월 전부터는 집을 나가 노숙을 하고 있었다. 환자는 자해를 한 이유에 대해서 '더 이상 살 희망도, 의미도 없다'고 반복적으로 이야기하고 있었다. 환자는 '소독만 해달라. 내 문제니 나 알아서 하겠다. 어차피 자살할 것이니 아무 치료가 필요없다.'며 의료진의 개입을 거부하고 있었다. 손목 열상에 대해서는 봉합 이외의 신체적 치료는 필요하지 않은 상태였다.", "options": ["자살 위험성 평가를 위한 통원 치료", "알코올성 간질환 치료를 위한 입원치료", "우울 증상에 대한 통원치료", "손목 열상에 대한 통원치료", "자살 방지를 위한 입원치료"], "answer": [4], "explanation": "자살의 위험요인이 많은 경우이며, 지속적으로 자살 의도 및 무망감을 표현하고 있으며, 노숙을 한 것으로 볼 때 보호자에 의한 보호에도 어려움이 있을 것으로 예상되어 자살 방지를 위한 입원 치료가 필요합니다. 환자의 안전을 최우선으로 고려하여 자살 시도를 방지해야 합니다. 따라서 입원 치료를 통해 환자를 안전하게 보호하고 집중적인 치료를 제공하는 것이 가장 적절합니다."}, {"subject": "자살", "year": ["17학번", "16학번", "14학번"], "professor": "원왕연", "question": "자살의 위험요인 4가지를 고르시오.", "images": [], "text_box": "1)65세 2)남자가 집 거실에서 우울증 치료약물 30일 분량을 복용한 상태로 아들에게 발견되어 구조되었다. 그는 3)최근 부인과 사별하였고 아들 내외와 함께 거주하고 있었다. 4)아들은 평소와 같은 시간에 퇴근하여 귀가하였으며, 거실에 쓰러진 아버지를 발견하였다. 발견 당시, 그의 주변에는 찢어진 약 봉지들과 빈 소주병이 있었다. 그는 5)현재 경비직으로 일하고 있었고, 6)과거에 자살시도 과거력은 없었다. 3개월 전 아내가 사망한 직후부터 7)심한 우울감을 호소하고 말수가 적어져 정신건강의학과 치료를 받기 시작하였다.", "options": ["65세", "남자", "최근 부인과 사별", "아들은 평소와 같은 시간에 퇴근하여 귀가하였으며, 거실에 쓰러진 아버지를 발견하였다.", "현재 경비직으로 일하고 있었고", "과거에 자살시도 과거력은 없었다.", "심한 우울감을 호소하고 말수가 적어져 정신건강의학과 치료를 받기 시작하였다."], "answer": [0, 1, 2, 6], "explanation": "자살의 위험요인으로는 노인(65세), 남성, 최근 배우자 사별, 심한 우울감 등이 있습니다. 4번은 자살 시도 당시 구조가 어려웠다는 상황을 나타내지만 직접적인 위험요인 자체는 아닙니다. 5번 경비직은 직업이 있다는 점에서 무직과 달리 보호요인으로 작용할 수 있습니다. 6번 과거 자살 시도력이 없는 것은 위험요인이 아니라 오히려 보호요인으로 볼 수도 있습니다. 따라서 1,2,3,7번이 자살의 위험요인에 해당합니다."}, {"subject": "자살", "year": ["15학번"], "professor": "원왕연", "question": "자살의 위험성이 낮은 것과 관련된 것은?", "images": [], "text_box": "1)65세 남자가 집 거실에서 우울증 치료약물 30일 분량을 복용한 상태로 아들에게 발견되어 구조되었다. 그는 2)최근 부인과 사별하였고 아들 내외와 함께 거주하고 있었다. 아들은 평소와 같은 시간에 퇴근하여 귀가하였으며, 거실에 쓰러진 아버지를 발견하였다. 발견 당시, 그의 주변에는 찢어진 약 봉지들과 빈 소주병이 있었다. 그는 3)현재 경비직으로 일하고 있었고, 4)과거에도 두 차례 자살을 시도한 적이 있었다. 3개월 전 아내가 사망한 직후부터 5)심한 우울감을 호소하고 말수가 적어져 정신건강의학과 치료를 받기 시작하였다.", "options": ["65세 남자", "최근 부인과 사별", "현재 경비직으로 일하고 있었고", "과거에도 두 차례 자살을 시도한 적이 있었다.", "심한 우울감을 호소하고 말수가 적어져 정신건강의학과 치료를 받기 시작하였다."], "answer": [2], "explanation": "앞선 문제와 유사한 상황입니다. 자살의 위험성이 높은 요인으로는 노인, 남성, 배우자 사별, 과거 자살 시도력, 심한 우울감 등이 있습니다. 이 중 3번 '현재 경비직으로 일하고 있었고'는 직업이 있다는 점에서 무직이 자살 위험요인인 것과 대조적으로, 자살의 보호요인으로 작용할 수 있습니다. 따라서 3번이 자살의 위험성이 낮은 것과 관련된 요인입니다."}, {"subject": "자살", "year": ["11학번"], "professor": "우영섭", "question": "자살로 사망할 위험 요인은?", "images": [], "text_box": "72세 여자가 응급구조대원에 의하여 응급실에 왔다. 거주지 인근 야산에서 목을 맨 채 우연히 발견되었으며, 최근 남편과 사별하였고, 자녀들은 외국에 거주하여 연락 가능한 보호자가 없는 상태였다.", "options": ["나이, 성별, 가족관계", "나이, 성별, 자살시도 방법", "나이, 자살시도 방법, 가족관계", "성별, 자살시도 방법, 가족관계", "나이, 성별, 자살시도 방법, 가족관계"], "answer": [2], "explanation": "자살 사망의 위험요인을 분석할 때, 나이(45세 이상), 자살시도 방법(치명적인 방법 사용), 가족관계(보호자 부재 또는 지지 부족)가 중요하게 고려됩니다. 여성은 남성보다 자살 사망의 보호요인으로 작용할 수 있습니다. 이 환자는 고령이며, 목을 매는 치명적인 방법을 사용했고, 외국에 거주하는 자녀들로 인해 보호자가 부재한 상황이므로, 이 세 가지가 주요 위험 요인으로 작용합니다."}, {"subject": "자살", "year": ["11학번"], "professor": "우영섭", "question": "2010년 우리나라의 10만명 당 자살자의 수는?", "images": [], "text_box": null, "options": ["10-14명", "15-19명", "20-24명", "25-29명", "30-34명"], "answer": [4], "explanation": "2010년 우리나라의 자살률은 인구 10만명당 31.2명이었습니다. 이는 제시된 보기 중 30-34명 범위에 해당합니다. 자살률은 사회경제적 요인과 정신건강 문제 등 다양한 원인에 의해 영향을 받으며, 국가별로 차이를 보입니다. 높은 자살률은 공중보건의 중요한 과제로 인식됩니다."}, {"subject": "자살", "year": ["11학번"], "professor": "우영섭", "question": "젊은 성인에 비해 노인 자살이 가지는 특징으로 바른 것은?", "images": [], "text_box": null, "options": ["과격한 방법을 잘 사용한다.", "가족관계 갈등이 흔하다.", "정신과적 병력이 흔하다.", "알코올 남용이 흔하다.", "이혼, 별거가 흔하다."], "answer": [0], "explanation": "노인 자살은 젊은 성인 자살과 비교할 때 몇 가지 두드러진 특징을 보입니다. 노인 자살은 실패할 경우 재시도가 어려운 치명적인 방법을 사용하는 경향이 강합니다. 또한, 노인 자살은 우울증과 같은 정신과적 질환과 관련이 깊고, 신체 질환 및 사회적 고립감도 중요한 위험요인으로 작용합니다. 젊은 층에서는 충동적인 시도나 알코올 남용이 흔한 반면, 노인 자살은 보다 계획적이고 단호한 경향이 있습니다."}, {"subject": "자살", "year": ["10학번"], "professor": "우영섭", "question": "다음 중 자살 위험 요인이 아닌 것은?", "images": [], "text_box": null, "options": ["노인", "만성질환", "여성", "기혼", "우울증"], "answer": [2, 3], "explanation": "자살의 위험요인에는 노인, 만성질환, 우울증 등이 포함됩니다. 반면, 여성은 남성에 비해 자살 시도율은 높지만 자살 사망률은 낮아 상대적으로 보호요인으로 작용합니다. 또한, 기혼 상태는 이혼이나 사별과 달리 자살의 보호요인으로 간주됩니다. 따라서 여성과 기혼은 자살 위험 요인이 아닌, 오히려 보호 요인으로 작용할 수 있습니다."}, {"subject": "자살", "year": ["09학번"], "professor": "우영섭", "question": "이 환자가 자살할 가능성이 높을 것임을 의심할 수 있는 요인으로 가장 적절한 것은?", "images": [], "text_box": "62세 남자 환자가 당뇨병성 신경병증 통증으로 치료받던 중 2주 전부터 심해진 우울감으로 병원을 방문하였다. 환자는 부인과 동거하고 있었으며, 경제적 어려움으로 인한 불화가 있었다. 환자는 거의 매일 혼자서 만취할 정도의 음주를 지속하고 있다.", "options": ["아내와의 동거", "과거 자살 시도경험 없음", "정신과 치료경험 없음", "당뇨병성 신경병증 통증", "최근 발생한 우울증상"], "answer": [3, 4], "explanation": "자살 위험 요인에는 만성질환으로 인한 신체적 고통, 그리고 최근 발생하여 심해진 우울 증상이 중요하게 작용합니다. 당뇨병성 신경병증 통증은 만성적인 고통을 유발하여 자살 위험을 높일 수 있습니다. 또한, 기존의 우울증이 아닌 '최근 심해진 우울감'은 급격한 심리적 변화를 나타내며 자살 행동으로 이어질 위험이 큽니다. 아내와의 동거나 과거 자살 시도 경험 없음은 보호요인일 수 있습니다."}, {"subject": "자살", "year": ["08학번"], "professor": "우영섭", "question": "다음 중 자살의 위험성 및 예방에 대한 설명으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["대부분의 자살은 예방할 수 없다.", "자살 시도 환자는 반드시 입원 치료하여야 한다.", "자살을 생각하는 우울증 환자에서 중요한 결정은 치료에 도움이 된다.", "환자가 우울증에서 회복되기 시작하는 경우 자살 위험성도 동시에 감소한다.", "환자가 자살 시도를 억제할 수 없다고 느낄 때 연락을 하겠는가를 직접적으로 확인한다."], "answer": [4], "explanation": "자살 위험성이 있는 환자와의 직접적인 소통은 예방에 매우 중요합니다. 환자가 자살 시도를 억제할 수 없을 때 도움을 요청할 수 있도록 구체적인 계획을 세우고, 의료진이나 주변 사람에게 연락할 것을 약속받는 것은 매우 효과적인 개입 방법입니다. 이는 환자와 의료진 간의 신뢰 관계를 구축하고 위기 상황에 대한 대비책을 마련하는 데 필수적입니다. 자살의 위험성은 우울증 호전 시기에 일시적으로 증가할 수 있으므로 지속적인 관찰이 필요합니다."}, {"subject": "자살", "year": ["07학번"], "professor": "우영섭", "question": "자살 시도한 사람이 또 자살할 위험성이 큰 것은?", "images": [], "text_box": null, "options": ["30살", "첫 번째 자살 시도", "사회 경제적으로 지위가 높음"], "answer": [1, 2], "explanation": "자살 시도 경험은 향후 자살 위험을 크게 높이는 가장 중요한 요인 중 하나입니다. 첫 번째 자살 시도가 아닌 반복적인 시도는 더욱 위험성이 큽니다. 사회 경제적 지위가 높은 것은 일반적으로 자살의 보호 요인으로 작용할 수 있으나, 특정 상황에서는 스트레스 요인이 될 수도 있습니다. 나이는 젊은 층보다는 고령층에서 자살률이 높게 나타나는 경향이 있습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "", "question": "상기 청소년이 병원에 처음 방문하였을 때 반드시 평가하여야 하는 검사는?", "images": [], "text_box": "발레를 전공하는 15세 여자아이가 최근 체중 급격하게 줄어들어서 병원에 내원하였다. 최근 거의 칼로리가 있는 음식을 거부하며 곤약 젤리 등 칼로리 없는 음식만 섭취하고 있었으며, 운동을 통하여 체중을 더 빼고 싶어하는 모습이었다. 보호자는 먹고나서 죄책감이 든다며 먹은 것을 구토하는 행동을 반복하는 모습이라며 걱정하고 있었다.", "options": ["뇌 MRI", "신체 계측", "소화기 내시경", "흉부 X선 검사", "갑상선 호르몬 검사"], "answer": [1], "explanation": "일반적으로 신경성 식욕부진증의 증상을 보이는 소아청소년의 경우, 신체 상태와 합병증으로 인한 내과적 위험도를 진단하기 위한 병력조사, 신체검사 및 신경학적 검사를 실시해야 합니다. 다른 질환의 감별을 위하여 필요한 검사를 수행하기 전, 신체 계측을 시행하여 체질량지수 수준이 어느 정도인지 반드시 평가하는 것이 필요합니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "유재현", "question": "가장 효과적인 치료를 추천한다면?", "images": [], "text_box": "24세 여성이 먹고 토하는 것을 조절하기 어렵다며 정신건강의학과 외래에 내원하였다. 신체계측 상 165cm 에 58kg 이었다. 1시간 내에 치킨 2마리, 과자 3봉지 가량을 혼자서 다 먹고 나서 죄책감이 들어서 일부러 손을 넣어서 토하거나, 과도하게 운동하는 등 보상행동을 보였다. 이러한 삽화가 최근 6개월 동안 1주일에 1번 이상 나타나면서 스스로에 대한 수치감과 자기 혐오로 인하여 방문하게 되었다고 한다.", "options": ["가족치료", "항우울제", "Topiramate", "인지행동치료", "개인정신치료"], "answer": [3], "explanation": "신경성 폭식증의 사례로 16~20주의 구조화된 인지행동치료가 가장 효과적입니다 (70~95% 환자에서 효과적인 것으로 나타나고 있음). 그 외 치료기법은 인지행동치료 만큼 효과적이지 않은 것으로 알려져 있습니다. 신경성 폭식증 (Bulimia nervosa)에서 cognitive-behavioral therapy가 strong ++로 가장 효과적인 것을 볼 수 있습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["19학번"], "professor": "", "question": "흔하게 동반되는 증상은?", "images": [], "text_box": "17세 여자가 다이어트를 한다고 하며 밥을 먹지 않았다. 하지만 부모님 몰래 밤에 폭식을 했고, 오른쪽 손등에 상처가 있었다. 키는 163cm 몸무게는 55kg 였다가 9개월만에 38kg로 급격한 체중 감소가 있었다.", "options": ["조현병", "우울증", "단기 정신병", "양극성 장애", "?"], "answer": [1], "explanation": "폭식과 보상행동, 저체중은 신경성 식욕부진증의 특징입니다. 신경성 식욕부진증(Anorexia nervosa)에 흔하게 동반되는 것은 우울증이며, SSRI와 같은 약물을 복용할 수 있습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["18학번", "17학번", "16학번"], "professor": "나해란", "question": "위 20세 환자에서 보이는 흔한 증상은?", "images": [], "text_box": "20세 여성이 식사를 지속적으로 거부하여 저체중을 주소로 내원하였다. 몰래 음식을 먹기도 하였으나 곧바로 토하였으며 최근 3개월 간 생리가 없었다고 한다.", "options": ["과체중", "식욕부진", "왕성한 성욕", "지인을 위한 요리", "음식에 대한 무관심"], "answer": [3], "explanation": "신경성식욕부진에서 식욕부진은 드물며, 오히려 음식에 대해 끊임없이 생각을 하고 요리를 하여 남을 주는 경우가 흔합니다. 성욕은 대부분 저하되어 있습니다. 체중은 당연히 적고, 식욕은 말기까지 유지되며, GnRH가 감소하여 성욕이 떨어집니다. 음식에 관심이 많습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["18학번", "17학번", "16학번", "15학번", "14학번", "13학번"], "professor": "나해란", "question": "가장 많이 동반되는 질환은?", "images": [], "text_box": "20세 여성이 식사를 지속적으로 거부하여 저체중을 주소로 내원하였다. 몰래 음식을 먹기도 하였으나 곧바로 토하였으며 최근 3개월간 생리가 없었다고 한다.", "options": ["우울증", "조현병", "강박장애", "알코올 사용장애", "외상후 스트레스장애"], "answer": [0], "explanation": "신경성 식욕부진증 환자에게 동반증상으로 우울증이 매우 흔합니다. 40%나 되고, 다른 동반 증상으로는 수면 장애, 집중력 저하 등이 있습니다. 강박장애, 불안장애 등의 동반도 흔합니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["18학번"], "professor": "나해란", "question": "1차 약물 치료제는?", "images": [], "text_box": "26세 여자가 1-2년 전부터 다이어트를 한다고 일주일 내내 굶다가 갑자기 한 번 먹기 시작하면 과자, 피자, 밥 등 가리지 않고 상당히 많은 양을 먹은 후 곧바로 손가락을 넣어 토하는 행동을 보여 왔다. 체중은 큰 변화가 없으며 다량의 음식을 먹고 토한 이후 에는 죄책감을 느꼈다고 하나 이러한 양상이 자주 반복되었다고 한다.", "options": ["리튬 (lithium)", "디아제팜 (diazepam)", "올란자핀 (olanzapine)", "플루옥세틴 (fluoxetine)", "메칠페니데이트 (methylphenidate)"], "answer": [3], "explanation": "이 사례는 신경성 대식증으로 진단됩니다. 신경성 대식증의 1차 약물 치료제로는 항우울제, 특히 SSRI 계열인 플루옥세틴이 가장 효과적인 것으로 알려져 있습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["15학번"], "professor": "왕성민", "question": "환자가 흔하게 보일 수 있는 증상은?", "images": [], "text_box": "19세 여자가 심한 체중 감소로 병원에 왔다. 9개월 전부터 다이어트를 시작하면서 체중이 줄었고 어느 순간부터 살찌는 것이 두려워 식사를 하지 않았다고 하였으나, 새벽에 몰래 폭식을 하는 경우가 있었다. 키 163cm, 평소 55kg 였으나 9개월 만에 38kg 가 되었다. 오른쪽 손목에 다친 것 같은 흉터가 있었다.", "options": ["과체중", "식욕부진", "왕성한 성욕", "지인을 위한 요리", "음식에 대한 무관심"], "answer": [3], "explanation": "이 사례는 식사를 계속 안 하다가 몰래 폭식하고, 토하고, 체중이 줄어드는 신경성 식욕부진증의 이야기입니다. 신경성 식욕부진증 환자는 음식에 대한 관심이 많고, 지인을 위한 요리를 하는 경우가 흔히 관찰됩니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["15학번"], "professor": "왕성민", "question": "올바른 치료는?", "images": [], "text_box": "20세 여성이 식사를 지속적으로 거부하여 저체중을 주소로 내원하였다. 올해 3개월간 월경이 없었다고 한다. 환자는 입원을 하였다.", "options": ["변비가 있을 경우 하제를 준다.", "동반되는 우울증의 치료가 급선무이다.", "체중감소에 대한 집착을 줄이기 위해 체중은 재지 않는다.", "섭취량을 늘리기 위해 매일 섭취량 배설량은 기록하지 않는다.", "구토가 지속되는 경우 전해질 이상, 특히 hypokalemia 를 주의한다."], "answer": [4], "explanation": "환자는 저체중과 식사 거부를 보이는 신경성 식욕부진증입니다. 구토가 지속되는 경우 전해질 이상, 특히 hypokalemia를 주의하는 것은 중요한 치료 관리 요소입니다. 체중 회복이 가장 중요하며, 이를 위해 체중과 섭취량 배설량을 기록하고 확인해야 합니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["14학번"], "professor": "왕성민", "question": "위 24세 여성에서 흔하게 관찰되는 것은?", "images": [], "text_box": null, "options": ["피해망상", "식욕 부진", "강박적 금욕", "충동조절 장애", "유의한 체중저하"], "answer": [3], "explanation": "Bulimia nervosa(신경성 대식증)에서는 물질 남용 등과 같은 충동 조절 장애가 15% 이상에서 관찰됩니다. 유의한 체중 저하는 Anorexia nervosa의 특징이며, Bulimia nervosa에서는 매우 드뭅니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["13학번"], "professor": "왕성민", "question": "신경성대식증에서 흔하지 않은 증상은?", "images": [], "text_box": null, "options": ["폭식", "유의한 체중저하", "경계성 인격장애", "체중증가에 대한 거부감 및 공포", "폭식 후 보상 행동 (운동, 하제 사용)"], "answer": [1], "explanation": "신경성 대식증은 정상 체중이거나 과체중인 경우가 많으므로 유의한 체중 저하는 흔하지 않은 증상입니다. 저체중이면 신경성 식욕부진증, 정상 체중이면 신경성 대식증으로 판단합니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["13학번"], "professor": "왕성민", "question": "신경성대식증 환자에게 추가로 진단을 할 수 없는 질환은?", "images": [], "text_box": null, "options": ["조현병", "강박장애", "신체이형장애", "경계성 인격장애", "신경성 식욕부진"], "answer": [4], "explanation": "신경성 대식증 환자는 정상 체중인 반면, 신경성 식욕부진 환자는 저체중입니다. 따라서 몸이 두 개가 아닌 한 신경성 대식증과 신경성 식욕부진을 동시에 추가로 진단할 수는 없습니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["12학번"], "professor": "송후림", "question": "신경성식욕부전증 환자에서 흔히 나타날 수 있는 소견은?", "images": [], "text_box": null, "options": ["혈청 마그네슘의 증가", "혈청 콜레스테롤의 증가", "체온 증가", "BUN 의 감소", "FSH 의 증가"], "answer": [1], "explanation": "신경성 식욕부진증 환자에서는 혈청 마그네슘의 감소, 체온 감소, BUN의 증가, FSH의 감소(무월경 유발)가 나타날 수 있습니다. 혈청 콜레스테롤은 오히려 증가하는 경우가 흔합니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["11학번"], "professor": "송후림", "question": "식사 장애에서 반복적인 폭식과 제거 행동으로 초래될 수 있는 주요 심리 문제는?", "images": [], "text_box": null, "options": ["가족, 친구 간의 갈등", "자기 조절에 대한 실패감", "인정받고자 하는 과도한 욕구", "내재된 어린 시절 갈등의 촉발", "자신이나 자신의 신체에 대한 불만"], "answer": [1], "explanation": "신경성 대식증의 인지행동 모델에서는 과도한 조절과 제한이 폭식-제거 행동을 유발하고, 이 행동의 반복은 환자에게 자기 조절에 대한 실패감을 느끼게 합니다. 따라서 자기 조절에 대한 실패감은 폭식과 제거 행동으로 초래될 수 있는 주요 심리 문제입니다."}, {"subject": "기본욕구관련정신장애2(식이장애)", "year": ["09학번"], "professor": "이영호", "question": "상기의 증례에서 식사장애를 식사장애 답게 만드는 핵심정신병리로 알려진 증상은?", "images": [], "text_box": "어려서부터 체형에 관심 많았고 특히 하체에 대해 불만이 많았던 환자로 초등학교 5-6학년때 급식을 하면서 체중이 증가하기 시작해 신경이 많이 쓰여 심한 다이어트는 아니지만 음식제한과 훌라후프 등 우동을 해서 체중을 조절하려 하였고 중학교를 캐나다로 유학을 가면서 식사를 제대로 못 하면서 체중이 줄어들었는데, 이때 환자는 체중이 줄어 드는 것이 힘든 상황에서 자신에게 즐거움과 위안을 주는 유일한 것이었다고 한다. 작년 여름 방학 때 어머님이 방문해서 체중이 줄어든 것을 보고 걱정이 돼서 먹는 것을 챙겼으나 먹지 않으려고 해 환자와 많은 다툼이 있었다. 환자는 아무 음식이나 먹으면 소화가 되지 않고 배가 아프다면서 배가 아프지 않은 음식만 먹어야 한다고 감자, 고구마, 야채들만 먹고 그 외에 음식은 절대로 먹지 않았다고 한다. 캐나다 유학 가서도 학교생활에 금방 적응해 성적은 최상위권에 들었고 학교에서 환자 하면 모

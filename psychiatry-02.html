<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통파드 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-dark:  #085041;
    --teal-mid:   #0F6E56;
    --teal-base:  #1D9E75;
    --teal-light: #5DCAA5;
    --teal-pale:  #E1F5EE;
    --amber:      #BA7517;
    --amber-pale: #FAEEDA;
    --red:        #A32D2D;
    --red-pale:   #FCEBEB;
    --gray-900:   #1a1a1a;
    --gray-700:   #3a3a3a;
    --gray-500:   #6b6b6b;
    --gray-300:   #d4d4d4;
    --gray-100:   #f5f5f2;
    --white:      #ffffff;
    --bg:         #f0f4f2;
    --shadow:     0 4px 24px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--gray-900);
  }

  /* ─── HEADER ─── */
  .site-header {
    background: var(--teal-dark);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }
  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 16px;
  }
  .header-brand {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .header-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal-light);
    font-weight: 500;
  }
  .header-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    color: #fff;
    line-height: 1.2;
  }
  .stats-bar {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; gap: 1px; }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }
  .stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--teal-light);
  }

  /* ─── PROGRESS ─── */
  .progress-wrap {
    background: var(--teal-mid);
    padding: 8px 0 0;
  }
  .progress-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--teal-light);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ─── NAV DOTS ─── */
  .nav-dots-wrap {
    background: var(--teal-mid);
    padding: 8px 0 0;
  }
  .nav-dots-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding-bottom: 0;
    scrollbar-width: none;
  }
  .nav-dots-inner::-webkit-scrollbar { display: none; }
  .nav-dot {
    flex: 0 0 auto;
    width: 26px;
    height: 22px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.35);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px 3px 0 0;
    transition: all 0.15s;
    font-weight: 500;
  }
  .nav-dot:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .nav-dot.current { background: var(--bg); color: var(--teal-dark); font-weight: 700; }
  .nav-dot.correct { color: var(--teal-light); }
  .nav-dot.wrong   { color: #F09595; }

  /* ─── FILTER ROW ─── */
  .filter-section {
    max-width: 800px;
    margin: 24px auto 0;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .filter-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .filter-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gray-500);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 48px;
  }
  .filter-btn {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--gray-300);
    background: transparent;
    color: var(--gray-500);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--teal-base); color: var(--teal-mid); }
  .filter-btn.active {
    background: var(--teal-dark);
    border-color: var(--teal-dark);
    color: var(--teal-pale);
    font-weight: 500;
  }
  .year-btn.active {
    background: var(--teal-base);
    border-color: var(--teal-base);
    color: #fff;
  }
  .year-hint {
    font-size: 11px;
    color: var(--gray-500);
    font-style: italic;
    display: none;
  }
  .year-hint.show { display: block; }

  /* ─── MAIN ─── */
  .main {
    max-width: 800px;
    margin: 20px auto 0;
    padding: 0 24px 80px;
  }

  /* ─── QUIZ CARD ─── */
  .q-card {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: cardIn 0.25s ease;
    margin-bottom: 12px;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    background: var(--gray-100);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--gray-300);
  }
  .q-year-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--teal-pale);
    color: var(--teal-dark);
    border: 1px solid rgba(29,158,117,0.3);
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .q-subject-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 10px;
    border-radius: 20px;
    background: var(--amber-pale);
    color: var(--amber);
  }
  .q-prof {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray-500);
    margin-left: auto;
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray-500);
  }

  /* ─── QUESTION BODY ─── */
  /* 순서: q-text → text-box → q-images → options-list */
  .q-body { padding: 24px 24px 0; }

  .q-text {
    font-size: 16px;
    line-height: 1.75;
    color: var(--gray-900);
    margin-bottom: 16px;
  }

  /* 텍스트박스: 문제 아래 임상 상황 박스 */
  .text-box {
    background: var(--gray-100);
    border-left: 3px solid var(--teal-base);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  /* 이미지: 텍스트박스 아래 */
  .q-images {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .q-images img {
    max-height: 220px;
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--gray-300);
    object-fit: contain;
    cursor: pointer;
  }

  /* ─── OPTIONS ─── */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 9px;
    padding-bottom: 20px;
  }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    background: var(--white);
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    color: var(--gray-700);
    transition: all 0.15s;
    width: 100%;
  }
  .opt-btn:not(:disabled):hover { border-color: var(--teal-base); background: var(--teal-pale); }
  .opt-num {
    flex: 0 0 24px;
    height: 24px;
    background: var(--gray-100);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-500);
    transition: all 0.15s;
  }
  .opt-btn:not(:disabled):hover .opt-num { background: var(--teal-base); color: #fff; }
  .opt-btn.correct-answer {
    border-color: var(--teal-base);
    background: var(--teal-pale);
    cursor: default;
  }
  .opt-btn.correct-answer .opt-num { background: var(--teal-base); color: #fff; }
  .opt-btn.wrong-answer {
    border-color: var(--red);
    background: var(--red-pale);
    cursor: default;
  }
  .opt-btn.wrong-answer .opt-num { background: var(--red); color: #fff; }
  .opt-btn:disabled { cursor: default; }

  /* ─── EXPLANATION ─── */
  .explanation-box {
    margin: 0;
    padding: 18px 24px;
    background: var(--teal-pale);
    border-top: 1px solid rgba(29,158,117,0.2);
  }
  .explanation-box.wrong {
    background: var(--red-pale);
    border-top-color: rgba(163,45,45,0.2);
  }
  .expl-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--teal-mid);
    margin-bottom: 8px;
  }
  .explanation-box.wrong .expl-label { color: var(--red); }
  .expl-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
  }

  /* ─── RESULT ROW ─── */
  .result-row {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--gray-300);
    background: var(--gray-100);
  }
  .result-msg {
    font-size: 14px;
    font-weight: 500;
    color: var(--teal-mid);
  }
  .result-msg.wrong { color: var(--red); }

  /* ─── ACTION ROW ─── */
  .action-row {
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--gray-300);
  }
  .btn-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-300);
    background: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-700);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-nav:hover:not(:disabled) { border-color: var(--teal-base); color: var(--teal-mid); }
  .btn-nav:disabled { opacity: 0.35; cursor: default; }
  .btn-next {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    background: var(--teal-dark);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-next:hover { background: var(--teal-mid); }
  .btn-next:disabled { background: var(--gray-300); cursor: default; }
  .kbd-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray-500);
  }
  kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--gray-300);
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gray-700);
    background: var(--gray-100);
  }

  /* ─── SCORE SCREEN ─── */
  .score-screen {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 48px 32px;
    text-align: center;
    animation: cardIn 0.25s ease;
  }
  .score-trophy { font-size: 52px; margin-bottom: 16px; }
  .score-title { font-size: 28px; font-weight: 700; color: var(--teal-dark); margin-bottom: 6px; }
  .score-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 32px; }
  .score-grid { display: flex; justify-content: center; gap: 32px; margin-bottom: 36px; }
  .score-stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 32px; font-weight: 700; color: var(--teal-base); }
  .score-stat-num.wrong { color: var(--red); }
  .score-stat-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
  .btn-restart {
    padding: 12px 32px;
    border-radius: 8px;
    border: none;
    background: var(--teal-dark);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-restart:hover { background: var(--teal-mid); }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-brand">
        <span class="header-label">Medical Exam · 통파드 퀴즈</span>
        <h1 class="header-title">2026 PAD ARCHIVE</h1>
      </div>
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label">전체</span>
          <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">정답</span>
          <span class="stat-value" id="stat-correct">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">오답</span>
          <span class="stat-value" id="stat-wrong">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">정답률</span>
          <span class="stat-value" id="stat-rate">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-inner">
      <div class="progress-meta">
        <span id="prog-text">0 / 0</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- NAV DOTS -->
  <div class="nav-dots-wrap">
    <div class="nav-dots-inner" id="nav-dots"></div>
  </div>
</header>

<!-- FILTER SECTION -->
<div class="filter-section">
  <div class="filter-group">
    <span class="filter-label">학번</span>
    <button class="filter-btn year-btn active" data-year="all" onclick="selectYear('all')">전체</button>
    <button class="filter-btn year-btn" data-year="21학번" onclick="selectYear('21학번')">21학번</button>
    <button class="filter-btn year-btn" data-year="20학번" onclick="selectYear('20학번')">20학번</button>
    <button class="filter-btn year-btn" data-year="19학번" onclick="selectYear('19학번')">19학번</button>
    <span class="year-hint" id="year-hint">🔀 클릭 시 해당 학번 문제를 랜덤 배치합니다</span>
  </div>
  <div class="filter-group" id="subject-filter-row">
    <span class="filter-label">단원</span>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div id="quiz-container"></div>
  <div id="score-container" class="hidden"></div>
</main>

<script>
// ══════════════════════════════════════════════════════════

const RAW_SOURCE = [{"subject": "기타 단원", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "원왕연", "question": "이 때 환자에게 필요한 치료는?", "images": [], "text_box": "45세 여자가 손목에 열상으로 내원하였다. 자살 시도로 인한 열상이었다. 이전에도 몇 차례 자살을 시도한 적이 있다. 여자는 음주로 인한 만성 간질환을 앓고 있었다. 6개월 전부터는 음주 문제 등으로 일하던 직장을 그만두게 되었다. 1개월 전부터는 노숙생활을 하였다. 환자는 어차피 죽고 싶은 마음인데 대충 손목 봉합만 해달라고 하였다. 손목 열상은 봉합 이외에 특별한 조치는 필요해 보이지 않는 상황이다.", "options": ["손목 열상에 대한 통원치료", "우울 증상에 대한 통원치료", "자살 방지를 위한 입원치료", "자살 위험성 평가를 위한 통원치료", "만성 간질환 치료를 위한 입원치료"], "answer": [2], "explanation": "환자는 현재 자살 시도로 인한 열상으로 응급실에 내원했으며, 이전에도 여러 차례 자살 시도력이 있다. 또한 만성 알코올 중독과 간질환, 실직, 노숙 생활 등 심각한 사회적, 정신적 어려움을 겪고 있다. 환자가 '어차피 죽고 싶은 마음'이라고 표현하는 것은 여전히 높은 자살 위험성을 시사한다. 이러한 상황에서는 자살 위험성 평가뿐만 아니라, 자살 재시도를 방지하기 위한 적극적인 입원 치료가 필수적이다. 생명 안전이 최우선이다."}, {"subject": "기타 단원", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "유재현", "question": "다음 증례 설명 가운데 주의력결핍장애의 특징 증상이 아닌 것은?", "images": [], "text_box": "8세 어린이가 한 학기가 넘도록 1) 선생님의 지시를 따르지 않아서 자세한 평가를 위해 부모와 함께 병원을 방문하였다. 2) 수업시간에 교실을 돌아다니거나 친구들에게 장난을 거는 일이 잦아 선생님께 지적 받는 일이 반복하여 일어났는데 3) 지적을 받으면 침을 뱉거나 욕을 하곤 하였다. 수업시간이나 집에서 과제를 하기 싫어하였고 여가 시간에도 조용히 있지 못하고 말을 많이 하였다. 수업시간에 자신이 아는 것이 나오면 시도 때도 없이 답을 말하였고 4) 급식 시간에 순서를 기다리지 못하고 새치기를 하는 일이 많았다. 학용품이나 실내화 등을 자주 잃어버리고 늘 제시간에 맞춰 등교 준비를 하지 못하였다. 그러나 5) 집에서 좋아하는 휴대폰 게임을 할 때는 2~3시간 이상 오랫동안 집중할 수 있었다.", "options": ["선생님의 지시를 따르지 않아서 자세한 평가를 위해 부모와 함께 병원을 방문하였다.", "수업시간에 교실을 돌아다니거나 친구들에게 장난을 거는 일이 잦아 선생님께 지적 받는 일이 반복하여 일어났는데", "지적을 받으면 침을 뱉거나 욕을 하곤 하였다.", "급식 시간에 순서를 기다리지 못하고 새치기를 하는 일이 많았다.", "집에서 좋아하는 휴대폰 게임을 할 때는 2~3시간 이상 오랫동안 집중할 수 있었다."], "answer": [2], "explanation": "옵션 1, 2, 4는 각각 부주의, 과잉행동, 충동성을 나타내는 주의력결핍 과잉행동장애(ADHD)의 핵심 증상이다. 옵션 5는 ADHD 환아들이 좋아하는 활동에 대해서는 집중력을 유지할 수 있다는 특징을 보여준다. 그러나 옵션 3의 '지적을 받으면 침을 뱉거나 욕을 하곤 하였다'는 것은 적대적이고 공격적인 행동에 해당한다. 이러한 행동은 ADHD의 전형적인 증상이라기보다는 적대적 반항 장애(Oppositional Defiant Disorder, ODD)와 더 관련이 깊다. ODD는 ADHD와 흔하게 동반될 수 있는 질환이다."}, {"subject": "기타 단원", "year": ["19학번"], "professor": "", "question": "적절한 약물은?", "images": [], "text_box": "??세 남아가 쉽게 짜증을 내고 친구를 자주 때려 병원에 내원했다. 학교에서는 선생님의 지시를 듣지 않았고, 팔을 물어뜯는 등의 증세를 보였다.", "options": ["졸피뎀", "도네페질", "리스페리돈", "?", "알프라졸람"], "answer": [2], "explanation": "환자는 짜증, 공격성(친구를 때림), 지시 불응, 자해 행동(팔을 물어뜯음) 등 충동 조절의 어려움과 행동 문제를 보인다. 이러한 행동 문제에 대해서는 비정형 항정신병 약물이 효과적일 수 있다. 리스페리돈(Risperidone)은 비정형 항정신병 약물로, 아동 및 청소년의 공격성, 과잉 행동, 충동성 조절에 승인된 약물 중 하나이다. 졸피뎀과 알프라졸람은 진정-수면제 또는 항불안제로, 주된 치료가 아니다."}, {"subject": "기타 단원", "year": ["19학번"], "professor": "엄유현", "question": "적절한 원인은?", "images": [], "text_box": "60세 남자가 하루에 담배를 3갑을 피고, 혈압과 조절되지 않는 당뇨를 가지고 있다. 그는 아내와 성관계를 할 때, 흥분이 되고 발기가 되지만 지속이 안된다고 호소를 한다.", "options": ["골반하부재활을 추천한다.", "에스트로겐 요법으로 치료한다.", "Masters, Johnson의 start-stop 기법으로 치료한다.", "조절되지 않는 당뇨와 흡연을 관리한다.", "선택적 세로토닌 재흡수 억제제 (SSRI)를 처방한다."], "answer": [3], "explanation": "환자는 발기는 되지만 지속이 안 되는 발기부전 증상을 보이며, 심혈관계 위험 인자인 흡연과 조절되지 않는 당뇨를 가지고 있다. 당뇨병과 흡연은 발기부전의 가장 흔한 원인 중 하나로, 혈관 손상과 신경 손상을 유발하여 발기 기능에 부정적인 영향을 미친다. 따라서 적절한 원인은 조절되지 않는 당뇨와 흡연이다. 발기부전의 치료는 원인 교정이 우선이므로, 이러한 기저 질환을 관리하는 것이 중요하다."}, {"subject": "기타 단원", "year": ["19학번"], "professor": "최지욱", "question": "해당 시기에 대한 설명으로 옳은 것은?", "images": [], "text_box": "23세 남자가 코로나19로 인한 비대면 시기에 친구도 사귀지 못하고 우울하다고 병원에 내원하였다.", "options": ["발달 과제 실패시 죄책감을 경험한다.", "발달 과제 실패시 열등감을 경험한다.", "발달 과제 실패시 정체감을 경험한다.", "발달 과제는 친밀감이 해당한다.", "발달 과제는 통합감에 해당한다."], "answer": [3], "explanation": "환자는 23세 성인으로, 에릭슨의 심리사회 발달 단계 중 '친밀감 대 고립감' 단계에 해당한다. 이 단계의 발달 과제는 타인과의 친밀한 관계를 형성하고 유지하는 것이다. 코로나19로 인한 비대면 상황에서 친구를 사귀지 못하고 우울감을 느끼는 것은 친밀감 형성이라는 발달 과제를 수행하는 데 어려움을 겪고 있음을 시사한다. 죄책감과 열등감은 더 어린 연령대의 발달 과제에 해당한다."}, {"subject": "기타 단원", "year": ["19학번"], "professor": "최지욱", "question": "해당 질환에 대하여 옳은 것은?", "images": [], "text_box": "9세 남아가 한글 쓰기가 안되고 학교 생활에 어려움이 있어 교사의 권유로 병원에 내원하였다. 엄마라는 단어를 13개월에 처음으로 말했고 15개월이 되어서야 걷기 시작하였지만 가정에서는 애교가 많고 유순하다고 했다. 지능검사 결과 IQ는 65였다.", "options": ["남녀 비율은 1:1이다.", "표준화된 지능검사 수치대로 진단한다.", "또래 친구들과 친하게 지내는 경향을 보인다.", "정신장애의 공존 유병률이 정상인보다 높지 않다.", "학교에 들어가기 전까지 대인관계 기술과 의사소통 능력이 크게 문제가 되지 않아, 학교에 들어가기 전에 진단되지 않는 경우가 흔하다."], "answer": [4], "explanation": "환아는 전반적인 발달 지연(언어, 운동)과 낮은 IQ(65)를 보이며, 학교 생활에 어려움을 겪는 전형적인 지적 장애(Intellectual Disability) 사례이다. 지적 장애는 발달 지연과 함께 나타나며, 학령기 전까지는 대인관계나 의사소통 문제가 뚜렷하게 드러나지 않아 진단이 늦어지는 경우가 흔하다. 지적 장애는 정신과적 공존 질환(예: ADHD, 우울증 등)의 유병률이 일반 인구보다 훨씬 높다. 남녀 비율은 1:1이 아니며, 지능검사 수치만으로 진단하는 것은 아니다."}, {"subject": "기타 단원", "year": ["19학번"], "professor": "최지욱", "question": "발달 심리학을 고려할 때 그 이유로서 가능성이 가장 높은 것은?", "images": [], "text_box": "일 년 전까지 사이가 좋던 초등학교 1학년생 언니와 두 살 아래 유치원생 아우가 놀이를 하다가 올해 들어 유난히 자주 다투게 되었다.", "options": ["아우의 경쟁심", "놀이 방식의 차이", "부모 태도의 변화", "언니의 스트레스 증가", "의사소통 방식의 변화"], "answer": [1], "explanation": "공식 해설에 따르면, 학령기 아동(언니)은 구체적 조작기에 해당하여 규칙 기반의 놀이를 선호하는 반면, 학령전기 아동(아우)은 전조작기에 해당하여 직관과 정서에 따라 판단하고 자기중심적인 경향이 있다. 이러한 인지 발달 단계의 차이로 인해 놀이 방식에서 갈등이 발생하는 것이 가장 가능성이 높다. 언니는 규칙을 지키고 싶어 하고, 아우는 자신의 방식대로 놀고 싶어 하면서 서로 부딪히는 것이다."}, {"subject": "기타 단원", "year": ["19학번"], "professor": "한창태", "question": "다음 중 ♡에 들어갈 말은?\ninvolves alterations; DNA methylation pattern, post-translational modification of histone, chromatin remodeling.", "images": [], "text_box": null, "options": ["미토콘드리아의 퇴화 (mitochondrial decline)", "예정된 노화 (programmed aging)", "정보의 전달 (information transfer)", "종말체의 손실 (telomere loss)", "후성학적 기전 (epigenetic mechanism)"], "answer": [4], "explanation": "주어진 설명은 DNA 메틸화 패턴, 히스톤의 번역 후 변형, 염색질 리모델링 등 유전자 발현 조절에 관여하는 기전을 언급하고 있다. 이러한 변화들은 유전자의 염기서열 자체를 바꾸지 않으면서 유전자 발현에 영향을 미치는 후성유전학적(epigenetic) 기전에 해당한다. 후성유전학적 변화는 노화 및 다양한 질병 발생에 중요한 역할을 하는 것으로 알려져 있다. 따라서 빈칸에 들어갈 가장 적절한 용어는 후성학적 기전이다."}, {"subject": "기타 단원", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "원왕연", "question": "이 환자에서 손상을 입었을 가능성이 가장 높은 뇌의 부위는?", "images": [], "text_box": "52세 여자 환자가 2개월 전 자전거를 타고가던 중 트럭에 추돌하여 머리를 다치는 사고를 당하였다. 뇌 손상을 입은 후 발생한 것으로 생각되는 증상으로 보호자에 의해 병원을 방문하였다. 환자는 과거력상 정신과적 질환의 증거는 없었으며, 현재는 의식수준과 지남력에 이상은 없었다. 환자는 “여러 남자와 여자들이 서로 이야기하고 수근거리는 목소리가 들린다”, “나에게는 일본을 굴복시키고 미국과 맞설 수 있으며 세계평화를 수호할 수 있는 매우 특별한 능력이 있다”는 등의 이야기를 하였다.", "options": ["측두엽 (temporal lobe)", "두정엽 (parietal lobe)", "후두엽 (occipital lobe)", "전두엽 (frontal lobe)", "소뇌 (cerebellum)"], "answer": [0], "explanation": "환청과 망상 등의 증상은 측두엽 손상에서 흔하게 나타나는 특징입니다. 따라서 이 환자의 경우 측두엽에 손상을 입었을 가능성이 가장 높습니다."}, {"subject": "기타 단원", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "임현국", "question": "다음 환자에게 시행해야 하는 검사 및 처치는 무엇인가?", "images": [], "text_box": "64세 남자가 기억력 저하를 주소로 내원하였다. 기억력 저하가 점차 저하되는 양상을 보이고 있으나, 환자는 혼자 지내는데 있어 별다른 어려움은 없다고 한다. 환자 선별을 위하여 시행한 간이 정신상태 검사에서는 24점 정도 체크되었다.", "options": ["뇌 자기공명 영상 검사", "뇌파 검사", "신경 심리 검사", "아밀로이드 양전자 방출 단층 촬영", "컴퓨터 단층촬영 검사"], "answer": [2], "explanation": "경도 인지 장애의 경우, 가장 먼저 해야 할 것은 신경 심리 검사와 일상생활 수행 능력 검사를 통해 객관적인 인지 장애의 증거를 인지해야 합니다."}, {"subject": "기타 단원", "year": ["20학번"], "professor": "한창태", "question": "위에서 설명하는 노화의 이론은?", "images": [], "text_box": "Reduced energy production & impaired cellular metabolism & increased in oxidative stress", "options": ["종말체의 손실 (telomere loss)", "예정된 노화 (programmed aging)", "정보의 전달 (information transform)", "후성학적 기전 (epigenetic mechanism)", "미토콘드리아의 퇴화 (mitochondrial decline)"], "answer": [4], "explanation": "이 내용은 강의 PPT에 설명되어 있습니다."}, {"subject": "기타 단원", "year": ["22학번", "21학번", "19학번"], "professor": "강동우", "question": "전기경련치료 적용을 어렵게 만드는 요인은?", "images": [], "text_box": "임신 19주째인 37세 여환이 3주 전부터 자살사고를 동반한 심한 우울감, 불안, 불면, 자살 사고가 지속되고, 1주 전부터는 자신을 욕하는 내용의 환청 증상으로 정신건강의학과 외래를 방문하였다. 2년 전 2cm의 뇌수막종이 안장부위 (suprasellar region)에 발생하였으나 크기가 커지는 양상은 아니라고 한다.", "options": ["2cm의 뇌수막종", "임신 19주", "자살 사고", "환자의 연령", "환청"], "answer": [0], "explanation": "뇌 내 공간 점유 병변(space occupying lesion)은 전기경련치료(ECT) 적용의 상대적 금기 사항에 해당한다. 이는 뇌 탈출(brain hernia)이나 부종(edema)의 위험을 증가시킬 수 있기 때문이다. 따라서 환자가 2cm의 뇌수막종을 가지고 있는 경우, ECT 적용 시 주의를 요한다. 다른 요인들은 ECT 시행을 어렵게 만드는 직접적인 금기 사항으로 보기 어렵다."}, {"subject": "기타 단원", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "임현국", "question": "다음 중 인지 기능 장애의 선별 검사로 많이 알려진 MMSE (Mini Mental Status Examination) 에 관한 설명이다. 적절한 것을 고르시오.", "images": [], "text_box": null, "options": ["절단점 점수를 이용하면 치매의 진단이 가능하다", "비교적 교육정도의 영향을 받지 않으므로 선별검사로 널리 활용되고 있다", "절단점에서 이상이 없다고 하면 치매가 아닐 확률이 많다", "검사 항목의 기억력 항목에는 즉각 기억, 지연회상이 모두 포함되어 있다", "위항 모두"], "answer": [3], "explanation": "MMSE 점수만으로 치매를 진단할 수는 없으며, 임상 병력, 종합 신경 심리 검사, 뇌영상 등 다각적인 평가가 필요하다. MMSE는 교육 수준 및 연령의 영향을 많이 받으므로 이를 고려해야 한다. MMSE 점수가 정상 범위라도 치매가 발생할 가능성이 있다. MMSE의 기억력 항목에는 즉각 기억과 지연회상이 모두 포함되어 있다."}, {"subject": "기타 단원", "year": ["21학번"], "professor": "왕성민", "question": "그림은 Shelten's scale이다. 측정하는 것은?", "images": ["../IMG/2025 21학번_추출용_PAD/image.png"], "text_box": null, "options": ["타우 단백질(Tau protein)", "신경염증(neuroinflammation)", "기능적 연결성(functional connectivity)", "내측 측두엽 수축(medial temporal lobe)", "백질의 소혈관 질환(white matter microvascular disease)"], "answer": [3], "explanation": "제시된 그림은 Shelten's scale을 나타내며, 이는 뇌의 MRI 영상에서 내측 측두엽의 수축 정도를 평가하는 데 사용되는 척도이다. 이 척도는 주로 알츠하이머병과 같은 신경퇴행성 질환에서 나타나는 해마 및 주변 구조의 위축을 정량적으로 평가하기 위해 활용된다. 따라서 그림은 내측 측두엽 수축을 측정하는 도구임을 알 수 있다."}, {"subject": "기타 단원", "year": ["21학번", "20학번", "19학번"], "professor": "이승엽", "question": "알코올에 대한 혐오반응을 유발하여 치료 하는 알코올사용장애 치료제는?", "images": [], "text_box": null, "options": ["Acamprosate", "Disulfiram", "Escitalopram", "Naltrexone", "Varenicline"], "answer": [1], "explanation": "알코올사용장애 치료제 중 혐오반응을 유발하는 약물로는 Disulfiram이 대표적이다. Disulfiram은 체내에서 알코올 대사산물인 acetaldehyde의 축적을 유도하여 불쾌한 신체 반응을 일으킨다. Acamprosate와 Naltrexone은 갈망 억제에 사용되며, Varenicline은 금연 치료제이고 Escitalopram은 항우울제이다."}, {"subject": "기타 단원", "year": ["21학번", "20학번", "19학번"], "professor": "이승엽", "question": "안정을 위한 치료제는?", "images": [], "text_box": "45세 여자가 신장 이식 수술 후에 밤에 자주 깨고 횡설수설하며 수액 라인을 뽑는 행동을 하였다", "options": ["리튬(lithium)", "로라제팜(lorazepam)", "미다졸람(midazolam)", "올란자핀(olanzapine)", "파록세틴(paroxetine)"], "answer": [3], "explanation": "섬망이 의심되고 난폭한 행동이 나타나는 경우는 안정을 위해 항정신병 약물을 소량 사용하는 것을 추천한다. 리튬 및 파록세틴은 진정 효과가 미미하며, 미다졸람은 오히려 증상을 악화시킬 수 있다. 로라제팜은 벤조디아제핀이지만, 제한된 범위에서 섬망 환자에게 사용될 수 있으나, 이 경우에는 올란자핀이 우선 순위다."}, {"subject": "Body and Mind, Stress", "year": ["22학번", "21학번", "20학번", "19학번", "18학번", "17학번", "16학번", "15학번", "14학번", "13학번", "12학번", "11학번", "10학번", "9학번", "09학번", "8학번"], "professor": "김태원", "question": "진단은?", "images": [], "text_box": "65세 남자가 반복되는 항문 통증을 가족에게 호소하였다. 그는 건강정보 프로그램 시청 중 직장암 증상이 확실하다 이야기하였다. 그러나 병원에 가면 암 진단이 될 것이고 수술을 받아야 하는 상황이 무서워 병원에 가자는 권유를 거절하였다.", "options": ["범불안장애", "인위성장애", "주요우울장애", "강박불안장애", "신체증상장애"], "answer": [3], "explanation": "전형적인 질병 불안 장애의 증례임. 질병불안장애(illness anxiety disorder)는 몸의 사소한 증상에 대하여 왜곡된 의미를 부여하여 심각한 질병에 걸렸다고 믿거나 집착하는 것을 말한다. 의학적 평가나 검사에 아무 문제가 없더라도 질병에 대한 두려움과 집착은 계속된다. 의사가 권위있게 안심을 시키더라도 효과가 오래 지속되지는 않는다."}, {"subject": "Body and Mind, Stress", "year": ["21학번", "20학번"], "professor": "김태석", "question": "기질성보다 심인성을 시사하는 소견은?", "images": [], "text_box": "33세 여자가 경련, 사지마비, 감각마비, 언어 및 보행 장애로 응급실을 방문했다.", "options": ["경련 이후 혼란스러워했다.", "자신의 증상에 대해 걱정하였다.", "심하게 넘어져 머리에 심한 열상이 생겼다.", "경련당시 갑자기 자해 행동이 있었다.", "왼쪽 무릎 아래와 발목 위쪽에 감각 이상이 나타났다."], "answer": [3], "explanation": "전환장애 등의 신체형 장애에서 보이는 신경학적 증상은 신경학적 소견과 일치하지 않고 신경 경로와 증상의 분포가 맞지 않는 양상을 보인다. 예를 들면 stocking and glove anesthesia 나 midline 이 정확하게 나눠지는 반신감각마비 등의 증상을 보이고 운동증상 또한 관여된 근육의 분포와 신경경로가 맞지 않는 증상을 보인다. 전환장애 환자는 심각한 신경학적 증상에도 불구하고 무관심한 태도를 취하는 양상을 나타낸다."}, {"subject": "Body and Mind, Stress", "year": ["20학번"], "professor": "", "question": "63세 남자가 3개월 전부터 숨이 참, 가슴 두근거림, 어깨, 무릎, 허리의 통증 및 두통을 호소하며 질병은 돌아다니는 양상이었다. 병원에서 관련 검사를 받아도 이상 소견이 발견되지 않았으며, 대증적 치료를 받아도 증상이 호전되지 않는다며 의사들에게 화를 내었다. 진단은?", "images": [], "text_box": null, "options": ["공황장애", "범불안장애", "신체증상장애", "주요우울장애", "질병불안장애"], "answer": [2], "explanation": "질병에 걸렸다는 불안감보다는, 다양한 신체적 증상에 의한 과도한 심리적 불편감과 기능 저하를 호소하며 의학적 검사에도 이상 소견이 없는 환자이므로 신체증상장애로 진단할 수 있다. 증상이 돌아다니는 양상도 특징적이다."}, {"subject": "Body and Mind, Stress", "year": ["20학번", "18학번"], "professor": "김태석", "question": "진단으로 알맞은 것은?", "images": [], "text_box": "33세 여자가 침몰하는 배에서 탈출한 뒤 구조되었는데 그 과정을 전혀 기억하지 못하여 구조된 당일 병원에 왔다. 자신이 어떻게 해안으로 탈출하였는지 기억하지 못하였고 자신의 남편 또한 실종 중이라는 사실을 알지 못하였다. 신체 상태는 안정적이었고 뇌 영상 검사는 정상이었다. 인지능력은 손상되지 않았으나 악몽을 동반한 불면과 불안을 호소하였다.", "options": ["적응장애", "범불안장애", "경도인지장애", "해리성 기억상실증", "해리성 정체성장애"], "answer": [3], "explanation": "스트레스가 동반된 사건 후에 뒤따르는 국소성 기억 상실은 PTSD 보다는 해리성 기억상실증으로 보는 것이 타당하다. 이때 악몽, 불안 등도 잘 동반된다. 정체성의 장애나 이동(shift)의 증거가 없으므로 해리성 주체성 장애(dissociative identity disorder)도 감별할 수 있다."}, {"subject": "Body and Mind, Stress", "year": ["20학번"], "professor": "김태석", "question": "환자가 호소하는 다음 증상들 중 정신과 전문의의 중재가 필요한 것은?", "images": [], "text_box": "48세 여자가 유방암을 진단받고 항암치료를 받았으나 2회 정도 받고서 치료를 거부하여 정신건강의학과에 협진 의뢰가 들어왔다.", "options": ["수술 부위가 붓고 아파요", "아이들에게 아침밥을 차려주지 못해요", "일을 하지 못해 수입이 없어요", "항암제를 먹으면 구토가 나요", "불안해서 밤에 잠을 못 자요"], "answer": [4], "explanation": "암 환자에서 나타나는 불면(insomnia)은 정신과적 개입이 필요한 주요 문제 중 하나이다. 문제 지향적 치료에서 환자의 불면 증상은 삶의 질에 직접적인 영향을 미치므로 우선적으로 해결해야 할 증상에 해당한다. 다른 증상들은 신체적 문제나 이차적인 사회경제적 문제로 볼 수 있다."}, {"subject": "Body and Mind, Stress", "year": ["20학번", "19학번"], "professor": "김태석", "question": "자문조정정신의학에서 평가 및 치료의 접근에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["심리 치료보다 약물치료가 우선한다.", "환자보다 보호자의 정보가 더 중요하다.", "신체질환과 심리문제를 포괄적으로 평가한다.", "자문조정 정신과 의사는 환자에 대해 근본적인 정신치료를 해야한다.", "환자, 보호자, 주치의 간의 갈등 상황에는 개입하지 않는다."], "answer": [2], "explanation": "자문조정정신의학은 신체 증상과 심리 증상 모두를 고려하여 환자를 포괄적으로 평가하고 치료하는 접근법을 취한다. 심리 치료와 약물치료는 둘 다 중요하며, 환자의 정보가 가장 중요하다. 근본적인 정신치료보다는 주요 문제를 빠르게 해결하는 문제 지향적 치료가 강조되며, 갈등 상황에 개입하는 것도 자문조정 의사의 역할 중 하나이다."}, {"subject": "Body and Mind, Stress", "year": ["20학번"], "professor": "김태원", "question": "합리적인 중재는?", "images": [], "text_box": "43세 기혼 남자가 흉통으로 응급실 방문 후 급성 심근경색으로 확진되어 심도자술을 권유받았으나 거절하여 정신건강의학과로 응급 의뢰되었다.", "options": ["환자가 신중한 결정을 하도록 집으로 귀가시킨다.", "환자가 자살 가능성을 고려하여 우울증 치료를 한다.", "상황 설명 및 치료 선택을 위해 환자의 배우자를 만난다.", "치료받지 않으면 생존을 보장할 수 없다고 강하게 이야기한다.", "생명의 위협 때문에 환자의 의견을 무시하고 심도자술을 바로 시행하도록 조정한다."], "answer": [2], "explanation": "환자의 합리적이지 못한 결정의 원인을 알기 위해 환자와의 면담이 필요하며, 가족 면담을 통해 사태의 심각성을 알리고 치료관련 opinion을 설명하여 환자를 설득할 수 있도록 조정한다."}, {"subject": "Body and Mind, Stress", "year": ["20학번"], "professor": "김태원", "question": "치료 원칙은?", "images": [], "text_box": "의과대학 4학년 학생이 내과학 공부 후 자신의 피로감이 갑상선 기능 저하증인 것 같다며 병원을 다섯 번째 방문하였다. 관련 검사를 진행한 결과 기질적인 이상 소견은 발견되지 않았다. 여러 차례 결과를 재확인해 주었지만 학생은 지속적으로 검사를 하기를 원했고 주치의가 정확한 진단을 놓친 것이라고 호소하였다.", "options": ["반복되는 신체 증상 호소는 무시한다.", "환자와 의사 사이 치료적 동맹을 공고히 한다.", "환자의 증상 호소에 따라 방문 간격을 결정한다.", "환자의 신체증상 호소를 감정적 요인을 배제한다.", "환자가 증상을 호소할 때마다 관련 정밀 검사를 한다."], "answer": [1], "explanation": "신체 증상 장애의 전반적인 치료 원칙은 환자와 확고한 치료동맹을 확립하는 것이다. 또한 신체화 장애의 임상양상들에 대하여 환자에게 교육하고 지속적인 안심을 제공해야 한다. 정기적으로 약속된 시간에만 만나고, 증상 호소에 의해 방문 간격이 결정되어서는 안 된다. 새로운 증상에 대해 최소한의 부분적인 신체검진을 하되 검사는 피하며, 환자의 증상 호소를 감정적 표현으로 이해해야 한다."}, {"subject": "Body and Mind, Stress", "year": ["20학번"], "professor": "김태원", "question": "우선적으로 정신건강의학과적 중재가 필요한 증상은?", "images": [], "text_box": "56세 여자가 위암 수술 후 14 병일이 지나도록 식사를 제대로 못하고 계속 누워만 지내고 있다.", "options": ["몸 여기저기가 아파요.", "밤에 잠을 제대로 못 자요.", "식사를 하면 소화가 안 돼요", "남편 때문에 암이 걸렸어요.", "누워 지내다 보니 허리가 아파요."], "answer": [1], "explanation": "주로 환자가 나타내는 주요 문제를 가능하면 빠른 시간에 해결할 수 있는 문제 지향적 (problem-oriented) 치료가 우선된다. 이 경우에는 불면 증상을 우선적으로 해결하는 것이 좋다. 남편에 대한 분노는 정신의학적으로 평가 및 치료의 대상이나 자문 조정 상황 하에서 우선 순위에 밀린다."}, {"subject": "Body and Mind, Stress", "year": ["19학번"], "professor": "", "question": "여자 환자. 우울함을 호소하고 소화불량, 어지럼증으로 내원하였다. 1주일 전에 남자친구랑 싸우고 나서부터 집에만 있으려고 하였다. 남자친구랑 화해 후 증상이 호전되었을 때 의심할 수 있는 질환은? (정신과)", "images": [], "text_box": null, "options": ["적응장애", "주요우울장애", "불안장애", "전환장애", ""], "answer": [0], "explanation": "전환장애는 싸움과 같은 정신적 스트레스 상황 발생 후 기절, 마비 등의 갑작스러운 신체 증상이 나타나는 것인데 문제의 상황은 그렇게 보기는 어려워 보인다. 오히려 화해 후에는 증상이 호전되는 것으로 봐서 적응장애에 가까울 것 같다."}, {"subject": "Body and Mind, Stress", "year": ["19학번", "17학번"], "professor": "김태석", "question": "위 상황에 맞는 진단은?", "images": [], "text_box": "4X세 남자가 얼굴에 난 상처가 잘 아물지 않는다며 성형외과에 입원하였다. 4개월 전에 술에 취해 넘어져 얼굴에 상처가 났으며 이후 여러 피부과를 다녀도 상처가 잘 낫지 않았다. 적절한 치료에도 상처는 호전되지 않고 악화되었다. 병실에 다른 입원 환자가 그가 새벽에 화장실에서 손으로 얼굴 상처 부위를 강하게 긁어 피를 내고 있다는 사실을 간호사에게 알려주어, 주치의가 이 사실을 추궁하자 그런 일은 없다며 화를 내고 강하게 부정하며 퇴원하였다.", "options": ["꾀병", "조현병", "가장성장애", "강박장애", "질병불안장애"], "answer": [2], "explanation": "환자가 내원 후 치료를 진행했지만 잘 낫지 않았으며, 알고 보니 자해와 비슷한 행위를 통해 증상을 유발하고 있었다. 이러한 상황은 가장성 장애(Factitious disorder)의 전형적인 임상 양상으로 볼 수 있다."}, {"subject": "Body and Mind, Stress", "year": ["19학번"], "professor": "김태석", "question": "폐암 말기로 입원하고 있는 82세 남자가 횡설수설하며 아내를 못 알아보고 간호사에 큰 소리로 욕을 하며 수액병을 병실 바닥으로 내던지며 소리를 지르고 흥분을 주체하지 못하여 정신건강의학과로 응급 의뢰되었다. 협진이 가장 필요한 상황은?", "images": [], "text_box": null, "options": ["숨이 답답해요", "다리가 저려요", "밤에 잠이 안 와요", "수술 부위가 아파요", "병실에 있기가 싫어요"], "answer": [2], "explanation": "자문 하에서는 주로 환자가 나타내는 주요 문제를 가능하면 빠른 시간에 해결할 수 있는 문제 지향적 치료가 우선된다. 불면은 환자의 삶의 질에 직접적인 영향을 미치므로 우선적으로 정신과적 중재가 필요한 상황이다."}, {"subject": "Body and Mind, Stress", "year": ["19학번"], "professor": "김태석", "question": "다음 중 정신과에 응급으로 협진 의뢰해야 하는 경우는?", "images": [], "text_box": null, "options": ["천식 환자가 새벽에 잠이 깬", "심장 수술 후 가슴 통증", "신부전 환자가 죽고 싶다며 눈물을 흘림", "대장암 환자가 수술 후 식사 어려움", "간염 환자가 주사가 아프다며 간호사에게 화를 냄"], "answer": [2], "explanation": "정신과 자문 조정이 필요한 응급 상황은 자살 시도나 자살 생각, 섬망, 불면 등이 있다. 이 중 자살 생각은 환자의 생명과 직결되는 가장 우선적인 응급 상황이다. 따라서 신부전 환자가 죽고 싶다며 눈물을 흘리는 경우 정신과에 응급 협진을 의뢰해야 한다."}, {"subject": "Body and Mind, Stress", "year": ["18학번"], "professor": "", "question": "17세 남학생이 2년간 중국 유학을 하고 2개월 전 한국으로 전학을 오게 되었다. 전학 온 직후부터 사소한 일이 자주 신경질을 내고 밤에 잠들기 어려워하였으며, 두통과 구역감, 소화불량을 호소하면서 학교에 자주 결석하였다. 부모와 상의 후에 휴학을 결정하고 나서 수면 상태는 안정되고 신경질이 많이 줄었다. 진단은?", "images": [], "text_box": null, "options": ["적응장애", "우울장애", "범불안장애", "신체증상장애", "급성스트레스장애"], "answer": [0], "explanation": "전학이라는 외적인 스트레스로 인해 신체 증상 및 행동 변화가 나타났다가 휴학 후 스트레스 상황이 사라져 증상이 호전되었으므로 적응장애에 해당한다. 적응장애는 명확한 스트레스원과 관련된 정서적 또는 행동적 증상이 특징이다."}, {"subject": "Body and Mind, Stress", "year": ["18학번"], "professor": "김태석", "question": "이 환자가 가진 정신 장애는?", "images": [], "text_box": "54세 남자가 가슴 통증으로 병원에 방문하였다. 인터넷에 찾아본 결과 심근경색이 의심되어 여러 병원을 돌아다녔으나, 정밀 검사 결과 관상동맥에는 이상이 없었다. 의사가 괜찮다고 말해주었을 때 잠시 나아지는 듯 했으나, 다시 또 통증이 생겨 스스로 심근 경색일 것이라고 확신하였다.", "options": ["우울장애", "망상장애", "범불안장애", "신체증상장애", "질병불안장애"], "answer": [4], "explanation": "인터넷/TV 프로그램에서 본인과 관련된 내용을 보고 난 이 병에 걸렸구나 확신 후 내원하여 검사받았지만 역시나 정상이었다. 정상이라는 말을 듣고 안심이 되었지만 다시 증상 호소와 질병에 대해 확신을 가지는 것은 질병불안장애의 특징이다."}, {"subject": "Body and Mind, Stress", "year": ["18학번"], "professor": "김태석", "question": "64세 남자가 위암 수술 후 추가적인 항암화학요법을 거절하여 정신건강의학과에 협진 의뢰하였다. 정신건강의학적 중재가 필요한 증상은?", "images": [], "text_box": null, "options": ["괜히 잠이 안 와요", "가스가 나오지 않아요", "밥만 먹으면 배가 아파요", "수술 부위가 붓고 아파요", "혈소판 수치가 떨어졌어요"], "answer": [0], "explanation": "자문 하에서는 주로 환자가 나타내는 주요 문제를 가능하면 빠른 시간에 해결할 수 있는 문제 지향적 치료가 우선된다. 불면은 환자의 삶의 질과 밀접하게 관련되어 있으며, 정신과적 중재를 통해 호전될 가능성이 높으므로 우선적인 개입이 필요하다."}, {"subject": "Body and Mind, Stress", "year": ["17학번"], "professor": "김태석", "question": "48세 남자가 흉통으로 응급실 방문 후 급성 심근경색으로 확진되어 심도자술을 권유받았으나 거절하여 정신건강의학과로 응급 이동되었다. 합리적 중재는?", "images": [], "text_box": null, "options": ["환자의 신중한 결정을 위해 집으로 귀가시킨다.", "환자가 자살 가능성을 고려하여 우울증 치료를 한다.", "치료받지 않으면 생존을 보장할 수 없다고 강하게 이야기한다.", "상황 설명 및 치료 선택을 위해 환자의 배우자나 성인 자녀들과 만난다.", "생명의 위협 때문에 환자의 의견을 무시하고 심도자술을 바로 시행하도록 조정한다."], "answer": [3], "explanation": "환자의 비합리적인 결정의 원인을 파악하기 위해 환자와의 면담이 필요하며, 가족 면담을 통해 환자의 상태와 치료의 심각성을 이해하고 설명함으로써 환자를 설득하는 것이 합리적인 중재 방법이다. 단순한 설득 포기보다는 환자의 배경과 이유를 들어봐야 한다."}, {"subject": "Body and Mind, Stress", "year": ["17학번", "15학번"], "professor": "김태석", "question": "정신건강의학과로 응급으로 협진을 의뢰해야 하는 경우는?", "images": [], "text_box": null, "options": ["천식 환자가 새벽에 일찍 깨었다.", "위암 환자가 수술 후 식사를 잘 못하였다.", "루푸스 환자가 죽고 싶다고 눈물을 흘렸다.", "심장 수술 후 가슴에 통증을 호소하였다.", "간염 환자가 주사 부위가 아프다고 간호사에게 화를 내었다."], "answer": [2], "explanation": "정신과적 협진에서 응급 상황은 자살 시도나 자살 생각, 섬망 등이 해당한다. 환자가 '죽고 싶다'고 표현하는 것은 자살 위험 신호이므로 최우선적으로 정신과 응급 협진이 필요하다."}, {"subject": "Body and Mind, Stress", "year": ["16학번"], "professor": "한진희", "question": "자문조정 정신건강의학과 의사로 협진을 시행할 때 우선적인 고려사항은?", "images": [], "text_box": null, "options": ["환자 보호자의 직업", "환자와 주치의의 관계", "의료보험 및 보호문제", "환자의 사회경제적 수준", "신체질환에 대한 심리 반응"], "answer": [4], "explanation": "자문조정 정신건강의학과에서 가장 우선적으로 고려해야 할 사항은 환자의 신체질환에 대한 심리적 반응이다. 신체 질환이 환자의 정신 건강에 미치는 영향과 심리적 스트레스를 이해하는 것이 치료 계획 수립의 첫걸음이다."}, {"subject": "Body and Mind, Stress", "year": ["16학번"], "professor": "한진희", "question": "정신신체의학에서 스트레스 관리에 자주 이용되는 기법은?", "images": [], "text_box": null, "options": ["스포츠 댄스", "여행과 등산", "인지재구성", "역공포증화", "심리극(psychodrama)"], "answer": [2], "explanation": "스트레스 관리 및 이완 요법은 인지행동 치료기법을 활용하며, 인지재구성, 자기관찰, 이완요법, 최면, 생체되먹임, 시간관리 등이 포함된다. 인지재구성은 스트레스 상황에 대한 부정적인 생각 패턴을 긍정적으로 바꾸는 기법이다."}, {"subject": "Body and Mind, Stress", "year": ["16학번"], "professor": "한진희", "question": "30대 후반의 여성이 여객선을 타고 가던 중 침몰하는 배에서 탈출한 후 해안에서 구조되기까지 기억을 전혀 하지 못하여 정신건강의학과에 의뢰되었다. 자신이 어떻게 해안가로 올라왔는지 기억을 못하였고 남편이 함께 실종된 상태라는 사실도 알지 못했다. 약 3일간의 실종 상태에도 불구하고 신체 건강은 비교적 양호했으며 인지기능의 손상은 없었으나 악몽과 불안을 호소하였다. 진단은?", "images": [], "text_box": null, "options": ["가장성 장애(factitious disorder)", "해리성 둔주(dissociative fugue)", "해리성 기억상실(dissociative amnesia)", "해리성 주체장애(dissociative identity disorder)", "무산소증에 의한 일과성 기억상실(transient amnesia due to anoxia)"], "answer": [2], "explanation": "스트레스가 동반된 사건 후에 뒤따르는 국소성 기억 상실은 PTSD보다는 해리성 기억상실로 보는 것이 타당하다. 이때 악몽, 불안 등도 잘 동반된다. 둔주는 기억상실 상태로 제3의 지역으로 환자 본인이 이동하는 것이다. 인지 증상이 없으므로 무산소증에 의한 일과성 뇌 손상은 인정되기 어렵다. 질병 역할(sick role)에 대한 의도나 충족이 없으므로 가장성 장애도 타당성이 떨어진다. 정체성의 장애나 이동(shift)의 증거 없으므로 해리성 주체성 장애도 감별할 수 있다."}, {"subject": "Body and Mind, Stress", "year": ["16학번"], "professor": "한진희", "question": "20대 중반의 남자가 자신이 아무래도 우울증에 걸린 것 같다며 정신건강의학과를 방문하였다. 외래진료실에서 진찰하는 내내 매우 불안해 보였고 불편한 느낌을 주었다. 이 경우, 치료적 동행을 촉진시키기 위하여 정신건강의학과 의사가 해야 할 적절한 행동은?", "images": [], "text_box": null, "options": ["환자에게 관심과 공감을 보여주며 현재 처해 있는 어려운 점에 대하여 경청한다.", "의사인 자신도 새로 방문한 환자를 볼 때면 불안한 점은 마찬가지라고 얘기해준다.", "정신과에서 진료를 받는 것이 특별히 불안감을 주는 이유가 있는지 자세히 물어본다.", "병원 입장에서 환자의 문제가 특별히 어려운 건 아니므로 안심해도 된다고 격려한다.", "병원 환경이 불안을 조장할 수 있으므로 환자에게 진료를 빨리 진행하도록 독려한다."], "answer": [0], "explanation": "환자가 불안해하거나 낯설게 느끼는 상황에서 치료적 동행을 촉진시키는 데 가장 중요한 요소는 공감적 경청이다. 의사가 그러한 자세를 갖게 되면 환자도 마음의 문을 열고 의사와의 신뢰적 관계를 맺어나갈 수 있다. 의사는 전문성을 갖춘 확고한 자기 신뢰를 보여야 하며, 환자의 고통을 사소한 문제로 경시하거나 환자 스스로의 불안감을 자극하는 접근은 피해야 한다."}, {"subject": "Body and Mind, Stress", "year": ["15학번"], "professor": "김태석", "question": "47세 남자가 급성 심근경색 진단을 받고 치료를 권유받았으나 거부하여 정신과 협진이 의뢰되었다. 중재로 올바른 것은?", "images": [], "text_box": null, "options": ["편안한 결정을 위해 집으로 보낸다", "자살 방지를 위해 격리한다", "강제로 치료를 받도록 한다.", "상황 설명 및 치료 계획 논의를 위해 가족을 만난다.", "치료를 받지 않으면 죽음을 피할 수 없다고 말한다"], "answer": [3], "explanation": "환자의 치료 거부와 같은 비합리적인 결정의 원인을 파악하고, 가족에게 상황의 심각성을 알리며 치료 계획을 논의하여 환자를 설득하는 것이 올바른 중재이다. 단순한 설득 포기보다는 환자의 이유를 경청하고 가족과의 협력을 통해 치료적 동맹을 형성해야 한다."}, {"subject": "Body and Mind, Stress", "year": ["15학번"], "professor": "김태석", "question": "자문조정 정신의학의 진단 과정의 핵심 요인의 조합은?", "images": [], "text_box": null, "options": ["병식, 사고, 행동", "사고, 의식, 인지", "사고, 의식, 정서", "사고, 정서, 행동", "인지, 정서, 행동"], "answer": [4], "explanation": "자문조정 정신의학의 진단 과정에서 핵심 요인인 ABC는 A. Affective (정서): 우울, 불안, 과민성, B. Behavioral (행동): 동기 없음, 불면, 식욕 저하, 초조 불안, 성기능, 공격성, C. Cognitive (인지): 기억력, 언어 능력, 사고 내용, 수행 능력, 의식, 집중력, 주의력을 포함한다. 따라서 인지, 정서, 행동이 핵심 요인의 조합이다."}, {"subject": "Body and Mind, Stress", "year": ["15학번"], "professor": "한진희", "question": "질병의 발병 및 경과와 치료에 대한 여러 가지 이론 중 생물 학적 요인이나 심리학적 요인만으로 구분하여 따로 다루는 것은 의미가 없으므로 여러 가지 요인들의 상호작용으로 이해하고 살펴보는 것이 질병의 발생과 치료의 이해에 중요하다는 이론은?", "images": [], "text_box": null, "options": ["취약성 스트레스 모델", "생물 심리사회적 모델", "대상 관계론적 모델", "교수분석 모델", "생의학 모델"], "answer": [1], "explanation": "생물 심리사회적 모델은 질병의 발생과 경과, 치료에 있어 생물학적, 심리적, 사회적 요인들이 복합적으로 상호작용한다는 관점을 제시한다. 이 모델은 질병을 단일 요인으로 설명하는 생의학적 모델의 한계를 극복하고, 환자를 총체적으로 이해하는 데 중요한 이론적 틀을 제공한다."}, {"subject": "Body and Mind, Stress", "year": ["14학번"], "professor": "김태석", "question": "암센터의 정신과적 자문 상황 중 우선적인 응급에 해당하는 경우는?", "images": [], "text_box": null, "options": ["신장암 환자가 불면을 호소하였다.", "대장암 환자가 수술을 거부하였다.", "폐암 환자가 수술 후 호흡 곤란을 호소하였다.", "백혈병 환자가 무균실에서 죽고 싶다고 하였다.", "방암 환자가 항암치료 후 기억력 저하를 호소하였다."], "answer": [3], "explanation": "자살 생각은 어떠한 경우에도 최우선적으로 정신과적 응급 상황에 해당한다. 환자가 '죽고 싶다'고 표현하는 것은 즉각적인 정신과 개입을 요구하는 중대한 문제이다."}, {"subject": "Body and Mind, Stress", "year": ["14학번", "13학번"], "professor": "김태석", "question": "자문조정 정신의학의 진단 과정의 “ABC”와 관련 항목의 연결로 옳은 것은?", "images": [], "text_box": null, "options": ["A= 기억력", "A= 공격성", "B= 성기능", "B= 과민성"], "answer": [2], "explanation": "자문조정 정신의학의 진단 과정에서 ABC는 A: Affective (정서), B: Behavioral (행동), C: Cognitive (인지)를 의미한다. Affective(정서)에는 우울, 불안, 과민성이 포함되고, Behavioral(행동)에는 동기 없음, 불면, 식욕 저하, 초조 불안, 성기능, 공격성이 포함된다. Cognitive(인지)에는 기억력, 언어 능력, 사고 내용, 수행 능력, 의식, 집중력, 주의력이 포함된다. 따라서 B= 성기능이 옳다."}, {"subject": "Body and Mind, Stress", "year": ["14학번", "13학번"], "professor": "김태석", "question": "자문조정정신의학에서 평가 및 치료적 접근에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["심리치료보다 약물치료가 우선한다.", "환자보다 보호자의 정보가 더 중요하다.", "신체질환과 심리문제를 포괄적으로 평가한다.", "자문조정 정신과 의사는 환자에 대해 근본적인 정신치료를 해야 한다.", "환자, 보호자, 주치의 간의 갈등 상황에는 개입하지 않는다."], "answer": [2], "explanation": "자문조정 정신건강의학은 신체 증상과 심리 증상 모두를 포괄적으로 평가하고 상호 작용을 고려하는 접근법을 취한다. 심리 치료와 약물 치료는 둘 다 중요하며, 환자의 정보가 가장 중요하다. 근본적인 정신치료보다는 주요 문제를 빠르게 치료하는 문제 지향적 치료가 강조되며, 갈등 상황에 개입하는 것도 자문조정 의사의 역할 중 하나이다."}, {"subject": "Body and Mind, Stress", "year": ["13학번"], "professor": "한진희", "question": "정신신체의학에서 스트레스 관리에 자주 이용되는 기법에 속하는 것은?", "images": [], "text_box": null, "options": ["약물치료", "정신분석", "이완훈련", "유산소 운동", "웨이트 트레이닝"], "answer": [2], "explanation": "스트레스 관리 및 이완 요법은 인지행동 치료기법을 이용하며 자기관찰, 인지재구성, 이완요법, 최면, 생체되먹임, 시간관리가 포함된다. 이완훈련은 스트레스 관리의 핵심 기법 중 하나이다."}, {"subject": "Body and Mind, Stress", "year": ["13학번"], "professor": "한진희", "question": "Holmes와 Rahe (1967)의 사회재적응 평가척도에서 가장 높은 생활 스트레스 인자는?", "images": [], "text_box": null, "options": ["이혼", "해고", "부모님 죽음", "배우자 죽음", "교도소 수감 생활"], "answer": [3], "explanation": "Holmes와 Rahe의 사회재적응 평가척도(Social Readjustment Rating Scale)에서 생활 스트레스 인자 중 가장 높은 점수를 차지하는 것은 배우자 사별(죽음)이다. 이는 서양 문화권에서 배우자와의 이별이 개인에게 가장 큰 심리적, 사회적 영향을 미 미치는 사건으로 간주되기 때문이다."}, {"subject": "Body and Mind, Stress", "year": ["11학번"], "professor": "김태석", "question": "신체질환은 없는데 신체증상을 주로 호소하거나 신체적 증상에 집착하는 정신과적 질환에 속하는 것은?", "images": [], "text_box": null, "options": ["급성 스트레스 장애(acute stress disorder)", "적응장애(adjustment disorder)", "공황장애(panic disorder)", "전환장애(conversion disorder)", "해리장애(dissociative disorder)"], "answer": [3], "explanation": "신체형 장애에는 신체증상장애, 질병불안장애, 전환장애, 인위성장애(가장성장애)가 포함된다. 이 중 전환장애는 신체질환이 없는데도 신체증상을 주로 호소하는 정신과적 질환이다."}, {"subject": "Body and Mind, Stress", "year": ["11학번", "10학번"], "professor": "김태석", "question": "정신과로 최우선적으로 협진을 의뢰해야 하는 문제로 가능성이 가장 높은 것은?", "images": [], "text_box": null, "options": ["섬유근통 환자가 두통을 호소하였다.", "암 환자가 수면제를 달라고 요청하였다.", "출산 후 산모가 자살에 대해 언급하였다.", "심장 수술 후 가슴에 심한 통증을 호소하였다.", "만성 신부전 입원 환자가 투석 중에 잠이 들었다."], "answer": [2], "explanation": "정신과적 협진에서 응급 상황은 자살 및 섬망 상태이다. 환자의 불특정한 신체 증상 호소는 의학적 평가가 선행되어야 하지만, 자살에 대한 언급은 생명과 직결되는 가장 시급한 문제이므로 최우선적으로 협진을 의뢰해야 한다."}, {"subject": "Body and Mind, Stress", "year": ["11학번"], "professor": "김태석", "question": "다음 중 정신신체장애의 치료로 옳은 것은?", "images": [], "text_box": null, "options": ["최면 (hypnosis)", "자기관찰 (self-observation)", "시간관리 (time management)", "이완요법 (relaxation exercise)", "above all"], "answer": [4], "explanation": "스트레스 관리 및 이완 요법은 인지행동 치료 기법을 이용하며 자기관찰, 인지재구성, 이완요법, 최면, 생체되먹임, 시간관리 등 다양한 방법이 포함된다. 따라서 제시된 모든 치료법이 정신신체장애 치료에 사용될 수 있다."}, {"subject": "Body and Mind, Stress", "year": ["11학번"], "professor": "원왕원", "question": "자문조정 정신의학의 진단 과정의 “ABC”의 그 내용의 연결이 옳은 것은?", "images": [], "text_box": null, "options": ["Affective - 공격성", "Affective - 불면", "Behavioral - 불안", "Behavioral - 과민성", "Cognitive - 수행능력"], "answer": [4], "explanation": "자문조정 정신의학의 진단 과정에서 ABC는 A: Affective (정서), B: Behavioral (행동), C: Cognitive (인지)를 의미한다. Affective(정서)에는 우울, 불안, 과민성이 포함되고, Behavioral(행동)에는 동기 없음, 불면, 식욕 저하, 초조 불안, 성기능, 공격성이 포함된다. Cognitive(인지)에는 기억력, 언어 능력, 사고 내용, 수행 능력, 의식, 집중력, 주의력이 포함된다. 따라서 Cognitive - 수행능력이 옳다."}, {"subject": "Body and Mind, Stress", "year": ["10학번"], "professor": "원왕연", "question": "신체질환은 없는데 신체증상을 주로 호소하거나 신체적 증상에 집착하는 정신과적 질환에 속하지 않는 것은?", "images": [], "text_box": null, "options": ["신체화장애(somatization disorder)", "전환장애(conversion disorder)", "건강염려증(hypochondriasis)", "적응장애(adjustment disorder)", "신체이형장애(body dysmorphic disorder)"], "answer": [3], "explanation": "적응장애는 스트레스원에 대한 반응으로 발생하는 정서적 또는 행동적 증상을 특징으로 하며, 신체형 장애에 속하지 않는다. 신체형 장애에는 신체증상장애, 질병불안장애, 전환장애, 인위성장애(가장성 장애), 신체이형장애 등이 있다."}, {"subject": "Body and Mind, Stress", "year": ["10학번"], "professor": "한진희", "question": "자문조정정신의학의 치료적 측면에서 가능성이 가장 높은 것은?", "images": [], "text_box": null, "options": ["약물치료가 정신사회적 치료보다 근원적인 치료이다.", "환자의 문제를 빠르게 해결하는 문제 지향치료가 우선된다.", "치료적 접근 시 환자의 사회적 배경은 도움이 되지 않는다.", "자문치료는 정신과 병동에서 이루어지는 것이 원칙이다.", "약물 치료 시 타과의 사용 약물을 고려할 필요는 없다."], "answer": [1], "explanation": "자문조정 정신의학의 치료는 문제 지향적 접근 방식을 중요하게 여기며, 환자의 문제를 빠르게 해결하는 것을 우선시한다. 이는 정신과 치료에 대한 환자의 거부감을 줄이고 치료 순응도를 높이는 데 도움이 된다. 약물치료와 정신사회적 치료는 모두 중요하며, 환자의 사회적 배경도 치료에 도움이 된다."}, {"subject": "Body and Mind, Stress", "year": ["09학번"], "professor": "", "question": "스트레스를 관리하는 방법이 아닌 것은?", "images": [], "text_box": null, "options": ["인지재구성", "자기관찰", "문제해결", "노출요법", "시간관리"], "answer": [3], "explanation": "스트레스 관리 및 이완 요법은 인지행동 치료 기법을 이용하며 자기관찰, 인지재구성, 이완요법, 최면, 생체되먹임, 시간관리가 포함된다. 노출 요법은 주로 불안 장애, 특히 공포증 치료에 사용되는 기법으로, 스트레스 관리의 일반적인 방법과는 거리가 있다."}, {"subject": "Body and Mind, Stress", "year": ["09학번"], "professor": "", "question": "자문조정 정신의학의 고려사항인 ABC 중 틀린 것은?", "images": [], "text_box": null, "options": ["A= 우울", "B= 수행능력 장애", "C= 언어장애", "A= 불안", "B= 불면"], "answer": [1], "explanation": "자문조정 정신의학의 진단 과정에서 ABC는 A: Affective (정서), B: Behavioral (행동), C: Cognitive (인지)를 의미한다. Affective(정서)에는 우울, 불안, 과민성이 포함되고, Behavioral(행동)에는 동기 없음, 불면, 식욕 저하, 초조 불안, 성기능, 공격성이 포함된다. Cognitive(인지)에는 기억력, 언어 능력, 사고 내용, 수행 능력, 의식, 집중력, 주의력이 포함된다. 따라서 B= 수행능력 장애는 C(인지)에 더 가깝다."}, {"subject": "Body and Mind, Stress", "year": ["09학번"], "professor": "", "question": "다음 중 정신과로 자문해야 하는 경우와 관계가 먼 것은?", "images": [], "text_box": null, "options": ["암 환자가 불면을 호소한다", "당뇨병이 있는 환자가 자살을 생각할 때", "심장질환자가 가슴 통증을 호소할 때", "만성 신부전 환자가 투석을 거부할 때", "위암 수술 후 의식 이상을 호소 할 때"], "answer": [2], "explanation": "정신과로 자문 조정이 필요한 상황은 자살, 섬망, 우울, 초조 및 불안, 불면, 비순응, 충동성, 공격성, 공존 및 기존 정신 질환이다. 가슴 통증과 의식 이상 모두 정신과적 문제로 인해 발생할 가능성이 있지만, 심장 질환자의 가슴 통증 호소는 심장 관련 문제와 직접적으로 연관될 가능성이 높으므로 정신과 자문보다는 신체적 진찰/치료가 우선적으로 필요하다."}, {"subject": "불안장애", "year": ["22학번", "21학번", "20학번", "19학번", "18학번"], "professor": "채정호", "question": "이 사람에 대한 적절한 치료는?", "images": [], "text_box": "28세 여자 환자가 지하철을 타다가 질식할 것 같은 두려움으로 더 이상 탈 수 없어서 내려서는 숨이 차고 심장이 터져서 죽을 것 같다는 두려움을 주소로 응급실로 내원하였다. 병력 상 약 1년 전부터 답답한 곳에 가면 호흡이 곤란하고 가슴이 뛰며 얼굴이 벌개지면서 식은 땀이 나는 것 같아서 견딜 수가 없어서 가급적이면 사람 많은 곳에는 가지 않고 살았다고 하며 이렇게 갑자기 가슴이 뛰는 일이 올 까봐 늘 두려워 한다고 하였다. 병력 상 고등학교 때 이후 항상 긴장을 쉽게 하고 늘 벼랑 끝에 선 것 같은 느낌이 있고 몸도 아픈 곳이 많으며 항상 불안하고 걱정이 많다고 하였다. 정신상태검사 상 불안과 긴장이 심한 상태였지만 안정을 좀 취하고 나자 표정이 좋아졌고 평시에 기분이 심하게 우울하거나 무력한 적은 없으며 직장 생활은 잘 영위한다고 하였다.", "options": ["지하철 질식공포가 심하므로 대중교통을 이용하지 않도록 한다", "인지왜곡을 알아보고 수정하는 인지치료는 두려움이 큰 초기에는 사용하지 않도록 한다", "buspirone 은 병발할 수 있는 우울증상을 악화시킬 수 있으므로 사용하지 않도록 한다", "약물에 반응을 하고 호전이 있는 경우에도 최소한 6개월 이상 지속하고 1~2년 정도 유지 치료하는 것을 권장한다", "죽을 것 같은 두려움이 많은 질환이므로 자살은 하지 않아서 이에 대한 관심은 기울이지 않아도 된다"], "answer": [3], "explanation": "환자는 공황장애와 범불안장애가 동반된 상태로 보이며, 이에 대한 치료는 약물치료와 인지행동치료를 병행할 수 있습니다. 약물치료에 반응하여 증상이 호전된 경우에도 재발을 방지하기 위해 유지 치료가 중요합니다. 일반적으로 항불안제 또는 항우울제 치료는 최소 6개월 이상, 길게는 1~2년간 유지할 것을 권장합니다. 인지치료는 두려움이 큰 초기에도 활용될 수 있으며, Buspirone은 우울증상을 악화시키지 않고 불안에 효과적인 약물입니다."}, {"subject": "불안장애", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "채정호", "question": "불안을 주로 나타내는 장애들의 특징을 올바르게 기술한 것은?", "images": [], "text_box": null, "options": ["외상 후 스트레스 장애는 자기 몸에서 나타나는 신체 증상에 대한 경험적 회피를 한다", "범불안장애는 불안만을 주 특징으로 나타내는 것으로 우울장애와는 동반하지 않는다", "강박장애는 원하지 않는 생각과 이미지와 관련된 불편함을 나타낸다", "사회불안장애는 여러 사람 앞에서보다 친밀한 사람 앞에서 불안 증상을 심하게 나타낸다", "특정 공포증은 일반 인구에서는 매우 드문 질환이나 본인의 고통이 심하여 정신과 외래 진료로는 많이 방문한다"], "answer": [2], "explanation": "강박장애의 특징은 원치 않는 반복적인 생각(강박사고)이나 행동(강박행동)으로 인해 고통과 기능적 손상을 경험하는 것이다. 이 중 원하지 않는 생각과 이미지는 강박사고에 해당한다. 외상 후 스트레스 장애(PTSD)보다는 공황장애 환자가 신체 증상에 대한 경험적 회피를 더 흔히 보인다. 범불안장애는 우울증과 자주 동반되며, 사회불안장애는 낯선 사람 앞에서보다 친밀한 사람 앞에서 불안 증상을 심하게 나타내지는 않는다. 특정 공포증은 불안장애 중 유병률이 높은 편에 속하지만, 정신과 진료를 받는 비율은 상대적으로 낮다."}, {"subject": "불안장애", "year": ["21학번", "20학번", "19학번", "18학번", "15학번", "14학번", "13학번", "12학번", "11학번", "8학번"], "professor": "서호준", "question": "치료는?", "images": [], "text_box": "55세 여자가 내과에서 정신건강의학과로 의뢰되었다. 20 여년 전부터 평소 두통, 메스꺼움, 피곤함을 호소하여 내과에서 여러 번 검사를 맡았으나 이상 소견은 없었다. 6개월 전 딸의 결혼을 준비하면서 걱정과 함께 불면, 긴장, 불안과 초조가 심해져서 작은 일에도 쉽게 짜증을 낸다.", "options": ["가상노출", "부스피론", "습관반전", "체계적 탈감작", "홍수기법"], "answer": [1], "explanation": "환자는 20년 이상 지속된 만성적인 불안, 긴장, 초조 증상과 신체 증상을 호소하며, 최근 스트레스로 증상이 악화되었다. 다른 의학적 원인이나 특정 장애로 설명되지 않으므로 범불안장애임을 판단할 수 있다. 범불안장애의 치료는 약물치료와 인지행동치료가 사용되며, 약물치료로는 SSRI가 우선적으로 고려되고 부스피론이나 벤조디아제핀도 사용될 수 있다. 따라서 부스피론은 범불안장애의 적절한 약물치료 옵션 중 하나이다."}, {"subject": "불안장애", "year": ["21학번", "20학번"], "professor": "채정호", "question": "불안장애에 대한 기술 중 가장 적절한 것은?", "images": [], "text_box": null, "options": ["미국 정신의학회 진단 편람 5판인 DSM-5 에서는 외상 후 스트레스장애가 불안장애의 범주안에 새롭게 함입되었다", "불안장애의 유병률은 다른 정신질환에 비하여 높은 편이나 사회불안장애와 특정공포증은 유병률이 낮은 편이다", "불안장애라고 할 때에는 증상으로 인한 주관적 고통과 기능적 장해 및 자신 혹은 타인에게 해롭다는 기준이 다 충족되어야 한다", "미국 정신의학회 진단 편람 5판인 DSM-5에 따르면 약물이나 신체 질환에 의한 불안증도 불안장애 범주에 포함된다", "불안장애는 무의식적 갈등으로 인한 불안이 문제이므로 약물치료나 인지행동치료보다는 정신분석적 치료를 우선적으로 시행하는 것이 필수적이다"], "answer": [3], "explanation": "DSM-5에서는 외상 후 스트레스장애가 불안장애의 범주에서 제외되고 별도의 범주로 분류된다. 불안장애 중에서는 특정공포증과 사회불안장애의 유병률이 가장 높다. 불안장애의 진단 기준은 주관적 고통, 기능적 장해, 자신 또는 타인에게 해로움 중 하나만 충족되어도 질환으로 간주한다. DSM-5에 따르면 약물이나 신체 질환에 의한 불안증도 특정 불안장애 범주에 포함된다. 불안장애 치료는 정신분석적 치료 외에도 약물치료나 인지행동치료가 효과적으로 사용될 수 있다."}, {"subject": "불안장애", "year": ["20학번"], "professor": "", "question": "불안, 공포, 병적 불안에 대한 설명 중 가장 올바른 것은?", "images": ["../IMG/20250423_수7_정신_불안장애_채정호교수님_PAD/img1.png"], "text_box": null, "options": ["불안은 외부의 분명한 자극에 대한 급성 반응이다.", "공포는 미래를 대비하기 위한 심리적 기제로 나타난다.", "편도체의 과도한 활성 저하가 병적 불안을 나타내는 것으로 알려져 있다", "공포는 원인을 분명히 아는 것에 대한 반응으로 현재 생존을 하기 위해 나타난다", "불안은 공포와 걱정과 같은 심리증상과 안절부절과 같은 행동증상으로만 나타나고 공포는 근육 긴장, 빈맥과 같은 신체증상이 동반됨"], "answer": [3], "explanation": "공포는 원인을 분명히 아는 위협에 대한 급성 반응으로, 현재의 위험에 대한 생존을 위한 기제이다. 불안은 원인을 분명히 알 수 없는 모호하고 불분명한 미래의 위협에 대한 만성적인 반응이다. 병적 불안은 편도체의 과도한 활성과 관련이 있는 것으로 알려져 있다. 불안은 심리적 증상 외에도 신체적, 행동적 증상을 모두 동반할 수 있다."}, {"subject": "불안장애", "year": ["19학번"], "professor": "서호준", "question": "이 사람에서 우선적으로 생각해야 할 진단은?", "images": [], "text_box": "28세 여자가 지하철을 타다가 질식할 것 같아 더 이상 탈 수 없고 숨이 차고 심장이 터져서 죽을 것 같다는 두려움으로 병원에 왔다. 약 1년 전부터 답답한 곳에 가면 호흡이 곤란하고 가슴이 뛰며 얼굴이 벌개지면서 식은 땀이 나는 것 같아서 견딜 수가 없어서 가급적이면 사람이 많은 곳에는 가지 않고 살았다고 하며 이렇게 갑자기 가슴이 뛰는 일이 올까봐 늘 두려워하였다. 고등학교 때 이후 항상 긴장을 쉽게 하고 늘 벼랑 끝에 선 것 같은 느낌이 있고 몸도 아픈 곳이 많으며 항상 불안하고 걱정이 많다고 하였다. 정신상태검사에서 불안과 긴장이 심한 상태였지만 안정을 좀 취하고 나자 표정이 좋아졌고 평상시에 기분이 심하게 우울하거나 무력한 적은 없으며 직장생활은 잘 영위한다고 하였다.", "options": ["강박장애", "범불안장애", "특정공포증", "사회불안장애", "외상 후 스트레스 장애"], "answer": [1], "explanation": "환자는 갑작스러운 공황 발작 증상과 함께 지하철 등 특정 장소를 회피하는 공황장애 증상을 보인다. 또한 고등학교 때부터 지속적인 긴장, 불안, 걱정, 다양한 신체 증상을 호소하며, 이는 범불안장애의 특징에 해당한다. 불안 증상이 6개월 이상 지속되고 여러 생활 영역에 걸쳐 나타나므로 범불안장애를 우선적으로 고려할 수 있다. 공황장애와 범불안장애가 공존하는 경우도 흔하다."}, {"subject": "불안장애", "year": ["19학번", "18학번"], "professor": "서호준", "question": "불안장애에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["복구 X", "강박장애는 행동으로만 증상이 나타나고, 사고에는 영향을 미치지 않는다.", "공황장애 환자는 경험적으로 신체증상을 회피하려고 한다.", "복구 X", "특정공포증은 드문 질환이지만 정신과에 내원하는 환자가 많다."], "answer": [2], "explanation": "공황장애 환자들은 공황 발작 시 나타나는 신체 증상(예: 심계항진, 호흡 곤란)을 두려워하여 이를 유발할 수 있는 상황이나 장소를 회피하는 경향을 보인다. 강박장애는 원하지 않는 사고(강박사고)와 반복적인 행동(강박행동)을 주 증상으로 하며, 사고에도 영향을 미친다. 특정 공포증은 불안장애 중 유병률이 높은 편에 속하지만, 일반적으로 정신과 진료를 받는 비율은 상대적으로 낮다."}, {"subject": "불안장애", "year": ["17학번", "15학번", "14학번", "12학번", "11학번", "9학번"], "professor": "서호준", "question": "불안과 비교한 공포의 특징으로 옳은 것은?", "images": ["../IMG/20250423_수7_정신_불안장애_채정호교수님_PAD/img2.jpeg"], "text_box": null, "options": ["만성적이다", "서서히 발현된다", "두려움의 대상이 명확하다", "불분명하고 모호한 불편감으로 느껴진다", "무의식적인 내적 갈등이 더 흔히 관찰된다"], "answer": [2], "explanation": "공포는 두려움의 대상이 명확하고 외부적이며, 급성으로 갑자기 발현되는 특징을 가진다. 이는 현재의 위협에 대한 즉각적인 반응이다. 반면 불안은 두려움의 대상이 불분명하고 내적이며, 만성적이고 서서히 나타나는 경향이 있다. 불안은 모호한 불편감으로 느껴지며, 미래의 잠재적 위협에 대한 걱정과 관련된다."}, {"subject": "불안장애", "year": ["17학번", "15학번", "14학번", "11학번", "10학번"], "professor": "서호준", "question": "불안을 중재하는 가장 핵심적인 기관으로 알려진 뇌 구조물은?", "images": [], "text_box": null, "options": ["편도 (Amygdala)", "소뇌 (Cerebellum)", "간뇌 (Brainstem)", "해마 (Hippocampus)", "시상하부 (Hypothalamus)"], "answer": [0], "explanation": "불안 반응의 중추적인 역할을 하는 뇌 구조물은 편도(Amygdala)이다. 편도는 변연계의 핵심 부분으로, 위협 자극을 감지하고 공포 반응을 조절하는 데 중요한 역할을 한다. 소뇌, 간뇌, 해마, 시상하부 등 다른 뇌 구조물들도 정서 및 인지 기능에 관여하지만, 불안 중재의 핵심 기관은 편도이다."}, {"subject": "불안장애", "year": ["17학번", "12학번"], "professor": "서호준", "question": "공포, 불안에 대한 신체적 반응으로 교감신경이 활성화되었을 때 나타나는 증상은?", "images": ["../IMG/20250423_수7_정신_불안장애_채정호교수님_PAD/img3.png"], "text_box": null, "options": ["혈압 감소", "땀 분비 감소", "호흡 수의 감소", "소화기능의 저하", "신체 말단의 말초혈관의 확장"], "answer": [3], "explanation": "교감신경이 활성화되면 심박동수와 혈압이 증가하고, 호흡 속도가 빨라진다. 근육 긴장, 떨림, 말초혈관 수축이 발생하며 땀 분비가 증가하고 동공이 확장된다. 또한 입마름과 위장계통 활동 감소로 인한 메스꺼움이 나타날 수 있다. 따라서 소화 기능의 저하는 교감신경 활성화 시 나타나는 증상 중 하나이다."}, {"subject": "불안장애", "year": ["17학번", "15학번", "14학번", "13학번", "12학번", "11학번", "10학번", "9학번", "09학번"], "professor": "서호준", "question": "가능성이 가장 높은 진단은?", "images": [], "text_box": "24세 여자 환자가 갑작스럽게 발생한 극도의 불안감을 호소하며 병원 응급실에 방문하였다. 환자는 몸을 떨면서 가슴이 두근거리고 숨을 쉴 수 없다고 하였으며, 어지럽고 메스껍다고 하였으며, 죽을 것 같은 느낌이 든다고 하였다. 침대에 누워 휴식을 취한 지 20 분이 지나면 증상은 점차 안정되었다. 환자는 이런 증상으로 지난 9개월 동안 총 5차례 응급실을 방문했으며, 그때마다 검사소견은 정상이라 이해할 수 없었다고 하였다.", "options": ["강박장애", "공황장애", "적응장애", "범불안장애", "사회불안장애"], "answer": [1], "explanation": "환자는 갑작스럽게 극심한 불안감과 함께 심계항진, 호흡곤란, 어지러움, 메스꺼움, 죽을 것 같은 느낌 등 다양한 신체 증상을 경험했다. 이러한 증상은 20분 내외로 사라지고, 반복적으로 응급실을 방문했으나 신체 검사 소견은 정상이었다. 이는 공황 발작의 전형적인 양상이며, 반복적인 공황 발작으로 인한 공황장애로 진단할 수 있다."}, {"subject": "불안장애", "year": ["16학번"], "professor": "서호준", "question": "정신질환 진단 및 통계관찰 제5판(DSM-5)에서 불안장애로 분류하는 질병은?", "images": ["../IMG/20250423_수7_정신_불안장애_채정호교수님_PAD/img4.png"], "text_box": null, "options": ["적응장애 (Adjustment disorder)", "반응성 애착장애 (Reactive attachment disorder)", "저장장애 (Hoarding disorder)", "신체이형성장애 (Body dysmorphic disorder)", "선택적 함구증 (Selective mutism)"], "answer": [4], "explanation": "DSM-5에서는 불안장애 범주에 여러 질환을 포함한다. 주요 불안장애로는 공황장애, 범불안장애, 사회불안장애, 광장공포증, 특정공포증, 분리불안장애 등이 있다. 선택적 함구증은 어린 시절부터 특정 사회적 상황에서 말을 하지 못하는 증상을 특징으로 하며, DSM-5에서 불안장애의 한 종류로 분류된다."}, {"subject": "불안장애", "year": ["12학번", "11학번", "9학번"], "professor": "서호준", "question": "20대의 젊은 여자가 택시에서 립스틱을 바르고 있는데 앞차가 끼어들기를 했다며 운전기사가 화를 내자 자신이 무척 불안한 느낌이 들었다. 가장 관련 깊은 불안은?", "images": [], "text_box": "20대의 젊은 여자가 택시에서 립스틱을 바르고 있는데 앞차가 끼어들기를 했다며 운전기사가 화를 내자 자신이 무척 불안한 느낌이 들었다.", "options": ["Paranoid anxiety", "Castration anxiety", "Superego anxiety", "Disintegration anxiety", "Anxiety of loss of object"], "answer": [2], "explanation": "이 사례는 정신분석 이론에서 언급하는 '초자아 불안(Superego anxiety)'과 가장 관련이 깊다. 초자아 불안은 자신의 행동이 부적절하거나 죄책감을 느껴 발생하며, 이는 도덕적 기준이나 이상에 어긋날 때 나타나는 불안이다. 환자가 운전기사의 분노에 대해 자신에게 죄책감이나 도덕적 불쾌감을 느껴 불안해하는 상황으로 해석할 수 있다."}, {"subject": "불안장애", "year": ["8학번"], "professor": "채정호", "question": "불안의 신경학적 증상으로 옳은 것은?", "images": [], "text_box": null, "options": ["Weakness", "Restlessness", "Palpitation", "Nausea", "Insomnia"], "answer": [1], "explanation": "불안은 다양한 정신적, 신체적, 행동적 증상을 동반한다. 신경학적 증상 중 하나는 안절부절 못함(Restlessness)으로, 이는 행동 증상에 해당한다. 가슴 두근거림(Palpitation)은 심혈관계 증상, 메스꺼움(Nausea)은 위장관계 증상, 불면증(Insomnia)은 수면장애 증상이다. 불안 시 나타나는 이러한 증상들은 자율신경계의 과활성화와 관련이 있다."}, {"subject": "불안장애", "year": ["7학번"], "professor": "", "question": "다음 중 병적 불안에 해당하는 것은?", "images": [], "text_box": null, "options": ["시험문제를 받고 가슴이 두근거렸다.", "절벽에서 아래를 내려다보니 가슴이 덜컥 내려앉았다.", "옆집 강아지가 무서워 그 집을 지나가지 않으려고 노력했다.", "자동차에 치일 뻔해 무서워졌다.", "엘리베이터가 갑자기 멈춰서 가슴이 뛰었다."], "answer": [2], "explanation": "병적 불안은 정상적인 위협에 대한 반응이 아니라, 비합리적이고 과도한 불안으로 인해 일상생활에 지장을 초래하고 회피 행동을 유발하는 경우를 말한다. 옆집 강아지에 대한 두려움으로 인해 집을 지나가지 않으려고 노력하는 것은 비합리적인 회피 행동으로, 일상생활에 영향을 미 미치므로 병적 불안에 해당한다. 다른 보기들은 위험 상황에 대한 자연스러운 공포 반응이다."}, {"subject": "불안장애(1)", "year": ["22학번", "21학번", "20학번", "19학번"], "professor": "채정호", "question": "다음 공황장애에 대한 설명 중 가장 올바르게 기술한 것은?", "images": [], "text_box": null, "options": ["공황장애는 심장박동 증가와 같은 신체증상을 재앙화 사고로 해석하여 경계심과 예기불안이 생기고 공포에 대한 공포가 조건화되면서 악순환에 들어가게 된다.", "공황장애에서 이완훈련은 통제력을 잃게 하므로 권장하지 않는다.", "공황장애는 한 번 치료가 되면 잘 재발하지 않으므로 초기에 강력한 치료를 하는 것이 중요하다.", "공황장애는 CO2, 요힘빈, mCCP 과 같은 공황을 유발하는 물질을 주면 공황이 발생하는 것으로 진단할 수 있다.", "공황은 10분 이내에 급격한 불안과 동반되는 신체 증상이 정점에 이르며 사라지지 않고 반복해서 수일간 지속되므로 주관적 고통이 매우 심하다"], "answer": [0], "explanation": "공황장애의 핵심적인 특징 중 하나는 심장박동 증가와 같은 신체 증상을 재앙화 사고로 해석하여 불안이 증폭되고, 이로 인해 공황 발작에 대한 예기불안과 회피행동이 조건화되는 악순환이 발생한다는 것이다. 이완 훈련은 공황장애의 중요한 치료 방법이며, 공황장애는 재발이 매우 빈번한 질환이다. 또한 공황 유발 물질이 항상 공황을 일으키는 것은 아니며, 공황 발작은 대개 10분 이내에 증상이 정점에 달한 후 20~30분 정도 지속되다가 사라진다."}, {"subject": "불안장애2", "year": ["21학번", "20학번"], "professor": "채정호", "question": "이 환자의 질환에 대한 기술 중 가장 올바른 것은?", "images": [], "text_box": "36세 남자 환자로 고등학교 시절 심한 틱 장애로 정신건강의학과 치료를 받은 적이 있다고 하며 대학교 시절부터 책상이 엉클어져 있으면 집중을 하지 못하여 자신의 방식으로 정렬을 해야 했고 외출 후 돌아오면 병균이 묻은 것 같아서 입고 있던 옷을 다 벗고 매일 세탁을 해야 하고 손도 자주 씻고 샤워하는 시간도 길어져서 매번 1시간 이상 씻어야 한다고 하였다. 외출을 하고 나서도 집의 가스불을 잠그지 않은 것 같아 다시 돌아가서 확인해야 하여야 했고 컴퓨터를 켤 때마다 머리 속으로 하나 둘 셋을 세고 켜고 나름대로의 규칙에서 어긋났다고 하면 다시 전원을 내렸다가 켜야 한다고 했다. 본인도 자신의 증상이 지나치다는 것은 알고 있었으나 수정할 수가 없다고 하였다.", "options": ["불안을 주소로 하는 여타 질환처럼 여자에게서 남자보다 2배 정도 더 빈발한다.", "사춘기 발병은 여자가 더 많고 성인기 발병은 남자가 더 많다", "두뇌 회로의 이상이 질환의 원인으로 대두되어 한 때는 띠이랑절개술(cinguloctomy)도 시행하기도 하였고 경두개자기자극치료 등의 뇌자극술을 하기도 하며 세로토닌계통의 항우울제를 고용량으로 사용하기도 한다.", "강박사고가 나타나지 못하도록 억제해야 한다.", "소아기에 발병한 경우 비교적 예후가 좋다."], "answer": [2], "explanation": "강박장애는 다른 불안장애와는 다르게 남녀 유병률이 비슷합니다. 사춘기 발병은 남자가 더 많고 성인기 발병은 여자가 더 많으며, 소아기 발병의 경우 예후가 불량합니다. 강박사고는 억제할 수 없지만 강박행동은 하지 못하도록 해야 합니다. 강박장애의 원인으로는 두뇌 회로 이상이 대두되어 띠이랑절개술(cinguloctomy), 경두개자기자극치료 등이 시행되며, 세로토닌계통 항우울제를 고용량으로 사용하기도 합니다."}, {"subject": "불안장애(1)", "year": ["20학번"], "professor": "채정호", "question": "이 환자가 겪고 있는 상병에 대한 기술 중 가장 올바른 것은?", "images": [], "text_box": "28 세의 남자 환자가 회사에 입사한 다음에 불안 증상이 악화되어 내원하였다. 매우 내성적인 성격으로 남 앞에 나서는 일을 좋아하지 않았다고 하며 학창시절에는 그래도 어느 정도 좋은 학업 성적을 유지하였으나 친구는 없는 편으로 집에서는 혼자서 취미생활을 하며 잘 지내왔다고 한다. 입사 이후 프레젠테이션 할 일이 많아지면서 회사 가는 것이 불편하고 자신이 다른 사람에게 폐를 끼치는 것 같고 발표 순서가 되면 머리가 하얘져서 준비한 것도 잘 발표하지 못하고 말도 더듬으며 가슴이 뛰고 손이 떨리는 증상이 있었다고 하며 2주 전에는 발표 중에 심장이 터질 것 같으며 빈맥이 심해져서 발표장에서 뛰쳐나왔다고 한다.", "options": ["동양 문화권에서는 자신의 불편함에 초점을 맞추는 경우가 많고, 서양 문화권에서는 자신의 증상 때문에 타인이 피해를 받는다고 생각하는 경우가 많다.", "부정적 평가를 받을 상황에 대한 지속적이고 비합리적인 두려움과 회피를 특징으로 한다.", "수행 전에 propranolol 을 복용하는 것은 증상완화를 유도하는 회피행동이므로 사용하지 않도록 해야 한다.", "사회가 발달하면서 대인관계 접촉이 많아지면서 유병률이 줄고 있어 대개 0.1% 정도의 유병률을 나타내는 것으로 알려져 있다.", "타인에 대한 공포가 심하므로 인지행동치료를 시행할 때는 집단으로 하지 않고 개인 치료를 하도록 한다."], "answer": [1], "explanation": "이 환자는 사회적으로 판단받는 상황, 특히 발표에 대한 불안을 호소하며 회피하는 양상을 보인다. 이는 부정적인 평가를 받을 상황에 대한 지속적이고 비합리적인 두려움과 회피를 특징으로 하는 사회불안장애의 전형적인 증상이다. 1번 선지는 동서양 문화권의 설명이 바뀌어 있으며, 3번 선지의 propranolol은 증상 완화에 사용될 수 있는 베타차단제이므로 틀렸다. 사회불안장애는 0.3~7% 정도로 비교적 흔한 질환이며, 집단 인지행동치료도 효과적이다."}, {"subject": "불안장애2", "year": ["19학번"], "professor": "서호준", "question": "PTSD의 임상적 증상이 아닌 것은?", "images": [], "text_box": null, "options": ["작은 소리에도 민감하다", "만성적인 우울함", "이전에 즐겨하던 취미생활을 하지 않는다", "차에 치이는 악몽을 꾼다", "사고 장소에 다시 가지 않는다"], "answer": [2], "explanation": "PTSD의 주요 증상 범주에는 침습(Intrusion), 회피(Avoidance), 인지 및 감정의 부정적 변화(Negative alterations in cognitions and mood), 과도각성(Arousal and reactivity)이 있습니다. 악몽은 침습 증상, 사고 장소 회피는 회피 증상, 작은 소리에 민감한 것은 과도각성 증상, 만성적 우울함은 인지와 감정의 부정적 변화에 해당합니다. '이전에 즐겨하던 취미생활을 하지 않는다'는 흥미 상실과 관련될 수 있으나, 다른 선택지들이 더 명확하게 PTSD의 핵심 증상을 나타냅니다."}, {"subject": "불안장애(1)", "year": ["19학번"], "professor": "채정호", "question": "적절한 치료는?", "images": [], "text_box": "22 세 여자가 사람들 앞에서 불안하고 목소리가 떨린다며 병원에 왔다. 친한 친구와 개인적으로 이야기하는 것은 괜찮았지만 두 명 이상의 친구들과 이야기할 때는 얼굴이 빨개지고 목소리가 떨리며 매우 불편해했다. 최근 증상이 심해져 대중교통을 이용하거나 공중 화장실을 사용할 때도 타인이 의식되어 매우 힘들어하였다.", "options": ["노출 및 반응 억제 (exposure and response prevention)", "서트랄린 (sertraline)", "정신역동적 정신치료 (psychodynamic psychotherapy)", "트라조돈 (trazodone)", "프로프라놀롤 (propranolol)"], "answer": [1], "explanation": "제시된 환자는 사람들 앞에서 불안을 느끼고 타인의 시선을 의식하며 회피하는 증상을 보이므로 사회불안장애(SAD)로 진단할 수 있다. 일상생활에 지장을 주는 사회불안장애의 치료에는 선택적 세로토닌 재흡수 억제제(SSRI)가 주로 사용되며, 서트랄린은 대표적인 SSRI 약물 중 하나이다. Propranolol과 같은 베타차단제는 특정 수행 공포 시 증상 완화를 위해 사용될 수 있으나, 전반적인 SAD 치료제는 아니다."}, {"subject": "불안장애(1)", "year": ["19학번", "17학번", "15학번", "12학번", "10학번", "09학번"], "professor": "채정호", "question": "이 환자에게 일차적으로 시행해볼 수 있는 약물은 무엇이 있는가?", "images": [], "text_box": "42 세 여자가 성당에서 미사를 드릴 때 신도들 앞에서 성경을 낭독하는 것이 불안하다며 정신과를 찾았다. 학창시절부터 사람들 앞에 나서는 것을 불편해하여 그런 일을 일부러 피해왔다고 한다. 그러나 약 1개월 전 신도회의 단장역할을 맡으며 한달에 한 번씩 신도들 앞에서 성경을 읽어야하는 일이 생겼다고 한다. 예배 전날에는 너무 불안하여 잠도 자지 못한다고 할 때", "options": ["Propranolol", "Mirtazapine", "Sertraline", "Venlafaxine", "Buspirone"], "answer": [0], "explanation": "이 환자는 사람들 앞에서 성경을 낭독하는 특정 수행 상황에서 불안을 느끼는 사회불안장애 환자이다. 이처럼 발표와 같은 단순한 수행을 앞둔 상황에서 발생하는 불안 증상 완화를 위해 일차적으로 베타차단제인 Propranolol을 사용할 수 있다. Propranolol은 수행 약 30분 전에 복용하여 가슴 두근거림이나 긴장과 같은 신체 증상을 효과적으로 완화시킨다."}, {"subject": "불안장애(1)", "year": ["19학번"], "professor": "채정호", "question": "새가 있는 곳에 환자를 놔두는 치료의 이름은?", "images": [], "text_box": "26 세 여자, 새를 무서워해 새가 있는 곳으로의 외출을 꺼림,", "options": ["노출 및 반응 방지", "체계적 탈감작", "", "", "홍수법"], "answer": [4], "explanation": "환자는 새에 대한 공포를 느끼고 회피하는 동물형 특정 공포증을 겪고 있다. 특정 공포증의 가장 효과적인 치료법은 노출 치료이며, 여기에는 한번에 강도 높은 자극에 노출시키는 홍수 요법(Flooding)과 점진적으로 강도를 높여가는 체계적 탈감작이 있다. 제시된 사례는 새들이 많은 공원 벤치에 환자를 앉히고 도망가지 못하게 하는 것으로, 처음부터 강한 자극에 노출시키는 홍수 요법에 해당한다."}, {"subject": "불안장애(1)", "year": ["18학번"], "professor": "채정호", "question": "사용된 치료법은?", "images": [], "text_box": "조류공포증이 있는 환자를 치료를 위해 새들이 많은 공원 벤치에 앉히고 도망가지 못하게 했다.", "options": ["노출 후 반응방지", "습관 역전훈련", "체계적 탈감작", "안구운동 탈민감", "홍수(flooding)기법"], "answer": [4], "explanation": "환자는 조류공포증이라는 동물형 특정 공포증을 가지고 있으며, 새들이 많은 벤치에 앉히고 도망가지 못하게 하는 치료를 받았다. 이는 특정 공포증에 효과적인 행동 치료인 노출 치료 중, 한번에 가장 강도 높은 자극에 노출시켜 공포를 극복하게 하는 홍수요법(Flooding)에 해당한다. 체계적 탈감작은 점진적으로 자극 강도를 높여 노출시키는 방식이다."}, {"subject": "불안장애2", "year": ["17학번"], "professor": "서호준", "question": "치료에 반응하지 않는 심한 환자들에게 띠이상제거술(cingulotomy) 등의 수술적 접근을 고려할 수 있는 불안장애는?", "images": [], "text_box": null, "options": ["강박장애", "공황장애", "고소공포증", "범불안장애", "사회공포증"], "answer": [0], "explanation": "Cingulotomy는 강박장애(OCD)의 심각하고 만성적인 경우에 약물 치료나 인지행동 치료에 반응하지 않을 때 고려될 수 있는 수술적 치료법입니다. 이 수술은 강박 증상을 완화하는 데 목적을 둡니다. 이는 다른 불안장애에서는 흔히 사용되지 않는 접근 방식입니다."}, {"subject": "불안장애2", "year": ["16학번"], "professor": "서호준", "question": "강박장애와 관련있는 것으로 알려진 신경전달물질은?", "images": [], "text_box": null, "options": ["도파민", "GABA", "세로토닌", "글루타메이트", "노르에피네프린"], "answer": [2], "explanation": "강박장애(OCD)의 치료에는 고용량의 선택적 세로토닌 재흡수 억제제(SSRI)가 1차 약물로 사용됩니다. 이는 강박장애의 병태생리에 세로토닌 시스템의 이상이 관련되어 있음을 시사합니다. 따라서 세로토닌은 강박장애와 밀접하게 관련된 신경전달물질로 알려져 있습니다."}, {"subject": "불안장애2", "year": ["16학번"], "professor": "서호준", "question": "환자의 증상이 심할 뿐 아니라 치료에 잘 반응하지 않는 심한 환자들에게 cingulotomy 등의 수술적 접근을 고려하기도 하는 질환은?", "images": [], "text_box": null, "options": ["공황장애", "강박장애", "고소공포증", "범불안장애", "사회공포증"], "answer": [1], "explanation": "Cingulotomy는 강박장애(OCD)의 심각하고 만성적인 경우에 약물 치료나 인지행동 치료에 반응하지 않을 때 고려될 수 있는 수술적 치료법입니다. 이 수술은 강박 증상을 완화하는 데 목적을 둡니다. 이는 다른 불안장애에서는 흔히 사용되지 않는 접근 방식입니다."}, {"subject": "불안장애(1)", "year": ["16학번"], "professor": "채정호", "question": "자신의 증상에 대해 어떤 현실적 고려도 없이 가장 부정적인 예측을 하는 생각의 패턴으로 다음 예에 가장 접합한 자동적 사고는 무엇인가?", "images": [], "text_box": "공황장애 환자들은 흔히 자동적 사고 (autonomic thought)를 가지고 있으며, 이로 인해 자신의 증상에 대해 과장된 해석을 하게 되어 불안이 더욱 악화되는 악순화의 고리가 이어진다. 자신의 증상에 대해 어떤 현실적 고려도 없이 가장 부정적인 예측을 하는 생각의 패턴으로 다음 예에 가장 접합한 자동적 사고는 무엇인가?\n예) 가슴이 두근거리는 증상 → 자신이 심장마비로 죽을 것이라는 생각이 번뜩 떠오름", "options": ["임의적 추론", "재앙화 사고", "이분법적 사고", "이름 붙이기 사고", "개인화 오류"], "answer": [1], "explanation": "제시된 예시에서 가슴 두근거림을 심장마비로 해석하는 것은 자신의 신체 증상을 가장 부정적인 결과로 과장하여 예측하는 사고 패턴이다. 이는 죽음, 장애, 통제력 상실, 정신 이상 또는 창피함에 대한 두려움으로 이어지는 공황장애의 재앙화 사고에 해당한다. 임의적 추론은 증거 없이 부정적인 결론을 내리는 사고 왜곡을 의미한다."}, {"subject": "불안장애(1)", "year": ["16학번", "11학번", "10학번"], "professor": "채정호", "question": "맞는 설명은?", "images": [], "text_box": "31 세 남자가 갑작스럽게 발생한 극도의 불안 및 초조감을 호소하여 ‘살려달라'며 가슴을 붙잡고 병원 응급실에 방문하였다. 몸을 떨면서 가슴이 두근거리고 숨을 잘 쉴 수 없다고 하였으며, 어지럽고 메스껍다고 하였다. 각종 검사 소견은 모두 정상이었고 침대에 누워 휴식을 취한지 1시간이 지나면서 증상은 점차 안정되었다. 이런 증상으로 지난 3개월 동안 총 7차례 응급실을 방문했다고 하였으며 그때마다 검사 소견은 정상이었다.", "options": ["갑상선 기능 항진증과의 감별이 꼭 필요하다.", "급격한 불안 발작은 일반적으로 약 2시간 정도 지속된다.", "대부분의 경우에서 지하철이나 버스 등 밀폐된 공간에서 안정감을 느낀다.", "약 50%의 환자에서 실제 심장발작(cardiac crisis)로 인한 사망의 위험성이 있다", "약물 치료로 쉽게 증상이 호전되며 대부분의 환자가 약물 중단 후 재발 없이 지낸다", "갑상선 기능 저하증과의 감별이 꼭 필요하다."], "answer": [0, 5], "explanation": "환자의 증상은 공황 발작의 특징인 13가지 증상 중 4가지 이상이 급작스럽게 발생하고 저절로 사라졌으며, 반복적인 응급실 방문에도 검사 소견이 정상이라는 점에서 공황장애를 시사한다. 공황장애는 갑상선 기능 항진증 및 저하증과 같은 다양한 신체 질환 및 정신 질환과의 감별이 반드시 필요하다. 공황 발작은 일반적으로 길어도 30분 정도 지속되며, 실제 사망 위험은 높지 않고, 약물 중단 시 쉽게 재발하는 경향이 있다."}, {"subject": "불안장애2", "year": ["15학번", "12학번"], "professor": "서호준", "question": "환자의 고통이 심할 뿐 아니라 만성적인 경과를 보이기 때문에 치료에 반응하지 않는 심한 환자들에게 cingulotomy 등의 수술적 접근을 고려하기도 하는 질환은?", "images": [], "text_box": null, "options": ["공황장애", "사회공포증", "고소공포증", "범불안장애", "강박장애"], "answer": [4], "explanation": "Cingulotomy는 강박장애(OCD)의 심각하고 만성적인 경우에 약물 치료나 인지행동 치료에 반응하지 않을 때 고려될 수 있는 수술적 치료법입니다. 이 수술은 강박 증상을 완화하는 데 목적을 둡니다. 이는 다른 불안장애에서는 흔히 사용되지 않는 접근 방식입니다."}, {"subject": "불안장애(1)", "year": ["15학번", "14학번", "12학번", "10학번"], "professor": "채정호", "question": "이 환자에서 발표 시작 30분에서 1시간 전 복용 하게 하여 불안을 완화시킬 수 있는 것으로 알려진 치료제는 무엇인가?", "images": [], "text_box": "32 세 남자 환자가 회사 임원들 앞에서 프레젠테이션을 할 때 심하게 불안을 느껴 실수를 많이 한다고 정신과 외래를 방문하였다. 이 환자는 회사에서의 발표 외에 일상생활에는 큰 문제가 없었으며 지속적인 치료 보다는 발표 상황에서의 불안을 넘길 수 있는 치료를 원하고 있었다.", "options": ["리튬", "알프라졸람", "플루옥세틴", "할로페리돌", "프로프라놀롤"], "answer": [4], "explanation": "이 환자는 발표와 같은 특정 수행 상황에서만 불안을 느끼는 사회불안장애 환자이다. 이 경우 지속적인 치료보다는 특정 상황에서의 불안 완화를 위해 베타차단제인 Propranolol을 사용할 수 있다. Propranolol은 발표 시작 30분에서 1시간 전에 복용하여 가슴 두근거림이나 긴장 등 신체 증상을 완화하는 데 효과적이다."}, {"subject": "불안장애(1)", "year": ["15학번", "14학번", "13학번", "09학번"], "professor": "채정호", "question": "핵심적인 치료 방법은?", "images": [], "text_box": "20 세 여자 환자가 엘리베이터를 타고 5층 이상 올라가면 심한 불안을 느껴 안절부절 못한다고 한다.", "options": ["최면치료", "노출치료", "이완훈련", "통찰 정신치료", "벤조다이제핀을 이용한 약물 치료"], "answer": [1], "explanation": "이 환자는 엘리베이터 이용이라는 특정 상황에 대한 심한 불안을 느끼므로 고소공포증과 같은 상황형 특정 공포증으로 진단할 수 있다. 특정 공포증의 가장 근본적이고 효과적인 치료법은 불안을 유발하는 자극에 직접적으로 노출시키는 노출 치료이다."}, {"subject": "불안장애2", "year": ["14학번"], "professor": "채정호", "question": "치료에 반응하지 않는 심한 환자들에게 cingulotomy 등의 수술적 접근을 고려할 수 있는 질환은?", "images": [], "text_box": null, "options": ["공황장애", "강박장애", "고소공포증", "범불안장애", "사회공포증"], "answer": [1], "explanation": "Cingulotomy는 강박장애(OCD)의 심각하고 만성적인 경우에 약물 치료나 인지행동 치료에 반응하지 않을 때 고려될 수 있는 수술적 치료법입니다. 이 수술은 강박 증상을 완화하는 데 목적을 둡니다. 이는 다른 불안장애에서는 흔히 사용되지 않는 접근 방식입니다."}, {"subject": "불안장애2", "year": ["13학번"], "professor": null, "question": "적절한 개입은?", "images": ["../IMG/20250423_수8_정신과_불안장애2_채정호교수님_PAD/img1.jpeg"], "text_box": "22 세 여자는 2개월 전 교통사고로 옆 자리에 앉아 있던 남자친구가 사망한 뒤, 지속적인 악몽을 꾸고 쉽게 놀랐다. 외출을 거의 하지 않고, 집안에서도 무기력하게 있으면서도 짜증이 늘어 가족들과 갈등이 악화되었다.", "options": ["사회복귀를 늦춘다.", "사고 상황을 묻지 않는다.", "가능하면 입원치료를 하는 것이 좋다.", "선택적 세로토닌 재흡수 억제제를 사용한다.", "갈등이 있는 가족은 치료에 참여시키지 않는다."], "answer": [3], "explanation": "이 증례는 가까운 사람의 죽음으로 인한 외상 후 스트레스 장애(PTSD)에 해당합니다. 주요 증상으로는 악몽(침습), 쉽게 놀람(과도각성), 외출 회피(회피), 무기력감 및 짜증 증가(인지 및 감정의 부정적 변화)가 나타나고 있습니다. PTSD 치료의 1차 약물은 선택적 세로토닌 재흡수 억제제(SSRI)이며, 약물치료와 함께 안정화, 기억처리, 재연결 등의 심리치료가 중요합니다. Prolonged exposure 치료에서는 사고 상황에 대한 회피를 줄이고 기억을 처리하는 것이 중요하며, 가족 갈등이 있다면 가족 치료에 참여시키는 것이 도움이 됩니다."}, {"subject": "불안장애2", "year": ["13학번"], "professor": "서호준", "question": "선택 약물은?", "images": [], "text_box": "17세 여학생이 자꾸 병균이 몸에 붙어 병에 걸릴 것 같아서 하루에도 수십번씩 손을 씻고 목욕을 하여 병원에 찾아왔다. 외출을 하여 문이나 지하철 손잡이를 잡을 때는 항상 흰 장갑을 끼었다. 이러한 불안이 괜한 걱정이라는 것을 잘 알면서도 떨쳐내지 못하여 더욱 불안하였다.", "options": ["리튬", "항전간제", "베타차단제", "항정신병약물", "선택적 세로토닌 재흡수 저해제"], "answer": [4], "explanation": "환자의 증상은 강박사고(병균에 대한 불안)와 강박행동(손 씻기, 장갑 착용)을 특징으로 하는 강박장애에 해당합니다. 강박장애의 1차 치료 약물은 선택적 세로토닌 재흡수 억제제(SSRI)이며, 고용량으로 사용되는 경우가 많습니다. SSRI는 효과와 안전성 측면에서 가장 우수한 선택 약물로 알려져 있습니다."}, {"subject": "불안장애2", "year": ["10학번"], "professor": "채정호", "question": "다음의 불안 장애 중 환자의 고통이 심할 뿐 아니라 만성적인 경과를 보이기 때문에 치료에 반응하지 않는 심한 환자들에게 cingulotomy의 수술적 접근을 고려하기도 하는 질환은?", "images": [], "text_box": null, "options": ["공황장애", "사회공포증", "고소공포증", "범불안장애", "강박장애"], "answer": [4], "explanation": "Cingulotomy는 강박장애(OCD)의 심각하고 만성적인 경우에 약물 치료나 인지행동 치료에 반응하지 않을 때 고려될 수 있는 수술적 치료법입니다. 이 수술은 강박 증상을 완화하는 데 목적을 둡니다. 이는 다른 불안장애에서는 흔히 사용되지 않는 접근 방식입니다."}, {"subject": "불안장애2", "year": ["09학번"], "professor": "채정호", "question": "이 환자를 위한 치료 약제 중 효과나 안전성에서 우수하여 1차 선택 약물로 알려진 약제는?", "images": [], "text_box": "17세 여학생이 더러운 세균이 몸에 붙어 병이 날지 모른다는 생각에 하루에도 수십 번씩 손을 씻고 목욕을 하는 증상으로 병원을 방문하였다. 이 학생은 ㎞에 외출할 문이나 손잡이를 잡을 때 항상 흰 장갑을 한다고 하였다. 이러한 불안이 괜한 걱정이라는 것을 알지만 도무지 떨칠 수가 없어 더욱 괴롭다고 하였다.", "options": ["리튬", "항전간제", "b-blocker", "항정신병약물", "SSRIs(선택적 세로토닌제 흡수 억제재)"], "answer": [4], "explanation": "환자의 증상은 병균에 대한 강박사고와 손 씻기, 장갑 착용 등의 강박행동을 보이는 강박장애에 해당합니다. 강박장애의 1차 치료 약물은 선택적 세로토닌 재흡수 억제제(SSRI)이며, 효과와 안전성 측면에서 가장 우수하여 고용량으로 사용되는 경우가 많습니다. 다른 약물들은 강박장애의 1차 치료제로는 잘 사용되지 않습니다."}, {"subject": "불안장애(1)", "year": ["08학번"], "professor": "윤수정", "question": "22 세 여자 환자가 공포를 느껴 엘리베이터를 타지 못한다고 한다. 가장 흔히 사용되고 효과적인 치료법은?", "images": [], "text_box": null, "options": ["통찰정신치료", "지지정신치료", "항불안제 치료", "체계적 탈감작", "최면 치료"], "answer": [3], "explanation": "엘리베이터를 타지 못하는 증상은 고소공포증과 같은 특정 상황에서의 공포증에 해당한다. 특정 공포증의 가장 효과적인 치료법은 노출 치료이며, 여기에는 홍수 요법과 점진적 노출법인 체계적 탈감작이 있다. 체계적 탈감작은 이완법을 훈련시킨 후 점진적으로 자극 강도를 높여 노출시키는 방법이다."}, {"subject": "불안장애(1)", "year": ["08학번"], "professor": "윤수정", "question": "28세 여자 환자가 엘리베이터를 타고 5층 이상 올라가면 심한 불안을 느껴 안절부절 못한다고 한다. 환자는 5층 이하일 경우 크게 불안을 못 느낀다고 하였다. 임상 아형은?", "images": [], "text_box": null, "options": ["동물형", "자연환경형", "혈액-주사-손상형", "상황형", "기타형"], "answer": [3], "explanation": "엘리베이터와 같은 특정 상황에서만 공포를 느끼는 것은 상황형 특정 공포증에 해당한다. 채정호 교수님에 따르면 고소공포증과 같은 특정 상황에서의 공포증은 상황형으로 분류된다. 자연환경형은 천둥, 번개 등에 대한 공포를 의미한다."}, {"subject": "불안장애(1)", "year": ["07학번"], "professor": "", "question": "공황 장애의 치료에 대한 설명 중 틀린 것은?", "images": [], "text_box": null, "options": ["세로토닌 재흡수 차단제가 우선 권장된다", "초기 증상 완화에 벤조다이아제핀 병용이 효과적이다", "약물을 중단하려는 환자에게 인지행동치료는 효과가 적다", "약물유지 치료가 길수록 재발율이 낮다.", "인지행동치료 단독치료보다 약물치료와 병행하는 것이 좋다"], "answer": [2], "explanation": "약물을 중단하고 재발을 막기 위해서는 근본적인 생각을 변화시키는 인지 행동 치료가 반드시 필요하며, 오히려 효과적인 치료 방법 중 하나로 권장된다. 공황장애 치료에는 SSRI나 Benzodiazepine 등의 약물 치료가 사용되며, 초기 증상 완화에 벤조다이아제핀 병용은 효과적일 수 있다. 공황장애는 재발이 잦으므로 6개월 이상의 약물 치료와 12~24개월의 유지 치료 등 장기적인 치료가 권장되며, 약물 치료와 인지 행동 치료를 병행하는 것이 단독 치료보다 효과적이다."}, {"subject": "불안장애(1)", "year": ["07학번"], "professor": "", "question": "진단명으로 적당한 것은?", "images": [], "text_box": "27세 여자가 엘리베이터 고장으로 6시간만에 구조된 후 3일 후에 불안 증상을 호소하였다. 그 후 회사가 20 층임에도 불구하고 엘리베이터를 이용하지 못하였다. 그 후 엘리베이터 등 닫힌 공간에서 불안, 어지럼증, 호흡곤란을 호소하였다.", "options": ["외상후 스트레스 장애", "급성 스트레스 증후군", "적응장애", "공황장애", "폐쇄공포증"], "answer": [4], "explanation": "엘리베이터 고장이라는 특정 사건 이후 닫힌 공간(엘리베이터)에서 불안, 어지럼증, 호흡곤란을 호소하며 해당 공간을 회피하는 증상은 폐쇄공포증이라는 특정 공포증의 증상에 가깝다. 증상 발현 시기와 특성상 외상후 스트레스 장애나 급성 스트레스 증후군과는 구별된다."}, {"subject": "불안장애2", "year": ["07학번"], "professor": null, "question": "OCD에 관한 설명 중 틀린 것은?", "images": [], "text_box": null, "options": ["남녀간에 발병 정도가 유사하다", "어릴 때 발병 시 예후가 좋지 않다", "대개 천천히 발병한다", "우울 장애와 함께 발병하는 경우가 많다", "뚜렛 증후군과 동반하는 경우가 있다"], "answer": [2], "explanation": "강박장애는 남녀간 발병률이 유사하며, 소아기 발병 시 예후가 좋지 않은 경향이 있습니다. 발병 양상은 과반수 이상에서 갑자기 발생하는 경우가 많습니다. 또한 강박장애는 다른 공존 질환이 많은 편으로, 약 67%가 주요 우울증을 동반하기도 합니다. 뚜렛 증후군과도 동반될 수 있습니다."}, {"subject": "노인정신질환1", "year": ["21학번", "17학번"], "professor": "한창태", "question": "아래 증례에서 노인의 자살의 위험도를 높이는 것은?", "images": [], "text_box": "72세 남자가 최근 자살을 기도하여 숨졌다. 그는 ①주 1,2회 정도 맥주 반병 정도의 음주를 즐기는 것 외에는 특별한 취미는 없었다. 아내와 함께 가끔 등산을 즐기기도 하였으나 조용히 독서를 즐기며 ②혼자 있는 것을 더 좋아하였다고 한다. 죽음에 관한 이야기를 나눌 때면 ③종교적인 믿음으로 강건한 모습을 보여 ④주변 사람들이 전혀 자살을 예상하지 못하였다고 한다.⑤최근 몸이 여기저기 아프다면 내과 병원에 방문하기도 하였지만 실시한 종합검진 상 특별한 이상 소견을 발견하지 못하였다", "options": ["①주 1,2회 정도 맥주 반병 정도의 음주를 즐기는 것 외에는 특별한 취미는 없었다.", "②혼자 있는 것을 더 좋아하였다고 한다.", "③종교적인 믿음으로 강건한 모습을 보여", "④주변 사람들이 전혀 자살을 예상하지 못하였다고 한다.", "⑤최근 몸이 여기저기 아프다면 내과 병원에 방문하기도 하였지만 실시한 종합검진 상 특별한 이상 소견을 발견하지 못하였다"], "answer": [4], "explanation": "노년기 자살 위험을 높이는 요인으로는 신체적인 질병, 배우자와의 사별, 사회적 고립, 경제적 어려움 등이 있습니다. 본 환자의 경우, 신체적으로 여기저기 아프다고 느끼지만 검진 상 특별한 이상 소견이 없다는 점은 질병에 대한 과도한 염려나 신체 증상에 대한 집착을 시사할 수 있습니다. 이러한 신체적 고통 호소는 노인 우울증과 자살 위험의 중요한 지표가 될 수 있습니다. 신체적인 질병과 상실이 노인 자살 유발 요인입니다."}, {"subject": "노인정신질환1", "year": ["20학번", "19학번"], "professor": "한창태", "question": "주의 (attention)에 관한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["선택주의력은 주의를 적절하게 분산시키는 능력이다.", "지속주의력은 꼭 필요한 정보에 주의를 기울이는 능력이다.", "지속주의력은 다른 주의력에 비해 상대적으로 연령과 상관이 적다.", "선택주의력은 다른 주의력에 비해 상대적으로 연령과 상관이 적다.", "분할주의력은 한 가지 활동에 지속적으로 주의를 유지할 수 있는 능력이다."], "answer": [2], "explanation": "1) 분할주의력에 대한 설명입니다. 2) 선택주의력에 대한 설명입니다. 4) 지속주의력에 대한 설명입니다. 5) 지속주의력에 대한 설명입니다. 따라서 지속주의력은 다른 주의력에 비해 상대적으로 연령과 상관이 적다는 것이 옳은 설명입니다."}, {"subject": "노인정신질환1", "year": ["20학번", "19학번"], "professor": "한창태", "question": "노인의 약물 치료에서 고려해야 할 노인의 생리적 변화 중 옳은 것은?", "images": [], "text_box": null, "options": ["cardiac output이 떨어지면 hepatic & renal drug clearance에 영향을 준다.", "lean body mass가 높을수록 지용성 정신작용제의 약물작용이 연장된다.", "body fat이 증가할수록 지용성 정신작용제의 약물작용이 단축된다.", "신장질환이 있는 경우 약물의 renal clearance가 증가한다.", "간질환이 있는 경우 약물의 대사가 증가한다."], "answer": [0], "explanation": "심박출량이 감소하면 간 및 신장 약물 청소율에 영향을 미칩니다. 2), 3) lean body mass가 낮을수록, body fat이 증가할수록 지용성 정신작용제의 약물작용이 연장됩니다. 4) 신장질환이 있는 경우 약물의 renal clearance가 감소합니다. 5) 간질환이 있는 경우 약물 대사가 감소합니다."}, {"subject": "노인정신질환1", "year": ["20학번", "19학번"], "professor": "한창태", "question": "에릭슨의 8단계 발달이론에 따른 노년기 발달단계는?", "images": [], "text_box": null, "options": ["자아정체감 대 역할혼란", "자아통합 대 절망감", "자율성 대 수치심", "신뢰감 대 불신감", "생산성 대 침체감"], "answer": [1], "explanation": "에릭슨의 발달이론에서 노년기는 '자아통합 대 절망감'의 단계에 해당합니다. 이 시기에는 자신의 삶을 긍정적으로 수용하며 자아통합을 이루는 것이 중요합니다. 자아통합을 이루면 죽음에 대한 불안감이 감소한다고 설명됩니다. 이는 노년기 심리적 안녕감과 밀접하게 관련되어 있습니다."}, {"subject": "노인정신질환1", "year": ["20학번", "19학번"], "professor": "한창태", "question": "뇌 노화에 대해 옳은 것은?", "images": [], "text_box": null, "options": ["Brain volume은 증가한다", "Neural plasticity는 증가한다", "Inflammation reaction은 감소한다", "Hippocampus의 에너지대사가 감소한다", "인지기능에 관여하는 brain region간 connectivity는 증가한다"], "answer": [3], "explanation": "뇌 노화가 진행되면 Brain volume과 Neural plasticity는 감소합니다. 염증 반응(inflammation reaction)은 증가하는 경향을 보입니다. 인지기능에 관여하는 뇌 영역 간 연결성(connectivity) 또한 감소합니다. 따라서 Hippocampus의 에너지대사가 감소한다는 것이 옳은 설명입니다."}, {"subject": "노인정신질환1", "year": ["20학번", "19학번"], "professor": "한창태", "question": "위 테스트가 평가하는 것은?", "images": [], "text_box": "임싱삼리사: “지금부터 제가 카드에 인쇄되어 있는 단어들을 보여 드리겠습니다. 단어들 중 일부는 앞에서 보셨던 단어들이고, 일부는 제가 보여 드리지 않았던 것들입니다. 앞에서 보셨던 단어인지 아닌지를 알아맞혀 보십시오. 만약 앞에서 봤던 단어라면 '예'라고 대답하시면 됩니다. 이 단어는 조금 전에 보셨던 것입니까?\" 남자노인: \"예\"", "options": ["언어유창성 검사", "단어목록기억 검사", "단어목록회상 검사", "단어목록재연 검사", "보스톤 이름대기 검사"], "answer": [3], "explanation": "제시된 내용은 이전에 제시된 단어들을 다시 보여주며 이전에 보았던 것인지 아닌지 판별하는 과정입니다. 이는 이전에 학습한 내용을 다시 인지하는 능력을 평가하는 '재연(recognition)' 검사에 해당합니다. 특히 단어 목록을 사용하므로 단어목록재연 검사입니다. 기억 검사 중에서도 재연 기억의 한 형태입니다."}, {"subject": "노인정신질환1", "year": ["19학번"], "professor": "한창태", "question": "Reduced energy production & impaired cellular metabolism & increased in oxidative stress 위에서 설명하는 노화의 이론은?", "images": [], "text_box": null, "options": ["종말체의 손실 (telomere loss)", "예정된 노화 (programmed aging)", "정보의 전달 (information transform)", "후성학적 기전 (epigenetic mechanism)", "미토콘드리아의 퇴화 (mitochondrial decline)"], "answer": [4], "explanation": "제시된 설명은 에너지 생산 감소, 세포 대사 손상, 산화 스트레스 증가와 관련이 있습니다. 이러한 현상들은 미토콘드리아 기능 장애 및 퇴화와 밀접하게 연관됩니다. 미토콘드리아는 세포의 에너지 생성에 핵심적인 역할을 하므로, 그 기능 저하는 노화의 주요 원인 중 하나로 설명됩니다. 텔로미어 단축, 세포 손상 누적 등과 함께 노화를 유발하는 기전으로 알려져 있습니다."}, {"subject": "노인정신질환1", "year": ["19학번", "18학번"], "professor": "한창태", "question": "아래 검사가 측정하는 인지 영역은?", "images": ["../IMG/20250424_목1,2_정신_노인정신질환1_왕성민교수님_PAD/img1.jpeg"], "text_box": null, "options": ["Memory", "Language", "Orientation", "Executive function", "Visuospatial function"], "answer": [3], "explanation": "제시된 그림은 Trail Making Test (TMT)로, Part A는 시각-운동 속도를 측정하고 Part B는 교대 주의력, 과제 전환 능력 등을 평가합니다. 이러한 능력들은 전두엽 기능과 관련된 집행 기능(Executive function)에 해당합니다. 따라서 길 만들기 검사는 frontal lobe function, executive function을 주로 측정합니다."}, {"subject": "노인정신질환1", "year": ["19학번", "18학번"], "professor": "한창태", "question": "다음 중 노인의 기억에 대한 설명으로 알맞은 것은?", "images": [], "text_box": null, "options": ["삽화기억은 연령에 관계없이 보존된다.", "서술기억은 연령에 관계없이 보존된다.", "작업기억은 45세 이후부터 지속적으로 감퇴한다.", "감각기억은 상대적으로 노화와 관련이 많다.", "한 번에 여러 가지 정보를 처리할 수 있는 능력은 보존된다."], "answer": [2], "explanation": "삽화기억과 서술기억은 나이가 들면서 지속적으로 감퇴하는 경향이 있습니다. 감각기억은 상대적으로 노화와 관련이 적습니다. 한 번에 여러 가지 정보를 처리하는 능력은 노화에 따라 쇠퇴합니다. 따라서 작업기억은 45세 이후부터 지속적으로 감퇴한다는 설명이 가장 알맞습니다."}, {"subject": "노인정신질환1", "year": ["19학번", "18학번"], "professor": "한창태", "question": "뇌 노화에 대한 설명으로 다음 중 알맞은 것은?", "images": [], "text_box": null, "options": ["휴지기에 뇌활성화가 증가한다", "신경섬유의 통합성 및 연결성이 증가한다", "뇌의 전체용적은 증가하고 피질의 두께는 감소한다", "미세혈관의 장애와 혈액의 저류로 인해 심부백색질 고음영이 나타난다", "치매 노인에서 frontal cortex, caudate, putamen의 용적이 감소하고 비치매 노인에서는 medial temporal lobe, hippocampus의 용적이 감소한다"], "answer": [3], "explanation": "휴지기에 뇌활성화와 신경섬유의 통합성 및 연결성은 감소합니다. 뇌의 전체 용적과 피질의 두께는 노화에 따라 감소합니다. 미세혈관의 장애와 혈액 저류는 뇌 백색질에 고음영 병변을 유발하며 이는 노화와 흔히 연관됩니다. 5번 보기는 치매와 비치매 노인에서의 용적 감소 설명이 바뀌었습니다."}, {"subject": "노인정신질환1", "year": ["18학번"], "professor": "한창태", "question": "♡ involves alterations; DNA methylation pattern, post-translational modification of histone, chromatin remodeling. 위에서 설명하는 노화의 이론은?", "images": [], "text_box": null, "options": ["미토콘드리아의 퇴화 (mitochondrial decline)", "예정된 노화 (programmed aging)", "정보의 전달 (information transfer)", "종말체의 손실 (telomere loss)", "후성학적 기전 (epigenetic mechanism)"], "answer": [4], "explanation": "제시된 내용은 DNA 메틸화 패턴, 히스톤의 번역 후 변형, 염색질 리모델링 등 유전자 발현 조절과 관련된 변화를 설명하고 있습니다. 이는 유전자 자체의 염기 서열 변화 없이 유전자 발현 양상만 달라지는 '후성유전학적(epigenetic)' 기전에 해당합니다. 후성학적 기전은 노화 과정에서 중요한 역할을 하는 것으로 알려져 있습니다. 비유전적/확률론적 이론 중 축적 이론에 속하기도 합니다."}, {"subject": "노인정신질환1", "year": ["17학번"], "professor": "한창태", "question": "다음 환자가 보일 수 있는 가장 가능성 있는 소견은?", "images": [], "text_box": "68세 여자가 갑자기 기억력 저하를 주소로 정신건강의학과에 내원했다. 환자는 치매가 아닌지 굉장히 걱정을 하는 모습이었으며, 인지기능 검사시 대부분의 질문에 모른다고 대답하고 검사를 포기하는 모습을 보였다. 병력청취결과 3개월 전 사기를 당해 정신적인 충격을 받았고, 이후 밤에 잠을 잘 자지 못하고, 죽고 싶다는 생각이 자주 들었고, 매일 소주 2잔씩 마시고 잠이 들었다. 이후 환자는 인지 기능 검사를 시행하였으며, 한국판 CERAD신경심리 검사 총집에서 단어 목록 기억 검사에서 동일 성별, 연령, 교육정도를 받은 사람에 비해 1.5표준편차 이하 점수를 보였다. 환자는 대부분의 일상생활 수행능력에서는 별다른 이상을 보이지는 않고 있다.", "options": ["Global clinical dementia rating (CDR)score 점수 1점", "MMSE 27점", "Global deterioration score (GDS)상 5점", "T2 Flair MRI상 Periventricular deep white matter hyperintensity", "T2 MRI상 Left anterior termporal pole의 mild atrophy"], "answer": [3], "explanation": "환자는 기억력 저하를 호소하지만 검사 포기, '모른다'는 반응으로 보아 가성치매(pseudodementia)를 의심할 수 있습니다. 일상생활 수행능력에 큰 이상이 없으므로 경도인지장애로 보기는 어렵습니다. 하지만 노화로 인해 뇌백색질의 구조적인 변화는 흔히 관찰될 수 있으며, T2 Flair MRI상 뇌실주위 심부백색질 고음영은 흔한 노화 관련 소견입니다. 해마 위축은 알츠하이머병에서 나타나는 소견이지만, 이 환자의 임상 양상은 우울증으로 인한 인지 저하 가능성이 더 높습니다."}, {"subject": "노인정신질환1", "year": ["16학번"], "professor": "한창태", "question": "상기 증상을 가진 환자에 대한 설명으로 옳은 것은?", "images": [], "text_box": "하나 이상의 심각한 질병을 앓고 있다고 믿음. 물리적 징후에 대한 과장된 해석, 만성 과정, 복부와 비뇨생식기 부위에 자주 집중되는 증상, 의사의 안심으로 해소되지 않는 우려, 약물의 부작용을 과하게 우려함", "options": ["주요우울장애와 동시에 진단할 수 있다", "반복적 신체 검진은 환자를 안심시키는 데 도움이 되지 않는다", "의학적 근거가 약한 침습적 검사도 정신과적으로 필요할 수 있다", "기분부전장애와 동시에 진단할 수 없으나 치매와는 동시에 진단할 수 있다", "질병 및 관련 건강 문제의 국제 통계 분류(ICD)에서 인정한 한민족에서만 존재하는 문화증후군이다."], "answer": [0], "explanation": "제시된 증상들은 건강염려증(hypochondriasis)의 특징과 일치합니다. 건강염려증은 주요우울장애, 기분저하증, 범불안장애, 공황장애, 조현병, 치매 등 다양한 정신질환과 동시에 진단될 수 있습니다. 반복적인 신체 검진은 오히려 환자의 불안을 증가시킬 수 있어 도움이 되지 않습니다. 침습적 검사는 불필요하게 환자에게 해를 가할 수 있어 금기입니다.

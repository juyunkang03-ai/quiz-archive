<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2026 PAD ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-dark:  #085041;
    --teal-mid:   #0F6E56;
    --teal-base:  #1D9E75;
    --teal-light: #5DCAA5;
    --teal-pale:  #E1F5EE;
    --amber:      #BA7517;
    --amber-pale: #FAEEDA;
    --red:        #A32D2D;
    --red-pale:   #FCEBEB;
    --gray-900:   #1a1a1a;
    --gray-700:   #3a3a3a;
    --gray-500:   #6b6b6b;
    --gray-400:   #959595;
    --gray-300:   #d4d4d4;
    --gray-200:   #e5e5e5;
    --gray-100:   #f5f5f2;
    --gray-50:    #fafaf8;
    --white:      #ffffff;
    --bg:         #f0f4f2;
    --shadow-sm:  0 2px 8px rgba(8,80,65,0.06);
    --shadow:     0 4px 24px rgba(8,80,65,0.10);
    --shadow-lg:  0 12px 40px rgba(8,80,65,0.22);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--gray-900);
  }
  .hidden { display: none !important; }

  /* ───── 비밀번호 게이트 ───── */
  .pwd-gate {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal-mid) 55%, var(--teal-base) 100%);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .pwd-gate::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(93,202,165,0.18), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(29,158,117,0.22), transparent 55%);
    pointer-events: none;
  }
  .pwd-box {
    position: relative;
    background: var(--white);
    border-radius: 16px;
    padding: 40px 32px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 60px rgba(0,0,0,0.28);
    border-top: 3px solid var(--teal-base);
    animation: cardIn 0.3s ease;
  }
  .pwd-icon { font-size: 36px; margin-bottom: 14px; }
  .pwd-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px;
    color: var(--teal-dark);
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .pwd-series {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--teal-base);
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }
  .pwd-sub { font-size: 12px; color: var(--gray-500); margin-bottom: 22px; }
  .pwd-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    font-size: 16px;
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    letter-spacing: 0.25em;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 8px;
    background: var(--gray-100);
  }
  .pwd-input:focus { border-color: var(--teal-base); background: var(--white); }
  .pwd-input.shake { animation: shake 0.4s; border-color: var(--red); background: var(--red-pale); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60%  { transform: translateX(-7px); }
    40%, 80%  { transform: translateX(7px); }
  }
  .pwd-error { font-size: 11px; color: var(--red); min-height: 18px; margin-bottom: 6px; }
  .pwd-submit {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--teal-dark);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.02em;
  }
  .pwd-submit:hover { background: var(--teal-mid); }

  /* ─── HEADER (슬림) ─── */
  .site-header {
    background: var(--teal-dark);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-main {
    max-width: 820px;
    margin: 0 auto;
    padding: 10px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 40px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .brand-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }
  .brand-sep { color: rgba(255,255,255,0.25); font-size: 12px; margin: 0 2px; }
  .brand-series {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--teal-light);
    font-weight: 500;
  }
  .header-stats {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'IBM Plex Mono', monospace;
    flex-wrap: wrap;
  }
  .stat-chip { display: flex; align-items: baseline; gap: 4px; }
  .stat-n { font-size: 14px; font-weight: 700; color: #fff; line-height: 1; }
  .stat-n.wrong  { color: #F8B4B4; }
  .stat-n.accent { color: var(--teal-light); }
  .stat-k {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }
  .progress-track { height: 2px; background: rgba(255,255,255,0.08); }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal-light), var(--teal-base));
    transition: width 0.4s ease;
    width: 0;
  }
  .nav-dots-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 5px 22px 3px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-dots-wrap::-webkit-scrollbar { display: none; }
  .nav-dot {
    flex: 0 0 auto;
    min-width: 22px;
    height: 20px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.32);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px 3px 0 0;
    font-weight: 500;
    padding: 0 4px;
    transition: all 0.12s;
  }
  .nav-dot:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .nav-dot.current { background: var(--bg); color: var(--teal-dark); font-weight: 700; }
  .nav-dot.correct { color: var(--teal-light); }
  .nav-dot.wrong   { color: #F8B4B4; }

  /* ─── MAIN ─── */
  .main {
    max-width: 820px;
    margin: 18px auto 0;
    padding: 0 22px 120px;
  }

  /* ─── QUIZ CARD ─── */
  .q-card {
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    animation: cardIn 0.25s ease;
    margin-bottom: 12px;
    border: 1px solid var(--gray-200);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    background: var(--gray-100);
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--gray-200);
  }
  .q-year-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--teal-pale);
    color: var(--teal-dark);
    border: 1px solid rgba(29,158,117,0.3);
    padding: 3px 11px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .q-subject-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 11px;
    border-radius: 20px;
    background: var(--amber-pale);
    color: var(--amber);
    border: 1px solid rgba(186,117,23,0.2);
  }
  .q-prof {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray-500);
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray-500);
    margin-left: auto;
  }

  /* ─── QUESTION BODY ─── */
  .q-body { padding: 22px 22px 0; }

  .q-text {
    font-size: 16px;
    line-height: 1.75;
    color: var(--gray-900);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  .text-box {
    background: var(--gray-50);
    border-left: 3px solid var(--teal-base);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  .q-images {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .q-images img {
    max-height: 260px;
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--gray-300);
    object-fit: contain;
    cursor: zoom-in;
    background: var(--white);
  }

  /* ─── OPTIONS ─── */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 9px;
    padding-bottom: 20px;
  }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    background: var(--white);
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    color: var(--gray-700);
    transition: all 0.15s;
    width: 100%;
  }
  .opt-btn:not(:disabled):hover {
    border-color: var(--teal-base);
    background: var(--teal-pale);
    color: var(--teal-dark);
  }
  .opt-num {
    flex: 0 0 24px;
    height: 24px;
    background: var(--gray-100);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-500);
    transition: all 0.15s;
  }
  .opt-btn:not(:disabled):hover .opt-num { background: var(--teal-base); color: #fff; }
  .opt-btn.correct-answer {
    border-color: var(--teal-base);
    background: var(--teal-pale);
    cursor: default;
  }
  .opt-btn.correct-answer .opt-num { background: var(--teal-base); color: #fff; }
  .opt-btn.wrong-answer {
    border-color: var(--red);
    background: var(--red-pale);
    cursor: default;
  }
  .opt-btn.wrong-answer .opt-num { background: var(--red); color: #fff; }
  .opt-btn:disabled { cursor: default; }

  /* ─── EXPLANATION ─── */
  .explanation-box {
    margin: 0;
    padding: 18px 22px;
    background: var(--teal-pale);
    border-top: 1px solid rgba(29,158,117,0.2);
  }
  .explanation-box.wrong {
    background: var(--red-pale);
    border-top-color: rgba(163,45,45,0.2);
  }
  .expl-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--teal-mid);
    margin-bottom: 8px;
  }
  .explanation-box.wrong .expl-label { color: var(--red); }
  .expl-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
    white-space: pre-wrap;
  }

  /* ─── RESULT ROW ─── */
  .result-row {
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--gray-200);
    background: var(--gray-100);
  }
  .result-msg { font-size: 14px; font-weight: 500; color: var(--teal-mid); }
  .result-msg.wrong { color: var(--red); }

  /* ─── ACTION ROW ─── */
  .action-row {
    padding: 16px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--gray-200);
    flex-wrap: wrap;
  }
  .btn-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-300);
    background: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-700);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-nav:hover:not(:disabled) { border-color: var(--teal-base); color: var(--teal-mid); }
  .btn-nav:disabled { opacity: 0.35; cursor: default; }
  .btn-next {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    background: var(--teal-dark);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-next:hover { background: var(--teal-mid); }
  .btn-next:disabled { background: var(--gray-300); cursor: default; }
  .kbd-hint { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gray-500); }
  kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--gray-300);
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gray-700);
    background: var(--gray-100);
  }

  .empty-card { padding: 50px 30px; text-align: center; color: var(--gray-500); font-size: 14px; line-height: 1.7; }
  .empty-card .empty-emoji { font-size: 32px; margin-bottom: 10px; display: block; }

  /* ─── SCORE SCREEN ─── */
  .score-screen {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 48px 32px;
    text-align: center;
    animation: cardIn 0.25s ease;
    border: 1px solid var(--gray-200);
  }
  .score-trophy { font-size: 52px; margin-bottom: 16px; }
  .score-title { font-size: 28px; font-weight: 700; color: var(--teal-dark); margin-bottom: 6px; }
  .score-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 32px; }
  .score-grid { display: flex; justify-content: center; gap: 32px; margin-bottom: 36px; flex-wrap: wrap; }
  .score-stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 32px; font-weight: 700; color: var(--teal-base); }
  .score-stat-num.wrong { color: var(--red); }
  .score-stat-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
  .btn-restart {
    padding: 12px 30px;
    border-radius: 8px;
    border: none;
    background: var(--teal-dark);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.02em;
  }
  .btn-restart:hover { background: var(--teal-mid); }

  /* ───── 플로팅 필터 버튼 (FAB) ───── */
  .fab-filter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--teal-dark);
    color: #fff;
    border: none;
    padding: 11px 18px;
    border-radius: 26px;
    box-shadow: 0 6px 20px rgba(8,80,65,0.35);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 9px;
    z-index: 90;
    transition: all 0.18s;
    max-width: calc(100vw - 40px);
  }
  .fab-filter:hover {
    background: var(--teal-mid);
    box-shadow: 0 10px 28px rgba(8,80,65,0.45);
    transform: translateY(-1px);
  }
  .fab-filter:active { transform: translateY(0); }
  .fab-icon { flex: 0 0 auto; opacity: 0.92; }
  .fab-text { display: flex; align-items: baseline; gap: 7px; min-width: 0; }
  .fab-label {
    font-weight: 600;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fab-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--teal-light);
    flex: 0 0 auto;
  }

  /* ───── 필터 모달 ───── */
  .filter-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(8,80,65,0.38);
    backdrop-filter: blur(4px);
    z-index: 500;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 16px 20px;
    overflow-y: auto;
  }
  .filter-overlay.open { display: flex; }
  .filter-panel {
    background: var(--white);
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: cardIn 0.22s ease;
    overflow: hidden;
    border-top: 3px solid var(--teal-base);
  }
  .filter-panel-head {
    padding: 16px 22px 14px;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, var(--teal-pale) 0%, var(--white) 100%);
  }
  .filter-panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--teal-dark);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .filter-reset {
    font-size: 11px;
    background: transparent;
    border: none;
    color: var(--gray-500);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .filter-reset:hover { background: var(--gray-100); color: var(--teal-mid); }
  .filter-close {
    background: transparent;
    border: none;
    font-size: 20px;
    color: var(--gray-500);
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  .filter-close:hover { background: var(--gray-100); color: var(--teal-dark); }
  .filter-head-right { display: flex; align-items: center; gap: 4px; }

  .filter-panel-body {
    padding: 16px 22px 22px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }
  .filter-panel-body::-webkit-scrollbar { width: 8px; }
  .filter-panel-body::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

  .filter-section { margin-bottom: 20px; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--gray-200);
  }
  .filter-section-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--teal-mid);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .filter-section-hint { font-size: 11px; color: var(--gray-500); }

  .filter-options {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px;
  }
  .filter-option {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 12px;
    border: 1px solid var(--gray-300);
    border-radius: 8px;
    background: var(--white);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--gray-700);
    transition: all 0.13s;
    text-align: left;
    line-height: 1.3;
  }
  .filter-option:hover {
    border-color: var(--teal-base);
    background: var(--teal-pale);
    color: var(--teal-dark);
  }
  .filter-option.active {
    background: var(--teal-dark);
    color: #fff;
    border-color: var(--teal-dark);
  }
  .filter-option.active .opt-cnt { color: var(--teal-light); }
  .opt-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 auto;
    min-width: 0;
  }
  .opt-cnt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    opacity: 0.75;
    flex: 0 0 auto;
    margin-left: 8px;
    color: var(--gray-500);
  }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }

  /* ─── 모바일 ─── */

ntia praecox)로 명명하며 질병의 경과와 예후를 중요시했습니다. 그러나 Eugene Bleuler는 경과나 예후보다 특징적인 증상(4A: Autism, Ambivalence, Associational loosening, Affective incongruity)이 더 중요하다고 보았습니다. 그는 이 질환을 'Schizophrenia'라고 새로 명명했습니다."}, {"subject": "정신의학의 역사", "year": ["17학번", "16학번", "14학번"], "professor": "임태식", "question": "역사적 사건(또는 사실, 업적)과 인물(또는 기관)이 올바르게 연결된 것은?", "images": [], "text_box": null, "options": ["malaria-induced fever therapy --- Harry stack sullivan", "insulin coma therapy --- alfred adler", "diagnostic and statistical manual --- American psychiatric association", "psychobiology --- sergei korsakoff", "electroconvulsive treatment -adolf meyer"], "answer": [2], "explanation": "말라리아 유발 발열 치료는 Julius von Wagner-Jauregg가, 인슐린 혼수 치료는 Manfred Sakel이 시행했습니다. Diagnostic and Statistical Manual(DSM)은 American Psychiatric Association(APA)과 관련이 있습니다. 정신생물학(Psychobiology)은 Adolf Meyer가 주창했습니다. 전기경련치료(ECT)는 Ugo Cerletti와 Lucio Bini가 개발했습니다. Alfred Adler, Harry Stack Sullivan, Sergei Korsakoff, Adolf Meyer는 제시된 내용과 다르게 연결되어 있습니다."}, {"subject": "정신의학의 역사", "year": ["16학번", "15학번", "14학번", "13학번", "12학번"], "professor": "임태식", "question": "다음 역사적 사실 중 옳게 기술된 것은?", "images": [], "text_box": null, "options": ["고대 그리스의 사원수면은 수면을 통한 치유라는 면에서 오늘날의 수면제를 활용한 약물치료의 선구로서 큰 의의가 있다.", "\"Schizophrenia\"(조현병)은 Emil Kraepelin 이 명명한 것으로, 그 후 Eugen Blueler 가 정신분열병의 개념을 수정하여 \"Dementia praecox(조기치매)라고 하였다.", "중세기 정신병자에 대한 박해는 교회의 절대적 권위 아래 계속되었고, Kramer 와 Sprenger 가 발간한 \"Malleus Maleficarum(마녀의 망치)”은 “마녀 사냥”을 위한 지침서로 사용되었다.", "오스트리아의 Manfred Sakel, Julius von Wagner-Jauregg 등은 정신병자의 쇠사슬을 풀어주고 수용소를 개혁하여, 환자를 인도적으로 치료하여 혁명적 업적을 세웠다.", "Erik Erikson 과 Melanie Klein 은 비전형 정신병치료제(atypical antiphsychotics)를 합성하고 조현병 치료에 응용한 공로로 노벨상을 수상하였다."], "answer": [2], "explanation": "고대 그리스의 사원수면은 수면제를 활용한 약물치료가 아닌 수면(꿈)을 통한 치유입니다. 조현병은 Eugen Bleuler가 명명했고, 조기치매는 Emil Kraepelin이 기술했습니다. 정신병자 쇠사슬 풀기 및 수용소 개혁은 Phillipe Pinel의 업적입니다. Erik Erikson은 근대 신프로이드 학자였고, Melanie Klein은 현대 아동 정신치료를 수행한 학자입니다. 비전형 정신병치료제 합성으로 노벨상을 수상한 사람은 없습니다."}, {"subject": "정신의학의 역사", "year": ["16학번", "15학번", "14학번", "12학번"], "professor": "임태식", "question": "역동정신의학과 정신치료와 관련된 역사적 기술 중 옳은 것은?", "images": [], "text_box": null, "options": ["Freud는 집단 무의식, 심리적 원형을 제시하였다.", "Jung은 유아기 성이 중요함을 강조하였다.", "Adler는 무의식의 중요성을 최초로 주장하였다.", "신프로이트 학파는 사회와 환경 속에서의 인간관계와 문화의 중요성을 강조하였다.", "Meyer가 창시한 인지 행동 치료에서는 언어의 중요성과 무의식 속의 언어 이전의 심적 상태에 대한 분석을 강조하였다."], "answer": [3], "explanation": "집단 무의식과 심리적 원형은 Jung이 제시했습니다. 유아기 성의 중요성은 Freud가 강조했습니다. 무의식의 중요성을 최초로 주장한 사람도 Freud입니다. 신프로이트 학파는 사회와 환경 속에서의 인간관계와 문화의 중요성을 강조했습니다. 언어의 중요성과 무의식 속 언어 이전의 심적 상태 분석을 강조한 사람은 Jacque Lacan입니다."}, {"subject": "정신의학의 역사", "year": ["16학번", "15학번", "14학번", "12학번"], "professor": "임태식", "question": "Forest Clements가 제시한 정신질환의 원인에 대한 원시적 질병관에 해당하는 것으로만 조합된 항목은?", "images": [], "text_box": null, "options": ["object intrusion(物침입), soul-loss(넋나감)", "spirit possesion(귀신들림), maternity deprivation(모성박탈)", "degeneration theory(퇴행설), disease sorcery(병의 저주)", "breach of taboo(금기 침해), sibling rivalry(형제간 경쟁)", "humoral disharmony(체액의 불균형), 자궁(hystera)의 부적절한 움직임"], "answer": [0], "explanation": "Forest Clements는 민족지적 연구를 통해 원시적 사회의 질병관을 다섯 가지로 요약했습니다. 이 다섯 가지는 물침입(Object intrusion), 넋 나감(Soul loss), 귀신의 침입(Spirit possession), 병의 저주(Disease sorcery), 금기 침해(Breach of Taboo)입니다. 제시된 보기 중 object intrusion과 soul-loss만이 이 다섯 가지 범주에 직접적으로 해당합니다. 나머지 보기들은 Clements의 원시적 질병관에 포함되지 않습니다."}, {"subject": "정신의학의 역사", "year": ["15학번", "14학번"], "professor": "임태식", "question": "아래의 보기들을 시간 순서대로 옳게 배열한 것은? A. 1950 년대 이후 lithium, chlorpromazine 등 약물 개발 B. 반정신운동 C. 인도주의 정신의학(Phillippe Pinel) D. 정신역동학 (Freud) E. 기술정신의학 (Kraeplin/Bleuler)", "images": [], "text_box": null, "options": ["CEDAB"], "answer": [0], "explanation": "이 문제는 정신의학 역사의 주요 사건들을 시간 순서대로 배열하는 문제입니다. C. 인도주의 정신의학(Phillippe Pinel)은 18세기 후반-19세기 초반의 근대 정신의학 전반부에 해당합니다. E. 기술정신의학(Kraepelin/Bleuler)은 19세기 후반의 근대 정신의학 후반부 초반입니다. D. 정신역동학(Freud)은 19세기 후반의 근대 정신의학 후반부 중후반에 해당합니다. A. 1950년대 이후 lithium, chlorpromazine 등 약물 개발은 현대 정신의학 시기입니다. B. 반정신운동은 현대 정신의학의 후기 동향입니다. 따라서 올바른 순서는 CEDAB입니다."}, {"subject": "정신의학의 역사", "year": ["14학번"], "professor": "임태식", "question": "역동정신의학과 정신치료와 관련된 역사적 기술 중 옳은 것은?", "images": [], "text_box": null, "options": ["Freud 는 집단 무의식, 심리적 원형을 제시하였다.", "Carl G. Jung 의 학문 체계를 개인심리학(individual phychology)이라고 하며, 그는 증상의 심리적 이해에 있어서 유아기 성 (Infantile sexuality)이 중요함을 강조하였다", "Adler 는 무의식의 중요성을 최초로 주장하였다.", "신프로이트학파는 사회와 환경 속에서의 인간관계와 문화의 중요성을 강조하였다.", "Meyer 가 창시한 인지 행동 치료에서는 언어의 중요성과 무의식 속의 언어 이전의 심적 상태에 대한 분석을 강조했다."], "answer": [3], "explanation": "집단 무의식과 심리적 원형은 Jung이 제시했습니다. 유아기 성의 중요성은 Freud가 강조했습니다. 무의식의 중요성을 최초로 주장한 사람도 Freud입니다. 신프로이트 학파는 사회와 환경 속에서의 인간관계와 문화의 중요성을 강조했습니다. 언어의 중요성과 무의식 속 언어 이전의 심적 상태 분석을 강조한 사람은 Jacque Lacan입니다."}, {"subject": "정신의학의 역사", "year": ["13학번", "10학번"], "professor": "임태식", "question": "정신의학의 역사적 사실 중 옳지 않게 기술된 것은?", "images": [], "text_box": null, "options": ["구미 각국에서 정신의학이 의학의 한 전문분야로 자리 잡기 시작한 시기는 19세기 전반이다.", "천두술은 선사 시대에 광범위한 지역에서 행하여졌으며, 학자들은 정신질환도 천두술의 대상에 포함되었을 것으로 추정하고 있다.", "Phillippe Pinel 등은 정신병자의 쇠사슬을 풀어주고 수용소를 개혁하여, 환자를 인도적으로 치료하도록 하여 정신의학의 혁명적 변화를 이끌었다.", "Erik Erikson 과 Melanie Klein 은 정신병치료제를 합성하고 정신분열병 치료에 응용한 공로로 Nobel 상을 수상하였다.", "중세기 정신병자에 대한 박해의 예로 '마녀사냥'을 위한 지침서로 사용된 Malleus maleficarum 을 들 수 있다"], "answer": [3], "explanation": "19세기 전반에 구미 각국에서 정신의학이 의학의 한 전문분야로 자리 잡기 시작했으며 이때 APA가 결성되었습니다. 천두술은 선사시대에 광범위하게 실시되었고, 심각한 정신질환도 그 대상에 포함되었을 것으로 추정됩니다. Phillippe Pinel은 정신병자 쇠사슬을 풀어주고 수용소를 개혁하며 환자를 인도적으로 치료했습니다. Erik Erikson과 Melanie Klein은 정신병 치료제를 합성하고 정신분열병 치료에 응용한 공로로 Nobel 상을 수상하지 않았습니다. Malleus maleficarum은 중세 시대 마녀사냥을 위한 지침서로 사용되었습니다."}, {"subject": "정신의학의 역사", "year": ["13학번", "10학번"], "professor": "임태식", "question": "역사적 사실을 옳지 않게 기술한 것은?", "images": [], "text_box": null, "options": ["Freud 는 무의식의 중요성을 발견하였고, 정신기능을 Id, Ego, Superego 등 구조적으로 나누었다.", "고대 그리스 사원 수명은 꿈 치유라는 측면에서 오늘날의 정신치료의 선구로서 의의가 있다.", "\"Dementia praecox(조기치매)\"는 Kraepelin 이 명명한 것으로, 이후 Bleuler 가 \"Schizophrenia(조현병)\"라고 하였다.", "Jung 의 학문 체계를 개인심리학이라고 하며, 유아기 성을 강조하였다.", "Hippocrates는 체액 간의 부조화가 정신질환을 유발하고, 특정 체액의 다과는 성격과 기질을 결정한다고 믿었다"], "answer": [3], "explanation": "Freud는 무의식의 중요성을 발견하고 정신기능을 Id, Ego, Superego로 나누어 설명했습니다. 고대 그리스의 사원 수면은 꿈 치유를 통해 정신치료의 선구적 의의가 있습니다. Dementia praecox는 Kraepelin이 명명했고, 이후 Bleuler가 Schizophrenia라고 명명했습니다. Jung의 학문 체계는 분석심리학이며, 집단 무의식을 강조했습니다. 개인심리학은 Alfred Adler가 주창했으며, 유아기 성을 강조한 사람은 Freud입니다. Hippocrates는 체액 병리설을 주장했습니다."}, {"subject": "정신의학의 역사", "year": ["13학번", "11학번", "10학번", "09학번"], "professor": "임태식", "question": "다음 역사적 인물과 대표적 업적이 옳게 연결된 것은?", "images": [], "text_box": null, "options": ["Electroconvulsive treatment --- Erich Fromm", "insulin coma therapy --- Alfred Adler", "Individual psychology --- Adolf Meyer", "malaria-induced fever therapy --- Hary Stack Sulivan", "Psychoanalysis --- Sigmund Freud"], "answer": [4], "explanation": "전기경련치료(ECT)는 Cerletti와 Bini가 개발했습니다. 인슐린 혼수 치료는 Manfred Sakel이 시행했습니다. 개인심리학(Individual psychology)은 Alfred Adler가 주창했습니다. 말라리아 유발 발열 치료는 Julius von Wagner-Jauregg가 시행했습니다. 정신분석학(Psychoanalysis)은 Sigmund Freud의 대표적 업적입니다. 제시된 다른 인물들은 각각의 업적과 올바르게 연결되어 있지 않습니다."}, {"subject": "정신의학의 역사", "year": ["11학번"], "professor": "임태식", "question": "정신의학의 역사적 사실을 옳지 않게 기술한 것은?", "images": [], "text_box": null, "options": ["Carl G. Jung은 유아기 성 (Infantile sexuality)을 강조하였다.", "Hippocrates는 체액간의 불균형이 정신질환을 유발한다고 믿었다.", "Sigmund Freud는 정신기능을 Id, Ego, Superego 등으로 나누었다.", "고대 그리스의 사원 수면 (tempe sleep, Incubatio)은 꿈을 통한 치유라는 점에서 정신치료의 선구로서 의의가 있다.", "\"Dementia praecox (조기치매)\" 는 Emil Kraepelin이 명명하였으며, 이후 Eugene Bleuler가 \"schizophrenia(정신분열병)\"이라 하였다."], "answer": [0], "explanation": "유아기 성(Infantile sexuality)을 강조한 사람은 Sigmund Freud입니다. Carl G. Jung은 분석심리학을 창시하고 집단 무의식을 강조했습니다. Hippocrates는 체액 불균형이 정신질환을 유발한다고 믿었으며, Freud는 정신기능을 Id, Ego, Superego로 나누었습니다. 고대 그리스의 사원 수면은 꿈을 통한 치유라는 점에서 정신치료의 선구적 의의가 있습니다. Dementia praecox는 Emil Kraepelin이 명명했고, Schizophrenia는 Eugene Bleuler가 명명했습니다."}, {"subject": "정신의학의 역사", "year": ["09학번"], "professor": "임태식", "question": "다음 중 역사적 사실을 기술한 것 중 옳은 것은?", "images": [], "text_box": null, "options": ["Sigmund Freud 는 무의식(unconsciousness)을 발견하였고, 인간의 정신기능을 Id,Ego,Superego 등 구조적으로 나누어 설명하였다.", "Carl G. Jung 의 학문 체계를 개인심리학(individual phychology)이라고 하며, 그는 증상의 심리적 이해에 있어서 유아기 성 (Infantile sexuality)이 중요함을 강조하였다.", "Erik Erikson 과 Melanine Klein 은 정신병 치료제를 합성하고 정신분열병 치료에 응용한 공로로 Nobel 상을 수상하였다.", "Dementia praecos(조기치매) 는 Eugene Bleuler 가 명명한 것으로, 그 후 Emil Kraepelin이 조기 치매의 개념을 수정하여 schizophrenia(정신분열병) 이라 하였다.", "고대 그리스의 Hippocrates 는 정신병이 합리적 정신의 상실에서 오는 정신병과 신에 의한 신성한 정신병의 두 종류로 나눌 수 있다고 주장하였다."], "answer": [0], "explanation": "Sigmund Freud는 무의식을 발견하고 정신기능을 Id, Ego, Superego로 설명했습니다. Carl G. Jung은 집단 무의식을 강조했고, 개인심리학은 Alfred Adler의 학문입니다. 유아기 성의 중요성은 Freud가 강조했습니다. Erik Erikson과 Melanie Klein은 정신병 치료제 합성 및 노벨상 수상과 관련이 없습니다. Dementia praecox는 Kraepelin이 명명했고, schizophrenia는 Bleuler가 명명했습니다. 정신병을 두 종류로 처음 구분한 학자는 Emily Kraepelin으로 알려져 있습니다."}, {"subject": "정신의학의 역사", "year": ["09학번"], "professor": "임태식", "question": "1932년 Forest Clements는 민족지적 연구를 통하여 정신질환의 원인에 대한 원시적 질병관을 조사하여 선사시대에도 정신질환(정신병 등)에 대한 인식이 있었고 마법적 초자연적 주술적 질병관으로 이해하였으리라 추정하였다. 원시적 질병관에 해당하지 않는 것은?", "images": [], "text_box": null, "options": ["soul-loss (sjft 나감, 실혼)", "spirit possession (귀신의 침입)", "disease sorcery (병의 저주)", "breach of taboo (금기침해)", "above all"], "answer": [4], "explanation": "Forest Clements의 원시적 질병관은 물침입(Object intrusion), 넋 나감(Soul loss), 귀신의 침입(Spirit possession), 병의 저주(Disease sorcery), 금기 침해(Breach of Taboo)의 다섯 가지로 구성됩니다. 제시된 보기의 1번부터 4번까지는 모두 Clements가 언급한 원시적 질병관에 해당합니다. 'above all'은 이 모든 것이 해당된다는 의미이므로, 질문이 '해당하지 않는 것'을 묻고 있으므로 정답이 아닙니다. 이 문제에서는 1, 2, 3, 4번이 모두 원시적 질병관에 해당하므로, 해당하지 않는 것은 없습니다."}, {"subject": "정신의학의 역사", "year": ["08학번", "07학번"], "professor": "임태식", "question": "정신질환을 악령, 신의 저주 등으로 해석했던 중세의 시각을 달리하여 정신질환자의 쇠사슬을 풀어주고 인격적으로 치료했던 프랑스 의사로, 현대 정신의학의 아버지로 추앙되는 사람은?", "images": [], "text_box": null, "options": ["Alois Alzheimer", "Benjamin Rush", "Phillippe Pinel", "Eugene Bleuler", "Sigmund Freud"], "answer": [2], "explanation": "Phillippe Pinel은 프랑스 의사이자 정신질환 치료에 혁명적인 변화를 가져온 인물입니다. 그는 정신질환자들을 쇠사슬에서 풀어주고 인도적인 방법으로 치료할 것을 주장했습니다. 이러한 업적으로 그는 현대 정신의학의 아버지로 추앙받습니다. 다른 인물들은 각기 다른 정신의학적 업적을 남겼지만, Pinel의 공헌과는 차이가 있습니다."}, {"subject": "정신의학의 역사", "year": ["08학번"], "professor": "임태식", "question": "Dimentia praecox를 최초로 명명한 정신과 의사는?", "images": [], "text_box": null, "options": ["Emil Kraepelin", "Benjamine Rush", "Eugene Bleuler", "Manfred Sakel", "Antonio Moniz"], "answer": [0], "explanation": "Emil Kraepelin은 조현병의 초기 개념을 'Dementia praecox(조기치매)'로 명명한 독일의 정신과 의사입니다. 그는 정신질환을 분류하고 체계화하는 데 큰 기여를 했습니다. Eugene Bleuler는 이후 이 병을 'Schizophrenia'로 명명했습니다. 다른 인물들은 정신의학 분야에서 다른 중요한 업적을 남겼습니다."}, {"subject": "정신의학의 역사", "year": ["07학번"], "professor": "임태식", "question": "Kraepelin이 조기 치매라고 했고 Bueler가 4A를 언급한 병은?", "images": [], "text_box": null, "options": ["Alzheimer disease", "Bipolar disorder", "Schizophrenia", "Wernicke-korsakof", "hysteria"], "answer": [2], "explanation": "Emil Kraepelin은 조현병을 'Dementia praecox(조기치매)'로 불렀습니다. 이후 Eugene Bleuler는 이 질환의 핵심 증상을 4A (Autism, Ambivalence, Associational loosening, Affective incongruity)로 설명하며 'Schizophrenia'라고 명명했습니다. 따라서 Kraepelin이 조기치매라고 불렀고 Bleuler가 4A를 언급한 병은 Schizophrenia입니다. 다른 질환들은 이러한 특징과 일치하지 않습니다."}, {"subject": "정신의학의 역사", "year": ["07학번"], "professor": "임태식", "question": "무의식을 발견하고, '꿈의 해석'을 저술 하였으며, 정신분석학을 연 사람은?", "images": [], "text_box": null, "options": ["Alois Alzheimer", "Benjamin Rush", "Philippe Pinel", "Eugene Bleuler", "Sigmoid Freud"], "answer": [4], "explanation": "Sigmund Freud는 무의식의 개념을 발견하고, 꿈의 해석을 통해 인간 정신의 깊은 이해를 시도했습니다. 그는 정신분석학이라는 학문 분야를 창시하여 현대 심리학에 지대한 영향을 미쳤습니다. 그의 이론은 인간 행동의 근원과 정신 병리를 설명하는 데 중요한 기여를 했습니다. 다른 인물들은 각기 다른 정신의학적 업적을 남겼지만, 무의식과 정신분석학의 창시자는 Freud입니다."}, {"subject": "정신의학의 역사", "year": ["07학번"], "professor": "임태식", "question": "에릭슨의 정신사회 발달 개념을 잘 설명한 문항은?", "images": [], "text_box": null, "options": ["후성설을 기초로 하여 발달을 설명하였다", "발달 과제를 획득하지 못하면 고착이 일어난다", "정신성 발달의 리비도 이론과 학습사회 이론을 접목시켰다", "정신성 발달은 청소년이 아닌 노년기에 완성된다"], "answer": [2], "explanation": "Erik Erikson의 정신사회 발달 이론은 Sigmund Freud의 심리성적 발달 이론을 확장한 것입니다. 그는 리비도 중심의 정신성 발달 이론에 사회적, 문화적 요인을 접목하여 전 생애에 걸친 발달을 설명했습니다. 각 발달 단계마다 사회적 과제가 주어지고, 이를 해결하는 과정에서 자아가 발달한다고 보았습니다. 그의 이론은 인간의 사회적 관계와 문화적 맥락의 중요성을 강조합니다. 따라서 리비도 이론과 학습사회 이론을 접목했다는 설명이 가장 적절합니다."}, {"subject": "정신의학의 역사", "year": [], "professor": "임태식", "question": "Emil Kraepelin 의 업적이 아닌 것은?", "images": [], "text_box": null, "options": ["조울증의 기술", "정신질환의 분류", "심리적 요인 강조", "조기 치매의 기술", "현상학적 관찰의 중시"], "answer": [2], "explanation": "Emil Kraepelin은 면밀한 임상적 관찰과 질병 경과의 조사를 토대로 정신질환의 원인, 경과, 예후 및 질환 형태를 분류했습니다. 그는 조울증과 조기치매를 기술하고 정신질환의 분류를 체계화하는 데 중대한 기여를 했습니다. 또한 현상학적 관찰을 중요하게 여겼습니다. 그러나 Kraepelin은 신체론적 경향이 강했으며, 개인적 심리동기나 심리적 요인의 영향을 그다지 주목하지 않았습니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["20학번", "19학번"], "professor": "정종현", "question": "33세 여자가 3개월 전 어머니의 갑작스러운 사망 이후 발생한 허무함, 우울한 기분, 의욕과 흥미 저하로 병원에 왔다. 환자는 식욕도 감소하여 체중이 3개월간 약 8kg이 감소하였고, 어머니에 대한 죄책감과 자신도 갑자기 죽을지 모른다는 불안한 생각이 지속되어 수면시간이 3시간 정도로 줄어들었고, 아무 일에도 집중을 할 수가 없어 직장을 그만두었다. 진단은?", "images": [], "text_box": null, "options": ["급성스트레스 장애", "범불안장애", "적응장애", "정상애도반응", "주요우울장애"], "answer": [4], "explanation": "환자는 어머니 사망 후 3개월간 허무감, 우울한 기분, 의욕 및 흥미 저하를 호소합니다. 이와 함께 식욕 감소, 체중 감소, 수면 장애, 집중력 저하, 직장 이탈 등의 주요 우울 삽화 증상을 보입니다. 특히 어머니에 대한 죄책감과 갑작스러운 죽음에 대한 불안한 생각이 지속되는 것은 우울증에서 나타날 수 있는 죄책 망상 또는 불안 증상으로 볼 수 있습니다. 따라서 가장 가능성이 높은 진단은 주요우울장애입니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["20학번"], "professor": "허휴정", "question": "60세 남자가 아내와 함께 부부 상담을 원해 내원하였다. 남자는 자기보다 15살 어린 아내가 젊은 남자들을 데리고 수 년 전부터 외도를 하고 있다고 생각하였다. 아내는 외도 사실을 극구 부인하였다. 남편에게 아내가 외도를 하고 있다고 생각하는 근거를 묻자, 외출하고 돌아왔을 때 아내의 머리가 흐트러져 있거나, 화장이 지워져 있는 일이 잦다고 했다. 남편은 아내를 의심하여 하루에도 수십 차례 영상 통화를 했다고 하며, 아내의 휴대폰을 위치 추적하였다. 남편은 아내와의 관계 이외에는 일상생활에 문제가 없고, 직장생활 및 친구관계도 원만하다고 했다. 진단은?", "images": [], "text_box": null, "options": ["주요우울장애", "조현병", "편집성 인격장애", "망상장애", "조현양상장애"], "

ty)로 정의됩니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["14학번", "12학번"], "professor": "전태연", "question": "35세 남자가 국정원에서 자신을 미행하며 해치려 한다고 응급실을 내원하였다. 자신의 행동에 대하여 언급하는 소리가 들리고, 욕을 하는 소리도 들린다고 한다. 증상은 2개월 전부터 시작되었으며, 1주일 전에는 다니던 회사를 그만두었다. 진단은? (종합평가, 12학번)", "images": [], "text_box": null, "options": ["조현병 (schizophrenia)", "망상장애 (delusional disorder)", "조현양상장애 (schizophreniform disorder)", "조현정동장애 (shizoaffective disorder)", "단기정신병적장애 (brief psychotic disorder)"], "answer": [2], "explanation": "환자는 국정원이 자신을 미행하고 해치려 한다는 피해 망상과 함께, 자신에 대한 언급과 욕설이 들린다는 환청을 경험합니다. 이 증상들은 2개월 전부터 시작되었고, 1주일 전에는 직장을 그만둘 정도로 기능 저하가 나타났습니다. 조현양상장애는 망상, 환각, 와해된 언어, 심하게 와해된 행동, 음성 증상 중 두 가지 이상이 1개월 이상 6개월 이내로 지속될 때 진단됩니다. 이 환자의 증상 기간이 2개월이므로 조현양상장애로 진단하는 것이 가장 적절합니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["14학번"], "professor": "전태연", "question": "38세 여자 환자가 남편과 함께 정신건강의학과 외래를 찾았다. 환자는 약 2개월 전부터 남편이 외도를 하였다고 주장하면서 더 이상 견디기 어렵다고 하였다. 그리고 환자는 남편의 외도에 대한 증거들을 많이 나열하였다. 그러나 남편으로 인한 힘든 상황에도 아이들의 학업에 관한 문제는 비교적 잘 처리를 하고 있었다. 남편과의 면담 후, 환자가 제시한 근거들을 여러 정황을 고려할 때 사실이 아닐 가능성이 높다. 진단은?", "images": [], "text_box": null, "options": ["조현병 (schizophrenia)", "망상장애 (delusional disorder)", "조현양상장애 (schizophreniform disorder)", "조현경동장애 (schizoaffective disorder)", "단기전신병적장애 (brief psychotic disorder)"], "answer": [1], "explanation": "환자는 남편의 외도를 확고하게 주장하며 다양한 증거들을 제시하지만, 남편과의 면담 결과 사실이 아닐 가능성이 높습니다. 이러한 비현실적이고 확고한 믿음은 망상에 해당하며, 특히 배우자의 부정에 대한 망상적 믿음은 질투 망상에 해당합니다. 환자는 이 힘든 상황에도 아이들 학업 문제는 잘 처리하는 등 망상 외의 영역에서는 기능 저하가 두드러지지 않습니다. 따라서 망상장애(delusional disorder)로 진단하는 것이 적절합니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["13학번"], "professor": "전태연", "question": "20세 여자가 중얼거리며 방안에만 있으려고 하여 가족들이 병원에 데려왔다. 면담 중 차도에서 들리는 자동차 경적 소리를 자신을 잡으러 오는 소리로 착각하여 두려워하였다. 자신의 생각이 TV 프로그램에 보도되고, 친구들이 자신을 흉보는 소리가 들린다며 갑자기 웃기도 하였다. 정신병리는?", "images": [], "text_box": null, "options": ["사고전파", "허무망상", "사고두절", "강박사고", "거부증"], "answer": [0], "explanation": "환자는 차도에서 들리는 경적 소리를 자신을 잡으러 오는 소리로 착각하고, 자신의 생각이 TV에 보도되며 친구들이 자신을 흉본다는 환청을 경험합니다. '자신의 생각이 TV 프로그램에 보도된다'는 것은 사고전파(thought broadcasting)의 전형적인 예시입니다. 사고전파는 자신의 생각이 다른 사람에게 전달되거나 공개된다고 믿는 망상입니다. 이는 사고의 내용 장애 중 하나로, 조현병의 양성 증상에 해당합니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["12학번"], "professor": "전태연", "question": "조현병으로 진단 받은 25세 여자가 허공을 응시하면서 대화하는 것처럼 중얼거렸다. 의심되는 정신 병리는?", "images": [], "text_box": null, "options": ["환청", "보속증", "강박사고", "정서의 둔마", "사고의 두절"], "answer": [0], "explanation": "조현병 진단을 받은 환자가 허공을 응시하며 혼잣말을 하는 것처럼 중얼거리는 모습은 특징적인 정신병적 증상입니다. 이러한 행동은 흔히 환각, 특히 환청(auditory hallucination)에 반응하는 모습으로 나타납니다. 환청은 외부 자극 없이 소리가 들린다고 느끼는 것으로, 조현병의 가장 흔한 양성 증상 중 하나입니다. 따라서 의심되는 정신 병리는 환청입니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["11학번"], "professor": "", "question": "25세 미혼 남자가 3년 전부터 '회사 동료들이 작당하여 나를 감시한다. 그들이 나에 대해 이야기하는 소리가 집에서도 들려 잠을 못 잘 정도이다.'고 호소하면서 정신건강의학과를 찾았다. 평소 내향적이며, 의심이 많은 편이었고, 직장에서도 사소한 일로 동료들과 자주 다투어 대인관계에 어려움을 겪어왔다. 동료들이 자신을 괴롭힌다는 내용의 체계적인 망상을 가지고 있었고, 정동은 둔화되지는 않았다. 진단은?", "images": [], "text_box": null, "options": ["조현병(정신분열병)", "양극성장애, 조증", "정신분열형장애", "분열정동장애", "망상장애"], "answer": [0], "explanation": "환자는 '회사 동료들이 자신을 감시하고 자신에 대해 이야기하는 소리가 집에서도 들린다'고 호소하는데, 이는 피해 망상과 환청에 해당합니다. 이러한 증상들이 3년 전부터 지속되었고, 대인관계의 어려움 등 기능 저하가 동반되었습니다. 망상과 환청은 조현병의 핵심 증상이며, 3년이라는 긴 유병 기간은 조현병 진단 기준에 부합합니다. 정동 둔화는 없다고 명시되어 있으나, 다른 증상들이 조현병 진단을 시사합니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["11학번"], "professor": "전태연", "question": "Bleuler의 조현병 대표증상으로서 사고의 논리적인 연결이 잘 이루어지지 않아 주제가 서로 연결되지 않는 내용들을 이야기하는 상태는?", "images": [], "text_box": null, "options": ["우원증(circumtantiality)", "사고의 지연(retardation)", "사고의 비약(flight of idea)", "사고의 단절(thought blocking)", "연상의 이완(loosening of association)"], "answer": [4], "explanation": "사고 연상의 장애가 심하여 이야기의 주제가 논리적으로 연결되지 않고 의사소통이 어려운 상태를 의미합니다. 이는 사고의 흐름이 방해받아 한 생각에서 다음 생각으로 넘어갈 때 논리적 연결이 모호해지는 현상입니다. 이러한 정신 병리는 연상의 이완(loosening of association)이라고 부릅니다. Bleuler는 연상의 이완을 조현병의 4A 증상 중 하나로 제시했습니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["10학번"], "professor": "전태연", "question": "27세의 남자가 가족들에 의하여 응급실에 방문하였다. 환자는 긴장된 얼굴 표정으로 불안한 모습을 보였으며 혼잣말을 하기도 하였다. 원래 사교적이지 않았던 환자는 약 2년 전부터 더욱 사람을 만나는 것을 꺼려했으며 주로 집에서 지내기 시작하였다 함. 식사도 가족들과 하지 않으려 하고 개인 위생도 제대로 챙기지 않았다 함. 내원 약 3개월 전부터 환자는 주변 사람들이 자신을 비난하고 놀린다 하였으며 밖에 나가면 자신을 감시하며 해치려는 사람들이 있다는 이야기를 하고 했다고 함. 또한 아파트 윗집에 찾아가 왜 자신에 대하여 떠들고 다니냐며 항의를 한 적도 있다고 함. 약 1주일 전부터 잠을 거의 못 잤으며 하루 종일 멍한 상태로 혼잣말을 중얼대곤 하였다 함. 이 환자의 진단명은?", "images": [], "text_box": null, "options": ["망상장애 (delusion disorder)", "정신분열병 (schizophrenia)", "분열정동장애 (schizoaffective disorder)", "정신병적장애 NOS (psychotic disorder NOS)", "단기정신병적장애 (brief psychotic disorder)"], "answer": [1], "explanation": "환자는 주변 사람들이 자신을 비난하고 감시하며 해치려 한다는 피해 망상을 보였습니다. 또한 혼잣말을 하고 사람 만나는 것을 꺼리는 등 사회적 위축과 기능 저하가 2년 전부터 나타났습니다. 3개월 전부터는 망상이 더 뚜렷해지고 1주일 전부터는 수면 장애와 혼잣말이 심해지는 등 증상이 악화되었습니다. 망상, 환청, 사회적 위축 및 기능 저하가 6개월 이상 지속되는 경우 조현병(schizophrenia)으로 진단할 수 있습니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["10학번"], "professor": "전태연", "question": "다음은 사고장애(thought disorder)의 개념에 대한 설명이다 옳은 것을 고르시오.", "images": [], "text_box": null, "options": ["전통적으로 신경증(neurosis)이라는 용어로 표기되었다.", "조현병에서의 가장 흔한 아형은 미분화형이다.", "조현병의 대표적인 양성증상은 망상, 환청, 그리고 정동의 둔마이다.", "조현병, 양극성장애, 정신병적 증상을 동반한 주요우울증 등을 포함한다.", "조현병에서 병식의 결여는 드물게 나타난다."], "answer": [1], "explanation": "사고장애는 정신병적 장애의 핵심 증상으로, 사고의 내용이나 형식에 이상이 나타나는 것을 의미합니다. 조현병은 다양한 아형이 존재하며, 가장 흔한 아형은 미분화형으로 여러 증상이 혼합되어 나타나는 경우입니다. 조현병의 대표적인 양성 증상은 망상과 환각이지만, 정동의 둔마는 음성 증상에 해당합니다. 또한 조현병에서 병식 결여는 매우 흔하게 관찰됩니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["9학번"], "professor": "전태연", "question": "사고장애 (thought disorder)의 개념에 대한 설명으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["Blueler는 조발성 치매의 개념을 제시했다.", "전통적으로 신경증(neurosis)으로 표기되었다.", "정신분열병, 망상장애, 정신분열형 정동장애 등이 포함된다.", "Kraepelin은 정신분열병(schizophrenia)이란 용어를 사용하였다.", "Schneider의 일급 증상에는 와해된 언어, 정동둔마, 무의욕증 등이 있다."], "answer": [2], "explanation": "사고장애는 사고의 내용이나 형식에 이상이 나타나는 정신병적 증상군을 의미하며, 주로 정신병적 장애에서 관찰됩니다. 정신분열병(조현병), 망상장애, 정신분열형 정동장애 등은 모두 사고장애를 특징적으로 포함하는 주요 정신병적 장애들입니다. Bleuler는 조현병이라는 용어를 사용했고, Kraepelin은 조발성 치매 개념을 제시했습니다. 따라서 이러한 정신병적 장애들이 사고장애의 개념에 포함된다는 설명이 가장 적절합니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["9학번"], "professor": "전태연", "question": "사고 과정의 장애로서 사고 연상의 장애가 심하여 이야기의 주제가 없고 의사소통이 이루어지지 않는 상태를 무엇이라고 하는가?", "images": [], "text_box": null, "options": ["우원증 (circumstantiality)", "사고의 지연 (retardation)", "사고의 이탈(tangentiality)", "사고의 비약 (flight of idea)", "사고의 두절 (thought blocking)"], "answer": [2], "explanation": "질문은 사고 연상의 장애가 심하여 이야기의 주제가 없고 의사소통이 이루어지지 않는 상태를 묻고 있습니다. 이는 사고의 흐름이 목적하는 바에서 벗어나 다시 돌아오지 못하는 상태를 의미합니다. 사고의 이탈(tangentiality)은 질문의 요지에서 벗어나더라도 주제와 관련된 다른 이야기로 계속 이어지는 것이 특징입니다. 사고의 비약(flight of idea)은 사고의 연상 속도가 비정상적으로 빨라 여러 주제로 빠르게 전환되지만, 완전히 벗어나지는 않는 것과 대조됩니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["9학번"], "professor": "전태연", "question": "35세 여자 환자가 '아들이 다쳐서 입원했다.'고 말하면서 웃는 모습을 보였다. 이 환자의 정신 증상은?", "images": [], "text_box": null, "options": ["무감동 (apathy)", "무쾌감증 (anhedonia)", "양가감정 (ambivalence)", "정서의 둔마 (blunted affect)", "부적합한 정동 (inappropriate affect)"], "answer": [4], "explanation": "환자는 아들의 입원 소식이라는 슬픈 상황에서 부적절하게 웃는 모습을 보이고 있습니다. 이는 환자의 감정 표현이 상황에 적절하지 않다는 것을 의미합니다. 이러한 정신 증상은 부적합한 정동(inappropriate affect)으로 정의되며, 조현병 스펙트럼 장애에서 흔히 관찰될 수 있는 음성 증상 또는 정동 장애의 한 형태입니다. 정동은 사고 내용과 일치해야 하지만 이 경우 부조화를 보입니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["8학번"], "professor": "전태연", "question": "26세 남자 환자로 별다른 문제 없이 직장생활을 하던 중 내원. 약 3개월 전부터 자신이 우주의 기운에 의해서 생각과 행동이 조종당한다고 말하고, 업무 중 기이한 손동작을 취하기도 하고, 누군가와 대화하듯 혼잣말을 하다가 불쑥 화를 내곤 하기도 하였다고 한다. 이에 업무에 집중하지 못하였으며, 혼란스러워하는 모습이 악화되어 이를 걱정한 부모와 동료들과 함께 병원에 내원하였다. 물질 남용이나 기분 변화 등의 과거력은 없었다. 가장 적절한 진단은?", "images": [], "text_box": null, "options": ["정신분열병 (Schizophrenia)", "망상장애 (Delusional disorder)", "정신분열경동장애 (Schizoaffective disorder)", "정신분열형장애 (Schizophreniform disorder)", "정신분열장애 (Schizophreniform disorder)"], "answer": [3], "explanation": "환자는 '자신이 우주의 기운에 의해 생각과 행동이 조종당한다'고 믿는 조종 망상을 가지고 있습니다. 업무 중 기이한 손동작을 하거나 혼잣말을 하는 등 와해된 행동과 환각도 나타납니다. 이러한 증상들은 약 3개월 전부터 시작되었고, 6개월 이내의 기간 동안 지속되었습니다. 물질 남용이나 기분 변화의 과거력이 없으므로, 조현병의 진단 기준을 충족하지만 기간이 6개월 미만이므로 정신분열형 장애(Schizophreniform disorder)로 진단하는 것이 가장 적절합니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["6학번"], "professor": "", "question": "사고 과정의 장애로서 결국 주제에는 도달하지만 얘기하려는 주제에 도달하기 전에 불필요하고 부적절한 내용들이 진행되는 것을 무엇이라고 하는가?", "images": [], "text_box": null, "options": ["사고의 지연(retardation)", "지리멸렬(incoherence)", "사고의 이탈(tangentiality)", "우원증(circumstantiality)", "연상의 이완(loosening of association)"], "answer": [3], "explanation": "환자의 사고 과정은 주제에 도달하긴 하지만, 그 전에 불필요하고 상세한 지엽적인 내용들로 계속해서 벗어났다가 다시 원래 주제로 돌아오는 양상을 보입니다. 이러한 사고의 장애는 우원증(circumstantiality)으로 정의됩니다. 우원증은 사고의 연상이 느슨해지거나 과도하게 연결되는 것을 포함하며, 주요 우울증, 조현병 등 다양한 정신 질환에서 관찰될 수 있습니다. 이는 목적한 바에 도달하기 전 불필요한 내용으로 돌아가는 특징을 가집니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": ["6학번"], "professor": "", "question": "사고 과정의 장애에 속하지 않는 것은?", "images": [], "text_box": null, "options": ["사고비약", "우원증", "사고지연", "강박사고", "사고의 두절"], "answer": [3], "explanation": "사고 과정의 장애는 사고의 형식 이상을 의미하며, 여기에는 사고비약, 우원증, 사고의 이탈, 사고의 두절, 연상의 이완, 지리멸렬 등이 포함됩니다. 강박사고(obsession)는 사고의 내용 장애에 속하며, 반복적이고 원치 않는 침투적인 생각으로 정의됩니다. 반면 사고의 지연은 사고 연상 속도가 느려지는 것이며, 일반적으로 사고 과정 장애에 포함됩니다. 따라서 제시된 보기 중 강박사고는 사고 과정의 장애가 아닌 사고 내용의 장애에 해당합니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": [], "professor": "", "question": "35세 임산부가 출산 직후 자신을 비난하는 양상의 환청이 5일간 지속되어 정신건강의학과에서 입원 치료를 받고 증상이 호전되어 1주일 만에 퇴원하였다. 그리고 이후로는 더이상의 유사 증상은 나타나지 않았다. 특별한 스트레스 요인은 불분명하였고 환청 이외에 다른 증상이 없었다. 진단은?", "images": [], "text_box": null, "options": ["조현병", "조현양상장애", "조현정동장애", "단기정신병적장애", "기타조현병관련장애 및 정신병"], "answer": [3], "explanation": "35세 임산부가 출산 직후 자신을 비난하는 내용의 환청을 5일간 경험했습니다. 이 증상은 입원 치료 후 1주일 만에 호전되었고, 이후 유사 증상이 나타나지 않았습니다. 특별한 스트레스 요인 없이 발생한 정신병적 증상이 1일에서 1개월 미만으로 짧게 지속된 경우, 단기정신병적 장애(Brief Psychotic Disorder)로 진단합니다. 이는 출산 후 정신병으로도 나타날 수 있는 형태입니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": [], "professor": "", "question": "DSM-5의 정신분열형 진단 기준은 망상, 환각, 와해된 언어, 심하게 와해된 행동, 음성증상 가운데 두 가지 이상이 적어도 1개월 중 상당한 기간 동안 나타나야 한다. 이 중 한 가지는 적어도 망상, 환각, 와해된 언어 중 하나여야 한다. 밑줄 친 진단 기준에 해당하는 것은?", "images": [], "text_box": null, "options": ["감정표현의 감소", "고양된 기분", "지리멸렬", "매너리즘", "납굴증"], "answer": [2], "explanation": "정신분열형(Schizophreniform) 진단 기준은 망상, 환각, 와해된 언어, 심하게 와해된 행동, 음성 증상 중 두 가지 이상이 1개월 중 상당 기간 동안 나타나야 하며, 이 중 한 가지는 망상, 환각, 와해된 언어 중 하나여야 합니다. '지리멸렬'은 사고의 형식 장애 중 하나로, 와해된 언어(disorganized speech)의 한 유형입니다. 와해된 언어는 정신분열형 장애의 핵심 진단 기준 중 하나에 해당합니다. 따라서 밑줄 친 진단 기준에 해당하는 것은 지리멸렬입니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": [], "professor": "", "question": "40세 남자가 몸에 벌레가 기어다녀 가려운 느낌을 참을 수 없어 내원하였다. 직장 생활이나 대인관계에는 큰 어려움이 없었으나 가족들에게 계속 벌레가 기어다녀 견딜 수 없다고 했다. 유형이 무엇인가?", "images": [], "text_box": null, "options": ["질투형", "신체형", "색정형", "피해형", "과대형"], "answer": [1], "explanation": "환자는 몸에 벌레가 기어다니는 듯한 가려운 느낌을 호소하며, 이것이 실제 벌레 때문이라고 굳게 믿습니다. 이러한 믿음은 신체 망상(somatic delusion)의 전형적인 예시로, 신체 기능이나 감각에 대한 비현실적인 확고한 믿음을 특징으로 합니다. 여러 검사에도 불구하고 이러한 믿음이 지속되며, 직장 생활이나 대인관계에는 큰 문제가 없다는 점에서 망상장애 중 신체형으로 분류될 수 있습니다. 환자의 괴로움은 망상에 기인하므로 정신과적 치료가 필요합니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": [], "professor": "김정진", "question": "23세 남자가 1년 전부터 다른 사람들이 자신의 이야기를 하며 수군거리고, 여러 사람들이 욕하는 소리가 들린다고 했다. 8개월 전에는 두 달 동안 우울하고 아무 것도 하고 싶지 않아져서 학교를 그만뒀고, 3개월 전에는 2주 동안 평소보다 말이 많고 기분이 들떴으며 공무원이 되겠다고 밤을 새워 책을 읽고 노래를 흥얼거렸다. 1달 전부터는 기분은 괜찮아졌으나 자신을 욕하는 소리가 점점 더 심하게 들려서 병원에 왔다. 진단은?", "images": [], "text_box": null, "options": ["조현병", "양극성 장애", "주요우울장애", "조현양상장애", "조현정동장애"], "answer": [4], "explanation": "환자는 1년 전부터 사람들이 자신의 이야기를 수군거리고 욕하는 소리가 들린다고 호소하는데, 이는 관계 망상과 환각(환청)에 해당합니다. 8개월 전에는 우울 삽화, 3개월 전에는 양극성 삽화(기분 고양, 활동 증가) 증상이 나타났다가 기분은 호전되었습니다. 현재는 정신병적 증상이 다시 심화되고 있습니다. 기분 삽화와 정신병적 증상이 동시에 나타나거나 순차적으로 나타나는 경우, 조현정동장애를 고려할 수 있으며, 이 사례는 양극형에 해당합니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": [], "professor": "김정진", "question": "40세 남자가 불안과 초조를 느끼며 2주전부터 직장에서 사람들이 자신을 감시하고, 텔레파시 신호를 보낸다고 말하며 내원하였다. 혼잣말로 대화를 하는 모습도 포착되었다. 관련 있는 증상은?", "images": [], "text_box": null, "options": ["조현병", "단기정신병적 장애", "양극성 장애", "조현정동장애", "조현양상장애"], "answer": [1], "explanation": "환자는 직장에서 사람들이 자신을 감시하고 텔레파시 신호를 보낸다고 주장하며, 혼잣말을 하는 모습도 관찰됩니다. 이는 피해 망상과 환각(환청)을 시사하는 정신병적 증상입니다. 증상이 2주 전부터 시작되었으며, 1개월 이내의 짧은 기간 동안 지속된 점이 중요합니다. 따라서 이 환자는 단기정신병적 장애로 진단할 수 있습니다."}, {"subject": "정신과적 면담/MSE/증상 및 징후 평가/사례바탕학습 2 (사고)", "year": [], "professor": "김정진", "question": "20세 미혼 여성이 1년 전부터 집에서 허공을 뚫어지게 응시하거나 무슨 소리가 들린다며 혼잣말을 중얼거리고 자신이 CCTV에 의해 감시당하고 있다는 사실과 다른 말을 하여 내원하였다. DSM-5 진단에 해당되는 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["편집형으로 명시한다.", "현재 부분 관해 상태이다.", "장애의 지속적 징후가 최소 6개월 이상 지속되어야 진단을 내릴 수 있다.", "증상이 남용하고 있는 물질의 생리적 효과에 의해 발생한 경우에도 조현병으로 진단할 수 있다.", "장애의 발병 이래 상당 부분의 시간 동안 일, 대인관계 혹은 자기관리 같은 주요 영역의 한가지 이상에서 기능 수준이 발병 전 성취된 수준 이하로 저하되지 않는다."], "answer": [2], "explanation": "환자는 '자신이 CCTV에 의해 감시당하고 있다'는 피해 망상과 '무슨 소리가 들린다'는 환청을 경험하며 혼잣말을 하는 등 정신병적 증상을 보입니다. 조현병의 진단은 이러한 증상들이 최소 6개월 이상 지속되어야 합니다. 이 6개월의 기간에는 활동기 증상(망상, 환각 등)뿐만 아니라 전구기나 잔류기 증상도 포함됩니다. 따라서 장애의 지속적 징후가 최소 6개월 이상 지속되어야 진단을 내릴 수 있다는 설명이 DSM-5 진단 기준에 부합합니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["18학번", "22학번"], "professor": "성기욱", "question": "다음은 전형성 조현병 치료제의 효력(potency)과 신경전달물질 수용체 X와의 친화도 간의 관계를 나타낸 그래프이다. 수용체 X 는?", "images": [], "text_box": null, "options": ["GABAb receptor", "serotonin 2 receptor", "histamine 2 receptor", "dopamine 2 receptor", "alpha2 adrenergic receptor"], "answer": [3], "explanation": "Typical AP potency와 D₂ receptor affinity 사이의 관계” 그래프입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "20학번", "professor": "성기욱", "question": "신경계 연구 방법 중 신경전달물질이 존재하는 위치(Localization)를 형태학적으로 파악하는 방법은?", "images": [], "text_box": null, "options": ["optogenetics", "microiontophoresis", "in vivo voltammetry", "in vivo microdialysis", "immunocytochemistry"], "answer": [4], "explanation": "Localization을 증명하는 방법은 Immunocytochemisty, in situ Hybridization입니다. 20학번 수업 시간에 강조하신 부분에서 그대로 출제하셨습니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "20학번", "professor": "성기욱", "question": "그림의 신경경로를 표적으로 하는 약물은?", "images": [], "text_box": null, "options": ["benzodiazepines", "typical antipsychotics", "atypical antipsychotics", "tricyclic antidepressants", "serotonin selective reuptake inhibitors"], "answer": [4], "explanation": "Raphe nucleus에서 기시하는 Single source divergent 경로이므로 Serotonin입니다. 여기에 작용하는 약은 항우울제이고, SSRI가 가장 대표적입니다. 3번 Atypical antipsychotics의 경우 Dopamine과 Serotonin에 모두 작용하기에 SSRI가 우선적인 정답인 것으로 보입니다. 4번 TCA의 경우에도 NE와 Serotonin에 모두 작용합니다. 작용을 보면 교수님께서 '정신병 약제는 나도 잘 모른다'라고 하신 부분이 있습니다. 교수님의 의도는 해당 경로가 Serotonin 경로임을 알고, 대표 약제인 SSRI를 고르는 것이라 생각합니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "20학번", "professor": "성기욱", "question": "그림의 수용체에 대해 맞는 설명은?", "images": [], "text_box": null, "options": ["항불안제의 약물표적이다.", "serotonin이 내인성 작동제다.", "흥분성 시냅스전도를 매개한다.", "single polypeptide 구조를 갖는다.", "수용체가 활성화되면 Ca2+ 이온을 통과시킨다."], "answer": [0], "explanation": "GABAA receptor입니다. 항불안제의 Target으로 수업시간에 소개되었습니다. 2) GABA, Glycine이 작동제임. 3) 억제성 시냅스 전도 매개. 4) Ionotropic R이므로 Multisubunit complex임. 5) Cl를 통과시킴."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["20학번", "19학번", "18학번", "17학번"], "professor": "성기욱", "question": "왼쪽 그림과 같이 흰쥐 뇌에 자극 전극을 위치시키고 오른쪽 그림과 같은 실험장치를 이용하여 레버를 누르면 전기 자극이 가해지도록 했을 때 레버를 누르는 행동이 계속됐다. 이러한 행동을 유발하는 신경전달물질은?", "images": [], "text_box": null, "options": ["GABA", "serotonin", "dopamine", "glutamate", "acetylcholine"], "answer": [2], "explanation": "Drug abuse에서 Reward pathway를 소개하며 나온 실험입니다. Mesolimbic Dopamine Pathway에 작용하는 실험이니, Dopamine이 영향을 끼침을 알 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "20학번", "professor": "성기욱", "question": "그림은 신경전달물질을 연구하는 기법에 사용되는 막단백질의 특성을 설명하는 것이다. 이 막단백질을 이용하는 연구 방법은?", "images": [], "text_box": null, "options": ["optogenetics", "microiontophoresis", "in vivo voltammetry", "in vivo microdialysis", "immunocytochemistry"], "answer": [0], "explanation": "Optogenentics에 대한 설명과 정확히 일치합니다. 막단백질 두 가지를 이용해 파장이 다른 빛을 쬐어 흥분성, 억제성 신호를 만들어 낸다고 배웠습니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "20학번", "professor": "성기욱", "question": "그림으로 설명된 수용체 특성으로 옳은 것은?", "images": [], "text_box": null, "options": ["G 단백을 가수분해 시킨다.", "single polypeptide 구조이다.", "7개의 transmembrane domain을 가진다.", "작용발현이 느리고 작용이 오래 지속된다.", "신경전달물질이 결합하면 이온을 직접 투과시킨다."], "answer": [4], "explanation": "LGIC의 그림입니다. LGIC는 NT가 결합하면 이온을 투과시킵니다. 1~4는 GPCR에 대한 설명입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "20학번", "professor": "성기욱", "question": "다음 신경회로를 표적으로 하는 약물은?", "images": [], "text_box": null, "options": ["Benzodiazepines", "Typical antipsychotics", "Atypical antipsychotics", "Tricyclic antidepressants", "Serotonin selective reuptake inhibitors"], "answer": [3], "explanation": "locus coeruleus의 NT는 norepinephrine입니다. BDZ는 GABA에, antipsychotics는 정형의 경우 Dopamine, 비정형의 경우 Dopamine과 serotonin에 작용합니다. SSRI는 당연히 serotonin 원툴이겠구요. 따라서 답은 4번이 됩니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "19학번", "professor": "성기욱", "question": "우측 대뇌반구 운동피질의 뉴런에 Channelrhodopsin-2를 유전자 기법으로 도입한 쥐에, 광섬유를 이용하여 운동피질에 20Hz의 청색광을 쪼였더니 다음 영상과 같은 반응을 보였다. 연구 방법의 이름은? (https://www.youtube.com/watch?v=CUkhL-6kw5Q 이 영상이 아닐까 추측합니다…)", "images": [], "text_box": null, "options": ["in situ hybridization", "in vivo amperometry", "in vivo microdialysis", "Microiontophoresis", "Optogenetic"], "answer": [4], "explanation": "in situ hybridization → Localization을 입증하는 방법 중 mRNA detection. in vivo amperometry → Glass coated carbon fiber를 넣어 전류를 주고 Release를 입증. in vivo microdialysis → 삼투막으로 둘러 쌓인 Probe를 넣어 농도를 측정하며 Release를 입증. Microiontophoresis → Micropipette에 Chemical을 넣고 전류를 가하여 Response를 입증. Optogenetic (technique) → Channelrhodopsin-2, Halorhodopsin을 넣고 빛을 쬐어주며 Response를 입증."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["19학번", "15학번"], "professor": "성기욱", "question": "다음 그림의 신경경로에 해당하는 신경전달물질은?", "images": [], "text_box": null, "options": ["Glutamate", "Norepinephrine", "Dopamine", "Serotonin", "Acetylcholine"], "answer": [3], "explanation": "Raphe nuclei에서 전체 CNS에 axon terminal을 보내는 Serotonin의 그림이었습니다. Serotonin 타겟 약물: 항우울제(SSRI), 식욕억제제, ADHD 약물, atypical antidepressants, atypical antipsychotics."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["19학번", "18학번"], "professor": "성기욱", "question": "그림의 수용체에 대해 맞는 설명은?", "images": [], "text_box": null, "options": ["수면제의 target이다.", "Glutamate가 내인성 작동제로 작용한다.", "흥분성 시냅스를 연결한다.", "수용체가 활성화되면 Cl-을 통과시킨다.", "7 transmembrane single polypeptide이다."], "answer": [3], "explanation": "GABAA receptor입니다! GABA는 대표적 억제성 NT로 수용체 활성시 Cl-를 통과시킵니다. 1) GABAA R을 타겟으로 하는 약물: BDZ(수면제, 항불안제, 항경련제, 알코올 금단증상), Barbiturates(마취, 항경련제), ethanol. 항우울제의 target은 Norepinephrine, Serotonin입니다. 5) GABAA R은 subunit 당 4개의 transmembrane domain을 가진 5개의 subunit로 구성된 ionotropic receptor."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["19학번", "16학번", "14학번"], "professor": "성기욱", "question": "그림과 같은 수용체의 특징으로 옳은 것은?", "images": [], "text_box": null, "options": ["직접 세포막전위를 변화시킨다.", "Na+ 이온을 통과시킨다.", "Nicotine에 의해 활성화된다", "느리게 작용하고 오래 지속된다.", "Multimeric structure를 가진다."], "answer": [3], "explanation": "GPCR 그림입니다! 1), 2), 3), 5): LGIC. 3) Nicotine의 수용체는 nAChR(LGIC)이라고 합니다. 참고로, Ach은 nAChR(LGIC), Muscarinic R(GPCR)을 모두 활성화 시킬수 있습니다. 4) GPCR은 Onset이 느리고 Duration이 길었죠."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["19학번", "16학번", "15학번"], "professor": "성기욱", "question": "시냅스전도를 설명한 그림에서 신경세포X에서 방출되는 신경전달물질은?", "images": [], "text_box": null, "options": ["감마아미노뷰티르산(GABA)", "글루탐산염(Glutamate)", "산화질소(nitric oxide)", "세로토닌(serotonin)", "신경펩타이드 Y(Neuropeptide Y)"], "answer": [3], "explanation": "그림은 point-to-point transmission과 single source divergent (diffuse modulatory) system에 따른 시냅스전도의 차이를 설명한 것이다. Single source divergent system의 시냅스를 구성하는 신경세포는 주로 아민성 신경전달물질을 방출하여 point-to-point transmission을 조절하는 것으로 알려져 있다. 아민성 신경전달물질에는 epinephrine, norepinephrine, dopamine, serotonin이 포함된다. 답가지에서 아민성 신경전달물질은 serotonin이 유일하다. 7교시를 참고하면, presynaptic~postsynaptic의 관계를 point-to-point system이라 하고 이런 과정을 조절하는 X를 single source divergent system이라고 합니다. 수업 내용을 정리하자면 Single source divergent: ACh(중추에서), Dopamine(DA), Norepinephrine(NE), Epinephrine(E), Serotonin Point-to-point system: ACh(말초에서), Glutamate, GABA."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["19학번", "18학번", "17학번"], "professor": "성기욱", "question": "아래 그림은 스트레스 발생과 관련된 뇌신경 회로를 설명한 것이다. HPA 에 대해 억제기능을 나타내며, 만성 스트레스에 의해 신경세포사멸이 관찰되는 X는?", "images": [], "text_box": null, "options": ["Striatum", "Thalamus", "Hippocampus", "Nucleus accumbens", "Ventral tegmentum area"], "answer": [2], "explanation": "그림은 HPA axis를 통한 Cortisol 방출을 설명하는 회로입니다. Amygdala는 HPA를 활성화하고, Hippocampus가 억제합니다. 만성적인 Stress가 Hippcampus를 파괴해 과도한 cortisol 방출이 불안장애를 유도한다고 배웠습니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["18학번", "17학번", "16학번", "15학번"], "professor": "성기욱", "question": "다음 신경 전달 경로에 작용하는 약물의 종류로 가장 적합한 것은?", "images": [], "text_box": null, "options": ["수면제", "항경련제", "항불안제", "항우울제", "항정신병제"], "answer": [3], "explanation": "Raphe nuclei에서 기시하는 Serotonin 경로입니다. Serotonin 경로에 작용하는 대표적인 약물은 항우울제입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "18학번", "professor": "성기욱", "question": "다음 수용체에 맞는 설명은?", "images": [], "text_box": null, "options": ["수면제의 target이 된다.", "glutamate가 내인성 작동제로 작용한다.", "흥분성 시냅스를 연결한다.", "수용체가 활성화되면 Ca2+을 통과시킨다.", "7 transmembrane single polypeptide이다."], "answer": [0], "explanation": "GABAA 수용체입니다. 5) GABAA 수용체는 Pentamer(5개) subunit을 가지고 한 subunit당 4개의 TM domain을 가집니다. 애초에 LGIC는 2~4개의 TM domain을 가집니다.(대부분 4개)"}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["18학번", "17학번", "16학번", "14학번"], "professor": "성기욱", "question": "아래 그림과 같은 신경전달물질 수용체 특징으로 옳은 것은?", "images": [], "text_box": null, "options": ["single polypeptide이다.", "g protein을 활성화한다.", "SSRI계열 항우울제의 표적이다.", "세포 내 cAMP 합성을 증가시킨다.", "직접 세포의 막전위를 변화시킨다."], "answer": [4], "explanation": "LGIC의 그림입니다! 나머지는 GPCR 설명입니다. 3) SSRI 계열 항우울제의 표적은 Serotonin인데 구글링 결과 Serotonin의 LGIC(5-HT3), GPCR(나머지 5-HT)을 모두 활성화시킬수 있어서 LGIC로 특정하기 어렵습니다. 그냥 항우울제는 LGIC, GPCR을 특정하기 힘들다!라고 외우면 파드 다 풀려요. 4) G protein과 결합 → Adenylyl cyclase 활성화 → cAMP ↑ → PKA 활성화 → Phosphorylation ↑."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "17학번", "professor": "성기욱", "question": "아래 그림과 같은 신경전달물질 수용체 특징으로 옳은 것은?", "images": [], "text_box": null, "options": ["이온투과성을 가진다.", "single polypeptide이다.", "항우울제의 약물 표적이다.", "도파민에 의해 활성화된다.", "세포내 cAMP 합성을 억제한다."], "answer": [0], "explanation": "LGIC입니다! 2),5)는 GPCR입니다. 3) 항우울제 약물 표적: Norepinephrine, Epinephrine, Serotonin. Norepinephrine, Epinephrine은 GPCR만 활성화 시키지만, Serotonin은 GPCR, LGIC를 동시에 활성화 시킬 수 있음. 4) 도파민은 LGIC, GPCR을 모두 활성화 시킬 수 있습니다. 5) G/G protein과 결합 → Adenylyl cyclase 억제 → cAMP ↓ → PKA 활성 감소 → Phosphorylation↓."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "16학번", "professor": "성기욱", "question": "그림과 같은 구조의 수용체 특징으로 옳은 것은?", "images": [], "text_box": null, "options": ["항우울제의 약물표적이다.", "EPSP 혹은 IPSP를 직접 생산한다.", "Na+ 혹은 Cl- 이온을 직접 통과시킨다.", "Multimeric subunit의 조합으로 구성된다.", "Epinephrine, dopamine에 의하여 활성화된다."], "answer": [4], "explanation": "1), 5) 항우울제 약물 표적: Norepinephrine, Epinephrine, Serotonin. Norepinephrine, Epinephrine은 GPCR만 활성화 시키지만, Serotonin은 GPCR, LGIC를 동시에 활성화 시킬 수 있음. 참고로, 수업한 약물중 타겟이 GPCR이라고 특정할만한건 Typical antipsychotics(D2 antagonist)밖에 없습니다. GPCR에만 결합하는 것 → Dopamine, Norepinephrine, Epinephrine, Histamine. GPCR, LGIC 모두 활성화하는 것."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["16학번", "15학번", "14학번"], "professor": "성기욱", "question": "그림의 X 계통 수용체만 활성화시키는 것으로 알려진 신경전달물질은?", "images": [], "text_box": null, "options": ["serotonin", "glutamate", "adenine", "acethylcholine", "norepinephrine"], "answer": [4], "explanation": "그림에서 X는 GPCR로 Dopamine, Norepinephrine, Epinephrine, Histamine가 GPCR에만 결합합니다. 공식해설: Catecholamine계 신경전달물질은 아직 Ionotropic receptor에 결합한다는 보고가 없다. 이외에도 Neuropeptide, endocannabinoid 등이 아직 GPCR에만 결합하는 것으로 알려져 있다. Acetylcholine, adenosine, GABA, Glutamate, serotonin은 ionotropic receptor와 GPCR을 모두 활성화시킨다. 따라서 정답은 (다)이다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "16학번", "professor": "성기욱", "question": "그림과 같은 구조의 수용체 특징으로 옳은 것은?", "images": [], "text_box": null, "options": ["작용이 느리게 나타나고 오래 지속된다.", "항불안제, 진정-수면제의 약물 표적이다.", "세포 내 adenyl cyclase를 활성화시킨다.", "norepinephrine, dopamine에 의하여 활성화된다.", "7 transmembrane domain를 갖는 single polypeptide다."], "answer": [1], "explanation": "LGIC입니다! 1),3),4),5)는 GPCR 특징입니다. 2) BDZ(항불안제, 진정수면제, 항경련제), Barbiturate(마취, 항경련제)는 GABAĀR 타겟으로 하는 약물입니다. 즉, 항불안제, 진정수면제는 LGIC 타겟합니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "14학번", "professor": "성기욱", "question": "그림과 같은 수용체의 특징으로 옳은것은?", "images": [], "text_box": null, "options": ["진정-수면제의 약물 표적이 된다.", "G protein을 가수분해한다.", "multimeric structure를 가진다.", "빠른 시냅스 전도를 담당한다.", "selectivity filter 기능을 가진다."], "answer": [1], "explanation": "1), 3), 4), 5)는 LGIC의 특징, 2)는 GPCR의 특징입니다. 1) 진정-수면제의 타겟: GABAAR =LGIC. 5) 수업중에는 Ion selevtivity가 있다고 배웠습니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "14학번", "professor": "성기욱", "question": "그림과 같은 구조의 수용체 특징으로 옳은 것은?", "images": [], "text_box": null, "options": ["G단백을 가수분해한다.", "진정-수면제의 약물 표적이다.", "작용발현시간 및 지속시간이 길다.", "단일 폴리펩티드(single polypeptide) 구조를 가진다.", "아데닐사이클라아제(adenyl cyclase)를 활성화시킨다."], "answer": [1], "explanation": "LGIC입니다. 1) G단백을 가수분해하는 것은 GPCR 특징입니다. 3) 작용발현시간이 길고 지속시간이 긴 것은 GPCR 특징입니다. 4) LGIC는 multimeric structure를 가집니다. 5) 아데닐사이클라아제를 활성화시키는 것은 GPCR 특징입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "13학번", "professor": "성기욱", "question": "그림과 같은 수용체의 특징으로 옳은것은?", "images": [], "text_box": null, "options": ["이온투과성을 가진다.", "작용시간이 오래 지속된다.", "multimeric structure를 가진다.", "진정-수면제의 약물 표적이 된다.", "빠른 흥분성 스냅스 전도(EPSP) 혹은 억제성 스냅스전도(IPSP)를 생성한다."], "answer": [1], "explanation": "나머지는 LGIC 특징입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["13학번", "12학번", "11학번"], "professor": "성기욱", "question": "그림의 수용체에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["항우울제의 표적이 된다.", "흥분성 시냅스 전도를 매개한다.", "수용체가 활성화되면 Na+이온을 통과시킨다.", "수용체 활성화에 의하여 신경세포 탈분극이 유발된다.", "감마아미노부타르산(GABA) 결합에 의하여 활성화된다."], "answer": [4], "explanation": "BDZ, barbiturate가 붙는 걸 보니 GABAA 수용체입니다. GABA는 억제성 NT로 수용체가 활성화되면 Cl-가 투과되면서 억제성 신호(IPSP)가 만들어집니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["12학번", "11학번"], "professor": "성기욱", "question": "다음 그림의 수용체에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["항우울제의 표적이 된다.", "GABA 결합에 의해 활성화된다.", "수용체가 활성화되면 EPSP를 유발한다.", "수용체가 활성화되면 Na+ 이온을 통과시킨다.", "subunit 당 6 transmembrane domain을 가진다."], "answer": [1], "explanation": "GABAA 수용체입니다. 5) GABAA 수용체는 Pentamer(5개) subunit을 가지고 한 subunit당 4개의 TM domain을 가집니다. 애초에 LGIC는 2~4개의 TM domain을 가집니다.(대부분 4개)"}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "12학번", "professor": "성기욱", "question": "다음 중 G-protein coupled receptor만 활성화 시키는 신경전달물질은?", "images": [], "text_box": null, "options": ["GABA", "serotonin", "adenosine", "glutamte", "norepinephrine"], "answer": [4], "explanation": "catecholamine계 신경전달물질은 아직 inotropic receptor에 결합한다는 보고가 없다. 이외에도 neuropeptide, endocanabinoid등이 아직 GPCR에만 결합하는 것으로 알려져 있다. Acetylcholine, adenosine, GABA, Glutamate, serotonin은 ionotropic receptor와 GPCR을 모두 활성화시킨다. GPCR에만 결합하는 것→ Dopamine, Norepinephrine, Epinephrine, Histamine."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "11학번", "professor": "성기욱", "question": "그림의 수용체의 특징으로 가장 옳은 것은?", "images": [], "text_box": null, "options": ["EPSP를 생성한다.", "빠른 시냅스 전도를 담당한다.", "Selectivity filter 기능을 가진다.", "Single polypeptide로 구성된다.", "NMDA 수용체가 여기에 속한다."], "answer": [3], "explanation": "나머지는 LGIC 특징입니다. 5) 하나의 NT가 LGIC, GPCR을 모두 활성화 시킬수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "11학번", "professor": "성기욱", "question": "다음 중 항불안제, 진정수면제의 주요 표적이 되는 신경전달물질 수용체는?", "images": [], "text_box": null, "options": ["GABAA 수용체", "nicotinic 수용체", "dopamine 수용체", "muscarine 수용체", "cannabinoid 수용체"], "answer": [0], "explanation": "BDZ(항불안제, 진정수면제)의 타겟은 GABAA 수용체입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "11학번", "professor": "성기욱", "question": "그림과 같은 구조를 가지는 수용체의 특징으로 가장 옳은 것은?(그림=ionotropic receptor)", "images": [], "text_box": null, "options": ["이온을 통과시킨다.", "SSRI의 표적이 된다.", "G protein을 가수분해한다.", "Single polypeptide 구조를 가진다.", "7개의 transmembrane domain을 가진다."], "answer": [0], "explanation": "나머지는 GPCR에 대한 설명 입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "10학번", "professor": "성기욱", "question": "그림의 수용체의 특징으로 가장 옳은 것은?", "images": [], "text_box": null, "options": ["이온통로를 구성한다.", "빠른 시냅스 전도를 담당한다.", "Selectivity filter 기능을 가진다.", "TM2 domain이 pore를 형성한다.", "Muscarine 수용체가 여기에 속한다."], "answer": [4], "explanation": "나머지는 LGIC 특징입니다. 4) LGIC의 TM2 domain이 이온 채널의 pore를 결정합니다. 5) AchR 중 Nicotinic 수용체는 LGIC, Muscatine 수용체는 GPCR입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "10학번", "professor": "성기욱", "question": "GABA-A complex에서 덜 민감한(insensitive) 벤조디아제핀 수용체의 특성이 아닌 것은?", "images": [], "text_box": null, "options": ["alpha 1", "beta", "delta", "tonic inhibition", "extrasynaptic"], "answer": [0], "explanation": "GABA-A complex의 alpha 1 subunit은 벤조디아제핀에 대한 높은 민감도와 관련이 있습니다. 따라서 덜 민감한 특성은 alpha 1 subunit의 특징이 아닙니다. Beta subunit은 벤조디아제핀 민감도와 직접 관련이 적으며, delta subunit은 extrasynaptic GABA-A receptor와 tonic inhibition에 주로 관여합니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["10학번", "09학번"], "professor": "성기욱", "question": "G-protein coupled receptor의 특징으로 틀린 것은?", "images": [], "text_box": null, "options": ["G-protein을 가수분해한다.", "7개의 TM domain을 가진다.", "느린 시냅스 전도를 담당한다.", "TM2 domain이 pore를 형성한다.", "single polypeptide 구조를 가진다."], "answer": [3], "explanation": "4번은 ionotropic receptor의 특징입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "09학번", "professor": "성기욱", "question": "다음 중 에탄올, benzodiazepine, barbiturate 결합 장소가 있는 신경전달물질 수용체는?", "images": [], "text_box": null, "options": ["AMPA 수용체", "NMDA 수용체", "5-HT3 수용체", "GABAA 수용체", "nicotinic ACh 수용체"], "answer": [3], "explanation": "구글링 결과 benzodiazepine, barbiturate → GABAa. 에탄올 → GABAa, GABAb."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["09학번", "08학번"], "professor": "성기욱", "question": "Ionitropic receptor의 특징으로 가장 옳은 것은?", "images": [], "text_box": null, "options": ["G-protein과 결합한다.", "다양한 subunit으로 구성된다.", "single polypeitide 구조를 가진다.", "7개의 transmembrane domain을 가진다.", "작용출현 시간이 느리고 작용시간이 길다."], "answer": [1], "explanation": "나머지는 GPCR입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "08학번", "professor": "성기욱", "question": "다음 중 ionotropic receptor와 GPCR을 모두 활성화 시키는 신경전달물질이 아닌 것은?", "images": [], "text_box": null, "options": ["Acetylcholine", "Dopamine", "GABA", "Glutamate", "Serotonin"], "answer": [1], "explanation": "catecholamine계 신경전달물질은 아직 inotropic receptor에 결합한다는 보고가 없다. 이외에도 neuropeptide, endocanabinoid등이 아직 GPCR에만 결합하는 것으로 알려져 있다. Acetylcholine, glutamate, serotonin은 ionotropic receptor와 GPCR을 모두 활성화 시킨다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": "08학번", "professor": "성기욱", "question": "다음 신경전달물질과 분류로 옳게 짝지어진 것은?", "images": [], "text_box": null, "options": ["acetylcholine - amine", "dopamine – amino acid", "enkephaline – amine", "glutamate - peptide", "glycine - peptide"], "answer": [0], "explanation": "저희는 Acetylcholine을 Amino acids와 Amine의 중간 성격을 지닌다고만 언급하셨습니다. Dopamine → Monoamine 중 Catecholamine에 해당. Enkephalin → Opioid peptide로 Peptide에 해당. Glutamate → Excitatory Amino acid. Glycine → Inhibitory Amino acid."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["18학번", "16학번", "14학번", "2010"], "professor": "정종현", "question": "조현병과 가장 관련 있는 수용체는?", "images": [], "text_box": null, "options": ["도파민", "무스카린", "아드레날린", "감마아미노부티르산", "엔도카나비노이드"], "answer": [0], "explanation": "조현병의 병태생리를 설명하는 가장 오래되고 강력한 가설은 도파민 가설입니다. 이 가설은 뇌의 특정 도파민 경로의 과활성 또는 불균형이 조현병 증상을 유발한다고 봅니다. 따라서 도파민 수용체는 조현병과 가장 밀접하게 관련되어 있는 수용체입니다. 항정신병 약물 또한 주로 도파민 수용체에 작용하여 증상을 조절합니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["10학번", "2010"], "professor": "정종현", "question": "57세 남자 환자가 공황발작을 주소로 응급실에 내원하였다. 심전도를 포함한 심기능에는 문제가 없는 것이 확인되었고 최근 2년동안 주정중독과 간경화로 수차례 정신과 및 내과에서 입원치료를 받은 기왕력을 가지고 있었다. 아래의 약물중 환자의 공황증상을 가장 안전하고 효과적으로 경감시킬 수 있는 약제는 무엇인가?", "images": [], "text_box": null, "options": ["diazepam", "lorazepam", "haloperidol", "bromazepam", "barbiturate"], "answer": [1], "explanation": "환자는 공황발작과 함께 주정중독 및 간경화의 기왕력을 가지고 있어 약물 선택에 신중을 기해야 합니다. 벤조디아제핀계 약물 중 로라제팜(lorazepam), 옥사제팜(oxazepam), 테마제팜(temazepam)은 주로 글루쿠론산포합(glucuronidation) 경로로 대사되므로 간 기능 저하 환자나 노인 환자에게 비교적 안전합니다. 다른 벤조디아제핀은 간에서 산화 과정을 거치므로 간질환 환자에게는 주의가 필요하며, 할로페리돌과 바비튜레이트는 적절치 않습니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["20학번"], "professor": "정종현", "question": "조현병의 증상을 양성 및 음성 증상을 포함하여 다음의 5가지 증상으로 나눌 수 있다. 이와 관련하여 맞는 것은?", "images": [], "text_box": null, "options": ["Positive symptom: orbitofrontal cortex", "affective symptom: mesolimbic area", "Cognitive symptom: dorsolateral prefrontal cortex", "Affective symptom: mesocortical/prefrontal cortex", "Negative symptom: ventromedial prefrontal cortex"], "answer": [2], "explanation": "조현병의 증상과 관련하여 뇌 회로의 이상을 이해하는 것은 중요합니다. 특히 인지 증상은 배외측 전전두엽 피질(dorsolateral prefrontal cortex)과 밀접한 관련이 있습니다. 이 표를 외워두면 문제 해결에 도움이 됩니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["20학번", "19학번", "18학번", "16학번", "12학번"], "professor": "정종현", "question": "조현병 치료와 관련하여 항정신병 약물의 작용기전에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["nigrostriatal dopamine pathway에 작용해 도파민 활성도를 증가시킨다.", "corticocortical dopamine pathway에 작용해 도파민 활성도를 감소시킨다.", "mesolimbic dopamine pathway에 작용해 도파민 활성도를 감소시킨다.", "mesocortical pathway에 작용해 도파민 활성도를 감소시킨다.", "tuberoinfundibular pathway에 작용해 도파민 활성도를 증가시킨다."], "answer": [2], "explanation": "조현병의 양성 증상은 주로 중뇌변연계 도파민 경로의 과활성와 관련이 있으며, 항정신병 약물은 이 경로의 도파민 활성도를 감소시켜 치료 효과를 냅니다. 정형 항정신병 약물은 주로 중뇌피질 경로의 도파민 활성도를 감소시킵니다. 비정형 항정신병 약물은 음성 증상을 개선시키기 위해 중뇌피질 경로의 도파민 활성도를 증가시키는 경향이 있습니다. 따라서, mesolimbic dopamine pathway에서 도파민 활성도를 감소시키는 것이 조현병 치료의 중요한 작용 기전 중 하나입니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["20학번", "19학번", "17학번", "16학번", "15학번", "14학번", "09학번", "08학번"], "professor": "정종현", "question": "글루타민 신경전달 과정(glutamate neurotransmission)에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["Cortex로부터 VTA(ventral tegmental area)로 내려와 striatum을 거쳐 cortex로 되먹임한다.", "Cortex로부터 VTA로 내려와 GABA를 자극하여 mesocortical dopamine pathway를 억제한다.", "Cortex로부터 VTA로 내려와 GABA가 mesolimbic dopamine pathway를 억제한다.", "Cortex로부터 striatum의 nucleus accumbens로 내려와 GABA를 자극하여 GABA가 thalamus로 가는 정보를 활성화시킨다.", "Cortex로부터 striatum의 nucleus accumbens로 내려와 GABA를 자극하여 GABA가 cortex로 되먹임하여 정보를 통제한다."], "answer": [2], "explanation": "글루타민 신경전달 과정은 뇌의 여러 부위에서 중요한 역할을 합니다. 특히 피질에서 복측피개영역(VTA)으로 내려와 GABA를 자극하여 중뇌변연계 도파민 경로를 억제하는 것은 복잡한 신경회로의 일부입니다. 이 경로는 도파민 시스템의 조절에 관여하며, 정신질환의 병태생리 이해에 중요합니다. 따라서 피질-VTA-GABA를 통한 중뇌변연계 경로 억제는 정확한 설명입니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["20학번", "19학번", "18학번"], "professor": "정종현", "question": "다른 항정신성약물에 비해 안전하며, 경구로 투여할 때 0.5~8시간 경과 후 최고 농도에 도달한다. 약제에 따라 반감기가 다르고 항불안효과, 항경련효과, 근이완효과를 가지며 부작용으로 현기증, 운동실조, 기억장애, 운동기능저하, 오심이 있을 수 있다. 위 설명에 가장 적절한 약물은?", "images": [], "text_box": null, "options": ["졸피뎀", "부스피론", "바비튜레이트", "벤조디아제핀", "베타아드레날린성 수용체 차단체"], "answer": [3], "explanation": "제시된 설명은 벤조디아제핀(Benzodiazepine) 제제의 특징과 정확히 일치합니다. 벤조디아제핀은 GABA-벤조디아제핀 수용체 복합체에 결합하여 클로라이드 이온 채널을 개방시켜 신경세포 흥분성을 감소시킵니다. 항불안, 항경련, 근이완 효과를 가지며, 언급된 부작용 또한 흔하게 나타나는 특징입니다. 다른 약물들은 이러한 특징을 모두 만족하지 않습니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["19학번", "18학번", "17학번", "14학번", "11학번", "08학번"], "professor": "000", "question": "조현병의 증상과 관계 있는 신경해부학적 위치로 옳은 것은?", "images": [], "text_box": null, "options": ["aggressive symptoms: mesolimbic/amygdala", "positive symptoms: orbitofrontal cortex", "negative symptoms: ventromedial prefrontal cortex", "affective symptoms: mesocortical/prefrontal cortex", "cognitive symptoms: dorsolateral prefrontal cortex"], "answer": [4], "explanation": "조현병의 다양한 증상은 뇌의 특정 부위와 관련이 있습니다. 특히 인지 증상은 배외측 전전두엽 피질과 관련이 있으며, 이는 기억과 학습 등의 고차원적인 인지 기능에 중요합니다. 양성 증상은 주로 중뇌변연계 경로와, 음성 증상은 중뇌피질 경로와 관련이 있습니다. 감정 증상은 배외측 전전두엽 피질과 연관됩니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["18학번", "13학번", "09학번", "10학번"], "professor": "정종현", "question": "24세 남자, 조현병으로 약물을 복용하다가 추체외로 증상이 나타났다. 이와 관련 부위는?", "images": [], "text_box": null, "options": ["Nigrostriatal pathway", "Mesolimbic pathway", "Mesocortical pathway", "Tuberoinfundibular pathway", "Dorsolateral prefrontal cortex"], "answer": [0], "explanation": "추체외로 증상(Extrapyramidal symptoms, EPS)은 항정신병 약물, 특히 정형 항정신병 약물의 흔한 부작용입니다. 이러한 증상은 도파민 수용체 차단으로 인해 흑질선조체 경로(nigrostriatal pathway)에 영향을 미쳐 발생합니다. 이 경로에서의 도파민 활성 저하가 운동 부작용을 유발하는 주요 원인입니다. 정위불능증 또한 이러한 추체외로 증상 중 하나입니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["18학번", "17학번", "16학번", "14학번", "13학번", "09학번", "07학번"], "professor": "정종현", "question": "비정형 항정신병 약물의 작용기전에서 어떤 세로토닌 수용체가 도파민 촉진제로 작용하는가?", "images": [], "text_box": null, "options": ["5HT1A 수용체", "5HT2A 수용체", "5HT3A 수용체", "5HT4A 수용체", "5HT5A 수용체"], "answer": [0], "explanation": "비정형 항정신병 약물은 다양한 세로토닌 수용체에 작용하여 도파민 활성을 조절합니다. 5HT1A 수용체는 부분 효현제로서 도파민 분비를 촉진하는 역할을 합니다. 반면, 5HT2A 수용체는 도파민 활성을 억제하는 기능이 있어, 5HT2A 수용체에 대한 길항 작용은 도파민 활성도를 상대적으로 높일 수 있습니다. 이는 비정형 약물이 정형 약물에 비해 추체외로 부작용이 적은 이유 중 하나입니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["17학번"], "professor": "정종현", "question": "조현병의 도파민 가설을 근거로 했을 때 음성 증상과 가장 관계가 깊은 신경학적 부위는?", "images": [], "text_box": null, "options": ["Mesolimbic pathway", "Nigrostriatal pathway", "Mesocortical pathway", "Tuberoinfundibular pathway", "Ventromedial prefrontal cortex"], "answer": [2], "explanation": "조현병의 도파민 가설에 따르면, 음성 증상은 주로 중뇌피질 경로(mesocortical pathway)의 도파민 활성 저하와 관련이 깊습니다. 이 경로는 전전두엽 피질로 연결되어 인지 기능과 감정 조절에 중요한 역할을 합니다. 따라서 이 경로의 이상은 무감동, 무의욕, 사회적 위축과 같은 음성 증상을 유발합니다. 치료 시 이 경로의 도파민 활성을 증가시키는 것이 음성 증상 개선에 도움이 될 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["17학번"], "professor": "정종현", "question": "25세 남자가 자꾸 사람들이 자신들 도청한다고 불안해서 병원에 왔다. 내원 2개월 전부터 신이 다른 사람의 생각을 느낌으로 자신에게 전달해주고, 날씨에 따라 사람들이 자신에 대한 호감도가 바뀌도록 조종한다는, 엉뚱한 생각을 하였다고 한다. 남자의 질환의 병태생리 및 치료에 관한 옳은 설명은?", "images": [], "text_box": null, "options": ["중변연계 경로(Mesolimbic pathway)의 이상은 증상들과 관련이 있다.", "중뇌피질 경로(Mesocortical pathway)는 뇌하수체 전엽에서 Prolactin의 분비를 억제한다.", "흑질선상체 경로(Nigrostriatal pathway)는 집중력, 작동 기억 등 Executive fx.에 관여한다.", "결절누두경로(Tuberoinfundibular pathway) 차단제는 누군가 핸드폰을 도청하고 있다는 생각을 호전시킨다.", "피질시상(Corticothalamic pathway)는 동떨어진 태도, 집념, 무관심 등 분리성과 관련이 있다."], "answer": [0], "explanation": "환자의 증상은 망상과 환각을 포함하는 전형적인 조현병의 양성 증상입니다. 이러한 양성 증상은 주로 중뇌변연계 경로(mesolimbic pathway)에서의 도파민 과활성과 밀접하게 관련되어 있습니다. 따라서 이 경로의 이상은 환자가 경험하는 증상과 직접적인 연관이 있습니다. 조현병 치료는 이러한 도파민 과활성을 조절하는 데 중점을 둡니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["17학번"], "professor": "정종현", "question": "42세 여자가 성당에서 미사를 드릴 때 신도들 앞에서 성경을 낭독하는 것이 불안하다며 정신과를 찾았다. 학창시절부터 사람들 앞에 나서는 것을 불편해하여 그런 일을 일부러 피해왔다고 한다. 그러나 약 1개월 전 신도회의 단장역할을 맡으며 한달에 한번씩 신도들 앞에서 성경을 읽어야하는 일이 생겼다고 한다. 예배 전날에는 너무 불안하여 잠도 자지 못한다고 할 때 이 환자에게 일차적으로 시행해볼 수 있는 약물은 무엇이 있는가?", "images": [], "text_box": null, "options": ["propranolol", "mirtazapine", "sertraline", "venlafaxine", "buspirone"], "answer": [0], "explanation": "이 환자는 특정 상황에서 발생하는 수행불안을 동반한 사회공포증으로 진단할 수 있습니다. 단기적이고 급성적인 수행불안에는 베타아드레날린성 수용체 차단제인 프로프라놀롤(propranolol)이 일차적으로 고려될 수 있습니다. 프로프라놀롤은 불안으로 인한 신체 증상(심계항진, 떨림 등)을 완화하여 상황적 불안을 줄이는 데 효과적입니다. 장기적인 치료가 필요한 경우 SSRI 등이 고려될 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["17학번"], "professor": "정종현", "question": "콜린에스터라제 길항제, 콜린성 수용체 효현제 등이 포함되며, 아세틸콜린의 분해를 차단하고 콜린성 신경전달을 강화하는 것이 주된 작용기전이다.", "images": [], "text_box": null, "options": ["전형 항정신병 약물", "비전형 항정신병 약물", "기분조절제", "항우울제", "인지기능 개선제", "브로마이드", "바비튜레이트", "벤조디아제핀", "베타아드레날린성 수용체 차단제", "항히스타민제", "정신자극제", "클로랄 하이드레이트", "부스피론", "클로니딘", "졸피뎀"], "answer": [4], "explanation": "제시된 설명은 인지기능 개선제, 특히 알츠하이머병 치료에 사용되는 약물들의 주된 작용기전을 나타냅니다. 이 약물들은 아세틸콜린의 분해를 억제하거나 아세틸콜린 수용체를 자극하여 콜린성 신경전달을 강화합니다. 이는 기억력과 학습 능력을 향상시키는 데 목표를 둡니다. Donepezil, Rivastigmine, Galantamine 등이 여기에 해당됩니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["17학번"], "professor": "정종현", "question": "세로토닌 도파민 길항제, 도파민 수용체 부분 효현제, 세로토닌 수용체 부분 길항제의 특성을 가지고 있으며 히스타민 수용체 길항제, 무스카린 수용체 효현제 등으로도 작용할 수 있다. 조현병, 양극성장애, 우울장애 등의 치료에 사용될 수 있다.", "images": [], "text_box": null, "options": ["전형 항정신병 약물", "비전형 항정신병 약물", "기분조절제", "항우울제", "인지기능 개선제", "브로마이드", "바비튜레이트", "벤조디아제핀", "베타아드레날린성 수용체 차단제", "항히스타민제", "정신자극제", "클로랄 하이드레이트", "부스피론", "클로니딘", "졸피뎀"], "answer": [1], "explanation": "제시된 설명은 비정형 항정신병 약물(atypical antipsychotics)의 다양한 약리학적 특성을 나타냅니다. 이 약물들은 세로토닌-도파민 길항작용 외에도 부분 효현제, 부분 길항제 등으로 작용하며, 히스타민 및 무스카린 수용체에도 영향을 미칠 수 있습니다. 이로 인해 조현병뿐만 아니라 양극성 장애, 우울장애 등 다양한 정신질환 치료에 활용됩니다. 이는 정형 항정신병 약물과는 구별되는 중요한 특징입니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["17학번"], "professor": "정종현", "question": "연접전 alpha 2 receptor 효현제로 norepinephrine 신호 전달을 저해하는 약물이다. ADHD, tic, PTSD 의 치료에 사용하나, 내성이 강해 만성적으로는 사용할 수 없는 약물은?", "images": [], "text_box": null, "options": ["clonidine", "buspirone", "propranolol", "barbiturate", "methylphenidate"], "answer": [0], "explanation": "클로니딘(Clonidine)은 연접전 알파-2 아드레날린 수용체 효현제로 작용하여 노르에피네프린 신호 전달을 감소시킵니다. 이는 주의력결핍 과잉행동장애(ADHD), 틱 장애, 외상 후 스트레스 장애(PTSD) 등 다양한 정신과 질환에 사용될 수 있습니다. 하지만 내성 문제가 발생할 수 있어 만성적인 사용이 제한되며, 주로 일반적인 약물 치료로 효과를 보지 못한 경우에 보조적으로 사용됩니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["17학번"], "professor": "정종현", "question": "벤조디아제핀에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["대부분 category x에 해당한다.", "도파민 수용체와 밀접한 관계가 있다.", "벤조디아제핀계 수면제에는 졸피뎀이 있다.", "금단현상이 즉각적으로 나타나서 2~3일 이내로 소실된다.", "알코올과 같이 복용하면 그 약효가 상승하는 경향이 있다."], "answer": [4], "explanation": "벤조디아제핀(Benzodiazepine)은 GABA-벤조디아제핀 수용체 복합체에 결합하여 chloride ionophore를 개방함으로써 신경세포 흥분성을 감소시킵니다. 임신 시에는 Category D에 해당하며, 도파민 수용체보다는 GABA 수용체와 밀접한 관계를 가집니다. 졸피뎀은 non-BDZ계 수면제입니다. 알코올과 같은 중추신경계 억제제와 병용 시 약효가 상승하여 위험할 수 있습니다. 금단 증상은 즉시 나타나지만, 소실까지는 수주에서 수개월이 걸릴 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["16학번", "12학번", "11학번"], "professor": "정종현", "question": "다음 설명 중 고효능(high potency) 정형 항정신병약물의 특징을 가장 잘 설명하는 것은?", "images": [], "text_box": null, "options": ["변비", "입마름", "지연성운동장애", "약한 추체외로 증상", "상대적으로 고용량 사용"], "answer": [2], "explanation": "고효능 정형 항정신병 약물은 주로 D2 수용체에 강하게 작용하여 도파민 활성을 억제합니다. 이러한 약물은 상대적으로 저용량으로 사용되며, 추체외로 증상(EPS)을 심하게 유발할 수 있습니다. 지연성 운동장애는 장기간 복용 시 나타나는 대표적인 추체외로계 부작용 중 하나입니다. 항콜린계 부작용(입마름, 변비)은 상대적으로 약하게 나타납니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["09학번", "10학번", "16학번"], "professor": "정종현", "question": "전형적 항정신병약물 (conventional antipsychotics)의 기전에 대한 설명 중 옳게 기술된 것은?", "images": [], "text_box": null, "options": ["mesolimbic dopamine pathway에 작용해 도파민의 활성도를 높인다.", "mesocortial dopamine pathway에 작용해 도파민의 활성도를 낮춘다.", "tuberoinfundibular dopamine pathway에 작용해 도파민 활성도를 높인다.", "nigrostriatal dopamine pathway에 작용해 도파민 활성도를 높인다.", "corticocortical dopamine pathway에 작용해 도파민 활성도를 낮춘다."], "answer": [1], "explanation": "전형적 항정신병 약물은 주로 도파민 D2 수용체 차단제로 작용합니다. 이 약물들은 중뇌변연계 경로의 도파민 활성을 낮추어 양성 증상을 완화하는 데 효과적이지만, 동시에 중뇌피질 경로의 도파민 활성도 낮추어 음성 및 인지 증상을 악화시킬 수 있습니다. 또한 흑질선조체 경로의 도파민 활성도를 낮춰 추체외로계 부작용을 유발하기도 합니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["16학번"], "professor": "정종현", "question": "Benzodiazepine 수면제에 대해 옳은 것을 고르시오.", "images": [], "text_box": null, "options": ["세로토닌 수용체와 관련이 있다.", "금단 증상이 즉시 나타나고 수개월 이어질 수 있다.", "알코올과 같이 복용 시 약효가 감소한다.", "대부분 category x이다.", "졸피뎀이 해당한다."], "answer": [1], "explanation": "벤조디아제핀은 GABA 수용체와 밀접한 관련이 있습니다. 금단 증상은 약물 중단 후 즉시 나타날 수 있으며, 그 영향은 수개월 동안 지속될 수도 있습니다. 알코올과 병용 시 약효가 증가하는 경향이 있어 주의해야 합니다. 임신 시에는 대부분 Category D에 해당하며, 졸피뎀은 벤조디아제핀이 아닌 non-BDZ 약물입니다. 따라서 금단 증상의 특성에 대한 설명이 가장 적절합니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["15학번"], "professor": "정종현", "question": "다음 수면제에 대한 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["벤조디아제핀계 수면제는 GABA와 밀접한 관계가 있다.", "벤조디아제핀계 수면제는 금단증상이 즉각적으로 나타나 수일 내에 사라진다.", "벤조디아제핀계 수면제는 알코올과 같이 복용하면 그 약효가 감소하는 경향이 있다.", "벤조디아제핀계 수면제는 대부분 category B에 해당한다.", "벤조디아제핀계 수면제에는 졸피뎀이 있다."], "answer": [0], "explanation": "벤조디아제핀계 수면제는 GABA-벤조디아제핀 수용체 복합체에 결합하여 중추신경계 억제 효과를 나타내므로 GABA와 밀접한 관계가 있습니다. 금단 증상은 즉각적으로 나타날 수 있으나 수개월간 지속될 수 있으며, 알코올과 병용 시 약효가 증가합니다. 임신 시에는 대부분 Category D에 해당하며, 졸피뎀은 non-BDZ계 수면제입니다. 따라서 GABA와의 관계에 대한 설명이 가장 정확합니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["15학번"], "professor": "정종현", "question": "다음의 수면제 중에 non-benzodiazepine 기전의 수면제는?", "images": [], "text_box": null, "options": ["triazolam", "flurazepam", "extazolam", "zolpidem", "doxepine"], "answer": [3], "explanation": "non-benzodiazepine 기전의 수면제는 벤조디아제핀 수용체에는 작용하지만 화학적 구조가 벤조디아제핀이 아닌 약물을 의미합니다. 트리아졸람, 플루라제팜, 엑스타졸람은 모두 벤조디아제핀계 수면제에 해당합니다. 졸피뎀은 비벤조디아제핀계 수면제(Z-drug)로 분류됩니다. 독세핀은 항우울제이면서 저용량에서는 수면제로 사용됩니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["15학번"], "professor": "정종현", "question": "조현병으로 장기간 치료를 유지행던 55세 남자 환자가 최근의 혈액검사에서 우연히 호중구수치가 283cells/mm3로 감소된 소견이 확인되었다. 원인이 될 수 있는 약은?", "images": [], "text_box": null, "options": ["Clozapine", "Olanzapine", "Paliperidone", "Quetiapine", "Risperidone"], "answer": [0], "explanation": "클로자핀(Clozapine)은 효과적인 항정신병 약물이지만, 1-2%의 빈도로 치명적인 부작용인 무과립구증(agranulocytosis)을 유발할 수 있습니다. 무과립구증은 백혈구, 특히 호중구 수치가 현저히 감소하는 질환으로, 감염 위험을 크게 높입니다. 따라서 클로자핀 복용 환자는 주기적인 혈액 검사를 통해 호중구 수치를 모니터링해야 합니다. 다른 약물들은 이러한 심각한 혈액학적 부작용 위험이 낮습니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["14학번", "13학번", "12학번"], "professor": "정종현", "question": "다음 중 작용기전이 다른 항불안제는?", "images": [], "text_box": null, "options": ["diazepam", "buspirone", "clonazepam", "alprazolam", "chlordiazepoxide"], "answer": [1], "explanation": "디아제팜, 클로나제팜, 알프라졸람, 클로르디아제폭사이드 등은 모두 벤조디아제핀계 항불안제입니다. 이들은 GABA 수용체 복합체에 작용하여 중추신경계 억제 효과를 통해 불안을 감소시킵니다. 반면 부스피론은 벤조디아제핀과 달리 세로토닌 5HT1A 수용체에 부분 효현제로 작용하여 불안을 완화합니다. 따라서 부스피론은 다른 항불안제들과 작용 기전이 다릅니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["13학번"], "professor": "정종현", "question": "다음 설명에 해당하는 것은? -알파, 베타 아드레날린성 수용체의 효현제로서, 간접적을 연접전 신경말단에서 도파민과 노르아드레알린 방출을 증가시킨다. 각성, 자발성, 자신감, 에너지 수준, 육체적 및 정신적 수행능력을 증가시키고, 즉각적으로 작용하여 피로감을 없애주고 기분을 고양시키는 효과를 갖고 있다. 취약한 개인에게는 남용과 의존, 내성이 생길 수 있어 주의해야 한다.", "images": [], "text_box": null, "options": ["정신자극제", "인지기능 개선제", "삼환계 항우울제", "정형 항정신병약물", "벤조다이아제핀 제재"], "answer": [0], "explanation": "제시된 설명은 정신자극제(Psychostimulants)의 특징과 정확히 일치합니다. 이 약물들은 알파, 베타 아드레날린성 수용체를 활성화하고, 연접전 신경말단에서 도파민과 노르아드레날린 방출을 증가시킵니다. 이로 인해 각성, 자신감, 에너지 수준 및 인지 기능이 향상되며 피로감을 줄여줍니다. 하지만 남용, 의존성, 내성 발생 위험이 높아 주의가 필요합니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["12학번"], "professor": "정종현", "question": "25세 여자가 8개월 전부터 심해진 피해망상과 환청 때문에 치료를 받고 있는 중이다. 약물치료를 시작한 이후 체중이 8kg정도 증가했고 생리불순, 유즙분비 때문에 약을 먹기 싫다고 하였다. 다음 보기의 약들 중 이 환자에게 가장 적절할 것으로 생각되는 것은?", "images": [], "text_box": null, "options": ["olanzapine", "clozapine", "risperidone", "haloperidole", "aripiprazole"], "answer": [4], "explanation": "환자는 항정신병 약물 복용 후 체중 증가, 생리불순, 유즙분비와 같은 부작용을 경험하고 있습니다. 이는 주로 D2 수용체 차단 및 프로락틴 증가와 관련이 있습니다. 아리피프라졸(Aripiprazole)은 도파민 부분 효현제(DPA)로 작용하여 다른 항정신병 약물에 비해 프로락틴 상승과 체중 증가의 부작용 위험이 낮습니다. 따라서 이러한 부작용을 겪는 환자에게 가장 적합한 약물로 고려될 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["11학번"], "professor": "정종현", "question": "고효능(high potency) 정형 항정신병약물의 특징은?", "images": [], "text_box": null, "options": ["변비", "입마름", "지연성운동장애", "약한 추체외로 증상", "상대적으로 고용량 사용"], "answer": [2], "explanation": "고효능 정형 항정신병 약물은 D2 수용체에 대한 강력한 길항 작용으로 인해 추체외로 증상(EPS)을 유발할 가능성이 높습니다. 지연성 운동장애는 장기간 복용 시 나타나는 대표적인 EPS입니다. 이 약물들은 상대적으로 낮은 용량으로 사용되며, 항콜린성 부작용(변비, 입마름)은 저효능 약물에 비해 적게 나타나는 경향이 있습니다. 따라서 지연성 운동장애가 가장 적절한 특징입니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["10학번", "09학번"], "professor": "전양환", "question": "기존의 향정신병약물(conventional antipsychotics)에 대해 잘못된 것은?", "images": [], "text_box": null, "options": ["mesolimbic dopamine pathway에 작용해 도파민의 활성도를 낮춘다.", "mesocortical dopamine pathway에 작용해 도파민의 활성도를 낮춘다.", "tuberoinfundibular dopamine pathway에 작용해 도파민 활성도를 낮춘다.", "nigrostriatal dopamine pathway에 작용해 도파민 활성도를 낮춘다.", "corticocortical dopamine pathway에 작용해 도파민 활성도를 낮춘다."], "answer": [4], "explanation": "기존의 정형 항정신병 약물은 주로 도파민 D2 수용체를 차단하여 작용합니다. 이들은 중뇌변연계 경로의 도파민 활성을 낮춰 양성 증상을 치료합니다. 하지만 중뇌피질 경로, 흑질선조체 경로, 결절누두경로에도 작용하여 각각 음성 증상 악화, 추체외로계 부작용, 프로락틴 증가와 같은 부작용을 유발합니다. 피질피질 도파민 경로는 기존 항정신병 약물과는 직접적인 관련이 적습니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["10학번"], "professor": "정종현", "question": "다음은 베타 아드레날린성 수용체 길항제의 사용이 가장 제한되는 경우는?", "images": [], "text_box": null, "options": ["협심증", "울혈성 심부전", "부정맥", "항정신병 약물에 이한 급성 정좌불능증", "사회공포증"], "answer": [1], "explanation": "베타 아드레날린성 수용체 길항제(베타차단제)는 고혈압, 협심증, 부정맥 등 다양한 심혈관계 질환과 일부 정신과 질환에 사용됩니다. 하지만 천식, 인슐린 의존성 당뇨, 울혈성 심부전, 심한 혈관 질환, 갑상선 기능 항진증 환자에게는 사용이 금기되거나 매우 신중해야 합니다. 특히 울혈성 심부전은 심장의 수축력을 더욱 저하시킬 수 있어 사용이 가장 제한되는 경우입니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["10학번"], "professor": "정종현", "question": "22세 남자 환자가 정신분열증 진단 하에 입원하여 약물치료를 시작하였는데, 약을 증량하면서부터 목이 굳어지면서 옆으로 기울어진 채 바로 펴지 못하고 힘들어하는 모습을 보였다. 환자는 말을 할 때에도 혀가 굳어져 부정확한 발음으로 이야기하였다. 이 증상은?", "images": [], "text_box": null, "options": ["정좌불능증 (akanthisia)", "지연성 운동장애(tardive dyskinesia)", "파킨슨 증후군(parkinson syndrome)", "급성 근긴장 이상증(acute dystonia)", "신경이완제 악성증후군(neuroleptic malignant syndrome)"], "answer": [3], "explanation": "환자의 증상은 약물 치료 후 갑자기 나타난 목의 경직, 기울어짐, 발음 장애 등을 포함합니다. 이는 항정신병 약물의 부작용 중 하나인 급성 근긴장 이상증(acute dystonia)에 해당합니다. 급성 근긴장 이상증은 도파민 수용체 차단에 의해 발생하며, 대개 치료 시작 수일 내에 나타납니다. 즉각적인 약물 중단 또는 항콜린성 약물 투여로 빠르게 호전될 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["10학번"], "professor": "정종현", "question": "serotonin dopamine antagonist(SDA)로 작용하는 비전형 항정신병약물의 특징은?", "images": [], "text_box": null, "options": ["5HT1A receptor가 dopamine accelerator로 작용한다.", "5HT2A receptor가 dopamine accelerator로 작용한다.", "5HT3A receptor가 dopamine accelerator로 작용한다.", "5HT4A receptor가 dopamine accelerator로 작용한다.", "5HT5A receptor가 dopamine accelerator로 작용한다."], "answer": [0], "explanation": "세로토닌-도파민 길항제(SDA)로 작용하는 비정형 항정신병 약물들은 다양한 세로토닌 수용체에 영향을 미칩니다. 특히 5HT1A 수용체에 대한 부분 효현제 작용은 도파민 활성도를 촉진시키는 역할을 합니다. 이는 비정형 약물이 음성 및 인지 증상 개선에 더 효과적이고 추체외로 부작용이 적은 이유 중 하나입니다. 5HT2A 수용체에 대한 길항 작용은 도파민 활성을 간접적으로 조절합니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["08학번", "07학번"], "professor": "정종현", "question": "정신분열병에서 뇌의 주된 도파민 경로가 아닌 것은?", "images": [], "text_box": null, "options": ["Mesolimbic", "Mesocortical", "Nigrostriatal", "Tuberoinfundibular", "Thalamocortical"], "answer": [4], "explanation": "정신분열병(조현병)과 관련된 뇌의 주요 도파민 경로는 중뇌변연계(mesolimbic), 중뇌피질(mesocortical), 흑질선조체(nigrostriatal), 결절누두경로(tuberoinfundibular)입니다. 이 경로들은 도파민 시스템과 정신질환의 병태생리에 중요한 역할을 합니다. 시상피질(thalamocortical) 경로는 도파민 경로가 아니며, 주로 시상과 피질 간의 정보 전달에 관여합니다."}, {"subject": "신경전달물질 수용체, 정신약물 3 (항정신병약물, 항불안제 등)", "year": ["08학번"], "professor": "정종현", "question": "정신분열병의 증상과 관계 있는 신경해부학적 위치로 옳은 것은?", "images": [], "text_box": null, "options": ["positive symptoms: mesocortical/prefrontal cortex", "negative symptoms: mesolimbic cortex", "affective symptoms: ventromedial prefrontal cortex", "aggressive symptoms: dorsolateral prefrontal cortex", "cognitive symptoms: orbitofrontal cortex/amygdala"], "answer": [2], "explanation": "조현병의 증상은 뇌의 다양한 신경해부학적 위치와 관련이 있습니다. 양성 증상은 중뇌변연계 경로와, 음성 증상은 중뇌피질 경로와 연관됩니다. 감정 증상은 배외측 전전두엽 피질과 관련이 있습니다. 제시된 선택지 중 'affective symptoms: ventromedial prefrontal cortex'가 정확한 관계를 나타냅니다. 이 표를 숙지하는 것이 중요합니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2022학번", "2020학번"], "professor": "김태원", "question": "Serotonin은 정상적으로 이 수용체를 통하여 GABA를 활성화시키고, 또한 이 수용체를 통하여 NE, dopamine neuron을 억제하여 전전두엽의 NE, dopamine의 활성화를 감소시킨다. 이 수용체는?", "images": [], "text_box": null, "options": ["5-HT1A", "5-HT2A", "5-HT2C", "5-HT3", "5-HT7"], "answer": [1], "explanation": "Serotonin receptor의 작용 중, 5-HT2A receptor는 직접 NE, DA neuron을 억제하기도 하고 GABA interneuron을 활성화시킴으로써 작용한다고 했었죠. 따라서 답은 5-HT2A입니다. 5-HT2C의 경우, NE, DA neuron을 직접 억제하지는 못하고 GABA interneuron을 통해서만 NE, DA neuron을 억제할 수 있다고 했었습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2022학번"], "professor": "김태원", "question": "항우울제에 대한 설명으로 맞는 것은?", "images": [], "text_box": null, "options": ["진정 작용이 없다.", "통증 관련 기능이 없다.", "인지 개선 기능이 있다.", "시냅스의 단가 아민 농도가 낮다.", "항우울제 치료 후 수용체의 밀도가 높다."], "answer": [2], "explanation": "여러 항우울제의 기능들을 보면 항우울제는 진정(sedation) 작용과 통증 관련 기능(통증 관련 질환에 사용 가능)이 있고, 인지 개선 기능이 있습니다. 항우울제를 사용하면 시냅스의 단가 아민(monoamine)의 농도가 증가하고, 수용체의 발현이 감소합니다(downregulation). 따라서 '인지 개선 기능이 있다'는 설명이 옳습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2020학번"], "professor": "김태원", "question": "60세 여자가 유방암으로 치료를 받던 중 정신건강의학과에 협진 의뢰되었다. 면담 결과 우울증에 대하여 약물 복용을 시행하기로 결정하였다. 유방암에 대하여 tamoxifen을 복용 중이라 할 때 paroxetine, fluoxetine, bupropion, sertraline, duloxetine을 항우울제로 사용하지 못한다. 이는 이 항우울제들이 어떤 작용을 하기 때문인가?", "images": [], "text_box": null, "options": ["CYP1A2억제", "CYP2D6억제", "CYP3A4억제", "CYP2D6활성화", "CYP3A4활성화"], "answer": [1], "explanation": "Tamoxifen은 CYP2D6에 의해 대사되는 약물입니다. 따라서 CYP2D6을 억제하는 약물과 Tamoxifen을 함께 복용해서는 안 됩니다. Fluoxetine, Paroxetine, Duloxetine은 CYP2D6를 억제하는 것으로 알려져 있습니다. 이는 약물 상호작용으로 인해 Tamoxifen의 효과가 감소할 수 있기 때문입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2020학번"], "professor": "김태원", "question": "??세 남자가 3개월간 계속되는 우울한 기분, 집중력 저하, 의욕 저하, 흥미 저하, 죄책감으로 왔다. 매일 장거리 운전을 하고 있었으며 과거 유사한 증상으로 약물 처방을 받았을 때 아침 운전 중 과도한 졸림과 성기능 장애 때문에 치료를 중단하였던 경험이 있었다. 적절한 치료 약물은?", "images": [], "text_box": null, "options": ["escitalopram", "sertraline", "mirtazapine", "trazodone", "bupropion"], "answer": [4], "explanation": "환자는 과거 항우울제 복용 시 졸림과 성기능 장애 부작용으로 치료를 중단한 경험이 있습니다. Escitalopram과 Sertraline은 성기능 장애를 유발할 수 있으며, Mirtazapine과 Trazodone은 졸림을 유발하는 대표적인 약물입니다. Bupropion은 성기능 장애 및 졸림 유발 효과가 적은 항우울제로 알려져 있습니다. 따라서 부프로피온이 이 환자에게 적절한 치료 약물로 고려됩니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2019학번"], "professor": "김태원", "question": "다음 중 항우울제를 사용했을 때 monoamine에 대해 맞는 것은?", "images": [], "text_box": null, "options": ["수용체의 발현이 증가한다.", "시냅스 내 농도 감소", "수용체의 발현이 감소한다.", "?", "?"], "answer": [2], "explanation": "항우울제를 장기적으로 사용하면 시냅스 내 monoamine의 농도가 증가합니다. 이는 수용체의 발현을 감소시키는 효과, 즉 down-regulation을 유도하게 됩니다. 이러한 수용체 발현의 감소는 항우울제 치료 반응의 중요한 기전 중 하나입니다. 따라서 항우울제 사용 시 수용체의 발현이 감소한다는 설명이 옳습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2019학번"], "professor": "김태원", "question": "우울증이 있을 때 단가아민에 대한 것으로 옳은 것은?", "images": [], "text_box": null, "options": ["수용체의 발현 감소 상태", "수용체의 발현 증가 상태", "우울은 노르에피네프린 과다가 원인", "항우울제 치료 후 수용체 발현 증가", "항우울제는 시냅스 단기 아민의 농도를 증가시킴"], "answer": [1], "explanation": "우울증 상태에서는 시냅스의 세로토닌 및 기타 단가아민 농도가 낮아져 있습니다. 이에 대한 보상 작용으로 시냅스 후 수용체의 발현이 증가하는(upregulation) 경향을 보입니다. 항우울제 치료는 시냅스 내 단가아민 농도를 증가시켜, 장기적으로 수용체의 발현을 감소시킵니다(downregulation). 따라서 우울증 시에는 수용체의 발현 증가 상태가 나타납니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2019학번"], "professor": "김태원", "question": "세로토닌 재흡수 차단과 5HT2C 수용체 길항 작용을 통하여 효과를 내는 항우울제는?", "images": [], "text_box": null, "options": ["서트랄린(sertraline)", "트라조돈(trazodone)", "플루옥세틴(fluoxetine)", "부프로피온(bupropion)", "메틸페니데이트(methylphenidate)"], "answer": [2], "explanation": "플루옥세틴은 선택적 세로토닌 재흡수 억제제(SSRI)에 속하여 세로토닌 재흡수를 차단하는 작용을 합니다. 또한 5-HT2C 수용체의 길항제로 작용하여 우울증 치료에 기여합니다. 이 두 가지 작용 기전을 통해 플루옥세틴은 시냅스 내 세로토닌 농도를 조절하고 특정 수용체 활성을 조절하여 항우울 효과를 나타냅니다. 따라서 문제에서 설명하는 기전을 가진 약물은 플루옥세틴입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2019학번"], "professor": "김태원", "question": "57세 남자가 우울증 진단을 받고 5개월간 항우울제를 복용하면서 점차 우울감과 의욕을 회복하였다. 그런데 잠을 잘 때 얕은 잠만 잔다며 깊은 잠을 자고 싶다고 하였다. 추가할 약제는?", "images": [], "text_box": null, "options": ["서트랄린(sertraline)", "트라조돈(trazodone)", "플루옥세틴(fluoxetine)", "부프로피온(bupropion)", "메틸페니데이트(methylphenidate)"], "answer": [1], "explanation": "환자는 우울증이 호전되었으나 불면증 증상을 호소하고 있습니다. 트라조돈은 항우울 효과와 함께 강한 진정 작용(sedation effect)을 가지고 있어 불면증 치료에 효과적으로 사용되는 약물입니다. 다른 SSRI 계열의 약물이나 부프로피온은 수면 개선에 직접적인 효과가 적거나 오히려 활성을 증가시킬 수 있습니다. 따라서 불면증 개선을 위해 트라조돈을 추가하는 것이 적절한 조치입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2018학번"], "professor": "배치운", "question": "Serotonin은 정상적으로 이 수용체를 통하여 GABA를 활성화시키고, 또한 이 수용체를 통하여 NE, dopamine neuron을 억제하여 전전두엽의 NE, dopamine 활성화를 감소시킨다. 이 수용체는?", "images": [], "text_box": null, "options": ["5-HT1A", "5-HT2A", "5-HT2C", "5-HT3", "5-HT7"], "answer": [1], "explanation": "세로토닌 수용체 중 5-HT2A는 GABA를 활성화하고, 노르에피네프린 및 도파민 뉴런을 직접적으로 억제하는 두 가지 경로를 통해 작용합니다. 이로 인해 전전두엽에서 노르에피네프린과 도파민의 활성을 감소시키는 효과를 나타냅니다. 반면 5-HT2C는 주로 GABA 인터뉴런을 통해서만 이러한 억제 작용을 합니다. 따라서 문제의 설명에 부합하는 수용체는 5-HT2A입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2018학번"], "professor": "배치운", "question": "22세 여자 환자가 2주 이상 지속된 우울감, 불안, 초조, 나른함, 피곤 등의 증상을 주로 호소하며 내원하였다. 직장에서 회계 업무를 담당하고 있었으며 간헐적으로 야근을 하기 도 하여 피로가 누적됨을 호소하였다. 임상적 진단으로 우울증으로 판단하여 항우울제를 투여하기로 하였다. 환자는 항우울제 투여에 따른 체중 변화에 매우 민감하게 염려를 하였으며 단 기간 항우울제 치료를 원하였다. 병력 상 가족력은 없었으며 다른 약물 처방받고 있지도 않았다. 상기 환자에게 가장 적절한 항우울제로 생각되는 것을 고르시오.", "images": [], "text_box": null, "options": ["부프로피온 (Bupropion)", "미르타자핀 (Mirtazapine)", "아미트리프틸린 (Amitriptylline)", "파록세틴 (Paroxetine)", "벤라팍신 (Venlafaxine)"], "answer": [0], "explanation": "환자는 피로감과 나른함을 호소하며 체중 변화에 민감하고 단기 치료를 원합니다. 부프로피온은 체중 증가 부작용이 적고 에너지 증진 효과가 있어 피로감을 개선할 수 있습니다. 미르타자핀은 체중 증가와 진정 작용이 있어 이 환자에게 부적합합니다. 파록세틴과 벤라팍신은 체중 변화나 다른 부작용 가능성이 있습니다. 따라서 부프로피온이 이 환자에게 가장 적절한 선택입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2018학번"], "professor": "배치운", "question": "74세 여자가 1개월 전부터 우울증 치료로 단일 항우울제를 복용하고 있다고 하였으나 약물명을 알지 못하고 내원하였다. 약물 복용 후부터 체중이 증가하고 다음날 아침에도 정신이 몽롱하고 졸리움이 지속된다고 하였다. 추측되는 항우울제는?", "images": [], "text_box": null, "options": ["서트랄린 (Sertraline)", "부프로피온 (Bupropion)", "플루오세틴 (Fluoxetine)", "미르타자핀 (Mirtazapine)", "벤라팍신 (Venlafaxine)"], "answer": [3], "explanation": "환자는 항우울제 복용 후 체중 증가와 심한 졸림 증상을 호소하고 있습니다. 미르타자핀은 이러한 부작용이 흔히 나타나는 항우울제로, 강력한 항히스타민 작용으로 인한 진정 효과와 식욕 증진으로 인한 체중 증가가 특징입니다. 다른 SSRI 계열 약물이나 부프로피온은 일반적으로 이러한 부작용이 덜하거나 다르게 나타납니다. 따라서 미르타자핀이 가장 유력한 추측 약물입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2018학번"], "professor": "배치운", "question": "이 약물의 가장 흔한 부작용은 위장관 장애와 진전이며, 장기 투여시 신장독성이 발생 가능하며 주로 비가역성으로 발현된다. 또한 갑상선기능 장애를 초래하기도 하며 혈액학적 부작용 상 백혈구 감소를 흔히 보인다. 또한 약물 혈액 농도에 따라서 신경학적 특성도 발생 가능하므로 혈액 채취를 통한 정기적인 약물 농도의 모니터링이 필요하다. 상기 설명에 부합되는 약물을 고르시오.", "images": [], "text_box": null, "options": ["서트랄린 (Sertraline)", "리튬 (Lithium)", "카바마제핀 (Carbamazepine)", "발프로에이트 (Valproate)", "벤라팍신 (Venlafaxine)"], "answer": [1], "explanation": "리튬은 양극성 장애 치료에 사용되는 약물로, 위장관 장애와 진전이 흔한 부작용입니다. 장기 복용 시 신장독성, 갑상선 기능 저하증, 백혈구 감소 등의 부작용이 발생할 수 있습니다. 또한 치료 범위가 좁아 혈중 농도를 주기적으로 모니터링해야 하는 약물입니다. 문제에서 언급된 모든 특징들은 리튬의 주요 부작용 및 관리 사항과 일치합니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["20학번", "2017학번"], "professor": "김태원", "question": "세로토닌은 정상적으로 이 수용체를 통하여 GABA 를 활성화시켜 노르에피네프린, 도파민 뉴런을 억제하여 전전두엽의 노르에피네프린, 도파민 활성을 감소시킨다. 이 수용체는 직접 노르에피네프린, 도파민 뉴런을 억제하지 않는다. 이 수용체는?", "images": [], "text_box": null, "options": ["5-HT1A", "5-HT2A", "5-HT2C", "5-HT3", "5-HT7"], "answer": [2], "explanation": "5-HT2C 수용체는 GABA 활성화를 통해 도파민 및 노르에피네프린 뉴런을 억제합니다. 즉, 직접적으로 이들 뉴런에 작용하는 것이 아니라 GABA 인터뉴런을 매개로 합니다. 반면 5-HT2A 수용체는 GABA 활성화와 함께 NE, DA 뉴런을 직접 억제하는 방식으로도 작용할 수 있습니다. 따라서 문제의 '직접 노르에피네프린, 도파민 뉴런을 억제하지 않는다'는 설명에 부합하는 것은 5-HT2C 수용체입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2017학번"], "professor": "김태원", "question": "40세 여자가 2개월간 지속된 우울감, 정신운동지체, 피로감, 자살사고, 과수면, 폭식으로 왔다. 현재 당뇨, 고혈압, 고지혈증으로 치료중이었다. 치료 약물은?", "images": [], "text_box": null, "options": ["Bupropion", "Sertraline", "Mirtazapine", "Olanzapine", "Venlafaxine"], "answer": [1], "explanation": "환자는 당뇨, 고혈압, 고지혈증 등의 기저 질환을 가지고 있어 약물 선택에 신중해야 합니다. Bupropion과 Venlafaxine은 혈압을 높일 수 있어 고혈압 환자에게는 주의가 필요합니다. Mirtazapine과 Olanzapine은 체중 증가 및 대사 증후군 위험이 있어 당뇨, 고지혈증 환자에게는 적합하지 않습니다. Sertraline은 대사 증후군에 대한 영향이 비교적 적고 기저 질환에 부담을 덜 주는 편이어서 이러한 환자에게 적절한 항우울제로 고려될 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2016학번"], "professor": "배치운", "question": "다음 중 항우울제의 설명 중 바른 것은?", "images": [], "text_box": null, "options": ["각 클래스의 대표적인 항우울제로는 amitriptyline, fluoxetine, buproprion, venlafaxine 그리고 aripiprazole이 있다", "항우울제는 통증 등 신체적인 증상의 치료에도 효과가 있다.", "하나의 항우울제를 다른 항우울제와 병용하는 것은 금기사항이다", "3차 아민 항우울제로는 imiprzine, amitriptyline, clomipramine, desipramine이 있다.", "3차 아민 항우울제는 진정 작용이 거의 없어 벤조다이제핀과 병용하는 것이 치료에 도움이 된다."], "answer": [1], "explanation": "항우울제는 우울증 외에도 만성 통증, 신경병증성 통증 등 다양한 신체적 증상 치료에 효과를 보입니다. Aripiprazole은 항우울제가 아닌 조현병 치료제이며, 항우울제 병용은 금기가 아닙니다. Imiprzine이라는 약물명은 일반적이지 않으며, 3차 아민 항우울제는 진정 작용이 있어 벤조다이제핀과 병용 시 과도한 진정을 유발할 수 있습니다. 따라서 '항우울제는 통증 등 신체적인 증상의 치료에도 효과가 있다'는 설명이 바릅니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2016학번", "2014학번"], "professor": "배치운", "question": "선택적 세로토닌 재흡수 차단제에 대한 설명 중 맞는 것은?", "images": [], "text_box": null, "options": ["부작용은 개별 약물마다 차이가 없다.", "반감기가 가장 긴 약물은 fluoxetine이다.", "사용시 급작스럽게 중단하여도 부작용이 발생하지 않는다.", "치료효과는 투여 3일 후 나타나기 시작하여 일주일 후 정점에 이른다.", "투여량과 우울증상 개선도가 상관관계가 있으므로 높은 용량 투여가 치료 원칙이다."], "answer": [3], "explanation": "선택적 세로토닌 재흡수 차단제(SSRI)는 개별 약물마다 부작용 프로파일과 반감기에 차이가 있습니다. 플루옥세틴은 반감기가 가장 긴 SSRI 중 하나로 알려져 있습니다. SSRI는 급작스럽게 중단할 경우 금단 증상이 발생할 수 있으며, 치료 효과는 보통 2-4주 후에 서서히 나타나기 시작합니다. 투여량과 증상 개선도 또한 복잡한 관계를 가지므로, 항상 높은 용량 투여가 치료 원칙은 아닙니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2016학번", "2014학번"], "professor": "배치운", "question": "다음 중 가장 먼저 항우울제로 개발된 약물은?", "images": [], "text_box": null, "options": ["imipramine", "clomipramine", "desipramine", "doxepin", "amitiriptyline"], "answer": [0], "explanation": "최초로 개발된 항우울제는 Tricyclic Antidepressants (TCA) 계열의 이미프라민(imipramine)입니다. 1950년대에 발견되어 우울증 치료에 혁명적인 변화를 가져왔습니다. 클로미프라민, 데시프라민, 독세핀, 아미트립틸린 등은 모두 TCA 계열에 속하지만 이미프라민보다 늦게 개발되었습니다. 이 약물들은 우울증뿐만 아니라 다양한 정신과적 질환 치료에 사용되었습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2016학번"], "professor": "배치운", "question": "SSRI에 대한 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["음식물 섭취는 SSRI흡수를 방해한다.", "성기능장애가 발생하면 일반적으로 약물을 치환하여야 한다.", "serotonin syndrome은 흔하게 발생하는 가벼운 부작용이다.", "가장 흔한 부작용은 초기에 나타나는 오심이며 즉가 치환하여야한다.", "성욕의 감퇴와 사정의 연기(남성), 오르가즘의 어려움(여성)등의 성기능 장애는 드물다."], "answer": [1], "explanation": "SSRI는 성기능 장애를 흔하게 유발하는 부작용이 있으며, 이로 인해 환자의 약물 순응도가 저하될 수 있습니다. 성기능 장애가 심한 경우, 성기능 부작용이 적은 다른 약물로의 치환을 고려할 수 있습니다. 세로토닌 증후군은 심각한 부작용이며 가볍지 않고, 오심은 흔한 초기 부작용이지만 즉각적인 약물 치환이 필요한 경우는 드뭅니다. 음식물 섭취가 SSRI 흡수를 방해한다는 것은 일반적인 설명이 아닙니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2016학번", "2014학번"], "professor": "배치운", "question": "다음의 설명으로 적절한 약물은? “주요우울장애의 치료 약물로 공인되었고 금연치료의 보조제로 사용되기도 한다. 다른 항우울제와 달리 성기능 부작용이 거의 없으며 고용량 투여시 경련 유발의 위험이 있다.”", "images": [], "text_box": null, "options": ["Paroxetine", "Fluoxetine", "Venlafaxine", "Bupropion", "Mirtazapine"], "answer": [3], "explanation": "부프로피온은 주요 우울장애 치료에 사용되는 비정형 항우울제입니다. 이 약물은 니코틴 수용체에 작용하여 금연치료 보조제로도 활용됩니다. 특히, 다른 항우울제와 달리 성기능 부작용이 적다는 큰 장점이 있습니다. 그러나 고용량 투여 시 경련 발생 위험이 증가할 수 있어 주의가 필요합니다. 따라서 문제의 모든 특징에 부합하는 약물은 부프로피온입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2015학번"], "professor": "김태원", "question": "60세 여자가 유방암으로 치료를 받던 중 정신건강의학과에 협진의뢰되었다. 면담 결과 우울증에 대하여 약물 복용을 시행하기로 결정하였다. 유방암에 대하여 tamoxifen을 복용 중이다. 적절한 항우울제는?", "images": [], "text_box": null, "options": ["sertraline", "fluoxetine", "bupropion", "paroxetine", "venlafaxine"], "answer": [2], "explanation": "Tamoxifen은 CYP2D6 효소에 의해 활성화되어 약효를 발휘합니다. Fluoxetine과 Paroxetine은 강력한 CYP2D6 억제제로, Tamoxifen과 병용 시 약효를 감소시킬 수 있습니다. Bupropion은 CYP2D6 억제 효과가 거의 없거나 미미하다고 알려져 있어, Tamoxifen의 대사에 영향을 주지 않습니다. 따라서 Tamoxifen을 복용 중인 환자에게는 Bupropion이 적절한 항우울제 선택이 될 수 있습니다. Sertraline과 Venlafaxine도 CYP450 억제 효과가 적은 편입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["2015학번"], "professor": "김태원", "question": "당뇨, 고혈압, 심근경색으로 치료받고 있는 50대 남자가 fluoxetine을 복용하고 우울증은 호전되었으나 사정이 지연되는 성기능장애가 발생하였다. 적절한 조치는?", "images": [], "text_box": null, "options": ["sildenafil 추가", "fluoxetine 증량", "bupropion으로 변경", "mirtazapine으로 변경", "amisulpride로 변경"], "answer": [2], "explanation": "Fluoxetine과 같은 SSRI 계열 항우울제는 흔히 성기능 장애, 특히 사정 지연을 유발할 수 있습니다. 환자의 우울증은 호전되었으므로 성기능 부작용이 적은 다른 항우울제로 변경하는 것을 고려할 수 있습니다. Bupropion은 성기능 부작용 발생률이 매우 낮은 항우울제로 알려져 있어, SSRI로 인한 성기능 장애가 발생했을 때 변경을 고려하는 약물입니다. Sildenafil은 발기부전 치료제이며 사정 지연에 직접적인 도움이 되지 않습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["20학번"], "professor": "김태원", "question": "플루옥세틴(fluoxetine)이 직접 작용하는 곳은?", "images": [], "text_box": null, "options": ["Catechol-O-methyltransferase (COMT)", "Monoamine oxidase A (MAOA)", "Presynaptic serotonin receptor", "Postsynaptic serotonin receptor", "Serotonin transporter"], "answer": [4], "explanation": "Fluoxetine은 SSRIs(Selective Serotonin Reuptake Inhibitors) 계열의 약물입니다. 이 약물은 세로토닌 재흡수 펌프(Serotonin transporter)에 직접 작용하여 세로토닌의 재흡수를 억제합니다. 결과적으로 시냅스 내 세로토닌 농도를 증가시켜 우울 증상을 개선하는 원리입니다. 따라서, Fluoxetine이 직접 작용하는 곳은 Serotonin transporter입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["20학번"], "professor": "김태원", "question": "60세 여자가 우울증으로 진단받은 후 프루옥세틴(fluoxetine) 40mg을 처방받았다. 복용 1주일 후 불안, 발한, 설사, 근경련, 운동실조, 반사 항진을 보였다. 진단 및 치료로 옳은 것은?", "images": [], "text_box": null, "options": ["세로토닌 증후군 - cyproheptadine", "급성 근긴장 이상증 – L-tryptophan", "지연성 운동 장애 - cyproheptadine", "지연성 운동 장애 - L-tryptophan", "세로토닌 증후군 - benzatropine"], "answer": [0], "explanation": "SSRI 복용 후 나타나는 세로토닌 증후군입니다. 세로토닌 증후군 의심시 antiserotonergic agent (=Cyproheptadine)를 처방해서 치료할 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["20학번"], "professor": "김태원", "question": "[총시] 24세 여자가 우울하고 무기력을 호소하며 병원에 왔다. 6개월 전 실직을 하였다고 하며 3개월전부터 우울, 무기력, 불면, 식욕저하 등이 점점 악화된다고 한다. 환자는 항우울제 치료를 받으며 우울, 무기력은 점차 호전되었다고 하나 불면은 지속된다고 하였다. 불면 증상 완화를 위해 추가할 수 있는 약제로 적절한 것은?", "images": [], "text_box": null, "options": ["Sertraline", "Fluoxetine", "Bupropion", "Mirtazapine", "Venlafaxine"], "answer": [3], "explanation": "수면 장애 시 사용할 수 있는 약제는 sedation effect를 가진 mirtazapine입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["19학번"], "professor": "김태원", "question": "중년의 남성 환자가 항우울제를 처방받았다. 하지만 사정 지연으로 인한 성기능장애를 호소했고, 이에 따라 항우울제를 교체하기로 하였다. 이러한 부작용은 어떤 수용체의 문제로 인한 부작용이며, 어떤 약물로 교체해야 하는가?", "images": [], "text_box": null, "options": ["5-HT1 - fluoxetine", "5-HT1 - fluvoxamine", "5-HT2 – bupropion", "5-HT2 - Duloxetine", "5-HT3 - Mirtazapine"], "answer": [2], "explanation": "가장 먼저, 성기능장애는 5-HT3 관련입니다. Fluoxetine, Fluvoxamine은 SSRI로 성기능장애를 유발하고, Duloxetine은 SNRI로 마찬가지로 성기능장애를 유발합니다. 따라서 성기능장애를 유발하지 않는 약제는 Bupropion, Mirtazapine 두 가지입니다. 따라서 답은 수용체, 약제 모두 맞는 3번입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["19학번"], "professor": "김태원", "question": "항우울제에 대한 설명으로 맞는 것은?", "images": [], "text_box": null, "options": ["진정 작용이 없다.", "통증 관련 기능이 없다.", "인지 개선 기능이 있다.", "시냅스의 단가 아민 농도가 낮다.", "항우울제 치료 후 수용체의 밀도가 높다."], "answer": [2], "explanation": "2교시에 해당하는 내용은 아니긴 한데, 항우울제 관련 내용이라 넣어봤습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["18학번"], "professor": "김태원", "question": "29세 여성이 양극성 장애에 대한 유지치료를 받고 있다. 임신 계획을 세우고 담당의사와 상담을 하러 왔다. 담당의사는 신경 발달 중 신경관 결손이 일어날 수 있다고 하였다. 이 약물은 무엇인가?", "images": [], "text_box": null, "options": ["lithium", "valproate", "bupropion", "mirtazapine", "aripiprazole"], "answer": [1], "explanation": "양극성 장애에 대한 유지치료이니, 기분조절제일 것입니다. 기분조절제 중 Neural tube defect 일으키는 약물은 Valproate입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["18학번"], "professor": "김태원", "question": "48세 남자가 우울한 기분으로 병원에 왔다. 불면, 불안, 소화장애 등을 겪고 있는 이 환자에게 처방하기 가장 좋은 약은?", "images": [], "text_box": null, "options": ["fluoxetine", "bupropion", "mirtazapine", "triazolam", "escitalopram"], "answer": [2], "explanation": "애플 p4 표 내용입니다. 불면을 겪고 있기에 Mirtazapine, Trazodone 중에 하나일 것입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["18학번"], "professor": "김태원", "question": "36세 여자가 어지러움, 두통, 불면, 메스꺼움으로 병원에 왔다. 3개월 전부터 우울, 불안, 잦은 짜증, 의욕 저하로 다른 병원에서 약물 치료를 받아왔으며, 가족들이 정신건강의학과 약물 복용을 만류하여 1개월 전 약물 복용을 중단하였을 때 현재와 유사한 증상이 나타나 약물을 다시 복용하였더니 호전되었고, 3일 전부터 다시 약물 복용을 중단한 상태라고 한다. 치료는?", "images": [], "text_box": null, "options": ["Aripiprazole", "Clonazepam", "Fluoxetine", "Lithium", "Venlafaxine"], "answer": [2], "explanation": "어지러움, 두통, 불면, 메스꺼움 등과 우울, 불안 등의 증상이 있는데, 약물 복용 중단 시에도 나타나는 것으로 보아 SSRI Withdrawal Syndrome을 의심해볼 수 있고 다시 SSRI를 복용하면 호전되는 경향이 있습니다. 따라서 치료는 SSRI의 재복용이고 이에 해당하는 약제로는 Fluoxetine이 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["18학번"], "professor": "김태원", "question": "35세 여자 환자가 2개월 전부터 나타난 우울한 기분과 의욕, 흥미, 에너지 저하를 호소하며 병원에 왔다. 식욕이 없어 2개월동안 5kg이 빠졌으며, 수면제를 복용해야 잠을 잘 수 있었다. 어머니도 10년 전에 우울장애로 진단받고 치료 중이다. 에스시탈로프람(escitalopram)과 벤라팍신(venlafaxine)을 처방받고 3개월동안 복용하였으나 호전이 없어, 파로섹틴(paroxetine)과 플루오세틴(fluoxetine)으로 약을 교체하고 증상이 호전되었다. 앞으로 약을 얼마나 더 복용해야 하는가?", "images": [], "text_box": null, "options": ["1~2개월", "4~5개월", "6~7개월", "8~9개월", "12개월 이상"], "answer": [4], "explanation": "수업시간엔 single episode인 경우 6~12개월이라고 배우긴 했는데, 아마 1년 정도 복용 후 괜찮으면 중단한다고 말씀하신 점에서 12개월은 복용하고 지켜보는 것 같습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["18학번"], "professor": "김태원", "question": "??세 남자가 3개월간 계속되는 우울한 기분, 집중력 저하, 의욕 저하, 흥미 저하, 죄책감으로 왔다. 매일 장거리 운전을 하고 있었으며 과거 유사한 증상으로 약물 처방을 받았을 때 아침 운전 중 과도한 졸림과 성기능 장애 때문에 치료를 중단하였던 경험이 있었다. 적절한 치료 약물은?", "images": [], "text_box": null, "options": ["escitalopram", "sertraline", "mirtazapine", "trazodone", "bupropion"], "answer": [4], "explanation": "성기능 장애 시 사용할 수 있는 약제 중 골라야 합니다. Mirtazapine과 DNRI에 속하는 Bupropion이 해당합니다. 앞 시간 내용이긴 하지만 이 중 집중력 저하와 피곤 호소 시 사용할 수 있는 Bupropion이 정답입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["18학번"], "professor": "우영섭", "question": "??세??가 1년 전 밤새워 공부를 하고 사업 계획을 세워도 피곤하지 않았다고 하며, 사소한 일에도 쉽게 싸우고 흥분하여 치료를 시작하였다. 약물 치료를 유지하던 중 우울감과 절망감에 처방받은 약을 다량 복용한 이후 의식이 흐려지고 구토를 하여 응급실에 왔고 혈압저하, ???를 보였다. 담당의는 치료를 위해 혈액 투석을 권고하였다. 처방받은 약물은?", "images": [], "text_box": null, "options": ["Lithium", "valproate", "lamotrigine", "mirtazapine", "carbamazepine"], "answer": [0], "explanation": "양극성장애 시 기분조절제로 Lithium을 사용할 수 있으며, Lithium 과다복용 시 여러 부작용이 발생할 수 있으며 신부전이 동반되기에, 이 경우 혈액투석해야 합니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["17학번"], "professor": "김태원", "question": "57세 남자가 우울증 진단을 받고 5개월간 항우울제를 복용하면서 점차 우울감과 의욕을 회복하였다. 그런데 잠을 잘 때 얕은 잠만 잔다며 깊은 잠을 자고 싶다고 하였다. 추가할 약제는?", "images": [], "text_box": null, "options": ["서트랄린 sertraline", "트라조돈 trazodone", "플루옥세틴 fluoxetine", "부프로피온 bupropion", "메틸페니데이트 methylphenidate"], "answer": [1], "explanation": "불면에 효과적인 항우울제를 사용해야 합니다. Mirtazapine과 Trazodone이 해당하기에 답은 2번입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["17학번"], "professor": "김태원", "question": "46세 여자가 “우울하고 아무 재미가 없다. 모든 것이 귀찮고 무기력하다.” 며 왔다. 이러한 증상은 6개월 전부터 지속되었고, 6개월 간 식사량이 줄어 약 8kg의 체중 감소가 있었으며, 거의 매일 새벽 4시에 깨어 더 이상 잠들지 못한다고 하였다. 치료 약물은?", "images": [], "text_box": null, "options": ["Diazepam", "Mirtazapine", "Paliperidone", "Valproic acid", "Zolpidem"], "answer": [1], "explanation": "우울증 환자입니다. 불면과 식욕 저하가 동반되는 것으로 보입니다. 따라서 불면, 식욕 저하 환자에게 효과적인 Mirtazapine을 사용할 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["17학번"], "professor": "김태원", "question": "35세 남자가 기분이 들뜨고 자신감이 넘치며 사업을 위한 인맥을 만든다면서 수억 원을 대출받아 유흥비로 탕진하였다고 한다. 또한 잠을 자지 않아도 피곤하지 않고 활력이 넘친다고 하였다. 작년 1년동안 유사한 증상으로 6차례 정신건강의학과에서 입원치료를 받았다고 한다. 적절한 약물은?", "images": [], "text_box": null, "options": ["리튬(Lithium)", "모다피닐(modafinil)", "발프로산(valproate)", "부프로피온(bupropion)", "미르타자핀(mirtazapine)"], "answer": [2], "explanation": "기분조절제를 사용해야 하고 해당 환자는 Rapid Cycling을 보이는 환자입니다. 이번 시간에서 언급해주시진 않았지만, 작야에 따르면 Lithium은 Rapid Cycling 환자에서 효과가 없다고 하고 Lithium이 아닌 Anticonvulsant(이번 시간 Valproate, Carbamazepine, Lamotrigine)들이 Rapid Cycling에 효과가 있는 것으로 보입니다. 따라서 답은 Lithium이 아닌 valproate 입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["17학번"], "professor": "김태원", "question": "30세 여자가 3주 전부터 밤을 새워 공부를 하고 사업계획을 세워도 피곤하지 않았다고 하며, 사소한 일에도 쉽게 싸우고 흥분하여 병원에 왔다. 혈액검사 결과는 다음과 같았다. 치료제는?", "images": [], "text_box": "아스파르테이트아미노산전이효소(AST) 160IU/L 알라닌아미노전이효소 (ALT) 180IU/L", "options": ["리튬(Lithium)", "발프로산(Valproate)", "플루옥세틴(Fluoxetine)", "미르타자핀(Mirtazapine)", "카바마제핀(Carbamazepine)"], "answer": [0], "explanation": "AST, ALT 정상수치는 0~40입니다. 3배 이상으로 많이 뜨는 것을 볼 수 있죠? 간기능 이상 환자입니다. 따라서 Hepatotoxicity를 가진 Valproate는 사용할 수 없고 언급해주시지는 않았지만, Carbamazepine도 Idiosyncratic adverse effect 중 Hepatic failure를 가집니다. 따라서 기분조절제인 Lithium을 사용할 수 있습니다. Fluoxetine, Mirtazapine은 항우울제입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["16학번"], "professor": "배치운", "question": "22세 여자 환자가 2주 이상 지속된 우울감, 불안, 초조, 나른함, 피곤 등의 증상을 주로 호소하며 내원하였다. 직장에서 회계 업무를 담당하고 있었으며 간헐적으로 야근을 하기 도 하여 피로가 누적됨을 호소하였다. 임상적 진단으로 우울증으로 판단하여 항우울제를 투여하기로 하였다. 환자는 항우울제 투여에 따른 체중 변화에 매우 민감하게 염려를 하였으며 단 기간 항우울제 치료를 원하였다. 병력 상 가족력은 없었으며 다른 약물 처방 받고 있지도 않았다. 상기 환자에게 가장 적절한 항우울제로 생각되는 것을 고르시오.", "images": [], "text_box": null, "options": ["부프로피온 (Bupropion)", "미르타자핀 (Mirtazapine)", "아미트리프틸린 (Amitriptylline)", "파록세틴 (Paroxetine)", "벤라팍신 (Venlafaxine)"], "answer": [0], "explanation": "체중 변화에 민감하게 염려했으므로 체중 증가에 효과가 좋은 약제인 SSRI, SNRI, DNRI 중 하나일 것입니다. 피곤, 피로를 호소했으므로 이에 효과가 좋은 DNRI, Bupropion을 사용할 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["16학번"], "professor": "배치운", "question": "74세 여자가 1개월 전부터 우울증 치료로 단일 항우울제를 복용하고 있다고 하였으나 약물명을 알지 못하고 내원하였다. 약물 복용 후부터 체중이 증가하고 다음날 아침에도 정신이 몽롱하고 졸리움이 지속된다고 하였다. 추측되는 항우울제는?", "images": [], "text_box": null, "options": ["서트랄린 (Sertraline)", "부프로피온 (Bupropion)", "플루오세틴 (Fluoxetine)", "미르타자핀 (Mirtazapine)", "벤라팍신 (Venlafaxine)"], "answer": [3], "explanation": "약제 복용 시의 부작용입니다. 환자는 약물 복용 후 과수면, 체중 증가를 호소하고 있습니다. 애플의 표를 참고했을 때, 해당하는 약제는 Mirtazapine임을 쉽게 알 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["16학번"], "professor": "배치운", "question": "이 약물의 가장 흔한 부작용은 위장관 장애와 진전이며, 장기 투여시 신장독성이 발생 가능하며 주로 비가역성으로 발현된다. 또한 갑상선기능 장애를 초래하기도 하며 혈액학적 부작용 상 백혈구 감소를 흔히 보인다. 또한 약물 혈액 농도에 따라서 신경학적 특성도 발생 가능하므로 혈액 채취를 통한 정기적인 약물 농도의 모니터링이 필요하다. 상기 설명에 부합되는 약물을 고르시오.", "images": [], "text_box": null, "options": ["서트랄린 (Sertraline)", "리튬 (Lithium)", "카바마제핀 (Carbamazepine)", "발프로에이트 (Valproate)", "벤라팍신 (Venlafaxine)"], "answer": [1], "explanation": "장기간 사용 시 신장기능 저하, 갑상선 기능 저하가 가능한 약물은 Lithium이라고 배웠습니다. 추가적으로 Therapeutic range가 매우 좁아 지속적인 monitoring이 필요하다고 했습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["16학번"], "professor": "배치운", "question": "37세 여자 환자는 항우울제인 paroxetine과 sertraline을 함께 장기간 복용하고 기면, 불안, 혼돈, 발한, 진전, 체온 상승, 경련을 일으켰다. 진단은?", "images": [], "text_box": null, "options": ["세로토닌 증후군", "정좌불능증", "급성 호흡부전증", "급성 근긴장 이상증", "지연성 운동 장애"], "answer": [0], "explanation": "Paroxetine과 Sertraline은 SSRI에 포함됩니다. 세로토닌에 관련된 항우울제 사용 시 드물게 Serotonin Syndrome이 나타날 수 있고 이는 혼돈, 진전, 열 등을 증상으로 가집니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["15학번"], "professor": "김태원", "question": "37세 여자가 어지러움, 두통, 구역, 불안, 불면을 호소했다. 5개월 전부터 Venlafaxine 150mg을 투여받다가 호전되어 2일 전부터 임의로 약물을 중단했다. 환자는 어떤 상황인가?", "images": [], "text_box": null, "options": ["조증 전환", "항콜린", "우울증상 재발", "세로토닌 증후군", "항우울제 중단현상"], "answer": [4], "explanation": "애플 p.5 Venlafaxine을 2일 전 임의로 갑자기 중단했습니다. 서서히 Tapering 해야하는데 갑자기 중단했으므로 항우울제 중단현상에 해당한다고 할 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["15학번"], "professor": "김태원", "question": "60세 여자가 우울증으로 진단 받은 후 프루옥세틴(fluoxetine) 40mg을 처방 받았다. 복용 1주일 후 불안, 오한, 설사, 근경련, 운동실조, 반사 항진을 보였다. 진단 및 치료로 옳은 것은?", "images": [], "text_box": null, "options": ["세로토닌 증후군 - cyproheptadine", "급성 근긴장 이상증 - L-tryptophan", "지연성 운동 장애- cyproheptadine", "지연성 운동 장애 - L-tryptophan", "세로토닌 증후군 - benzatropine"], "answer": [0], "explanation": "Fluoxetine은 SSRI에 해당합니다. 세로토닌 관련 항우울제 사용 시 불안, 오한 등을 증상으로 가지는 세로토닌 증후군이 발생할 수 있으며, 이 때 Antiserotonergic agent인 Cyproheptadine을 사용합니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["14학번"], "professor": "박원명", "question": "25세의 여자가 30일 전부터 말이 많고 자신감이 넘치며 돈을 낭비하는 증상으로 한다. 혈액 검사 상 결과는 다음과 같다. 적합한 약물은?", "images": [], "text_box": "백혈구 2,500/ml 아스파르테이트아미노산전이효소(AST) 90IU/L 알라닌아미노전이효소 (ALT) 120IU/L", "options": ["lithium", "alprazolam", "carbamazepine", "paroxitine", "valproate"], "answer": [0], "explanation": "앞과 동일한 문제입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["14학번"], "professor": "배치운", "question": "SSRI에 대한 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["음식물 섭취는 SSRI흡수를 방해한다.", "성기능장애가 발생하면 일반적으로 약물을 치환하여야 한다.", "serotonin syndrome은 흔하게 발생하는 가벼운 부작용이다.", "가장 흔한 부작용은 초기에 나타나는 오심이며 즉각 치환하여야한다.", "성욕의 감퇴와 사정의 연기(남성), 오르가즘의 어려움(여성)등의 성기능 장애는 드물다."], "answer": [1], "explanation": "1, 2, 4번은 따로 배운 내용은 아닙니다. 3. Serotonin syndrome은 드물게 발생하는 부작용입니다. 5. 성기능 장애는 가장 흔한 부작용입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["14학번"], "professor": "배치운", "question": "다음의 설명으로 적절한 약물은? “주요우울장애의 치료 약물로 공인되었고 금연치료의 보조제로 사용되기도 한다. 다른 항우울제와 달리 성기능 부작용이 거의 없으며 고용량 투여시 경련 유발의 위험이 있다.”", "images": [], "text_box": null, "options": ["Paroxetine", "Fluoxetine", "Venlafaxine", "Bupropion", "Mirtazapine"], "answer": [3], "explanation": "1교시 내용이긴 하지만, 가져와봤습니다. Bupropion은 경련을 유발할 가능성이 있으며, 성기능 부작용이 없다는 특징을 가집니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["13학번"], "professor": "김태원, 왕성민", "question": "29세 여자가 10일 전부터 말이 많고 과소비를 하는 경향이 있어 찾아왔다. 현재 임신 10주이며 혈액검사 결과는 다음과 같다. 적합한 치료 방법은? (박원명 교수님의 양극성장애 수업 내용입니다.)", "images": [], "text_box": "백혈구 2,500/ml 아스파르테이트아미노산전이효소(AST) 90IU/L 알라닌아미노전이효소 (ALT) 120IU/L", "options": ["Lithium", "Alprazolam", "Valproic acid", "Carbamazepine", "Electroconvulsive therapy(ECT)"], "answer": [4], "explanation": "앞과 동일하지만, 차이가 있습니다. 임신 10주인 임산부라는 점입니다. 첫 삼분기에 해당하기에, Lithium은 금기입니다. 따라서 ECT를 사용한다고 하네요.(이번 수업에는 따로 언급 없었습니다.)"}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["13학번"], "professor": "김태원, 왕성민", "question": "당뇨, 고혈압, 심근경색으로 치료받고 있는 50대 남자가 fluoxetine을 복용하고 우울증은 호전되었으나 사정이 지연되는 성기능장애가 발생하였다. 적절한 조치는?", "images": [], "text_box": null, "options": ["sildenafil 추가", "fluoxetine 증량", "bupropion 으로 변경", "mirtazapine 으로 변경", "amisulpride 로 변경"], "answer": [2], "explanation": "부작용으로 성기능장애가 없는 항우울제를 사용해야 합니다. Bupropion, Mirtazapine이 해당합니다. 당뇨가 있는 환자이므로, Mirtazapine은 과식/체중 증가 부작용으로 악화시킬 수 있어 Bupropion이 적절합니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["13학번"], "professor": "김태원, 왕성민", "question": "60세 여자가 우울증으로 진단 받은 후 프루옥세틴(fluoxetine) 40mg을 처방 받았다. 복용 1주일 후 불안, 발한, 설사, 근경련, 운동실조, 반사 항진을 보였다. 진단 및 치료는?", "images": [], "text_box": null, "options": ["급성 근긴장 이상증 - L-tryptophan", "세로토닌 증후군 - cyproheptadine", "세로토닌 증후군 - L-tryptophan", "지연성 운동 장애- cyproheptadine", "지연성 운동 장애 - L-tryptophan"], "answer": [1], "explanation": "앞과 동일한 문제입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["13학번"], "professor": "김태원, 왕성민", "question": "20세의 양극성 장애를 가진 환자가 소양증을 동반한 발진을 호소했다. 기분조절제를 6개월 전부터 복용하였다. 의심되는 약제와 해야할 대처는?", "images": [], "text_box": null, "options": ["lamogine - 경과관찰", "lamogine - 감량", "lamogine - 중단", "valproate - 중단", "valproate - 감량"], "answer": [2], "explanation": "발진을 부작용으로 가지는 기분조절제로 Carbamazepine과 Lamotrigine을 배웠습니다. Lamotrigine 사용 시 발진이 발생하면, Stevens-Johnson syndrome 등의 심각한 피부질환의 전조증상일 수 있으므로 약을 중단합니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["13학번"], "professor": "왕성민", "question": "양극성장애로 약물을 복용하던 남자가 호중구감소증이 생겨 정신건강의학과 외래로 방문하였다. 담당의는 복용 중이던 약물을 즉시 중단하고, 혈액 내과에 협진을 의뢰하였다. 이 남자가 복용 중이던 약물은?", "images": [], "text_box": null, "options": ["lithium", "gabapentine", "aririprazole", "topiramate", "carbamazepine"], "answer": [4], "explanation": "앞과 동일한 문제입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["13학번"], "professor": "왕성민", "question": "기분 조절제를 복용중이던 남자가 기분 증상의 재발이 걱정되어서 왔다. 조증 삽화가 있었고, 이후 4회의 주요우울 삽화가 있었다. 1년 전 신부전 진단을 받은 후 증상이 더욱 악화되어 (1년에 우울, 조증 합쳐서 4번 이상의 삽화가 있었다는 내용) 적합한 약물은?", "images": [], "text_box": null, "options": ["리튬", "로라제팜", "플루옥세틴", "라모트리진(lamotrigine)", "아캄프로세이트"], "answer": [3], "explanation": "신부전 진단을 받았다는 점에서, 신부전을 부작용으로 가지는 Lithium은 배제할 수 있습니다. 1년에 우울, 조증 삽화가 4번 이상 일어나는 Rapid Cycling 환자에게는 Lamotrigine을 사용할 수 있습니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["13학번"], "professor": "왕성민", "question": "양극성 장애로 약물치료를 하던 환자가 호중구 감소증이 생겨 정신건강의학과 외래에 방문하였다. 담당의는 환자가 복용중이던 기분조절제를 즉시 중단 후 혈액내과의 의사에게 협진을 의뢰하였다.

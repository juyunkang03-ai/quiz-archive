 시험을 준비했지만 집중을 잘 못하였다고 하였다. 환자는 불안하다고 말했지만, 표정은 딱딱하고 변화가 없었다. 허공을 보고 중얼거렸으며, 의사가 자신에게 독을 먹이려고 한다고 주장하였다. 의사가 먹이려는 것을 독사뽕이라고 했다. 다음 중 와해증상은? (19)", "images": [], "text_box": null, "options": ["집중을 잘 하지 못했다.", "표정은 딱딱하고 변화가 없었다.", "허공을 보고 중얼거렸다.", "의사가 독을 먹이려고 한다고 했다.", "의사가 처방한 약물을 독사뽕이라고 했다."], "answer": [4], "explanation": "와해 증상은 조현병의 양성 증상 중 하나로, 사고와 언어의 비정상적인 패턴을 포함합니다. 이는 지리멸렬한 언어, 연상의 이완, 부적절한 대답, 그리고 신어조작증 등으로 나타날 수 있습니다. 신어조작증(neologism)은 환자만이 이해하는 새로운 단어를 만들어 사용하는 것을 의미합니다. 의사가 처방한 약물을 '독사뽕'이라고 부르는 것은 신어조작증의 전형적인 예시이며, 이는 와해된 언어의 한 형태인 와해 증상에 해당합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["19학번"], "professor": "허휴정", "question": "정신건강의학과에서 수년간 약물치료를 받고 있는 34세 여자 환자가 수개월 전부터 무월경증이 발생하였다. 호르몬 검사 결과 prolactin이 증가되어 있었다. 관련이 높은 약물은? (19 짤변)", "images": [], "text_box": null, "options": ["Alprazolam", "Donepezil", "Escitalopram", "Milnacipran", "Risperidone"], "answer": [4], "explanation": "고프로락틴혈증은 특정 항정신병 약물의 주요 부작용 중 하나입니다. 리스페리돈, 아미설프라이드, 팔리페리돈, 할로페리돌 등이 도파민 D2 수용체 차단 효과로 인해 프로락틴 수치를 증가시킬 수 있습니다. 환자의 무월경증은 이러한 약물로 인한 고프로락틴혈증과 관련이 높습니다. 따라서 제시된 약물 중 리스페리돈이 무월경증과 가장 관련이 깊습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["19학번"], "professor": "허휴정", "question": "??세 여자가 망상, 환청을 동반한 조현병으로 7년 전부터 정신건강의학과에 내원하였다. 망상, 환청은 호전되었으나 체중이 20kg 증가하였다. 환자는 약을 먹으면 식욕이 증가해 체중이 증가한다며 약을 끊고 싶어하였다. 적합한 처방은?", "images": [], "text_box": null, "options": ["Aripiprazole", "Clozapine", "Olanzapine", "Chlorpromazine", "Quetiapine"], "answer": [0], "explanation": "환자는 기존 항정신병 약물 복용 후 체중 증가 부작용으로 약물 복용을 거부하고 있습니다. 올란자핀, 클로자핀, 퀘티아핀 등은 체중 증가 부작용이 비교적 흔한 약물입니다. 반면, 아리피프라졸은 체중 증가 및 대사성 부작용 위험이 낮은 비정형 항정신병 약물로 알려져 있습니다. 따라서 체중 증가 부작용을 줄이면서 조현병 증상을 관리하기 위해 아리피프라졸로 변경하는 것이 적절한 처방입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["19학번"], "professor": "허휴정", "question": "34세 여자가 무월경증으로 병원에 왔다. 그녀는 수년간 정신건강의학과에서 약물 치료를 받고 있었다. 호르몬 검사 결과 prolactin이 증가되어 있었다. 관련이 높은 약물은?", "images": [], "text_box": null, "options": ["가바펜틴(gabapentin)", "리바스티그민(rivastigmine)", "서트랄린(sertraline)", "아미설프라이드(amisulpride)", "알프라졸람(alprazolam)"], "answer": [3], "explanation": "환자는 약물 복용 중 무월경증과 고프로락틴혈증을 보이고 있습니다. 이는 항정신병 약물의 부작용일 가능성이 높습니다. 아미설프라이드는 도파민 D2 수용체 차단 효과가 강력하여 프로락틴 분비를 촉진하고, 이로 인해 유즙 분비, 무월경 등의 부작용을 유발할 수 있습니다. 따라서 아미설프라이드는 환자의 현재 증상과 밀접하게 관련된 약물로 판단됩니다. 이러한 약물들을 정확히 아는 것이 중요합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["19학번"], "professor": "허휴정", "question": "23 세 여자가 일주일 전부터 갑자기 누군가가 자신을 스토킹 하는 것 같다며, 종일 불안해했다. 그녀는 비만에 대한 기사를 보면서, 기자가 자신을 염두에 두고 비아냥거리는 글을 쓴 것이라고 했다. 또한, 그 기사에 달린 악성 댓글이 수많은 사람들이 자신을 비난하는 글이라며 괴로워했다. 3일 전부터는 누군가가 자신을 욕하는 소리가 끊임없이 들린다고 괴로워하며, 보호자와 함께 병원에 왔다. 그녀는 한달 전부터 다이어트를 위해 가정의학과에서 식욕억제제를 복용하고 있었으며, 정신건강의학과 진료 후 식욕억제제를 중단하고, 항정신병 약물을 복용하면서, 일주일만에 대부분의 증상이 호전되었다. 이 여자에게 적합한 진단은?", "images": [], "text_box": null, "options": ["조현병", "망상장애", "조현정동장애", "기타 정신병적 장애", "단기정신병장애"], "answer": [3], "explanation": "이 환자는 식욕억제제 복용 중 망상, 환청 등 정신병적 증상을 경험했으며, 약물 중단 후 증상이 빠르게 호전되었습니다. 물질/약물 유발 정신병적 장애는 특정 물질의 직접적인 생리적 효과로 인해 정신병적 증상이 나타나는 경우를 말합니다. 식욕억제제는 정신병적 증상을 유발할 수 있는 약물에 해당합니다. 따라서 이 경우는 물질/약물 유발 정신병적 장애로 분류되는 '기타 정신병적 장애'에 해당합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["18학번"], "professor": "김정진", "question": "40세 남자가 4개월 전부터 1) 의욕이 없다면서 다니던 직장을 그만두었다. 2) 무표정한 얼굴로 허공을 쳐다보고 있을 때가 많았다. 한 달 전부터는 3) 고양이가 자신을 조종한다면서 4) 고양이 분장을 하고 고양이처럼 행동하였다. 5) 가끔 책을 읽지만 제대로 집중하지 못하였다. 남자를 조현양상 장애로 진단하기 위해 반드시 있어야 하는 증상은? ★", "images": [], "text_box": null, "options": ["의욕이 없다", "무표정", "고양이가 자신을 조종한다", "고양이처럼 분장을 하고 고양이처럼 행동", "제대로 집중하지 못하였다"], "answer": [2], "explanation": "조현양상장애는 조현병과 유사한 증상을 보이나 증상 지속 기간이 1개월 이상 6개월 미만인 경우에 진단됩니다. 진단을 위해서는 망상, 환각, 와해된 언어, 심하게 와해된 행동, 음성 증상 중 두 가지 이상이 최소 1개월 동안 나타나야 하며, 이 중 적어도 하나는 망상, 환각, 와해된 언어여야 합니다. '고양이가 자신을 조종한다'는 망상에 해당하며, 이는 조현양상장애 진단에 필수적인 증상 중 하나입니다. 나머지 보기들은 음성 증상, 와해된 행동 또는 인지 증상에 해당합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["18학번"], "professor": "김정진", "question": "비정형 항정신병약물의 주요 기전은 이 물질의 수용체를 억제하여 도파민 분비를 촉진하고 음성 증상을 개선하는 것이다. 해당 물질은? ★", "images": [], "text_box": null, "options": ["도파민", "세로토닌", "히스타민", "아드레날린", "아세틸콜린"], "answer": [1], "explanation": "비정형 항정신병 약물은 주로 도파민 D2 수용체와 함께 세로토닌 5-HT2A 수용체를 차단하는 기전을 가집니다. 세로토닌 5-HT2A 수용체 차단은 전두피질에서 도파민 분비를 간접적으로 촉진하여 음성 증상 개선에 기여합니다. 정형 항정신병 약물은 주로 도파민 D2 수용체 차단에 초점을 맞춰 양성 증상 완화에 더 효과적입니다. 따라서 음성 증상 개선 및 도파민 분비 촉진과 관련된 물질은 세로토닌입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["18학번"], "professor": "김정진", "question": "50세 여자가 사실과 다르게 남편이 같은 회사 여자 직원과 사귀고 있다고 했다. 몰래 남편의 휴대전화기를 보고 차에 도청장치를 설치했다. 수차례 남편의 직장에 가서 여자 직원에게 따진 적이 있었다. 밤마다 남편에게 결백을 입증할 증거를 내놓으라고 잠을 못 자게 했다. 집안일은 하고 있고, 정신 질환 병력은 없다. 면담할 때는 무덤덤하고 조리 있게 말했으나 여자 직원 얘기를 꺼내면 격양되었다. 진단은?", "images": [], "text_box": null, "options": ["조현병", "강박장애", "망상장애", "단기정신증", "조현양상장애"], "answer": [2], "explanation": "이 환자는 남편의 외도를 확신하는 고착된 망상을 가지고 있으며, 이는 다른 정신병적 증상 없이 1개월 이상 지속되었습니다. 환자의 망상은 비괴이하며, 망상과 관련된 행동(감시, 따짐) 외에는 사회적 기능(집안일)이 비교적 잘 유지되고 있습니다. 이러한 특징은 망상장애, 특히 질투형 망상장애의 전형적인 임상 양상입니다. 조현병과 달리 전반적인 기능 저하나 와해 증상은 나타나지 않습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["17학번"], "professor": "김정진", "question": "환자가 윗집에서 의자 끄는 소리가 자신에게 경고하는 소리라고 하였다. 이를 뭐라 하는가?★", "images": [], "text_box": null, "options": ["가청 사고", "환청", "사고 주입", "사고 전파", "망상적 지각 delusional perception"], "answer": [4], "explanation": "망상적 지각(delusional perception)은 정상적인 지각 경험에 대해 망상적인 의미를 부여하는 것을 의미합니다. 이 환자는 '윗집에서 의자 끄는 소리'라는 실제 존재하는 감각을 '자신에게 경고하는 소리'라는 비정상적인 망상적 의미로 해석하고 있습니다. 이는 망상적 지각의 전형적인 예시입니다. 일반적인 망상과는 달리, 실제 감각을 왜곡하여 해석한다는 점에서 특징적입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["17학번"], "professor": "김정진", "question": "40세 남자가 조현병 진단을 받고 2년 동안 치료받았다. 팔리페리돈, 아리피프라졸, 올란자핀 등의 약물을 충분한 용량으로 꾸준히 복용하였지만, 증상은 지속되었다. “앞으로 병이 안 나을 것 같다. 죽고싶다.”는 말을 반복하였다. 적절한 치료약물은? ★", "images": [], "text_box": null, "options": ["퀘티아핀", "클로자핀", "할로페리돌", "리스페리돈", "지프라지돈"], "answer": [1], "explanation": "환자는 여러 항정신병 약물을 충분한 용량으로 복용했음에도 증상이 지속되는 치료불응성 조현병 환자로 판단됩니다. 이러한 치료불응성 조현병의 경우 클로자핀이 가장 효과적인 약물로 알려져 있습니다. 클로자핀은 다른 약물에 반응하지 않는 환자들에게 유의미한 증상 개선을 가져올 수 있으므로 우선적으로 고려해야 합니다. 다만, 클로자핀은 무과립구증과 같은 심각한 부작용의 위험이 있어 정기적인 혈액 검사가 필수적입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["17학번"], "professor": "김정진", "question": "21세 남자가 자신감이 없고 대인관계가 불편하다며 병원에 왔다. 강의실에 들어가기만 해도 친구들이 자신의 이야기를 하며 수군거리기 때문이라고 했다. 친구들이 자꾸만 웃는 것도 자신을 비웃는 것이라고 하였다. 이로 인해 결석을 자주 하게 되었다. 밑줄 친 증상의 정신 병리는?★", "images": [], "text_box": null, "options": ["과대망상", "관계망상", "사고전파", "피해망상", "조종망상"], "answer": [1], "explanation": "관계망상(delusion of reference)은 자신과 무관한 외부 사건이나 타인의 행동이 자신과 특별한 의미로 관련되어 있다고 잘못 믿는 망상입니다. 환자는 강의실에서 친구들이 자신에 대해 수군거리거나 웃는 것을 자신과 관련된 비웃음으로 해석하고 있습니다. 이는 주변의 객관적인 상황을 자신과 연관시켜 해석하는 관계망상의 전형적인 예시입니다. 이로 인해 환자는 사회적 기능에 어려움을 겪게 됩니다."}, {"subject": "사고장애 (조현병 등)", "year": ["17학번"], "professor": "김정진", "question": "20세 미혼 여성이 1년 전부터 집에서 허공을 뚫어지게 응시하거나 무슨 소리가 들린다며 혼잣말을 중얼거리고 자신이 CCTV에 의해 감시당하고 있다는 사실과 다른 말을 하여 내원하였다. DSM-5 진단에 해당되는 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["편집형으로 명시한다.", "현재 부분 관해 상태이다.", "장애의 지속적 징후가 최소 6개월 이상 지속되어야 진단을 내릴 수 있다.", "증상이 남용하고 있는 물질의 생리적 효과에 의해 발생한 경우에도 조현병으로 진단할 수 있다.", "장애의 발병 이래 상당 부분의 시간 동안 일, 대인관계 혹은 자기관리 같은 주요 영역의 한가지 이상에서 기능 수준이 발병 전 성취된 수준 이하로 저하되지 않는다."], "answer": [2], "explanation": "DSM-5 기준에 따르면 조현병을 진단하기 위해서는 증상이 최소 6개월 이상 지속되어야 합니다. 환자는 망상과 환청 등의 정신병적 증상을 1년 전부터 보이고 있으므로 이 기준에 부합합니다. 편집형과 같은 조현병 아형은 DSM-5에서 더 이상 명시되지 않습니다. 남용 물질에 의한 증상은 조현병으로 진단하지 않고 물질 유발 정신병적 장애로 분류됩니다. 조현병은 기능 저하가 동반되는 경우가 많습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["17학번"], "professor": "김정진", "question": "16 세 여자가 “독가스 냄새가 난다\"면서 1개월 간 경찰서에 상습적으로 신고하여 아버지가 정신건강의학과에 데리고 왔다. 정신상태검사에서 특별한 이상은 없었다. 어머니와 단둘이 살고 있었으며 어머니는 “이웃이 환풍기를 통해 우리 집에 독가스 냄새를 넣고 있다”는 망상으로 조현병 진단을 받고 약물 복용 중이다. 이 때 딸에게 적절한 조치는?★", "images": [], "text_box": null, "options": ["어머니로부터 격리", "어머니와 함께 약물 투여", "어머니와 함께 입원", "어머니와 아버지의 부부치료", "어머니와 함께 인지행동치료"], "answer": [0], "explanation": "딸은 어머니의 망상적 사고에 영향을 받아 유사한 증상을 보이는 것으로 추정됩니다. 이는 공유 정신병적 장애(shared psychotic disorder, folie à deux)의 가능성을 시사합니다. 공유 정신병적 장애의 치료에 있어서 가장 중요한 접근은 일차 환자(여기서는 어머니)와 이차 환자(딸)를 분리하는 것입니다. 격리 후 딸에게는 독립적인 평가와 필요한 경우 약물 치료를 시행할 수 있습니다. 이는 딸의 정신 건강 회복에 필수적인 조치입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["17학번"], "professor": "김정진", "question": "30세 남자가 조현병이 재발해 내원하였다. 그의 부모는 어릴적부터 사사건건 그에게 간섭했고, 그의 증상이 악화될 때마다 화를 내고 울었다. 이와 관련된 가족이론은?", "images": [], "text_box": null, "options": ["이중결속 Double bind", "결혼왜곡 Marital skew", "결혼분파 Marital schism", "거짓상호가족 Pseudomutual family", "높은 감정표출 Highly expressed emotion"], "answer": [4], "explanation": "높은 감정표출(Highly Expressed Emotion, HEE)은 가족 구성원이 환자에게 비판적이고 적대적이며 과도하게 감정적으로 관여하는 정도를 나타내는 개념입니다. 부모가 환자에게 지속적으로 간섭하고 증상 악화 시 화를 내는 행동은 HEE의 전형적인 예시에 해당합니다. HEE는 조현병 환자의 재발 위험을 높이는 중요한 요인으로 알려져 있습니다. 따라서 가족 상담을 통해 HEE를 줄이는 노력이 환자의 예후에 중요합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["17학번"], "professor": "김정진", "question": "임신 6주인 28세 여자가 2달 전부터 누군가가 자신을 해칠 것이라며 불안, 초조해하는 모습을 보이고, 집 밖으로 도망치는 모습을 보여 남편과 함께 병원에 왔다. 전기경련치료를 계획할 때 좋은 효과를 기대할 수 있는 요인은?", "images": [], "text_box": null, "options": ["연령", "성별", "임신여부", "피해 망상", "불안 및 초조"], "answer": [3], "explanation": "전기경련치료(ECT)는 조현병 환자 중 특정 임상 양상을 보이는 경우 효과적입니다. 특히 양성 증상이 뚜렷하게 나타나거나, 긴장증이 동반된 경우, 또는 심한 기분 증상이 동반된 조현병 환자에게 좋은 결과를 보입니다. 피해 망상은 조현병의 대표적인 양성 증상에 해당하므로, ECT 치료 효과를 기대할 수 있는 요인으로 볼 수 있습니다. 환자의 심한 불안 및 초조 증상도 치료 결정에 영향을 줄 수 있습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["16학번"], "professor": "전태연", "question": "35세 남자가 면담 중 직업에 대하여 묻자 \"우리 목사님은 좋은 분이에요. 그분은 과거에 선생님이었어요. 나는 목사님의 오른팔이에요. 세상에는 오른손잡이가 더 많아요.\"라고 말하였다. 정신병리는?", "images": [], "text_box": null, "options": ["우원증 (circumstantiality)", "사고의 이탈 (tangentiality)", "사고의 비약 (flight of idea)", "사고의 단절 (thought blocking)", "연상의 이완 (loosening of association)"], "answer": [1], "explanation": "사고의 이탈(tangentiality)은 사고 연상의 장애로 인해 대화의 주제에서 벗어나 원래 목표로 돌아오지 못하는 상태를 의미합니다. 환자는 연관 없는 생각으로 계속 가지를 치며 대화가 표류하게 됩니다. 제시된 사례에서 남성은 직업 질문에 대해 여러 연상으로 연결되며 원래 질문에서 멀어지고 있습니다. 내용은 이해 가능하나 주제에 도달하지 못하는 것이 특징입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["16학번"], "professor": "전태연", "question": "40세 조현병 환자가 가족과 함께 병원을 방문하였다. 20세 경에 갑자기 증상이 시작되었다고 보고하였다. 발병 전 명문대에 입학할 정도로 학업능력이 우수하였으며 가족 간의 사이도 화목하였다 한다. 그러나 조현병으로 치료받기 시작하면서 간헐적으로 우울감을 경험하며 힘들었다고 하였다. 나쁜 예후 요인은? ★★", "images": [], "text_box": null, "options": ["20세 발병", "가족과의 관계 (작성자: 좋은 가족과의 관계로 풀어주세요)", "병전 기능", "급성 발병", "우울 증상 (작성자: 일시적인 우울증상 동반으로 풀어주세요)"], "answer": [0], "explanation": "조현병의 예후 인자는 다양하며, 발병 연령은 중요한 요소 중 하나입니다. 일반적으로 젊은 나이, 즉 20대 이전에 발병하는 경우 예후가 좋지 않은 경향이 있습니다. 반면, 30대 이후에 발병하는 늦은 발병은 비교적 좋은 예후와 관련될 수 있습니다. 또한, 발병 전 사회적 기능이 좋거나 급성 발병하는 것이 예후에 긍정적인 영향을 미칠 수 있습니다. 일시적인 우울 증상 동반도 좋은 예후 인자로 알려져 있습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["16학번"], "professor": "전태연", "question": "10년 전부터 조현병 치료를 받는 여자 환자가 있다. 외출하지 않고 집에서만 지내며, 집에서도 표정의 변화가 없고 바닥만 보고 있다. 다른 사람의 눈을 마주치지 못하고, 말을 잘하지 못한다. 별다른 우울증 증상은 없을 때, 이 환자 구조와 물질의 이상으로 적절한 것은? ★", "images": [], "text_box": null, "options": ["Mesolimbic pathway, 도파민 분비 감소", "Mesocortical pathway, 도파민 분비 감소", "Mesolimbic pathway, 도파민 분비 증가", "Mesocortical pathway, 도파민 분비 증가", "Nigrostriatal pathway, 도파민 분비 감소"], "answer": [1], "explanation": "환자는 외출하지 않고 집에서만 지내거나 표정의 변화가 없는 등의 음성 증상을 보이고 있습니다. 조현병의 음성 증상은 주로 전두엽의 기능 저하와 관련이 있으며, 이는 뇌의 Mesocortical pathway에서 도파민 분비가 감소하는 것과 연관됩니다. Mesolimbic pathway의 도파민 과잉은 양성 증상과 관련이 있고, Nigrostriatal pathway는 추체외로 증상과 관련이 있습니다. 따라서 음성 증상과 관련된 구조적 이상은 Mesocortical pathway의 도파민 분비 감소입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["16학번"], "professor": "전태연", "question": "28세 여자가 경찰과 함께 내원하였다. 3개월 전 남자친구가 갑자기 이별을 통보하자 극심한 스트레스를 받고 '남자친구가 나를 살해하려고 사람들을 동원하였다'는 등 횡설수설하면서 남자친구와 대화를 하듯 중얼거렸다. 또한 회사도 그만두고 남자친구의 집에 찾아가는 일이 반복되었다. 수 주 간의 입원치료 후 증상이 개선되었다. 진단은? ★", "images": [], "text_box": null, "options": ["조현병 (schizophrenia)", "망상 장애 (delusional disorder)", "우울증 (major depressive disorder)", "조현정동장애 (schizoaffective disorder)", "조현양상장애 (schizophreniform disorder)"], "answer": [4], "explanation": "이 환자는 망상, 횡설수설, 환각 유사 증상 등 조현병과 유사한 정신병적 증상을 보이고 있습니다. 증상이 시작된 지 3개월 정도 되었으며, 수 주간의 입원 치료 후 증상이 개선되었다는 점이 중요합니다. 조현양상장애는 조현병과 동일한 증상이 나타나지만, 증상 지속 기간이 1개월 이상 6개월 미만인 경우에 진단됩니다. 6개월 이상 지속되면 조현병으로 진단이 변경됩니다."}, {"subject": "사고장애 (조현병 등)", "year": ["16학번"], "professor": "전태연", "question": "55세 남자가 부부상담을 위해 방문하였다. 부인의 외도를 의심하여 부인의 핸드폰에 위치 추적 앱을 깔고 부인을 미행하였다. 25세 전후 갑자기 시작되었다고 한다. 결국 부인을 감시하느라 업무를 하지 못하면서 직장에서 해고되었다. 양호한 예후인자는?★", "images": [], "text_box": null, "options": ["남자", "35세 발병", "갑자기 발병", "20년의 유병 기간", "직업적 기능"], "answer": [2], "explanation": "망상장애의 예후를 예측하는 여러 요인이 있습니다. 일반적으로 갑작스러운 발병은 점진적인 발병보다 예후가 더 좋은 경향을 보입니다. 또한, 발병 전 사회적 기능이 높거나 유발 인자가 명확한 경우에도 비교적 양호한 예후를 기대할 수 있습니다. 성별로는 여성 환자가 남성 환자보다 예후가 더 좋은 경우가 많다고 알려져 있으며, 30세 이전에 발병하고 유병 기간이 짧은 것이 양호한 예후와 연관됩니다."}, {"subject": "사고장애 (조현병 등)", "year": ["16학번"], "professor": "전태연", "question": "33세 여자가 “이웃 사람들이 나를 몰래 감시한다.”, “나를 욕하는 소리가 들린다.”는 호소와 함께 심한 우울 증상들을 주소로 병원에 내원하였다. 우울 증상은 2년 전부터 지속된 것으로 잠을 잘 못 자고 무기력하게 지내며 체중이 많이 빠졌다고 한다. 기분 증상과 망상의 악화로 수차례 입원한 병력이 있으며 기분 증상이 잠시 호전되었을 때도 망상과 환청은 지속되었다고 한다. 증상이 충분히 회복된 시기는 발병 후 거의 없었다고 할 때 진단은? ★", "images": [], "text_box": null, "options": ["우울증 (major depressive disorder)", "조현병 (schizophrenia)", "조현정동장애 (schizoaffective disorder)", "조현양상장애 (schizophreniform disorder)", "망상장애 (delusional disorder)"], "answer": [2], "explanation": "이 환자는 '이웃이 자신을 감시하고 욕한다'는 망상과 환청(조현병 증상)을 경험하고 있습니다. 동시에 2년 전부터 우울 증상(기분 증상)도 지속되고 있습니다. 특히, 기분 증상이 호전되었을 때도 망상과 환청이 지속되었다는 점이 조현정동장애의 진단에 핵심적인 단서입니다. 조현정동장애는 조현병 증상과 주요 기분 삽화가 동시에 나타나며, 조현병 증상이 기분 삽화 없이 최소 2주간 지속된 기간이 있어야 합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["15학번"], "professor": "전태연", "question": "조현병으로 20대 초반부터 장기간 치료를 유지해오던 61세 남자 환자가 입술과 안면의 불수의적인 움직임이 관찰되었다. 이러한 현상은 몇 년 전부터 시작되어 점진적으로 악화되었다고 하나 수면 시에는 증상이 없다고 한다. 이와 같은 항정신병약제의 부작용은? ★", "images": [], "text_box": null, "options": ["긴장증 (Catatonia)", "파킨슨증 (Parkinsonism)", "정좌불능증 (Akathisia)", "지연성운동장애 (Tardive dyskinesia)", "급성근긴장이상증 (Acute dystonia)"], "answer": [3], "explanation": "지연성 운동장애(Tardive dyskinesia, TD)는 주로 장기간 항정신병 약물, 특히 전형적 항정신병 약물을 복용한 환자에게서 나타나는 심각한 부작용입니다. 입술과 안면, 혀 등의 불수의적인 반복 운동이 특징적으로 나타나며, 수면 중에는 증상이 사라지는 경향이 있습니다. 이러한 증상은 몇 년 전부터 시작되어 점진적으로 악화되었다는 환자의 보고와 일치합니다. TD는 약물 감량이나 다른 약제로의 변경을 통해 관리해야 합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["15학번"], "professor": "전태연", "question": "조현병을 앓고있는 48세 여자 환자가 보호자에 의해 정신건강의학과 외래에 내원하였다. 환자는 질문을 해야 수동적으로 단답형의 대답을 하였고 무표정하였다. 또한 환자는 집에서도 특별한 활동 없이 방에서만 시간을 보내는 경우가 대부분이라고 한다. 이 환자가 나타내는 조현병의 임상 양상을 가장 잘 설명하는 것은? ★", "images": [], "text_box": null, "options": ["망상", "음성증상", "허무망상", "와해된 행동", "인지기능 장애"], "answer": [1], "explanation": "제시된 환자는 수동적인 단답형 대답, 무표정, 그리고 활동 없이 방에서만 지내는 모습을 보이고 있습니다. 이러한 증상들은 조현병의 음성증상에 해당합니다. 음성증상은 정상적인 기능의 감소나 부재를 의미하며, 정서적 둔마, 무의욕증, 언어 빈곤, 사회적 위축 등을 포함합니다. 이는 뇌의 전두엽 기능 저하와 관련이 있을 수 있으며, 환자의 전반적인 기능 저하에 크게 기여합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["15학번"], "professor": "전태연", "question": "23세 (1)미혼 남자 환자가 망상과 환청과 같은 정신병적 증상을 주소로 내원하였다. 환자는 (2)3년 전부터는 점차 외출이 줄어 현재는 집에서만 지낸다고 한다. (3)가족력 상 환자의 형도 같은 병으로 치료 중인 상태이다. 환자는 (4)의식이 혼미하였으나, (5)우울감이나 불안증과 같은 기분 증상은 뚜렷하지 않았다. 이 환자에서 좋은 예후를 시사하는 소견은?", "images": [], "text_box": null, "options": ["미혼", "현재는 집에서만 지냄", "가족력", "의식 수준의 변화", "기분 증상을 동반하지 않음"], "answer": [3], "explanation": "조현병 환자의 예후에 영향을 미치는 다양한 요인이 있습니다. 의식 수준의 변화, 특히 급성기 정신병 상태에서 나타나는 의식의 혼탁이나 섬망은 조현병의 비교적 좋은 예후 인자로 간주될 수 있습니다. 반면, 미혼 상태, 사회적 위축(집에서만 지냄), 강한 가족력 등은 일반적으로 조현병의 좋지 않은 예후와 연관됩니다. 우울감이나 불안증과 같은 기분 증상이 동반되지 않은 것이 좋지 않은 예후로 해석될 수도 있습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["15학번"], "professor": "전태연", "question": "35세 남자가 국정원에서 자신을 미행하며 해치려 한다고 응급실을 내원하였다. 자신의 행동에 대하여 언급하는 소리가 들리고, 욕을 하는 소리도 들린다고 한다. 증상은 2개월 전부터 시작되었으며, 1주일 전에는 다니던 회사를 그만두었다. 진단은? ★", "images": [], "text_box": null, "options": ["조현병 (schizophrenia)", "망상장애 (delusional disorder)", "조현양상장애 (schizophreniform disorder)", "조현정동장애 (shizoaffective disorder)", "단기정신병적장애 (brief psychotic disorder)"], "answer": [2], "explanation": "이 환자는 피해 망상과 환청 등의 정신병적 증상을 보이고 있으며, 이로 인해 직장을 그만두는 기능적 손상도 동반되었습니다. 증상이 2개월 전부터 시작되었다는 점이 핵심입니다. 조현병 진단 기준은 6개월 이상 증상 지속을 요구하며, 망상장애는 망상 외 다른 정신병적 증상이 뚜렷하지 않습니다. 1개월 이상 6개월 미만으로 조현병과 유사한 증상이 지속될 때 조현양상장애로 진단합니다. 단기정신병적 장애는 증상 지속 기간이 1개월 미만입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["15학번"], "professor": "전태연", "question": "38세 여자 환자가 남편과 함께 정신건강의학과 외래를 찾았다. 환자는 약 2개월 전부터 남편이 외도를 하였다고 주장하면서 더 이상 견디기 어렵다고 하였다. 그리고 환자는 남편의 외도에 대한 증거들을 많이 나열하였다. 그러나 남편으로 인한 힘든 상황에도 아이들의 학업에 관한 문제는 비교적 잘 처리를 하고 있었다. 남편과의 면담 후, 환자가 제시한 근거들을 여러 정황을 고려할 때 사실이 아닐 가능성이 높다. 진단은? ★", "images": [], "text_box": null, "options": ["조현병 (schizophrenia)", "망상장애 (delusional disorder)", "조현양상장애 (schizophreniform disorder)", "조현경동장애 (shizoaffective disorder)", "단기전신병적장애 (brief psychotic disorder)"], "answer": [1], "explanation": "환자는 남편의 외도를 확신하는 망상을 가지고 있으며, 이는 2개월 전부터 시작되어 지속되고 있습니다. 중요한 점은 망상 외에 다른 뚜렷한 정신병적 증상(환청, 와해 등)이 없으며, 망상과 관련 없는 일상생활(아이들 학업 문제 처리)은 비교적 잘 유지되고 있다는 것입니다. 망상장애는 비괴이한 망상이 1개월 이상 지속되고, 망상 외의 영역에서 기능 손상이 심하지 않다는 특징을 가집니다. 따라서 이 사례는 질투형 망상장애에 해당합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["14학번", "11학번"], "professor": "전태연", "question": "조현병 환자의 좋은 예후를 나타내는 인자는? (11학번", "images": [], "text_box": null, "options": ["잠행성", "장기간", "명료한 의식", "기분 증상 동반", "연성 신경 징후"], "answer": [3], "explanation": "조현병의 예후 인자는 다양하게 고려될 수 있습니다. 일반적으로 급성 발병, 발병 전 사회적 및 직업적 기능이 좋았던 경우, 그리고 기분 증상이 동반되는 경우가 좋은 예후와 관련이 있습니다. 특히 기분 증상이 일시적으로 동반되는 것은 긍정적인 예후 인자로 간주될 수 있습니다. 반면, 잠행성 발병, 긴 전구기, 그리고 연성 신경학적 징후 등은 좋지 않은 예후와 연관됩니다."}, {"subject": "사고장애 (조현병 등)", "year": ["14학번"], "professor": "전태연", "question": "장기간 정신병 증상과 우울, 불안 등 기분증상을 나타내는 만성 조현병 환자에게 약물을 투여한 결과 기분 증상도 호전되어 의욕이 증가하고 주변 환경에 대한 흥미와 관심이 호전되었다. 관여된 수용체는?", "images": [], "text_box": null, "options": ["도파민 D1", "히스타민 H1", "무스카린 M1", "세로토닌 5HT2A", "노르아드레날린 a1"], "answer": [3], "explanation": "조현병의 병태생리에는 도파민 시스템 외에도 세로토닌 시스템이 중요한 역할을 합니다. 특히 세로토닌 5HT2A 수용체 차단은 비정형 항정신병 약물의 주요 기전 중 하나입니다. 이 수용체 차단은 도파민 분비 조절을 통해 양성 증상뿐만 아니라 음성 증상과 기분 증상 개선에도 기여합니다. 환자의 우울, 불안, 의욕 저하 등이 호전된 것은 세로토닌 5HT2A 수용체에 작용한 약물의 효과와 관련이 깊습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["14학번"], "professor": "전태연", "question": "25세 여자가 8개월 전부터 심해진 피해망상과 환청 때문에 통원치료를 받고 있는 중이다. 약물치료 후 체중이 9kg 정도 증가했고 생리불순, 유즙분비 때문에 약을 먹기 싫다고 하였다. 적절한 치료약물은? ★★", "images": [], "text_box": null, "options": ["Clozapine", "Aripiprazole", "Risperidone", "Haloperidol", "Olanzapine"], "answer": [1], "explanation": "환자는 기존 약물 복용 후 체중 증가와 유즙 분비 등의 부작용을 겪고 있어, 이를 유발하지 않는 약물로 변경해야 합니다. 아리피프라졸은 도파민 부분 효현제로서, 다른 항정신병 약물에 비해 체중 증가 및 고프로락틴혈증 유발 가능성이 낮은 것으로 알려져 있습니다. 따라서 부작용이 적은 아리피프라졸이 환자에게 적절한 치료 약물이 될 수 있습니다. 이는 환자의 약물 순응도를 높이는 데 기여할 것입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["14학번", "12학번"], "professor": "전태연", "question": "DSM-5의 정신분열형 진단 기준은 망상, 환각, 와해된 언어, 심하게 와해된 행동, 음성증상 가운데 두 가지 이상이 적어도 1개월 중 상당한 기간 동안 나타나야 한다. 이 중 한 가지는 적어도 망상, 환각, 와해된 언어 중 하나여야 한다. 밑줄 친 진단기준에 해당하는 것은? (12학번)", "images": [], "text_box": null, "options": ["감정표현의 감소", "고양된 기분", "지리멸렬", "매너리즘", "납굴증"], "answer": [2], "explanation": "정신분열형(현 조현병)의 진단 기준은 망상, 환각, 와해된 언어, 심하게 와해된 행동, 음성 증상 중 두 가지 이상이 최소 1개월 동안 나타나야 합니다. 이 중 적어도 한 가지는 망상, 환각, 와해된 언어여야 합니다. 지리멸렬은 와해된 언어의 한 형태로, 논리적 연결 없이 생각의 흐름이 불규칙하고 비조직화되어 이해하기 어려운 말을 하는 것입니다. 따라서 제시된 기준 중 와해된 언어에 해당하는 것은 지리멸렬입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["14학번", "11학번"], "professor": "전태연", "question": "25세 미혼 남자가 3년 전부터 “회사 동료들이 작당하여 나를 감시한다. 그들이 나에 대해 이야기하는 소리가 집에서도 들려 잠을 못 잘 정도이다.”고 호소하면서 정신건강의학과를 찾았다. 평소 내향적이며, 의심이 많은 편이었고, 직장에서도 사소한 일로 동료들과 자주 다투어 대인관계에 어려움을 겪어왔다. 동료들이 자신을 괴롭힌다는 내용의 체계적인 망상을 가지고 있었고, 정동은 둔화되지는 않았다. 진단은? (11학번)★", "images": [], "text_box": null, "options": ["조현병", "양극성장애, 조증", "정신분열형장애", "분열정동장애", "망상장애"], "answer": [0], "explanation": "이 환자는 '회사 동료들이 감시한다'는 피해 망상을 3년 전부터 지속적으로 가지고 있습니다. 또한, '그들이 나에 대해 이야기하는 소리가 집에서도 들린다'는 환청 증상도 동반된 것으로 보입니다. 망상과 환청은 조현병의 핵심 증상이며, 3년이라는 장기간의 증상 지속과 직장 생활의 어려움, 대인관계 문제 등 기능적 손상이 동반된 점이 조현병 진단에 부합합니다. 정동 둔화가 없다는 점만으로는 조현병을 배제할 수 없습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["14학번"], "professor": "전태연", "question": "40 세 남자가 몸에 벌레가 기어다녀 가려운 느낌을 참을수 없어 내원하였다. 직장 생활이나 대인관계에는 큰 어려움이 없었으나 가족들에게 계속 벌레가 기어다녀 견딜 수 없다고 했다. 유형이 무엇인가?★", "images": [], "text_box": null, "options": ["질투형", "신체형", "색정형", "피해형", "과대형"], "answer": [1], "explanation": "이 환자는 '몸에 벌레가 기어다녀 가려운 느낌'이라는 신체 감각에 대한 고착된 망상을 가지고 있습니다. 망상장애의 아형 중 신체형 망상은 신체 기능이나 감각에 비정상적인 믿음을 가지는 경우에 해당합니다. 환자는 이 망상 때문에 고통을 받지만, 직장 생활이나 대인관계 등 다른 영역에서는 비교적 기능이 유지될 수 있습니다. 이는 망상장애의 특징적인 양상입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["13학번"], "professor": "전태연", "question": "조현병 치료에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["자살 위험이 높은 환자는 입원 치료를 우선적으로 고려해야 한다.", "Atypical antipsychotics의 종류에 따라 양성 증상에 대한 효과는 큰 차이가 난다.", "급성기 증상이 항정신병약물로 호전되면 6개월 정도 유지치료 기간을 가진 후 사용 중인 약물을 중단해 볼 수 있다.", "흥분하고 폭력적인 환자의 빠른 증상 회복을 위해서는 항정신병약물을 im 주사하는 것보다 경구 투여하는 것이 낫다.", "급성기 환자에서 항정신병약물의 적절한 용량을 1-2주 정도 투여했음에도 불구하고 임상적 호전이 없다면 빠른 약물의 변경이 필요하다."], "answer": [0], "explanation": "조현병 치료는 환자의 안전을 최우선으로 고려해야 합니다. 특히 자살 위험이 높은 환자의 경우, 안전한 환경에서 집중적인 관리가 필요하므로 입원 치료를 우선적으로 고려하는 것이 중요합니다. 항정신병 약물 치료는 급성기 증상 완화에 효과적이지만, 증상 호전 후에도 재발 방지를 위해 상당 기간 유지 치료를 지속해야 합니다. 약물 중단은 신중하게 결정되어야 하며, 일반적으로 6개월보다 훨씬 긴 기간의 유지 치료가 권장됩니다."}, {"subject": "사고장애 (조현병 등)", "year": ["13학번"], "professor": "전태연", "question": "조현병에 대한 설명으로 옳은 것은?★", "images": [], "text_box": null, "options": ["남성이 유병률이 2배 높다", "조기 발병 시 예후가 더 좋다", "사망률은 일반 인구에 비해 높지 않다", "자살 위험은 30세 이하의 젊은 연령에서 더 높다", "발병 위험성이 가장 높은 연령층은 만 40세 이후이다"], "answer": [3], "explanation": "조현병의 평생 유병률은 전 세계적으로 대략 1% 정도로 남녀 간 큰 차이가 없습니다. 조기 발병(특히 10대 후반~20대 초반)은 일반적으로 좋지 않은 예후와 관련됩니다. 조현병 환자의 사망률은 일반 인구에 비해 높으며, 특히 자살 위험이 높습니다. 자살 위험은 특히 30세 이하의 젊은 연령대 환자에서 더 높게 나타나는 경향이 있습니다. 발병 위험성이 가장 높은 연령층은 남성 10대 후반~20대 중반, 여성 20대 중반~30대 중반입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["13학번"], "professor": "전태연", "question": "조현병으로 진단받은 25세 여자가 허공을 응시하면서 대화하는 것처럼 중얼거렸다. 의심되는 정신병리는?★", "images": [], "text_box": null, "options": ["환청", "보속증", "강박사고", "정서의 둔마", "사고의 두절"], "answer": [0], "explanation": "환청은 외부 자극 없이 소리가 들리는 지각 장애를 의미하며, 조현병의 가장 흔한 양성 증상 중 하나입니다. 환자가 허공을 응시하며 대화하는 것처럼 중얼거리는 행동은 환청을 경험하고 있음을 시사하는 전형적인 임상 양상입니다. 환청은 주로 목소리 형태로 나타나며, 환자를 비난하거나 지시하는 내용을 포함할 수 있습니다. 이는 환자의 사고와 행동에 큰 영향을 미칠 수 있습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["12학번"], "professor": "전태연", "question": "35세 남자가 국정원에서 자신을 추적하고 해치려 한다면서 응급실에 왔다. 자신의 행동에 대하여 언급하는 소리가 들리고 욕을 하는 소리도 들린다고 한다. 증상은 2개월 전부터 시작되었으며, 1주일 전에 다니던 회사를 그만두었다. 진단은? (짤)", "images": [], "text_box": null, "options": ["조현병(schizophrenia)", "망상 장애(delusional disorder)", "조현양상장애(schizophreniform disorder)", "조현정동장애(shizoaffective disorder)", "단기정신병적장애 (brief psychotic disorder)"], "answer": [2], "explanation": "환자는 국정원에 의한 미행 및 피해 망상, 그리고 환청 등 정신병적 증상을 호소하고 있습니다. 이러한 증상들은 조현병의 양성 증상과 유사합니다. 그러나 증상 지속 기간이 2개월로 명시되어 조현병 진단 기준인 6개월에는 미치지 못합니다. 1개월 이상 6개월 미만으로 조현병과 유사한 증상이 지속될 때 조현양상장애로 진단합니다. 기능 저하 또한 동반된 상태입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["12학번"], "professor": "전태연", "question": "20세 미혼 여성이 8개월 전부터 허공을 응시하며 혼잣말을 하여 가족에 의하여 정신건강의학과 외래에 내원하였다. 의사와의 면담 시 자신을 감시하기 위하여 도청장치가 설치되어 있고, 신문과 라디오를 통하여 자신의 생각이 보도된다고 하면서 킥킥 웃기도 하였다. 이 환자에서 우선적으로 사용 가능한 치료약은?", "images": [], "text_box": null, "options": ["lithum", "lorazepam", "paroxetine", "risperidone", "vaproate"], "answer": [3], "explanation": "환자는 망상과 환청, 그리고 와해된 사고 및 부적절한 정동(킥킥 웃음) 등 조현병의 양성 증상을 보이고 있습니다. 이러한 정신병적 증상에는 항정신병 약물이 1차 치료제로 사용됩니다. 리스페리돈은 비정형 항정신병 약물 중 하나로, 도파민 D2 수용체와 세로토닌 5-HT2A 수용체를 차단하여 양성 및 음성 증상에 효과적입니다. 다른 보기의 약물들은 주로 기분 안정제, 항불안제, 항우울제이므로 적절하지 않습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["12학번"], "professor": "전태연", "question": "30세 미혼 여성이 6개월 전부터 잠을 자지 않고 1)횡설수설하여 내원하였다. 정신과 진료 시 그녀는 2)자신을 감시하기 위하여 집에 도청장치가 설치되어 있고, 3)방송을 통해 자신의 생각이 보도된다고 하였다. 또한 4)이웃 주민들이 자신을 흉보는 소리가 들린다고 하였다. 그녀는 5)취미활동이나 가족과 친구를 만나는 일에 더 이상 즐거움을 느끼지 못한다고 하였다. 다음 조현병(정신분열병) 증상 중 그 성격이 다른 하나는?", "images": [], "text_box": null, "options": ["횡설수설", "자신을 감시하기 위하여 집에 도청장치가 설치되어 있고", "방송을 통해 자신의 생각이 보도된다고 하였다", "이웃 주민들이 자신을 흉보는 소리가 들린다고 하였다", "취미활동이나 가족과 친구를 만나는 일에 더 이상 즐거움을 느끼지 못한다고 하였다."], "answer": [4], "explanation": "조현병의 증상은 크게 양성 증상과 음성 증상으로 나뉩니다. 양성 증상은 정상적인 기능에 '더해지는' 것으로, 망상, 환각, 와해된 사고(횡설수설), 와해된 행동 등이 포함됩니다. 반면, 음성 증상은 정상적인 기능이 '결핍된' 것으로, 정서 둔마, 무의욕증, 언어 빈곤, 무쾌감증 등이 있습니다. 보기 1, 2, 3, 4는 각각 와해된 언어, 망상, 망상, 환청으로 모두 양성 증상에 해당합니다. 보기 5는 무쾌감증으로 음성 증상에 해당하므로, 성격이 다른 하나입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["12학번"], "professor": "전태연", "question": "조현병에서 보이는 증상 중 음성증상은?", "images": [], "text_box": null, "options": ["환청", "피해망상", "무의욕증", "와해된 언어", "정동 불일치"], "answer": [2], "explanation": "조현병의 음성 증상은 정상적인 감정이나 행동의 감소 또는 부재를 의미합니다. 환청, 피해망상, 와해된 언어는 양성 증상에 해당합니다. 정동 불일치는 정동 장애의 한 형태로, 상황에 맞지 않는 감정 표현을 의미합니다. 무의욕증은 의욕이 저하되거나 목표 지향적 활동을 시작하고 유지하기 어려운 상태를 뜻하며, 이는 조현병의 대표적인 음성 증상 중 하나입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["10학번"], "professor": "전태연", "question": "27세의 남자가 가족들에 의하여 응급실에 방문하였다. 환자는 긴장된 얼굴 표정으로 불안한 모습을 보였으며 혼잣말을 하기도 하였다. 원래 사교적이지 않았던 환자는 약 2년전부터 더욱 사람을 만나는 것을 꺼려했으며 주로 집에서 지내기 시작하였다 한다. 식사도 가족들과 하지 않으려 하고 개인 위생도 제대로 챙기지 않았다 한다. 내원 약 3개월 전부터 환자는 주변 사람들이 자신을 비난하고 놀린다 하였으며 밖에 나가면 자신을 감시하며 해치려는 사람들이 있다는 이야기를 했다고 한다. 또한 아파트 윗집에 찾아가 왜 자신에 대하여 떠들고 다니냐며 항의를 한 적도 있다고 한다. 약 1주일 전부터 잠을 거의 못 잤으며 하루 종일 멍한 상태로 혼잣말을 중얼대곤 하였다 한다. 이 환자의 진단명은? ★", "images": [], "text_box": null, "options": ["망상장애", "정신분열병 (이름이 바뀌었죠? 조현병입니다.)", "분열정동장애", "정신병적장애", "단기정신병적장애"], "answer": [1], "explanation": "이 환자는 약 2년 전부터 사회적 위축, 개인 위생 불량 등 음성 증상을 보였습니다. 또한, 3개월 전부터 피해 망상과 관계 망상 등 양성 증상을 호소하며, 혼잣말이나 기능 저하가 동반되었습니다. 증상이 6개월 이상 지속되었고, 사회적 및 직업적 기능 손상이 동반되었으므로 조현병 진단 기준에 부합합니다. '정신분열병'은 현재 '조현병'으로 명칭이 변경되었으며, 이는 조현병의 전형적인 임상 사례입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["10학번"], "professor": "전태연", "question": "다음은 정신분열병의 DSM-4-TR 진단기준에 대한 설명이다. 틀린 것을 고르시오.", "images": [], "text_box": null, "options": ["망상, 환각, 와해된 언어, 그리고 음성 증상 모두가 나타나야 한다.", "망상이 괴이하거나, 두 사람 이상이 서로 대화를 나누는 환청이 있을 경우 그 밖의 다른 증상이 없어도 진단이 가능하다.", "최소한 1개월 이상 증상이 지속되어야 진단이 가능하다.", "환각제 등의 물질의 사용과 관련하여 망상과 환각이 발생했을 경우에도 진단이 가능하다.", "사회적 및 직업적 손상은 진단에 필수적인 고려사항은 아니다."], "answer": [1], "explanation": "DSM-4-TR 진단 기준에서 망상이 괴이하거나 특정 형태의 환청이 있을 경우 단 하나의 증상으로도 진단이 가능하다고 명시되어 있습니다. 따라서 2번 보기는 사실상 올바른 진단 기준에 해당합니다. 하지만 문제의 정답이 2번으로 제시된 점을 고려하면, 이 보기가 어떤 특정 맥락에서 '틀린 것'으로 간주될 가능성을 배제할 수 없습니다. 이는 '그 밖의 다른 증상이 없어도'라는 문구가 진단에 필요한 전반적인 기능 저하 기준을 간과할 수 있다는 오해를 유발할 수 있기 때문입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["10학번"], "professor": "전태연", "question": "조현병의 역학에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["평생 유병률은 대략 0.1% 정도이다.", "가장 흔한 병전 성격은 분열성 인격이다.", "일반적으로 남자가 여자보다 좋은 예후 경과를 보인다.", "발병 연령은 여자에서 남자보다 이른 것으로 알려져 있다.", "일란성 쌍둥이의 일치율은 대략 15% 정도이다."], "answer": [1], "explanation": "조현병의 평생 유병률은 전 세계적으로 대략 1% 정도로 알려져 있습니다. 가장 흔한 병전 성격 특성으로는 사회적으로 고립되고 정서적으로 둔마된 분열성 인격이 많이 보고됩니다. 일반적으로 여성 환자가 남성 환자보다 발병 연령이 약간 늦고 예후가 더 좋은 경향을 보입니다. 일란성 쌍둥이의 조현병 일치율은 유전적 요인의 중요성을 보여주며, 대략 50% 정도입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["10학번"], "professor": "전태연", "question": "다음 중 정신분열병의 불량한 예후를 시사하는 경우는?", "images": [], "text_box": null, "options": ["높은 교육 수준", "양성 증상", "명료한 의식 상태를 보인 경우", "급작스러운 발병", "기분증상이 많이 동반된 경우"], "answer": [2], "explanation": "조현병의 예후 인자는 다양하게 연구되어 왔습니다. 일반적으로 급성 발병, 높은 교육 수준, 발병 전 좋은 사회 기능, 그리고 기분 증상이 동반되는 경우는 좋은 예후와 연관됩니다. 하지만 명료한 의식 상태를 보이는 경우는 일부 연구나 특정 관점에서 불량한 예후 인자로 해석될 수 있습니다. 이는 환자의 병식 유무나 질병에 대한 통찰력과 관련하여 복합적으로 고려될 수 있습니다. 따라서 주어진 보기 중에서는 명료한 의식 상태가 불량한 예후를 시사하는 경우로 선택될 수 있습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["09학번"], "professor": "전태연", "question": "35세 가정주부가 교통사고로 갑자기 사망한 남편의 장례식장에서 매우 슬퍼하며 울다가 정신을 잃기도 하는 것을 반복하더니 갑자기 “저승사자가 보인다. 나를 지옥으로 끌어가려 한다”며 공포에 떨며 소리를 지르는 등의 증상을 주소로 보호자에 의하여 응급실을 방문하였다. 환자는 평소 명랑하고 활발한 성격이었으며 정신질환의 과거력은 없었다. 저승사자가 보이고 잡아가겠다고 하는 소리가 계속 들린다며 안절부절 못하였고 신체검사는 정상이었다. 약물치료 후 일주일 만에 모든 증상이 소실되었고, 평상시 상태로 회복되었다. 진단은?", "images": [], "text_box": null, "options": ["애도반응", "분열정동장에", "단기정신병", "조현병 (정신분열병)", "외상후스트레스장애"], "answer": [2], "explanation": "이 환자는 극심한 스트레스(남편 사망) 이후 갑작스럽게 망상과 환각 등의 정신병적 증상을 보였습니다. 하지만 이러한 증상들이 1일 이상 1개월 이내에 완전히 소실되고 발병 전 기능 수준으로 회복되었습니다. 정신질환의 과거력이 없었던 점과 급성 발병 및 빠른 회복은 단기 정신병적 장애의 전형적인 특징입니다. 이는 조현병이나 망상장애와 달리 증상 지속 기간이 짧다는 점에서 감별됩니다."}, {"subject": "사고장애 (조현병 등)", "year": ["09학번"], "professor": "전태연", "question": "35세 여자 환자가 \"아들이 다쳐서 입원했다.”고 말하면서 웃는 모습을 보였다. 이 환자의 정신증상은?", "images": [], "text_box": null, "options": ["무감동", "무쾌감증", "양가감정", "정서의 둔마", "부적합한 정동"], "answer": [4], "explanation": "부적합한 정동(inappropriate affect)은 표현되는 감정이 환자가 말하는 내용이나 상황과 일치하지 않는 경우를 의미합니다. 아들이 다쳐서 입원했다는 비극적인 상황에서 웃는 모습을 보이는 것은 이러한 부적합한 정동의 전형적인 예시입니다. 무감동과 정서의 둔마는 감정 표현의 감소를 뜻하며, 무쾌감증은 즐거움을 느끼지 못하는 상태를 말합니다. 양가감정은 두 가지 상반된 감정이 동시에 존재하는 것입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["09학번"], "professor": "전태연", "question": "정신분열증의 좋지 않은 예후와 관련된 소견으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["양성 증상", "기분 증상", "급성 발병", "연성 신경 징후", "양호한 병전 적응"], "answer": [3], "explanation": "조현병의 예후를 예측하는 여러 임상적 요인들이 있습니다. 일반적으로 양성 증상이 뚜렷하거나, 기분 증상이 동반되거나, 급성 발병하는 경우, 그리고 발병 전 사회적 적응이 좋았던 경우는 비교적 좋은 예후와 관련됩니다. 반면, 연성 신경학적 징후는 조현병의 인지 기능 저하와 관련되어 나타날 수 있으며, 이는 전반적으로 불량한 예후를 시사하는 인자로 간주됩니다. 따라서 연성 신경 징후는 좋지 않은 예후와 가장 적절하게 관련됩니다."}, {"subject": "사고장애 (조현병 등)", "year": ["08학번"], "professor": "전태연", "question": "다음은 정신분열병의 DSM-4-TR 진단기준에 대한 설명이다. 틀린 것을 고르시오.", "images": [], "text_box": null, "options": ["망상, 환각, 와해된 언어, 그리고 음성 증상 모두가 나타나야 한다.", "망상이 괴이하거나, 두 사람 이상이 서로 대화를 나누는 환청이 있을 경우 그 밖의 다른 증상이 없어도 진단이 가능하다.", "최소한 1개월 이상 증상이 지속되어야 진단이 가능하다.", "환각제 등의 물질의 사용과 관련하여 망상과 환각이 발생했을 경우에도 진단이 가능하다.", "사회적 및 직업적 손상은 진단에 필수적인 고려사항은 아니다."], "answer": [1], "explanation": "DSM-4-TR 진단 기준에서 망상이 괴이하거나 특정 형태의 환청(두 사람 이상이 대화하거나 행동에 대한 해설)이 있을 경우, 망상이나 환각 중 단 하나의 증상만으로도 진단이 가능합니다. 따라서 2번 보기는 DSM-4-TR 진단 기준을 올바르게 설명하고 있습니다. 하지만 문제의 정답이 2번으로 제시되었으므로, 이 보기가 어떤 특정 맥락에서 '틀린 것'으로 간주될 수 있다고 가정해야 합니다. 이는 '그 밖의 다른 증상이 없어도'라는 문구가 진단에 필요한 전반적인 기능 저하 기준을 간과할 수 있다는 오해를 유발할 수 있기 때문일 수 있습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["08학번"], "professor": "전태연", "question": "정신분열병 환자에 대한 약물치료 계획에 고려해야 할 사항이다. 옳은 것을 고르시오", "images": [], "text_box": null, "options": ["전형적 항정신병약물에서 가장 주의해야 할 부작용은 대사증후군이다.", "전형적 항정신병약물의 종류에는 risperidone, olanzapine 등이 있다.", "비전형적 항정신병약물이 전형적 항정신병약물보다 양성증상에 효과적이다.", "비전형적 항정신병약물이 전형적 항정신병약물보다 일차적으로 선택되고 있다.", "항정신병약물은 가급적 1~2개월에 거쳐 천천히 증량하는 것이 안전하다."], "answer": [3], "explanation": "비정형 항정신병 약물은 전형적 약물에 비해 추체외로 증상 등의 부작용이 적고 음성 증상 개선에도 효과적인 경우가 많아 최근 일차 치료제로 선호되고 있습니다. 대사 증후군은 주로 비정형 항정신병 약물(특히 올란자핀, 클로자핀)에서 주의해야 할 부작용입니다. 리스페리돈과 올란자핀은 비정형 항정신병 약물입니다. 비정형 약물이 전형적 약물보다 양성 증상에 *더* 효과적이라고 단정하기는 어렵습니다. 약물은 일반적으로 저용량에서 시작하여 서서히 증량하지만, 응급 상황에서는 빠르게 증량할 수 있습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["08학번"], "professor": "전태연", "question": "28세 남자가 “지나가는 사람들이 나에 대해서 이야기하는 것 같다”라고 호소한다. 의심되는 질환은? ★", "images": [], "text_box": null, "options": ["피해망상", "관계망상", "과대망상", "조종망상", "사고전파"], "answer": [1], "explanation": "관계망상(delusion of reference)은 자신과 무관한 외부 사건이나 타인의 행동이 자신과 특별한 의미로 관련되어 있다고 잘못 믿는 망상입니다. 환자는 '지나가는 사람들이 나에 대해서 이야기하는 것 같다'고 호소하는데, 이는 주변 사람들이 자신을 주제로 대화한다고 착각하는 관계망상의 전형적인 예시입니다. 이 증상은 조현병이나 망상장애 등 다양한 정신병적 상태에서 나타날 수 있으며, 환자의 사회적 기능과 대인관계에 상당한 어려움을 초래할 수 있습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["08학번"], "professor": "전태연", "question": "조현병 치료를 위해 약물을 복용하는 여자. 월경을 하지 않은지 2년정도 되었다. 검사해볼 것?", "images": [], "text_box": null, "options": ["유즙분비호르몬"], "answer": [0], "explanation": "항정신병 약물, 특히 일부 비정형 항정신병 약물은 고프로락틴혈증을 유발할 수 있습니다. 고프로락틴혈증은 유즙 분비, 무월경, 불임 등 내분비계 부작용을 초래합니다. 환자가 무월경 증상을 호소하고 있으므로, 약물 부작용으로 인한 고프로락틴혈증 가능성을 확인하기 위해 유즙분비호르몬(prolactin) 수치 검사가 필요합니다. 이는 약물 관련 부작용 관리의 중요한 단계입니다. 검사 결과를 바탕으로 약물 조정이 필요할 수 있습니다."}, {"subject": "사고장애 (조현병 등)", "year": ["08학번"], "professor": "전태연", "question": "21세 여자가 3개월 전부터 아파트 윗층에서 자신을 괴롭히기 위해 일부러 밤새 공사하는 소음을 낸다고 하였다. 수시로 윗층에 올라가 큰 소리로 싸우기도 하고 층간 소음을 이유로 관공서에 계속 민원을 넣었다. 가족들이 아니라고 설득해도 소용이 없었고 오히려 가족들도 자신을 괴롭히는 악마라고 소리 지르기도 하였다. 사람들을 만나지 않고 방안에서 밤새 기도하면서 울부짖기도 하고 혼잣말을 하는 모습을 보였다. 진단은?", "images": [], "text_box": null, "options": ["조현병", "적응장애", "단기정신증", "양극성장애", "조현양상장애"], "answer": [4], "explanation": "이 환자는 피해 망상, 관계 망상, 환청, 와해된 행동(혼잣말, 울부짖음) 등 조현병과 유사한 다양한 정신병적 증상을 보이고 있습니다. 그러나 이러한 증상들의 지속 기간이 3개월로 명시되어 있어, 조현병 진단 기준인 6개월에는 미치지 못합니다. 1개월 이상 6개월 미만으로 조현병과 유사한 증상이 나타날 때 조현양상장애로 진단합니다. 조현양상장애는 증상 지속 기간 외에는 조현병과 동일한 진단 기준을 가집니다."}, {"subject": "양극성 장애", "year": ["2022학번", "2020학번"], "professor": "우영섭", "question": "27세 남자가 정신운동 초조, 짜증을 동반한 우울한 기분으로 3개월째 치료 중이다. 2개 이상의 항우울제 치료에 반응이 좋지 못해서 항정신병약물 병합치료를 진행중이다. 수년 전 같은 증상이 있었으나 정신과 치료를 받지 않았다. 치료경과와 병력을 고려해 진행해야 할 검사로 알맞은 것은?", "images": [], "text_box": null, "options": ["Bipolar depression rating scale, BDRS", "Mood disorder questionnaire, MDQ", "Beck depression inventory BDI", "Hamilton Anxiety Rating Scale HAMA", "Hamilton Depression Rating Scale HAMD"], "answer": [1], "explanation": "환자는 항우울제에 잘 반응하지 않는 우울 삽화와 재발 이력을 가지고 있습니다. 이는 단극성 우울증이 아닌 양극성 스펙트럼 장애(BSD)의 가능성을 시사합니다. 따라서 양극성 장애를 감별하기 위해 기분 장애 질문지(Mood Disorder Questionnaire, MDQ)를 시행하는 것이 적절합니다. MDQ는 경조증 삽화의 유무를 선별하는 데 유용한 도구입니다."}, {"subject": "양극성 장애", "year": ["2022학번", "19학번"], "professor": "우영섭", "question": "17세 여자가 감정 조절이 어렵고 사소한 일에도 자주 화를 내어 병원에 왔다. 중학교 저학년 시절까지는 특별한 문제가 없었으나 2년 전부터 거의 매일 예민한 모습으로 교사, 부모, 친구들과 마찰이 잦았다고 한다. 7일전부터는 이전과는 달리 거의 잠을 자지 않고 밤새 온라인 채팅을 하였으며, 자신은 검정고시로 명문대에 가겠다며 등교를 거부하고, 부모의 강요로 등교해서는 수업시간에 교사에게 큰 소리로 수업과 관계없는 질문을 하거나 다른 학생에게 말을 걸고 노래를 흥얼거리는 등의 모습을 보였으며, 이를 지적하는 교사에게 폭언을 하였다. 진단은?", "images": [], "text_box": null, "options": ["간헐적 폭발장애 (intermittent explosive disorder)", "양극성 장애 (bipolar disorder)", "적대적 반항 장애 (oppositional defiant disorder)", "파괴적 기분조절부전장애 (destructive mood dysregulation disorder)", "품행장애 (conduct disorder)"], "answer": [1], "explanation": "환자는 감정 조절의 어려움, 충동성, 과대사고, 수면 감소, 과잉 행동 등 조증 삽화의 전형적인 증상을 보입니다. 특히 나이가 16세 이상으로 10세 이전에 발병하는 파괴적 기분조절부전장애(DMDD)와는 구별됩니다. 소아·청소년 양극성 장애는 기분 불안정성, 짜증 등 혼재성 증상이 흔하며, 현재 환자의 심각한 기능 저하는 조증 삽화 진단에 부합합니다. 따라서 가장 적절한 진단은 양극성 장애입니다."}, {"subject": "양극성 장애", "year": ["2022학번", "2017학번"], "professor": "우영섭", "question": "37세 여자 환자가 산후 우울증으로 치료중이다. 환자는 우울감 이외에도 불면, 정신운동 초조, 피해사고를 경험하였다. 환자의 어머니가 과거 주요우울장애로 치료를 받은 적이 있다고 한다. 양극성 장애로 진행을 예측하는 인자는?", "images": [], "text_box": null, "options": ["나이", "수면장애", "산후 발병", "정신운동초조", "우울증의 가족력"], "answer": [2], "explanation": "산후 발병은 양극성 우울증(Bipolar Depression)에서 흔하게 나타나는 특징적인 인자입니다. 젊은 나이에 발병, 비전형적 우울 증상 (예: 수면과다, 체중 증가), 정신운동 초조 또는 지체, 정신병적 증상 동반, 그리고 양극성 장애의 가족력 등도 양극성 장애로의 진행을 예측하는 중요한 인자들입니다. 따라서 산후 발병은 양극성 장애를 예측할 수 있는 인자에 해당합니다."}, {"subject": "양극성 장애", "year": ["2022학번", "19학번"], "professor": "우영섭", "question": "??세 여자가 양극성 장애 진단을 받고 리튬을 처방받아 복용하다가 양극성 장애는 나아졌지만 무기력, 피로, 체력감소, 체중저하 등을 호소했다. 신체적 질환과 감별하기 위해 다음 중 시행해야 할 검사는?", "images": [], "text_box": null, "options": ["인슐린", "멜라토닌", "성장호르몬", "갑상샘 호르몬", "부신겉질 호르몬"], "answer": [3], "explanation": "리튬(Lithium)은 양극성 장애 치료에 널리 사용되지만, 부작용으로 갑상선 기능 저하증을 유발할 수 있습니다. 환자가 무기력, 피로, 체력 감소, 체중 저하 등의 증상을 호소하는 것은 갑상선 기능 저하증의 증상과 유사합니다. 따라서 신체적 질환과의 감별을 위해 갑상샘 호르몬 검사를 시행하여 갑상선 기능 이상 여부를 확인해야 합니다. 이는 리튬 치료 중 중요한 모니터링 항목입니다."}, {"subject": "양극성 장애", "year": "2019학번", "professor": "박원명", "question": "16세 여자가 감정조절의 어려움과 자극 과민성을 보였다. 초등학생 때는 얌전하고 온순했지만, 중학교에 입학하고 난 뒤 증상이 나타나 거의 매일 지속되어 부모님과 선생님과의 마찰이 잦았다. 3일 전부터는 잠도 잘 자지 못하고, 전날엔 수업시간에 화장실을 들락날락거렸고, 급우에게 계속 말을 거는 자신을 혼내는 선생님에게 화를 참지 못하고 폭언을 했다. 진단은?", "images": [], "text_box": null, "options": ["간헐적 폭발장애 (intermittent explosive disorder)", "양극성 장애 (bipolar disorder)", "적대적 반항 장애 (oppositional defiant disorder)", "파괴적 기분조절부전장애 (destructive mood dysregulation disorder)", "품행장애 (conduct disorder)"], "answer": [1], "explanation": "환자는 감정 조절의 어려움, 충동성, 과대사고, 수면 감소, 과잉 행동 등 조증 삽화의 전형적인 증상을 보입니다. 특히 나이가 16세 이상으로 10세 이전에 발병하는 파괴적 기분조절부전장애(DMDD)와는 구별됩니다. 소아·청소년 양극성 장애는 기분 불안정성, 짜증 등 혼재성 증상이 흔하며, 현재 환자의 심각한 기능 저하는 조증 삽화 진단에 부합합니다. 따라서 가장 적절한 진단은 양극성 장애입니다."}, {"subject": "양극성 장애", "year": "2019학번", "professor": "박원명", "question": "25세 남자가 울적함을 호소하며 “아무것도 즐거운 것이 없다”라고 호소하며 정신건강의학과에 찾아왔다. 1개월 전부터 식욕 저하와 불면증이 있었고 비슷한 시기부터 일상적인 행동에 흥미를 느끼지 못했고 학업에 집중하지 못했다. 2년전에도 비슷한 증상이 2개월 정도 지속되었고 특별한 치료 없이 호전되었다. 2년동안 활동량이 많아졌던 시기가 몇 차례 존재하였는데 4-5일 동안 본인 스스로 생산적이었고 사교성이 좋아졌고 수면 시간은 줄었지만 평소보다 기력이 왕성해진 느낌이었다. 가족들은 기력이 왕성해진 시기에 평소보다 말이 빨라지기는 했지만 행동 문제는 없었고 보다 총명해진 느낌이었다. 신체검사와 혈액검사에서 이상소견이 없었고 약물 남용과 알코올 사용의 증거는 없었다. 진단은?", "images": [], "text_box": null, "options": ["순환성 장애", "주요 우울 장애", "제 1형 양극성 장애: 현재 우울 삽화", "제2형 양극성 장애: 현재 우울 삽화", "제2형 양극성 장애: 현재 혼합성 삽화"], "answer": [3], "explanation": "환자는 현재 주요 우울 삽화 증상을 보이며, 과거 4-5일간 지속된 생산성 증가, 사교성 향상, 수면 감소, 기력 왕성 등의 경조증 삽화가 있었습니다. 경조증 삽화는 기간이 짧고 기능적 손상이 없었으므로 조증으로 볼 수 없습니다. 따라서 주요 우울 삽화와 경조증 삽화의 병력이 있는 경우, 제2형 양극성 장애로 진단됩니다. 현재는 우울 삽화 상태이므로 '제2형 양극성 장애: 현재 우울 삽화'가 가장 적절한 진단입니다."}, {"subject": "양극성 장애", "year": "2019학번", "professor": "박원명", "question": "주의산만함을 나타내는 청소년의 경우, 주의력결핍 과잉행동장애(ADHD)보다 양극성 장애를 시사하는 양상은?", "images": [], "text_box": null, "options": ["수면욕구 감소", "증상의 삽화적 발생", "주의산만", "경주사고", "빠른 언어"], "answer": [1], "explanation": "양극성 장애의 증상은 ADHD와 유사하게 주의산만, 과잉 행동 등을 보일 수 있지만, 양극성 장애의 핵심적인 특징은 증상이 '삽화적'으로 발생한다는 점입니다. 즉, 특정 기간 동안 증상이 나타났다가 완화되는 주기를 보입니다. 반면 ADHD는 증상이 만성적이고 지속적인 경향이 있습니다. 따라서 증상의 삽화적 발생은 ADHD보다 양극성 장애를 더 강력하게 시사하는 양상입니다."}, {"subject": "양극성 장애", "year": "2019학번", "professor": "박원명", "question": "17세 여자가 자살을 시도하려고 면도칼로 손목에 상처를 내어 어머니와 함께 응급실에 왔다. 그녀는 한달 전부터 잠을 자려고 해도 잠이 오지 않았으며, 식욕도 떨어져 하루에 한끼 정도만 먹었다. 말과 행동이 평소와 다르게 감소하고, 평소보다 느릿느릿 움직였으며, 외출도 잘 하지 않았다. 과거 우울했던 적은 없었다. 평소 활달한 성격에 교우관계도 좋은 편이었으나 최근 학교 공부를 따라가기 어려워지면서 우울감이 시작되었으며, 학교에도 가고 싶지 않았다. 단극성 우울증보다 양극성 우울증을 시사하는 소견은?", "images": [], "text_box": null, "options": ["불면증 (insomnia)", "등교 거부(school refusal)", "자해 시도 (suicidal attempt)", "식욕 감퇴 (decreased appetite)", "정신운동 지체(psychomotor retardation)"], "answer": [4], "explanation": "단극성 우울증에서는 주로 정신운동 초조(agitation)가 나타나는 경향이 있지만, 양극성 우울증에서는 정신운동 지체(psychomotor retardation)가 더 흔하게 관찰되는 특징이 있습니다. 불면증, 식욕 감퇴, 등교 거부, 자해 시도 등은 단극성 및 양극성 우울증 모두에서 나타날 수 있는 증상입니다. 따라서 정신운동 지체는 단극성 우울증보다는 양극성 우울증을 더 강력하게 시사하는 소견으로 볼 수 있습니다."}, {"subject": "양극성 장애", "year": "2017학번", "professor": "박원명", "question": "27세 남자가 정신운동 초조와 짜증을 동반한 우울감을 주소로 3개월 간 치료 중이다. 환자는 두 종류 이상의 항우울제 치료에 반응이 좋지 못하여, 현재는 항정신병약제 병합치료를 하고 있는 상태이다. 과거 수년 전에도 비슷한 증상을 경험하였다고 하나 별도의 정신과 치료를 받지는 않았다고 한다. 환자의 치료 경과 및 병력을 감안하여 시행해야 할 평가 척도는?", "images": [], "text_box": null, "options": ["BDI (Beck Depression Inventory)", "BPRS (Brief Psychiatric Rating Scale)", "HAMA (Hamilton Anxiety Rating)", "HAMD (Hamilton Depression Scale)", "MDQ (Mood Disorder Questionnaire)"], "answer": [4], "explanation": "환자는 항우울제에 잘 반응하지 않는 우울 삽화와 재발 이력을 가지고 있습니다. 이는 단극성 우울증이 아닌 양극성 스펙트럼 장애(BSD)의 가능성을 시사합니다. 따라서 양극성 장애를 감별하기 위해 기분 장애 질문지(Mood Disorder Questionnaire, MDQ)를 시행하는 것이 적절합니다. MDQ는 경조증 삽화의 유무를 선별하는 데 유용한 도구입니다."}, {"subject": "양극성 장애", "year": ["2017학번", "2015학번"], "professor": "박원명", "question": "32세 여성이 1개월 전부터 시작된 우울한 기분, 불면, 식욕저하, 무력감을 주소로 병원에 왔다. 환자는 만사가 귀찮고 업무에 집중할수 없어 일상에 어려움이 많았다. 20대 초반부터 1년에 한두번은 평소의 기분과는 다르게 들뜨고 의욕이 넘치며 사회활동이 증가했던 기간이 있었는데, 이런 상태는 약 4-5일 동안 지속되었고 특별히 문제를 일으킬 수준은 아니었다고 한다. 진단은?", "images": [], "text_box": null, "options": ["기분저하증", "급속순환형 양극성장애", "순환성 장애", "제 1형 양극성장애", "제 2형 양극성장애"], "answer": [3], "explanation": "환자는 현재 주요 우울 삽화를 보이고 있으며, 과거 4-5일간 지속된 경조증 삽화의 병력이 있습니다. 경조증 삽화는 기능적 손상을 일으키지 않고 4일 이상 지속된 경우를 의미합니다. 따라서 주요 우울 삽화와 경조증 삽화의 병력이 있는 경우, 제2형 양극성 장애로 진단합니다. 현재는 우울 삽화 상태이므로 'Major depressive episode가 주로 나타나면서, 간혹 경조증이 관찰됩니다. 따라서 Bipolar 2 disorder!'라는 설명이 진단에 부합합니다."}, {"subject": "양극성 장애", "year": "2017학번", "professor": "박원명", "question": "48세 여자가 심한 우울감으로 병원에 왔다. 3년 전부터 겨울 마다 심한 우울감이 있었다고 한다. 환자는 회근 의욕이 없어 살림이나 육아를 하기 힘들다고 한다. 불면이 지속되고, 식욕이 떨어져 체중이 3kg 감소하였다. 망상이나 환청의 소견은 없었으며, 환자의 가족 중 우울증의 병력이 있는 사람은 없었다. 양극성 장애를 예측할 수 있는 인자는?", "images": [], "text_box": null, "options": ["3년 전부터 겨울 마다 심한 우울감이 있었다고 한다", "불면이 지속된다", "식욕이 떨어져 체중이 3kg 감소하였다", "망상이나 환청의 소견은 없었다", "가족 중 우울증의 병력이 있는 사람은 없었다"], "answer": [0], "explanation": "양극성 우울증은 계절성 패턴을 보이는 경우가 많습니다. 특히 겨울철마다 심한 우울감이 반복되는 양상은 계절성 양극성 우울증의 중요한 특징입니다. 불면, 식욕 감퇴, 체중 감소 등은 일반적인 우울 증상으로 단극성 우울증에서도 나타날 수 있습니다. 망상이나 환청 소견이 없거나 가족력이 없다는 것은 양극성 장애를 예측하는 데 특별한 인자가 아닙니다. 따라서 계절성 패턴의 우울감은 양극성 장애를 예측할 수 있는 중요한 인자입니다."}, {"subject": "양극성 장애", "year": "2016학번", "professor": "박원명", "question": "26세 남자환자가 2개월전부터 지속적인우울감,흥미의감소,수면과다,자살시도 를 주소로 내원하였다. 과거력상 3년전 기분이 들뜨고 말이 많아지며 잠을안자도 피곤하지 않았다고한다. 당시 일상생활에는 문제가 없었으며, 3일 후 자연적스럽게 정상으로 돌아왔다고한다. 진단은?", "images": [], "text_box": null, "options": ["주요우울장애", "기분전환장애", "순환기분장애", "제1형 양극성장애", "제2형 양극성장애"], "answer": [4], "explanation": "환자는 현재 우울 삽화를 보이고 있으며, 3년 전에는 3일간 기분이 들뜨고 말이 많아지는 경조증 삽화가 있었습니다. 경조증 삽화는 기능 저하가 없고 4일 이상 지속되지 않은 경우로, 조증 삽화와는 다릅니다. 주요 우울 삽화와 경조증 삽화의 병력이 있는 경우 제2형 양극성 장애로 진단합니다. 따라서 현재 환자의 진단은 제2형 양극성 장애입니다."}, {"subject": "양극성 장애", "year": ["2016학번", "2014학번"], "professor": "박원명", "question": "28세 여성이 자신감 저하와 의욕 상실을 주소로 내원하였다. 현재 기분이 가라앉기는 하지만 직장 생활에는 문제가 없다고 하였으며 가족이나 친구들과의 관계도 양호한 편이라고 한다. 얼마 전까지는 활동적이고 명량하였다고 하며, 3년 전부터는 들뜨는 기분과 우울한 기분이 주기적으로 나타난다고 한다. 진단은?", "images": [], "text_box": null, "options": ["주요우울장애", "순환성기분장애", "제1형 양극성장애", "제2형 양극성장애", "분열정동장애 (조현정동장애)"], "answer": [1], "explanation": "환자는 3년 전부터 들뜨는 기분과 우울한 기분이 주기적으로 나타나고 있습니다. 현재 기분은 가라앉아 있지만 직장 생활에 큰 문제가 없다는 점은 증상이 심각한 조증이나 주요 우울 삽화 수준은 아님을 시사합니다. 주요 우울 삽화를 만족하지 않는 가벼운 우울 증상과 경조증 증세가 반복적으로 나타나는 경우 순환성 기분장애로 진단합니다. 이는 양극성 장애 스펙트럼에 속하는 만성적인 기분 장애입니다."}, {"subject": "양극성 장애", "year": ["2016학번", "2014학번", "2013학번"], "professor": "박원명", "question": "제1형 양극성장애의 역학에 대한 설명으로 맞는 것은?", "images": [], "text_box": null, "options": ["기혼자에 더 많다", "여성이 유병율이 더 높다", "여성이 더 일찍 발병한다", "삽화의 빈도와 지속기간은 나이가 들수록 감소한다.", "첫번째 삽화는 남성의 경우 조증삽화, 여성의 경우 우울삽화가 더 많다."], "answer": [4], "explanation": "제1형 양극성 장애의 역학적 특성 중, 첫 번째 삽화는 남성의 경우 주로 조증 삽화로 나타나고 여성의 경우 주로 우울 삽화로 나타나는 경향이 있습니다. 일반적으로 양극성 장애의 유병률은 남녀가 비슷하며, 미혼자에게 더 흔하고, 삽화의 빈도와 지속기간은 나이가 들수록 증가하는 경향을 보입니다. 또한 남성이 여성보다 더 일찍 발병하는 경향이 있습니다."}, {"subject": "양극성 장애", "year": ["2013학번", "2012학번"], "professor": "박원명", "question": "27세 남성이 2개월 전부터 매일 지속되는 우울감, 흥미의 상실, 과다수면, 자살사고를 주소로 내원하였다. 3년 전에 기분이 들뜨고 말이 많아지며 자신은 신의 아들이라고 주장하며 무리한 사업을 벌이기도 하였고 수개월 후에 증상이 저절로 호전이 되었다고 한다. 진단은?", "images": [], "text_box": null, "options": ["주요우울장애", "기분부전장애", "기분순환장애", "제1형 양극성장애", "제2형 양극성장애"], "answer": [3], "explanation": "환자는 현재 주요 우울 삽화의 증상을 보이고 있습니다. 과거력상 3년 전에 '신의 아들'이라는 망상과 함께 기분이 들뜨고 말이 많아지며 무리한 사업을 벌이는 등 조증 삽화가 수개월간 지속되었습니다. 망상이 동반된 조증 삽화가 한 번이라도 있었으면 제1형 양극성 장애로 진단합니다. 따라서 현재는 우울 삽화이지만 과거 조증 삽화력으로 인해 제1형 양극성 장애가 가장 적절한 진단입니다."}, {"subject": "양극성 장애", "year": "2013학번", "professor": "박원명", "question": "질병 발생에 유전의 상대적 위험도가 가장 큰 정신질환은?", "images": [], "text_box": null, "options": ["공황장애", "범불안장애", "정신분열병", "양극성장애", "주요우울장애"], "answer": [3], "explanation": "양극성장애는 유전적 소인이 가장 강한 정신질환 중 하나로 알려져 있습니다. 일란성 쌍생아의 경우 일치율이 40-70%에 달할 정도로 유전적 요인이 크게 작용합니다. 이는 다른 주요 정신질환(예: 정신분열병 약 50%, 주요우울장애 약 30%)보다 높은 수준입니다. 따라서 가족력이 있는 경우 발병 위험이 유의미하게 증가합니다."}, {"subject": "양극성 장애", "year": "2013학번", "professor": "박원명", "question": "30세 여자가 남편과 함께 환청이 들린다며 방문했다. 전업주부였으며 3개월 전 어머니가 돌아가신 이후 2개월 동안 우울감, 자살사고, 불안감, 불면증, 죄책감을 겪었다. 한 달 전부터 갑자기 말수가 많아지고 밤새 잠도 자지 않고 사업을 구상한다고 했으며 1주일 전부터 자신이 하나님이 보낸 메시아라는 소리가 들린다며 인류를 구원하겠다고 했다. 진단은?", "images": [], "text_box": null, "options": ["Schizophrenia, paranoid type", "Bipolar II disorder, most recent episode hypomanic", "Major depressive disorder, single episode, severe with psychotic features", "Bipolar I disorder, most recent episode manic, severe with psychotic features", "Bipolar I disorder, most recent episode manic, severe without psychotic features"], "answer": [3], "explanation": "환자는 3개월 전 우울 삽화를 겪었고, 1개월 전부터 조증 증상이 나타났으며, '하나님이 보낸 메시아'라는 과대망상과 환청 같은 정신병적 증상을 동반하고 있습니다. 주요 우울 삽화와 조증 삽화가 모두 나타났으므로 양극성 I형 장애로 진단할 수 있습니다. 현재 삽화는 정신병적 증상을 동반한 조증 삽화이므로, DSM-IV 기준에 따라 'Bipolar I disorder, Most recent episode manic, severe with psychotic features'가 가장 적절한 진단입니다."}, {"subject": "양극성 장애", "year": "2013학번", "professor": "박원명", "question": "28세 여성이 자신감 저하와 의욕 상실을 주소로 내원하였다. 현재 기분이 가라앉기는 하지만 직장 생활에는 문제가 없다고 하였으며 가족이나 친구들과의 관계도 양호한 편이라고 한다. 얼마 전까지는 활동적이고 명량하였다고 하며, 3년 전부터 들뜨는 기분과 우울한 기분이 주기적으로 나타난다고 한다. 가장 적절한 진단은?", "images": [], "text_box": null, "options": ["주요우울장애", "분열정동장애", "순환성기분장애", "제1형 양극성장애", "제II형 양극성장애"], "answer": [2], "explanation": "환자는 2년 이상 가벼운 우울 증상과 경조증 증상이 반복적으로 나타나고 있습니다. 이러한 증상들은 주요 우울 삽화나 조증 삽화의 진단 기준을 충족시키지 못하는 수준입니다. 하지만 기분 증상이 2년 이상 지속되면서 주기적으로 변동하는 양상을 보이므로 순환성 기분장애로 진단할 수 있습니다. 순환성 기분장애는 양극성 장애 스펙트럼에 속하는 만성적인 기분 장애입니다."}, {"subject": "양극성 장애", "year": "2012학번", "professor": "박원명", "question": "다음 중 우울증 환자에서 양극성 장애를 예측할 수 있는 인자가 아닌 것은?", "images": [], "text_box": null, "options": ["Psychotic sx", "첫 발병이 old age에서 우울증이 발병함", "양극성 장애의 가족력이 있다", "reverse vegetative function", "약물로 인해 조증이 발병한 과거력이 있다."], "answer": [1], "explanation": "양극성 장애로의 전환을 예측하는 중요한 인자로는 정신병적 증상 동반, 젊은 나이에 발병, 양극성 장애의 가족력, 역전된 식물성 증상(수면과다, 식욕 증가 등), 그리고 항우울제 복용 후 유발된 조증 삽화 과거력 등이 있습니다. 반면, 노년기에 처음 우울증이 발병하는 것은 단극성 우울증의 특징 중 하나로, 양극성 장애 예측 인자와는 거리가 있습니다. 따라서 '첫 발병이 old age에서 우울증이 발병함'은 예측 인자가 아닙니다."}, {"subject": "양극성 장애", "year": "2012학번", "professor": "박원명", "question": "양극성 장애의 병태생리에 관한 설명이다. 옳지 않은 것은?", "images": [], "text_box": null, "options": ["기분장애 환자의 약 10%에서 특히 양극성 장애 환자에서 antithyroid antibody가 발견된다.", "갑상선 기능저하증 환자에서 급성 순환형이 많다.", "주요우울장애보다 유전적인 소인은 많지 않다", "세로토닌, 노르에피네프린, 도파민 등이 관여한다", "Lithium은 neuroprotective effect로 작용한다."], "answer": [2], "explanation": "양극성 장애는 주요 우울 장애보다 유전적 소인이 훨씬 크다고 알려져 있습니다. 일란성 쌍생아 연구에서 양극성 장애의 일치율은 주요 우울 장애보다 높게 나타납니다. 따라서 '주요 우울 장애보다 유전적인 소인은 많지 않다'는 설명은 옳지 않습니다. 양극성 장애의 병태생리에는 세로토닌, 노르에피네프린, 도파민 등 여러 신경전달물질의 불균형이 관여하며, 리튬은 신경세포 보호 효과를 가집니다."}, {"subject": "양극성 장애", "year": "20학번", "professor": "우영섭", "question": "35세 여자가 출산 후 2개월간 우울감, 의욕저하, 비관적인 생각, 불면, 식욕 저하 등의 증상과, 계속 불안하고 초조하여 가만히 있지 못하겠어서 아이를 돌보지 못하였다. 고등학교 재학 당시 우울삽화가 처음 발생하였으며, 이후 2-3년에 한번은 우울삽화를 경험하였다. 또한 환자의 어머니가 과거 양극성장애로 치료를 받은 적이 있다고 한다. 감별 진단을 위해 시행해야 할 검사는?", "images": [], "text_box": null, "options": ["간이 우울 증상 평가 척도 (Quick Inventory of Depressive Symptomatology, QIDS)", "간편 정신상태 평정척도 (Brief Psychiatric Rating Scale, BPRS)", "기분 장애 질문지 (Mood Disorder Questionnaire, MDQ)", "벡 무망감 척도 (Beck Hopelessness Scale, BHS)", "사고장애평가 (Positive and Negative Syndrome Scale, PANSS)"], "answer": [2], "explanation": "환자의 증상과 가족력을 고려할 때, 우울삽화와 함께 양극성 장애의 가능성(BSD)을 의심해야 합니다. 기분 장애 질문지(MDQ)는 양극성 장애, 특히 경조증 삽화를 선별하는 데 유용하게 사용됩니다. 따라서 감별 진단을 위해 MDQ를 시행하는 것이 적절합니다. 이는 양극성 장애의 진단 과정에서 중요한 단계입니다."}, {"subject": "양극성 장애", "year": "20학번", "professor": "우영섭", "question": "38세 남자가 내원하여 정신건강의학과 전문의와 면담을 시행한 이후에 주요우울삽화로 진단을 받았다. 환자는 3년 전 기분이 들뜨고 말이 많아지며 지나치게 자신감을 보이면서 가족들이 비합리적이라고 말리는데도 불구하고 새로운 사업을 하겠다고 수억 여원을 대출받아 유흥비로 탕진하고 유력한 권력자들과 절친한 관계라고 자랑하고 다니는 모습을 보였으며 잠을 거의 자지 않아도 활력이 넘친다고 하여 정신건강의학과에 입원했었다고 한다. 환자는 작년에는 유사한 증상 으로 5차례 입원했었다고 한다. 본 환자의 치료를 위해 적절한 약물은?", "images": [], "text_box": null, "options": ["lithium", "amitriptyline", "bupropion", "clonazepam", "valproate"], "answer": [4], "explanation": "환자는 과대평가, 수면 감소, 과다한 언행, 무리한 사업 추진 등의 증상을 보이며 이는 조증 삽화의 전형적인 양상입니다. 여기에 우울삽화가 섞여 있으므로 혼재성 양상으로 볼 수 있습니다. 발프로에이트(Valproate)는 혼재성 양상의 양극성 장애에 효과적인 기분 안정제로 알려져 있습니다. 따라서 환자의 상태에 가장 적절한 치료 약물은 발프로에이트입니다."}, {"subject": "양극성 장애", "year": "20학번", "professor": "우영섭", "question": "48세 남성이 2개월 전부터 기분이 예민하고 아무 일도 재미가 없고 늘 피곤하다고 한다. 밤에 10시간을 자도 2-3시간 이상 낮잠을 자야하고, 모든 것이 귀찮아서 식사도 잘 하지 않고 직장 에서도 졸리고 집중을 하지 못해 자주 실수를 한다고 한다. 너무 힘들어서 자신이 아무 쓸모가 없어 죽고 싶은 생각이 들 때도 있지만, 자살 시도는 없다고 한다. 약 10년 전 비슷한 증상을 보여 항우울제를 복용하였으나 항우울제 복용 직후 1주일간 자신감이 생기고 기분이 들뜨고 과소비 를 하며 잠을 자 항우울제를 중단한 적이 있다고 한다. 치료 약물은?", "images": [], "text_box": null, "options": ["부스피론 (Buspirone)", "할로페리돌 (Haloperidol)", "메틸페니데이트 (Methylphenidate)", "미르타자핀 (Mirtazapine)", "쿠에티아핀 (Quetiapine)"], "answer": [4], "explanation": "환자는 항우울제 복용 후 조증 삽화(acute mania)를 경험하여 복용을 중단한 과거력이 있습니다. 이는 양극성 장애의 중요한 단서입니다. 현재 우울 증상과 함께 조증 과거력이 있으므로 양극성 장애로 진단할 수 있습니다. 쿠에티아핀(Quetiapine)은 양극성 장애의 조증 및 우울 삽화 모두에 효과적인 2세대 항정신병약물입니다. 따라서 양극성 장애 환자의 증상 조절에 적합한 약물로 선택될 수 있습니다."}, {"subject": "양극성 장애", "year": "20학번", "professor": "우영섭", "question": "30세 남자가 2주전부터 기분이 들뜨고, 자신에게 무한한 능력이 있다면서 말수가 많아지고, 과소비와 과도 한 음주, 충동적인 모습을 보여 병원에 왔다. 1년전부터 2주전 까지는 우울하고, 의욕이 없고, 기운이 없고 잠이 오지 않는다며 음주를 지속하였다고 한다. 혈액 검사에서 간 효소 수치의 상승, 신장 기능의 저하 및 급성 알코올성 간염의 소견을 보였다. 치료는?", "images": [], "text_box": null, "options": ["라모트리진 (lamotrigine)", "리튬 (lithium)", "미르타자핀 (mirtazapine)", "발프로익산 (valproic acid)", "아리피프라졸 (aripiprazole)"], "answer": [4], "explanation": "환자는 우울 삽화 이후 급격하게 조증 삽화로 진행된 양극성 장애 상태입니다. 혈액 검사에서 간 기능 이상 및 급성 알코올성 간염 소견이 있어 간독성이 있는 리튬이나 발프로익산은 사용하기 어렵습니다. 라모트리진은 주로 양극성 우울증에 효과적이며 조증 삽화에는 항조증 효과가 부족합니다. 아리피프라졸(Aripiprazole)은 급성 조증에 효과적인 2세대 항정신병약물로, 간독성이 적어 현재 환자에게 가장 적합한 치료제입니다."}, {"subject": "양극성 장애", "year": "20학번", "professor": "우영섭", "question": "27세 남자가 6개월 전부터 아무것도 못할 정도로 우울하고 ~ 잠을 잤으며, 이로 인해서 대학원도 휴학한 상태였다. ~한 적이 -6 차례 있어서, 다시 이런 기간이 올까봐 걱정되어 ~. ~을 벌 수 있는 방법을 깨달았다며 친구들 돈을 빌려 ~ 한다. 치료는? (복구미흡)", "images": [], "text_box": null, "options": ["라모트리진 (lamotrigine)", "메틸페니데이트 (methylphenidate)", "부프로피온 (bupropion)", "약물투여 없이 경과 관찰", "플루옥세틴 (fluoxetine)"], "answer": [0], "explanation": "환자는 우울 증상과 더불어 반복적인 경조증 삽화가 있었을 가능성이 높으며, 이는 양극성 기분장애, 특히 Rapid cycling의 가능성을 시사합니다. 라모트리진(Lamotrigine)은 양극성 우울증에 효과적이며, 특히 Rapid cycling을 동반한 양극성 장애의 유지 치료에 선호되는 약물입니다. 따라서 환자의 상태에 비추어 라모트리진이 가장 적절한 치료 약물로 고려됩니다."}, {"subject": "양극성 장애", "year": "20학번", "professor": "우영섭", "question": "[총시] 36세 여자가 2주 전부터 기분이 심하게 들뜨고 말이 많아지고 부산해지며 자기가 인기가 많아서 인플루언서가 되었고 사람들이 자신을 숭배한다고 한다. 2개월 전부터 기분이 우울하고 매사에 의욕이 없고 재미있는 일이 없으며 식욕은 늘고 잠이 많아져 계속 하루종일 누워있는 일이 많다고 하며 이에 3주전 항우울제를 투여 받은 후 기분이 들뜨는 증상이 나타났다고 한다. 환자는 갑상선기능저하증 진단을 받았으나 치료를 받지 않고 있다. 2년 전에도 우울과 의욕저하가 9개월간 지속된 적이 있다고 한다. 치료는?", "images": [], "text_box": null, "options": ["리튬 (lithium)", "벤라팍신 (venlafaxine)", "서트랄린 (certraline)", "라보트리진 (lamotrigine)", "쿠에티아핀 (quetiapine)"], "answer": [4], "explanation": "환자는 현재 조증 삽화를 보이며, 과거 우울 삽화력과 항우울제 복용 후 유발된 조증 증상으로 양극성 장애가 의심됩니다. 특히 갑상선 기능 저하증이 있어 리튬 사용에 주의가 필요합니다. 라모트리진은 주로 우울 삽화에 효과적이고, 항우울제는 단독 사용 시 조증을 유발할 수 있습니다. 쿠에티아핀(Quetiapine)은 양극성 장애의 조증 및 우울 삽화 모두에 효과적이며, 갑상선 기능에 큰 영향을 주지 않아 현재 환자에게 적합한 약물입니다."}, {"subject": "양극성 장애", "year": "19학번", "professor": "김태원", "question": "29세 여성이 양극성 장애에 대한 유지치료를 받고 있다. 임신 계획을 세우고 담당의사와 상담을 하러 왔다. 담당의사는 신경 발달 중 신경관 결손이 일어날 수 있다고 하였다. 이 약물은 무엇인가?", "images": [], "text_box": null, "options": ["lithium", "valproate", "bupropion", "mirtazapine", "aripiparzole"], "answer": [1], "explanation": "임신 중 양극성 장애 유지 치료에서 신경관 결손 위험을 높이는 약물은 발프로에이트(Valproate)입니다. 발프로에이트는 기형 유발 가능성이 높아 임신 중 사용 시 특히 주의가 필요하며, 임신을 계획 중인 여성에게는 다른 약물로의 전환을 고려해야 합니다. 따라서 환자에게 신경관 결손 위험을 경고한 약물은 발프로에이트입니다."}, {"subject": "양극성 장애", "year": "19학번", "professor": "우영섭", "question": "3년 전에는 기분이 들뜨고 말이 많아지고, 자신은 매우 유능하여 큰 사업 성공을 거둘 것이라며 잠도 자지 않으며 장황하게 이야기를 하는 모습을 보였다고 한다(정확히 같은 증상은 아니었지만 대충 조증 증상이 주어졌습니다). 작년에만 3번 입원. 치료는?", "images": [], "text_box": null, "options": ["리튬", "", "Amitryptiline", "", ""], "answer": [0], "explanation": "환자의 과거력에서 조증 삽화가 명확히 확인되며, 이는 양극성 장애의 진단 기준을 충족합니다. 조증 삽화의 약물 치료에 있어 리튬(Lithium)은 1차 선택 약물 중 하나입니다. 리튬은 기분 안정 효과가 뛰어나 조증 증상 조절에 효과적이며 재발 방지에도 중요하게 사용됩니다. 따라서 리튬을 통한 치료가 가장 적절합니다."}, {"subject": "양극성 장애", "year": "18학번", "professor": "우영섭", "question": "??세??가 2주 전부터 고양된 기분, 수면 욕구 감소, 무리한 사업 확장으로 가족들과 심하게 다툰 뒤 가출하여 경찰 및 가족들과 함께 병원에 방문했다. 자신은 사업을 잘 해낼 수 있는데 가족들이 못하게 막는다며 화를 냈다. 2개월 전에 3주 정도 사업의 어려움을 경험하면서 우울감, 무기력감을 호소하였고 식욕이 떨어지며 잠을 자려고 해도 쉽게 자지 못하였다. 실험실 검사에서 간효소 수치의 상승 및 알코올성 간염의 소견을 보였다. 적절한 치료 약물은?", "images": [], "text_box": null, "options": ["Mirtazapine", "Lithium", "Fluoxetine", "Fluvoxamine", "Valproic acid"], "answer": [1], "explanation": "환자는 현재 고양된 기분, 수면 감소, 과잉 행동 등을 보이는 조증 삽화 상태이며, 과거 우울 삽화의 병력도 있어 양극성 장애로 진단할 수 있습니다. 간 효소 수치 상승 및 알코올성 간염 소견이 있으므로 간독성이 있는 발프로익산(Valproic acid)은 사용에 주의해야 합니다. 리튬(Lithium)은 양극성 장애의 1차 치료제이며 간 독성이 상대적으로 낮아 이 경우 발프로익산보다 더 적절한 선택이 됩니다. 따라서 리튬이 가장 적절한 약물입니다."}, {"subject": "양극성 장애", "year": "18학번", "professor": "우영섭", "question": "45세 남자가 사업을 하겠다며 수억원을 대출하여 모두 탕진하고 잠을 자지 않아도 활력이 넘쳤다. 회복 후 유지치료를 위해 약을 처방하였으며 의사로부터 발진이 생기면 바로 내원하라는 당부를 받았다. 처방받은 약은?", "images": [], "text_box": null, "options": ["Lithium", "Carbamazepine", "Lamotrigine", "Valproate", "Haloperidol"], "answer": [2], "explanation": "환자는 과거 무리한 사업 추진, 수면 감소, 활력 넘침 등의 조증 삽화를 경험한 양극성 장애 환자입니다. 유지 치료를 위해 처방받은 약물 중 '발진'을 주요 부작용으로 경고받은 약물은 라모트리진(Lamotrigine)입니다. 라모트리진은 양극성 우울증의 유지 치료에 특히 효과적이며, 피부 발진(스티븐스-존슨 증후군 등) 발생 위험이 있어 주의가 필요합니다. 따라서 처방받은 약물은 라모트리진입니다."}, {"subject": "양극성 장애", "year": "18학번", "professor": "우영섭", "question": "??세??가 1년 전 밤새워 공부를 하고 사업 계획을 세워도 피곤하지 않았다고 하며, 사소한 일에도 쉽게 싸우고 흥분하여 치료를 시작하였다. 약물 치료를 유지하던 중 우울감과 절망감에 처방받은 약을 다량 복용한 이후 의식이 흐려지고 구토를 하여 응급실에 왔고 혈압저하, ???를 보였다. 담당의는 치료를 위해 혈액 투석을 권고하였다. 처방받은 약물은?", "images": [], "text_box": null, "options": ["Lithium", "Valproate", "Lamotrigine", "Mirtazapine", "carbamazepine"], "answer": [0], "explanation": "환자는 양극성 장애로 약물 치료를 받던 중 약물 과다 복용 후 의식 저하, 구토, 혈압 저하 등의 증상으로 응급실에 내원했습니다. 특히 혈액 투석을 권고받았다는 점이 중요합니다. 리튬(Lithium)은 치료 농도와 독성 농도의 차이가 좁아 과다 복용 시 독성 반응이 심각하며, 심한 경우 혈액 투석을 통해 제거해야 합니다. 따라서 처방받은 약물은 리튬일 가능성이 가장 높습니다."}, {"subject": "양극성 장애", "year": "18학번", "professor": "우영섭", "question": "29세 여성이 5일 전부터 가수가 되겠다며 이곳저곳 매니지먼트 회사를 찾아다녔으나 계속 실패하였고 밤에도 귀가하지 않고 밤을 새며 여기 저기 돌아다니며 쓸데없는 물건을 사는데 1000만원 가량을 소비하였다. 난동을 부리다 경찰에 연행되었는데 '나는 천재이고 방탄 소년단은 내가 기른 아이들이다' '음악 오디션 프로그램에서 1등을 했다'라는 등의 사실과 다른 말을 쉴 새없이 하였다. 보호자에 의하면 이전에 심한 우울증이 있어 자살 시도를 하여 정신건강의학과 입원 치료를 받은 적이 있다고 하였다. DSM-5 진단에 따른 삽화에 해당되는 설명인 것은?", "images": [], "text_box": null, "options": ["제 II형 양극성 장애로 진단할 수 있다.", "적어도 2년 동안 다수의 경조증 기간과 우울증 기간이 있어야 진단할 수 있다.", "소아청소년에서는 1년 동안 다수의 경조증 기간과 우울증 기간만 있어도 진단할 수 있다.", "비정상적으로 들뜨거나, 의기양양하거나, 과민한 기분, 그리고 목표 지향의 활동과 에너지의 증가가 적어도 2주간 있어야 진단할 수 있다.", "비정상적으로 들뜨거나, 의기양양하거나, 과민한 기분, 그리고 목표 지향의 활동과 에너지의 증가가 거의 매일, 하루 대부분 있어 입원이 필요할 정도로 증상이 심각하면 5일만에 진단을 내릴 수 있다."], "answer": [4], "explanation": "환자는 과대사고, 수면 감소, 과잉 행동, 현실 판단력 저하(정신병적 증상) 등 조증 삽화의 특징적인 증상을 보입니다. DSM-5에 따르면, 비정상적으로 들뜨거나 과민한 기분과 목표 지향적 활동 및 에너지 증가가 거의 매일, 하루 대부분 나타나며, 증상이 심각하여 입원이 필요하거나 정신병적 증상을 동반할 경우 5일 미만으로 지속되더라도 조증 삽화로 진단할 수 있습니다. 이는 조증 진단에 필요한 최소 기간보다 증상의 심각성이 우선시됨을 의미합니다."}, {"subject": "양극성 장애", "year": "18학번", "professor": "우영섭", "question": "32세 여자가 2개월 전부터 우울하고 의욕이 없다며 병원에 왔다. 식욕이 늘고 잠이 많아져 하루 종일 누워있는 일이 많다고 한다. 3년 전에는 기분이 들뜨고 말이 많아지고, 자신은 매우 유능하여 큰 사업 성공을 거둘 것이라며 잠도 자지 않으며 장황하게 이야기를 하는 모습을 보였다고 한다. 치료는?", "images": [], "text_box": null, "options": ["Sertraline", "Buspirone", "Lamotrigine", "Mirtazapine", "milnacipran"], "answer": [2], "explanation": "환자는 과거 조증 삽화가 있었고 현재 우울 삽화가 반복되는 양극성 장애의 증상을 보입니다. 제시된 약물 중 라모트리진(Lamotrigine)은 양극성 우울 삽화의 치료 및 유지 치료에 효과적인 기분 안정제입니다. 다른 약물들은 항우울제이거나 불안 완화제이므로 양극성 장애 치료에 부적합합니다. 양극성 우울증에는 항우울제 단독 사용 시 조증 전환 위험이 있어 기분 안정제와의 병용 또는 라모트리진 같은 기분 안정제 단독 요법이 선호됩니다."}, {"subject": "양극성 장애", "year": "17학번", "professor": "박원명", "question": "1형 양극성장애로 통원 치료 중이던 39세 여자가 정신병적 증상이 없는 조증 삽화로 입원하였다. 5년 전부터 잠이 안 온다며 매일 소주 1병씩을 마셨으며, 12갑년의 흡연력이 있었다. 대기업에서 중책을 맡는 인정받는 재원이었다. 5년 전 첫 조증삽화로 정신건강의학과 치료를 시작한 후 현재까지 안정적인 경과로 지내왔었다. 나쁜 예후를 시사하는 인자는?", "images": [], "text_box": null, "options": ["여성", "음주력", "흡연력", "직업수행능력", "정신병적 증상이 없는 조증삽화"], "answer": [1], "explanation": "양극성 장애의 나쁜 예후를 시사하는 인자들로는 소아·청소년기 발병, 많은 삽화 횟수, 급속순환형, 낮은 병전 적응 능력, 인격장애 동반, 알코올 및 물질 사용 장애 동반 등이 있습니다. 환자의 경우 '매일 소주 1병씩' 마시는 음주력은 알코올 사용 장애에 해당하며, 이는 양극성 장애의 경과를 악화시키고 나쁜 예후와 관련이 깊습니다. 따라서 음주력은 나쁜 예후를 시사하는 중요한 인자입니다."}, {"subject": "양극성 장애", "year": "17학번", "professor": "박원명", "question": "20대 남자환자가 과면 (hypersomnia), 과식 (hyperphagia), 무력감을 호소하며 병원에 왔다. 만사가 귀찮고 일상 생활의 일들을 수행하는 데 어려움이 많았다. 3년 전부터 매년 봄만 되면 평소와는 다르게 의욕이 넘치고, 잠을 자지 않아도 피곤하지 않으며, 평소보다 야외활동을 많이 하고 친구들을 밤새 만나는 일이 10일 정도 지속되었다. 이 기간동안 주변 사람들과 싸우거나 기물 파손을 하는 경우는 없었으나 평소와는 다르게 음주량이 늘고 피우지 않는 담배를 피우는 모습이 보여 가족들이 걱정하였다. 치료 약물은?", "images": [], "text_box": null, "options": ["벤라팍신 (Venlafaxine)", "부프로피온 (Bupropion)", "알프라졸람 (Alprazolam)", "미르타자핀 (Mirtazapine)", "아미트립틸린 (Amitriptyline)"], "answer": [1], "explanation": "환자는 과면, 과식, 무력감을 호소하는 우울 삽화와 매년 봄 기분이 들뜨고 활동량이 증가하는 경조증 삽화를 경험한 양극성 장애 환자입니다. 항우울제 사용 시 조증 전환 위험이 있으므로 기분 안정제와 함께 사용하거나 조증 전환 위험이 낮은 항우울제를 선택해야 합니다. 부프로피온(Bupropion)은 다른 항우울제에 비해 조증 전환 위험이 상대적으로 낮은 것으로 알려져 있어 양극성 우울증 치료에 고려될 수 있습니다."}, {"subject": "양극성 장애", "year": "17학번", "professor": "박원명", "question": "제1형 양극성 장애로 20년째 발프로에이트(valproate)를 복용중인 45세 남자가 병원에 왔다. 1개월 전부터 ~ 무력감이 시작되었고 집에서 아무것도 못할 것 같고 죽고 싶은 생각이 반복적으로 들어서 고통스러웠으며 ~과 입퇴원을 반복하였고, 4년 전 조증으로 마지막으로 입원한 이후 약물 복용은 꾸준히 해왔으나 매일 소주 2병을 마셨고, 25갑년의 흡연자이다. 자살을 시도한 적은 없었다. 자살 위험도에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["만성화된 환자의 경우 자살의 위험도가 높아진다.", "입원 치료를 받고 퇴원한 직후 자살도는 낮아진다.", "알코올 중독이 동반되는 경우 자살 시도율이 높아진다.", "우울삽화보다는 조증삽화에서 자살 시도를 더 많이 한다.", "제1형 양극성장애의 경우 제 2형 양극성장애에 비해 자살률이 더 높다."], "answer": [2], "explanation": "양극성 장애 환자의 자살 위험도는 여러 요인에 의해 영향을 받습니다. 특히 알코올 중독을 포함한 물질 남용이 동반될 경우 자살 시도율이 현저히 높아집니다. 일반적으로 우울 삽화 시에 자살 시도가 더 많으며, 질병 경과 초기와 퇴원 직후에 자살 위험도가 높아지는 경향이 있습니다. 제2형 양극성 장애가 제1형 양극성 장애보다 자살률이 더 높다는 보고도 있습니다. 따라서 알코올 중독 동반은 자살 위험도를 높이는 주요 인자입니다."}, {"subject": "양극성 장애", "year": "16학번", "professor": "박원명", "question": "48세 남자가 우울한 기분, 무기력, 자살 사고를 주소로 내원하였다. 과거 병력 상 중학교 무렵부터 주기적으로 잠이 오지 않는 다며 밤새 공부하거나, 하나만 사면되는 학용품을 10개씩 샀다고 하였다. 이후 20세 무렵 모든 사람들이 자신이 파는 물건을 사 줄 것이라고 과도한 자신감을 보이며 대출을 받아 무리하게 사업을 확장하며 수십억의 빚을 지고 사업에 실패하였다고 하였다. 환자는 사업에 실패하면 수개월간 우울감에 빠지고 다시 의욕이 생겨 사업을 시작하기를 1년 주기로 반복해왔다고 한다. 1차 치료 약물은?", "images": [], "text_box": null, "options": ["Benzodiazepine", "Fluoxetine", "Lithium", "Clozapine", "Haloperidol"], "answer": [2], "explanation": "환자는 고양된 기분, 과도한 자신감, 수면욕구 감소, 충동적인 행동 등 조증 증상과 함께 우울 증상이 반복되는 전형적인 양극성 장애의 병력을 보입니다. 양극성 장애의 1차 치료 약물은 기분 안정제입니다. 리튬(Lithium)은 양극성 장애, 특히 조증 삽화의 급성기 및 유지 치료에 가장 효과적인 1차 약물로 널리 사용됩니다. 따라서 리튬이 가장 적절한 치료 약물입니다."}, {"subject": "양극성 장애", "year": "16학번", "professor": "박원명", "question": "35세 여자가 고양된 기분, 수면욕구 감소, 과잉행동 등의 증상 이후 겨울이면 우울감, 무기력, 활동 저하 등의 증상이 주기적으로 반복되어 양극성장애 진단을 받고 lithium 1200mg을 하루 한 번 복용하고 있다. 약물 복용 1주 후부터 다뇨, 다음, 구갈 증상을 보이고 소변양이 3.5L/day를 보였다. 필요한 처치는?", "images": [], "text_box": null, "options": ["수분 제한", "lithium 감량", "lithium 증량", "lithium 분복", "lithium 유지 및 경과관찰"], "answer": [1], "explanation": "환자는 리튬을 복용하면서 다뇨, 다음, 구갈 등의 증상과 함께 하루 소변량이 3.5L에 이르는 요붕증 유사 증상을 보이고 있습니다. 이는 리튬의 대표적인 신독성 부작용입니다. 리튬 독성이 의심되는 상황이므로 즉시 리튬 용량을 감량하거나 일시적으로 중단해야 합니다. 리튬 독성이 심할 경우 생명에 위협을 줄 수 있어 신속한 처치가 필요합니다. 따라서 리튬 감량이 가장 적절한 처치입니다."}, {"subject": "양극성 장애", "year": "16학번", "professor": "박원명", "question": "18세 여자가 내원 1주일 전부터 자신이 베스트셀러 작가가 될지도 모른다며 과도한 자신감과 들뜬 기분을 보이고 밤에도 잠 잘 필요가 없다며 끊임없이 소설을 쓰는 등 과도한 행동을 보여 내원하였다. 학교에서도 수업시간에 화장실을 들락거리고 친구에게 끊임없이 이야기하는 등의 문제로 주의를 받았다 한다. 가족력 상 아버지가 양극성장애로 치료를 받고 있다고 한다. 틀린 설명은?", "images": [], "text_box": null, "options": ["ADHD와의 감별이 필요하다", "향후 불안장애, 물질 사용 장애 등 정신과적 질환의 공존발생률이 높다.", "청소년기임을 감안하여 가급적 약물치료를 하지 않고 정신치료만 하는 것이 좋다.", "정신과 질환 중 유전성이 높아 가족력에 대한 병력청취가 중요하다.", "조기 발병일 경우 예후가 불량한 것과 관련이 깊다"], "answer": [2], "explanation": "환자는 과도한 자신감, 수면 감소, 과잉 행동 등 조증 삽화의 증상을 보이며 가족력상 양극성 장애가 있어 진단 가능성이 높습니다. 청소년기의 양극성 장애는 증상이 심각하고 기능적 손상이 크므로 약물 치료가 필수적입니다. 정신치료만으로 증상을 조절하고 재발을 방지하기는 어렵습니다. 따라서 '청소년기임을 감안하여 가급적 약물치료를 하지 않고 정신치료만 하는 것이 좋다'는 설명은 틀렸습니다. 양극성 장애는 조기 약물 치료가 중요합니다."}, {"subject": "양극성 장애", "year": "16학번", "professor": "박원명", "question": "수년전 베스트셀러를 출간하여 호평을 받았던 29세 남자 소설가가 내원 2개월 전 집필의 어려움을 호소하며 기운 없이 집에서만 지내며 하루 종일 잠만 자고 사람들과 만나려 하지 않았으며, 친한 친구에게 '이렇게 사느니 죽는 것이 낫겠다.' 는 말을 하였다. 내원 2주 전부터 갑자기기운이 충만해짐을 느꼈다고 하며, 1주 전 한밤에 과속으로 도로를 질주하다가 차를 벽에 부딪치는 사고를 냈으나 크게 다치지는 않았다. 최근 새로운 책에 대한 구상이 한꺼번에 떠오른다며 식사도 거르고 잠을 자려 하지 않고 며칠 동안 밤새 글을 쓰고 있었다고 하며 굉장한 기운을 느끼고 날아갈 것 같은 기분이 든다며 급기야는 옷을 벗고 뒷산에서 뛰어다니는 모습이 동네 주민에게 발견되어 경찰서에 신고되었으며, 응급실로 강제로 내원하게 되었다. 정신과 전공의에게 '자신을 음해하려는 무리와 한 통속이다.'라며 긴장된 표정으로 말을 거의 하지 않았으며, 기회를 엿보다가 응급실을 탈출하려다 안전 요원들에게 저지당하자 무릎을 꿇고 자신을 죽이지 말아 달라며 간청하는 모습을 보여 정신과 병동으로 입원하였다. 상기 진단에 대한 옳은 내용은?", "images": [], "text_box": null, "options": ["여성에서 남성보다 유병율이 높다.", "조증보다는 우울증 삽화 시 만성 경과가 더 많고 회복도 더 높다.", "기혼자에서 더 많다.", "삽화 빈도와 지속기간은 나이가 들수록 감소한다.", "자살률은 우울 삽화 시 보다 조증에서 현저히 높다."], "answer": [4], "explanation": "양극성 장애 환자의 자살률은 우울 삽화 시에 조증 삽화 시보다 현저히 높게 나타납니다. 우울 삽화 동안의 절망감, 무력감, 자살 사고는 자살 행동으로 이어질 가능성이 큽니다. 반면 조증 삽화에서는 충동적인 행동이 나타날 수 있지만, 전반적인 기분 고양 때문에 자살률이 상대적으로 낮습니다. 따라서 자살률이 우울 삽화에서 더 높다는 설명이 옳은 내용입니다."}, {"subject": "양극성 장애", "year": "16학번", "professor": "박원명", "question": "기존 1형 양극성장애로 외래치료를 유지하던 45세 여자가 자신이 날개가 있고 뛰어내려도 날 수 있다는 쇠가 들린다며 정신병적 증상을 동반한 조증 삽화로 입원했다. 주임교사로서 학교에서 능력을 인정받고 있었다고 하며, 10년 이상 하루에 한 갑의 흡연력이 있었다. 과거력상 약 10년 전 첫 조증 삽화로 정신과 치료를 시작한 후 현재까지 안정적인 경과로 지내왔었다. 부정적 예후 시사하는 인자는? 15학번", "images": [], "text_box": null, "options": ["여성", "병전 사회-직업적 상태", "흡연", "조증삽화가 주로 나타나는 유형 (mania prone subtype)", "정신병적 증상 등반"], "answer": [4], "explanation": "양극성 장애의 예후에 영향을 미치는 여러 인자 중 정신병적 증상 동반은 부정적 예후와 관련이 깊습니다. 정신병적 증상이 나타나는 경우, 그렇지 않은 경우보다 치료 반응이 좋지 않고 재발률이 높으며 기능적 손상이 더 심한 경향이 있습니다. 환자는 현재 정신병적 증상을 동반한 조증 삽화를 겪고 있으므로, 이는 부정적 예후를 시사하는 중요한 인자입니다."}, {"subject": "양극성 장애", "year": "15학번", "professor": "박원명", "question": "35세 양극성 장애 환자가 안정적인 경과로 유지치료 중이다. 환자는 21세에 한 차례 조증 삽화가 있었고, 이후에는 총 4회의 주요우울삽화가 있었다. 1년 전에는 신부전 진단을 받았고, 현재 투석을 고려중인 상황이다. 적합한 약물은?", "images": [], "text_box": null, "options": ["Fluoxetine", "Haloperidol", "Lamotrigine", "Lithium", "Lorazepam"], "answer": [2], "explanation": "양극성 장애의 유지 치료에는 리튬(Lithium)과 라모트리진(Lamotrigine) 등이 사용됩니다. 그러나 환자는 신부전 진단을 받았고 투석을 고려 중인 상황이므로 신장으로 배설되는 리튬은 상대적 금기 약물입니다. 라모트리진은 주로 간 대사를 통해 배설되므로 신기능 저하 환자에게 더 안전하게 사용할 수 있습니다. 따라서 신부전이 있는 환자에게 가장 적합한 약물은 라모트리진입니다."}, {"subject": "양극성 장애", "year": "14학번", "professor": "박원명", "question": "27세 남자가 갑자기 평소에 안하던 공부를 밤을 새워가며 하고, 평소와 달리 주변 사람들에게 화를 내며 흥분하는 모습을 보였다. 이 환자는 현재 갑상선기능저하증으로 치료를 받고 있다. 이 환자에게 적합한 치료제는? 12학번, 11학번", "images": [], "text_box": null, "options": ["Lithium", "Valproate", "Lamotrigine", "Imipramine", "Fluoxetine"], "answer": [1], "explanation": "환자는 갑자기 평소와 다른 과도한 행동과 흥분 양상을 보이며 조증 삽화로 진단됩니다. 동시에 갑상선기능저하증으로 치료받고 있다는 점이 중요합니다. 리튬(Lithium)은 갑상선 기능 저하를 유발하거나 악화시킬 수 있어 갑상선 질환 환자에게는 사용에 주의해야 합니다. 발프로에이트(Valproate)는 갑상선 기능에 영향을 덜 주면서 조증 치료에 효과적인 기분 안정제이므로, 현재 환자에게 가장 적합한 치료제입니다."}, {"subject": "양극성 장애", "year": "13학번", "professor": "박원명", "question": "25세의 여자가 30일 전부터 말이 많고 자신감이 넘치며 돈을 낭비하는 증상으로 한다. 혈액 검사 상 결과는 다음과 같다. 적합한 약물은? 백혈구 2,500/ml, 아스파르테이트아미노산전이효소 90IU/L 알라닌알라닌아미노전이효소 120 IU/L", "images": [], "text_box": null, "options": ["Lithium", "Alprazolam", "Carbamazepine", "Paroxetine", "Valproate"], "answer": [0], "explanation": "환자는 말이 많고 자신감이 넘치며 돈을 낭비하는 조증 삽화의 증상을 보입니다. 혈액 검사에서 백혈구 감소증(2,500/ml)과 간 기능 이상(ALT 120IU/L)이 확인되었습니다. 발프로에이트(Valproate)와 카바마제핀(Carbamazepine)은 간독성 및 백혈구 감소증 부작용이 있어 사용이 어렵습니다. 따라서 양극성 장애 조증의 1차 치료제인 리튬(Lithium)이 가장 적합한 약물입니다. 리튬은 간 기능에 영향을 덜 주고 백혈구 감소증을 유발하지 않습니다."}, {"subject": "양극성 장애", "year": "13학번", "professor": "박원명", "question": "29세 여자가 10일 전부터 말이 많고 과소비를 하는 경향이 있어 찾아왔다. 현재 임신 10주이며 혈액검사 결과는 다음과 같다. 적합한 치료 방법은? <백혈구 2500mm3, 아스파르테이트 90IU/L, 알라닌 120IU/L>", "images": [], "text_box": null, "options": ["Lithium", "Alprazolam", "Valproic acid", "Carbamazepine", "Electroconvulsive therapy(ECT)"], "answer": [4], "explanation": "환자는 임신 10주이며 조증 삽화를 보이고 있습니다. 임신 초기 3개월 이내에는 리튬(Lithium) 사용이 태아 기형 위험을 높일 수 있어 금기시됩니다. 또한 혈액 검사에서 백혈구 감소증과 간 기능 이상이 있어 카바마제핀(Carbamazepine)과 발프로익산(Valproic acid)도 부작용 위험 때문에 사용하기 어렵습니다. 이 경우 전기경련치료(ECT)는 임산부의 심한 정신과적 질환에 비교적 안전하고 효과적인 치료 방법입니다. 따라서 ECT가 가장 적합한 치료 방법입니다."}, {"subject": "양극성 장애", "year": "12학번", "professor": "박원명", "question": "45세 남자가 10년 전부터 반복적인 우울증과 조증 삽화로 치료를 받고 있다. 최근 시행한 검사실 검사에서 간기능 이상 및 백혈구 감소 소견을 보였다. 대체 치료제는?", "images": [], "text_box": null, "options": ["Lithium", "Clozapine", "paroxetine", "valproate", "carbamazepine"], "answer": [0], "explanation": "환자는 반복적인 양극성 장애를 앓고 있으며, 간 기능 이상과 백혈구 감소증 소견을 보입니다. 발프로에이트(Valproate)와 카바마제핀(Carbamazepine)은 간독성을 유발할 수 있어 사용이 어렵습니다. 클로자핀(Clozapine)은 백혈구 감소증을 유발할 수 있으므로 피해야 합니다. 파록세틴(Paroxetine)은 항우울제로 양극성 장애에 단독 사용은 조증 전환 위험이 있어 부적절합니다. 따라서 이 경우 간독성 및 혈액학적 부작용이 적은 리튬(Lithium)이 가장 적합한 대체 치료제입니다."}, {"subject": "양극성 장애", "year": ["12학번", "11학번"], "professor": "박원명", "question": "23세 여성 반복적인 조증삽화와 우울삽화로 인하여 내원하였다. 작년에도 1년 동안 2번의 조증 삽화와 3번의 우울삽화가 있었으며 현재는 주위 사람들에게 화를 잘 내고 매일 밤을 새워가며 학업에 열중한다고 한다. 가장 적합한 약물은? 11학번", "images": [], "text_box": null, "options": ["Valproate", "Fluoxetine", "Lorazepam", "Lamotrigine", "Acamprosate"], "answer": [0], "explanation": "환자는 1년에 4회 이상의 삽화(2번의 조증, 3번의 우울)를 보였으므로 급속 순환형 양극성 장애로 진단됩니다. 현재는 과민하고 학업에 열중하는 조증 삽화 상태입니다. 급성 조증 삽화 및 급속 순환형 양극성 장애에는 발프로에이트(Valproate)가 가장 적절한 치료 약물로 알려져 있습니다. 플루옥세틴은 항우울제로 조증 전환 위험이 있으며, 라모트리진은 주로 우울 삽화에 효과적입니다."}, {"subject": "양극성 장애", "year": ["10학번", "09학번", "08학번", "07학번"], "professor": "박원명", "question": "34세 여자 환자가 갑자기 목소리가 커지고 말이 많고 평소와 달리 자기 주장이 늘어났다. 식사도 바쁘다고 거르고 잠도 자지 않으며 분수에 넘치는 값비싼 물건을 사들였다. 입원 당시에 환자는 쉴 새 없이 떠들고 몹시 흥분한 모습을 보였다. 이 환자의 치료에 사용할 수 있는 약들이 아닌 것은?", "images": [], "text_box": null, "options": ["Carbamazepine", "Fluoxetine", "Aripiparazole", "Lithium", "Olanzapine"], "answer": [1], "explanation": "환자는 과다한 언행, 과도한 자기 주장, 수면 감소, 과소비, 흥분 등의 증상을 보이는 조증 삽화로 진단됩니다. 조증 삽화의 치료에는 기분 안정제(리튬, 카바마제핀)나 항정신병약물(아리피프라졸, 올란자핀)이 주로 사용됩니다. 플루옥세틴(Fluoxetine)은 항우울제로, 조증 치료에는 적절하지 않으며 단독 사용 시 조증을 유발하거나 악화시킬 수 있습니다. 따라서 플루옥세틴은 이 환자의 치료에 사용할 수 없는 약물입니다."}, {"subject": "양극성 장애", "year": ["10학번", "09학번", "08학번"], "professor": "박원명", "question": "26세의 기혼여성이 응급실을 경유하여 입원하였다. “나는 지금 종교계의 현실이 마음에 들지 않는다. 추기경과 대통령에게 가서 개인적으로 할 이야기가 있다.” 고 말하면서 병실을 계속 들락거리고, 흥분된 모습을 보이고 있었다. 이 증례의 환자에게 투여할 약물 중 가장 적절한 것은?", "images": [], "text_box": null, "options": ["Amitriptyline", "Lithium", "Fluoxetine", "thyroid hormone", "clomipramine"], "answer": [1], "explanation": "환자는 과대사고, 흥분, 활동량 증가 등 조증 삽화의 전형적인 증상을 보이며 정신병적 사고(종교적 망상)도 동반하고 있습니다. 조증 삽화의 급성기 치료에는 기분 안정제가 1차적으로 사용됩니다. 리튬(Lithium)은 조증 삽화에 가장 효과적인 1차 치료제 중 하나로, 증상 조절에 탁월한 효과를 보입니다. 다른 선택지는 주로 항우울제이거나 갑상선 호르몬이므로 급성 조증 치료에는 부적절합니다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "20학번", "professor": "정규인", "question": "21세 남자가 낮에 주체할 수 없이 쏟아지는 잠 때문에 수업을 들을 수 없다고 내원하였다. 대화 중 크게 웃다가 갑자기 팔다리에 힘이 빠져 주저앉은 적이 여러 번 있었고 의식은 잃지 않았다고 한다. 밤에 수면 중 자주 가위에 눌린다고 하였다. 밑줄 친 증상에 대한 약물 치료는?", "images": [], "text_box": null, "options": ["Indenol", "Fluoxetine", "Haloperidol", "Benztropine", "Lorazepam"], "answer": [1], "explanation": "진단은 기면병이며, 밑줄 친 증상은 탈력발작임. 탈력발작은 강한 감정 변화 시 근력 저하를 유발하는 기면병의 특징적인 증상이다. 치료는 항우울제(fluoxetine), 중추신경억제제, 히스타민3길항제 등이 사용될 수 있다. Fluoxetine은 세로토닌 재흡수 억제제로, 탈력발작 증상 완화에 기여한다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "20학번", "professor": "정규인", "question": "55세 남자가 수면 중 코골이와 일정기간 숨을 멈추는 증상이 배우자에 관찰되어 수면다원검사를 실시하였다. 주간졸리움, 내외과적 질환이나 뇌졸중 기왕력, 비만, 불면증, 우울증, 인지저하 등의 병력은 없었다. 이 환자의 경우 CPAP이 적용될 수 있는 국내 국민건강보험공단 AHI (apnea-hypopnea index) 기준은?", "images": [], "text_box": null, "options": ["5이상", "10이상", "15이상", "20이상", "30이상"], "answer": [2], "explanation": "AHI(apnea-hypopnea index)가 5 이상이면서 주간졸리움, 불면증, 인지기능 감소, 기분장애, 고혈압, 빈혈성 심장질환, 뇌졸중 기왕력, 산소포화도 85% 중 하나 이상 동반하는 경우 CPAP 적용이 된다. 그러나 AHI가 15 이상인 경우에는 동반 유무에 관계없이 CPAP 적용이 가능하다. 제시된 환자는 동반 질환이 없지만 AHI 기준에 따라 CPAP 적용이 가능하다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "20학번", "professor": "정규인", "question": "22세 남자가 낮 동안에 지나치게 졸리면서 자신도 모르게 잠에 빠지는 일이 많아서 내원하였다. 수일 전에는 친구들과 웃다가 갑자기 힘이 빠져 주저앉은 적이 있다고 하였다. 잠이 들 무렵 종종 헛것이 보인다고 하였다. 밑줄 친 증상에 대한 치료약물은?", "images": [], "text_box": null, "options": ["modafinil", "levodopa", "risperidone", "clonazepam", "carbamazepine"], "answer": [0], "explanation": "환자의 증상은 기면병을 시사하는 주간 과도한 졸림, 탈력발작, 입면 시 환각을 포함한다. 기면병의 과도한 졸림에 대한 치료제는 중추신경자극제(modafinil), 도파민(혹은 노르에피네프린) 흡수차단제, 히스타민3길항제 등이 있다. Modafinil은 각성을 촉진하여 주간 졸림증을 개선하는 데 효과적인 약물이다. 따라서 Modafinil이 적절한 치료약물이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "20학번", "professor": "정규인", "question": "68세 여자가 3년 전부터 시작된 불면증을 주소로 내원하였다. 자려고 누우면 다리가 근질거려 잠들기 어렵다고 한다. 움직이면 증상이 완화되거나 가만히 있으면 심해지며, 저녁에 증상이 심하다고 하다. 기본혈액검사에서 이상소견은 없었다. 치료는?", "images": [], "text_box": null, "options": ["lithium", "fluoxetine", "imipramine", "haloperidol", "clonazepam"], "answer": [4], "explanation": "제시된 증상은 하지불안증후군(Restless Legs Syndrome, RLS)의 전형적인 특징이다. RLS는 다리의 불편한 감각과 움직이고 싶은 충동을 특징으로 하며, 주로 저녁이나 밤에 악화되고 움직이면 완화된다. 치료제로는 도파민 효능제(ropinirole, pramipexole), 벤조디아제핀(clonazepam), 오피오이드 등이 사용된다. Clonazepam은 수면을 유도하고 다리 움직임을 줄여 증상 완화에 기여한다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "19학번", "professor": "홍승철", "question": "??세 환자가 밤마다 잠에 잠이 잘 안온다고 해서 내원. 잠에 드는 시간이 오래 걸리고 총 수면 시간은 정상이었다. 적절한 치료제는?", "images": [], "text_box": null, "options": ["histamine agonist", "dopamine agonist", "melatonin antagonist", "GABA antagonist", "orexin antagonist"], "answer": [4], "explanation": "환자는 잠들기 어려워하는 불면증 증상을 보인다. 오렉신 길항제는 불면증 치료에 사용되는 약물 중 하나로, 각성을 유발하는 오렉신 신경전달물질의 작용을 억제하여 수면을 유도한다. 다른 선택지들은 수면을 억제하거나 다른 기전으로 작용하여 적절하지 않다. 따라서 오렉신 길항제가 적절한 치료제이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": ["19학번", "17학번"], "professor": "홍승철", "question": "52세 남자(고혈압, 낮졸림증, BMI 32), 코골이와 무호흡증을 주소로 내원했다. 수면다원검사결과에서 AHI가 45였다. 적절한 치료는?", "images": [], "text_box": null, "options": ["고혈압약", "상기도확장술", "중추신경계 흥분제", "CPAP", "체중감량"], "answer": [3], "explanation": "환자는 고혈압, 낮졸림증, 비만(BMI 32)을 동반한 폐쇄성 수면무호흡증을 앓고 있으며, AHI가 45로 중증에 해당한다. AHI 15 이상이면 동반 유무와 관계없이 지속적 양압술(CPAP)이 적용된다. 따라서 CPAP은 이 환자에게 가장 효과적이고 우선적으로 고려되는 치료 방법이다. 체중 감량도 중요하지만, 즉각적인 증상 개선에는 CPAP이 필수적이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "19학번", "professor": "홍승철", "question": "7세 남아가 밤마다 잠이든지 2시간 후 갑자기 일어나 2~3분 반복적인 행동을 하다가 다시 잠이 드는 증상으로 병원을 방문하였다. 부모가 깨우려 해도 정신을 못 차리다 다시 잠이 들었으며 다음날 아침에는 밤에 있었던 일을 기억하지 못하였다. 진단과 평가도구의 조합으로 옳은 것은?", "images": [], "text_box": null, "options": ["경련성질환-뇌파(EEG)", "기면증-다중수면잠복기검사(MSLT)", "몽유병-수면다원검사(PSG)", "야경증(비디오촬영)", "하지불안증-ferritin검사"], "answer": [0], "explanation": "제시된 증상은 야경증이나 몽유병과 유사하게 보일 수 있으나, 정신을 못 차리거나 다음날 기억하지 못하는 행동은 경련성 질환을 감별해야 한다. 특히 소아에서 나타나는 반복적인 행동과 각성곤란은 경련성 질환의 가능성을 시사하므로, 뇌파(EEG) 검사를 통해 감별 진단이 필수적이다. MOM에서도 간질과의 감별을 위해 EEG 촬영을 강조한다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": ["17학번", "15학번", "19학번"], "professor": "홍승철", "question": "6세 남아가 밤마다 깨어 멍하니 허공을 바라보며 손가락을 움직이는 자동행동을 하다 다시 잠들고는, 다음날 기억하지 못하는 증상으로 내원했다. 감별진단을 위해 필요한 검사?", "images": [], "text_box": null, "options": ["MSLT", "EEG", "Actigraphy", "ECG", "EMG"], "answer": [1], "explanation": "제시된 증상은 소아에서 나타나는 반복적인 자동행동과 기억 상실을 동반하며, 이는 몽유병이나 야경증과 유사하게 보일 수 있다. 그러나 '멍하니 허공을 바라보며 손가락을 움직이는 자동행동'은 간질성 발작의 한 형태로 나타날 수 있다. 따라서 이러한 증상에 대한 감별진단으로는 뇌파검사(EEG)가 가장 중요하게 요구된다. EEG는 뇌의 전기적 활동을 측정하여 간질성 발작을 진단하는 데 필수적이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "18학번", "professor": "정규인", "question": "수면위생의 내용으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["아침 기상시간은 늘 일정하게 유지한다.", "취침 직전에 격렬한 운동을 하는 것이 좋다.", "취침 전 술을 마시는 것은 불면에 도움이 된다.", "시장해도 밤에 간식을 섭취하는 것은 좋지 않다.", "침대에 일거리를 가지고 들어가서 졸릴 때까지 한다."], "answer": [0], "explanation": "수면 위생은 양질의 수면을 위한 건강한 습관을 의미한다. 아침 기상 시간을 일정하게 유지하는 것은 생체 시계를 조절하고 규칙적인 수면-각성 주기를 확립하는 데 가장 중요하다. 취침 직전의 격렬한 운동, 음주, 그리고 침대에서 수면 외 활동은 수면을 방해하므로 피해야 한다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "18학번", "professor": "정규인", "question": "수면장애가 있는 81세 노인에게 할 수 있는 조언으로 적절한 것은?", "images": [], "text_box": null, "options": ["매일 일정한 시간에 자고 일어나는 것이 좋습니다.", "전날 1시간밖에 자지 못했다면 낮잠을 자는 것이 좋습니다.", "아침에 일어나면 따뜻한 물에 목욕하는 것이 좋습니다.", "몸을 피곤하게 하기 위해 하루 2~3시간 운동을 해야 합니다.", "적당한 알코올은 잠을 유도할 수 있으므로 자기 전 한 두 잔 마십니다."], "answer": [0], "explanation": "노인의 수면 장애 관리에서 가장 중요한 수면 위생 지침 중 하나는 규칙적인 수면-각성 패턴을 유지하는 것이다. 매일 같은 시간에 자고 일어나는 것은 생체 시계를 안정화하여 수면의 질을 개선하는 데 도움이 된다. 낮잠은 가능한 한 피하거나 짧게 제한하는 것이 좋으며, 취침 전 알코올이나 격렬한 운동은 수면을 방해할 수 있다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "17학번", "professor": "정규인", "question": "수면위생의 내용으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["아침 기상시간은 늘 일정하게 유지한다.", "취침 직전에 격렬한 운동을 하는 것이 좋다.", "취침 전 술을 마시는 것은 불면에 도움이 된다.", "시장해도 밤에 간식을 섭취하는 것은 좋지 않다.", "침대에 일거리를 가지고 들어가서 졸릴 때까지 한다."], "answer": [0], "explanation": "수면 위생은 건강한 수면 습관을 유지하여 불면증을 예방하고 치료하는 중요한 요소이다. 매일 일정한 시간에 기상하는 것은 생체 리듬을 규칙적으로 유지하는 데 필수적이다. 취침 직전의 격렬한 운동이나 알코올 섭취는 수면을 방해하며, 침대는 오직 수면만을 위한 공간으로 활용해야 한다. 또한, 과도한 공복 상태는 수면을 방해할 수 있으나, 가벼운 간식은 괜찮다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "17학번", "professor": "정규인", "question": "16세 남환이 6개월 전부터 시작된 낮졸림 증상과 걷다가도 쓰러질 정도의 탈력발작을 경험하며, 잠들려고 할 때 발생하는 전신근육의 마비와 환각을 주소로 내원하였다. 이 환자의 수면장애에 대한 설명으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["수면발작은 대게 1시간 이상 지속된다.", "낮에 졸린 증상이 1개월 이상이면 진단이 가능하다.", "탈력발작은 웃거나 놀라는 등의 강한 정서적 자극과 연관되어 유발된다.", "야간 수면은 중간에 깨워도 일어날 수 없을 정도의 깊은 수면이 특징이다.", "일면잠복기반복검사에서 5회 이상의 sleep-onset REM (SOREM)이 진단에 필수적이다."], "answer": [2], "explanation": "제시된 증상들은 기면병의 전형적인 특징들을 나타낸다. 탈력발작은 강한 웃음, 분노, 놀람과 같은 정서적 자극에 의해 갑자기 근육의 힘이 빠지는 현상으로, 기면병의 핵심 증상 중 하나이다. 수면발작은 수초에서 수십분간 지속되며, 낮 졸림 증상만으로는 진단이 불충분하다. 야간 수면은 분절화되어 자주 깨는 특징이 있으며, MSLT에서 2회 이상의 SOREM이 진단 기준이 된다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "17학번", "professor": "홍승철", "question": "불면증 치료제로서의 수면유도제 기전에 해당되는 것은?", "images": [], "text_box": null, "options": ["도파민 작용제 (Dopamine agonist)", "오렉신 길항제 (Orexin antagonist)", "히스타민 작용제 (Histamine agonist)", "멜라토닌 길항제 (Melatonin antagonist)", "감마아미노부티르산 길항제 (GABA antagonist)"], "answer": [1], "explanation": "불면증 치료에 사용되는 수면유도제는 다양한 기전을 가진다. 오렉신 길항제는 각성을 촉진하는 오렉신 시스템을 억제하여 수면을 유도하는 작용을 한다. 멜라토닌 작용제, GABA 작용제 등도 수면 유도에 사용되지만, 이 중 '오렉신 길항제'가 수면 유도제로 직접적으로 해당된다. 각성 기전을 억제하여 수면을 돕는 것이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "16학번", "professor": "정규인", "question": "다음 수면유도체 중 반감기가 제일 긴 약물은?", "images": [], "text_box": null, "options": ["circadin", "zaleplon", "zolpidem", "triazolam", "flurazepam"], "answer": [4], "explanation": "수면유도제의 반감기는 약물의 작용 지속 시간을 결정하는 중요한 요소이다. Zaleplon, zolpidem, triazolam 등은 비교적 짧은 반감기를 가지는 반면, flurazepam은 40-100시간에 이르는 매우 긴 반감기를 가진다. 이는 약물이 체내에 오래 머물러 다음 날까지 졸림을 유발할 수 있음을 의미한다. 따라서 flurazepam이 이들 중 가장 긴 반감기를 가진다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "16학번", "professor": "정규인", "question": "Sleep Onset REM(SOREM)이 되기 위한 REM latency 의 기준은?", "images": [], "text_box": null, "options": ["5분", "8분", "10분", "15분", "30분"], "answer": [3], "explanation": "Sleep-Onset REM(SOREM)은 기면병 진단의 핵심적인 수면다원검사 소견 중 하나이다. SOREM은 잠들기 시작한 후 15분 이내에 렘수면이 나타나는 현상을 의미한다. 정상적인 REM 수면 잠복기는 약 90분 이상이므로, 15분 이내의 렘수면 출현은 비정상적인 수면 구조를 나타낸다. 이는 기면병을 다른 수면 장애와 감별하는 데 중요한 지표이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "16학번", "professor": "정규인", "question": "7세 남아가 밤마다 잠이든지 2시간 후 갑자기 일어나 5분간 방안을 돌아다녀서 병원을 방문하였다. 부모가 깨우려해도 정신을 못차리다 다시 잠이 들었으며, 다음날 아침에는 밤에 있었던 일을 기억하지 못하였다. 증상이 나타나는 수면단계의 정상수면 뇌파의 특징은?", "images": [], "text_box": null, "options": ["K-complex", "Delta waves", "Sleep spindle", "Sawtooth waves", "Mixed frequency waves"], "answer": [1], "explanation": "제시된 증상은 몽유병(수면 보행증)에 해당하며, 몽유병은 주로 깊은 비렘수면 3단계(NREM3) 또는 4단계(NREM4, 현재는 NREM3에 통합)에서 발생한다. 이 단계는 서파수면(slow-wave sleep)이라고도 불리며, 뇌파에서 고진폭의 델타파(Delta waves)가 20% 이상(특히 4단계에서는 50% 이상) 나타나는 것이 특징이다. 델타파는 깊은 수면을 나타내는 지표이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "16학번", "professor": "정규인", "question": "수면 중 무호흡을 호소하는 환자가 수면다원검사를 실시한 결과 AHI가 15였다. AASM 기준에 따라 CPAP의 적응증이 되는 것은?", "images": [], "text_box": null, "options": ["코골이", "불면증", "인지기능저하", "주간졸림증", "뇌졸중경력"], "answer": [3], "explanation": "AASM 기준에 따르면 AHI가 15 이상이면 폐쇄성 수면무호흡증으로 진단되며 CPAP의 적응증이 된다. 또한, AHI가 5 이상이면서 주간 졸림증, 인지기능 저하, 고혈압, 뇌졸중 기왕력 등 동반 증상이 있을 때도 CPAP 적응증이 된다. 이 질문은 AHI가 15일 때 CPAP 적응증이 되는 추가적인 요소를 묻고 있으므로, 주간 졸림증은 CPAP 적응증을 강화하는 요소이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "15학번", "professor": "홍승철", "question": "narcolepsy type 1과 type 2를 구분하는 기준은?", "images": [], "text_box": null, "options": ["탈력발작", "수면마비", "입면식 환각", "야간수면장애", "주간졸림증"], "answer": [0], "explanation": "기면병 1형은 탈력발작의 존재와 뇌척수액 내 하이포크레틴(hypocretin) 수치 감소로 진단된다. 반면 기면병 2형은 탈력발작이 없고, 하이포크레틴 수치가 정상인 경우를 의미한다. 따라서 탈력발작의 유무가 두 유형을 구분하는 핵심적인 기준이다. 이는 기면병 진단에서 매우 중요한 요소이며, 치료 접근에도 영향을 미친다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "15학번", "professor": "홍승철", "question": "지속적 양압술(CPAP)이 중증도 이상의 폐쇄성, 수면무호흡증의 치료에 gold standard로 되어있는데, 치료효과 해당하는 것은?", "images": [], "text_box": null, "options": ["낮졸림증 감소", "산소포화도 감소", "렘수면 감소", "서파수면 감소", "혈압증가"], "answer": [0], "explanation": "지속적 양압술(CPAP)은 폐쇄성 수면무호흡증의 효과적인 치료법으로, 주된 치료 효과는 수면 중 기도를 개방하여 수면의 질을 향상시키는 것이다. 이는 수면 분절을 줄이고, 결과적으로 환자의 주간 과도한 졸림증을 현저히 감소시킨다. 산소포화도 개선 등 다른 효과도 있지만, 직접적인 질문의 의도는 주간 증상 개선에 있다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "14학번", "professor": "정규인", "question": "다음 중 기면병에서 나타나는 것이 아닌 것은?", "images": [], "text_box": null, "options": ["탈력발작", "수면마비", "입면시 환각", "REM 수면 latency 의 증가(=REM 잠복 증가)", "HLA-DR2 양성"], "answer": [3], "explanation": "기면병의 주요 증상으로는 주간 과도한 졸림증, 탈력발작, 수면마비, 입면 시 환각이 있다. 또한, 수면다원검사에서 REM 수면 잠복기(latency)가 현저히 감소하여, 잠이 든 후 빠르게 렘수면에 진입하는 특징을 보인다. HLA-DR2 양성 또한 기면병과 관련된 유전적 소견이다. 따라서 REM 수면 잠복기의 증가는 기면병에서 나타나는 소견이 아니다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "14학번", "professor": "정규인", "question": "다음 수면 유도제 중 반감기가 가장 긴 약물은?", "images": [], "text_box": null, "options": ["Zaleplon", "Zolpidem", "Triazolam", "Ramelteon", "eszopiclone"], "answer": [4], "explanation": "다양한 수면 유도제들은 각각 다른 반감기를 가지고 있다. Zaleplon은 약 1시간, Zolpidem은 2-4시간, Triazolam은 2-5시간, Ramelteon은 1-2.5시간의 반감기를 가진다. 반면, eszopiclone은 5-7시간으로 상대적으로 긴 반감기를 가지고 있어 작용 시간이 더 길다. 따라서 eszopiclone이 이들 중 가장 긴 반감기를 가진다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "14학번", "professor": "정규인", "question": "7세 남아가 밤마다 잠이든지 2시간 후 갑자기 일어나 5분간 방안을 돌아다녀서 병원을 방문하였다. 부모가 깨우려해도 정신을 못차리다 다시 잠이 들었으며, 다음날 아침에는 밤에 있었던 일을 기억하지 못하였다. 증상이 나타나는 수면단계는?", "images": [], "text_box": null, "options": ["NREM 1단계", "NREM 2단계", "NREM 3단계", "NREM 4단계", "NREM 5단계"], "answer": [3], "explanation": "제시된 증상은 몽유병(수면 보행증)의 전형적인 사례로, 몽유병은 주로 깊은 비렘수면 단계에서 발생한다. 과거에는 비렘수면 3단계와 4단계로 구분했으나, 현재는 3단계로 통합되었다. 델타파가 우세한 깊은 수면 단계에서 나타나는 특징을 보이므로, 이전 분류 기준인 NREM 4단계에 해당한다고 볼 수 있다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "14학번", "professor": "정규인", "question": "50세 남자가 수면 중 일정기간 숨을 멈추는 증상 및 주간졸림증이 지속되어 수면다원검사를 실시하였다. 내외과적 질환이나 비만, 불면증, 우울증이 없었다. 이 환자의 경우 CPAP가 적용될 수 있는 AASM AHI 기준은?", "images": [], "text_box": null, "options": ["5이상", "10이상", "15이상", "20이상", "30이상"], "answer": [0], "explanation": "AASM(미국 수면의학회) 기준에 따르면, 폐쇄성 수면무호흡증 진단 시 AHI가 5 이상이면서 주간 졸림증이나 기타 관련 증상(예: 고혈압, 심장병 등)이 동반되는 경우 CPAP 치료의 적응증이 된다. 환자는 주간 졸림증이 지속되고 있으며 내외과적 질환, 비만 등이 없으므로, AHI 5 이상이 CPAP 적용 기준이 된다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "13학번", "professor": "홍승철", "question": "13세 여아가 2009년 신종플루백신을 맞은 지 6개월 이내에 심한 낮졸림증과 웃을 때 몸이 힘이 빠져 몸을 못 가누는 탈력발작 증상을 보여 병원에 왔다. 이러한 환자들의 공통점은? (올해 강조 내용)", "images": [], "text_box": null, "options": ["약한 탈력발작", "mild MSLT", "15세 이하의 여아들", "HLA DQB1*0602 양성", "immunoglobulin 치료"], "answer": [3], "explanation": "제시된 증상은 신종플루 백신 접종 후 발생한 기면병 1형의 전형적인 소견이다. 기면병 1형은 자가면역 질환으로 알려져 있으며, HLA-DQB1*0602 유전자형과 강한 연관성을 보인다. 특히 H1N1 백신 접종 후 기면병 발생 사례는 이러한 유전적 취약성과 자가면역 반응의 관련성을 뒷받침한다. 따라서 이러한 환자들의 공통점은 HLA-DQB1*0602 양성이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "13학번", "professor": "홍승철", "question": "불면증의 dsm-5 진단기준에 맞는 것은?", "images": [], "text_box": null, "options": ["불면 지속 기간이 1개월", "최소 주 1회의 불면 증상", "약물(substance)에 의한 불면증", "불면으로 인한 낮 동안의 기능장애", "비회복수면 (non-restorative sleep)"], "answer": [3], "explanation": "DSM-5 불면증 진단 기준에 따르면, 증상 지속 기간은 3개월 이상이어야 하며, 최소 주 3회 이상의 불면 증상이 나타나야 한다. 또한, 불면증은 약물이나 다른 질환에 의해 직접적으로 유발된 것이 아니어야 한다. 가장 중요한 기준 중 하나는 불면으로 인해 낮 동안 상당한 기능 장애나 고통이 동반되어야 한다는 점이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "13학번", "professor": "홍승철", "question": "67세 남자가 자다가 격렬한 행동을 하면서 침대에서 떨어져서 고관절이 골절되어 병원에 왔다. 수년전부터 수면 도중 벽에 몸을 부딪히는 행동이 반복되었다. 흔히 생길 수 있는 신경퇴행성 질환은?", "images": [], "text_box": null, "options": ["Alzheimer's disease", "Parkinson's disease", "Huntington's chorea", "Multiple system atrophy", "Dementia with Lewy bodies"], "answer": [1], "explanation": "주어진 증상은 렘수면 행동장애(REM sleep behavior disorder, RBD)의 전형적인 사례이다. RBD는 렘수면 동안 꿈 내용을 행동으로 옮기는 것으로, 특히 배우자를 다치게 하거나 본인이 다치는 등의 격렬한 행동을 동반할 수 있다. RBD는 파킨슨병, 다계통 위축증, 루이소체 치매와 같은 시누클레인병증(synucleinopathy)의 전구 증상으로 알려져 있으며, 그중 파킨슨병이 가장 흔하게 동반된다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "13학번", "professor": "홍승철", "question": "45세 남자가 심한 코골이로 내원하여 수면다원검사를 실시하였다. DSM-5 기준으로 중증(severe)에 속하는 AHI(수면무호흡지수)는?", "images": [], "text_box": null, "options": ["5이상", "10이상", "15이상", "20이상", "30이상"], "answer": [4], "explanation": "수면무호흡지수(AHI)는 수면무호흡증의 심각도를 평가하는 중요한 지표이다. DSM-5 기준에 따르면, AHI가 5 미만이면 정상, 5 이상 15 미만이면 경증, 15 이상 30 미만이면 중등증, 그리고 30 이상이면 중증(severe) 폐쇄성 수면무호흡증으로 분류된다. 따라서 중증에 해당하는 AHI 기준은 30 이상이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "13학번", "professor": "홍승철", "question": "우울증 생물학적 리듬과 관계로 옳은 것은?", "images": [], "text_box": null, "options": ["우울증환자는 조기기상, REM 수면 잠복기 증가 등이 관찰될 수 있다", "Exogenous zeitgeber가 없으면 circadian rhythm은 23.5시간이다", "Circadian rhythm의 sleep sensitive phase가 delay 되었을 때 우울증이 발생한다", "인공적으로 빛을 주거나 수면-각성주기를 변화시켜 우울증상을 호전시킬 수 있다", "Lithium, TCA, MAOI는 동물실험에서 Sleep sensitive phase advance를 유발시킨다."], "answer": [3], "explanation": "우울증 환자들은 종종 수면-각성 주기의 교란을 경험하며, 이는 생체 리듬과 밀접하게 관련되어 있다. 인공적인 빛 치료나 수면-각성 주기 조절은 우울증 증상을 개선하는 데 효과적인 비약물적 치료 방법으로 알려져 있다. 이는 생체 시계를 재조정하여 우울증의 생물학적 기전에 긍정적인 영향을 미치기 때문이다. 빛은 강력한 자이트게버(zeitgeber)로 작용한다."}, {"su

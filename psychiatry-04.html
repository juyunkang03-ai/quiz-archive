bject": "기본욕구 관련 정신장애 (수면장애)", "year": "13학번", "professor": "홍승철", "question": "청소년의 멜라토닌 분비 특성으로 나타나는 위상변화(phase shifting)와 관련된 수면장애는?", "images": [], "text_box": null, "options": ["delayed sleep phase type", "advanced sleep phase type", "irregular sleep-wake type", "non-24-hour-sleep-wake type", "Shift work type"], "answer": [0], "explanation": "청소년기에는 멜라토닌 분비가 늦은 시간으로 이동하는 생리적인 위상 지연(phase delay) 경향이 있다. 이로 인해 청소년들은 밤늦게까지 잠들기 어려워하고 아침에 늦게 일어나는 수면-각성 주기를 보이는 경우가 많으며, 이는 '지연성 수면위상 증후군(delayed sleep phase type)'으로 진단될 수 있다. 이 장애는 사회적 생활 패턴과 충돌하여 학업 등에 영향을 미친다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "12학번", "professor": "정규인", "question": "기면병(Narcolepsy)의 5대 증상 중 가장 흔한 것은?", "images": [], "text_box": null, "options": ["탈력발작 (cataplexy)", "입면시 환각 (hypnagotic hallucination)", "수면마비 (sleep paralysis)", "주간졸림증 (excessive daytime sleepiness; EDS)", "야간수면장애 (nocoturnal sleep disturbance)"], "answer": [3], "explanation": "기면병의 5대 주요 증상 중 주간 과도한 졸림증(Excessive daytime sleepiness, EDS)이 가장 흔하게 나타난다. 거의 모든 기면병 환자가 낮 시간 동안의 참을 수 없는 졸림을 경험한다. 탈력발작은 80-90%의 환자에게 나타나며, 입면 시 환각, 수면마비, 야간 수면 장애는 이보다 낮은 빈도로 발생한다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "12학번", "professor": "정규인", "question": "20세 남자가 1년 전부터 주간에 과도하게 졸리고 웃거나 화날 때 갑자기 쓰러지며, 잠들려고 할 때 발생하는 전신이 마비되고 환각을 경험하여 내원하였다. 밑줄 친 부분 증상을 조절하기 위한 적절한 약물은?", "images": [], "text_box": null, "options": ["provigil", "propranolol", "venlafaxine", "clonazepam", "carbamazepine"], "answer": [2], "explanation": "환자의 증상인 '웃거나 화날 때 갑자기 쓰러지는 것'은 탈력발작(cataplexy)이며, 이는 기면병의 특징적인 증상이다. 탈력발작의 치료에는 세로토닌-노르에피네프린 재흡수 억제제(SNRI) 계열의 항우울제가 효과적이며, Venlafaxine이 그 대표적인 약물이다. Provigil은 주간 졸림증 치료에 사용된다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "12학번", "professor": "정규인", "question": "65세 남자가 자다가 싸우는 꿈을 꾸면서 고함을 지르고 벌떡 앉아 같이 자던 배우자를 때리거나 머리를 바닥에 부딪히는 행동을 자주 반복하여 내원. 수면다원검사상 안구움직임이 증가하면서 근긴장도도 같이 증가하였다. 치료약은?", "images": [], "text_box": null, "options": ["paroxetine", "propranolol", "haloperidol", "clonazepam", "methylphenidate"], "answer": [3], "explanation": "제시된 증상은 렘수면 행동장애(REM sleep behavior disorder, RBD)에 해당한다. RBD는 렘수면 동안 꿈 내용을 행동으로 옮기며, 렘수면 동안 발생하는 근육 무긴장증이 소실되어 나타난다. RBD의 일차 치료 약물은 Clonazepam이며, 이는 렘수면 행동과 관련된 근육 활동을 억제하여 증상을 완화한다. Melatonin 등 다른 약물도 사용될 수 있다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "12학번", "professor": "정규인", "question": "맹인에서 흔히 동반될 수 있는 일주기리듬 수면장애 아형은?", "images": [], "text_box": null, "options": ["delayed sleep phase type", "advanced sleep phase type", "irregular sleep-wake type", "non-24-hour-sleep-wake type", "Shift work type"], "answer": [3], "explanation": "맹인은 빛에 대한 노출이 없거나 매우 적기 때문에, 빛으로 조절되는 생체 시계(circadian rhythm)가 24시간 주기에 맞춰 동기화되지 못하는 경우가 많다. 이로 인해 내인성 생체 시계가 24시간보다 길거나 짧게 작동하며, '비24시간 수면-각성 주기 장애(non-24-hour-sleep-wake type)'가 흔히 발생한다. 이 장애는 수면과 각성 시간이 매일 불규칙하게 뒤로 밀리거나 앞으로 당겨지는 양상으로 나타난다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "11학번", "professor": "홍승철", "question": "기면병 치료중인 60세 여자가 복용하던 약물을 한달 간 끊고 갑자기 진료실에서 담당 의사를 보고는 반가워하다가 몸에 힘빠짐을 호소하며 바닥에 쓰러졌다. 쓰러져 있는 동안 의식은 보존되어 있었다. 이러한 증상과 이 증상에 대한 치료조합으로 옳은 것은?", "images": [], "text_box": null, "options": ["탈력발작 - Provigil", "수면마비 - zolpidem", "탈력발작 - venlafaxine", "탈력발작 - clonazepam", "수면마비 - carbamazepine"], "answer": [2], "explanation": "환자의 증상은 감정 변화에 의해 유발된 탈력발작(cataplexy)의 전형적인 소견이다. 기면병 환자에게 나타나는 탈력발작은 세로토닌-노르에피네프린 재흡수 억제제(SNRI)와 같은 항우울제로 조절할 수 있다. Venlafaxine은 SNRI 계열의 약물로, 탈력발작 치료에 효과적으로 사용된다. Provigil은 주간 졸림증 치료에 사용되므로 적절하지 않다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "11학번", "professor": "홍승철", "question": "일차성 불면증의 병태생리와 가장 관련이 있는 것은?", "images": [], "text_box": null, "options": ["초조", "우울", "조건화", "과각성", "성취 불안"], "answer": [3], "explanation": "일차성 불면증의 주요 병태생리 기전은 중추신경계의 과각성(hyperarousal) 상태와 밀접하게 관련되어 있다. 이는 잠들기 어렵고 수면을 유지하기 어려운 불면증 증상으로 나타나며, 신체적, 인지적, 감정적 과각성이 복합적으로 작용하여 불면증을 유발한다. 스트레스나 불안과 같은 요인들도 과각성을 심화시킬 수 있다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "11학번", "professor": "홍승철", "question": "BMI가 30kg/m2(정상 18~22)이고 AHI가 8인 남자에게 우선적으로 사용 해야하는 치료는?", "images": [], "text_box": null, "options": ["감량", "Acetazolamide 복용", "기관절개(tracheostomy)", "구개수구개인두성형술(uvulopalatopharyngoplasty)", "지속적 상기도 양압술(Continuous positive airway pressure)"], "answer": [0], "explanation": "환자는 BMI 30kg/m2로 비만이지만, AHI가 8로 CPAP의 일반적인 적응증(AHI 15 이상 또는 5 이상이면서 동반 증상)에 직접적으로 해당하지 않는다. 따라서 이 경우 비만으로 인한 수면무호흡의 가능성을 고려하여 체중 감량이 가장 우선적인 치료 방법이 된다. 체중 감량은 수면무호흡의 심각도를 완화하는 데 중요한 역할을 한다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "11학번", "professor": "홍승철", "question": "낮졸림 증상을 동반하지 않는 경우 폐쇄성 수면무호흡 증후군으로 진단할 수 있는 AHI(수면무호흡지수) 기준은?", "images": [], "text_box": null, "options": ["5이상", "10이상", "15이상", "20이상", "30이상"], "answer": [2], "explanation": "폐쇄성 수면무호흡 증후군 진단 기준에 따르면, 주간 졸림증상 등 관련 증상이 없는 경우에는 AHI가 15 이상일 때 진단이 가능하다. 만약 주간 졸림증이나 다른 동반 증상이 있다면 AHI 5 이상에서도 진단할 수 있다. 이 질문은 동반 증상이 없는 경우의 최소 AHI 기준을 묻고 있으므로, 15 이상이 정답이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "11학번", "professor": "홍승철", "question": "다음 수면다원검사 특징에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["저호흡 현상", "자발적 뇌각성", "호흡노력의 증가", "무호흡과 동시에 산소포화도 저하", "흉부와 복부의 호흡노력 일치"], "answer": [2], "explanation": "제시된 수면다원검사 그래프는 폐쇄성 수면무호흡의 특징을 보여준다. Airflow가 감소하거나 멈추는 동안 Rib cage와 Abdomen의 호흡 노력은 증가하며, 이는 기도가 막혔음에도 숨을 쉬려는 노력이 지속됨을 의미한다. Oxygen saturation은 무호흡 발생 후 지연되어 감소하는 양상을 보인다. 따라서 호흡 노력의 증가가 옳은 설명이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "10학번", "professor": "정규인", "question": "입면시간 반복검사(multiple sleep latency test, MSLT)가 진단에 가장 중요한 수면 장애는?", "images": [], "text_box": null, "options": ["기면병 (narcolepsy)", "일차성 불면증 (primary insomnia)", "하지불안 증후군 (restless legs syndrome)", "호흡 관련 수면장애(breathing-related sleep disorder)", "일주기 리듬 수면장애(circadian rhythm sleep disorder)"], "answer": [0], "explanation": "입면잠복기 반복검사(MSLT)는 주간 과도한 졸림증을 평가하는 데 사용되는 주요 진단 도구이다. 특히 기면병 진단에 결정적인 역할을 하는데, 기면병 환자는 MSLT에서 평균 수면 잠복기가 현저히 짧고(8분 이하), 2회 이상의 수면-시작 렘수면(SOREM) 에피소드가 관찰되는 특징을 보인다. 이는 기면병과 다른 수면 장애를 감별하는 데 매우 중요하다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "10학번", "professor": "정규인", "question": "60세 남자가 자다가 싸우는 꿈을 꿀 때면 꿈 내용대로 행동하면서 난폭한 행동을 하고 머리를 바닥에 부딪히는 행동을 자주 반복하여 내원하였다. 이 남자의 증상과 관계 있는 수면단계는?", "images": [], "text_box": null, "options": ["NREM 1단계", "NREM 2단계", "NREM 3단계", "NREM 4단계", "REM 수면"], "answer": [4], "explanation": "주어진 증상은 렘수면 행동장애(REM sleep behavior disorder, RBD)의 전형적인 모습이다. RBD는 렘수면 동안 꿈 내용을 행동으로 옮기는 것이 특징이며, 이때 근육 무긴장증(atonia)이 소실되어 환자가 격렬한 움직임을 보인다. 꿈은 주로 렘수면 단계에서 꾸기 때문에, 이러한 행동은 REM 수면과 직접적으로 관련되어 나타난다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "10학번", "professor": "정규인", "question": "BMI가 21kg/m2(정상 18~22)이고 AHI가 32인 55세 남성 폐쇄성 수면무호흡 증후군 환자에게 가장 널리 사용될 수 있는 치료는?", "images": [], "text_box": null, "options": ["감량", "Acetazolamide 복용", "기관절개(tracheostomy)", "구개수구개인두성형술(uvulopalatopharyngoplasty)", "지속적 상기도 양압술(Continuous positive airway pressure)"], "answer": [4], "explanation": "환자는 정상 BMI임에도 불구하고 AHI가 32로 중증 폐쇄성 수면무호흡 증후군에 해당한다. 이러한 경우, 지속적 상기도 양압술(CPAP)은 기도를 물리적으로 개방하여 무호흡을 효과적으로 줄이는 가장 널리 사용되고 표준적인 치료법이다. 체중 감량은 비만 환자에게 중요하나 이 환자는 정상 BMI이며, 수술적 치료는 CPAP이 효과 없을 때 고려된다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "10학번", "professor": "정규인", "question": "수면무호흡증후군으로 진단할 수 있는 무호흡지수(AHI) 기준은?", "images": [], "text_box": null, "options": ["5이상", "10이상", "15이상", "20이상", "30이상"], "answer": [0], "explanation": "폐쇄성 수면무호흡증후군(OSA)의 진단 기준 중 하나는 무호흡-저호흡 지수(AHI)이다. AHI가 시간당 5회 이상이면서 임상 증상(예: 주간 졸림증, 피로, 코골이 등)이 동반될 때 OSA로 진단한다. 증상이 없는 경우에는 AHI 15회 이상을 기준으로 한다. 따라서 일반적으로 진단 가능한 최소 AHI 기준은 5 이상이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "09학번", "professor": "홍승철", "question": "10세 남아가 수면 초기에 공포스러운 비명을 지르면서 강한 불안을 보이며 숨을 가쁘게 쉬는 모습을 보였다. 그러나 환아는 다음날 이를 잘 기억하지 못하였다. 이는 다음 사건수면(parasomnia) 중 어디에 해당하는가?", "images": [], "text_box": null, "options": ["악몽", "몽유병", "야경증", "수면마비", "렘수면 행동장애"], "answer": [2], "explanation": "야경증은 비렘수면 중 발생하는 사건수면으로, 주로 수면 초반에 갑자기 깨어나 공포에 질린 듯 비명을 지르거나 심한 불안을 보이는 특징이 있다. 이 때 의식은 혼미한 상태이며, 다음날 아침에는 사건을 전혀 기억하지 못하는 경우가 많다. 몽유병과 유사하지만 주로 공포 반응이 동반되는 점에서 차이가 있다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "09학번", "professor": "홍승철", "question": "폐쇄성 수면무호흡증의 병태생리에 대한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["코골이가 원인이다.", "중추신경계이상과 관련이 있다.", "비만과의 관련성은 적게 보고된다.", "수면시 상기도 막힘이 반복된다.", "고혈압의 발생은 부교감신경 활성과 관련이 있다."], "answer": [3], "explanation": "폐쇄성 수면무호흡증은 수면 중 반복적으로 상기도가 폐쇄되거나 부분적으로 막히면서 발생한다. 이로 인해 호흡이 중단되거나 얕아지고, 혈중 산소포화도가 감소하며 뇌 각성이 유발된다. 비만은 상기도 협착의 주요 위험 인자이며, 교감신경계 활성화로 인해 고혈압 등 다양한 합병증을 유발할 수 있다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "09학번", "professor": "홍승철", "question": "50세 남자 환자가 수면 중 코골이가 심하고 주기적으로 숨이 막히듯 헐떡이며 낮에는 지속적으로 졸린 증상을 주소로 내원하였다. 입면잠복기반복검사 상 수면 중 무호흡과 저호흡이 시간당 8회정도 관찰되었다. 이 환자의 치료 시 고려할 사항으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["체중감소가 치료에 도움이 된다.", "약물치료로 수면제와 진정제를 사용한다.", "수면자세의 변화는 증상의 경감에 도움이 되지 않는다.", "구개수구개인두성형술(UPPP)가 가장 널리 쓰이는 치료이다.", "지속적 상기도양압술(CPAP)은 생명이 위태로운 경우에만 사용"], "answer": [0], "explanation": "제시된 환자는 폐쇄성 수면무호흡증의 전형적인 증상을 보이며, AHI 8회는 중등도에 해당한다. 이 경우 체중 감량은 상기도 협착을 완화하고 증상 개선에 중요한 역할을 한다. 수면제나 진정제는 호흡을 억제하여 증상을 악화시킬 수 있으며, 수면 자세 변화도 도움이 될 수 있다. CPAP이 가장 보편적인 치료법이지만, 행동 요법인 체중 감량이 우선 고려될 수 있다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "08학번", "professor": "홍승철", "question": "다음 중 비렘 수면시 나타나는 수면장애는? 가) 악몽 나) 야경증 다) 렘수면행동장애 라) 수면 보행증(몽유병)", "images": [], "text_box": null, "options": ["가,나,다", "가,다", "나,라", "라", "가,나,다,라"], "answer": [2], "explanation": "사건수면은 크게 비렘수면 사건수면과 렘수면 사건수면으로 나뉜다. 비렘수면 사건수면에는 야경증과 수면 보행증(몽유병) 등이 포함된다. 악몽은 주로 렘수면 중에 발생하며, 렘수면 행동장애 역시 렘수면 중에 나타나는 특징을 가진다. 따라서 비렘수면 중에 나타나는 수면장애는 야경증과 수면 보행증이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "08학번", "professor": "홍승철", "question": "수면호흡장애의 증상과 원인 및 결과이다. 옳지 않은 것은?", "images": [], "text_box": null, "options": ["수면분절-과도한 낮 졸음", "교감신경계 활성화-저혈압", "상기도 협착-코골이", "무호흡 - 뇌파각성 유발", "상기도 저항 증가-야간발한 및 과도한 몸동작"], "answer": [1], "explanation": "수면호흡장애, 특히 폐쇄성 수면무호흡증은 수면 중 반복적인 호흡 중단으로 인해 교감신경계가 활성화된다. 이러한 교감신경계의 과활성화는 주로 고혈압을 유발하며, 저혈압과는 관련이 적다. 다른 보기들은 수면호흡장애의 증상, 원인, 결과와 올바르게 연결되어 있다. 따라서 교감신경계 활성화-저혈압은 옳지 않은 설명이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "08학번", "professor": "홍승철", "question": "45세 남성 환자가 코골이와 야간 수면 중의 빈번한 각성 및 주간 졸음을 주소로 병원을 방문하였다. 환자의 부인에 따르면 환자가 잠자는 도중 잠시 숨소리가 들리지 않다가 “후우”하며 숨소리를 내었다. 수면다원검사상 폐쇄성 수면무호흡증후군으로 진단되었다. 일반적인 폐쇄성 수면무호흡 환자의 수면다원검사 특징으로 옳은 것은?", "images": [], "text_box": null, "options": ["뇌파각성(arousal)은 발견되지 않는다.", "무호흡 저호흡 지수(AHI)가 30이상이어야 한다.", "렘수면시에 무호흡은 호전된다.", "심장박동은 무호흡 상태에 따라 서맥과 빈맥이 반복된다.", "서파수면과 렘수면의 양은 무호흡에 영향을 받지 않는다."], "answer": [3], "explanation": "폐쇄성 수면무호흡증 환자의 수면다원검사에서는 기도가 막히면서 호흡 중단이 발생하고, 이로 인해 산소포화도가 감소하며 뇌파 각성(arousal)이 빈번하게 관찰된다. 무호흡 에피소드 중에는 심박수가 감소(서맥)하다가 호흡이 다시 시작되면서 증가(빈맥)하는 양상이 반복된다. AHI는 진단에 중요한 기준이지만, 반드시 30 이상이어야 하는 것은 아니며, 무호흡은 서파수면과 렘수면을 줄이는 경향이 있다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "07학번", "professor": "홍승철", "question": "우울증에서 나타날 수 있는 수면의 특징으로 틀린 것은?", "images": [], "text_box": null, "options": ["서파수면 증가", "REM 수면 증가", "REM 들어가는데 걸리는 시간 (latency) 감소", "수면박탈이 우울증 치료에 효과가 있다", "Circadian rhythm에 관계가 있다"], "answer": [0], "explanation": "우울증 환자는 수면의 질이 저하되는 특징을 보이는데, 일반적으로 서파수면(깊은 수면)은 감소하는 경향이 있다. REM 수면은 증가하거나, REM 수면 잠복기가 단축되는 특징을 보인다. 수면박탈 치료는 일부 우울증 환자에게 일시적인 증상 개선 효과를 보이기도 한다. 따라서 서파수면 증가는 우울증 수면 특징으로 틀린 설명이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "07학번", "professor": "홍승철", "question": "수면 무호흡증의 치료와 관련한 사항이다. 틀린 것은?", "images": [], "text_box": null, "options": ["대게 체중감소가 도움이 된다.", "술과 진정제는 피하는 것이 좋다.", "수면의 박탈이나 부족상태를 피해야 한다.", "대게 양와위(supine position)보다는 측와위(lateral recumbent position)가 도움이 된다.", "지속적 상기도양압술(CPAP)는 수술의 보조적인 치료법이다."], "answer": [4], "explanation": "폐쇄성 수면무호흡증의 치료에서 체중 감량, 술과 진정제 회피, 충분한 수면, 측와위 수면 자세는 모두 중요한 행동 요법으로 증상 개선에 도움이 된다. 그러나 지속적 상기도양압술(CPAP)은 수술의 보조적인 치료법이 아니라, 중등도 이상의 폐쇄성 수면무호흡증의 가장 효과적이고 널리 사용되는 '골드 스탠다드' 치료법이다. 따라서 5번은 틀린 설명이다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "06학번", "professor": "홍승철", "question": "45세 남자 환자가 코골음과 야간수면중의 빈번한 각성 및 주간 졸림을 주소로 병원을 방문하였다. 환자의 부인에 의하면 환자가 잠자는 도중 잠시 숨소리가 들리지 않다가 “푸우”하며 숨소리가 터지는 일이 빈번하다고 하였다. 상기 환자의 질병에 대한 설명 중 틀린 것은?", "images": [], "text_box": null, "options": ["체중 감량과 옆으로 누워자기가 도움이 될 수 있다.", "집중력저하, 교통사고의 위험성 증가 등 정신사회적 합병증을 유발할 수 있다.", "수면제나 알코올 같은 중추신경억제제는 상기 질병의 증상을 악화할 수 있다.", "원인을 기준으로 중추형, 기도 폐쇄형, 혼합형으로 분류한다.", "수술적 치료가 우선시되며, CPAP가 흔히 보조요법으로 사용된다."], "answer": [4], "explanation": "폐쇄성 수면무호흡증은 수면 중 기도가 반복적으로 막히는 질환이다. 이 질환의 표준 치료는 지속적 상기도 양압술(CPAP)이며, CPAP은 수술적 치료보다 우선적으로 고려되는 경우가 많다. 수술은 일반적으로 CPAP이 효과가 없거나 환자가 불내성일 때 고려될 수 있다. 따라서 수술적 치료가 우선시되고 CPAP이 보조요법이라는 설명은 틀렸다."}, {"subject": "기본욕구 관련 정신장애 (수면장애)", "year": "05학번", "professor": "홍승철", "question": "폐쇄성 수면무호흡증에 대한 설명으로 옳은 것을 모두 고르시오.", "images": [], "text_box": null, "options": ["10초 이상의 무호흡 또는 저호흡이 하룻밤에 30회 이상 나타난다.", "신경인지기능의 장애를 초래할 수 있다.", "주간의 과도한 졸음과 피로의 원인이 될 수 있다.", "부교감 신경계의 활성화로 인해 고혈압을 일으킬 수 있다."], "answer": [1, 2], "explanation": "폐쇄성 수면무호흡증은 수면 중 반복적인 호흡 방해로 인해 다양한 증상과 합병증을 유발한다. 신경인지기능 저하와 주간의 과도한 졸림, 피로는 흔한 증상이다. AHI 기준은 하룻밤에 5회 이상, 또는 15회 이상(증상 없을 시)이며, 교감신경계 활성화로 고혈압을 유발한다. 따라서 2번과 3번이 옳은 설명이다."}, {"subject": "인격장애", "year": ["19학번", "2020학번", "2015학번", "2014학번", "2013학번", "2012학번", "2010학번"], "professor": "진양환", "question": "성격의 세 가지 특성은?", "images": [], "text_box": null, "options": ["reflection, independence, self-confidence", "independence, self-directness, cooperativeness", "attractiveness, self-directness, self-transcendence", "self-directness, cooperativeness, self-transcendence", "self-confidence, cooperativeness, self-transcendence"], "answer": [3], "explanation": "이번에 비중 있게 다룬 내용은 아닙니다. Character 의 세 가지 특성으로 배웠는데 여기선 성격이라고 표현했네요.. 애플 4 페이지에 나옵니다."}, {"subject": "인격장애", "year": ["17학번", "2018학번", "2017학번", "2016학번"], "professor": "진양환", "question": "Novelty seeking 과 관련있는 신경전달 물질은 무엇인가?", "images": [], "text_box": null, "options": ["GABA", "Acetylcholine", "Dopamine", "Norepinephrine", "Serotonin"], "answer": [2], "explanation": "기질의 네가지 특성 중 Harm avoidance 는 GABA 와 연관 있습니다. Novelty seeking 은 Dopamine 과 연관 있습니다. Reward dependence 는 Norepinephrine, Serotonin 과 연관 있습니다. Persistence 는 Glutamate, Serotonin 과 연관 있습니다. 역시 이번 교수님은 그냥 읽고 지나가신 내용입니다."}, {"subject": "인격장애", "year": ["11학번", "2010학번"], "professor": "진양환", "question": "인격장애는 세 군으로 나뉘어지는 데, 이들 중 cluster A 인격장애의 특징으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["Anxiety, fear", "Phobic, treatful", "Odd, eccentric", "Excited, aggressive", "Erratic, dramatic, emotional"], "answer": [2], "explanation": "애플 마지막 표에 정리되어 있습니다."}, {"subject": "인격장애", "year": ["20학번"], "professor": "진양환", "question": "다음 중 불안과 두려움을 특징으로 하는 성격장애는?", "images": [], "text_box": null, "options": ["반사회성 성격장애 (antisocial personality disorder)", "경계성 성격장애 (borderline personality disorder)", "히스테리 성격장애 (histrionic personality disorder)", "자기애성 성격장애 (narcissistic personality disorder)", "회피성 성격장애 (avoidant personality disorder)"], "answer": [4], "explanation": "답 가지 중 회피성 성격장애는 cluster C 에 속하며 불안과 두려움을 특징으로 합니다."}, {"subject": "인격장애", "year": ["20학번"], "professor": "진양환", "question": "성격(personality), 기질(temperament), 동기(motivation), 인성(character), 그리고 정신(psyche)의 용어와 개념의 관계에 대해 옳은 것은?", "images": [], "text_box": null, "options": ["기질은 인성을 결정한다.", "인성은 기질을 결정한다.", "기질과 인성은 서로 독립적이다.", "기질은 인성에 의미를 부여한다.", "인성은 기질에 의미를 부여한다."], "answer": [4], "explanation": "성격, 기질, 인성에 관한 내용이 나와서 넣었습니다. 동기와 정신은 배운 적이 없으며, 이들의 관계에 대해서도 배우지 않았습니다."}, {"subject": "인격장애", "year": ["12학번"], "professor": "진양환", "question": "Cluster B 군의 인격장애가 아닌 것은?", "images": [], "text_box": null, "options": ["반사회성 인격장애(antisocial personality disorder)", "경계성 인격장애(borderline personality disorder)", "히스테리 인격장애(histrionic personality disorder)", "자기애성 인격장애(narcissistic personality disorder)", "의존성 인격장애(dependent personality disorder)"], "answer": [4], "explanation": "Cluster B 군에는 antisocial, borderline, histrionic, narcissistic 이 속합니다. Dependent(의존성)은 cluster C에 속합니다."}, {"subject": "인격장애", "year": ["11학번"], "professor": "진양환", "question": "기질의 네 가지 특성이 아닌 것은?", "images": [], "text_box": null, "options": ["persistence", "novelty seeking", "harm avoidance", "reward dependence", "anger independence"], "answer": [4], "explanation": "기질의 4가지 특성은 Harm avoidance 와, Novelty seeking, Reward dependence, Persistence 이 4가지 입니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2020"], "professor": "", "question": "다른 향정신성 약물에 비해 안전하며, 경구로 투여할 때 0.5~8시간 경과 후 혈중 최고 농도에 도달한다. 약제에 따라 반감기가 다르며, 약제의 사용으로 항불안 효과, 항경련 효과, 근이완 효과, 수면 효과 등을 얻을 수 있으며, 부작용으로는 현기증, 운동실조, 기억 상실, 운동 기능 저하, 등이 있을 수 있다.", "images": [], "text_box": null, "options": ["벤조디아제핀"], "answer": [0], "explanation": "제시된 약물 설명은 벤조디아제핀의 특징과 일치합니다. 벤조디아제핀은 GABA A 수용체에 작용하여 항불안, 항경련, 근이완 및 수면 유도 효과를 나타냅니다. 다른 향정신성 약물에 비해 비교적 안전한 편이지만, 현기증, 운동실조, 기억 상실 등의 부작용이 발생할 수 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2020"], "professor": "김정진", "question": "비정형 항정신병약물의 주요 기전은 이 물질의 수용체를 억제하여 도파민 분비를 촉진하고 음성 증상을 개선하는 것이다. 해당 물질은?", "images": [], "text_box": null, "options": ["도파민", "세로토닌", "히스타민", "아드레날린", "아세틸콜린"], "answer": [1], "explanation": "비정형 항정신병 약물의 주요 기전 중 하나는 세로토닌 5-HT2 수용체를 차단하는 것입니다. 특히 5-HT2A 수용체 길항 작용은 도파민 시스템을 조절하여 음성 증상을 개선하고 추체외로 증상 발생 위험을 낮추는 데 기여합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2020"], "professor": "김태원", "question": "다음 중 항우울제를 사용했을 때 monoamine에 대해 맞는 것은?", "images": [], "text_box": null, "options": ["수용체의 발현이 증가한다.", "시냅스 내 농도 감소", "수용체의 발현이 감소한다.", "?", "?"], "answer": [2], "explanation": "항우울제를 복용하면 시냅스 내 모노아민 신경전달물질의 농도가 증가합니다. 이러한 장기간의 증가된 농도는 신경세포의 보상적 기전으로 인해 시냅스 후 수용체의 발현을 감소(down-regulation)시킵니다. 따라서 수용체의 발현이 감소하는 것이 항우울제 사용 시 나타나는 주요 변화 중 하나입니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2020"], "professor": "성기욱", "question": "다음 신경 전달 경로에 작용하는 약물의 종류로 가장 적합한 것은?", "images": [], "text_box": null, "options": ["수면제", "항경련제", "항불안제", "항우울제", "항정신병제"], "answer": [2], "explanation": "라페 핵에서 기시하는 세로토닌 경로는 기분, 수면, 불안 등 다양한 정신 기능에 관여합니다. 항불안제는 불안 증상을 완화하기 위해 이러한 세로토닌 시스템에 영향을 미치는 경우가 많습니다. 특히 일부 항불안제는 세로토닌 수용체에 직접 작용하거나 세로토닌 재흡수를 조절하여 불안 완화 효과를 나타냅니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2020"], "professor": "왕성민", "question": "34세 여성이 조현병 진단을 받고 risperidone을 복용하던 중 몇 개월 전 무월경 증상을 보였다. 관련된 호르몬은?", "images": [], "text_box": null, "options": ["melatonin", "growth hormone", "prolactin", "cortisol", "insulin"], "answer": [2], "explanation": "조현병 치료제인 리스페리돈은 도파민 D2 수용체를 차단하는 작용이 있습니다. 뇌의 결절누두 경로에서 도파민은 프로락틴 분비를 억제하는데, 리스페리돈에 의해 이 도파민 작용이 차단되면 프로락틴 분비가 증가합니다. 이로 인해 유즙 분비, 무월경 등의 부작용이 나타날 수 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2020"], "professor": "우영섭", "question": "23세 여자가 2개월간 우울하고 아무 일에도 흥미나 즐거움이 없으며, 집중도 되지 않고 사소한 일상생활을 하기도 힘을 정도로 의욕이 없어 병원에 왔다. 증상과 관련한 신경전달물질은?", "images": [], "text_box": null, "options": ["acetylcholine", "dopamine", "GABA", "Serotonin", "Norepinephrine"], "answer": [1], "explanation": "환자의 우울감, 흥미 상실(anhedonia), 집중력 저하, 무기력 등의 증상은 도파민 기능 저하와 밀접하게 관련되어 있습니다. 도파민은 보상, 동기, 쾌감과 관련된 신경전달물질로, 이 시스템의 기능 이상은 우울증의 주요 증상 발현에 기여합니다. 세로토닌과 노르에피네프린 또한 우울증과 관련이 깊지만, 특히 무기력과 흥미 상실은 도파민과 강하게 연관됩니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2020"], "professor": "임현국", "question": "다음 중 기억(memory)에 관한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["알츠하이머병 초기 기억력 장애는 전두엽과 관련이 깊다", "서술(declarative) 기억과 관련된 주요부위는 편도체(amygdala)이다", "외현(explicit) 기억은 전전두엽(prefrontal cortex)에서 담당한다", "내현(implicit) 기억 중 절차(procedural) 기억은 선조체(striatum)가 담당한다", "외현(explicit) 기억이 손상되면 동작의 기억, 습득이 안 된다"], "answer": [3], "explanation": "내현(implicit) 기억 중 절차(procedural) 기억은 습득된 기술이나 습관과 같이 무의식적으로 수행되는 기억으로, 뇌의 선조체(striatum)가 주로 담당합니다. 반면 알츠하이머병 초기 기억력 장애는 주로 내측두엽과 해마 손상으로 인한 서술 기억의 손상과 관련이 깊습니다. 전두엽은 고차원적인 인지 기능에 관여합니다. 따라서 선조체는 절차 기억에 핵심적인 역할을 합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2020", "2019"], "professor": "임현국", "question": "신경계 유연성 (neuronal plasticity)에 대한 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["생후 수년간은 신경계 유연성이 뛰어나 변화가 다양하여 뇌 구조와 기능에 영구적인 영향과 무관하다.", "항정신병약물은 직접 세포내 신호전달체계에 유전자 발현을 조절할 수 없는 것이 약물치료의 한계이다.", "스트레스에 취약한 유전적 소인을 가지고 있어도 유년기의 스트레스가 뇌 발달에 미치는 영향은 미미하다.", "성인기의 뇌는 소아기보다 유연성이 현저하게 떨어져 학습이나 기억 등 고차원적인 기능이 일어나지 못한다.", "해마에서 시냅스 전 신경세포가 연속해서 흥분하면 시냅스 후 신경세포의 반응이 장기적으로 증폭되는 현상을 long-term potentiation이라고 한다."], "answer": [4], "explanation": "장기강화(long-term potentiation, LTP)는 특정 시냅스 경로를 반복적으로 활성화할 때 해당 시냅스의 효율성이 장기적으로 증가하는 현상입니다. 이는 학습과 기억의 신경학적 기전 중 하나로, 주로 해마에서 연구됩니다. 신경계 유연성은 뇌의 구조와 기능이 경험에 따라 변화하는 능력으로, 유년기 스트레스나 약물치료는 뇌 발달에 영향을 미칠 수 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2020"], "professor": "정종현", "question": "24세 남자, 조현병으로 약물을 복용하다가 추체외로 증상이 나타났다. 이와 관련 부위는?", "images": [], "text_box": null, "options": ["Nigrostriatal pathway", "Mesolimbic pathway", "Mesocortical pathway", "Tuberoinfundibular pathway", "Dorsolateral prefrontal cortex"], "answer": [0], "explanation": "추체외로 증상(EPS)은 항정신병 약물이 흑질선조체(nigrostriatal) 도파민 경로에 작용하여 발생하는 운동 관련 부작용입니다. 이 경로는 운동 조절에 핵심적인 역할을 하며, 도파민 D2 수용체 차단이 운동 기능 이상을 초래할 수 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2019"], "professor": "김태원", "question": "우울증이 있을 때 단가아민에 대한 것으로 옳은 것은?", "images": [], "text_box": null, "options": ["수용체의 발현 감소 상태", "수용체의 발현 증가 상태", "우울은 노르에피네프린 과다가 원인", "항우울제 치료 후 수용체 발현 증가", "항우울제는 시냅스 단기 아민의 농도를 증가시킴"], "answer": [4], "explanation": "우울증은 주로 시냅스 내 모노아민 신경전달물질(세로토닌, 노르에피네프린, 도파민)의 기능 저하와 관련이 있습니다. 항우울제는 이러한 모노아민의 재흡수를 억제하여 시냅스 간극의 농도를 증가시키는 기전으로 작용합니다. 이로 인해 신경세포의 신호 전달이 촉진되어 우울 증상이 개선됩니다. 수용체 발현은 장기적으로 감소할 수 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2019"], "professor": "우영섭", "question": "60세 여자가 20년간 산 최근 재건축을 앞둔 집을 팔고 다른 집으로 이사를 왔다. 그 이후부터 우울하고, 무력감이 있고 불안한 증상이 계속되었다. 그리고 계속 죽고싶다는 생각이 들기도 했다. 그래서 정신건강의학과에 내원하여 치료하였다. 이 때 치료와 관련된 병태생리 및 부위는?", "images": [], "text_box": null, "options": ["송과체(pineal gland)", "청색반점", "피라미드세포", "결절누두 경로(tuberoinfundibular pathway)", "meynert 기저핵"], "answer": [1], "explanation": "환자의 우울감, 불안, 무력감, 불면 및 자살 사고 등의 증상은 노르에피네프린 신경계의 기능 이상과 깊은 관련이 있습니다. 청색반점(locus coeruleus)은 뇌에서 노르에피네프린 신경원이 밀집되어 있는 주요 핵으로, 각성, 기분, 스트레스 반응 조절에 핵심적인 역할을 합니다. 따라서 청색반점의 기능 이상은 환자의 증상과 밀접하게 연관됩니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2019"], "professor": "임현국", "question": "다음 중 중추신경계에 가장 중요한 억제성 신경전달물질(inhibitory neurotransmitter)은?", "images": [], "text_box": null, "options": ["도파민 (dopamine)", "세로토닌 (serotonin)", "아세틸콜린(acetylcholine)", "감마아미노부티르산 (GABA)", "L-글루탄산염 (L-glutamate)"], "answer": [3], "explanation": "감마-아미노부티르산(GABA)은 중추신경계에서 가장 중요한 억제성 신경전달물질입니다. GABA는 신경세포의 활성을 감소시켜 과도한 흥분을 억제하는 역할을 합니다. 반면 L-글루타메이트는 중추신경계의 주요 흥분성 신경전달물질입니다. 도파민, 세로토닌, 아세틸콜린은 복합적인 조절 작용을 합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2019"], "professor": "정종현", "question": "조현병의 도파민 가설을 근거로 했을 때 음성 증상과 가장 관계가 깊은 신경학적 부위는?", "images": [], "text_box": null, "options": ["Mesolimbic pathway", "Nigrostriatal pathway", "Mesocortical pathway", "Tuberoinfundibular pathway", "Ventromedial prefrontal cortex"], "answer": [2], "explanation": "조현병의 음성 증상(무감동, 무쾌감증, 정서 둔화 등)은 주로 중뇌피질(mesocortical) 도파민 경로의 기능 저하와 관련이 깊습니다. 이 경로는 전두엽 피질로 투사되어 인지 기능과 감정 조절에 중요한 역할을 합니다. 따라서 이 경로의 도파민 활성 저하는 음성 증상을 야기하는 주요 신경학적 요인으로 간주됩니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2019"], "professor": "정종현", "question": "25세 남자가 자꾸 사람들이 자신들 도청한다고 불안해서 병원에 왔다. 내원 2개월 전부터 신이 다른 사람의 생각을 느낌으로 자신에게 전달해주고, 날씨에 따라 사람들이 자신에 대한 호감도가 바뀌도록 조종한다는, 엉뚱한 생각을 하였다고 한다. 남자의 질환의 병태생리 및 치료에 관한 옳은 설명은?", "images": [], "text_box": null, "options": ["중변연계 경로(Mesolimbic pathway)의 이상은 증상들과 관련이 있다.", "중뇌피질 경로(Mesocortical pathway)는 뇌하수체 전엽에서 Prolactin의 분비를 억제한다.", "흑질선상체 경로(Nigrostriatal pathway)는 집중력, 작동 기억 등 Executive fx.에 관여한다.", "결절누두경로(Tuberoinfundibular pathway) 차단제는 누군가 핸드폰을 도청하고 있다는 생각을 호전시킨다.", "피질시상(Corticothalamic pathway)는 동떨어진 태도, 집념, 무관심 등 분리성과 관련이 있다."], "answer": [0], "explanation": "환자의 망상과 기이한 사고는 조현병의 대표적인 양성 증상에 해당합니다. 이러한 양성 증상은 주로 중뇌변연계(mesolimbic pathway)의 도파민 시스템 과활성과 관련이 깊습니다. 따라서 이 경로의 이상은 환자의 정신병리를 설명하는 핵심적인 요인이 됩니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2018"], "professor": "", "question": "강박장애와 관련있는 것으로 알려진 신경전달물질은?", "images": [], "text_box": null, "options": ["도파민", "GABA", "세로토닌", "글루타메이트", "노르에피네프린"], "answer": [2], "explanation": "강박장애(OCD)의 병태생리에는 세로토닌 신경계의 기능 이상이 핵심적인 역할을 하는 것으로 알려져 있습니다. 세로토닌은 기분, 불안, 충동 조절 등에 관여하며, 선택적 세로토닌 재흡수 억제제(SSRI)가 강박장애의 1차 약물 치료제로 사용되는 이유입니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2018", "2016"], "professor": "이경욱", "question": "50세 여자는 내원 2개월전에 사두었던 현재의 집이 재개발되어 20년째 살던집에서 이사할지 여부를 두고 고민하면서, 가슴이 두근거리는 증상이 나타나기 시작했다. 내원 4 주 전부터는 새벽에 잠에서 깨어 새 집 관리 문제나 돈 문제로 고민하고 잠을 이루지 못하였다. 또한 외출이나 대화도 하기 싫어하고 집안일도 하지 않은 채 멍하니 앉아 시간을 보내는 일이 잦아졌으며 식사도 평소의 절반밖에 하지 못했다. 이사를 한 것이 현명하지 못한 일이었다며 반복적으로 자신을 자책하고 이런 후회와 고민 때문에 차라리 죽고싶다는 생각을 하루에도 수차례하였다. 관련된 부위는?", "images": [], "text_box": null, "options": ["송과체", "raphe nucleus", "pyramidal neuron", "mesolimbic pathway", "nucleus basalis of meynert"], "answer": [1], "explanation": "환자의 증상은 우울증과 불안 장애의 전형적인 양상으로, 이는 주로 세로토닌 신경계의 기능 이상과 관련이 깊습니다. 라페 핵(Raphe nuclei)은 뇌에서 세로토닌을 분비하는 주요 신경원의 기시 부위이며, 기분 조절에 핵심적인 역할을 합니다. 따라서 라페 핵은 이러한 증상과 병태생리에 밀접하게 연관됩니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2018"], "professor": "이해국", "question": "인체의 쾌락 중추를 담당하여 부위 중 약물 의존의 동기 측면 및 약물 보상에 관계하는 도파민이 분비되는 부위는?", "images": [], "text_box": null, "options": ["후두엽 (occipital lobe)", "배쪽 외피 지역 (ventral tegmental area)", "청반핵 (locus coeruleus)", "중격핵 (nucleus accumbens)", "연수 (medulla oblongata)"], "answer": [3], "explanation": "인체의 쾌락 중추와 약물 의존에 관여하는 핵심 부위는 중격핵(nucleus accumbens)입니다. 이곳은 복측피개영역(VTA)에서 투사되는 도파민이 분비되어 작용하는 주된 부위입니다. 따라서 중격핵은 약물 보상 및 동기 부여 측면에 깊이 관여합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2018"], "professor": "정종현", "question": "Benzodiazepine 수면제에 대해 옳은 것을 고르시오.", "images": [], "text_box": null, "options": ["세로토닌 수용체와 관련이 있다", "금단 증상이 즉시 나타나고 수개월 이어질 수 있다", "알코올과 같이 복용 시 약효가 감소한다", "대부분 category X이다", "졸피뎀이 해당한다."], "answer": [1], "explanation": "벤조디아제핀은 중추신경계 억제 효과를 나타내며, 장기간 사용 후 중단 시 심각한 금단 증상을 유발할 수 있습니다. 이러한 금단 증상은 불안, 불면, 경련 등으로 수개월 동안 지속될 수 있습니다. 벤조디아제핀은 주로 GABA A 수용체에 작용하며, 알코올과 병용 시 중추신경계 억제 효과가 증강됩니다. 졸피뎀은 벤조디아제핀이 아닙니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2018"], "professor": "진태연", "question": "10년 전부터 조현병 치료를 받는 여자 환자가 있다. 외출하지 않고 집에서만 지내며, 집에서도 표정의 변화가 없고 바닥만 보고 있다. 다른 사람의 눈을 마주치지 못하고, 말을 잘하지 못한다. 별다른 우울증 증상은 없을 때, 이 환자 구조와 물질의 이상으로 적절한 것은?", "images": [], "text_box": null, "options": ["mesolimbic pathway, 도파민 분비 감소", "mesocortical pathway, 도파민 분비 감소", "mesolimbic pathway, 도파민 분비 증가", "mesocortical pathway, 도파민 분비 증가", "nigrostriatal pathway, 도파민 분비 감소"], "answer": [1], "explanation": "환자의 외출 기피, 무표정, 시선 회피, 언어 빈곤 등은 조현병의 전형적인 음성 증상에 해당합니다. 이러한 음성 증상은 주로 중뇌피질(mesocortical) 도파민 경로의 기능 저하와 관련이 깊습니다. 이 경로는 전두엽 피질 기능과 연관되어 인지 및 정서 조절에 영향을 미칩니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2017"], "professor": "김대진", "question": "물질사용장애와 관련된 뇌의 보상회로에서 물질로 인해 발생하는 쾌감 및 동기와 관련된 신경전달물질은?", "images": [], "text_box": null, "options": ["니코틴 (Nicotine)", "도파민 (Dopamine)", "세로토닌 (Serotonin)", "아세틸콜린(Acetylcholine)", "노르에피네프린 (Norepinephrine)"], "answer": [1], "explanation": "물질사용장애에서 물질로 인해 발생하는 쾌감과 동기는 뇌의 보상 회로와 밀접하게 연관되어 있으며, 이 과정에서 핵심적인 신경전달물질은 도파민입니다. 특히 중뇌변연계 도파민 경로는 쾌감, 보상, 동기 부여에 중요한 역할을 하여 물질 중독을 매개합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2017"], "professor": "임현국", "question": "조현병으로 약물 치료 중인 48세 여자 환자가 유즙이 분비되는 증상이 생겼다. 현재 항정신병약물로 리스페리돈을 복용하고 있다. 이와 같은 증상을 유발하는데 관여하는 도파민 경로는?", "images": [], "text_box": null, "options": ["중뇌 변연계 신경경로 (meso-limbic)", "중뇌 피질 신경경로 (meso-cortical)", "흑질 선조체 신경경로 (nigro-striatal)", "결절 누두 신경경로 (tubero-infundibular)", "수관주위회색질 시상 신경경로 (periaqueductal gray-thalamic)"], "answer": [3], "explanation": "조현병 치료에 사용되는 항정신병 약물인 리스페리돈은 도파민 수용체를 차단하는 작용이 있습니다. 결절누두 경로(tuberoinfundibular pathway)의 도파민 기능은 프로락틴 분비를 억제하는데, 도파민 차단으로 인해 프로락틴 분비가 증가하게 됩니다. 이는 유즙 분비(galactorrhea)나 무월경(amenorrhea)과 같은 부작용을 유발합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2017"], "professor": "전태연", "question": "조현병으로 20대 초반부터 장기간 치료를 유지해오던 61세 남자 환자가 입술과 안면의 불수의적인 움직임이 관찰되었다. 이러한 현상은 몇 년 전부터 시작되어 점진적으로 악화되었다고 하나 수면 시에는 증상이 없다고 한다. 이와 같은 항정신병약제의 부작용은?", "images": [], "text_box": null, "options": ["긴장증 (Catatonia)", "파킨슨증 (Parkinsonism)", "정좌불능증 (Akathisia)", "지연성운동장애 (Tardive dyskinesia)", "급성근긴장이상증 (Acute dystonia)"], "answer": [3], "explanation": "환자에게 나타난 입술과 안면의 불수의적 움직임은 항정신병 약물을 장기간 복용한 후 발생하는 지연성 운동장애(Tardive Dyskinesia)의 전형적인 증상입니다. 이 증상은 보통 수년 후에 발현하고 수면 중에는 소실되는 특징이 있습니다. 이는 도파민 수용체의 과민성(supersensitivity)과 관련이 있다고 알려져 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2016"], "professor": "이해국", "question": "인체의 쾌락 중추를 담당하여 약물 의존의 동기 측면 및 약물 보상에 관계하는 도파민 신경이 기시하는 부위는?", "images": [], "text_box": null, "options": ["occipital lobe", "ventral tagmental area", "locus ceruleus", "nucleus accumbens", "medulla oblongata"], "answer": [1], "explanation": "인체의 쾌락 중추 및 약물 보상에 관여하는 도파민 신경은 복측피개영역(ventral tegmental area, VTA)에서 기시합니다. VTA의 도파민 신경원은 중격핵(nucleus accumbens) 등 다른 뇌 영역으로 투사되어 보상 회로를 형성하며, 약물 의존성 발현에 중요한 역할을 합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2015"], "professor": "이경욱", "question": "물질중독과 관련된 뇌의 보상회로에서 물질로 인해 발생하는 쾌감과 관련된 신경전달물질은?", "images": [], "text_box": null, "options": ["니코틴", "도파민", "세로토닌", "아세틸콜린", "노르에피네프린"], "answer": [1], "explanation": "물질중독과 관련된 뇌의 보상 회로에서 쾌감과 동기를 담당하는 핵심 신경전달물질은 도파민입니다. 특히 중뇌변연계(mesolimbic pathway)의 도파민 시스템은 약물에 의한 쾌감과 강화를 매개하는 주요 경로로 작용합니다. 물질은 이 경로의 도파민 분비를 증가시켜 중독 행동을 유발합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2015", "2014", "2013"], "professor": "이경욱", "question": "조현병 증상과 관련된 뇌의 부위를 연결하는 문제. 옳은 것은?", "images": [], "text_box": null, "options": ["positive symptom - mesolimbic", "negative symptom – ventromedial prefrontal cortex", "affective symptom – mesocortical prefrontal cortex", "aggressive symptom – orbitofrontal prefrontal cortex", "cognitive symptom – dorsolateral prefrontal cortex"], "answer": [0], "explanation": "조현병의 양성 증상인 망상과 환각은 주로 중뇌변연계(mesolimbic) 도파민 경로의 과활성과 관련이 있습니다. 음성 증상은 중뇌피질(mesocortical) 경로의 도파민 기능 저하와 연관됩니다. 각 옵션들은 조현병의 다양한 증상과 관련된 뇌 영역을 설명하며, mesolimbic pathway와 양성 증상의 연관성은 잘 알려져 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2015"], "professor": "정종현", "question": "조현병과 가장 관련 있는 수용체는?", "images": [], "text_box": null, "options": ["도파민", "무스카린", "아드레날린", "감마아미노부티르산", "엔도카나비노이드"], "answer": [0], "explanation": "조현병의 발병 기전과 가장 밀접하게 관련 있는 신경전달물질은 도파민입니다. 특히 도파민 D2 수용체의 과활성이 양성 증상(환각, 망상)의 핵심 원인으로 제시됩니다. 대부분의 항정신병 약물은 도파민 D2 수용체를 차단하여 치료 효과를 나타냅니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2015"], "professor": "정종현", "question": "항정신병 약물 사용시 발생할 수 있는 정위불능증과 관련하여 가장 관련이 깊은 신경해부학적 요인은?", "images": [], "text_box": null, "options": ["mesolimbic", "mesocortical", "nigrostriatal", "tuberoinfundibular", "dorsolateral prefrontal cortex"], "answer": [2], "explanation": "항정신병 약물 사용 시 발생할 수 있는 정위불능증(akathisia)은 추체외로 증상 중 하나입니다. 이는 흑질선조체(nigrostriatal) 경로의 도파민 수용체 차단과 관련이 깊습니다. 이 경로는 운동 조절에 관여하며, 도파민 활성 저하가 운동 이상을 초래합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2014"], "professor": "성기욱", "question": "다음 중 G-protein coupled receptor만 활성화시키는 신경전달물질은?", "images": [], "text_box": null, "options": ["GABA", "serotonin", "adenosine", "glutamate", "norepinephrine"], "answer": [4], "explanation": "노르에피네프린은 주로 알파(α) 및 베타(β) 아드레날린성 수용체를 통해 작용하며, 이들 수용체는 모두 G-단백질 결합 수용체(GPCR)에 해당합니다. 반면, GABA와 세로토닌 같은 신경전달물질은 이온통로형 수용체와 G-단백질 결합 수용체 모두를 통해 작용합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2014"], "professor": "전태연", "question": "D2수용체 차단으로 나타날 수 있는 부작용은?", "images": [], "text_box": null, "options": ["Blurred vision", "Orthostatic hypotension", "Memory impairment", "Galactorrhea", "Urinary retention"], "answer": [3], "explanation": "도파민 D2 수용체 차단은 결절누두 경로(tuberoinfundibular pathway)에서 도파민의 프로락틴 억제 작용을 약화시킵니다. 이로 인해 혈중 프로락틴 수치가 상승하게 되고, 그 결과 유즙 분비(galactorrhea)가 나타날 수 있습니다. 이는 많은 항정신병 약물의 흔한 부작용 중 하나입니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2013"], "professor": "성기욱", "question": "다음 중 항불안제, 진정수면제의 주요 표적이 되는 신경전달물질 수용체는?", "images": [], "text_box": null, "options": ["GABA", "nicotinic", "dopamine", "muscarine", "cannabinoid"], "answer": [0], "explanation": "항불안제와 진정수면제는 주로 GABA A 수용체를 표적으로 작용합니다. 이 수용체는 신경세포의 억제성 활동을 조절하며, 약물은 GABA의 결합을 촉진하여 염소 이온(Cl-)의 유입을 증가시켜 신경 활동을 억제합니다. 이는 불안 완화 및 진정 작용으로 이어집니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2012"], "professor": "", "question": "현재까지 알츠하이머병에 대한 특이 약물은 존재하지 않는다. 그러나 알츠하이머병 환자들에게 인지기능의 회복을 위하여 또는 병의 경과를 더디게 하기 위하여 도네페질, 리바스티그민, 갈란타민 등의 약물이 식약청을 통과하여 사용되고 있다. 이러한 약물들의 공통된 기전은?", "images": [], "text_box": null, "options": ["도파민 수용체 차단", "콜린에스터라제 억제", "단가아민 산화효소 억제", "선택적 세로토닌 재흡수 억제", "베타 아드레날린성 수용체 길항"], "answer": [1], "explanation": "도네페질, 리바스티그민, 갈란타민은 알츠하이머병 환자의 인지 기능 개선을 위해 사용되는 약물입니다. 이들 약물은 공통적으로 콜린에스터라제(cholinesterase) 효소를 억제하여 시냅스 내 아세틸콜린의 분해를 막고, 아세틸콜린의 농도를 증가시킵니다. 이는 알츠하이머병에서 나타나는 콜린성 신경계 손상을 보완하기 위한 치료 기전입니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2012"], "professor": "김대진", "question": "Basal nucleus of Meynert에서 주로 분비되며 인지기능 개선제의 target이 되는 신경전달물질의 이름은?", "images": [], "text_box": null, "options": ["serotonin", "dopamine", "glutamate", "acetylcholine", "norepinephrine"], "answer": [3], "explanation": "마이네르트 기저핵(Basal nucleus of Meynert)은 대뇌 피질로 아세틸콜린을 공급하는 주요 원천입니다. 아세틸콜린은 기억, 학습, 주의력 등 인지 기능에 필수적인 신경전달물질입니다. 따라서 인지 기능 개선을 목표로 하는 약물들은 주로 아세틸콜린 시스템을 조절합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2012"], "professor": "김대진", "question": "다음 중 에탄올, benzodiapine, barbiturate 결합장소가 있는 신경전달물질 수용체는?", "images": [], "text_box": null, "options": ["NMDA 수용체", "GABAa 수용체", "nicotinic 수용체", "dopamine 수용체", "muscarinic 수용체"], "answer": [1], "explanation": "에탄올, 벤조디아제핀, 바르비튜레이트는 모두 GABA A 수용체에 결합하여 GABA의 억제성 효과를 증강시킵니다. 이 약물들은 GABA A 수용체의 서로 다른 부위에 결합하여 염소 이온(Cl-) 통로의 개방 빈도나 기간을 증가시켜 신경세포 과분극을 유도합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2012"], "professor": "김대진", "question": "다음 중 인체의 쾌락 중추를 담당하여 약물 의존의 edrl(,,?) 측면 및 약물 보상에 관계하는 뇌의 부위가 아닌 것을 고르시오.", "images": [], "text_box": null, "options": ["배쪽 외피 지역(ventral tegmental area)", "연수(medulla oblongata)", "외측 시상하부(lateral hypothalamus)", "중격핵(nucleus accumbens)", "정중 전뇌 다발(medial forebrain bundle)"], "answer": [1], "explanation": "뇌의 쾌락 중추와 약물 보상에 관여하는 주요 부위로는 복측피개영역(VTA), 외측 시상하부, 중격핵(nucleus accumbens), 정중 전뇌 다발 등이 있습니다. 연수(medulla oblongata)는 주로 생명 유지에 필수적인 호흡, 심박 조절 등 자율신경계 기능에 관여하며, 쾌락이나 약물 보상 회로의 직접적인 구성 요소는 아닙니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2012"], "professor": "임현국", "question": "조현병(구 정신분열증)의 망상 환청과 같은 양성증상과 관련이 되는 경로에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["중뇌-변연계 경로의 도파민 과활성", "중뇌-변연계 경로의 도파민 저활성", "융기-깔때기 경로의 도파민 과활성", "융기-깔때기 경로의 도파민 저활성", "복측피개부위-미상핵 경로의 도파민 과활성"], "answer": [0], "explanation": "조현병의 망상과 환청 같은 양성 증상은 중뇌변연계(mesolimbic pathway)의 도파민 시스템 과활성과 밀접하게 관련되어 있습니다. 이 경로는 보상, 동기, 감정 조절에 중요한 역할을 하며, 도파민의 과도한 활성은 정신병적 증상을 유발할 수 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2012", "2011"], "professor": "임현국", "question": "대표적 항우울제인 SSRI 사용 시 나타날 수 있는 부작용으로 가장 가능성이 낮은 것은?", "images": [], "text_box": null, "options": ["식욕부진", "불면", "심장독성", "구역, 구토", "불안, 초조"], "answer": [2], "explanation": "선택적 세로토닌 재흡수 억제제(SSRI)는 삼환계 항우울제(TCA)에 비해 심장독성 위험이 현저히 낮습니다. SSRI의 흔한 부작용으로는 구역, 구토, 불면, 식욕부진, 불안, 초조 등이 있으며, 이는 대부분 치료 초기에 나타나지만 일반적으로 심각하지 않습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번", "2012"], "professor": "임현국", "question": "항정신병약물 체중증가와 관련된 수용체로 이 수용체의 유전자를 조작한 생쥐에서는 비만과 간질이 나타났다. 이 수용체는?", "images": [], "text_box": null, "options": ["5-HT1A", "5-HT1B", "5-HT2C", "5-HT4", "5-HT6"], "answer": [2], "explanation": "항정신병 약물로 인한 체중 증가는 주로 5-HT2C 수용체 길항 작용과 관련이 깊습니다. 5-HT2C 수용체는 식욕과 포만감을 조절하는 데 중요한 역할을 합니다. 이 수용체의 활성이 억제되면 식욕이 증가하고 체중 증가로 이어질 수 있으며, 5-HT2C 수용체의 유전자 조작 생쥐에서 비만이 관찰된 연구 결과도 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2012"], "professor": "전태연", "question": "18세 남자 환자가 (조현병)정신분열병으로 입원하였다. 병동 내에서 심한 환청으로 인해 행동조절이 되지 않아 리스페리돈(risperidone)을 신속히 증량하였으며, 필요한 경우에는 할로페리돌(haloperidol) 근주를 하였다. 3일 후 환자가 갑자기 목을 옆으로 돌아간 상태로 괴로워하였다. 현재 환자의 상태에 대한 올바른 내용은?", "images": [], "text_box": null, "options": ["정좌불능증(akathisia)", "급성 근긴장이상증(acute dystonia)", "지연성 운동장애(tardive dyskinesia)", "파킨슨 증후근(parkinsonian syndrome)", "신경이완제 악성증후군(neuroleptic malignant syndrome)"], "answer": [1], "explanation": "환자에게 발생한 갑작스러운 목 근육의 비정상적인 수축은 급성 근긴장이상증(acute dystonia)에 해당합니다. 이는 항정신병 약물 복용 초기에 나타날 수 있는 추체외로 증상 중 하나로, 도파민 D2 수용체 차단과 관련이 깊습니다. 할로페리돌과 같은 1세대 항정신병 약물에서 더 흔하게 발생합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2012"], "professor": "전태연", "question": "정신분열병에서 뇌의 주된 도파민 경로가 아닌 것은?", "images": [], "text_box": null, "options": ["mesolimbic", "mesocortical", "nigrostriatal", "tuberoifundibular", "thalamocortical"], "answer": [4], "explanation": "조현병과 관련하여 주로 논의되는 도파민 경로는 중뇌변연계(mesolimbic), 중뇌피질(mesocortical), 흑질선조체(nigrostriatal), 결절누두(tuberoinfundibular) 경로입니다. 시상피질(thalamocortical) 경로는 주로 글루타메이트 및 GABA 신경전달물질과 관련이 있으며, 도파민 주 경로로 분류되지 않습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2011"], "professor": "", "question": "우리 뇌의 대표적인 흥분성 아미노산으로, 대뇌 피질의 pyramidal cell, 소뇌 피질의 granule cell, 미상핵, 해마, entorhinal cortex 등의 구조가 많이 포함한 신경이 많이 분포하는 신경전달물질은?", "images": [], "text_box": null, "options": ["글라이신 (glycine)", "히스타민 (histamine)", "세로토닌 (serotonine)", "글루타메이트 (glutamate)", "GABA (y-aminobutyric acid)"], "answer": [3], "explanation": "글루타메이트는 우리 뇌의 대표적인 흥분성 아미노산 신경전달물질입니다. 대뇌 피질의 피라미드 세포, 소뇌의 과립 세포, 해마, 내측후각피질 등 학습과 기억에 중요한 역할을 하는 다양한 뇌 영역에 분포하며, 신경 흥분을 매개하는 데 필수적입니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2010"], "professor": "", "question": "다음은 정신분열병에 대한 설명이다. 옳은 것을 고르시오.", "images": [], "text_box": null, "options": ["중뇌변연계(mesolimbic) 신경경로의 도파민 활성 과잉이 음성증상을, 중뇌피질(mesocortical) 신경경로의 도파민 활성 저하가 양성증상을 야기하는 것으로 생각된다.", "항정신병약물이 흑질선조체(nigrostriatal) 신경경로에 작용하여 무월경, 유즙분비가 일어나며 결절누우 (tuberoinfundibular) 신경경로에 작용하여 동작의 이상이 발생한다.", "dopamine antagonist, 5-HT antagonist effect가 비정형적 항정신병약물의 주요한 기전이다.", "심리사회적 스트레스가 발병에 직접적인 역할을 한다.", "연령이 증가할수록 발병 위험은 증가한다."], "answer": [2], "explanation": "비정형 항정신병 약물은 도파민 D2 수용체 길항 작용과 함께 5-HT2A 세로토닌 수용체 길항 작용을 주요 기전으로 합니다. 이러한 이중 작용은 양성 및 음성 증상 모두에 효과적이며, 추체외로 증상 발생 위험을 낮춥니다. 중뇌변연계 도파민 과활성은 양성 증상과, 중뇌피질 도파민 저하는 음성 증상과 관련됩니다. 흑질선조체 경로는 운동 이상을, 결절누두 경로는 무월경/유즙 분비를 유발합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["2009"], "professor": "", "question": "다음 중 dopamine pathway가 아닌 것은?", "images": [], "text_box": null, "options": ["mesolimbic", "mesocortical", "nigrostriatal", "tuberoinfundibular", "thalamocortical"], "answer": [4], "explanation": "뇌에는 여러 주요 도파민 경로가 존재하며, 여기에는 중뇌변연계(mesolimbic), 중뇌피질(mesocortical), 흑질선조체(nigrostriatal), 결절누두(tuberoinfundibular) 경로가 포함됩니다. 반면 시상피질(thalamocortical) 경로는 주로 글루타메이트와 GABA 신경전달물질을 이용하며, 도파민 경로로는 분류되지 않습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번"], "professor": "김태원", "question": "항우울제에 대한 설명으로 맞는 것은?", "images": [], "text_box": null, "options": ["진정 작용이 없다.", "통증 관련 기능이 없다.", "인지 개선 기능이 있다.", "시냅스의 단가 아민 농도가 낮다.", "항우울제 치료 후 수용체의 밀도가 높다."], "answer": [2], "explanation": "항우울제는 우울증상 완화와 더불어 우울증으로 인한 집중력 저하나 기억력 감퇴와 같은 인지 기능 개선에 도움을 줄 수 있습니다. 시냅스 내 모노아민 농도를 증가시키는 기전을 통해 작용하며, 장기 복용 시에는 수용체 다운레귤레이션이 관찰되기도 합니다. 일부 항우울제는 진정 작용을 가지며, 만성 통증 치료에도 사용됩니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번"], "professor": "성기욱", "question": "다음 그림의 신경경로에 해당하는 신경전달물질은?", "images": [], "text_box": null, "options": ["Glutamate", "Norepinephrine", "Dopamine", "Serotonin", "Acetylcholine"], "answer": [3], "explanation": "제시된 그림은 뇌의 라페 핵(Raphe nuclei)에서 시작하여 대뇌 피질, 소뇌, 척수 등 여러 부위로 투사되는 신경 경로를 보여줍니다. 라페 핵은 주로 세로토닌 신경원(serotonergic neurons)이 밀집되어 있는 부위로, 이 경로를 통해 세로토닌이 분비됩니다. 따라서 이 신경전달물질은 세로토닌입니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번"], "professor": "성기욱", "question": "그림의 수용체에 대해 맞는 설명은?", "images": [], "text_box": null, "options": ["항우울제의 target이다.", "Glutamate 가 내인성 작동제로 작용한다.", "흥분성 시냅스를 연결한다.", "수용체가 활성화되면 CI-을 통과시킨다.", "7 transmembrane single polypeptide이다."], "answer": [3], "explanation": "그림에 제시된 수용체는 GABA A 수용체로, 이는 대표적인 억제성 이온통로형 수용체입니다. GABA가 이 수용체에 결합하면 채널이 열리고 염소 이온(Cl-)이 세포 내로 유입되어 신경세포를 과분극시켜 활동전위 발생을 억제합니다. 따라서 수용체가 활성화되면 CI-이 통과하게 됩니다. 항우울제는 주로 모노아민 시스템을 표적합니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번"], "professor": "임현국", "question": "GABA 계에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["대부분의 항불안제와 항경련제가 GABA계를 억제한다.", "GABA A 와 GABA C는 G 단백질과 연관되어 있다.", "GABA A 수용체 중간에 Ca2+의 통로가 있다.", "Flumazenil 은 benzodiazepine 수용체의 길항제로서 benzodiazepine 과량독성을 치료하기 위해 사용한다.", "GABA는 대부분 꼬리핵(caudate nucleus), 흑질(substantia nigra), 대뇌 피질(cortex)에서 담창구(globus pallidus), 조가비핵(putamen)으로 전사한다."], "answer": [3], "explanation": "플루마제닐은 벤조디아제핀 수용체의 경쟁적 길항제로, 벤조디아제핀 과다 복용 시의 중추신경계 억제 효과를 역전시키는 데 사용됩니다. 대부분의 항불안제와 항경련제는 GABA 시스템을 활성화하여 억제성 효과를 유도합니다. GABA A 및 GABA C 수용체는 이온통로형이며 염소 이온(Cl-)을 통과시킵니다. GABA는 신경전달물질이며 유전자로 전사되지 않습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번"], "professor": "임현국", "question": "기억과 관련된 신경 시스템에 관한 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["아세틸콜린 경로는 전뇌 기저핵에서 기시한다.", "Benztropine의 경우 인지기능 향상에 어느 정도 효과가 있다.", "아세틸콜린 수용체 중 muscarinic receptor 가 기억과 연관이 있다.", "치매 치료제인 메만틴(Memantine)은 억제성 신경전달물질인 글루타메이트 길항제이다.", "항정신병약물의 경우 도파민 경로 차단으로 인한 아세틸콜린 기능이 항진되어 인지 기능에 어느 정도 도움이 된다."], "answer": [0], "explanation": "아세틸콜린 경로는 기억 기능에 중요한 역할을 하며, 전뇌 기저핵(basal forebrain)에서 기시하여 대뇌피질 등 여러 부위로 투사됩니다. 벤즈트로핀과 같은 항콜린제는 인지 기능 저하를 유발할 수 있습니다. 메만틴은 흥분성 신경전달물질인 글루타메이트의 NMDA 수용체 길항제로 작용합니다. 항정신병 약물은 도파민을 차단하여 인지 기능을 악화시키는 부작용을 가질 수 있습니다."}, {"subject": "총론 Brain and behavior 1(신경해부학 및 신경생화학)", "year": ["20학번"], "professor": "정종현", "question": "조현병 치료와 관련하여 항정신병 약물의 작용기전에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["nigrostriatal dopamine pathway에 작용해 도파민 활성도를 증가시킨다.", "corticocortical dopamine pathway에 작용해 도파민 활성도를 감소시킨다.", "mesolimbic dopamine pathway에 작용해 도파민 활성도를 감소시킨다.", "mesocortical pathway에 작용해 도파민 활성도를 감소시킨다.", "tuberoinfundibular pathway에 작용해 도파민 활성도를 증가시킨다."], "answer": [2], "explanation": "조현병의 양성 증상(환각, 망상)은 주로 중뇌변연계 도파민 경로의 과활성과 관련이 있습니다. 항정신병 약물은 이 경로의 도파민 활성도를 감소시켜 양성 증상을 완화합니다. 흑질선조체 경로는 운동 조절에 관여하며, 결절누두 경로는 프로락틴 분비를 조절합니다. 중뇌피질 경로의 도파민 감소는 음성 증상과 관련됩니다."}, {"subject": "기타 단원", "year": "20학번", "professor": "임현국", "question": "32세 남자가 반복되는 확인에 대한 불편한으로 내원했다. 일을 할 때 자신도 숫자를 지나치게 확인하고, 본인도 그것을 인지하고 있었다. 이 환자의 문제와 연관된 뇌 문제는?", "images": [], "text_box": null, "options": ["Caudate nucleus (미상핵)", "Locus coeruleus (청반)", "Hypothalamus (시상하부)", "Mamillary body (유두체)", "Hippocampus (해마)"], "answer": [0], "explanation": "강박장애는 반복적인 생각이나 행동을 특징으로 하는 질환입니다. 본 문제의 환자는 숫자를 지나치게 확인하는 반복적인 행동을 보였습니다. 이러한 강박적인 행동은 뇌의 기저핵, 특히 미상핵(caudate nucleus)의 기능 이상과 깊은 관련이 있습니다. 미상핵은 목표 지향적 행동과 인지 기능 조절에 중요한 역할을 합니다. 따라서 환자의 증상은 미상핵의 문제와 연관됩니다."}, {"subject": "기타 단원", "year": "20학번", "professor": "임현국", "question": "한 여성이 지하철에서 계단에서 갑자기 넘어져서 다쳤다가 치료를 받았다. 이후에 계단으로 가는 것이 불 안해지기 시작했고, 2층인 자신의 집에 갈 때도 계단 대신 엘리베이터를 이용한다고 한다. 이와 관련된 부위는?", "images": [], "text_box": null, "options": ["amygdala (편도체)", "septal area (중격 영역)", "caudate nucleus (미상핵)", "pyriform cortex (이상 피질)", "lateral hypothalamus (외측 시상하부)"], "answer": [0], "explanation": "환자는 계단에서의 사고 경험 이후 계단에 대한 불안감을 느끼고 회피 행동을 보입니다. 이러한 불안 반응과 공포 학습에 가장 핵심적인 뇌 구조는 편도체(amygdala)입니다. 편도체는 위협적인 자극에 대한 정서적 반응을 처리하고 기억하는 데 중요한 역할을 합니다. 따라서 환자의 불안 증상은 편도체의 기능과 밀접하게 연관됩니다."}, {"subject": "기타 단원", "year": "20학번", "professor": "임현국", "question": "32세 여자가 최근 우울한 기분을 주소로 내원하였다. 1개월 전부터 의욕이 없고, 잠을 잘 자지 못하였으며, 회사에서 늘 하던 능숙한 일을 잘 하지 못하고 실수를 하는 일이 많았다. 여자에서 보이는 인지기능이상과 가장 많이 연관된 부위는?", "images": [], "text_box": null, "options": ["Thalamus (시상)", "parietal lobe (두정엽)", "corpus callosum (뇌량)", "substantia nigra (흑색질)", "Dorsolateral prefrontal cortex (후외측 전전두엽)"], "answer": [4], "explanation": "환자는 의욕 저하, 수면 장애, 그리고 능숙하던 일에서 실수가 잦아지는 등 인지 기능 이상을 보입니다. 이러한 증상들은 특히 실행 기능(executive function), 계획 수립, 작업 기억 등과 관련이 깊습니다. 배외측 전전두엽(dorsolateral prefrontal cortex)은 이러한 고위 인지 기능의 핵심적인 역할을 수행합니다. 따라서 환자의 인지 기능 이상은 배외측 전전두엽의 문제와 가장 많이 연관됩니다."}, {"subject": "기타 단원", "year": "20학번", "professor": "임현국", "question": "다음 중 기억(memory)에 관한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["서술(declarative) 기억의 손상을 받을 경우, 동작의 기억, 습득이 어려워진다.", "외현(explicit) 기억은 전전두엽(prefrontal cortex)에서 담당한다.", "서술(declarative) 기억과 관련된 주요부위는 편도체(amygdala)이다.", "알츠하이머병 초기 기억력장애는 전두엽과 관련이 깊다.", "내현(implicit) 기억 중 절차(procedural) 기억은 선조체(striatum)가 담당한다."], "answer": [4], "explanation": "절차기억(procedural memory)은 무의식적인 기억의 한 종류로, 기술이나 습관처럼 '어떻게' 하는지에 대한 기억입니다. 이러한 절차기억은 선조체(striatum), 운동 피질(motor cortex), 소뇌(cerebellum)와 같은 뇌 영역에서 주로 담당합니다. 따라서 마지막 보기에 제시된 설명은 정확히 일치하여 정답이 됩니다. 다른 보기들은 기억의 종류와 관련 뇌 부위에 대한 설명이 정확하지 않습니다."}, {"subject": "기타 단원", "year": ["18학번"], "professor": "임현국", "question": "32세 남자가 반복되는 확인에 대한 불편함으로 내원하였다. 환자는 일을 할 때 자신도 숫자를 지나치게 확인하고, 본인도 이것을 인지하고 있었다. 이 환자의 문제와 연관된 뇌 부위는? (중간평가)", "images": [], "text_box": null, "options": ["caudate nucleus (미상핵)", "hypothalamus (시상하부)", "mammillary body (유두체)", "locus ceruleus (청색 반점)", "hippocampus (해마)"], "answer": [0], "explanation": "환자는 숫자를 지나치게 확인하는 반복적인 강박 행동을 보이며, 스스로도 이를 인지하고 있습니다. 이러한 강박장애의 증상은 뇌의 기저핵, 특히 미상핵(caudate nucleus)의 기능 이상과 밀접한 관련이 있습니다. 미상핵은 목표 지향적 행동과 인지 기능 조절에 중요한 역할을 하며, 강박적인 사고 및 행동 패턴에 관여하는 것으로 알려져 있습니다. 따라서 환자의 증상은 미상핵의 문제와 연관됩니다."}, {"subject": "기타 단원", "year": ["18학번"], "professor": "임현국", "question": "한 여성이 지하철에서 계단에서 갑자기 넘어져서 다쳤다가 치료를 받았다. 이후에 계단으로 가는 것이 불안해지기 시작했고, 2층인 자신의 집에 갈 때도 계단 대신 엘리베이터를 이용한다고 한다. 이와 관련된 부위는? (중간평가)", "images": [], "text_box": null, "options": ["caudate nucleus", "lateral hypothalamus", "pyriform cortex", "septal area", "amygdala"], "answer": [4], "explanation": "환자는 계단에서의 사고 경험 후 계단에 대한 심한 불안감을 느끼고 회피하는 행동을 보입니다. 이러한 공포 반응 및 불안의 중개에 가장 핵심적인 뇌 구조물은 편도체(amygdala)입니다. 편도체는 위협적인 자극을 인지하고, 공포 학습을 형성하며, 이에 대한 정서적 반응을 생성하는 데 필수적인 역할을 합니다. 따라서 환자의 불안 증상은 편도체의 기능과 밀접하게 연관됩니다."}, {"subject": "기타 단원", "year": ["18학번"], "professor": "임현국", "question": "37세 여자가 우울하여 병원에 왔다. 1개월 전부터 의욕이 없고, 잠을 잘 자지 못하였으며, 회사에서 늘 하던 능숙한 일을 잘 하지 못하고 실수를 하는 일이 많았다. 여자에서 보이는 인지기능이상과 가장 많이 연관된 부위는? (중간평가)", "images": [], "text_box": null, "options": ["corpus callosum(뇌량)", "thalamus(시상)", "parietal lobe(두정엽)", "dorsolateral prefrontal cortex(배외측 전전두엽)", "substantia nigra(흑색질)"], "answer": [3], "explanation": "환자는 의욕 저하, 수면 장애, 그리고 익숙한 업무에서의 실수가 잦아지는 등 실행 기능 및 인지적 제어 능력의 문제를 보입니다. 이러한 증상들은 주로 고위 인지 기능을 담당하는 배외측 전전두엽(dorsolateral prefrontal cortex)의 기능 이상과 관련이 깊습니다. 배외측 전전두엽은 계획 수립, 의사 결정, 작업 기억 등과 같은 실행 기능의 핵심적인 역할을 수행합니다. 따라서 환자의 인지 기능 이상은 배외측 전전두엽의 문제와 가장 많이 연관됩니다."}, {"subject": "기타 단원", "year": ["18학번", "15학번"], "professor": "임현국", "question": "다음 중 기억(memory)에 관한 설명으로 옳은 것은? (중간평가)", "images": [], "text_box": null, "options": ["알츠하이머병 초기 기억력 장애는 전두엽과 관련이 깊다", "서술(declarative) 기억과 관련된 주요부위는 편도체(amygdala)이다", "외현(explicit) 기억은 전전두엽(prefrontal cortex)에서 담당한다", "내현(implicit) 기억 중 절차(procedural) 기억은 선조체(striatum)가 담당한다", "외현(explicit) 기억이 손상되면 동작의 기억, 습득이 안 된다"], "answer": [3], "explanation": "절차기억(procedural memory)은 무의식적인 기억의 한 종류로, 기술이나 습관처럼 '어떻게' 하는지에 대한 기억입니다. 이러한 절차기억은 선조체(striatum), 운동 피질(motor cortex), 소뇌(cerebellum)와 같은 뇌 영역에서 주로 담당합니다. 따라서 네 번째 보기에 제시된 설명은 정확히 일치하여 정답이 됩니다. 다른 보기들은 기억의 종류와 관련 뇌 부위에 대한 설명이 정확하지 않습니다."}, {"subject": "기타 단원", "year": "18학번", "professor": "임현국", "question": "32세 남자가 계속해서 자신의 가방 안을 확인하였다(?) 자신이 정해둔 횟수만큼 확인하지 않으면 불안하였다. 관련된 뇌 부위는? (중간평가)", "images": [], "text_box": null, "options": ["해마 (hippocampus)", "청색반점 (locus ceruleus)", "시상하부 (hypothalamus)", "미상핵 (caudate nucleus)", "편도체 (amygdala)"], "answer": [3], "explanation": "환자는 정해진 횟수만큼 가방 안을 확인하지 않으면 불안해하는 강박적인 행동을 보입니다. 이러한 강박 증상은 뇌의 기저핵, 특히 미상핵(caudate nucleus)의 기능 이상과 밀접한 관련이 있습니다. 미상핵은 반복적인 행동과 습관 형성, 그리고 목표 지향적 행동 조절에 중요한 역할을 합니다. 따라서 환자의 강박 증상과 가장 관련 깊은 뇌 부위는 미상핵입니다."}, {"subject": "기타 단원", "year": "18학번", "professor": "한창태", "question": "삽화기억의 부호화와 검색에 관여하는 뇌부위는? (종합평가)", "images": [], "text_box": null, "options": ["좌측 측두엽(부호화), 우측 측두엽(검색)", "좌측 전두엽(부호화), 우측 전두엽(검색)", "우측 전두엽(검색), 좌측 전두엽(부호화)", "좌측 전전두엽(부호화), 우측 전전두엽(검색)", "우측 전전두엽(검색), 좌측 전전두엽(부호화)"], "answer": [3], "explanation": "삽화기억은 특정 시간과 장소에서 발생한 개인적인 사건에 대한 기억을 의미합니다. 이 기억의 부호화와 검색 과정에는 다양한 뇌 영역이 복합적으로 관여하며, 특히 전전두엽이 중요한 역할을 수행합니다. 일반적으로 좌측 전전두엽은 삽화기억의 부호화에 주로 관여하는 것으로 알려져 있고, 우측 전전두엽은 저장된 삽화기억의 검색에 관여하는 것으로 보고됩니다. 따라서 해당 보기가 가장 적절한 설명입니다."}, {"subject": "기타 단원", "year": ["17학번", "15학번", "14학번", "13학번", "12학번", "11학번"], "professor": "서호준, 채정호", "question": "다음의 뇌 구조물 중 불안을 중개하는 가장 핵심적인 기관으로 알려진 것은 무엇인가? (종합평가)", "images": [], "text_box": null, "options": ["소뇌(cerebellum)", "간뇌(brain stem)", "편도(amygdala)", "해마(hippocampus)", "시상하부(hypothalamus)"], "answer": [2], "explanation": "편도체(amygdala)는 뇌의 변연계에 속하는 핵심적인 구조물로, 공포, 불안과 같은 감정 반응을 중재하는 데 가장 중요한 역할을 합니다. 특히 위협적인 자극을 인지하고 그에 대한 생리적, 행동적 반응을 유발하는 데 관여합니다. 다양한 연구를 통해 편도체의 활성화가 불안 반응과 직접적인 연관이 있음이 밝혀져 있습니다. 따라서 불안을 중개하는 가장 핵심적인 기관은 편도체입니다."}, {"subject": "기타 단원", "year": ["17학번"], "professor": "임현국", "question": "신경계 유연성 (neuronal plasticity)에 대한 설명 중 옳은 것은?(종합평가)", "images": [], "text_box": null, "options": ["생후 수년간은 신경계 유연성이 뛰어나 변화가 다양하여 뇌 구조와 기능에 영구적인 영향과 무관하다.", "항정신병약물은 직접 세포내 신호전달체계에 유전자 발현을 조절할 수 없는 것이 약물치료의 한계이다.", "스트레스에 취약한 유전적 소인을 가지고 있어도 유년기의 스트레스가 뇌 발달에 미치는 영향은 미미하다.", "성인기의 뇌는 소아기보다 유연성이 현저하게 떨어져 학습이나 기억 등 고차원적인 기능이 일어나지 못한다.", "해마에서 시냅스 전 신경세포가 연속해서 흥분하면 시냅스 후 신경세포의 반응이 장기적으로 증폭되는 현상을 long-term potentiation 이라고 한다."], "answer": [4], "explanation": "장기 강화(Long-term potentiation, LTP)는 시냅스 전달 효율이 장기적으로 증대되는 현상을 의미합니다. 이는 학습과 기억의 세포 기반으로 여겨지며, 특히 해마에서 시냅스 전 신경세포의 반복적인 흥분이 시냅스 후 신경세포의 반응을 장기적으로 증폭시키는 형태로 나타납니다. 이러한 현상은 명시적 기억(explicit memory) 형성과 밀접한 관련이 있으며, 신경계 유연성의 중요한 메커니즘 중 하나입니다."}, {"subject": "기타 단원", "year": ["17학번", "16학번", "14학번"], "professor": "임현국", "question": "25세 남자가 외출에서 귀가하여 더럽다고 하면서 입고 있던 옷을 다 벗고는 샤워를 2~3시간 동안 지속하였다. 타인이 자신의 물건을 만지면 병균이 묻는다면서 화를 내고 물건을 수차례 박박 닦아야만 마음이 편하다고 하며, 사람들과 접촉하면 손을 하루에도 수십 차례 씻기를 반복해야 불안하지 않다고 한다. 관련된 뇌 부위는? (중간평가)", "images": [], "text_box": null, "options": ["솔방울샘 (pineal gland)", "청색반점 (locus coeruleus)", "바닥핵 (basal ganglia)", "솔기핵 (raphe nucleus)", "시상하부 (hypothalamus)"], "answer": [2], "explanation": "환자는 과도한 청결 강박과 접촉 강박을 보이며, 이는 강박장애의 전형적인 증상입니다. 강박장애는 뇌의 기저핵(basal ganglia) 기능 이상과 밀접하게 관련되어 있습니다. 특히 기저핵 내의 선조체(striatum), 즉 미상핵과 피각이 반복적인 행동과 습관 형성에 중요한 역할을 합니다. 따라서 환자의 강박 증상과 관련된 주요 뇌 부위는 바닥핵을 포함하는 기저핵입니다."}, {"subject": "기타 단원", "year": "17학번", "professor": "임현국", "question": "45세 남자가 교통사고로 인해 뇌를 다친 후 식욕억제가 안 되고 난폭한 행동을 한 뒤 죄책감을 느끼지 않았다. 손상된 부분은? (중간평가)", "images": [], "text_box": null, "options": ["두정엽", "측두엽", "시상하부", "안와전두피질(Orbitofrontal)", "등측면전두피질(Dorsolateral prefrontal cortex)"], "answer": [3], "explanation": "환자는 교통사고 후 식욕 억제 불능, 난폭한 행동, 죄책감 상실 등 충동 조절과 사회적 판단 능력에 심각한 손상을 보입니다. 이러한 증상들은 감정 조절, 의사 결정, 사회적 행동 등 전두엽의 고위 기능과 관련이 깊습니다. 특히 안와전두피질(orbitofrontal cortex)은 보상 처리, 충동 억제, 사회적 행동 규제에 핵심적인 역할을 하므로, 이 부위의 손상이 환자의 증상을 가장 잘 설명합니다."}, {"subject": "기타 단원", "year": "17학번", "professor": "임현국", "question": "70세 남자가 기억력 저하로 병원에 왔다. 검사 소견은 아래와 같았다. 병태생리와 관련이 높은 뇌부위는? (종합평가) - 현임 및 전임 대통령은 정확히 대답함 - 100-7은 정확히 수행하였음 - 운전, 피아노 연주, 길 찾기는 평소처럼 잘 하였음 - 전일 손녀와 외식 한 사실이나 약속시간을 기억하지 못하였음.", "images": [], "text_box": null, "options": ["소뇌", "두정엽", "안와전두엽", "내측측두엽", "외측측두엽"], "answer": [3], "explanation": "환자는 최근 사건에 대한 기억(전일 손녀와 외식, 약속시간)은 상실했지만, 원격 기억(대통령 이름)이나 절차 기억(운전, 피아노)은 보존되어 있습니다. 이는 외현(explicit) 기억 중에서도 새로운 삽화기억 형성 능력에 문제가 있음을 시사합니다. 내측 측두엽(medial temporal lobe)은 해마(hippocampus)를 포함하여 새로운 외현 기억을 부호화하고 저장하는 데 핵심적인 역할을 합니다. 따라서 환자의 기억력 저하는 내측 측두엽의 병변과 가장 관련이 높습니다."}, {"subject": "기타 단원", "year": ["16학번", "14학번"], "professor": "이경욱", "question": "38세 남자가 엘리베이터에서 갑자기 가슴이 두근거리고 숨이 막하면서 어지럽고, '이러다가 죽는 것이 아닌가'하는 심한 불안감이 발생하여 응급실에 왔다. 지난 5개월 동안 과로하였고, 매주 서너 차례 예상치 않게 반복적으로 비슷한 증상이 있어 밖에 나가기가 두렵다고 하였다. 응급실에 도착했을 때 맥박은 118회/분이었다. 약 1시간이 지난 후 증상은 저절로 사라졌다. 관련 부위는? (중간평가)", "images": [], "text_box": null, "options": ["thalamus", "amygdala", "parietal lobe", "basal ganglia", "substantia nigra"], "answer": [1], "explanation": "환자는 엘리베이터 안에서 갑작스러운 심한 불안감과 신체 증상(가슴 두근거림, 숨 막힘)을 경험했으며, 이러한 증상이 반복되어 외출을 두려워하는 공황장애의 양상을 보입니다. 공포 및 불안 반응의 중추적인 역할을 하는 뇌 구조물은 편도체(amygdala)입니다. 편도체는 위협 자극을 처리하고 이에 대한 정서적 반응을 생성하는 데 필수적입니다. 따라서 환자의 증상은 편도체의 과활성화와 밀접한 관련이 있습니다."}, {"subject": "기타 단원", "year": ["16학번", "15학번", "14학번"], "professor": "임현국", "question": "69세 여자 환자가 외출을 하지 않아 자녀들이 우울증이 걱정된다며 정신건강의학과에 함께 방문했다. 1년 전부터 날짜와 요일을 까먹어 친구들과의 모임에 가지 못하였다. 버스를 타고 자주 가던 딸집에 가는 도중에 길을 잊고 다시 돌아오는 것이 2번 반복되면서 외출을 하지 않게 되었다. 이 환자의 경과로 옳은 것은? (종합평가)", "images": [], "text_box": null, "options": ["기억력은 의미기억 장애보다 삽화기억 장애가 두드러진다.", "우울증을 포함한 정동장애가 동반되는 경우는 드물다.", "임상치매척도(CDR)은 2점일 가능성이 많다.", "질환의 초기부터 망상과 환각이 동반되기 쉽다.", "MRI 소견상 내측 측두엽의 위축이 관찰되기 쉽다."], "answer": [4], "explanation": "환자는 날짜와 요일을 잊고 길을 헤매는 등 기억력 저하를 보이며, 특히 최근 사건에 대한 기억 문제가 두드러지는 삽화기억 장애의 양상을 보입니다. 이는 초기 알츠하이머병의 흔한 특징입니다. 알츠하이머병은 주로 해마와 내측 측두엽의 위축을 동반하며, 이는 MRI 소견에서 관찰될 수 있습니다. 또한, 우울증과 같은 정동 장애가 흔하게 동반되나, 질환 초기부터 망상이나 환각이 동반되는 경우는 드뭅니다."}, {"subject": "기타 단원", "year": ["15학번", "12학번"], "professor": "임현국", "question": "“편지 봉투를 열어서 종이에 접어 넣으시오.”의 명령을 수행하지는 못하는데, 각각의 행동 하나하나는 잘할 때 이를 무엇이라 부르는가? (중간평가)", "images": [], "text_box": null, "options": ["Ideational apraxia(기도실행증)", "Constructional apraxia(구성실행증)", "Buccofacial apraxia(협증안면실행증)", "Limb kinetic apraxia(지운동성실행증)", "Ideomotor apraxia(의도운동성실행증)"], "answer": [0], "explanation": "환자는 \"편지 봉투를 열어서 종이에 접어 넣으시오\"와 같이 여러 단계로 이루어진 복합적인 명령을 수행하지 못하지만, 각 개별 행동(봉투 열기, 종이 접기, 넣기)은 할 수 있습니다. 이러한 실행증을 관념 실행증(ideational apraxia)이라고 합니다. 관념 실행증은 특정 목표를 달성하기 위한 연속적인 동작의 개념이나 순서를 계획하고 조직하는 능력의 손상으로 인해 발생합니다. 이는 행동 계획과 실행의 연관성 문제로 볼 수 있습니다."}, {"subject": "기타 단원", "year": ["14학번", "13학번", "12학번"], "professor": "이경욱", "question": "교환원이 불러주는 전화번호를 기억했다가 바로 전화를 다시 거는 데 필요한 기능을 관장하는 부위는? (중간평가)", "images": [], "text_box": null, "options": ["Thalamus(시상)", "Parietal lobe(두정엽)", "Corpus callosum(뇌량)", "Substantia nigra(흑색질)", "Dorsolateral prefrontal cortex(후외측 전전두엽)"], "answer": [4], "explanation": "교환원이 불러주는 전화번호를 일시적으로 기억하고 이를 사용하여 다시 전화를 거는 과정은 작업 기억(working memory)의 핵심적인 기능입니다. 작업 기억은 정보를 잠시 동안 유지하고 조작하는 능력을 의미합니다. 뇌에서 이러한 작업 기억을 주로 관장하는 부위는 배외측 전전두엽(dorsolateral prefrontal cortex)입니다. 이 영역은 정보를 능동적으로 처리하고 인지적 제어를 수행하는 데 필수적입니다."}, {"subject": "기타 단원", "year": ["14학번", "13학번", "12학번"], "professor": "이경욱", "question": "다음 중 기억(memory)에 관한 설명으로 옳은 것은? (종합평가)", "images": [], "text_box": null, "options": ["서술(declarative) 기억은 이른 유아기에 생긴다.", "외현(explicit) 기억은 전전두엽(prefrontal cortex)에서 담당한다.", "서술(declarative) 기억과 관련된 주요부위는 편도체(amygdala)이다.", "알츠하이머병 초기 기억력장애는 두정엽(parietal lobe)와 관련이 깊다.", "내현(implicit) 기억 중 절차(procedural) 기억은 선조체(striatum)가 담당한다."], "answer": [4], "explanation": "절차기억(procedural memory)은 기술 습득이나 습관처럼 의식적인 노력 없이 수행되는 무의식적인 기억입니다. 이러한 기억의 형성과 저장에는 선조체(striatum)가 핵심적인 역할을 수행합니다. 선조체는 운동 학습과 행동 습관화에 관여하는 뇌 구조물로서, 자전거 타기나 악기 연주와 같은 절차적 기술의 습득을 가능하게 합니다. 따라서 내현 기억 중 절차 기억이 선조체에 의해 담당된다는 설명은 옳습니다."}, {"subject": "기타 단원", "year": ["14학번", "13학번", "12학번"], "professor": "이경욱", "question": "인간의 감정(emotion)에 대한 설명으로 옳은 것은? (종합평가)", "images": [], "text_box": null, "options": ["좌반구의 장애는 은유, 함축의 미묘한 차이에 반응하는 데 장애를 일으킨다.", "좌측측두엽간질 환자는 철학적인 주제에 집착하고, 유머러스함을 상실할 수 있다.", "통증, 공포, 공격성 등 동물과 공유하는 감정은 전두엽(frontal cortex)이 담당한다.", "자긍심, 죄책감, 연민 등 사람만이 가지는 감정은 변연계(limbic system)가 담당한다.", "우반구의 장애는 정상적 좌반구에 의해 감정적으로 인식되어 우울증을 유발할 수 있다."], "answer": [1], "explanation": "좌측 측두엽 간질 환자들은 종종 특정 주제에 대한 과도한 몰입과 함께 유머 감각의 상실을 경험하는 경향이 있습니다. 이는 감정 및 인지 처리와 관련된 측두엽의 기능 이상 때문입니다. 반면, 동물과 공유하는 기본적인 감정(통증, 공포)은 주로 변연계에서 담당하며, 자긍심과 같은 고차원적인 인간 감정은 대뇌피질, 특히 전두엽이 관여합니다. 따라서 좌측 측두엽 간질 환자의 특징에 대한 설명이 옳습니다."}, {"subject": "기타 단원", "year": ["14학번", "13학번"], "professor": "이경욱", "question": "Phineas Gage는 철도 노동자로 일하던 중 25세에 쇠막대기가 전두엽 부위를 통과하는 뇌손상을 입었다. Phineas Gage의 증례는 19세기 뇌기능의 국재화(cerebral localization)에 대한 논쟁에 영향을 주었는데, 뇌의 특정한 부위의 손상이 인간 행동과 정신 기능에 장애를 유발한다는 첫 번째 예일 것이다. Phineas Gage가 보였던 이상행동은 안와전두엽(orbitofrontal lobe)에 손상을 입은 환자들에서 흔히 보이는데 이 영역에 손상을 입을 시 나타나는 증상에 해당하는 것을 보기 중에서 찾으시오. (중간평가)", "images": [], "text_box": null, "options": ["전향적 기억상실(anterograde amnesia)", "인격의 변화(personality change), pseudopsychopathic syndrome", "무관심(apathy), 무동무언증 (akinetic mutism)", "항정신병약물의 추체외로 부작용(extrapyramidal symptoms of antipsychotics)"], "answer": [1], "explanation": "Phineas Gage의 사례는 안와전두엽(orbitofrontal lobe) 손상 시 나타나는 대표적인 증상들을 보여줍니다. 이 영역은 전두엽의 일부로, 사회적 행동, 감정 조절, 의사 결정, 그리고 인격 형성에 중요한 역할을 합니다. 손상되면 충동 조절 능력 상실, 판단력 저하, 무책임한 행동, 그리고 과거의 인격과 다른 행동을 보이는 인격 변화(personality change) 및 가성정신병증후군(pseudopsychopathic syndrome)이 나타날 수 있습니다. 이러한 증상들은 Gage가 사고 후 보인 행동 변화와 일치합니다."}, {"subject": "기타 단원", "year": "14학번", "professor": "이경욱", "question": "기억(memory)에 관한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["서술 (declarative) 기억은 이른 유아기에 생긴다", "알쯔하이머병의 초기 기억력장애는 두정엽 (parietal lobe)과 관련이 길다", "내현(implicit)기억 중 절차 (procedural) 기억은 해마(hippocampus)가 담당한다.", "Korsakoff syndrome 은 내측 간뇌핵 (medial diencephalic nuclei) 이상이 발견된다", "삽화기억 (episodic memory)은 하외측 측두엽 (inferolateral temporal lobe)에서 담당한다"], "answer": [3], "explanation": "코르사코프 증후군(Korsakoff syndrome)은 만성적인 알코올 중독 등으로 인한 비타민 B1 결핍으로 발생하는 신경학적 질환입니다. 이 증후군은 특히 내측 간뇌핵(medial diencephalic nuclei)의 손상과 밀접하게 관련되어 있으며, 심각한 기억 상실, 특히 전향적 기억상실을 주요 특징으로 합니다. 따라서 코르사코프 증후군과 내측 간뇌핵의 이상 간의 연관성은 올바른 설명입니다."}, {"subject": "기타 단원", "year": "13학번", "professor": "원왕연", "question": "다음 중 기억과 관련된 뇌 영역의 이상과 관련된 질환이 맞게 짝지어진 것은? (종합평가)", "images": [], "text_box": null, "options": ["medial diencephalic nucleus -korsakoff's syndrome", "medial temporal lobe -short term memory", "basal forebrain - H.M. case", "basal ganglia - semantic memory 이상", "inferolateral temporal lobe -episodic memory 이상"], "answer": [0], "explanation": "내측 간뇌핵(medial diencephalic nucleus)의 손상은 코르사코프 증후군(Korsakoff syndrome)과 밀접하게 관련되어 있습니다. 이 증후군은 심각한 기억 상실, 특히 새로운 정보를 학습하고 기억하는 능력의 저하를 특징으로 합니다. 반면, 내측 측두엽(medial temporal lobe)은 장기 기억과 관련이 있으며, 기저핵(basal ganglia)은 주로 절차 기억에 관여합니다. 따라서 내측 간뇌핵과 코르사코프 증후군이 올바르게 짝지어진 것입니다."}, {"subject": "기타 단원", "year": ["13학번"], "professor": "이경욱", "question": "32세 남자 환자가 주변의 물체를 식별하는 능력은 보존되어 있으나 사람의 얼굴을 식별하지 못하는 증상으로 내원하였다. 예상되는 손상부위는? (중간평가)", "images": [], "text_box": null, "options": ["Occipital lobe(후두엽)", "Bilateral parieto-occipital lobe(양측 두정후두엽)", "Bilateral visual association area(양측 시각연합부위)", "Bilateral medial occipitotemporal area(양측 내측 후두측두엽 부위)", "좌두정엽(left parietal lobe)에서 좌하측두엽(left inferior temporal lobe)으로 가는 경로 이상"], "answer": [4], "explanation": "환자는 주변 물체는 식별하지만 사람의 얼굴을 인식하지 못하는 안면인식장애(prosopagnosia) 증상을 보입니다. 이는 시각 정보 처리의 상위 단계, 특히 얼굴 인식을 담당하는 특정 뇌 영역의 손상으로 발생합니다. 일반적으로 얼굴 인식은 측두엽과 후두엽 경계 부위의 방추형 얼굴 영역(fusiform face area)과 관련이 깊습니다. 좌하측두엽으로 가는 경로 이상은 얼굴 인식과 같은 복잡한 시각 정보 처리 능력에 영향을 줄 수 있습니다."}, {"subject": "기타 단원", "year": "13학번", "professor": "이경욱", "question": "기저핵 (basal ganglia)는 선조체 (striatum), 창백해 (globus pallidus), 흑질 (substantia nigra), 시상밑핵 (subthalamic nucleus)로 이루어져있는데, 각각의 뇌구조는 다른 질환과 관련이 있다고 알려져 있다. 번개탄 등으로 자살시도를 한 환자의 뇌에서 흔히 손상이 올 수 있는 부위는? (중간평가)", "images": [], "text_box": null, "options": ["Putamen", "Hypothalamus", "Globus pallidus", "Mamillary body", "Caudate nucleus"], "answer": [2], "explanation": "번개탄을 이용한 자살 시도 시 발생하는 일산화탄소 중독은 뇌에 심각한 손상을 유발합니다. 일산화탄소는 뇌 조직의 산소 공급을 방해하여 신경세포 손상을 초래하며, 특히 창백핵(globus pallidus) 부위에 선택적인 손상을 일으키는 것으로 알려져 있습니다. 창백핵은 기저핵의 중요한 구성 요소로, 운동 조절과 관련된 기능을 수행하므로 이 부위의 손상은 심각한 신경학적 후유증을 남길 수 있습니다. 따라서 일산화탄소 중독 환자의 뇌에서 흔히 손상되는 부위는 창백핵입니다."}, {"subject": "기타 단원", "year": ["12학번"], "professor": "임현국", "question": "다음 중 각 대뇌피질의 기능에 해당하는 옳은 조합은? (중간평가)", "images": [], "text_box": null, "options": ["전두엽, 측두엽, 후두엽", "후두엽, 전두엽, 측두엽", "전두엽, 후두엽, 측두엽", "후두엽, 측두엽, 전두엽", "측두엽, 후두엽, 전두엽"], "answer": [0], "explanation": "대뇌피질의 각 영역은 특정 기능과 밀접하게 연관되어 있습니다. 전두엽은 실행 능력(계획, 판단, 의사결정)을 담당하며, 측두엽은 언어 이해(청각 정보 처리, 베르니케 영역)에 중요한 역할을 합니다. 후두엽은 시각적인지(시각 정보 처리)의 주된 영역입니다. 따라서 첫 번째 보기에 제시된 '전두엽, 측두엽, 후두엽'의 조합이 각각 실행 능력, 언어 이해, 시각적인지에 해당하는 가장 옳은 조합입니다."}, {"subject": "기타 단원", "year": ["12학번"], "professor": "임현국", "question": "다른 사람의 얼굴 표정이나 목소리에서 분노와 공포를 구별 못할 때 손상된 뇌 부위는? (중간평가)", "images": [], "text_box": null, "options": ["Amygdala(편도체)", "Septal area(중격)", "Hippocampus(해마)", "Pyriform cortex(이상 피질)", "Lateral hypothalamus(외측 시상하부)"], "answer": [0], "explanation": "다른 사람의 얼굴 표정이나 목소리에서 분노와 공포와 같은 감정을 인식하고 구별하는 능력은 편도체(amygdala)의 중요한 기능입니다. 편도체는 감정 처리, 특히 위협적이거나 부정적인 감정 자극에 대한 반응과 기억 형성에 핵심적인 역할을 합니다. 따라서 편도체가 손상되면 이러한 감정 인식 능력이 저하되어 타인의 감정을 이해하는 데 어려움을 겪을 수 있습니다."}, {"subject": "기타 단원", "year": ["12학번"], "professor": "임현국", "question": "수행을 조절하는 뇌영역으로서, 뚜렛 장애, 강박 장애, 파킨슨병, 헌팅턴병과 관련된 뇌부위는? (중간평가)", "images": [], "text_box": null, "options": ["Putamen(피각)", "Hypothalamus(시상하부)", "Globus pallidus(창백핵)", "Mamillary body(유두체)", "Caudate nucleus(미상핵)"], "answer": [4], "explanation": "뚜렛 장애, 강박 장애, 파킨슨병, 헌팅턴병과 같은 운동 및 행동 조절 장애는 기저핵(basal ganglia)의 기능 이상과 깊은 관련이 있습니다. 특히 미상핵(caudate nucleus)은 목표 지향적 행동, 인지 기능, 학습 및 습관 형성에 중요한 역할을 합니다. 이 부위의 손상이나 기능 이상은 반복적인 행동, 운동 조절의 어려움, 그리고 인지적 유연성 감소 등 다양한 증상을 유발할 수 있습니다. 따라서 주어진 질환들과 가장 밀접하게 관련된 뇌 부위는 미상핵입니다."}, {"subject": "기타 단원", "year": "12학번", "professor": "임현국", "question": "32세 남자가 주변 물체는 인식할 수 있지만 사람의 얼굴을 인식할 수 없는 증상으로 내원하였다. 다음 환자는 뇌의 어느 부분에 이상이 생긴 것인가?", "images": [], "text_box": null, "options": ["Occipital lobe", "Parietal occipital lobe", "Bilateral visual association cortex", "Bilateral medial occipitotemporal cortex", "Left parietal lobe에서 left prefrontal lobe으로 연결되는 것"], "answer": [4], "explanation": "환자는 주변 물체는 인식하지만 사람의 얼굴을 인식하지 못하는 안면인식장애(prosopagnosia)를 겪고 있습니다. 이는 시각 정보 처리의 고차원적 단계, 특히 얼굴 인식과 관련된 뇌 영역의 손상으로 발생합니다. 좌측 두정엽에서 좌측 전두엽으로 연결되는 경로는 얼굴 인식을 포함한 복잡한 시각-인지 처리 과정에 중요한 역할을 합니다. 이 경로의 이상은 얼굴 인식 능력의 저하를 초래할 수 있습니다."}, {"subject": "기타 단원", "year": ["11학번", "08학번"], "professor": "전양환", "question": "정신의 직관적 자기 깨달음과 관계된 기억은?", "images": [], "text_box": null, "options": ["절차 기억", "행동 기억", "의미 기억", "삽화 기억", "선언 기억"], "answer": [3], "explanation": "직관적 자기 깨달음과 관계된 기억은 주로 삽화 기억(episodic memory)과 연관됩니다. 삽화 기억은 특정 시간과 장소에서 경험한 개인적인 사건에 대한 기억으로, '언제', '어디서', '무엇을' 경험했는지에 대한 정보를 포함합니다. 이러한 기억은 자아의 연속성을 형성하고 과거 경험을 바탕으로 자신을 이해하는 데 중요한 역할을 합니다. 따라서 자기 경험과 직접적으로 연결된 삽화 기억이 직관적 자기 깨달음과 깊은 관계를 가집니다."}, {"subject": "기타 단원", "year": "10학번", "professor": "임현국", "question": "HM(사진 1)은 intractable epilepsy로 양측 내측두엽(medial temporal lobe) 절제술을 시행하였다. 수술로 해마(hippocampus)의 2/3, 방해마(parahippocampus) 및 편도(amygdala)가 절제되었다. HM case는 인간의 기억 및 해부학적 구조에 대한 이해에 큰 획을 그었다. 사진 2에서 왼쪽은 HM의 뇌자기공명영상 사진이며, 우측은 정상 대조군의 사진이다. 아래 보기중에서 HM이 보인 기억장애에 해당하는 것은? [사진 1- HM의 얼굴 사진, 사진 2- 해마 위축된 왼쪽 소견] (중간평가)", "images": [], "text_box": null, "options": ["작동 기억(working memory)", "장기 기억(long term memory)", "절차 기억(procedural memory)", "전향적 기억상실(anterograde amnesia)", "고전적 조건화(classical conditioning)"], "answer": [0], "explanation": "HM 환자는 양측 내측두엽 절제술 후 해마 손상으로 인해 새로운 장기 기억을 형성하지 못하는 전향적 기억상실을 겪었습니다. 그러나 기존의 기억과 절차 기억, 작업 기억 등은 상대적으로 보존되었습니다. 문제의 답이 작업 기억으로 제시되었으나, 통상적으로 해마 손상은 전향적 기억상실과 가장 밀접하게 관련됩니다. 작업 기억은 주로 전전두엽 기능으로 알려져 있어 논란의 여지가 있지만, 제시된 정답에 따라 작업 기억을 답으로 간주합니다."}, {"subject": "기타 단원", "year": "10학번", "professor": "임현국", "question": "다음 중 전전두엽(prefrontal lobe)의 기능에 해당하는 옳은 조합을 고르시오. (종합평가)", "images": [], "text_box": null, "options": ["Medial, Dorsolateral, Orbitofrontal", "Dorsolateral, Medial, Orbitofrontal", "Orbitofrontal, Medial, Orbitofrontal", "Medial, Orbitofrontal, Dorsolateral", "Orbitofrontal, Dorsolateral, medial"], "answer": [2], "explanation": "전전두엽은 고위 인지 기능과 행동 조절에 중요한 역할을 합니다. 안와전두피질(orbitofrontal cortex)은 감정 조절 및 과민성과 관련이 깊고, 무언증(mutism)은 전방 대상피질(anterior cingulate cortex) 기능 이상과 연관될 수 있습니다. 계획 수립(planning)은 주로 배외측 전전두엽(dorsolateral prefrontal cortex)의 기능으로 알려져 있습니다. 주어진 보기 중에는 'Orbitofrontal, Medial, Orbitofrontal' 조합이 과민성과 무언증, 계획하기의 장애를 가장 적절하게 설명하고 있습니다."}, {"subject": "기타 단원", "year": "09학번", "professor": "서호준", "question": "다음 중 여러 두뇌 구조와 다양하게 상호 연결되어 있어서 시각, 감각, 청각 등 다양한 외부의 정보와 본능적 감각을 통합하는 작용을 하며, 감정 경험과 조절에 중요하다고 알려진 이 기능적 뇌 구조는? (종합평가)", "images": [], "text_box": null, "options": ["기저핵(basal ganglia)", "변연계(limbic system)", "전두피질(frontal cortex)", "교련로(commissural tract)", "망상활성계(reticular activating system)"], "answer": [1], "explanation": "변연계(limbic system)는 뇌의 여러 구조물로 구성된 복합적인 시스템으로, 감정, 학습, 기억, 동기 부여, 그리고 본능적인 행동 조절에 핵심적인 역할을 합니다. 시상, 해마, 편도체 등 다양한 부위가 상호 연결되어 외부 감각 정보와 내부 상태를 통합하며 감정 경험과 조절에 깊이 관여합니다. Papez 회로는 이러한 변연계의 중요한 회로 중 하나로 감정 처리와 기억에 필수적입니다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["21학번"], "professor": "성기욱", "question": "그림은 뇌의 특정 영역 혹은 세포에서 신경전달물질의 존재를 증명하는 실험기법을 설명한 것이다. 옳은 것은? (사진은 같은 사진을 강의자료에서 따왔습니다.)", "images": [], "text_box": null, "options": ["optogenetics", "microiontophoresis", "in vivo microdialysis", "immunocytochemistry", "patch-clamp recording"], "answer": [3], "explanation": "신경전달물질의 존재는 주로 immunocytochemistry, in situ hybridization 등 현대적인 기법으로 증명된다. 방출은 brain slice 자극, in vivo microdialysis, in vivo voltametry 방법으로 확인된다. 기능 연구는 microiontophoresis, pressure, optogenetics 등의 기법을 이용한다. 그림은 신경전달물질 혹은 수용체에 대한 항체를 이용하여 신경전달물질의 존재를 확인하는 immunocytochemistry 연구기법을 설명하고 있다. 따라서 정답은 4번이다."}, {"subject": "신경전달물질 수용체, 정신약물 1", "year": ["21학번"], "professor": "성기욱", "question": "왼쪽 그림과 같이 흰쥐 뇌의 특정 부위에 자극전극을 위치시키고 오른쪽 그림과 같은 실험장치를 이용하여 레버를 누르면 전기자극이 가해지도록 하였을 때 레버를 누르는 행동이 계속되었다. 전기자극에 의하여 방출되어 이러한 행동을 유발하는 신경전달물질은?", "images": [], "text_box": null, "options": ["GABA", "nicotine", "serotonin", "dopamine", "anandamide"], "answer": [3], "explanation": "그림은 행동실험 중 습관성약물중독과 관련되어 self stimulation test를 보여준다. 레버를 계속 누르는 행동은 뇌의 median forebrain bundle을 통한 reward 발생과 이를 통한 reinforcement 현상이다. 이와 관련된 신경전달물질은 dopamine이다. 따라서 정답은 4번이다."}, {"subject": "신경전달물질 수용체, 정신약물 3(항불안제, 항정신병약물 등)", "year": ["21학번"], "professor": "정종현", "question": "정신분열병의 증상을 양성 및 음성 증상을 포함하여 크게 5가지 증상으로 나뉠 수 있다. 이와 관계된 신경해부학적 위치를 설명한 아래 내용 중 맞는 것은?", "images": [], "text_box": null, "options": ["positive symptoms : orbitofrontal cortex", "aggressive symptoms : mesolithic area", "cognitive symptoms : dorsolateral prefrontal cortex", "affective symptoms : mesocortical/prefrontal cortex", "negative symptoms : ventromedial prefrontal cortex"], "answer": [2], "explanation": "정신분열병의 5가지 증상과 신경해부학적 위치는 다음과 같다. Positive symptoms는 mesolimbic, aggressive symptoms는 orbitofrontal cortex/amygdala와 관련된다. Cognitive symptoms는 dorsolateral prefrontal cortex, affective symptoms는 ventromedial prefrontal cortex와 연관된다. Negative symptoms는 mesocortical/prefrontal cortex와 관련이 깊다. 따라서 제시된 보기 중 cognitive symptoms와 dorsolateral prefrontal cortex의 연결이 맞다."}, {"subject": "신경전달물질 수용체, 정신약물 3(항불안제, 항정신병약물 등)", "year": ["21학번"], "professor": "정종현", "question": "정신건강의학과에서 수년간 약물치료를 받고 있는 34세 여자 환자가 수개월 전부터 무월경증이 발생하였다. 호르몬 검사 결과 prolactin이 증가되어 있었다. 관련이 높은 약물은?", "images": [], "text_box": null, "options": ["Alprazolam", "Donepezil", "Escitalopram", "Milnacipran", "Risperidone"], "answer": [4], "explanation": "34세 여자 환자는 수년간 약물치료를 받으며 무월경증과 증가된 prolactin 수치를 보였다. Synopsis of psychiatry 11th edition, page 66에 따르면 prolactin 과잉은 antipsychotics 복용 후 발생할 수 있다. 이는 성욕 감퇴 및 무월경증을 유발할 수 있다. 제시된 약물 중 Risperidone은 antipsychotics에 해당하여 prolactin 수치를 증가시킬 수 있다. 따라서 Risperidone이 가장 관련이 높다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["21학번"], "professor": "김태원", "question": "반복되는 조증 삽화 이후 양극성 정동장애 진단 하 3년간 꾸준히 유지 약물치료를 받아오던 24세 여자 환자가 임신을 준비하고자 할 때, 가장 우선적으로 중단을 고려하여야 할 약제는?", "images": [], "text_box": null, "options": ["aripiprazole", "buspirone", "bupropion", "valproate", "quetiapine"], "answer": [3], "explanation": "24세 여자 환자는 양극성 정동장애로 약물치료 중 임신을 준비하고 있다. Valproate는 neural tube defect의 위험성이 높은 약물로 알려져 있다. 또한 PCOS(다낭성 난소 증후군)의 가능성도 증가시킬 수 있다. 따라서 임신 전 가장 우선적으로 중단을 고려해야 할 약제는 valproate이다."}, {"subject": "Brain and behavior 1 (신경해부학 및 신경생화학)", "year": ["21학번"], "professor": "임현국", "question": "27세 여자 환자는 최근 1달전 지하철 계단에서 갑자기 넘어진 이후 극심한 불안감을 보이고 있다. 환자의 증상은 지하철 뿐 아니라, 아파트 계단을 보아도 자꾸만 예전에 발생하였던 사고의 기억이 떠올라 본인의 집이 아파트 2층임에도 불구하고 계단을 피하여 엘리베이터를 이용하는 일이 많아졌다고 한다. 이러한 환자의 문제와 가장 연관이 많은 뇌 부위는?", "images": [], "text_box": null, "options": ["amygdala (편도체)", "septal area (중격 영역)", "caudate nucleus (미상핵)", "pyriform cortex (이상 피질)", "lateral hypothalamus (외측 시상하부)"], "answer": [0], "explanation": "환자는 지하철 계단에서 넘어진 후 극심한 불안감을 경험하며, 이 기억이 다른 상황에서도 떠올라 계단을 회피하는 행동을 보인다. 강의록 13p에 따르면 amygdala는 내부 외부 자극의 융합의 관문으로 학습된 fear response(불안, 공황)를 매개하고 특정한 정서를 생산한다. amygdala 손상 시 공포나 화를 구별하지 못하게 된다. 따라서 불안 반응 및 회피 행동과 가장 연관이 깊은 뇌 부위는 amygdala이다."}, {"subject": "Brain and behavior 1 (신경해부학 및 신경생화학)", "year": ["21학번"], "professor": "임현국", "question": "37세 여자가 최근 우울한 기분을 주소로 내원하였다. 최근 1달전부터 의욕이 떨어지고, 잠을 잘 못자는 증상이 있었으며, 특히 회사에서 늘 하던 능숙한 일을 잘 하지 못하고 실수를 하는 일이 많았다고 하며, 이 환자에서 보이는 인지 기능 이상과 가장 많이 연관 된 부위는?", "images": [], "text_box": null, "options": ["Thalamus (시상)", "Parietal lobe (두정엽)", "Corpus callosum (뇌량)", "Substantia nigra (흑색질)", "Dorsolateral prefrontal cortex (후외측 전전두엽)"], "answer": [4], "explanation": "주요 우울장애 환자는 의욕 저하, 수면 장애와 더불어 인지 기능 이상, 특히 수행 능력 장애를 보인다. 수행 능력의 장애는 전전두엽, 특히 배외측 전전두엽에서 관장한다. 배외측 전전두엽 기능 이상 시 작업 기억 손상 및 즉시/최근 기억 통합 문제가 발생한다. 따라서 제시된 인지 기능 이상과 가장 많이 연관된 부위는 dorsolateral prefrontal cortex이다."}, {"subject": "Brain and behavior 3 (시간 생물학과 정상수면)", "year": ["21학번"], "professor": "홍승철", "question": "일주기리듬의 Phase Response Curves에 관한 설명이다. 맞는 것은?", "images": [], "text_box": null, "options": ["수면항상성(sleep homeostasis)과 관련된 지표이다", "멜라토닌 분비 시간을 측정한 것이다", "하이포크레틴(hypocretin) 농도 커브이다", "낮졸림증(EEG)를 예측한다.", "아데노신(adenosine)과 관련이 있다"], "answer": [1], "explanation": "Phase Response Curves(PRC)는 일주기 리듬에 대한 빛의 영향을 설명하는 중요한 개념이다. PRC는 멜라토닌 분비 시간을 측정하여 일주기 리듬의 위상 변화를 예측하는 데 사용된다. 수면 항상성, 하이포크레틴 농도, 낮졸림증 예측, 아데노신과는 직접적인 관련이 적다. 따라서 멜라토닌 분비 시간을 측정한 것이라는 설명이 가장 적절하다."}, {"subject": "총론 정신증상과 징후", "year": ["21학번"], "professor": "정조은", "question": "25세 여자가 3일 전부터 샤워할 때마다 자신을 비난하는 목소리가 들린다며 내원하였다. 일주일 전에 친한 친구가 자살로 사망하였다고 하며, 크게 충격을 받았다고 한다. 당시에 그녀는 자느라 늦은 시간에 걸려 온 친구의 전화를 받지 못하였다고 하며, 이에 대해 죄책감을 호소하였다. 이 여자에게 적합한 진단은 무엇인가?", "images": [], "text_box": null, "options": ["단기정신병적장애", "양극성장애", "조현양상장애", "조현병", "주요우울장애"], "answer": [0], "explanation": "환자는 친구의 자살이라는 극심한 스트레스 사건 이후 3일간 지속되는 환청을 주증상으로 내원하였다. 단기정신병적장애는 심한 스트레스 사건에 의해 유발될 수 있으며, 망상, 환각 등의 정신병적 증상이 1일 이상 1개월 미만으로 지속될 때 진단한다. 이 환자의 증상은 3일간 지속되었으므로 단기정신병적장애에 해당한다. 다른 정신질환들은 증상 지속 기간이나 양상이 맞지 않다."}, {"subject": "총론 정신증상과 징후", "year": ["21학번"], "professor": "정조은", "question": "37세 여자가 조현병으로 입원했다. 여자는 자신의 팔에 있는 갈색 반점이 누군가 밤마다 자신의 팔에서 혈액을 빼 가고 있다는 증거라며 팔에 있는 주근깨들을 보여주었다. 이 생각의 믿음 경도는 망상 수준이었다. 밑줄 친 부분의 정신 병리는?", "images": [], "text_box": null, "options": ["과대망상", "망상지각", "신체망상", "조종망상", "마술적 사고"], "answer": [1], "explanation": "환자는 자신의 팔에 있는 주근깨를 보며 누군가 혈액을 빼간다는 망상적 의미를 부여하고 있다. 망상지각(delusional perception)은 정상적인 지각 경험에 망상적 의미를 덧붙이는 것이다. 과대망상은 자신의 능력 과장, 신체망상은 신체 기능에 대한 잘못된 신념, 조종망상은 외부의 통제를 믿는 것이다. 마술적 사고는 생각이나 행동이 초자연적 힘을 가진다는 믿음을 의미한다. 따라서 제시된 증상은 망상지각에 해당한다."}, {"subject": "정신질환의 진단과 분류", "year": ["21학번"], "professor": "변선정", "question": "정신과적 면담에서 문제를 잘 평가하기 위한 방법으로 올바른 것은?", "images": [], "text_box": null, "options": ["아무리 정신과적 면담이라도 시간 제한이 있으므로 이것을 염두에 두고 문제를 평가해야 한다.", "환자가 말했을 때”네 그랬군요\" 하는 식으로 말하는 것은 그 부분에 대한 결론을 강조하게 되어 사용하지 않는 것이 좋다.", "초진 면담에서는 주제가 되는 한 가지에 집중하는 것이 좋고 다른 문제가 없는가 하는 것은 다음 면담에서 하도록 하여 주제를 분명히 하여야 한다.", "환자의 말이 모호하여 어떤 것을 말하는지 알기 어려울 지라도 내용을 너무 명료화하는 것은 환자 입장에서는 자신을 무시하는 것처럼 느껴지면서 의사-환자 관계를 깰 수 있으므로 하지 않도록 한다.", "질문의 순서는 처음에는 간단하게 알아볼 수 있는 폐쇄형 질문으로 시작하고 내용이 드러나기 시작하면 많은 주제를 알 수 있는 개방형 질문으로 전환한다."], "answer": [0], "explanation": "정신과적 면담 시 시간 제한을 인지하고 효율적으로 문제를 평가하는 것이 필요하다. '네 그랬군요'와 같은 촉진적 표현은 환자의 말을 격려하는 데 도움이 된다. 초진 면담에서도 환자의 전반적인 문제를 파악하려는 노력이 필요하다. 환자의 모호한 말을 명료화하는 것은 오해를 줄이고 정확한 정보를 얻기 위해 중요하다. 질문은 개방형으로 시작하여 폐쇄형으로 전환하는 것이 일반적이다."}, {"subject": "정신질환의 진단과 분류", "year": ["21학번"], "professor": "변선정", "question": "다음 중 범주적 (categorical) 분류에 대한 설명에 해당하는 내용은?", "images": [], "text_box": null, "options": ["질병의 경중에 대한 기술에 유용하다.", "임상적 유용성은 뛰어나지만 진단적 타당성이 떨어진다.", "건강한 상태와 질병상태를 병적 특성의 양적인 차이로 보는 견해를 말한다.", "전통적인 정신질환의 진단분류 방법인 차원격(dimensional) 분류의 문제점을 보완하기 위하여 등장하였다.", "특정 장애와 관련되는 경도를 일련의 점수로 표시해서 점수가 높을수록 그 장애를 가질 가능성이 높은 것으로 나타낸다."], "answer": [1], "explanation": "범주적 분류(categorical classification)는 질병상태와 정상상태를 질적으로 다르게 보며, 개별 정신질환을 명확히 구분한다. 이 분류는 임상적 유용성이 높지만, 진단적 타당성이 상대적으로 떨어진다는 단점이 있다. 질병의 경중에 대한 기술은 부족하며, 양적인 차이가 아닌 질적인 차이로 질환을 본다. 차원격 분류는 범주적 분류의 문제점을 보완하기 위해 등장한 개념이다. 따라서 제시된 보기 중 범주적 분류에 해당하는 내용은 '임상적 유용성은 뛰어나지만 진단적 타당성이 떨어진다'이다."}, {"subject": "우울장애", "year": ["21학번"], "professor": "정종현", "question": "33세 여자가 3개월 전 어머니의 갑작스러운 사망 이후 발생한 허무함, 우울한 기분, 의욕과 흥미의 저하로 병원에 왔다. 환자는 식욕도 감소하여 체중이 3개월간 약 8kg이 감소하였고, 어머니에 대한 죄책감과 자신도 갑자기 죽을지 모른다는 불안한 생각이 지속되었다고 한다. 환자의 수면시간은 3시간 정도로 줄어들었고, 업무에 집중 할 수가 없어서 직장도 그만두었다고 한다. 혈압 110/65mmHg, 맥박 60회/분, 호흡 18회/분, 체온 36.2℃이다. 진단은?", "images": [], "text_box": null, "options": ["급성스트레스장애", "범불안장애", "적응장애", "정상 애도반응", "주요우울장애"], "answer": [4], "explanation": "환자는 어머니 사망 이후 3개월간 허무함, 우울감, 의욕/흥미 저하, 식욕 감소, 체중 감소, 죄책감, 불면 등 여러 증상을 겪고 있다. 이러한 증상들은 주요우울장애의 진단 기준을 만족한다. 증상 지속 기간이 충분하며, 일상생활 기능에 현저한 저하가 있다. 정상 애도 반응은 일반적으로 2주-2개월 내 호전되는 경향을 보이며, 이렇게 심한 기능 저하를 동반하지 않는다. 다른 장애의 진단 기준에는 부합하지 않는다."}, {"subject": "우울장애", "year": ["21학번"], "professor": "정종현", "question": "42세 여자 환자가 3개월 전부터 시작되는 우울감을 주소로 내원하였다. 환자는 우울감과 함께 잠을 이루지 못하고 구역감이 들며 식욕이 떨어져 체중이 5kg가량 감소하였다고 한다. 환자는 정신건강의학과적 치료력이 없으며, 경조증 및 조증의 과거력도 관찰되지 않았다. 다음 중 위 환자에게 가장 적절한 약제는?", "images": [], "text_box": null, "options": ["bupropion", "fluoxetine", "mirtazapine", "valproate", "venlafaxine"], "answer": [2], "explanation": "환자는 우울감과 함께 불면, 구역감, 식욕 부진 및 체중 감소 증상을 보인다. 항우울제 중 mirtazapine은 불면, 불안, 구역, 구토에 효과가 큰 약물이다. 이는 환자의 주요 증상과 일치하여 전반적인 증상 개선에 도움이 될 수 있다. Bupropion은 식욕 감소에 도움이 될 수 있으나 불면을 악화시킬 수 있다. Fluoxetine, venlafaxine은 위장 장애를 유발할 수 있으며, valproate는 기분안정제로 우울증 단독 치료에 우선 사용되지 않는다. 따라서 mirtazapine이 가장 적절하다."}, {"subject": "우울장애", "year": ["21학번"], "professor": "정종현", "question": "32세 여자가 2개월간 지속된 우울한 기분과 의욕, 흥미, 기력의 저하로 병원에 왔다. 환자는 식욕이 없어서 식사를 잘 하지 않았고, 체중이 5kg 감소하였다고 한다. 또한 한밤 중에 깨어서는 다시 잠을 자지 못 하였고, 하루종일 피곤한 날이 많았다고 한다. 환자의 과거력상 약 10년 전, 5년 전, 2년 전에도 이와 유사한 증상이 있었으며, 환자의 어머니도 우울장애로 10년간 치료 중이었다. 환자에게 항우울제를 투여하였고 증상은 호전되었다. 향후 치료를 계속할 기간은?", "images": [], "text_box": null, "options": ["4-8주", "8-12주", "3-6개월", "6개월-12개월", "12개월 이상"], "answer": [4], "explanation": "이 환자는 과거 3회 삽화가 있었고, 어머니도 우울장애로 10년간 치료 중인 기분장애 가족력이 있다. 이러한 경우 우울증 재발 위험성이 매우 높다. 재발 위험성이 높은 환자의 경우 유지 치료 기간을 연장해야 한다. 따라서 1년 이상 항우울제 치료를 유지하는 것이 권장된다."}, {"subject": "사고장애", "year": ["21학번"], "professor": "허휴정", "question": "43세 여자가 6개월 동안 자신을 비난하는 목소리가 들린다고 하여 내원하였다. 또한, 거리를 지나는 사람들이 모두 자신을 비웃는다며 두려움에 싸여 지내왔다. 또한, 집 밖을 나가지 못해 간헐적으로 우울감을 호소하기도 했다. 이러한 증상은 6개월 전 시댁 식구들과 다투고 난 뒤에 갑자기 발생하였다. 가족력으로 아버지가 조현병 진단을 받았으나, 약물치료를 받으며 비교적 증상이 잘 조절되는 상태로 지낸다고 한다. 이 환자의 병력 및 특징에서 나쁜 예후를 시사하는 것은?", "images": [], "text_box": null, "options": ["나이", "시댁식구들과 다투고 난 뒤 증상 발생", "갑작스레 증상 발생", "간헐적인 우울감 호소", "조현병의 가족력"], "answer": [4], "explanation": "조현병의 예후 인자 중 나쁜 예후를 시사하는 요인은 다음과 같다. 늦은 나이 발병, 뚜렷한 스트레스 사건 이후 급성 증상 발병, 일시적인 우울증상 동반은 좋은 예후 인자로 분류된다. 반면 조현병의 가족력은 유전적 취약성을 나타내므로 나쁜 예후 인자에 해당한다. 따라서 환자의 병력 및 특징 중 조현병의 가족력이 나쁜 예후를 시사한다."}, {"subject": "사고장애", "year": ["21학번"], "professor": "허휴정", "question": "35세 여자가 지속되는 환청을 주소로 내원하였다. 그녀는 약 2년 전부터 자신을 험담하는 소리가 들리기 시작했다고 하며, 1년 전부터 인근 정신건강의학과에서 약을 처방받아 복용했다고 한다. 치료 받아왔던 병원에서는 리스페리돈을 6개월간 복용하다가, 증상이 지속되어 올란자핀으로 변경하여 6개월 간 투여하였다고 한다. 꾸준히 약을 복용하고 있음에도 불구하고 증상이 호전되지 않고, 최근에는 \"떨어져 죽으라\"는 환청 때문에 아파트 옥상에 올라갔다가 가족들의 만류로 내려오기도 했다. 이 환자에게 가장 적절한 약물은 무엇인가?", "images": [], "text_box": null, "options": ["리튬", "발프로산", "클로자핀", "파록세틴", "할로페리돌"], "answer": [2], "explanation": "환자는 리스페리돈과 올란자핀이라는 두 가지 이상의 항정신병약을 각각 6개월씩 꾸준히 복용했음에도 불구하고 증상이 호전되지 않고 악화 function deduplicateQuestions(items) {
  const seen = new Map();
  const result = [];
  items.forEach(item => {
    const raw = (item.question || '').replace(/\s+/g, '').slice(0, 80);
    if (!raw) { result.push(item); return; }
    if (seen.has(raw)) {
      const existing = result[seen.get(raw)];
      const merged = new Set([...(existing.year || []), ...(item.year || [])]);
      existing.year = [...merged].sort((a, b) => {
        const na = parseInt((a.match(/\d+/) || [0])[0]);
        const nb = parseInt((b.match(/\d+/) || [0])[0]);
        return nb - na;
      });
    } else {
      seen.set(raw, result.length);
      result.push(item);
    }
  });
  return result;
}

function cleanQuestionTextBox(item) {
  if (!item.text_box || !item.question) return item;
  const tbNorm = item.text_box.replace(/\s+/g, '');
  const qNorm  = item.question.replace(/\s+/g, '');
  if (qNorm.startsWith(tbNorm)) {
    return { ...item, text_box: null };
  }
  return item;
}

const RAW = deduplicateQuestions(RAW_SOURCE).map(cleanQuestionTextBox);

let questions      = [...RAW];
let current        = 0;

let activeSubject  = 'all';

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function scrollTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

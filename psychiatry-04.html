울제, 기분조절제)", "year": ["09학번"], "professor": "배치운", "question": "다음의 valproate 설명으로 맞는 것은?", "images": [], "text_box": null, "options": ["원래 소발작 치료 약물이었으나 기분 안정 효과가 알려지면서 양극성 장애의 치료에 사용되고 있다.", "경구 섭취 후 빠르게 valproic acid로 변환되며 단백결합량이 상대적으로 약 90% 정도로 낮아 안전하다.", "정확한 기전은 밝혀지지 않았으나 glutamate의 분해를 억제한다.", "리튬과 달리 임신 첫삼분기에 사용하여도 신경관결손의 발생이 없다.", "반감기가 길어서 하루 1회 복용한다."], "answer": [0], "explanation": "앞과 동일한 문제입니다."}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["09학번"], "professor": "배치운", "question": "다음을 읽고 답을 고르시오. 37세 여자 환자는 항우울제인 paroxentine과 sertraline을 함께 복용하고 기면, 혼돈, 발한, 진전, 체온상승, 경련을 일으켰다. 어떤 부작용을 의심할 수 있는가?", "images": [], "text_box": null, "options": ["세로토닌 증후군", "정좌불능증", "급성 호흡 부전증", "급성 근긴장 이상증", "지연성 운동 장애"], "answer": [0], "explanation": "앞과 동일한 문제"}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["09학번"], "professor": "배치운", "question": "다음 설명 중 맞는 것은?", "images": [], "text_box": null, "options": ["리튬의 가장 흔한 부작용은 위장관 장애와 진전이다.", "리튬의 신장 독성은 주로 비가역성이다.", "리튬을 장기 복용하면 주로 갑상선기능 항진증이 발생한다.", "백혈구 감소를 흔히 보인다.", "리튬은 신체적인 부작용이 가벼우므로 약물 농도를 정기적으로 시행해야 할 필요는 없다."], "answer": [0], "explanation": "앞과 동일한 문제"}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["09학번"], "professor": "배치운", "question": "다음의 설명을 읽고 가장 적절한 해결법을 고르시오. 양극성 장애를 진단받은 38세 여자 환자는 자살 목적으로 처방받은 리튬을 과량 복용하여 혈중 농도 4.5mEq/L 이상으로 나타났으며 경련, 섬망, 의식 혼탁 등이 발생하였다.", "images": [], "text_box": null, "options": ["위장에 남은 리튬을 제거하고 기다린다.", "리튬의 길항제제를 투여한다.", "혈액 투석을 시행한다.", "충분할 수분을 공급한다.", "만니톨을 투여하여 뇌부종을 최소화 한다."], "answer": [2], "explanation": "앞과 동일한 문제"}, {"subject": "신경전달물질 수용체, 정신약물 2 (항우울제, 기분조절제)", "year": ["09학번"], "professor": "배치운", "question": "다음을 읽고 가장 적절한 약물을 고르시오. 양극성 장애로 진단된 43에 남자 환자는 혼재성 삽화를 겪고 있으며 실험실 검사상 백혈구가 정상 수치에 비해 10% 낮은 결과를 보였다. 이전에 다른 약물 사용 시 피부 발진의 병력도 있었다", "images": [], "text_box": null, "options": ["valproate", "lithium", "carbamazepine", "lamotrigine", "gabapentin"], "answer": [2], "explanation": "Agranulocytosis는 Carbamazepine의 부작용입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2025학번"], "professor": "왕성민", "question": "Genome-wide association study(GWAS)를 통해서 1, 2 개의 SNP 를 찾는데 실패한 질환에 대해서, 다양한 SNP 들의 조합을 분석하여 질환의 위험도를 예측하려는 시도가 이어지고 있다. 아래 그림에서 A에 해당하는 것은?", "images": [], "text_box": null, "options": ["Epigenetic counts", "Polygenic risk score", "Molecular trait quantity", "Genetic mapping quotient", "Linkage analysis coefficient"], "answer": [1], "explanation": "제시된 그림의 x축에는 'Standardised PRS'라고 표기되어 있습니다. PRS는 Polygenic Risk Score의 약자이며, 이는 다유전자 위험 점수를 의미합니다. 따라서 그림에서 A에 해당하는 것은 Polygenic risk score입니다. 이 문제는 19학번과 20학번 시험에 모두 출제되었습니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2025학번"], "professor": "왕성민", "question": "다음은 호르몬에 관한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["Prolactin(프로락틴) 과잉 시 성욕이 증가한다.", "Melatonin 분비가 활성화되면 각성 상태가 증가한다.", "Estrogen(에스트로겐)은 기분을 향상시키는 효과가 있다.", "Growth hormone(성장 호르몬)은 인지기능과 연관이 없다.", "Cortisol 의 기능이 저하되면 Cushing 증후군이 발생할 수 있다."], "answer": [2], "explanation": "프로락틴 과잉 시 성욕은 감소하며, 멜라토닌 분비가 활성화되면 수면이 유도됩니다. 성장 호르몬(GH) 저하 시 인지 기능이 떨어질 수 있으며, 코티솔 수치 증가 시 쿠싱 증후군이 발생합니다. 에스트로겐은 기분을 향상시키는 효과가 있습니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2022학번", "2018학번"], "professor": "왕성민", "question": "호르몬에 관한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["prolactin(프로락틴) 과잉 시 성욕이 감소한다.", "growth hormone(성장 호르몬)은 인지기능과 연관이 없다.", "melatonin 은 생체리듬과 연관 있지만 면역 능력과는 연관이 없다.", "cortisol의 기능이 저하되면 Cushing 증후군이 발생할 수 있다.", "Estrogen 투여 시 우울감이 증가하여 우울증 유발할 수 있다"], "answer": [0], "explanation": "프로락틴 과잉혈증(hyperprolactinemia)의 증상으로는 우울증, 성욕 감소, 월경 주기 이상 등이 있습니다. 성장 호르몬(GH) 저하 시 인지 기능 감소가 발생하며, 멜라토닌은 수면을 유도합니다. 코티솔 수치 증가는 쿠싱 증후군을 유발합니다. 에스트로겐은 기분 향상 효과가 있어 월경전불쾌장애(PMDD)의 경우 항우울제로 사용되기도 합니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2022학번", "2018학번"], "professor": "왕성민", "question": "해외 여행 다녀오고 불면증을 호소하면 온 40 대 남성에게 의사는 '새벽에 광선치료를 하면 밤에 ___이 더 일찍 나와서 잠이 잘 올 거예요' 라고 얘기했다. ___에 들어갈 말은?", "images": [], "text_box": null, "options": ["성장호르몬", "멜라토닌", "프로락틴", "복구실패", "복구실패"], "answer": [1], "explanation": "멜라토닌은 수면 및 생체리듬에 관여하는 호르몬으로, 시차증(jet lag)과 같은 일주기 리듬 장애의 치료제로 사용됩니다. 새벽에 광선치료를 하면 멜라토닌 분비 시간이 조절되어 수면 주기를 정상화하는 데 도움을 줍니다. 이는 멜라토닌이 밤에 더 일찍 분비되도록 유도하여 수면의 질을 개선하는 원리입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2020학번", "2019학번"], "professor": "왕성민", "question": "지속적인 스트레스의 결과, 신체의 신경내분비 반응을 매개하는 가장 중요한 물질은?", "images": [], "text_box": null, "options": ["코티솔(cortisol)", "도파민(dopamine)", "엔돌핀(endorphin)", "옥시토신(oxytocin)", "세로토닌(serotonin)"], "answer": [0], "explanation": "지속적인 스트레스는 시상하부-뇌하수체-부신 축(HPA axis)을 활성화시켜 코티솔 분비를 증가시킵니다. 코티솔은 스트레스 반응을 매개하는 핵심 호르몬으로, 신체의 다양한 생리적 변화에 영향을 미칩니다. 이로 인해 면역 기능 저하 등 여러 문제가 발생할 수 있습니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2020학번", "2019학번", "2018학번"], "professor": "왕성민", "question": "다음 중 정신과 면역계에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["주요우울장애에서 IL-1, IL-6가 감소한다.", "급성 스트레스에 비해 만성 스트레스는 면역기능에 영향을 끼치지 않는다.", "면역기능은 식사, 수면, 운동, 비특이적 스트레스, 정신병 약물에 의해 영향을 받는다.", "신경 발달기의 바이러스 감염은 양극성 장애 예후에 매우 중요한 인자이다.", "스트레스에 의해 면역기능이 증가하여 종양 발생, 바이러스 감염의 위험이 감소한다."], "answer": [2], "explanation": "주요우울장애에서는 염증성 사이토카인인 IL-1, IL-6가 증가하는 경향을 보입니다. 급성 스트레스와 달리 만성 스트레스는 면역기능을 저하시킵니다. 신경 발달기의 바이러스 감염은 조현병의 병리 기전에 관여하며, 스트레스는 면역기능을 약화시켜 감염성 질환에 취약하게 만듭니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2020학번", "2019학번"], "professor": "왕성민", "question": "Epigenetics 변형 중 CpG와 관련된 것은?", "images": [], "text_box": null, "options": ["Histone modification", "miRNA", "DNA methylation", "Deletion", "SNP"], "answer": [2], "explanation": "CpG 부위의 DNA 메틸화는 후성유전학적 변형의 중요한 기전 중 하나입니다. 이는 유전자 발현을 조절하여 세포 기능 및 질병 발생에 영향을 미칩니다. DNA 메틸화는 유전자 서열 자체의 변화 없이 유전자 기능을 변화시키는 핵심 메커니즘입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2020학번", "2019학번"], "professor": "왕성민", "question": "34세 여성이 조현병 진단을 받고 risperidone을 복용하던 중 몇 개월 전 무월경 증상을 보였다. 관련된 호르몬은?", "images": [], "text_box": null, "options": ["melatonin", "growth hormone", "prolactin", "cortisol", "insulin"], "answer": [2], "explanation": "리스페리돈과 같은 일부 항정신병 약물은 프로락틴 수치를 증가시킬 수 있습니다. 프로락틴 과잉혈증(hyperprolactinemia)의 흔한 증상 중 하나가 무월경입니다. 이 외에도 유즙 분비, 성욕 감소, 우울증 등이 나타날 수 있습니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2018학번", "2017학번", "2016학번", "2014학번"], "professor": "", "question": "다음 유전 연구 주제에서 가장 적합하게 사용 될 수 있는 연구 방법은 무엇인가? 두가지 대립 유전자의 발현 빈도가 환자군과 대조군에서 어떻게 차이가 나는지 살펴보아, 질병과 관련된 가능성이 높은 후보 유전자(candidate gene)의 다형성을 발션하는 연구로, 최근 유전자 연구에서 주목받고 있다", "images": [], "text_box": null, "options": ["가계도 분석 연구", "지놈 연구", "연관 연구", "연합 연구", "입양아 연구"], "answer": [3], "explanation": "질병과 관련된 가능성이 높은 후보 유전자(candidate gene)의 다형성을 환자군과 대조군에서 비교하는 연구를 연합 연구(Association study)라고 합니다. 이 연구는 특정 대립 유전자의 발현 빈도 차이를 분석하여 질병과의 연관성을 찾습니다. 이는 최근 유전자 연구에서 널리 활용되는 방법 중 하나입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2018학번", "2017학번"], "professor": "", "question": "빈 칸에 들어갈 정신과 질환의 유전적 요인을 분석하는 방법은?", "images": [], "text_box": null, "options": ["Linkage analysis", "Sequence analysis", "Epigenetic analysis", "Exome analysis", "Human genome project"], "answer": [0], "explanation": "제시된 그림의 '빈 칸'은 유전적 요인 분석 방법 중 'Linkage analysis (연관분석)' 섹션을 가리킵니다. 이 방법은 질병 관련 유전자와 마커 간의 재조합 빈도를 이용하여 유전자 위치를 추적하는 데 사용됩니다. Pedigree analysis와 Affected Sib Pair Analysis는 연관 분석의 하위 방법들입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2018학번"], "professor": "왕성민", "question": "34세 여성이 우울한 기분 및 무력함으로 병원에 왔다. 환자는 1개월 전부터 기분이 가라앉고 쉽게 피로해지며 매사에 집중이 잘 안되고 식욕이 떨어지면서 불면증이 생겼다고 했다. 환자는 직장 생활이나 육아에 특별한 스트레스가 없었다고 한다. 정신건강의학과 의사는 신체질환에 의한 이차적 문제를 감별하기 위해 타 임상과에 협진 의뢰하여 신체 질환을 발견해 내었다. 문맥상 가장 가능성 높은 치료는?", "images": [], "text_box": null, "options": ["항생제 및 소염제 투여", "항암화학요법 시행", "갑상선호르몬 투여", "스테로이드 투여", "인슐린 투여"], "answer": [2], "explanation": "갑상선 기능 저하증은 피로, 쇠약, 서맥 등의 신체 증상 외에 우울, 무감동, 기억장애를 일으킬 수 있습니다. 젊은 여성이 우울 증상을 호소하는 경우 갑상선 기능 검사를 통해 가능성을 타진해야 합니다. 따라서 갑상선 호르몬 투여가 가장 가능성 높은 치료법입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2017학번"], "professor": "", "question": "B에 들어갈 말은?", "images": [], "text_box": null, "options": ["Linkage traits", "Molecular traits", "Symptom traits", "Continuous trait", "Association traits"], "answer": [3], "explanation": "제시된 그림의 'B' 섹션은 정신 질환의 표현형을 연속적인 측정치로 분류하는 'Continuous Traits' 전략을 나타냅니다. 이는 유전자 발현 패턴, 인지 기능, 성격, 뇌 구조 등 다양한 양적 데이터를 활용하여 개별 환자를 평가하는 방식입니다. 이러한 접근법은 기존 범주형 분류의 한계를 극복하려는 시도입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2016학번", "2014학번"], "professor": "", "question": "정신장애의 유전을 평가하기 위한 연구들에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["유전적 요인과 환경적 요인 중 어느 요인이 특정 행동에 더 많이 관여하는 지 관련성을 규명하기 위해 가계 연구가 수행된다.", "정신 질환은 고혈압, 당뇨처럼 대부분 복잡한 유전 기전에 의해 발병한다", "단일 유전자들의 돌연변이에 의해 생기는 병은 비교적 흔한 편이다", "혈연 관계에 있는 사람 간에 같은 병이 발생하는 지 체계적으로 조사하는 연구를 정량적 유전연구라고 한다.", "환경적 요인에서 환경은 성장기 가정이나 사회의 심리적 문화적 환경을 말하며 태생기나 출생 초기의 상황을 반영하는 개념은 아니다"], "answer": [1], "explanation": "정신 질환은 대부분 여러 유전자와 환경적 요인이 복합적으로 작용하여 발생하는 복합 유전 질환입니다. 단일 유전자 돌연변이에 의한 질병은 비교적 드뭅니다. 혈연 간 질병 발생을 체계적으로 조사하는 연구는 가계 연구라고 하며, 환경적 요인은 태생기부터 출생 초기까지 뇌 발달에 영향을 미치는 모든 상황을 포함합니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2016학번"], "professor": "", "question": "정신장애 유전에 대한 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["혈연지간에 병이 나타난다면 유전적 요인이라고 할 수 있다.", "대부분의 정신 장애들은 멘델의 단일 유전자 방식을 따른다.", "환경적 요인은 유전적 요인의 발현과 정도에 영향을 미친다.", "연관분석을 통해 원인 유전자 규명에 성공한 대표적 질환은 만발형(late-onset) 알츠하이머 병이다.", "연합연구는 위치가 알려져 있는 다형성 부위와 질병 유전자 부위의 상대적 거리를 분석하여 질병 유전자의 위치를 파악하는 것이다."], "answer": [2], "explanation": "정신 장애는 대부분 멘델의 단일 유전 방식이 아닌 복합 유전 질환입니다. 환경적 요인은 유전적 요인의 발현과 그 정도에 큰 영향을 미칩니다. 연관 분석은 알려진 마커를 기준으로 질병 유전자의 위치를 파악하는 방법이며, 연합 연구는 후보 유전자의 다형성을 환자군과 대조군에서 비교하는 것입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2012학번", "2011학번"], "professor": "", "question": "다음은 정신장애 유전학에 대한 내용이다. 옳은 것은?", "images": [], "text_box": null, "options": ["정신장애는 대부분이 병태생리가 밝혀져 있다", "대부분의 정신과적 장애물은 멘델의 단일 유전자 방식을 따른다", "환경적 요인은 유전적 요인의 발현과 그 정도에 영향을 미칠 수 없다", "서로 다른 유전자의 변형이 같은 표현형을 야기할 수 있으며 동일한 유전자 변형에 의해 표현형이 다양하게 나타날 수 있다.", "연관분석은 질병과 관련될 가능성이 높은 후보 유전자(candidate gene)에 존재하는 다형성(polymorphism)을 환자군과 대조군에서 비교하는 것이다."], "answer": [3], "explanation": "정신 장애의 병태생리는 아직 대부분 명확히 밝혀지지 않았습니다. 정신과적 장애는 대부분 복합 유전 질환으로, 멘델의 단일 유전자 방식을 따르지 않습니다. 환경적 요인은 유전자의 발현에 큰 영향을 미치며, 질병과 관련될 가능성이 높은 후보 유전자에 존재하는 다형성을 비교하는 것은 연합 연구에 대한 설명입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2012학번"], "professor": "", "question": "다음은 정신장애 유전학에 대한 내용이다. 옳지 않은 것은?", "images": [], "text_box": null, "options": ["대부분의 정신과적 장애들은 복합유전질환에 속한다", "유전적 요인은 환경적 요인에 대한 감수성에 영향을 미치지 못한다", "복합유전질환을 연구할 EO는 특정 질환에 이환되어 있는 형제쌍이나 이환 친척 쌍 분석을 많이 사용하게 된다", "연합연구에서 연합이 있다는 것은 특정 대립 유전자가 의미있게 높게 발현된다는 뜻이다", "스트레스에 의해 증가되는 immediate early gene은 유전과 환경의 상호작용을 반영하는 예이다."], "answer": [1], "explanation": "대부분의 정신과적 장애는 여러 유전자와 환경 요인의 복합적인 상호작용으로 발생하는 복합 유전 질환입니다. 유전적 요인은 환경적 요인에 대한 개인의 감수성을 조절하여 질병 발생에 영향을 미칩니다. 따라서 유전적 요인이 환경적 요인에 대한 감수성에 영향을 미치지 못한다는 설명은 옳지 않습니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2012학번", "2011학번"], "professor": "", "question": "다음 중 복합유전질환(complex somatic disorder)에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["정신지체나 일부 알쯔하이머병은 멘델의 단일 유전방식을 따른다.", "대부분의 유전성 정신질환은 단일 유전자가 작용하여 병을 일으킨다,", "단일 유전자들의 돌연변이에 의해 생기는 병은 대개 발생 빈도가 높다.", "혈연관계에 있는 사람 간에 병이 나타난다면 유전적 요인이라고 할 수 있다.", "환경적 요인이라고 말할 때 인격이 형성되는 학령기 이후의 상황을 반영하는 개념이다."], "answer": [0], "explanation": "정신지체나 일부 알츠하이머병의 아형은 멘델의 단일 유전 방식을 따르는 경우가 있습니다. 대부분의 유전성 정신질환은 단일 유전자가 아닌 여러 유전자와 환경 요인의 복합적인 작용으로 발생합니다. 환경적 요인은 태아기 및 유아기까지의 뇌 발달에 영향을 미치는 상황을 포함하는 광범위한 개념입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2012학번", "2009학번"], "professor": "", "question": "인접한 유전자 간 거리에 비례하여 재조합이 일어난다는 것을 가정으로 하여 위치가 알려져 있는 유전자의 다형성 부위인 marker를 기준으로 하여 질병 관련 유전자의 위치를 찾는 유전자 연구 방법을 무엇이라고 하는가?", "images": [], "text_box": null, "options": ["가계도 분석 연구", "지놈 분석", "연관 분석", "입양아 연구", "연합 분석"], "answer": [2], "explanation": "인접한 유전자 간의 재조합 빈도를 이용하여 질병 관련 유전자의 위치를 찾는 연구 방법을 연관 분석(Linkage analysis)이라고 합니다. 이 방법은 위치가 알려진 유전적 마커를 기준으로 질병 유전자의 상대적 위치를 파악합니다. 재조합 빈도가 낮을수록 두 유전자는 물리적으로 가깝다고 추정할 수 있습니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2011학번", "2010학번", "2009학번"], "professor": "", "question": "다음 유전 연구 주제에서 가장 적합하게 사용할 수 있는 연구 방식은 혈연관계에 있는 사람들 내에서 이 병의 빈도가 높게 나타났다. 그러나, 가족들은 같은 환경에 노출되기 때문에 이 질병이 유전적인 요인에 의한 질병이라고 단정하기는 어려웠다. 따라서 질병의 가족성이 유전의 영향인지, 환경의 영향인지를 따로 가려보기 위해 탐구하고자 한다.", "images": [], "text_box": null, "options": ["가계도 분석 연구", "지놈 분석", "연관 분석", "입양아 연구", "연합 분석"], "answer": [3], "explanation": "혈연관계 내 질병의 가족성이 유전적 또는 환경적 요인 중 어느 것의 영향인지를 구분하기 위해 입양아 연구를 수행합니다. 입양아 연구는 유전적 요소를 공유하는 친척과 환경적 요소만 공유하는 입양 후 친척 간의 발병률을 비교합니다. 이는 유전과 환경의 상호작용을 연구하는 중요한 방법입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2010학번"], "professor": "", "question": "다음은 정신과적 질환과 현재까지 알려진 원인 유전자 혹은 염색체와의 연결이다. 틀린 것을 고르시오.", "images": [], "text_box": null, "options": ["알츠하이머병 - presenilin 2", "알츠하이머병 – APOE(apolipoprotein E)", "정신분열병 – COMT(catechol-O-methyltransferase)", "헌팅턴병 - dysbindin", "양극성장애 - 18p11"], "answer": [3], "explanation": "헌팅턴병은 trinucleotide CAG 반복서열 증가에 의해 발생하며, dysbindin은 정신분열병과 관련된 유전자입니다. 알츠하이머병은 presenilin 2와 APOE 유전자와 관련이 있습니다. 정신분열병은 COMT 유전자와 연관되며, 양극성 장애는 18p11 염색체 부위와 연관성이 보고됩니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["2009학번"], "professor": "", "question": "정신과적 질환과 현재까지 알려진 원인 유전자 혹은 염색체와의 연결 중 가장 적절한 것은?", "images": [], "text_box": null, "options": ["우울증 - dysbindin", "헌팅턴병 - neureglin 1", "정신분열병 - presinilin 2 (PS2)", "양극성장애 - trinucleotide CAG 반복서열", "알츠하이머병 - APOE(apolipoprotein E) £4"], "answer": [4], "explanation": "알츠하이머병은 APOE(apolipoprotein E) ɛ4 대립유전자가 중요한 위험인자입니다. 헌팅턴병은 trinucleotide CAG 반복서열 증가로 인해 발생하며, dysbindin과 neureglin 1은 정신분열병과 연관됩니다. presenilin 2는 알츠하이머병과 관련이 있습니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": ["19학번"], "professor": "왕성민", "question": "Genome-wide association study(GWAS)를 통해서 1, 2 개의 SNP 를 찾는데 실패한 질환에 대해서, 다양한 SNP 들의 조합을 분석하여 질환의 위험도를 예측하려는 시도가 이어지고 있다. 아래 그림에서 A에 해당하는 것은?", "images": [], "text_box": "In genetics, a polygenic score (PGS), also called a polygenic risk score(PRS), genetic risk score, or genome-wide score, is a number that summarizes the estimated effect of many genetic variants on an individual's phenotype, typically calculated as a weighted sum of trait-associated alleles. It reflects an individual's estimated genetic predisposition for a given trait and can be used as a predictor for that trait 왼쪽 그래프에 PRS라고 주어진게 힌트가 될 수 있겠습니다!", "options": ["epigenetic counts", "genetic mapping quotient", "linkage analysis coefficient", "molecular trait quantity", "polygenic risk score"], "answer": [4], "explanation": "Genome-wide association studies (GWAS)는 단일 SNP보다는 여러 SNP의 조합을 통해 질환 위험도를 예측하려는 시도로 발전했습니다. 제시된 그림의 x축에 'Standardised PRS'라고 표기된 것은 다유전자 위험 점수(Polygenic Risk Score)를 의미합니다. PRS는 많은 유전 변이의 효과를 종합하여 개인의 유전적 소인을 예측하는 데 사용됩니다. 따라서 A는 polygenic risk score에 해당합니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": [], "professor": "한창태", "question": "신경계와 면역계 간 상호작용에 관한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["HIV 양성 환자에서 심한 stress는 CD8+ 세포와 NK 세포 수 감소를 일으킨다.", "Chronic life stressor(이혼, 치매환자 돌보기 등)는 면역기능을 보상적으로 증진시킨다.", "interleukin, interferon 등의 cytokine 수용체는 뇌에 없어 간접적으로 중추신경계에 작용한다.", "stressfullifeevent는 세포면역의 이상으로 latent herpes virus에 대한 항체역가를 하강시킨다.", "시상하부-뇌하수체- 부신피질 축이 중요한 역할을 하며 분비된 aldosterone은 면역기능을 조절하는 대표적 호르몬이다"], "answer": [0], "explanation": "스트레스는 일반적으로 면역 기능을 감소시킵니다. HIV 양성 환자에서 심한 스트레스는 CD8+ 세포 및 NK 세포 수 감소와 관련이 있습니다. 뇌에는 사이토카인 수용체가 존재하여 면역계와 직접적인 상호작용이 가능합니다. 알도스테론이 아닌 코티솔이 면역 기능 조절의 대표적인 호르몬입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": [], "professor": "한창태", "question": "55세 여자가 정신건강의학과에 내원하였다. 주부로서 살림을 똑부러지게 해오던 그녀는 아무런 이유없이 1개월 전부터 식욕이 떨어져 식사를 자꾸 거르기 시작하였으며 잠이 들지 않고 새벽에 일찍 깨게 되어 인근 내과에서 수면유도제를 처방받아 복용하기 시작하였다. 보름 전 부터는 이렇게 사느니 차라리 죽는 게 낫다는 생각이 들었으며 이따금씩 옥상에 올라가 아래를 내려다보는 일을 반복하였고 개인위생도 전혀 챙기지 않은 채 침대에서만 생활하기 시작하였다. 남편과 아이들의 관심에 심한 거부반응을 보이고, 스스로를 내버려두라고 소리를 지르며 방에 들어가곤 했다. 이 환자의 진단과 관련된 신경내분비계 변화로 옳은 것은?", "images": [], "text_box": null, "options": ["Adrenal size 감소", "Cortisol 농도 증가", "ACTH에 대한 민감성 감소", "뇌 내 CRH 농도 감소", "CRH에 대한 ACTH의 반응성 증가"], "answer": [1], "explanation": "환자의 증상은 우울증을 시사하며, 우울증에서는 시상하부-뇌하수체-부신 축(HPA axis)의 기능 이상이 흔히 나타납니다. 이는 코티솔 농도 증가, 부신 크기 증가, 뇌 내 CRH 농도 증가 등과 관련됩니다. ACTH에 대한 CRH 반응성은 저하되고, ACTH 민감성은 증가합니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": [], "professor": "한창태", "question": "신경내분비에서 테스토스테론 과다에 대한 설명으로 옳은것은?", "images": [], "text_box": null, "options": ["decreased libido", "depression", "flat mood", "catatonia", "psychosis"], "answer": [4], "explanation": "테스토스테론 과다는 성욕 증가, 에너지 증가, 과민성, 기분 변화 및 공격적인 행동을 유발할 수 있습니다. 경우에 따라 망상이나 환각과 같은 정신병적 증상(psychosis)이 나타날 수도 있습니다. 따라서 테스토스테론 과다는 정신병적 증상과 연관될 수 있습니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": [], "professor": "한창태", "question": "신경내분비계에서 GH (growth hormone)에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["GH 과다분비는 스트레스 경험과 연관있다", "Anorexia nervosa 환자들에서 GH이상 보고된다.", "노인에게 GH 투여시 lean body mass 증가, 생기 감소가 관찰된다.", "소아기 GH 과다는 성인기 psychosocial adaptation에 어려움을 보인다.", "주요우울장애, 감전부전장애 환자중 상당수가 GH과다를 보일수 있다."], "answer": [1], "explanation": "거식증(Anorexia nervosa) 환자에서는 성장 호르몬(GH) 결핍이 흔히 관찰되며, GH 이상이 보고됩니다. 노인에게 GH 투여 시 제지방량은 증가하지만, 생기 감소는 일반적으로 관찰되지 않습니다. 소아기 GH 결핍은 사회심리적 적응에 어려움을 줄 수 있습니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": [], "professor": "한창태", "question": "48세 남자가 정신건강의학과에 내원하였다. 사업가로서 성공적인 경제활동을 하던 그는 최근 횡령으로 회사의 재정상태가 크게 나빠지기 시작하였다. 사람을 쉽게 믿은 것에 대한 자책감을 표현하며 회사를 살릴 방법에 대해 고민하던 차에 점점 식욕이 떨어져 식사를 자꾸 거르기 시작하였으며 잠이 들지 않고 새벽에 일찍 깨게 되어 인근 내과에서 수면 유도제를 처방받아 복용하기 시작하였다. 보름 전부터는 집에서 꼼짝 않고 누운 자세 그대로 있었다고 하며 아내의 자극에도 반응이 거의 없었다고 한다. 일체의 식사와 물을 들지 않아 10kg정도의 급격한 체중감소가 있었으며 이따금씩 '망했어', '다 끝났어'를 반복하고 화장실도 일절 가지 않았으며 개인 위생도 전혀 챙기지 않기 시작하였다. 자식들이 말을 걸어도 전혀 반응이 없는 상태로 기계적인 거부반응을 보였다. 이 환자의 진단에 관련이 있는 신경내분비계의 변화로 옳은 것은?", "images": [], "text_box": null, "options": ["Adrenal 사이즈 감소", "Cortisol 농도 감소", "ACTH에 대한 민감성 감소", "뇌 내 CRH농도 증가", "CRH에 대한 ACTH반응성 증가"], "answer": [3], "explanation": "환자의 증상은 심한 우울증을 시사합니다. 우울증에서는 시상하부-뇌하수체-부신 축(HPA axis)의 기능 항진이 흔히 나타납니다. 이는 코티솔 농도 증가, 부신 크기 증가, ACTH 민감성 증가와 관련됩니다. 특히 뇌 내 CRH 농도 증가는 우울증의 특징적인 신경내분비 변화 중 하나입니다."}, {"subject": "총론 Brain and behavior 2 (신경 내분비, 유전학)", "year": [], "professor": "한창태", "question": "다음 중 뇌하수체에서 분비되는 호르몬은?", "images": [], "text_box": null, "options": ["oxytocin", "TRH (Thyroxine releasing hormone)", "ACTH (Adrenocorticotropic hormone)", "CRH (corticotropin releasing hormone)", "GnRH (Gonadotropin releasing hormone)"], "answer": [2], "explanation": "뇌하수체는 다양한 호르몬을 분비하는 내분비 기관입니다. TRH, CRH, GnRH는 시상하부에서 분비되어 뇌하수체를 자극하는 방출 호르몬입니다. 옥시토신은 시상하부에서 생성되어 뇌하수체 후엽에서 분비됩니다. ACTH(부신피질자극호르몬)는 뇌하수체 전엽에서 분비되는 주요 호르몬입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2022", "19학번"], "professor": "홍승철", "question": "ORX 또는 하이포크레틴에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["뇌교(pons)에서 분비된다.", "각성을 촉진하고 렘수면을 억제한다.", "?", "?", "깊은 수면을 유도한다."], "answer": [1], "explanation": "ORX는 각성을 유도하는 neurotransmitter입니다. ORX가 serotonin과 NE를 활성화하면 렘수면을 억제함으로써 각성 작용을 나타냅니다. ORX는 lat. hypothalamus에서 분비되므로 1번은 틀린 설명입니다. ORX는 각성을 유도하므로 깊은 수면을 억제할 것입니다. 따라서 각성을 촉진하고 렘수면을 억제한다는 2번 보기가 옳은 설명입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2022", "19학번"], "professor": "홍승철", "question": "위상 반응 곡선에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["수면 위상의 지연과 전진을 설명할 수 있다?", "ORX의 농도 변화에 따라 나타난다?", "?", "?", "?"], "answer": [0], "explanation": "위상 반응 곡선은 생체 시계의 위상 변화를 설명하는 도구입니다. 빛과 멜라토닌과 같은 외부 자극이 생체 시계의 주기를 지연시키거나 앞당기는 효과를 나타낼 때 사용됩니다. 따라서 수면 위상의 지연과 전진을 설명할 수 있다는 1번 보기가 옳은 설명입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2022", "19학번"], "professor": "홍승철", "question": "다음 수면다원검사에 해당하는 수면단계에 대한 설명으로 옳은 것은? (REM 수면 소견) - 19 총시", "images": [], "text_box": null, "options": ["근이완이 일어난다.", "꿈이 개념적이고 논리적이다.", "Glutamate 대사가 감소한다.", "수면의 전반부에 나타난다.", "동조적 뇌파가 나타난다."], "answer": [0], "explanation": "렘수면은 근이완이 일어나는 특징적인 수면 단계입니다. 이 단계에서는 꿈을 꾸지만 비논리적이고 추상적인 경우가 많습니다. Glutamate 대사는 렘수면 시 증가하며, 렘수면은 수면의 후반부에 주로 나타납니다. 렘수면 시 뇌파는 비동조적입니다. 따라서 근이완이 일어난다는 설명이 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2020"], "professor": "정규인", "question": "그림 1은 각성 시 수면다원검사 소견이다. 그림 2에 해당하는 수면단계와 관계 있는 사항은?", "images": [], "text_box": null, "options": ["논리적 꿈", "변온성 체온", "야경증 증가", "대뇌온도 감소", "대뇌 포도당 대사 감소"], "answer": [1], "explanation": "그림 2는 렘수면(REM sleep)의 특징적인 뇌파 양상을 보여줍니다. 렘수면 시 체온 조절은 변온성(poikilothermic)으로 외부 온도에 반응합니다. 꿈은 비논리적이고 추상적이며, 뇌파는 비동조적입니다. 대뇌 온도와 포도당 대사는 증가합니다. 야경증은 NREM 수면에서 나타납니다. 따라서 변온성 체온이 렘수면과 관계있는 사항으로 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2020"], "professor": "정규인", "question": "다음 중 prolactin 이 분비되는 단계는? (그림에 나오는 것처럼 특징들이 표시되어 있지 않았음)", "images": [], "text_box": null, "options": ["NREM 1단계 수면", "NREM 2단계 수면", "NREM 3단계 수면", "NREM 4단계 수면", "REM 수면"], "answer": [4], "explanation": "프로락틴(Prolactin)은 주로 렘수면(REM sleep) 중에 분비량이 증가하는 호르몬입니다. 렘수면은 뇌의 활동이 활발하고 꿈을 꾸는 단계로, 호르몬 분비에도 특징적인 변화가 나타납니다. 다른 비렘수면 단계에서도 프로락틴 분비가 있지만, 렘수면 시 가장 높은 수준을 보입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2020"], "professor": "정규인", "question": "수면 주기와 관련이 있고, 불면증 치료에 사용되는 호르몬은 무엇인가? (2019 홍승철 교수님 유사)", "images": [], "text_box": null, "options": ["Insulin", "Cortisol", "Prolactin", "Melatonin", "Growth hormone"], "answer": [3], "explanation": "멜라토닌은 인체의 일주기 리듬을 조절하는 핵심 호르몬입니다. 밤에 분비되어 수면을 유도하고, 불면증 환자에서 수면의 질을 개선하거나 시차 부적응을 완화하는 치료제로 사용됩니다. 멜라토닌을 기반으로 한 수면제도 개발되어 널리 사용되고 있습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2020"], "professor": "정규인", "question": "23세 남성이 수면이 시작된 지 1시간만에 보인 뇌파 소견이다. 해당되는 수면 병리는?", "images": [], "text_box": null, "options": ["야간 음경 팽창이 흔하다.", "뇌 대사가 활발하다.", "근육긴장도가 소실된다.", "호흡수가 감소한다.", "비논리적이고 추상적인 꿈을 꾼다."], "answer": [3], "explanation": "제시된 뇌파 소견(img7.png)은 고진폭 델타파가 predominant한 NREM 수면 4단계의 특징을 보여줍니다. NREM 수면에서는 호흡수가 감소하는 경향이 있습니다. 반면, 야간 음경 팽창, 뇌 대사 활발, 근육 긴장도 소실, 비논리적 꿈 등은 REM 수면의 특징입니다. 따라서 4번 보기가 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2019"], "professor": "홍승철", "question": "DLMO 에 대해 옳은 것은?", "images": [], "text_box": null, "options": ["자정에 증가한다.", "수면 리듬에 관한 지표이다.", "빨라지면 Advanced shift를 의미한다.", "느려지면 Delayed shift를 의미한다.", "혈중 멜라토닌 농도가 10mg가 되는 시간을 말한다."], "answer": [4], "explanation": "DLMO는 혈중 멜라토닌 농도가 10pg/ml에 도달하는 시간을 의미합니다. 이는 수면 리듬의 지표이며, 빨라지면 phase advance(위상 전진), 느려지면 phase delay(위상 지연)를 의미합니다. '10mg'는 단위 오류이지만, 멜라토닌 농도 도달 시간을 지칭하는 의도로 판단됩니다. 따라서 5번 보기가 정답으로 주어진 것으로 보입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2019"], "professor": "홍승철", "question": "REM 수면의 특징으로 맞는 것은?", "images": [], "text_box": null, "options": ["근이완된다.", "꿈이 개념적이고 논리적이다.", "당대사가 적다.", "꿈의 전반부에 나타난다.", "동조적 뇌파가 나타난다."], "answer": [0], "explanation": "REM 수면에서는 근전도 활동이 소실되어 근이완이 일어납니다. 꿈은 비논리적이고 추상적인 경우가 많으며, 대뇌 당대사는 증가합니다. REM 수면은 수면의 후반부에 주로 나타나며, 뇌파는 비동조적입니다. 따라서 1번 보기가 REM 수면의 특징으로 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2019"], "professor": "홍승철", "question": "수면과 관련이 많으며, 시차 적응이 되지 않아 발생하는 불면치료제는?", "images": [], "text_box": null, "options": ["멜라토닌", "생장 호르몬", "인슐린 (insulin)", "코티솔 (cortisol)", "프로락틴 (prolactin)"], "answer": [0], "explanation": "멜라토닌은 인체의 일주기 리듬을 조절하는 주요 호르몬으로, 수면-각성 주기와 밀접한 관련이 있습니다. 시차 부적응으로 인한 불면증 치료에 효과적으로 사용될 수 있습니다. 생장 호르몬, 인슐린, 코티솔, 프로락틴 등 다른 호르몬들도 수면과 관련이 있지만, 시차 적응 불면증 치료제로 주로 사용되는 것은 멜라토닌입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2019"], "professor": "홍승철", "question": "다음 그림에 해당되는 수면 단계에 해당되는 내용은?", "images": [], "text_box": null, "options": ["비급속안구운동(NREM) 수면 2단계에 해당되며 K-complex가 나타난다.", "전체 수면 시간의 50% 정도를 차지한다.", "Sawtooth waves가 주로 나타난다.", "성장호르몬이 많이 분비된다.", "악몽과 관련된 수면단계이다."], "answer": [3], "explanation": "제시된 그림의 뇌파는 NREM 수면 3단계 또는 4단계의 특징인 고진폭의 델타파를 보여주고 있습니다. 성장호르몬은 NREM 수면 3, 4단계에서 주로 분비됩니다. NREM 2단계는 K-complex와 수면 방추가 특징이며, REM 수면에서는 Sawtooth waves와 악몽이 나타납니다. 따라서 4번 보기가 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2018"], "professor": "정규인", "question": "DLMO(Dim light melatonin onset)는?", "images": [], "text_box": null, "options": ["오후 5시 ~ 오후 7시", "오후 9시 - 오후 11시", "오전 1시 – 오전 3시", "오전 5시 – 오전 7시", "오전 9시 ~ 오전 11시"], "answer": [1], "explanation": "DLMO(Dim Light Melatonin Onset)는 어두운 환경에서 혈중 멜라토닌 농도가 증가하기 시작하는 시점을 의미합니다. 일반적으로 저녁 9시에서 밤 11시 사이에 시작되어 멜라토닌 분비가 증가하며, 이는 수면 시작을 알리는 생체 시계의 중요한 지표입니다. 멜라토닌 농도는 새벽 2~4시경 최고조에 달합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2018"], "professor": "정규인", "question": "NREM 수면과 REM 수면 비교 중 올바른 내용은?", "images": [], "text_box": null, "options": ["REM 수면 시 glucose 대사가 상승한다.", "3, 4단계 NREM 수면 시 K-complex가 가장 많이 나타난다.", "야경증, 악몽, 몽유병 등은 NREM 수면에서 더 많이 나타난다.", "REM 수면은 NREM 수면 후 나타나며 수면 전반부에 더 우세한다.", "REM 수면 때 꿈이 더 빈도가 높고 개념적인 내용이다."], "answer": [0], "explanation": "REM 수면 시에는 대뇌의 활동이 활발해지면서 포도당(glucose) 대사가 현저히 상승합니다. NREM 수면 3, 4단계에서는 고진폭의 델타파가 나타나며 K-complex는 주로 NREM 2단계에서 관찰됩니다. 야경증과 몽유병은 NREM 수면에서, 악몽은 REM 수면에서 더 많이 나타납니다. REM 수면은 NREM 수면 이후 나타나며 수면 후반부에 더 우세합니다. REM 수면 시 꿈은 빈도가 높지만 비논리적이고 추상적인 내용이며, 개념적인 꿈은 NREM 수면의 특징입니다. 따라서 1번이 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2018"], "professor": "정규인", "question": "그림 1은 각성 시 수면다원검사 소견이다. 하루 중 그림 2에 해당되는 수면단계에서 가장 많이 분비되는 hormone 은?", "images": [], "text_box": null, "options": ["Insulin", "cortisol", "prolactin", "thyroid hormone", "Growth hormone"], "answer": [4], "explanation": "그림 2는 고진폭 델타파가 predominant한 NREM 수면 4단계의 뇌파 소견을 보여줍니다. 성장호르몬(Growth hormone)은 깊은 수면, 특히 NREM 수면의 3단계와 4단계에서 가장 많이 분비됩니다. 이는 성장과 조직 회복에 중요한 역할을 합니다. 따라서 5번 보기가 옳은 설명입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2018"], "professor": "정규인", "question": "7세 남아가 밤마다 잠이 든 지 2시간 후 갑자기 일어나 5분간 방 안을 돌아다녀서 병원을 방문하였다. 부모가 깨우려 해도 정신을 못 차리다 다시 잠이 들었으며 다음날 아침에는 밤에 있었던 일을 기억하지 못하였다. 증상이 나타나는 수면단계의 정상수면 뇌파의 특징은?", "images": [], "text_box": null, "options": ["K-complex", "Delta waves", "Sleep spindle", "Sawtooth waves", "Mixed frequency waves"], "answer": [1], "explanation": "제시된 증상은 수면 중에 발생하는 야경증 또는 몽유병과 유사하며, 이들은 주로 NREM 수면 3단계 또는 4단계에서 나타납니다. NREM 3, 4단계의 특징적인 뇌파는 고진폭의 델타파(Delta waves)입니다. K-complex와 Sleep spindle은 NREM 2단계의 특징이고, Sawtooth waves는 REM 수면에서 나타납니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2017"], "professor": "홍승철", "question": "수면다원검사시에 측정조합이 맞는 것은?", "images": [], "text_box": null, "options": ["nasal airflow - snoring", "esophageal pressure – respiratory effort", "chin EMG - leg movement", "central EEG - bruxism", "abdominal band - arousal"], "answer": [1], "explanation": "수면다원검사에서 nasal airflow는 호흡량을, microphone은 코골이를 측정합니다. esophageal pressure는 호흡 노력을 측정하는 데 사용되며, chin EMG는 턱 근육의 긴장도를, leg movement는 다리 움직임을 측정합니다. central EEG는 뇌파를 측정하며 bruxism과는 관련이 적고, abdominal band는 호흡 움직임을 측정합니다. 따라서 esophageal pressure와 respiratory effort의 조합이 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2017"], "professor": "홍승철", "question": "렘수면의 특징인 것은?", "images": [], "text_box": null, "options": ["체온조절이 poikilothermic으로 외계온도에 반응을 안 한다.", "대뇌온도와 혈당대사가 비렘수면시보다 저하된다.", "음경발기가 저하된다.", "삼박동과 호흡이 규칙적이다.", "근 긴장도가 증가된다."], "answer": [0], "explanation": "렘수면 시 체온 조절은 변온성(poikilothermic) 특성을 보여 외부 온도에 반응하지 않습니다. 렘수면 중에는 대뇌 온도와 혈당 대사가 증가하며, 음경 발기가 증가합니다. 심박동과 호흡은 불규칙해지고, 근 긴장도는 감소합니다. 따라서 1번 보기가 렘수면의 특징으로 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2017"], "professor": "홍승철", "question": "우리 몸의 생체 시계에 작용하여 수면각성 리듬을 조절하는 인자는?", "images": [], "text_box": null, "options": ["멜라토닌", "알람", "식사", "빛", "운동"], "answer": [3], "explanation": "빛은 인체의 생체 시계인 일주기 리듬을 조절하는 가장 중요한 시간 제공자(Zeitgeber)입니다. 빛은 교차상핵에 직접적인 영향을 주어 멜라토닌 분비를 조절함으로써 수면-각성 주기를 동기화합니다. 멜라토닌 자체도 중요하지만, 외부 인자 중 가장 강력한 것은 빛입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2016"], "professor": "정규인", "question": "하루 중 혈중 멜라토닌 농도가 상승하기 시작하는 시간은?", "images": [], "text_box": null, "options": ["오후 6시 ~ 오후 7시", "오후 10시 ~ 오후 11시", "오전 2시 ~ 오전 3시", "오전 6시 ~ 오전 7시", "오전 10시 ~ 오전 11시"], "answer": [1], "explanation": "멜라토닌은 어두워지기 시작하는 저녁 시간부터 혈중 농도가 상승하기 시작합니다. 일반적으로 오후 8시경부터 상승하기 시작하여 밤 10시에서 11시 사이에 유의미한 수치에 도달하며, 새벽 2시에서 4시경에 최고조에 이릅니다. 이는 수면 시작을 돕는 중요한 생체 신호입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2016"], "professor": "정규인", "question": "NREM 과 REM 수면을 비교한 것으로 옳은 것은?", "images": [], "text_box": null, "options": ["REM 수면에서는 대뇌 산소 소비 및 당 대사가 감소한다.", "NREM 수면 시에 야경증, 악몽, 몽유병이 주로 나타난다.", "NREM 수면 3 단계에서는 Spindles 와 K-spikes 가 관찰된다.", "REM 수면은 NREM 수면에 비해 후반기로 갈수록 나타난다.", "REM 수면은 NREM 수면에 비해 꿈을 잘 꾸며 그 형태는 보다 개념적이고 추상적이다."], "answer": [3], "explanation": "REM 수면은 NREM 수면 단계가 진행된 후 나타나며, 수면 후반부로 갈수록 더 길고 자주 나타나는 특징이 있습니다. REM 수면 시에는 대뇌 산소 소비 및 당 대사가 증가하며, 야경증과 몽유병은 NREM 수면에서, 악몽은 REM 수면에서 나타납니다. Spindles와 K-spikes는 NREM 2단계에서 관찰됩니다. REM 수면의 꿈은 비논리적이고 추상적입니다. 따라서 4번 보기가 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2016"], "professor": "정규인", "question": "7세 남아가 밤마다 잠이 든 지 2시간 후 갑자기 일어나 5분간 방안을 돌아다녀서 병원을 방문하였다. 부모가 깨우려 해도 정신을 못 차리다 다시 잠이 들었으며 다음날 아침에는 밤에 있었던 일을 기억하지 못하였다. 증상이 나타나는 수면 단계는?", "images": [], "text_box": null, "options": ["NREM 수면 1단계", "NREM 수면 2단계", "NREM 수면 3단계", "NREM 수면 4단계", "REM 수면"], "answer": [3], "explanation": "제시된 증상은 수면 중에 발생하는 몽유병(sleepwalking)으로, 이는 주로 NREM 수면의 깊은 단계인 3단계 또는 4단계에서 나타납니다. 이 단계에서는 각성이 어렵고, 사건에 대한 기억이 없는 것이 특징입니다. REM 수면에서는 보통 근육 마비가 동반되어 신체 움직임이 제한됩니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2016"], "professor": "정규인", "question": "그림 1은 각성 시 수면다원검사 소견이다. 그림 2에 해당되는 수면단계는?", "images": [], "text_box": null, "options": ["NREM 수면 1단계", "NREM 수면 2단계", "NREM 수면 3단계", "NREM 수면 4단계", "REM 수면"], "answer": [3], "explanation": "그림 2는 고진폭의 1/2-2 Hz 델타파가 50% 이상을 차지하는 뇌파 소견을 보여주며, 이는 NREM 수면 4단계의 특징입니다. 이 단계는 가장 깊은 수면 단계에 해당합니다. NREM 1, 2, 3단계 및 REM 수면은 각각 다른 뇌파 양상을 보입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2015"], "professor": "홍승철", "question": "청소년의 멜라토닌 분비 특성으로 나타나는 위상변화(phase shifting)와 관련된 수면장애는?", "images": [], "text_box": null, "options": ["Advanced sleep phase type", "Delayed sleep phase type", "Irregular sleep-wake type", "Non-24-hour sleep wake type", "Shift work type"], "answer": [1], "explanation": "청소년기에는 멜라토닌 분비가 늦게 시작되는 생리적 경향이 있어 수면 위상이 지연됩니다. 이로 인해 잠자리에 들기 어려워지고 아침에 깨기 힘들어하는 지연성 수면 위상 증후군(Delayed sleep phase type)이 흔히 발생합니다. 이는 청소년의 일반적인 수면 패턴과 밀접하게 관련되어 있습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2015"], "professor": "홍승철", "question": "수면의 기능 중 치매 예방 기능과 관련된 것은?", "images": [], "text_box": null, "options": ["energy conservation", "Increase of cerebrospinal fluid", "Loss of muscle tone", "Memory consolidation", "Poikilothermic"], "answer": [1], "explanation": "잠을 잘 때 뇌척수액의 흐름이 증가하여 베타 아밀로이드 단백질과 같은 독소 단백질을 뇌 밖으로 효과적으로 밀어냅니다. 이러한 뇌의 청소 과정은 알츠하이머 치매와 같은 신경퇴행성 질환의 예방에 중요한 역할을 합니다. 따라서 뇌척수액의 증가가 치매 예방 기능과 관련이 깊습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2015"], "professor": "홍승철", "question": "다음 뇌파양상, 근전도, 안전위 양상에 해당하는 생리적인 현상은?", "images": [], "text_box": null, "options": ["Muscle tone increase", "No dream", "Penile erection", "Slow eye movement", "Shivering"], "answer": [2], "explanation": "제시된 뇌파 양상은 REM 수면의 특징인 저진폭의 비동조적 뇌파, Sawtooth waves, 낮은 근전도(근이완), 그리고 빠른 안구 운동을 보여줍니다. REM 수면 중에는 꿈이 자주 발생하며, 야간 음경 팽창도 흔하게 나타납니다. 근육 긴장도는 소실됩니다. 따라서 penile erection이 REM 수면과 관련된 생리적 현상으로 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2014"], "professor": "정규인", "question": "다음 중 인체의 24 시간 주기리듬(circadian rhythm)을 주관하는 뇌의 영역은? (2012 정규인 짤, 2015 홍승철 교수님 유사)", "images": [], "text_box": null, "options": ["교차상핵 (suprachiasmatic nucleus)", "청반 (locus ceruleus)", "흑질 (substantia nigra)", "시상하부 (hypothalamus)", "망상체 (reticular formation)"], "answer": [0], "explanation": "인체의 24시간 주기리듬(circadian rhythm)을 주관하는 핵심적인 뇌 영역은 시상하부에 위치한 교차상핵(Suprachiasmatic Nucleus, SCN)입니다. SCN은 빛 신호를 받아 멜라토닌 분비를 조절하고, 수면-각성 주기뿐만 아니라 체온, 호르몬 분비 등 다양한 생체 리듬을 동기화하는 역할을 합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2014"], "professor": "정규인", "question": "맹인에서 흔히 동반될 수 있는 일주기리듬 수면장애 아형은?", "images": [], "text_box": null, "options": ["delayed sleep phase type", "advanced sleep phase type", "irregular sleep-wake type", "non-24-hour sleep-wake type", "shift work type"], "answer": [3], "explanation": "맹인의 경우 빛 자극을 받지 못하여 시상하부의 교차상핵(SCN)이 외부 시간 신호에 동기화되지 못할 수 있습니다. 이로 인해 내재된 생체 시계(free-running rhythm)가 24시간보다 길거나 짧게 작동하여 수면-각성 주기가 매일 조금씩 밀리게 됩니다. 이러한 상태를 비24시간 수면-각성 주기 장애(non-24-hour sleep-wake type)라고 합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2014"], "professor": "정규인", "question": "일주기의 phase shifting 을 잘 일으키는 파장은?", "images": [], "text_box": null, "options": ["380mm", "460mm", "540mm", "620mm", "700mm"], "answer": [1], "explanation": "일주기 리듬의 위상 변화(phase shifting)를 가장 효과적으로 유도하는 빛의 파장은 푸른색 계열의 빛, 즉 약 450~480nm 파장대입니다. 이 파장대의 빛은 망막의 특수 광수용체(melanopsin)를 통해 교차상핵(SCN)에 강한 영향을 주어 멜라토닌 분비를 강력하게 억제하고 생체 시계를 조절합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2014"], "professor": "정규인", "question": "생물학적 리듬에 관한 설명이다. 옳은 것은? (2013 홍승철 교수님 짤)", "images": [], "text_box": null, "options": ["우울증은 생물학적 리듬의 교란과 관련이 있다.", "성장호르몬 분비는 깊은 수면 중에 급격히 감소한다.", "코티솔은 수면시작 무렵에 가장 높고 아침에 가장 낮다.", "갑상샘자극호르몬 및 멜라토닌은 수면이 시작되면 활성화되어 분비된다.", "생체는 생물학적 리듬을 지니고 있으며, 이는 내부적 자극에 의해서만 조절된다."], "answer": [0], "explanation": "우울증은 생물학적 리듬의 교란과 밀접하게 관련되어 있으며, 수면 장애는 우울증의 주요 증상 중 하나입니다. 성장호르몬은 깊은 수면 중에 급격히 증가하고, 코티솔은 수면 시작 시 낮았다가 아침에 최고치를 보입니다. 멜라토닌은 밤에 분비되어 수면을 유도하며, 갑상샘자극호르몬은 수면 시작 무렵에 최고치에 도달 후 감소합니다. 생체 리듬은 내부적 요인뿐 아니라 빛과 같은 외부 자극(Zeitgeber)에 의해서도 조절됩니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2013"], "professor": "홍승철", "question": "깊은 수면 (서파수면) 시 분비되는 호르몬은 무엇인가?", "images": [], "text_box": null, "options": ["cortisol", "melatonin", "thyrotropin", "prolactin", "growth hormone"], "answer": [4], "explanation": "성장호르몬(Growth hormone)은 깊은 수면, 특히 NREM 수면의 3단계와 4단계에서 가장 많이 분비됩니다. 이는 성장과 조직 회복에 중요한 역할을 합니다. 코티솔, 멜라토닌, 갑상샘자극호르몬, 프로락틴 등 다른 호르몬들도 수면과 관련이 있으나, 깊은 수면 시 주로 분비되는 것은 성장호르몬입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2013"], "professor": "홍승철", "question": "다음 중 인체의 24 시간 주기리듬(circadian rhythm)을 주관하는 뇌의 영역은?", "images": [], "text_box": null, "options": ["교차상핵 (suprachiasmatic nucleus)", "망상체 (reticular formation)", "시상하부 (hypothalamus)", "흑질 (substantia nigra)", "송과체 (pineal body)"], "answer": [0], "explanation": "시상하부의 교차상핵(Suprachiasmatic Nucleus, SCN)은 인체 내 생체 시계의 중추로서 24시간 주기리듬을 조절합니다. SCN은 빛 신호를 받아 멜라토닌 분비를 조절하며, 이를 통해 수면-각성 주기, 체온, 호르몬 분비 등 다양한 생리적 리듬을 동기화합니다. 망상체, 시상하부(전체), 흑질, 송과체는 다른 기능을 담당합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2013"], "professor": "홍승철", "question": "수면다원검사로 측정이 어려운 것은?", "images": [], "text_box": null, "options": ["수면의 양(quantity)과 구조(structure)", "수면 시 다리의 움직임", "입면잠복시간, 수면호흡", "수면 시 호흡의 상태", "꿈의 내용"], "answer": [4], "explanation": "수면다원검사는 뇌파, 안구 운동, 근전도, 호흡 등을 통해 수면의 양과 구조, 수면 중 움직임, 호흡 상태 등 다양한 생리적 지표를 객관적으로 측정할 수 있습니다. 그러나 꿈의 내용은 주관적인 경험으로, 수면다원검사만으로는 직접적으로 측정하거나 파악하기 어렵습니다. 꿈의 내용은 주로 피험자의 보고를 통해 알 수 있습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2013"], "professor": "홍승철", "question": "생물학적 리듬에 관한 설명이다. 옳은 것은?", "images": [], "text_box": null, "options": ["우울증은 생물학적 리듬의 교란과 관련이 있다.", "성장호르몬 분비는 깊은 수면 중에 급격히 감소한다.", "코티솔은 수면시작 무렵에 가장 높고 아침에 가장 낮다.", "갑상샘자극호르몬 및 멜라토닌은 수면이 시작되면 활성화되어 분비된다.", "생체는 생물학적 리듬을 지니고 있으며, 이는 내부적 자극에 의해서만 조절된다."], "answer": [0], "explanation": "우울증은 종종 생체 리듬의 교란과 관련이 있으며, 수면 패턴 변화는 우울증의 흔한 증상 중 하나입니다. 성장호르몬은 깊은 수면 중에 급격히 증가하며, 코티솔은 수면 시작 무렵에 낮고 아침에 최고치를 보입니다. 멜라토닌은 밤에 분비되어 수면을 유도하고, 갑상샘자극호르몬은 수면 시작 무렵에 최고치에 도달한 후 감소합니다. 생체 리듬은 내부적 자극 외에도 빛과 같은 외부 환경 요인(Zeitgeber)에 의해 조절됩니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2013"], "professor": "홍승철", "question": "노년기 수면 양상의 특징은?", "images": [], "text_box": null, "options": ["REM 수면 감소", "서파수면 감소", "전체 수면량 증가", "젊은 성인에 비해 수면 요구량 감소", "시차가 뒤로 밀림 (delayed phase)"], "answer": [1], "explanation": "노년기에는 특히 서파수면(NREM 3, 4단계)이 현저히 감소하는 특징을 보입니다. REM 수면량은 크게 변하지 않거나 약간 감소할 수 있으며, 전체 수면량은 감소하지만 수면 요구량은 크게 변하지 않습니다. 수면 위상은 오히려 앞당겨지는 경향이 있습니다. 따라서 서파수면 감소가 노년기 수면 양상의 주요 특징 중 하나입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2012"], "professor": "정규인", "question": "REM 수면에서 더 잘 나타나는 현상은?", "images": [], "text_box": null, "options": ["야경증", "공황발작", "지각적 꿈", "대뇌 온도 감소", "대뇌 포도당 대사 감소"], "answer": [2], "explanation": "렘수면(REM sleep)은 꿈을 꾸는 단계로, 우리가 기억하는 대부분의 생생하고 지각적인 꿈은 렘수면 중에 나타납니다. 야경증, 공황 발작, 대뇌 온도 감소, 대뇌 포도당 대사 감소는 주로 NREM 수면 또는 다른 수면 관련 문제와 관련이 있습니다. 렘수면 시에는 오히려 대뇌 온도와 포도당 대사가 증가합니다. 따라서 지각적 꿈이 렘수면에서 더 잘 나타납니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2012"], "professor": "정규인", "question": "다음 중 호르몬의 일중 변화에 관한 기술 중 틀린 것을 고르시오.", "images": [], "text_box": null, "options": ["코티졸의 경우 수면 시작 무렵에 낮고 아침에 높다.", "TSH 분비는 수면이 시작되면 억제된다.", "멜라토닌은 낮에 분비된다.", "성장호르몬은 깊은 수면에서 급격히 증가한다.", "호르몬 수치의 변화는 수면각성주기와는 연관이 없다."], "answer": [2, 4], "explanation": "멜라토닌은 밤에 분비되어 수면을 유도하는 호르몬이므로 '멜라토닌은 낮에 분비된다'는 설명은 틀렸습니다. 또한, 호르몬 수치의 변화는 수면-각성 주기와 밀접하게 연관되어 있으므로 '호르몬 수치의 변화는 수면각성주기와는 연관이 없다'는 설명도 틀렸습니다. 코티솔은 수면 시작 무렵에 낮고 아침에 높으며, TSH 분비는 수면 시작되면 감소합니다. 성장호르몬은 깊은 수면에서 급격히 증가합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2012"], "professor": "정규인", "question": "노년기 수면 양상의 특징은? (2013 홍승철 교수님 짤)", "images": [], "text_box": null, "options": ["REM 수면이 감소한다.", "전체 수면량이 증가한다.", "젊은 성인에 비해 수면 요구량이 줄어든다.", "시차가 뒤로 밀린다. (delayed phase)", "서파수면(slow wave sleep)이 감소한다."], "answer": [4], "explanation": "노년기에는 서파수면(NREM 3, 4단계)이 현저히 감소하는 것이 가장 두드러진 수면 양상의 특징입니다. REM 수면은 거의 변하지 않거나 약간 감소하며, 전체 수면량은 감소하는 경향이 있습니다. 수면 요구량은 크게 변하지 않고, 수면 위상은 앞당겨지는 경향을 보입니다. 따라서 서파수면의 감소가 올바른 설명입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2012"], "professor": "정규인", "question": "60세 남자가 자다가 꿈을 꿀 때면 꿈 내용대로 행동하면서 난폭한 행동을 하고 머리를 벽에 부딪치는 행동을 하여 내원하였다. 이 남자의 증상과 관계 있는 수면 단계는?", "images": [], "text_box": null, "options": ["NREM 수면 1단계", "NREM 수면 2단계", "NREM 수면 3단계", "NREM 수면 4단계", "REM 수면"], "answer": [4], "explanation": "제시된 증상은 렘수면 행동 장애(REM Sleep Behavior Disorder, RBD)의 전형적인 모습입니다. RBD는 렘수면 중 근육 마비가 정상적으로 발생하지 않아 꿈의 내용을 실제 행동으로 옮기게 되는 수면 장애입니다. 이는 난폭한 행동이나 자해로 이어질 수 있습니다. 따라서 렘수면과 관계가 있습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2012"], "professor": "정규인", "question": "다음 중 인체의 24 시간 주기리듬(circadian rhythm)을 주관하는 뇌의 영역은? (짤)", "images": [], "text_box": null, "options": ["교차상핵 (suprachiasmatic nucleus)", "청반 (locus ceruleus)", "흑질 (substantia nigra)", "시상하부 (hypothalamus)", "망상체 (reticular formation)"], "answer": [0], "explanation": "인체의 24시간 주기리듬(circadian rhythm)을 주관하는 중추는 시상하부에 위치한 교차상핵(Suprachiasmatic Nucleus, SCN)입니다. SCN은 빛 신호를 받아 생체 시계를 조절하고, 수면-각성 주기뿐만 아니라 체온, 호르몬 분비 등 다양한 생리적 리듬을 동기화합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2012"], "professor": "정규인", "question": "정상 남자의 경우 수면 직후 폭발적으로 분비되고 급격히 감소하는 호르몬은?", "images": [], "text_box": null, "options": ["cortisol", "melatonin", "thyrotropin", "prolactin", "growth hormone"], "answer": [4], "explanation": "성장호르몬(Growth hormone)은 수면 직후, 특히 깊은 수면(NREM 3, 4단계)이 시작될 때 가장 강력하게 분비되며 이후 급격히 감소하는 특징을 보입니다. 이는 성장과 조직 회복에 중요한 역할을 합니다. 다른 호르몬들은 분비 양상이나 최고 분비 시간이 다릅니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2011"], "professor": "홍승철", "question": "렘수면 동안에만 선택적으로 활성화되어 렘수면의 발생에 관여하며 전뇌기저부(basal forebrain)와 함께 시상을 통해 뇌피질의 동조화를 억제하는 신경원에 해당하는 것은?", "images": [], "text_box": null, "options": ["콜린성 신경원", "도파민성 신경원", "글루타민성 신경원", "세로토닌성 신경원", "노르아드레날린성 신경원"], "answer": [0], "explanation": "콜린성 신경원(Cholinergic neurons)은 렘수면 동안 선택적으로 활성화되어 렘수면 발생에 중요한 역할을 합니다. 특히 뇌교의 콜린성 신경원과 전뇌기저부의 콜린성 신경원들은 뇌피질의 비동조화를 촉진하여 렘수면의 특징적인 뇌파를 유도합니다. 다른 신경원들은 수면-각성 주기에 관여하지만, 렘수면 특이적 활성 및 뇌피질 비동조화와는 직접적인 관련성이 낮습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2011"], "professor": "홍승철", "question": "수면다원검사 중 다음 뇌파소견을 보아 현재 수면단계로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["비렘수면 1단계", "비렘수면 2단계", "비렘수면 3단계", "비렘수면 4단계", "렘수면"], "answer": [1], "explanation": "제시된 뇌파 소견에는 수면 방추(sleep spindle)와 K-복합체(K-complex)가 명확히 나타나고 있습니다. 이 두 가지는 비렘수면(NREM) 2단계의 특징적인 뇌파 양상입니다. NREM 1단계는 서파가 시작되는 초기 단계이며, NREM 3, 4단계는 고진폭의 델타파가 우세합니다. 렘수면은 저진폭의 비동조성 뇌파와 Sawtooth waves가 특징입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2011"], "professor": "홍승철", "question": "수면다원검사를 하는 중, 환자의 뇌파가 저진폭의 혼합된 주파수와 톱니모양의 활동성 뇌파를 보이며 근육 긴장도가 최하수준으로 감소하면서, 안구운동이 빨라졌다. 다음 중 시기의 수면에서 나타날 수 있는 현상으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["혈압과 심박수는 저하된다.", "체온은 항온상태가 유지된다.", "야간음경팽창은 드물게 관찰된다.", "야경증과 몽유병이 나타날 수 있다.", "대뇌 산소소비 및 당대사가 증가한다."], "answer": [4], "explanation": "주어진 설명은 저진폭 혼합 주파수, 톱니 모양 뇌파, 근육 긴장도 감소, 빠른 안구 운동 등 렘수면(REM sleep)의 특징적인 소견을 나타냅니다. 렘수면 시에는 대뇌 산소 소비 및 당 대사가 증가하며, 혈압과 심박수는 불규칙적으로 변동하고, 체온 조절은 변온성으로 외부 온도에 영향을 받습니다. 야간 음경 팽창은 흔하며, 야경증과 몽유병은 주로 NREM 수면에서 나타납니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2011"], "professor": "홍승철", "question": "노화에 따른 수면 변화 중 가장 적절한 것은?", "images": [], "text_box": null, "options": ["낮잠이 줄어든다.", "서파 수면이 감소한다.", "전체 수면량이 증가한다.", "입면 후 각성이 증가한다.", "시차가 뒤로 밀린다. (delayed phase)"], "answer": [1], "explanation": "노화가 진행됨에 따라 서파수면(NREM 3, 4단계)이 현저히 감소하는 것이 가장 특징적인 수면 변화입니다. 낮잠은 오히려 증가하는 경향이 있으며, 전체 수면량은 감소하고, 입면 후 각성이 증가합니다. 수면 위상은 앞당겨지는 경향(advanced phase)을 보입니다. 따라서 서파수면의 감소가 가장 적절한 설명입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2011"], "professor": "홍승철", "question": "수면의 주기의 분포에 있어서 비렘수면과 렘수면이 되풀이되는 간격은 일반적으로 어느 정도인가?", "images": [], "text_box": null, "options": ["10~20분", "20~30분", "30~60분", "60~90분", "90분~100분"], "answer": [4], "explanation": "정상적인 수면 주기는 비렘수면과 렘수면이 약 90분에서 100분 간격으로 반복됩니다. 이 주기는 하룻밤 동안 4~6회 반복되며, 수면 주기마다 각 수면 단계의 비율이 달라집니다. 특히 렘수면은 수면 후반기로 갈수록 길어지는 경향을 보입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2010"], "professor": "정규인", "question": "하루 중 남성의 혈중 성장호르몬(Growth hormone) 농도가 가장 높은 시간은?", "images": [], "text_box": null, "options": ["오후 8시 ~ 오후 10시", "밤 12시 ~ 오전 2시", "오전 4시 ~ 오전 6시", "오전 8시 ~ 오전 10시", "오전 12시 ~ 오후 2시"], "answer": [1], "explanation": "성장호르몬(Growth hormone)은 주로 수면이 시작된 직후부터 깊은 수면 단계에서 분비량이 증가합니다. 혈중 농도는 대략 밤 12시(자정)에서 새벽 2시경에 최고조에 달하며, 이후 점차 감소합니다. 따라서 밤 12시에서 오전 2시 사이가 가장 높은 시간으로 볼 수 있습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2010"], "professor": "정규인", "question": "다음 중 circadian rhythm 과 가장 관계 있는 호르몬은?", "images": [], "text_box": null, "options": ["세로토닌", "도파민", "노르에피네프린", "멜라토닌", "아세틸콜린"], "answer": [3], "explanation": "멜라토닌은 인체의 일주기 리듬(circadian rhythm)을 조절하는 데 가장 직접적이고 중요한 역할을 하는 호르몬입니다. 멜라토닌은 어둠 속에서 분비되어 수면을 유도하고, 빛에 의해 분비가 억제되어 수면-각성 주기를 조절합니다. 다른 신경전달물질과 호르몬들도 수면에 영향을 미치지만, 일주기 리듬과의 직접적인 관련성에서는 멜라토닌이 가장 큽니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2010"], "professor": "정규인", "question": "다음 중 가장 중요한 zeitgeber 는? (2009 홍승철 교수님 유사)", "images": [], "text_box": null, "options": ["Melatonin", "빛", "수면-각성 시간표", "사회활동", "전자기장"], "answer": [1], "explanation": "Zeitgeber는 생체 시계를 외부 환경에 동기화시키는 시간 제공자를 의미합니다. 이 중 빛은 인체의 일주기 리듬을 조절하는 가장 강력하고 중요한 Zeitgeber입니다. 빛은 직접적으로 시상하부의 교차상핵(SCN)에 영향을 주어 멜라토닌 분비를 억제하고 수면-각성 주기를 조절합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2010"], "professor": "정규인", "question": "다음 수면다원검사 뇌파에 해당되는 수면 단계는? (2011 홍승철 교수님 짤)", "images": [], "text_box": null, "options": ["NREM 수면 1단계", "NREM 수면 2단계", "NREM 수면 3단계", "NREM 수면 4단계", "REM 수면"], "answer": [1], "explanation": "제시된 뇌파 소견에는 수면 방추(sleep spindle)와 K-복합체(K-complex)가 명확히 나타나고 있습니다. 이 두 가지는 비렘수면(NREM) 2단계의 특징적인 뇌파 양상입니다. NREM 1단계는 서파가 시작되는 초기 단계이며, NREM 3, 4단계는 고진폭의 델타파가 우세합니다. 렘수면은 저진폭의 비동조성 뇌파와 Sawtooth waves가 특징입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2010"], "professor": "정규인", "question": "노년기 수면의 특징을 설명한 것 중 틀린 것은?", "images": [], "text_box": null, "options": ["REM 수면의 횟수가 증가한다.", "REM 수면 기간이 증가한다.", "1, 2단계 얕은 수면이 증가한다.", "3, 4단계 깊은 수면이 감소한다.", "일찍 잠들고 아침까지 깊이 잠을 자지 못하고 밤중에 자주 깬다."], "answer": [1], "explanation": "노년기에는 깊은 수면(NREM 3, 4단계)이 현저히 감소하고 얕은 수면(NREM 1, 2단계)이 증가합니다. REM 수면의 총 기간은 감소하거나 큰 변화가 없으므로 기간이 증가한다는 설명은 틀렸습니다. 다만, 수면의 단편화로 인해 REM 수면의 횟수는 증가할 수 있습니다. 일찍 잠들고 밤중에 자주 깨는 등 수면의 질이 저하되는 경향을 보입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2009"], "professor": "홍승철", "question": "수면다원검사에 해당되지 않는 것은?", "images": [], "text_box": null, "options": ["EOG", "EMG", "혈중 melatonin 농도", "airflow", "arterial oxygen saturation"], "answer": [2], "explanation": "수면다원검사(Polysomnography, PSG)는 EOG(안구운동), EMG(근전도), EEG(뇌파), airflow(호흡), arterial oxygen saturation(동맥혈 산소 포화도) 등 다양한 생리적 지표를 동시에 측정하여 수면 장애를 진단하는 검사입니다. 혈중 멜라토닌 농도는 혈액 검사를 통해 측정되며, 수면다원검사의 직접적인 구성 요소는 아닙니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2009"], "professor": "홍승철", "question": "우울증에서 나타날 수 있는 수면의 특징으로 틀린 것은?", "images": [], "text_box": null, "options": ["서파수면 증가", "REM 수면 증가", "REM 들어가는데 걸리는 시간 (latency) 감소", "수면박탈이 우울증 치료에 효과가 있다.", "circadian rhythm에 관계가 있다."], "answer": [0], "explanation": "우울증 환자는 일반적으로 서파수면(깊은 수면)이 감소하고, REM 수면은 증가하거나 REM 수면 잠복기가 단축되는 경향을 보입니다. 수면 박탈은 일시적으로 우울 증상을 완화시키는 효과가 있으며, 우울증은 생체 리듬(circadian rhythm) 교란과 밀접하게 관련되어 있습니다. 따라서 서파수면 증가라는 설명은 틀렸습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["2009"], "professor": "홍승철", "question": "다음 중 가장 중요한 Zeitgeber 는?", "images": [], "text_box": null, "options": ["melatonin", "빛", "각성수면표", "전자기장", "사회생활"], "answer": [1], "explanation": "Zeitgeber는 생체 시계를 동기화하는 외부 환경 요인을 의미하며, 이 중 빛이 가장 강력하고 중요한 Zeitgeber입니다. 빛은 교차상핵(SCN)에 직접적인 영향을 주어 멜라토닌 분비를 조절하고 수면-각성 주기를 동기화합니다. 멜라토닌 자체는 호르몬이며, 다른 요소들은 부가적인 Zeitgeber 역할을 합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["20학번"], "professor": "정규인", "question": "그림 1은 각성 시 수면다원검사 소견이다. 그림 2에 해당하는 수면단계와 관계 있는 사항은? (위가 그림 1, 아래가 그림 2)", "images": [], "text_box": null, "options": ["개념적 꿈", "항온성 체온", "야경증 증가", "동조적 뇌파", "대뇌 산소소비 증가"], "answer": [4], "explanation": "그림 2는 렘수면(REM sleep)의 특징적인 뇌파 양상을 보여줍니다. 렘수면 시에는 꿈을 꾸지만 비논리적이고 추상적인 경우가 많고, 체온 조절은 변온성으로 외부 온도에 영향을 받습니다. 뇌파는 비동조적이며, 대뇌 산소 소비 및 당 대사가 증가합니다. 야경증은 NREM 수면에서 나타나는 현상입니다. 따라서 대뇌 산소 소비 증가가 렘수면과 관계있는 사항으로 옳습니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["20학번"], "professor": "정규인", "question": "수면의 개선을 위해 사용되는 호르몬은?", "images": [], "text_box": null, "options": ["cortisol", "growth hormone", "insulin", "melatonin", "prolactin"], "answer": [3], "explanation": "멜라토닌은 수면-각성 주기를 조절하는 호르몬으로, 수면 리듬을 조절하는 데 중요한 역할을 합니다. 특히 시차 부적응이나 불면증 치료에 사용되어 수면을 개선하는 데 도움을 줄 수 있습니다. 코티솔, 성장호르몬, 인슐린, 프로락틴 등 다른 호르몬들도 수면과 상호작용하지만, 수면 개선 목적으로 직접 사용되는 주요 호르몬은 멜라토닌입니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["20학번"], "professor": "정규인", "question": "하루 중 혈중 멜라토닌 농도가 가장 높은 시간은?", "images": [], "text_box": null, "options": ["오후 6시 - 오후 7시", "오후 10시 - 오후 11시", "오전 2시 - 오전 3시", "오전 6시 - 오전 7시", "오전 10시 - 오전 11시"], "answer": [2], "explanation": "멜라토닌은 밤에 분비되기 시작하여 새벽 시간대에 최고 농도에 도달합니다. 일반적으로 새벽 2시에서 4시경에 혈중 멜라토닌 농도가 가장 높으며, 이는 수면을 유도하고 유지하는 데 중요한 역할을 합니다. 이후 아침이 되면 농도가 점차 감소하여 기상에 대비합니다."}, {"subject": "Brain and behavior (시간생물학과 정상수면)", "year": ["20학번"], "professor": "정규인", "question": "그림 1은 각성 시 수면다원검사 그래프이다. 그림 2에 해당하는 수면단계에서 가장 많이 분비되는 호르몬은? (20 총시)", "images": [], "text_box": null, "options": ["Insulin", "Cortisol", "Prolactin", "Thyrotopin", "Growth hormone"], "answer": [4], "explanation": "그림 2는 NREM 수면 4단계의 특징인 고진폭 델타파가 predominant하게 나타나는 뇌파 소견입니다. 성장호르몬(Growth hormone)은 깊은 수면, 특히 NREM 수면의 3단계와 4단계에서 가장 많이 분비되는 호르몬입니다. 따라서 그림 2에 해당하는 수면단계에서 가장 많이 분비되는 호르몬은 성장호르몬입니다."}, {"subject": "총론 정신증상과 징후", "year": ["15학번", "2017년", "2014년", "2013년"], "professor": "김정진", "question": "알코올성치매가 의심되는 65세 남자가 기억이 나지 않는 부분을 상상하여 꾸며내는 증상으로 부인과 함께 내원하였다. 정신병리는?(2017년, 2014년, 2013년짤)", "images": [], "text_box": "=기억영역징후 기억나지 않는 부분을 상상적 경험으로 채움, 알코올성치매에서 보임", "options": ["착각(illusion)", "기억상실(amnesia)", "작화증(confabulation)", "환상적 거짓말(pseudologia fantastica)", "회상성조작(retrospective falsification)"], "answer": [2], "explanation": "작화증(Confabulation)은 기억의 공백을 채우기 위해 무의식적으로 지어낸 이야기나 상상적인 경험을 사실처럼 말하는 증상입니다. 알코올성 치매 환자에게서 흔히 관찰되며, 환자는 자신이 기억을 지어내고 있다는 것을 인지하지 못합니다. 이는 기억력 손상과 밀접하게 관련되어 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["14학번", "2014년", "2011년"], "professor": "김정진", "question": "60세 여자가 '이웃이 이불을 터는 것을 보고 나에게 신호를 보내는 것이라고 확신했다.'라고 했다. 어떠한 사고 내용의 장애인가?(2014년, 2011년짤)", "images": [], "text_box": "관계망상은 다른 사람의 행동이나 주변 사람, 사물, 또는 상황이 자신과 연결되어 특별한 의미를 갖는다고 믿는 것 2014년:'길을 걸어가면 내가 모르는 사람들이 나를 쳐다보면서 나에 대해 이야기한다.'고 이야기하였다. 2011년:'길을 가면 사람들이 나에 대해서 귓속말로 험담을 한다.'고 말하였다.", "options": ["과대망상 (grandiose delusion)", "관계망상 (delusion of reference)", "사고전파 (thought broadcasting)", "조종망상 (delusion of being controlled)", "피해망상 (persecutory delusion)"], "answer": [1], "explanation": "관계망상(Delusion of reference)은 주변의 무관한 사건이나 타인의 행동이 자신과 특별한 의미로 연결되어 있다고 믿는 망상입니다. 이웃이 이불을 터는 단순한 행위에 자신에게 보내는 신호라는 특별한 의미를 부여한 것이 이에 해당합니다. 이는 조현병 등에서 관찰되는 흔한 망상 유형입니다."}, {"subject": "총론 정신증상과 징후", "year": ["14학번", "2013년"], "professor": "김정진", "question": "35세 남자가 면담 중 직업에 대해서 묻자 '역대 대통령들 중에 변호사들이 있습니다. 저는 변호사 출신 대통령을 좋아합니다. 저도 대통령이 될 수 있을까요? 저는 변호사입니다.'라고 답하였다. 어떠한 사고 내용의 장애인가?(2013년짤)", "images": [], "text_box": "이야기하려는 주제인 자신의 직업에 도달하기 전에 불필요하고 부적절한 내용들이 진행되나, 결국 자신의 직업에 대한 이야기에 도달했기 때문에 우원증입니다. 2013년: 사고과정의 장애로서 주제에는 도달하지만 얘기하려는 주제에 도달하기 전에 불필요하고 부적절한 내용들이 진행되는 것을 정신병리용어로 무엇이라고 하는가?", "options": ["우원증", "사고의 단절", "사고의 비약", "사고의 이탈", "연상의 이환"], "answer": [0], "explanation": "우원증(Circumstantiality)은 대화의 주제에서 벗어나 불필요하고 장황한 세부 사항들을 늘어놓지만, 결국에는 원래의 주제로 돌아오는 사고 과정 장애입니다. 환자는 본래 질문에 직접적으로 답하지 않고 여러 관련 없는 이야기들을 거쳐 마침내 핵심 내용에 도달합니다. 이는 불안이나 강박성향에서도 나타날 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["20학번"], "professor": "정조은", "question": "26세 여자가 우울감으로 병원에 왔다. ~. 밑줄 친 부분의 정신 병리는? (복구미흡)", "images": [], "text_box": null, "options": ["비현실감 (derealization)", "이인증(depersonalization)", "감정표현불능증 (alexithymia)", "증상 무관심 (la belle indifference)", "감정 실금 (emotional incontinence)"], "answer": [1], "explanation": "이인증은 자기 자신이나 신체의 일부가 낯설거나 비현실적으로 느껴지는 증상입니다. 마치 꿈을 꾸는 것 같거나 자신과 분리된 듯한 느낌을 받습니다. 환자 본인의 내적 공간이 바뀌었다는 느낌과 관련이 있습니다. 이는 자기 정체감의 혼란과 관련될 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["20학번"], "professor": "정조은", "question": "30세 여자가 갑자기 발생한 우측 상하지 ~ 과로 의뢰되었다. 여자는 오른쪽 팔다리에 마비가 있다고 말하며 ~(증상에 무심한 표정과 태도를 보였다는 내용). 밑줄 친 부분에 해당하는 정신 병리는? (복구미흡)", "images": [], "text_box": null, "options": ["무감동(apathy)", "의지상실증(abulia)", "무쾌감증(anhedonia)", "양가감정(ambivalence)", "증상 무관심(la belle indifference)"], "answer": [4], "explanation": "증상 무관심은 신체 증상이나 질병에 대해 부적절하게 평온하거나 무관심한 태도를 보이는 정신 병리입니다. 특히 전환장애(conversion disorder) 환자에게서 자주 관찰되며, 'la belle indifference'라고도 불립니다. 본인의 장애에 대해 걱정이 없으며 안정된 모습을 보이는 것이 특징입니다."}, {"subject": "총론 정신증상과 징후", "year": ["20학번"], "professor": "정조은", "question": "검사를 위해 치료자가 조현병 환자의 팔과 다리를 임의로 굽혀 놓았더니 한참 동안 그 자세를 유지하였다. 해당하는 양상은?", "images": [], "text_box": "납굴증은 긴장증(catatonia)의 극심한 형태로, 수동적으로 만들어진 자세를 계속 유지하는 행동입니다.", "options": ["거부증(negativism)", "상동증(stereotypy)", "반향행동 (echopraxia)", "납굴증(waxy flexibility)", "자동증(automatic obedience)"], "answer": [3], "explanation": "납굴증은 긴장증(catatonia)의 한 형태로, 환자의 사지나 몸을 특정 자세로 만들어 놓으면 마치 밀랍 인형처럼 그 자세를 오랫동안 유지하는 행동을 말합니다. 이는 수동적으로 만들어진 자세를 지속적으로 유지하는 특징을 보입니다. 스스로 움직이려는 의지가 부족하고 외부 지시에 따르는 경향이 강합니다."}, {"subject": "총론 정신증상과 징후", "year": ["20학번"], "professor": "정조은", "question": "29세 여자가 조현병으로 입원하였다. 여자는 병원에 같이 온 부모님은 가짜이며, 자신이 외출했던 사이 가족 모두가 똑같이 생긴 다른 사람으로 바꿔치기 당한 것이라고 이야기하였다. 관련된 정신 병리는?", "images": [], "text_box": "카그라스 증후군은 자신과 가까운 사람이 똑같이 생긴 복제로 바꿔치기 당했다고 생각하는 망상적 오인입니다.", "options": ["사고주입 (Thought insertion)", "과대망상 (Grandiose delusion)", "관계망상 (Delusion of reference)", "프레골리 증후군 (Frdgoli syndrome)", "카그라스 증후군 (Capgras syndrome)"], "answer": [4], "explanation": "카그라스 증후군은 자신과 가까운 사람이 똑같이 생긴 복제로 바꿔치기 당했다고 믿는 망상적 오인입니다. 환자는 친숙한 인물이 외형은 동일하나 실제로는 다른 사람이라고 확신합니다. 이는 주로 조현병이나 뇌 손상 환자에게서 나타날 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["20학번"], "professor": "정조은", "question": "25세 남자가 사람들이 대화 중에 자신과 관련된 이야기를 은밀히 하는 것 같다며 병원에 왔다. 밑줄 친 남자의 믿음이 관계사고인지 관계망상인지를 감별하기 위해 가장 중요한 평가 항목은?", "images": [], "text_box": null, "options": ["증상의 기간", "불안 증상의 유무", "스트레스 인자 유무", "정신과 질환의 가족력", "믿음에 대한 현실 검증력"], "answer": [4], "explanation": "관계사고와 관계망상을 구분하는 가장 중요한 기준은 현실 검증력의 유무입니다. 관계사고는 특정 사건이나 대화가 자신과 관련 있다고 생각하지만, 그럴 리가 없다는 것을 인지할 수 있습니다. 반면 관계망상은 그러한 믿음이 현실과 다르다는 것을 전혀 받아들이지 않습니다. 즉, 현실 검증력의 손상 여부가 두 개념을 명확히 구분합니다."}, {"subject": "총론 정신증상과 징후", "year": ["20학번"], "professor": "정조은", "question": "63세 남자가 3개월 전부터 숨이 참, 가슴 두근거림, 어깨, 무릎, 허리의 통증 및 두통을 호소하며 질병은 돌아다니는 양상이었다. 병원에서 관련 검사를 받아도 이상 소견이 발견되지 않았으며, 대증적 치료를 받아도 증상이 호전되지 않는다며 의사들에게 화를 내었다. 진단은?", "images": [], "text_box": "질병에 걸렸다는 불안감보다는, 신체적 증상에 의한 과도한 심리적 불편감을 호소하고 있는 환자이므로 신체증상장애로 진단할 수 있습니다. 수업시간에 배운 신체 망상과 조금 비슷한 것 같습니다.", "options": ["공황장애", "범불안장애", "신체증상장애", "주요우울장애", "질병불안장애"], "answer": [4], "explanation": "질병불안장애는 심각한 질병에 걸렸다는 생각에 지나치게 몰두하는 정신 질환입니다. 신체 증상이 미미하거나 없으며, 있더라도 질병에 대한 불안감에 비해 경미합니다. 반복적인 검사와 부정적인 결과에도 불구하고 질병에 대한 확신을 유지하며, 이는 환자의 고통과 기능 저하를 유발합니다."}, {"subject": "총론 정신증상과 징후", "year": ["20학번"], "professor": "정조은", "question": "28세 남성이 자신을 뒷담화 하는 동료들 때문에 스트레스가 있다며 부모님과 함께 내원하였다. 그는 6개월 전에 IT 회사에 취직하였으며, 동료들이 자신에 대해 나쁜 소문을 퍼뜨리고 있다고 말했다. 또한 다른 동료들이 옆자리에서 의도적으로 키보드를 세게 치고, 마우스를 크게 딸깍여서 자신의 업무를 방해하고 있다고 말했다. 이 때문에 그는 한 달 전에 직장에 사직서를 제출하였다. 회사를 그만두고 나서 그는 이제 친척과 가족들이 자신을 험담하고 다닌다며 두문불출하고 있다. 이 남자에게 가장 적합한 진단은?", "images": [], "text_box": null, "options": ["조현병", "망상장애", "조현양상장애", "주요우울장애", "단기정신병적장애"], "answer": [1], "explanation": "망상장애는 적어도 1개월 이상 지속되는 한 가지 이상의 망상이 있으나, 조현병의 A기준(환각, 와해된 언어 등)은 충족하지 않는 경우 진단됩니다. 이 환자는 조직적이고 비기이한 피해망상을 6개월 이상 지속하고 있습니다. 망상과 관련된 행동 변화(사직, 두문불출)가 두드러지게 나타나며, 이는 망상장애의 특징에 부합합니다."}, {"subject": "총론 정신증상과 징후", "year": ["19학번", "20학번"], "professor": "정조은", "question": "기능성보다 기질성 질환을 시사하는 것은?", "images": [], "text_box": null, "options": ["35세 남자가 돌아가신 어머니의 목소리가 들린다며 내원", "초조해 보였고", "의식상태는 혼돈으로 지남력 저하를 보였다.", "가족력에서 어머니가 조현병으로 치료중이었다."], "answer": [2], "explanation": "의식 상태의 혼돈과 지남력 저하는 기질성 뇌 질환을 시사하는 강력한 증상입니다. 기능성 정신 질환은 주로 의식 명료성을 유지하는 경향이 있습니다. 따라서 의식의 변화는 뇌의 기질적인 원인을 먼저 고려해야 함을 나타냅니다. 이는 섬망 등 급성 기질성 반응에서 흔히 관찰됩니다."}, {"subject": "총론 정신증상과 징후", "year": ["19학번"], "professor": "정조은", "question": "멀티태스킹과 같이 두 가지 이상에 주의를 기울이는 주의력을 무엇이라고 하는가?", "images": [], "text_box": null, "options": ["분산 주의력", "초점 주의력", "교체 주의력", "지속 주의력", "선택 주의력"], "answer": [0], "explanation": "분산 주의력(Divided Attention)은 동시에 두 가지 이상의 자극이나 과제에 주의를 기울일 수 있는 능력을 말합니다. 멀티태스킹과 같이 여러 작업을 동시에 처리할 때 사용되는 주의력입니다. 이는 집중력과 함께 인지 기능의 중요한 요소 중 하나입니다."}, {"subject": "총론 정신증상과 징후", "year": ["19학번"], "professor": "정조은", "question": "35세 여자가 양극성장애의 조증으로 내원하였다. '냉장고를 샀어요. LG. 야구 좋지. 내 친구가 쌍둥이인데. 재밌어 보여. 할렐루야!”와 같이 사고의 빠른 전개를 보였다. 무엇에 해당하는가?", "images": [], "text_box": "사고의 비약 입니다. 조증 환자에서 주로 나타났습니다.", "options": ["우원증", "보속증", "사고의 비약", "연상의 이완", "음송증"], "answer": [2], "explanation": "사고의 비약(Flight of Ideas)은 사고의 흐름이 너무 빨라 한 가지 주제에서 다른 주제로 빠르게 넘어가지만, 언어적으로는 서로 연결되어 있는 상태를 말합니다. 조증 환자에게서 흔히 나타나는 증상으로, 말이 빠르고 주제가 계속 바뀝니다. 언뜻 보면 연관성이 없어 보이나 자세히 들어보면 미약한 연결고리가 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["19학번"], "professor": "정조은", "question": "직장동료가 나를 싫어한다는 생각에 사로잡혀 있다. 이것이 관계 사고인지 관계 망상인지 구분하는 방법은?", "images": [], "text_box": "관계사고와 관계망상의 구분은 reality testing의 유무로 이루어졌습니다.", "options": ["증상의 기간", "약물력?", "가족력", "성별", "망상의 현실 검증력"], "answer": [4], "explanation": "관계 사고와 관계 망상을 구분하는 핵심은 현실 검증력의 유무입니다. 관계 사고는 특정 믿음이 있을 수 있지만, 다른 사람들의 설명을 듣거나 상황을 재평가하여 자신의 믿음이 잘못되었을 수도 있음을 받아들일 수 있습니다. 반면, 관계 망상은 자신의 믿음이 현실과 다르다는 증거에도 불구하고 이를 전혀 수정하지 못하는 견고한 확신을 보입니다."}, {"subject": "총론 정신증상과 징후", "year": ["19학번"], "professor": "정조은", "question": "틱 장애에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["율동적이다.", "참을 수 있다.", "느리게 반복한다.", "외설증이 흔하다.", "얼굴 틱에서 시작한다."], "answer": [4], "explanation": "틱 장애는 불수의적이고 반복적인 움직임이나 소리를 특징으로 하는 신경발달장애입니다. 틱은 일반적으로 얼굴, 특히 눈 깜빡임과 같은 얼굴 틱에서 시작되는 경우가 많습니다. 틱은 일시적으로 억제할 수 있지만 결국에는 터져 나오며, 스트레스 상황에서 악화될 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["18학번"], "professor": "정조은", "question": "40대 여자가 스트레스를 받으면 목에 무언가 걸린 듯한 느낌이 들지만 이에 대한 자신의 기분이나 감정을 느끼거나 표현하지 못한다. 밑줄 친 부분에 해당하는 정신병리학적 증상은?", "images": [], "text_box": "Alexithymia(감정표현불능증) : 기분이나 감정을 깨닫고 표현하는 것을 어려워하거나 하지 못하는 것", "options": ["무감동(apathy)", "무쾌감증(anhedonia)", "감정부전증(alexithymia)", "단조로운 정동(flat affect)", "만족스러운 무관심(la belle indifference)"], "answer": [2], "explanation": "감정부전증(Alexithymia)은 자신의 감정을 인식하고 언어로 표현하는 데 어려움을 겪는 상태를 의미합니다. 환자는 신체적 감각은 느끼지만 그것이 어떤 감정에서 비롯된 것인지 파악하지 못하며, 감정을 설명하거나 타인의 감정을 이해하는 데도 어려움을 보입니다. 이는 스트레스 상황에서 신체 증상으로 나타나는 경향이 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["18학번"], "professor": "정조은", "question": "26세 여자가 어머니 장례식장에서 갑자기 웃음을 터뜨려 병원에 왔다. 여자는 기분이 우울하다고 말하면서 미소를 지었다. 의사는 밑줄 친 부분과 관련된 영역에서 부적합하다고 판단하였다. 그 영역은?", "images": [], "text_box": "적절성과 일치성에 따라 정동을 분류하였을 때 Inappropriate or incongruent affect →본인의 감정,생각,말,상황과 맞지 않는 정동 상태였습니다!", "options": ["affect", "mood", "motor activity", "perception", "thought"], "answer": [0], "explanation": "정동(affect)은 외부적으로 관찰되는 감정 표현을 의미하며, 상황이나 생각과 적절하게 일치해야 합니다. 이 환자의 경우 슬픈 장례식 상황과 우울하다는 진술에도 불구하고 웃음을 보이는 것은 정동의 부적합성(inappropriate affect)을 나타냅니다. 이는 조현병 등 다양한 정신 질환에서 관찰될 수 있는 증상입니다."}, {"subject": "총론 정신증상과 징후", "year": ["18학번"], "professor": "정조은", "question": "조현병으로 진단받은 35세 남자에게 가족 관계에 대해 물었으나 '기분이 좋다'라고 질문과는 상관없는 엉뚱한 대답을 하였다. 밑줄 친 부분의 사고 과정 장애를 설명하는 것은?", "images": [], "text_box": "대화내용과는 맞지 않는 엉뚱한 대답= 사고의 부적절성입니다.", "options": ["탈선 (derailment)", "보속증 (perseveration)", "사고의 두절 (blocking of thought)", "연상의 이완 (loosening of association)", "사고의 부적절성 (irrelevance of thought)"], "answer": [4], "explanation": "사고의 부적절성(Irrelevance of Thought)은 질문의 내용이나 상황과 전혀 관련 없는 엉뚱한 대답을 하는 사고 과정 장애를 말합니다. 환자의 대답이 질문의 주제에서 완전히 벗어나 있어 대화의 흐름을 방해합니다. 이는 조현병 환자에게서 흔히 관찰되는 증상 중 하나입니다."}, {"subject": "총론 정신증상과 징후", "year": ["17학번", "16학번", "14학번"], "professor": "정조은", "question": "30세 남자가 타인과 의사소통이 되지 않는 증상으로 부모와 함께 병원에 왔다. '여기에 왜 왔나요?'라고 물으니 '여기에 왜 왔나요?”라고 대답하였고 이후에도 반복해서 질문을 따라하는 대답을 하였다. 행동 증상 유형은?(16, 14)", "images": [], "text_box": "반향언어:상대방의 말을 그대로 따라하는 것", "options": ["반향언어 (echolalia)", "거부증 (negativism)", "보속증 (preservation)", "음송증 (verbigeration)", "우원증 (circumstantiality)"], "answer": [0], "explanation": "반향언어(Echolalia)는 다른 사람이 말한 단어나 문구를 그대로 따라 반복하는 행동 증상입니다. 질문에 대한 의미 있는 답변을 하지 못하고 상대방의 말을 메아리처럼 따라 하는 특징을 보입니다. 이는 자폐 스펙트럼 장애, 조현병, 또는 치매와 같은 질환에서 나타날 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["17학번"], "professor": "정조은", "question": "25세 남자가 공황발작이 있을 때마다 내 몸이 내 몸이 아닌 것 같고, 자신으로부터 분리된 것처럼 느껴졌다. 또한, 사람들이 웃고 이야기할 때 자신과는 전혀 관련이 없는 것처럼 느껴졌다. 환자의 주요 병리 증상은?", "images": [], "text_box": "내 몸이 내 몸이 아닌 것 같고, 자신으로부터 분리된 것처럼 느껴졌다라는 표현이 정확히 이인감을 의미합니다. 반면 주의해야 할 선지로는 4. 비현실감은 현실로부터 분리된 것 같은 느낌을 받았을 경우입니다. 수업에 따르면 이인증은 내적 공간이 바뀐 느낌, 비현실감은 외적 공간이 바뀐 느낌입니다.", "options": ["무감동(apathy)", "무쾌감증(anhedonia)", "감정이상(anesthesia)", "비현실감(derealization)", "이인증(depersonalization)"], "answer": [4], "explanation": "이인증(Depersonalization)은 자신의 몸이나 정신 활동이 낯설게 느껴지거나, 자신으로부터 분리된 듯한 느낌을 받는 증상입니다. '내 몸이 내 몸이 아닌 것 같다'라는 표현이 대표적입니다. 비현실감(Derealization)은 외부 세상이 낯설게 느껴지는 것과 구분됩니다."}, {"subject": "총론 정신증상과 징후", "year": ["17학번"], "professor": "정조은", "question": "27세 남성이 '자신과 관련된 이야기를 은연중에 암시하는 내용이 TV에 자꾸만 나오고 길거리에서도 사람들이 자신에 대해 이야기 한다'며 1년째 방안에만 틀어박혀 지냈다. 밑줄 친 증상과 관련된 정신병리는?", "images": [], "text_box": "신문이나 TV에서 자신과 관련된 이야기를 은연중에 암시하고 있거나 남의대화가자신에관한것이라고믿는것은관계망상이었습니다.", "options": ["사고탈취(Thought withdrawal)", "조종망상 (Delusion of being controlled)", "피해망상 (Persecutory delusion)", "사고전파 (Thought broadcasting)", "관계망상 (Delusion of reference)"], "answer": [4], "explanation": "관계망상(Delusion of reference)은 주변의 특정 사건이나 타인의 행동, 사물이 자신과 특별한 관련이 있다고 믿는 망상입니다. TV나 길거리 사람들의 대화가 자신을 암시한다고 믿는 것이 전형적인 예시입니다. 이러한 망상으로 인해 환자는 현실과 사회생활에 어려움을 겪을 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["17학번"], "professor": "정조은", "question": "45세 조현병 환자가 아나운서가 자신의 생각을 전파한다고 말을 한다. 정신병리는?", "images": [], "text_box": "자신의 생각이 방송이 되어 다른 사람이 자신의 생각을 알아버렸다고 생각하는 것은 사고전파였습니다.", "options": ["환청 (auditory hallucination)", "가청사고 (audible thought)", "사고주입(thought insertion)", "사고전파(thought broadcasting)", "망상적 지각 (delusional perception)"], "answer": [3], "explanation": "사고전파(Thought broadcasting)는 자신의 생각이 방송이나 다른 수단을 통해 외부로 알려지고 있다고 믿는 망상입니다. 환자는 자신의 생각을 다른 사람들이 알게 될까 봐 두려워하거나, 실제로 다른 사람들이 자신의 생각을 읽고 있다고 확신합니다. 이는 조현병의 양성 증상 중 하나입니다."}, {"subject": "총론 정신증상과 징후", "year": ["17학번"], "professor": "정조은", "question": "50세 남자가 조현병으로 전기경련요법을 받은 후 그 이전의 일을 기억하지 못했다. 그러나 치료 후의 일은 모두 잘 기억하였다. 증상은?", "images": [], "text_box": "전기경련요법 이후에 치료 이전의 기억을 잃은 후향적기억상실에 관한 문항이었습니다.", "options": ["섬광회상", "기억조작", "환상거짓말", "전향성기억상실", "후향성기억상실"], "answer": [4], "explanation": "후향성 기억상실(Retrograde amnesia)은 특정 시점 이전에 형성된 기억을 상실하는 현상입니다. 전기경련요법(ECT) 후에 일시적으로 발생할 수 있으며, 환자는 치료 이전의 사건들을 기억하지 못하지만, 치료 이후의 새로운 정보는 학습하고 기억할 수 있습니다. 이는 뇌 기능의 일시적인 변화와 관련이 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["17학번"], "professor": "정조은", "question": "정신건강의학과에서 치료받은 지 10년이 넘은 조현병 환자가 의사에게 '이제 나의 망상이 내 병의 증상이었다는 것을 조금 이해하게 되었습니다.'라고 하였다. 자신의 병에 대해 얼마나 이해하고 받아들이고 있는지를 의미하며 치료 과정에 중요한 영향을 미치는 정신 증상은?", "images": [], "text_box": "병식(Insight)- 환자가 자신의 현정신상태의 원인뿐아니라 자신의 느낌,기능수준을 얼마나 이해하고 있는지", "options": ["cognition", "information", "insight", "judgment", "perception"], "answer": [2], "explanation": "병식(Insight)은 환자가 자신의 정신 질환과 증상의 본질을 얼마나 이해하고 받아들이는지를 의미합니다. 자신의 망상이 병의 증상이라는 것을 인지하는 것은 병식이 향상되었음을 나타냅니다. 병식은 치료 순응도와 예후에 결정적인 영향을 미치는 중요한 요소입니다."}, {"subject": "총론 정신증상과 징후", "year": ["17학번"], "professor": "정조은", "question": "26세 여자가 어머니 장례식장에서 갑자기 웃음을 터뜨려 병원에 왔다. 여자는 기분이 우울하다고 말하면서 미소를 지었다. 의사는 밑줄 친 부분과 관련된 영역에서 부적합하다고 판단하였다. 그 영역은?", "images": [], "text_box": "정동(affect)에 문제가 있다. 상황에 적절하지 않음", "options": ["affect", "mood", "motor activity", "perception", "thought"], "answer": [0], "explanation": "정동(affect)은 외부적으로 관찰되는 감정 표현을 의미하며, 상황이나 생각과 적절하게 일치해야 합니다. 이 환자의 경우 슬픈 장례식 상황과 우울하다는 진술에도 불구하고 웃음을 보이는 것은 정동의 부적합성(inappropriate affect)을 나타냅니다. 이는 조현병 등 다양한 정신 질환에서 관찰될 수 있는 증상입니다."}, {"subject": "총론 정신증상과 징후", "year": ["17학번"], "professor": "정조은", "question": "'삼천리강산'을 따라 말하라고 하였을 때는 잘하지만 거꾸로 말하라고 하였을 때는 잘하지 못하였다. 이 검사는 무엇을 알아보기 위한 검사인가?", "images": [], "text_box": "작야에는예시로 serial 7 substraction제시", "options": ["지남력", "주의력", "판단력", "언어", "기억의등록"], "answer": [1], "explanation": "이 검사는 주의력(Attention)을 평가하기 위한 것입니다. 순서대로 말하는 것은 단순 주의력을, 거꾸로 말하는 것은 역행 주의력 또는 작업 기억을 요구합니다. 'Serial 7 subtraction' (100에서 7을 계속 빼는 것)과 같은 검사도 주의력과 집중력을 평가하는 데 사용됩니다."}, {"subject": "총론 정신증상과 징후", "year": ["16학번"], "professor": "김정진", "question": "80세 남자가 '요즘 기분은 어떠십니까?” 라는 질문에 “우울, 우정, 우리, 우산. 우동\" 이라고 답하였다. 정신병리는?", "images": [], "text_box": "음송증 : 특정한 단어나 구,짧은 문장을 의미없이 반복하는 것", "options": ["상동증 (stereotypy)", "반향언어 (echolalia)", "강박행동 (compulsion)", "보속증 (perseveration)", "음송증 (verbigeration)"], "answer": [4], "explanation": "음송증(Verbigeration)은 특정 단어나 구, 짧은 문장을 의미 없이 반복적으로 말하는 증상입니다. 질문과는 상관없이 같은 말을 계속 반복하며, 대화의 흐름을 방해합니다. 이는 조현병이나 치매와 같은 질환에서 나타날 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["16학번", "14학번"], "professor": "김정진", "question": "20세 남자가 여자친구와 이별한 후 목소리가 나오지 않는다며 내원하였다. 증상을 호소하면서도 걱정하는 모습은 보이지 않았다. 진단은? (14 짤변)", "images": [], "text_box": "만족스러운 무관심 : 본인이 말하는 내용에 대해 무심한 표정과 태도,본인의 disability에 대한 걱정이 없으며 부적절하게 안정된 모습", "options": ["무감동(apathy)", "정서의 둔마(blunted affect)", "정서의 위축(restricted affect)", "부적합한 정동(inappropiate or incongruent affect)", "만족스러운 무관심(la belle indifference)"], "answer": [4], "explanation": "만족스러운 무관심(La Belle Indifference)은 신체 증상이나 질환에 대해 환자 본인이 무심하거나 평온한 태도를 보이는 정신 병리입니다. 심각한 증상을 호소하면서도 걱정하는 기색이 전혀 없는 것이 특징입니다. 이는 주로 전환장애(conversion disorder)에서 관찰되는 현상입니다."}, {"subject": "총론 정신증상과 징후", "year": ["16학번"], "professor": "김정진", "question": "20년 동안 매일 소주 2병 마시는 62세 아저씨가 식은땀을 흘리면서 복시를 호소하면서 왔다. 가끔씩 쓰러졌으며 사실과 다른 이야기를 한다고 한다. 기억을 못하는 걸 무의식이나 경험으로 채웠다. 이것을 의미하는 정신병리 용어는?", "images": [], "text_box": "기억나지 않는 부분을 상상적 경험으로 채움, 알코올성치매에서 보임", "options": ["작화증", "기억과다", "후향적기억장애", "회상적조작", "전향적기억장애"], "answer": [0], "explanation": "작화증(Confabulation)은 기억의 공백을 무의식적으로 지어낸 이야기나 경험으로 채우는 현상입니다. 환자는 자신이 만들어낸 이야기를 사실로 믿으며, 주로 알코올성 치매나 베르니케-코르사코프 증후군과 같은 기질성 뇌 손상에서 나타납니다. 환자는 자신이 기억하지 못한다는 사실 자체를 인지하지 못합니다."}, {"subject": "총론 정신증상과 징후", "year": ["15학번"], "professor": "김정진", "question": "80세 남자가 '요즘 기분은 어떠십니까?” 라는 질문에 “우울, 우정, 우리, 우산. 우동\" 이라고 답하였다. 정신병리는?", "images": [], "text_box": "음송증 : 특정한 단어나 구,짧은 문장을 의미없이 반복하는 것", "options": ["상동증 (stereotypy)", "반향언어 (echolalia)", "강박행동 (compulsion)", "보속증 (perseveration)", "음송증 (verbigeration)"], "answer": [4], "explanation": "음송증(Verbigeration)은 특정 단어나 구, 짧은 문장을 의미 없이 반복적으로 말하는 증상입니다. 질문과는 상관없이 같은 말을 계속 반복하며, 대화의 흐름을 방해합니다. 이는 조현병이나 치매와 같은 질환에서 나타날 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["15학번"], "professor": "김정진", "question": "20세 남자가 국정원에서 자신을 미행하기 위해 도청장치와 cctv를 집안에 숨겨두고 관찰하고 있다고 한다. 정신병리는?", "images": [], "text_box": "누군가가 자신을 감시하고 있다고 표현하면 피해망상이었습니다.", "options": ["피해망상 (persecutary delusion)", "과대망상 (grandiose delusion)", "관계망상 (delusion of reference)", "사고전파 (thought broadcasting)", "조종망상 (delusion of being controlled)"], "answer": [0], "explanation": "피해망상(Persecutory Delusion)은 다른 사람이나 집단이 자신을 해치거나 괴롭히려고 한다고 믿는 망상입니다. 환자는 누군가가 자신을 감시하거나 미행하고, 해를 가하려 한다고 확신합니다. 이는 조현병을 비롯한 다양한 정신 질환에서 나타나는 흔한 망상 유형입니다."}, {"subject": "총론 정신증상과 징후", "year": ["15학번"], "professor": "김정진", "question": "37세 남자가 가족과 함께 병원을 찾아왔다. '누군가 밤에 내 팔에 약을 주사해요.'라면서 팔에 갈색 반점을 보여주었다. 의사가 자신의 팔의 반점을 보여주며 '점'이라고 말하였다. 환자는 의사의 팔에 있는 반점은 점으로 인정하면서도 자신의 팔에 있는 흔적은 약을 주사한 것이라 주장하였다. 정신병리는?", "images": [], "text_box": "해설: 있는 것을 다르게 인식하는 것이니 환각은 아닙니다.", "options": ["환촉", "환시", "마술적 사고", "사고주입", "망상지각"], "answer": [4], "explanation": "망상지각(Delusional Perception)은 실제 있는 자극을 지각한 후, 그 자극에 대해 망상적인 의미를 부여하는 현상입니다. 이 환자는 팔의 반점이라는 실제 자극을 보고 '누군가 약을 주사한 흔적'이라는 비정상적인 의미를 부여했습니다. 이는 조현병에서 나타나는 전형적인 일차적 망상 형성 과정입니다."}, {"subject": "총론 정신증상과 징후", "year": ["14학번", "11학번", "08학번"], "professor": "김정진", "question": "20세 남자가 아끼는 애완견이 죽었다고 웃으면서 이야기하고 병원에 와서 마음이 즐겁고 기쁘다고 이야기하면서 찡그리는 모습이었다. 정신 증상은? (11, 08짤변)", "images": [], "text_box": "적절성과 일치성에 따라 정동을 분류하였을 때 Inappropriate or incongruent affect →본인의 감정,생각,말,상황과 맞지 않는 정동 상태였습니다!", "options": ["무감동(apathy)", "정서의 둔마(blunted affect)", "정서의 위축(restricted affect)", "부적합한 정동(inappropiate or incongruent affect)", "만족스러운 무관심(la belle indifference)"], "answer": [3], "explanation": "부적합한 정동(Inappropriate Affect)은 표현되는 감정이 상황이나 환자의 내적 감정 상태와 일치하지 않는 경우를 말합니다. 슬픈 상황에서 웃거나 즐겁다고 말하면서 찡그리는 모습이 이에 해당합니다. 이는 조현병에서 흔히 관찰되는 증상 중 하나입니다."}, {"subject": "총론 정신증상과 징후", "year": ["14학번", "13학번"], "professor": "김정진", "question": "45세 남자가 대화가 잘 되지 않는다고 하였다. '직장에서 어려운 점이 무엇입니까?' 라고 물으니,'사과, 사죄, 사면, 사실' 이라고 대답하였다. 사고 장애 유형은?(13 짤변)", "images": [], "text_box": "음송증 : 특정한 단어나 구,짧은 문장을 의미없이 반복하는 것", "options": ["말비빔 (word salad)", "보속증 (perseveration)", "우원증 (circumstantiality)", "음송증 (verbigeration)", "반향언어(echolalia)"], "answer": [3], "explanation": "음송증(Verbigeration)은 특정 단어나 구, 짧은 문장을 의미 없이 반복적으로 말하는 증상입니다. 질문의 내용과는 상관없이 유사한 발음의 단어들을 나열하며 반복하는 양상을 보입니다. 이는 사고 과정의 장애로, 주로 조현병이나 치매 환자에게서 나타납니다."}, {"subject": "총론 정신증상과 징후", "year": ["14학번", "13학번"], "professor": "김정진", "question": "환자와 의사와의 대화이다. 환자의 정신병리는?(13 짤변)\n의사: 현재 어디 사세요?\n환자: 서초동\n의사: 오늘 아침 식사는 뭘 드셨어요?\n환자: 서초동\n의사: 가장 좋아하는 음식이 뭐에요?\n환자: 서초동", "images": [], "text_box": "보속증: 새로운 자극이 주어진 후에도 이전의 자극에 대해 지속적으로 반응하므로", "options": ["말비빔", "보속증", "우원증", "반향언어", "소리연상"], "answer": [1], "explanation": "보속증(Perseveration)은 새로운 자극이 주어졌음에도 불구하고 이전의 자극이나 반응을 반복하여 나타내는 사고 장애입니다. 질문이 바뀌었음에도 불구하고 이전 질문의 대답을 계속 반복하는 것이 전형적인 예시입니다. 이는 인지 유연성의 저하를 의미하며 뇌 손상이나 치매 환자에게서 흔히 관찰됩니다."}, {"subject": "총론 정신증상과 징후", "year": ["13학번"], "professor": "김정진", "question": "34세 남자가 화가 나는 일이 있어도 제대로 표현 못하고 술을 마셨다. 자주 배가 아프거나 두통을 호소했다. 정신병리는?", "images": [], "text_box": "감정표현불능증: 기분이나 감정을 깨닫고 표현하는 것을 어려워하거나 하지 못하는 것", "options": ["위축된 정서", "감정의 둔마", "정신운동초조", "정신운동지체", "감정표현불능증"], "answer": [4], "explanation": "감정표현불능증(Alexithymia)은 자신의 감정을 인식하고 언어로 표현하는 데 어려움을 겪는 상태입니다. 감정을 직접 표현하기보다 신체 증상(두통, 복통 등)으로 나타나는 경향이 있습니다. 이는 스트레스에 대한 반응과 관련하여 신체화 장애 등 다양한 정신 신체 질환에서 관찰됩니다."}, {"subject": "총론 정신증상과 징후", "year": ["12학번"], "professor": "김정진", "question": "본인이 말하는 내용의 정서적인 면과 관계없이 별다른 표정의 변화를 보이지 않는 환자의 정신 증상은?", "images": [], "text_box": "무감동: 외부 자극에 대해서 주관적인 느낌이 없는 것 같고,객관적인 반응 조차도 없는 정동 상태", "options": ["무감동 (apathy)", "거부증 (negativism)", "상동증 (stereotypy)", "무쾌감증(anhedonia)", "부적합한 정동 (inappropriate affect)"], "answer": [0], "explanation": "무감동(Apathy)은 외부 자극에 대해 주관적인 감정적 반응이 없거나, 감정 표현이 둔화되어 객관적인 반응조차 보이지 않는 정동 상태를 의미합니다. 환자는 말하는 내용의 감정적 측면과 무관하게 표정이나 태도에 변화가 없습니다. 이는 조현병의 음성 증상 중 하나로 나타날 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["11학번"], "professor": "김정진", "question": "감정적 혼란과 관련되어 비생산적인 신체적, 정신적 과다 행동이 나오는 상태를 정신병리 용어로 무엇이라고 하는가?", "images": [], "text_box": "정신운동초조의정의입니다.", "options": ["강박행동", "양가감정", "정신운동 초조", "정신운동 항진", "정신운동 지체"], "answer": [2], "explanation": "정신운동 초조(Psychomotor Agitation)는 내적인 감정적 혼란이나 긴장과 연관되어 나타나는 비생산적이고 과도한 신체적, 정신적 활동을 말합니다. 안절부절못하고, 손발을 꼼지락거리거나, 의미 없는 행동을 반복하는 등의 모습으로 나타날 수 있습니다. 이는 주요우울장애, 양극성 장애, 불안 장애 등 다양한 정신 질환에서 관찰됩니다."}, {"subject": "총론 정신증상과 징후", "year": ["11학번"], "professor": "김정진", "question": "외부의 다른 자극에 대해 병적으로 같은 반응을 반복하는 것을 무엇이라고 하는가?", "images": [], "text_box": "보속증의정의입니다(음송증은대화내용과관계없음)", "options": ["상동증", "거부증", "반향언어", "음송증", "보속증"], "answer": [4], "explanation": "보속증(Perseveration)은 새로운 자극이 주어졌음에도 불구하고 이전의 자극이나 반응을 반복하여 나타내는 현상입니다. 인지 유연성이 떨어져 사고의 전환이 어렵거나, 뇌 손상이나 치매 환자에게서 흔히 관찰됩니다. 이는 동일한 대답이나 행동을 반복하는 양상으로 나타날 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["11학번"], "professor": "김정진", "question": "즐거운 활동에 대한 관심이 소실된 상태를 정신병리 용어로 무엇이라고 하는가?", "images": [], "text_box": "Anhedonia(무쾌감증)에 대한 설명입니다.", "options": ["apathy", "anhedonia", "ambivalence", "blunted affect", "inappropriate affect"], "answer": [1], "explanation": "무쾌감증(Anhedonia)은 이전에는 즐거웠던 활동이나 경험에서 더 이상 즐거움을 느끼지 못하는 상태를 말합니다. 좋아하는 취미나 사회 활동에 대한 흥미가 현저히 감소하며, 삶의 즐거움이 사라진 듯한 느낌을 받습니다. 이는 주요우울장애, 조현병 등에서 나타나는 주요 증상 중 하나입니다."}, {"subject": "총론 정신증상과 징후", "year": ["11학번", "10학번"], "professor": "김정진", "question": "조현병에서 주로 나타나며 상대방의 말을 계속 따라하는 것을 정신병리 용어로 무엇이라고 하는가? (10)", "images": [], "text_box": "반향언어(Echolalia)에 대한 설명입니다", "options": ["반향언어", "상동증", "거부증", "음송증", "보속증"], "answer": [0], "explanation": "반향언어(Echolalia)는 상대방의 말을 의미 없이 그대로 따라 반복하는 언어적 증상입니다. 질문에 대한 독자적인 답변을 하지 못하고 들은 말을 되풀이하는 특징을 보입니다. 이는 조현병, 자폐 스펙트럼 장애, 또는 특정 뇌 손상 환자에게서 관찰될 수 있습니다."}, {"subject": "총론 정신증상과 징후", "year": ["10학번"], "professor": "김정진", "question": "28세 남자 환자가 본인이 말하는 내용의 정서적인 면과 관계없이 별다를 표정의 변화를 보이지 않았다. 이 환자의 정신 증상은?", "images": [], "text_box": "1)외부로부터의 격리와 무관심이 동반된 감소된 정서 2)일상적이고 즐거운 활동에 대한 관심이 소실 3)같은 사람이나 상황에 대해 동시에 상반되는 충동이 공존하는 것 5)본인의생각, 말 상황과 맞지 않는 감정상태", "options": ["무감동 (apathy)", "무쾌감증(anhedonia)", "양가감정 (ambivalence)", "정서의 둔마 (blunted affect)", "부적합한 정동 (inappropriate affect)"], "answer": [3], "explanation": "정서의 둔마(Blunted Affect)는 감정 표현의 강도가 현저히 감소하여, 표정, 목소리, 몸짓 등에서 감정 변화가 미약하거나 거의 없는 상태를 말합니다. 환자가 말하는 내용에 감정이 담겨 있지 않고 단조롭게 느껴집니다. 이는 조현병의 음성 증상 중 하나로, 정서 표현의 전반적인 감소를 의미합니다."}, {"subject": "총론 정신증상과 징후", "year": ["10학번"], "professor": "김정진", "question": "다음 중 행동의 이상으로 옳지 않은 것은?", "images": [], "text_box": "무감동은 정서의 장애", "options": ["무감동 (apathy)", "상동증 (stereotypy)", "반향언어 (echolaria)", "거부증 (negativism)", "보속증 (preservation)"], "answer": [0], "explanation": "무감동(Apathy)은 정서의 장애로 분류되며, 즐거운 활동에 대한 관심 소실이나 감정 반응의 감소를 의미합니다. 반면 상동증, 반향언어, 거부증, 보속증은 주로 행동 이상으로 분류되는 정신 병리입니다. 따라서 무감동은 행동의 이상이 아닌 정동 또는 동기 부여의 문제입니다."}, {"subject": "정신질환의 진단과 분류", "year": ["19학번", "20학번"], "professor": "변선정", "question": "다음 중 범주적 (categorical) 분류에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["질병의 경중에 대한 기술에 유용하다.", "임상적 유용성은 뛰어나지만 진단적 타당성이 떨어진다.", "건강한 상태와 질병 상태를 병적 특성의 양적인 차이로 보는 견해를 말한다.", "전통적인 정신질환의 진단분류 방법인 차원적(dimensional) 분류의 문제점을 보완하기 위하여 등장하였다.", "특정 장애와 관련되는 정도를 일련의 점수로 표시해서 점수가 높을수록 그 장애를 가질 가능성이 높은 것으로 나타낸다."], "answer": [1], "explanation": "범주적 분류는 질병을 양적이 아닌 질적으로 봅니다. 경중에 대한 기술은 양적으로 보는 것이므로 1번은 틀렸습니다. 3번 또한 양적이 아닌 질적인 분류를 나타냅니다. 차원적 분류는 범주적 분류의 문제점을 보완하기 위해 등장했으므로 4번은 틀렸습니다. 점수의 높고 낮음으로 장애 가능성을 나타내는 것은 차원적 분류의 개념입니다."}, {"subject": "정신질환의 진단과 분류", "year": ["19학번", "20학번"], "professor": "변선정", "question": "다음 중 DSM-5에 해당하는 설명인 것은?", "images": [], "text_box": null, "options": ["다축진단체계이다.", "주요 우울장애 진단기준에 사별 배제가 포함된다.", "외상 후 스트레스 장애는 불안장애의 범주에 속한다.", "물질 관련 및 중독성 장애를 물질사용장애와 의존장애로 나누어 분류하고 있다.", "진단의 차원적 접근을 적용하기 위해 교차 절단 평가(cross-cutting measure)를 사용한다."], "answer": [4], "explanation": "DSM-5는 단축진단체계이므로 1번은 틀렸습니다. 주요 우울장애 진단 기준에서 사별배제는 삭제되었습니다. 외상 후 스트레스 장애는 외상 및 스트레스 관련 장애에 속하므로 3번도 틀렸습니다. 물질 관련 및 중독성 장애는 물질사용장애 하나로만 분류합니다."}, {"subject": "정신질환의 진단과 분류", "year": ["18학번", "19학번", "20학번"], "professor": "변선정", "question": "DSM-5의 진단배치에 해당되는 것은?", "images": [], "text_box": null, "options": ["도박장애는 충동조절장애에 속한다.", "발모장애는 신경발달장애에 속한다.", "적응장애는 전반적발달장애에 속한다.", "신체이형장애는 강박관련장애에 속한다.", "외상 후 스트레스 장애는 불안장애에 속한다."], "answer": [3], "explanation": "도박장애는 물질관련 및 중독장애에 속합니다. 발모장애는 강박관련장애에 속하며, 적응장애는 외상 및 스트레스 관련 장애에 속합니다. 외상 후 스트레스 장애도 외상 및 스트레스 관련 장애에 속합니다. 따라서 신체이형장애가 강박관련장애에 속하는 것이 옳은 진단배치입니다."}, {"subject": "정신질환의 진단과 분류", "year": ["20학번"], "professor": "변선정", "question": "다음 중 DSM-5에 해당하는 설명인 것은?", "images": [], "text_box": null, "options": ["우리나라의 사망진단 통계분류에서 공식적으로 사용한다.", "자폐장애는 신경발달장애로 분류한다.", "전반적 기능장애 척도(GAF)를 사용한다.", "주의력결핍과잉행동장애는 소아청소년기장애로 분류한다.", "파괴적 기분조절부전장애는 파괴적, 충동조절 및 품행장애로 분류한다."], "answer": [1], "explanation": "우리나라에서는 ICD-10을 번역한 KCD-8을 공식적으로 사용합니다. DSM-5는 GAF 척도 대신 WHODAS를 사용합니다. 주의력결핍과잉행동장애는 신경발달장애에 속합니다. 파괴적 기분조절부전장애는 우울장애로 분류됩니다."}, {"subject": "정신질환의 진단과 분류", "year": ["18학번"], "professor": "박민현", "question": "DSM-5 에 해당하는 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["WHO 장애평가(WHODAS)를 이용한다.", "주요 우울 장애의 진단 기준에 사별배제가 포함된다.", "외상 후 스트레스는 불안장애에 속한다.", "물질관련 및 중독성장애를 몰입사용장애와 의존장애로 나누어 분류하고 있다.", "진단의 범주적 접근을 적용하기 위해 교차절단 평가를 사용한다."], "answer": [0], "explanation": "DSM-5는 WHO 장애평가 척도인 WHODAS를 이용합니다. 주요 우울장애 진단 기준 중 '사별배제'는 삭제되었습니다. 외상후 스트레스 장애는 외상 및 스트레스 관련 장애에 속합니다. 물질관련 및 중독성 장애는 물질사용장애 하나로만 분류합니다. 진단의 범주적 접근을 허용하기 위해 교차절단 평가를 사용합니다."}, {"subject": "정신질환의 진단과 분류", "year": ["18학번"], "professor": "박민현", "question": "DSM-5 에 해당하는 설명은?", "images": [], "text_box": null, "options": ["다축체계를 사용한다.", "발모장애는 강박관련장애에 속한다.", "전반적 기능장애 척도(GAF)를 사용한다.", "적응장애는 적응장애라는 별도의 대항목으로 분류된다.", "우리나라에서 정신질환 관련 보험급여 신청업무나 사망진단 통계분류 등에서 공식적으로 사용하는 진단분류 체계에 해당한다."], "answer": [1], "explanation": "DSM-5는 단축체계를 사용하므로 1번은 틀렸습니다. 발모장애는 강박관련장애에 속합니다. DSM-5는 GAF 대신 WHODAS를 사용합니다. 적응장애는 DSM-5에서 외상 및 스트레스 관련 장애 범주에 속합니다. 우리나라에서는 ICD-10(KCD-8)을 공식적으로 사용합니다."}, {"subject": "정신질환의 진단과 분류", "year": ["18학번"], "professor": "박민현", "question": "범주적 분류에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["질병상태와 건강한 상태는 분명히 다른 것이다.", "진단적 타당성은 뛰어나지만, 임상적 유용성이 떨어진다.", "건강한 상태와 질병 상태를 병적 특성의 양적인 차이로 보는 견해를 말한다.", "전통적인 정신질환의 진단분류 방법인 차원적(dimensional) 분류의 문제점을 보완하기 위해 등장하였다.", "특정 장애와 관련되는 정도를 일련의 점수로 표시해서 점수가 높을수록 그 장애를 가질 가능성이 높은 것으로 나타낸다."], "answer": [0], "explanation": "범주적 분류는 질병상태와 건강한 상태를 질적으로 구분하는 견해를 말합니다. 임상적 유용성이 뛰어나지만 진단적 타당성이 떨어진다는 문제가 제기됩니다. 차원적 분류는 범주적 분류의 문제점을 보완하기 위해 등장했습니다. 특정 장애 관련 정도를 점수로 표시하는 것은 차원적 분류의 개념입니다."}, {"subject": "정신질환의 진단과 분류", "year": ["15학번", "16학번", "17학번"], "professor": "박민현", "question": "우리나라에서 정신질환 관련 보험급여 신청 업무나 사망진단 통계분류 등에서 공식적으로 사용하는 진단분류체계는?", "images": [], "text_box": null, "options": ["DSM-4", "DSM-4-TR", "DSM-5", "ICD-10", "ICD-11"], "answer": [3], "explanation": "우리나라에서는 정신질환 관련 보험급여 신청업무나 사망진단 통계분류 등에서 ICD-10을 번역한 KCD-8을 공식적으로 사용합니다. 따라서 정답은 ICD-10입니다."}, {"subject": "정신질환의 진단과 분류", "year": ["17학번"], "professor": "박민현", "question": "차원적 분류에 대한 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["질병상태와 건강한 상태는 분명히 다른 것이다.", "전통적인 정신질환의 진단분류 방법에 해당한다.", "건강한 상태와 질병상태를 병적 특성의 양적인 차이로 보는 견해를 말한다.", "특정 장애와 관련되는 정도를 일련의 점수로 표기해서 점수가 낮을수록 그 장애를 가질 가능성이 높은 것으로 나타난다.", "특징적 증상 및 징후가 확인되면 그 장애가 있다고 판단하고, 만일 그러한 특성을 가지지 않는다면 그 장애는 없다고 분류한다."], "answer": [2], "explanation": " es": [], "text_box": null, "options": ["인격장애", "신체질환", "주된 정신질환", "전반적 기능 평가", "심리사회적 및 환경적 문제"], "answer": [2], "explanation": "DSM-IV의 I축은 임상적 장애, 즉 주된 정신질환 진단명을 포함합니다. II축은 인격장애 및 정신지체, III축은 신체질환, IV축은 심리사회적 및 환경적 문제, V축은 전반적 기능 평가를 나타냅니다."}, {"subject": "사고장애 (조현병 등)", "year": ["20학번"], "professor": "허휴정", "question": "60세 남자가 아내와 함께 부부 상담을 원해 내원하였다. 남자는 자기보다 15살이 어린 아내가 젊은 남자 들을 데리고 수 년 전부터 외도를 하고 있다고 생각하였다. 아내는 외도 사실을 극구 부인하였다. 남편에게 아내가 외도를 하고 있다고 생각하는 근거를 묻자, 외출하고 돌아왔을 때 아내의 머리가 흐트러져 있거나, 화장이 지워져 있는 일이 잦다고 했다. 남편은 아내를 의심하여 하루에도 수십 차례 영상통화를 했다고 하며, 아내의 휴대폰을 위치 추적하였다. 남편은 아내와의 관계 이외에는 일상생활에 문제가 없고, 직장생활 및 친구관계도 원만하다고 했다. 진단은?", "images": [], "text_box": null, "options": ["주요우울장애", "조현병", "편집성 인격장애", "망상장애", "조현양상장애"], "answer": [3], "explanation": "이 환자는 아내의 외도를 확신하는 고착된 망상을 가지고 있으나, 망상 외의 다른 일상생활 기능은 원만하게 유지되고 있습니다. 조현병과 달리 전반적인 기능 저하나 와해 증상이 동반되지 않습니다. 망상장애는 비괴이한 망상이 최소 1개월 이상 지속되면서 다른 정신병적 증상이 뚜렷하지 않은 상태를 특징으로 합니다. 따라서 질투형 망상장애에 가장 부합하는 진단입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["20학번"], "professor": "허휴정", "question": "25세 남자가 우울과 무기력을 주소로 내원하였다. 그는 수년 전부터 거리에서 마주치는 모든 사람들이 자신의 외모가 못생기고 뚱뚱하다며 비웃고 있다고 생각했다. 그런 이유 때문에 대부분의 시간을 집에서 게임을 하며 시간을 보내왔다. 약 한달 전에 어릴 때부터 자신을 키워주신 외할머니가 갑자기 돌아가셨으며 이후는 늘 하던 게임도 하지 않고 종일 누워지내고 있다. 식사도 거부한 채 누가 말을 걸면 울기만 하는 상태를 걱정한 어머니의 간청으로 병원에 왔다. 이 남자에게 가장 가능성이 높은 진단은?", "images": [], "text_box": null, "options": ["적응장애", "조현양상장애", "조현정동장애", "주요우울장애", "지속성 우울장애"], "answer": [2], "explanation": "이 환자는 '모든 사람들이 자신의 외모를 비웃는다'는 망상적 사고를 수년간 지속하고 있었습니다. 여기에 최근 외할머니의 사망 이후 우울감, 무기력, 식사 거부 등 주요 기분 삽화 증상이 심하게 동반되었습니다. 조현정동장애는 조현병의 진단 기준과 함께 주요 기분 삽화(우울 또는 조증)가 상당 기간 동반되는 것이 특징입니다. 망상과 기분 증상이 동시에 나타나는 이 사례는 조현정동장애에 가장 부합합니다."}, {"subject": "사고장애 (조현병 등)", "year": ["20학번"], "professor": "허휴정", "question": "30세 여자가 유즙 분비와 무월경을 주소로 내원하였다. 그녀는 약 5년 전부터 이웃집에서 자신을 괴롭히기 위해 소음을 내고, 담배 냄새를 풍기고 있다며 두문불출하였다. 부모의 오랜 설득 끝에 약 6개월 전부터 개인 정신건강의학과에서 약물을 처방받아 복용 중이라고 한다. 이 여자에게 처방할 약물로 적절한 것은?", "images": [], "text_box": null, "options": ["아미설프라이드", "팔리페리돈", "리스페리돈", "할로페리돌", "아리피프라졸"], "answer": [4], "explanation": "환자는 유즙 분비와 무월경증을 겪고 있으며, 이는 기존 항정신병 약물로 인한 고프로락틴혈증의 가능성을 시사합니다. 아미설프라이드, 팔리페리돈, 리스페리돈, 할로페리돌 등은 프로락틴 수치를 높이는 경향이 있는 약물입니다. 반면, 아리피프라졸은 도파민 부분 효현제로서 프로락틴 수치를 높이는 경향이 적거나 오히려 낮추는 효과가 있어, 고프로락틴혈증 부작용이 있는 환자에게 적절한 대안이 될 수 있습니다. 따라서 이 환자에게 아리피프라졸이 가장 적절한 처방입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["20학번"], "professor": "허휴정", "question": "23세 남자가 어머니와 함께 내원하였다. 고등학교 졸업 후에 그는 대부분의 시간을 집에서 보내왔으며 정신과 치료를 ~. 그는 밖에 나가면 사람들이 자신의 얼굴이 괴물 같다며 욕을 한다고 말했다. ~ 도중에도 진료실 밖에서도 ~ 난다고 사람들이 비난하는 소리가 들리고 있다고 말했다. 그는 불안하다고 말하지만 표정의 변화가 거의 없었다. 그는 오랫동안 머리를 감지 않은 상태로 보였고, 손톱이 길었다. 이따금 책을 읽어보라고 했지만 잘 집중이 되지 않는다고 말했다. 이 남자의 모습 중 ~에 해당하는 것은? (복구미흡)", "images": [], "text_box": null, "options": ["대부분의 시간을 집에서 보냈다.", "사람들이 자신의 얼굴이 괴물 같다며 욕을 한다고 말했다.", "머리를 오랫동안 감지 않고, 손톱이 길었다.", "표정의 변화가 거의 없었다.", "잘 집중이 되지 않는다."], "answer": [1], "explanation": "이 환자는 '사람들이 자신의 얼굴이 괴물 같다며 욕을 한다'는 피해 망상을 호소하고 있습니다. 망상은 현실과 일치하지 않는 굳건한 믿음으로, 정신병적 증상의 핵심 요소입니다. 다른 보기들은 사회적 위축(집에서만 지냄), 자기관리 부족(위생 불량), 정서적 둔마(표정 변화 없음), 인지 기능 저하(집중 불가) 등 조현병의 음성 증상이나 관련 문제에 해당합니다. 문제에서 '망상에 관련된 것'을 묻고 있으므로, '사람들이 자신의 얼굴이 괴물 같다며 욕을 한다고 말했다'가 가장 적절한 답입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["20학번"], "professor": "허휴정", "question": "28세 남성이 자신을 뒷담화 하는 동료들 때문에 스트레스가 있다며 부모님과 함께 내원하였다. 그는 6개월 전에 IT 회사에 취직하였으며, 동료들이 자신에 대해 나쁜 소문을 퍼뜨리고 있다고 말했다. 또한 다른 동료들이 옆자리에서 의도적으로 키보드를 세게 치고, 마우스를 크게 딸깍여서 자신의 업무를 방해하고 있다고 말했다. 이 때문에 그는 한달 전에 직장에 사직서를 제출하였다. 회사를 그만두고 나서 그는 이제 친척과 가족들이 자신을 험담하고 다닌다며 두문불출하고 있다. 이 남자에게 가장 적합한 진단은? (20학번)", "images": [], "text_box": null, "options": ["조현병", "망상장애", "조현양상장애", "주요우울장애", "단기정신병적장애"], "answer": [1], "explanation": "환자는 동료들이 자신을 뒷담화하고 업무를 방해한다는 피해 망상을 가지고 있으며, 이후 가족들이 자신을 험담한다는 망상으로 확대되었습니다. 이러한 망상 증상은 최소 1개월 이상 지속되었고, 이로 인해 직장을 그만두는 등의 기능적 손상이 발생했습니다. 하지만 조현병에서 나타나는 와해 증상이나 뚜렷한 음성 증상은 보이지 않습니다. 망상 외의 다른 정신병적 증상이 비교적 경미하고, 망상이 고착된 형태로 나타나므로 망상장애에 가장 부합하는 진단입니다."}, {"subject": "사고장애 (조현병 등)", "year": ["19학번"], "professor": "전태연", "question": "19/M 공무원

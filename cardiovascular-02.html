<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2026 PAD ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-dark:  #085041;
    --teal-mid:   #0F6E56;
    --teal-base:  #1D9E75;
    --teal-light: #5DCAA5;
    --teal-pale:  #E1F5EE;
    --amber:      #BA7517;
    --amber-pale: #FAEEDA;
    --red:        #A32D2D;
    --red-pale:   #FCEBEB;
    --gray-900:   #1a1a1a;
    --gray-700:   #3a3a3a;
    --gray-500:   #6b6b6b;
    --gray-400:   #959595;
    --gray-300:   #d4d4d4;
    --gray-200:   #e5e5e5;
    --gray-100:   #f5f5f2;
    --gray-50:    #fafaf8;
    --white:      #ffffff;
    --bg:         #f0f4f2;
    --shadow-sm:  0 2px 8px rgba(8,80,65,0.06);
    --shadow:     0 4px 24px rgba(8,80,65,0.10);
    --shadow-lg:  0 12px 40px rgba(8,80,65,0.22);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--gray-900);
  }
  .hidden { display: none !important; }

  /* ───── 비밀번호 게이트 ───── */
  .pwd-gate {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal-mid) 55%, var(--teal-base) 100%);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .pwd-gate::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(93,202,165,0.18), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(29,158,117,0.22), transparent 55%);
    pointer-events: none;
  }
  .pwd-box {
    position: relative;
    background: var(--white);
    border-radius: 16px;
    padding: 40px 32px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 60px rgba(0,0,0,0.28);
    border-top: 3px solid var(--teal-base);
    animation: cardIn 0.3s ease;
  }
  .pwd-icon { font-size: 36px; margin-bottom: 14px; }
  .pwd-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px;
    color: var(--teal-dark);
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .pwd-series {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--teal-base);
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }
  .pwd-sub { font-size: 12px; color: var(--gray-500); margin-bottom: 22px; }
  .pwd-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    font-size: 16px;
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    letter-spacing: 0.25em;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 8px;
    background: var(--gray-100);
  }
  .pwd-input:focus { border-color: var(--teal-base); background: var(--white); }
  .pwd-input.shake { animation: shake 0.4s; border-color: var(--red); background: var(--red-pale); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60%  { transform: translateX(-7px); }
    40%, 80%  { transform: translateX(7px); }
  }
  .pwd-error { font-size: 11px; color: var(--red); min-height: 18px; margin-bottom: 6px; }
  .pwd-submit {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--teal-dark);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.02em;
  }
  .pwd-submit:hover { background: var(--teal-mid); }

  /* ─── HEADER (슬림) ─── */
  .site-header {
    background: var(--teal-dark);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-main {
    max-width: 820px;
    margin: 0 auto;
    padding: 10px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 40px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .brand-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }
  .brand-sep { color: rgba(255,255,255,0.25); font-size: 12px; margin: 0 2px; }
  .brand-series {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--teal-light);
    font-weight: 500;
  }
  .header-stats {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'IBM Plex Mono', monospace;
    flex-wrap: wrap;
  }
  .stat-chip { display: flex; align-items: baseline; gap: 4px; }
  .stat-n { font-size: 14px; font-weight: 700; color: #fff; line-height: 1; }
  .stat-n.wrong  { color: #F8B4B4; }
  .stat-n.accent { color: var(--teal-light); }
  .stat-k {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }
  .progress-track { height: 2px; background: rgba(255,255,255,0.08); }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal-light), var(--teal-base));
    transition: width 0.4s ease;
    width: 0;
  }
  .nav-dots-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 5px 22px 3px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-dots-wrap::-webkit-scrollbar { display: none; }
  .nav-dot {
    flex: 0 0 auto;
    min-width: 22px;
    height: 20px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.32);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px 3px 0 0;
    font-weight: 500;
    padding: 0 4px;
    transition: all 0.12s;
  }
  .nav-dot:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .nav-dot.current { background: var(--bg); color: var(--teal-dark); font-weight: 700; }
  .nav-dot.correct { color: var(--teal-light); }
  .nav-dot.wrong   { color: #F8B4B4; }

  /* ─── MAIN ─── */
  .main {
    max-width: 820px;
    margin: 18px auto 0;
    padding: 0 22px 120px;
  }

  /* ─── QUIZ CARD ─── */
  .q-card {
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    animation: cardIn 0.25s ease;
    margin-bottom: 12px;
    border: 1px solid var(--gray-200);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    background: var(--gray-100);
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--gray-200);
  }
  .q-year-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--teal-pale);
    color: var(--teal-dark);
    border: 1px solid rgba(29,158,117,0.3);
    padding: 3px 11px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .q-subject-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 11px;
    border-radius: 20px;
    background: var(--amber-pale);
    color: var(--amber);
    border: 1px solid rgba(186,117,23,0.2);
  }
  .q-prof {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray-500);
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gray-500);
    margin-left: auto;
  }

  /* ─── QUESTION BODY ─── */
  .q-body { padding: 22px 22px 0; }

  .q-text {
    font-size: 16px;
    line-height: 1.75;
    color: var(--gray-900);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  .text-box {
    background: var(--gray-50);
    border-left: 3px solid var(--teal-base);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  .q-images {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .q-images img {
    max-height: 260px;
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--gray-300);
    object-fit: contain;
    cursor: zoom-in;
    background: var(--white);
  }

  /* ─── OPTIONS ─── */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 9px;
    padding-bottom: 20px;
  }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 10px;
    background: var(--white);
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    color: var(--gray-700);
    transition: all 0.15s;
    width: 100%;
  }
  .opt-btn:not(:disabled):hover {
    border-color: var(--teal-base);
    background: var(--teal-pale);
    color: var(--teal-dark);
  }
  .opt-num {
    flex: 0 0 24px;
    height: 24px;
    background: var(--gray-100);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-500);
    transition: all 0.15s;
  }
  .opt-btn:not(:disabled):hover .opt-num { background: var(--teal-base); color: #fff; }
  .opt-btn.correct-answer {
    border-color: var(--teal-base);
    background: var(--teal-pale);
    cursor: default;
  }
  .opt-btn.correct-answer .opt-num { background: var(--teal-base); color: #fff; }
  .opt-btn.wrong-answer {
    border-color: var(--red);
    background: var(--red-pale);
    cursor: default;
  }
  .opt-btn.wrong-answer .opt-num { background: var(--red); color: #fff; }
  .opt-btn:disabled { cursor: default; }

  /* ─── EXPLANATION ─── */
  .explanation-box {
    margin: 0;
    padding: 18px 22px;
    background: var(--teal-pale);
    border-top: 1px solid rgba(29,158,117,0.2);
  }
  .explanation-box.wrong {
    background: var(--red-pale);
    border-top-color: rgba(163,45,45,0.2);
  }
  .expl-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--teal-mid);
    margin-bottom: 8px;
  }
  .explanation-box.wrong .expl-label { color: var(--red); }
  .expl-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--gray-700);
    white-space: pre-wrap;
  }

  /* ─── RESULT ROW ─── */
  .result-row {
    padding: 12px 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--gray-200);
    background: var(--gray-100);
  }
  .result-msg { font-size: 14px; font-weight: 500; color: var(--teal-mid); }
  .result-msg.wrong { color: var(--red); }

  /* ─── ACTION ROW ─── */
  .action-row {
    padding: 16px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--gray-200);
    flex-wrap: wrap;
  }
  .btn-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-300);
    background: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-700);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-nav:hover:not(:disabled) { border-color: var(--teal-base); color: var(--teal-mid); }
  .btn-nav:disabled { opacity: 0.35; cursor: default; }
  .btn-next {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    background: var(--teal-dark);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-next:hover { background: var(--teal-mid); }
  .btn-next:disabled { background: var(--gray-300); cursor: default; }
  .kbd-hint { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gray-500); }
  kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--gray-300);
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gray-700);
    background: var(--gray-100);
  }

  .empty-card { padding: 50px 30px; text-align: center; color: var(--gray-500); font-size: 14px; line-height: 1.7; }
  .empty-card .empty-emoji { font-size: 32px; margin-bottom: 10px; display: block; }

  /* ─── SCORE SCREEN ─── */
  .score-screen {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 48px 32px;
    text-align: center;
    animation: cardIn 0.25s ease;
    border: 1px solid var(--gray-200);
  }
  .score-trophy { font-size: 52px; margin-bottom: 16px; }
  .score-title { font-size: 28px; font-weight: 700; color: var(--teal-dark); margin-bottom: 6px; }
  .score-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 32px; }
  .score-grid { display: flex; justify-content: center; gap: 32px; margin-bottom: 36px; flex-wrap: wrap; }
  .score-stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 32px; font-weight: 700; color: var(--teal-base); }
  .score-stat-num.wrong { color: var(--red); }
  .score-stat-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
  .btn-restart {
    padding: 12px 30px;
    border-radius: 8px;
    border: none;
    background: var(--teal-dark);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.02em;
  }
  .btn-restart:hover { background: var(--teal-mid); }

  /* ───── 플로팅 필터 버튼 (FAB) ───── */
  .fab-filter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--teal-dark);
    color: #fff;
    border: none;
    padding: 11px 18px;
    border-radius: 26px;
    box-shadow: 0 6px 20px rgba(8,80,65,0.35);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 9px;
    z-index: 90;
    transition: all 0.18s;
    max-width: calc(100vw - 40px);
  }
  .fab-filter:hover {
    background: var(--teal-mid);
    box-shadow: 0 10px 28px rgba(8,80,65,0.45);
    transform: translateY(-1px);
  }
  .fab-filter:active { transform: translateY(0); }
  .fab-icon { flex: 0 0 auto; opacity: 0.92; }
  .fab-text { display: flex; align-items: baseline; gap: 7px; min-width: 0; }
  .fab-label {
    font-weight: 600;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fab-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--teal-light);
    flex: 0 0 auto;
  }

  /* ───── 필터 모달 ───── */
  .filter-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(8,80,65,0.38);
    backdrop-filter: blur(4px);
    z-index: 500;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 16px 20px;
    overflow-y: auto;
  }
  .filter-overlay.open { display: flex; }
  .filter-panel {
    background: var(--white);
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: cardIn 0.22s ease;
    overflow: hidden;
    border-top: 3px solid var(--teal-base);
  }
  .filter-panel-head {
    padding: 16px 22px 14px;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, var(--teal-pale) 0%, var(--white) 100%);
  }
  .filter-panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--teal-dark);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .filter-reset {
    font-size: 11px;
    background: transparent;
    border: none;
    color: var(--gray-500);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .filter-reset:hover { background: var(--gray-100); color: var(--teal-mid); }
  .filter-close {
    background: transparent;
    border: none;
    font-size: 20px;
    color: var(--gray-500);
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  .filter-close:hover { background: var(--gray-100); color: var(--teal-dark); }
  .filter-head-right { display: flex; align-items: center; gap: 4px; }

  .filter-panel-body {
    padding: 16px 22px 22px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }
  .filter-panel-body::-webkit-scrollbar { width: 8px; }
  .filter-panel-body::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

  .filter-section { margin-bottom: 20px; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--gray-200);
  }
  .filter-section-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--teal-mid);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .filter-section-hint { font-size: 11px; color: var(--gray-500); }

  .filter-options {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px;
  }
  .filter-option {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 12px;
    border: 1px solid var(--gray-300);
    border-radius: 8px;
    background: var(--white);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--gray-700);
    transition: all 0.13s;
    text-align: left;
    line-height: 1.3;
  }
  .filter-option:hover {
    border-color: var(--teal-base);
    background: var(--teal-pale);
    color: var(--teal-dark);
  }
  .filter-option.active {
    background: var(--teal-dark);
    color: #fff;
    border-color: var(--teal-dark);
  }
  .filter-option.active .opt-cnt { color: var(--teal-light); }
  .opt-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 auto;
    min-width: 0;
  }
  .opt-cnt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    opacity: 0.75;
    flex: 0 0 auto;
    margin-left: 8px;
    color: var(--gray-500);
  }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }

  /* ─── 모바일 ─── */

5, 공복혈당은 130mg/dL 이었다. 가족력상 아버지가 급성심근경색으로 사망하였다.", "options": ["혈중 non-LDL 콜레스테롤 수치 검사", "혈중 LDL 콜레스테롤 수치 검사", "혈중 HDL 콜레스테롤 수치 검사", "혈중 triglyceride 수치 검사", "혈중 apolipoprotein 수치 검사", "10 년 심혈관 질환 발생 위험도 계산 (ASCVD risk score)", "혈중 hs-crp 수치 검사", "HbAlc 검사"], "answer": [1, 5, 7], "explanation": "2013년 미국심장학회 고지혈증 치료지침의 네 가지 스타틴 이득군을 고려할 때, LDL 콜레스테롤 수치, 10년 ASCVD 위험도 계산, 그리고 당뇨 유무가 중요합니다. 환자의 공복혈당이 130mg/dL로 당뇨 기준(126mg/dL 초과)에 해당하므로, 당뇨 확진을 위해 HbA1c 검사가 추가적으로 필요합니다. 따라서 LDL 콜레스테롤 검사, ASCVD 위험도 계산, HbA1c 검사가 필수적입니다."}, {"subject": "이상지질혈증 진단과 치료", "year": ["16학번"], "professor": "박만원", "question": "다음 중 가장 필요한 약물은?", "images": [], "text_box": "56 세 남자가 건진 목적으로 찍은 관상동맥 전산화단층 촬영 검사에서 좌전하행동맥에 근위부 죽상반에 의한 50% 협착 소견이 발견되었다. 조깅할 때 특별한 이상은 없었다. 혈압 128/82mmHg, 공복혈당 132mg/dl, HbA1C 6.9%, LDL-C 190mg/dl, HDL-C 89mg/dl, Troponin-1 312mg/dl, 30 pack year 의 흡연력이 있다.", "options": ["아스피린", "베타차단제", "스타틴", "파이브레이트", "경구용혈당강하제"], "answer": [2], "explanation": "환자는 관상동맥에 죽상반이 관찰되며, 당뇨병 및 대사성증후군이 의심되는 소견을 보이고 있습니다. 스타틴은 죽상반 진행을 억제하고 안정화시키는 효과가 있어 심혈관 질환 예방에 가장 중요한 약물입니다. 현재 증상이 없으므로 베타차단제는 우선 필요하지 않으며, 혈당강하제는 혈당이 아직 치료가 시급할 정도로 높지는 않아 스타틴이 우선입니다."}, {"subject": "심초음파학", "year": ["21학번"], "professor": "박찬석", "question": "이 환자에게 적절한 치료는?", "images": [], "text_box": "57세 여자가 숨이 차서 응급실에 왔다. 혈압 70/40mmHg, 맥박 130회/분, 호흡 20회/분, 체온 36.5℃ 이다. 목정맥이 늘어나 있으며, 가슴 청진 상 심음이 빠르고 작게 들린다. 가슴 X-선 사진과 경흉부 심장초음파 검사 사진이다.", "options": ["디곡신", "베라파밀", "푸로세미드", "심장막천자술", "심실재동기화 치료"], "answer": [3], "explanation": "환자는 저혈압, 빈맥, 호흡곤란, 경정맥 팽창 및 심음 감소 등의 심장압전(cardiac tamponade)을 시사하는 임상 양상을 보입니다. 흉부 X-선상 심비대 소견과 심초음파상 심낭압출이 관찰됩니다. 이러한 심장압전의 치료에는 심장막천자술(pericardiocentesis)을 시행하여 심낭액을 제거하는 것이 가장 적절합니다."}, {"subject": "심초음파학", "year": ["21학번", "19학번"], "professor": "정미향", "question": "화살표의 덩어리가 있는 위치는?", "images": [], "text_box": "48세 여자가 3달 전부터 전신 쇠약감과 두근거림이 있어서 병원에 왔다. 활동할 때 숨이 가쁘다고 하였고 심전도(그림1)과 심초음파 (그림2)는 다음과 같다.", "options": ["좌심방", "좌심실", "우심방", "우심실", "대동맥"], "answer": [0], "explanation": "제공된 심초음파 영상은 parasternal long axis view이며, 화살표가 가리키는 덩어리는 좌심방 내에 위치하고 있습니다. 심전도와 임상 소견은 참고 자료이며, 문제 해결에는 직접적인 관련이 없습니다. 따라서 좌심방이 정답입니다."}, {"subject": "심초음파학", "year": ["21학번", "20학번", "19학번", "18학번", "17학번", "16학번"], "professor": "정해억", "question": "이 때 보일 수 있는 영상은?", "images": [], "text_box": "아래 그램과 같이 환자를 left lateral decubitus로 높힌 후 좌측 유두의 하부에 탐촉자를 대고 심초음파 검사를 시행하였다.", "options": ["parasternal long axis view", "parasternal short axis view (mitral valve level)", "apical 4 chamber view", "subxiphoid view(probe 아래 하얗게 간이 관찰된다고 합니다)", "suprasternal view"], "answer": [2], "explanation": "탐촉자를 좌측 유두 하부에 대고 심장을 apex에서 보는 자세는 apical view에 해당합니다. 일반적으로 이러한 위치에서 apical 4 chamber view가 가장 흔하게 관찰될 수 있습니다. Apical 4 chamber view는 심장의 4개 방을 모두 보여주는 시야입니다."}, {"subject": "심초음파학", "year": ["19학번"], "professor": "정해억", "question": "다음 중 초음파의 특성에 대한 설명이다. 맞는 것은?", "images": [], "text_box": null, "options": ["초음파란 사람들이 들을 수 있는 가청주파수의 한계인 2000Hz를 넘는 주파수의 소리를 말한다.", "신체 내 음속은 폐 조직에서 가장 높은 음속을, 골 조직에서 가장 낮은 음속을 보인다.", "초음파에서 도플러 효과란 혈관에서 움직이는 적혈구에 초음파가 부딪혀 반사될 때 나오는 초음파의 주파수가 처음 물체에 부딪힌 고유 주파수와는 달라진다는 것이다.", "이면성 심초음파 검사법은 초음파 주사면적내의 구조물에서 반사되는 초음파의 강도를 진폭 크기로 나타낸다.", "초음파는 음파에 비해 인체에 유해하기 때문에 초음파 검사 시 주의를 요한다."], "answer": [2], "explanation": "도플러 효과는 움직이는 물체에 초음파가 부딪혀 반사될 때 나오는 주파수가 처음 송출된 주파수와 달라지는 현상을 이용합니다. 초음파는 가청주파수(20Hz~20kHz)를 넘어 20kHz 이상의 주파수를 의미합니다. 신체 내 음속은 뼈 조직에서 가장 빠르고 폐 조직에서 가장 느립니다. 초음파는 음파와 마찬가지로 인체에 무해합니다. 이면성 심초음파 검사법은 반사되는 초음파의 강도를 밝기 정도(크기)로 나타냅니다."}, {"subject": "심초음파학", "year": ["19학번"], "professor": "정해억", "question": "심초음파 검사에서 다음과 같은 측정을 하였다. 사용된 심초음파 창(view)의 명칭과 좌심실구혈율(LVEF)을 맞게 짝지은 것은?", "images": [], "text_box": "LV end-diastolic volume은 120ml, LV end-systolic volume 40ml로 계산되었다.", "options": ["parasternal long axis view, 55%", "apical views 66.7%", "parasternal short axis view 75%", "apical views 55%", "suprasternal view 66.7%"], "answer": [1], "explanation": "제공된 심초음파 영상은 apical 4 chamber view와 apical 2 chamber view로, 모두 apical views에 해당합니다. 좌심실 구혈률(LVEF)은 (확장기말 용적 - 수축기말 용적) / 확장기말 용적 * 100%로 계산됩니다. 주어진 값 120ml와 40ml를 대입하면 (120-40)/120 * 100% = 80/120 * 100% = 66.7%입니다. 따라서 'apical views 66.7%'가 올바른 짝입니다."}, {"subject": "심초음파학", "year": ["18학번", "17학번", "16학번", "15학번", "14학번", "13학번", "12학번", "10학번"], "professor": "정해억", "question": "경흉부 심초음파 검사에서 세 관상동맥혈류의 분포를 가장 잘 나타내는 심초음파도는?", "images": [], "text_box": null, "options": ["흉골연 장축도 (parasternal long axis view)", "흉골연 단축도 (parasternal short axis view)", "심청 4방도(apical 4chamber view)", "심청 2방도(apical 2chamber virw)", "흉골위 단면도 (subxiphoid view)"], "answer": [1], "explanation": "흉골연 단축도(parasternal short axis view)는 심장의 단면을 여러 레벨에서 관찰할 수 있는 시야입니다. 이를 통해 좌심실의 각 벽 분절과 관련된 관상동맥 영역을 평가하여 급성 심근경색증 및 허혈성 심질환 시 벽운동 장애를 효과적으로 관찰할 수 있습니다."}, {"subject": "심초음파학", "year": ["17학번", "15학번", "14학번", "13학번", "12학번"], "professor": "윤호중", "question": "다음 중 경식도 심초음파가 필요한 경우는?", "images": [], "text_box": null, "options": ["좌심실 구혈률의 평가", "우심실의 용적 평가", "좌심방 내 혈전 유무 평가", "좌심실 질량의 측정", "좌심실의 용적 평가"], "answer": [2], "explanation": "경식도 심초음파(TEE)는 심장 뒤쪽에 위치한 좌심방 구조를 경흉부 심초음파(TTE)보다 훨씬 선명하게 관찰할 수 있습니다. 따라서 좌심방 또는 좌심방이 내 혈전 유무를 평가하는 데 TEE가 매우 유용하며, 특히 뇌졸중 등의 색전증 원인 규명에 필수적입니다. 다른 항목들은 주로 경흉부 심초음파로도 충분히 평가 가능합니다."}, {"subject": "심초음파학", "year": ["17학번", "15학번", "14학번", "13학번", "10학번"], "professor": "윤호중", "question": "다음 중 판막의 면적 측정 및 혈류역학적 평가 방법이 아닌 것은?", "images": [], "text_box": null, "options": ["modified Simpson method", "planimetry method", "continuity equation method", "pressure half time method", "단순 베르누이식(simplified Bernoulli equation)"], "answer": [0], "explanation": "modified Simpson method는 좌심실 구혈률(LVEF)을 측정하기 위해 심실의 이완기 및 수축기 용적을 계산하는 방법입니다. 반면, planimetry method, continuity equation method, pressure half time method, 단순 베르누이식 등은 판막의 면적을 측정하거나 판막 질환 시 혈류역학적 이상을 평가하는 데 주로 사용되는 방법입니다."}, {"subject": "심초음파학", "year": ["16학번"], "professor": "윤호중", "question": "다음 중 A가 가리키는 구조물은?", "images": [], "text_box": null, "options": ["좌심방", "좌심실", "우심방", "우심실", "폐동맥"], "answer": [3], "explanation": "제공된 심초음파 영상은 parasternal long axis view이며, 탐촉자에 가장 가까운 상단에 위치한 A는 우심실(RV)을 가리키는 구조물입니다. 이 시야에서는 우심실이 화면 상단에 위치하고, 좌심실과 대동맥, 좌심방이 그 아래에 차례로 보입니다."}, {"subject": "심초음파학", "year": ["16학번"], "professor": "윤호중", "question": "다음 중 경식도 심초음파의 검사의 적응증이 아닌 것은?", "images": [], "text_box": null, "options": ["심첨부의 혈전 확인", "좌심방이의 혈전 확인", "승모판막에 대한 평가", "난원공 개존증 (PFO)의 확인", "하행대동맥에 대한 평가"], "answer": [4], "explanation": "경식도 심초음파는 경흉부 심초음파로 확인하기 어려운 심장내 혈전(특히 좌심방이), 승모판막의 구조 및 기능, 선천성 심질환(난원공 개존증 등) 평가에 매우 유용합니다. 심첨부 혈전 또한 경식도 초음파로 자세히 평가할 수 있습니다. 하행대동맥에 대한 평가는 경식도 심초음파의 적응증 중 하나이지만, 주로 대동맥 질환(박리 등)에서 활용되며, 제시된 다른 심장 내부 구조물 평가에 비해서는 주된 적응증으로 분류되지 않을 수 있습니다."}, {"subject": "심초음파학", "year": ["15학번", "14학번"], "professor": "윤호중", "question": "다음 중 초음파의 특성에 대한 설명이다. 틀린 것은?", "images": [], "text_box": null, "options": ["초음파란 사람들이 들을 수 있는 가청주파수의 한계인 20,000 Hz를 넘는 주파수의 소리를 말한다.", "II형(M형 인 것 같습니다) 초음파는 초음파가 통과하는 선상에 놓인 구조물의 시간에 따른 움직임을 기록하는 형태이다.", "도플러 효과란 움직이는 물체에 초음파가 부딪혀 반사될 때 나오는 초음파의 주파수는 처음 물체에 부딪힌 고유 주파 수와는 달라진다는 것이다.", "단순 베르누이식은 이완기능의 평가에 이용된다.", "이면성 심초음파 검사법은 초음파 주사면적 내의 구조물에서 반사되는 초음파의 강도를 밝기정도로 나타낸다."], "answer": [3], "explanation": "단순 베르누이식은 유체 흐름의 압력차를 계산하는 원리로, 판막 질환 시 협착 부위의 압력 차이를 평가하는 데 주로 사용됩니다. 이는 이완기능 평가가 아닌 혈류역학적 평가에 해당합니다. 이완기능 평가는 주로 E/A ratio, E/e' ratio, IVRT 등의 도플러 파라미터를 통해 이루어집니다."}, {"subject": "심초음파학", "year": ["15학번", "12학번"], "professor": "윤호중", "question": "다음 중 경식도 심장 초음파 검사가 경흉부 심초음파 검 사에 비하여 진단에 도움이 되는 경우는?", "images": [], "text_box": null, "options": ["좌심실 비대의 평가", "국소 벽운동의 평가", "판막 역류의 평가", "이완기능의 평가", "전신 색전증의 원인 규명"], "answer": [4], "explanation": "경식도 심초음파는 경흉부 심초음파에 비해 좌심방이 내 혈전 등 심장 내 작은 구조물이나 후방 구조물을 더 자세히 관찰할 수 있습니다. 이는 전신 색전증의 원인이 될 수 있는 심장 내 혈전 등을 규명하는 데 매우 효과적입니다. 다른 항목들은 경흉부 심초음파로도 충분히 평가 가능하거나, 경식도 심초음파가 반드시 더 우월하다고 볼 수 없는 경우가 많습니다."}, {"subject": "심초음파학", "year": ["15학번", "14학번", "13학번", "10학번"], "professor": "윤호중", "question": "심장초음파를 이용하여 심실 수축 기능을 평가할 수 있는 방법은?", "images": [], "text_box": null, "options": ["좌심실 구혈률(left ventricular ejection fraction)", "도플러 효과", "continuity equation", "pressure half time method", "color Doppler method"], "answer": [0], "explanation": "좌심실 구혈률(LVEF)은 심실의 수축기능을 정량적으로 평가하는 가장 중요한 지표입니다. LVEF는 심실이 이완기말 용적 대비 수축 시 얼마만큼의 혈액을 내보내는지를 나타냅니다. 도플러 효과, continuity equation, pressure half time method, color Doppler method는 주로 판막 질환 평가나 혈류 속도 및 방향 평가에 사용됩니다."}, {"subject": "판막질환", "year": ["21학번"], "professor": "박찬석", "question": "심전도는 그림과 같았다. 진단은?", "images": [], "text_box": "80세 남자가 실신으로 내원하였다. 최근 2개월 전부터 운동 시 가슴 통증이 있었다. 오른쪽 2번째 갈비 사이 복장뼈 곁에서 수축기 동안 커졌다 작아지는 3/4도의 심잡음이 들렸다.", "options": ["승모판 폐쇄부전증", "폐동맥판협착증", "대동맥판협착증", "심실사이막결손증", "폐쇄비대심장근육병"], "answer": [2], "explanation": "오른쪽 두번째 갈비 사이 복장뼈 수축기동안 커졌다 작아지는 심잡음과 심전도상 좌심실 비대(LVH) 소견은 대동맥판 협착증(AS)을 시사하는 소견입니다. LVH는 심초음파나 심전도에서 확인할 수 있으며, AS의 진행 정도를 판단하는 중요한 지표 중 하나입니다. 제시된 임상 양상과 검사 소견은 대동맥판 협착증의 특징과 일치합니다. 따라서 이 환자의 진단은 대동맥판 협착증으로 가장 적절합니다. 다른 판막 질환은 제시된 청진 소견 및 심전도 소견과 일치하지 않습니다."}, {"subject": "판막질환", "year": ["21학번", "20학번"], "professor": "박찬석", "question": "향후 치료 방침을 정하기 위한 적절한 검사는?", "images": [], "text_box": "76세 남자가 두달 전부터 숨이 차서 병원에 왔다. 가슴 청진에서 오른쪽 2번째 갈비사이 복장뼈 옆에서 수축기 동안 커졌다 작아지는..?심잡음이 들렸다. 심실2음의 검사 소견은 다음과 같다. 좌심실 구혈률 (복구실패) 대동맥판 면적 0.95cm^2 대동맥판 최대 혈류 속도 3.5m/sec", "options": ["식도 경유 심초음파", "심장자기공명영상", "운동부하 심초음파", "심장컴퓨터단층촬영", "도부타민부하심초음파"], "answer": [4], "explanation": "환자는 심잡음과 호흡곤란 증상을 보이며, 대동맥판 최대 혈류 속도 3.5m/s (정상 < 4m/s)와 대동맥판 면적 0.95cm^2 (severe 기준 ≤ 1cm^2)로 중증 대동맥판 협착증(Severe AS)을 의심할 수 있습니다. 특히, 좌심실 구혈률이 '복구실패' 상태로 주어진 경우, 저유량, 저압력 구배 AS(low-flow, low-gradient AS)일 가능성이 있으며, 이는 대동맥판 협착증의 중증도를 정확히 평가하기 어려울 수 있습니다. 이런 경우, 도부타민 스트레스 심초음파(Dobutamine Stress Echocardiography, DSE)를 시행하여 심박출량이 증가할 때 실제 협착의 중증도(Vmax ≥ 4m/s)를 확인하여 D2 또는 D3 단계의 Severe AS를 감별하고, 향후 치료 방침(수술/시술)을 결정하는 데 중요한 정보를 얻을 수 있습니다."}, {"subject": "판막질환", "year": ["19학번"], "professor": "정해억", "question": "틀린 것은?", "images": [], "text_box": "88세, 노작성 호흡곤란으로 내원했다. Bnp가 (1000 이상으로?) 상승된 소견을 보였다. 10년전 고혈압을 진단받아 약을 먹고 있었고, 청진에서 수축기 심잡음이 들렸다. 혈류 최고속도 4.6m/s, 대동맥 판막 면적 0.8cm2 이다.", "options": ["가장 예후가 안좋은 증상을 보인다", "중증 대동맥판 협착증으로 수술이나 시술이 필요하다", "퇴행성이 주된 원인이며 statin과 b-blocker로 진행을 늦추고 예후를 개선할 수 있다", "좌심실 비대와 좌심방 확장이 동반된다", "고령이므로 수술보단 시술이 권고된다."], "answer": [2], "explanation": "환자는 노작성 호흡곤란, 수축기 심잡음, 혈류 최고속도 4.6m/s, 대동맥 판막 면적 0.8cm2를 보여 중증 대동맥판 협착증(Severe AS)으로 진단됩니다. Severe AS의 주된 치료는 수술 또는 경피적 대동맥판막 치환술(TAVI)이며, 약물치료는 증상 완화에 도움이 될 수 있으나 질환의 진행 자체를 늦추거나 예후를 개선하지는 못합니다. 특히 statin과 b-blocker는 AS 진행을 늦추는 효과가 입증되지 않았습니다. 따라서 'statin과 b-blocker로 진행을 늦추고 예후를 개선할 수 있다'는 설명은 틀린 내용입니다. 다른 보기는 Severe AS의 일반적인 특성 및 치료 원칙에 부합합니다."}, {"subject": "판막질환", "year": ["19학번", "18학번"], "professor": "정해억", "question": "본 환자의 상태에 대한 설명으로 틀린 것은?", "images": [], "text_box": "60세 남자가 1시간 전부터 찢어지는 듯한 격렬한 흉통으로 응급실 내원했다. 내원당시 혈압은 80/50 이고 청진상 좌측 흉골연 상부에서 이완기 심잡음이 들렸고 양폐하에서 라음이 청취되었다.", "options": ["급성 대동맥박리에 의한 급성 대동맥판 폐쇄부전증이 강력히 의심된다.", "급성 감염성 심내막염이 대동맥판을 침범한 경우 비슷한 증상이 나타날 수 있다.", "심한 폐쇄부전증이지만 좌심실 크기에 변화가 없다.", "좌심방 압력이 급격히 증가하면서 폐부종이 오고, 곧 맥압증가가 나타날 것이다.", "약물치료를 고려하지 않고 빨리 응급수술을 진행한다."], "answer": [3], "explanation": "환자는 급성 흉통, 이완기 심잡음, 저혈압 및 폐부종 소견을 보여 급성 대동맥판 폐쇄부전증(Acute AR)이 강력히 의심됩니다. Acute AR은 대동맥박리나 감염성 심내막염 등으로 인해 급격히 발생하며, 심장이 보상할 시간을 갖기 전에 발생하므로 좌심실의 크기 변화(확장)는 상대적으로 적습니다. 또한, 좌심실은 이완기 압력이 급격히 상승하여 좌심방 및 폐혈관 압력이 증가, 폐부종이 발생하지만, 맥압(수축기-이완기 혈압 차이)은 증가하기보다는 정상 범위에 가깝거나 감소할 수 있습니다. 만성 AR에서 맥압 증가가 나타나므로, '곧 맥압증가가 나타날 것이다'는 설명은 틀린 것입니다. Acute AR은 생명을 위협하는 응급상황이므로 약물치료보다는 즉각적인 응급수술이 필요합니다."}, {"subject": "판막질환", "year": ["18학번"], "professor": "정해억", "question": "해당 질환과 치료에 대한 설명으로 맞는 것은?", "images": [], "text_box": "평소 조금만 움직여도 호흡곤란을 가진 86세 여자 환자에게 경식도 심초음파를 보면서 대퇴동맥을 통해 경피적 시술이 시행되었다. 우측은 경피적 시술 후 사진이다.", "options": ["증상을 동반한 중증 대동맥판 폐쇄부전증에 대한 TAVI 시술이다.", "심장초음파로 측정한 대동맥판 면적 1.2cm2, 대동맥판 혈류최대속도 3.7m/s라면 본 시술의 적응증이 된다.", "본 질환은 퇴행성이 가장 많은 원인이다", "본 질환은 수축기에 좌심실에 심한 용적 과부하가 걸려 심비대가 발생한다.", "본 질환을 가진 환자의 증상 중에서 예후가 가장 나쁜 증상은 실신이다."], "answer": [2], "explanation": "제시된 임상 소견(호흡곤란, 86세 고령)과 경피적 시술(TAVI) 시행은 대동맥판 협착증(AS)의 치료 상황을 시사합니다. TAVI는 주로 고령의 중증 AS 환자에게 시행되는 치료법입니다. 대동맥판 협착증의 가장 흔한 원인은 퇴행성 석회화이며, 이는 연령이 증가함에 따라 발생률이 높아집니다. 따라서 '본 질환은 퇴행성이 가장 많은 원인이다'는 설명이 맞습니다. 대동맥판 협착증은 좌심실에 압력 과부하를 초래하여 심비대(LVH)를 유발하며, 이는 용적 과부하가 아닌 압력 과부하에 해당합니다. AS의 주요 증상은 호흡곤란, 흉통, 실신이며, 예후가 가장 나쁜 증상은 호흡곤란(심부전 증상)입니다. 제시된 판막 면적과 혈류 속도는 중증 AS 기준에 미달하여 TAVI의 적응증이 되기 어렵습니다(증상이 있는 중증 AS는 TAVI 적응증이 될 수 있으나, 수치만으로는 부족)."}, {"subject": "판막질환", "year": ["17학번"], "professor": "정해억", "question": "환자의 질환과 치료에 관한 설명 중 맞는 문항은?", "images": [], "text_box": "70세 여자가 점점 악화되는 노작성 호흡곤란, 어지럼 및 흉통을 주소로 내원하였다. 청진상흉골연의 수축기 심잡음이 청진되었다. 경 흉부 심장초음파상 대동맥판 혈류최대속도 3.7m/sec. 대동맥판 면적 1.1cm2, 대동맥-좌심실간 평균압력차 35mmHg였다.", "options": ["중등도의 퇴행성 대동맥판 협착증이며 증상이 있으므로 수술 또는 시술을 해야한다.", "Statin (HMG CoA reductase inhibitor)이 본 질환의 진행을 늦출 수 있다.", "본 판막질환의 주요 증상 중 가장 예후가 안 좋은 것은 어지럼증과 실신이다.", "심방세동(Atrial fibrillation)자주 동반된다.", "수술 혹은 시술을 미루고 면밀한 추적관찰을 해보는 것이 좋다."], "answer": [0, 3], "explanation": "환자는 노작성 호흡곤란, 어지럼, 흉통의 증상을 보이며 수축기 심잡음이 청진됩니다. 심장초음파 결과(Vmax 3.7m/s, AVA 1.1cm^2, Mean PG 35mmHg)는 중등도 대동맥판 협착증(Moderate AS)에 해당합니다. 2020년 가이드라인에 따르면, 증상이 있는 중등도 AS 환자는 수술 또는 시술을 고려할 수 있습니다. 따라서 첫 번째 보기는 옳습니다. 대동맥판 협착증은 압력 과부하로 인해 좌심실 비대(LVH)가 흔하게 동반되며, 심방세동은 AS 자체보다는 동반된 좌심방 확장이나 심부전으로 인해 발생할 수 있으나, AS의 주된 합병증은 아닙니다. 따라서 네 번째 보기는 옳습니다. Statin은 AS 진행을 늦추지 못하며, AS의 주요 증상 중 가장 예후가 안 좋은 것은 호흡곤란(심부전)입니다. 따라서 1번과 4번이 옳은 설명입니다."}, {"subject": "판막질환", "year": ["16학번", "14학번"], "professor": "정해억", "question": "급성 대동맥판 폐쇄부전증 (acute AR)에 대한 설명으로 틀린 것은?", "images": [], "text_box": null, "options": ["대동맥판에 감염성 심내막염이 생기면 발생한다.", "좌심실의 확장이 심하다.", "수축기와 이완기 혈압간의 차가 정상범주이다.", "폐부종이 흔하게 발생한다.", "이완기 중에 승모판이 조기에 닫혀 좌심실의 이완기능 장애가 온다."], "answer": [1], "explanation": "급성 대동맥판 폐쇄부전증(Acute AR)은 급격한 발생으로 인해 심장이 보상할 시간이 부족하여 좌심실의 현저한 확장 없이 급성 심부전 증상이 나타나는 특징이 있습니다. 따라서 '좌심실의 확장이 심하다'는 설명은 틀렸습니다. 감염성 심내막염은 Acute AR의 중요한 원인 중 하나이며, 급성 맥압은 정상 범주에 가깝거나 오히려 감소할 수 있습니다. 급격한 좌심실 이완기 압력 상승으로 인해 좌심방 압력이 증가하고 폐부종이 흔히 발생합니다. 이완기 중 승모판이 조기에 닫히는 현상은 심한 Acute AR에서 관찰될 수 있는 소견으로, 좌심실 이완기 압력 상승과 관련하여 좌심실의 이완기능 장애를 시사합니다."}, {"subject": "판막질환", "year": ["16학번", "15학번", "14학번", "13학번"], "professor": "정해억", "question": "다음과 같은 심초음파 소견을 보이는 환자에 대한 설명으로 맞는 것은?", "images": [], "text_box": "점점 심해지는 운동시 호흡곤란으로 입원한 20세 배구선수. 키 205cm/체중 80kg 혈압 145/55mmHg, 척추 scoliosis 기형, 잦은 기흉의 과거력.", "options": ["이엽성 대동맥판(bicuspid aortic valve)이 의심되며 대동맥륜과 대동맥 근위부의 확장이 흔히 동반된다.", "청진상 흉골좌연에서 점점 작아지는 양상의 이완기 심잡음이 들리며 환자의 맥압이 정상보다 커져있다는 것은 만성 대동맥판 폐쇄부전증을 시사한다.", "NOTCH gene의 유전자 돌연변이 검사해보아야한다", "ankylosing spondylitis와 동반된 대동맥판 폐쇄부전증이 의심된다.", "대동맥박리에 의한 대동맥 확장과 대동맥판 폐쇄부전증이므로 수술을 고려해야한다."], "answer": [1], "explanation": "환자의 키 205cm, 척추측만증(scoliosis), 잦은 기흉의 과거력은 마르판 증후군(Marfan syndrome)을 강하게 시사합니다. 마르판 증후군은 결합조직 질환으로, 대동맥 이완기 심잡음(만성 대동맥판 폐쇄부전증, Chronic AR)과 함께 대동맥 근위부 확장 및 박리 위험이 높습니다. 맥압(수축기 혈압 145, 이완기 혈압 55로 맥압 90)이 정상보다 커져있는 소견은 만성 대동맥판 폐쇄부전증의 특징입니다. 심초음파에서 대동맥 근위부 확장과 함께 대동맥판 폐쇄부전 소견이 보이며, 흉부 X-ray에서도 대동맥 확장이 관찰됩니다. 따라서 '청진상 흉골좌연에서 점점 작아지는 양상의 이완기 심잡음이 들리며 환자의 맥압이 정상보다 커져있다는 것은 만성 대동맥판 폐쇄부전증을 시사한다'는 설명이 정확하게 환자의 상태를 반영합니다. 이엽성 대동맥판은 마르판 증후군의 특징이 아니며, FBN1 유전자 변이 검사는 마르판 증후군의 진단을 확진합니다."}, {"subject": "판막질환", "year": ["16학번"], "professor": "정해억", "question": "심도자 소견은 다음과 같았고 평균 대동맥압력차는 55mmHg. 진단명은?", "images": [], "text_box": "60세 남자환자가 운동중에 실신하여 내원하였다. 평소 노작성 호흡곤란이 있었다. 청진상 수축기 심잡음이 우측 두번째 늑간에서 들렸다.", "options": ["중등도 승모판 폐쇄 부전증", "중등도 대동맥판 협착증", "중증 승모판 폐쇄부전증", "중증 대동맥판 협착증"], "answer": [3], "explanation": "환자는 운동 중 실신, 노작성 호흡곤란, 우측 두번째 늑간에서 들리는 수축기 심잡음을 보여 대동맥판 협착증(AS)의 전형적인 증상과 청진 소견을 보입니다. 심도자 소견 그래프에서 좌심실(LV)과 대동맥(Ao) 사이에 수축기 압력차가 확연히 관찰되며, 이는 대동맥판 협착증을 나타냅니다. 특히 평균 대동맥압력차(mean pressure gradient)가 55mmHg로, 중증 대동맥판 협착증의 기준인 40mmHg 이상을 크게 초과합니다. 따라서 환자의 진단명은 중증 대동맥판 협착증입니다. 승모판 질환이나 중등도 협착증과는 임상 및 심도자 소견이 일치하지 않습니다."}, {"subject": "판막질환", "year": ["16학번"], "professor": "정해억", "question": "환자의 질환과 관련된 설명 중 옳은 것을 고르시오.", "images": [], "text_box": "70세 여자 점점 악화되는 노작성 호흡곤란, 어지럼 및 흉통을 주소로 내원, 청진상 우측상부 흉골연의 수축기 심잡음이 정친됨. 경 흉부 심장 초음파상 대동맥판 혈류 최대속도 3.7m/s 대동맥판 면적 1.1cm^2. 대동맥좌심실간 평균 압력차 35mmHg였다.", "options": ["중등도의 퇴행성 대동맥판 협착증이며 증상이 있으므로 수술 또는 시술을 해야한다.", "본 환자에서 statin 은 질환의 진행을 늦출 수 있다.", "본 판막질환의 주요 증상 중 예후가 가장 안 좋은 것은 흉통이다", "좌심실 비대가 흔히 관찰된다", "대동맥 판막의 문제를 더 면밀히 진단키 위해 운동부하 검사를 실시해야 한다."], "answer": [0, 3], "explanation": "환자는 노작성 호흡곤란, 어지럼, 흉통의 증상과 수축기 심잡음이 있고, 초음파 수치(Vmax 3.7m/s, AVA 1.1cm^2, Mean PG 35mmHg)는 중등도 대동맥판 협착증(Moderate AS)에 해당합니다. 증상이 있는 중등도 AS는 수술 또는 시술을 고려할 수 있습니다. AS는 좌심실에 압력 부하를 주어 좌심실 비대(LVH)를 흔하게 유발합니다. 따라서 1번과 4번 보기가 옳습니다. Statin은 AS 진행을 늦추지 않으며, AS의 주요 증상 중 예후가 가장 안 좋은 것은 호흡곤란(심부전)입니다. 운동부하 검사는 진단 목적보다는 증상 유발 평가 등에 사용될 수 있지만, 본 환자의 상황에서 가장 면밀한 진단 방법으로 보기는 어렵습니다."}, {"subject": "판막질환", "year": ["16학번", "14학번"], "professor": "정해억", "question": "중증 대동맥판막협착증에서 수술 판단 여부의 기준이 되는 것은?", "images": [], "text_box": null, "options": ["심방세동 동반 여부", "관상동맥질환 동반 여부", "호흡곤란 발생 여부", "70세 이상 고령", "혈전증 발생 여부"], "answer": [2], "explanation": "중증 대동맥판막협착증(Severe AS)에서 수술 또는 시술(TAVI) 여부를 결정하는 가장 중요한 기준은 환자의 증상 유무입니다. 특히 호흡곤란, 흉통, 실신과 같은 AS 관련 증상이 있는 경우 예후가 급격히 나빠지므로 적극적인 치료가 권고됩니다. 심방세동, 관상동맥질환 동반 여부, 고령, 혈전증 등은 수술 위험도나 수술 방법 결정에 영향을 미칠 수 있지만, 수술 여부 판단의 1차적인 기준은 아닙니다. 따라서 '호흡곤란 발생 여부'가 수술 판단의 주요 기준이 됩니다."}, {"subject": "판막질환", "year": ["15학번", "14학번"], "professor": "정해억", "question": "심도자 소견은 다음과 같았다. 진단명은?", "images": [], "text_box": "60세 남자환자가 운동 중에 실신하여 내원하였다. 평소 노작성 호흡곤란이 있었다. 청진상 수축기 심잡음이 우측 두 번째 늑간에서 들렸다.", "options": ["중등도 승모판 폐쇄부전증", "중등도 대동맥판 협착증", "중증 승모판 폐쇄부전증", "중증 대동맥판 협착증", "중증 대동맥판 폐쇄부전증"], "answer": [3], "explanation": "환자는 운동 중 실신, 노작성 호흡곤란, 우측 두번째 늑간에서 들리는 수축기 심잡음 및 좌심실 비대 소견을 보여 대동맥판 협착증(AS)의 전형적인 임상 양상을 보입니다. 심도자 소견 그래프에서 좌심실(LV)과 대동맥(Ao) 사이에 수축기 압력차가 확연히 관찰되며, 이는 대동맥판 협착증을 나타냅니다. 특히 평균 대동맥압력차(Mean gradient)가 60mmHg로, 중증 대동맥판 협착증의 기준인 40mmHg 이상을 크게 초과합니다. 따라서 환자의 진단명은 중증 대동맥판 협착증입니다. 승모판 질환이나 중등도 협착증, 대동맥판 폐쇄부전증과는 제시된 소견이 일치하지 않습니다."}, {"subject": "판막질환", "year": ["15학번", "14학번", "13학번", "12학번"], "professor": "정해억", "question": "환자의 질환과 관련된 설명 중 틀린 것을 모두 고르시오. (2가지)", "images": [], "text_box": "70세 여자환자가 점점악화되는 노작성 호흡곤란과 흉통을 주소로 내원하여 청진상 우측상부 흉골연의 수축기 심잡음이 들려 시행한 경흉부 심장초음파를 시행하였으며 대동맥판 혈류 최대속도 5m/sec, 대동맥판 면적 0.6cm2 였다.", "options": ["본 질환은 대동맥판의 염증성 변화에 의한 것이 퇴행성 변화에 의한 것보다 다수이다", "중증의 대동맥판 협착증이 의심되며 증상이 있으므로 수술을 고려해야 한다.", "증상이 없더라도 좌심실 수축기능이 감소되어 있다면 수술을 고려해야 한다.", "Statin (HMG-CoA reductase inhibitor)이 본 질환의 진행을 늦출 수 있다.", "본 질환의 대표적인 증상은 호흡곤란, 협심증, 어지럼증이다.", "개흉수술의 위험성이 극히 높은 환자들은 경피적 시술이 고려된다.", "좌심실 비대가 흔히 동반된다."], "answer": [0, 3], "explanation": "환자는 노작성 호흡곤란, 흉통, 수축기 심잡음 및 초음파 소견(Vmax 5m/sec, AVA 0.6cm^2)을 종합하여 중증 대동맥판 협착증(Severe AS)으로 진단됩니다. AS의 가장 흔한 원인은 퇴행성 석회화이며, 염증성 변화에 의한 경우는 상대적으로 드뭅니다. 따라서 첫 번째 보기 '본 질환은 대동맥판의 염증성 변화에 의한 것이 퇴행성 변화에 의한 것보다 다수이다'는 틀렸습니다. Statin은 AS의 진행을 늦추는 효과가 입증되지 않았으므로 네 번째 보기 'Statin (HMG-CoA reductase inhibitor)이 본 질환의 진행을 늦출 수 있다' 또한 틀렸습니다. 증상이 있는 중증 AS는 수술 또는 시술(TAVI)이 권고되며, 증상이 없어도 LVEF가 50% 미만이면 수술이 고려됩니다. AS의 대표적인 증상은 호흡곤란, 협심증, 어지럼증이며, 개흉수술 위험이 높은 환자에게 TAVI가 고려됩니다. AS는 좌심실 압력 과부하로 인해 좌심실 비대가 흔히 동반됩니다."}, {"subject": "판막질환", "year": ["14학번"], "professor": "정해억", "question": "이 환자에서 대동맥 판막 협착이라고 진단할 수 있는 청진소견은?", "images": [], "text_box": "70세 남자가 고관절 수술을 받기 위해 수술전 검사를 시행하였다. 신체검사상에서 3/6 도 강도의 수축기 잡음이 청진되어 대동맥 판막 협착증 의심하여 수술을 연기하고 심초음파를 시행하기로 하였다.", "options": ["심잡음은 high pitched sound 로 청진기의 diaphragm 에서 잘 청진되었다.", "심실기외수축 직후 심잡음의 강도가 일정하였다.", "심잡음은 S1 과 동시에 시작되어, 적어도 S2 혹은 이후까지 청진되었다.", "심잡음은 긴 R-R 간격의 심방세동 후에 약하게 청진되었다.", "심잡음은 전형적인 Cresendo/decrescendo 형태를 보였다."], "answer": [4], "explanation": "대동맥판 협착증(AS)은 좌심실 수축기 시 혈류가 협착된 대동맥판을 통과하면서 발생하는 난류(turbulent flow)로 인해 특징적인 수축기 심잡음(systolic murmur)이 들립니다. 이 심잡음은 혈류량 변화에 따라 강도가 변하며, 시작 시 작다가 점점 커지고(crescendo), 최고점에 달한 후 다시 작아지는(decrescendo) 전형적인 다이아몬드형(diamond-shaped) 또는 크레센도-데크레센도 형태를 보입니다. 따라서 '심잡음은 전형적인 Crescendo/decrescendo 형태를 보였다'는 설명이 AS의 청진 소견으로 가장 적절합니다. 다른 보기들은 AS의 일반적인 청진 특징과 일치하지 않거나, 특정 상황(심방세동)에서의 심잡음 변화를 설명하는 것입니다."}, {"subject": "판막질환", "year": ["14학번"], "professor": "정해억", "question": "환자의 질환과 관련된 설명 중 틀린 것을 고르시오.", "images": [], "text_box": "70세 여자. 점점 악화되는 노작성 호흡곤란, 어지럼 및 흉통을 주소로 내원, 청진상 우측상부 흉골연의 수축기 심잡음이 청진됨. 경 흉부 심장초음파상 대동맥판 혈류최대속도 5m/sec. 대동맥판 면적 0.6cm2 였다.", "options": ["중증의 퇴행성 대동맥판 협착증이며 증상이 있으므로 수술을 해야 한다", "Statin (HMG CoA reductase inhibitor)이 본 질환의 진행을 늦출 수 없다", "증상 중 가장 예후가 안 좋은 것은 어지럼증이다.", "좌심실의 비대가 흔히 동반된다", "증상이 없더라도 좌심실 수축기능의 감소가 보이면 수술을 고려해야 한다"], "answer": [2], "explanation": "환자는 노작성 호흡곤란, 어지럼, 흉통의 증상과 수축기 심잡음, 초음파 소견(Vmax 5m/sec, AVA 0.6cm^2)을 보여 중증 대동맥판 협착증(Severe AS)으로 진단됩니다. Severe AS는 증상이 있으면 수술 또는 TAVI가 권고되므로 첫 번째 보기는 옳습니다. Statin은 AS 진행을 늦추는 효과가 입증되지 않아 두 번째 보기도 옳습니다. AS의 주요 증상 중 심부전으로 인한 호흡곤란이 가장 예후가 좋지 않은 증상이며, 어지럼증이나 실신도 좋지 않은 예후를 시사하지만 가장 나쁘다고는 할 수 없습니다. 따라서 '증상 중 가장 예후가 안 좋은 것은 어지럼증이다'는 세 번째 보기는 틀렸습니다. AS는 좌심실에 압력 과부하를 초래하여 좌심실 비대가 흔히 동반되므로 네 번째 보기는 옳습니다. 증상이 없더라도 좌심실 수축기능(LVEF)이 50% 미만으로 감소하면 수술이 고려되므로 다섯 번째 보기는 옳습니다."}, {"subject": "판막질환", "year": ["14학번", "13학번"], "professor": "정해억", "question": "다음 소견 중 환자의 경흉부 심초음파에서 발견될 가능성이 없는 소견은?", "images": [], "text_box": "42세 남자환자가 운동 시 호흡곤란으로 입원하였다. 내원당시 혈압은 155/67mmHg 였다. 청진상 흉골의 우측 상흉부에서는 수축기심잡음이 들렸고 좌측흉골연 상부에서는 이완기 초기부터 시작되어 점점 작아지는 양상의 이완기 잡음이 들렸다.", "options": ["이완기 승모판엽의 떨림", "승모판 협착증", "이엽성 대동맥판", "좌심실의 확장과 비대", "대동맥 근위부의 확장"], "answer": [1], "explanation": "환자는 운동 시 호흡곤란, 수축기 심잡음(우측 상흉부), 이완기 심잡음(좌측 흉골연 상부), 넓은 맥압(155/67mmHg)을 보여 대동맥판 폐쇄부전증(AR)과 대동맥판 협착증(AS)의 혼합 질환을 시사합니다. 특히 이완기 심잡음은 AR의 특징입니다. AR이 있는 경우 좌심실 용적 과부하로 인해 좌심실의 확장과 비대가 발생하며, 대동맥 근위부 확장도 흔히 동반됩니다. 심한 AR의 경우 대동맥에서 역류하는 혈류가 승모판엽에 부딪히면서 이완기 승모판엽의 떨림(mitral valve leaflet fluttering)이 관찰될 수 있습니다. 반면, 승모판 협착증은 승모판 개구부의 협착으로 인한 이완기 심잡음이 특징이며, 제시된 환자의 증상 및 청진 소견(대동맥판 관련)과는 거리가 있습니다. 이엽성 대동맥판은 AR이나 AS의 원인이 될 수 있습니다. 따라서 경흉부 심초음파에서 발견될 가능성이 없는 소견은 '승모판 협착증'입니다."}, {"subject": "판막질환", "year": ["13학번"], "professor": "정해억", "question": "대동맥판 협착증 청진소견은?", "images": [], "text_box": null, "options": ["심잡음은 high pitched sound 로 청진기의 diaphragm 에서 잘 청진되었다.", "심실기외수축 직후 심잡음의 강도가 일정하였다.", "심잡음은 S1 과 동시에 시작되어, 적어도 S2 혹은 이후까지 청진되었다.", "심잡음은 긴 R-R 간격의 심방세동 후에 약하게 청진되었다.", "심잡음은 전형적인 Cresendo/decrescendo 형태를 보였다."], "answer": [4], "explanation": "대동맥판 협착증(AS)은 좌심실 수축기 시 혈류가 협착된 대동맥판을 통과하면서 발생하는 난류(turbulent flow)로 인해 특징적인 수축기 심잡음(systolic murmur)이 들립니다. 이 심잡음은 혈류량 변화에 따라 강도가 변하며, 시작 시 작다가 점점 커지고(crescendo), 최고점에 달한 후 다시 작아지는(decrescendo) 전형적인 다이아몬드형(diamond-shaped) 또는 크레센도-데크레센도 형태를 보입니다. 따라서 '심잡음은 전형적인 Crescendo/decrescendo 형태를 보였다'는 설명이 AS의 청진 소견으로 가장 적절합니다. 다른 보기들은 AS의 일반적인 청진 특징과 일치하지 않거나, 특정 상황(심방세동)에서의 심잡음 변화를 설명하는 것입니다."}, {"subject": "심장질환의 약물치료", "year": ["21학번", "20학번"], "professor": "김동빈", "question": "심근경색 환자에서 항혈소판 약제 사용 때 맞는 말은?", "images": [], "text_box": null, "options": ["약제는 1년 이상 사용을 금해야 한다.", "부작용은 저혈압이다.", "1년 이내에는 두 가지 약제를 복합적으로 사용하는 것을 추천한다.", "Clopidogrel과 prasugrel은 같이 사용해도 효과가 좋다.", "Wafarin 단독 사용이 아스피린과 clopidogrel 사용보다 효과가 좋다."], "answer": [2], "explanation": "아스피린의 경우 평생 복용할 수 있으며, 항혈소판제 자체의 장기 복용은 생명 연장에 도움을 주는 경우가 많습니다. DAPT의 경우에도 Stenting을 시행한 경우 1년 동안 약을 복용합니다. 항혈소판제는 혈소판 응집을 억제하여 혈전 형성을 막는 것으로, 혈압과는 무관하며 교감신경, 칼슘통로, 레닌-안지오텐신계에는 작용하지 않습니다. DAPT 기간은 보통 1년을 넘지 않으며, Stenting 시에는 1년간 사용을 권유합니다. Clopidogrel과 Prasugrel은 동일한 P2Y12 ADP receptor 억제 기전의 약물이므로, 이 둘을 함께 사용한다고 해서 효과가 더 좋아지지는 않습니다. Warfarin은 항응고제이며, 단일 약제를 고용량으로 투여하는 것보다 여러 약제를 저용량으로 병용하는 것이 효과적이라고 알려져 있습니다."}, {"subject": "심장질환의 약물치료", "year": ["21학번", "20학번"], "professor": "김동빈", "question": "다음 심장 질환 환자 약제 사용에 대한 설명이 맞는 것은?", "images": [], "text_box": null, "options": ["심부전 환자에서 beta blocker와 칼슘 길항제는 모두 contractility를 줄이므로 금기이다.", "심부전환자에서 SGLT2 inhibitor는 주로 심근경색을 막아주어서 생존율을 높여준다.", "심방세동시 사용하는 direct oral anticoagulant는 warfarin보다 부작용이 많다.", "항부정맥 약제 사용은 생존율 향상과 관련 없다.", "대동맥판막 진행 억제에 스타틴이 효과적이다."], "answer": [3], "explanation": "CCB는 Ca2+가 심장 및 동맥 근육세포 유입을 막아 수축력을 감소시키는 것이 맞습니다. 하지만 베타차단제는 교감신경 Antagonist로 작용하여 맥박을 낮추므로 수축력과는 직접적인 관련이 적습니다. SGLT2 inhibitor는 심부전 환자의 생존율을 높여주는 것은 사실이나, 심근경색을 직접적으로 막아주기보다는 심장 부담을 줄여 심부전에 효과를 나타냅니다. DOAC은 Factor X에 특이적으로 작용하여 warfarin보다 부작용이 적습니다. Class I과 Class III 항부정맥 약물은 동율동 전환을 목표로 사용되며, 부정맥 감소 효과가 있지만 새로운 부정맥을 유발할 수 있어 항상 상태 개선을 보장하지 않습니다. 판막 질환의 진행을 억제하거나 예후를 호전시키는 약제는 없으며, 심해질 경우 판막 수술을 고려합니다."}, {"subject": "판막질환의외과적치료", "year": ["21학번", "20학번"], "professor": "정성철", "question": "이 시술에 대한 설명으로 틀린 것은?", "images": [], "text_box": "68세 여자환자가 서서히 악화되는 NYHA class 3 호흡곤란을 주소로 내원하였다. 내원시 혈압은 105/60 mmHg, 청진상 불규칙 심리듬에 (..)한 심잡음이 들렸다. 심전도와 경흉부 심초음파는 아래 사진과 같다. 본 환자에게 동영상과 같은 시술을 시행하였으며 그림은 시술 전과 후의 좌심실-좌심방간 압력곡선을 보여주고 있다.", "options": ["증상이 있는 승모판 협착증 환자에게 시행하는 시술이다.", "심장 초음파가 진단에 가장 중요하며 승모판구면적이 1/4cm2, 이완기 압력반감기가 (..)라면 이 시술을 고려해야 한다.", "중등도 이상의 승모판 폐쇄부전이 동반되어 있으면 이 시술은 금기이다.", "이 시술의 명칭은 PMBV(percutaneous mitral balloon valvuloplasty)이다.", "만약 심방세동에 의해 좌심방이(LA appendage)내에 혈전이 있으면 이 시술을 통해 판막과 혈전이 동시에 치료된다."], "answer": [4], "explanation": "심초음파에서 hockey-stick appearance를 보이며 시술을 통해 LA와 LV의 큰 압력차가 줄어든 것으로 보아 mitral valve stenosis임을 알 수 있습니다. MS에서 증상이 있는 경우 증상 완화를 위해 시술을 진행합니다. 심초음파로 진단하며 판막 면적 ≤ 1.5 cm²인 경우 중증 MS로 간주하여 시술을 고려합니다. 중등도 이상의 MR이 동반될 경우 이 시술은 금기입니다. 이 시술의 명칭은 경피적 승모판 풍선 확장술(PMBV)입니다. 하지만 좌심방 부속기에 혈전이 있는 경우 색전증 위험 때문에 PMBV는 절대 금기이며, 혈전 제거 후 시술을 고려하거나 다른 치료법을 선택해야 합니다."}, {"subject": "판막질환의외과적치료", "year": ["21학번", "20학번"], "professor": "정성철", "question": "승모판 협착증의 심잡음이 청취되는 시기는?", "images": [], "text_box": null, "options": ["수축기 초기", "수축기 말기", "수축기 전체", "이완기 초기", "이완기 말기"], "answer": [4], "explanation": "승모판 협착증(MS)의 심잡음은 주로 심첨부(apex)에서 들리는 특징이 있습니다. 이는 이완기 동안 좌심방에서 좌심실로 혈액이 원활하게 넘어가지 못하면서 발생합니다. 심잡음은 이완기 중에서도 좌심실 충만이 거의 끝나는 이완기 말기에 가장 명확하게 들리는 경향이 있습니다. 따라서 승모판 협착증의 심잡음은 이완기 말기에 청취됩니다."}, {"subject": "판막질환의외과적치료", "year": ["21학번", "20학번"], "professor": "정성철", "question": "진단을 위해 우선적으로 필요한 검사는?", "images": [], "text_box": "65세 남자 환자가 8년전에 승모판막 수선술을 과거력이 있고 최근 동네 치과에서 치주 질환으로 발치 등 치과치료를 수 주간 받던 중 2-3일전부터 갑자기 숨이 차고 열이 나서 음급실로 내원하였다. 신체검사에서 심첨부 수축기 심잡음이 들리고 좌측 편마비 증상이 추가로 발생하였 다.", "options": ["경식도 초음파", "뇌혈관 촬영술", "관상동맥 촬영술", "흉부 CT", "PET CT"], "answer": [0], "explanation": "환자는 승모판막 수선술 과거력, 최근 치과 치료 후 발열, 호흡곤란, 심첨부 수축기 심잡음, 그리고 좌측 편마비 증상을 보입니다. 이 모든 소견은 감염성 심내막염을 강력히 시사합니다. 특히 판막 수술 과거력과 치과 시술은 감염성 심내막염의 주요 위험 요소입니다. 감염성 심내막염은 vegetations이 떨어져 나가 색전증을 유발하여 뇌경색으로 이어질 수 있으며, 이는 환자의 편마비 증상과 연관됩니다. 감염성 심내막염의 진단에는 경흉부 심초음파보다 더 정확하게 판막의 이상 유무와 vegetations을 확인할 수 있는 경식도 심초음파가 필수적입니다."}, {"subject": "판막질환의외과적치료", "year": ["21학번", "20학번"], "professor": "정성철", "question": "다음으로 시행하여야 할 검사는?", "images": [], "text_box": "56세 여성이 2달 전부터 활동할 때 발생하는 호흡곤란으로 외래 방문하였다. 혈압 110/70mmHg, 맥박 ...분, 체온 36.2도 청진시 심첨부에서 이완기에 구르는 듯한 심잡음이 청진되었다. 심초음파 검사에서 그림과 같은 소견이 관찰되었다.", "options": ["심장 MRI", "혈액배양 검사", "심혈관 조영술", "경식도 심초음파", "심혈관 컴퓨터 단층촬영"], "answer": [3], "explanation": "환자는 활동 시 호흡곤란과 심첨부에서 이완기에 구르는 듯한 심잡음이 청진되었습니다. 이는 승모판 협착증(MS)의 전형적인 소견입니다. 심초음파 검사에서 MS 소견이 관찰되었으므로, 판막의 협착 정도와 다른 구조적 이상을 보다 정밀하게 평가하기 위해 추가적인 경식도 심초음파가 필요할 수 있습니다. 경식도 심초음파는 판막의 형태, 심방 내 혈전 유무, 그리고 합병증을 평가하는 데 있어 경흉부 심초음파보다 더 높은 해상도를 제공합니다."}, {"subject": "판막질환의외과적치료", "year": ["21학번", "20학번"], "professor": "정성철", "question": "본 질환에 대한 설명 중 틀린 것을 고르시오.", "images": [], "text_box": "58세 남자환자가 급성 심근경색증으로 내원하여 응급치료 후 중환자실에서 치료받던 중에 갑자기 혈압이 80mmHg로 떨어지고 창백해지며 호흡곤란과 함께 심첨부에서는 범수축기 심잡음이 양측 폐하에 라음이(?) 들렸다. CK-MB및 Troponin-T 양성이었다. 심전도는 다음과 같았다. 응급으로 시행한 초음파 동영상은 다음과 같았다.", "options": ["복구실패", "복구실패", "복구실패", "복구실패", "복구실패"], "answer": [], "explanation": "급성 심근경색증 이후 혈압 저하, 호흡곤란, 심첨부 범수축기 심잡음은 급성 승모판 폐쇄부전(MR) 또는 심실 중격 결손(VSD) 등의 기계적 합병증을 시사합니다. 특히 심첨부 범수축기 심잡음은 승모판 폐쇄부전의 중요한 소견입니다. 심근경색으로 인한 유두근 파열 등으로 급성 MR이 발생할 수 있습니다. 이런 경우 응급 심초음파를 통해 진단을 확진하고 신속한 치료를 계획해야 합니다."}, {"subject": "판막질환의외과적치료", "year": ["21학번", "20학번", "19학번", "18학번", "17학번", "16학번", "14학번"], "professor": "정성철", "question": "진단은?", "images": [], "text_box": "80세 남자가 실신으로 내원하였다. 최근 2개월 전부터 운동 시 가슴 통증이 있었다. 오른쪽 2번째 갈비 사이 복장뼈곁에서 수축기 동안 커졌다 작아지는 3/4도의 심잡음이 들렸다. 심전도는 그림과 같았다.", "options": ["승모판 폐쇄부전증", "폐동맥판협착증", "대동맥판협착증", "심실사이막결손증", "폐쇄비대심장근육병"], "answer": [2], "explanation": "80세 남자가 운동 시 흉통과 실신을 주소로 내원하였고, 우측 2번째 갈비 사이 복장뼈 곁에서 수축기 동안 커졌다 작아지는 양상의 심잡음이 들렸습니다. 이러한 심잡음은 'Crescendo-Decrescendo' 양상의 수축기 심잡음으로, 대동맥판 협착증(AS)의 특징적인 청진 소견입니다. 특히 AS는 실신, 흉통, 호흡곤란의 3대 증상을 유발할 수 있어 환자의 임상 증상과 잘 부합합니다. 따라서 가장 적절한 진단은 대동맥판 협착증입니다."}, {"subject": "판막질환의외과적치료", "year": ["21학번", "20학번", "13학번"], "professor": "정성철", "question": "중증 대동맥판 협착증 수술치료 원칙이다. 옳은 것은?", "images": [], "text_box": null, "options": ["일상 생활에 호흡곤란이 있으면 판막치환술을 시행한다.", "65세 이상에서는 기계판막을 우선 선택한다.", "생체판막 치환술을 받은 경우 항응고제를 계속 복용한다.", "경피적 대동맥치환술은 전신 상태가 좋은 환자에서 우선 실시한다.", "일상 생활에 호흡곤란이 있더라도 좌심실 구혈률이 정상이면 수술을 연기할 수 있다."], "answer": [0], "explanation": "중증 대동맥판 협착증(AS) 환자의 수술적 치료는 증상의 유무가 중요한 기준이 됩니다. 일단 증상이 있는 중증 AS 환자는 생존율이 급격히 감소하므로 판막치환술이나 시술을 고려해야 합니다. 65세 이상의 고령 환자에게는 조직판막(생체판막)을 우선적으로 고려하며, 조직판막은 수술 후 일정 시간이 지나면 항응고제를 복용할 필요가 없어 출혈 위험이 적습니다. 경피적 대동맥판막 치환술(TAVI)은 주로 수술 고위험군 환자에게 우선적으로 고려되는 시술입니다. 증상이 있는 중증 AS 환자는 좌심실 구혈률이 정상이더라도 수술을 연기해서는 안 됩니다."}, {"subject": "판막질환의외과적치료", "year": ["21학번", "20학번", "13학번"], "professor": "정성철", "question": "조직판막대치술을 받은 환자가 기계판막대치술을 받은 환자보다 유리한 사항은?", "images": [], "text_box": null, "options": ["내구성이 길다.", "항응고제 사용기간이 짧다."], "answer": [1], "explanation": "조직판막(생체판막)은 내구성이 약 10~15년 정도로 제한적이지만, 수술 후 일정 기간이 지나면 항응고제 복용을 중단할 수 있다는 장점이 있습니다. 반면 기계판막은 반영구적인 내구성을 가지지만, 혈전 발생 위험 때문에 평생 와파린과 같은 항응고제를 복용해야 합니다. 따라서 조직판막은 항응고제 사용 기간이 짧다는 점에서 기계판막보다 유리합니다."}, {"subject": "판막질환의외과적치료", "year": ["20학번", "19학번", "18학번", "17학번", "16학번"], "professor": "김용환", "question": "Stab wound 가 발생했다면 가장 가능성 있는 부위는?", "images": [], "text_box": "63 세 여자 환자가 새벽 4시 30분경 남편에게 과도로 epigastric stab wound 로 119 통해 응급실로 내원하였다. 내원당시 87/??, 맥박 94 회/분, 호흡 20 회/분, 체온 36.9 도였다. 응급으로 촬영한 흉부 컴퓨터단층촬영사진이다.", "options": ["우심방", "우심실", "좌심방", "좌심실", "폐동맥"], "answer": [1], "explanation": "Epigastric stab wound는 상복부 칼자상을 의미하며, 심장 손상 시 우심실이 가장 흔하게 손상되는 부위입니다. 이는 심장이 흉강의 중앙에 위치하며, 우심실이 심장의 앞쪽과 가장 넓은 부분을 차지하고 있기 때문입니다. 특히 검상돌기 아래쪽 자상은 우심실로 직접 관통할 가능성이 높습니다. 따라서 자상 발생 시 가장 가능성 있는 심장 부위는 우심실입니다."}, {"subject": "판막질환의외과적치료", "year": ["20학번", "19학번", "18학번", "17학번", "16학번"], "professor": "김용환", "question": "다음 중 틀린 것은?", "images": [], "text_box": null, "options": ["Functional tricuspid regurgitation 에서 dilatation 이 가장 안되는 부위는 septal leaflet portion 이다.", "Bileaflet valve 는 caged ball valve 에 비해 profile 이 높아서 최근에 사용하지 않는 valve 이다.", "승모판성형술 때 chordal shortening 은 최근 주로 하는 수술법이다.", "임신을 원하는 여성의 경우 일반적으로 mechanical valve 보다는 biprosthetic valve replacement 를 시행한다.", "Mitral stenosis 전체 환자중 여자가 2/3를 차지한다."], "answer": [1], "explanation": "2번 보기의 'Bileaflet valve는 caged ball valve에 비해 profile이 높아서 최근에 사용하지 않는 valve이다.'는 틀린 설명입니다. 오히려 bileaflet valve는 caged ball valve보다 profile이 낮아 혈역학적 성능이 우수하며 현재 가장 널리 사용되는 기계판막 유형입니다. Caged ball valve는 높은 profile 때문에 거의 사용되지 않습니다. 3번 보기의 '승모판성형술 때 chordal shortening은 최근 주로 하는 수술법이다.'도 틀린 설명입니다. chordal shortening은 승모판 성형술에서 흔하게 사용되는 수술법이 아닙니다. 주로 판막 보존을 위한 다른 기술들이 사용됩니다. 따라서 2번과 3번이 모두 틀린 진술이므로 정답은 2)입니다."}, {"subject": "판막질환의외과적치료", "year": ["20학번", "19학번", "18학번", "17학번", "16학번"], "professor": "김용환", "question": "다음 중 틀린 설명은?", "images": [], "text_box": null, "options": ["승모판 수술 때 chorda를 보전하는 것이 수술후 심장기능에 도움이 된다.", "승모판성형술때 chordal shortening 은 최근 주로 하는 수술법이다.", "대동맥판막치환술때 모든 leaflet 을 잘라낸다.", "Functional tricuspid regurgitation 때 leaflet 과 chorda 는 정상이다.", "삼첨판막의 경우 판막성형술보다는 판막치환술을 하는 경우가 더 적다."], "answer": [1], "explanation": "승모판성형술에서 건삭(chordal shortening)은 판막의 기능을 조절하는 중요한 수술 기법 중 하나이나, 최근에는 주로 건삭 이식술(chordal replacement) 등 다양한 방법이 사용됩니다. 단순히 'chordal shortening'이 현재 주로 사용되는 방법이라고 단정하기는 어렵습니다. 특히 판막 형태와 기능에 따라 맞춤형 수술이 진행되며, 건삭 단축술 자체는 특정 상황에만 제한적으로 적용될 수 있습니다. 그러므로 2번 보기는 틀린 설명입니다."}, {"subject": "판막질환의외과적치료", "year": ["20학번", "19학번", "18학번", "17학번", "16학번"], "professor": "김용환", "question": "승모판막 수술할 때 가장 흔히 사용하는 진입 경로는?", "images": [], "text_box": null, "options": ["right atrium", "right venrtricle", "left atrium", "left ventricle", "aorta"], "answer": [2], "explanation": "승모판막은 좌심방과 좌심실 사이에 위치한 판막입니다. 따라서 승모판막에 대한 수술을 시행할 때는 주로 좌심방(left atrium)을 통해 접근하는 것이 가장 흔하고 직접적인 진입 경로입니다. 좌심방을 절개하여 승모판막을 시야에 확보하고 수술을 진행합니다."}, {"subject": "판막질환의외과적치료", "year": ["20학번", "19학번", "18학번", "17학번", "16학번"], "professor": "김용환", "question": "심장부위에 자상이 발생한다면 가장 가능성이 높은 곳은?", "images": [], "text_box": "63 세 여자가 남편과 싸우다가 epigastric area 에 칼에 찔려 응급실로 내원하였다.", "options": ["right atrium", "right ventricle", "left atrium", "left ventricle", "aorta"], "answer": [1], "explanation": "Epigastric area(상복부)에 발생한 자상으로 인해 심장 손상이 의심될 경우, 심장 내에서 우심실이 가장 흔하게 손상되는 부위입니다. 우심실은 심장의 앞쪽을 가장 넓게 차지하고 있으며, 흉벽에 가장 가깝게 위치하기 때문입니다. 따라서 심장 관통상 시 우심실이 다른 심장 부위보다 직접적인 손상을 입을 가능성이 높습니다."}, {"subject": "판막질환의 중재시술적 치료", "year": ["19학번"], "professor": "정해억", "question": "본 질환과 치료에 대해 맞는 설명은?", "images": [], "text_box": "평소 조금만 움직여도 호흡곤란을 가진 86세 여자 환자에게 경식도 심초음파를 보면서 대퇴동맥을 통해 경피적 시술이 시 행되었다. 우측은 경피적 시술 후 사진이다.", "options": ["증상을 동반한 중증 대동맥판 폐쇄부전증에 대한 TAVI 시술이다.", "심장초음파로 측정한 대동맥판 면적 1.2cm2, 대동맥판 혈류최대속도 3.7m/s라면 본 시술의 적응증이 된다.", "본 질환은 퇴행성이 가장 많은 원인이다", "본 질환은 수축기에 좌심실에 심한 용적 과부하가 걸려 심비대가 발생한다.", "본 질환을 가진 환자의 증상 중에서 예후가 가장 나쁜 증상은 실신이다."], "answer": [2], "explanation": "제시된 환자 케이스는 86세 여자 환자의 호흡곤란과 경피적 시술을 통해 중증 대동맥판 협착증(AS)에 대한 TAVI(경피적 대동맥판막 치환술)를 시행했음을 알 수 있습니다. AS의 가장 흔한 원인은 퇴행성 변화입니다. AS는 좌심실에 압력 과부하를 초래하며, 폐쇄부전증(AR)은 용적 과부하를 초래합니다. 또한 예후가 가장 나쁜 증상은 실신이 아니라 흉통이나 호흡곤란입니다."}, {"subject": "판막질환의 중재시술적 치료", "year": ["17학번"], "professor": "정해억", "question": "본 시술에 대한 설명 중 틀린 것은?", "images": [], "text_box": "승모판에 질환을 가진 환자에게 좌측 그림의 시술을 시행하였으며 우측그림은 시술 전 심장초음파이다.", "options": ["승모판 협착증에 대해 실시한 경피적 승모판풍선성형술(PMBV)이다.", "증상이 있고 승모판구면적 1.0cm2 이하로 줄어들기 시작하면 시술을 고려해야 한다.", "승모판 협착증에 중등도 이상의 승모판 폐쇄부전증이 동반되어 있다면 본 시술은 금기다.", "승모판 협착증에 심방세동과 함께 좌심방이(LA appendage) 혈전이 있으면 본 시술은 금기다.", "승모판구면적 1.2cm2 환자에서 증상이 없더라도 새로운 심방세동이 발생된 경우에는 본 시술을 고려해야 한다."], "answer": [1], "explanation": "본 시술은 승모판 협착증에 대한 경피적 승모판 풍선 성형술(PMBV)입니다. PMBV는 증상이 동반된 1.5cm2 이하의 승모판 협착증 환자에게 적응증이 됩니다. 따라서 1.0cm2 이하로 줄어들기 시작하면 시술을 고려한다는 설명은 적절하지 않습니다. 중등도 이상의 승모판 폐쇄부전증이나 좌심방 내 혈전이 있는 경우 이 시술은 금기입니다."}, {"subject": "판막질환의 중재시술적 치료", "year": ["17학번"], "professor": "정해억", "question": "다음 일차성(primary) 승모판 폐쇄부전증(MR) 환자 중 수술의 적응증에 해당하는 것은?", "images": [], "text_box": null, "options": ["호흡곤란이 점점 심해지는 중증도(moderate) MR", "호흡곤란이 심한 중증(severe) MR 환자로서 좌심실 구혈율이 25%", "증상이 없는 중증 MR에서 새로운 심방세동 없고 수축기 폐동맥압 40mmHg", "증상이 없는 만성 중증 MR에서 좌심실 구혈율 50%, 좌심실 수축기말직경 35mm", "증상이 없는 만성 중증 MR에서 좌심실 구혈율 70%, 좌심실 수축기말직경 30mm이고 1년전과 별다른 변화가 없는 경우"], "answer": [1, 3], "explanation": "일차성 승모판 폐쇄부전증(MR)의 수술 적응증은 증상이 있는 중증 MR 환자 중 좌심실 구혈률 30% 이상인 경우입니다. 또한 증상이 없는 중증 MR 환자라도 좌심실 기능 저하의 증거(LVEF < 60% 또는 ESD > 40mm)가 있다면 수술을 고려합니다. 중등도 MR은 수술 적응증이 아니며, 새로운 심방세동이나 폐동맥 고혈압 (>50mmHg)이 동반된 증상 없는 중증 MR도 수술 적응증입니다."}, {"subject": "판막질환의 중재시술적 치료", "year": ["14학번"], "professor": "조은주", "question": "다음 소견 중 증세가 없는 심한 승모판 역류 환자의 수술적 적응이 되는 경우는?\na) 좌심실 이완기말크기가 55mm\nb) 좌심실 수축기말 크기가 46mm\nc) 판막 성형술보다 판막치환술이 더 적절한 치료가 될때\nd) 심구혈율 55%", "images": [], "text_box": null, "options": ["a,b,c", "a,c", "b,d", "d", "all"], "answer": [2], "explanation": "증상 없는 심한 승모판 역류(Severe MR) 환자의 수술 적응증은 좌심실 이완기말 직경(LVEDD)이 70mm 이상이거나, 좌심실 수축기말 직경(LVESD)이 40mm 이상인 경우입니다. 또한 좌심실 구혈률(LVEF)이 60% 미만이거나, 새로운 심방세동 또는 폐동맥 고혈압이 발생한 경우에도 수술을 고려할 수 있습니다. 제시된 b) 좌심실 수축기말 크기 46mm는 적응증에 해당하며, d) 심구혈율 55%는 60% 미만에 해당하므로 수술 적응증입니다."}, {"subject": "판막질환의 중재시술적 치료", "year": ["14학번"], "professor": "조은주", "question": "치료 전략으로 맞지 않는 것은?", "images": [], "text_box": "40세 남자환자가 운동시 호흡곤란을 주소로 내원하였다. 심초음파 검사결과 승모판 협착증이 발견되었고 승모판 면적은 1cm2이었다면 치료 전략으로 맞지 않는 것은?", "options": ["증상이 있으므로 이뇨제를 투여하고 나트륨 섭취를 제한한다.", "판막의 협착 형태가 경피적인 판막 확장시술을 하기에 적당하지 않고 폐동맥 고혈압이 없으면 6개월 간 경과 관찰 해본다.", "심초음파 검사상 판막의 두께와 침범 범위, 그리고 석회화정도와 판막의 운동성이 치료방침을 결정하는 주요한 소견이다.", "중등도의 승모판 역류증이 동반되어 있는 경우 mitral valvotomy를 시행하는 것이 좋다.", "심실반응이 빠른 심방세동이 동반되어 있는 경우 베타차단제, 디곡신 등의 약물을 고려할 수 있다."], "answer": [3], "explanation": "승모판 협착증 환자에게 중등도 이상의 승모판 역류증이 동반되어 있다면, 경피적 승모판 풍선 성형술(PMBV)은 금기입니다. 이런 경우 시술 대신 수술적 치료를 고려해야 합니다. 따라서 mitral valvotomy를 시행하는 것이 좋다는 진술은 잘못되었습니다. 심한 승모판 협착증에서는 이뇨제 투여와 염분 제한이 증상 완화에 도움이 됩니다. 또한 판막의 형태학적 특성은 시술 및 수술 방법 결정에 중요합니다."}, {"subject": "판막질환의 중재시술적 치료", "year": ["13학번"], "professor": "정해억", "question": "환자의 향후 치료계획으로 적당한 것은?", "images": [], "text_box": "55세 여자 환자. 진행하는 호흡곤란으로 입원. 경흉부 심초음파에서 승모판 면적이 1.3cm^2 도플러 검사상 좌심방과 좌심실간의 평균 압력차이 8mmHg, pressure half time 200msec, 좌심실구혈율(EF) 65%였다.", "options": ["경도의 퇴행성 승모판 협착증이며 이뇨제 등을 투여하면서 경과 관찰한다.", "증등도의 류마티스성 승모판 협착증이며 좌심방혈전과 승모판폐쇄부전이 동반 되어있지 않다면 승모판 풍선성형술을 고려한다.", "중증의 류마티스성 승모판 협착증이며 인공 승모판치환수술을 시행해야 한다.", "중등도의 퇴행성 승모판 협착증이며 좌심실수축기능이 정상이므로 약물 치료한다.", "중증의 퇴행성 승모판 협착증이며 인공 승모판치환수술을 시행해야 한다."], "answer": [1], "explanation": "제시된 승모판 면적 1.3cm2, 좌심방-좌심실 평균 압력차 8mmHg, pressure half time 200msec는 중등도 승모판 협착증(MS)의 기준에 부합합니다. 특히 류마티스성 MS는 승모판 풍선 성형술(PMBV)의 좋은 적응증이 됩니다. 환자에게 좌심방 혈전이나 중등도 이상의 승모판 폐쇄부전이 동반되어 있지 않다면 PMBV를 우선적으로 고려하는 것이 적절한 치료 계획입니다. 퇴행성 MS는 비교적 드물고, 인공판막 치환술은 보통 PMBV가 부적합하거나 심한 합병증이 있을 때 고려됩니다."}, {"subject": "심내막염,심근염", "year": ["21학번"], "professor": "조정선", "question": "심내막염 예방적 항생제 접종이 필요한 경우는?", "images": [], "text_box": null, "options": ["생후 3개월에 심실 충격 결손 수술력이 있는 환자의 내시경", "인공 판막을 가지고 있는 환자의 ERCP", "수술하지 않은 심방중격 결손을 갖는 환자의 전립선비대 절제술", "이첨판막 탈출증(mitral valve prolapse)로 중등도 판막 역류증을 갖는 환자의 발치", "좌심실 보조장치를 유지중인 환자의 치주 질환치료"], "answer": [4], "explanation": "예방적 항생제가 필요한 시술 중 칫솔질, 치주 질환 수술, 점막 침범 치과 시술 등은 균혈증 발생률이 높습니다. 예방적 항생제가 필요한 환자군에는 인공판막, 좌심실 보조장치 (LVAD), 심장이식 후 면역 억제제 복용, 감염성 심내막염 과거력, 청색증을 동반한 선천성 심장 질환(미치료 또는 치료 후 6개월 이내, 잔여 결손), 폐동맥 판막 수술, 심장이식 후 판막증이 있는 경우 등이 해당합니다. 이를 종합하면 5번이 가장 적절한 답입니다."}, {"subject": "심내막염,심근염", "year": ["21학번"], "professor": "조정선", "question": "3일 전에 뇌경색으로 신경과에 입원하여 치료중인 환자로 38도 이상의 fever 지속되어 CSF culture blood culture를 시행하였으나 균은 동정되지 않았다. 전신 CT를 체크하였으나 fever focus 를 발견하지 못하였다. 추가로 시행해야 할 검사는?", "images": [], "text_box": null, "options": ["폐관류 스캔", "PET CT", "Bone scan", "심초음파", "Troponin검사"], "answer": [3], "explanation": "열이 나고 뇌경색이 있었으므로 감염성 심내막염이 의심되는 상황입니다. 혈액배양 검사에서 균이 동정되지 않았기 때문에, 감염성 심내막염의 주요 진단 기준 중 하나인 심초음파를 시행하여 판막의 이상 소견이나 증식물(vegetation) 유무를 확인해야 합니다."}, {"subject": "심내막염,심근염", "year": ["21학번"], "professor": "조정선", "question": "65세 남자 환자가 8년전에 승모판막 수선술을 과거력이 있고 최근 동네 치과에서 치주 질환으로 발치 등 치과치료를 수 주간 받던 중 2-3일전부터 갑자기 숨이 차고 열이 나서 응급실로 내원하였다. 신체검사에서 심첨부 수축기 심잡음이 들리고 좌측 편마비 증상이 추가로 발생하였다. 진단을 위해 우선적으로 필요한 검사는?", "images": [], "text_box": null, "options": ["경식도 초음파", "뇌혈관 촬영술", "관상동맥 촬영술", "흉부 CT", "PET CT"], "answer": [0], "explanation": "승모판막 수선술 과거력, 치과 치료 후 발열 및 호흡곤란, 수축기 심잡음, 좌측 편마비 증상 등은 감염성 심내막염을 강력히 시사합니다. 감염성 심내막염 진단을 위해서는 혈액배양 검사와 함께 심초음파, 특히 경식도 초음파가 우선적으로 필요합니다. 경식도 초음파는 심내막염의 증식물을 더욱 명확하게 관찰할 수 있어 진단에 유용합니다."}, {"subject": "심내막염,심근염", "year": ["21학번", "19학번", "18학번", "17학번", "16학번"], "professor": "조정선", "question": "가능성 높은 진단은?", "images": [], "text_box": "73세 남자가 1주일 전부터 기침, 가래가 있었고 당일 가슴 흉통이 심해져서 응급실로 내원하였다. 혈압 100/60mmHg, 맥박 120회/분, 체온 36도였다. 응급실에서 (그림 1)와 입원 이후 3일 뒤 심전도(그림 2)와 심장 MRI 이다. (그림 3) 혈액: 백혈구 9,480/mm3, 혈색소 11.0 g/dL, 혈소판 260,000/mm3 심근효소: CK-MB: 40 (0.3-5ng/ml) Troponin T 0.9 (0.003–0.1 ng/ml)", "options": ["심내막염", "심근경색증", "급성심근염", "복구실패", "복구실패"], "answer": [2], "explanation": "내원 당시 심전도에서 T파 역전이 보이나 3일 후 호전되었고, 심장 MRI의 지연 가돌리늄 조영 증강 소견에서 하얗게 가돌리늄이 남아있는 것은 심근 괴사를 시사합니다. 또한 CK-MB와 트로포닌 T 수치가 모두 상승했으므로, 이는 급성 심근염의 가능성이 높음을 나타냅니다. 심근 효소의 상승과 영상학적 증거는 심근염 진단에 중요한 단서입니다."}, {"subject": "심내막염,심근염", "year": ["21학번", "13학번"], "professor": "조정선", "question": "필요한 검사는?", "images": [], "text_box": "38세 여자가 2개월 전부터 열이 난다며 병원에 왔다. 항생제와 해열제를 여러 차례 복용하였으나 열은 잠시 떨어졌다가 며칠 후 다시 오르는 양상을 보였다. 체중이 2개월간 52kg 에서 48kg 으로 줄었다. 혈압 118/89mmHg, 맥박 96회/분, 호흡 18회/분, 체온 37.8'C 이다. 가슴 청진시 수축기 심잡음이 들린다. 손(사진 1)과 발(사진 2) 사진이다.", "options": ["혈액배양검사", "결핵피부반응검사", "가슴 컴퓨터단층촬영", "피부병변생검 및 배양", "심내막심장근육생검"], "answer": [0], "explanation": "환자는 발열, 체중 감소, 수축기 심잡음이 있으며, 사진에서 손의 Osler 결절과 발바닥의 Janeway 병변이 관찰됩니다. 이러한 소견들은 감염성 심내막염을 강력히 시사하므로, 진단을 위해 우선적으로 혈액배양 검사와 심초음파를 시행해야 합니다. 혈액배양 검사는 감염원을 확인하는 데 필수적인 초기 검사입니다."}, {"subject": "심내막염,심근염", "year": ["19학번"], "professor": "김미정", "question": "이후 해야 할 조치는?", "images": [], "text_box": "7세 여자가 일주일 전부터 숨이 차서 왔다. 몇 년 전에 이첨판 교체수술을 받은 과거력이 있다. 허리 통증으로 요추 관절에 주사를 맞은 후로 증상이 있었고 검사 결과 혈압 80/60mmHg, 맥박 102회/분, 체온 38.1도였다. 초음파검사에서는 대동맥판 주위로 종괴와 농양을 보였다. 심장 끝에서 수축기 심잡음과 양쪽 폐 아래에서 수포음이 들렸다. MRSA가 배양되었다. 소변: 단백질(3+). 백혈구(-). 적혈구(1+) 혈액배양: 그람양성 알균", "options": ["Ceftriaxone", "판막수술", "Vancomycin", "TAVR (valve to valve?)", "Doxycycline"], "answer": [1], "explanation": "환자는 혈액배양에서 MRSA가 검출되었고, 발열, 인공판막 이력, 사구체신염 등 감염성 심내막염의 주요 및 보조 기준을 만족합니다. 특히, 대동맥판 주위에 종괴와 농양이 관찰되며 혈역학적으로 불안정하므로, 항생제 사용보다는 감염된 판막의 제거 및 교체를 위한 수술적 치료가 우선적으로 필요합니다."}, {"subject": "심내막염,심근염", "year": ["19학번", "18학번"], "professor": "김미정", "question": "45세 남자가 5일 전부터 오른쪽 턱의 통증과 열이 나서 왔다. 어금니의 농양으로 배액과 발치가 필요하다고 한다. 3개월 전 급성 심근경색증으로 스텐트 2개를 시술 받았다. 혈압 130/80mmHg, 맥박 100회/분, 호흡수 20회/분, 체온 38.2℃ 이다. 적절한 조치는?", "images": [], "text_box": null, "options": ["예방적 항생제 필요 없음", "치과치료 6개월 연기", "시술 중 앰피실린 IV 2g", "시술 전 아목시실린 PO 2g", "시술 전 클린다마이신 IV 2g"], "answer": [0], "explanation": "관상동맥 스텐트 시술은 감염성 심내막염의 예방적 항생제 사용 적응증에 해당하지 않습니다. 따라서, 이 환자의 경우 치과 시술 전에 예방적 항생제 투여가 필요하지 않습니다. 스텐트 자체는 감염성 심내막염의 위험 요인이 아니므로 특별한 조치 없이 치과 치료를 진행할 수 있습니다."}, {"subject": "심내막염,심근염", "year": ["18학번", "15학번"], "professor": "김미정", "question": "적절한 조치는?", "images": [], "text_box": "70세 남자가 치과 치료 전 상담을 위해 왔다. 발치 후 임플란트 시술 예정이라고 한다. 2년 전 경피적 대동맥 판막치환술을 받았다. 혈압 138/80mmHg, 맥박 76회/분, 호흡수 18회/분, 체온 37.2℃ 이었다.", "options": ["조치 필요 없음", "치과 치료를 6개월 후로 연기", "암피실린 2g 정맥주사", "아목시실린 2g 경구 복용", "클린다마이신 600mg 경구 복용"], "answer": [3], "explanation": "환자는 2년 전 경피적 대동맥 판막치환술을 받아 인공판막을 가지고 있습니다. 인공판막 보유자는 치과 시술과 같은 균혈증 위험이 높은 시술 시 감염성 심내막염 예방적 항생제 투여의 적응증에 해당합니다. 따라서, 수술 1시간 정도 전에 아목시실린 2g을 경구로 복용하는 것이 적절한 조치입니다."}, {"subject": "심내막염,심근염", "year": ["18학번"], "professor": "김미정", "question": "다음 필요한 검사는?", "images": [], "text_box": "30세 남자가 열이 나서 병원에 왔다. 10년 전 심장판막 수술을 받았다. 혈압 100/58mmHg, 맥박 116회/분, 호흡수 28회/분, 체온 38.2°C 이었다. 가슴 X선(사진)이다.", "options": ["가슴컴퓨터단층촬영", "경식도심초음파검사", "심도자검사", "심장양성자방출단층촬영", "심장자기공명영상"], "answer": [1], "explanation": "환자는 인공판막 이력이 있고 발열이 있어 감염성 심내막염을 의심할 수 있습니다. 감염성 심내막염 진단을 위해서는 심초음파, 특히 경식도 심초음파 검사가 필수적입니다. 경식도 심초음파는 판막의 증식물이나 농양을 확인하는 데 가장 민감하고 특이적인 방법입니다."}, {"subject": "심내막염,심근염", "year": ["18학번"], "professor": "김미정", "question": "80세 여자가 10일 전부터 열이 나고 기력이 없어서 병원에 왔다. 혈압 102/61mmHg, 맥박 120회/분, 체온 38.3도였다. 최근 입맛이 없어 식사를 못하고 잘 때 식은땀으로 이불이 젖을 정도라고 한다. 심장 끝에서 4/6도 수축기 심잡음이 들렸다. 가슴 X 선(사진)이다. 검사 소견은 다음과 같다. 심초음파검사에서 승모판전엽에 1cm 크기의 흔들리는 물체가 붙어 있는 것 관찰되었다. 가능성 높은 진단은? 혈액 : 백혈구 21000/mm^3 혈색소 : 8.9 g/dL 혈소판: 115000/mm^3 소변 : 단백질(2+), 백혈구 (1+), 적혈구 (3+) 혈액배양: 그람양성 구균", "images": [], "text_box": null, "options": ["요로 패혈증", "결핵성 심막염", "감염성 심내막염", "전신홍반성루프스", "심장아밀로이드증"], "answer": [2], "explanation": "환자는 혈액배양에서 그람양성 구균이 검출되었고, 심초음파에서 승모판에 1cm 크기의 흔들리는 증식물(vegetation)이 관찰되어 감염성 심내막염의 주요 진단 기준 두 가지를 만족합니다. 또한, 발열, 사구체신염, 수축기 심잡음 등 보조 기준들도 확인되어 감염성 심내막염으로 진단할 수 있습니다."}, {"subject": "심내막염,심근염", "year": ["14학번"], "professor": "김미정", "question": "40세 남자가 지속되는 발열과 호흡곤란으로 내원했다. 혈압 100/60mmHg, 맥박 100회/분, 호흡수 28회/분, 체온 38.2도였고, 왼쪽 가슴에서 수축기 심잡음이 들렸다. 가슴 X선 사진이다. 진단은?", "images": [], "text_box": null, "options": ["감염성 심내막염", "급성 심근경색증", "비대심근병증", "폐색전증", "확장심근병증"], "answer": [0], "explanation": "환자는 지속되는 발열과 호흡곤란, 수축기 심잡음을 보이며, 가슴 X선 사진에서 폐부종 소견이 관찰됩니다. 이러한 임상 양상은 감염성 심내막염의 전형적인 증상 중 하나입니다. 특히 발열, 심잡음, 폐부종의 조합은 감염성 심내막염의 가능성을 높이므로 추가적인 검사를 통해 진단해야 합니다."}, {"subject": "심내막염,심근염", "year": ["14학번"], "professor": "김미정", "question": "30세 남자가 치과 치료 전 상담을 위해 왔다. 사랑니 충치 주변에 잇몸 염증이 심하여 발치 예정이라고 한다. 2개월 전 심방중격결손 경피적 기구폐쇄술을 받았다. 적절한 조치는?", "images": [], "text_box": null, "options": ["조치 필요 없음", "치과 진료를 6개월 후로 연기", "앰피실린 2g 정맥주사", "아목시실린 2g 경구 복용", "클린다마이신 600mg 경구 복용"], "answer": [3], "explanation": "심방중격결손은 선천성 심장 질환에 해당하며, 경피적 기구폐쇄술로 치료했더라도 6개월이 지나지 않은 경우에는 예방적 항생제 투여의 적응증이 됩니다. 환자는 2개월 전 시술을 받았으므로 아직 6개월이 지나지 않아 고위험군에 해당합니다. 따라서 발치 전에 예방적 항생제로 아목시실린 2g을 경구 복용하는 것이 적절합니다."}, {"subject": "심내막염,심근염", "year": ["13학번"], "professor": "김미정", "question": "치아 스케일링 전에 감염성 심내막염의 예방적 항생제 치료가 필요한 고위험군은?", "images": [], "text_box": null, "options": ["난원공개존증", "인공대동맥판", "인공심장박동기", "주사약물 중독자", "이첨대동맥판"], "answer": [1], "explanation": "감염성 심내막염 예방적 항생제 치료가 필요한 고위험군은 주로 인공판막 보유자, 감염성 심내막염 과거력자, 청색증을 동반한 선천성 심장 질환 환자 (미치료 또는 치료 후 6개월 이내, 잔여 결손), 심장이식 후 판막증이 있는 환자 등입니다. 이 중 인공대동맥판은 인공판막에 해당하므로 예방적 항생제 적응증이 됩니다. 난원공개존증이나 인공심장박동기는 적응증이 아닙니다."}, {"subject": "심내막염,심근염", "year": ["12학번"], "professor": "김미정", "question": "40세 남자가 발열과 호흡곤란으로 왔다. 혈압 100/60mmHg, 맥박 100회/분, 호흡수 28회/분, 체온 38.2도이고 왼쪽 가슴에서 수축기 심잡음이 들렸다. 가슴 X선(사진)이다. 필요한 검사는?", "images": [], "text_box": null, "options": ["d-dimer", "심도자", "심초음파", "심장 MRI", "흉부 3차원 CT"], "answer": [2], "explanation": "환자는 발열, 호흡곤란, 수축기 심잡음을 보이며, 가슴 X선 사진이 주어졌습니다. 이러한 증상들은 감염성 심내막염을 시사할 수 있습니다. 감염성 심내막염 진단을 위해서는 판막의 상태를 직접 확인하고 증식물의 유무를 평가할 수 있는 심초음파 검사가 필수적으로 요구됩니다."}, {"subject": "심내막염,심근염", "year": ["12학번"], "professor": "김미정", "question": "원인균으로 가능성이 높은 것은?", "images": [], "text_box": "80세 여자가 의식저하로 왔다. 1주일 전부터 식사를 못하고 기운이 없었다. 허리 통증으로 척추 시술을 여러 차례 받았다. 혈압 80/40mmHg, 맥박 130회/분, 체온 39도였다. 가슴 X 선과 머리 컴퓨터단층촬영이다. (사진) 심첨부에서 수축기 심잡음이 들렸다. 혈액: 백혈구 19,000/mm^3, 혈색소 8.5g/dL, 혈소판 70,000/mm^3 소변: 단백질(1+), 백혈구(2+), 적혈구(1+)", "options": ["Viridans streptococcus", "Candida", "S. Aureus", "E. Coli", "Haemophilus"], "answer": [2], "explanation": "환자는 발열, 사구체신염, 수축기 심잡음, 그리고 두개내 출혈(ICH)을 보입니다. ICH는 감염성 심내막염의 균성 동맥류 합병증으로 발생할 수 있습니다. 특히 여러 차례 척추 시술을 받은 병력이 있어 병원 감염의 가능성이 높습니다. 병원 감염과 관련된 감염성 심내막염의 가장 흔한 원인균은 Staphylococcus aureus (S. Aureus)입니다."}, {"subject": "심내막염,심근염", "year": ["12학번"], "professor": "김미정", "question": "잇몸 스케일링 치료 전 예방적으로 향균제를 투여해야 하는 경우는?", "images": [], "text_box": null, "options": ["육아기에 심실중격결손 교정 수술", "한달 전 관동맥 스텐트 시술", "2년전 대동맥 조직판막 대치술", "5년전 승모판 풍선절개술", "10년전 인공심박조율기 삽입술"], "answer": [2], "explanation": "감염성 심내막염 예방적 항생제 투여의 적응증은 인공판막 보유자, 감염성 심내막염 과거력, 일부 선천성 심장 질환(미치료 또는 치료 후 6개월 이내, 잔여 결손), 심장이식 후 판막증이 있는 경우입니다. 2년 전 대동맥 조직판막 대치술을 받은 환자는 인공판막 보유자에 해당하므로 잇몸 스케일링 전에 예방적 항생제 투여가 필요합니다. 나머지 보기는 예방적 항생제 적응증에 해당하지 않습니다."}, {"subject": "심내막염,심근염", "year": ["10학번"], "professor": "김미정", "question": "50세 여자가 1주일 전 시작된 발열, 호흡곤란, 손가락 부종과 통증으로 왔다. 진단은?", "images": [], "text_box": null, "options": ["류마치스열", "급성 심근염", "급성 사구체신염", "전신홍반성낭창", "감염성 심내막염"], "answer": [4], "explanation": "환자는 발열, 호흡곤란, 손가락 부종과 통증을 호소하며, 사진에서 손의 Osler 결절이 의심됩니다. 흉부 X선에서는 폐부종 소견이 보입니다. 이러한 증상들은 감염성 심내막염의 전형적인 임상 양상입니다. 특히 Osler 결절은 감염성 심내막염의 피부 소견 중 하나로, 면역학적 반응에 의해 발생합니다."}, {"subject": "심내막염,심근염", "year": ["10학번"], "professor": "김미정", "question": "45세 남자가 아침에 의식이 혼미하여 왔다. 최근 오한이 들고 밤에 숨이 차서 식은 땀을 흘렸다고 한다. 머리 CT 와 심초음파 검사 결과이다. 진단은?", "images": [], "text_box": null, "options": ["Atrial fibrillation", "Infective endocarditis", "Bechet disease", "Metastatic brain tumor", "Alcohol intoxication"], "answer": [1], "explanation": "환자는 발열, 오한, 호흡곤란, 식은땀 등 감염 증상과 함께 의식 혼미를 보입니다. 제시된 영상 중 좌측은 뇌경색 또는 뇌출혈을 시사하는 뇌 CT/MRI 영상이며, 우측 심초음파 영상에서는 승모판에 증식물(vegetation)이 관찰됩니다. 이는 감염성 심내막염의 전형적인 소견이며, 뇌 병변은 감염성 심내막염의 색전성 합병증으로 발생했을 가능성이 높습니다."}, {"subject": "심내막염,심근염", "year": ["10학번"], "professor": "김미정", "question": "80세 여자 환자가 2주간 지속되는 발열로 내원하였다. 5개월 전 뇌경색 후 도뇨관 유치 상태로 요양 병원에 장기 입원중이라고 한다. 12시간 간격으로 채혈한 2쌍의 혈액 배양에서 같은 종류의 그람음성 간균이 확인되었다. 다음에 필요한 처치로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["소변 배양 검사", "잔뇨량 측정", "심초음파 검사", "복부 컴퓨터 단층 촬영", "뇌자기공명영상"], "answer": [2], "explanation": "환자는 2주간 지속되는 발열과 도뇨관 유치 상태의 장기 입원력, 그리고 12시간 간격으로 채취한 혈액배양 검사에서 그람음성 간균이 2쌍 모두에서 동정되었습니다. 이는 감염성 심내막염의 주요 진단 기준 중 하나를 만족합니다. 심장 증상은 명확히 없지만, 감염성 심내막염의 가능성을 의심해야 하므로 다음으로 심장초음파 검사를 통해 판막의 이상 유무를 확인하는 것이 가장 적절합니다."}, {"subject": "심혈관 수술의 개요", "year": ["21학번", "19학번", "15학번", "14학번", "13학번", "12학번", "11학번", "10학번"], "professor": "윤정섭", "question": "인공심폐기 사용중 막형산화기 기능 부전 소견으로 옳은 것은?", "images": [], "text_box": null, "options": ["섬유소원의 증가", "혈소판 수치의 증가", "혈류량 기복의 증가", "산화기 전후 압력차 감소", "산소 및 CO2 교환능 감소"], "answer": [4], "explanation": "Oxygenator(산화기)는 혈액에 산소를 추가하고 이산화탄소를 제거하는 역할을 합니다. 따라서 막형 산화기 기능 부전은 혈액 내 산소 공급이 감소하고 이산화탄소 제거 능력이 저하되는 결과를 초래합니다. 이는 전반적인 산소 및 CO2 교환능 감소로 이어집니다. 옛날에는 bubble type을 사용했지만, 요즘에는 membrane type Oxygenator를 주로 사용합니다."}, {"subject": "심혈관 수술의 개요", "year": ["19학번", "18학번", "15학번", "14학번", "13학번", "12학번", "11학번", "10학번"], "professor": "윤정섭", "question": "인공심폐기의 구성 순서로 옳은 것은?", "images": [], "text_box": null, "options": ["정맥도관 - 저혈조 - 롤러펌프 - 열교환기 - 산화기 - 동맥도관", "정맥도관 - 롤러펌프 - 열교환기 - 산화기 - 저혈조 – 동맥도관", "정맥도관 - 산화기 - 열교환기 - 저혈조 - 롤러펌프 - 동맥도관", "정맥도관 - 열교환기 - 롤러펌프 - 저혈조 - 산화기 - 동맥도관", "정맥도관 저혈조 - 열교환기 - 산화기 - 롤러펌프 - 동맥도관"], "answer": [0], "explanation": "인공심폐기의 혈액 순환은 정맥도관을 통해 체내에서 혈액을 받아 저혈조로 모읍니다. 저혈조의 혈액은 펌프를 통해 다음 장치로 이동하며, 이 펌프는 시스템 전체에 양압을 걸어 공기 색전증 위험을 줄입니다. 이후 열교환기를 거쳐 혈액의 온도를 조절하고, 산화기에서 산소 공급 및 이산화탄소 제거가 이루어집니다. 마지막으로 동맥도관을 통해 산화된 혈액이 다시 환자의 몸으로 주입됩니다."}, {"subject": "심혈관 수술의 개요", "year": ["18학번"], "professor": "윤정섭, 김용한", "question": "수술 중 경식도 초음파의 장점으로 옳지 않은 것은?", "images": [], "text_box": null, "options": ["수술 성적의 즉각적인 판단이 가능하다", "수술에 의한 합병증을 발견할 수 있다", "수술 후 심실 기능의 재평가가 가능하다", "심장 내 기포를 파악할 수 있다.", "대동맥궁의 구조를 잘 관찰할 수 있다"], "answer": [4], "explanation": "경식도 초음파(TEE)는 수술 중 심장 상태를 실시간으로 평가하여 수술 성적을 즉각적으로 판단할 수 있게 합니다. 또한, 수술 중 발생할 수 있는 합병증인 공기 색전증이나 판막 역류 등을 조기에 발견하는 데 매우 유용합니다. 수술 후 심실 기능을 재평가하고, 심장 내 기포 유무를 파악하는 데에도 장점이 있습니다. 그러나 대동맥궁은 식도에서 다소 거리가 멀고 기도 구조물에 의해 가려질 수 있어 관찰이 상대적으로 어려울 수 있습니다."}, {"subject": "심혈관 수술의 개요", "year": ["17학번"], "professor": "윤정섭, 김도연", "question": "다음 중 승모판막 치환술을 위한 심장수술의 일반적인 절개부위를 고르시오", "images": [], "text_box": null, "options": ["정중 흉골 절개", "쇄골상 절개", "측면 흉강 절개", "전방 흉강 절개"], "answer": [0], "explanation": "승모판막 치환술과 같은 개심술은 심장을 노출시켜야 하므로 주로 정중 흉골 절개(median sternotomy)를 통해 접근합니다. 이 절개법은 심장과 대혈관에 대한 넓은 시야를 제공하여 수술을 안전하게 진행할 수 있도록 합니다. 다른 절개법들은 특정 부위에 제한적인 접근을 제공하므로 일반적인 개심술에는 잘 사용되지 않습니다. 따라서 가장 일반적인 절개부위는 정중 흉골 절개입니다."}, {"subject": "심혈관 수술의 개요", "year": ["17학번"], "professor": "윤정섭, 김도연", "question": "이 환자의 수술은 인공심폐기 적용 후 유도하에 승모판막 치환술(mitral valve replacement) 시행을 계획하였다. 인공심폐기 적용을 위해 동맥, 정맥 도관삽입(cannulation method)을 위한 적절한 위치의 조합을 고르시오.", "images": [], "text_box": "동맥도관(Arterial cannula): A. 상행대동맥 B. 액와동맥 C. 대퇴동맥 D. 요골동맥\n정맥도관(Venous cannula): 가. 상대정맥(SVC)과 하대정맥(IVC) 나. 우심방", "options": ["동맥도관 A, 정맥도관 가", "동맥도관 B, 정맥도관 가", "동맥도관 C, 정맥도관 나", "동맥도관 D, 정맥도관 가", "동맥도관 D, 정맥도관 나"], "answer": [0], "explanation": "대부분의 심장 수술 시 인공심폐기 적용을 위해 동맥도관은 상행대동맥(Ascending Aorta)에 삽입합니다. 이는 심장에서 전신으로 혈액을 공급하는 자연스러운 경로와 유사하기 때문입니다. 정맥도관의 경우, 승모판막 치환술은 심장 내부를 완전히 비워야 하므로, 심장으로 유입되는 모든 정맥혈을 우회시켜야 합니다. 이를 위해 상대정맥(SVC)과 하대정맥(IVC)에 각각 도관을 삽입하는 이중 정맥 캐뉼라 방식이 일반적으로 사용됩니다."}, {"subject": "심혈관 수술의 개요", "year": ["15학번", "14학번", "13학번", "12학번", "11학번", "10학번"], "professor": "윤정섭", "question": "상행대동맥류 수술 예정인 환자에서 마취 후 TEE 서 하행대동맥에 심한 동맥경화증이 있을 경우 동맥관 삽입할 때 가장 위험한 부위는?", "images": [], "text_box": null, "options": ["원위부 상행대동맥", "대동맥궁", "무명동맥", "우측 쇄골하동맥", "좌측 대퇴동맥 (우측 대퇴동맥으로도 출제)"], "answer": [4], "explanation": "하행대동맥에 심한 동맥경화증이 있는 환자의 경우, 하행대동맥 이하 부위인 대퇴동맥에 동맥관을 삽입하는 것은 특히 위험합니다. 이는 역행성 혈류를 유발하여 경화반을 파열시킬 수 있기 때문입니다. 경화반 파열은 뇌색전증 등 심각한 합병증을 초래할 위험이 높습니다. 따라서 이러한 상황에서는 대퇴동맥 삽입을 피하고 다른 부위를 고려해야 합니다."}, {"subject": "심혈관 수술의 개요", "year": ["09학번", "08학번"], "professor": "조건현", "question": "개심술 시에 심근보호의 목적은 심근 손상을 최소화하면서 심장의 해부병리학적 병변을 교정하는 수술이 가능하게 하는 것이다 이상적인 심근보호의 조건이 아닌 것을 고르시오.", "images": [], "text_box": null, "options": ["불필요한 심근허혈을 최소화한다.", "혈액 등으로 수술 시야의 제한을 받지 않고, 심장의 움직임을 없거나 억제된 상태를 유지함.", "수술과정을 중단할 필요가 없다.", "심정지액의 사용을 줄인다.", "대동맥차단(aorta cross clamp time)시간과 심폐기 가동시간을 최대화한다."], "answer": [4], "explanation": "이상적인 심근보호의 조건은 대동맥차단 시간과 심폐기 가동 시간을 최소화하는 것입니다. 이 두 시간이 길어지면 심근 손상의 위험이 증가하고 심폐바이패스 관련 합병증 발생 가능성 또한 높아집니다. 심근 허혈을 최소화하고 수술 후 심장 회복을 돕기 위해서는 이러한 시간을 최대한 단축하는 것이 중요합니다. 따라서 시간을 최대화하는 것은 이상적인 조건이 아닙니다."}, {"subject": "심혈관 수술의 개요", "year": [], "professor": "", "question": "심장 수술 즉, 개심술(Open heart surgery)을 하기 위하여 심장의 기능을 일시적으로 정지시켜야 하며 이때에는 심폐바이패스(cardiopulmonary bypass = CPB)를 통한 체외순환이 필수적이다 이러한 체외순환은 수술 중 심장(pump)과 폐(oxygenator)의 역할을 대신하며 수술 시야를 좁게 확보하는 조건을 가지고 있다 다음은 체외순환 시 체내에서 일어나는 변화 및 합병증에 대한 설명이다. 옳지 못한 것을 고르시오", "images": [], "text_box": null, "options": ["체외순환 후에 과다한 출혈이 생길 수 있는데 크게 재수술이 필요한 외과적 출혈 (surgical bleeding)과 혈액제제나 약물 치료가 필요한 비외과적 출혈(non-surgi- cal bleeding)이 있다", "수술 후 발열, 흉통,백혈구 과다증, 심낭삼출액(peri- cardial effusion)등의 소견이 나타나는 심낭절개술후 증후군(postpericardiotomy syndrome)은 수술 후 1주일에서 수주 사이에 발생할 수 있는데 발생하면 즉시 외과적 교정술이 필요하다.", "심장주위에 혈액의 축적으로 심실의 확장과 수축에 장애를 초래하며 심박출량의 감소, 중심정맥압 상승, 기이맥(paradoxical pulse) 동격통음영의 확장 등의 소견을 보인다.", "심근의 손상으로 저심박출증(low cardiac output syndrome)이 오거나 또는 전도조직의 손상으로 부정맥이 생길 수 있다.", "중추신경계 저혈압으로 인한 허혈성 손상 드물게는 헤파린의 사용으로 인한 출혈성 손상 그리고 공기 색전증 등에 의한 뇌손상 등이 초래될 수 있다."], "answer": [1], "explanation": "심낭절개술후 증후군(Postpericardiotomy syndrome)은 개심술 후 흔히 발생하는 염증 반응입니다. 대개 발열, 흉통, 백혈구 증가, 심낭삼출 등의 증상을 보이며, 대부분의 경우 자연 치유되거나 보존적 요법으로 관리됩니다. 환자 증상이 심하거나 삼출액이 많을 경우 배액술이 필요할 수 있으나, 일반적으로 '즉시 외과적 교정술'이 필요한 것은 아닙니다. 이는 해당 증후군이 급성 외과적 응급상황이라기보다는 염증성 반응이기 때문입니다."}, {"subject": "심혈관 수술의 개요", "year": [], "professor": "", "question": "다음 중 이상적인 심근보호의 조건으로 틀린 것은?", "images": [], "text_box": null, "options": ["혈액 등으로 수술 시야의 제한을 받지 않는다.", "심장은 반드시 움직임이 없어야 할 필요는 없다.", "수술 중 심정지액의 사용은 많을수록 좋다.", "대동맥차단시간 및 체외순환 시간을 줄이는 것이 목적 중 하나이다.", "허혈성 심질환은 심장 허혈이 이미 진행된 상태이기 때문에 추가적인 심근 허혈은 어느정도 용인된다."], "answer": [4], "explanation": "이상적인 심근보호의 조건은 심근 허혈을 최소화하고 수술 시간을 단축하는 것입니다. 특히, 대동맥차단 시간과 체외순환 시간을 줄이는 것은 심근 손상 및 합병증 위험 감소에 매우 중요합니다. 허혈성 심질환 환자라 할지라도 추가적인 심근 허혈은 용인되어서는 안 되며, 심정지액의 과도한 사용 또한 심근 보호에 부정적인 영향을 미칠 수 있습니다. 따라서 심근 허혈을 최대한 방지하고 심장 기능을 보존하는 것이 목표입니다."}, {"subject": "심혈관 수술의 개요", "year": [], "professor": "", "question": "다음 중 인공심폐기 (Cardiopulmonary bypass)의 기본 구성 요소로 맞지 않는 것은?", "images": [], "text_box": null, "options": ["펌프", "산화기", "인공호흡기", "저수조", "열교환기"], "answer": [2], "explanation": "인공심폐기는 심장과 폐의 기능을 대신하여 체외순환을 가능하게 하는 장치입니다. 주요 구성 요소로는 혈액을 순환시키는 펌프, 혈액에 산소를 공급하고 이산화탄소를 제거하는 산화기, 혈액을 저장하는 저혈조(reservoir), 그리고 체온 조절을 위한 열교환기가 있습니다. 인공호흡기는 폐의 기능을 보조하는 장치로, 인공심폐기 자체의 직접적인 기본 구성 요소는 아닙니다."}, {"subject": "심혈관 수술의 개요", "year": [], "professor": "", "question": "심정지액에 대한 설명으로 틀린 것은?", "images": [], "text_box": null, "options": ["혈성(blood) 및 전해질성(crystalloid) 두가지 종류가 있다.", "심정지액은 고농도의 k를 포함하여 이완성 심정지를 유발한다.", "이완성 심정지는 Na 에 의한 탈분극에 의해 발생한다.", "심정지액 사용시 저온요법 추가하면 심근의 산소 소모를 더욱 줄일 수 있다.", "심정지액에는 세포의 에너지원을 공급하기 위한 L-glutamate, L-arginine, L-pyruvate 등이 포함된다."], "answer": [2], "explanation": "심정지액은 심장 수술 중 심장을 보호하고 활동을 중지시키기 위해 사용됩니다. 이는 주로 고농도의 칼륨(K)을 포함하여 심근 세포를 탈분극시키고 이완성 심정지(diastolic arrest)를 유도합니다. 이완성 심정지는 칼륨에 의한 탈분극 유도 후 지속적인 과분극 상태를 유지함으로써 발생하며, 나트륨(Na)에 의한 탈분극과는 기전이 다릅니다. 심정지액과 저온요법을 병행하면 심근의 대사 활동과 산소 소모를 크게 줄일 수 있어 심근 보호에 효과적입니다."}, {"subject": "판막질환", "year": ["20학번", "19학번", "18학번"], "professor": "안효석", "question": "처치는?", "images": [], "text_box": "87세 여자 1개월 전 가슴통증 있어 내원하였다. 2개월 전 실신 병력이 있고 혈압 130/85mmHg, 맥박은 70회/분이었다. 가슴 청진 결과 오른쪽 2th intercostal area 에서 III/VI 도의 박출 수축기 잡음이 들렸고, 목동맥, 심장끝에서 수축기 잡음 들렸다. 심전도 결과 상 좌심실 비대 소견 있고 환자는 만성폐쇄성폐질환이 동반되어 흡입제를 사용하고 있고, 전신마취의 위험성이 높다고 평가되었다.", "options": ["승모판클립 삽입", "왼심방귀 가리개 삽입", "카테터 경유 대동맥 판막 삽입", "경피적 승모판 풍선 성형술", "심방 사이막 가리개 삽입"], "answer": [2], "explanation": "환자의 임상 증상(가슴 통증, 실신) 및 청진 소견(우측 2번째 갈비 사이의 박출성 수축기 잡음)과 심전도상 좌심실 비대는 대동맥판 협착증(AS)을 시사합니다. 환자는 고령이며 만성 폐쇄성 폐질환으로 인해 전신 마취의 위험성이 높아 개흉 수술보다는 카테터 기반의 시술이 적합합니다. TAVI (경피적 대동맥판막 치환술)는 대퇴동맥을 통해 인공 판막을 삽입하는 시술로, 고위험 AS 환자에게 권고되는 치료법입니다."}, {"subject": "판막질환", "year": ["20학번"], "professor": "정해억", "question": "화살표가 가리키는 쪽은 무엇이 커진 것이며 가장 가능한 진단명은?", "images": [], "text_box": "판막 질환을 앓고 있는 환자의 흉부 X선 후전 사진이다.", "options": ["상대정맥-삼첨판 협착", "대동맥 - 대동맥판 협착", "대동맥-대동맥판 폐쇄부전", "좌심방이-승모판 협착", "좌심실-대동맥판 협착"], "answer": [3], "explanation": "화살표가 가리키는 부분은 좌심방이며, 좌심방 확장은 승모판 협착으로 인해 발생합니다. 승모판 협착은 좌심방에서 좌심실로의 혈류 흐름을 방해하여 좌심방의 압력을 높이고 확장시킵니다. 흉부 X선상 좌심방 확장 소견은 승모판 협착의 주요 소견 중 하나입니다."}, {"subject": "판막질환", "year": ["19학번"], "professor": "정해억", "question": "다음 심초음파 소견을 순서대로 나열하여라", "images": [], "text_box": "(그림에 저대로 LV, LA 등의 표기가 있었습니다)", "options": ["승모판 협착 - 대동맥판 협착 - 대동맥판 폐쇄부전 – 승모판 폐쇄부전 – 삼첨판 폐쇄부전"], "answer": [0], "explanation": "심초음파 소견은 다음과 같습니다: 1번은 hockey stick appearance를 보이는 승모판 협착(MS)입니다. 2번은 좌심실벽이 두꺼워져 있고 대동맥판이 잘 열리지 않는 대동맥판 협착(AS)입니다. 3번은 대동맥에서 좌심실로 혈액이 역류하는 대동맥판 폐쇄부전(AR)입니다. 4번은 좌심실에서 좌심방으로 혈액이 역류하는 승모판 폐쇄부전(MR)입니다. 5번은 우심실에서 우심방으로 혈액이 역류하는 삼첨판 폐쇄부전(TR)입니다."}, {"subject": "판막질환", "year": ["19학번"], "professor": "정해억", "question": "승모판 역류(MR)에 대해 옳은 것을 고르시오.", "images": [], "text_box": null, "options": ["승모판 탈출증에서는 심첨부에서 전수축기 잡음이 청진된다.", "일차성 승모판 역류의 가장 많은 원인은 허혈성이다.", "이차성 승모판 역류는 좌심실 및 좌심방 확장으로 발생하며 mitral annulus 가 말안장 모양에서 편평한 모양으로 변한다.", "호흡곤란 증세가 없는 중증 일차성 MR 환자는 좌심실구혈율에 상관없이 수술적 치료를 해야 한다.", "중증 만성 degenerative 승모판 역류는 재건술보다 치환술이 더 좋다."], "answer": [2], "explanation": "이차성 승모판 역류(MR)는 좌심실이나 좌심방의 확장으로 인해 발생하며, 이로 인해 승모판륜이 말안장 모양에서 편평하게 변형됩니다. 일차성 MR의 주요 원인은 퇴행성 변화이며, MVP에서는 mid-systolic click과 systolic murmur가 청진됩니다. 증상이 있는 만성 중증 일차성 MR 환자는 좌심실 구혈률과 무관하게 수술적 치료가 필요하며, 일반적으로 치환술보다 재건술이 더 선호됩니다."}, {"subject": "판막질환", "year": ["16학번"], "professor": "정해억", "question": "판막증의 중증도, 원인 및 정확한 진단명은?", "images": [], "text_box": "55세 여자환자. 진행하는 호흡곤란으로 입원. 심첨부에서 첫 심음이 크고 이완기 심잡음이 들렸다. 경흉부 심초음파에서 승모판구 면적 1.7cm^2, 도플러 검사상 좌심방과 좌심실 간의 평균 압력차 4mmHg.", "options": ["경도 류마티스성 승모판 폐쇄부전증", "중등도 류마티스성 승모판 협착증", "중증 류마티스성 승모판 폐쇄부전증", "중등도 퇴행성 승모판 협착증", "경도 류마티스성 승모판 협착증"], "answer": [4], "explanation": "환자의 청진 소견(첫 심음 항진, 이완기 심잡음)과 심초음파 소견(승모판구 면적 1.7cm²)은 승모판 협착증(MS)을 시사합니다. 승모판 면적이 1.5cm² 미만이면 severe, 1.5-2.0cm² 사이면 moderate, 2.0cm² 이상이면 mild로 분류됩니다. 1.7cm²는 경증(mild)에서 중등도(moderate)에 해당합니다. 류마티스열은 승모판 협착의 흔한 원인 중 하나입니다. 따라서 경도 류마티스성 승모판 협착증으로 진단됩니다."}, {"subject": "판막질환", "year": ["16학번"], "professor": "정해억", "question": "설명 중 틀린 것을 고르시오.", "images": [], "text_box": "58세 남자환자가 급성 심근경색증으로 내원하여 응급치료 후 중환자실에서 치료받던 중에 갑자기 혈압이 90/60mmHg로 떨어지면서 호흡 곤란과 함께 심첨부에서 범수축기 심잡음이 들렸다. 다음은 심초음파 소견이다.", "options": ["유두근(papillary muscle)의 파열로 발생하였을 가능성이 크다.", "심근경색은 전벽보다는 측벽 혹은 후벽에 발생했을 것이다.", "수술적 치료를 고려해야 한다.", "감염성 심내막염이나 흉부 trauma 에 의해서도 유사한 상황이 만들어진다", "심한 승모판 역류로 인해 좌심방의 크기가 커진다."], "answer": [4], "explanation": "급성 심근경색 후 발생하는 승모판 폐쇄부전증(MR)은 주로 후하벽 심근경색 시 후내측 유두근 파열로 발생할 가능성이 높습니다. 이는 유두근이 단일 혈액 공급을 받기 때문입니다. 급성 MR은 갑자기 발생하므로 좌심방이 충분히 확장할 시간이 없어 좌심방 크기는 정상이며, 폐부종이 심하게 동반됩니다. 따라서 '좌심방 크기가 커진다'는 설명은 틀렸습니다. 이러한 경우 응급 수술적 치료가 필요합니다."}, {"subject": "판막질환", "year": ["16학번"], "professor": "정해억", "question": "승모판 폐쇄부전증(MR)에 관한 설명이다. 틀린 설명은?", "images": [], "text_box": null, "options": ["심근경색 후 발생하는 승모판폐쇄부전증을 허혈성 승모판폐쇄부전증이라하며 판막자체의 이상보다는 국소심근의 기능상실과 파열에 기인한다.", "급성 승모판폐쇄부전증은 만성 승모판폐쇄부전증에 비해 좌심방(LA)의 크기가 정상이지만 폐울혈이 더 잘생긴다", "호흡곤란 증세가 있는 중증 승모판폐쇄부전증 환자에서 좌심실구혈율(EF)가 40%라면 수술적 치료를 고려해야한다", "심첨부에서 전수축기 심잡음(holo-systolic murmur)이 청취되며 환자에게 쪼그려앉기를 시키면 심잡음이 짧아진다", "승모판 폐쇄부전증의 가장 많은 원인은 점액성퇴행(myxomatous degeneration)이다"], "answer": [3], "explanation": "승모판 폐쇄부전증(MR)의 가장 많은 원인은 점액성 퇴행(myxomatous degeneration)입니다. 심근경색 후 발생하는 MR은 허혈성 MR이라 불리며 국소 심근 기능 상실이나 파열이 원인입니다. 급성 MR은 좌심방 크기가 정상인 반면, 만성 MR은 좌심방이 확장됩니다. 급성 MR에서는 폐울혈이 심하며, 만성 중증 MR 환자로 증상이 있고 EF가 30% 이상이면 수술 적응증이 됩니다. 쪼그려 앉을 경우(squatting) venous return이 증가하여 MR murmur는 길어집니다."}, {"subject": "판막질환", "year": ["16학번"], "professor": "정해억", "question": "승모판 폐쇄부전증 (MR)에 관한 설명이다. 틀린 것은?", "images": [], "text_box": null, "optio

ns": ["심근경색 후 발생하는 승모판 폐쇄부전증은 판막자체의 이상보다는 좌심실의 확장 및 국소심근의 기능상실에 기인한다.", "만성 승모판 폐쇄부전증(chronic MR)에 비해 급성 승모판 폐쇄부전증(acute MR)에서는 좌심방(LA)의 크기가 더 크고 폐울혈이 더 잘 생긴다.", "호흡곤란 증세가 있는 중증 승모판 폐쇄부전증(severe MR) 환자는 심기능이 좋다면 승모판에 대한 수술적 치료를 해주어야 한다.", "청진상 심첨부에서 전수축기 심잡음(holo-systolic murmur)이 청취된다.", "승모판 폐쇄부전증의 가장 많은 원인은 점액성노화 (myxomatous degeneration)이다"], "answer": [1], "explanation": "만성 승모판 폐쇄부전증(chronic MR)은 장기간의 역류로 인해 좌심방이 적응하여 확장되지만, 급성 승모판 폐쇄부전증(acute MR)은 갑작스러운 역류로 인해 좌심방이 확장될 여력이 없어 좌심방 압력이 급격히 상승하고 심한 폐울혈이 발생합니다. 따라서 급성 MR에서 좌심방 크기가 더 크고 폐울혈이 더 잘 생긴다는 설명은 틀렸습니다."}, {"subject": "판막질환", "year": ["16학번"], "professor": "정해억", "question": "승모판구 면적 1.7cm^2, 도플러 검사상 좌심방과 좌심실 간의 평균 압력차 4mmHg 이다. 판막증의 원인 및 중증도는?", "images": [], "text_box": "55세 여자환자. 진행하는 호흡곤란으로 입원. 심첨부에서 첫 심음이 크고 이완기 심잡음이 들렸다. 경흉부 심초음파에서", "options": ["경도 류마티스성 승모판 폐쇄부전증", "중등도 류마티스성 승모판 협착증", "중증 류마티스성 승모판 폐쇄부전증", "중등도 퇴행성 승모판 협착증", "경도 류마티스성 승모판 협착증"], "answer": [4], "explanation": "환자의 청진 소견(첫 심음 항진, 이완기 심잡음)과 심초음파 소견(승모판구 면적 1.7cm²)은 승모판 협착증(MS)을 시사합니다. 승모판 면적 1.5-2.0cm²는 경증(mild)에서 중등도(moderate)로 분류됩니다. 류마티스열은 승모판 협착의 흔한 원인 중 하나입니다. 따라서 경도 류마티스성 승모판 협착증으로 진단하는 것이 적절합니다."}, {"subject": "판막질환", "year": ["12학번", "13학번", "14학번", "15학번"], "professor": "정해억", "question": "설명 중 틀린 것을 모두 고르시오 (2 가지)", "images": [], "text_box": "58세 남자환자가 급성 심근경색증으로 내원하여 중환자실에서 치료받던 중 급성 호흡곤란과 함께 심첨부에서 범수축기 심잡음이 들렸다. 다음은 심초음파 소견이다.", "options": ["승모판 폐쇄부전증은 승모판막의 류마티스성 변화에 의해 발생한 것이다.", "급성으로 발생했기 때문에 LA 의 크기가 정상, 폐울혈이 잘 생긴다", "유두근의 파열로 발생하였을 가능성이 크다", "경색은 후벽보다는 전벽에 발생했을 것이다", "수술적 치료를 고려해야 한다", "좌심방의 v파가 상당히 상승한다", "감염성 심내막염이나 흉부 trauma 에 의해서도 유사한 상황이 만들어진다"], "answer": [0, 3], "explanation": "급성 심근경색 후 발생하는 승모판 폐쇄부전증(MR)은 주로 허혈성 원인, 특히 유두근 파열에 의해 발생하며, 류마티스성 변화는 만성 경과를 보입니다. 심근경색은 후하벽에서 유두근 파열을 더 잘 유발합니다. 급성 MR은 좌심방이 확장될 시간이 없어 좌심방 크기는 정상이지만, 급격한 압력 상승으로 심한 폐울혈과 높은 좌심방 v파를 유발하며, 응급 수술적 치료가 필요합니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": null, "question": "이 환자의 심부전 stage는?", "images": [], "text_box": "평소 건강하게 증상이 없던 46세 남자가 검진에서 심초음파를 시행하였고 심구출률이 48%로 나왔다.", "options": ["At risk", "Pre heart failure", "Stable heart failure", "Symptomatic heart failure", "Advanced heart failure"], "answer": [1], "explanation": "심부전의 Stage B는 심부전 증상은 없지만 심장의 구조적 질환이나 기능적 이상이 있는 경우를 의미합니다. 환자는 증상이 없었으나 심초음파에서 심구출률이 48%로 정상 범위(보통 50% 이상)보다 낮게 측정되어 심장 기능의 저하가 확인됩니다. 따라서 이는 증상 발생 전의 심장 기능 이상 상태인 Pre heart failure, 즉 Stage B에 해당합니다. Stage A는 위험인자만 있고 심장 구조나 기능에 이상이 없는 경우입니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": null, "question": "다음의 약제 중에 증상 개선 및 심기능을 개선 시킬 수 있는 적절한 방법은?", "images": [], "text_box": "심구출률 저하 심부전으로 베타차단제와 앤지오텐신전환효소억제제를 복용중인 환자가 3개월 치료 후에도 심기능 호전이 없었다.", "options": ["디곡신추가", "이바브라딘추가", "아미오다론추가", "심실내제세동기시술", "칼륨보전이뇨제추가"], "answer": [4], "explanation": "환자는 심구출률 저하 심부전(HFrEF)으로 ACE 억제제와 베타차단제를 복용 중이나 심기능 호전이 없습니다. 이 경우 심부전 치료의 4가지 주요 약물 클래스(ACEi/ARNI, 베타차단제, MRA, SGLT2i) 중 미네랄코르티코이드 수용체 길항제(MRA)를 추가하는 것이 다음 표준 치료 단계입니다. 칼륨 보존 이뇨제는 스피로노락톤이나 에플레레논과 같은 MRA 약물을 의미하며, 이들은 심근 섬유화와 재형성을 억제하여 심기능 개선과 예후 향상에 기여합니다. 따라서 칼륨보전이뇨제 추가는 심기능 개선에 효과적인 방법입니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": null, "question": "환자에 대한 다음의 설명 중에 가장 적절한 것은?", "images": [], "text_box": "심부전으로 치료를 1년 넘게 받았던 환자가 증상 호전 및 심기능의 호전이 있었다. 다음은 환자가 복약중인 약제이다.\n안지오텐신 전환효소 억제제-라미프릴 5mg\n베타차단제 - (..) 2.5mg\n이뇨제 -라식스 20mg, 알닥톤 25mg\n나트륨 포도당 공동수용체-2 억제제 -포시가 10mg", "options": ["약제가 많으니 약 용량을 줄인다.", "엔지오텐신 전환효소 억제제와 베타차단제만 유지한다.", "약제의 지속적인 사용이 중요함을 설명한다.", "정상적인 혈압이 유지된다면 약제를 중단한다.", "심기능 개선과 연관이 적은 이뇨제를 중단한다."], "answer": [2], "explanation": "심부전 환자가 증상 및 심기능 호전을 보였더라도, 현재 복용 중인 약물(ACEi, 베타차단제, MRA, SGLT2i)은 심부전의 진행을 늦추고 예후를 개선하는 데 필수적인 '가이드라인 지향 약물 치료(GDMT)'입니다. 이러한 약제들은 장기적으로 사망률과 재입원율을 낮추는 효과가 입증되어 있으므로, 증상이 호전되었다고 해서 임의로 약제 용량을 줄이거나 중단해서는 안 됩니다. 환자에게는 약제의 지속적인 복용의 중요성을 교육하고 치료 순응도를 높이는 것이 매우 중요합니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "16학번"], "professor": null, "question": "심부전 환자 설명에 다음의 그림을 많이 이용한다. 짐 줄이기에 해당하지 않는 것은?", "images": [], "text_box": null, "options": ["저염식이", "헨레 고리 작용 이뇨제", "BNP analog 약제", "질산염의 혈관확장제", "모두 해당한다."], "answer": [4], "explanation": "제시된 그림은 심부전 환자의 심장이 '짐'을 지고 힘들어하는 모습을 비유하며, 이 짐을 줄이는 것, 즉 심장의 부담을 덜어주는 치료의 중요성을 설명하는 데 사용됩니다. 저염식이, 루프 이뇨제(헨레 고리 작용 이뇨제), BNP analog 약제(예: sacubitril/valsartan), 질산염 등의 혈관확장제는 모두 심장의 전부하(preload)나 후부하(afterload)를 감소시키거나 체액 과다를 조절하여 심장의 부담을 줄이는 효과가 있습니다. 따라서 이 모든 치료법들은 '짐 줄이기'에 해당합니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "18학번", "17학번", "15학번", "11학번"], "professor": "박훈준", "question": "이 환자의 치료 시 가장 먼저 사용할 약물은?", "images": [], "text_box": "만성 수축기심부전으로 표준약물 치료 중인 57세 남자가 최근 인플루엔자 감염 후 내원 3일 전부터 갑자기 심해진 호흡곤란으로 내원하였다. 내원 시 혈압 100/60mmHg, 맥박 110회/분, 호흡수 26회/분이었고, 흉부 X-선 검사 상 폐부종 소견이 관찰되었고, 심장 초음파검사 상 구출률은 38% (참조: 정상치 > 55%)였다. 우측 심도자 검사 상 폐동맥쐐기압(PCWP) 32mmHg (정상치: 6-12mmHg), 심장 지수(Cardiac index) 2.3L/min/m2 (정상치: 2.6-4.2L/min/m2)이었다.", "options": ["전환효소억제제", "칼슘 채널 차단제", "이뇨제", "디기탈리스", "베타차단제"], "answer": [2], "explanation": "환자는 만성 심부전 환자로 인플루엔자 감염 후 급성 호흡곤란이 심해져 내원했습니다. 흉부 X-선 상 폐부종 소견과 높은 폐동맥쐐기압(PCWP)은 체액 과다로 인한 폐울혈을 명확히 시사합니다. 급성 심부전 악화 시 체액 과다 상태에서는 이뇨제를 사용하여 과도한 체액을 제거하고 증상을 완화하는 것이 가장 우선적인 치료입니다. 이뇨제는 혈액량을 감소시켜 전부하를 줄이고 폐울혈을 해소하는 데 매우 효과적입니다. 다른 약제들은 만성 심부전 관리에는 중요하지만 급성기 체액 과다 조절에는 이뇨제가 우선적으로 사용됩니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "18학번", "16학번"], "professor": "서석민", "question": "다음의 것 중에 도움이 될 수 있는 조언은?", "images": [], "text_box": "평소 건강한 52세 남자. 검진 흉부 방사선 촬영에서 심장이 크다는 말을 듣고 심초음파를 시행하였다. 심구출률은 45%로 확인이 되었고 최근까지 일상에 큰 문제가 되는 증상은 없었다고 한다.", "options": ["근력 운동 위주의 운동이 좋다.", "저염식이 및 수분 제한하는 것이 좋다.", "육식을 피하고 채식 위주의 식단이 좋다.", "금연을 하고 하루에 적포도주 한 잔 정도는 좋다.", "혈압이 많이 낮지 않으면 안지오텐신전환효소차단제 복약을 권한다."], "answer": [4], "explanation": "환자는 심부전 증상은 없지만 심장 크기가 크고 심구출률이 45%로 저하되어 심부전 Stage B에 해당합니다. Stage B 심부전 환자에서는 심부전의 진행을 늦추고 예후를 개선하기 위한 약물치료가 중요합니다. 혈압이 낮지 않다면 안지오텐신 전환효소 억제제(ACEi) 또는 안지오텐신 수용체 차단제(ARB) 복용을 권고하는 것이 적절합니다. 이러한 약제들은 심장 재형성을 억제하고 심장 기능을 보존하는 데 도움이 됩니다. 운동은 유산소 운동이 주로 권장되며, 수분 제한은 일반적으로 필요하지 않고, 균형 잡힌 식사와 금연 금주가 중요합니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "윤종찬", "question": "아래 검사결과에서 호흡곤란의 원인으로 가장 가능성이 높은 것은?", "images": [], "text_box": "65세 여자가 반복되는 운동성 호흡곤란으로 내원하였다. 15년 전부터 고혈압이 있었으나 꾸준히 적절한 약물치료는 받지 않았다. 내원시 혈압은 160/JmmHg 이었고, 이학검사상 제3 심음이 청진되었고 심첨부 박동이 약간 증가되어 있었다.\n- 혈중 NT-ProBNP(뇌나트륨이뇨펩티드) : 8,252pg/mL(정상치: □225.7pg/ml)\n- 흉부 X 선: 폐정맥재분포 및 경도의 좌심실 음영의 증가\n- 심장초음파: 왼심실박출률은 55%(참조: 정상치 255%L 중등도의 제한성 충만장애, 중등도의 좌심실 비후 소견을제외하고는 특이 이상소견 없음)\n- 관상동백조영술: 정상 관상동맥소견", "options": ["불안정 협심증(unstable angina)", "페동맥고혈압(pulmonary hypertension)", "페동맥색전증(pulmonary embolism)", "박출률 보존 심부전(heart failure with preserved ejection fraction)", "박출률 감소 심부전(heart failure with reduced ejection fraction)"], "answer": [3], "explanation": "환자는 고혈압 병력이 있고, 호흡곤란 증상이 있으며, NT-ProBNP 수치가 매우 높게 상승되어 있습니다. 심초음파에서 좌심실 박출률은 55%로 보존되어 있으나, 좌심실 비후와 중등도의 제한성 충만장애가 관찰됩니다. 이는 심장의 구조적 이상과 이완기 기능 장애를 시사하며, 보존된 박출률 심부전(HFpEF)의 진단 기준에 부합합니다. 관상동맥은 정상 소견이므로 허혈성 질환은 배제됩니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "윤종찬", "question": "진단을 위해 시행할 수 있는 검사 중에 가장 도움이 되는 것은?", "images": [], "text_box": "68세 남자환자가 호흡곤란을 주소로 응급실에 방문하였다. 흉부방사선 소견과 ABGA 검사 결과는 다음과 같다.", "options": ["Serum albumin", "troponin-T", "C-reactive protein", "B-type natriuretic peptide", "White blood count"], "answer": [3], "explanation": "제시된 흉부 X-ray에서 폐부종 소견이 관찰되고, 환자는 호흡곤란을 주소로 내원했습니다. 이는 심부전을 강하게 시사하는 임상 양상입니다. 심부전의 진단을 확진하고 중증도를 평가하는 데 가장 유용한 혈액 검사는 B-type natriuretic peptide (BNP) 또는 NT-proBNP입니다. BNP는 심장에 가해지는 스트레스에 반응하여 분비되는 호르몬으로, 심부전 시 현저히 상승합니다. 따라서 BNP 검사가 진단에 가장 도움이 됩니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "윤종찬", "question": "조치는?", "images": [], "text_box": "63세 남자가 1달 전부터 숨찬 증상이 지속되어 내원하였다. 2개월 전 부터 숨이 차서 다른 병원에서 좌심실 박출률 35%로 심부전으로 치료를 받았다. 처방 전에는 푸로세마이드(furosemide), 스피로노락톤 (spironolactone), 카베딜롤(carvedilol),에나라프릴(enalapril)이 적혀 있었다. 혈압 120/72 mmHg, 맥박 66회/분, 호흡 20회/분, 체온 36.0 였다. 가슴 청진에서 심음은 규칙적이었고 거품 소리는 들리지 않았다. 양 쪽 정강뼈앞 오목 부종도 없었다. 가슴 X 선 사진이다.", "options": ["카베딜롤 증량", "푸로세마이드 증량", "디곡신 추가", "스피로놀락톤 증량", "에나라프릴사큐비트릴발살탄으로 변경"], "answer": [4], "explanation": "환자는 좌심실 박출률이 35%인 심부전 환자로, ACEi(enalapril), 베타차단제(carvedilol), MRA(spironolactone), 루프이뇨제(furosemide)를 복용 중임에도 불구하고 숨찬 증상이 지속되고 있습니다. 이러한 경우, ACEi를 ARNI(Angiotensin Receptor-Neprilysin Inhibitor)인 Sacubitril/Valsartan으로 변경하는 것이 심부전의 예후 개선에 가장 효과적인 다음 단계 치료입니다. ARNI는 심부전 환자의 사망률과 입원율을 유의하게 감소시키는 것으로 입증된 핵심 약제입니다. 환자는 부종이나 폐울혈의 증상이 명확하지 않으므로 이뇨제 증량은 우선적인 고려 대상이 아닙니다."}, {"subject": "심부전 임상접근", "year": ["21학번", "20학번", "19학번", "18학번", "17학번", "16학번", "15학번", "14학번", "13학번"], "professor": "윤종찬", "question": "치료는?", "images": [], "text_box": "56세 여자가 1달 전에 감기에 걸린 후 전일 호흡곤란 및 흉통으로 내원했다. 혈압 115/65 mmHg, BNP 503 pg/mL 이다. 혈액검사 및 폐 X선 사진이다.\n혈색소 7.0 g/dL 백혈구 15,040/µL 혈소판 100,000/μL", "options": ["Nitrate iv", "Digoxin iv", "Heparin iv", "Amiodarone iv", "Dobutamine iv"], "answer": [0], "explanation": "환자는 급성 호흡곤란과 흉통을 주소로 내원했으며, 흉부 X-ray에서 폐울혈 또는 폐부종 소견이 의심됩니다. 이는 급성 비보상성 심부전을 시사하는 소견입니다. 혈압이 115/65 mmHg로 비교적 유지되고 있으므로, 전부하를 감소시키기 위한 정맥용 혈관확장제, 특히 Nitrate (nitroglycerin) 정맥 투여가 가장 적절한 초기 치료입니다. Nitrate는 정맥을 확장시켜 심장으로 돌아오는 혈액량을 줄여 폐울혈을 빠르게 완화시키는 효과가 있습니다. 도부타민은 쇼크 증상이 있을 때 주로 사용되며, 헤파린이나 아미오다론은 다른 적응증이 있습니다."}, {"subject": "심부전 임상접근", "year": ["20학번"], "professor": "서석민", "question": "이 환자의 기저 질환으로 가능성이 가장 높은 것은?", "images": [], "text_box": "27세 남자 환자가 3주 동안 지속된 기침과 호흡곤란으로 1년간 적절한 치료를 받았다. 다음은 치료 전의 흉부 방사선 소견 그리고 1년 뒤 증상 호전이 있은 후의 소견이다.", "options": ["판막질환", "관상동맥질환", "선천성 심기형", "확장성 심근병증", "알코올성 심부전"], "answer": [4], "explanation": "치료 전 흉부 X-선 사진에서 심비대가 심하게 관찰되고, 1년 후 증상 호전과 함께 심장 크기가 현저히 감소한 소견은 가역적인 심근 손상에 의한 확장성 심근병증을 시사합니다. 특히 젊은 연령의 환자에서 확장성 심근병증은 다양한 원인에 의해 발생할 수 있습니다. 알코올성 심근병증은 확장성 심근병증의 한 형태로, 알코올 섭취를 중단하면 심장 기능이 상당 부분 회복될 수 있으므로, 치료 전후의 영상 소견에 가장 부합하는 진단입니다."}, {"subject": "심부전 임상접근", "year": ["19학번"], "professor": "서석민", "question": "다음 중 심부전의 전형적 증상으로 옳은 것은?", "images": [], "text_box": null, "options": ["얼굴 부음", "천명음", "우측 발목 부음", "좌측 흉수", "누우면 숨이 가쁘고 앉으면 편안해진다"], "answer": [4], "explanation": "심부전의 전형적인 증상으로는 호흡곤란, 특히 활동 시 악화되는 운동성 호흡곤란, 양측 하지 부종, 그리고 기좌호흡(Orthopnea)이 있습니다. 기좌호흡은 누운 자세에서 심장으로 돌아오는 혈액량이 증가하여 폐울혈이 심해져 숨이 차고, 앉으면 증상이 완화되는 특징을 보입니다. 얼굴 부종이나 한쪽 발목 부종은 심부전의 전형적인 증상으로 보기 어려우며, 천명음이나 좌측 흉수는 다른 폐 질환과도 관련될 수 있어 특이적이지 않습니다."}, {"subject": "심부전 임상접근", "year": ["19학번"], "professor": "서석민", "question": "심부전 치료 후 퇴원하는 환자에게 해줄 수 있는 조언은?", "images": [], "text_box": "입원 초기 BNP 는 3300 이었고, 심초음파에서 심구출률이 17%였다.", "options": ["숨이 찬 운동 권고", "저염식이 및 수분 제한 권고", "퇴원 후 집안에서 2주동안 안정 권고", "육식을 금하고 채식 위주의 식단 권고", "금연을 하고 하루에 적포도주 한잔 권고"], "answer": [0], "explanation": "심부전 환자에게는 증상에 맞춰 조절된 유산소 운동이 권고됩니다. 규칙적인 운동은 심장 기능을 강화하고 삶의 질을 향상시킬 수 있습니다. 저염식이는 중요하지만, 심한 수분 제한은 일반적으로 권고되지 않습니다. 퇴원 후에는 점진적으로 사회생활로 복귀하며 활동량을 늘리는 것이 좋고, 특정 식단 제한보다는 균형 잡힌 식사가 중요합니다. 금연과 금주는 필수적이지만, 소량의 적포도주도 심부전 환자에게는 해로울 수 있으므로 완전히 금하는 것이 좋습니다."}, {"subject": "심부전 임상접근", "year": ["19학번", "18학번"], "professor": "서석민", "question": "우선적으로 시행해야 하는 혈액검사는?", "images": [], "text_box": "60세 여자가 한달 전부터 걸으면 숨이 차서 병원에 왔다. 누우면 숨이 차고, 새벽에도 숨이 차서 잠에서 깬다. 7년 전부터 혈압강하제와 혈당강하제를 복용하고 있다. 혈압 120/70, 맥박 84, 호흡 20, 체온 36.6도이다. 가슴 청진할 때 제3심음이 들리고, 양쪽 등쪽 아랫부분에서 거품소리가 들린다. 가슴 x 선사진이다.", "options": ["D-이량체", "트로포닌-T", "C-반응단백질", "크레아틴키나이제", "뇌나트륨이뇨펩티드"], "answer": [4], "explanation": "환자는 운동 시 호흡곤란, 기좌호흡, 야간 호흡곤란 등 심부전의 전형적인 증상을 보이며, 가슴 청진에서 제3심음과 폐에서 거품소리가 들리는 것은 폐울혈을 시사합니다. 또한 흉부 X-ray 소견도 심부전을 뒷받침합니다. 이처럼 심부전이 강하게 의심되는 경우, 심부전의 진단을 확진하고 중증도를 평가하는 데 가장 유용한 혈액 검사는 뇌나트륨이뇨펩티드(BNP 또는 NT-proBNP)입니다. BNP는 심장에 가해지는 압력과 용량 부하에 반응하여 분비되는 호르몬으로, 심부전 시 그 수치가 유의미하게 상승합니다."}, {"subject": "심부전 임상접근", "year": ["19학번"], "professor": "윤종찬", "question": "심전도는 다음과 같을 때 치료는?", "images": [], "text_box": "51세 남자가 호흡곤란과 양측 하지부종으로 내원하였다. 2년 전부터 좌심실구혈률 25%로 심부전치료를 받아왔다. 콩고르 (ACEi) 1.25mg, 라식스(이뇨제) 2.5mg, 라미프릴 (B blocker) 20mg 을 복용하였다. 호흡 곤란은 이뇨제 복용으로 개선이 되었지만 좌심실구혈률은 24%로 진전이 없었다. 심전도 : II, III, aVR, aVF QRS 가 뒤집힌(?) 형태?? Wide QRS 는 확실", "options": ["디곡신 추가", "이바브라딘 추가", "아미오다른 추가", "심장재동기화 치료", "안지오텐신-네프실린 inhibitor"], "answer": [3], "explanation": "환자는 좌심실구혈률이 감소된 심부전(HFrEF) 환자이며, 기존의 약물 치료에도 불구하고 증상 개선이 없고 LVEF가 낮은 상태입니다. 심전도에서 Wide QRS가 관찰되므로 심장재동기화치료(CRT)를 고려해야 합니다. CRT는 QRS duration이 길고 LVEF가 낮은 환자에서 심실 수축의 동기화를 개선하여 증상 및 생존율을 향상시킬 수 있습니다. 특히, QRS duration이 150ms 이상인 LBBB 환자에서 Class I 권고 사항입니다."}, {"subject": "심부전 임상접근", "year": ["19학번"], "professor": "윤종찬", "question": "해당치료는?", "images": [], "text_box": "박출량 감소성 심부전을 5년간 앓고 있었는데 표준적 심부전 치료에 반응하지 않고 6개월 전부턴 부종, 호흡곤란이 지속적으로 나타났다. 심장이식을 시행해야 하는 상황이지만 폐고혈압이 있어 BTT(Bridge to transplantation)로 치료를 시행한 사진이다.", "options": ["Pacemaker", "ICD", "CRT", "LVAD", "TAF"], "answer": [3], "explanation": "환자는 난치성 심부전으로 표준 치료에 반응하지 않고 이식이 필요한 상태입니다. 그러나 폐고혈압으로 인해 즉각적인 심장이식이 어려운 상황에서 Bridge to Transplantation (BTT) 치료를 받고 있습니다. BTT는 이식을 기다리는 동안 환자의 심장 기능을 보조하는 장치로, 좌심실 보조장치(LVAD)가 대표적입니다. 흉부 X-ray 사진에서도 좌심실 보조장치(LVAD)의 삽입된 모습을 확인할 수 있습니다."}, {"subject": "심부전 임상접근", "year": ["18학번"], "professor": "서석민", "question": "다음 환자의 진단을 위해 우선 시행할 검사는?", "images": [], "text_box": "68세 여자 호흡곤란 및 하지부종으로 내원. 생체징후는 정상이다. 심전도에서는 sinus tachycardia소견, 가슴 x 선에서 심비대 및 흉수가 있었다.", "options": ["CK-MB", "D-dimer", "Troponin", "C-reactive protein", "B-type natriuretic peptide"], "answer": [4], "explanation": "환자는 호흡곤란과 하지부종, 심비대, 흉수 등의 증상과 징후를 보이고 있어 심부전이 강력하게 의심됩니다. 이러한 임상 상황에서 심부전을 진단하고 중증도를 평가하기 위해 가장 우선적으로 시행해야 할 혈액 검사는 B-type natriuretic peptide (BNP) 또는 N-말단 pro-BNP (NT-proBNP)입니다. 이 바이오마커들은 심장에 스트레스가 가해질 때 분비되어 심부전의 유무와 중증도를 반영하며, 다른 심질환과의 감별 진단에도 유용합니다. 다른 검사들은 주로 심근 손상이나 염증 등을 평가합니다."}, {"subject": "심부전 임상접근", "year": ["18학번", "16학번"], "professor": "서석민", "question": "다음의 대상중에 심부전에 가장 합당한 환자는?", "images": [], "text_box": null, "options": ["운동시 호흡곤란, 양폐의 천명음, 심초음파 EF 59%인 65세", "호흡곤란이있고좌측의흉수가있는 BNP 50pg/ml인 75세", "양다리부종, 기좌호흡이 있는 흉부방사선에서 폐부종 동반한 좌각차단이 있는 43세", "최근 자꾸 기운이 없고 얼굴이 붓는 증상, 심전도상에서 좌각차단이 있는 43세", "우측발목이 붓고, 언덕 오르면 숨이 찬 증상, 흉부방사선에서 경도의 심비대가있는 55세"], "answer": [2], "explanation": "심부전 진단은 전형적인 증상, 징후, 그리고 심장의 구조적 또는 기능적 이상이 동반될 때 이루어집니다. 3번 환자는 양다리 부종과 기좌호흡이라는 심부전의 전형적인 증상 및 징후를 보이고 있습니다. 또한, 흉부 X-ray에서 폐부종이 동반되어 있고 심전도에서 좌각차단(LBBB)은 심장의 구조적/기능적 이상을 시사하므로 심부전에 가장 합당한 경우입니다. 다른 보기들은 증상이 비특이적이거나, BNP 수치가 낮거나, EF가 정상 범위에 있어 심부전 가능성이 상대적으로 낮습니다."}, {"subject": "심부전 임상접근", "year": ["18학번"], "professor": "윤종찬", "question": "환자의 심부전 치료에 필요한 조치는?", "images": [], "text_box": "65세 심부전 있는 남자 환자가 전달보다 호흡 곤란이 심해져 내원하였다.\n- 다리에 함요부종 관찰\n- 혈압 110/80mmHg, 심박수 58회/분\n- 심초음파: 좌심실 구혈률 40%, 심전도: sinus rhythm\n- BUN/Cr 40/1.8mg/dl, Na 132, K 5.5\n- 복용 약제: ramipril 2.5mg 오전, carvedilol 12.5mg 오전/오후 2회", "options": ["Ramipril 용량 배가", "Carvedilol 용량 배가", "Spironolactone 추가", "Lasix 추가", "Cardiac resynchronization therapy (CRT) 시행"], "answer": [3], "explanation": "환자는 심부전 병력이 있고, 호흡곤란이 심해졌으며 다리에 함요부종이 관찰되는 것은 체액 과다 및 폐울혈을 시사합니다. 현재 이뇨제로 Lasix를 복용하고 있지만 증상이 악화되었으므로, 급성기 증상 완화를 위해 Lasix와 같은 루프 이뇨제의 용량을 늘리거나 추가하는 것이 필요합니다. 루프 이뇨제는 체내 수분과 나트륨 배출을 촉진하여 혈액량과 전부하를 감소시키고, 심부전 증상을 빠르게 완화시키는 데 효과적입니다."}, {"subject": "심부전 임상접근", "year": ["18학번"], "professor": "윤종찬", "question": "고려할 수 있는 가장 적합한 치료는?", "images": [], "text_box": "5년 전 수축기 심부전으로 진단 받은 65세 남자가 그동안 표준 심부전 약물치료중에도 불구하고 최근 6개월간 반복되는 호흡곤란을 주소로 내원하였다. 간단한 일상생활에도 호흡곤란, 피곤함 등이 발생하였으나 휴식시에는 약간 호전되는 양상의 NYHA class III이었다. 심전도소견에서 QRS duration ≥ 130ms인 좌각차단(LBBB) 이었고, 심초음파의 왼심실박출률은 17 % (참조: 정상치 ≥55%) 인 점을 감안할 때 고려할 수 있는 가장 적합한 치료는?", "options": ["디곡신 (Digoxin)", "승압제 (Inotropics)", "인공심박동기 (Pacemaker)", "심장재동기화치료 (Cardiac resynchronization therapy)", "좌심실보조장치 (Left ventricle assist device)"], "answer": [3], "explanation": "환자는 만성 심부전으로 표준 약물치료에도 불구하고 증상이 악화되었고, NYHA Class III에 해당합니다. 심초음파상 좌심실 박출률이 17%로 매우 낮고, 심전도에서 QRS duration이 130ms 이상인 좌각차단(LBBB)이 관찰됩니다. 이와 같은 소견은 심실의 비동시성 수축을 시사하며, 심장재동기화치료(CRT)의 강력한 적응증입니다. CRT는 심실의 수축 동기화를 개선하여 심박출량을 증가시키고 심부전 증상을 완화하며 예후를 호전시키는 데 효과적입니다. 일반적으로 CRT는 LVEF ≤ 35%, LBBB, QRS duration ≥ 150ms인 경우 Class I 권고되나, 130-149ms의 경우도 고려될 수 있습니다."}, {"subject": "심부전 임상접근", "year": ["18학번"], "professor": "윤종찬", "question": "환자에게 필요한 조치는?", "images": [], "text_box": "75세 남자가 심부전으로 치료 중으로 현재 약제를 복용중에 있다. 최근에 호흡곤란이 심해져 내원하였다.\n- 다리의 함요부종이 관찰\n- 혈압 110/80mmHg, 심박수 50회/분\n- 심초음파: 좌심실 구혈률 33%로 1년 전과 같음\n- HLDL/Cr 40/2.11 mg/dl Na 132 K 6.0\n- 복용약제 라미프릴 2.5mg 아침, 딜라트렌 6.25mg 오전, 오후, 라식스 20mg", "options": ["라미프릴 (안지오텐신 전환효소 억제제) 증량", "딜라트렌 (베타 차단제) 감량", "알닥톤 (칼륨 보존 이뇨제 추가", "라식스 (사구체 루프 작용 이뇨제)추가", "도부타민 (강심제) 추가"], "answer": [3], "explanation": "환자는 만성 심부전 환자로, 기존 약물치료 중에도 호흡곤란과 다리 부종이 심해져 내원했습니다. 이는 심부전 악화로 인한 체액 과다 상태를 나타냅니다. 현재 라식스 20mg을 복용 중이나 증상 개선이 없으므로, 체액 과다 증상 완화를 위해 루프 이뇨제인 라식스의 용량을 증량하는 것이 가장 적절한 초기 조치입니다. 루프 이뇨제는 신장에서 수분 및 나트륨 배출을 강력하게 촉진하여 폐울혈과 말초 부종을 효과적으로 경감시킵니다. 다른 약제들은 체액 상태를 직접적으로 조절하기 어렵습니다."}, {"subject": "심부전 임상접근", "year": ["17학번"], "professor": "백상홍", "question": "현재 이 환자의 미국심장학회/미국심장협회분류 심부전 단계(AHA/ACC stage)는?", "images": [], "text_box": "67세 남자가 중등도의 호흡곤란과 양측 정강이뼈앞 오목부종을 주소로 내원하였는데 NYHA functional class3 이 고, 이학적 검사 결과 양쪽 등 아랫부분에서 거품소리와 심첨부위에 수축기 심잡음(grade4/6)이 들렸다. 심초음파 검사에서 좌심실과 좌심방의 중등도 확장이 관찰되었다. 심박출률은 88%(정상치>55%)이다. 약물 치료 후 임상상태는 개선되었고, 추적 심초음파검사상 왼심실 박출율은 43%로 개선되었다.", "options": ["A 단계", "B 단계", "C 단계", "D 단계"], "answer": [2], "explanation": "심부전의 AHA/ACC 단계 분류에서, Stage C는 심장 질환의 구조적 이상이 있거나 기능적 이상이 있으면서 과거 또는 현재 심부전 증상을 경험한 경우를 의미합니다. 환자는 초기 심박출률이 88%로 보존되었으나, 심실 및 심방의 확장이 관찰되어 구조적 이상이 있었습니다. 또한 중등도의 호흡곤란과 부종, NYHA class III 증상을 경험했습니다. 약물 치료 후 증상이 개선되었지만, 이미 증상을 경험했기 때문에 Stage C에 해당합니다. Stage D는 지속적인 증상과 난치성 심부전을 의미합니다."}, {"subject": "심부전 임상접근", "year": ["16학번", "15학번", "14학번", "13학번"], "professor": null, "question": "ACC/AHA classification에 따른 심부전 병기는?", "images": [], "text_box": "70세 여자가 고혈압으로 약물 치료중이었지만 평소 별다른 증상 없이 NYHA class I 로 생활하였다. 최근 대퇴골 골절로 수술을 위해 입원하였다. 수술 전 평가를 위해 시행한 심장초음파 상 다음과 같은 결과를 보였을 때", "options": ["stage A", "stage B", "stage C", "stage D"], "answer": [1], "explanation": "ACC/AHA 심부전 분류에서 Stage A는 심부전 위험인자만 있고 심장 구조나 기능에 이상이 없는 경우입니다. Stage B는 심부전 증상은 없지만 심장의 구조적 질환이나 기능적 이상이 있는 경우를 의미합니다. 환자는 고혈압 병력이 있으나 증상은 없었고, 심초음파 결과에서 Interventricular septum과 LV posterior wall의 두께가 정상치를 벗어나 증가되어 있는 것이 확인됩니다. 이는 심장 구조의 이상을 시사하므로, 증상이 없는 상태에서 심장 구조 이상이 있는 Stage B에 해당합니다."}, {"subject": "심부전 임상접근", "year": ["15학번", "14학번", "13학번", "12학번"], "professor": null, "question": "수축기 심부전환자의 약물치료를 언급한 내용중 가장 맞는 것은?", "images": [], "text_box": null, "options": ["수축기 심부전 병태생리기전 중 신경계호르몬의 작용은 교감신경계와 레닌-엔지오텐신-알도스테론계의비활성화이므로 심부전치료시 이들의 즉각적인 활성화가 중요하다.", "만성 심부전 치료시 약물치료 순서는 반드시 엔지오텐신전환 효소억제제를 우선 처방후, 베타차단제를 처방하여야 환자 사망률을 감소시킨다.", "디기탈리스는 심부전 재입원률은 감소시키지만, 심혈관 사망률은 감소시키지 않는다.", "울혈성 심부전시 퓨로새마이드는 전부하감소로 환자사망률을 감소시킨다."], "answer": [2], "explanation": "수축기 심부전의 병태생리에는 교감신경계와 레닌-안지오텐신-알도스테론계의 과활성화가 중요하므로, 이들의 '억제'가 치료의 핵심입니다. 디기탈리스는 심부전으로 인한 재입원율은 감소시키는 효과가 있지만, 심혈관 사망률 자체를 유의미하게 감소시키지는 못하는 것으로 알려져 있습니다. 울혈성 심부전에서 푸로세마이드와 같은 이뇨제는 증상 완화와 전부하 감소에 효과적이지만, 환자의 사망률을 직접적으로 감소시키는 효과는 입증되지 않았습니다. 약물 치료의 순서는 환자 상태에 따라 다르며, 엔지오텐신 전환효소 억제제와 베타차단제 모두 사망률 감소에 중요합니다."}, {"subject": "심부전 임상접근", "year": ["15학번", "14학번"], "professor": null, "question": "아래 내용 중 가장 올바른 것은?", "images": [], "text_box": "68세 남자환자가 좌심실구축력(LVEF) 35% (참조: 정상치>55%)인 NYHA functional class IV인 급성 심부전으로 응급실 방문 후 입원한 뒤, 표준 약물치료 후 NYHA class II로 상태가 호전되어 퇴원을 계획 중이다. 퇴원 시 환자에게 엔지오텐신전환효소억제제, 알도스테론길항제 등 약제의 유효성과 안정성을 설명하였고, 추가로 환자에게 이뇨제인 퓨로세마이드에 관하여 설명하고자 한다.", "options": ["퓨로세마이드는 유병률 감소효과는 있지만, 사망률 감소효과는 없다.", "퓨로세마이드를 추가하는 것은 유병률과 사망률 감소효과는 없다", "퓨로세마이드를 추가하는 것은 재입원률은 감소시킬 수 있지만, NYHA 기능적 분류를개선시키는 효과는 없다", "퓨로세마이드를 추가하는 것은 후부하 감소효과로 심장기능을 개선시킨다"], "answer": [1], "explanation": "퓨로세마이드와 같은 루프 이뇨제는 급성 심부전 환자의 증상 완화와 체액 과다 해소에 매우 효과적입니다. 이는 환자의 유병률(증상으로 인한 질병 부담)을 감소시키는 데 도움이 됩니다. 그러나 이뇨제는 심부전 환자의 사망률을 직접적으로 감소시키는 효과는 입증되지 않았습니다. 사망률 감소 효과는 ACE 억제제, 베타차단제, MRA, SGLT2i와 같은 '가이드라인 지향 약물 치료'에서 주로 기대됩니다. 이뇨제는 후부하 감소 효과는 있지만, 심장 기능을 근본적으로 개선시키는 약제는 아닙니다."}, {"subject": "심부전 임상접근", "year": [], "professor": null, "question": "다음 중에 전부하를 줄이는 방법은?", "images": [], "text_box": "심부전 환자의 증상 개선을 위한 전부하의 감소가 가장 중요하다.", "options": ["물 제한", "강심제 추가", "혈관확장제 추가", "베타 차단제 추가", "양와위 유지"], "answer": [2], "explanation": "전부하(Preload)는 심장이 수축하기 전에 심실에 채워지는 혈액의 양과 심실벽에 가해지는 장력을 의미합니다. 심부전 환자에서 전부하 감소는 폐울혈이나 부종과 같은 증상을 완화하는 데 중요합니다. 혈관확장제는 정맥을 확장시켜 혈액이 심장으로 돌아오는 양(정맥 환류)을 줄임으로써 전부하를 효과적으로 감소시킵니다. 대표적인 혈관확장제로는 질산염 제제 등이 있으며, ARNI, ACE 억제제, ARB 등도 혈관확장 효과를 통해 전부하 감소에 기여합니다. 물 제한은 직접적인 전부하 조절보다는 체액량 관리에 가깝습니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "서석민", "question": "심부전 환자의 증상 개선을 위한 전부하의 감소가 가장 중요하다. 다음 중에 전부하를 줄이는 방법은?", "images": [], "text_box": null, "options": ["물 제한", "강심제 추가", "혈관확장제 추가", "베타 차단제 추가", "양와위 유지"], "answer": [2], "explanation": "전부하는 심장 이완기 말에 좌심실에 채워지는 혈액량에 의해 결정되는 압력입니다. 심부전 환자에서 전부하가 증가하면 폐울혈과 호흡곤란 같은 증상이 악화될 수 있습니다. 혈관확장제는 정맥을 확장시켜 심장으로 돌아오는 혈액량을 줄임으로써 전부하를 효과적으로 감소시킵니다. 이는 심장의 부담을 덜어주고 증상 개선에 도움을 줍니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["12학번"], "professor": "서석민", "question": "환자의 ACC/AHA 분류상 심부전 평가는?", "images": [], "text_box": "63세 고혈압 환자로 3층을 빠른 걸음으로 올라갈 때 숨이 차나 일상 생활에는 숨이 차지 않는다고 한다. 환자의 심전도이다.", "options": ["Stage A", "Stage B", "Stage C", "Stage D", "Stage E"], "answer": [1], "explanation": "환자는 3층을 빠르게 걸을 때 숨이 차는 증상이 있지만, 일상생활에서는 증상이 없습니다. 이는 NYHA 기능 분류 상 Class II에 해당합니다. 심전도에서 좌심실 비대 소견이 관찰됩니다. ACC/AHA 심부전 분류에서 Stage B는 심부전 증상은 없지만, 심장 구조적 이상(이 경우 고혈압에 의한 좌심실 비대)이 있는 상태를 의미합니다. 비록 경미한 증상이 있지만, 이는 심장 기능의 잠재적 이상을 나타냅니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["11학번"], "professor": "서석민", "question": "환자에 대한 다음 설명 중에서 가장 옳은 것은?", "images": [], "text_box": "건강 검진을 받은 52세 남자가 심전도 상에서 좌각차단 (LBBB)이 확인이 되어 왔다. 심초음파에서 좌심실 구혈률이 45%였다. 그간 특별한 기저질환 없이 비타민 C 제제만 하루 500mg을 복용했으며 운동 중에 호흡곤란 및 흉통도 없었다고 한다. 혈압은 140/90mmHg로 측정되었다.", "options": ["운동을 제한해야 함을 설명한다.", "저염식의 필요성과 수분 섭취의 제한이 중요함을 설명한다.", "비행을 통한 해외 여행은 가급적 자제하는 것이 좋다고 설명한다.", "아스피린으로 심뇌혈관 질환을 예방할 필요가 있다.", "혈압이 많이 안 높지만 전환효소차단제 또는 베타차단제가 도움이 될 수 있음을 알리고 처방한다."], "answer": [4], "explanation": "환자는 좌각차단(LBBB)과 좌심실 구혈률 45%로 심장 구조적 이상이 있지만, 아직 심부전 증상은 없습니다. 이는 ACC/AHA Stage B 심부전에 해당합니다. Stage B 환자에게는 심부전 진행을 예방하기 위한 약물 치료가 중요하며, ACEi(전환효소차단제) 또는 ARB와 베타차단제가 권장됩니다. 이 약물들은 심장 기능을 보호하고 심혈관 사건 발생 위험을 감소시킵니다. 현재 혈압이 심하게 높지 않더라도 심장 보호를 위해 이 약물들을 고려하는 것이 적절합니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["10학번"], "professor": "서석민", "question": "고려해 볼 수 있는 가장 적합한 치료는?", "images": [], "text_box": "1년 전 수축기 심부전으로 진단을 받은 65세 남자가 약물 치료 중에도 반복되는 호흡곤란을 주소로 내원하였다. 호흡곤란은 간단한 일상생활에도 발생하였으나 휴식시에는 호전되는 양상이었다. 내원하여 시행한 심전도 및 심초음파의 소견 (좌심실구축력 17%)이 다음과 같을 때", "options": ["디곡신 (digoxin)", "승압제 (inotropic)", "인공 심방동기 (pacemaker)", "심장제동기화 치료 (cardiac resynchronization therapy)", "좌심실보조장치 (left ventricle assist device)"], "answer": [3], "explanation": "환자는 LVEF 17%의 중증 심구출률 저하 심부전(HFrEF)으로 약물 치료에도 불구하고 반복적인 호흡곤란을 겪고 있습니다. 심전도 소견(제공된 이미지에 LBBB 및 넓은 QRS가 추정됨)과 심한 좌심실 기능 저하는 심장재동기화 치료(CRT)의 적응증이 됩니다. CRT는 심장 수축의 동시성을 개선하여 심기능을 향상시키고 증상을 완화하며, 사망률을 줄일 수 있습니다. 또한, 이 정도의 LVEF에서는 급성 심장사 위험이 높아 ICD (Implantable Cardioverter-Defibrillator) 동반을 고려해야 합니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["10학번"], "professor": "서석민", "question": "환자의 진단을 위해 시행할 수 있는 검사 중에 가장 도움이 되는 것은?", "images": [], "text_box": "68세 남자환자는 1주 전부터 시작된 호흡곤란 및 전신 부종을 주소로 응급실에 방문하였다. 흉부방사선 소견 은 다음과 같았다.", "options": ["B-type natriuretic peptide", "C-reactive protein", "brain derived neurotrophic factor", "troponin-I", "complete blood count"], "answer": [0], "explanation": "환자는 호흡곤란 및 전신 부종을 주소로 응급실에 내원하였으며, 흉부 X선에서 폐울혈 또는 심비대와 같은 심부전 소견이 관찰될 가능성이 높습니다. 이러한 증상과 영상 소견은 급성 심부전을 시사합니다. 심부전의 진단에 가장 유용한 검사 중 하나는 B-type natriuretic peptide (BNP) 측정입니다. BNP 수치는 심장 기능 부전 시 증가하며, 심부전의 진단, 중증도 평가 및 예후 예측에 중요한 정보를 제공합니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["09학번"], "professor": "서석민", "question": "현재 이 환자의 미국심장협회분류 심부전 단계 (stage)는?", "images": [], "text_box": "60세 여자 환자가 중등도의 호흡곤란과 양측 하지 부종을 주소로 내원하였다. 이학적 검사 결과 양측 폐하부 에 수포음과 심첨부위에 수축기 심잡음이 들렸다. 시행한 심초음파 검사에서 좌심실 과 좌심방의 확장이 관찰되었고, 좌심실 구혈률은 35%로 측정되었다. 약물치료 후 임상상태 개선이 있었고(증상이 없어진 것은 아님), 추적 심초음파 검사상 좌심실 구혈률은 40%로 개선이 있었다.", "options": ["A 단계", "B 단계", "C 단계", "D 단계"], "answer": [2], "explanation": "환자는 과거 중등도의 호흡곤란과 하지 부종을 겪었으며(NYHA Class II 또는 III), 좌심실 구혈률이 35%에서 40%로 개선되었지만 여전히 기능 저하가 있습니다. 심초음파에서 좌심실 및 좌심방 확장과 수축기 심잡음 등 구조적 이상도 관찰됩니다. ACC/AHA 심부전 분류에서 Stage C는 과거 또는 현재에 심부전 증상이 있었고, 심장 구조적 또는 기능적 이상이 있는 단계에 해당합니다. 약물 치료 후 증상이 완전히 없어진 것은 아니지만 임상 상태가 개선되었으므로 Stage D (말기 심부전)는 아닙니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["09학번"], "professor": "서석민", "question": "다음 중 환자에게 적절한 상담이 아닌 것은?", "images": [], "text_box": "42세 남자 흡연가가 건강검진에서 심초음파 검사 상에서 심구출률이 45%로 저하된 결과를 보였다. 10년 전부 터 혈압이 약간 높았다고 알고 있었으나 무시했다고 한다. 혈압은 150/90 이었고 신 기능, 전해질은 정상이었다. 환자는 평소 호흡곤란이나 부종의 증상을 전혀 느끼지 못하였다고 한 다.", "options": ["저염식 식단을 권고한다.", "금연 및 고지혈증의 치료에 대해 설명한다.", "최대 맥박의 80% 정도의 유산소 운동을 처방한다.", "고혈압에 대한 검사 및 치료에 대해 설명한다.", "미국으로의 비행기 여행이 어려움을 설명한다."], "answer": [4], "explanation": "환자는 심구출률 45%로 심기능 저하가 있지만 아직 무증상이며, 고혈압, 흡연과 같은 심혈관 위험인자를 가지고 있습니다. 이는 ACC/AHA Stage B 심부전에 해당합니다. Stage B 환자는 일상생활에 제한이 없으므로 비행기 여행이 불가능하다고 설명할 필요는 없습니다. 오히려 금연, 고혈압 조절, 저염식, 적절한 유산소 운동(최대 맥박의 80%는 다소 과할 수 있으나 유산소 운동 자체는 권장됨) 등 생활 습관 개선과 심부전 진행을 억제하는 약물 치료를 시작하는 것이 중요합니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["21학번"], "professor": "", "question": "갑작스럽게 시작된 흉통과 호흡곤란으로 내원한 48세 여자 환자의 CT 소견이다. 가장 올바른 진단명은?", "images": [], "text_box": "갑작스럽게 시작된 흉통과 호흡곤란으로 내원한 48세 여자 환자의 CT 소견이다.", "options": ["폐암", "폐흡충증", "폐농양", "폐색전증", "폐부종"], "answer": [3], "explanation": "양쪽 폐동맥에 검게 혈전이 찬 것이 보입니다. 폐색전증 (PE)입니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["21학번", "20학번"], "professor": "이정은", "question": "가장 적절한 검사는?", "images": [], "text_box": "52세 여자가 호흡곤란과 흉통을 호소하며 응급실에 왔다. 3일전 자궁근종으로 복강경을 이용한 자궁 적출술을 시행하였다. 혈압은 120/80 mmHg, 호흡수 30회/분, 왼쪽 폐호흡음이 감소되어 있었고 심잡음은 청진되지 않았다. 심전도와 흉부 X선이다.", "options": ["트로포닌", "심장혈관 조영술", "흉부 전산화 단층 촬영", "심장 초음파", "복구실패"], "answer": [2], "explanation": "Pulmonary embolism이 의심됩니다. 선지 중 PE 진단에 이용할 수 있는 건 흉부 CT와 심장 초음파입니다. 올해 수업에서는 혈역학적으로 불안정한 환자의 경우 bedside에서 심장 초음파를 먼저 찍지만, PE가 강하게 의심되는 경우나 혈역학적으로 안정적인 환자에서는 CT를 찍어 확진한다고 배웠습니다. 이정은 교수님은 PE 진단의 1st line은 흉부 CT라는 것을 강조하셨습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["21학번"], "professor": "정정임", "question": "흉부 X-선 후전사진이다. 종격동 변연을 살펴보았을 때 가능한 질환은?", "images": [], "text_box": null, "options": ["대동맥 박리", "삼첨판 부전", "폐동맥 고혈압", "승모판막 협착", "대동맥판막 협착"], "answer": [2], "explanation": "Pulmonary artery가 커져 있습니다. 폐동맥 고혈압이 의심됩니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["20학번"], "professor": "정정임", "question": "흉부 X선 후전사진이다. 정상에 비해 커지거나 늘어난 구조물은?", "images": [], "text_box": null, "options": ["우심실", "좌심방", "좌심실", "주폐동맥", "상행대동맥"], "answer": [3], "explanation": "현장에서 봤던 사진은 폐동맥 확장과 비슷했습니다. 이미지에서 정상에 비해 커지거나 늘어난 구조물은 주폐동맥으로 보입니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["19학번"], "professor": "", "question": "70세 남환자가 신발을 신지 못할 정도의 하지부종을 동반한 호흡곤란을 호소하여 내원하였다. 다음 중 환자를 위해 알맞은 치료는?", "images": [], "text_box": "70세 남환자가 신발을 신지 못할 정도의 하지부종을 동반한 호흡곤란을 호소하여 내원하였다.", "options": ["가정산소요법", "Low molecular heparin", "재조합 tPA", "PDE5 억제제 주입", "심낭절제술"], "answer": [1], "explanation": "하지부종을 동반한 것으로 보아 DVT에 의한 PE라고 생각됩니다. CT 사진에서 폐동맥이 혈전에 의해 막힌 것을 볼 수 있습니다. 이 환자가 High risk 환자라면 재조합 tPA를 주어야 하고, Intermediate risk 환자라면 Low molecular heparin을 줄 수 있습니다. 그러나 문제의 정보만으로는 환자가 어느 군에 속하는지 확신할 수 없습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["18학번"], "professor": "", "question": "42세 여자 환자가 심한 호흡곤란으로 내원하였다. 흉부 X-선 사진은 다음과 같을 때, 다음 검사 소견 중 불가능한 것은 어떤 것인가?", "images": [], "text_box": "42세 여자 환자가 심한 호흡곤란으로 내원하였다.", "options": ["Aorta, systolic pressure: 110 mmHg", "Left ventricle, end diastolic pressure: ?", "Pulmonary capillary wedge pressure: 14 mmHg", "Pulmonary artery, systolic pressure: 45 mmHg", "Right atrium, mean pressure: 4 mmHg"], "answer": [2], "explanation": "폐부종이 있으므로 PCWP가 높은 상태입니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["18학번", "16학번", "15학번"], "professor": "김미정", "question": "50세 여자가 호흡곤란으로 왔다. 심도자 검사 결과이다. 진단은?", "images": [], "text_box": "우심방압: 12, 폐동맥압 (수축기/이완기/평균): 70/60/50, 폐모세혈관 쐐기압: 19, 좌심실 이완기말압: 20, 대동맥압 (수축기/이완기/평균): 160/50/110.", "options": ["좌심실부전", "폐동맥고혈압", "대동맥판역류증", "협착성 심낭염", "심방중격결손"], "answer": [2], "explanation": "이번 시간에 배운 내용으로는 mPAP (평균 폐동맥압)이 20 mmHg보다 크므로 폐고혈압 (PH)이고, PAWP (폐모세혈관 쐐기압)이 15 mmHg보다 크므로 precapillary PH와 postcapillary PH가 combined된 형태라는 것만 알 수 있습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["17학번", "16학번"], "professor": "김미정", "question": "폐색전증의 특징에 대한 설명이다. 맞는 것은?", "images": [], "text_box": null, "options": ["혈전의 발생 위치와 폐색의 위치가 같다", "혈류의 저류가 혈전 발생의 주요 기전이다", "혈소판이 혈전의 주요 성분이다", "혈전의 크기가 작다", "심방세동 환자에서 흔하다."], "answer": [1], "explanation": "심부정맥의 혈류 저류에 의해서 혈전이 발생하고 이동하여 폐동맥이 막히는 질환입니다. 동맥에 발생하는 혈전의 주요 성분은 혈소판이고, 정맥에 발생하는 혈전의 주요 성분은 피브린입니다. 심방세동은 뇌졸중과 관련되어 있습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["16학번"], "professor": "김미정", "question": "70세 여자가 의식 저하로 중환자실에 입원 중이다. 뇌 컴퓨터단층촬영 및 가슴 X선(사진)이다. 심부정맥혈전증 예방 치료로 적절한 것은?", "images": [], "text_box": "70세 여자가 의식 저하로 중환자실에 입원 중이다.", "options": ["경과관찰", "아스피린", "리바록사반", "저분자량헤파린", "다리공기압박기"], "answer": [4], "explanation": "대부분 헤파린/저분자량 헤파린으로 예방하고 장기 치료가 필요한 경우에는 와파린이나 rivaroxaban 등의 새로운 경구용 항응고제를 사용합니다. 중추신경계 출혈 위험성이 있으면 pneumatic compression, 악성 종양은 저분자량 헤파린을 사용합니다. 올해 배운 DVT (Deep vein thrombosis)의 예방 방법으로는 다리공기압박기가 있었습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["15학번"], "professor": "김미정", "question": "80세 여자 환자가 숨이 차는 소견으로 병원에 내원했다. 심부정맥혈전증 예방을 위한 조치로 알맞은 것은?", "images": [], "text_box": "80세 여자 환자가 숨이 차는 소견으로 병원에 내원했다.", "options": ["경과관찰", "아스피린", "리바록사반", "저분자량 헤파린", "공기다리압박기"], "answer": [4], "explanation": "올해 배운 DVT (Deep vein thrombosis)의 예방 방법으로는 다리공기압박기가 있었습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["15학번"], "professor": "김미정", "question": "45세 여자환자가 1년전부터 시작된 운동시 호흡곤란으로 병원에 왔다. 왼쪽 5번째 늑간에서 수축기 심잡음이 들리고 들숨 시 더 크게 들렸다. 심도자 소견이다. 진단은?", "images": [], "text_box": "45세 여자환자가 1년전부터 시작된 운동시 호흡곤란으로 병원에 왔다. 왼쪽 5번째 늑간에서 수축기 심잡음이 들리고 들숨 시 더 크게 들렸다.", "options": ["확장성 심근증", "폐정맥 고혈압", "폐동맥 고혈압", "급성 승모판 폐쇄부전", "만성 교착성 심낭염"], "answer": [2], "explanation": "폐 고혈압에 의한 삼첨판 폐쇄부전 원인은 PCWP가 상승하지 않으므로 폐동맥 고혈압입니다. 정상 그래프와 비교해보면 RA, RV의 압력은 전반적으로 상승한 상태이고, PAWP는 정상 범위인 듯합니다. 폐동맥 고혈압으로 진단할 수 있습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["14학번", "13학번", "12학번"], "professor": "김미정", "question": "다음 심도자 검사 결과에 해당하는 진단은?", "images": [], "text_box": "우심방압: 5, 폐동맥압 (수축기/이완기/평균): 90/60/70, 폐모세혈관 쐐기압: 10, 좌심실 이완기말압: 8, 대동맥압 (수축기/이완기/평균): 120/70/86.", "options": ["좌심실부전", "폐동맥고혈압", "승모판 협착증", "협착성 심낭염", "심박중격결손"], "answer": [1], "explanation": "mPAP (평균 폐동맥압)은 20 mmHg보다 크고 PAWP (폐모세혈관 쐐기압)은 15 mmHg보다 작으므로 폐동맥고혈압입니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["14학번", "13학번", "12학번"], "professor": "김미정", "question": "고위험군에서 심부정맥 혈전증 또는 폐색전증 예방치료로 적절한 것은?", "images": [], "text_box": null, "options": ["뇌출혈 수술 후 - rivaroxaban", "기계환기 치료 중 - pneumatic compression", "췌장염 수술 후 - low molecular weight heparin", "고관절 골절 수술 예정 - aspirin", "임신 - rivaroxaban"], "answer": [2], "explanation": "대부분 헤파린/저분자량 헤파린으로 예방하고 장기 치료가 필요한 경우에는 와파린이나 rivaroxaban 등의 새로운 경구용 항응고제를 사용합니다. 중추신경계 출혈 위험성이 있으면 pneumatic compression, 악성종양은 저분자량 헤파린을 사용합니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["13학번"], "professor": "김미정", "question": "적절한 혈액선별검사는?", "images": [], "text_box": "68세 여자 환자가 10일전 고관절 치환술을 받고 안정을 취하는 중에 갑작스럽게 발생한 우측 하지의 이상소견(사진)으로 내원하였다. 환자의 활력징후는 혈압 120/80mmHg, 맥박수 85회/분, 체온 36.5도, 호흡수 20회/분이다.", "options": ["Albumin", "Brain natriuretic peptide", "C reactive protein", "D-dimer", "Troponin"], "answer": [3], "explanation": "급성 심부정맥혈전증으로 급성 하지부종, 정맥성 울혈, 통증이 발생한 경우로 혈전의 대사산물인 d-dimer의 상승이 예측이 됩니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["10학번", "09학번"], "professor": "김미정", "question": "특발성 폐동맥고혈압 치료제가 아닌 것을 고르시오.", "images": [], "text_box": null, "options": ["Etanercept", "Bosentan", "Prostacycline", "Sildenafil", "Nitrate oxide"], "answer": [0], "explanation": "Bosentan은 Endothelin receptor antagonist이고, Sildenafil은 Phosphodiesterase type 5 inhibitor로 NO agonist입니다. Prostacyclin과 Nitric Oxide는 혈관 확장제로 작용하여 폐동맥압을 낮추는 역할을 합니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["10학번"], "professor": "조은주", "question": "43세 여자 환자가 심한 호흡곤란으로 내원하였다. 흉부 X-선 사진은 다음과 같다. 이 환자의 심도자 소견으로 적절하지 않은 것은?", "images": [], "text_box": "43세 여자 환자가 심한 호흡곤란으로 내원하였다.", "options": ["Aorta, systolic pressure: 122mmHg", "Left ventricle, end diastolic pressure: 22mmHg", "Pulmonary capillary wedge pressure: 12mmHg", "Pulmonary artery, systolic pressure: 40mmHg", "Right atrium, mean pressure: 9mmHg"], "answer": [2], "explanation": "폐부종이 있으므로 PCWP가 높은 상태입니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["10학번"], "professor": "조은주", "question": "폐 모세혈관 쐐기압이 상승하는 질환이 아닌 것은?", "images": [], "text_box": null, "options": ["좌심실 부전", "승모판 협착", "특발성 폐동맥 고혈압", "급성 대동맥 폐쇄부전", "폐정맥 폐쇄"], "answer": [2], "explanation": "좌심실부전, MS, 폐정맥 폐쇄 모두 폐로부터 심장으로 향하는 혈류를 차단하므로 PCWP가 증가합니다. 또한 급성 AS에서 역시 LA가 커지면서 compensation 할 시간이 없어 back pressure는 폐 전까지 걸리게 되고, PCWP는 증가합니다. 반면 특발성 폐동맥 고혈압은 PCWP는 정상인 상태에서 (즉, 좌심부전에 의한 울혈이 없는 상태에서) 안정 시 평균 폐동맥압이 25mmHg 이상일 때 진단할 수 있습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": ["09학번"], "professor": "김미정", "question": "75세 여자가 갑작스런 호흡곤란으로 내원하였다. 2주전 고관절 골절 수술 후 회복 중이라고 한다. 혈압 80/60 mmHg, 맥박 110회/분, 호흡수 30회/분, 체온 36도, 흉부 컴퓨터 단층 촬영 소견은 아래와 같다. 적절한 치료를 고르시오.", "images": [], "text_box": "75세 여자가 갑작스런 호흡곤란으로 내원하였다. 2주전 고관절 골절 수술 후 회복 중이라고 한다. 혈압 80/60 mmHg, 맥박 110회/분, 호흡수 30회/분, 체온 36도, 흉부 컴퓨터 단층 촬영 소견은 아래와 같다.", "options": ["Iloprost", "Heparin", "tPA", "percutaneous catheter aspiration", "open heart surgery"], "answer": [2], "explanation": "Pulmonary embolism입니다. 환자 혈압이 낮으므로 High risk에 속하고, 빠르게 tPA 등의 혈전용해제를 IV로 주어야 합니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": [], "professor": "", "question": "가장 우선적으로 투여해야 하는 약물은?", "images": [], "text_box": "64세 남자가 흉통 발병 24시간 만에 왔다. 혈압은 120/80 mmHg, 맥박은 100회/분, 심한 호흡곤란을 호소하였다. 검사소견이다.", "options": ["푸로세마이드 정주", "나이트레이트 정주", "안지오텐신 전환효소 억제제", "베타차단제", "헤파린 정주"], "answer": [0], "explanation": "혈압이 유지되고 있으므로 환자의 증상 완화를 위해 이뇨제 투여가 시급합니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": [], "professor": "정정임", "question": "다음은 흉부 X선 후전 사진이다. 종격동의 변연을 보았을 때 가장 이상이 있는 구조는?", "images": [], "text_box": "(폐동맥 쪽이 튀어나와 있었고 좌심실은 확장되어 있지 않았다.)", "options": ["대동맥", "폐동맥", "상대정맥", "우심실", "좌심실"], "answer": [1], "explanation": "정정임 교수님 문제로 분류되었지만 작파 작성자는 이정은 교수님 문제일 수도 있다고 생각했다고 합니다. 제가 보기엔 정정임 교수님 짤변 문제가 맞는 것 같습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": [], "professor": "정해억", "question": "62. 75세 여자가 갑작스런 호흡곤란으로 응급실에 왔다. 2주전 고관절 골절 수술 후 회복 중이라고 한다. 혈압 80/60 mmHg, 맥박 110회/분, 호흡수 30회/분, 체온 36도이고, 흉부 CT 소견은 아래와 같다. 가장 우선적인 치료는?", "images": [], "text_box": "75세 여자가 갑작스런 호흡곤란으로 응급실에 왔다. 2주전 고관절 골절 수술 후 회복 중이라고 한다. 혈압 80/60 mmHg, 맥박 110회/분, 호흡수 30회/분, 체온 36도이고, 흉부 CT 소견은 아래와 같다.", "options": ["헤파린", "혈전용해제", "수술적 혈전 제거", "강심제 투여", "아스피린"], "answer": [1], "explanation": "수술력, 갑작스런 호흡곤란과 저혈압, 빈맥과 빈호흡 등으로 미루어 폐색전증이 강력히 의심됩니다. CT 상에는 pulmonary trunk로부터 좌측 폐동맥으로 갈라지는 곳에 혈전이 있습니다. 이미 혈전이 발생한 경우 1차 치료는 혈전용해제입니다. 약물을 통한 혈전 제거가 성공적이지 않은 경우 응급 수술을 시행합니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": [], "professor": "정해억", "question": "급성 폐동맥 혈전색전증 (acute pulmonary thromboembolism)에 관한 다음 설명 중 틀린 것은?", "images": [], "text_box": null, "options": ["내원 당시 저혈압, 저산소증이 동반되어 있는 환자는 예후가 나쁘고 이 경우 빠른 혈전용해제(thrombolysis) 치료를 고려해야 한다.", "전신마비, 암, fracture, major surgery, 피임제 복용 등이 대표적인 위험인자들로 알려져 있으나 어떤 환자에서는 위험인자가 전혀 발견되지 않는 경우도 있다.", "혈중 D-dimer 가 가장 유용한 스크리닝 검사이며 심장초음파 검사에서 우심실의 확장 및 국소벽운동이상, 그리고 D 자형 좌심실이 보이면 확진할 수 있다.", "급성기가 지난 후에는 장기적인 경구용 항응고제 치료를 해주어야 한다."], "answer": [2], "explanation": "acute pulmonary thromboembolism의 확진은 chest CT angiography로 합니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": [], "professor": "정해억", "question": "폐동맥고혈압에 관한 다음 설명 중 틀린 것은?", "images": [], "text_box": null, "options": ["평균 폐동맥압이 25mmHg 이상, 폐모세혈관쐐기압이 15mmHg 이하인 경우 폐동맥고혈압으로 진단할 수 있다.", "도플러 심장초음파검사를 통해 폐동맥고혈압을 확진할 수 있다.", "일부 폐동맥고혈압은 유전적 소인을 갖고 있는데 대표적 관련 유전자가 BMPR2 gene 이다.", "어려서 동맥관개존증(PDA) 수술을 받았던 자가 호흡곤란이 나타나면 폐동맥고혈압이 있는지를 반드시 확인해 보아야 한다."], "answer": [1], "explanation": "도플러 심장초음파 검사는 진단검사입니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": [], "professor": "정해억", "question": "호흡곤란을 호소하는 환자들 중에서 임상증상, 초음파, 우심실 카테터 검사 결과 상 폐동맥 고혈압이 아닌 것은?", "images": [], "text_box": null, "options": ["30M, 10년전 PAD 진단 후 수술 안함, PAP=30", "40F, 중증의 류마티스성 승모판 협착증과 심실세동, PAP=40", "50M, 간경화 복수 간문맥고혈압, PAP=30", "55F, 전신성 경피증 치료중, PAP=45"], "answer": [3], "explanation": "안 배웠습니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": [], "professor": "정해억", "question": "관찰 가능한 혈역학적 변화는?", "images": [], "text_box": "평소 호흡곤란이 있던 70세 남자 환자가 감기 후 호흡곤란이 심해지고 양 다리가 부어서 왔다. (흉부 X선, 심전도) (pulmonary edema)", "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": [0], "explanation": "폐부종이 있어서 폐모세혈관쐐기압도 증가해야 할 것 같은데 왜 아닌지 잘 모르겠네요. 아시는 분 연락주세요…"}, {"subject": "폐동맥고혈압,폐색전증", "year": [], "professor": "정해억", "question": "47세 남자가 호흡곤란으로 병원에 왔다. 혈압 85/50 맥박 130회/분. 적당한 치료는?", "images": [], "text_box": "47세 남자가 호흡곤란으로 병원에 왔다. 혈압 85/50 맥박 130회/분.", "options": ["관상동맥확장술", "혈전용해제 투여", "헤파린 투여", "응급 관상동맥 우회수술", "응급 대동맥 치환술"], "answer": [1], "explanation": "PE 환자에서 혈압이 낮으므로 High risk입니다. 혈전용해제를 IV로 투여하여 빠르게 혈전을 없애야 합니다."}, {"subject": "폐동맥고혈압,폐색전증", "year": [], "professor": "조은주", "question": "2일전 갑자기 발생한 호흡곤란으로 내원한 환자의 심초음파 검사 소견이다 가능한 원인질환으로 적절하지 않은 것을 고르시오.", "images": [], "text_box": "2일전 갑자기 발생한 호흡곤란으로 내원한 환자의 심초음파 검사 소견이다.", "options": ["심낭압전", "우심실경색", "폐성심", "폐동맥고혈압", "심방중격결손"], "answer": [0], "explanation": "폐혈관계 압력 상승 또는 우심실 부전에서 나타나는 소견으로, 4번이 맞다는 것만 알고 넘어가면 될 듯합니다."}, {"subject": "심막질환 심종양", "year": ["21학번", "20학번", "19학번", "18학번", "16학번", "15학번", "14학번", "13학번", "12학번", "11학번", "09학번"], "professor": "이정은", "question": "적절한 치료는?", "images": [], "text_box": "70세 남자 환자가 2개월 전부터 발생한 숨찬 증상으로 응급실로 내원하였다. 혈압 160/60mmHg, 맥박 30회/분, 호흡 21회/분이었다. 청진에서 좌측 흉골연 3번째 늑간에서 이완기 초기에 시작하여 점점 작아지는 심잡음이 들렸다 가슴 X선 사진이다.", "options": ["이뇨제 정맥 주사", "카테터 경유 대동맥판막 삽입", "심방사이막려손 가리개 삽입", "항생제 정맥 주사", "임시형 심박동기 삽입"], "answer": [0], "explanation": "환자의 증상과 청진 소견, 그리고 X-ray 영상은 심낭낭출을 시사할 수 있습니다. Water bottle configuration은 심낭낭출의 전형적인 소견으로, 이뇨제는 증상 완화에 도움이 될 수 있습니다. 하지만 심낭낭출의 근본적인 치료는 pericardiocentesis일 수 있습니다. 문제의 답은 이뇨제로 제시되어 있습니다."}, {"subject": "심막질환 심종양", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "이정은", "question": "환자의 진단?", "images": [], "text_box": "75세 남자 1개월 전부터 시작된 호흡곤란으로 내원하였다. (혈압 /맥박 / 호흡수등정상) 3개월 전부터 아무런 이유 없이 8kg 이상 체중이 줄었다고 하였다. 다음 영상 소견을 통한 환자의 진단?", "options": ["혈전", "점액종", "혈관육종", "횡문근육종", "비호치킨림프종"], "answer": [1], "explanation": "영상 소견은 심장 점액종의 특징적인 모습을 보이며, 심장종양은 체중 감소를 동반하는 경우가 많습니다. 특히 fossa ovalis에 위치한 종양은 점액종의 흔한 부위입니다. 따라서 환자의 임상 증상과 영상 소견을 종합할 때 점액종으로 진단할 수 있습니다."}, {"subject": "심막질환 심종양", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "조은주", "question": "심장에 원발성으로 발생하는 악성 종양중 가장 호발하는 것은?", "images": [], "text_box": null, "options": ["Sarcoma", "Myxoma", "Lymphoma", "Rhabdomyoma"], "answer": [0], "explanation": "심장에 원발성으로 발생하는 종양 중 가장 흔한 양성 종양은 점액종(Myxoma)이지만, 악성 종양 중 가장 호발하는 것은 육종(Sarcoma)입니다. 육종은 심근이나 심낭에서 유래하며, 예후가 매우 좋지 않습니다. 따라서 악성 원발성 심장 종양으로는 육종이 가장 흔합니다."}, {"subject": "심막질환 심종양", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "조은주", "question": "다음 중 Cardiac Tamponade를 진단할 수 있는 소견이 아닌 것은?", "images": [], "text_box": null, "options": ["pulsus paradoxus", "우심방 확장", "심정도 상 low voltage", "경정맥파도 상 현저한 Xdescent"], "answer": [1], "explanation": "심장눌림증(Cardiac Tamponade)은 심낭 내 압력 증가로 심실 이완이 제한되어 심박출량이 감소하는 상태입니다. 주요 진단 소견으로는 기이맥(pulsus paradoxus), 저혈압, 빈맥, 심전도상 저전압(low voltage) 등이 있습니다. 경정맥파도 상 현저한 x descent는 심장눌림증보다는 협착성 심장막염에서 더 특징적인 소견입니다. 우심방 확장은 심장눌림증의 직접적인 소견이 아닙니다."}, {"subject": "심막질환 심종양", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "조은주", "question": "다음 중 Tamponade 특징이 아닌 것은?", "images": [], "text_box": null, "options": ["pulsus paradoxus", "RV size 커진다", "심전도상 low voltage", "?", "?"], "answer": [1], "explanation": "심장눌림증(Tamponade)의 특징은 심낭 내 액체 축적으로 심장이 압박되어 우심실(RV)과 좌심실이 수축기에 허탈되는 것입니다. 따라서 RV size는 커지는 것이 아니라 압박되어 작아지거나 허탈되는 경향을 보입니다. 기이맥(pulsus paradoxus)과 심전도상 저전압(low voltage)은 심장눌림증의 전형적인 소견입니다."}, {"subject": "심막질환 심종양", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "조은주", "question": "Constrictive cardiomyopathy와 cardiac tamponade의 소견으로 옳은 것은?", "images": [], "text_box": null, "options": ["가,나,다", "가,다", "나,라", "라", "가,나,다,라"], "answer": [4], "explanation": "가. paradoxical pulse는 cardiac tamponade에 흔합니다. 나. Kussmaul's sign은 constrictive cardiomyopathy에 흔합니다. 다. 경정맥 파형에서 x,y descent가 뚜렷한 것은 constrictive cardiomyopathy의 특징입니다. 라. constrictive cardiomyopathy에서 좌우심실의 이완기 압력 측정 시 dip&plateau 양상을 보입니다. 따라서 모든 진술이 옳습니다."}, {"subject": "심막질환 심종양", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "조은주", "question": "일차성 심종양에 대한 설명 중 옳은 것은?", "images": [], "text_box": null, "options": ["가,나,다", "가,다", "나,라", "라", "가,나,다,라"], "answer": [4], "explanation": "가. 심장 종양 중 가장 흔한 양성 종양은 점액종(myxoma)입니다. 나. 점액종은 여성에서 흔히 발생하며, 좌심방이 가장 흔한 발생 부위입니다. 다. 진단에 심초음파가 필수적이며, 혈전 등 다른 종괴와의 감별이 중요합니다. 라. 육종(sarcoma)은 가장 흔한 심장의 일차성 악성 종양입니다. 모든 진술이 옳습니다."}, {"subject": "심막질환 심종양", "year": ["21학번", "20학번", "19학번", "18학번"], "professor": "조은주", "question": "constrictive cardiomyopathy와 cardiac tamponade의 소견으로 옳은 것은?", "images": [], "text_box": null, "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": [4], "explanation": "가. paradoxical pulse는 cardiac tamponade에 흔합니다. 나. Kussmaul's sign은 constrictive cardiomyopathy에 흔합니다. 다. 경정맥파형에서 x,y descent가 뚜렷한 것은 constrictive cardiomyopathy의 특징입니다. 라. constrictive cardiomyopathy에서 좌우심실의 이완기 압력 측정 시 dip&plateau 양상을 보입니다. 따라서 모든 진술이 옳습니다."}, {"subject": "심막질환 심종양", "year": ["17학번"], "professor": "김미정", "question": "통증을 유발하는 원인은?", "images": [], "text_box": "28세 남자가 가슴이 아파서 병원에 왔다. 1주일 전 감기를 앓은 후 숨을 들이쉴 때 가슴이 아프다고 한다. 혈압 120/70mmHg, 맥박 100회/분, 호흡 14회/분, 체온 37.6도였다. 심점도(사진)이다.", "options": ["심근허혈", "심장막염증", "폐동맥울혈", "폐엽막염증", "관상동맥경련"], "answer": [1], "explanation": "환자는 감기 후 흉통이 발생하였으며, 숨을 들이쉴 때 흉통이 심해진다고 합니다. 이는 바이러스 감염 후 발생하는 급성 심장막염의 전형적인 임상 양상입니다. 심전도에서도 급성 심장막염의 특징적인 소견이 나타날 수 있습니다. 따라서 통증의 원인은 심장막의 염증입니다."}, {"subject": "심막질환 심종양", "year": ["15학번"], "professor": "김미정", "question": "협착성심장막염 (constrictive pericarditis)에서 맞는 것은?", "images": [], "text_box": null, "options": ["폐순환 저항이 증가한다.", "들숨 때 좌심실 용적이 증가한다.", "들숨 때 하대정맥압이 뚜렷하게 감소한다.", "확장기 우심실압과 좌심실압이 비슷하다.", "심실충만이 확장기말 심방수축에 의해 이루어진다."], "answer": [3], "explanation": "협착성심장막염은 두꺼워진 심장막으로 인해 심실 확장기 충만에 장애가 발생합니다. 심실충만은 확장기 초기에 빠르게 일어나고 확장기 후기에는 제한됩니다. 특징적으로 좌심실과 우심실의 확장기 압력이 거의 비슷해지는 소견을 보입니다. 또한, 들숨 때 하대정맥압이 감소하지 않고 오히려 증가하는 Kussmaul 징후가 나타날 수 있습니다."}, {"subject": "심막질환 심종양", "year": ["15학번"], "professor": "김미정", "question": "통증을 유발하는 구조물은?", "images": [], "text_box": "37세 여자가 가슴이 아파서 병원에 왔다. 3일 전부터 숨이 들이마실 때 복장뼈 부위가 아프고 기침이 나왔다. 통증은 누워 있을 때 심해지나 앉아서 몸을 앞으로 숙이면 감소한다고 하였다. 혈압 110/70mmHg, 맥박 90회/분, 호흡 16회/분, 체온 37.8도였다. 심전도(사진 1)이다.", "options": ["대동맥", "심장막", "폐동맥", "관상동맥", "오른심실"], "answer": [1], "explanation": "환자의 증상(흡기 시 흉통, 누우면 악화, 앉으면 완화)은 급성 심막염의 전형적인 소견입니다. 급성 심막염은 심장막의 염증으로 인해 통증이 유발되며, 이는 심장막 자체에 통증 수용체가 있기 때문입니다. 심전도에서도 급성 심막염에 합당한 소견이 나타납니다."}, {"subject": "심막질환 심종양", "year": ["14학번"], "professor": "김미정", "question": "적절한 처치는?", "images": [], "text_box": "50세 여자가 1주일 간 감기를 앓은 후 흉통이 발생하여왔다. 흉통은 누우면 심하고 앉으면 완화되었다. 혈압 120/80 mmHg, 맥박 100회/분, 체온 38도였다. 심전도(그림)이다.", "options": ["아스피린", "관동맥조영술", "운동부하심전도", "저분자량헤파린", "컴퓨터 단층 촬영"], "answer": [0], "explanation": "환자의 임상 양상(감기 후 흉통, 자세 변화에 따른 통증 변화)은 급성 심낭염을 시사합니다. 급성 심낭염의 대증적 치료는 비스테로이드성 소염진통제(NSAIDs)이며, 아스피린은 흔히 사용되는 NSAID 중 하나입니다. 심근경색과의 감별이 중요하나, 심낭염의 특징적인 증상을 고려할 때 아스피린이 적절한 초기 치료입니다."}, {"subject": "심막질환 심종양", "year": ["13학번"], "professor": "김미정", "question": "급성 심막염에서 나타나는 진찰 및 검사 소견이다. 틀린 것은?", "images": [], "text_box": null, "options": ["심초음파 - 심낭삼출액", "심전도 - ST 분절 상승", "혈액검사 - BNP 상승", "청진 - 마찰음", "진찰 - 발열"], "answer": [2], "explanation": "급성 심막염에서는 염증 반응으로 인해 트로포닌이 상승할 수 있으나, BNP(뇌성 나트륨이뇨펩타이드)는 주로 심부전에서 상승하며 급성 심막염에서는 일반적으로 상승하지 않습니다. 나머지 보기들은 심낭삼출액, 심전도 상 ST 분절 상승, 심장막 마찰음, 발열 등 급성 심막염에서 관찰될 수 있는 전형적인 소견들입니다."}, {"subject": "심막질환 심종양", "year": ["12학번"], "professor": "김미정", "question": "대량의 심낭삼출에서 나타나는 소견은?", "images": [], "text_box": null, "options": ["발열", "빈맥", "제3 심음", "심장막마찰음", "흡기 시 혈압상승"], "answer": [1], "explanation": "대량의 심낭삼출(Pericardial effusion)은 심실의 충만 장애를 유발하여 심박출량을 감소시키고 저혈압을 초래합니다. 이에 대한 보상 작용으로 심박수가 증가하는 빈맥이 나타나게 됩니다. 심낭삼출은 또한 호흡곤란, 간울혈, 정맥압 증가, 그리고 흡기 시 수축기 혈압이 10mmHg 이상 감소하는 기이맥(paradoxical pulse)을 유발할 수 있습니다."}, {"subject": "심막질환 심종양", "year": ["12학번"], "professor": "김미정", "question": "심장눌림증(cardiac tamponade)의 치료는?", "images": [], "text_box": null, "options": ["아스피린", "심낭천자", "혈액투석", "스테로이드", "심막제거술"], "answer": [1], "explanation": "심장눌림증(cardiac tamponade)은 심낭 내 액체 축적으로 인해 심장이 압박되어 혈역학적 불안정을 초래하는 응급 상황입니다. 따라서 즉각적인 심낭천자를 통해 심낭액을 배액하여 심장 압박을 해소하는 것이 가장 중요하고 효과적인 치료입니다. 이는 환자의 생명을 구할 수 있는 필수적인 시술입니다."}, {"subject": "심막질환 심종양", "year": ["12학번", "11학번"], "professor": "김미정", "question": "환자의 혈압 변화의 병태생리는?", "images": [], "text_box": "평소 혈압이 정상인 건강한 50세 여자가 호흡곤란으로 병원에 왔다. 혈압 70/50mmHg, 맥박수 112회/분이다.", "options": ["좌심실 전부하 감소", "좌심실 수축력 감소", "좌심실 후부하 감소", "맥박수 증가", "총혈액량 감소"], "answer": [0], "explanation": "심낭삼출로 인해 심장이 압박되면 정맥혈의 심장으로의 환류가 감소합니다. 이로 인해 우심실로 유입되는 혈액량이 줄어들고, 결과적으로 우심실과 좌심실의 확장기 충만이 제한됩니다. 이는 좌심실의 전부하 감소로 이어져 심박출량이 줄고 혈압이 감소하게 됩니다. 맥박수 증가는 보상 기전으로 나타납니다."}, {"subject": "심막질환 심종양", "year": ["12학번"], "professor": "김미정", "question": "Constrictive pericarditis의 이학적 소견은?", "images": [], "text_box": null, "options": ["동맥계에서 Kussmaul sign이 보인다", "정맥계에서 pulsus paradoxus가 보인다", "폐부종이 관찰된다", "Pericardial knock이 이완 초기에 들린다.", "동맥계에서 pulsus alterans가 보인다."], "answer": [3], "explanation": "협착성 심장막염(Constrictive pericarditis)에서는 심실 이완기 초기에 급격한 충만이 이루어지다가 심낭의 제한으로 인해 갑자기 멈추면서 Pericardial knock이 들립니다. Kussmaul sign(흡기 시 경정맥압 상승)과 Pulsus paradoxus(흡기 시 수축기 혈압 10mmHg 이상 감소)도 특징적인 소견이나, Pericardial knock은 이학적 소견 중 하나입니다. 폐부종은 잘 관찰되지 않습니다."}, {"subject": "심막질환 심종양", "year": ["11학번", "10학번", "9학번"], "professor": "조은주", "question": "적절한 치료를 고르시오.", "images": [], "text_box": "70세 남자가 1주일 전부터 심해진 호흡곤란으로 내원하였다. 6개월 전 폐암 수술 후 항암치료 중이다. 혈압 95/60mmHg, 맥박 130회/분, 호흡수 30회/분, 체온 37.5도이고, 심초음파 소견은 아래와 같다.", "options": ["furosemide", "albumin", "pericardiocentesis", "mediastinal irradiation", "talc sclerotherapy"], "answer": [2], "explanation": "제시된 심초음파 소견은 심낭삼출액(pericardial effusion)과 좌심실 허탈(LV collapse)을 명확히 보여주며, 이는 심장눌림증(cardiac tamponade)의 전형적인 소견입니다. 심장눌림증은 응급 상황으로, 심낭천자술(pericardiocentesis)을 통해 심낭액을 즉시 제거해야 합니다. 이는 심장 압박을 완화하고 혈역학적 불안정을 개선하는 데 필수적입니다."}, {"subject": "심막질환 심종양", "year": ["11학번", "10학번"], "professor": "조은주", "question": "이 환자에서 기대되는 이학적 소견으로 가장 가능성이 높은 것은?", "images": [], "text_box": "38세 남자가 전신 부종으로 내원하였다. 20년 전 종격동 림프종으로 방사선 치료 후 완치된 병력이 있다고 한다.", "options": ["Kussmaul's sign", "Pulsus paradoxus", "Pulsus alternans", "Westermark sign", "hepatojugular reflex"], "answer": [0], "explanation": "제시된 CT 소견은 pericardial calcification을 보여주며, 이는 협착성 심장막염(constrictive pericarditis)의 전형적인 특징입니다. 협착성 심장막염의 이학적 소견 중 하나는 Kussmaul's sign으로, 흡기 시 정상적으로 감소해야 할 경정맥압(JVP)이 감소하지 않거나 오히려 증가하는 현상입니다. 이는 두꺼워진 심낭으로 인해 우심실 충만이 제한되기 때문입니다. 환자의 전신 부종 역시 우심부전과 관련된 소견입니다."}, {"subject": "심근증", "year": ["21학번"], "professor": "김지희", "question": "환자의 상태 설명으로 옳은 것은?", "images": [], "text_box": "85. 70세 여자 환자가 가슴 답답함과 숨찬 증상으로 응급실 내원하여 시행한 심장 초음파 검사 (사진 1) 이고 이후 심장혈관 조영술 검사 결과 정상 소견 보여 cardiac MRI 시행하였다(사진 2). (사진 3)은 본원에서 20년 전 시행한 심장 초음파 소견이다.", "options": ["허혈성 심질환으로 혈관 확장제 사용이 필요하다.", "비후성 심근증으로 제세동기 삽입을 고려해 볼 수 있다.", "확장성 심근증으로 베타 차단제 사용이 필요하다.", "스트레스성 심근증으로 기저 질환을 조절해야 한다.", "제한성 심근증으로 칼슘 차단제 사용이 필요하다."], "answer": [1], "explanation": "제시된 심초음파 사진에서 심장벽 두께가 30mm로 측정되어 15mm를 넘으므로 비후성 심근증으로 진단할 수 있습니다. 비후성 심근증에서 심장벽 두께가 30mm 이상인 경우, 돌연사 위험(SCD risk factor)이 있는 것으로 간주될 수 있습니다. 이러한 경우 정확한 위험 점수 평가 후 삽입형 제세동기(ICD) 삽입을 고려할 수 있습니다. 또한, 사진 2의 MRI에서 late Gadolinium enhancement 소견이 관찰될 가능성도 있어 진단에 부합합니다."}, {"subject": "심근증", "year": ["20학번"], "professor": "김지희", "question": "추가적으로 시행할 조치는?", "images": [], "text_box": "14. 22 세 남성이 군대훈련중 실신하였다. 당시 심전도 (사진 1)를 확인 후 심폐소생술 및 제세동을 시행하였고 이후 의식을 회복하였고 응급실로 이송되었다. 혈압 110/70, 심박 86 회/분, 청음 시 수축기 심잡음이 들렸다. 내원 후 심전도(사진 2)와 심초음파 소견(사진 3, 동영상)은 다음과 같다.", "options": ["디곡신", "심박동기 시술", "아미오다론", "니트로글리세린", "삽입형제세동기 시술"], "answer": [4], "explanation": "환자는 군대 훈련 중 실신하였고, 응급실 이송 전 심전도(사진 1)에서 심실 세동과 유사한 소견이 관찰되었습니다. 심초음파 M-mode 소견에서 승모판 전엽의 수축기 전방 운동(SAM)이 관찰되어 좌심실 유출로 협착을 동반한 비후성 심근증(HCM) 가능성을 시사합니다. 비후성 심근증 환자에서 실신 병력과 심정지 위험이 있는 경우 돌연사 예방을 위해 삽입형 제세동기(ICD) 삽입을 고려하는 것이 적절한 조치입니다."}, {"subject": "심근증", "year": ["19학번"], "professor": "김지희", "question": "이 질환의 예후와 관련있는 것은?", "images": [], "text_box": "1. 62 세 여자환자는 숨찬 증상으로 외래에 내원했다. 혈압은 100/70, 맥박 75/분, 호흡 20/분, 체온은 36.3 도였다. 가슴 청진에서 심박동은 규칙적이었고 심음 및 호흡음은 비교적 정상 소견, 양쪽 정강뼈 앞 오목부종은 없었다. 가슴 X선 및 심초음파 사진이다. 심초음파에서 LVEF 32%였다.", "options": ["가족력", "좌심실유출로 폐쇄", "승모판 폐쇄부전", "좌심실 이완기능 장애", "실신 과거력"], "answer": [2], "explanation": "환자는 숨찬 증상과 함께 흉부 X선에서 심장 비대(cardiomegaly)가 관찰되며, 심초음파에서 좌심실 내강 확장과 좌심실 구혈률(LVEF) 32%로 저하된 소견을 보입니다. 이는 확장성 심근병증(DCM)에 해당합니다. 확장성 심근병증의 예후 인자로는 좌심실 구혈률, 승모판 폐쇄부전의 정도, 우심실 부전, 빈혈, 저나트륨혈증 등이 있습니다. 따라서 승모판 폐쇄부전이 예후와 관련이 있습니다."}, {"subject": "심근증", "year": ["18학번"], "professor": "김지희", "question": "시행한 치료법은?", "images": [], "text_box": "1. 45세 남자가 축구를 하다가 쓰러져 응급실에 실려왔다. 2년 전부터 운동 중에 의식을 잃은 적이 여러 번 있다고 한다. 형이 3년 전 갑자기 사망했다. 치료 전 심전도와 치료 후 흉부 X선 사진이다.", "options": ["DDD 인공 심박동기", "VDD 인공 심박동기", "심장 재동기화 치료(CRT)", "심장내 제세동기", "impella 삽입"], "answer": [3], "explanation": "제시된 EKG에서 V1, V2에서 septal Q wave와 V5, V6에서 LV strain pattern이 관찰되어 비후성 심근병증(HCM)을 시사합니다. 환자는 운동 중 실신한 과거력이 있고, 형이 갑자기 사망한 가족력이 있어 돌연사(SCD)의 위험이 매우 높습니다. 흉부 X선 사진에서는 심장 내 제세동기가 삽입된 소견이 명확하게 보입니다. 따라서, 이러한 고위험군 HCM 환자에게는 삽입형 제세동기(ICD)가 적절한 치료법으로 시행됩니다."}, {"subject": "심근증", "year": ["16학번", "15학번"], "professor": "김지희", "question": "다음 설명 중 옳은 것은?", "images": [], "text_box": "1.80 세 여자 환자 1개월 전 넘어지면서 대퇴부 골절이 있어서 타병원에서 정형외과 수술 이후에 숨찬 증상이 있어서 응급실 내원하였다. 시행한 혈액 검사 결과 WBC 26100(seg 98%), CK-MB 18.5ng/ml, Troponin 3.38 ng/ml 이고 심도자 검사 시행하였다.", "options": ["40 세 미만 젊은 여성에서 호발한다", "관상동맥 조영술에서 동맥 경화반 파열의 흔적이 없다", "cardiac MRI 가 확진 검사이다.", "대부분 환자에서 영구적인 심구혈율 저하를 초래한다", "사망률이 30%이상으로 예후가 나쁘다."], "answer": [1], "explanation": "환자는 대퇴부 골절 수술 후 심근효소 증가와 함께 심도자 검사에서 심첨부의 풍선 모양 확장 소견(takotsubo 모양)을 보였습니다. 이는 신체적 스트레스가 유발한 스트레스성 심근병증(타코츠보 심근병증)의 전형적인 특징입니다. 스트레스성 심근병증은 관상동맥이 정상 소견을 보이는 것이 중요하며, 동맥 경화반 파열의 흔적이 없습니다. 주로 중년 이상 여성에서 호발하며, 대부분 3~7일 이내에 완전히 회복되는 양호한 예후를 보입니다."}, {"subject": "심근증", "year": ["14학번"], "professor": "정해억", "question": "적당한 치료는?", "images": [], "text_box": "103.70 세 여자 환자가 흉부 불쾌감 및 호흡곤란으로 왔다. 10년전 승모판 협착증으로 기계판막 치환술 받고 이후 와파린 복용 중이었고 최근에 남편과의 사별로 극심한 충격을 받았다고 한다. 심장초음파에서는 좌심실 심첨부에 국한된 벽운동 장애를 보였고 혈압은 120/80mmHg, 심근효소는 CK-MB/Tn-I 6.0/0.3 ng/ml 로 약간 증가되어 있었다. 심전도이다.", "options": ["혈전용해제", "헤파린", "아스피린", "보존적 치료", "관상동맥 조영술"], "answer": [3], "explanation": "환자는 최근 남편과의 사별이라는 극심한 스트레스를 겪었으며, 심근효소 증가와 좌심실 심첨부 벽운동 장애가 확인되었습니다. 이러한 소견은 스트레스 유발 심근병증(타코츠보 심근병증)의 전형적인 특징입니다. 스트레스성 심근병증은 대부분 보존적 치료만으로 수일에서 수주 내에 완전히 호전되는 경과를 보입니다. 따라서, 환자의 증상을 완화하고 합병증을 관리하는 보존적 치료가 가장 적절합니다."}, {"subject": "심근증", "year": ["14학번", "13학번", "12학번", "09학번"], "professor": "정해억", "question": "다음 중 가역적 확장성 심근병의 원인으로 옳은 것은?", "images": [], "text_box": "59.58 세 남자 환자가 운동시 호흡곤란과 양측 하지 부종을 주소로 내원하였다. 환자는 20년 전부터 매일 소주 1병 이상을 먹었다고 한다. 이학적 검사결과 양측 폐하부에 수포음과 심첨부위에 수축기 심잡음이 들렸다. 시행한 심초음파 검사에서 좌심실이 확장되었고 좌심실 수축 기능이 저하되어 좌심실 구혈률은 34%였다. 표준 약물치료 6개월 후 추적 심초음파 검사 결과 좌심실 확장과 좌심실 수축 기능이 호전되었다.", "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": [4], "explanation": "가역적 확장성 심근병증은 원인을 제거하면 심기능이 회복될 수 있는 특징을 가집니다. 대표적인 가역적 원인으로는 알코올 남용(alcohol abuse), 만성적으로 조절되지 않는 빈맥(tachycardia-induced cardiomyopathy), 임신(peripartum cardiomyopathy), 갑상선 질환(thyroid disease), 코카인 중독(cocaine use) 등이 있습니다. 또한 셀레늄 결핍, 저인산혈증, 저칼슘혈증 등도 가역적 원인에 포함됩니다. 제시된 모든 보기는 가역적 확장성 심근병증의 원인에 해당하므로 모두 옳은 설명입니다."}, {"subject": "심근증", "year": ["13학번"], "professor": "정해억", "question": "심근병증 분류에 따른 심근병증의 종류와 유발원인을 짝지은 것이다. 틀린 것은?", "images": [], "text_box": null, "options": ["확장심근병증 고혈압", "제한심근병증 파브리병", "제한심근병증 혈색소증", "확장심근병증 항암제", "제한심근병증 갑상성기능항진증"], "answer": [4], "explanation": "갑상선기능항진증은 심근의 수축력 증가와 빈맥을 유발하여 심장에 부담을 주며, 장기화될 경우 확장성 심근병증을 유발하는 원인으로 알려져 있습니다. 제시된 보기에서 갑상선기능항진증이 제한성 심근병증과 짝지어져 있으므로 이는 틀린 설명입니다. 알코올과 항암제는 확장성 심근병증의 원인이며, 파브리병과 혈색소증은 제한성 심근병증의 원인에 해당합니다."}, {"subject": "심근증", "year": ["12학번", "11학번", "09학번", "08학번"], "professor": "", "question": "확장성 심근증의 가역적인 심근증 원인이 아닌 것은?", "images": [], "text_box": null, "options": ["Alcohol", "Thyroid hormone", "Pregnancy", "Adriamycin", "바이러스성 심근염"], "answer": [3], "explanation": "가역적 확장성 심근병증은 원인을 제거하면 심기능이 회복될 수 있는 경우를 말합니다. 알코올, 갑상선 호르몬 이상(갑상선 기능 항진/저하), 임신, 바이러스성 심근염, 빈맥, 코카인 등은 가역적 원인에 해당합니다. 하지만 Adriamycin(독소루비신)과 같은 특정 항암제는 심장 독성을 유발하여 비가역적인 확장성 심근병증을 초래하는 경우가 많습니다. 따라서 Adriamycin은 가역적 원인이 아닌 비가역적 원인에 가깝습니다."}, {"subject": "심근증", "year": ["12학번", "11학번", "10학번", "09학번", "08학번"], "professor": "", "question": "확장성 심근증 환자의 예후와 관련이 없는 심초음파 지표는?", "images": [], "text_box": null, "options": ["좌심실 질량", "좌심실 구혈률", "승모판 폐쇄부전의 정도", "좌심실 이완기 기능", "좌심실내 혈전 유무"], "answer": [0], "explanation": "확장성 심근병증 환자의 예후를 평가하는 데 중요한 심초음파 지표로는 좌심실 구혈률, 승모판 폐쇄부전의 정도, 좌심실 이완기 기능, 그리고 좌심실 내 혈전 유무 등이 있습니다. 이 지표들은 심부전의 진행, 부정맥 발생 및 혈전색전증의 위험을 예측하는 데 도움이 됩니다. 반면, 좌심실 질량 자체는 확장성 심근병증의 예후와 직접적인 관련성이 낮다고 알려져 있습니다."}, {"subject": "심근증", "year": ["12학번"], "professor": "윤호중", "question": "다음 임상 상황 중, 심방세동으로 인한 뇌졸중/색전의 위험성이 가장 낮은 경우를 고르시오", "images": [], "text_box": null, "options": ["여자 76 세", "비후성심근증", "승모판막 협착증", "당뇨, 고혈압, 심부전", "남자 60 세, 관상동맥질환"], "answer": [4], "explanation": "심방세동으로 인한 뇌졸중 및 색전증의 위험은 CHA2DS2-VASc 점수와 같은 위험 평가 시스템을 통해 결정됩니다. 고령(75세 이상), 비후성 심근병증, 승모판막 협착증, 당뇨, 고혈압, 심부전 등은 모두 뇌졸중/색전 위험을 높이는 주요 인자들입니다. 76세 여성은 고령으로 위험이 높고, 비후성 심근증, 승모판막 협착증, 당뇨, 고혈압, 심부전은 그 자체로 위험인자에 해당합니다. 60세 남성에 관상동맥질환만 있는 경우, 다른 위험인자가 없다면 뇌졸중/색전 발생 위험은 상대적으로 가장 낮다고 판단할 수 있습니다."}, {"subject": "심근증", "year": ["12학번", "11학번"], "professor": "윤호중", "question": "다음 확장성 심근증의 검사실 소견에 대한 설명 중 맞는 것은?", "images": [], "text_box": null, "options": ["흉부 X선 사진 상 심장 확대는 관찰되지 않는다.", "심장초음파 검사에서 좌심실 수축기능은 저하된다.", "심장초음파 검사에서 중격 비후가 관찰된다.", "심전도 검사에서 저전위가 관찰된다.", "심도자 검사에서 심박출량이 증가된다."], "answer": [1], "explanation": "확장성 심근병증은 심실의 확장과 함께 수축 기능의 저하가 특징적인 질환입니다. 따라서 심장초음파 검사에서 좌심실의 수축 기능이 저하되는 소견이 관찰되는 것이 올바른 설명입니다. 흉부 X선 사진에서는 심장 비대(cardiomegaly)가 흔히 관찰되며, 중격 비후는 비후성 심근병증의 소견입니다. 심전도에서 저전위는 아밀로이드증과 같은 제한성 심근병증에서 더 흔하게 나타나고, 확장성 심근병증에서는 심박출량이 감소합니다."}, {"subject": "심근증", "year": [], "professor": "", "question": "아래 심초음파 사진과 같은 소견을 보이는 환자에 대한 설명이다. 틀린 설명은?", "images": [], "text_box": null, "options": ["심실의 수축기능 장애보다는 이완기능 장애가 더 두드러진다.", "좌심실유출로 폐쇄가 동반되면 호흡곤란 악화의 원인이 되기도 하지만 불량한 예후와 관련 있다.", "심방 세동의 예방, 돌연사 예방, 및 심부전 증상의 개선이 주된 치료목표이다.", "심전도에서 QRS 의 사이즈가 크고 T파의 역전이 특징적인 소견이다.", "성염색체 열성으로 유전되며 beta-myosin heavy chain gene 의 돌연변이가 대표적이다."], "answer": [4], "explanation": "제시된 심초음파 사진은 심장벽 두께가 25mm로 측정되어 비후성 심근병증(HCM) 소견을 보입니다. 비후성 심근병증은 주로 상염색체 우성으로 유전되며, beta-myosin heavy chain (MYH7) 및 myosin binding protein C (MYBPC3) 유전자 돌연변이가 가장 흔합니다. 따라서 성염색체 열성 유전이라는 설명은 틀렸습니다. HCM에서는 심실의 이완 기능 장애가 더 두드러지며, 좌심실 유출로 협착은 호흡곤란 악화 및 돌연사 위험 인자입니다."}, {"subject": "심근증", "year": [], "professor": "", "question": "다음 초음파 사진과 같은 소견을 보이는 환자에 대한 기술이다. 올바른 것은?", "images": [], "text_box": null, "options": ["심실의 이완기능 장애보다 수축기능 장애가 더 두드러진다.", "좌심실유출로 폐쇄가 동반되는 경우 호흡곤란 악화의 원인이 될 수 있지만 불량한 예후와는 관계없다.", "심방세동의 예방과 심부전 증상의 개선이 주된 치료이다.", "심전도에서 ST 분절의 상승과 T파의 역전이 특징소견이다.", "유전적인 원인도 있지만, 아밀로이드증이 원인이 될 수 있다."], "answer": [2], "explanation": "제시된 초음파 사진은 심장벽 두께가 30mm로 측정되어 비후성 심근병증(HCM)을 나타냅니다. HCM에서는 심실의 이완기능 장애가 수축기능 장애보다 더 두드러지게 나타납니다. 좌심실 유출로 폐쇄(LVOTO)는 돌연사(SCD)의 중요한 위험인자이며, 예후와 밀접한 관련이 있습니다. 심방세동 예방과 심부전 증상 개선은 HCM의 주된 치료 목표 중 하나입니다. ST 분절 상승은 주로 허혈성 심질환에서 나타나는 소견이며, 아밀로이드증은 제한성 심근병증의 주요 원인입니다."}, {"subject": "심근증", "year": [], "professor": "", "question": "가역적 확장성 심근병의 원인으로 틀린 것은?", "images": [], "text_box": null, "options": ["알코올 남용", "임신", "코카인 중독", "조절되지 않은 만성적인 빈맥", "아밀로이드증"], "answer": [4], "explanation": "가역적 확장성 심근병증은 원인 제거 시 심장 기능이 회복될 수 있는 형태를 의미합니다. 알코올 남용, 임신(주산기 심근병증), 코카인 중독, 조절되지 않는 만성 빈맥, 갑상선 질환 등은 가역적 확장성 심근병증의 잘 알려진 원인입니다. 반면, 아밀로이드증은 제한성 심근병증의 주요 원인이며, 원인을 제거해도 심기능이 회복되기 어려운 비가역적인 경우가 대부분입니다."}, {"subject": "심근증", "year": [], "professor": "", "question": "다음 중 가역적 확장성 심근증은?", "images": [], "text_box": null, "options": ["가,나,다", "가,다", "나,라", "라", "가,나,다,라"], "answer": [4], "explanation": "가역적 확장성 심근병증은 원인 인자를 교정하거나 제거했을 때 심장 기능이 회복될 수 있는 형태를 말합니다. 빈맥 유발성 심근증은 빈맥 조절 시 심기능이 호전되며, 주산기 심근증은 출산 후 호전될 수 있습니다. 알코올 유발성 심근증은 금주 시 심기능이 개선되고, 갑상선 기능 항진증으로 인한 심근병증도 갑상선 기능 조절 시 회복 가능합니다. 따라서 제시된 모든 원인이 가역적 확장성 심근병증에 해당합니다."}, {"subject": "심근증", "year": [], "professor": "윤호중", "question": "30 세 남자가 가슴떨림이 있어 병원에 왔다. 환자의 심전도이다. 심혈관질환 위험인자는 없고 환자의 형도 심전도 이상소견이 있었다고 한다. 진단은?", "images": [], "text_box": null, "options": ["확장심근병증", "비대심근병증", "제한심근병증", "부정맥유발 우심실근병증", "고혈압성 심근병증"], "answer": [1], "explanation": "제시된 심전도에서 특히 흉부 유도(V1-V6)에서 거대한 음성 T파(Giant negative T waves)가 관찰되는 것은 심첨부 비후성 심근병증(Apical HCM)의 특징적인 소견입니다. 환자가 가슴떨림을 호소하고, 심혈관 질환 위험인자가 없으며, 형도 심전도 이상 소견이 있었다는 가족력은 유전적 요인을 시사합니다. 이러한 임상 및 심전도 소견을 종합할 때, 환자의 진단은 비대심근병증, 특히 심첨부 비후성 심근병증으로 판단할 수 있습니다."}, {"subject": "심근증", "year": [], "professor": "정해억", "question": "진단으로 맞는 것은?", "images": [], "text_box": "46. 61 세 남자환자가 최근 심해진 호흡곤란을 주소로 내원하였다. 내원하여 시행한 심전도 상 그림 1와 같은 소견이었고 심장 초음파 검사결과 동영상과 같았다. 심근 조직검사결과 그림 2와 같은 소견이었다면", "options": ["Sarcoidosis", "Viral myocarditis", "Hypertrophic cardiomyopathy", "Amyloidosis", "Ischemic cardiomyopathy"], "answer": [3], "explanation": "환자의 심전도에서 저전압(low voltage) 소견이 관찰되며, 심초음파 영상에서 전반적인 심실벽의 비후와 함께 이완기 기능 장애가 두드러지게 나타납니다. 이러한 소견들은 아밀로이드증과 같은 제한성 심근병증의 특징입니다. 만약 심근 조직검사에서 콩고 레드 염색 시 애플 그린 복굴절(apple green birefringence) 소견이 보였다면, 이는 아밀로이드증을 확진하는 소견입니다. 따라서, 제시된 임상 및 검사 소견을 종합할 때 아밀로이드증으로 진단할 수 있습니다."}, {"subject": "심근증", "year": [], "professor": "정해억", "question": "다음은 확장성 심근병증을 유발하는 질환들이다. 아닌 것은?", "images": [], "text_box": null, "options": ["에탄올", "영양결핍", "빈맥", "다발성골수종", "갑상선 질환"], "answer": [3], "explanation": "확장성 심근병증을 유발하는 질환으로는 에탄올(알코올), 만성적인 빈맥, 갑상선 질환 등이 잘 알려져 있습니다. 영양결핍도 셀레늄 결핍이나 저칼슘혈증과 같은 특정 미량원소 결핍을 통해 확장성 심근병증을 유발할 수 있습니다. 하지만 다발성 골수종은 비정상 면역글로불린 경쇄를 생성하여 AL형 심장 아밀로이드증을 유발하며, 이는 확장성 심근병증이 아닌 제한성 심근병증의 한 형태입니다."}, {"subject": "복부대동맥질환", "year": ["20학번", "19학번"], "professor": "", "question": "이 환자에서 행해진 시술에 대해 맞는 설명은?", "images": [], "text_box": "고혈압약을 복용중이던 83세 여자가 2일전부터 시작된 복통이 있어 응급실로 왔다. A-C는 응급실에서 시행한 CT 사진이며, D는 시술사진이다.", "options": ["코일 색전술을 하였다.", "스텐트 그라프트 시술을 하였다.", "이 시술은 조기에 하는 것보다 환자의 상태가 안정된 다음에 시행하는 것이 좋다.", "시술 후에는 수술은 금기이다.", "시술과 수술의 선택시 대동맥의 해부학적 구조는 고려대상이 아니다."], "answer": [1], "explanation": "제시된 D 사진은 대동맥류에 스텐트 그라프트가 삽입된 시술 영상으로, 이는 혈관내 대동맥류 복원술(EVAR)에 해당한다. EVAR는 스텐트 그라프트를 이용하여 대동맥류를 치료하는 방법이며, 코일 색전술은 주로 동맥류 파열 시 출혈을 막거나 동맥 기형을 치료하는 데 사용된다. EVAR는 환자의 해부학적 구조에 따라 시술 가능 여부가 결정된다."}, {"subject": "복부대동맥질환", "year": ["20학번"], "professor": "", "question": "진단을 위한 적절한 검사와 추정 진단으로 가장 가능성이 높은 것은?", "images": [], "text_box": "68세 남자가 우연히 발견된 박동성 복부종괴를 주소로 외래로 내원하였다. 복부나 요추의 통증은 없고, 소화기능에도 불편함이 없다고 하였다. 진단을 위한 적절한 검사와 추정 진단으로 가장 가능성이 높은 것은?", "options": ["복부 대동맥, 장골동맥 혈관 조영술 – 대동맥, 장골동맥 폐색증(Leriche)", "하지 동맥 혈관 조영술 – 대퇴동맥 폐색증", "응급 복부 전산화 단층촬영술(CT) – 복부대동맥류 파열", "복구실패", "복구실패"], "answer": [2], "explanation": "박동성 복부종괴는 복부대동맥류의 전형적인 증상이며, 통증이 없다는 것은 파열을 시사하지 않는다. 복부대동맥류의 진단을 위한 영상 검사로는 초음파, CT angiography, MR angiography 등이 주로 사용된다. CT는 대동맥류의 크기, 형태, 파열 여부 등을 정확하게 평가할 수 있어 가장 적절한 검사이다."}, {"subject": "복부대동맥질환", "year": ["20학번"], "professor": "", "question": "가장 적절한 조치는?", "images": [], "text_box": "평소에 건강한 70세 남자가 이학적 검사상 복부에서 무통성 종괴가 촉지되었다. 환자의 복부 단층촬영 검사 소견이다.", "options": ["관찰", "비디하드로피딘계 칼슘차단제", "베타차단제", "경피적 혈관 내 치료", "수술적 치료"], "answer": [3], "explanation": "환자의 CT 소견에서 대동맥류 직경이 6cm로 확인된다. 복부대동맥류는 직경 5.5cm 이상이거나 1년에 1cm 이상 증가 시 파열 위험이 증가하므로, 증상이 없더라도 경피적 혈관내 치료(EVAR) 또는 수술적 치료가 적응증이 된다. EVAR는 단기 사망률이 우수하고 장기 사망률은 개복 수술과 비슷하여 우선적으로 고려된다."}, {"subject": "복부대동맥질환", "year": ["20학번"], "professor": "", "question": "이 환자에 대한 다음의 조치로 가장 옳은 것은?", "images": [], "text_box": "60세 남자가 복부대동맥에 직경 4.5cm 정도의 대동맥류가 우연히 발견되었다.", "options": ["직경이 5cm 미만이므로 추적검사를 권유한다.", "이전에 CT검사가 있는지 확인한다.", "MRA 검사를 시행하여 파열여부를 판단한다.", "비교적 젊은 나이이므로 수술을 권유한다.", "가족 중에 같은 질환이 있는지 확인한다."], "answer": [1], "explanation": "대동맥류는 파열이 가장 심각한 합병증이므로, 5cm 이상의 직경이거나 1년에 5mm 이상 커지면 치료해야 한다. 파열 여부는 CT가 가장 정확히 알 수 있다. 이전에 시행한 CT 검사가 있다면 현재 상태와의 비교를 통해 성장 속도를 평가하는 것이 중요하다. 젊은 나이에 대동맥류나 대동맥 박리가 발생하면 Marfan 증후군과 같은 유전 질환을 의심할 수 있으므로 가족력 확인도 필요하다. 4.5cm의 대동맥류는 일반적으로 추적 관찰 대상이다."}, {"subject": "복부대동맥질환", "year": ["20학번"], "professor": "김장용", "question": "복부 CT 상 3.9cm의 AAA 관찰됨. 이에 대한 치료로 옳은 것은?", "images": [], "text_box": "복부 CT 상 3.9cm의 AAA 관찰됨.", "options": ["12개월 후 재검사", "치료 필요 없음", "CT 혈관조영술"], "answer": [0], "explanation": "직경이 3~3.4cm면 3년 후 재검사, 직경이 3.5~4.4cm면 1년 후 재검, 직경이 4.5~5.4cm면 6개월 후 재검을 시행한다. 국내 건강보험 기준 5cm 이상일 경우 개복수술(ORS)이나 혈관내 스텐트 그라프트 삽입술(EVAR)을 고려한다. 따라서 3.9cm의 경우 12개월 후 재검사가 적절하다."}, {"subject": "복부대동맥질환", "year": ["20학번"], "professor": "김장용", "question": "이 환자에서 본 질환의 위험요인이 아닌 것은?", "images": [], "text_box": "91세 남자 복부에 만져지는 박동성 종괴로 왔다. 뇌졸중 후 반신 마비, 지남력 상실로 요양병원에 입원중이다. 고혈압, 당뇨, 고지혈증으로 약물 복용중이며 60갑년의 흡연력이 있다. 복부 컴퓨터단층촬영 소견은 위와 같다.", "options": ["뇌졸중", "고혈압", "당뇨", "고지혈증", "흡연"], "answer": [2], "explanation": "복부대동맥류의 주요 위험인자로는 고령, 흡연, 고혈압, 고지혈증, 가족력 등이 있다. 당뇨는 복부대동맥류의 발생 위험을 낮추거나 중증도를 완화하는 경향이 있어 위험인자가 아닌 것으로 알려져 있다. 뇌졸중은 동맥경화증의 결과일 수 있으나 직접적인 복부대동맥류의 위험인자로 분류되지 않는다."}, {"subject": "복부대동맥질환", "year": ["18학번"], "professor": "", "question": "이 질환의 위험도를 예상할 수 있는 것은?", "images": [], "text_box": "78세 남자가 직경 5.5 cm 의 대동맥류를 가지고 있다. 1년전에 이 대동맥류는 4.8cm 이었다. 대동맥류에는 혈전이 다량 있었고 환자는 증상이 없었다.", "options": ["고령", "직경", "혈전", "무증상", "남성"], "answer": [1], "explanation": "대동맥류 파열의 가장 강력한 예측인자는 동맥류의 직경이다. 직경이 5.5cm 이상일 때 파열 위험성이 급격히 증가한다. 고령, 남성도 위험인자이지만, 직경 변화가 가장 중요하게 고려된다. 혈전 유무나 무증상 여부는 파열 위험도를 직접적으로 예측하는 지표는 아니다."}, {"subject": "복부대동맥질환", "year": ["17학번", "15학번", "14학번", "13학번", "12학번"], "professor": "", "question": "다음 환자의 치료로 맞는 것은?", "images": [], "text_box": "70세 남자가 건강검진 중 우연히 복부 종괴가 발견되었다. 환자는 평소 건강하고 고혈압, 고지혈증이 있다. 지난 40년간 하루 한 갑씩 담배를 피워왔으며 30년 급성 충수돌기 절제술의 병력 이외에 수술 받은 병력은 없다. 현재 칼슘 길항제와 스타틴을 복용 중에 있다. (대동맥이 있는 하얀 동그라미 부분에 지름이 9cm라고 표시되어 있었음)", "options": ["복부 대동맥류 수술 또는 혈관 내 치료가 필요하다.", "금연 및 경과관찰", "고령으로 약물 요법을 시행한다.", "치료가 필요 없다."], "answer": [0], "explanation": "복부대동맥류는 남성 5.5cm 이상, 여성 5cm 이상 또는 6개월 내 5mm 이상 직경 증가 시 수술 또는 혈관내 치료가 필요하다. 환자의 대동맥류 직경이 9cm로 측정되었으므로, 이는 명확한 수술적 치료 또는 혈관내 치료의 적응증에 해당한다. 파열 위험이 매우 높기 때문에 적극적인 치료가 필요하다."}, {"subject": "복부대동맥질환", "year": ["16학번"], "professor": "", "question": "다음 중 복부대동맥류 치료의 적응증에 해당하는 환자는?", "images": [], "text_box": null, "options": ["건강검진시 시행한 복부 CT에서 우연히 발견된 직경 4.5cm의 방추형(fusiform) 복부대동맥류가 있는 75세 여자환자", "건강검진시 시행한 CT에서 우연히 발견된 직견 3.5cm의 낭상(saccular) 복부대동맥류가 있는 60세 남자환자", "직경 3.5cm의 증상이 없는 방추형(fusiform) 복부대동맥류를 가지고 있는 80세 남자환자에서 6개월 후에 시행한 CT 상 증상없는 복부대동맥류의 직경이 3.9cm일 때", "신장동맥 직하방에 시작하는 직경 4.7cm의 증상없는 방추형(fusiform) 복부대동맥류가 있는 65세 남자환자", "동맥류낭(sac)내에 혈전이 관찰되는 직경 4.8cm의 증상없는 방추형(fusiform) 복부대동맥류가 있는 75세 남자환자"], "answer": [1], "explanation": "낭상(saccular) 복부대동맥류는 직경에 상관없이 치료의 적응증이 된다. 방추형(fusiform) 대동맥류는 일반적으로 남성 5.5cm, 여성 5cm 이상일 때 치료를 고려하지만, 낭상 동맥류는 국소적인 약화로 발생하며 파열 위험이 높아 직경과 무관하게 치료가 필요하다."}, {"subject": "복부대동맥질환", "year": ["16학번"], "professor": "", "question": "다음 중 복부대동맥류 발생의 위험인자에 해당하는 것은?", "images": [], "text_box": null, "options": ["당뇨", "저혈압", "고지혈증", "갑상선기능저하증", "하지정맥류"], "answer": [2], "explanation": "복부대동맥류의 주요 위험인자는 고령, 남성, 흡연, 고혈압, 고지혈증, 가족력 등이다. 당뇨는 위험인자가 아니며, 오히려 복부대동맥류의 발생 위험을 낮추는 경향이 있다. 저혈압, 갑상선기능저하증, 하지정맥류는 복부대동맥류 발생의 직접적인 위험인자로 간주되지 않는다."}, {"subject": "복부대동맥질환", "year": ["16학번"], "professor": "", "question": "파열성 복부대동맥류의 치료에 대한 설명 중 맞는 것은?", "images": [], "text_box": null, "options": ["파열성 복부대동맥류 치료시 수술전에 승압제를 이용해서 가능한만큼 혈압을 상승시켜야 한다", "파열성 복부대동맥류의 치료로 현재 EVAR가 수술적 치료보다 훨씬 많이 이용된다", "파열성 복부대동맥류의 치료시 permissive hypertenstion을 적용한다.", "파열성 복부대동맥류의 수술적 치료시 복부대동맥류 neck 주위의 출혈을 예방하기 위해 신장동맥하 aortic clamping을 시행하는 것이 바람직하다", "파열성 복부대동맥류의 수술적 치료시 수술전 환자의 shock 여부는 치료 결과와 상관 없다."], "answer": [2], "explanation": "파열성 복부대동맥류의 응급 치료 시에는 'permissive hypotension' 전략을 적용하여 과도한 승압을 피하고, 혈압을 80~90mmHg 정도로 유지하여 의식 유지 및 심근 허혈 방지 등 최소한의 장기 관류를 허용한다. 이는 출혈을 악화시키는 것을 막기 위함이다. EVAR의 사용이 증가하고 있지만, 파열성 복부대동맥류에서는 여전히 개복 수술의 비중이 높으며, 환자의 상태(shock 여부)는 치료 결과에 중요한 영향을 미친다."}, {"subject": "복부대동맥질환", "year": ["12학번"], "professor": "", "question": "환자의 치료로 맞는 것은?", "images": [], "text_box": "75세 환자가 외래에 내원하였다. 환자의 복부 CT 소견은 다음과 같다. 환자는 평소 건강하였던 분이고 고혈압의 병력 외에 특이소견은 없었다. 환자는 복통 등의 증상은 호소하지 않았다.", "options": ["증상이 없으면 크기에 상관없이 치료하지 않는다.", "경과관찰 중 직경이 1년에 5mm 이상 증가하면 치료해야 한다.", "크기에 따라서 파열의 위험성이 증가하지 않는다.", "최근 장기간 연구 결과 혈관내치료와 수술치료의 결과가 같다.", "모든 경우에서 혈관내치료가 가능하다."], "answer": [3], "explanation": "최근 장기간 연구 결과에 따르면 혈관내 치료(EVAR)와 수술적 치료(OSR)는 장기 사망률에서 차이가 없는 것으로 나타났다. 파열 위험은 직경이 커질수록 증가하며, 증상이 없더라도 특정 크기(남성 5.5cm, 여성 5cm) 이상이면 치료가 필요하다. 1년에 5mm가 아니라 6개월에 5mm 이상 증가 시 치료를 고려한다. 또한 해부학적 구조에 따라 EVAR가 불가능한 경우가 많다."}, {"subject": "복부대동맥질환", "year": ["11학번"], "professor": "", "question": "다음 중 이 환자에게서 다음으로 진행되어야 할 검사는?", "images": [], "text_box": "80세 남자가 내원 1시간 전 갑자기 발생한 흉통을 주소로 내원하였다. ~분, 체온 37도로 측정되었다. 심전도상 I, II, AVF 유도에 ~ 같았다. 환자 과거력상 고혈압 이외에 특이사항 없었다.", "options": ["복부단순촬영", "관상동맥조영술", "흉부전산화단층촬영", "흉부자기공명영상촬영", "대동맥조영술"], "answer": [2], "explanation": "갑자기 발생한 흉통과 고혈압 병력, 그리고 X-ray 상 mediastinal widening, indistinct aortic margin, irregular aortic contour 등의 소견은 급성 대동맥 박리를 강력히 시사한다. 대동맥 박리 진단에는 흉부 전산화 단층촬영(CT)이 가장 빠르고 정확한 검사이다. 심근경색으로 오인하여 관상동맥조영술을 먼저 시행해서는 안 된다."}, {"subject": "복부대동맥질환", "year": ["11학번"], "professor": "", "question": "복부 대동맥류에 대한 설명으로 맞는 것은?", "images": [], "text_box": null, "options": ["복부 대동맥류는 대부분 무증상이며, 다른 질환의 진단을 위한 검사과정에서 발견되는 경우가 많다.", "위험인자로는 연령의 증가, 가족력, 흡연, 고지혈증, 고혈압, 여자 등이 있다.", "복부대동맥류의 최대 직경이 40mm 미만이면 치료의 적응 증이다.", "크기가 1년에 0.5cm 이상 커지면 수술의 적응증이다.", "치료는 ballooning 후 bare metal stent를 삽입한다."], "answer": [0], "explanation": "복부대동맥류는 대부분 무증상으로, 다른 질환의 진단을 위한 영상 검사에서 우연히 발견되는 경우가 흔하다. 위험인자로는 고령, 가족력, 흡연, 고지혈증, 고혈압 등이 있지만, 남성에서 더 호발한다. 치료 적응증은 최대 직경이 5.5cm 이상이거나 6개월 내 5mm 이상 증가하는 경우이다. 치료 시에는 covered stent graft를 사용하며, bare metal stent는 일반적으로 사용되지 않는다."}, {"subject": "말초동맥 질환", "year": ["20학번"], "professor": "김상동", "question": "말초 동맥질환 진단법 중 분절적 하지혈압이 아래 표와 같을 때, 폐쇄성 동맥질환이 의심되는 위치의 병변에 의해 발생할 수 있는 증상은?", "images": [], "text_box": "Cuff 위치: Arm (120 mmHg), 허벅지 상부 (160 mmHg), 슬상부 (100 mmHg), 슬하부 (90 mmHg), 발목 (80 mmHg)", "options": ["요통", "고관절 통증", "서췌부 파행", "종아리 파행", "발목 마비"], "answer": [3], "explanation": "제시된 분절적 하지혈압 측정 결과에서 허벅지 상부(160 mmHg)에서 슬상부(100 mmHg)로의 압력 강하가 60 mmHg로 가장 크게 나타납니다. 이러한 급격한 압력 저하는 대퇴동맥(femoral artery) 부위의 유의미한 폐쇄를 시사합니다. 대퇴동맥 폐쇄는 주로 그 원위부인 종아리 근육에 허혈을 유발하여 '종아리 파행(calf claudication)'을 일으킵니다. 따라서 폐쇄성 동맥질환의 의심되는 병변 위치와 관련된 증상으로는 종아리 파행이 적절합니다."}, {"subject": "말초동맥 질환", "year": ["20학번", "18학번"], "professor": "김상동", "question": "도플러를 이용해서 사지 혈압을 측정한 결과이다. 발목-위팔지수(ankle-brachial index)는?", "images": [], "text_box": "오른쪽 위팔 120/100mmHg, 왼쪽 위팔 140/80mmHg\n오른쪽 발목 70/40mmHg, 왼쪽 발목 140/100mmHg", "options": ["0.4/1.0", "0.4/1.25", "0.5/1.0", "0.5/1.17", "2.0/1.0"], "answer": [2], "explanation": "발목-위팔 지수(ABI)는 각 발목의 수축기 혈압을 양팔 중 가장 높은 수축기 혈압으로 나누어 계산합니다. 환자의 양팔 최고 수축기 혈압은 왼쪽 위팔의 140 mmHg입니다. 오른쪽 발목의 수축기 혈압은 70 mmHg이므로, 오른쪽 ABI는 70/140 = 0.5입니다. 왼쪽 발목의 수축기 혈압은 140 mmHg이므로, 왼쪽 ABI는 140/140 = 1.0입니다. 따라서 발목-위팔 지수는 오른쪽 0.5, 왼쪽 1.0입니다."}, {"subject": "말초동맥 질환", "year": ["18학번"], "professor": "김상동", "question": "바로 시행해야 할 검사는?", "images": [], "text_box": "63세 남성이 당뇨로 치료중이며, 현재 흡연중이다. 200m만 걸어도 악화되는 오른쪽 장딴지 통증으로 내원했다.", "options": ["체온검사", "혈액검사", "발목상완지수", "컴퓨터단층촬영", "자기공명영상"], "answer": [2], "explanation": "환자는 당뇨와 흡연력이 있는 63세 남성으로, 200m 보행 시 악화되는 오른쪽 장딴지 통증을 호소합니다. 이는 말초동맥질환(Peripheral Artery Disease, PAD)의 전형적인 증상인 간헐적 파행(intermittent claudication)에 해당합니다. PAD 진단을 위한 1차적이고 비침습적인 검사는 발목-상완 지수(Ankle-Brachial Index, ABI)입니다. ABI는 발목 혈압을 팔 혈압으로 나누어 계산하며, 0.9 미만일 경우 PAD를 시사합니다. CT나 MRI는 ABI 검사 후 확진 또는 병변의 세부 평가를 위해 시행될 수 있습니다."}, {"subject": "말초동맥 질환", "year": ["18학번", "14학번"], "professor": "김상동", "question": "다음 중 말초동맥질환의 주 원인인 동맥경화증의 위험인자에 해당하지 않는 것은?", "images": [], "text_box": null, "options": ["고혈압", "당뇨", "남성", "고중성지방혈증", "저호모시스테인혈증"], "answer": [4], "explanation": "말초동맥질환의 주 원인인 동맥경화증의 주요 위험인자로는 고혈압, 당뇨, 이상지질혈증(고콜레스테롤혈증, 고중성지방혈증 포함), 흡연, 고령, 비만, 그리고 고호모시스테인혈증 등이 있습니다. 남성은 여성보다 동맥경화증 발생 위험이 높은 경향이 있습니다. 저호모시스테인혈증은 고호모시스테인혈증과 달리 동맥경화증의 위험인자로 간주되지 않으며, 오히려 보호적인 역할을 할 수 있습니다. 따라서 저호모시스테인혈증은 위험인자에 해당하지 않습니다."}, {"subject": "말초동맥 질환", "year": ["18학번"], "professor": "김상동", "question": "CT 혈관조영영상은 다음과 같다. 진단은?", "images": [], "text_box": "35세 남자가 갑자기 오른쪽 다리가 아프고 감각이 소실되어 응급실에 내원하였다. 혈압 120/90mmHg, 맥박 110회/분, 호흡 22회/분 체온 38.5도씨이다. 오른쪽 무릎 아래의 동맥 박동은 만져지지 않으며 오른쪽 다리는 차갑고 발을 움직이지 못한다.", "options": ["버거병", "레이노병", "베체트병", "급성동맥폐쇄증", "결절디발동맥염"], "answer": [3], "explanation": "환자는 갑작스러운 통증, 감각 소실, 무맥, 냉감, 마비 등 급성 동맥 폐쇄의 '5P 징후(Pain, Pallor, Pulselessness, Paresthesia, Paralysis)'를 보입니다. 이는 혈류 공급이 갑자기 중단되어 발생하는 응급 상황입니다. CT 혈관조영영상은 이러한 폐쇄를 명확하게 보여주며 진단을 확진합니다. 다른 보기들은 만성적인 혈관 질환이거나 동맥 폐쇄의 전형적인 임상 양상과 거리가 있어, 급성으로 발현된 환자의 증상과 영상 소견에 가장 적합한 진단은 급성 동맥 폐쇄증입니다."}, {"subject": "말초동맥 질환", "year": ["17학번", "16학번"], "professor": "박순철", "question": "다음은 CT 내원 후 시행한 CT 혈관촬영 사진과 수술사진이다. 진단은?", "images": [], "text_box": "74세 여자가 좌측다리의 통증과 weakness를 호소하며 병원에 왔다. 환자는 A-fib으로 약물 복용중이었고 신체검사에서 자측 다리의 맥박은 촉지되지 않았고, 차가웠으며 감각이상을 호소하였다.", "options": ["급성 대동맥혈전폐색증", "급성 심부정맥혈전증 (deep vein thrombosis)", "급성 좌측장골동맥색전증", "중증하지 허혈증 (critical limb ischemia)", "폐쇄성 혈관혈전염 (thromboangiitis obliterans)"], "answer": [2], "explanation": "환자는 심방세동(A-fib) 병력이 있는 고령 여성으로, 갑작스러운 좌측 다리 통증, 근력 약화, 무맥, 냉감, 감각 이상을 호소합니다. 이는 급성 동맥 폐쇄의 전형적인 5P 징후입니다. 심방세동은 색전증의 주요 위험인자로, 심장에서 생성된 혈전이 동맥을 따라 이동하여 원위부 혈관을 막을 수 있습니다. CT 혈관조영 영상(img2.jpg)에서 좌측 장골동맥의 폐쇄가 명확히 관찰됩니다. 이러한 임상 및 영상 소견을 종합할 때, 급성 좌측 장골동맥 색전증이 가장 합리적인 진단입니다."}, {"subject": "말초동맥 질환", "year": ["15학번"], "professor": "황정기", "question": "다음은 segmental limb pressure를 측정한 결과이다. 다음 중 협착이 일어난 것으로 추측할 수 있는 혈관은?", "images": [], "text_box": "팔 (120 mmHg), 넙적다리 위 (110 mmHg), 무릎 위 (100 mmHg), 무릎 아래 (90 mmHg), 발목 (80 mmHg)", "options": ["복부대동맥", "장골동맥", "대퇴동맥", "오금동맥", "경골동맥"], "answer": [1], "explanation": "분절적 하지 혈압 측정 결과, 팔 혈압(120 mmHg)에 비해 넙적다리 위(upper thigh) 혈압이 110 mmHg로 상대적으로 낮은 수치를 보입니다. 일반적으로 넙적다리 혈압은 팔 혈압보다 높거나 비슷한 수준을 유지합니다. 팔에서 넙적다리 위로의 유의미한 압력 강하(여기서는 10 mmHg이지만, 정상 범위에서 넙적다리가 팔보다 높다는 점을 고려하면 더 큰 차이로 해석될 수 있음)는 대동맥-장골동맥(aortoiliac) 분절에서의 협착을 시사합니다. 따라서 장골동맥의 병변이 의심됩니다."}, {"subject": "말초동맥 질환", "year": ["14학번"], "professor": "김상동", "question": "슬하부에 존재하는 근막에 의해 구분되는 구획(compartment) 중 peroneal artery 가 주행하는 구획은?", "images": [], "text_box": null, "options": ["Anterior compartment", "Lateral compartment", "Deep posterior compartment", "Superficial posterior compartment", "Middle compartment"], "answer": [2], "explanation": "하퇴부(lower leg)는 근막에 의해 여러 구획으로 나뉩니다. Fibular artery, 또는 peroneal artery는 후경골동맥(posterior tibial artery)과 함께 심부 후방 구획(deep posterior compartment)에 위치합니다. 이 구획은 경골 후근, 장족지굴근, 장모지굴근 등의 근육을 포함합니다. 따라서 비골 동맥은 심부 후방 구획 내에서 주행합니다. 다른 구획들은 서로 다른 근육 및 혈관-신경 구조를 포함하고 있습니다."}, {"subject": "말초동맥 질환", "year": ["14학번"], "professor": "김상동", "question": "말초동맥질환 진단법 중 분절적 하지 혈압이 아래 표와 같을 때, 폐쇄성 동맥 질환이 의심되는 동맥의 위치는?", "images": [], "text_box": "Cuff 위치: Arm (120 mmHg), 허벅지 상부 (upper thigh) (160 mmHg), 슬상부 (above knee) (100 mmHg), 슬하부 (below knee) (90 mmHg), 발목 (ankle) (80 mmHg)", "options": ["복부 대동맥", "장골동맥", "대퇴동맥", "슬와동맥", "후경골동맥"], "answer": [2], "explanation": "제시된 분절 혈압 측정 결과에서 허벅지 상부(160 mmHg)에서 슬상부(100 mmHg)로 혈압이 60 mmHg 크게 감소했습니다. 이러한 현저한 혈압 강하는 해당 부위 상류에 심한 협착이나 폐쇄가 있음을 나타냅니다. 허벅지 상부와 슬상부 사이에는 주로 대퇴동맥(femoral artery)이 주행합니다. 따라서 가장 큰 혈압 강하가 관찰된 대퇴동맥 부위에 폐쇄성 동맥 질환이 의심됩니다. 다른 혈관에서의 작은 압력 강하도 있지만, 가장 큰 강하가 병변의 주된 위치를 지시합니다."}, {"subject": "말초동맥 질환", "year": ["13학번"], "professor": "김상동", "question": "슬하부에 존재하는 근막에 의해 구분되는 구획(compartment) 중 PTA(posterior tibial artery)가 주행하는 구획은?", "images": [], "text_box": null, "options": ["Anterior compartment", "Lateral compartment", "Deep posterior compartment", "Superficial posterior compartment", "Middle compartment"], "answer": [2], "explanation": "하퇴부(lower leg)의 심부 후방 구획(deep posterior compartment)은 여러 중요한 해부학적 구조를 포함합니다. 후경골동맥(posterior tibial artery)은 비골동맥(fibular artery)과 함께 이 구획 내에서 주행하는 주요 동맥입니다. 이 구획에 위치한 근육으로는 경골 후근, 장족지굴근, 장모지굴근 등이 있습니다. 따라서 후경골동맥은 심부 후방 구획에 속합니다. 각 구획은 고유의 혈관과 신경, 근육을 포함하고 있어 기능적으로 중요한 역할을 합니다."}, {"subject": "말초동맥 질환", "year": ["13학번"], "professor": "김상동", "question": "말초동맥질환의 주 원인인 동맥경화증의 위험인자에 해당하지 않는 것은?", "images": [], "text_box": null, "options": ["DM", "Advanced age", "Smoking", "Hypocoagulability", "Hypertension"], "answer": [3], "explanation": "동맥경화증은 말초동맥질환의 주 원인이며, 여러 위험인자가 알려져 있습니다. 주요 위험인자로는 당뇨(DM), 고령(Advanced age), 흡연(Smoking), 고혈압(Hypertension) 등이 있습니다. 또한, 혈액 응고 경향이 증가하는 과응고성 상태(Hypercoagulability)는 동맥경화증 및 혈전 형성을 촉진합니다. 그러나 혈액 응고 경향이 감소하는 저응고성 상태(Hypocoagulability)는 오히려 혈전 형성을 억제하므로, 동맥경화증의 위험인자에 해당하지 않습니다. 따라서 저응고성 상태는 위험인자가 아닙니다."}, {"subject": "말초동맥 질환", "year": ["12학번"], "professor": "김상동", "question": "말초동맥질환 중 급성동맥폐쇄시 나타날 수 있는 5P signs 에 해당하지 않는 것은?", "images": [], "text_box": null, "options": ["Pain", "Pallor", "Patechea", "Paresthesia", "Paralysis"], "answer": [2], "explanation": "급성 동맥 폐쇄 시 나타나는 대표적인 증상을 '5P 징후'라고 합니다. 이 5가지 징후는 Pain(통증), Pallor(창백), Pulselessness(무맥), Paresthesia(감각이상), Paralysis(마비)입니다. 이 징후들은 심각한 허혈 상태를 나타내며 즉각적인 치료가 필요함을 시사합니다. 보기에 제시된 'Patechea(점상출혈)'는 혈액응고장애나 혈관벽의 문제로 인한 작은 출혈을 의미하며, 급성 동맥 폐쇄의 직접적인 5P 징후에는 해당하지 않습니다. 따라서 점상출혈은 5P 징후가 아닙니다."}, {"subject": "말초동맥 질환", "year": ["12학번"], "professor": "김상동", "question": "상지 동맥 중 액와 동맥을 해부학적으로 세 부위 구분 짓는 구조물들에 해당하는 것은?", "images": [], "text_box": null, "options": ["Second rib", "Clavicle", "Pectoralis major muscle", "Teres major muscle", "Humerus head"], "answer": [3], "explanation": "액와 동맥(Axillary artery)은 소흉근(Pectoralis minor muscle)에 의해 해부학적으로 세 부분으로 구분됩니다. 소흉근은 액와 동맥의 세 부위를 나누는 기준점이 됩니다. 첫 번째 부분은 소흉근의 상연(superior border) 위쪽, 두 번째 부분은 소흉근 후방, 세 번째 부분은 소흉근 하연(inferior border) 아래쪽을 지칭합니다. 다른 보기들은 액와 동맥을 직접적으로 세 부위로 구분 짓는 해부학적 구조물이 아닙니다. 따라서 소흉근은 액와 동맥의 해부학적 구분에 중요한 역할을 합니다."}, {"subject": "정맥질환 및 임파질환", "year": ["21학번"], "professor": "김지희", "question": "가장 의심되는 질환을 진단하기 위한 검사는?", "images": [], "text_box": "특이 기저질환 없는 45세 여자가 오후가 되면 심해지는 하지부종 및 하지의 무거운 증상으로 내원하였다. 직업은 미용사였다.", "options": ["듀플렉스 초음파", "B-모드 초음파", "도플러 초음파", "CT 정맥조영술", "MR 정맥조영술"], "answer": [0], "explanation": "환자는 특이 기저질환 없이 오후에 악화되는 하지 부종과 무거운 증상을 호소하며, 미용사라는 직업은 장시간 서서 일하는 특성상 만성 정맥 질환, 즉 하지정맥류의 위험을 높입니다. 만성 정맥 질환의 표준적인 진단 방법은 이중초음파(duplex ultrasound)입니다. 이중초음파는 혈관의 형태학적 정보(B-모드)와 혈류역학적 정보(도플러)를 동시에 제공하여 정맥 판막 기능 부전 및 혈전 유무를 평가하는 데 가장 유용합니다."}, {"subject": "정맥질환 및 임파질환", "year": ["21학번"], "professor": "박영준", "question": "말초동맥질환의 만성 사지 위협성 허혈 (peripheral artery disease, chronic limb threatening ischemia)와 정맥성 궤양 (venous ulcer)의 호발부위로 맞게 짝지어진 것은?", "images": [], "text_box": null, "options": ["족지 (toe) - 족배 (dorsum of foot)", "족배 (dorsum of foot) - 외측복사뼈 상방 (above the lateral melleolus)", "족지 (toe) - 내측복사뼈 상방 (above the medial malleolus)", "족배 (dorusm of foot) - 내측복사뼈 상방 (above the medial malleolus)", "족지 (toe) - 외측복사뼈 상방 (above the lateral malleolus)"], "answer": [2], "explanation": "말초동맥질환으로 인한 궤양은 주로 혈액 공급이 부족한 부위인 족지(발가락)나 발의 압력점에 발생합니다. 반면 정맥성 궤양은 정맥 판막 부전으로 인한 혈액 정체 때문에 주로 내측 복사뼈 상방에 호발합니다. 따라서 족지-내측 복사뼈 상방의 조합이 가장 적절합니다."}, {"subject": "정맥질환 및 임파질환", "year": ["19학번", "18학번", "16학번", "15학번"], "professor": "", "question": "다음 중 하지정맥류의 증상 중 가장 중증도가 높은 증상은? (만성정맥기능부전의 가장 심한 증상은?)", "images": [], "text_box": null, "options": ["부종", "색소 침착", "치유된 궤양", "지방피부경화증", "하지정맥류"], "answer": [2], "explanation": "만성 정맥 질환의 중증도는 CEAP 분류법(Clinical, Etiologic, Anatomic, Pathophysiologic)의 C 분류에 따라 결정됩니다. C0는 증상 없음, C1은 거미양 정맥, C2는 하지정맥류, C3는 부종, C4는 피부 변화(색소 침착, 지방피부경화증 등), C5는 치유된 궤양, C6는 활동성 궤양을 의미합니다. 주어진 보기 중에서는 '치유된 궤양(C5)'이 가장 높은 중증도에 해당합니다. 활동성 궤양(C6)이 있다면 그것이 가장 심한 증상입니다."}, {"subject": "정맥질환 및 임파질환", "year": ["18학번"], "professor": "윤상섭", "question": "심부정맥혈전증으로 와파린 복용중인 75세 남자 환자가 비출혈로 응급실에 내원하였다. 해야 할 검사와 투여해야 할 약물은?", "images": [], "text_box": "심부정맥혈전증으로 와파린 복용중인 75세 남자 환자가 비출혈로 응급실에 내원하였다.", "options": ["BT Vit K", "APTT 항혈전제", "INR 신선동결혈장", "D-dimer 지혈제", "INR 정맥순환개선제"], "answer": [2], "explanation": "와파린 복용 환자에서 출혈이 발생했을 때는 INR(국제정상화비율) 검사를 통해 와파린의 항응고 효과를 평가해야 합니다. 비출혈은 INR이 과도하게 상승했을 때 나타날 수 있는 증상입니다. INR이 심하게 높고 출혈이 있는 경우, 와파린의 효과를 신속하게 중화시키기 위해 신선동결혈장(FFP)을 투여하여 부족한 응고인자를 보충합니다. 이는 와파린의 길항제인 비타민 K보다 훨씬 빠르게 작용합니다."}, {"subject": "정맥질환 및 임파질환", "year": ["17학번"], "professor": "윤상섭", "question": "심부정맥혈전증으로 항혈소판제와 와파린 복용중인 환자가 지속되는 코피로 내원하였다. INR은 4.5 였다. 지혈을 위한 가장 적절한 조치는?", "images": [], "text_box": "심부정맥혈전증으로 항혈소판제와 와파린 복용중인 환자가 지속되는 코피로 내원하였다. INR은 4.5 였다.", "options": ["항혈소판제 중지", "와파린 감량", "혈소판 농축액 수혈", "신선동결혈장 투여", "혈관수축약물 투여"], "answer": [3], "explanation": "INR 4.5는 와파린의 과도한 항응고 효과를 나타내며, 이로 인해 비출혈(코피)이 발생한 상황입니다. 와파린의 효과를 가장 빠르고 효과적으로 중화시키는 방법은 신선동결혈장(FFP) 투여입니다. FFP는 모든 응고인자를 포함하고 있어 즉각적으로 INR을 교정하고 지혈을 돕습니다. 비타민 K는 효과 발현이 느려 응급 상황에는 부적합하며, 항혈소판제 중단이나 와파린 감량만으로는 즉각적인 지혈이 어렵습니다."}, {"subject": "정맥질환 및 임파질환", "year": ["17학번"], "professor": "윤상섭", "question": "1차 하지정맥류의 발생 원인은?", "images": [], "text_box": null, "options": ["정맥협착", "정맥폐색", "정맥혈 역류", "심부정맥 혈전증", "표재정맥 혈전증"], "answer": [2], "explanation": "1차 하지정맥류는 주로 정맥 판막의 기능 부전이나 선천적 이상으로 인해 정맥 내 혈액이 심장 방향으로 제대로 흐르지 못하고 역류하여 발생합니다. 이로 인해 정맥이 확장되고 꼬불꼬불해지며, 시간이 지남에 따라 정맥압이 상승하여 다양한 증상을 유발합니다. 정맥협착이나 폐색, 심부정맥혈전증은 이차성 정맥류의 원인이 될 수 있습니다."}, {"subject": "정맥질환 및 임파질환", "year": ["15학번", "14학번", "12학번"], "professor": "윤상섭", "question": "심부정맥혈전증으로 와파린 투여 중인 환자의 응급 개복수술 전 출혈을 방지하기 위한 조치는?", "images": [], "text_box": "심부정맥혈전증으로 와파린 투여 중인 환자의 응급 개복수술 전 출혈을 방지하기 위한 조치는?", "options": ["비타민 C 투여", "신선 동결 혈장 투여", "저분자량 헤파린 투여", "프로타민 설페이트 투여", "혈소판 수혈제재 투여"], "answer": [1], "explanation": "와파린은 비타민 K 의존성 응고인자의 합성을 억제하여 항응고 효과를 나타냅니다. 응급 수술이 필요한 경우 와파린의 항응고 효과를 신속하게 중화시켜야 출혈을 예방할 수 있습니다. 신선 동결 혈장(FFP)은 모든 응고인자를 포함하고 있어 와파린의 항응고 효과를 가장 빠르게 역전시키는 방법입니다. 비타민 K는 효과 발현 시간이 길어 응급 상황에는 부적절하며, 저분자량 헤파린은 항응고제이므로 출혈 위험을 증가시킵니다. 프로타민 설페이트는 헤파린의 효과를 중화시키는 약물이며, 혈소판 수혈은 혈소판 기능 이상 시 고려됩니다."}, {"subject": "정맥질환 및 임파질환", "year": ["14학번"], "professor": "", "question": "55세 여자가 갑자기 좌하지 부종으로 왔다. D-dimer는 0.1로 음성으로 나왔다. 다음 조치는? (2018년 동일)", "images": [], "text_box": "55세 여자가 갑자기 좌하지 부종으로 왔다. D-dimer는 0.1로 음성으로 나왔다.", "options": ["심부정맥혈전증은 배제하고 다른 감별질환을 위한 추가 검사 시행", "전신적 혈전 용해제 투여", "응급 수술적 혈전제거술 수행", "확진을 위한 정맥 조영술 시행", "카테터를 이용한 혈전 용해술 시행"], "answer": [0], "explanation": "D-dimer는 혈전 용해 산물로,

심부정맥혈전증(DVT)이나 폐색전증(PE)과 같은 혈전색전증의 진단에 사용됩니다. D-dimer 검사는 민감도가 높아 음성일 경우 DVT를 거의 확실하게 배제할 수 있는 높은 음성 예측도(Negative Predictive Value)를 가집니다. 따라서 D-dimer 검사 결과가 음성이므로 심부정맥혈전증의 가능성은 매우 낮다고 판단하고, 다른 원인에 의한 좌하지 부종에 대한 추가적인 감별 진단을 진행해야 합니다. 불필요한 침습적 검사나 치료는 피해야 합니다."}, {"subject": "정맥질환 및 임파질환", "year": ["14학번"], "professor": "", "question": "혈전색전증의 원인 중 혈액의 저류에 의한 것은?", "images": [], "text_box": null, "options": ["심방세동", "악성종양", "인공기계판막", "ST 분절 상승 심근경색증", "폐혈증"], "answer": [0], "explanation": "혈전색전증 발생의 주요 기전은 Virchow's triad(혈류 정체, 혈관 내피 손상, 과응고성)로 설명됩니다. 혈액의 저류(혈류 정체)는 혈액이 원활하게 흐르지 못하고 한 곳에 고여 응고되기 쉬운 환경을 만드는 것을 의미합니다. 심방세동은 심방이 불규칙하게 떨리면서 혈액이 심방 내에서 정체되어 혈전이 형성되기 쉬운 대표적인 혈류 저류 상태입니다. 악성종양, 인공기계판막, 폐혈증 등은 주로 과응고성이나 혈관 내피 손상과 관련되어 혈전색전증 위험을 높입니다."}, {"subject": "정맥질환 및 임파질환", "year": ["14학번"], "professor": "김미정", "question": "심부정맥혈전증 예방 치료로 적절한 것은?", "images": [], "text_box": "70세 여자가 의식 저하로 중환자실에 입원 중이다. 뇌 컴퓨터단층촬영 및 가슴 X선(사진)이다.", "options": ["경과 관찰", "아스피린", "리바록사반", "저분자량 헤파린", "다리공기 압박기"], "answer": [4], "explanation": "중환자실에 입원 중인 의식 저하 환자는 부동 상태로 인해 심부정맥혈전증(DVT) 발생 위험이 매우 높습니다. DVT 예방을 위해 기계적 방법과 약물적 방법이 있습니다. 약물적 예방(저분자량 헤파린, 리바록사반 등)은 출혈 위험이 있는 환자에게는 제한될 수 있습니다. 이 경우 뇌 컴퓨터단층촬영 소견이 있어 뇌출혈 위험이 있을 수 있으므로, 출혈 위험이 없는 기계적 방법인 간헐적 하지 압박 요법(다리공기 압박기)이 적절합니다. 이는 혈류 정체를 줄여 혈전 생성을 예방합니다."}, {"subject": "정맥질환 및 임파질환", "year": ["14학번"], "professor": "최윤석", "question": "검사는?", "images": [], "text_box": "72세 여자가 1주 전부터 왼쪽 장딴지가 붓고 아파서 병원에 왔다. 1주일 전 우측 경골 골절을 당해 수술적 치료 후 가료중이었다. 가슴청진에서 심음과 호흡음은 정상이었다.", "options": ["뼈밀도검사", "동맥경직도검사", "다리 뼈 X선 사진", "다리 동맥혈관조영술", "다리 정맥 듀플렉스 (Duplex) 초음파검사"], "answer": [4], "explanation": "환자는 최근 수술로 인한 부동 상태였고, 한쪽 다리(왼쪽 장딴지)의 부종과 통증을 호소하고 있습니다. 이러한 증상과 병력은 심부정맥혈전증(DVT)을 강력히 시사합니다. DVT 진단에 가장 널리 사용되고 정확한 비침습적 검사는 다리 정맥 듀플렉스(duplex) 초음파 검사입니다. 이 검사는 정맥의 혈류와 압축성 등을 평가하여 혈전 유무를 확인합니다."}, {"subject": "정맥질환 및 임파질환", "year": ["14학번"], "professor": "최윤석", "question": "다음 검사 중 진단에 도움이 되는 것은?", "images": [], "text_box": "65세 남자가 3일 전부터 숨이 차서 응급실로 왔다. 누워있기 힘든 상태였다. 혈압 100/60mmHg, 맥박 130회/분, 호흡 30회/분이었다. 흉부 컴퓨터 단층 촬영의 소견은 다음과 같다. (사진 1)", "options": ["폐기능 검사", "관상동맥조영술", "심장자기공명영상", "심장막천자술", "심장초음파"], "answer": [4], "explanation": "환자는 호흡곤란, 빈맥, 저혈압을 보이며 흉부 CT에서 폐동맥 내 혈전이 확인되어 폐색전증(PE)이 의심됩니다. 폐색전증은 우심실에 과부하를 주어 우심실 부전으로 이어질 수 있습니다. 심장초음파는 우심실의 확장, 기능 저하, 폐동맥압 상승 등 PE로 인한 우심실의 용적과 기능 이상을 평가하는 데 중요한 정보를 제공하여 진단 및 예후 평가에 도움이 됩니다."}, {"subject": "정맥질환 및 임파질환", "year": ["13학번"], "professor": "윤상섭", "question": "75세 여자환자가 우측 고관절 대치술을 받은 3 병일째 좌하지의 동통을 동반한 부종을 호소하였다. 다음 중 이 환자의 진단을 위하여 가장 확실한 방법은?", "images": [], "text_box": "75세 여자환자가 우측 고관절 대치술을 받은 3 병일째 좌하지의 동통을 동반한 부종을 호소하였다.", "options": ["이중초음파", "D-dimer 검사", "정맥조영술", "교류저항측정법", "방사성요오드-섬유소원 검사법"], "answer": [2], "explanation": "환자는 고관절 대치술 후 좌하지의 통증과 부종을 호소하고 있어 심부정맥혈전증(DVT)이 강력히 의심됩니다. DVT 진단에 있어 이중초음파(듀플렉스 초음파)가 가장 흔히 사용되는 비침습적 방법이지만, 정맥조영술(venography)은 DVT를 확진하는 가장 확실하고 표준적인 침습적 방법으로 간주됩니다. D-dimer 검사는 민감도는 높으나 특이도가 낮아 DVT를 배제하는 데 유용하지만, 확진 검사로는 부족합니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["21학번"], "professor": "", "question": "62세 남자가 호흡곤란을 주소로 응급실에 방문을 하였다. 환자는 2달 전에 급성심근경색증으로 관상동맥중재시술을 받았고 당시 심구혈률은 38%였다. 환자의 혈압은 130/80mmHg였고 심박수는 90회/min이었다. 다음은 환자의 흉부 X ray 사진이다. 환자의 증상 호전을 위한 다음의 적절한 조치는?", "images": [], "text_box": "62세 남자가 호흡곤란을 주소로 응급실에 방문을 하였다. 환자는 2달 전에 급성심근경색증으로 관상동맥중재시술을 받았고 당시 심구혈률은 38%였다. 환자의 혈압은 130/80mmHg였고 심박수는 90회/min이었다.", "options": ["라식스 iv", "도파민 iv", "디곡신 iv", "헤파린 iv", "아미오다른 iv"], "answer": [0], "explanation": "심부전 환자에서 급성 호흡곤란 증상이 나타날 때, 이는 폐부종 등 체액 저류로 인한 전부하 증가가 주요 원인입니다. 전부하를 줄여 증상을 완화하기 위해 이뇨제(예: 라식스)나 혈관확장제(예: 질산염)를 정맥 투여하는 것이 가장 적절한 초기 조치입니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["21학번"], "professor": "", "question": "박출량 감소성 심부전을 5년간 앓고 있었는데 표준적 심부전 치료에 반응하지 않고 6개월 전부턴 부종, 호흡곤란이 지속적으로 나타났다. 심장이식을 시행해야 하는 상황이지만 폐고혈압이 있어 BTT(Bridge to transplantation)로 치료를 시행한 사진이다. 해당 치료는?", "images": [], "text_box": "박출량 감소성 심부전을 5년간 앓고 있었는데 표준적 심부전 치료에 반응하지 않고 6개월 전부턴 부종, 호흡곤란이 지속적으로 나타났다. 심장이식을 시행해야 하는 상황이지만 폐고혈압이 있어 BTT(Bridge to transplantation)로 치료를 시행한 사진이다.", "options": ["Pacemaker", "ICD", "CRT", "LVAD", "TAF"], "answer": [3], "explanation": "환자는 표준 심부전 치료에 반응하지 않는 심한 심부전(refractory HF) 상태이며, 심장이식을 대기 중이지만 폐고혈압으로 인해 즉시 이식이 어려운 'Bridge to transplantation' 상황입니다. 이럴 때 좌심실 보조장치(LVAD)를 사용하여 심장의 펌프 기능을 보조하며 이식까지 대기하는 치료를 시행할 수 있습니다. 사진에 보이는 장치는 LVAD로 판단됩니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["21학번", "20학번"], "professor": "서석민", "question": "75세 남자가 심부전으로 치료 중으로 현재 약제를 복용중에 있다. 최근에 호흡곤란이 심해져 내원하였다. 환자에게 필요한 조치는?", "images": [], "text_box": "-다리의 함요부종이 관찰\n-혈압 110/80mmHg, 심박수 50회/분\n-심초음파: 좌심실 구혈률 33%로 1년 전과 같음\n-HLDL/Cr 40/2.11 mg/dl Na 132 K 6.0\n-복용약제 라미프릴 2.5mg 아침, 딜라트렌 6.25mg 오전, 오후, 라식스 20mg", "options": ["라미프릴(안지오텐신 전환효소 억제제) 증량", "딜라트렌(베타 차단제) 감량", "알닥톤(칼륨 보존 이뇨제 추가", "라식스(사구체 루프 작용 이뇨제) 추가", "도부타민(강심제) 추가"], "answer": [3], "explanation": "환자는 심한 호흡곤란이라는 증상을 호소하고 있으며, 이는 심부전의 악화 소견입니다. 이러한 증상 개선에는 이뇨제 사용이 가장 우선적입니다. 현재 라식스 20mg을 복용 중이므로 용량을 증량하여 증상을 완화하는 것이 적절한 조치입니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["20학번"], "professor": "서석민", "question": "심구출률 저하 심부전으로 베타차단제와 앤지오텐신 전환효소 억제제를 복용 중인 환자가 3개월 치료 후에도 심기능 호전이 없었다. 다음의 약제 중에 증상 개선 및 심기능을 개선시킬 수 있는 적절한 방법은?", "images": [], "text_box": null, "options": ["디곡신 추가", "이바브라딘 추가", "아미오다른 추가", "심실내제세동기 시술", "칼륨보전 이뇨제 추가"], "answer": [4], "explanation": "심구출률 저하 심부전(HFrEF) 환자에서 심기능 개선 및 사망률 감소를 입증한 4가지 핵심 약물(4 pilar drug)이 있습니다. 이 환자는 베타차단제와 ACEi를 복용 중이나, 알도스테론 길항제(MRA, 칼륨보전 이뇨제)는 아직 복용하고 있지 않습니다. 따라서 MRA인 스피로노락톤(칼륨보전 이뇨제)을 추가하는 것이 적절한 치료법입니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["20학번"], "professor": "서석민", "question": "심부전으로 치료를 1년 넘게 받았던 환자가 증상 호전 및 심기능의 호전이 있었다. 다음은 환자가 복약중인 약제이다. 환자에 대한 다음의 설명 중에 가장 적절한 것은?", "images": [], "text_box": "안지오텐신 전환효소 억제제- 라미프릴 5mg\n베타차단제 - (..) 2.5mg\n이뇨제 -라식스 20mg, 알닥톤 25mg\n나트륨 포도당 공동수용체-2 억제제 -포시가 10mg", "options": ["약제가 많으니 약 용량을 줄인다.", "엔지오텐신 전환효소 억제제와 베타차단제만 유지한다.", "약제의 지속적인 사용이 중요함을 설명한다.", "정상적인 혈압이 유지된다면 약제를 중단한다.", "심기능 개선과 연관이 적은 이뇨제를 중단한다."], "answer": [2], "explanation": "심부전 치료를 위한 4가지 핵심 약물(ACEi/ARB/ARNI, 베타차단제, MRA, SGLT2i)은 평생 복용해야 하는 경우가 많습니다. 환자가 현재 이 모든 약물을 복용 중이며 증상 및 심기능 호전이 있더라도 임의로 약제를 중단하거나 용량을 줄이는 것은 재악화 위험이 있어 지속적인 복용이 중요합니다. 이뇨제는 증상 개선을 위해 사용되지만, 증상 호전 시 서서히 감량할 수 있으므로 5번 선지는 완전히 틀리지는 않지만 지속적인 사용의 중요성이 더 강조됩니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["19학번", "18학번", "17학번", "15학번", "11학번"], "professor": "윤종찬", "question": "만성 수축기심부전으로 표준약물 치료 중인 57세 남자가 최근 인플루엔자 감염 후 내원 3일 전부터 갑자기 심해진 호흡곤란으로 내원하였다. 내원 시 혈압 100/60mmHg, 맥박 110 회/분, 호흡수 26 회/분이었고, 흉부 X-선 검사 상 폐부종 소견이 관찰되었고, 심장 초음파검사 상 구출률은 38% (참조: 정상치 > 55%)였다. 우측 심도자 검사 상 폐동맥쐐기압(PCWP) 32mmHg (정상치: 6-12mmHg), 심장 지수(Cardiac index) 2.3L/min/m2 (정상치: 2.6-4.2L/min/m2)이었다. 이 환자의 치료 시 가장 먼저 사용할 약물은?", "images": [], "text_box": "만성 수축기심부전으로 표준약물 치료 중인 57세 남자가 최근 인플루엔자 감염 후 내원 3일 전부터 갑자기 심해진 호흡곤란으로 내원하였다. 내원 시 혈압 100/60mmHg, 맥박 110 회/분, 호흡수 26 회/분이었고, 흉부 X-선 검사 상 폐부종 소견이 관찰되었고, 심장 초음파검사 상 구출률은 38% (참조: 정상치 > 55%)였다. 우측 심도자 검사 상 폐동맥쐐기압(PCWP) 32mmHg (정상치: 6-12mmHg), 심장 지수(Cardiac index) 2.3L/min/m2 (정상치: 2.6-4.2L/min/m2)이었다.", "options": ["전환효소억제제", "칼슘 채널 차단제", "이뇨제", "디기탈리스", "베타차단제"], "answer": [2], "explanation": "환자는 심한 호흡곤란과 폐부종 소견을 보이며, 이는 심부전 악화로 인한 체액 저류를 시사합니다. 이러한 증상을 신속하게 개선하기 위해 가장 우선적으로 고려해야 할 약물은 이뇨제입니다. 이뇨제는 체액 저류를 감소시켜 폐부종을 완화하고 호흡곤란을 개선합니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["19학번"], "professor": "윤종찬", "question": "51세 남자가 호흡곤란과 양측 하지부종으로 내원하였다. 2년 전부터 좌심실구혈률 25%로 심부전치료를 받아왔다. 콩고르 (ACEi) 1.25mg, 라식스(이뇨제) 2.5mg, 라미프릴 (B blocker) 20mg 을 복용하였다. 호흡곤란은 이뇨제 복용으로 개선이 되었지만 좌심실구혈률은 24%로 진전이 없었다. 심전도는 다음과 같을 때 치료는?", "images": [], "text_box": "51세 남자가 호흡곤란과 양측 하지부종으로 내원하였다. 2년 전부터 좌심실구혈률 25%로 심부전치료를 받아왔다. 콩고르 (ACEi) 1.25mg, 라식스(이뇨제) 2.5mg, 라미프릴 (B blocker) 20mg 을 복용하였다. 호흡곤란은 이뇨제 복용으로 개선이 되었지만 좌심실구혈률은 24%로 진전이 없었다. 심전도: II, III, aVR, aVF QRS 가 뒤집힌(?) 형태?? Wide QRS 는 확실", "options": ["디곡신 추가", "이바브라딘 추가", "아미오다른 추가", "심장재동기화 치료", "안지오텐신-네프실린 inhibitor"], "answer": [3], "explanation": "환자는 좌심실 구혈률이 24%로 심하게 저하되어 있으며, 심전도에서 Wide QRS가 관찰됩니다. Wide QRS는 좌심실과 우심실의 비동기화로 심장의 펌프 효율이 떨어지는 것을 의미합니다. 이러한 경우 심장재동기화 치료(CRT)는 심실 수축의 동기화를 개선하여 심기능을 호전시킬 수 있는 효과적인 치료법입니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["18학번"], "professor": "윤종찬", "question": "65세 심부전 있는 남자 환자가 전 달보다 호흡 곤란이 심해져 내원하였다. 환자의 심부전 치료에 필요한 조치는?", "images": [], "text_box": "-다리에 함요부종 관찰\n-혈압 110/80mmHg, 심박수 58회/분\n-심초음파: 좌심실 구혈률 40%, 심전도: sinus rhythm\n-BUN/Cr 40/1.8mg/dl, Na 132, K 5.5\n-복용 약제: ramipril 2.5mg 오전, carvedilol 12.5mg 오전/오후 2회", "options": ["Ramipril 용량 배가", "Carvedilol 용량 배가", "Spironolactone 추가", "Lasix 추가", "Cardiac resynchronization therapy (CRT) 시행"], "answer": [3], "explanation": "환자는 심부전으로 인해 호흡곤란이 심해지고 다리 부종이 관찰되어 체액 저류가 있음을 시사합니다. 현재 복용 중인 약제에 이뇨제가 명시되어 있지 않으므로, 체액 저류 증상 완화를 위해 루프 이뇨제인 Lasix를 추가하는 것이 가장 필요한 조치입니다. Spironolactone(알닥톤)은 칼륨 보존 이뇨제이자 알도스테론 길항제로 HFrEF 환자에게 권장되지만, 급성 증상 완화에는 루프 이뇨제가 더 효과적입니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["16학번", "15학번", "14학번", "13학번", "12학번"], "professor": "백상홍", "question": "아래 그림은 호흡곤란으로 응급실에 내원한 급성 환자에서 혈액학적 변화를 간단히 도식화한 것으로 x축은 좌심실충만감, y축은 좌심실구축력을 표기한 것이다. 급성 심부전환자의 약물치료제로서 B warm and wet 군에 적합한 치료법은?", "images": [], "text_box": null, "options": ["강심제", "이뇨제 + 혈관확장제", "강심제 및 혈관확장제", "수분공급"], "answer": [1], "explanation": "급성 심부전 환자의 혈역학적 분류에서 'Warm and wet (B)' 군은 울혈(congestion)이 있으나 관류(perfusion)는 양호한 상태를 의미합니다. 이 상태는 주로 폐부종을 동반하므로, 체액 저류를 줄이는 이뇨제와 전부하를 감소시키는 혈관확장제(예: 정맥확장제)를 병용하여 치료하는 것이 가장 적절합니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["16학번"], "professor": "백상홍", "question": "아래 그림은 심부전에서 좌심실과 프랑크-스타링 연관성을 설명한 그림이다. 심부전 환자에서 'A'의 혈역학적 변화를 유발하는 약물은 무엇인가?", "images": [], "text_box": null, "options": ["이뇨제", "혈관확장제 단독", "혈관확장제 + 강심제", "강심제 단독"], "answer": [0], "explanation": "프랑크-스타링 곡선에서 'A' 지점은 좌심실 충만압(preload)이 낮고 심박출량(stroke volume)도 낮은 상태를 나타냅니다. 이뇨제는 체내 수분을 제거하여 심장의 전부하를 감소시키고, 이는 좌심실 충만압을 낮추는 효과로 이어집니다. 따라서 이뇨제는 A와 같은 혈역학적 변화를 유발하는 약물입니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["16학번"], "professor": "백상홍", "question": "평소 건강한 52세 남자. 검진 흉부 방사선 촬영에서 심장이 크다는 말을 듣고 심초음파를 시행하였다. 심구출률은 45%로 확인이 되었고 최근까지 일상에 큰 문제가 되는 증상은 없었다고 한다. 다음의 것 중에 도움이 될 수 있는 조언은?", "images": [], "text_box": "평소 건강한 52세 남자. 검진 흉부 방사선 촬영에서 심장이 크다는 말을 듣고 심초음파를 시행하였다. 심구출률은 45%로 확인이 되었고 최근까지 일상에 큰 문제가 되는 증상은 없었다고 한다.", "options": ["근력 운동 위주의 운동이 좋다.", "저염식이 및 수분을 제한하는 것이 좋다.", "육식을 피하고 채식 위주의 식단이 좋다.", "금연을 하고 하루에 적포도주 한 잔 정도는 좋다.", "혈압이 많이 낮지 않으면 전환효소차단제 복약을 권한다."], "answer": [4], "explanation": "환자는 심장이 크고 심구출률이 45%로 감소되어 있지만 증상이 없는 Stage B 심부전에 해당합니다. 이 단계에서는 심부전의 진행을 예방하는 것이 중요합니다. 혈압이 낮지 않은 경우, 전환효소억제제나 베타차단제를 통해 심장 재형성을 억제하고 예후를 개선하는 것이 권장됩니다. 수분 제한은 특별한 경우에만 필요하며, 유산소 운동이 더 권장됩니다. 금연은 필수적이고, 적포도주는 과도한 섭취는 피해야 합니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["15학번", "14학번"], "professor": "", "question": "68세 남자환자가 좌심실구축력(LVEF) 35% (참조: 정상치>55%)인 NYHA functional class IV인 급성 심부전으로 응급실 방문 후 입원한 뒤, 표준 약물치료 후 NYHA class II로 상태가 호전되어 퇴원을 계획 중이다. 퇴원 시 환자에게 엔지오텐신전환효소억제제, 알도스테론길항제 등 약제의 유효성과 안정성을 설명하였고, 추가로 환자에게 이뇨제인 퓨로세마이드에 관하여 설명하고자 한다. 아래 내용 중 가장 올바른 것은?", "images": [], "text_box": "68세 남자환자가 좌심실구축력(LVEF) 35% (참조: 정상치>55%)인 NYHA functional class IV인 급성 심부전으로 응급실 방문 후 입원한 뒤, 표준 약물치료 후 NYHA class II로 상태가 호전되어 퇴원을 계획 중이다. 퇴원 시 환자에게 엔지오텐신전환효소억제제, 알도스테론길항제 등 약제의 유효성과 안정성을 설명하였고, 추가로 환자에게 이뇨제인 퓨로세마이드에 관하여 설명하고자 한다.", "options": ["퓨로세마이드는 유병률 감소효과는 있지만, 사망률 감소효과는 없다.", "퓨로세마이드를 추가하는 것은 유병률과 사망률 감소효과는 없다", "퓨로세마이드를 추가하는 것은 재입원률은 감소시킬 수 있지만, NYHA 기능적 분류를 개선시키는 효과는 없다", "퓨로세마이드를 추가하는 것은 후부하 감소효과로 심장기능을 개선시킨다"], "answer": [1], "explanation": "퓨로세마이드와 같은 루프 이뇨제는 심부전 환자의 증상 완화와 체액 저류 감소에는 효과적이지만, 유병률이나 사망률 감소 효과는 입증되지 않았습니다. 또한, 재입원률 감소 효과는 있으나 NYHA 기능적 분류를 개선시키는 데 직접적인 효과는 제한적입니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["15학번"], "professor": "백상홍", "question": "심부전으로 치료를 받던 63세 남자가 1주일 전부터 호흡곤란이 심해졌다. 내원 전날에는 누울 때 숨이 차고, 새벽에 숨이 차서 깨기도 했다. 증상 개선에 가장 도움을 주는 약제는?", "images": [], "text_box": "심부전으로 치료를 받던 63세 남자가 1주일 전부터 호흡곤란이 심해졌다. 내원 전날에는 누울 때 숨이 차고, 새벽에 숨이 차서 깨기도 했다.", "options": ["베타차단제", "푸로세마이드", "도부타민", "칼슘채널차단제", "안지오텐신전환효소 억제제"], "answer": [1], "explanation": "환자는 호흡곤란, 기좌호흡, 야간성 발작성 호흡곤란 등 심한 체액 저류 증상을 보입니다. 급성 심부전 악화 시 호흡곤란은 전부하 증가가 주된 원인이므로, 전부하를 감소시키는 약물인 루프 이뇨제(예: 푸로세마이드)를 우선적으로 투여하여 증상을 신속하게 개선해야 합니다. 푸로세마이드는 강력한 이뇨 효과로 체액량을 줄이고 폐부종을 완화합니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["14학번"], "professor": "박훈준", "question": "좌심실의 remodeling을 역전시키는 작용을 통해 다음과 같은 효과를 보여 좌심실 구혈율이 40%미만인 만성심부전환자의 치료에 권고되고 있으나, 체액 저류를 악화시킬 가능성이 있어 급성심부전의 치료에는 사용이 제한적인 약제 A는 무엇인가?", "images": [], "text_box": null, "options": ["beta blocker", "Calcium channel blocker", "Digoxin", "Hydralazine", "Nitrate"], "answer": [0], "explanation": "만성 심부전 환자에서 생존율을 개선하고 좌심실 재형성을 역전시키는 약물 중, 급성 심부전 시 체액 저류를 악화시킬 가능성이 있어 사용이 제한되는 것은 베타차단제입니다. 베타차단제는 만성 심부전 치료의 핵심 약물이나, 급성 비보상성 심부전 시에는 금기이거나 신중히 사용해야 합니다. 그래프는 약물 A가 위약군에 비해 생존율을 유의미하게 개선하고 있음을 보여줍니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["14학번"], "professor": "백상홍", "question": "평소 건강하던 22세 남자 환자가 일주일 전부터 열이 나고 이틀 전부터는 호흡곤란이 발생하여 응급실에 왔다. 흉부 X선 사진과 심전도이다. 혈압 120/80mmHg, 체온 38.5도이다. 적절하지 않은 치료는?", "images": [], "text_box": "평소 건강하던 22세 남자 환자가 일주일 전부터 열이 나고 이틀 전부터는 호흡곤란이 발생하여 응급실에 왔다. 혈압 120/80mmHg, 체온 38.5도이다.", "options": ["염분제한", "베타차단제", "이뇨제", "안지오텐신 수용체 차단제", "나이트레이트"], "answer": [1], "explanation": "환자는 발열과 호흡곤란을 동반한 급성 심부전으로, 젊은 나이에 발생한 것을 미루어 심근염 등의 원인을 고려할 수 있습니다. 급성 심부전 시 베타차단제는 심근 수축력을 저하시키고 혈압을 더 낮출 수 있어 금기입니다. 이뇨제, 염분 제한, 혈관확장제(나이트레이트) 등은 전부하 감소를 통해 호흡곤란을 개선하는 데 도움이 되며, ARB는 특별한 금기가 없으면 사용할 수 있습니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["14학번"], "professor": "백상홍", "question": "73세 남자가 1주 전 시작된 호흡곤란으로 왔다. 누우면 숨이 더 차고 새벽에 숨이 차서 잠을 깼다. 증상 개선에 가장 효과적인 약물은?", "images": [], "text_box": "73세 남자가 1주 전 시작된 호흡곤란으로 왔다. 누우면 숨이 더 차고 새벽에 숨이 차서 잠을 깼다.", "options": ["디곡신", "푸로세마이드", "도부타민", "칼슘채널 차단제", "안지오텐신 전환효소 억제제"], "answer": [1], "explanation": "환자는 기좌호흡과 야간성 발작성 호흡곤란을 호소하며, 이는 심부전으로 인한 심한 체액 저류와 폐울혈의 증상입니다. 이러한 급성 증상 개선에는 전부하를 감소시키는 약물인 루프 이뇨제가 가장 효과적입니다. 푸로세마이드는 강력한 이뇨 효과로 체액량을 빠르게 줄여 호흡곤란을 완화합니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["13학번"], "professor": "", "question": "환자의 혈압 150/90mmHg, 맥박수 100회/분이다. 베타차단제가 도움이 되지 않는 질환은?", "images": [], "text_box": null, "options": ["급성 심부전", "급성 심근경색증", "대동맥 박리증", "심방잔떨림", "비대심근병증"], "answer": [0], "explanation": "급성 심부전, 특히 체액 저류와 관류 저하가 동반된 경우에는 베타차단제 사용이 금기입니다. 베타차단제는 심근 수축력을 저하시켜 급성기 심부전의 증상을 악화시킬 수 있기 때문입니다. 급성 심근경색증, 대동맥 박리증, 심방잔떨림, 비대심근병증에서는 베타차단제가 치료에 도움이 될 수 있습니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["13학번"], "professor": "", "question": "55세 남자 건강진단에서 심장 확장 소견이 있어 심장 초음파를 받았다. 혈압 120/80mmHg, 호흡곤란 NYHA(1), 좌심실 구혈률 35%, 좌심실 확장기말 직경 55mm다. 적절한 치료는?", "images": [], "text_box": "55세 남자 건강진단에서 심장 확장 소견이 있어 심장 초음파를 받았다. 혈압 120/80mmHg, 호흡곤란 NYHA(1), 좌심실 구혈률 35%, 좌심실 확장기말 직경 55mm다.", "options": ["관찰", "이뇨제", "안지오텐신 전환효소 억제제", "디곡신", "이식형 제세동기 삽입"], "answer": [2], "explanation": "환자는 좌심실 구혈률이 35%로 감소되어 있지만, NYHA class I로 증상이 없는 Stage B 심부전에 해당합니다. 이 단계의 환자에게는 심장의 진행성 재형성을 억제하고 예후를 개선하기 위해 안지오텐신 전환효소 억제제(ACEi)나 안지오텐신 수용체 차단제(ARB)를 투여하는 것이 권장됩니다. 이뇨제는 증상이 없으므로 필요하지 않습니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["12학번", "11학번", "09학번"], "professor": "백상홍", "question": "수축기 심부전환자의 약물치료를 언급한 내용중 틀린 것은?", "images": [], "text_box": null, "options": ["심부전 시 심장의 병태생리 기전 중 중요한 신경계호르몬의 작용은 교감신경계와 레닌-안지오텐신-알도스테론계의 과도한 활성화이므로 심부전 치료시 이들의 억제가 중요하다.", "심부전치료는 앤지오텐신전환효소억제제 와 베타차단제 치료 순서에 상관없이 환자 사망률을 감소할 수 있다.", "디기탈리스는 심부전 재입원률 및 사망률을 감소시킨다.", "울혈성 심부전시 푸로세마이드계열 이뇨제사용은 환자 재입원과 사망률을 감소시키지 않는다."], "answer": [2], "explanation": "심부전의 병태생리에서 신경계호르몬의 과도한 활성화는 억제되어야 합니다. ACEi와 베타차단제는 사망률 감소에 기여하며 순서와는 무관합니다. 디기탈리스는 심부전 재입원률을 감소시키지만 심혈관 사망률은 감소시키지 않습니다. 푸로세마이드와 같은 이뇨제는 증상 완화를 위한 약물이며, 환자 재입원과 사망률 감소에는 직접적인 효과가 없습니다. 따라서 디기탈리스가 사망률을 감소시킨다는 내용은 틀렸습니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["11학번", "09학번"], "professor": "", "question": "57세 여자환자가 좌심실구축력(LVEF) 34% (참조: 정상치> 50%)인 수축기 심부전으로 입원한 뒤, 표준 약물치료 후 상태가 호전되어 퇴원을 계획중이다. 퇴원시 환자에게 앤지오텐신전환효소 억제제, 스타틴, 아스피린, 디기탈리스, 퓨로세마이드 등 약제의 유효성을 설명하였고, 마지막으로 환자에게 알도스테론길항제의 이득을 설명하려고 하는데, 내용 중 가장 올바른 것은?", "images": [], "text_box": "57세 여자환자가 좌심실구축력(LVEF) 34% (참조: 정상치> 50%)인 수축기 심부전으로 입원한 뒤, 표준 약물치료 후 상태가 호전되어 퇴원을 계획중이다. 퇴원시 환자에게 앤지오텐신전환효소 억제제, 스타틴, 아스피린, 디기탈리스, 퓨로세마이드 등 약제의 유효성을 설명하였고, 마지막으로 환자에게 알도스테론길항제의 이득을 설명하려고 하는데, 내용 중 가장 올바른 것은?", "options": ["앤지오텐신전환효소억제제, 이뇨제 이외에 알도스테론길항제를 추가하는 것은 실제로는 유병률과 사망률 감소효과는 없다.", "앤지오텐신전환효소억제제, 이뇨제 이외에 알도스테론길항제를 추가하는 것은 실제로는 재입원률 감소와 사망률 감소효과가 있다.", "앤지오텐신전환효소억제제, 이뇨제 이외에 알도스테론길항제를 추가하는 것은 실제로는 재입원률은 감소시킬 수 있지만, NYHA 기능적 분류를 개선시키는 효과는 없다.", "알도스텔돈길항제은 앤지오텐신전환효소억제제에 효과가 없는 사람에게만 유효하다."], "answer": [1], "explanation": "알도스테론 길항제(MRA)는 엔지오텐신 전환효소 억제제(ACEi) 및 이뇨제와 함께 사용될 때, 심부전 환자의 재입원율과 사망률을 유의미하게 감소시키는 효과가 있습니다. NYHA 기능적 분류 개선에도 기여하며, ACEi에 효과가 없는 사람에게만 유효한 것은 아닙니다. 따라서 재입원률 감소와 사망률 감소 효과가 있다는 설명이 가장 올바릅니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["10학번", "11학번", "09학번"], "professor": "김철민", "question": "심부전 환자의 사망률 개선 효과가 입증되지 않은 약제는?", "images": [], "text_box": null, "options": ["베타 차단제", "안지오텐신 전환효소 억제제", "안지오텐신 수용체 차단제", "알도스테론 길항제", "디곡신"], "answer": [4], "explanation": "베타차단제, 안지오텐신 전환효소 억제제(ACEi), 안지오텐신 수용체 차단제(ARB), 알도스테론 길항제(MRA)는 심부전 환자의 사망률을 유의미하게 감소시키는 효과가 입증된 약물들입니다. 반면, 디곡신은 심부전으로 인한 입원율을 감소시키지만 사망률을 감소시키는 효과는 입증되지 않았습니다. 따라서 디곡신이 사망률 개선 효과가 입증되지 않은 약제입니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["11학번"], "professor": "서석민", "question": "1년 전 수축기 심부전으로 진단을 받은 65세 남자가 약물 치료 중에도 반복되는 호흡곤란을 주소로 내원하였다. 호흡곤란은 간단한 일상생활에도 발생하였으나 휴식 시에는 호전되는 양상이었다. 내원하여 시행한 심전도 및 심초음파의 소견(좌심실구축력 17%)이 다음과 같을 때 고려해 볼 수 있는 가장 적합한 치료는?", "images": [], "text_box": "1년 전 수축기 심부전으로 진단을 받은 65세 남자가 약물 치료 중에도 반복되는 호흡곤란을 주소로 내원하였다. 호흡곤란은 간단한 일상생활에도 발생하였으나 휴식 시에는 호전되는 양상이었다. 내원하여 시행한 심전도 및 심초음파의 소견(좌심실구축력 17%)이 다음과 같을 때 고려해 볼 수 있는 가장 적합한 치료는?", "options": ["디곡신 (digoxin)", "승압제 (inotropic)", "인공 심방동기 (pacemaker)", "심장제동기화 치료 (cardiac resynchronization therapy)", "좌심실보조장치 (left ventricle assist device)"], "answer": [3], "explanation": "환자는 좌심실 구혈률이 17%로 심하게 저하되어 있고, 심전도 상 Wide QRS (QRS duration > 120ms)가 관찰됩니다. 이는 심실 수축의 비동기화를 의미하며, 약물 치료에도 불구하고 증상이 지속될 때 심장재동기화 치료(CRT)를 고려할 수 있는 중요한 기준입니다. CRT는 심실 수축을 동기화하여 심기능을 개선하고 증상을 완화하는 데 효과적입니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["10학번"], "professor": "김철민", "question": "급성심부전 warm and wet 형태에서 사용하는 치료제 2 가지?", "images": [], "text_box": null, "options": ["네리지타이드, 나이트로글리세린"], "answer": [0], "explanation": "급성 심부전의 Warm and wet 형태는 울혈이 있으나 관류는 양호한 상태를 의미합니다. 이 경우 전부하를 감소시키고 증상을 완화하기 위해 이뇨제와 혈관확장제가 사용됩니다. 제시된 약물 중 네리지타이드와 나이트로글리세린은 모두 혈관확장제이며, 네리지타이드는 BNP 유사체로 이뇨 및 혈관확장 효과를 가집니다."}, {"subject": "심부전진단,치료(급성,만성)", "year": ["09학번"], "professor": "", "question": "65세 여자가 한달전부터 발생한 운동시 발생하는 호흡곤란을 주소로 내원하였다. 혈압은 130/80mmHg, 청진상 S3음이 청진되었고, 심초음파상 좌심실 확장기말 용적이 72mm, 좌심실 구혈율이 30%였다. 적절한 치료 약물 조합은?", "images": [], "text_box": "65세 여자가 한달전부터 발생한 운동시 발생하는 호흡곤란을 주소로 내원하였다. 혈압은 130/80mmHg, 청진상 S3음이 청진되었고, 심초음파상 좌심실 확장기말 용적이 72mm, 좌심실 구혈율이 30%였다.", "options": ["furosemide, ACE inhibitor, beta-blocker", "furosemide, dopamine, beta-blocker", "furosemide, dobutamine, ACE inhibitor", "digoxin, ACE inhibitor, dopamine", "digoxin, furosemide, ACE inhibitor"], "answer": [0], "explanation": "환자는 좌심실 구혈률 30%의 심부전과 호흡곤란, S3음 등 체액 저류 및 울혈 증상을 보입니다. 이러한 심부전 환자에게는 루프 이뇨제(furosemide)로 증상을 조절하고, ACE inhibitor와 베타차단제는 심기능 개선 및 사망률 감소를 위해 필수적인 약물입니다. 따라서 furosemide, ACE inhibitor, beta-blocker의 조합이 가장 적절한 치료 약물 조합입니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["21학번", "20학번"], "professor": "김용한", "question": "심장이식수술 후 공여된 심장에 대한 설명으로 맞는 것은?", "images": [], "text_box": null, "options": ["ㄱ. 공여된 심장은 중추신경계 각종약제에 반응한다.", "ㄴ. 경동맥 마사지, 안구 압박 등에 이식 심장이 영향을 받지 않는다.", "ㄷ. 수술 후 시간이 지남에 따라 구심성 신경재지배가 이루어진다.", "ㄹ. 이식된 심장에 관상동맥 협착증이 발생하면 흉통이 없다."], "answer": [2], "explanation": "이식된 심장은 교감 및 부교감 신경이 절단되어 중추신경계 약제나 경동맥 마사지, 안구 압박 등에 반응하지 않습니다. 시간이 지나도 구심성 신경 재지배는 거의 이루어지지 않습니다. 따라서 관상동맥 협착이 발생해도 흉통이 나타나지 않으며, 이러한 이유로 ㄴ과 ㄹ이 옳습니다. 정답은 3번입니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["20학번"], "professor": "김용한", "question": "심장이식수술을 시행하는데 있어 다음과 같은 공여 심장의 특징으로 절대적 금기증(absolute contraindication)에 해당하는 것은?", "images": [], "text_box": null, "options": ["ㄱ. 중증의 관상동맥협착증", "ㄴ. 중증의 심장판막질환", "ㄷ. 중증의 폐동맥 고혈압", "ㄹ. 인체 면역결핍 바이러스(HIV) 양성", "ㅁ. 정맥 약물 남용(Intravenous drug abuse)"], "answer": [3], "explanation": "심장이식수술 시 공여 심장의 절대적 금기증으로는 중증 관상동맥협착증, 중증 심장판막질환, 중증 폐동맥 고혈압, HIV 양성 등이 해당됩니다. 정맥 약물 남용의 경우, 활성 상태가 아니거나 철저한 선별검사를 통해 감염 및 장기 손상 여부를 확인한 후 상대적 금기증으로 고려될 수 있어 항상 절대적 금기증은 아닙니다. 따라서 ㄱ, ㄴ, ㄷ, ㄹ이 절대적 금기증에 해당하여 4번이 정답입니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["19학번", "18학번"], "professor": "박찬범", "question": "이 때 가장 적절한 처치방법은?", "images": [], "text_box": "고혈압, 고지질혈증의 기저질환이 있는 57세 여자환자가 갑작스러운 흉통과 경련을 주소로 응급실로 내원하였다. 응급실에서 시행한 심전도 검사상 심실세동 소견을 보여 제세동을 시행하였으며 이후 리듬은 ST elevation 이었다. 이후 관상동맥조영술 검사상 이상소견은 관찰되지 않았으나, 조영술 중 심실성 빈맥 지속되어 대퇴동맥과 대퇴정맥을 통하여 ECMO 를 시행하였다. 심장 초음파 검사상 EF 는 16%였으며, 심한 우심실 기능부전과 중등도의 승모판막폐쇄부전증이 동반되어 있었으나, ECMO 시행 후 산소포화도는 100%로 호전되었다. 입원 2병일째 시행한 추가 심장 초음파 검사상 EF 는 30%로 심장 기능은 호전되었으나, 환자는 다시 심한 호흡곤란을 호소하며 산소포화도가 80%로 감소되었다.", "options": ["1) ECMO 산화기를 교체한다.", "2) CCRT (continuous renal replacement therapy)를 시행한다.", "3) 폐동맥색전증을 의심하여 흉부 CT 를 시행한다.", "4) high flow 를 apply 하여, 이후에도 산소포화도 저하시에는 기계환기를 고려한다.", "5) 노르에피네프린의 용량을 증량한다."], "answer": [3], "explanation": "환자는 심장 기능은 호전되었으나 갑자기 심한 호흡곤란과 산소포화도 저하를 보여 새로운 폐 관련 합병증을 시사합니다. 폐동맥색전증 등 가능성이 있지만, 급성 호흡곤란에 대한 초기 처치는 충분한 산소 공급과 필요 시 기도 확보 및 기계환기입니다. 따라서 high flow 산소를 적용하고 호전되지 않으면 기계환기를 고려하는 것이 가장 적절한 초기 처치입니다. 동시에 원인에 대한 추가적인 진단 검사를 고려해야 합니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["19학번", "18학번"], "professor": "박찬범", "question": "이때 가장 먼저 시행할 처치방법으로 가장 적절한 것은?", "images": [], "text_box": "평소 건강하게 지내던 63세 남자 환자가 흉통과 호흡곤란을 주소로 응급실 내원하였다. 심전도상 II, III, aVF 에서 ST elevation 관찰되어 STEMI 진단 하에 응급으로 관상동맥조영술을 시행하였다. 관상동맥 조영술 검사상 좌주관상동맥에서 80% 협착과 함께 좌전하행지 70%, 좌회선분지 35% 협착이 관찰되었다. 좌전하행지 경피적관상동맥중개술중 혈압체크 되지 않고 경련양상을 보이며 산소포화도가 72%로 감소되어 기관 삽관 후 CP를 시작하였다. 고용량의 강심제 투여에도 불구하고 혈압은 측정되지 않았다.", "options": ["1. ECMO extracorporeal membrane oxygenation", "2. VAD ventricular assist devices", "3. pericardiocentesis", "4. 개흉마사지", "5. 관상동맥우회로술"], "answer": [0], "explanation": "급성 심근경색 환자가 PCI 시술 중 심인성 쇼크에 빠져 혈압이 측정되지 않고 고용량 강심제에도 반응하지 않는 상황입니다. 이는 생명을 위협하는 매우 심각한 상태로, 즉각적인 기계적 순환 보조가 필요합니다. ECMO는 심폐 기능 부전 시 효과적인 순환 및 호흡 보조를 제공하며, 이러한 급성 악화 상황에서 가장 신속하고 강력한 처치 방법입니다. VAD는 장기적인 보조 장치로 즉각적인 상황에 적합하지 않습니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["17학번"], "professor": "권종범", "question": "이후 가장 적절한 조치는?", "images": [], "text_box": "55세 남자환자 8일전부터 발생한 안정 시 흉통 악화, 내원 1일전부터 발생한 전신무력감, 호흡곤란 주소로 응급실 내원하였다. 급성 진단 하 응급 관상동맥 조영술 시행하였으며 좌전하행지(LAD), 좌회선지(LCx)에 심한 협착 소견 확인되어 관상동맥 스텐트 삽입하였다. 시술 중 수축기 혈압이 60대 이하로 저하되어 승압제 투약하였으니 호전 없고 이후 심전도상 심실 세동 발생하여 제세동 하였으나 호전이 없었다. 내원 시 심전도: 정상동조율 리듬, I, aVL, V1−V6 ST 상승, Ⅱ, Ⅲ, aVF ST 하강 소견. 시술 전 심초음파: 심한 좌심실 수축기능 저하 소견(LVEF: 30–35%), 좌전하행지 및 좌회선지의 국소 벽 운동 장애 소견, 중등 대동맥 판막 폐쇄 부전.", "options": ["1) 체외막 산소화 장치(ECMO)", "2) 대동맥 내 풍선 펌프(IABP)", "3) 체내 삽입형 자동 제세동기(ICD)", "4) 폐동맥 도자 카테터 삽입(swan Ganz catheter insertion)", "5) 이식형 좌심실 보조장치(LVAD)"], "answer": [0], "explanation": "환자는 급성 심근경색으로 인한 심인성 쇼크 상태로, 혈압 저하 및 심실 세동이 제세동에 불응하는 위중한 상황입니다. 심한 심실 기능 저하와 중등도 대동맥판막 폐쇄 부전이 동반되어 IABP나 LVAD는 금기일 수 있습니다. 이러한 상황에서 가장 강력하고 신속한 기계적 순환 보조 장치는 ECMO입니다. ECMO는 심폐 기능 부전을 동시에 보조하여 생명을 유지하는 데 필수적입니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["16학번"], "professor": "권종범", "question": "cardiogenic shock으로 입원하여 medical treatment에도 호전이 없어 다음과 같은 시술을 시행하였다. 이 시술과 관련된 내용으로 맞는 조합은?", "images": [], "text_box": "가. Refractory ARDS에서도 사용 가능하다.\n나. 심장이식의 bridge therapy로 사용 가능하다.\n다. 소아에서도 사용 가능하다\n라. Femoral vein에서 blood가 나와 oxygenation되어 다시 femoral artery로 들어간다.\n마. 개심술 후 체외순환 이탈이 안되는 경우", "options": ["1) 가나다라", "2) 가다", "3) 나라", "4) 라", "5) 가나다라마"], "answer": [4], "explanation": "제시된 이미지는 ECMO (체외막 산소화 장치) 시술을 보여줍니다. ECMO는 난치성 ARDS 환자의 호흡 보조, 심장이식의 가교 치료, 소아 환자 치료, 그리고 개심술 후 체외순환 이탈이 안 되는 경우 등 다양한 심폐 부전 상황에 사용됩니다. 또한, 대퇴 정맥에서 혈액을 뽑아 산소화시킨 후 대퇴 동맥으로 다시 넣는 방식은 VA-ECMO의 일반적인 방법입니다. 따라서 제시된 모든 설명이 ECMO에 대한 옳은 내용입니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["15학번", "14학번", "12학번", "10학번"], "professor": "권종범", "question": "다음의 흉부 사진을 보고 삽입되어 있는 device는? (모두 고르시오.)", "images": [], "text_box": "62세 여자 환자가 acute myocardial infarction로 내원하여 PCI 시행 후 heart failure 및 ventricular tachycardia가 발생하였고 antiarrhythmic drug에 intractable하여 device 삽입과 조치를 취한 후 ICU로 옮겨진 후 찍은 흉부 사진이다.", "options": ["1) Central line", "2) IABP", "3) Laryngeal tube", "4) ECMO (PCPS)", "5) EKG monitor lead and line"], "answer": [0, 1, 2, 3, 4], "explanation": "제시된 흉부 X-ray 사진은 중환자실 환자에서 흔히 볼 수 있는 여러 기구를 보여줍니다. 중심정맥관(Central line)과 기관내튜브(Endotracheal tube, airway device의 일종)가 명확히 보이며, 대동맥 내 풍선 펌프(IABP) 카테터도 확인됩니다. 또한 심부전 및 VT의 임상적 상황을 고려할 때 ECMO cannulae도 삽입되어 있을 가능성이 높으며, EKG 모니터링은 필수적이므로 리드 및 라인도 당연히 존재합니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["15학번", "14학번"], "professor": "권종범", "question": "본 치료에 관한 틀린 설명을 고르시오", "images": [], "text_box": "평소 조금만 움직여도 호흡곤란을 가진 85세 여자 환자에게 국소마취 하에 대퇴동맥을 통해 다음과 같은 시술이 시행되었다. 환자는 평소 심각한 만성 폐쇄성질환 (COPD)를 가지고 있었다.", "options": ["1) 심장초음파로 측정한 대동맥판 면적 0.9cm2, 대동맥판 최대혈류속도 4.1m/sec라면 본 시술의 적응이 된다.", "2) 본 시술의 이름은 경피적 인공판막삽입술 TAVI (Transcatheter aortic valve implantation)이다", "3) 중증 판막협착증 환자 중 수술의 위험이 비교적 적은 환자에게 주로 시행된다", "4) 시술 후 방실전도장애나 대동맥판 폐쇄부전증이 부작용으로 생길 수 있다", "5) 삽입된 인공판막은 metal 재질보다는 생체조직으로 만든 것이다"], "answer": [2], "explanation": "제시된 임상 양상(85세 고령, COPD, 대퇴동맥을 통한 시술)은 경피적 대동맥판막 삽입술(TAVI)에 해당합니다. TAVI는 주로 고령이나 동반 질환으로 인해 개흉 수술의 위험이 높은 중증 대동맥판막 협착증 환자에게 시행됩니다. 따라서 수술 위험이 비교적 적은 환자에게 주로 시행된다는 설명은 틀렸습니다. TAVI는 생체조직 판막을 사용하며, 시술 후 합병증으로 방실전도장애나 대동맥판 폐쇄부전증이 발생할 수 있습니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["15학번"], "professor": "권종범", "question": "다음 중 옳은 것을 고르시오.", "images": [], "text_box": "42 세 남자. 4 시간 전부터 발생한 흉통으로 응급실 내원.\n10 년간의 고혈압으로 고혈압 치료제 복용.\n20 갑년의 smoker.\n초기 활력징후는 BP 70/50, HR 120 이었으나, 이후 의식이 소실되고 pulse 가 없어져 CPR을 시행하였고 다음과 같은 시술을 시행하였다. 내원 시 ECG는 다음과 같다.", "options": ["1. ECMO 삽입이 되어있다.", "2. IABP 삽입이 되어 있다.", "3. 하지 원위부 혈관의 허혈을 주의해야 한다.", "4. heparin 등을 이용한 혈전 방지가 필수이다.", "5. 삽입 시술은 전신마취를 하에 시행되어야 한다.", "6. 인공호흡기는 거치할 필요가 있다."], "answer": [0, 2, 3, 5], "explanation": "환자는 심인성 쇼크로 CPR 시행 후 ECMO 시술을 받았습니다. 첫 번째 그림은 ECMO 기계와 환자, 두 번째 그림은 대퇴부 ECMO 삽관을 보여줍니다. 따라서 ECMO가 삽입되어 있습니다. 대퇴동맥을 통한 ECMO 시술 시 하지 원위부 혈관의 허혈이 흔한 합병증이며, 혈전 방지를 위해 헤파린 투여는 필수적입니다. 인공호흡기는 ECMO 중 호흡 부전을 관리하기 위해 거치될 수 있습니다. X-선 사진에서 IABP는 명확하게 보이지 않습니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["14학번"], "professor": "권종범", "question": "불안정 협심증으로 심혈관 조영실에서 검사 및 경피적 관동맥 성형술을 계획하던 중, 경증의 호흡곤란을 호소하며 혈압이 80/60mmHg으로 측정되었다. 이에 관동맥 성형술에 앞서 다음의 기구를 삽입하였다. 기구의 이름은 무엇인가?", "images": [], "text_box": "불안정 협심증으로 심혈관 조영실에서 검사 및 경피적 관동맥 성형술을 계획하던 중, 경증의 호흡곤란을 호소하며 혈압이 80/60mmHg으로 측정되었다. 이에 관동맥 성형술에 앞서 다음의 기구를 삽입하였다.", "options": ["1) IVAD", "2) RVAD", "3) ECMO", "4) IABP", "5) pacemaker"], "answer": [3], "explanation": "제시된 혈관 조영 이미지에는 대동맥 내에 위치한 풍선 모양의 카테터가 보입니다. 이는 혈역학적으로 불안정한 환자에서 심장 부담을 줄이고 관상동맥 혈류를 증가시키기 위해 삽입하는 대동맥 내 풍선 펌프(IABP)의 전형적인 모습입니다. 불안정 협심증과 저혈압 상황에서 PCI 시술 전 혈역학적 지지를 위해 사용되는 대표적인 기구입니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["14학번"], "professor": "권종범", "question": "이 시술의 금기증 2가지를 고르시오.", "images": [], "text_box": "불안정 협심증으로 혈관 조영실에서 검사 및 경피적 관동맥 성형술을 계획하던 중 경증의 호흡곤란을 호소하며 혈압이 80/60mmHg으로 측정되었다. 이에 관동맥 성형술에 앞서 다음의 기구를 삽입하였다.", "options": ["① Rt. Aortic arch", "② aortic stenosis", "③ previous aortic surgery", "④ severe atherosclerotic aorta", "⑤ tortuous ileofemoral artery"], "answer": [3, 4], "explanation": "제시된 그림은 대동맥 내 풍선 펌프(IABP) 시술을 보여줍니다. IABP의 금기증으로는 대동맥 박리, 대동맥판막 역류, 그리고 심한 대동맥 및 말초 혈관 죽상경화증, 심하게 굴곡진 장골-대퇴동맥 등이 있습니다. 따라서 심한 죽상경화증을 가진 대동맥과 굴곡진 장골대퇴동맥은 IABP 삽입의 주요 금기증에 해당합니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["11학번"], "professor": "권종범", "question": "이 시술 후 환자에게 기대되는 효과는?", "images": [], "text_box": "61세 여자환자가 호흡곤란을 주소로 내원하여 검사한 심 초음파 소견(사진4)이다. 이 환자는 이후 6개월 이상 ACEi를 포함한 약물 치료를 시행하였으나, 호전소견을 보이지 않아 입원하여 시술을 시행하였다. 시술 후 Chest X-ray(사진5)와 ECG소견(사진6)이다.", "options": ["① 가, 나, 다", "② 가, 다", "③ 나, 라", "④ 라", "⑤ 가, 나, 다, 라"], "answer": [0], "explanation": "제시된 흉부 X-ray(사진5)에서 세 개의 리드가 심장에 삽입되어 있어 심장 재동기화 치료(CRT) 장치임을 알 수 있습니다. CRT는 좌심실 구혈률이 저하되고 QRS 간격이 넓은 만성 심부전 환자에게 시행하며, 구혈률 증가, 6분 보행 거리 개선, NYHA 등급 개선, 삶의 질 향상 및 생존율 증가, 입원율 감소 등의 효과를 기대할 수 있습니다. 따라서 가, 나, 다가 옳은 설명입니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["11학번"], "professor": "권종범", "question": "이 시술과 관계없는 것은?", "images": [], "text_box": "불안정 협심증으로 혈관 조영실에서 심혈관조영술을 시행하고 경피적 관동맥 성형술을 계획하던 중 흉통과 호흡곤란을 호소하며 혈압이 80/60mmHg으로 측정되었다. 이에 경피적 관동맥 성형술에 앞서 다음의 기구를 삽입하는 시술을 시행하였다.", "options": ["① 동맥의 이완기 압력을 상승시킨다.", "② 심박출량을 향상시킨다", "③ 이완기 초기에 풍성 확장으로 관동맥 혈류를 향상시킨다", "④ 수축기 초기에 풍성 수축으로 후부하를 감소시킨다", "⑤ 심한 승모판 역류증이 있으면 시술의 금기증이다."], "answer": [4], "explanation": "제시된 그림은 대동맥 내 풍선 펌프(IABP) 시술을 보여줍니다. IABP는 동맥의 이완기 압력을 상승시키고, 이완기 초기에 풍선 확장으로 관동맥 혈류를 향상시키며, 수축기 초기에 풍선 수축으로 후부하를 감소시켜 심박출량을 향상시킵니다. 심한 승모판막 역류증은 IABP의 금기증 중 하나가 아니라, 대동맥판막 역류가 IABP의 금기증에 해당합니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["10학번"], "professor": "권종범", "question": "가장 우선적인 치료는?", "images": [], "text_box": "24세 여자가 호흡곤란을 호소하며 응급실에 왔다. 180/60 mmHg, 맥박 110회/분, 호흡수 30회/분, 체온 36 주 전부터 감기 증상이 있었고 내원 전일부터 호흡곤란이 도이고, 흉부 CT 소견은 아래와 같다. 점점 심해졌다. 혈압 50/20 mmHg, troponin T: 0.23 ng/mL(정상 0.1 ng/mL 이하), 치료는?", "options": ["① 이뇨제 투여", "② 도부타민 투여", "③ 나이트로프루사이드 투여", "④ 베타차단제 투여", "⑤ 기계적 순환보조"], "answer": [4], "explanation": "환자는 감기 증상 후 발생한 급성 호흡곤란, 저혈압 (50/20 mmHg), 트로포닌 T 상승 소견을 보이며 바이러스성 심근염으로 인한 급성 심부전 및 심인성 쇼크가 의심됩니다. 이러한 상황에서 이뇨제, 혈관확장제(나이트로프루사이드), 베타차단제는 혈압을 더 떨어뜨릴 수 있어 금기입니다. 도부타민은 강심제이지만 혈관확장 효과도 있어 저혈압을 악화시킬 수 있습니다. 기계적 순환 보조(ECMO 등)는 심인성 쇼크로 인한 급성 심부전에 가장 적절하고 강력한 치료입니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["09학번"], "professor": "권종범", "question": "다음 중 KONOS 응급도 0에 해당하는 것을 고르시오.", "images": [], "text_box": null, "options": ["① 과급성 거부반응", "② 심부전으로 인한 인공호흡기 사용", "③ 체외막형 심폐기 가동중인 환자", "④ 심부전 수술을 받고 재이식이 필요한 경우", "⑤ 나이가 6개월 미만인 경우로 안정형 중증 상태"], "answer": [0], "explanation": "KONOS(국립장기이식관리센터)의 장기이식 응급도 분류에서 0순위는 생명이 위급한 최우선적인 상황을 의미합니다. 과급성 거부반응은 장기 이식 후 즉시 발생하여 치명적인 결과를 초래할 수 있는 상황이므로 0순위 긴급 이식 대상이 됩니다. 나머지 보기들은 1순위나 기타 순위에 해당할 수 있습니다."}, {"subject": "심부전의외과적치료및순환보조장치", "year": ["09학번"], "professor": "권종범", "question": "다음 중 IABP의 금기에 해당하는 것을 고르시오.", "images": [], "text_box": "가. Aortic dissection\n나. Cardiogenic shock\n다. Aortic insufficiency\n라. Mitral stenosis", "options": ["① 가, 나, 다", "② 가, 다", "③ 나, 라", "④ 라", "⑤ 가, 나, 다, 라"], "answer": [1], "explanation": "IABP는 대동맥 내에 풍선을 삽입하여 심장 기능을 돕는 장치이므로, 대동맥 자체의 문제가 있는 경우 시술이 금기됩니다. 대동맥 박리(Aortic dissection)와 대동맥판막 역류(Aortic insufficiency)는 IABP의 주요 금기증입니다. 반면, 심인성 쇼크(Cardiogenic shock)는 IABP의 적응증이며, 승모판막 협착증(Mitral stenosis)은 직접적인 IABP 금기증이 아닙니다. 따라서 가와 다가 금기증에 해당하여 2번이 정답입니다."}, {"subject": "심부전TBL", "year": ["21학번"], "professor": "김진진", "question": "80세 여자가 3년 전부터 운동 시에 숨이 차서 왔다. 20년간 고혈압과 당뇨약을 복용하고 있었으며 무릎의 퇴행성 관절염으로 소염진통제도 복용하고 있었다. 2걸음 걸어 가며 힘들다고 하고 앉아 쉬거나 야간 호흡곤란은 없다고 한다. 가슴 청진에서 왼쪽 옆 다섯 번째 흉골연에서 3/6의 수축기 심잡음이 들렸고, 들숨에 증가되었다. 호흡음은 정상이었다. 심장 초음파에서 좌심실 구혈률 60%, 삼천판막 속 도는 4m/sec, 좌심실 비대와 좌심방, 우심방 확장, 우 심도자술에서 폐 모세혈 관 쐐기압은 25mmHg(참고치<15mmHg)였다. 치료는?", "images": [], "text_box": null, "options": ["삼천판 치환술", "퓨로세마이드", "엔도텔리 수용체 차단제", "포스포디에스테라제-5 억제제", "기관지 확장제"], "answer": [1], "explanation": "이 환자는 심장 초음파 상 폐 모세혈관 쐐기압이 25mmHg로 상승하여 울혈성 심부전의 소견을 보입니다. 2022년 심부전 가이드라인에 따르면, 좌심실 박출률과 상관없이 울혈 증상이나 징후가 동반된 모든 환자에게 이뇨제 사용이 강력히 권고됩니다. 이뇨제는 체액 저류를 감소시켜 심장의 전부하를 줄이고 호흡곤란과 같은 울혈 증상을 완화하는 데 효과적입니다. 따라서, 환자의 증상을 고려할 때 이뇨제인 퓨로세마이드를 사용하는 것이 가장 적절한 치료법입니다."}, {"subject": "심부전TBL", "year": ["21학번"], "professor": "김진진", "question": "가슴 x 선 사진이다. 우선적으로 시행해야 하는 혈액 검사는?", "images": [], "text_box": "60세 여자가 한 달 전부터 걸으면 숨이 차서 병원에 왔다. 누우면 숨이 차고, 새벽에도 숨이 차서 잠에서 깬다. 7년전 부터 혈압 강하제와 혈당강하제를 복용하고 있다. 혈압 120/70, 맥박 84, 호흡 20, 체온 36.6 도이다. 가슴 청진할 때 제3 심음이 들리고, 양쪽 등쪽 아랫부분에서 거품소리가 들린다.", "options": ["D-이량체", "트로포닌-T", "C-반응단백질", "크레아틴 키나이제", "뇌나트륨 이뇨펩티드"], "answer": [4], "explanation": "심부전 진단 및 배제에 있어서 나트륨이뇨펩타이드(BNP) 또는 NT-proBNP의 측정을 첫 검사로 필수적으로 권고합니다. 환자는 운동 시 호흡곤란, 기좌호흡, 야간 발작성 호흡곤란, 제3 심음, 폐 거품소리 등 심부전을 강력히 시사하는 증상과 신체 검진 소견을 보입니다. 흉부 X-선에서도 심비대와 폐부종이 예상됩니다. BNP는 심장의 부담이 증가할 때 분비되며, 혈중 수치는 심부전의 유무와 중증도를 반영합니다. 따라서 환자의 임상적 심부전이 의심되는 상황에서 BNP 검사는 진단적 가치가 높아 우선적으로 시행해야 할 혈액 검사입니다."}, {"subject": "심부전TBL", "year": ["21학번"], "professor": "김진진", "question": "심부전과 관련하여, 전부하를 줄이는 데 도움이 되는 것은?", "images": [], "text_box": null, "options": ["물을 적게 마신다", "유산소 운동을 한다", "음식을 싱겁게 먹는다", "금연과 금주", "육식은 적게 하고 채식을 주로 한다"], "answer": [2], "explanation": "심장 기능에 영향을 미치는 요소 중 전부하를 줄이는 것은 심부전 환자의 '짐 줄이기'에 해당합니다. 저염식이는 혈액량을 줄여 심장으로 돌아오는 혈액량, 즉 전부하를 효과적으로 감소시키는 대표적인 방법입니다. 비스듬히 앉히는 자세나 이뇨제, 질산염제 등도 전부하를 줄이는 데 도움을 줍니다. 물을 적게 마시는 것은 탈수를 유발할 수 있어 부적절하며, 유산소 운동, 금연 및 금주, 특정 식단 제한은 전부하 감소와 직접적인 관련이 적습니다. 따라서 제시된 보기 중에서는 '음식을 싱겁게 먹는다'가 전부하 감소에 가장 직접적으로 기여합니다."}, {"subject": "심부전TBL", "year": ["21학번"], "professor": "김진진", "question": "다음 중 가역적 확장성 심근병의 원인으로 옳은 것은? 가) 알코올 남용 나) 만성적으로 조절되지 않는 빈맥 다) 임신 라) 갑상선 질환", "images": [], "text_box": "41세 여자 환자가 활동 시 호흡곤란과 양층 정강뼈앞 오목부종을 주소로 내원하였다. 환자는 20년전부터 매일 소주 1병 이상을 먹었다고 한다. 이학적 검사결과 양쪽 등쪽 아랫부분에서 거품소리와 심첨 부위에 수축기 심잡음이 들렸다. 시행한 심초음파 검사에서 좌심실이 확장되었고 좌심실 수축 기능이 저하되어 왼심실 박출률은 34%이고, 혈중 NT-pro-BNP (뇌나트륨이뇨펩티드) 수치는 2100pg/mL 이었다. 표준 약물 치료 6개월 후 추적심초음파 검사 결과 좌심실 확장과 좌심실 수축 기능이 호전되었다.", "options": ["가, 나, 다", "가, 다", "나, 라", "라", "가, 나, 다, 라"], "answer": [4], "explanation": "가역적 확장성 심근병증은 심근의 확장과 수축 기능 저하가 발생했으나, 원인 교정 시 심기능이 회복될 수 있는 경우를 말합니다. 주요 원인으로는 알코올 남용, 만성적으로 조절되지 않는 빈맥, 임신, 갑상선 질환, 그리고 코카인 중독 등이 있습니다. 이 환자의 경우 20년 동안 매일 소주 1병 이상을 마셨다는 점이 알코올 남용에 의한 심근병증을 강력히 시사하며, 치료 후 호전된 것이 가역성을 뒷받침합니다. 따라서 제시된 '가) 알코올 남용, 나) 만성적으로 조절되지 않는 빈맥, 다) 임신, 라) 갑상선 질환'은 모두 가역적 확장성 심근병증의 원인으로 옳은 보기입니다."}, {"subject": "심부전TBL", "year": ["19학번"], "professor": "서석민", "question": "심부전 치료 후 퇴원하는 환자에게 해줄 수 있는 조언은? 입원 초기 BNP 는 3300 이었고, 심초음파에서 심구출률이 17%였다.", "images": [], "text_box": null, "options": ["숨이 찬 운동 권고", "저염식이 및 수분 제한 권고", "퇴원 후 집안에서 2주 동안 안정 권고", "육식을 금하고 채식 위주의 식단 권고", "금연을 하고 하루에 적포도주 한잔 권고"], "answer": [0], "explanation": "현재 가이드라인에서는 금연과 금주를 권유하며, 육류 섭취를 반드시 제한할 필요는 없습니다. 다만, 하루 2~3g 미만으로 염분을 제한하는 것은 심부전 예방과 관리에 좋습니다. NYHA classification 2,3 환자의 경우 유산소 운동을 포함한 운동을 하는 것이 더 좋다고 권고됩니다. 따라서 숨이 차더라도 적절한 수준의 운동은 심기능 개선에 도움이 될 수 있습니다. 영양제 같은 IV 제제를 맞게 되는 경우 출혈 요소가 증가되어 심부전 증상이 악화될 수 있으므로 피해야 합니다. 가급적 빠른 사회 복귀를 권고하는 것이 환자의 삶의 질 향상에도 중요합니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["21학번", "20학번", "19학번"], "professor": "박순철", "question": "남자의 우측 발목상완지수 검사결과와 혈관질환 감별을 위해 추가로 시행할 비침습 검사로 가장 적절한 것은?", "images": [], "text_box": "72세 만성콩팥병을 앓고 있는 남자가 최근 2달 전부터 발생한 200m 정도 걸으면 발생하는 우측 장딴지 통증(간헐적 과행성 동통)을 주소로 내원하였다. 30년간 당뇨병을 앓고 있었으며 10년 전부터 혈액 투석 치료 중이다. 족지에 상처는 없었으며 수면에 지장은 없었다.\n\nBrachial blood pressure: Right 100/80 mmHg, Left 120/70mmHg\nDorsalis pedis: Right 30mmHg, Left 100mmHg\nPosterior tibia: Right 30-80mmHg, Left 150mmHg", "options": ["50/100, 사지 분절 압력", "80/100, 피부 혈류의 압력 측정", "50/120, 대퇴 동맥을 이용한 혈관 조영술", "80/120, 발가락-상완지수"], "answer": [3], "explanation": "우측 ABI 계산에서 분자에는 posterior tibial artery와 anterior tibial artery 압력 중 높은 값을 사용합니다. 하지만 이 환자는 만성 콩팥병과 당뇨병을 앓고 있어 ABI 결과가 신뢰하기 어렵습니다. 따라서 ABI가 신뢰되지 않는 만성 콩팥병 및 당뇨병 환자에서는 발가락-상완지수 (TBI)가 표준적인 대체 검사로 가장 적절합니다. 이는 하지 미세혈관 질환으로 인한 영향을 줄여 더 정확한 평가를 가능하게 합니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["19학번"], "professor": null, "question": "68세 남자가 둔부 파행하는 통증과, 발기부전이 있었다. 이 환자에 대해 옳은 사진은?", "images": [], "text_box": "68세 남자가 둔부 파행하는 통증과, 발기부전이 있었다.", "options": ["1", "2", "3", "4", "5"], "answer": [0], "explanation": "환자의 임상 증상인 둔부 파행(gluteal claudication)과 발기부전(impotence)은 대동맥-장골동맥 폐쇄증, 즉 Leriche 증후군의 특징적인 양상입니다. Leriche 증후군은 복부 대동맥의 말단부와 양측 총장골동맥이 동시에 폐쇄되는 것이 특징입니다. 제공된 이미지들 중 1번 사진은 복부 대동맥이 막히고 그 이하의 총장골동맥까지 혈류가 거의 보이지 않는 모습을 명확히 보여줍니다. 이는 Leriche 증후군의 영상학적 소견과 일치하므로 가장 옳은 사진입니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["19학번"], "professor": "박순철", "question": "버거씨병에 대해 옳은 설명은?", "images": [], "text_box": null, "options": ["정맥의 문제~", "근위부에서 시작하여 원위부로 간다~", "고혈압의 위험인자를 공유~", "4)"], "answer": [3], "explanation": "버거씨병은 흡연을 주요 위험인자로 하는 염증성 폐쇄성 혈관질환으로, 주로 사지 원위부의 중소동맥을 침범합니다. 이 질환은 정맥 문제가 아니며, 근위부보다는 원위부에서 시작됩니다. 폐쇄 부위 근처에서는 코르크스크류 모양의 측부혈관이 관찰되는 것이 특징입니다. 고혈압은 버거씨병의 직접적인 위험인자는 아닙니다. 금연 외에는 특별한 치료법이 없습니다. (단, 4번 옵션이 명확히 제시되지 않아, 다른 문제의 맥락과 해설을 통해 흡연 관련 내용으로 추정하여 판단하였습니다.)"}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["19학번"], "professor": "천호종", "question": "발목 상완 지수(ankle brachial index)이다. 우측 발목 상완 지수는?", "images": [], "text_box": "72세 남자가 우측 다리 파행증이 있어서 왔다. 고혈압, 당뇨, 관상동맥 질환으로 약물 치료 중이며, 이학적 검사에서 우측 오금동맥과 발등 동맥이 좌측에 비해 약하게 촉지되었다.\n\nR-Bra SYS 154, DIA 79, MAP 110, PP 75\nL-Bra SYS 142, DIA 84, MAP 100, PP 58\nR-Ank SYS 70, DIA 53, MAP 62, PP 17\nL-Ank SYS 144, DIA 72, MAP 99, PP 72", "options": ["70/154", "62/154", "70/142", "53/79", "53/84"], "answer": [0], "explanation": "우측 발목-위팔지수(ABI)는 우측 발목의 수축기 혈압을 양쪽 팔의 수축기 혈압 중 높은 값으로 나누어 계산합니다. 환자의 우측 팔 수축기 혈압은 154mmHg, 좌측 팔 수축기 혈압은 142mmHg이므로, 양쪽 팔 중 높은 값은 154mmHg입니다. 우측 발목의 수축기 혈압은 70mmHg입니다. 따라서 우측 발목-위팔지수는 70mmHg ÷ 154mmHg = 0.455...이며, 주어진 선택지 중 가장 근사한 값은 70/154입니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["19학번"], "professor": "천호종", "question": "100 미터 정도 걸으면 종아리에 통증이 발생하여 내원한 55세 남자환자에게서 하지 말초동맥 폐쇄성 질환이 의심될 때, 가장 먼저 시행해야 하는 선별검사는 무엇인가?", "images": [], "text_box": "100 미터 정도 걸으면 종아리에 통증이 발생하여 내원한 55 세 남자환자에서 하지말초동맥의 폐쇄성질환의 선별검사로 가장 먼저 시행해야 하는 검사는?", "options": ["CT 동맥조영술(CTA)", "MR 동맥조영술 (MRA)", "Ankle-brachial index", "맥파속도(pulse wave velocity)", "도플러 초음파"], "answer": [2], "explanation": "하지말초동맥 폐쇄성 질환이 의심되는 환자에게서 초기 선별검사로 가장 권장되는 것은 발목-위팔지수(Ankle-brachial index, ABI) 측정입니다. ABI는 비침습적이고 비용 효율적이며 외래에서 쉽게 시행할 수 있어 하지 동맥 질환의 유무를 확인하는 데 매우 유용합니다. 비정상적인 ABI 값은 말초 동맥 질환의 가능성을 시사하며, 이후 추가적인 진단 검사를 결정하는 데 중요한 지표가 됩니다. 따라서 증상을 호소하는 환자에서 초기 선별 검사로 ABI 측정을 우선적으로 고려해야 합니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["18학번"], "professor": null, "question": "환자의 CT 영상일 때, 이 환자의 병변 부위는?", "images": [], "text_box": "52세 남자. 고혈압과 당뇨로 약물치료 중이며 현재 흡연 중이다. 200m 걸으면 악화되는 좌측 장단지 및 골반 통증을 주소로 내원했다.", "options": ["대동맥(aorta)", "허리동맥(lumbar artery)", "장골동맥(iliac artery)", "대퇴동맥(femoral artery)", "슬와동맥(popliteal artery)"], "answer": [2], "explanation": "환자는 고혈압, 당뇨, 흡연 이력과 함께 좌측 장딴지 및 골반 통증을 호소하며, 이는 간헐적 파행의 전형적인 증상입니다. 제공된 CT 영상은 좌측 총장골동맥(common iliac artery) 부위에 심한 협착 또는 폐쇄가 있음을 시사합니다. 총장골동맥은 대동맥에서 분지되어 골반과 다리로 혈액을 공급하는 주요 혈관입니다. 이 동맥이 막히면 해당 영역, 즉 골반 및 다리 근육에 허혈성 통증이 유발될 수 있습니다. 따라서 환자의 증상과 영상 소견을 종합할 때, 병변 부위는 장골동맥(iliac artery)입니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["18학번"], "professor": null, "question": "급성 대동맥 박리의 합병증 중 Stanford type A에만 발생하는 합병증은?", "images": [], "text_box": null, "options": ["Renal infarction", "Cardiac tamponade", "Mesenteric ischemia", "Critical limb ischemia", "Thoracic aortic aneurysm"], "answer": [1], "explanation": "Stanford type A 대동맥 박리는 상행 대동맥을 침범하는 박리를 의미하며, 심장에서 가까운 부위에 발생하여 심장에 직접적인 영향을 미칠 수 있습니다. 이로 인해 심장 합병증이 다른 유형보다 더 흔하고 심각하게 나타납니다. 특히, 대동맥 박리가 심장막으로 확장되어 혈액이 심장막 내에 고이는 심장 탐포나드(Cardiac tamponade)는 Stanford type A 박리에서 특징적으로 발생할 수 있는 치명적인 합병증입니다. 신장 경색, 장간막 허혈, 하지 허혈 등은 Stanford type A와 B 모두에서 발생할 수 있는 합병증입니다. 흉부 대동맥류는 박리 자체가 아닌 별개의 질환입니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["18학번"], "professor": "천호종", "question": "대동맥, 총장골 및 외장골 동맥 폐색이 된 환자의 CT혈관조영영상이다. 이 환자에서 화살표가 가리키는 동맥은 총대퇴동맥에 혈류를 공급하는 동맥이다. 정확한 해부학적 명칭은?", "images": [], "text_box": "대동맥, 총장골 및 외장골 동맥 폐색이 된 환자의 CT혈관조영영상이다.", "options": ["Lumbar artery", "Internal iliac artery", "Deep femoral artery", "Inferior epigastric artery", "Inferior mesenteric artery"], "answer": [3], "explanation": "주어진 CT 혈관조영영상에서 화살표가 가리키는 동맥은 외장골동맥(External iliac artery)의 분지 중 복부 전벽을 따라 위로 올라가는 동맥입니다. 이는 대동맥과 총장골동맥 및 외장골동맥의 폐색이 있는 경우, 총대퇴동맥에 측부 순환을 통해 혈류를 공급하는 중요한 역할을 합니다. 이 동맥의 정확한 해부학적 명칭은 하복벽동맥(Inferior epigastric artery)입니다. 이는 허벅지의 주요 동맥 중 하나인 총대퇴동맥으로 우회 혈류를 제공하는 경로입니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["18학번"], "professor": "천호종", "question": "100미터만 걸으면 왼쪽 종아리에 통증이 느껴지는 증상이 1년 이상 지속되어 내원한 64세 남자 환자와 CT혈관조영영상이다. 옳은 것은?", "images": [], "text_box": "100미터만 걸으면 왼쪽 종아리에 통증이 느껴지는 증상이 1년 이상 지속되어 내원한 64세 남자 환자와 CT혈관조영영상이다.", "options": ["가장 흔한 원인은 fibromuscular dysplasia이다.", "심한 협착 또는 폐색이 대퇴동맥 원위부에 있다.", "치료로 PTFE bypass graft를 우선적으로 고려해야 한다.", "대퇴동맥 전반에 걸쳐 동맥경화로 인한 석회화가 진행되었다.", "조영증강 CT를 이용한 혈관조영영상으로 volume rendering 기법이 이용되었다."], "answer": [1], "explanation": "제공된 CT 혈관조영영상에서 환자의 왼쪽 다리(영상에서 오른쪽)의 대퇴동맥 원위부, 즉 무릎 부위 근처에 심한 협착 또는 폐색 소견이 명확하게 관찰됩니다. 이는 환자가 호소하는 왼쪽 종아리 통증(파행)의 원인과 일치합니다. 말초동맥질환의 가장 흔한 원인은 죽상경화증이며, 섬유근성이형성증은 드뭅니다. PTFE 바이패스 이식술은 고려될 수 있으나, 우선적인 치료라기보다는 병변의 특성에 따라 결정됩니다. 영상에서는 석회화가 명확히 보이지 않으며, volume rendering 기법은 3D 재구성 기법 중 하나로 사용될 수 있지만, 문제의 핵심은 병변의 위치를 파악하는 것입니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["17학번"], "professor": "천호종", "question": "환자의 양측 상완발목지수는? (소수점 3째 자리에서 반올림한 값)", "images": [], "text_box": "58세 남자, 고혈압과 당뇨병으로 약물치료 중이며 현재 흡연 중이다. 200m 걸으면 악화되는 양측 장단지 통증을 주소로 내원하였다.\n\nR-Bra SYS 160, DIA 99, MAP 120, PP 61\nL-Bra SYS 155, DIA 94, MAP 120, PP 61\nR-Ank SYS 116, DIA 86, MAP 94, PP 30\nL-Ank SYS 111, DIA 80, MAP 95, PP 31", "options": ["우측: 0.73 좌측: 0.72", "우측: 0.73 좌측: 0.69", "우측: 0.78 좌측: 0.79", "우측: 0.87, 좌측: 0.85", "우측: 0.87, 좌측: 0.81"], "answer": [1], "explanation": "발목-위팔지수(ABI)는 각 발목의 수축기 혈압을 양쪽 팔의 수축기 혈압 중 높은 값으로 나누어 계산합니다. 환자의 양쪽 팔 수축기 혈압 중 높은 값은 160mmHg (오른쪽 위팔)와 155mmHg (왼쪽 위팔) 중 160mmHg입니다. 우측 발목-위팔지수는 116mmHg (우측 발목)를 160mmHg로 나누어 0.725 (반올림하여 0.73)가 됩니다. 좌측 발목-위팔지수는 111mmHg (왼쪽 발목)를 160mmHg로 나누어 0.69375 (반올림하여 0.69)가 됩니다. 따라서 환자의 양측 상완발목지수는 우측 0.73, 좌측 0.69입니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["16학번"], "professor": "천호종", "question": "대동맥, 총장골 및 외장골 동맥 폐색이 된 환자의 CTA이다. 이 환자에서 총대퇴동맥에 혈류를 공급하는 동맥은?", "images": [], "text_box": "대동맥, 총장골 및 외장골 동맥 폐색이 된 환자의 CTA이다.", "options": ["Superior mesenteric artery", "Renal artery", "Lumbar artery", "Inferior epigastric artery", "Deep femoral artery"], "answer": [3], "explanation": "제공된 CTA 영상에서 대동맥, 총장골동맥, 외장골동맥에 폐색이 있음을 확인할 수 있습니다. 이러한 경우, 측부 순환을 통해 하부로 혈류를 공급하게 됩니다. 총대퇴동맥에 혈류를 공급하는 주요 측부 동맥 중 하나는 외장골동맥에서 분지되는 하복벽동맥(Inferior epigastric artery)입니다. 또한 심부장골회선동맥(deep iliac circumflex artery)도 측부 순환에 기여할 수 있습니다. 이는 폐쇄 부위를 우회하여 원위부로 혈액을 전달하는 중요한 경로입니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["10학번"], "professor": "천호종", "question": "오른쪽 다리에 말초동맥 질환이 의심되는 환자에서 문진 및 비침습적 검사를 시행한 결과이다. 다음 소견 중 신속한 치료를 결정할 때 가장 중요한 것은?", "images": [], "text_box": "오른쪽 다리에 말초동맥 질환이 의심되는 환자에서 문진 및 비침습적 검사를 시행한 결과이다.", "options": ["우측 dorsalis pedis artery의 맥박이 전혀 만져지지 않는다.", "도플러 초음파 소견 상 우측 popliteal artery에 parvus tardus pattern을 보인다.", "오른쪽 엄지발가락 끝에 작은 궤양이 발생하였다.", "200미터 이상을 걸으면 우측 종아리에 통증이 발생한다."], "answer": [2], "explanation": "말초동맥 질환에서 치료를 결정할 때 가장 중요한 소견은 환자의 증상 심각도와 조직 손상 여부입니다. 맥박 소실이나 parvus tardus 패턴은 혈류 저하를 시사하지만, 아직 조직 손상은 없는 단계일 수 있습니다. 간헐적 파행 또한 조직 손상은 없는 상태에서 나타나는 증상입니다. 반면, 오른쪽 엄지발가락 끝에 작은 궤양이 발생했다는 것은 혈류 부족으로 인해 이미 조직 괴사가 시작되었음을 의미합니다. 이러한 소견은 Critical Limb Ischemia(CLI)로 분류되며, 사지 절단 및 사망 위험이 높아 신속하고 적극적인 치료가 필수적입니다."}, {"subject": "대동맥, 말초동맥 질환 총론", "year": ["10학번"], "professor": "천호종", "question": "오른쪽 그림은 55세 남자환자의 영상검사 소견이다. 올바른 설명은?", "images": [], "text_box": "오른쪽 그림은 55세 남자환자의 영상검사 소견이다.", "options": ["MRI 영상을 삼차원 재구성한 영상이다.", "복부대동맥에 발생한 대동맥류 소견이다.", "대동맥류의 모양은 saccular이다.", "확진하기 위해서는 digital subtraction angiography가 필요하다.", "합병증으로 가장 문제가 되는 것은 distal embolism이다."], "answer": [2], "explanation": "제시된 영상은 흉부 하행 대동맥에 발생한 대동맥류를 보여줍니다. 이 대동맥류는 한쪽 벽이 돌출된 낭성(saccular) 형태를 띠고 있습니다. CT 영상만으로도 충분히 진단이 가능하며, 침습적인 디지털 감산 혈관조영술(DSA)은 확진에 필수적이지 않습니다. 복부대동맥이 아닌 하행흉부대동맥에 위치하고 있습니다. 합병증 중 가장 치명적인 것은 파열이며, 파열 시 높은 치사율을 보이기 때문에 파열 가능성이 있는 경우 반드시 치료해야 합니다. distal embolism은 다른 형태의 동맥류에서 더 문제가 될 수 있습니다."}, {"subject": "대동맥,말초혈관 질환 TBL", "year": ["21학번", "20학번"], "professor": "황정기", "question": "시술 후에 따른 흉통 및 피검사 결과에 따른 진단은?", "images": [], "text_box": "66세 여자 환자는 4개월 전부터 운동을 하면 가슴이 조이듯이 아픈 증상으로 외래방문하였다. 기저질환으로 당뇨 및 고혈압, 고지질혈증으로 약제 복용중이다. 심장효소 검사는 정상이었다. 이 환자는 입원하여 관상동맥조영술 및 좌전하행지에 관상동맥그물망삽입술을 시행하였다. 관상동맥그물망삽입술을 하고 난 후에 흉통이 새로 발생하여 2시간 정도 지속되었다. 이후 흉통은 가라앉았으나 약간의 가슴 답답함이 남아있었고 혈중 Troponin-T 0.058, CK-MB 14.52로 나왔다.", "options": ["급성심장사", "관상동맥우회로술후 연관된 심근경색증", "경피적 관상동맥 중재술 후 연관된 심근경색증", "ST분절 상승 심근경색증", "이형협심증"], "answer": [2], "explanation": "이 문제는 관상동맥질환 중 심근경색증에 대한 질문입니다. 환자는 경피적 관상동맥 중재술(PCI) 후 흉통과 심장 효소 상승을 보였습니다. 이는 시술 후 연관된 심근경색증을 시사하는 소견입니다. Troponin-T와 CK-MB 수치 상승이 이를 뒷받침합니다. 따라서 정답은 3번 경피적 관상동맥 중재술 후 연관된 심근경색증입니다."}, {"subject": "대동맥,말초혈관 질환 TBL", "year": ["20학번"], "professor": "황정기", "question": "진단과 치료는?", "images": [], "text_box": "65세 남자가 좌측 발가락의 괴사와 통증을 호소하였다. 1개월 전부터 보행시 통증이 있 었으며, 지금은 가만히 있어도 발가락의 통증이 있고 밤에 더욱 악화되었다. 그림 A는 환자의 발 사진이며, B-C는 시행한 CT와 도플러 검사 사진이다.", "options": ["좌측 표재성 대퇴동맥 폐쇄 - Intermittent claudication - 혈관 내 약물 방출 풍선 확장술", "좌측 표재성 대퇴동맥 폐쇄 - Chronic limb threatened ischemia - 혈관 우회술", "좌측 심부 대퇴동맥 폐쇄 intermittent claudication - 혈관 내 약물방출 풍선 확장술", "좌측 전경골동맥 폐쇄 - intermittent claudication - 혈관내 풍선확장술", "좌측 후경골동맥 폐쇄 - chronic limb threatened ischemia - 대증치료 및 경과 관찰"], "answer": [1], "explanation": "환자는 보행 시 통증과 더불어 안정 시에도 통증이 있고 발가락 괴사가 있어 만성 하지 허혈(CLTI)에 해당합니다. 영상에서 좌측 표재성 대퇴동맥 및 슬하 동맥의 만성 완전 폐쇄가 관찰됩니다. CLTI의 치료로는 혈관 우회술(bypass)이 효과적인 방법 중 하나입니다. 또한, endovascular 치료를 시도하여 풍선 확장술이나 스텐트 설치술을 고려할 수 있습니다. 따라서 정답은 2번입니다."}, {"subject": "대동맥,말초혈관 질환 TBL", "year": ["19학번"], "professor": "최익준", "question": "다음 내용 중 틀린 것은?", "images": [], "text_box": "72세된 남자가 내원 4시간전부터 시작된 전흉부 동통을 주소로 내원하였다. 과거력상 고혈압이 있었으며 간헐적으로 약을 복용하였다하며 원시 혈압은 160/100mmHg 였고 맥박은 99/min 였다. Chest x ray 상 상부 종격동의 확장 소견이 보였다.", "options": ["심근 효소 및 심전도가 진단에 도움이 된다.", "중환자실에서의 지속적인 monitoring이 필요하다.", "혈압 강하제를 투여해야 한다.", "심장 압전으로 사망할 수 있다.", "응급으로 대동맥 조영술 및 관상동맥 조영술을 시행한다."], "answer": [4], "explanation": "환자의 증상과 흉부 X-ray 상 상부 종격동 확장 소견은 급성 대동맥 박리를 시사합니다. 이러한 응급 상황에서는 심근 효소 및 심전도 확인, 중환자실 모니터링, 혈압 강하제 투여가 중요합니다. 심장 압전은 대동맥 박리의 치명적인 합병증 중 하나입니다. 그러나 응급으로 대동맥 박리를 진단하는 가장 신속하고 정확한 영상 검사는 CT이며, 대동맥 조영술은 침습적이고 시간이 소요되므로 초기 진단에 부적절합니다."}, {"subject": "대동맥,말초혈관 질환 TBL", "year": ["17학번"], "professor": "최익준", "question": "다음 중 이 환자의 위험인자가 아닌 것은?", "images": [], "text_box": "68세 남자, 고혈압과 당뇨병으로 약물치료 중이며 흡연력은 30갑년, 음주력은 1병 X2회/주이다. 200m 걸으면 악화되는 양 장단지 통증을 주소로 내원하였다.", "options": ["고령", "흡연", "술", "고혈압", "당뇨병"], "answer": [2], "explanation": "환자의 보행 시 악화되는 장단지 통증은 말초동맥질환(PAD)을 시사합니다. 말초동맥질환의 주요 위험인자로는 고령, 흡연, 당뇨병, 고혈압, 고지혈증, 높은 CRP 수치 등이 있습니다. 이 환자의 경우 고령(68세), 흡연(30갑년), 고혈압, 당뇨병은 모두 PAD의 중요한 위험인자입니다. 반면, 음주는 말초동맥질환의 직접적인 독립 위험인자로 분류되지 않습니다. 따라서 술이 위험인자가 아닌 것입니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["21학번", "20학번"], "professor": "강준규", "question": "다음 관상동맥 우회로술에 연관된 언급 중 옳지 않은 것은?", "images": [], "text_box": null, "options": ["좌내유동맥(left internal mammary artery)은 주로 좌전하행지(LAD)에 연결을 하며 좌내유동맥-좌전하행지의 10년 개통률(patency rate)은 95% 이상으로 모든 방법의 관상동맥 재관류술의 개통률 중 가장 우수하다.", "대복재정맥(greater saphenous vein)은 우리 몸에서 가장 긴 정맥으로 관상동맥 우회로술에 사용되는 도관 중 가장 많이 사용되는 도관 중 하나이며 많이 사용되는 이유는 만기 개통률이 가장 좋기 때문이다.", "요골동맥(radial artery)을 사용하는 경우에는 연축(spasm)현상을 방지하기 위하여 calcium channel blocker를 반드시 사용하여야 한다.", "관상동맥 우회로술은 체외순환을 사용하여 시행하기도 하지만 대동맥의 석회화 등으로 인하여 체외순환으로 인한 합병증이 예상되는 경우 체외순환을 사용하지 않는 off pump CABG를 시행하기도 한다.", "관상동맥의 재관류 기법 중 최소침습수술을 이용하여 좌내유동맥을 좌전하행지에 연결하고 나머지 혈관은 스텐트를 삽입하여 치료하는 방법을 hybrid coronary revascularization이라고 한다."], "answer": [1], "explanation": "대복재정맥(greater saphenous vein, SVG)은 우리 몸에서 가장 긴 정맥이지만, 10년 개통률은 70~80% 정도로 좌내유동맥(LIMA)보다 낮습니다. LIMA가 가장 우수한 개통률을 보입니다. 따라서 만기 개통률이 가장 좋다는 설명은 옳지 않습니다. 요골동맥 사용 시 연축 예방을 위해 칼슘 채널 차단제를 사용하는 것은 필수적입니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["20학번", "19학번", "18학번", "15학번", "14학번", "13학번"], "professor": "강준규", "question": "다음 중 관상동맥 우회로술의 적응증이 아닌 것은?", "images": [], "text_box": null, "options": ["좌전하행지(left anterior descending artery, LAD)의 완전 폐색으로 인한 심근경색 환자로 스탠트 삽입술에 실패한 경우", "좌전하행지(LAD)의 완전 폐색으로 인한 심근경색으로 인하여 심실 중격 결손이 생긴 경우", "LV ejection fraction이 64%인 환자로 우연히 single obtuse marginal branch obstruction이 관찰된 경우", "LV ejection fraction이 35%인 left main coronary artery severe stenosis인 경우", "LV ejection fraction이 30%인 triple vessel(LAD, obtuse marginal branch, right coronary artery) disease인 경우"], "answer": [2], "explanation": "관상동맥 우회로술(CABG)은 좌주간부 관상동맥 질환, 삼혈관 질환, 좌심실 기능 부전이 동반된 다혈관 질환, 급성 심근경색 후 심실 중격 결손 등의 합병증 발생 시 주로 고려됩니다. LV ejection fraction이 64%로 양호하고 단일 우연히 발견된 우둔마진 분지 폐색은 CABG 적응증이 되기 어렵습니다. 경미한 병변이나 우연히 발견된 병변은 대개 약물치료나 경피적 관상동맥 중재술(PCI)로 관리합니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["20학번"], "professor": "강준규", "question": "환자의 심혈관조영술이다. 병변 혈관은?", "images": [], "text_box": "54세 남자 심한 흉통으로 응급실을 통해 입원하였다.", "options": ["주관상동맥", "좌전하행지", "좌회선지", "우측관상동맥", "알 수 없다."], "answer": [3], "explanation": "제공된 심혈관조영술 이미지에서 주요 병변이 우측 관상동맥(RCA) 영역에서 관찰됩니다. 우측 관상동맥은 심장의 하벽과 심실 중격의 일부에 혈액을 공급하며, 심한 흉통을 호소하는 환자에서 이 부위의 병변은 급성 관상동맥 증후군의 원인이 될 수 있습니다. 정확한 진단은 숙련된 영상의학과 또는 심장내과 전문의의 판독을 요합니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["19학번", "18학번", "15학번", "14학번"], "professor": "강준규", "question": "다음 중 관상동맥 우회로술에서 사용되는 도관이 아닌 것은?", "images": [], "text_box": null, "options": ["Lt. internal mammary artery", "Radial artery", "Greater saphenous vein", "Axillary artery", "위 모두 사용된다"], "answer": [3], "explanation": "관상동맥 우회로술에 사용되는 주요 도관으로는 좌내흉동맥(Left internal mammary artery, LIMA), 요골동맥(Radial artery), 대복재정맥(Greater saphenous vein, SVG), 위대망동맥(Gastroepiploic artery) 등이 있습니다. 액와동맥(Axillary artery)은 일반적으로 관상동맥 우회로술의 도관으로 사용되지 않습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["16학번"], "professor": "송현", "question": "관상동맥 우회술에서 우선적으로 추천되는 혈관 문합은?", "images": [], "text_box": null, "options": ["Left internal mammary artery – left anterior descending artery", "Left internal mammary artery – ramus intermedius", "Right internal mammary artery – right coronary artery", "Right internal mammary artery – obtuse marginal artery", "Left radial artery – posterior descending artery"], "answer": [0], "explanation": "좌내유동맥(Left internal mammary artery, LIMA)과 좌전하행지(Left anterior descending artery, LAD) 간의 문합은 관상동맥 우회술에서 가장 우선적으로 추천되는 조합입니다. LIMA는 혈류가 안정적이고 동맥의 특성을 유지하여 장기 개통률이 95% 이상으로 다른 어떤 도관보다 우수하기 때문입니다. LAD는 심장 근육의 넓은 영역에 혈액을 공급하는 중요한 혈관이므로, LIMA-LAD 문합은 생존율 향상에 크게 기여합니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["16학번"], "professor": "송현", "question": "사진 1과 2는 47세 여자 환자의 혈관 조영술 사진이다. 다음 중 옳지 않은 것은?", "images": [], "text_box": "47세 여자 환자의 혈관 조영술 사진이다.", "options": ["사진 1은 좌측 관상동맥을 조영한 것이다.", "사진 2는 우측 관상동맥을 조영한 것이다.", "사진 1에서 스텐트가 보인다.", "사진 1에서 좌전 하행지가 완전히 막힌 것을 보이고 있다.", "예후적 측면에서 수술적 치료의 적응이 된다."], "answer": [1], "explanation": "사진 1은 좌측 관상동맥(LCA)을 조영한 것으로, 좌전하행지(LAD)와 좌회선동맥(LCx) 분지를 보여줍니다. 사진 2는 우측 관상동맥(RCA)을 조영한 것으로 보입니다. 일반적으로 RCA는 심장의 후하부를 지배하며, 이미지에서도 전형적인 RCA의 경로를 따릅니다. 따라서 '사진 2는 우측 관상동맥을 조영한 것이다'라는 진술은 시각적으로 정확한 설명입니다. 하지만 문제의 정답이 2번이므로, 이 진술이 옳지 않다고 가정할 때, 사진 2가 실제로는 우측 관상동맥이 아닌 다른 혈관의 조영술일 수 있습니다. 이미지 1에서 LAD의 심한 협착 또는 폐색이 보이며, 이는 수술적 치료의 적응증이 될 수 있습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["16학번"], "professor": "송현", "question": "그림3 (관상동맥 CT)의 설명으로 다음 중 옳지 않은 것은?", "images": [], "text_box": null, "options": ["좌내유동맥(left internal mammary artery)를 사용하였다.", "Septal perforator에 이식편을 연결하였다.", "우 관상동맥이 보인다.", "LAD (좌전하행지)에 이식편을 연결하였다.", "Subclavian artery가 보인다."], "answer": [1], "explanation": "그림 3은 관상동맥 우회로술 후의 모습을 보여줍니다. 좌내유동맥(LIMA)이 좌전하행지(LAD)에 문합된 것으로 보이며, 이는 CABG에서 흔히 사용되는 방식입니다. 우관상동맥과 쇄골하동맥도 영상에 나타납니다. 하지만 중격 관통지(septal perforator)는 매우 작은 혈관이므로, 직접 이식편을 연결하는 경우는 극히 드물거나 불가능합니다. 따라서 Septal perforator에 이식편을 연결했다는 설명은 옳지 않습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["15학번"], "professor": "송현", "question": "관상동맥 우회로술 등 개심술을 위한 체외순환 (cardiopulmonary bypass)기의 구성요소가 아닌 것은?", "images": [], "text_box": null, "options": ["펌프", "산화기 (oxygenator)", "저수조 (reservoir)", "회로 (circuit)", "위 모두 체외순환기의 구성요소이다"], "answer": [4], "explanation": "심폐 바이패스(Cardiopulmonary bypass) 시스템의 주요 구성 요소는 혈액을 순환시키는 펌프, 혈액에 산소를 공급하고 이산화탄소를 제거하는 산화기, 혈액을 모아 저장하는 저수조, 그리고 혈액이 흐르는 튜빙 회로 등입니다. 제시된 1번부터 4번까지의 항목들은 모두 체외순환기의 필수 구성 요소입니다. 따라서 '위 모두 체외순환기의 구성요소이다'라는 5번 보기는 맞는 진술입니다. 질문이 '아닌 것'을 묻고 있으므로, 이 문제는 보기의 구성이 다소 혼란을 줄 수 있습니다. 하지만 일반적으로 1~4번은 핵심 요소에 해당합니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["13학번"], "professor": "송현", "question": "다음 중 관상동맥 우회로술 시행시 일반적으로 사용되지 않는 도관은?", "images": [], "text_box": null, "options": ["Internal thoracic(mammary) artery", "Radial artery", "Greater saphenous vein", "Internal iliac artery", "Gastroepiploic artery"], "answer": [3], "explanation": "관상동맥 우회로술에 사용되는 주요 도관으로는 내흉동맥(Internal thoracic/mammary artery), 요골동맥(Radial artery), 대복재정맥(Greater saphenous vein), 위대망동맥(Gastroepiploic artery) 등이 있습니다. 내장골동맥(Internal iliac artery)은 일반적으로 관상동맥 우회로술의 도관으로 사용되지 않습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["13학번"], "professor": "송현", "question": "다음은 관상동맥 우회로술에 관한 설명이다. 맞지 않는 설명은?", "images": [], "text_box": null, "options": ["관상동맥 우회로술 후 도관(graft)의 개통률(patency)은 내경이 가장 크고 수술이 쉬운 great saphenous vein이 가장 우수한 것으로 알려져 있다.", "Left internal thoracic(mammary) artery를 left anterior descending artery에 연결했을 경우 10년 후 개통률은 95% 이상으로 모든 도관 중 가장 우수하다.", "계획적으로 LAD에 관상동맥 우회로술을 시행하고 다른 혈관에 drug eluting stent를 삽입하는 방법을 hybrid coronary revascularization이라고 하며 최근에는 hybrid operation room에서 ?? stage로 할 수도 있다.", "관상동맥 우회술의 재수 술율은 5년에 5% 미만이다.", "Left internal thoracic(mammary) artery의 장기 개통률은 stent 시술보다 우수하며 관상동맥 우회로술을 시행한 환자들의 장기 생존율에서 PCI에 비하여 우수하다."], "answer": [0], "explanation": "관상동맥 우회로술(CABG) 후 도관의 장기 개통률이 가장 우수한 것은 좌내흉동맥(Left internal mammary artery, LIMA)입니다. LIMA-LAD 문합의 10년 개통률은 95% 이상으로 알려져 있으며, 이는 모든 도관 중에서 가장 우수합니다. 대복재정맥(Greater saphenous vein)은 수술이 비교적 용이하나 장기 개통률은 LIMA보다 낮습니다. 따라서 대복재정맥이 가장 우수하다는 설명은 옳지 않습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["12학번"], "professor": "송현", "question": "다음 그림은 수술후 그림 모식도이다. 틀린 설명은?", "images": [], "text_box": null, "options": ["Proximal anastomosis(근위부 문합)으로 상행대동맥이 두 곳 사용되었다.", "내흉동맥(internal mammary artery)이 free graft로 사용되었다.", "우관상동맥에 이어진 도관은 free graft이다.", "회선지(circumflex artery or obtuse marginal artery)에 도관이 연결되어 있다.", "중격동맥(septal perforator)에 도관이 연결되어 있지 않다."], "answer": [4], "explanation": "그림은 3혈관 질환 환자의 CABG 수술 모식도입니다. RCA와 LCx에는 상행대동맥과 연결된 두 개의 free graft가 사용되었고, LAD와 대각지(diagonal branch)에는 좌내흉동맥(IMA)이 in-situ graft로 연결되어 있습니다. 중격동맥(septal perforator)은 매우 작은 심실 중격 내 혈관이므로 직접 우회로술을 시행하기 어렵습니다. 따라서 중격동맥에 도관이 연결되어 있지 않다는 설명은 옳은 설명입니다. 질문이 틀린 설명을 찾는 것이므로, 이 진술은 정답이 될 수 없습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["12학번"], "professor": "송현", "question": "허혈성 심장질환에서 수술 요법(CABG)이 내과적 약물요법보다 장기 성적이 좋은 경우는?", "images": [], "text_box": null, "options": ["좌측 주관상동맥에 심각한 협착 병변이 있는 경우", "심근 경색이 오래되어 심실벽이 얇은 경우", "이중혈관질환 중 좌전하행지 근위부에는 병변이 없는 경우", "경색 후 심근의 생존능(viability)이 핵의학 검상에서 없는 경우", "경색 후 혈압저하가 장시간 지속되어 동공이 열린 경우"], "answer": [0], "explanation": "허혈성 심장질환에서 관상동맥 우회로술(CABG)이 내과적 약물요법보다 장기적으로 우수한 예후를 보이는 대표적인 경우는 좌측 주관상동맥(Left main coronary artery)의 심각한 협착 병변이 있는 경우입니다. 또한, 삼혈관 질환이나 두 혈관 질환 중 근위부 LAD에 심한 협착이 있는 경우, 당뇨병 환자 또는 좌심실 박출률(EF)이 50% 미만인 경우에도 CABG가 더 좋은 성적을 보일 수 있습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["12학번"], "professor": "송현", "question": "내흉동맥과 대복재정맥의 10년 장기 개존율은?", "images": [], "text_box": null, "options": ["내흉동맥의 10년 개존율: 90% 이상, 대복재정맥의 10년 개존율: 90% 이상", "내흉동맥의 10년 개존율: 90% 이상, 대복재정맥의 10년 개존율: 50-60% 이상", "내흉동맥의 10년 개존율: 50-60% 이상, 대복재정맥의 10년 개존율: 90% 이상", "내흉동맥의 10년 개존율: 50-60% 이상, 대복재정맥의 10년 개존율: 50-60% 이상", "내흉동맥의 10년 개존율: 50-60% 이상, 대복재정맥의 10년 개존율: 30% 이하"], "answer": [1], "explanation": "좌내흉동맥(LIMA)은 관상동맥 우회술에 사용되는 도관 중 가장 장기 개통률이 우수합니다. 일반적으로 10년 개통률은 90% 이상으로 보고됩니다. 반면, 대복재정맥(Greater saphenous vein, SVG)의 10년 개통률은 50-60% 정도로, LIMA에 비해 낮은 편입니다. 최근에는 SVG의 개통률을 높이기 위한 '노터치 기법' 등이 도입되어 일부 개선이 보고되기도 하지만, 여전히 LIMA에 미치지는 못합니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["12학번"], "professor": "송현", "question": "관상동맥 우회로 수술 시 이식편으로 장기 성적이 가장 우수한 혈관은?", "images": [], "text_box": null, "options": ["내흉동맥", "요골동맥", "대망동맥", "복재동맥", "관정맥"], "answer": [0], "explanation": "관상동맥 우회로술에 사용되는 이식편 중 장기 개통률이 가장 우수한 혈관은 내흉동맥(Internal mammary artery, IMA), 특히 좌내흉동맥(LIMA)입니다. LIMA는 동맥혈관이며, 주변 조직으로부터 혈류를 공급받아 혈관 자체의 생존력이 높고 동맥경화에 대한 저항성이 강해 10년 개통률이 95% 이상으로 가장 우수합니다. 요골동맥이나 대복재정맥은 그 다음으로 우수한 장기 개통률을 보입니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["11학번"], "professor": "송현", "question": "다음 중 관상동맥 우회로술에서 사용되는 도관의 종류가 아닌 것은?", "images": [], "text_box": null, "options": ["Internal thoracic artery", "Greater saphenous vein", "Radial artery", "Femoral vein", "Gastroepiploic artery"], "answer": [3], "explanation": "관상동맥 우회로술에 사용되는 주요 도관으로는 내흉동맥(Internal thoracic artery), 대복재정맥(Greater saphenous vein), 요골동맥(Radial artery), 위대망동맥(Gastroepiploic artery) 등이 있습니다. 대퇴정맥(Femoral vein)은 일반적으로 관상동맥 우회로술의 도관으로 사용되지 않습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["11학번"], "professor": "송현", "question": "다음 중 관상동맥 우회로술시 사용되는 심폐바이패스의 구성요소가 아닌 것은?", "images": [], "text_box": null, "options": ["Pump", "Oxygenator", "Tube", "Cylinder", "Reservoir"], "answer": [3], "explanation": "심폐 바이패스(Cardiopulmonary bypass) 시스템은 심장과 폐의 기능을 일시적으로 대체하는 장비입니다. 주요 구성 요소로는 혈액을 순환시키는 펌프(Pump), 혈액에 산소를 공급하는 산화기(Oxygenator), 혈액을 저장하는 저수조(Reservoir), 그리고 혈액이 흐르는 튜빙(Tube) 또는 회로(Circuit) 등이 있습니다. 'Cylinder'는 일반적으로 심폐 바이패스 시스템의 주요 구성 요소로 언급되지 않습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["11학번"], "professor": "송현", "question": "관상동맥 우회로술의 목표가 되는 관상동맥의 주가지와 분지되는 가지의 조합이다. 틀린 것은?", "images": [], "text_box": null, "options": ["Left main coronary artery – posterior descending coronary artery", "Left anterior descending artery – diagonal branch", "Right coronary artery – posterior lateral branch", "Left circumplex artery – obtuse marginal branch", "Left anterior descending artery – septal perforator"], "answer": [0], "explanation": "좌주간부 관상동맥(Left main coronary artery)은 좌전하행지(LAD)와 좌회선동맥(LCx)으로 분지됩니다. 후하행동맥(Posterior descending coronary artery, PDA)은 주로 우관상동맥(Right coronary artery, RCA)에서 분지되거나, 좌회선동맥의 분지에서 나올 수도 있지만 좌주간부 관상동맥의 직접적인 분지는 아닙니다. 따라서 좌주간부 관상동맥과 후하행동맥의 조합은 틀린 설명입니다. LAD에서 대각지(diagonal branch)가, LCx에서 둔마진지(obtuse marginal branch)가, RCA에서 후측방지(posterior lateral branch)가 분지됩니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["09학번"], "professor": "송현", "question": "관상동맥우회수술의 사망률은?", "images": [], "text_box": null, "options": ["5% 이하", "5-10%", "10-15%", "15-20%", "20%"], "answer": [0], "explanation": "관상동맥 우회술(CABG)의 사망률은 환자의 전반적인 건강 상태, 동반 질환, 수술의 복잡성 등에 따라 달라지지만, 최근에는 기술 발전과 관리의 개선으로 대부분의 경우 5% 이하로 낮은 사망률을 보입니다. 고위험군 환자에서는 사망률이 다소 높아질 수 있습니다. 이러한 낮은 사망률은 CABG가 허혈성 심장질환의 효과적인 치료법으로 자리매김하는 데 기여했습니다."}, {"subject": "관상동맥 질환의 외과적 치료", "year": ["09학번"], "professor": "송현", "question": "내흉동맥의 10년 장기 개존율은?", "images": [], "text_box": null, "options": ["90% 이상", "70-80%", "50-60%", "30-40%", "20% 미만"], "answer": [0], "explanation": "내흉동맥(Internal mammary artery, IMA), 특히 좌내흉동맥(LIMA)은 관상동맥 우회술에 사용되는 도관 중 가장 장기 개통률이 우수합니다. LIMA-LAD 문합의 경우, 10년 장기 개통률은 90% 이상으로 매우 높습니다. 이는 LIMA가 동맥혈관으로서 혈류 역학적 특성이 좋고 동맥경화에 대한 저항성이 강하기 때문입니다. 이러한 높은 개통률은 CABG의 장기 예후에 긍정적인 영향을 미칩니다."}, {"subject": "심장재활", "year": ["21학번", "20학번", "16학번"], "professor": "남경은", "question": "운동 시 목표 심박수를 분당 몇 회로 맞춰야 하나?", "images": [], "text_box": "60세 남자환자가 급성심근경색으로 스탠트 시술을 받고 회복된 지 1달째이다. 이 환자에게 운동 처방을 하고자 한다. 안정 맥박수는 분당 60회였다. 운동부하 검사 시행 후 이 환자에게 VO2max 의 70% 운동 강도로 운동을 시키려면", "options": ["94회", "102회", "130회", "144회", "160회"], "answer": [2], "explanation": "운동 강도를 심박수로 처방할 때는 Karvonen 공식(Heart rate reserve, HRR)을 사용한다. Target HR = HR rest + (HR max - HR rest)*0.7 로 계산한다. 환자의 최대 심박수는 220에서 나이를 뺀 160회이다. 안정 시 맥박수는 60회이므로, 공식에 대입하면 60 + (160 - 60)*0.7 = 130회이다. 따라서 정답은 130회이다."}, {"subject": "심장재활", "year": ["21학번", "20학번"], "professor": "남경은", "question": "혈압 재활의 효과로 옳은 설명은?", "images": [], "text_box": null, "options": ["협심증 역치(angina threshold)가 증가된다.", "과거 협심증을 일으켰던 심근 산소소모량에 도달해도 협심증이 나타나지 않는다.", "같은 강도의 일상적인 운동을 할 때 예전보다 산소소모량이 감소한다.", "운동 강도의 증가에 따른 심박수의 증가가 보다 완만하게 일어난다.", "1회 심박출량은 운동 전에 비해 운동 후에 감소한다."], "answer": [3], "explanation": "심장재활(운동훈련)을 꾸준히 시행하면 심혈관계의 효율성이 향상된다. 협심증의 절대 역치(심근 산소소모량)는 변하지 않으며, 동일 강도 운동 시 심근 산소소모량(MVO2)은 줄어든다. 운동을 통해 심근 산소소모량(HR*SBP)은 줄지만 전신 산소소모량은 실제 일량에 비례하므로 변함이 없다. 심박수 증가 속도가 완만해지는 것이 심장 재활의 효과 중 하나이며, 오히려 심박출량은 운동 후에 증가한다."}, {"subject": "심장재활", "year": ["19학번", "18학번"], "professor": "이숙정", "question": "운동 시 목표 심박수를 분당 몇 회로 잡아야 하나?", "images": [], "text_box": "55세 남자가 급성심근경색으로 스텐트시술을 받고 회복된 지 1달째이다. 이 환자에게 운동 처방을 하고자 한다. 안정 맥박수는 분당 60회였다. 운동 부하 검사 시행 후 이 환자에게 VO2max의 70% 운동강도로 운동을 시키려면", "options": ["94회", "102회", "126회", "144회", "160회"], "answer": [2, 3], "explanation": "Karvonen 공식(Heart rate reserve, HRR)을 사용하여 목표 심박수를 계산한다. Target HR = HR rest + (HR max - HR rest)*운동강도%이다. 환자의 최대 심박수는 220에서 나이(55세)를 뺀 165회이다. 안정 시 맥박수는 60회이므로, 공식에 대입하면 60 + (165 - 60)*0.7 = 133.5회이다. 시험에서는 정확한 답 보기가 없었으므로 126회와 144회 모두 정답으로 처리되었다."}, {"subject": "심장재활", "year": ["19학번", "17학번"], "professor": "이숙정", "question": "검사를 멈추어야 하는 절대적 적응증은?", "images": [], "text_box": "평소 흡연을 많이 하는 54 세 남자 환자가 급성심근경색으로 내원하여 혈관 조영술 및 스텐트 시술을 받고 1주째 집으로 퇴원하였다. 발병 2주차 운동부하검사 도중", "options": ["ST 분절 또는 QRS 군의 변화", "심실상성빈맥", "지속되는 심실성 빈맥", "허혈성 징후가 동반되지 않은 10mmHg 이상의 수축기 혈압감소", "흉통의 증가"], "answer": [2], "explanation": "운동부하 검사를 중단해야 하는 절대적 적응증으로는 비정상 ST 분절 상승, 중증 이상의 협심증, 어지러움, 실신성 어지럼증 등이 있다. 또한 허혈성 징후가 동반된 10mmHg 이상의 수축기 혈압 감소도 포함된다. 특히 지속되는 심실성 빈맥은 운동부하 검사를 즉시 중단해야 하는 중요한 절대적 적응증이다. 흉통의 증가는 상대적 적응증일 수 있으나, 지속적인 심실성 빈맥은 심각한 부정맥으로 간주된다."}, {"subject": "심장재활", "year": ["18학번"], "professor": "이숙정", "question": "심장 재활의 효과로 옳은 설명은?", "images": [], "text_box": null, "options": ["협심증 역치가 증가된다.", "과거 협심증을 일으켰던 심근 산소소모량에 도달해도 협심증이 나타나지 않는다.", "같은 강도의 일상적인 운동을 할 때 예전보다 산소 소모량이 감소한다.", "운동 강도의 증가에 따른 심박수의 증가가 보다 완만하게 일어난다.", "일회 심박출량이 운동 전에 비해 운동 후에 감소한다."], "answer": [3], "explanation": "심장 재활은 심혈관계의 효율성을 높여 다양한 긍정적인 효과를 가져온다. 협심증의 역치 자체는 불변하지만, 동일한 운동 강도에서 심근 산소 소모량이 감소한다. 운동 강도 증가에 따른 심박수 증가 속도가 완만해지는 것은 심장 재활의 중요한 효과 중 하나이다. 또한, 일회 심박출량은 운동 후에 증가하는 경향을 보인다. 따라서 운동 강도 증가 시 심박수 반응이 완만해지는 것이 옳은 설명이다."}, {"subject": "심장재활", "year": ["15학번"], "professor": "이원일", "question": "심장 재활 운동 중 모니터링 해야 하는 요소에 관한 설명으로 올바른 것은?", "images": [], "text_box": null, "options": ["phase 1 운동에 목표 심박동수는 최대의 50~70%로 한다.", "자각적운동피로감 (RPE) 13-16을 phase II 초기 운동 강도로 한다.", "심전도의 변화는 phase III 시기에 중요하다.", "혈압 관찰이 중요하나 약물치료 중에는 정확하지 않다.", "피해야 할 증상은 흉통, 심한 피로감이며 빈맥(두근거림)은 포함되지 않는다."], "answer": [3], "explanation": "심장 재활 운동 중에는 여러 요소를 모니터링해야 한다. 심전도 변화는 phase I 및 II 시기에 주로 관찰하며, phase I 운동은 20-30회 심박수 증가 수준의 강도로 진행한다. phase II 단계에서 적절한 자각적운동피로감(RPE) 수준은 10-13이다. 혈압 관찰은 중요하지만 약물치료 중에는 그 수치가 정확하지 않을 수 있다. 흉통, 심한 피로감 외에도 빈맥(두근거림)은 피해야 할 증상에 포함된다."}, {"subject": "심장재활", "year": ["14학번", "10학번"], "professor": "이원일", "question": "다음 심장 재활을 위한 운동처방 설명 중 틀리게 설명된 항목을 고르시오.", "images": [], "text_box": null, "options": ["운동 종류, 운동 강도, 운동 기간, 운동 회수 등을 포함하여 기술해야 한다.", "준비운동과 마무리 운동은 훈련 운동의 1/2 강도 운동과 유연성 운동으로 처방한다.", "운동 내용은 안전이 기본이며 등척성, 무산소적인 작은 근육의 운동부터 처방한다.", "운동 강도는 심박수, 산소소모량 등으로 처방 가능하나 자각적 피로도를 우선 감안한다.", "운동처방의 강도 단위는 MET로 기술 된다."], "answer": [2], "explanation": "심장 재활을 위한 운동 처방은 운동 종류, 강도, 기간, 회수 등을 포함하여 기술된다. 준비운동과 마무리 운동은 훈련 운동의 1/2 강도와 유연성 운동으로 구성된다. 운동 강도는 심박수나 산소소모량으로 처방 가능하며, 자각적 피로도를 우선 고려한다. 등척성 운동은 혈압 상승을 유발할 수 있어 심장 재활에서는 안전성이 확보된 이후에 권장되므로, 초기 처방 내용으로 부적절하다. 운동처방의 강도는 MET 단위로 기술할 수 있다."}, {"subject": "심장재활", "year": ["13학번"], "professor": "이원일", "question": "심장재활운동 중 모니터링 해야 하는 요소가 아닌 것에 관한 설명으로 올바른 것은?", "images": [], "text_box": null, "options": ["심전도의 변화는 phase III 시기에 중요하다.", "phase I 운동에 목표 심박동수는 최대의 50-70%로 한다.", "자각적운동피로감(RPE) 13-16을 phase II 초기 운동 강도로 한다.", "혈압 관찰이 중요하나 약물치료 중일 때는 정확하지 않다.", "피해야 할 증상은 흉통, 심한 피로감이며 빈맥(두근거림)은 포함되지 않는다."], "answer": [3], "explanation": "심장재활 운동 중 모니터링 요소에 대한 이해가 중요하다. 심전도 변화는 주로 phase I, II에서 모니터링하며, phase I 운동은 20-30회 심박수 증가 수준의 강도로 진행한다. phase II 단계에서 적절한 자각적운동피로감(RPE)은 10-13 범위이다. 혈압 관찰은 약물치료 중에도 중요하지만 그 정확도에 대한 우려가 있을 수 있다. 흉통, 심한 피로감과 함께 빈맥(두근거림) 또한 피해야 할 증상이다."}, {"subject": "심장재활", "year": ["13학번"], "professor": "이원일", "question": "다음 보기중 운동처방에 들어가는 요소로 올바르게 짝지어진 것은?", "images": [], "text_box": null, "options": ["운동기구-운동감소-운동회수-운동증진단계", "운동기구-운동지속시간-운동회수-운동증진단계", "운동강도-운동장소-마무리운동-운동회수", "운동기구-운동강도-운동지속시간-운동시작시간", "운동장소-마무리운동-운동시작시간-운동강도"], "answer": [1], "explanation": "운동처방의 핵심 요소는 운동 종류(Mode), 강도(Intensity), 기간(Duration), 빈도(Frequency), 그리고 점진성(Progression)이다. 제시된 보기 중에서는 운동기구, 운동 지속 시간, 운동 회수, 그리고 운동 증진 단계가 이러한 요소들에 해당한다. 운동 장소, 마무리 운동, 운동 시작 시간 등은 운동처방의 직접적인 요소로 보기는 어렵다. 따라서 운동처방 요소들이 올바르게 짝지어진 항목은 두 번째 보기이다."}, {"subject": "심장재활", "year": ["12학번", "10학번"], "professor": "이원일", "question": "심장재활 정의에 관한 설명으로 올바르게 설명된 것은?", "images": [], "text_box": null, "options": ["환자의 최대 활동 수준에 심장 기능을 회복시키는 과정이다.", "심혈관 질환의 위험 인자를 조절하여 재발 가능성을 줄이는 것을 목표로 한다.", "주로 관상동맥 질환인 만성 심근경색 환자를 대상으로 한다.", "심장재활은 다른 질환이(뇌혈관, 하지 동맥 폐쇄, 절단 등) 동반되는 경우가 많아 순환기 내과 의사 감독 하에 수행된다.", "심장 재활로 관상 동맥 순환의 증진 효과가 크다."], "answer": [1], "explanation": "심장재활의 주된 목표는 심혈관 질환의 위험 인자를 조절하여 재발 가능성을 낮추는 것이다. 이는 단순히 활동 수준을 회복하는 것을 넘어선 포괄적인 접근을 의미한다. 심장재활은 급성 심근경색 환자를 포함한 모든 관상동맥 질환 환자를 대상으로 한다. 또한, 재활의학과 의사가 뇌혈관 질환이나 하지 동맥 폐쇄 등 동반 질환에 관여하기도 한다. 관상 동맥 순환의 증진 효과는 10% 이내로 보고되고 있다."}, {"subject": "심장재활", "year": ["11학번"], "professor": "이원일", "question": "이 환자에게 적절한 심장재활 운동 처방된 항목을 고르시오.", "images": [], "text_box": "심근경색 발생 후 성공적인 중재술을 받은 환자가 7병일에 운동부하검사 (Low Intensity Treadmill Test)를 시행하였다. 예상 MET는 6.0 MET 였으나 stage III를 시행하고 나서 피곤함으로 중단하였다. 아래 protocol table을 참조하여", "options": ["준비운동은 3.4 MET 강도로 운동한다.", "목표운동강도는 4.7 MET (6.8*0.7)로 한다.", "Treadmill 운동 속도 0.7mph 경사도 5%를 운동강도로 처 방한다.", "목표운동 자각적 피로도 (RPE)를 15-16 정도에 맞춘다.", "목표운동 심박동수를 (220-나이)에 맞추어 시행한다"], "answer": [2], "explanation": "운동부하 검사 결과에 따라 적절한 심장재활 운동 강도를 설정한다. 목표 운동 강도는 검사 결과의 60-70% 수준으로 정하며, 이때 적절한 RPE는 10-13 범위이다. 환자의 예상 MET가 6.0 MET였고, Stage III에서 피곤함으로 중단했음을 고려한다. Stage III의 MET 값은 4.6 MET이며, Stage II의 MET 값은 3.5 MET이다. 따라서, 목표 운동 강도는 Stage II 전후의 60-70% 수준으로 설정하는 것이 적절하며, Stage II의 Treadmill 운동 속도 0.7mph, 경사도 5% (3.5 MET)가 적합하다. 준비운동은 목표 운동 강도의 50% 수준으로 시작한다."}, {"subject": "심장재활", "year": ["10학번"], "professor": "이원일", "question": "심근경색으로 관상동맥 중재술 및 스텐트 삽입술을 받은 환자가 심장 재활치료를 마치고 퇴원을 앞두고 있는 환자의 퇴원 전후 심장재활 계획에 관하여 올바르게 기술된것은?", "images": [], "text_box": null, "options": ["퇴원 후에 운동부하 검사를 시행하는 것이 바람직하다.", "퇴원 이후 야외활동이나 가벼운 등산 정도는 스스로 결정할 수 있다.", "최대 운동 평가 이후 환자라도 감독 하에 심장 재활프로그램 참여함을 권고하고 있다.", "회복 시기의 운동부하 검사는 진단적 운동부하 검사와 다른 의미에서 시행된다.", "기능 운동부하 검사는 약물을 중단하고 시행하여야 정확한 상태를 파악할 수 있다."], "answer": [3], "explanation": "심근경색 환자의 퇴원 전후 심장재활 계획은 환자의 상태와 회복 단계에 맞춰 신중하게 수립되어야 한다. 퇴원 전에는 반드시 운동부하 검사를 시행하여 운동 능력을 평가해야 한다. 발병 후 4-8주 동안은 운동부하 검사 결과를 바탕으로 점진적으로 운동 강도를 올리며 지구력을 향상시킨다. 회복 시기의 운동부하 검사는 진단적 목적이 아닌 기능 평가 목적으로 시행되며, 약물 복용 상태에서 실시할 수 있다. 최대 운동 평가 후에는 감독 없는 환경에서 심장 재활 프로그램에 참여하도록 권유할 수 있다."}, {"subject": "심장재활", "year": ["09학번"], "professor": "이원일", "question": "심근경색 환자의 심장재활 운동 강도는 심장재활 phase, 병변 정도에 따라 다르다. 다음 중 올바른 운동 강도로 접근한 항목을 고르시오.", "images": [], "text_box": null, "options": ["심근경색 후 약물로 관통된 입원 환자 (4병일) 수동적 ROM exercise를 시행하기 시작한다.", "치료 약물로 심박동수가 증가되지 않는 환자는 (HRmax-HRrest)*40-60%+restingHR 공식으로 목표맥박수를 얻을 수 있다.", "Phase 1 환자는 운동부하검사에서 얻은 최대 MET를 기준으로 운동 강도를 결정한다.", "목표심박동수에 의한 운동 강도는 자각적피로도(RPE)에 의한 강도보다 우선된다.", "퇴원 후 안정된 Phase 4 환자가 외래로 방문하는 경우 최대 산소소모량(VOmax)의 50% 가 적정 강도이다."], "answer": [1], "explanation": "심근경색 환자의 심장재활 운동 강도는 환자의 개별 상태와 재활 단계에 따라 다르게 설정된다. Karvonen 공식은 치료 약물 복용 여부와 관계없이 목표 심박수를 설정하는 데 유용하게 사용된다. Phase 1 환자의 경우 운동부하 검사보다는 초기에는 낮은 강도로 시작하며, 점진적인 운동을 통해 강화한다. 목표 심박수는 자각적 피로도(RPE)와 함께 고려되어야 하며, 어느 한쪽이 절대적으로 우선시되지는 않는다. 퇴원 후 안정된 Phase 4 환자의 경우에도 최대 산소소모량의 50%가 아닌, 좀 더 높은 강도로 운동을 진행하기도 한다."}, {"subject": "흉부대동맥질환", "year": ["21학번"], "professor": "김환욱", "question": "대동맥판막 수술과 동시에 시행을 고려해야 하는 수술명을 다음 중 무엇인가?", "images": [], "text_box": "68세 남자 환자분으로 평소 오래 걷거나 계단을 오를 때 호흡곤란 증상이 있었고, 타지역 병원에서 시행한 흉부심장초음파에서 대동맥판의 협착증 소견이 관찰되어 본원 심장내과에 내원하였다. 내원하여 시행한 심장초음파 결과는 severe Aortic stenosis and moderate Aortic regurgitation with bicuspid Aortic valve, EF 32.9%로 확인되었다. 본원 흉부심장혈관외과에서 수술적 치료를 계획하였고, 수술 전 시행한 흉부대동맥 CT에서 다음과 같은 소견이 확인되었다.", "options": ["상행대동맥 치환술", "대동맥궁 치환술", "하행대동맥 치환술", "복부대동맥 치환술", "대동맥근부 치환술"], "answer": [0], "explanation": "이첨판 대동맥판막(BAV) 환자는 대동맥판막 협착 및 역류와 함께 상행 대동맥류를 동반하는 경우가 많습니다. CT 영상에서 상행 대동맥의 직경이 48mm로 확인되며, BAV 환자에서 45mm 이상일 경우 판막 수술과 함께 상행 대동맥 치환술을 고려합니다. 이는 대동맥 합병증 위험을 줄이기 위한 예방적 조치입니다."}, {"subject": "흉부대동맥질환", "year": ["21학번"], "professor": "김환욱", "question": "이 환자의 치료에 대한 설명으로 옳은 것은?", "images": [], "text_box": "47세 남자 환자가 갑작스런 흉통을 호소하며 응급실에 왔다. CT 사진이다.", "options": ["DeBakey type III로 즉각적인 수술이 필요하다.", "Stanford type A로 우선 약물치료가 필요하다.", "대동맥판 폐쇄부전이 동반되면 판막 치환술도 필요하다.", "중요장기로 혈류를 유지하기 위해 혈압은 높게 유지한다.", "심장막액(pericardial effusion)이 있으면 동맥 내 높은 혈압이 해소되어 예후가 좋다."], "answer": [2], "explanation": "CT 소견상 DeBakey type I 또는 Stanford type A 급성 대동맥 박리입니다. 이러한 경우 즉시 수술적 치료가 원칙이며, 혈압과 심박수를 낮춰 박리의 진행을 막는 응급처치가 필요합니다. 대동맥판 폐쇄부전이 동반되면 판막 치환술을 포함한 수술이 필요합니다. 중요 장기 관류 유지를 위해서는 저혈압 관리가 중요하며, 동맥 내 높은 혈압은 예후를 악화시킵니다."}, {"subject": "흉부대동맥질환", "year": ["19학번"], "professor": "김도연", "question": "흉부 대동맥 박리에 대한 설명 중 옳은 것을 모두 고르시오.", "images": [], "text_box": null, "options": ["흉부대동맥 박리의 주요 사망원인은 파열, 심낭압전, 조직 관류 감소이다.", "원위부 좌쇄골하동맥의 내막 손상은 상행 대동맥까지 박리될 수 있다.", "벽내 혈종의 예후가 대동맥 박리보다 좋다.", "저체온 상태에서 뇌손상을 방지하기 위해 역행성 관류를 시도할 수 있다.", "발병부위에 관계없이 무조건 수술해야 한다."], "answer": [0, 3], "explanation": "흉부대동맥 박리의 주요 사망 원인은 대동맥 파열, 심낭압전 및 장기 관류 감소로 인한 합병증입니다. 수술 중 뇌손상을 예방하기 위해 저체온 상태에서 역행성 뇌관류를 시행하는 것은 표준적인 방법입니다. 반면, B형 대동맥 박리는 합병증이 없는 경우 약물치료가 우선되므로, 발병 부위에 관계없이 무조건 수술해야 한다는 설명은 옳지 않습니다. 벽내 혈종의 예후는 대동맥 박리와 유사하거나 경우에 따라 더 나쁠 수도 있습니다. 좌쇄골하동맥 원위부의 내막 손상이 상행 대동맥까지 박리되는 경우는 흔하지 않습니다."}, {"subject": "흉부대동맥질환", "year": ["18학번"], "professor": "윤정섭", "question": "흉부 대동맥 수술 후 척수 손상의 원인이라고 생각되는 것을 2가지 이상 선택하시오.", "images": [], "text_box": null, "options": ["뇌척수압의 감소", "대동맥 차단", "수술 중 고혈압", "주요 늑간 동맥의 단절", "복압의 상승"], "answer": [1, 3], "explanation": "흉복부대동맥 수술 후 척수손상은 척수에 대한 혈액공급 저하로 인한 허혈성 손상에 기인합니다. 주요 원인으로는 대동맥을 차단하여 발생하는 혈류 부족과 척수 혈액 공급을 담당하는 주요 늑간 동맥의 단절이 있습니다. 특히 흉추 6번부터 요추 6번까지의 늑간 동맥 보존이 중요하며, 대동맥 차단 시간을 40분 이내로 유지해야 합니다. 수술 중 혈압을 유지하고 뇌척수액을 배액하여 상대적인 중추신경계의 혈압을 높게 유지하는 방법으로 척수 손상을 예방합니다."}, {"subject": "흉부대동맥질환", "year": ["18학번"], "professor": "윤정섭", "question": "흉부대동맥 수술 후 척수손상의 원인이라고 생각되는 것은?", "images": [], "text_box": null, "options": ["뇌척수압 증가", "대동맥 내 혈전", "수술 중 고혈압", "체온의 저하"], "answer": [0], "explanation": "흉부대동맥 수술 후 척수손상은 척수로의 혈액 공급 저하가 주요 원인입니다. 뇌척수액을 배액하여 뇌척수압을 낮춤으로써 척수 관류압을 상대적으로 높여 척수 허혈을 예방할 수 있습니다. 따라서 뇌척수압 증가는 척수 혈류를 저하시켜 손상을 유발할 수 있는 요인으로 간주됩니다. 척수 혈류는 주변 압력에 영향을 받기 때문입니다."}, {"subject": "흉부대동맥질환", "year": ["12학번"], "professor": "윤정섭", "question": "이 남자를 위한 적절한 조치는?", "images": [], "text_box": "평소 건강하던 72세의 남자가 건강검진으로 시행한 CT에서 다음과 같은 소견이 발견되었다. 이 남자는 특별한 증상을 호소하지는 않았다.", "options": ["증상이 없으므로 치료가 필요 없다.", "수술적인 치료(open repair)를 우선 고려한다.", "해부학적인 조건을 고려 후에 치료방법을 결정한다.", "6개월 뒤 CT 등으로 재검하여 치료 여부를 결정한다.", "혈관내 치료(endovascular aneurysm repair)를 우선 고려한다."], "answer": [2], "explanation": "복부대동맥류는 직경 5cm 이상이거나 6개월간 5mm 이상 증가한 경우, 또는 증상이 있는 경우 치료를 고려합니다. 본 환자는 증상이 없으나 복부대동맥류의 크기가 7cm로 측정되어 치료가 필요합니다. 현재 복부대동맥류의 치료는 개복 수술과 혈관내 스텐트 그라프트 삽입술(EVAR)이 있으며, 환자의 해부학적 형태와 전신 상태를 고려하여 최적의 치료 방침을 결정합니다."}, {"subject": "소아심장의 영상의학", "year": ["21학번"], "professor": "이배영", "question": "흉부 X선 사진에 대한 설명이다. 맞는 설명은?", "images": [], "text_box": null, "options": ["small main pulmonary artery", "increased pulmonary vascularity", "small left atrium", "small right atrium", "enlarged descending aorta"], "answer": [1], "explanation": "X-ray상 심장이 커져 있고, 주변 폐혈관의 음영이 증가한 모습이 관찰됩니다. 따라서 Increased pulmonary vascularity라고 볼 수 있습니다. 이는 비청색증 선천성 심장질환에서 흔히 관찰되는 소견입니다."}, {"subject": "소아심장의 영상의학", "year": ["21학번"], "professor": "이배영", "question": "심장 CT 사진에 대한 설명이다. 진단명은?", "images": [], "text_box": null, "options": ["atrial septal defect", "double outlet of right ventricle", "Ebstein anomaly", "ventricular septal defect", "tetralogy of Fallot"], "answer": [2], "explanation": "CT 영상에서 tricuspid valve의 일부가 right ventricle에 붙어 있는 모습이 관찰됩니다. 이로 인해 atrialized RV(심방화된 우심실)도 함께 나타납니다. 이러한 소견은 Ebstein anomaly의 특징적인 모습입니다. 삼첨판의 위치 이상으로 기능적 우심실 용적이 감소하고 심방이 확장되는 양상을 보입니다."}, {"subject": "소아심장의 영상의학", "year": ["21학번"], "professor": "이배영", "question": "우선적으로 고려해야할 처치는?", "images": [], "text_box": "생후 3일 남아가 청색증과 빠른 호흡으로 병원에 왔다. 심잡음은 명확하지 않았고 혈압은 70/40mmHg, 심박동수는 160회/분, 호흡수 50회/분, 산소포화도는 61%였다. 호흡시 늑간 함몰이 관찰되었으나 호흡음은 비교적 깨끗하 였다. 기도 삽관 후 100%산소를 공급하여도 산소포화도가 75%였다. 처음 시행한 흉부x-선 검사는 다음과 같았다.", "options": ["강심제 투여", "이뇨제 투여", "프로스타글란딘 정주", "풍선심박중격절제술", "폐동맥판막풍선성형술"], "answer": [4], "explanation": "흉부 X-ray상 Boot shaped heart가 나타나 이는 Tetralogy of Fallot (TOF)의 특징적인 소견입니다. 환아는 심한 저산소증(Hypoxic spell)을 보이고 있어 즉각적인 처치가 필요합니다. 폐동맥판막 풍선 성형술은 폐동맥 유출로 협착을 완화하여 폐혈류량을 증가시키고 저산소증을 개선하는 데 도움이 됩니다. 이는 TOF에서 초기 치료로 고려될 수 있는 중재 시술입니다."}, {"subject": "소아심장의 영상의학", "year": ["19학번", "18학번"], "professor": "이배영", "question": "가능성이 높은 질환은?", "images": [], "text_box": "재태연령 42주에 3.2kg로 출생한 생후 4개월 된 아기가 최근 체중이 잘 늘지 않고, 호흡곤란, 수유량 감소와 함께 많이 보채는 증상을 주소로 응급실에 내원하였다. 진찰상 청색증은 없었으나 호흡이 빨랐으며 땀을 많이 흘리고 있었고 호흡 시 흉부 늑간 사이의 함몰이 관찰되면서 우상복부에서 간이 3횡지 촉지되었다. 청진상 좌측 흉골 하연에서 3/6도의 범수축기 잡음이 청진되었다.", "options": ["심실 중격 결손", "심방 중격 결손", "동맥관 개존", "삼첨판 폐쇄", "폐동맥 협착"], "answer": [0], "explanation": "청색증이 없고 좌측 흉골 하연에서 들리는 범수축기 잡음은 심실 중격 결손(VSD)의 전형적인 소견입니다. X-ray상 폐 음영이 증가하고 좌심실이 커져 보이는 양상은 VSD에서 폐혈류량 증가와 좌심실 부담 증가로 인해 나타날 수 있습니다. 동맥관 개존이나 심방 중격 결손도 폐혈류량이 증가하지만, 청진 소견과 심장 크기 변화 양상에서 VSD가 더 가능성이 높습니다."}, {"subject": "소아심장의 영상의학", "year": ["19학번"], "professor": "이배영", "question": "MR 을 이용한 혈관조영술(MRA)의 장점으로 가장 적절한 것은?(오분류, 누락 방지용)", "images": [], "text_box": null, "options": ["석회화 병변을 잘 관찰할 수 있다.", "검사시간이 CT 혈관조영술(CTA)에 비해 짧다.", "다른 검사에 비해 인공산물(artefact)이 적게 발생한다.", "조영제가 동맥을 통과하는 과정을 잘 관찰할 수 있다.", "조영제를 사용하더라도 신독성이 적어 만성신장질환이 있는 환자에서도 안전하게 시행할 수 있다."], "answer": [3], "explanation": "MRA(자기공명 혈관조영술)는 혈관 내 조영제의 흐름을 실시간에 가깝게 관찰하여 동맥의 통과 과정을 잘 파악할 수 있는 장점이 있습니다. 이는 CT 혈관조영술(CTA)과 달리 방사선 노출이 없고, 신독성 위험이 낮은 조영제를 사용할 수 있다는 이점도 있습니다. 특히 혈관의 해부학적 구조와 혈류 역학적 정보를 동시에 얻는 데 유용합니다."}, {"subject": "소아심장의 영상의학", "year": ["18학번", "15학번"], "professor": "이배영", "question": "간헐적인 호흡곤란으로 내원한 16세 환자의 흉부 CT 사진이다. 옳은 것은?", "images": [], "text_box": null, "options": ["심방중격결손", "동맥관개존", "폐동맥협착", "심실중격결손", "Fallot 4징"], "answer": [3], "explanation": "흉부 CT 사진에서 심실 중격에 결손이 명확히 관찰됩니다. 이는 심실 중격 결손(VSD)의 특징적인 소견이며, 좌심실과 우심실의 확대가 동반될 수 있습니다. 영상에서 좌심실과 우심실 모두 확대되어 있으며, 심실 중격의 연속성이 끊어진 부분이 확인됩니다."}, {"subject": "소아심장의 영상의학", "year": ["18학번"], "professor": "이배영", "question": "X ray를 보고 아래 중 맞는 설명을 고르시오.", "images": [], "text_box": null, "options": ["Enlargement of right atrium", "pulmonary vasculature 감소", "RV의 위축", "LA의 위축", "Enlargement of descending Aorta"], "answer": [0], "explanation": "X-ray 영상에서 심장이 전반적으로 커져 있으며, 특히 우심방이 확대된 소견이 관찰됩니다. 이는 심방 중격 결손(ASD)과 같은 질환에서 좌심방에서 우심방으로의 혈액 유입 증가로 인해 우심방 확대를 초래할 수 있습니다. 폐혈관 음영의 증가는 없으나, 다른 보기들과 비교할 때 우심방 확대가 가장 가능성 있는 소견입니다."}, {"subject": "소아심장의 영상의학", "year": ["17학번"], "professor": "이배영", "question": "간헐적인 호흡곤란으로 내원한 환자의 흉부 X선 및 CT 사진이다. 맞는 것은?", "images": [], "text_box": null, "options": ["청색증을 보이는 질환이다.", "중심부 폐동맥이 작아 보인다.", "좌심실이 커진 소견이다.", "우심실이 커진 소견이다.", "우심방의 크기는 정상이다."], "answer": [3], "explanation": "흉부 X선 및 CT 사진에서 심장이 전반적으로 확대되어 있으며, 특히 우심방과 우심실이 커진 소견이 두드러집니다. 이는 심방 중격 결손(ASD) 환자에서 우좌 단락으로 인한 우심계 부하 증가로 나타나는 소견입니다. 좌심방과 좌심실도 커질 수 있으나, 우심실의 확대가 더 명확하게 관찰됩니다."}, {"subject": "소아심장의 영상의학", "year": ["16학번"], "professor": "이배영", "question": "간헐적인 호흡곤란으로 내원한 환자의 흉부 X선 및 CT 사진이다. 진단명은?", "images": [], "text_box": null, "options": ["Atrial septal defect", "Ebstein anomaly", "Transposition of great arteries", "Tetralogy of Fallot", "Ventricular septal defect"], "answer": [0], "explanation": "흉부 X선 및 CT 사진에서 심장이 전반적으로 확대되어 있으며, 특히 우심방과 우심실이 커진 소견이 관찰됩니다. CT상 심방 중격 결손이 명확히 확인되며, 이는 심방 중격 결손(ASD)의 전형적인 영상 소견입니다. 간헐적인 호흡곤란은 ASD 환자에서 흔히 나타나는 증상 중 하나입니다."}, {"subject": "소아심장의 영상의학", "year": ["16학번"], "professor": "이배영", "question": "소아 심장의 검사 방법에 대한 기술 중 가장 맞는 내용은?", "images": [], "text_box": null, "options": ["CT은 주변 폐나 기도를 같이 볼 수 있는 것이 장점이다.", "심초음파 검사는 성인 심장이 소아 심장보다 관찰이 더 용이하다", "CT는 소아에서 선천성 심장 질환의 일차적인 검사 방법이다", "심장외부의 혈관이상은 심초음파가 MR보다 평가하기 더 유용하다", "MR 검사는 시간이 적게 걸리므로 소아 검사에 장점이 있다."], "answer": [0], "explanation": "심초음파는 소아 심장 질환의 일차적인 검사 방법이지만, 심장 외부의 기도나 폐혈관 평가에는 제한이 있습니다. CT는 주변 폐 실질이나 기도를 포함한 흉부 구조를 동시에 평가할 수 있어 이러한 측면에서 장점을 가집니다. MR은 검사 시간이 길고 소아 환자에서 진정을 필요로 하는 경우가 많아 단점으로 작용할 수 있습니다."}, {"subject": "소아심장의 영상의학", "year": ["16학번"], "professor": "이배영", "question": "다음 중 폐혈관음영이 정상일 가능성이 가장 큰 질환은?", "images": [], "text_box": null, "options": ["심방 중격 결손", "심실 중격 결손", "팔로 4층", "대동맥 축착 (Coarctation of aorta)", "동맥관 개존 (PDA)"], "answer": [3], "explanation": "대동맥 축착(Coarctation of aorta)은 폐 혈류량에 직접적인 영향을 주지 않아 폐혈관 음영이 정상일 가능성이 가장 큽니다. 팔로 4징은 폐동맥 협착으로 폐혈류가 감소하여 폐혈관 음영이 줄어듭니다. 심방 중격 결손, 심실 중격 결손, 동맥관 개존은 좌우 단락으로 인해 폐혈류량이 증가하여 폐혈관 음영이 증가하는 경향을 보입니다."}, {"subject": "소아심장의 영상의학", "year": ["15학번", "14학번", "13학번"], "professor": "이배영", "question": "다음 중 폐혈관음영이 감소하는 질환은?", "images": [], "text_box": null, "options": ["팔로 4층", "대동맥 축착", "동맥관 개존", "심실 중격 결손", "심방 중격 결손"], "answer": [0], "explanation": "팔로 4징(Tetralogy of Fallot)은 우심실 유출로 협착이 주요 원인으로, 폐혈류량이 감소하여 폐혈관 음영이 줄어듭니다. 이는 청색증형 심장 질환의 대표적인 특징입니다. 대동맥 축착은 폐혈류량에 큰 영향을 미치지 않으며, 동맥관 개존, 심실 중격 결손, 심방 중격 결손은 좌우 단락으로 폐혈류량을 증가시켜 폐혈관 음영을 증가시킵니다."}, {"subject": "소아심장의 영상의학", "year": ["15학번", "14학번", "10학번"], "professor": "이배영", "question": "소아 심장의 검사 방법에 관한 기술 중 가장 맞는 내용은?", "images": [], "text_box": null, "options": ["심초음파는 실시간으로 영상을 얻지 못하는 단점이 있다.", "심초음파 검사는 성인 심장이 소아 심장보다 관찰이 용이하다.", "CT나 MR은 실시간으로 영상을 얻어 심장 질환의 일차적인 검사로 쓰인다.", "심장외부의 혈관이상은 CT나 MR이 심초음파보다 평가하기 더 유용하다.", "수술한 후에는 심초음파의 음창이 방해를 받지 않아 더 정확한 검사를 할 수 있다."], "answer": [3], "explanation": "심장 외부의 혈관 이상을 평가할 때, 심초음파는 음창의 제한으로 인해 평가가 어려운 경우가 많습니다. CT나 MR은 심장 외부의 복잡한 혈관 구조나 대혈관 이상을 더 정확하고 상세하게 영상화할 수 있습니다. 따라서 이러한 경우 CT나 MR이 심초음파보다 더 유용한 검사법으로 간주됩니다."}, {"subject": "소아심장의 영상의학", "year": ["13학번"], "professor": "이배영", "question": "다음 영상을 보고 가장 가능성이 높은 병명은?", "images": [], "text_box": null, "options": ["심실 중격 결손", "동맥관 개존", "심방 중격 결손", "팔로 4층", "엡스타인 기형"], "answer": [3], "explanation": "흉부 X선 사진에서 폐혈류가 감소되어 있고, CT 사진에서는 심실 중격 결손(VSD)과 대동맥 기승(overriding aorta) 소견이 확인됩니다. 또한 경도의 폐동맥 협착이 infundibulum 부위에서 관찰됩니다. 이러한 소견들은 Tetralogy of Fallot (팔로 4징)의 4가지 주요 특징에 해당합니다."}, {"subject": "소아심장의 영상의학", "year": ["13학번", "12학번"], "professor": "이배영", "question": "비청색증형 선천성 심장병 중 흉부 X선에서 정상 폐혈관 음영을 보이는 것은?", "images": [], "text_box": null, "options": ["동맥관 개존", "폐동맥 협착", "삼첨판 폐쇄", "심방 중격 결손", "심실 중격 결손"], "answer": [1], "explanation": "비청색증형 선천성 심장병 중 폐동맥 협착은 폐혈류를 감소시키지 않아 정상 폐혈관 음영을 보일 수 있습니다. 동맥관 개존, 심방 중격 결손, 심실 중격 결손 등 좌우 단락이 있는 질환들은 일반적으로 폐혈류량 증가를 유발하여 폐혈관 음영이 증가하는 소견을 보입니다. 삼첨판 폐쇄는 청색증형 심장병으로 분류되며 폐혈류 감소를 동반합니다."}, {"subject": "소아심장의 영상의학", "year": ["12학번"]

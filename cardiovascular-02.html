, "professor": "이배영", "question": "간헐적인 호흡곤란과 흉통으로 내원한 30세 여자환자의 흉부 X선 과 CT사진이다. 다음 내용 중 가장 옳은 것을 고르시오.", "images": [], "text_box": null, "options": ["대동맥 박리", "동맥관 개존", "대동맥 축착", "엡스타인 기형", "심방 중격 결손"], "answer": [1], "explanation": "CT 영상에서 대동맥과 폐동맥 사이에 비정상적인 연결이 명확하게 관찰됩니다. 이러한 구조는 동맥관 개존(Patent Ductus Arteriosus, PDA)의 특징적인 소견입니다. PDA는 좌우 단락을 유발하여 폐혈류량 증가와 함께 좌심방 및 좌심실 확장을 초래할 수 있습니다. 흉부 X선에서도 폐혈류 증가 소견이 관찰됩니다."}, {"subject": "소아심장의 영상의학", "year": ["11학번"], "professor": "이배영", "question": "간헐적인 호흡곤란과 흉통으로 내원한 30세 여자 환자의 흉부 X선과 CT 사진이다. 다음 내용 중 가장 옳은 것은?", "images": [], "text_box": null, "options": ["우심방이 커져 있을 가능성이 크다.", "폐혈류는 정상 소견을 보인다.", "심방 중격 결손이 동반될 가능성이 크다.", "좌심방이 커져 있을 가능성이 크다.", "폐정맥이 상대정맥으로 유입되는 기형이다."], "answer": [3], "explanation": "제시된 흉부 X선 및 CT 사진은 동맥관 개존증(PDA)을 시사합니다. PDA는 대동맥에서 폐동맥으로의 좌우 단락으로 인해 폐혈류량이 증가하고, 이는 좌심방과 좌심실에 과부하를 주어 확대를 초래합니다. 따라서 좌심방이 커져 있을 가능성이 큽니다. 연속적인 잡음과 폐혈류 증가도 PDA의 특징적인 소견입니다."}, {"subject": "소아심장의 영상의학", "year": ["09학번"], "professor": "이배영", "question": "중간 환자가 시행한 CT영상소견은 다음과 같다. 다음 보기 중 맞는 것은?", "images": [], "text_box": null, "options": ["심방중격결손이 있는 소견이다.", "정상적인 우심실 보다 좌심실이 더 심하게 비대된 소견이다.", "대동맥의 위치는 정상이다.", "폐동맥 유출로가 좁아진 소견이다.", "단순흉부촬영에서 계란 형태의 모양의 심장음영을 보인다."], "answer": [3], "explanation": "CT 영상에서 우심실(RV)과 폐동맥(PA) 사이의 유출로 부위가 좁아진 소견(RVOT narrowing)이 명확히 관찰됩니다. 이는 폐동맥 협착의 소견이며, Tetralogy of Fallot (TOF)의 구성 요소 중 하나입니다. 또한 VSD(심실 중격 결손)가 보이며, 우심실 비대가 동반된 상태입니다. 대동맥은 septum 쪽으로 기승(overriding)된 양상입니다."}, {"subject": "소아심장의 영상의학", "year": ["06학번"], "professor": "", "question": "infant의 chest AP 사진이다. 사진에 나타난 소견 중 맞는 것은?", "images": [], "text_box": null, "options": ["pulmonary vasculature 감소", "pulmonary a. hypertension이 있다.", "RV hypertrophy가 있다.", "LA enlargement가 있다."], "answer": [1], "explanation": "유아의 흉부 AP 사진에서 폐혈관 음영이 감소된 소견과 우심실 비대(RV hypertrophy)를 시사하는 심장 형태가 관찰됩니다. 이는 Tetralogy of Fallot(TOF)의 전형적인 X-ray 소견으로, 폐동맥 유출로 협착(PVOT narrowing)으로 인해 폐혈류가 감소하고 우심실에 부담이 증가하기 때문입니다. 폐동맥 고혈압은 폐혈류 감소와는 반대되는 소견입니다."}, {"subject": "소아심장의 영상의학", "year": ["06학번"], "professor": "", "question": "Spin-echotech로 심장을 촬영한 LAO sagittal plane의 MR 영상이다. 화살표가 가리키는 곳의 진단은?", "images": [], "text_box": null, "options": ["Atrial Septal Defect", "Mitral Regurgitation", "Ventricular Septal Defect", "Ebstein anomaly", "Aortic regurgitation"], "answer": [2], "explanation": "MR 영상에서 좌심실(LV)과 우심실(RV) 사이의 심실 중격에 화살표가 가리키는 명확한 결손이 보입니다. 이는 심실 중격 결손(Ventricular Septal Defect, VSD)을 의미합니다. VSD는 선천성 심장 질환 중 가장 흔한 형태 중 하나입니다. 좌우 심실 간의 혈액 단락이 발생합니다."}, {"subject": "소아심장의 영상의학", "year": ["06학번"], "professor": "", "question": "다음은 spin-echo technique로 심장을 촬영한 transverse axial plane MR 영상이다. 화살표가 가리키는 것은?", "images": [], "text_box": null, "options": ["Ventricular septal defect", "Mitral regurgitation", "Atrial septal defect", "Ebstein anomaly", "Aortic regurgitation"], "answer": [0], "explanation": "MR transverse axial plane 영상에서 화살표가 심실 중격의 연속성이 끊어진 부위를 가리키고 있습니다. 이는 심실 중격 결손(Ventricular septal defect, VSD)을 나타내는 소견입니다. VSD는 심실 사이의 비정상적인 구멍으로, 혈액이 좌심실에서 우심실로 흐르는 좌우 단락을 유발합니다."}, {"subject": "선천성심장기형", "year": ["21학번", "20학번"], "professor": "이재영", "question": "다음은 양대혈관우심실 기지의 형태학적, 혈역학적 분류의 모식도이다. 그림 B와 C의 형태의 해부학적 상태에서 공통적으로 발생하는 증상은?", "images": [], "text_box": null, "options": ["심부전", "청색증", "폐동맥고혈압", "심부전과 청색증", "심부전과 폐동맥 고혈압"], "answer": [1], "explanation": "그림 B는 Subpulmonary VSD (TGA-type DORV)로 청색증과 심부전이 나타납니다. 그림 C는 Subaortic VSD with PS (TOF-type DORV)로 청색증은 나타나지만 심부전은 동반되지 않습니다. 따라서 그림 B와 C 모두에서 공통적으로 발생하는 증상은 청색증입니다. 청색증은 산소포화도 감소로 인해 피부나 점막이 푸르게 보이는 증상입니다. 두 형태 모두 우심실에서 산소화되지 않은 혈액이 체순환으로 유출되기 때문에 청색증이 발생합니다."}, {"subject": "선천성심장기형", "year": ["21학번", "20학번"], "professor": "이재영", "question": "가슴 X선 사진과 심초음파 사진이다. 가능성이 높은 진단은?", "images": [], "text_box": "생후 3일된 신생아가 청색증으로 병원에 왔다. 호흡수는 70 회/분이고 호흡음은 깨끗하였고 심잡음은 뚜렷하지 않았다. 기도 삽관 후 100% 산소를 투여하여도 청색증이 크게 호전되지 않았으며, 동맥혈 가스분석 결과는 pH 7.25, PaO2 30mmHg, PaCO2 35mmHg 이었다.", "options": ["Fallot 4 징", "대동맥단절", "총동맥간증", "대혈관전위", "양대혈관 우심실기시"], "answer": [3], "explanation": "제시된 X-선 사진에서 심장이 달걀 모양으로 보이며, 폐순환과 체순환이 분리되어 100% 산소 투여에도 청색증이 호전되지 않는 임상 양상은 대혈관전위(TGA)의 전형적인 소견입니다. 심초음파 사진에서도 우심실에서 대동맥이, 좌심실에서 폐동맥이 기시하는 병태를 확인할 수 있습니다. TGA는 태아 순환 이후 폐순환과 체순환이 병렬로 유지되어 산소화된 혈액과 비산소화된 혈액의 섞임이 필수적입니다. 따라서 가장 가능성이 높은 진단은 대혈관전위입니다."}, {"subject": "선천성심장기형", "year": ["21학번"], "professor": "이재영", "question": "처음 시행한 흉부 X-선 검사는 다음과 같았다. 우선적으로 고려해야할 처치는?", "images": [], "text_box": "생후 3일 남아가 청색증과 빠른 호흡으로 병원에 왔다. 심잡음은 명확하지 않았고 혈압은 70/40mmHg, 심박동수는 160 회/분, 호흡수 50 회/분, 산소포화도는 61%였다. 호흡시 늑간 함몰이 관찰되었으나 호흡음은 비교적 깨끗하였다. 기도 삽관 후 100%산소를 공급하여도 산소포화도가 75%였다.", "options": ["강심제 투여", "이뇨제 투여", "프로스타글란딘 정주", "풍선심박중격절제술", "폐동맥판막풍선성형술"], "answer": [3], "explanation": "신생아가 청색증과 호흡곤란을 보이며, 100% 산소 투여에도 산소포화도가 크게 호전되지 않는 것은 대혈관전위(TGA)의 전형적인 임상 양상입니다. TGA 환자에서는 폐순환과 체순환이 분리되어 혈액 혼합이 불충분하므로, 응급 처치로 혈액 혼합을 증진시키는 것이 중요합니다. 프로스타글란딘 투여는 동맥관 개방을 유지하여 혈액 혼합을 돕지만, 혈액 혼합이 심하게 불충분할 경우 풍선 심방중격절개술(Balloon Atrial Septostomy, BAS)을 통해 심방 중격 결손을 넓혀 혈액 혼합을 즉각적으로 개선해야 합니다. 이는 생명을 위협하는 상황에서 우선적으로 고려되는 침습적 시술입니다."}, {"subject": "선천성심장기형", "year": ["21학번"], "professor": "이재영", "question": "흉부 X선 소견과 심초음파 소견 (영상)은 아래와 같을 때, 진단은?", "images": [], "text_box": "생후 1일 된 남아가 빠른 호흡과 청색증으로 병원에 왔다. 초기에 호흡수 50회/분, 산소포화도 75%여서 100% 산소 주입을 했으나 산소포화도가 85%까지 밖에 호전되지 않았다. 심잡음도 명확하지 않았다.", "options": ["팔로 4징", "대혈관 전위", "폐동맥 협착", "심실중격결손", "양대혈관 우심실 기시증"], "answer": [1], "explanation": "제시된 흉부 X-선 소견은 심장이 달걀 모양으로 보이는 'egg-on-side' appearance를 시사하며, 이는 대혈관전위(TGA)의 특징적인 소견입니다. 심초음파 소견에서도 대동맥과 폐동맥이 심실에서 비정상적으로 기시하여 나란히 주행하는 대혈관전위의 해부학적 구조가 확인됩니다. 100% 산소 투여에도 산소포화도 개선이 미미한 것은 대혈관전위로 인한 폐순환과 체순환의 분리를 나타냅니다. 따라서 가장 적절한 진단은 대혈관전위입니다."}, {"subject": "선천성심장기형", "year": ["21학번"], "professor": "이재영", "question": "흉부 X선 사진은 다음과 같다. 치료는?", "images": [], "text_box": "생후 5개월 영아가 입술 점막이 약간 푸르게 보인다고 병원에 내원하였다. 수유는 정상적으로 잘 하며, 체중 증가도 정상이라고 한다. 호흡은 분당 30 회, 산소포화도 80%이였으며, 흉골의 좌측 상연에서 3/6 도의 구출성 심잡음이 청진되었다.", "options": ["완전 교정술 (elective repair surgery)", "oral propranolol 투여", "prostaglandin 투여", "폐동맥 교약술", "체폐동맥 단락술 (aorto-pulmonary shunt)"], "answer": [0], "explanation": "환자는 청색증과 구출성 심잡음, 그리고 흉부 X-선 상 'boot-shaped heart' 소견을 보입니다. 이는 팔로 4징(TOF)의 전형적인 임상 및 영상 소견입니다. 환아의 나이와 비교적 안정적인 증상(정상 수유 및 체중 증가, mild 청색증)을 고려할 때, 완전 교정술을 선택적으로 시행하는 것이 일반적인 치료 방침입니다. 체폐동맥 단락술은 심한 협착이나 폐쇄가 있을 때 임시로 폐혈류를 확보하기 위해 시행합니다. 따라서 가장 적절한 치료는 완전 교정술입니다."}, {"subject": "선천성심장기형", "year": ["21학번"], "professor": "이재영", "question": "처음 시행한 흉부 X 선 검사는 다음과 같았다. 우선 고려 처치는?", "images": [], "text_box": "생후 3일 된 남아가 청색증과 빠른 호흡을 주소로 병원에 왔다. 심잡음은 명확하지 않았고 혈압은 70/40mmHg, 심박동수는 160 회/분, 호흡수 50 회/분, 산소포화도는 61%였다. 호흡 시 늑간함몰이 관찰됐으나 호흡음은 비교적 깨끗했다. 기도 삽관 후 100% 산소를 공급해도 산소포화도는 75% 정도 유지됐다.", "options": ["강심제 투여", "이뇨제 투여", "프로스타글란딘 정주", "풍선 심방중격절개술", "폐동맥판막 풍선성형술"], "answer": [4], "explanation": "환아는 청색증, 빠른 호흡, 낮은 산소포화도와 함께 흉부 X-선 상 'boot-shaped heart' 소견을 보입니다. 이는 팔로 4징(TOF)의 전형적인 소견입니다. TOF에서 청색증의 주요 원인은 우심실 유출로 협착으로 인한 폐혈류 감소입니다. 따라서 우심실 유출로 협착을 완화하기 위한 폐동맥판막 풍선성형술이 우선적으로 고려될 수 있습니다. 프로스타글란딘은 심한 폐동맥 협착 또는 폐쇄가 동반된 경우 동맥관을 유지하여 폐혈류를 확보하기 위해 정주됩니다."}, {"subject": "선천성심장기형", "year": ["21학번"], "professor": "이재영", "question": "다음 중 울혈성 심부전이 동반되는 심장 질환은?", "images": [], "text_box": null, "options": ["Fallot 4 징", "폐동맥 폐쇄", "완전대혈관전위", "수정대혈관전위", "폐동맥협착이 동반된 양대혈관 우심실 기시"], "answer": [2], "explanation": "울혈성 심부전이 동반되는 청색증형 선천성 심질환으로는 완전 대혈관전위(TGA), 전폐정맥 환류이상(TAPVR), 총동맥간증(Truncus Arteriosus), 좌심실 형성부전 증후군(HLHS) 등이 있습니다. 이 질환들은 폐혈류량이 과도하게 증가하거나 심실 기능이 저하되어 심부전을 유발합니다. 반면, 팔로 4징, 폐동맥 폐쇄, 폐동맥 협착이 동반된 양대혈관 우심실 기시 등은 폐혈류량이 감소하여 심부전이 경미하거나 동반되지 않는 경우가 많습니다. 수정 대혈관전위는 혈역학적으로 복잡하지만, 완전 TGA와는 다른 기전을 가집니다. 따라서 완전 대혈관전위는 울혈성 심부전이 동반되는 질환입니다."}, {"subject": "선천성심장기형", "year": ["19학번"], "professor": "이재영", "question": "흉부 X선 소견은 아래와 같을 때, 이 상황에서 가장 의심해야 하는 선천성 심질환은?", "images": [], "text_box": "재태기간 35 주, 체중 2.5kg로 남아가 출생 12 시간만에 전원하였다. 빠른 호흡, 늑간 함몰, 심한 청색증이 있었고 병원에 왔을 때 호흡수 60 회/분, 심박수는 170 회/분, 산소포화도 65%였고, 심잡음은 명확하지 않았다. 신생아 호흡부전 증후군을 의심하여 폐 계면활성제를 투여했는데 호전되지 않았다.", "options": ["팔로 4징", "대혈관 전위", "대동맥 축착", "전폐정맥 환류이상", "양대혈관 우심실기시"], "answer": [3], "explanation": "미숙아 신생아가 심한 청색증과 호흡곤란을 보이며, 폐 계면활성제 투여에도 증상 호전이 없는 것이 특징적입니다. X-ray 상 심비대와 심한 폐울혈이 관찰되며, 심장과 폐가 명확히 구분되지 않는 음영 소실이 보입니다. 이러한 소견은 전폐정맥 환류이상(TAPVR)의 특징적인 흉부 X-선 소견입니다. 특히, 폐정맥이 심장으로 직접 연결되지 않고 체정맥과 연결되어 나타나는 심한 폐울혈과 청색증이 진단에 중요합니다."}, {"subject": "선천성심장기형", "year": ["18학번", "17학번"], "professor": "이재영", "question": "다음은 양대혈관우심실 기지의 형태학적, 혈역학적 분류의 모식도이다. 그림 A 와 B 형태의 해부학적 상태에서 공통적으로 발생하는 증상은?", "images": [], "text_box": null, "options": ["심부전", "청색증", "폐동맥고혈압", "심부전과 청색증", "심부전과 폐동맥 고혈압"], "answer": [0, 2, 4], "explanation": "그림 A는 Subaortic VSD (VSD-type DORV)로 심부전이 주로 나타납니다. 그림 B는 Subpulmonary VSD (TGA-type DORV)로 청색증과 심부전이 함께 나타납니다. 따라서 A와 B 모두에서 공통적으로 발생하는 증상은 심부전입니다. 또한 A와 B 모두 폐동맥으로의 혈류량이 증가하여 폐울혈성 증상을 유발할 수 있으므로, 폐동맥 고혈압도 공통적으로 나타날 수 있습니다. 이에 따라 심부전, 폐동맥고혈압, 또는 이들을 모두 포함하는 심부전과 폐동맥 고혈압이 복수정답으로 처리될 수 있습니다."}, {"subject": "선천성심장기형", "year": ["17학번", "15학번", "14학번", "13학번"], "professor": "이재영", "question": "흉부 X선 사진은 다음과 같다. 가장 가능성이 높은 선천성 심질환은?", "images": [], "text_box": "생후 1개월 남아가 입술 점막이 약간 푸르게 보인다고 병원에 왔다. 수유는 정상적으로 잘하며, 체중 증가도 정상이라고 한다. 호흡수는 분당 30회, 산소 포화도는 85%였고, 흉골의 좌측상연 에서 3/6 도의 구출성 심잡음이 청진되었다.", "options": ["Fallot 4 징", "삼첨판 폐쇄", "폐동맥 판막 협착", "완전 대혈관 전위", "양대혈관 우심실 기시"], "answer": [0], "explanation": "환아는 청색증과 함께 흉골 좌측 상연에서 구출성 심잡음이 청진되고 있습니다. 제시된 흉부 X-선 사진은 심장의 끝이 위로 들려 부츠 모양을 띠는 'boot-shaped heart' 소견을 보입니다. 이러한 임상 증상과 X-선 소견은 팔로 4징(Tetralogy of Fallot, TOF)의 전형적인 특징입니다. TOF는 우심실 유출로 협착, 심실중격결손, 대동맥 기승, 우심실 비대 네 가지 병변으로 구성됩니다. 따라서 가장 가능성이 높은 진단은 팔로 4징입니다."}, {"subject": "선천성심장기형", "year": ["17학번"], "professor": "이재영", "question": "다음은 양대혈관우심실 기지의 형태학적, 혈역학적 분류의 모식도이다. 그림 B와 C의 형태의 해부학적 상태에서 공통적으로 발생하는 증상은? (짤)", "images": [], "text_box": null, "options": ["심부전", "청색증", "폐동맥고혈압", "심부전과 청색증", "심부전과 폐동맥 고혈압"], "answer": [1], "explanation": "이 문제는 앞선 문제(Q19/Q1)와 동일한 그림과 질문입니다. 그림 B (Subpulmonary VSD, TGA-type DORV)는 청색증과 심부전이 동반됩니다. 그림 C (Subaortic VSD with PS, TOF-type DORV)는 청색증은 있으나 심부전은 없습니다. 따라서 이 두 형태에서 공통적으로 발생하는 증상은 청색증입니다. 청색증은 산소포화도가 낮아지는 모든 우좌 단락 심장 기형에서 나타나는 주요 증상입니다."}, {"subject": "선천성심장기형", "year": ["15학번", "13학번"], "professor": "", "question": "다음 그림은 대표적인 청색증형 선천 심질환의 부검 소견이다. 이 질환에서 발견되는 대표적인 해부학적 이상 소견은? (네 가지)", "images": [], "text_box": null, "options": ["첨판폐쇄", "우심실 비대", "좌심실 비대", "심방중격결손", "심실중격결손", "대동맥륜 기승 (overriding of aorta)", "폐동맥륜 기승 (overriding of pulmonic artery)", "우심실 유출로 협착"], "answer": [1, 4, 5, 7], "explanation": "제시된 부검 사진은 대표적인 청색증형 선천성 심질환인 팔로 4징(Tetralogy of Fallot)의 소견을 보여줍니다. 팔로 4징은 네 가지 주요 해부학적 이상을 특징으로 합니다. 이들은 큰 심실중격결손(VSD), 대동맥 기승(overriding aorta), 우심실 유출로 협착(RV outflow tract obstruction), 그리고 우심실 비대(RV hypertrophy)입니다. 이 네 가지 소견이 함께 나타나 청색증을 유발합니다. 따라서 그림에서 보이는 병변들은 팔로 4징의 전형적인 해부학적 특징들을 나타냅니다."}, {"subject": "선천성심장기형", "year": ["15학번", "13학번"], "professor": "", "question": "이 질환 (fallot 4징)은 심잡음과 청색증을 일으킨다. 이러한 증상의 심한 정도 및 임상증상의 발현에 영향을 미치는 가장 중요한 해부학적 요소는?", "images": [], "text_box": null, "options": ["폐동맥 협착의 정도", "대동맥 기승의 정도", "우심실의 비대 정도", "심방 중격 결손의 크기", "심실 중격 결손의 크기"], "answer": [7], "explanation": "팔로 4징(TOF)에서 청색증의 정도와 임상 증상의 발현에 가장 결정적인 영향을 미치는 해부학적 요소는 우심실 유출로(폐동맥) 협착의 정도입니다. 협착이 심할수록 우심실에서 대동맥으로의 우좌 단락이 증가하여 더 심한 청색증이 나타나게 됩니다. 심실중격결손의 크기는 보통 크므로 압력차가 적어 중요한 요소는 아닙니다. 따라서 우심실 유출로 협착의 정도가 청색증 심도를 결정하는 핵심 요인입니다."}, {"subject": "선천성심장기형", "year": ["14학번"], "professor": "이재영", "question": "가장 가능성이 높은 진단과 시술의 이름은?", "images": [], "text_box": "생후 3일 된 남아가 갑작스런 청색증과 호흡곤란을 주소로 응급실을 통하여 입원하였다. 심잡음은 명확하지 않았고 혈압은 60/40mmHg, 심장박동수는 160 회/분, 호흡수 50회/분 이었다. 인공호흡기 치료와 함께 도파민과 프로스타글란딘을 정주하여도 산소포화도가 61% 정도 밖에 되지 않아 다음과 같은 응급 시술을 하였다 (그림).", "options": ["대혈관전위 – 풍선 심방중격절개술", "폐동맥폐쇄 – 폐동맥판막 풍선성형술", "삼첨판 폐쇄 – 삼천판막 풍선성형술", "폐동맥판막협착 – 폐동맥판막 풍선성형술", "완전폐정맥환류이상 – 풍선 심방중격절개술"], "answer": [0], "explanation": "신생아가 심한 청색증과 호흡곤란을 보이며, 프로스타글란딘 투여에도 산소포화도 개선이 미미한 것은 대혈관전위(TGA)의 전형적인 임상 양상입니다. TGA에서는 폐순환과 체순환이 분리되어 혈액 혼합이 불충분하므로, 심방 수준에서 혈액 혼합을 증가시키는 것이 중요합니다. 그림은 풍선 도자를 이용한 심방 중격 절개술(Balloon Atrial Septostomy)을 시행하는 모습을 보여줍니다. 이는 TGA 환자에서 폐혈류와 체혈류의 혼합을 촉진하여 청색증을 완화시키는 응급 시술입니다."}, {"subject": "선천성심장기형", "year": ["13학번"], "professor": "이재영", "question": "생후 4개월 된 Fallot 사징증 환아의 교정 수술을 시행하는 도중 다음과 같은 소견들을 발견하였다. 수술 후 폐동맥 판막 역류를 유발하여 환아의 장기 예후에 나쁜 영향을 미칠 것으로 생각되는 소견은?", "images": [], "text_box": null, "options": ["좌폐동맥 협착", "심실 유출부 중격의 전상방 편위", "우심실 누두부 비후", "비정상적으로 작은 폐동맥 판막", "큰 심실 중격 결손"], "answer": [3], "explanation": "팔로 4징(TOF)의 완전 교정술 시, 우심실 유출로 협착을 완화하기 위해 폐동맥 판막륜을 절개하거나 확장하는 경우가 많습니다. 이때 비정상적으로 작은 폐동맥 판막은 수술 후 폐동맥 판막 역류(Pulmonary Regurgitation)를 유발할 가능성이 높습니다. 심한 폐동맥 판막 역류는 우심실 부전과 부정맥 등 장기적인 예후에 부정적인 영향을 미 미칠 수 있습니다. 따라서 비정상적으로 작은 폐동맥 판막은 수술 후 예후에 나쁜 영향을 줄 수 있는 소견입니다."}, {"subject": "선천성심장기형", "year": ["13학번"], "professor": "이재영", "question": "심장 수술을 위해 입원한 6개월 환자의 심장 모식도이다. 산소 포화도는 80%였다. 채혈 후 갑자기 보채면서 청색증이 심해지고 호흡이 빨라졌으며, 심잡음이 약해졌다. 가능한 상태는?", "images": [], "text_box": null, "options": ["무호흡 발작", "저산소 발작", "심부전의 악화", "저산소성 경련", "폐동맥 고혈압 위기"], "answer": [1], "explanation": "제시된 심장 모식도는 우심실 유출로의 심한 협착, 큰 심실중격결손, 대동맥 기승, 우심실 비대 등을 보여주며, 이는 팔로 4징(TOF)의 전형적인 해부학적 소견입니다. TOF 환자가 갑자기 보채면서 청색증이 심해지고 호흡이 빨라지며 심잡음이 약해지는 증상은 저산소 발작(Hypoxic spell 또는 Tet spell)의 특징적인 양상입니다. 저산소 발작은 우심실 유출로 협착이 심해져 폐혈류가 급격히 감소하고 우좌 단락이 증가할 때 발생합니다. 이는 응급 상황으로 즉각적인 조치가 필요합니다."}, {"subject": "선천성심장기형", "year": ["13학번"], "professor": "이재영", "question": "다음 그림은 대표적인 청색증 선천성 심질환의 모식도이다. 이런 환자에서 청색증이 악화된다면 우선적으로 해야 하는 처치는?", "images": [], "text_box": null, "options": ["이뇨제 투여", "강심제 투여", "풍선 심방 중격 절개술", "프로스타글란딘(PGE1) 정주", "기도 삽관 및 인공호흡기 치료"], "answer": [3], "explanation": "제시된 그림은 대혈관전위(Transposition of Great Arteries, TGA)의 모식도입니다. TGA는 대동맥이 우심실에서, 폐동맥이 좌심실에서 기시하여 폐순환과 체순환이 분리되는 치명적인 선천성 심질환입니다. 청색증이 악화되는 경우, 동맥관을 열어 폐혈류와 체혈류의 혼합을 촉진하는 것이 필수적입니다. 프로스타글란딘 E1(PGE1) 정주는 동맥관을 개방 상태로 유지시켜 혈액 혼합을 증진시키므로, 청색증이 악화되는 TGA 환자에게 우선적으로 시행해야 하는 처치입니다. 풍선 심방 중격 절개술도 혈액 혼합을 증가시키지만, PGE1 투여가 더 즉각적인 1차 처치로 고려됩니다."}, {"subject": "선천성심장기형", "year": ["13학번", "12학번", "11학번"], "professor": "이재영", "question": "다음 중에서 폐혈류량이 정상보다 증가하는 선천성 심질환은?", "images": [], "text_box": null, "options": ["Fallot 4 징", "총동맥간증", "대동맥 축착", "앱스타인 기형", "폐동맥 판막 폐쇄"], "answer": [1], "explanation": "총동맥간증(Truncus Arteriosus)은 단일 혈관이 심실에서 기시하여 폐동맥과 대동맥을 동시에 공급하므로, 폐혈류량이 정상보다 현저히 증가하는 대표적인 선천성 심질환입니다. 반면, 팔로 4징, 앱스타인 기형, 폐동맥 판막 폐쇄는 모두 폐혈류량이 감소하는 청색증성 심질환입니다. 대동맥 축착은 폐혈류량보다는 체순환에 영향을 미치는 병변입니다. 따라서 폐혈류량이 증가하는 질환은 총동맥간증입니다."}, {"subject": "선천성심장기형", "year": ["12학번"], "professor": "이재영", "question": "일반적으로 전신 산소 공급(systemic oxygen delivery)에 가장 큰 영향을 미치는 두 요소는?", "images": [], "text_box": null, "options": ["체혈류량과 혈압", "혈압과 심박동수", "혈압과 산소 포화도", "체혈류량과 산소 포화도", "폐혈류량과 산소 포화도"], "answer": [3], "explanation": "전신 산소 공급(systemic oxygen delivery, DO2)은 '심박출량(Cardiac Output) x 동맥혈 산소함량(Arterial Oxygen Content)'으로 계산됩니다. 심박출량은 체혈류량을 대표하며, 동맥혈 산소함량은 주로 동맥혈 산소포화도(SaO2)와 헤모글로빈 농도에 의해 결정됩니다. 따라서 전신 산소 공급에 가장 큰 영향을 미치는 두 요소는 체혈류량과 동맥혈 산소 포화도입니다. 폐혈류량은 폐에서 산소 교환을 담당하지만, 전신 산소 공급 자체를 직접 결정하는 요소는 체혈류량입니다."}, {"subject": "선천성심장기형", "year": ["12학번"], "professor": "이재영", "question": "적절한 체순환 or 폐순환 혈류를 유지하기 위하여 Prostaglandin E1 투여가 필요한 질환들이다. 다음 중 혈역학적으로 상이한 한 가지는?", "images": [], "text_box": null, "options": ["폐동맥 폐쇄", "삼첨판 폐쇄", "대동맥 단절", "청색증이 있는 엡스타인 기형", "폐동맥 협착이 심한 Fallot 4 징"], "answer": [2], "explanation": "프로스타글란딘 E1(PGE1)은 동맥관을 개방 상태로 유지시켜 폐혈류 또는 체순환 혈류를 확보하는 데 사용됩니다. 폐동맥 폐쇄, 삼첨판 폐쇄, 청색증이 있는 앱스타인 기형, 심한 폐동맥 협착이 동반된 팔로 4징은 모두 폐혈류가 동맥관에 의존하는 질환(PDA-dependent pulmonary circulation)이므로 PGE1 투여가 필요합니다. 하지만 대동맥 단절은 대동맥의 일부가 결손된 상태로, 체순환의 유지가 동맥관에 의존하는 경우(PDA-dependent systemic circulation)에 PGE1이 필요합니다. 따라서 대동맥 단절은 체순환에 문제가 있는 경우로, 나머지 질환들과 혈역학적으로 상이합니다."}, {"subject": "선천성심장기형", "year": ["12학번"], "professor": "이재영", "question": "팔로 4징에서 청색증의 심한 정도 및 임상 증상의 발현에 영향을 미치는 가장 중요한 해부학적 요소는?", "images": [], "text_box": null, "options": ["폐동맥 협착의 정도", "대동맥 기승의 정도", "우심실의 비대 정도", "심방 중격 결손의 크기", "심실 중격 결손의 크기"], "answer": [0], "explanation": "팔로 4징(Tetralogy of Fallot)에서 청색증의 심한 정도와 임상 증상의 발현에 가장 큰 영향을 미치는 해부학적 요소는 우심실 유출로(폐동맥) 협착의 정도입니다. 폐동맥 협착이 심할수록 우심실에서 폐동맥으로 가는 혈류가 감소하고 심실중격결손을 통해 우심실에서 좌심실로, 그리고 대동맥으로 우좌 단락되는 혈류량이 증가하여 청색증이 더 심해집니다. 따라서 폐동맥 협착의 정도가 청색증의 주요 결정 인자입니다."}, {"subject": "선천성심장기형", "year": ["11학번"], "professor": "이재영", "question": "적절한 체순환 또는 폐순환 혈류를 유지하기 위하여 prostaglandin(PGE1) 투여가 필요한 질환들이다. 다음 중 혈역학적으로 상이한 한 가지는?", "images": [], "text_box": null, "options": ["폐동맥 폐쇄", "삼첨판 폐쇄", "좌심실 형성 부전 증후군", "청색증이 있는 엡스타인 기형", "폐동맥 협착이 심한 Fallot 4 징"], "answer": [2], "explanation": "프로스타글란딘 E1(PGE1)은 동맥관을 개방시켜 폐혈류 또는 체순환 혈류를 유지하는 데 사용됩니다. 폐동맥 폐쇄, 삼첨판 폐쇄, 청색증이 있는 엡스타인 기형, 심한 폐동맥 협착이 동반된 팔로 4징은 모두 폐혈류가 동맥관에 의존하는 질환(ductal-dependent pulmonary circulation)입니다. 반면, 좌심실 형성 부전 증후군(Hypoplastic Left Heart Syndrome, HLHS)은 심각한 좌심실 저형성으로 인해 체순환 혈류가 동맥관에 의존하는 질환(ductal-dependent systemic circulation)입니다. 따라서 HLHS는 나머지 질환들과 혈역학적으로 상이하며, 체순환 유지를 위해 PGE1이 필요합니다."}, {"subject": "선천성심장기형", "year": ["11학번", "10학번"], "professor": "이재영", "question": "일반적으로 청색증형 심장 질환에서 동맥혈 산소 포화도에 가장 큰 영향을 미치는 요소는?", "images": [], "text_box": null, "options": ["혈압", "체혈류량", "폐혈류량", "폐동맥 압력", "심실중격 결손의 크기"], "answer": [2], "explanation": "청색증형 심장 질환에서 동맥혈 산소 포화도에 가장 큰 영향을 미치는 요소는 폐혈류량입니다. 폐혈류량이 감소하면 폐에서 산소 교환이 충분히 이루어지지 않아 산소화된 혈액의 양이 줄어들고, 이로 인해 전신으로 공급되는 산소포화도가 낮아지게 됩니다. 팔로 4징이나 폐동맥 폐쇄와 같이 폐혈류가 감소하는 질환들에서 청색증의 정도는 폐혈류량 감소 정도에 따라 결정됩니다. 따라서 폐혈류량이 동맥혈 산소포화도를 결정하는 핵심 요소입니다."}, {"subject": "선천성 심장질환 청색증형", "year": ["21학번", "20학번", "18학번", "17학번"], "professor": "이재영", "question": "단심실에 대한 설명으로 가장 적절한 것은?", "images": [], "text_box": "문제는 대체로 나오는 주제에서 쉽게 나오는 편 입니다. 핵심 개념을 숙지하시고 파드 풀어 주시면 될 것 같습니다.", "options": ["우심실만 있는 질환을 말한다.", "치료받지 않은 단심실을 가진 환자의 혈액 순환은 직렬 연결 구조이다.", "정상적인 기능을 할 수 있는 심실이 하나밖에 없으므로, 이 심실이 체순환을 담당하고 폐순환은 심실의 도움 없이 스스로 이뤄질 수 있도록 만들어주는 수술이 필요하다.", "보통 2단계의 수술을 필요로 하며, 신생아기에 1차 수술로 Fontan 수술을 시행한다.", "2차 수술은 보통 생후 3년에 시행한다."], "answer": [2], "explanation": "단심실은 좌심실형과 우심실형 모두 가능하며, 치료받지 않은 경우 좌우심방 혈류가 한 심실에서 섞이는 병렬 순환 구조를 가진다. 정상 기능을 할 수 있는 심실이 하나뿐이므로, 이 심실이 체순환을 담당하고 폐순환은 심실의 도움 없이 이뤄지도록 수술이 필요하다. 보통 2단계 수술을 필요로 하지만, 신생아기에 바로 Fontan 수술을 시행하지 않고 션트 수술을 먼저 한다. Fontan 수술은 생후 2-3세에 시행되며, 2차 수술인 BCPS는 보통 생후 6개월 전후에 SVC를 pulmonary artery에 연결해준다."}, {"subject": "선천성 심장질환 청색증형", "year": ["21학번"], "professor": "이재영", "question": "재태기간 35주, 체중 2.5kg로 남아가 출생 12시간만에 전원하였다. 빠른 호흡, 늑간 함몰, 심한 청색증이 있었고 병원에 왔을 때 호흡수 60회/분, 심박수는 170회/분, 산소포화도 65%였고, 심잡음은 명확하지 않았다. 신생아 호흡부전 증후군을 의심하여 폐 계면활성제를 투여했는데 호전되지 않았다. 흉부 X선 소견은 아래와 같을 때, 이 상황에서 가장 의심해야 하는 선천성 심질환은?", "images": [], "text_box": "재태기간 35주, 체중 2.5kg로 남아가 출생 12시간만에 전원하였다. 빠른 호흡, 늑간 함몰, 심한 청색증이 있었고 병원에 왔을 때 호흡수 60회/분, 심박수는 170회/분, 산소포화도 65%였고, 심잡음은 명확하지 않았다. 신생아 호흡부전 증후군을 의심하여 폐 계면활성제를 투여했는데 호전되지 않았다.", "options": ["팔로 4징", "대혈관 전위", "대동맥 축착", "전폐정맥 환류이상", "양대혈관 우심실 기시증"], "answer": [3], "explanation": "제시된 흉부 X선 사진은 수업시간에 다룬 TAPVR(전폐정맥 환류이상)의 소견과 일치합니다. 특히 Type 3 infracardiac type에 해당합니다. 증상의 심각도는 폐정맥의 폐쇄 정도와 심방중격결손(ASD)의 크기에 따라 달라집니다."}, {"subject": "선천성 심장질환 청색증형", "year": ["13학번"], "professor": "이재영", "question": "다음 그림과 같은 형태의 복잡 심질환에서 울혈성 심부전 또는 청색증 등 임상 증상의 발현에 영향을 미치는 중요한 해부학적 요소는?", "images": [], "text_box": null, "options": ["폐동맥협착", "동맥관개존", "심방중격결손", "심실중격결손", "방실판막의 모양"], "answer": [0], "explanation": "제시된 그림은 단심실을 가진 선천성 심질환의 모식도입니다. 이러한 복잡 심질환에서는 폐혈류량이 청색증과 심부전의 정도를 결정하는 중요한 요소입니다. 특히 폐동맥 협착의 유무와 심한 정도가 울혈성 심부전이나 청색증 등 임상 증상의 발현에 가장 큰 영향을 미칩니다. 협착이 심할수록 폐혈류가 줄어 청색증이 악화될 수 있습니다."}, {"subject": "선천성 심장질환 청색증형", "year": ["12학번"], "professor": "이재영", "question": "적절한 체순환 or 폐순환 혈류를 유지하기 위하여 prostaglandin E1 투여가 필요한 질환들이다. 다음 중 혈역학적으로 상이한 한 가지는?", "images": [], "text_box": null, "options": ["폐동맥 폐쇄", "삼첨판 폐쇄", "대동맥 단절", "청색증이 있는 엡스타인 기형", "폐동맥 협착이 심한 Fallot 4징"], "answer": [2], "explanation": "프로스타글란딘 E1은 동맥관 개존을 유지하여 체순환 또는 폐순환 혈류를 확보하는 데 사용됩니다. 폐동맥 폐쇄, 삼첨판 폐쇄, 청색증이 있는 엡스타인 기형, 그리고 폐동맥 협착이 심한 Fallot 4징은 폐혈류량 부족으로 동맥관 유지가 필수적입니다. 그러나 대동맥 단절의 경우 동맥관을 통해 우좌단락으로 체순환을 유지하므로, 다른 질환들과 혈역학적으로 상이한 양상을 보입니다."}, {"subject": "선천성 심장질환 청색증형", "year": ["10학번"], "professor": "이재영", "question": "적절한 체순환 또는 폐순환 혈류를 유지하기 위하여 prostaglandin 투여가 필요한 질환들이다. 다음 중 혈역학적으로 상이한 한 가지는?", "images": [], "text_box": null, "options": ["폐동맥 폐쇄", "삼첨판 폐쇄", "좌심실 형성 부전 증후군", "청색증이 있는 엡스타인 기형", "폐동맥 협착이 심한 Fallot 4징"], "answer": [2], "explanation": "프로스타글란딘은 동맥관을 개존시켜 체순환 또는 폐순환을 유지하는 데 사용됩니다. 폐동맥 폐쇄, 삼첨판 폐쇄, 청색증이 있는 엡스타인 기형, 그리고 심한 Fallot 4징은 폐혈류량 부족으로 인해 동맥관 유지가 필요합니다. 반면 좌심실 형성 부전 증후군은 체순환 유지를 위해 동맥관을 열어두는 것이 필수적이므로 혈역학적으로 다른 양상을 보입니다."}, {"subject": "선천성 심장질환 청색증형", "year": ["10학번"], "professor": "이재영", "question": "전폐정맥 환류 이상에서 청색증의 심한 정도 및 임상 증상의 발현에 영향을 미치는 가장 중요한 해부학적 요소는?", "images": [], "text_box": null, "options": ["폐정맥 협착의 유무", "동맥관 개존의 유무", "우심실의 확장 정도", "심실중격결손의 유무", "폐정맥이 연결 되는 부위"], "answer": [0], "explanation": "전폐정맥 환류 이상(TAPVR)은 폐정맥이 좌심방이 아닌 다른 곳으로 연결되는 선천성 심질환입니다. 이 질환에서 청색증의 심한 정도와 임상 증상의 발현은 폐정맥 협착의 유무에 의해 가장 크게 좌우됩니다. 폐정맥에 협착이 있으면 폐고혈압이 심해져 증상이 악화되며, 이는 진단에 필수적인 요소로 간주됩니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["21학번"], "professor": "김범준", "question": "심장초음파 검사시 하대정맥이 우심방으로 들어가는 것이 보이지 않고 다음 그림과 같은 소견이 보였다. 이러한 소견을 잘 동반하는 질환의 설명으로 옳은 것은?", "images": [], "text_box": null, "options": ["다비증을 동반하는 경우가 흔하다.", "양측폐가 모두 3개의 폐엽으로 구성된다.", "양쪽 심방돌기가 모두 우심방 돌기 모양이다.", "상복부에서 하행대동맥과 하대정맥이 나란히 붙어있다.", "대부분 무비증이다."], "answer": [0], "explanation": "좌/우 영상 모두 spine을 기준으로 Ao와 hemiazygos v.이 같은 쪽에 존재하는 Lt. isomerism 소견입니다. Lt. isomerism은 다비증을 동반하는 경우가 흔합니다. 반면, 양측 폐가 모두 3개의 폐엽으로 구성되고, 양쪽 심방돌기가 모두 우심방 돌기 모양이며, 상복부에서 하행대동맥과 하대정맥이 나란히 붙어있고, 대부분 무비증인 경우는 rt. isomerism에 대한 설명입니다. 따라서 1번이 옳은 설명입니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["19학번", "18학번", "15학번", "14학번"], "professor": "오진희", "question": "다음 중 진단명은 무엇인가?", "images": [], "text_box": "아래에 제시된 심장 사진은 A는 심장의 우측에서 벽을 제거하고 바라본 것이고, B는 심장의 좌측에서 벽을 제거하고 바라본 사진이다. 사진에서 노랑색, 연두색, 하늘색, 주황색 등으로 표시된 부위에 결손이 있다면", "options": ["일차공 결손 (ASD primum)", "방실중격 결손 (atrioventricular septal defect)", "심실중격 결손 (ventricular septal defect)", "이차공 결손 (septum secondum)", "활로씨 사징(tetralogy of fallot)"], "answer": [2], "explanation": "제시된 심장 해부학 사진은 심실 중격의 다양한 부분을 보여줍니다. 노랑색, 연두색, 하늘색, 주황색으로 표시된 부위는 심실 중격의 여러 부위를 나타냅니다. 이 부위들 중 어느 한 곳에 결손이 있다면 이는 심실 중격 결손(Ventricular Septal Defect, VSD)에 해당합니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["19학번", "13학번", "12학번", "11학번"], "professor": "오진희", "question": "표시된 A, B, C, D, E 중 태아 시기에는 탯줄을 통하여 전달된 동맥혈이 좌측 심장으로 전달되어 뇌 등 주요 기관에 산소를 전달하는 역할을 하였으나 출생과 동시에 폐순환량의 증가 및 좌심방 압력 증가로 닫히게 되는 구조물의 위치와 이 구조물의 심장발생학 초기의 명칭에 해당하는 것은?", "images": [], "text_box": null, "options": ["A - septum primum", "B - septum primum", "C - ductus arteriosus", "D - valve of foramen ovale", "E - valve of foramen ovale"], "answer": [1], "explanation": "태아 시기에는 탯줄을 통해 들어온 산소화된 혈액이 난원공(foramen ovale)을 통해 우심방에서 좌심방으로 이동합니다. 난원공은 출생 후 폐순환량이 증가하고 좌심방 압력이 높아지면서 폐쇄됩니다. 이 과정을 통해 닫히는 구조물은 난원공을 덮는 일차중격(septum primum)이며, 그림에서 'B'가 이에 해당합니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["19학번", "18학번"], "professor": "윤지홍", "question": "다음 그림에서 보이는 해부학적 소견과 심초음파에서 보이는 특징을 가진 선천성 질환은?", "images": [], "text_box": null, "options": ["팔로 4징", "대동맥 단절", "심실중격결손", "심방중격결손", "방실중격결손"], "answer": [0], "explanation": "제시된 해부학적 소견과 심초음파 영상은 활로씨 사징(Tetralogy of Fallot)의 특징을 보여줍니다. 활로씨 사징은 심실 중격 결손(VSD), 폐동맥 협착, 대동맥 우위, 우심실 비대(RVH)의 네 가지 주요 병변을 동반하는 선천성 심장병입니다. 영상에서는 VSD와 폐동맥 협착을 시사하는 소견이 관찰됩니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["18학번"], "professor": "오진희", "question": "학생이 분만실에서 분만을 보조하면서 신생아의 탯줄을 잘랐다. 이후 아기는 출생 후 건강하게 울고 있고 산소 포화도도 정상이다. 제시된 8 가지의 답가지 중 향후 성장하면서 아기의 심혈관 구조물 중 자연 폐쇄되는 것을 3가지 고르시오.", "images": [], "text_box": null, "options": ["난원공 (Foramen ovale)", "대동맥 판막 (Aortic valve)", "동맥관 (Ductus Arteriosus)", "폐동맥 판막 (Pulmonary valves)", "폐정맥 (Pulmonic veins)", "하대정맥 판막 (Valve of IVC)", "관상정맥동 판막 (Valve of coronary sinus)", "정맥관 (Ductus Venosus)"], "answer": [0, 2, 7], "explanation": "출생 후 신생아의 심혈관 구조물 중 자연적으로 폐쇄되는 것은 난원공(Foramen ovale), 동맥관(Ductus Arteriosus), 정맥관(Ductus Venosus)입니다. 이들은 태아 순환에 필수적인 구조물로, 출생 후 폐의 기능이 활성화되고 혈역학적 변화가 일어나면서 점진적으로 폐쇄됩니다. 대동맥 판막과 폐동맥 판막은 판막 구조이므로 자연 폐쇄 대상이 아닙니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["16학번", "14학번"], "professor": "오진희", "question": "본 환자에서 잘 동반되는 대표적 심질환에서 관찰되는 주요 해부학적 이상 소견은? (3가지)", "images": [], "text_box": "생후 4개월 된 남아가 심잡음으로 병원에 왔다. 환자의 얼굴 모양은 아래 사진 A와 같았고 아직 목은 가누지 못하였다. 심초음파 소견은 사진 B와 같았다.", "options": ["동맥관개존", "삼첨판폐쇄", "대동맥축착", "폐동맥협착", "심실중격결손", "공통방실판막륜", "일차공 심방중격결손", "이차공 심방중격결손"], "answer": [4, 5, 6], "explanation": "제시된 환아의 얼굴 모양은 다운 증후군(Down syndrome)의 특징을 보이며, 심초음파 소견은 심방심실 중격 결손(Atrioventricular Septal Defect, AVSD)을 나타냅니다. AVSD는 심방 중격 하부의 일차공 결손, 심실 중격 결손, 그리고 승모판과 삼첨판이 분리되지 않고 하나로 연결된 공통 방실판막륜을 특징으로 합니다. 따라서 5번, 6번, 7번이 이 질환에서 관찰되는 주요 해부학적 이상 소견입니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["14학번", "13학번"], "professor": "이재영", "question": "본 환아의 초음파 검사 사진을 근거로 가장 가능성 높은 질환을 한 가지 고르시오.", "images": [], "text_box": "생후 2개월 아기가 예방접종을 위해 내원하였다. 흉부 진찰에서 심잡음이 청진됐고, 환아의 얼굴 모양에서 Down 증후군이 의심되었다. 심초음파를 시행하였고 아래에 제시된 정상 심장의 심초음파 사진(왼쪽)과 비교하여 환자의 심장에서 결손 부위들이 확인되었다(오른쪽).", "options": ["동맥관 개존", "폐동맥 폐쇄", "방실중격 결손", "좌심실 형성부전", "삼첨판 폐쇄"], "answer": [2], "explanation": "환아의 다운 증후군 임상 소견과 심초음파 소견은 심방심실 중격 결손(Atrioventricular Septal Defect, AVSD), 또는 심내막 융기 결손(endocardial cushion defect)을 시사합니다. AVSD는 심방 중격 결손, 심실 중격 결손, 그리고 공통 방실판막이 특징적으로 관찰되는 선천성 심장 질환으로, 다운 증후군 환자에게서 흔하게 동반됩니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["13학번"], "professor": "오진희", "question": "다음 사진 속의 ABCDE 중 환자의 병변이었을 것으로 추정되는 소견은?", "images": [], "text_box": "미숙아가 재태 연령 82 주에 출생 체중 1.5kg 으로 출생하였다. 출생 시에는 별 이상 소견이 없었으나 생후 3일이 되자 환아의 호흡이 빨라지고 호흡 곤란으로 흉부 늑간 함몰을 보이면서 심장 청진 상 흉골 좌상연에서 강도 2-3 도의 지속적 심잡음이 청진되었다. 태아 초음파 검사에서 심장에 구조적 이상은 없다고 들었다고 하였다. 환아는 심초음파 상 어떤 단락(shunt)을 진단받았고 (심초음파 그림 참조) 신생아 중환자실에서 약물 투약 후 퇴원 당시 시행한 심초음파 소견에서는 그 단락이 호전되어 소실되었다고 들었다.", "options": ["A", "B", "C", "D", "E"], "answer": [4], "explanation": "환아의 임상 양상과 심초음파 소견은 동맥관개존증(Patent Ductus Arteriosus, PDA)을 시사합니다. 미숙아에게서 나타나는 지속적인 심잡음과 호흡곤란은 PDA의 흔한 증상입니다. 제시된 그림에서 'E'는 동맥관(Ductus Arteriosus)을 나타내며, 이는 폐동맥과 대동맥을 연결하는 태아 순환 구조입니다. 출생 후 폐쇄되어야 하지만, 미숙아에서는 지속될 수 있습니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["13학번", "12학번"], "professor": "오진희", "question": "본 질환에서 잘 동반되는 이상 소견을 보기의 병변들 중 3가지를 고르시오.", "images": [], "text_box": "다운증후군을 가진 환아가 태아 초음파 상 선천성 심장병이 의심된다고 들었으며 출생 후 청색증이나 호흡곤란은 없었으나 흉골 좌하연에서 범수축기 잡음이 청진되었다. 아래 간략구조 그림에서 D 부분의 결손이 있는 것으로 추정되며 아래 심초음파 소견을 보였다.", "options": ["심실중격 결손", "삼첨판 폐쇄", "일차공 결손 (ASD primum)", "공통방실판막륜 (common AV annulus)", "동맥관 개존", "이차공 결손 (ASD secondum)", "폐동맥 협착"], "answer": [0, 2, 3], "explanation": "다운 증후군 환자에게서 청진되는 심잡음과 심초음파 소견은 심방심실 중격 결손(Atrioventricular Septal Defect, AVSD)을 시사합니다. AVSD는 심내막상 결손으로 인해 발생하는 질환으로, 심방 하부의 일차공 결손, 심실 중격 결손, 그리고 승모판과 삼첨판이 하나로 연결된 공통 방실판막륜을 특징으로 합니다. 따라서 1번, 3번, 4번이 본 질환에서 잘 동반되는 이상 소견입니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["13학번"], "professor": "오진희", "question": "표시된 A-E 중 태아 시기에는 탯줄을 통하여 전달된 동맥혈이 좌측 심장으로 전달되어 뇌 등 주요 기관에 산소를 전달하는 역할을 하였으나 출생과 동시에 폐혈류량의 증가와 좌심방 압력 증가로 닫히게 되는 구조물은 어느 것인가?", "images": [], "text_box": null, "options": ["A", "B", "C", "D", "E"], "answer": [1], "explanation": "태아 시기에 산소화된 혈액은 탯줄을 통해 우심방으로 들어와 난원공(foramen ovale)을 통과하여 좌심방으로 이동합니다. 난원공은 출생 후 폐순환량 증가와 좌심방 압력 상승으로 인해 닫히게 됩니다. 이 과정에서 난원공의 밸브 역할을 하는 'B'는 valve of fossa ovalis 또는 septum primum에 해당하며, 이는 난원공을 폐쇄하는 데 중요한 구조물입니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["11학번"], "professor": "오진희", "question": "심내막상 결손 (Endocardial cushion defect 혹은 atrioventricular septal defect)와 같은 발생 상 문제가 있을 때, 발생할 수 있는 선천성 심질환으로 가능성이 높은 것을 제시된 10가지 질환명 중 고르시오. (3가지)", "images": [], "text_box": null, "options": ["일차공 결손", "이차공 결손", "방실판막 역류", "폐동맥 협착", "좌심실 형성저하 증후군", "심실중격 결손", "동맥관 개존", "활로씨 사징", "대동맥궁 단절", "대동맥 축착"], "answer": [0, 2, 5], "explanation": "심내막상 결손(Endocardial cushion defect), 즉 심방심실 중격 결손(AVSD)과 같은 발생 문제가 있을 때, 주요하게 발생하는 선천성 심장 질환 관련 이상 소견으로는 일차공 심방 중격 결손, 심실 중격 결손, 그리고 방실판막 역류가 있습니다. 이들은 심내막 융합 부전으로 인해 초래되는 병변들입니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["11학번", "09학번"], "professor": "오진희", "question": "심장의 발생 과정 중 다음 설명은 어떤 질환을 가장 잘 설명하는지 고르시오.", "images": [], "text_box": "미숙아/호흡곤란/ 그리고 결정적으로 continuous murmur!!", "options": ["심실 중격 결손", "심방 중격 결손", "동맥관 개존", "승모판 역류", "삼첨판 역류"], "answer": [2], "explanation": "미숙아에서 발생하는 호흡곤란과 흉골 좌상연에서 들리는 지속적인 기계양 심잡음(continuous murmur)은 동맥관 개존증(Patent Ductus Arteriosus, PDA)의 전형적인 임상 소견입니다. PDA는 폐동맥과 하행대동맥 사이의 혈관이 출생 후 폐쇄되지 않고 남아있어 혈액이 비정상적으로 흐르는 선천성 심장 질환입니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["10학번"], "professor": "오진희", "question": "심장 발생 초기의 심장고리(Cardiac loop)의 형성은 심장관의 부분에 따른 성장 속도의 차이로 우측으로 휘어 S자 형태로 구부러지게 되는데(D-loop) 이를 심장고리라 하며 재태연령 28일경 완성된다. 반대로 휘면 ()질환 등의 기형이 발생된다.", "images": [], "text_box": null, "options": ["완전 대혈관 전위", "총동맥간증", "우심증", "방실중격결손", "Fallot 4 징"], "answer": [2], "explanation": "정상적인 심장 발생 과정에서 심장고리는 우측으로 휘어 D-loop를 형성합니다. 만약 심장고리가 좌측으로 휘어지게 되면, 심장의 꼭대기(apex)가 우측을 향하게 되는 선천성 기형인 우심증(dextrocardia)이 발생할 수 있습니다. 우심증은 심장의 위치 이상을 의미하며, 다른 심장 구조의 이상과 동반될 수 있습니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["10학번"], "professor": "오진희", "question": "임신 4-6주에 형성되는 공통 심방의 윗부분에서 심내막상(endocardial cushion)을 향해 자라나오는 일차격막(septum primum)과 이차격막(septum secondum) 발생 과정 중의 문제로 이 질환이 발생한다.", "images": [], "text_box": null, "options": ["완전 대혈관 전위", "심방 중격 결손", "동맥관 개존", "방실 중격 결손"], "answer": [1], "explanation": "제시된 설명은 심방 중격 형성 과정 중 일차격막과 이차격막의 발달 문제로 인해 발생하는 심방 중격 결손(Atrial Septal Defect, ASD)을 나타냅니다. ASD는 결손 위치에 따라 일차공 ASD, 이차공 ASD, 관상정맥동 결손, 정맥동 결손 등으로 분류될 수 있으며, 이는 심방 간의 혈류 단락을 유발합니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["10학번", "09학번"], "professor": "장윤희", "question": "형태학적 우심실과 좌심실을 구별하는 데에 가장 중요한 구조물은 무엇인가?", "images": [], "text_box": null, "options": ["Atrioventricular valve 의 형태", "Aortic valve 혹은 pulmonary valve 의 연결 위치", "RV outflow tract 혹은 LV outflow tract 의 형태", "Apical trabeculation 의 양상", "Papillary muscle 의 형태"], "answer": [3], "explanation": "형태학적으로 우심실과 좌심실을 구별하는 가장 중요한 구조적 특징은 심실 내벽의 근육 섬유망인 심첨부 육주(Apical trabeculation)의 양상입니다. 우심실은 굵고 불규칙한 육주를 가지는 반면, 좌심실은 가늘고 규칙적인 육주를 가집니다. 이는 심실의 형태학적 동정(morphological identification)에 핵심적인 지표가 됩니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["10학번", "09학번"], "professor": "장윤희", "question": "형태학적 우심방과 좌심방을 구별하는 데에 가장 중요한 구조물은 무엇인가?", "images": [], "text_box": null, "options": ["Interatrial septum", "Systemic venous connection", "Pulmonary venous connection", "Appendage", "Atrioventricular valve"], "answer": [3], "explanation": "형태학적으로 우심방과 좌심방을 구별하는 가장 중요한 구조물은 심방 부속기(Appendage)의 형태입니다. 우심방 부속기는 넓고 삼각형 모양이며, 좌심방 부속기는 좁고 길쭉하며 손가락 모양으로 구부러져 있는 것이 특징적입니다. 이 형태학적 차이는 심방의 형태학적 동정에서 가장 일관성 있는 지표로 활용됩니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["09학번"], "professor": "오진희", "question": "심실 중격의 형성은 임신 4주 말에 심실 중간의 근성 격벽이 아래에서부터 자라 올라오면서 좌우 심실로 나누게 되며 거의 다 자라 올라올 무렵 조금 남은 부분이 interventricular foramen 인데( )에서 얇은 격벽이 자라나와 이 foramen 을 덮어 심실중격이 완성된다. 이 얇은 부분이 membranous portion 이며 ventricular septal defect 의 가장 흔한 위치가 된다. - 이 설명문의 ( )에 알맞은 단어는?", "images": [], "text_box": null, "options": ["Septum secondum", "Foramen ovale", "Endocardial cushion", "Coronary sinus", "Sinus venosus"], "answer": [2], "explanation": "심실 중격의 형성 과정에서 심실 중격의 막성 부분(membranous portion)은 심내막 융기(endocardial cushion)에서 유래한 얇은 격벽이 자라나와 interventricular foramen을 덮으면서 완성됩니다. 이 막성 부분이 심실 중격 결손(VSD)이 가장 흔하게 발생하는 위치가 됩니다. 따라서, 빈칸에 들어갈 가장 적절한 단어는 'Endocardial cushion'입니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["09학번"], "professor": "장윤희", "question": "이 환아의 태생기 동안 발달 과정에 문제가 있었을 것으로 생각되는 부분은?", "images": [], "text_box": "심잡음이 있어 내원한 환아를 심장초음파를 시행한 결과 일차공형 심방중격결손(ASD primum), 심실중격결손과 함께 삼첨판과 승모판이 나누어지지 않고 공통방실판막륜에 붙어 있었다.", "options": ["Foramen ovale", "Endocardial cushion", "Coronary sinus", "Sinus venosus", "Ductus arteriosus"], "answer": [1], "explanation": "환아의 심초음파 소견은 일차공형 심방중격결손(ASD primum), 심실중격결손 및 공통 방실판막륜을 동반한 심방심실 중격 결손(AVSD)을 나타냅니다. 이러한 AVSD는 심장 발달 과정 중 심내막 융기(endocardial cushion)의 형성 부전으로 인해 발생합니다. 심내막 융기는 심방과 심실 사이의 중격을 형성하는 데 중요한 역할을 합니다."}, {"subject": "선천심장병의 해부학적소견,심초음파진단", "year": ["09학번"], "professor": "한지환", "question": "선천성 심장 질환 중 가장 흔한 것은?", "images": [], "text_box": null, "options": ["Fallot 4 징", "동맥관 개존", "폐동맥 협착", "심방 중격 결손", "심실 중격 결손"], "answer": [4], "explanation": "선천성 심장 질환 중 가장 흔한 것은 심실 중격 결손(Ventricular Septal Defect, VSD)입니다. VSD는 심실 중격에 구멍이 있어 좌심실에서 우심실로 혈액이 비정상적으로 흐르는 질환으로, 심잡음과 심부전 등의 다양한 증상을 유발할 수 있습니다."}, {"subject": "소아부정맥", "year": ["19학번", "18학번"], "professor": "", "question": "다음 심전도 소견이 정상인 연령은?", "images": [], "text_box": null, "options": ["1세", "1일", "5세", "10세", "15세"], "answer": [1], "explanation": "신생아의 평균 QRS 축은 우측편위 (+110~180)입니다. 신생아기에는 우측 흉부 유도에서 R 파가 S 파보다 크고 수개월 지속됩니다. 출생 직후에는 좌측 흉부 유도에서 S 파가 R 파보다 클 수 있으나 수일 내 좌심실 우세로 전환됩니다. 소아는 태어난 직후 폐 저항이 높아 우심실이 크며, 심전도에서 Rightward QRS axis를 보입니다. 제시된 심전도의 우측 편위 소견은 신생아에게 정상입니다."}, {"subject": "소아부정맥", "year": ["19학번", "18학번"], "professor": "", "question": "검사와 치료가 필요한 임상적으로 중요한 경우는?", "images": [], "text_box": "평소 건강한 12세 여아가 약 2달 전부터 발생한 답답한 가슴을 주소로 외래를 방문하였다. 심잡음은 없었고 심박동도 정상이었고 전신상태는 양호하였다. 흉부 X선 사진은 이상이 없었고 심전도는 다음과 같았다.", "options": ["모두", "운동시악화", "다형성조기박동", "홀터 상 높은 빈도", "연달아 2번 이상 발생"], "answer": [0], "explanation": "이 심전도 소견만으로는 특정 진단을 내리기 어렵습니다. 환자가 답답한 가슴을 호소하므로 추가적인 검사가 필요합니다. 심전도상으로는 정상 심박동으로 보이나, 임상적으로 중요한 상황은 운동 시 악화, 다형성 조기 박동, 홀터 모니터링 상 높은 빈도, 그리고 2회 이상 연속으로 발생하는 경우입니다. 따라서 모든 보기의 상황에서 검사 및 치료가 필요할 수 있습니다."}, {"subject": "소아부정맥", "year": ["19학번", "18학번", "17학번", "16학번", "15학번", "14학번", "13학번", "11학번", "10학번"], "professor": "한지환", "question": "즉각 시행할 치료는?", "images": [], "text_box": "평소 건강하던 5세 남아가 심박동이 빠르다고 타병원에서 전원되었다. 심잡음은 없었고 심장박동이 빨랐지만 전신 상태는 양호하였다. 의뢰한 병원에서 숨을 멈추게 하거나 얼음주머니를 얼굴에 대는 등의 시도를 했는데 반응이 없었다고 했다.", "options": ["Digoxin 투여", "Verapamil 투여", "Adenosine 투여", "Propranolol 투여", "Valsalva maneuver 재시도"], "answer": [2], "explanation": "제시된 심전도는 PSVT 소견을 보이며, Valsalva maneuver에 반응하지 않았습니다. 이런 경우 즉시 Adenosine 정맥 투여가 필요합니다. QRS는 narrow하고 규칙적이며, retrograde P-wave가 관찰되어 AVRT로 추정됩니다. 안정적인 혈역학적 상태에서는 Adenosine이 일차 치료제로 사용됩니다."}, {"subject": "소아부정맥", "year": ["18학번"], "professor": "", "question": "이 신생아에서 혈관을 통과하는 혈류의 방향이 출생 후 반대 방향으로 전환되어야 하나 전환되지 않고 태아 시기의 혈류 방향이 출생 후에도 일정 기간 신생아 지속적 폐고혈압에서 지속될 수 있는 위치는?", "images": [], "text_box": "금일 출생한 아기가 출생 후 지속되는 청색증을 주소로 본원 신생아 중환자실로 입원하였다. 재태연령 40+2주에 3.4kg으로 제왕절개 분만으로 출생하였고 산전 초음파상 심장에 구조적 이상은 없었다. 아기의 심박수는 분당 130회/분, 호흡 46회/분, 체온 36.8C 이었다. 호흡 곤란에 따른 경미한 늑간 함몰이 관찰되었고 경피적 산소 포화도 모니터상 88~90%로 측정되었 다. 심초음파 검사 결과지에 신생아 지속적 폐고혈압(persistent pulmonary hypertension of the new born)이라고 기록되어 있다.", "options": ["동맥관", "대동맥", "체정맥", "폐정맥", "폐동맥"], "answer": [0], "explanation": "이 내용은 수업에서 자세히 다루지 않았습니다. 신생아의 심박수 130회는 정상 범위에 속합니다. 출생 후 일정 기간 동안 폐 저항이 높아져 우심실 비대 및 심전도에서 우측 편위가 관찰될 수 있다는 점을 알아두는 것이 중요합니다. 동맥관은 태아 순환에서 중요한 우회 혈관으로, 출생 후 닫히지 않고 혈류 방향이 지속될 때 문제가 됩니다."}, {"subject": "소아부정맥", "year": ["16학번", "15학번", "14학번", "13학번", "12학번"], "professor": "", "question": "가능한 진단명은?", "images": [], "text_box": "우측 흉골연 상부에서 수축기 잡음이 들리는 10개월된 남아에서 검사한 심전도이다.", "options": ["대동맥 협착", "폐동맥 협착", "동맥관 개존증", "심방 중격 결손증", "심실 중격 결손증"], "answer": [1], "explanation": "제시된 심전도는 우심방 및 우심실 비대 소견을 보입니다. 우측 흉골연 상부에서 들리는 수축기 잡음과 함께 pressure load를 시사하는 심전도 소견은 폐동맥 협착과 관련이 깊습니다. Lead I에서 음의 방향을 보여 우측 편위를 의심할 수 있습니다. 10개월 남아에게 이 정도의 우측 편위는 정상 범위를 넘어선 것으로, 우심실 비대를 시사합니다."}, {"subject": "소아부정맥", "year": ["11학번"], "professor": "이순주", "question": "이와 관련 있는 것을 고르면?", "images": [], "text_box": "우측 흉골연 상부에서 수축기 잡음이 들리는 여 아?????의 심전도 소견이다.", "options": ["Fallot 4 징후", "대동맥 협착", "동맥판 개존증", "심실중격 결손증", ""], "answer": [1], "explanation": "심전도 상 좌심실 수축 압력이 높아진 소견을 보입니다. 우측 흉골연 상부의 수축기 잡음과 함께 나타나는 이러한 심전도 변화는 대동맥 협착을 시사할 수 있습니다. 소아에서는 대동맥 협착 시 좌심실의 부담이 증가하여 좌심실 비대가 나타날 수 있습니다. 따라서 대동맥 협착이 가장 관련 깊은 진단입니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["20학번", "18학번", "17학번", "16학번"], "professor": "이철", "question": "이 환아에게 시행할 수 있는 고식적 수술은?", "images": [], "text_box": "재태 연령 36주, 체중 2.4kg인 환아가 출생하였다. 수축기 심잡음이 청진되었고 청색증은 관찰되지 않았다. 심장 초음파 검사에서 큰 막주위형 심실 중격 결손이 관찰되었다. 생후 2주 동안 환아의 상태는 안정적이었으나, 이후 호흡수가 비정상적으로 증가하며 호흡시에 심한 흉부 함몰 소견을 나타내기 시작했다. 우유를 먹을 때 힘들어하고 땀을 많이 흘리며 체중 증가도 잘 이루어지지 않았다.", "options": ["체폐동맥 단락술", "심방 중격 절제술", "Fontan 수술", "양방향성 상대정맥-폐동맥 문합술", "폐동맥 교약술", "심실 중격 결손 패취(patch) 폐쇄술"], "answer": [4], "explanation": "환아는 울혈성 심부전 증상을 보이며, 이는 VSD의 전형적인 증상입니다. 어린 환아이기 때문에 VSD를 직접 폐쇄하기보다는 폐혈류량을 조절하여 심부전 증상을 완화시키는 고식적인 수술인 폐동맥 교약술(pulmonary artery banding)을 시행합니다. 이 수술은 폐동맥의 직경을 줄여 폐혈류량을 감소시키는 목적을 가집니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["20학번", "17학번"], "professor": "이철", "question": "심실 중격 결손의 수술적 치료에 관한 설명으로 가장 적절한 것은?", "images": [], "text_box": null, "options": ["막주위형 심실 중격 결손은 대부분 크기가 작아서 수술할 필요가 없다.", "큰 심실 중격 결손을 가지고 있으면서 약물 치료에 반응하지 않는 심한 울혈성 심부전 증상을 나타내는 영아들은 가능하면 빨리 수술을 받아야 한다.", "약물 치료로 심부전 증상이 잘 조절되는 환자들은 수술을 받을 필요가 없다.", "막주위형 심실 중격 결손은 심한 심부전 증상을 유발하므로 진단 즉시 수술해야 한다.", "진단이 지연되어 성인기에 늦게 발견된 심실 중격 결손은 치료 시기를 놓치기 전에 즉시 수술해야 한다."], "answer": [1], "explanation": "심실 중격 결손의 수술 적응증은 환아의 증상과 결손의 크기, 그리고 약물 치료에 대한 반응 여부에 따라 결정됩니다. 특히 큰 심실 중격 결손으로 인해 심한 울혈성 심부전 증상을 보이고 약물 치료에 반응하지 않는 영아의 경우, 폐혈관 질환의 진행을 막고 예후를 개선하기 위해 조기에 수술적 치료를 고려해야 합니다. 막주위형 심실 중격 결손이라도 크기가 크고 증상이 있다면 수술이 필요할 수 있습니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["20학번"], "professor": "이철", "question": "이 환자에서 임상증상의 발현 및 치료 시기의 결정에 가장 중요한 해부학적 요소는?", "images": [], "text_box": "생후 1개월 남아가 입술이 약간 푸르게 보인다고 병원에 왔다. 수유는 정상적으로 잘 하며, 체중 증가도 정상이라고 한다. 호흡수는 분당 80회, 산소 포화도는 85%였고, 흉골의 좌측 상연에서 3/6도의 구출성 심잡음이 청진되었다. 흉부 X선 사진은 다음과 같다.", "options": ["우심실의 압력", "우심실 비대의 정도", "대동맥 기승의 정도", "심실 중격 결손의 크기", "우심실 유출로 협착(폐동맥 협착)의 심한 정도"], "answer": [4], "explanation": "환아는 청색증과 함께 호흡수 증가, 낮은 산소 포화도를 보여 Fallot 사징증을 시사합니다. Fallot 사징증에서 임상 증상의 발현과 치료 시기 결정에 가장 중요한 해부학적 요소는 우심실 유출로 협착(폐동맥 협착)의 심한 정도입니다. 이 협착의 심한 정도에 따라 폐혈류량이 결정되며, 이는 청색증의 정도와 합병증 발생 위험에 직접적인 영향을 미치기 때문입니다. 심한 협착은 폐혈류 감소를 심화시켜 더 이른 시기에 수술적 개입을 필요로 합니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["20학번", "19학번", "18학번", "16학번", "15학번"], "professor": "이철", "question": "수술 후 폐동맥 고혈압을 유발하여 환아의 장기 예후에 나쁜 영향을 미칠 것으로 생각되는 소견은?", "images": [], "text_box": "청색증을 보이는 생후 6개월 Fallot 사징증 환아의 교정 수술을 시행하는 도중 다음과 같은 소견들을 발견하였다.", "options": ["심실 유출부 중격의 전상방 편위", "큰 심실 중격 결손", "매우 작은 크기의 폐동맥 판막", "심한 우심실 비후", "작은 폐동맥"], "answer": [4], "explanation": "Fallot 사징증의 교정 수술 후 폐동맥 고혈압 발생 위험을 높이고 장기 예후에 부정적인 영향을 미치는 요인 중 하나는 폐동맥 자체의 발육 부전입니다. 폐동맥 판막의 크기나 주폐동맥의 직경이 매우 작은 경우, 수술 후 폐혈류 저항이 높아져 폐동맥 고혈압을 유발할 수 있습니다. 이는 판막 기능 상실이나 잔여 협착과 연관될 수 있으며, 재수술의 필요성을 증가시킬 수 있습니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["17학번"], "professor": "이철", "question": "fallot 사징증의 형태학적 특징들 중에서 가장 핵심적인 것은?", "images": [], "text_box": null, "options": ["심실 중격 결손", "대동맥이 좌심실과 우심실 모두에 연결", "우심실 비후", "심실 유출부 중격의 전상방 편위", "우심실 유출로 협착"], "answer": [3], "explanation": "Fallot 사징증의 네 가지 특징(심실 중격 결손, 대동맥 기승, 우심실 유출로 협착, 우심실 비후) 중에서 가장 핵심적인 것은 심실 유출부 중격의 전상방 편위입니다. 이 편위로 인해 우심실 유출로가 좁아지고(폐동맥 협착), 심실 중격 결손이 발생하며, 대동맥이 심실 중격 결손 위로 기승하게 됩니다. 이 모든 해부학적 이상이 결과적으로 우심실 비후를 유발하게 됩니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["16학번"], "professor": "이철", "question": "이 환아에게 시행할 수 있는 수술은?", "images": [], "text_box": "근육성 다발 심실중격결손 환아가 출생하였다. 심장 초음파 검사에서 다발성 근성 심실 중격 결손이 관찰되었다. 생후 2주 동안 환아의 상태는 안정적이었으나, 이후 호흡수가 비정상적으로 증가하여 호흡시에 심한 흉부 함몰 소견을 나타내기 시작하였다. 우유를 먹을 때 매우 힘들어하고 땀을 많이 흘리며 체중 증가도 잘 이루어지지 않았다.", "options": ["체폐동맥 단락술", "폐동맥 교약술", "심방중격절제술", "양방향성 공정맥 폐동맥 문합", "Fanton 수술"], "answer": [1], "explanation": "다발성 근육성 심실 중격 결손 환아에게서 폐혈류량이 증가하고 심부전 증상이 발현된 경우, 아직 직접 결손을 폐쇄하기 어려운 시기에는 폐혈류량을 조절하는 고식적 수술을 시행합니다. 폐동맥 교약술(pulmonary artery banding)은 폐동맥을 좁혀 폐혈류량을 감소시키고 폐고혈압을 예방하여, 환아의 증상을 완화하고 추후 근치적 수술을 위한 시간을 벌어주는 역할을 합니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["13학번"], "professor": "이철", "question": "이 환아의 청색증을 완화시키기 위해 시행할 수 있는 고식적 수술은?", "images": [], "text_box": "생후 5일된 신생아가 심한 청색증을 보여 내원하였다. 가슴 청진에서 수축기 심잡음이 들렸으며 호흡음은 정상이었다. 동맥혈 산소 포화도는 65% 정도로 측정되었다. 심장 초음파 검사를 시행하였는데 심한 우심실 유출로 협착 및 매우 작은 폐동맥 판막을 가진 Fallot 4징으로 진단되었다.", "options": ["폐동맥 교약술", "체폐동맥 단락술", "심방 중격 절제술", "Fontan 수술", "양방향성 상대정맥-폐동맥 문합술"], "answer": [1], "explanation": "Fallot 사징증으로 인해 폐혈류량이 심하게 감소하고 청색증이 나타나는 신생아 환자에게서, 근치적 수술을 시행하기 어려운 상황에서는 폐혈류량을 증가시켜 청색증을 완화하는 고식적 수술을 시행합니다. 변형 Blalock-Taussig 단락술(체폐동맥 단락술)은 체동맥과 폐동맥을 연결하여 폐로 가는 혈류량을 늘려주는 가장 보편적인 방법입니다. 이를 통해 일시적으로 환아의 상태를 안정화시키고 추후 근치적 수술을 계획할 수 있습니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["12학번"], "professor": "이철", "question": "심실중격결손은 구멍의 위치 및 구멍의 경계를 이루는 구조물에 따라 분류한다. 다음 중 대동맥 판막 역류를 잘 일으킬 수 있는 심실 중격 결손은?", "images": [], "text_box": null, "options": ["근육형 심실중격결손", "다발성 심실중격결손", "동맥하형 심실중격결손", "막주위형 심실중격결손", "유입부형 심실중격결손"], "answer": [2], "explanation": "동맥하형 심실 중격 결손은 대동맥판막 바로 아래에 위치하는 결손입니다. 이 유형의 결손에서는 대동맥 판막의 지지 구조가 약해지거나, 판막엽이 결손 부위로 탈출되면서 대동맥 판막 역류를 유발할 위험이 다른 유형의 심실 중격 결손에 비해 높습니다. 따라서 동맥하형 심실 중격 결손이 진단되면 대동맥 판막 역류 발생 여부를 주의 깊게 관찰해야 합니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["12학번"], "professor": "이철", "question": "이 환아의 증상을 완화시키기 위해 시행할 수 있는 고식적 수술은?", "images": [], "text_box": "생후 2개월된 영어가 체중이 잘 늘지 않고 우유를 먹을 때 힘들어 하여 내원하였다. 가슴 청진에서 수축기 심잡음이 들렸으며 호흡음은 정상적이었다. 단순 흉부 촬영에서 폐혈관 음영의 증가 및 심비대 소견이 관찰되었다. 심장 초음파 검사를 시행하였는데 여러 개의 근육형 심실 중격 결손이 발견되었다.", "options": ["변형 Blalock-Taussig 단락술", "심방 중격 절제술", "양방향성 상대정맥-폐동맥 문합술", "폐동맥 교약술", "Fontan 수술"], "answer": [3], "explanation": "여러 개의 근육형 심실 중격 결손으로 인해 폐혈류량이 증가하고 울혈성 심부전 증상을 보이는 영아에게는, 아직 근치적 수술을 바로 시행하기 어려울 때 고식적 수술로 폐동맥 교약술(pulmonary artery banding)을 시행하여 증상을 완화시킵니다. 이 수술은 폐동맥을 좁혀 폐혈류량을 줄여줌으로써 폐고혈압 발생을 예방하고, 심부전 증상을 경감시키며, 추후 근치적 수술을 위한 시간을 확보하는 데 도움을 줍니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["12학번"], "professor": "이철", "question": "가장 적절한 처치는?", "images": [], "text_box": "출생후 fallot4징으로 진단받은 6개월영아가 청색증이 점점 심해진다고 병원에 왔다. 며칠전부터 심하게 울면서 수차례 실신한 적이 있었다. 완전혈구계산검사에서 혈색소 18g/dl, 적혈구용적 74%이었다.", "options": ["관찰", "철분투여", "근치수술", "강심제투여", "propranolol투여"], "answer": [2], "explanation": "Fallot 사징증 환아의 청색증이 심화되고 저산소성 발작(hypoxic spell)이 반복적으로 발생하는 6개월 전후의 시기에는 근치적 수술을 시행하는 것이 가장 적절합니다. 특히 환아의 나이가 6개월이고 저산소성 발작의 병력이 있으므로, 심장 기형을 교정하여 폐혈류를 개선하고 장기적인 예후를 향상시키는 근치수술이 필요합니다. 이는 일시적인 약물 치료나 관찰만으로는 해결하기 어려운 응급 상황에 해당할 수 있습니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["11학번"], "professor": "이철", "question": "교정 수술을 시행하기 어려운 상황이라면 이 환자의 청색증을 완화시키기 위해 시행할 수 있는 수술은?", "images": [], "text_box": "생후 7일된 신생아가 심한 청색증을 보여 내원하였다. 가슴 청진에서 수축기 심잡음이 들렸으며 호흡음은 정상이었다. 동맥혈 산소 포화도는 85% 정도로 측정되었다. 심장 초음파 검사를 시행하였는데 심한 우심실 유출로 협착을 보이는 fallot 사징증에 합당한 소견이 관찰되었다.", "options": ["Fontan 수술", "폐동맥 교약술", "심장 중격 절제술", "변형 Blalock-Taussig 단락술", "양방향성 상대정맥-폐동맥 문합술"], "answer": [3], "explanation": "Fallot 사징증 환아에게서 폐혈류 감소로 인한 심한 청색증이 있을 때, 교정 수술을 바로 시행하기 어려운 신생아 시기에는 폐혈류량을 증가시켜 청색증을 완화하는 고식적 수술을 시행합니다. 변형 Blalock-Taussig 단락술은 체동맥과 폐동맥을 연결하는 인공 혈관을 삽입하여 폐로 가는 혈류량을 늘려주는 가장 보편적인 방법으로, 이는 환아의 저산소증을 개선하고 추후 근치적 수술을 위한 시간을 벌어줍니다."}, {"subject": "선천 심장병의 수술적 치료", "year": ["06학번"], "professor": "장윤희", "question": "single ventricle repair 3 단계의 순서로 맞는 것은?", "images": [], "text_box": null, "options": ["ABC", "CBA", "BAC", "BCA", "CAB"], "answer": [0], "explanation": "단심실 교정 수술은 일반적으로 3단계에 걸쳐 진행됩니다. 1단계(A)는 pulmonary artery banding (폐동맥 교약술)으로, 폐혈류량을 조절하여 폐고혈압을 예방합니다. 2단계(B)는 bidirectional cavopulmonary anastomosis (양방향성 상대정맥-폐동맥 문합술) 또는 Glenn 수술로, 상대정맥 혈류를 직접 폐동맥으로 연결합니다. 마지막 3단계(C)는 Fontan operation (폰탄 수술)으로, 하대정맥 혈류까지 폐동맥으로 연결하여 전신 정맥혈이 심실을 거치지 않고 폐로 흐르도록 합니다. 따라서 올바른 순서는 ABC입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["19학번"], "professor": "오진희", "question": "본 증례의 심잡음이 아래 심장 모형에서 하늘색으로 표시된 'E' 부분에 단락이 있어 심잡음이 발생하는 질환이라면 전형적 심잡음은 다음 모식도에서 어떤 형태로 청진될 것인지 1-5번 중 가장 맞는 것을 하나 고르시오.", "images": [], "text_box": "재태 연령 30주에 출생 체중 1.2kg으로 출생한 미숙아가 출생 당시에는 청진상 별 이상 소견 없었으나 생후 3일에 호흡이 빨라졌고, 좌측 흉골 상연에서 심잡음이 청진 되었다. 출생 전 태아 초음파 검사에서 심장에 구조적 이상은 없었다고 한다.", "options": ["RUSB - 수축기박출잡음 Systolic ejection murmur", "LUSB - 지속성 잡음 Continuous murmur", "LUSB - 수축기박출잡음", "LLSB - 범수축기잡음 Holosystolic/Pansystolic murmur", "Apex - 범수축기잡음"], "answer": [1], "explanation": "그림 A의 E는 동맥관(Ductus Arteriosus)으로 대동맥과 폐동맥을 연결합니다. 이곳에 단락이 있으면 동맥관개존증(PDA)입니다. 출생 직후에는 폐혈관저항이 높아 잡음이 없지만, 생후 3일경 폐혈관저항이 떨어지면 대동맥에서 폐동맥으로의 좌우 단락이 발생합니다. 대동맥압은 수축기와 이완기 내내 폐동맥보다 높으므로, 수축기와 이완기 전부에서 들리는 지속성 잡음(Continuous murmur) 양상을 보입니다. 이는 LUSB에서 청진되는 소견으로, 그림에서 2번에 해당합니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["17학번", "12학번", "11학번", "09학번"], "professor": "오진희", "question": "제시된 8가지 답가지 중 향후 성장하면서 아기의 심혈관 구조물 중 자연 폐쇄되는 것을 3가지 고르시오.", "images": [], "text_box": "학생이 분만실에서 분만을 보조하면서 신생아의 탯줄을 잘랐다. 이후 아기는 출생 후 건강하게 울고 있고 산소 포화도도 정상이다.", "options": ["난원공 (Foramen Ovale)", "대동맥 판막 (Aortic Valve)", "동맥관 (Ductus Arteriosus)", "폐동맥 판막 (Pulmonary Valves)", "폐정맥 (Pulmonic Veins)", "하대정맥 판막 (Valve of Inferior Vena Cava)", "관상정맥동 판막 (Valve of Coronary sinus)", "정맥관 (Ductus Venosus)"], "answer": [0, 2, 7], "explanation": "출생과 동시에 태반으로부터 분리되면서 정맥관(Ductus Venosus)이 막힙니다. 신생아가 호흡을 시작하면 폐의 산소 분압이 증가하여 동맥관(Ductus Arteriosus)이 닫히고, 폐순환량이 급격히 증가하여 좌심방으로 돌아오는 혈액량이 많아지면서 좌심방의 압력이 올라가 난원공(Foramen Ovale)이 기능적으로 닫히게 됩니다. 따라서 난원공, 동맥관, 정맥관은 출생 후 자연적으로 폐쇄되는 심혈관 구조물입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["17학번", "14학번"], "professor": "이재영", "question": "옳은 것은?", "images": [], "text_box": "간헐적인 호흡곤란으로 내원한 16세 환자의 흉부 CT 사진이다.", "options": ["심방중격결손", "동맥관개존", "폐동맥협착", "심실중격결손", "Fallot 4징"], "answer": [3], "explanation": "제시된 흉부 CT 사진(img42.png)은 심장 내부에 결손을 시사하는 소견이 있을 수 있으며, 문맥상 심실중격결손(VSD)을 진단하는 문제로 보입니다. VSD는 좌심실과 우심실 사이의 중격에 구멍이 있는 선천성 심질환으로, 좌우 단락이 발생합니다. 이는 환자의 간헐적인 호흡곤란과 연관될 수 있습니다. Fallot 4징은 청색증형 질환이므로 이 환자의 간헐적 호흡곤란과는 거리가 있습니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["16학번", "15학번"], "professor": "오진희", "question": "이 환자에게서 일어난 변화는?", "images": [], "text_box": "10 세 남아가 운동 시 호흡곤란과 청색증으로 병원에 왔다. 흉부 청진에서 심잡음은 뚜렷하지 았고 제 2 심음의 폐성분(P2)이 항진되어 있었다. 산소 포화도는 90%였다. 생후 4 개월 때의 부 X-선 검사는 그림 A 와 같았고, 당시 수술을 권유 받았으나 하지 않고 지냈다고 한다. 현재의 흉부 X-선 검사는 B 와 같다.", "options": ["폐동맥 혈관 크기가 줄어들었다.", "우심실 유출로 협착이 발생하였다.", "울혈성 심부전이 계속 진행 중이다.", "결손의 크기가 작아져서 자연 호전 되었다.", "폐혈관 폐쇄성 질환(Eisenmenger syndrome)이 발생하였다."], "answer": [4], "explanation": "생후 4개월 때의 X-선(A)에 비해 10세 때의 X-선(B)에서는 심비대가 덜하고 폐혈관 음영이 감소하며 폐동맥이 확장된 소견이 관찰됩니다. 환자는 운동 시 호흡곤란과 청색증을 보이며, 심잡음은 뚜렷하지 않고 P2가 항진되어 있습니다. 이는 큰 심실중격결손(VSD) 환자가 폐동맥 고혈압으로 인해 폐혈관 폐쇄성 질환(Eisenmenger syndrome)으로 진행하여 우좌 단락이 발생하고 청색증이 나타난 경우입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["15학번"], "professor": "오진희", "question": "이 아기에서 심초음파 검사상 연두색으로 표시된 MS 부분에 2mm의 구멍이 확인되었다면 치료는?", "images": [], "text_box": "4개월 아기가 예방접종하러 왔다. 출생 당시 재태연령 40주에 3.2kg로 정상 분만 되었으며 현재 체중은 4kg이고 우유를 잘 먹는다고 한다. 심박수 분당 110회, 호흡수 분당 28회로 확인되었고 흉골 좌하연에서 3도의 수축기 심잡음이 청진되었다. 아래의 병리 표본 사진은 각각 우심실벽을 제거하고 우심실 쪽에서 바라본 사진(A)과 좌심실 벽을 제거하고 좌심실 쪽에서 바라본 사진(B)이다.", "options": ["판막 성형술이 필요하다", "응급 기구 폐쇄술을 시행한다", "폐저항을 낮추는 치료가 도움이 된다", "이뇨제 처방하고 영아기에 개심술로 교정한다", "자연 폐쇄 가능성이 있어 주기적 심초음파로 관찰한다"], "answer": [4], "explanation": "환아는 흉골 좌하연에서 수축기 심잡음이 들리고, 병리 표본 사진(img19.png)은 심실중격결손(VSD)을 보여줍니다. MS 부분에 2mm의 작은 구멍은 작은 VSD에 해당합니다. 작은 VSD는 자연 폐쇄될 가능성이 높으며, 환아의 체중이 잘 늘고 심박수 및 호흡수가 비교적 정상 범위인 점을 고려할 때, 현재 울혈성 심부전 증상이 심각하지 않습니다. 따라서 수술적 치료보다는 주기적인 심초음파를 통해 경과를 관찰하는 것이 적절합니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["15학번"], "professor": "오진희", "question": "가장 적절한 치료는?", "images": [], "text_box": "52 세 여자가 3~4 년 전부터 오르막 오를 때 발생하는 운동 시 호흡곤란 있던 환자로 최근 가좌 호흡(orthopnea) 발생하고 NYHA class3 호흡곤란으로 악화되며 양측 하지에 오목 부종(pitting edema) 있어 입원함. 좌측 흉골연 상부에서 3/4 도의 수축기 잡음이 청진 되었다. 환자의 흉부 X 선과 생리식염수 bubble을 만들어 우측 팔 정맥에 투여하면서 검사한 경식도 심장 초음파 소견이다.", "options": ["경피적 심방중격 결손 결찰", "수술적 심방중격 결손 결찰", "엔도셀린 길항제", "이뇨제", "항혈전제"], "answer": [2], "explanation": "환자는 좌측 흉골연 상부에서 수축기 잡음이 들리고, 운동 시 호흡곤란, 기좌호흡, 하지 부종 등 심부전 증상이 악화되고 있습니다. 경식도 심장 초음파(img21.png)에서 우좌단락을 시사하는 소견이 관찰됩니다. 이러한 증상은 폐동맥 고혈압으로 인한 Eisenmenger syndrome을 동반한 심방중격결손(ASD)을 시사합니다. Eisenmenger syndrome에서는 폐혈관 저항이 매우 높아 이미 돌이킬 수 없는 상태이므로 수술적 치료는 금기이며, 약물 치료가 우선됩니다. 엔도셀린 길항제는 폐동맥 고혈압 치료에 사용될 수 있는 약제입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["15학번"], "professor": "이재영", "question": "맞는 것은?", "images": [], "text_box": "간헐적인 호흡곤란으로 내원한 환자의 흉부 X 선 및 CT 사진이다.", "options": ["청색증을 보이는 질환이다.", "중심부 폐동맥이 작아 보인다.", "좌심실이 커진 소견이다.", "우심실이 커진 소견이다.", "우심방의 크기는 정상이다."], "answer": [3], "explanation": "제시된 흉부 X선 및 CT 사진(img44.png)은 심방중격결손(ASD) 환자의 소견을 보여줍니다. ASD는 좌심방에서 우심방으로의 단락으로 인해 우심방과 우심실의 용적 과부하를 초래합니다. 이로 인해 우심실이 커진 소견이 관찰되며, 간헐적인 호흡곤란은 폐혈류량 증가로 인한 폐울혈 때문일 수 있습니다. ASD는 비청색증형 심질환이므로 청색증을 보이지 않습니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["13학번", "12학번", "11학번"], "professor": "오진희", "question": "A, B에 들어갈 적합한 단어를 상기 7가지 답가지 중 하나씩 고르시오.", "images": [], "text_box": "아래 문항에 대해 가능한 진단을 아래 답가지(1~7)중에서 지시하는 수만큼 고르시오. 모체에 연결되어 태반에서 산소를 공급 받는 태아 순환은 태반과 분리되는 분만과정을 겪으면서 양심실 순환(parallel circulation)이 연합 순환 (serial circulation)으로 변화하는 과정에 과도기(transitional circulation phase)를 겪게 된다. 이 과정에서 대사상태, 혈액 가스 분압, 국소적 요인 등에 의해 폐혈관 저항이 다시 증가할 수 있고 이에 따라 A와 B가 다시 열릴 수 있고, 선천성 구조적 심질환이 없어도 청색증을 보이는 태아순환 지속증이 나타날 수 있으며 폐저항을 떨어뜨리는 치료로 자연호전 된다.", "options": ["난원공 (Foramen ovale)", "일차공 (ostium primum)", "동맥관 (ductus arteriosus)", "정맥관 (ductus venosus)", "공통 방실 판막 (common atrioventricular valves)", "하대정맥 판막 (valve of IVC)", "대동맥 판막 (aortic valves)"], "answer": [0, 2], "explanation": "문제 지문은 태아 순환의 특징과 출생 후 과도기 순환을 설명하고 있습니다. 태아 순환은 태반에서 산소화된 혈액이 정맥관(Ductus Venosus)을 통해 우심방으로 들어와 난원공(Foramen Ovale)을 거쳐 좌심방으로 이동합니다. 폐혈관 저항이 높아 대부분의 혈액이 동맥관(Ductus Arteriosus)을 통해 하행 대동맥으로 흐릅니다. 따라서 'A와 B'는 난원공과 동맥관이 됩니다. 이 두 구조는 출생 후 폐쇄되지만, 태아 순환 지속증 시 다시 열릴 수 있습니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["12학번"], "professor": "오진희", "question": "이 구조물의 심장발생학 초기의 명칭에 해당하는 것과 출생 이후 이 부분이 지속적으로 폐쇄되지 않는 경우의 질환명을 다음 중 어느 것인지 고르시오.", "images": [], "text_box": "2016 오진희 교수님 짤변 문제 ~~ (동일)~~", "options": ["A - Septum Secondum – Persistent Fossa Ovalis", "B - Septum Primum – Persistent Foramen Ovale", "C - Valve of Foramen Ovale - Persistent Fossa Ovalis", "D - Valve of Foramen Ovale - Patent ductus arteriosus", "E - Ductus Arteriosus - Persistent Foramen Ovale"], "answer": [1], "explanation": "이 문제 역시 난원공과 관련된 질문입니다. 그림 7의 B 부분은 난원공의 위치이며, 발생학적으로 septum primum에 해당합니다. 출생 후 이 부분이 지속적으로 폐쇄되지 않으면 난원공개존(Persistent Foramen Ovale)으로 진단됩니다. 따라서 B - Septum Primum – Persistent Foramen Ovale이 가장 적절한 선택입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["12학번", "11학번"], "professor": "오진희", "question": "(a) 이 근육 수축으로 닫히면서 폐순환량이 급격히 증가하면서 좌심방으로 돌아오는 혈액이 많아져 좌심방의 압력이 올라가면 심방 중격 중 일차 격막이 이차 격막에 기대어 (b) 이 기능적으로 닫히게 된다.", "images": [], "text_box": "출생과 동시에 가장 큰 변화는 태반으로부터 분리되어 신생아 호흡을 시작한다는 것이다.", "options": [], "answer": [], "explanation": "(a)에 들어갈 단어는 '동맥관'이며, (b)에 들어갈 단어는 '난원공'입니다. 출생 후 폐의 팽창과 폐순환 증가로 동맥관이 닫히고, 좌심방 압력 상승으로 난원공이 기능적으로 닫히는 과정은 신생아 순환의 중요한 변화입니다. 이는 태아 순환에서 성인 순환으로의 전환 과정에서 발생하는 필수적인 폐쇄 기전입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["09학번"], "professor": "이순주", "question": "다음 중 출생 후 기능적으로 막히게 되는 혈관은?", "images": [], "text_box": "그림은 태아순환을 나타낸 것이다.", "options": ["pulmonary vein", "inferior vena cava", "foramen ovale", "superior vena cava", "portal vein"], "answer": [2], "explanation": "출생 후 폐동맥 저항이 감소하고 폐정맥을 통해 좌심방으로 돌아오는 혈액량이 증가하면서 좌심방 압력이 올라갑니다. 이 압력 변화로 인해 난원공(foramen ovale)이 기능적으로 닫히게 됩니다. 정맥관(ductus venosus)과 동맥관(ductus arteriosus)도 출생 후 폐쇄됩니다. 하지만 제시된 보기 중 혈관에 해당하는 것은 foramen ovale입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["09학번"], "professor": "이순주", "question": "다음은 심실중격결손증이 생기는 위치를 표시한 그림이다. 번호로 표시된 위치 중 가장 흔히 심실중격결손증이 생기는 부위는?", "images": [], "text_box": null, "options": [], "answer": [0], "explanation": "그림(img39.png)은 심실중격결손(VSD)이 발생할 수 있는 여러 해부학적 위치를 보여줍니다. 번호 1은 막성 중격(membranous septum) 부위를 나타내며, 이 부위는 심실중격결손이 가장 흔하게 발생하는 위치입니다. 전체 VSD의 약 80%를 차지합니다. 다른 부위로는 inlet, outlet, muscular septum 등이 있습니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["08학번"], "professor": "이순주", "question": "비 청색증형 선천성 심장병 중 흉부 X-선상 폐혈관 음영 감소를 보이는 것은?", "images": [], "text_box": null, "options": ["동맥관 개존", "폐동맥 협착", "폐동맥 폐쇄", "심방 중격 결손", "심실 중격 결손"], "answer": [2], "explanation": "흉부 X-선상 폐혈관 음영 감소는 폐혈류량이 감소했음을 의미합니다. 제시된 보기 중 폐동맥 폐쇄는 우심실에서 폐로 혈액이 거의 흐르지 않아 폐혈류량이 현저히 감소하는 질환입니다. 나머지 보기들은 대부분 폐혈류량 증가 또는 정상 폐혈류량을 보입니다. 따라서 폐동맥 폐쇄가 폐혈관 음영 감소를 보이는 질환입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": ["08학번"], "professor": "이순주", "question": "가장 맞는 보기를 고르시오.", "images": [], "text_box": "숨이 차서 내원한 십대 후반 여자 환자의 CT 사진이다.", "options": ["폐동맥 혈류가 감소한 소견이다.", "청색증 선천성 심장질환이 원인일 가능성이 크다.", "좌심실이 커질 가능성이 크다.", "팔로4징이 진단명일 가능성이 크다.", "우좌단락이 원인일 가능성이 크다."], "answer": [2], "explanation": "제시된 CT 사진(img40.png)은 대동맥궁 부위에 협착 소견을 보이지 않으며, 심장의 형태를 보면 좌심실이 확장되어 있을 가능성이 높습니다. 환자가 숨이 차다고 호소하는 것은 심부전 증상일 수 있으며, PDA(동맥관개존)는 좌우 단락으로 인해 좌심실 용적 과부하를 일으켜 좌심실 비대를 유발할 수 있습니다. PDA는 비청색증형 질환이며, 폐동맥 혈류는 증가합니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "", "question": "이 질환의 결손을 통한 좌우 단락의 양을 결정하는 중요한 인자 중의 하나로 본 환아가 성장하면서 뒤늦게 심잡음이 발견된 이유로 가장 맞는 것을 하나 고르시오.", "images": [], "text_box": "8세 여자 아이가 신생아기와 영아기 등 어릴 때 예방 접종 시 시행된 청진에서는 별 이상 소견이 발견되지 않았으나 초등학교 입학 후 운동 시 숨이 차고 심장이 두근거려 병원에서 진찰받고 심잡음이 확인되어 심초음파로 선천성 심장병을 진단받았다. 아래 모식도는 이 선천성 심질환의 병태 생리를 설명하는 도해이다.", "options": ["결손의 위치 변화", "결손의 크기 증가", "성장에 따른 체순환 저항의 감소", "좌심방의 유순도(compliance) 증가", "우심방의 유순도(compliance) 증가"], "answer": [4], "explanation": "제시된 모식도는 좌심방(LA)에서 우심방(RA)으로의 혈류 이동이 있는 심방중격결손(ASD)을 나타냅니다. 신생아/영아기에는 우심실(RV) 벽이 두껍고 단단하여 RV 유순도가 낮아 단락량이 적습니다. 성장하면서 폐혈관 저항이 감소하고 RV 및 RA 벽이 얇고 부드러워지면서 RV&RA 유순도가 증가하게 됩니다. 이 유순도 증가는 좌우 단락의 양을 증가시켜 심잡음이 늦게 발견되는 주요 원인입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "", "question": "이 질환에서 단락 양을 결정하는 주된 요인은?", "images": [], "text_box": "1개월 아기가 예방접종 시 심잡음이 있다고 의뢰되었다. 진찰 상 청색증은 관찰되지 않았고 좌측 흉골연에서 심잡음 시 진전(thrill)이 동반된 4/6도의 범수축기 심잡음이 들렸다. 다음은 환자와 같은 단락 병변이 있는 선천성 심질환에서 볼 수 있는 병리 소견 사진이다.", "options": ["구멍의 크기와 폐저항", "관상동맥 이상여부와 위치", "동맥관 폐쇄여부와 시기", "대동맥 축착 여부와 중증도", "좌심실과 우심실의 유순도(compliance)"], "answer": [0], "explanation": "제시된 병리 소견 사진(img9.png)은 심실중격결손(VSD)을 보여줍니다. 환아는 청색증 없이 좌측 흉골연에서 범수축기 심잡음과 진전이 동반되어 VSD가 강력히 의심됩니다. VSD에서 혈류의 단락 양은 주로 결손의 크기와 폐혈관 저항(PVR)에 의해 결정됩니다. 구멍의 크기가 클수록, 그리고 폐혈관 저항이 낮을수록 좌우 단락의 양은 증가하게 됩니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "", "question": "그 이유는?", "images": [], "text_box": "출생 직후 의사 선생님이 환아에게 아래 사진과 비슷한 구멍이 있다고 설명해줬는데, 이때 심음이 출생 직후에는 잘 들리지 않았지만 5개월 후에는 심음이 들렸다.", "options": ["폐혈류 저항의 지속적 감소", "우심방의 유순도 증가"], "answer": [0], "explanation": "제시된 사진은 심실중격결손(VSD)을 나타냅니다. 출생 직후에는 폐혈관 저항(PVR)이 높기 때문에 좌심실에서 우심실로의 혈류 단락량이 적어 심잡음이 잘 들리지 않을 수 있습니다. 그러나 생후 5개월이 되면서 PVR이 점차 감소하게 되고(img11.png), 이에 따라 좌우 단락량이 증가하여 심잡음이 명확하게 들리기 시작하는 것입니다. 따라서 폐혈류 저항의 지속적인 감소가 심잡음이 늦게 들린 주요 원인입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "", "question": "본 환아에 대한 가장 적절한 치료는?", "images": [], "text_box": "다음 사진의 그래프는 동물 실험으로 양의 출생 전 태아 시기와 출생을 거쳐 출생 이후 영아시기의 폐동맥 평균 압력, 폐동맥 혈류량, 폐동맥 저항의 정상적 변화 추이를 보여준다. 학생이 소아과 실습 중 신생아 중환자실에서 관찰한 신생아가 출생 후 자발호흡이 어려워 보조환기요법을 받았다. 태변 착색과 호흡곤란 및 청색증을 보였다. 심장 초음파 검사상 별다른 구조적 이상은 없지만 난원공 개존을 통한 우좌단락이 관찰되어 아래와 같은 정상의 그래프를 보이지 못한다고 추정했다.", "options": ["단락 수술(shunt operation)", "동맥관 결찰(PDA ligation)", "프로스타글란딘 E1", "응급 심막 천자술", "저산소혈증 교정과 산화질소 흡입 치료 (inhaled nitric oxide)"], "answer": [4], "explanation": "신생아가 호흡곤란과 청색증을 보이고, 심초음파상 구조적 이상 없이 난원공 개존을 통한 우좌단락이 관찰되며, 정상적인 폐동맥 압력 변화를 보이지 못한다는 것은 폐고혈압이 지속되고 있음을 시사합니다. 이러한 폐고혈압성 위기에서는 폐혈관 저항을 낮추는 것이 중요합니다. 따라서 저산소혈증을 교정하고 폐혈관 확장제인 산화질소 흡입 치료를 하는 것이 가장 적절한 치료입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "", "question": "우선적 처치로 고려해야할 것은?", "images": [], "text_box": "생후 3일된 신생아가 잘 먹지 못하고 처지는 증상으로 응급실에 왔다. 발열은 없었으며, 호흡수는 분당 50회, 산소 포화도는 93%, 오른쪽 팔 혈압은 80/60mmHg, 오른쪽 다리 혈압은 30/20mmHg이었다.", "options": ["산소 흡입", "인공 호흡기", "강심제 정주", "생리식염수 정주", "프로스타글란딘 정주"], "answer": [4], "explanation": "생후 3일 신생아가 처지고 상하지 혈압 차이가 뚜렷하며(오른팔 혈압 80/60mmHg, 오른다리 혈압 30/20mmHg), 호흡수가 빠르고 산소포화도가 낮은 것은 심한 대동맥 축착과 심인성 쇼크를 시사합니다. 대동맥 축착은 동맥관 의존성 전신순환 질환으로, 혈류를 유지하기 위해 동맥관을 열어주는 것이 중요합니다. 따라서 프로스타글란딘을 정주하여 동맥관을 개통하는 것이 가장 우선적인 처치입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "", "question": "본 환자에서 잘 동반되는 대표적 심질환에서 관찰되는 주요 해부학적 이상 소견은?", "images": [], "text_box": "생후 4개월 된 남아가 심잡음으로 병원에 왔다. 환자의 얼굴 모양은 아래 사진 A와 같았고 아직 목은 가누지 못하였다. 심초음파 소견은 사진 B와 같았다.", "options": ["동맥관개존", "폐동맥 폐쇄", "방실중격 결손", "좌심실 형성부전", "삼첨판 폐쇄"], "answer": [2], "explanation": "사진 A는 다운증후군의 특징적인 얼굴 모양을 보여줍니다. 다운증후군 환아에게서는 심방심실중격결손(atrioventricular septal defect, AVSD)이 흔히 동반됩니다. 사진 B의 심초음파 소견은 심방 하부의 일차공결손, 심실중격결손, 그리고 공통 방실판막륜(승모판과 삼첨판륜이 나뉘어 있지 않고 하나로 연결된)을 시사합니다. 이 모든 소견이 방실중격 결손의 해부학적 이상 소견에 해당합니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "오진희", "question": "다음 심음에 알맞은 병은?", "images": [], "text_box": "다음 심음에 알맞은 병은? (심음 소리를 들려줬음 pansystolic murmur로 추정)", "options": ["동맥관 개존", "방실 중격 결손", "심방 중격 결손", "심실 중격 결손", "팔로 4징증"], "answer": [3], "explanation": "Pansystolic murmur 또는 Holosystolic murmur는 S1부터 S2까지 수축기 전체에 걸쳐 들리는 잡음입니다. 그림 12의 모식도는 수축기 내내 일정한 강도로 들리는 범수축기 잡음의 형태를 보여줍니다. 이러한 유형의 잡음은 주로 심실중격결손(VSD)이나 승모판역류(MR)에서 발생합니다. 제시된 보기 중에는 심실중격결손이 가장 적합한 진단입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "오진희", "question": "원인은?", "images": [], "text_box": "재태연령 40주, 3.2kg로 태어난 아이가 심잡음이 들린다 하여 내원. 현재 7.5kg 수유도 잘됨, 숨도 잘 쉼 심잡음을 들어보니 수축기 이완기에 걸쳐 나타남 산전 초음파때 이상 없었음.", "options": ["PDA", "대동맥 협착", "VSD", "ASD", "AVSD"], "answer": [0], "explanation": "수축기와 이완기에 걸쳐 지속적으로 들리는 심잡음은 지속성 심잡음(continuous murmur)이며, 이는 동맥관 개존(PDA)의 특징적인 소견입니다. 재태연령 40주 정상 분만 아기에게서 산전 초음파에 이상이 없었다는 것은 태아 시기에 동맥관이 열려있는 것이 정상 상태였음을 의미하며, 출생 후 동맥관이 자연적으로 폐쇄되지 않아 발생한 것으로 해석됩니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "오진희", "question": "이 아이가 더 어린 신생아 시기에는 진단 안되었고 6세가 되어서 임상 징후가 발현된 이유는?", "images": [], "text_box": "6세 여자아이를 최근 아버님이 보시기에 아이 가슴의 심장부위 흉벽이 육안으로 보기에 벌렁거리면서 튀는 것이 눈에 보이는 것 같다고 병원에 데리고 오셨다. 또래보다 키는 크지만 체중은 17kg으로 마른 편이라 하셨고 운동시 별다른 호흡곤란은 없는 듯 하다고 했다. 과거력상 예방접종시 매우 경미한 심잡음이 있는 듯 하다 들었으나 별다른 동반증상이 없어 검사를 받은 적은 없다. 흉부 사진상 아래와 같았고 청진상 흉골 좌상연에서 아래 심음 모식도와 같은 3도의 심잡음이 청진되었다.", "options": ["심장 구멍이 커졌다", "체저항이 감소했다", "폐저항이 증가했다", "심장 근육이 비후되었다", "우심실의 유연성(compliance)이 증가했다"], "answer": [4], "explanation": "환아는 흉골 좌상연에서 들리는 다이아몬드형 심잡음(img17.png)과 흉부 X-선 상 심비대가 없는 소견으로 심방중격결손(ASD)이 의심됩니다. ASD는 신생아기에는 우심실(RV) 유순도가 낮아 단락량이 적어 진단이 어렵거나 심잡음이 미약할 수 있습니다. 아이가 성장하면서 폐혈관 저항이 감소하고 RV의 유연성(compliance)이 증가하여 좌우 단락량이 늘어나 심잡음이 더 명확해지고 임상 증상이 발현된 것으로 설명할 수 있습니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "오진희", "question": "가장 의심되는 심질환은?", "images": [], "text_box": "생후 4개월 된 아기가 보채면서 호흡이 가쁘고 수유 시 힘들어 하여 병원에 왔다. 가슴 청진에서 심음은 빠르면서 아래 그림의 4번에 해당되는 양상의 범수축기 심잡음이 청진 되었고, 숨소리에서 거품소리와 천명음이 들렸다. 흉부 X선 사진은 아래와 같다.", "options": ["팔로 4징", "난원공 개존", "대동맥 협착", "심방중격결손", "심실중격결손"], "answer": [4], "explanation": "환아는 생후 4개월에 보챔, 호흡곤란, 수유 곤란, 거품소리 및 천명음이 들리는 울혈성 심부전 증상을 보입니다. 흉부 X-선 사진(img18.png)에서 심비대와 폐혈관 음영의 증가가 관찰됩니다. 청진상 흉골 좌하연(LLSB)에서 범수축기 심잡음(img18.png의 4번 양상)이 들렸습니다. 이러한 임상 및 영상 소견을 종합할 때, 심실중격결손(VSD)이 가장 의심되는 심질환입니다."}, {"subject": "선천성 심장질환 비청색증형", "year": [], "professor": "오진희", "question": "추천할 치료 계획은?", "images": [], "text_box": "아래의 병리 표본 사진은 동일한 심장을 각각 우심실 벽을 제거하고 우심실 쪽에서 바라본 사진(A), 좌심실 쪽에서 바라본 사진 (B)이다. 이 병변을 가진 4 개월 아기가 보건소로 예방접종하러 왔다 출생 당시 재태연령 40 주에 3.3k 로, 정상 분만했으며 현재 체중은 5.8kg 이고 우유를 잘 먹지 않는다고 한다. 외견상 다운증후군이 의심되었으며, 심박수 분당 130 회, 호흡수 분당 40 회로 증가되어 있었으며, 호흡시 흉부에서 늑간 함몰이 관찰되었다. 이전에 심잡음으로 추가 검사 추천받았으나 경제적 사정으로 이후 병원에 간 적은 없다.", "options": ["자연 폐쇄 가능성 있어 안심시킨다.", "이뇨제 처방하고 3 개월 후 재내원 추천한다.", "즉시 소아 심장 진료를 의뢰한다.", "호흡 곤란 호전된 후 예방 접종하고 경과 관찰한다.", "예방 접종하고 다음 접종은 소아과로 가도록 추천한다."], "answer": [2], "explanation": "제시된 병리 사진(img22.png)은 큰 심실중격결손(VSD)을 보여줍니다. 환아는 다운증후군이 의심되며, 빠른 심박수와 호흡수 증가, 늑간 함몰 등 울혈성 심부전 증상을 보입니다. 다운증후군에 동반된 큰 VSD는 폐동맥 고혈압이 빨리 진행될 수 있어 수술 시기를 놓치면 예후가 불량할 수 있습니다. 경제적 사정으로 진료가 지연된 상황이므로, 즉시 소아 심장 전문의에게 진료를 의뢰하여 정확한 평가와 조기 수술 계획을 세우는 것이 가장 중요합니다."}, {"subject": "심도자검사", "year": ["21학번", "19학번"], "professor": "", "question": "심질환의 진단과 혈역학적 평가를 위해서 여러 가지 검사 방법이 사용되고 있다. 그 중 심도자술이 반드시 필요한 평가 지표는?", "images": [], "text_box": null, "options": ["심실 기능", "폐혈관 저항", "중격결손의 유무", "관상 동맥의 협착", "대동맥의 산소포화도"], "answer": [1], "explanation": "폐혈관 저항은 심도자를 통해서 혈류량과 압력을 측정하여야 계산할 수 있습니다. 나머지 지표는 혈액검사, 심초음파 또는 CT 검사로 측정 가능해서 심도자를 이용하지 않습니다."}, {"subject": "심도자검사", "year": ["21학번"], "professor": "이재영", "question": "치료 여부 및 결과의 정확한 평가를 위해 심도자술이 반드시 필요한 질환은?", "images": [], "text_box": null, "options": ["팔로 4징", "대동맥 축착", "폐동맥 고혈압", "확장성 심근증", "심실 중격 결손"], "answer": [2], "explanation": "Pulmonary hypertension 환자의 hypertension과 vascular change의 정도를 측정하는 데 심도자술을 통해 Rp(Pulmonary vascular resistance)를 측정하는 것이 중요합니다."}, {"subject": "심도자검사", "year": ["20학번", "19학번"], "professor": "이재영", "question": "운동 시 호흡곤란과 흉통을 호소하는 15세 남자에서 시행한 심도자 검사 결과이다. 치료는?", "images": [], "text_box": "압력(mmHg) 산소 포화도(%)\n상대정맥 5(평균) 76\n우심방 5 (평균) 75\n우심실 25/7 79\n주폐동맥 25/10/18 80\n좌심방 6(평균) 95\n좌심실 160/7 95\n상행대동맥 100/70/85 95", "options": ["풍선 승모판막 성형술", "풍선 폐동맥판막 성형술", "풍선 대동맥판막 성형술", "경피적 동맥관개존의 폐쇄", "경피적 심방중격결손의 폐쇄"], "answer": [2], "explanation": "좌심실 수축기압이 정상 압력 수치인 100mmHg에 비해 160mmHg로 증가해있고, 상행대동맥압과 수축기압력 차가 60mmHg인 것으로 보아 대동맥판폐쇄가 의심됩니다. 이 경우에는 풍선 대동맥판막 성형술을 시행해야겠습니다."}, {"subject": "심도자검사", "year": ["19학번"], "professor": "이재영", "question": "질병의 경과와 치료 효과를 판단하기 위해 심도자술이 꼭 필요한 질환은?", "images": [], "text_box": null, "options": ["팔로 4징", "대동맥 축착", "폐동맥 고혈압", "확장성 심근증", "심실 중격 결손"], "answer": [2], "explanation": "Intervention 이외에 심도자술을 이용하는 경우는 폐동맥 고혈압만 있다고 했습니다."}, {"subject": "심도자검사", "year": ["17학번", "15학번", "14학번", "13학번"], "professor": "", "question": "심잡음을 주소로 내원한 8세 남아에서 시행한 심도자 검사 결과이다. 폐혈류량/체혈류량 (Qp/Qs)의 비는?", "images": [], "text_box": "압력(mmHg) 산소 포화도(%)\n상대정맥 5 (평균) 75\n우심방 5 (평균) 75\n우심실 50/5 85\n주폐동맥 51/15/26 85\n좌심방 6 (평균) 95\n좌심실 100/7 95\n상행대동맥 100/75/85 95", "options": ["1.0", "1.5", "2.0", "2.5", "3.0"], "answer": [2], "explanation": "Qp/Qs = (Ao - RA) / (LA – PA) = (95 – 75) / (95 – 85) = 2.0. 압력이 아니라 산소 포화도를 대입해야 합니다."}, {"subject": "심도자검사", "year": ["16학번"], "professor": "", "question": "심잡음을 주소로 내원한 3세 남아에서 시행한 심도자 검사 결과이다. 치료는?", "images": [], "text_box": "압력(mmHg) 산소 포화도(%)\n상대정맥 5(평균) 75\n우심방 5(평균) 75\n우심실 25/5 (수축기/이완기말) 77\n주폐동맥 35/15/25 (수축기/이완기/평균) 87\n좌심방 6(평균) 95\n좌심실 100/7(수축기/이완기말) 95\n상행대동맥 100/75/85 (수축기/이완기/평균) 95", "options": ["풍선 승모판막 성형술", "풍선 폐동맥 판막 성형술", "풍선 대동맥 판막 성형술", "경피적 동맥관 개존의 폐쇄", "경피적 심방중격결손의 폐쇄"], "answer": [3], "explanation": "상대정맥부터 폐동맥까지의 정상 산소포화도는 75% 정도입니다. 우심실까지는 산소포화도가 정상이지만 주폐동맥의 산소 포화도에 문제가 있습니다. 실제 수업 시간엔 PDA라고 배웠고 치료는 device closure이므로, 가장 관련성이 큰 선지는 경피적 동맥관 개존의 폐쇄입니다."}, {"subject": "심도자검사", "year": ["15학번", "14학번", "13학번"], "professor": "", "question": "다음은 5세 된 소아에서 심도자 검사를 실시해 얻은 각 부위의 압력이다. 이와 같은 심도자 소견을 보일 수 있는 선천 심질환은?", "images": [], "text_box": "우심방 평균압력 8mmHg, 우심실 80/8mmHg, 폐동맥 20/10mmHg\n좌심방 평균압력 5mmHg, 좌심실 90/5mmHg, 대동맥 90/60mmHg", "options": ["동맥관 개존", "심방중격결손증", "심실중격결손증", "폐동맥협착", "대동맥협착"], "answer": [3], "explanation": "우심실의 정상압력은 25이나 80으로 크게 상승했으므로 폐동맥협착을 의심할 수 있습니다."}, {"subject": "심도자검사", "year": ["13학번"], "professor": "", "question": "다음 문항에 해당되는 사항을 다음 답가지 (1~8) 중에 제시하는 수만큼 고르시오. 심질환의 진단과 혈역학적 평가를 위해서 여러 가지 검사 방법이 사용되고 있다. 그 중 심도자술이 필요한 평가 지표를 고르시오. (2가지)", "images": [], "text_box": null, "options": ["심방 기능", "심실 기능", "심방 압력", "대동맥의 형태", "심장 판막 협착", "중격결손의 유무", "대혈관의 탄력성", "폐동맥의 산소포화도", "관상동맥의 협착 유무"], "answer": [2, 7], "explanation": "심장 및 혈관 내 압력과 산소포화도는 심도자로만 정확히 측정할 수 있습니다."}, {"subject": "심도자검사", "year": ["12학번"], "professor": "", "question": "다음 심혈관 조영술 사진에서 화살표로 표시된 구조물의 이름은?", "images": [], "text_box": null, "options": ["right coronary artery", "left circumflex artery", "posterior descending artery", "left anterior descending artery", "diagonal branch of left coronary artery"], "answer": [1], "explanation": "제공된 조영술 이미지에서 화살표는 좌회선동맥 (left circumflex artery, CX)을 가리키고 있습니다. 좌관상동맥은 좌전하행동맥과 좌회선동맥으로 분지됩니다. 참고 그림을 통해 확인할 수 있습니다."}, {"subject": "심도자검사", "year": ["12학번"], "professor": "", "question": "다음은 정상 심장의 정면 심혈관 조영 사진이다. 표시된 부분의 구조물의 명칭으로 옳은 것은?", "images": [], "text_box": null, "options": ["A: 대동맥 B: 좌심실", "A: 폐정맥 B: 좌심방", "A: 상대정맥 B: 우심방", "A: 좌폐동맥 B: 우심실", "A: 우폐동맥 B: 우심실"], "answer": [0], "explanation": "제공된 정상 심장의 정면 심혈관 조영 사진에서 A는 대동맥(AO)을, B는 좌심실(LV)을 나타냅니다. 이는 심장의 주요 구조물에 대한 기본 지식으로 판별할 수 있습니다."}, {"subject": "심도자검사", "year": ["12학번"], "professor": "", "question": "폐동맥 협착이 있을 때 아래 그림과 같은 치료법의 적응증이 시작되는 단계는?", "images": [], "text_box": null, "options": ["우심실과 폐동맥의 압력 차이가 10mmHg", "우심실과 폐동맥의 압력 차이가 30mmHg", "우심실과 폐동맥의 압력 차이가 50mmHg", "우심실과 폐동맥의 압력 차이가 70mmHg", "우심실과 폐동맥의 압력 차이가 90mmHg"], "answer": [2], "explanation": "사진은 폐동맥판막 성형술(pulmonary valvuloplasty)을 시행하는 사진입니다. 폐동맥 협착(Pulmonary stenosis)에서 우심실과 폐동맥의 압력 차이가 50mmHg일 때 폐동맥판막 성형술을 시행합니다."}, {"subject": "소아 후천성 혈관염", "year": ["21학번"], "professor": "김경민", "question": "이 환아의 다음 치료제는?", "images": [], "text_box": "4세 남아가 해열제에 반응하지 않는 4일간의 발열(38도씨 이상)과 함께 아래 증상을 주소로 외래를 방문하였다. 고용량 정맥용 면역글로불린(2g/kg)을 투여하였으나 발열은 지속되었다. 양측 결막 충혈 / 입술 발적 및 딸기 혀 / 체간 발진 / 손과 발의 발적 및 경화 / 우측 경부 림프절 종창", "options": ["Infliximab", "Plasmapheresis", "경구용 스테로이드", "고용량 정맥용 면역글로불린", "고용량 정맥용 메틸프레드니솔론"], "answer": [3, 4], "explanation": "해설: 면역글로불린을 사용한 뒤에도 계속 열이 나면 'IVIG-Resistant KD'로 볼 수 있습니다. 첫번째 IVIG 주사 이후 3일~7일 이내에 발열이 있는 경우가 이에 해당합니다. 이때는 IVIG와 prednisolone(스테로이드)를 함께 주는 경우가 가장 많습니다. Infliximab은 치료1이 효과 없을 때 사용하며 예후가 좋지 않은 경우에 고려됩니다. 따라서 고용량 정맥용 면역글로불린 또는 메틸프레드니솔론 투여가 다음 치료로 고려됩니다."}, {"subject": "소아 후천성 혈관염", "year": ["21학번"], "professor": "한지환", "question": "이 환아가 심부전이 심한 경우 즉각 시행해야 할 치료는?", "images": [], "text_box": "10세 남아가 3일 동안의 미열로 개인 병원을 방문하였다. 상기도염으로 진단 후 치료를 받았으나 호전되지 않고 두근거림과 호흡 곤란 및 복통이 심해져서 응급실을 방문하였다. 응급실에서 시행한 활력징후에서 체온은 37.9도, 심박수는 130회/분, 호흡수는 30회/분, 혈압은 110/70mmHg 로 나타났다. 응급으로 촬영한 흉부 X-선 사진은 다음과 같았다.", "options": ["이뇨제", "심장이식", "수축촉진약", "항바이러스제", "체외막산소공급"], "answer": [4], "explanation": "해설: 제시된 활력징후와 흉부 X-선 사진은 심근염으로 인한 급성 심부전을 시사합니다. 상기도염의 이력이 있고 심박수 및 호흡수가 빨라 심부전을 의심할 수 있습니다. 환자의 심부전이 심한 경우, 즉각적으로 체외막 산소 공급(ECMO)을 시행하여 심폐 기능을 보조하는 것이 중요합니다."}, {"subject": "소아 후천성 혈관염", "year": ["18학번", "17학번"], "professor": "한지환", "question": "다음으로 시도할 치료는?", "images": [], "text_box": "4세 남아가 해열제에 반응하지 않는 4일간의 발열(38도 이상)과 함께 아래 증상을 주소로 외래를 방문하였다. 가와사끼 병으로 진단하고 1차로 정맥용 면역글로불린 (2g/kg) 투여하였으나 실패하였다. 이후 다시 면역글로불린을 투여하였으나 발열은 호전되지 않았다. 양측 결막 충혈 / 입술 발적 및 딸기 혀 / 체간 발진 / 손과 발의 발적 및 경화 / 우측 경부 림프절 종창", "options": ["Plasmapheresis", "infliximab", "경구용 스테로이드", "고용량 정맥용 면역글로불린", "고용량 정맥용 메틸프레드니솔론"], "answer": [4], "explanation": "해설: 면역글로불린을 사용한 뒤에도 계속 열이 나면 'IVIG-Resistant KD'로 볼 수 있습니다. 첫 번째 IVIG 주사 이후 3일~7일 이내에 발열이 지속되는 경우를 IVIG 저항성으로 간주합니다. 이 경우 스테로이드 투여가 가장 흔히 사용되는 다음 치료 단계입니다. 따라서 고용량 정맥용 메틸프레드니솔론 투여가 적절한 치료가 됩니다."}, {"subject": "소아 후천성 혈관염", "year": ["16학번"], "professor": "한지환", "question": "적절한 2차 치료제는?", "images": [], "text_box": "4세 남아가 해열제에 반응하지 않는 4일간의 발열 (38도 이상)과 함께 아래 증상을 주소로 외래를 방문하였다. 양측 결막 충혈 / 입술 발적 및 딸기 혀 / 체간 발진 / 손과 발의 발적 및 경화 / 우측 경부 림프절 종창 가와사끼병으로 진단하고 1차 치료하였으나 발열은 지속되었다.", "options": ["Plasmapheresis", "TNF-alpha antagonist", "대용량 정맥용 스테로이드", "고용량 정맥용 면역글로불린 (1g/kg) 재투여", "고용량 정맥용 면역글로불린 (2g/kg) 재투여"], "answer": [2, 4], "explanation": "해설: 가와사끼병 1차 치료(고용량 아스피린 및 정맥용 면역글로불린 2g/kg)에 반응하지 않고 발열이 지속될 경우 2차 치료를 고려합니다. 재투여하는 면역글로불린은 일반적으로 2g/kg 용량이며, 대용량 정맥용 스테로이드도 2차 치료로 많이 사용됩니다. 따라서 대용량 정맥용 스테로이드와 고용량 정맥용 면역글로불린(2g/kg) 재투여 모두 적절한 2차 치료제가 될 수 있습니다."}, {"subject": "소아 후천성 혈관염", "year": ["14학번", "12학번"], "professor": "한지환", "question": "우리나라에서 주로 사용하고 있는 급성기 가와사끼병의 치료는?", "images": [], "text_box": null, "options": ["경구용 아스피린, 근육용 면역글로불린", "경구용 아스피린, 정맥용 면역글로불린", "경구용 아스피린, 경구용 스테로이드", "경구용 아스피린, 정맥용 스테로이드", "경구용 아스피린, 정맥용 Abciximab"], "answer": [1], "explanation": "해설: 가와사끼병의 급성기 치료는 주로 경구용 아스피린과 정맥용 면역글로불린을 병용하는 것입니다. 이는 관상동맥 합병증 발생 위험을 줄이는 데 효과적입니다. 일본과 미국 모두 이 치료 방식을 표준으로 사용하고 있습니다. 우리나라도 동일한 방식으로 치료가 이루어지고 있습니다."}, {"subject": "소아 후천성 혈관염", "year": ["12학번"], "professor": "한지환", "question": "영유아기에 심부전이 있을 때 제일 먼저 가장 흔하게 나타나는 증상은?", "images": [], "text_box": null, "options": ["호흡곤란", "빠른 호흡", "비익확장", "수유곤란", "청색증"], "answer": [3], "explanation": "해설: 영아기에 심부전이 있을 때 가장 먼저 나타나는 증상은 feeding difficulty, 즉 수유 곤란입니다. 신생아의 심부전은 패혈증과 감별하기 어려운 비특이적 증상으로 나타날 수 있으며, 수유 감소, 빈맥, 호흡곤란 등이 포함됩니다. 따라서 수유곤란이 가장 흔한 초기 증상입니다."}, {"subject": "소아 후천성 혈관염", "year": ["12학번", "11학번"], "professor": "한지환", "question": "가와사끼병에서 발열을 제외한 고전적인 진단 기준이다. 영아에서 드문 것은?", "images": [], "text_box": null, "options": ["딸기 혀", "입술 홍조", "비씨지 접종부위 발진", "비 화농 경부 림프절 종창", "비 화농 양측 안구 결막 출혈"], "answer": [3], "explanation": "해설: 가와사끼병의 고전적인 진단 기준 중 발열을 제외한 5가지 주요 증상에는 비화농 양측 결막 충혈, 입술 및 구강 변화(딸기 혀, 입술 홍조 등), 피부 발진(BCG 접종 부위 발적 포함), 손발의 변화(발적, 경화), 비화농 경부 림프절 종창이 있습니다. 이 문제에서 영아에게 드문 증상으로 비화농 경부 림프절 종창이 정답으로 제시되었습니다."}, {"subject": "소아 후천성 혈관염", "year": ["12학번", "11학번", "10학번"], "professor": "한지환", "question": "가와사끼병의 임상경과 중 아급성기에 나타나는 것은?", "images": [], "text_box": null, "options": ["백혈구 수 증가", "혈소판 수 증가", "간효소치 증가", "C-반응단백 증가", "적혈구 혈침속도 증가"], "answer": [1], "explanation": "해설: 가와사끼병의 비 특이적 진단 검사 소견은 급성기에 백혈구 수 증가, 적혈구 혈침속도 증가, C-반응 단백 증가, 경도의 간 효소치 증가를 보입니다. 아급성기에는 혈소판 수가 증가하는 것이 특징적 소견입니다. 드물게 혈소판 감소증이 나타날 수도 있으나, 주로 혈소판 증가가 관찰됩니다."}, {"subject": "소아 후천성 혈관염", "year": ["11학번", "10학번"], "professor": "한지환", "question": "우리나라에서 사용하고 있는 급성기 가와사끼병 치료제의 용량은?", "images": [], "text_box": null, "options": ["경구용 아스피린 30mg/Kg, 정맥용 면역글로불린 1g/kg", "경구용 아스피린 50mg/Kg, 정맥용 면역글로불린 1g/kg", "경구용 아스피린 50mg/Kg, 정맥용 면역글로불린 2g/kg", "경구용 아스피린 100mg/Kg, 정맥용 면역글로불린 1g/kg", "경구용 아스피린 100mg/Kg, 정맥용 면역글로불린 2g/kg"], "answer": [2], "explanation": "해설: 급성기 가와사끼병의 치료에는 고용량 아스피린과 정맥용 면역글로불린(IVIG)이 사용됩니다. 아스피린은 30~50mg/Kg 용량을 사용하고, IVIG는 2g/kg 용량을 투여하는 것이 일반적입니다. 따라서 경구용 아스피린 50mg/Kg과 정맥용 면역글로불린 2g/kg의 조합이 올바른 용량입니다."}, {"subject": "소아 후천성 혈관염", "year": ["10학번", "09학번"], "professor": "한지환", "question": "류마티스 열의 진단에 이용되는 Jones 기준이다. 감염 가능성이 있는 것은?", "images": [], "text_box": null, "options": ["A군 사슬알균 선행 감염의 증거와 부증상 1개", "A군 사슬알균 선행 감염의 증거와 부증상 2개", "A군 사슬알균 선행 감염의 증거와 주증상 1개", "A군 사슬알균 선행 감염의 증거와 주증상 2개", "A군 사슬알균 선행 감염의 증거와 주증강 1개, 부증상 1개"], "answer": [3], "explanation": "해설: 류마티스 열의 진단기준은 다음과 같습니다. 선행된 A군 사슬알균 감염의 증거가 있으면서 2개 이상의 주증상이 있거나, 또는 1개의 주증상과 2개 이상의 부증상이 있을 때 높은 가능성으로 진단합니다. 선행된 A군 사슬알균 감염의 증거가 없는 주증상, 부증상의 만족만으로는 진단이 의심스럽습니다."}, {"subject": "소아 후천성 혈관염", "year": ["10학번", "09학번"], "professor": "한지환", "question": "류마티스열에서 증상에 합당한 치료제는?", "images": [], "text_box": null, "options": ["관절통- salicylate", "무도증- diazepam", "울혈 심부전- diuretics", "관절염- acetaminophen", "경한 심염- corticosteroid"], "answer": [2, 1], "explanation": "해설: 류마티스 열의 치료는 A군 사슬알균 제거와 증상 치료로 나뉩니다. 관절통 및 관절염에는 NSAIDs나 salicylate, acetaminophen을 사용하며, 무도증에는 diazepam 또는 haloperidol을 사용합니다. 울혈성 심부전과 심염에는 대증적 치료로 diuretics가 사용될 수 있으며, 중증도 또는 심한 심염에는 corticosteroid가 사용됩니다."}, {"subject": "소아 후천성 혈관염", "year": ["10학번", "09학번"], "professor": "한지환", "question": "가와사키병에서 발열을 제외한 고전적인 진단 기준이다. 영아에서 드문 것은?", "images": [], "text_box": null, "options": ["입술 홍조", "딸기 혀", "체간의 부정형 발진", "비화농 양측 결막 충혈", "비화농 경부 림프절 비대"], "answer": [4], "explanation": "해설: 가와사끼병의 주요 진단 기준 중 영아에게는 비화농성 경부 림프절 비대가 드물게 나타날 수 있습니다. 다른 증상들인 입술 홍조, 딸기 혀, 부정형 발진, 비화농 양측 결막 충혈 등은 영아에게서도 흔히 관찰될 수 있습니다. 따라서 림프절 비대가 영아에서 진단 기준을 충족하기 어려운 경향이 있습니다."}, {"subject": "소아 후천성 혈관염", "year": ["09학번"], "professor": "한지환", "question": "류마티스 열을 진단하는데 이용되는 Jones 기준의 주 증상 중 늦게 나타나는 것은?", "images": [], "text_box": null, "options": ["심염", "무도증", "유연 홍반", "피하 결절", "다발 관절염"], "answer": [1], "explanation": "해설: Jones 기준의 주 증상 중 심염은 40-80%를 차지하며, 다발 관절염은 가장 흔한 증상으로 먼저 나타나는 경향이 있습니다. 무도증은 주 증상 중 가장 늦게 나타나는 경향을 보이며, 잠복기가 긴 것이 특징입니다. 유연 홍반과 피하 결절은 드문 증상입니다."}, {"subject": "소아 후천성 혈관염", "year": ["09학번"], "professor": "한지환", "question": "류마티스열을 진단하는 데 사용하는 Jones 기준의 주 증상 중 흔한 것은?", "images": [], "text_box": null, "options": ["심염", "무도증", "유연 홍반", "피하 결절", "다발 관절염"], "answer": [4], "explanation": "해설: 류마티스열의 Jones 기준 주 증상 중 다발 관절염이 가장 흔하게 나타나며 발생 비율이 75%에 달합니다. 이는 류마티스열의 가장 조기 증상 중 하나입니다. 심염도 흔하지만 관절염보다 발생 빈도가 낮습니다."}, {"subject": "소아 후천성 혈관염", "year": ["09학번"], "professor": "한지환", "question": "다음은 급성 심근염의 연령별 증상을 열거하였다. 맞는 것은?", "images": [], "text_box": null, "options": ["신생아- 무증상", "신생아- 느린 맥박", "신생아- 알칼리혈증", "연장아- 급성 흉통", "연장아- 서서히 진행되는 심부전"], "answer": [4], "explanation": "해설: 급성 심근염의 연령별 증상은 신생아와 연장아에서 다르게 나타날 수 있습니다. 신생아에서는 열, 심부전, 호흡곤란, 청색증, 산증, 쇼크 등 비특이적 증상이 나타납니다. 연장아에서는 서서히 진행되는 심부전, 급성 부정맥, 확장 심근병증, 또는 열 없이 빠른 심장박동 등이 나타납니다. 따라서 연장아에서 서서히 진행되는 심부전이 맞는 설명입니다."}, {"subject": "소아 후천성 혈관염", "year": ["09학번"], "professor": "한지환", "question": "다음은 류마티스열에서 증상에 따른 치료제를 열거하였다. 맞는 것은?", "images": [], "text_box": null, "options": ["무도증- dilantin", "관절통- salicylate", "관절염- acetaminophen", "경한 심염- corticosteroid", "A군 사슬알균 제거- benzathine penicillin"], "answer": [4], "explanation": "해설: 류마티스열의 치료는 A군 사슬알균 제거와 증상 치료로 구성됩니다. A군 사슬알균 제거에는 페니실린 V 또는 benzathine penicillin이 사용됩니다. 무도증에는 diazepam 또는 haloperidol이, 관절통이나 관절염에는 NSAIDs(naproxen, ibuprofen), salicylate 또는 acetaminophen이 사용됩니다. 경한 심염에는 corticosteroid가 치료제로 고려됩니다."}, {"subject": "소아 후천성 혈관염", "year": ["08학번"], "professor": "한지환", "question": "다음은 감염 심내막염의 원인균이다. 소아에서 가장 흔한 것은?", "images": [], "text_box": null, "options": ["HACECK 병원체", "Streptococcus bovis", "Staphylococcus aureus", "Streptococcus pyogenes", "Staphylociccus epidermidis"], "answer": [2], "explanation": "해설: 소아 감염 심내막염의 원인균은 기저 심장 질환 유무에 따라 달라질 수 있습니다. 기저 심장 질환이 있는 아동에서는 Viridans streptococci와 Staphylococcus aureus가 흔합니다. 기저 심장 질환이 없는 아동에서는 Staphylococcus aureus가 가장 흔한 원인균으로 알려져 있습니다. 따라서 소아 감염 심내막염에서 Staphylococcus aureus가 가장 흔하게 관찰됩니다."}, {"subject": "소아 후천성 혈관염", "year": ["08학번"], "professor": "한지환", "question": "다음 설명 중 Kawasaki 병의 합병증 중 예후에 가장 영향을 미치는 만성 합병증으로 옳은 것을 고르시오.", "images": [], "text_box": null, "options": ["요로감염과 만성 신부전", "혈관염과 만성 고혈압", "거대 관상동맥류와 심근 경색", "무균성 뇌수막염과 뇌경색", "결막염과 시력장애"], "answer": [2], "explanation": "해설: 가와사끼병의 가장 심각한 합병증은 관상동맥 동맥류 형성입니다. 특히 거대 관상동맥류(직경 8mm 초과)는 파열, 혈전 형성, 폐쇄를 유발하여 심근 경색으로 이어질 수 있습니다. 이는 가와사끼병 환아의 장기 예후에 가장 큰 영향을 미치는 만성 합병증입니다. 따라서 거대 관상동맥류와 심근 경색이 예후에 가장 중요합니다."}, {"subject": "소아 후천성 혈관염", "year": [], "professor": null, "question": "다음은 가와사끼병의 비특이적 검사 소견을 나열하였다. 확진에 가장 중요한 것은?", "images": [], "text_box": null, "options": ["급성기 백혈구 증가", "아급성기 혈소판 증가", "급성기 간 효소치 증가", "급성기 C-반응 단백 증가", "급성기 적혈구 혈침속도 증가"], "answer": [1], "explanation": "해설: 가와사끼병은 임상적 진단 기준에 따라 확진됩니다. 혈액 검사 소견은 비특이적이지만 진단에 도움을 줍니다. 급성기에는 백혈구 증가, 적혈구 혈침속도 증가, C-반응 단백 증가, 간 효소치 증가가 나타납니다. 아급성기에는 혈소판 수가 증가하는 것이 가장 특징적인 소견이며, 병의 경과를 확인하는 데 중요합니다."}, {"subject": "소아 후천성 혈관염", "year": [], "professor": null, "question": "Kawasaki 병 환아에서 시행되는 치료방법과 목적의 연결이 바르게 된 것을 고르시오.", "images": [], "text_box": null, "options": ["항생제 - 고열의 원인이 되는 감염원에 관한 근본 치료로 반드시 투여", "고용량 아스피린 – 혈전의 원인이 되는 혈소판 응집 억제가 주된 목적", "정맥용 감마 글로불린 – 관상동맥 합병증 예방의 효과가 있다.", "저용량 아스피린 – 해열, 항염증 작용이 목적으로 가장 초기에 투여", "항응고제 – 급성기의 모든 환아에게 혈전 예방 목적으로 투여"], "answer": [2], "explanation": "해설: 가와사끼병 치료에서 항생제와 항응고제는 일반적으로 투여하지 않습니다. 고용량 아스피린은 급성기에 해열 및 항염증 작용을 목적으로 투여하며, 저용량 아스피린은 아급성기에 혈소판 응집 억제를 목적으로 장기간 투여합니다. 정맥용 감마 글로불린(IVIG)은 사이토카인에 의한 혈관 내피 증식 억제와 전신 항염증 작용을 통해 관상동맥 합병증을 예방하는 것이 주된 효과입니다."}, {"subject": "소아 후천성 혈관염", "year": [], "professor": null, "question": "가와사끼병의 검사실 소견과 치료방법으로 맞는 것은?", "images": [], "text_box": null, "options": ["빈혈 - 철분제 투여", "혈소판 감소 - 저용량 아스피린 투여", "ESR 증가 - 항생제 투여", "CRP 증가 - 정맥용 감마 글로불린 투여", "복구X"], "answer": [3], "explanation": "해설: 가와사끼병의 급성기에는 CRP(C-반응 단백)가 증가하는 것이 흔한 염증 소견입니다. 정맥용 감마 글로불린(IVIG)은 강력한 항염증 작용을 통해 CRP 수치를 감소시키고, 관상동맥 합병증을 예방하는 데 효과적입니다. 혈소판 감소는 드물며, 항생제는 가와사끼병의 치료에 사용되지 않습니다."}, {"subject": "소아 후천성 혈관염", "year": [], "professor": null, "question": "이 질환의 치료에 대한 설명으로 맞는 것을 고르면?", "images": [], "text_box": null, "options": ["경구용 아스피린은 진단 후 약 6주간 투여한다.", "아스피린은 정맥용 Ig와 병용시 10mg/kg/일로 충분하다.", "IV Ig는 1mg/kg을 10~12시간 걸쳐 서서히 투여한다.", "IV Ig는 2mg/kg을 10~12시간 걸쳐 서서히 투여한다.", "IV Ig 치료에 의해 관상동맥 이환율이 완전 소멸 한다."], "answer": [3], "explanation": "해설: 가와사끼병 치료에서 IVIG는 일반적으로 2mg/kg을 10~12시간에 걸쳐 서서히 투여합니다. 경구용 아스피린은 급성기에는 고용량(30-50mg/kg/일)으로 투여하며, 아급성기에는 저용량(3-5mg/kg/일)으로 전환하여 수주에서 수개월간 투여합니다. IVIG 치료는 관상동맥 이환율을 크게 낮추지만, 완전히 소멸시키지는 않습니다."}, {"subject": "소아 후천성 혈관염", "year": [], "professor": null, "question": "이 환아가 치료가 잘 안되어서 여러 개의 거대관상동맥류가 생겼을 때 성인기에 올 수 있는 중요한 심질환은?", "images": [], "text_box": null, "options": ["부정맥", "심부전", "심근증", "심근경색", "심장판막질환"], "answer": [3], "explanation": "해설: 가와사끼병으로 인해 거대관상동맥류가 발생하면, 성인기에 관상동맥 질환의 위험이 높아집니다. 동맥류 내 혈전 형성 및 파열, 폐쇄 등으로 인해 심근경색이 발생할 가능성이 커집니다. 따라서 치료가 잘 되지 않아 여러 개의 거대 관상동맥류가 생긴 경우 성인기에 심근경색으로 진행될 수 있어 중요한 심질환으로 꼽힙니다."}, {"subject": "소아 후천성 혈관염", "year": [], "professor": null, "question": "가와사끼병 15-20%는 IV Ig에 저항, 심장동맥 합병증을 발생한다, 상기환아가 거대심장동맥류가 생겼다면 회복기 치료로 알맞은 것은?", "images": [], "text_box": null, "options": ["가, 나, 다", "가,다", "나, 라", "라", "가, 나, 다, 라"], "answer": [4], "explanation": "해설: 가와사끼병으로 거대심장동맥류가 발생한 경우, 회복기에는 저용량 아스피린을 장기간 투여하여 혈전 예방을 합니다. 아스피린은 심초음파 검사에서 심장동맥의 직경이 정상화될 때까지 복용해야 합니다. 필요시 와파린과 같은 항응고제를 지속적으로 투여하며 PT를 측정합니다. 심장동맥조영술은 발병 후 6개월까지 실시할 수 있습니다. 생백신 접종은 항체 형성이 저해될 수 있어 연기해야 합니다."}, {"subject": "소아 후천성 혈관염", "year": [], "professor": null, "question": "상기 환아와 같이 1세 미만의 영아에서 가와사끼 병을 진단할 때 관심을 주어야 할 중요한 소견은?", "images": [], "text_box": null, "options": ["딸기 양 혀", "빨간 입술", "비정형 발진", "안구결막충혈", "BCG 접종부위의 발적"], "answer": [4], "explanation": "해설: 영아에서 가와사끼병 진단 시 비정형 발진이나 BCG 접종 부위의 발적과 같은 피부 증상에 특히 주의를 기울여야 합니다. 영아는 전형적인 림프절 종창이 덜 나타날 수 있으며, 진단 기준을 완전히 충족하지 못하는 경우가 많습니다. 비정형 발진은 다양한 양상으로 나타나므로 감별 진단이 중요합니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["21학번", "19학번", "18학번", "17학번"], "professor": "박철수", "question": "다음 중 환자 진단중에서 가장 맞는 것은?", "images": [], "text_box": "71세 여자가 버스를 기다리다가 갑자기 쓰러졌다. 당시 맥박이 촉지되지 않아 심폐소생술 후 혈압과 맥박이 돌아왔다. 4년 전부터 당뇨와 고혈압 약물을 복용하고 있었다. 응급실 내원 당시 혈압 80/60 mmHg, 맥박 74 회/분, 호흡 22 회/분, 체온 37.1 도이다. 가슴 청진에서 심잡음은 없고 심전도 소견은 다음과 같다.", "options": ["Acute inferior wall STEMI 이다.", "Acute lateral wall STEMI 이다.", "Acute anterior wall STEMI 이다.", "Acute NSTEMI 이다.", "Cardiac tamponade 이다."], "answer": [2], "explanation": "사진은 잘 보이지 않지만, Anterior wall에 해당하는 lead에서 ST elevation이 관찰되어 Acute anterior wall STEMI로 진단됩니다. 이러한 심전도 소견은 전형적인 급성 심근경색의 징후입니다. 환자의 임상 증상과 함께 심전도 변화를 종합하여 진단합니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["19학번", "17학번"], "professor": "박철수", "question": "다음 중 환자의 치료 중에서 가장 맞는 것은?", "images": [], "text_box": "63세 남자가 2시간전에 발생한 심한 흉통으로 내원하였다. 4년 전부터 당뇨와 고혈압 약들을 복용하고 있었다. 응급실 내원 당시 혈압 30/60 mmHg, 맥박 74 회/분, 호흡 22 회/분, 체온 37.1 도이다. 가슴 청진에서 심잡음은 없고 양쪽 등쪽 아랫부분에서 거품소리가 들린다. 심전도 소견은 다음과 같다.",

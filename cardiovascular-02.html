 "options": ["Acute NSTEMI 이지만 환자의 혈압이 낮으므로 일차적 관상동맥 중재술을 서둘러서 시행해야 한다.", "혈압이 떨어진 cardiac tamponade 이므로 서둘러서 pericardiocentesis 를 해야 한다.", "Acute STEMI 환자이지만 혈압이 낮으므로 일차적 관상동맥 중재술을 하기 전에 빨리 투여할 수 있는 혈전 용해제를 정맥주사하여야 한다.", "Acute STEMI 환자이므로 일차적 관상동맥 중재술을 시행하여야 한다.", "제일 먼저 삽입형제세동기 시술을 해야 한다."], "answer": [3], "explanation": "전형적인 Anterior Wall STEMI 소견이며, 환자의 혈압이 낮지만 일차적 관상동맥 중재술(PCI)을 신속히 시행해야 합니다. 혈전 용해제 투여는 PCI가 지연될 경우 고려되나, 이 경우 PCI가 가장 적절한 치료입니다. 급성 심근경색으로 인한 심인성 쇼크 상황에서도 PCI는 생명을 구하는 중요한 치료법입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["19학번"], "professor": "박철수", "question": "다음중 환자의 진단은?", "images": [], "text_box": "82세 여자가 샤워중 갑자기 쓰러져서 119에 신고되었으며, 119 도착 당시 맥박이 촉지 되지 않아 심폐소생술 후 다행히 혈압과 맥박이 올라왔다. 4년 전부터 당뇨와 고혈압 약물을 복용하고 있었다. 응급실 내원 당시 혈압 80/60 mmHg, 맥박 74 회/분, 호흡 22 회/분, 체온 37.1℃이다. 가슴 청진에서 심잡음은 없고 양쪽 등쪽 아랫부분에서 거품소리가 들린다. 심전도 소견은 다음과 같다.", "options": ["심장눌림증", "비 ST 분절 상승 심근경색증", "전벽 ST 분절 상승 심근경색증", "측벽 ST 분절 상승 심근경색증", "하벽 ST 분절 상승 심근경색증"], "answer": [2], "explanation": "심전도에서 Anterior wall에 해당하는 lead에서 ST elevation이 관찰되므로 Acute anterior wall STEMI로 진단됩니다. 이는 전형적인 ST 분절 상승 심근경색 소견이며, 환자의 임상 증상과 함께 고려되어야 합니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["19학번"], "professor": "박철수", "question": "이 환자의 진단으로 가장 적절한 것은?", "images": [], "text_box": "18세 여자가 최근 직업 준비로 인해 수면이 부족하고 불규칙적인 생활을 하고 있었다. 외국어 학원을 가려고 지하철을 타다가 어느 날 갑자기 어지럽고 식은땀이 났으며 오심 있다가 이내 의식을 잃었고 약 1분 후에 곧바로 의식을 회복됐다. 약물력, 가족력, 과거력 특이사항 없다.", "options": ["간질", "기립성 저혈압", "일과성허혈발작", "과다호흡성발작", "신경매개성 실신"], "answer": [4], "explanation": "젊은 여성에서 스트레스 상황(직업 준비, 수면 부족)에서 발생한 오심, 식은땀 등의 전구 증상과 의식 소실 후 빠른 회복은 전형적인 신경매개성 실신(vasovagal syncope)의 특징입니다. 지하철과 같은 혼잡한 환경도 유발 요인이 될 수 있습니다. 기립성 저혈압은 자세 변화 시 발생하며, 간질은 의식 소실 후 혼돈이 동반될 수 있습니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["18학번"], "professor": "박철수", "question": "추가로 해야 할 검사는?", "images": [], "text_box": "청진에서 심잡음이 들렸고, 호흡음은 정상이다. 심전도 검사는 다음과 같았다. 맥박, 호흡, 체온 다 정상이었다.", "options": ["심초음파 검사", "관상동맥 조영술", "운동부하 검사", "경과 관찰", "우심도자술"], "answer": [0], "explanation": "청진에서 심잡음이 들린다는 소견은 심장 판막 질환이나 다른 구조적 이상을 시사합니다. 심전도와 기본적인 활력 징후가 정상일지라도 심잡음의 원인을 정확히 파악하기 위해 심초음파 검사를 통해 심장의 구조와 기능을 직접 확인하는 것이 필요합니다. 심초음파는 판막 기능 이상, 심근병증 등을 진단하는 데 가장 유용한 검사입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["17학번"], "professor": "박철수", "question": "치료로 적절하지 않은 것은?", "images": [], "text_box": "55세 남자 환자가 3달 전부터 숨이 차서 외래를 방문하였다. 환자는 매일 소주 3병의 음주력과 30갑년의 흡연력이 있으며 당뇨와 고혈압은 없었다. 흉부 X선, 심전도 및 심장초음파 소견이다. 좌심실 구혈율: 25%, 전반적인 벽운동 저하, 이완기 및 수축기 좌심실 직경 확장, 중등도 승모판 폐쇄부전", "options": ["철저한 금주", "와파린", "안지오테딘 수용체 차단제", "스피로노락톤", "승모판 치환술"], "answer": [4], "explanation": "환자는 만성적인 음주력과 흡연력, 낮은 좌심실 구혈률, 좌심실 확장 및 중등도 승모판 폐쇄부전 소견으로 알코올성 심근증이 의심됩니다. 알코올성 심근증으로 인한 이차적인 승모판 폐쇄부전은 일반적으로 수술적 승모판 치환술을 필요로 하지 않으며, 금주 및 약물 치료(ACEI/ARB, 베타차단제, 스피로노락톤 등)가 우선됩니다. 와파린은 심방세동 동반 시 고려될 수 있습니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["16학번"], "professor": "박철수", "question": "가장 우선적으로 해야 할 것은?", "images": [], "text_box": "55세 남자 환자가 상복부 통증을 호소하면서 응급실로 왔다. 심전도이다. 혈압은 120/60 mmHg. 의식은 명료하였다.", "options": ["Proton pump inhibitor (PPI) 정주", "소염진통제 투여", "경과 관찰", "심장 초음파", "일차적 관동맥 중재술"], "answer": [4], "explanation": "심전도 소견상 광범위 급성 전벽 심근경색증(STEMI)이 의심됩니다. 급성 심근경색증의 가장 우선적인 치료는 막힌 관상동맥을 재개통하는 것이므로, 가능한 한 빨리 일차적 관상동맥 중재술(Primary PCI)을 시행해야 합니다. 이는 심근경색 치료의 공식적인 지침이며, 예후에 가장 큰 영향을 미칩니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["16학번"], "professor": "박철수", "question": "다음 검사는?", "images": [], "text_box": "24세 남자가 축구를 하다가 쓰러져 응급실에 실려왔다. 2년 전부터 운동 중에 의식을 잃은 적이 여러 번 있다고 한다. 형이 5년 전 갑자기 사망하였다. 혈압 120/80mmHg, 맥박 60 회/분, 호흡 18 회/분, 체온 36.4 도이다. 가슴 청진에서 복장뼈 왼쪽연 네번째 갈비 사이에서 수축기 잡음이 들린다. 호흡음은 정상이다. 심전도다.", "options": ["심장 초음파 검사", "머리기울임 검사", "관상동맥 조영술", "오른 심장 카데터 검사", "운동부하 검사"], "answer": [0], "explanation": "젊은 남성에서 운동 중 실신 병력, 돌연사 가족력, 그리고 흉골 좌측연 4번째 갈비뼈 사이에서 들리는 수축기 잡음은 비후성 심근병증(Hypertrophic Cardiomyopathy, HCM)을 강력히 시사합니다. HCM 진단에는 심장의 구조와 기능을 직접 확인할 수 있는 심장 초음파 검사가 가장 우선적으로 필요합니다. 이는 진단을 확정하고 예후를 평가하는 데 결정적인 역할을 합니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["15학번"], "professor": "박철수", "question": "다음 중 급성 관동맥 증후군의 치료 방침을 결정하는데 판단기준이 되는 가장 중요한 검사는?", "images": [], "text_box": null, "options": ["트로포닌", "심전도", "myoglobin", "심장 초음파", "흉부 X선 검사"], "answer": [1], "explanation": "급성 관상동맥 증후군에서 가장 중요한 초기 검사는 심전도입니다. 심전도에서 ST 분절 상승 유무에 따라 ST 분절 상승 심근경색(STEMI)과 비 ST 분절 상승 급성 관상동맥 증후군(NSTE-ACS)으로 분류되며, 이는 혈전 용해제 투여나 일차적 관상동맥 중재술(PCI)과 같은 치료 방침을 결정하는 데 핵심적인 기준이 됩니다. 다른 검사들은 보조적으로 활용됩니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["15학번"], "professor": "박철수", "question": "작용기전이 다른 두 종류의 항혈소판제 병합치료를 권장하는 경우는?", "images": [], "text_box": null, "options": ["안정형 협심증", "급성 관상동맥증후군", "심방세동", "폐색전증", "기계판막치환술"], "answer": [1], "explanation": "작용기전이 다른 두 종류의 항혈소판제 병합치료(Dual Antiplatelet Therapy, DAPT)는 주로 혈소판 활성화가 강력하게 일어나 혈전 형성 위험이 높은 급성 관상동맥 증후군(Acute Coronary Syndrome, ACS)에서 권장됩니다. 안정형 협심증은 단일 항혈소판제로 충분하며, 심방세동, 폐색전증, 기계판막치환술 등은 항응고제가 주된 치료입니다. DAPT는 ACS 환자의 허혈성 사건 재발을 효과적으로 예방합니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["15학번"], "professor": "박철수", "question": "이 환자의 치료 방침으로 가장 옳은 것은?", "images": [], "text_box": "72세 여자가 간헐적 어지러움과 수초간의 의식소실로 왔다. 8주 전 전벽급성심근경색으로 좌전하행지에 관동맥성형술(PCI) 시행. 좌심실 구혈률은 37% 평소 생활하는 데는 큰 불편도 없었고 얼마 전에는 친구들과 여행도 다녀왔다고 한다. 심전도 감시 중 다음과 같은 소견을 보였다.", "options": ["diuretics을 추가하고 digitalization을 시행한다.", "베타차단제를 증량한다.", "amiodarone을 투여한다.", "관동맥 조영술을 다시 시행한다.", "심장돌연사 예방을 위해 제세동기 삽입이 필요하다."], "answer": [4], "explanation": "환자는 심근경색 후 좌심실 구혈률이 37%로 저하되었고, 심전도 감시 중 비지속성 심실빈맥(non-sustained VT)이 확인되었습니다. 이와 같이 낮은 LVEF와 심실성 부정맥이 있는 심근경색 후 환자는 심장 돌연사 위험이 높아 이식형 제세동기(ICD) 삽입을 통해 예방하는 것이 가장 적절한 치료 방침입니다. 이는 심장 돌연사 예방 가이드라인에 따른 것입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["15학번"], "professor": "박철수", "question": "가장 우선적으로 시행해야 할 것은?", "images": [], "text_box": "25세 남자가 상복부 통증을 호소하며 응급실로 왔다. 혈압은 90/60mmHg, 의식은 명료하였다.", "options": ["나이트로 글리세린 설하정 투여", "아미오다론 정주", "에피네프린 정주", "제세동(defibrillation)", "일차적 관동맥 조영술"], "answer": [4], "explanation": "심전도 소견에서 광범위한 ST 분절 상승이 관찰되므로 급성 전벽 심근경색(STEMI)이 강력히 의심됩니다. STEMI 환자에게 가장 우선적이고 결정적인 치료는 막힌 관상동맥을 재개통하는 일차적 관동맥 중재술(Primary PCI)입니다. 혈압이 낮더라도 빠른 재관류가 중요하며, 니트로글리세린은 혈압을 더 낮출 수 있어 금기입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["15학번"], "professor": "박철수", "question": "가장 적합한 치료는?", "images": [], "text_box": "64세 남자가 전벽부 심근경색으로 일차적 관동맥 중재술 시행 1주일 후 약 10초간의 의식소실 당시의 심전도이다. 환자는 두 달 후 외래에서 약간의 호흡곤란을 호소하였고, 심장 초음파에서 좌심실 구혈율은 30%였다.", "options": ["경과관찰", "아미오다론", "이식형 심율동 전환 제세동기 (implantable cardioverter defibrillator, ICD)", "관상동맥 조영술", "칼륨 보충"], "answer": [2], "explanation": "환자는 심근경색 후 좌심실 구혈률이 30%로 심하게 저하되었고, 의식 소실을 동반한 심실빈맥(VT)이 발생했습니다. 이처럼 LVEF가 35% 이하이고 증상이 있는 심실성 부정맥이 있는 경우, 심장 돌연사 위험이 매우 높으므로 이식형 제세동기(ICD) 삽입이 가장 적절한 치료입니다. ICD는 생명을 위협하는 치명적인 부정맥을 감지하고 치료하여 돌연사를 예방합니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["15학번"], "professor": "박철수", "question": "응급실에서 우선적으로 투여해야 하는 약물은? (2가지)", "images": [], "text_box": "65세 남자가 안전 상태에서 30분이상 지속되는 심한 흉통이 있어 응급실에 왔다. 130/70mmHg, 맥박 98회/분, 체온 37.0도 였다. Troponin과 CK-MB의 음성이며 심전도는 다음과 같다.", "options": ["아스피린", "당단백 IIb/IIIa 억제제", "와파린", "클론피도그램", "저분자량 헤파린", "오메가 3지방산", "유로카이네즈", "딜티아젬", "엔지오텐신전환효소길항제", "스타틴", "나이트레이트", "베타차단제"], "answer": [0, 3], "explanation": "환자는 Troponin과 CK-MB가 음성이고 심전도에서 ST 분절 상승이 없는 심한 흉통을 호소하므로 불안정형 협심증 또는 NSTEMI가 의심됩니다. 이러한 급성 관상동맥 증후군에서는 즉시 항혈소판제인 아스피린과 클로피도그렐을 병용 투여하는 것이 표준 치료입니다. 이는 혈전 생성을 억제하여 심근경색의 진행을 막고 예후를 개선하는 데 중요합니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["14학번"], "professor": "박철수", "question": "특별한 증상이 없는 환자가 정기 검진에서 심전도 이상 소견으로 왔다. 치료 방침을 결정하는 데 고려 사항이 아닌 것은?", "images": [], "text_box": null, "options": ["심부전 여부 (좌심실 구혈율)", "고혈압 여부", "당뇨여부", "가족력", "성별"], "answer": [3], "explanation": "심방세동 환자의 항응고 요법 결정 시 사용되는 CHA2DS2-VASc 점수 체계는 심부전, 고혈압, 나이, 당뇨, 뇌졸중 과거력, 혈관 질환, 성별 등을 고려하지만, 가족력은 포함되지 않습니다. 따라서 심방세동 환자의 치료 방침을 결정하는 데 가족력은 직접적인 고려 사항이 아닙니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["14학번"], "professor": "박철수", "question": "가장 가능성 높은 진단은?", "images": [], "text_box": "26세 여자가 반복적인 실신으로 병원에 방문하였다. 혈압 110/70 mmHg, 맥박 65 회/분, 호흡 25 회/분, 체온 섭씨 36.5 도 였다. 실신 이외에 특이 병력 없었으며, 투약 내역도 없었다. 실신은 10여년 전 부터 1년에 1-2 차례 간헐적으로 발생 하였으며, 지하철 등 사람이 많은 공간에서 서 있는 도중에 발생하였다. 오심, 복부 불편감이 생기면서, 어지럼증이 느낀 이후에 쓰러지는 양상이였다. 1분 정도 실신 후에 의식 혼탁 등은 발생 하지 않고 바로 회복되었다고 한다.", "options": ["뇌전증", "기립성 저혈압", "동기능부전증후군", "미주신경성 실신", "과호흡 증후군"], "answer": [3], "explanation": "젊은 여성에서 반복적으로 사람이 많은 공간에서 서 있는 도중 발생한 실신, 오심, 복부 불편감, 어지럼증과 같은 전구 증상, 그리고 의식 소실 후 즉각적인 회복은 미주신경성 실신(vasovagal syncope)의 전형적인 특징입니다. 이는 신경매개성 실신의 한 형태로, 특이 병력이나 약물력이 없는 경우가 많습니다. 기립성 저혈압은 자세 변화 시 발생하며, 뇌전증은 발작 후 혼돈기가 동반됩니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["14학번"], "professor": "박철수", "question": "다음 중 신체 진찰에서 확인할 수 있는 소견은? (5 가지)", "images": [], "text_box": "70세 남자가 호흡곤란을 주소로 내원하였다. 혈액검사, 흉부 X 선 검사, 심초음파 검사상 울혈성 심부전이 의심되었다.", "options": ["S3 gallop", "맥압상승", "경정맥 확장", "Pulsus alternans", "Pre-tibial pitting edema", "상하지 혈압 차 10mmHg 이상의 차이", "폐청진시 rale"], "answer": [0, 2, 3, 4, 6], "explanation": "울혈성 심부전 환자에서는 혈액 순환이 원활하지 않아 다양한 신체 진찰 소견이 나타납니다. S3 gallop은 확장기 심실의 빠른 충만과 관련되며, 경정맥 확장과 다리의 부종(pitting edema)은 체액 저류를 시사합니다. Pulsus alternans는 심한 좌심실 기능 저하를 나타내며, 폐청진 시 rale(수포음)은 폐부종의 징후입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["14학번"], "professor": "박철수", "question": "우심실 부전에 의한 체액 저류의 소견을 모두 고르시오 (2개)", "images": [], "text_box": null, "options": ["S3 gallop", "맥압상승", "경정맥 확장", "Pulsus alternans", "Pre-tibial pitting edema", "상하지 혈압 차 10mmHg 이상의 차이", "폐청진시 rale"], "answer": [2, 4], "explanation": "우심실 부전은 전신 순환계로의 혈액 배출이 원활하지 않아 체액 저류를 유발합니다. 이에 따라 나타나는 주요 신체 소견은 경정맥 확장과 다리의 부종(Pre-tibial pitting edema)입니다. 경정맥 확장은 우심방압 상승을, 다리 부종은 말초 조직의 체액 저류를 반영합니다. 폐청진 시 rale은 주로 좌심실 부전에서 나타나는 소견입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["14학번"], "professor": "박철수", "question": "심부전 환자에게서 장기 생존율을 증가시키는 것으로 입증된 약물을 고르시오. (5 가지)", "images": [], "text_box": null, "options": ["Digitalis", "Angiotensin-converting enzyme inhibitor", "Calcium channel blocker", "Hydralazine", "Angiotensin II receptor blocker", "Loop diuretics", "Aldosterone antagonist", "Beta blocker", "Amiodarone", "Dopamine", "Aspirin"], "answer": [1, 4, 6, 7, 3], "explanation": "심부전 환자의 장기 생존율을 증가시키는 것으로 입증된 약물에는 안지오텐신 전환효소 억제제(ACE inhibitor), 안지오텐신 II 수용체 차단제(ARB), 베타차단제(Beta blocker), 알도스테론 길항제(Aldosterone antagonist), 그리고 특정 환자군에서 히드랄라진과 이질산염 복합제(Hydralazine + Isosorbide Dinitrate) 등이 포함됩니다. 루프 이뇨제는 증상 완화에는 도움이 되지만 생존율 개선 효과는 없습니다. 칼슘 채널 차단제는 심부전 환자에게 일반적으로 권장되지 않습니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["14학번"], "professor": "박철수", "question": "심부전 치료 기전에서 preload 또는 afterload를 감소시키는 방법과 심기능 항진을 유도하는 방법 있다. 심기능 항진을 유도하는 약물 2 가지를 고르시오. (2 가지)", "images": [], "text_box": null, "options": ["Digitalis", "Angiotensin-converting enzyme inhibitor", "Calcium channel blocker", "Hydralazine", "Angiotensin II receptor blocker", "Loop diuretics", "Aldosterone antagonist", "Beta blocker", "Amiodarone", "Dopamine", "Aspirin"], "answer": [0, 9], "explanation": "심기능 항진을 유도하는 약물은 심장의 수축력을 직접적으로 증가시키는 약제입니다. 대표적으로 디곡신(Digitalis)은 심근 수축력을 증가시키고, 도파민(Dopamine)과 같은 양성 변력제(inotropic agent) 역시 심장의 수축력을 높이는 작용을 합니다. 이들 약제는 심박출량을 증가시켜 심부전 증상을 개선하는 데 사용됩니다. 다른 약제들은 주로 preload/afterload 조절이나 다른 기전을 통해 심부전을 치료합니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["14학번"], "professor": "박철수", "question": "향후 사망률 개선에 도움이 되는 약물은?", "images": [], "text_box": "고혈압이 있던 56세 여자가 가벼운 일상생활에도 호흡곤란이 있다. 심초음파상 좌심실 구혈율은 22%로 감소되었다.", "options": ["베타차단제", "알파차단제", "칼슘차단제", "이뇨제", "디곡신"], "answer": [0], "explanation": "좌심실 구혈률이 22%로 감소된 심부전 환자에서 사망률 개선에 도움이 되는 약물로는 베타차단제가 가장 중요합니다. 베타차단제는 심근의 과도한 활성화를 억제하고 심장 리모델링을 개선하여 심부전 환자의 예후를 유의미하게 향상시킵니다. ACE 억제제/ARB, 알도스테론 길항제도 생존율 개선에 기여합니다. 이뇨제는 증상 완화에, 디곡신은 심방세동 동반 시 증상 조절에 사용될 수 있습니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["11학번"], "professor": "박철수", "question": "다음 중 폐부종이 발생할 가능성이 가장 적은 질환은?", "images": [], "text_box": null, "options": ["이완기 심부전", "광범위전벽심근 경색", "심낭 압전(tamponade)", "확장성 심근증", "승모판 폐쇄 부전"], "answer": [2], "explanation": "심낭 압전(cardiac tamponade)은 심낭 내 체액이 축적되어 심실 확장기 충만을 방해하는 질환입니다. 이로 인해 심박출량이 감소하고 쇼크가 발생할 수 있지만, 좌심실로의 혈액 유입 자체가 감소하므로 폐울혈이나 폐부종은 잘 발생하지 않습니다. 이와 달리 이완기 심부전, 광범위 전벽 심근경색, 확장성 심근증, 승모판 폐쇄 부전은 좌심실 기능 이상으로 폐울혈 및 폐부종을 유발할 수 있습니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["11학번"], "professor": "박철수", "question": "다음 중 쇼크의 발생 가능성이 가장 적은 것은?", "images": [], "text_box": null, "options": ["심실 세동", "승모판 협착증", "전격성 심근염(fulminant myocarditis)", "우심실 심근경색", "급성 승모판 폐쇄 부전"], "answer": [1], "explanation": "심실 세동, 전격성 심근염, 우심실 심근경색, 급성 승모판 폐쇄 부전은 모두 급성으로 심한 심기능 저하를 초래하여 쇼크 발생 가능성이 매우 높은 질환들입니다. 반면, 승모판 협착증은 주로 만성적으로 진행되는 질환으로, 오랜 기간에 걸쳐 심장에 부담을 주지만 급성으로 심각한 쇼크를 유발하는 경우는 드뭅니다. 중증의 승모판 협착증이라도 만성적인 경과를 보입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["11학번"], "professor": "박철수", "question": "심근 경색증 환자가 발병 4시간 만에 왔다. 혈압은 70/40mmHg, 맥박은 100회/분, 검사소견이다. 적합한 치료는?", "images": [], "text_box": null, "options": ["이뇨제 투여 후 안정화 된 후에 관동맥 확장술 시행", "일차적 관동맥 확장술 시행", "나이트레이트 정주", "안지오텐신 전환효소 억제제 투여", "베타차단제 투여"], "answer": [1], "explanation": "심근경색증 환자에게 저혈압(70/40 mmHg)은 심인성 쇼크를 시사합니다. 급성 심근경색으로 인한 심인성 쇼크의 경우, 가능한 한 빨리 폐쇄된 관상동맥을 재개통시키는 것이 중요하며, 일차적 관동맥 중재술(Primary PCI)이 표준 치료입니다. 이뇨제나 나이트레이트는 혈압을 더 떨어뜨릴 수 있어 금기이며, 다른 약물 치료는 PCI 이후 고려됩니다. 신속한 재관류는 생존율을 높이는 데 결정적입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["08학번"], "professor": "박철수", "question": "호흡곤란을 호소하는 환자의 심장초음파 흉골연 단축 단면도 이다. 관찰할 수 있는 혈역학적 변화는? (우심실이 심하게 확장되어 있고 좌심실이 반달 모양인 초음파 사진)", "images": [], "text_box": null, "options": ["가,나,다", "가,다", "나,라", "라", "가,나,다,라"], "answer": [0], "explanation": "심장초음파에서 우심실 확장과 좌심실이 반달 모양으로 압박된 소견은 폐고혈압이나 폐색전증과 같은 우심실 부전 상황에서 흔히 관찰됩니다. 우심실 기능이 저하되면 우심방압과 우심실압이 증가하고, 이는 폐동맥압의 증가로 이어집니다. 반면, 폐모세혈관 쐐기압(PCWP)은 주로 좌심실의 이완기 압력을 반영하므로 우심실 부전에서는 증가하지 않습니다. 따라서 가, 나, 다가 맞는 변화입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["21학번"], "professor": "최윤석", "question": "처치는? (총괄평가)", "images": [], "text_box": "87세 여자 1개월 전 가슴통증있어 내원하였다. 2개월 전 실신 병력이 있고 혈압 130/85mmHg, 맥박은 70회/분이었다. 가슴 청진 결과 오른쪽 2th intercostal area 에서 III/VI 도의 박출 수축기 잡음이 들렸고, 목동맥, 심장끝에서 수축기 잡음 들렸다. 심전도 결과 상 좌심실 비대 소견 있고 환자는 만성폐쇄성폐질환이 동반되어 흡입제를 사용하고 있고, 전신마취의 위험성이 높다고 평가되었다.", "options": ["승모판클립 삽입", "왼심방귀 가리개 삽입", "카테터 경유 대동맥 판막 삽입", "경피적 승모판 풍선 성형술", "심방 사이막 가리개 삽입"], "answer": [2], "explanation": "87세 고령의 환자가 가슴 통증과 실신 병력을 보이며, 심장 청진 시 우측 2번째 늑간에서 박출성 수축기 잡음이 들리고 심전도상 좌심실 비대 소견이 있습니다. 이는 대동맥판막 협착증(aortic stenosis)을 강력하게 시사하는 소견입니다. 환자는 만성 폐쇄성 폐질환을 동반하고 전신마취의 위험성이 높다고 평가되었습니다. 이러한 경우 수술적 대동맥판막 치환술(SAVR) 대신 최소 침습적인 카테터 경유 대동맥 판막 삽입술(TAVI/TAVR)이 우선적으로 고려됩니다. 카테터 경유 대동맥 판막 삽입술은 고위험군 환자에게 효과적인 치료 대안입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["20학번"], "professor": "박철수", "question": "환자의 증상 호전을 위한 다음의 적절한 조치는?", "images": [], "text_box": "62세 남자가 호흡곤란을 주소로 응급실에 방문을 하였다. 환자는 2달 전에 급성심근경색증으로 관상동맥중재시술을 받았고 당시 심구혈률은 38%였다. 환자의 혈압은 130/80mmHg 였고 심박수는 90회/min 이었다. 다음은 환자의 흉부 X ray 사진이다.", "options": ["라식스 iv", "도파민 iv", "디곡신 iv", "헤파린 iv", "아미오다른 iv"], "answer": [0], "explanation": "환자는 급성 심근경색증 병력이 있고 심박출량이 감소된 심부전 환자입니다. 흉부 X-ray 사진에서 폐부종 소견이 관찰되어 호흡곤란 증상의 주원인으로 판단됩니다. 심부전으로 인한 호흡곤란을 완화하기 위해서는 심장으로 돌아오는 혈액량인 전부하(preload)를 감소시키는 것이 중요합니다. 라식스(furosemide)와 같은 이뇨제는 신장의 수분 배출을 촉진하여 전부하를 효과적으로 줄여주고, 혈관확장제(nitrate)도 혈관을 확장시켜 전부하를 감소시킬 수 있습니다. 따라서 이뇨제 투여가 환자의 증상 호전에 적절한 조치입니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["19학번"], "professor": "박철수", "question": "추가로 해야 할 검사는? (이번 시간 내용 X)", "images": [], "text_box": "청진에서 심잡음이 들렸고, 호흡음은 정상이다. 심전도 검사는 다음과 같았다. 맥박, 호흡, 체온 다 정상이었다.", "options": ["심초음파 검사", "관상동맥 조영술", "운동부하 검사", "경과 관찰", "우심도자술"], "answer": [0], "explanation": "환자는 청진에서 심잡음이 들리지만 호흡음과 활력징후는 정상입니다. 심전도 결과만으로는 심잡음의 원인을 정확히 파악하기 어렵습니다. 심잡음은 심장 판막 질환, 선천성 심장병, 심근병증 등 다양한 심장 구조적 이상으로 발생할 수 있습니다. 심초음파 검사는 심장의 구조와 기능을 가장 정확하게 평가할 수 있는 비침습적 검사입니다. 이를 통해 심잡음의 원인이 되는 판막 병변이나 심근의 이상 유무를 진단하고 적절한 치료 방침을 결정할 수 있습니다. 따라서 심초음파 검사가 우선적으로 시행되어야 합니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["19학번"], "professor": "박철수", "question": "치료는? (총괄평가)", "images": [], "text_box": "56세 여자가 1달 전에 감기에 걸린 후 전일 호흡곤란 및 흉통으로 내원했다. 혈압 115/65 mmHg, BNP 503 pg/mL 이다. 혈액검사 및 폐 X선 사진이다. 혈색소 7.0 g/dL 백혈구 15,040/µL 혈소판 100,000/μL", "options": ["Nitrate iv", "Digoxin iv", "Heparin iv", "Amiodarone iv", "Dobutamine iv"], "answer": [0], "explanation": "환자는 감기 후 호흡곤란과 흉통, BNP 상승 소견을 보이며, 폐 X선 사진에서 폐부종(pulmonary edema)이 관찰됩니다. 이는 급성 비대상성 심부전과 급성 폐부종을 시사합니다. 혈압이 115/65mmHg로 비교적 유지되고 있어 수축기 혈압이 100 mmHg 이상인 경우에 해당합니다. 이러한 급성 심부전 치료 시, 수축기 혈압이 100 mmHg를 초과하는 경우 Nitroglycerin(Nitrate) 정맥 투여가 표준 치료입니다. Nitroglycerin은 혈관을 확장시켜 전부하와 후부하를 감소시켜 심장의 부담을 줄이고 폐부종을 완화하는 데 효과적입니다. 다른 약제들은 혈압이 더 낮거나 쇼크 증상이 있을 때 고려됩니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["18학번"], "professor": "박철수", "question": "치료로 적절하지 않은 것은? (이번 시간 내용 X)", "images": [], "text_box": "55세 남자 환자가 3달 전부터 숨이 차서 외래를 방문하였다. 환자는 매일 소주 3병의 음주력과 30 갑년의 흡연력이 있으며 당뇨와 고혈압은 없었다. 흉부 X선, 심전도 및 심장초음파 소견이다. 좌심실 구혈율: 25%, 전반적인 벽운동 저하, 이완기 및 수축기 좌심실 직경 확장, 중등도 승모판 폐쇄부전", "options": ["철저한 금주", "와파린", "안지오텐신 수용체 차단제", "스피로노락톤", "승모판 치환술"], "answer": [4], "explanation": "환자는 만성적인 과도한 음주력과 흡연력을 가지고 있으며, 좌심실 구혈률 25%와 좌심실 확장, 전반적인 벽운동 저하를 보이는 확장성 심근병증(dilated cardiomyopathy)의 소견을 보입니다. 중등도의 승모판 폐쇄부전은 확장성 심근병증에 의한 이차적인 기능성 승모판 폐쇄부전일 가능성이 높습니다. 알코올성 심근병증 환자에게는 금주가 필수적이며, 심부전 약물 치료(ACEI/ARB, 베타차단제, MRA 등)가 권장됩니다. 와파린은 심방세동이나 혈전색전증의 위험이 있는 경우에 사용될 수 있습니다. 하지만, 기능성 승모판 폐쇄부전은 심근 기능 개선에 따라 호전될 수 있으므로, 일차적인 치료로 승모판 치환술을 시행하는 것은 적절하지 않습니다."}, {"subject": "증례를 통한 심장과 혈관 정리", "year": ["17학번"], "professor": "박철수", "question": "아래는 가슴 X선과 심전도이다. 가능성 높은 진단은? (이번 시간 내용 X)", "images": [], "text_box": "80세 여자가 4시간 전 시작된 호흡곤란으로 왔다 function deduplicateQuestions(items) {
  const seen = new Map();
  const result = [];
  items.forEach(item => {
    const raw = (item.question || '').replace(/\s+/g, '').slice(0, 80);
    if (!raw) { result.push(item); return; }
    if (seen.has(raw)) {
      const existing = result[seen.get(raw)];
      const merged = new Set([...(existing.year || []), ...(item.year || [])]);
      existing.year = [...merged].sort((a, b) => {
        const na = parseInt((a.match(/\d+/) || [0])[0]);
        const nb = parseInt((b.match(/\d+/) || [0])[0]);
        return nb - na;
      });
    } else {
      seen.set(raw, result.length);
      result.push(item);
    }
  });
  return result;
}

function cleanQuestionTextBox(item) {
  if (!item.text_box || !item.question) return item;
  const tbNorm = item.text_box.replace(/\s+/g, '');
  const qNorm  = item.question.replace(/\s+/g, '');
  if (qNorm.startsWith(tbNorm)) {
    return { ...item, text_box: null };
  }
  return item;
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function scrollTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

function openFilterModal() {
  buildSubjectOptions();
  buildYearOptions();
  document.getElementById('filter-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFilterModal() {
  document.getElementById('filter-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function onOverlayClick(e) {
  if (e.target.id === 'filter-overlay') closeFilterModal();
}
function resetFilter() {
  activeSubject = 'all';
  activeYear    = 'all';
  buildSubjectOptions();
  buildYearOptions();
  applyFilters();
  updateFab();
}

function allSubjects() {
  return [...new Set(RAW.map(q => q.subject || '기타').filter(Boolean))].sort();
}
function allYears() {
  const yrs = new Set();
  RAW.forEach(q => (q.year || []).forEach(y => yrs.add(y)));
  return [...yrs].sort((a, b) => {
    const na = parseInt((a.match(/\d+/) || [0])[0]);
    const nb = parseInt((b.match(/\d+/) || [0])[0]);
    return nb - na;
  });
}

function buildSubjectOptions() {
  const wrap = document.getElementById('subject-options');
  wrap.innerHTML = '';
  const hint = document.getElementById('subject-hint');
  hint.textContent = allSubjects().length + '개 단원 · 총 ' + RAW.length + '문항';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-option' + (activeSubject === 'all' ? ' active' : '');
  allBtn.innerHTML = `<span class="opt-label">전체</span><span class="opt-cnt">${RAW.length}</span>`;
  allBtn.onclick = () => chooseSubject('all');
  wrap.appendChild(allBtn);

  allSubjects().forEach(s => {
    const count = RAW.filter(q => (q.subject || '기타') === s).length;
    const btn = document.createElement('button');
    btn.className = 'filter-option' + (activeSubject === s ? ' active' : '');
    btn.innerHTML = `<span class="opt-label">${escapeHtml(s)}</span><span class="opt-cnt">${count}</span>`;
    btn.onclick = () => chooseSubject(s);
    wrap.appendChild(btn);
  });
}

function buildYearOptions() {
  const wrap = document.getElementById('year-options');
  wrap.innerHTML = '';
  const hint = document.getElementById('year-hint');

  let pool = [...RAW];
  if (activeSubject !== 'all') pool = pool.filter(q => (q.subject || '기타') === activeSubject);

  const years = new Set();
  pool.forEach(q => (q.year || []).forEach(y => years.add(y)));
  const yearList = [...years].sort((a, b) => {
    const na = parseInt((a.match(/\d+/) || [0])[0]);
    const nb = parseInt((b.match(/\d+/) || [0])[0]);
    return nb - na;
  });
  hint.textContent = yearList.length + '개 학번 · ' + pool.length + '문항';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-option' + (activeYear === 'all' ? ' active' : '');
  allBtn.innerHTML = `<span class="opt-label">전체</span><span class="opt-cnt">${pool.length}</span>`;
  allBtn.onclick = () => chooseYear('all');
  wrap.appendChild(allBtn);

  yearList.forEach(y => {
    const count = pool.filter(q => Array.isArray(q.year) && q.year.includes(y)).length;
    const btn = document.createElement('button');
    btn.className = 'filter-option' + (activeYear === y ? ' active' : '');
    btn.innerHTML = `<span class="opt-label">${escapeHtml(y)}</span><span class="opt-cnt">${count}</span>`;
    btn.onclick = () => chooseYear(y);
    wrap.appendChild(btn);
  });
}

  if (s === 'all') closeFilterModal();
}

  let pool = [...RAW];
  if (activeSubject !== 'all') pool = pool.filter(q => (q.subject || '기타') === activeSubject);
  if (activeYear    !== 'all') pool = pool.filter(q => Array.isArray(q.year) && q.year.includes(activeYear));
  questions = pool;
  current   = 0;
  answers   = {};
  updateStats();
  renderDots();
  renderQuestion();
}

function updateFab() {
  const labelEl = document.getElementById('fab-label');
  const countEl = document.getElementById('fab-count');
  let label;
  if (activeSubject === 'all' && activeYear === 'all') label = '단원 · 학번 선택';
  else if (activeSubject !== 'all' && activeYear !== 'all') label = activeSubject + ' · ' + activeYear;
  else if (activeSubject !== 'all') label = activeSubject;
  else label = activeYear;
  labelEl.textContent = label;
  countEl.textContent = questions.length + '문항';
}

// ════════ NAV DOTS ════════
function renderDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot';
    dot.textContent = i + 1;
    if (i === current) dot.classList.add('current');
    else if (answers[i]) dot.classList.add(answers[i].correct ? 'correct' : 'wrong');
    dot.onclick = () => goTo(i);
    wrap.appendChild(dot);
  });
  const active = wrap.children[current];
  if (active) active.scrollIntoView({ inline: 'center', block: 'nearest' });
}

// ════════ STATS ════════
function updateStats() {
  const total    = questions.length;
  const answered = Object.keys(answers).length;
  const correct  = Object.values(answers).filter(a => a.correct).length;
  const wrong    = answered - correct;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent   = wrong;
  document.getElementById('stat-rate').textContent    = answered > 0 ? Math.round(correct / answered * 100) + '%' : '—';
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ════════ RENDER QUESTION ════════
// 순서: 문제(q-text) → 텍스트박스(text-box) → 이미지(q-images) → 선지
function renderQuestion() {
  const container = document.getElementById('quiz-container');
  document.getElementById('score-container').classList.add('hidden');
  container.classList.remove('hidden');

  if (questions.length === 0) {
    container.innerHTML = `
      <div class="q-card empty-card">
        <span class="empty-emoji">🔍</span>
        해당 조건의 문제가 없습니다.<br>
        <span style="font-size:12px;">우측 하단 버튼을 눌러 다른 조건을 시도해보세요.</span>
      </div>`;
    return;
  }

  const q        = questions[current];
  const ans      = answers[current];
  const answered = !!ans;

  const yearStr = Array.isArray(q.year) ? q.year.join(' · ') : (q.year || '?');
  const tbHTML  = q.text_box ? `<div class="text-box">${escapeHtml(q.text_box)}</div>` : '';

  let imgHTML = '';
  if (q.images && q.images.length > 0) {
    imgHTML = '<div class="q-images">' +
      q.images.map((src, idx) =>
        `<img src="${src}" alt="문제 이미지 ${idx+1}" onclick="openLightbox(this.src)" loading="lazy">`
      ).join('') +
      '</div>';
  }

  const correctAnswers = Array.isArray(q.answer) ? q.answer : [q.answer];
  const optsHTML = (q.options || []).map((opt, i) => {
    let cls = 'opt-btn';
    if (answered) {
      if (correctAnswers.includes(i))              cls += ' correct-answer';
      else if (ans.selected === i && !ans.correct) cls += ' wrong-answer';
    }
    return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="choose(${i})">
      <span class="opt-num">${i + 1}</span>
      <span>${escapeHtml(opt)}</span>
    </button>`;
  }).join('');

  let explHTML = '';
  if (answered) {
    const isRight = ans.correct;
    explHTML = `
      <div class="explanation-box ${isRight ? '' : 'wrong'}">
        <div class="expl-label">${isRight ? '✓ 정답 해설' : '✗ 오답 해설'}</div>
        <div class="expl-text">${escapeHtml(q.explanation || '')}</div>
      </div>
      <div class="result-row">
        <span>${isRight ? '🎯' : '❌'}</span>
        <span class="result-msg ${isRight ? '' : 'wrong'}">${isRight ? '정답입니다!' : `오답 — 정답: ${correctAnswers.map(a => a + 1).join(', ')}번`}</span>
      </div>`;
  }

  const isFirst = current === 0;
  const isLast  = current === questions.length - 1;

  container.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-year-badge">${escapeHtml(yearStr)}</span>
        <span class="q-subject-badge">${escapeHtml(q.subject || '기타')}</span>
        ${q.professor ? `<span class="q-prof">${escapeHtml(q.professor)}</span>` : ''}
        <span class="q-num">${current + 1} / ${questions.length}</span>
      </div>
      <div class="q-body">
        <p class="q-text">${escapeHtml(q.question || '')}</p>
        ${tbHTML}
        ${imgHTML}
        <div class="options-list">${optsHTML}</div>
      </div>
      ${explHTML}
      <div class="action-row">
        <button class="btn-nav" onclick="prevQ()" ${isFirst ? 'disabled' : ''}>← 이전</button>
        <span class="kbd-hint"><kbd>1</kbd>–<kbd>5</kbd> 선택 · <kbd>→</kbd> 다음</span>
        <button class="btn-next" onclick="nextQ()">${isLast ? '결과 보기 →' : '다음 →'}</button>
      </div>
    </div>`;
}

// ════════ 상호작용 ════════
function choose(i) {
  if (answers[current]) return;
  const q = questions[current];
  const correctAnswers = Array.isArray(q.answer) ? q.answer : [q.answer];
  answers[current] = { selected: i, correct: correctAnswers.includes(i) };
  updateStats();
  renderDots();
  renderQuestion();
}
function prevQ() { if (current > 0) { current--; renderQuestion(); renderDots(); scrollTop(); } }
function nextQ() {
  if (current < questions.length - 1) { current++; renderQuestion(); renderDots(); scrollTop(); }
  else { showScore(); }
}
function goTo(i) {
  current = i;
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  renderQuestion(); renderDots(); scrollTop();
}

// ════════ 점수 화면 ════════
function showScore() {
  const total   = questions.length;
  const correct = Object.values(answers).filter(a => a.correct).length;
  const wrong   = Object.values(answers).filter(a => !a.correct).length;
  const skip    = total - Object.keys(answers).length;
  const pct     = total > 0 ? Math.round(correct / total * 100) : 0;

  let trophy = '🥇', msg = '완벽합니다!';
  if (pct < 40)       { trophy = '📚'; msg = '더 열심히 공부해봐요!'; }
  else if (pct < 60)  { trophy = '💪'; msg = '조금 더 노력이 필요해요.'; }
  else if (pct < 80)  { trophy = '👍'; msg = '잘 하고 있어요!'; }
  else if (pct < 100) { trophy = '🏆'; msg = '훌륭한 성적입니다!'; }

  document.getElementById('quiz-container').classList.add('hidden');
  const sc = document.getElementById('score-container');
  sc.classList.remove('hidden');
  sc.innerHTML = `
    <div class="score-screen">
      <div class="score-trophy">${trophy}</div>
      <h2 class="score-title">${pct}점 — ${msg}</h2>
      <p class="score-sub">총 ${total}문항 완료</p>
      <div class="score-grid">
        <div class="score-stat"><div class="score-stat-num">${correct}</div><div class="score-stat-label">정답</div></div>
        <div class="score-stat"><div class="score-stat-num wrong">${wrong}</div><div class="score-stat-label">오답</div></div>
        <div class="score-stat"><div class="score-stat-num" style="color:var(--amber)">${skip}</div><div class="score-stat-label">미응답</div></div>
      </div>
      <button class="btn-restart" onclick="restart()">다시 풀기</button>
    </div>`;
}
function restart() {
  current = 0; answers = {};
  document.getElementById('score-container').classList.add('hidden');
  document.getElementById('quiz-container').classList.remove('hidden');
  updateStats(); renderDots(); renderQuestion(); scrollTop();
}

// ════════ 라이트박스 ════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ════════ 키보드 ════════
document.addEventListener('keydown', e => {
  if (document.getElementById('pwd-gate').style.display !== 'none') return;
  if (document.getElementById('filter-overlay').classList.contains('open')) {
    if (e.key === 'Escape') closeFilterModal();
    return;
  }
  if (e.key === 'Escape')      closeLightbox();
  if (e.key >= '1' && e.key <= '5') {
    const idx = parseInt(e.key) - 1;
    const q = questions[current];
    if (q && q.options && idx < q.options.length && !answers[current]) choose(idx);
  }
  if (e.key === 'ArrowRight') nextQ();
  if (e.key === 'ArrowLeft')  prevQ();
});

// ════════ 앱 초기화 ════════
function initApp() {
  updateStats();
  renderDots();
  renderQuestion();
  updateFab();
}
</script>
</body>
</html>
